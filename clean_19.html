<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pipeline View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --border: #21262d;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;

    --seed: #3fb950;
    --hypo: #a371f7;
    --inv: #58a6ff;
    --paper: #f0883e;

    --seed-dim: rgba(63,185,80,0.25);
    --hypo-dim: rgba(163,113,247,0.25);
    --inv-dim: rgba(88,166,255,0.25);
    --paper-dim: rgba(240,136,62,0.25);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Timeline ── */
  .timeline-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 0 24px;
  }

  .timeline-inner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0;
    max-width: 900px;
    width: 100%;
  }

  /* Connecting line behind dots */
  .timeline-inner::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 6px;
    right: 6px;
    height: 1.5px;
    background: var(--border);
    transform: translateY(-50%);
    z-index: 0;
  }

  .module-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  .module-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
    user-select: none;
  }
  .module-label:hover { opacity: 0.7; }
  .module-label.selected { text-decoration: underline; text-underline-offset: 3px; }

  .module-label[data-module="seed"]  { color: var(--seed); }
  .module-label[data-module="hypo"]  { color: var(--hypo); }
  .module-label[data-module="inv"]   { color: var(--inv); }
  .module-label[data-module="paper"] { color: var(--paper); }

  .dots-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .gap { width: 12px; flex-shrink: 0; }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    flex-shrink: 0;
    z-index: 1;
  }
  .dot:hover { transform: scale(1.3); }

  /* Status: complete */
  .dot.complete[data-module="seed"]  { background: var(--seed); }
  .dot.complete[data-module="hypo"]  { background: var(--hypo); }
  .dot.complete[data-module="inv"]   { background: var(--inv); }
  .dot.complete[data-module="paper"] { background: var(--paper); }

  /* Status: pending — ring outline */
  .dot.pending {
    background: transparent;
    border: 2px solid;
  }
  .dot.pending[data-module="seed"]  { border-color: var(--seed-dim); }
  .dot.pending[data-module="hypo"]  { border-color: var(--hypo-dim); }
  .dot.pending[data-module="inv"]   { border-color: var(--inv-dim); }
  .dot.pending[data-module="paper"] { border-color: var(--paper-dim); }

  /* Status: active — pulsing glow */
  .dot.active {
    width: 16px;
    height: 16px;
    margin: -2px;
    border: none;
  }
  .dot.active[data-module="inv"] {
    background: var(--inv);
    animation: pulse-inv 2s ease-in-out infinite;
  }
  @keyframes pulse-inv {
    0%, 100% { box-shadow: 0 0 0 0 rgba(88,166,255,0.5); }
    50%      { box-shadow: 0 0 10px 4px rgba(88,166,255,0.35); }
  }

  /* Status: running */
  .dot.running[data-module="inv"] {
    background: var(--inv);
    opacity: 0.7;
  }

  /* Selected ring */
  .dot.selected {
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px #fff !important;
  }

  /* ── Content Area ── */
  .content-area {
    margin-top: 100px;
    padding: 20px 24px 60px;
    display: flex;
    justify-content: center;
  }

  .content-card {
    max-width: 650px;
    width: 100%;
    opacity: 1;
    transition: opacity 0.2s ease;
  }
  .content-card.fading { opacity: 0; }

  .content-step {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .content-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .content-meta .sep { color: var(--text-dim); }

  .content-summary {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* Detail list */
  .detail-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .detail-list li {
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .detail-list .icon {
    flex-shrink: 0;
    width: 18px;
    text-align: center;
    font-size: 13px;
  }
  .detail-list .icon.done    { color: var(--seed); }
  .detail-list .icon.running { color: var(--inv); }
  .detail-list .icon.pend    { color: var(--text-dim); }

  .detail-list .label { color: var(--text); }
  .detail-list .note  { color: var(--text-muted); margin-left: 2px; }

  .detail-list li.is-pending .label,
  .detail-list li.is-pending .note { color: var(--text-dim); }

  /* Muted card for pending steps */
  .content-card.is-pending .content-step,
  .content-card.is-pending .content-summary {
    color: var(--text-dim);
  }
  .content-card.is-pending .content-meta {
    color: var(--text-dim);
  }

  /* Module-level summary */
  .module-summary-bar {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    margin-bottom: 24px;
    overflow: hidden;
  }
  .module-summary-bar .fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
</style>

// ── State ──

// ── Build Timeline ──
function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  GROUPS.forEach((group, gi) => {
    const wrap = document.createElement('div');
    wrap.className = 'module-group';

    // Label
    const label = document.createElement('div');
    label.className = 'module-label';
    label.dataset.module = group.module;
    label.textContent = MODULES[group.module].label;
    label.addEventListener('click', () => selectModule(group.module));
    wrap.appendChild(label);

    // Dots row
    const row = document.createElement('div');
    row.className = 'dots-row';

    group.dots.forEach(dot => {
      const el = document.createElement('div');
      el.className = `dot ${dot.status}`;
      el.dataset.module = dot.module;
      el.dataset.id = dot.id;
      el.title = dot.title;
      if (dot.id === selectedId && !selectedModule) el.classList.add('selected');
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selectDot(dot.id);
      });
      row.appendChild(el);
    });

    wrap.appendChild(row);
    tl.appendChild(wrap);

    // Gap between groups
    if (gi < GROUPS.length - 1) {
      const gap = document.createElement('div');
      gap.className = 'gap';
      tl.appendChild(gap);
    }
  });
}

// ── Select Dot ──
function selectDot(id) {
  selectedId = id;
  selectedModule = null;
  updateSelectionVisuals();
  transitionContent(() => renderDotContent(id));
}

// ── Select Module ──
function selectModule(mod) {
  if (selectedModule === mod) {
    // Deselect module, revert to active dot
    selectedModule = null;
    selectedId = 'i10';
  } else {
    selectedModule = mod;
    selectedId = null;
  }
  updateSelectionVisuals();
  transitionContent(() => {
    if (selectedModule) renderModuleContent(selectedModule);
    else renderDotContent('i10');
  });
}

function updateSelectionVisuals() {
  // Dots
  document.querySelectorAll('.dot').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === selectedId);
  });
  // Module labels
  document.querySelectorAll('.module-label').forEach(el => {
    el.classList.toggle('selected', el.dataset.module === selectedModule);
  });
}

// ── Transition ──
function transitionContent(renderFn) {
  const card = document.getElementById('content');
  card.classList.add('fading');
  setTimeout(() => {
    renderFn();
    card.classList.remove('fading');
  }, 180);
}

// ── Render Dot Content ──
function renderDotContent(id) {
  const dot = DOTS.find(d => d.id === id);
  if (!dot) return;
  const card = document.getElementById('content');
  const isPending = dot.status === 'pending';

  let html = `<div class="${isPending ? 'is-pending' : ''}">`;
  html += `<div class="content-step">${dot.title} &mdash; ${dot.phase}</div>`;
  html += `<div class="content-meta">${dot.meta}</div>`;
  html += `<div class="content-summary">${dot.summary}</div>`;

  if (dot.details && dot.details.length > 0) {
    html += '<ul class="detail-list">';
    dot.details.forEach(d => {
      const iconMap = { done: '\u2713', running: '\u25B6', pend: '\u25CB' };
      const classMap = { done: 'done', running: 'running', pend: 'pend' };
      const liClass = d.s === 'pend' ? ' class="is-pending"' : '';
      html += `<li${liClass}>`;
      html += `<span class="icon ${classMap[d.s]}">${iconMap[d.s]}</span>`;
      html += `<span class="label">${d.label}</span>`;
      if (d.note) html += `<span class="note">\u2014 ${d.note}</span>`;
      html += '</li>';
    });
    html += '</ul>';
  }

  html += '</div>';
  card.className = `content-card${isPending ? ' is-pending' : ''}`;
  card.innerHTML = html;
}

// ── Render Module Content ──
function renderModuleContent(mod) {
  const info = MODULE_SUMMARIES[mod];
  const modData = MODULES[mod];
  const card = document.getElementById('content');

  const dots = DOTS.filter(d => d.module === mod);
  const done = dots.filter(d => d.status === 'complete').length;
  const total = dots.length;
  const pct = Math.round((done / total) * 100);
  const isPending = done === 0;

  let html = `<div class="${isPending ? 'is-pending' : ''}">`;
  html += `<div class="content-step">${info.title}</div>`;
  html += `<div class="content-meta">${info.meta}</div>`;
  html += `<div class="module-summary-bar"><div class="fill" style="width:${pct}%;background:${modData.color}"></div></div>`;
  html += `<div class="content-summary">${info.summary}</div>`;

  // List sub-steps
  html += '<ul class="detail-list">';
  dots.forEach(d => {
    const statusMap = {
      complete: { icon: '\u2713', cls: 'done' },
      active:   { icon: '\u25B6', cls: 'running' },
      running:  { icon: '\u25B6', cls: 'running' },
      pending:  { icon: '\u25CB', cls: 'pend' },
    };
    const s = statusMap[d.status];
    const liClass = d.status === 'pending' ? ' class="is-pending"' : '';
    html += `<li${liClass}>`;
    html += `<span class="icon ${s.cls}">${s.icon}</span>`;
    html += `<span class="label">${d.title}</span>`;
    html += `<span class="note">\u2014 ${d.phase}</span>`;
    html += '</li>';
  });
  html += '</ul>';

  html += '</div>';
  card.className = `content-card${isPending ? ' is-pending' : ''}`;
  card.innerHTML = html;
}

// ── Init ──
buildTimeline();
renderDotContent('i10');
</script>
