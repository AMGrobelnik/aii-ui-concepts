<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary Box v2 — Progress Bar + Dot Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--blue-dim); color: var(--blue);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

/* ===== SHARED ===== */
.progress-bar {
  height: 3px; background: rgba(148,163,184,.06);
  border-radius: 2px; overflow: hidden; margin-bottom: 14px;
}
.progress-fill { height: 100%; border-radius: 2px; transition: width .6s; }

.sum-text {
  font-size: 13px; color: var(--text-dim); line-height: 1.65;
  font-style: italic; margin-bottom: 14px;
}

.todos { display: flex; flex-direction: column; gap: 2px; }
.todo {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; font-size: 12px;
}
.td-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.td-dot.done { background: var(--green); opacity: .7; }
.td-dot.run  { background: var(--blue); animation: pulse 2s ease-in-out infinite; }
.td-dot.up   { background: transparent; border: 1.5px solid var(--text-faint); opacity: .4; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
.td-text { flex: 1; }
.td-text.done { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(148,163,184,.25); }
.td-text.run  { color: var(--text); }
.td-text.up   { color: var(--text-muted); }

.dot-progress { display: flex; gap: 3px; margin-top: 12px; }
.dp { width: 8px; height: 8px; border-radius: 50%; transition: background .3s; }

/* ============================================================
   V1 — Module color progress bar, dots + text todos, dot progress
   ============================================================ */

/* ============================================================
   V2 — Thicker progress bar (4px)
   ============================================================ */
.v2 .progress-bar { height: 4px; }

/* ============================================================
   V3 — Progress bar with percentage label right-aligned
   ============================================================ */
.v3-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.v3-bar-row .progress-bar { flex: 1; margin-bottom: 0; }
.v3-pct { font-size: 10px; font-weight: 700; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

/* ============================================================
   V4 — Gradient progress bar (color fades to dim)
   ============================================================ */

/* ============================================================
   V5 — Progress bar + step count label below
   ============================================================ */
.v5-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; font-size: 10px; color: var(--text-faint); }
.v5-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--text-faint); opacity: .4; }

/* ============================================================
   V6 — Segmented progress bar (one segment per todo)
   ============================================================ */
.v6-segments { display: flex; gap: 2px; margin-bottom: 14px; height: 3px; }
.v6-seg { flex: 1; border-radius: 2px; }

/* ============================================================
   V7 — Rounded progress bar with glow
   ============================================================ */
.v7 .progress-bar { height: 4px; border-radius: 3px; }

/* ============================================================
   V8 — Thin progress bar at very top + more space below
   ============================================================ */
.v8 .progress-bar { height: 2px; margin-bottom: 16px; }

/* ============================================================
   V9 — Progress bar + running shimmer animation
   ============================================================ */
.v9 .progress-fill { position: relative; overflow: hidden; }
.v9 .progress-fill::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer { 0%{left:-100%} 50%{left:160%} 100%{left:160%} }

/* ============================================================
   V10 — Dot progress bigger, progress bar with pulse on active edge
   ============================================================ */
.v10 .dp { width: 10px; height: 10px; }
.v10 .progress-fill { position: relative; }
.v10 .progress-fill::after {
  content: ''; position: absolute; right: -1px; top: -2px;
  width: 7px; height: 7px; border-radius: 50%;
  animation: edgePulse 1.5s ease-in-out infinite;
}
@keyframes edgePulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Summary Box v2 — Progress Bar + Dots</div>
  <div class="page-sub">Agent 3 — Module progress bar on top, summary, todo with dots, dot progress at bottom. 10 tweaks.</div>
</div>

<div class="grid" id="grid"></div>

<script>
const SUMMARY = "I'm running ablation studies on hypotheses 4-6 while main experiments continue for hypothesis 7's nano-scale thermal transport model with gradient checkpointing.";

const TODOS = [
  { s: 'done', t: 'Build knowledge graph (14.3k triples)' },
  { s: 'done', t: 'Identify research gaps (23 found)' },
  { s: 'done', t: 'Generate and rank seed hypotheses' },
  { s: 'run',  t: 'Run simulations for hypotheses 4-7' },
  { s: 'run',  t: 'Ablation studies on completed sims' },
  { s: 'up',   t: 'Analyze results and effect sizes' },
  { s: 'up',   t: 'Draft paper text with citations' },
];

const DONE = TODOS.filter(t => t.s === 'done').length;
const RUN = TODOS.filter(t => t.s === 'run').length;
const PCT = Math.round((DONE + RUN * 0.5) / TODOS.length * 100);
const MOD_COLOR = '#60a5fa';
const MOD_DIM = 'rgba(96,165,250,.5)';
const MOD_GLOW = 'rgba(96,165,250,.3)';

function todosHTML() {
  return TODOS.map(t =>
    `<div class="todo"><div class="td-dot ${t.s}"></div><span class="td-text ${t.s}">${t.t}</span></div>`
  ).join('');
}

function dotsHTML(cls) {
  return `<div class="dot-progress ${cls||''}">${TODOS.map(t => {
    const c = t.s === 'done' ? 'var(--green)' : t.s === 'run' ? 'var(--blue)' : 'rgba(148,163,184,.12)';
    return `<span class="dp" style="background:${c}"></span>`;
  }).join('')}</div>`;
}

function bar(cls) {
  return `<div class="progress-bar"><div class="progress-fill" style="width:${PCT}%;background:linear-gradient(90deg,${MOD_COLOR},${MOD_DIM})"></div></div>`;
}

function v1() {
  return bar() +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v2() {
  return bar() +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v3() {
  return `<div class="v3-bar-row"><div class="progress-bar"><div class="progress-fill" style="width:${PCT}%;background:${MOD_COLOR}"></div></div><span class="v3-pct">${PCT}%</span></div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v4() {
  return `<div class="progress-bar"><div class="progress-fill" style="width:${PCT}%;background:linear-gradient(90deg,${MOD_COLOR},rgba(96,165,250,.15))"></div></div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v5() {
  return bar() +
    `<div class="v5-meta"><span>${DONE} done</span><span class="sep"></span><span>${RUN} running</span><span class="sep"></span><span>${TODOS.length - DONE - RUN} upcoming</span></div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v6() {
  const segs = TODOS.map(t => {
    const c = t.s === 'done' ? 'var(--green)' : t.s === 'run' ? 'var(--blue)' : 'rgba(148,163,184,.08)';
    return `<div class="v6-seg" style="background:${c}"></div>`;
  }).join('');
  return `<div class="v6-segments">${segs}</div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v7() {
  return `<div class="progress-bar"><div class="progress-fill" style="width:${PCT}%;background:${MOD_COLOR};box-shadow:0 0 8px ${MOD_GLOW}"></div></div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v8() {
  return bar() +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v9() {
  return `<div class="progress-bar"><div class="progress-fill" style="width:${PCT}%;background:${MOD_COLOR}"></div></div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

function v10() {
  return `<div class="progress-bar"><div class="progress-fill" style="width:${PCT}%;background:${MOD_COLOR}"></div></div>` +
    `<div class="sum-text">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

const V = [
  { n:1,  name:'Base — gradient bar + dots + dot progress', r:v1, cls:'' },
  { n:2,  name:'Thicker bar (4px)', r:v2, cls:'v2' },
  { n:3,  name:'Bar + percentage label right', r:v3, cls:'v3' },
  { n:4,  name:'Gradient fades to transparent', r:v4, cls:'' },
  { n:5,  name:'Bar + done/running/upcoming counts', r:v5, cls:'v5' },
  { n:6,  name:'Segmented bar (one per step)', r:v6, cls:'v6' },
  { n:7,  name:'Bar with glow shadow', r:v7, cls:'v7' },
  { n:8,  name:'Thin 2px bar + more spacing', r:v8, cls:'v8' },
  { n:9,  name:'Bar with running shimmer', r:v9, cls:'v9' },
  { n:10, name:'Bigger dots + pulsing edge dot', r:v10, cls:'v10' },
];

const g = document.getElementById('grid');
V.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div><div class="vbody ${v.cls}">${v.r()}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
