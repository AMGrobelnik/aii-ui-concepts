<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Fix — Single Variant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fafafa;color:#111827;padding:40px 60px}
h1{font-size:16px;font-weight:700;margin-bottom:20px;color:#6b7280}

.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:4px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 18px;text-align:center;font-size:13px;font-weight:600;color:#6b7280}
.card.active{border-color:#60a5fa;color:#111827}

.tree-panel{padding-left:calc(33.33% + 24px);padding-top:8px}

/* The tree container */
.tree{position:relative;padding-left:30px}

/* Main trunk — goes through round dot centers */
.trunk{position:absolute;left:34px;top:0;bottom:16px;width:2px;background:linear-gradient(180deg,#60a5fa,rgba(96,165,250,.15));border-radius:1px}

/* Round row */
.round{position:relative;display:flex;align-items:center;gap:10px;height:36px}

/* Round dot */
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative;z-index:2}
.dot.done{background:#4ade80}
.dot.active{background:#60a5fa}
.dot.pending{border:1.5px solid #d1d5db;background:#fff}

.label{font-size:13px;white-space:nowrap}
.label.active{font-weight:600;color:#111827}
.label.done{color:#6b7280}
.label.pending{color:#9ca3af}

/* Sub-steps container — indented RIGHT from the round dots */
.subs{position:relative;margin-left:5px;padding-left:30px}

/* Sub-trunk — at the same X as main trunk (straight down) */
.sub-trunk{position:absolute;left:-1px;top:0;bottom:14px;width:2px;background:rgba(96,165,250,.15);border-radius:1px}

/* Sub-step row */
.sub{position:relative;display:flex;align-items:center;gap:8px;height:32px}

/* Horizontal branch from sub-trunk to sub-step dot */
.sub::before{
  content:'';position:absolute;left:-31px;top:50%;
  width:31px;height:1.5px;
  background:rgba(96,165,250,.15);border-radius:1px;
}

.sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;position:relative;z-index:2}
.sub-dot.done{background:#4ade80;opacity:.6}
.sub-dot.active{background:#60a5fa}
.sub-dot.pending{border:1.5px solid #d1d5db;background:#fff}

.sub-label{font-size:12px;white-space:nowrap}
.sub-label.active{font-weight:600;color:#111827}
.sub-label.done{color:#9ca3af}
.sub-label.pending{color:#d1d5db}

.ellipsis{height:28px;display:flex;align-items:center;padding-left:4px;font-size:12px;color:#d1d5db}

.ghost-chev{opacity:0;transition:opacity .2s;color:#9ca3af;margin-left:auto}
.round:hover .ghost-chev{opacity:.4}
</style>
</head>
<body>

<h1>Tree Fix — Trunk straight down, sub-steps indented right</h1>

<div class="cards-row">
  <div class="card">Create Hypothesis</div>
  <div class="card active">Test Ideas</div>
  <div class="card" style="opacity:.4">Report Results</div>
</div>

<div class="tree-panel">
  <div class="tree">
    <div class="trunk"></div>

    <div class="round">
      <div class="dot done"></div>
      <span class="label done">Round 5</span>
      <span class="ghost-chev">›</span>
    </div>

    <div class="round">
      <div class="dot done"></div>
      <span class="label done">Round 6</span>
      <span class="ghost-chev">›</span>
    </div>

    <div class="round">
      <div class="dot active"></div>
      <span class="label active">Round 7</span>
      <span style="font-size:11px;color:#9ca3af;margin-left:4px">3/5</span>
    </div>

    <!-- Sub-steps for Round 7 — indented right -->
    <div class="subs">
      <div class="sub-trunk"></div>

      <div class="sub">
        <div class="sub-dot done"></div>
        <span class="sub-label done">Plan Approach</span>
      </div>

      <div class="sub">
        <div class="sub-dot done"></div>
        <span class="sub-label done">Plan Artifacts</span>
      </div>

      <div class="sub">
        <div class="sub-dot active"></div>
        <span class="sub-label active">Create Artifacts</span>
        <span style="font-size:11px;color:#60a5fa;letter-spacing:2px;margin-left:4px">····</span>
      </div>

      <div class="sub">
        <div class="sub-dot pending"></div>
        <span class="sub-label pending">Write Paper</span>
      </div>

      <div class="ellipsis">···</div>
    </div>

    <div class="round">
      <div class="dot pending"></div>
      <span class="label pending">Round 8</span>
    </div>
  </div>
</div>

</body>
</html>
