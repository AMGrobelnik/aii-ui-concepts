<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor v2.07 — Max Content</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── Left Sidebar: 80px, ring + module selector dots ── */
  .sidebar {
    width: 80px;
    min-width: 80px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    background: linear-gradient(180deg, rgba(18,18,28,0.7) 0%, rgba(8,8,12,0.95) 100%);
    border-right: 1px solid rgba(255,255,255,0.04);
    z-index: 10;
    gap: 0;
  }

  /* Big progress ring — 70px diameter */
  .ring-wrap {
    position: relative;
    width: 70px;
    height: 70px;
    flex-shrink: 0;
  }

  .ring-svg {
    width: 70px;
    height: 70px;
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 6px rgba(96, 176, 255, 0.2));
  }

  .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 3.5;
  }

  .ring-arc-segment {
    fill: none;
    stroke-width: 3.5;
    stroke-linecap: round;
    opacity: 0;
    transition: opacity 0.4s ease, filter 0.4s ease;
  }

  .ring-arc-segment.lit {
    opacity: 1;
    filter: drop-shadow(0 0 4px currentColor);
  }

  .ring-progress {
    fill: none;
    stroke: url(#ringGrad);
    stroke-width: 3.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .ring-glow {
    fill: #60b0ff;
    filter: url(#glow);
    transition: cx 0.8s cubic-bezier(0.4,0,0.2,1), cy 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .ring-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }

  .ring-pct {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.5px;
  }

  .ring-label {
    font-size: 7px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 2px;
  }

  /* Module selector dots below ring */
  .mod-dots {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding: 4px 0;
  }

  .mod-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.3s ease, opacity 0.3s ease;
    opacity: 0.5;
    position: relative;
  }

  .mod-dot:hover {
    transform: scale(1.3);
    opacity: 0.8;
  }

  .mod-dot.active {
    opacity: 1;
    transform: scale(1.2);
    box-shadow: 0 0 8px var(--dot-c), 0 0 16px var(--dot-c);
  }

  /* Tooltip for module dot hover */
  .mod-dot::after {
    content: attr(data-tip);
    position: absolute;
    left: 50%;
    top: -20px;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .mod-dot:hover::after {
    opacity: 1;
  }

  /* Divider in sidebar */
  .sidebar-divider {
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin: 12px 0 8px;
  }

  /* Run info in sidebar */
  .sidebar-info {
    font-size: 7px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 0 6px;
  }

  .sidebar-spacer {
    flex: 1;
  }

  .sidebar-footer {
    font-size: 7px;
    color: rgba(255,255,255,0.12);
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* ── Main Area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Row 1: Module circles (20px) with single-letter labels ── */
  .row1 {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px 4px;
    gap: 0;
    flex-shrink: 0;
    min-height: 40px;
  }

  .row1-connector {
    width: 28px;
    height: 1.5px;
    position: relative;
  }

  .row1-connector::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: linear-gradient(90deg, var(--c-from), var(--c-to));
    opacity: 0.2;
    border-radius: 1px;
  }

  .row1-mod {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.15s ease;
    position: relative;
  }

  .row1-mod:hover { transform: scale(1.06); }

  .row1-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: #fff;
    transition: box-shadow 0.3s ease, background 0.3s ease;
    flex-shrink: 0;
    position: relative;
  }

  .row1-circle.done {
    background: var(--mc);
    opacity: 0.85;
  }

  .row1-circle.active {
    background: var(--mc);
    box-shadow: 0 0 8px var(--mc), 0 0 14px var(--mc);
    animation: circlePulse 2s ease-in-out infinite;
  }

  .row1-circle.pending {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.3);
  }

  @keyframes circlePulse {
    0%, 100% { box-shadow: 0 0 8px var(--mc), 0 0 14px var(--mc); }
    50% { box-shadow: 0 0 12px var(--mc), 0 0 22px var(--mc); }
  }

  .row1-circle.selected-mod {
    box-shadow: 0 0 10px var(--mc), 0 0 20px var(--mc), 0 0 3px #fff;
  }

  /* Progress ring around module circle */
  .row1-ring-svg {
    position: absolute;
    top: -2px; left: -2px;
    width: 24px; height: 24px;
    transform: rotate(-90deg);
    pointer-events: none;
  }

  .row1-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 2;
  }

  .row1-ring-prog {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  .row1-label {
    font-size: 9px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    transition: color 0.3s ease;
    white-space: nowrap;
  }

  .row1-mod.selected .row1-label {
    color: var(--mc);
    font-weight: 600;
  }

  /* focus ring for active row */
  .row1-mod.row-focus .row1-circle {
    outline: 1.5px solid rgba(255,255,255,0.3);
    outline-offset: 2px;
  }

  /* ── Row 2: Sub-step dots (8px) ── */
  .row2 {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2px 16px 2px;
    gap: 0;
    min-height: 24px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .row2-inner {
    display: flex;
    align-items: center;
    gap: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .row2-inner.entering {
    opacity: 0;
    transform: translateY(-6px);
  }

  .row2-conn {
    width: 10px;
    height: 1px;
    background: rgba(255,255,255,0.06);
    flex-shrink: 0;
  }

  .row2-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    cursor: pointer;
    transition: transform 0.12s ease;
    padding: 1px 3px;
  }

  .row2-step:hover { transform: scale(1.15); }

  .row2-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    flex-shrink: 0;
  }

  .row2-dot.done {
    background: var(--sc);
    opacity: 0.8;
  }

  .row2-dot.active {
    background: var(--sc);
    box-shadow: 0 0 6px var(--sc), 0 0 12px var(--sc);
    animation: dotPulse 2s ease-in-out infinite;
  }

  .row2-dot.pending {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .row2-dot.sel {
    box-shadow: 0 0 8px var(--sc), 0 0 16px var(--sc), 0 0 3px #fff;
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px var(--sc), 0 0 12px var(--sc); }
    50% { box-shadow: 0 0 10px var(--sc), 0 0 20px var(--sc); }
  }

  .row2-lbl {
    font-size: 7px;
    color: rgba(255,255,255,0.22);
    white-space: nowrap;
    transition: color 0.3s ease;
    line-height: 1;
    margin-top: 1px;
  }

  .row2-step.sel .row2-lbl {
    color: var(--sc);
    font-weight: 600;
  }

  .row2-step.row-focus .row2-dot {
    outline: 1px solid rgba(255,255,255,0.3);
    outline-offset: 1.5px;
  }

  /* ── Thin divider ── */
  .divider {
    height: 1px;
    margin: 2px 24px 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    flex-shrink: 0;
  }

  /* ── Content Area: maximum space ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 24px 20px;
    display: flex;
    justify-content: center;
  }

  .content-inner {
    max-width: 860px;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .c-breadcrumb {
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .c-breadcrumb span { color: rgba(255,255,255,0.35); }

  .c-title {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .c-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 14px;
  }

  .c-body {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.5);
  }

  .c-body p { margin-bottom: 10px; }

  /* Stats grid for Seed module */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }

  .stat-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 10px 12px;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .stat-card:hover {
    border-color: rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
  }

  .stat-val {
    font-size: 20px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    line-height: 1;
  }

  .stat-label {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* Artifact list */
  .art-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .art-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
    transition: background 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
  }

  .art-item:hover {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.08);
  }

  .art-icon {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    flex-shrink: 0;
  }

  .art-icon.done { background: rgba(100,220,140,0.15); color: #64dc8c; }
  .art-icon.running {
    background: rgba(100,160,255,0.15); color: #64a0ff;
    animation: iconPulse 1.5s ease-in-out infinite;
  }
  .art-icon.waiting { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.2); }

  @keyframes iconPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .art-info { flex: 1; min-width: 0; }
  .art-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); }
  .art-desc { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .art-badge {
    font-size: 8px;
    padding: 2px 7px;
    border-radius: 8px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .art-badge.done { background: rgba(100,220,140,0.1); color: #64dc8c; }
  .art-badge.running { background: rgba(100,160,255,0.1); color: #64a0ff; }
  .art-badge.waiting { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.2); }

  /* Score bar used in hypothesis iterations */
  .score-bar-wrap {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    width: 60px;
    flex-shrink: 0;
  }

  .score-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
    max-width: 280px;
  }

  .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .score-val {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    width: 32px;
    text-align: right;
  }

  /* Detail dot row (children of sub-steps) */
  .detail-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px 2px;
    gap: 0;
    min-height: 16px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .detail-inner {
    display: flex;
    align-items: center;
    gap: 0;
    transition: opacity 0.2s ease;
  }

  .detail-inner.entering { opacity: 0; }

  .detail-conn {
    width: 8px;
    height: 1px;
    background: rgba(255,255,255,0.04);
    flex-shrink: 0;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    cursor: pointer;
    padding: 0 2px;
  }

  .detail-item:hover .detail-circ { transform: scale(1.3); }

  .detail-circ {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    transition: all 0.2s ease;
  }

  .detail-circ.done { background: var(--dc); opacity: 0.7; }
  .detail-circ.active { background: var(--dc); box-shadow: 0 0 4px var(--dc); }
  .detail-circ.pending { border: 1px solid rgba(255,255,255,0.1); }

  .detail-lbl {
    font-size: 6px;
    color: rgba(255,255,255,0.18);
    white-space: nowrap;
    margin-top: 1px;
  }

  /* ── Nav hint ── */
  .nav-hint {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-size: 8px;
    color: rgba(255,255,255,0.12);
    display: flex;
    gap: 6px;
    align-items: center;
    z-index: 20;
  }

  .nav-hint kbd {
    padding: 1px 4px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 7px;
    color: rgba(255,255,255,0.2);
  }

  /* Scrollbar */
  .content::-webkit-scrollbar { width: 3px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
</style>
</head>
<body>

<!-- SVG Defs -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50e880"/>
      <stop offset="50%" stop-color="#b060ff"/>
      <stop offset="100%" stop-color="#60b0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<!-- Sidebar -->
<div class="sidebar">
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 70 70" id="ringSvg">
      <circle class="ring-bg" cx="35" cy="35" r="30"/>
      <!-- Per-module arc segments -->
      <circle class="ring-arc-segment" id="arcS" cx="35" cy="35" r="30" stroke="#50e880"/>
      <circle class="ring-arc-segment" id="arcH" cx="35" cy="35" r="30" stroke="#b060ff"/>
      <circle class="ring-arc-segment" id="arcI" cx="35" cy="35" r="30" stroke="#60a0ff"/>
      <circle class="ring-arc-segment" id="arcP" cx="35" cy="35" r="30" stroke="#555"/>
      <!-- Progress arc -->
      <circle class="ring-progress" cx="35" cy="35" r="30"
              stroke-dasharray="188.5 188.5" stroke-dashoffset="65.97" id="ringArc"/>
      <!-- Glow dot at arc tip -->
      <circle class="ring-glow" cx="35" cy="5" r="2.5" id="ringDot"/>
    </svg>
    <div class="ring-center">
      <div class="ring-pct" id="ringPct">65%</div>
      <div class="ring-label">progress</div>
    </div>
  </div>

  <!-- Module selector dots -->
  <div class="mod-dots" id="modDots"></div>

  <div class="sidebar-divider"></div>
  <div class="sidebar-info">Run #847<br>12m 34s</div>

  <div class="sidebar-spacer"></div>
  <div class="sidebar-footer">v2.07</div>
</div>

<!-- Main Area -->
<div class="main">
  <!-- Row 1: Compact module circles -->
  <div class="row1" id="row1"></div>

  <!-- Row 2: Sub-step tiny dots -->
  <div class="row2" id="row2">
    <div class="row2-inner" id="row2Inner"></div>
  </div>

  <!-- Detail dots (children) -->
  <div class="detail-row" id="detailRow">
    <div class="detail-inner" id="detailInner"></div>
  </div>

  <div class="divider"></div>

  <!-- Content -->
  <div class="content">
    <div class="content-inner" id="contentArea"></div>
  </div>
</div>

<!-- Nav Hint -->
<div class="nav-hint">
  <kbd>&larr;</kbd><kbd>&rarr;</kbd> nav
  <kbd>&darr;</kbd> drill
  <kbd>&uarr;</kbd> back
</div>

<script>
// ──────────────────────────────────────────────────────
// Module Data
// ──────────────────────────────────────────────────────
const MODULES = [
  {
    id: 'seed', letter: 'S', name: 'Seed', color: '#50e880', rgb: '80,232,128',
    progress: 100, status: 'done',
    subs: [
      { name: 'Mine Papers', short: 'Mine', status: 'done' },
      { name: 'Build KG', short: 'KG', status: 'done' },
      { name: 'Find Gaps', short: 'Gaps', status: 'done' },
      { name: 'Select Seeds', short: 'Select', status: 'done' },
    ],
    overview: {
      title: 'Seed Hypotheses',
      subtitle: 'Knowledge graph built from 847 papers \u2014 4 seed gaps selected',
      body: 'The seeding phase mined 847 papers across 12 domains, constructed a knowledge graph with 3,200 concept nodes and 11,400 edges, identified 23 underexplored gaps, and selected the 4 highest-potential seeds for hypothesis generation.',
      stats: [
        { val: '847', label: 'Papers mined' },
        { val: '3.2k', label: 'KG nodes' },
        { val: '11.4k', label: 'KG edges' },
        { val: '4', label: 'Seeds selected' },
      ]
    },
    subContent: {
      'Mine Papers': {
        title: 'Mine Papers',
        body: 'Crawled and parsed 847 papers from ArXiv, Semantic Scholar, and ACL Anthology. Extracted titles, abstracts, methodology sections, and citation graphs. Applied deduplication and quality filtering to retain 812 unique high-quality entries.'
      },
      'Build KG': {
        title: 'Build Knowledge Graph',
        body: 'Constructed a knowledge graph with 3,200 concept nodes and 11,400 directed edges representing methodological dependencies, dataset usage, and result comparisons. Applied community detection to identify 47 research clusters.'
      },
      'Find Gaps': {
        title: 'Find Research Gaps',
        body: 'Identified 23 underexplored regions in the knowledge graph where promising methodological combinations have not been attempted. Ranked by novelty potential using a custom gap-scoring heuristic combining citation momentum and cluster bridging.'
      },
      'Select Seeds': {
        title: 'Select Seeds',
        body: 'Ranked gaps by potential impact and feasibility. Selected top 4 seeds for hypothesis generation based on a composite score weighing novelty (40%), feasibility (35%), and expected impact (25%).'
      }
    }
  },
  {

const ARTIFACTS = [
  { name: 'Baseline Implementation', desc: 'Standard transformer baseline on 3 benchmarks', status: 'done' },
  { name: 'Dataset Construction', desc: 'Cross-domain corpus with 12k annotated samples', status: 'done' },
  { name: 'Proof of Concept', desc: 'Contrastive pre-training + distillation pipeline', status: 'done' },
  { name: 'Ablation Study', desc: 'Component-wise ablation across 4 configurations', status: 'running' },
  { name: 'Evaluation Suite', desc: 'Full benchmark evaluation with significance tests', status: 'waiting' },
];

// ──────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────
const S = {
  row: 1,       // 1=modules, 2=sub-steps, 3=detail-children
  modIdx: 2,    // Invention active
  subIdx: 2,    // Artifacts selected
  detIdx: -1,
};

// ──────────────────────────────────────────────────────
// Ring geometry
// ──────────────────────────────────────────────────────
const R = 30;
const CIRC = 2 * Math.PI * R; // ~188.5
const R10 = 10; // row1 mini ring radius
const CIRC10 = 2 * Math.PI * R10;

// ──────────────────────────────────────────────────────
// Sidebar: module selector dots
// ──────────────────────────────────────────────────────
function renderModDots() {
  const el = document.getElementById('modDots');
  el.innerHTML = '';
  MODULES.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'mod-dot' + (i === S.modIdx ? ' active' : '');
    d.style.background = m.color;
    d.style.setProperty('--dot-c', m.color);
    d.setAttribute('data-tip', m.name);
    d.onclick = () => { S.modIdx = i; S.row = 1; S.subIdx = 0; S.detIdx = -1; renderAll(); };
    el.appendChild(d);
  });
}

// ──────────────────────────────────────────────────────
// Ring arc highlights
// ──────────────────────────────────────────────────────
function updateRing() {
  const ids = ['arcS', 'arcH', 'arcI', 'arcP'];
  const segLen = CIRC / 4;
  const gap = 4;

  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.setAttribute('stroke-dasharray', `${segLen - gap} ${CIRC - segLen + gap}`);
    el.setAttribute('stroke-dashoffset', `${-i * segLen}`);
    el.classList.toggle('lit', i === S.modIdx);
  });

  // Position glow dot at 65% progress
  const pct = 65;
  const angle = (pct / 100) * 2 * Math.PI - Math.PI / 2;
  const dot = document.getElementById('ringDot');
  dot.setAttribute('cx', 35 + R * Math.cos(angle));
  dot.setAttribute('cy', 35 + R * Math.sin(angle));
}

// ──────────────────────────────────────────────────────
// Row 1: Module circles (20px with letter)
// ──────────────────────────────────────────────────────
function renderRow1() {
  const el = document.getElementById('row1');
  el.innerHTML = '';

  MODULES.forEach((m, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'row1-connector';
      conn.style.setProperty('--c-from', MODULES[i - 1].color);
      conn.style.setProperty('--c-to', m.color);
      el.appendChild(conn);
    }

    const wrap = document.createElement('div');
    wrap.className = 'row1-mod' + (i === S.modIdx ? ' selected' : '');
    if (S.row === 1 && i === S.modIdx) wrap.classList.add('row-focus');
    wrap.style.setProperty('--mc', m.color);
    wrap.onclick = () => { S.modIdx = i; S.row = 1; S.subIdx = 0; S.detIdx = -1; renderAll(); };

    const statusCls = m.status === 'done' ? 'done' : m.status === 'active' ? 'active' : 'pending';
    const selCls = i === S.modIdx ? ' selected-mod' : '';
    const dashOff = CIRC10 * (1 - m.progress / 100);
    const inner = m.status === 'done' ? '\u2713' : m.letter;

    wrap.innerHTML = `
      <div class="row1-circle ${statusCls}${selCls}" style="--mc:${m.color}">
        <svg class="row1-ring-svg" viewBox="0 0 24 24">
          <circle class="row1-ring-bg" cx="12" cy="12" r="10"/>
          <circle class="row1-ring-prog" cx="12" cy="12" r="10"
                  stroke="${m.color}" stroke-dasharray="${CIRC10}" stroke-dashoffset="${dashOff}"/>
        </svg>
        ${inner}
      </div>
      <div class="row1-label">${m.letter}</div>
    `;
    el.appendChild(wrap);
  });
}

// ──────────────────────────────────────────────────────
// Row 2: Sub-step dots (8px)
// ──────────────────────────────────────────────────────
function renderRow2() {
  const inner = document.getElementById('row2Inner');
  const mod = MODULES[S.modIdx];
  const c = mod.color;

  inner.classList.add('entering');
  setTimeout(() => {
    inner.innerHTML = '';

    mod.subs.forEach((sub, i) => {
      if (i > 0) {
        const conn = document.createElement('div');
        conn.className = 'row2-conn';
        inner.appendChild(conn);
      }

      const g = document.createElement('div');
      g.className = 'row2-step';
      g.style.setProperty('--sc', c);
      if (S.row >= 2 && i === S.subIdx) g.classList.add('sel');
      if (S.row === 2 && i === S.subIdx) g.classList.add('row-focus');
      g.onclick = () => { S.subIdx = i; S.row = 2; S.detIdx = -1; renderAll(); };

      const dotCls = sub.status === 'done' ? 'done' : sub.status === 'active' ? 'active' : 'pending';
      const selDot = (S.row >= 2 && i === S.subIdx) ? ' sel' : '';

      g.innerHTML = `
        <div class="row2-dot ${dotCls}${selDot}" style="--sc:${c}"></div>
        <div class="row2-lbl">${sub.short}</div>
      `;
      inner.appendChild(g);
    });

    inner.classList.remove('entering');
  }, 25);
}

// ──────────────────────────────────────────────────────
// Detail row: children of current sub-step (6px dots)
// ──────────────────────────────────────────────────────
function renderDetail() {
  const inner = document.getElementById('detailInner');
  const mod = MODULES[S.modIdx];
  const sub = mod.subs[S.subIdx];
  const c = mod.color;

  if (!sub || !sub.children || S.row < 2) {
    inner.innerHTML = '';
    return;
  }

  inner.classList.add('entering');
  setTimeout(() => {
    inner.innerHTML = '';
    sub.children.forEach((ch, i) => {
      if (i > 0) {
        const conn = document.createElement('div');
        conn.className = 'detail-conn';
        inner.appendChild(conn);
      }

      const g = document.createElement('div');
      g.className = 'detail-item';
      g.style.setProperty('--dc', c);
      g.onclick = () => { S.detIdx = i; S.row = 3; renderAll(); };

      const cls = ch.status === 'done' ? 'done' : ch.status === 'active' ? 'active' : 'pending';

      g.innerHTML = `
        <div class="detail-circ ${cls}" style="--dc:${c}"></div>
        <div class="detail-lbl">${ch.name}</div>
      `;
      inner.appendChild(g);
    });
    inner.classList.remove('entering');
  }, 25);
}

// ──────────────────────────────────────────────────────
// Content rendering
// ──────────────────────────────────────────────────────
function renderContent() {
  const area = document.getElementById('contentArea');
  const mod = MODULES[S.modIdx];
  const sub = mod.subs[S.subIdx];
  const c = mod.color;

  let crumb = `<span>${mod.name}</span>`;
  if (S.row >= 2 && sub) crumb += ` / <span>${sub.name}</span>`;
  if (S.row === 3 && sub && sub.children && sub.children[S.detIdx]) {
    crumb += ` / <span>${sub.children[S.detIdx].name}</span>`;
  }

  // ── Detail level: specific child artifact ──
  if (S.row === 3 && sub && sub.children && S.detIdx >= 0) {
    const child = sub.children[S.detIdx];
    const art = ARTIFACTS[S.detIdx];
    if (art) {
      const statusLabel = art.status === 'done' ? 'Complete' : art.status === 'running' ? 'In Progress' : 'Pending';
      area.innerHTML = `
        <div class="c-breadcrumb">${crumb}</div>
        <div class="c-title" style="color:${c}">${art.name}</div>
        <div class="c-subtitle">${statusLabel}</div>
        <div class="c-body"><p>${art.desc}</p></div>
      `;
      return;
    }
  }

  // ── Invention > Artifacts: artifact list ──
  if (mod.id === 'invention' && sub && sub.name === 'Artifacts' && S.row >= 2) {
    let html = '<ul class="art-list">';
    ARTIFACTS.forEach((art) => {
      const icon = art.status === 'done' ? '\u2713' : art.status === 'running' ? '\u25b6' : '\u25cb';
      const badgeCls = art.status === 'done' ? 'done' : art.status === 'running' ? 'running' : 'waiting';
      const badgeText = art.status === 'done' ? 'Done' : art.status === 'running' ? 'Running' : 'Pending';
      html += `
        <li class="art-item">
          <div class="art-icon ${badgeCls}">${icon}</div>
          <div class="art-info">
            <div class="art-name">${art.name}</div>
            <div class="art-desc">${art.desc}</div>
          </div>
          <div class="art-badge ${badgeCls}">${badgeText}</div>
        </li>`;
    });
    html += '</ul>';

    area.innerHTML = `
      <div class="c-breadcrumb">${crumb}</div>
      <div class="c-title" style="color:${c}">Artifact Generation</div>
      <div class="c-subtitle">Iteration 2 \u2014 3 of 5 artifacts complete</div>
      ${html}
    `;
    return;
  }

  // ── Hypothesis sub-step: show score bars ──
  if (mod.id === 'hypothesis' && sub && S.row >= 2) {
    const sc = mod.subContent[sub.name];
    if (sc) {
      let scoreHtml = '';
      if (sc.score) {
        const pct = (sc.score / 10) * 100;
        scoreHtml = `
          <div class="score-bar-wrap">
            <div class="score-row">
              <div class="score-label">Score</div>
              <div class="score-track"><div class="score-fill" style="width:${pct}%; background:${c}"></div></div>
              <div class="score-val">${sc.score}/10</div>
            </div>
          </div>
        `;
      }
      area.innerHTML = `
        <div class="c-breadcrumb">${crumb}</div>
        <div class="c-title" style="color:${c}">${sc.title}</div>
        <div class="c-subtitle">Generate + Review cycle</div>
        <div class="c-body"><p>${sc.body}</p></div>
        ${scoreHtml}
      `;
      return;
    }
  }

  // ── Sub-step level content ──
  if (S.row >= 2 && sub && mod.subContent && mod.subContent[sub.name]) {
    const sc = mod.subContent[sub.name];
    const statusLabel = sub.status === 'done' ? 'Completed' : sub.status === 'active' ? 'In Progress' : 'Pending';
    area.innerHTML = `
      <div class="c-breadcrumb">${crumb}</div>
      <div class="c-title" style="color:${c}">${sc.title}</div>
      <div class="c-subtitle">${statusLabel}</div>
      <div class="c-body"><p>${sc.body}</p></div>
    `;
    return;
  }

  // ── Module overview (with stats/scores if available) ──
  const ov = mod.overview;
  let extraHtml = '';

  if (ov.stats) {
    extraHtml = '<div class="stats-grid">';
    ov.stats.forEach(s => {
      extraHtml += `
        <div class="stat-card">
          <div class="stat-val" style="color:${c}">${s.val}</div>
          <div class="stat-label">${s.label}</div>
        </div>`;
    });
    extraHtml += '</div>';
  }

  if (ov.scores) {
    extraHtml = '<div class="score-bar-wrap">';
    ov.scores.forEach(s => {
      const pct = (s.val / 10) * 100;
      extraHtml += `
        <div class="score-row">
          <div class="score-label">${s.label}</div>
          <div class="score-track"><div class="score-fill" style="width:${pct}%; background:${c}"></div></div>
          <div class="score-val">${s.val}/10</div>
        </div>`;
    });
    extraHtml += '</div>';
  }

  area.innerHTML = `
    <div class="c-breadcrumb">${crumb}</div>
    <div class="c-title" style="color:${c}">${ov.title}</div>
    <div class="c-subtitle">${ov.subtitle}</div>
    <div class="c-body"><p>${ov.body}</p></div>
    ${extraHtml}
  `;
}

// ──────────────────────────────────────────────────────
// Render all
// ──────────────────────────────────────────────────────
function renderAll() {
  renderModDots();
  updateRing();
  renderRow1();
  renderRow2();
  renderDetail();
  renderContent();
}

// ──────────────────────────────────────────────────────
// Keyboard navigation
// ──────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const mod = MODULES[S.modIdx];
  const maxSub = mod.subs.length - 1;
  const sub = mod.subs[S.subIdx];
  const hasKids = sub && sub.children && sub.children.length > 0;

  switch (e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if (S.row === 1) {
        S.modIdx = Math.max(0, S.modIdx - 1);
        S.subIdx = 0; S.detIdx = -1;
      } else if (S.row === 2) {
        S.subIdx = Math.max(0, S.subIdx - 1);
        S.detIdx = -1;
      } else if (S.row === 3) {
        S.detIdx = Math.max(0, S.detIdx - 1);
      }
      renderAll();
      break;

    case 'ArrowRight':
      e.preventDefault();
      if (S.row === 1) {
        S.modIdx = Math.min(MODULES.length - 1, S.modIdx + 1);
        S.subIdx = 0; S.detIdx = -1;
      } else if (S.row === 2) {
        S.subIdx = Math.min(maxSub, S.subIdx + 1);
        S.detIdx = -1;
      } else if (S.row === 3 && hasKids) {
        S.detIdx = Math.min(sub.children.length - 1, S.detIdx + 1);
      }
      renderAll();
      break;

    case 'ArrowDown':
      e.preventDefault();
      if (S.row === 1) {
        S.row = 2;
      } else if (S.row === 2 && hasKids) {
        S.row = 3;
        S.detIdx = 0;
      }
      renderAll();
      break;

    case 'ArrowUp':
      e.preventDefault();
      if (S.row === 3) {
        S.row = 2;
        S.detIdx = -1;
      } else if (S.row === 2) {
        S.row = 1;
      }
      renderAll();
      break;
  }
});

// ──────────────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────────────
renderAll();

// Subtle pulse on the active invention circle
setInterval(() => {
  const circles = document.querySelectorAll('.row1-circle.active');
  circles.forEach(c => {
    c.style.opacity = c.style.opacity === '0.7' ? '1' : '0.7';
  });
}, 1200);
</script>
