<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0c;
    --surface: #12121a;
    --text: #e8e8ec;
    --muted: #6b6b7b;
    --very-muted: #3e3e4e;
    --green: #34d399;
    --purple: #a78bfa;
    --blue: #60a5fa;
    --orange: #fb923c;
    --ring-track: #1a1a2a;
    --highlight-row: rgba(96, 165, 250, 0.06);
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Module selector */
  .module-selector {
    display: flex;
    gap: 24px;
    margin-bottom: 48px;
    user-select: none;
  }
  .module-selector span {
    font-size: 13px;
    font-weight: 500;
    color: var(--very-muted);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color 0.3s ease;
    position: relative;
    padding-bottom: 4px;
  }
  .module-selector span::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1.5px;
    background: currentColor;
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }
  .module-selector span:hover { color: var(--muted); }
  .module-selector span.active { color: var(--text); }
  .module-selector span.active::after { transform: scaleX(1); }

  /* Hero area */
  .hero {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 220px;
    justify-content: center;
  }

  /* Progress ring */
  .ring-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    pointer-events: none;
  }
  .ring-container svg { display: block; }
  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 3;
  }
  .ring-fill {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                stroke 0.4s ease;
    filter: drop-shadow(0 0 4px var(--blue));
  }

  /* Big number */
  .big-number-wrap {
    cursor: pointer;
    text-align: center;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease;
  }
  .big-number-wrap:hover { opacity: 0.85; }
  .big-number-wrap.as-header {
    transform: scale(0.55);
    margin-bottom: -16px;
  }
  .big-number {
    font-size: 72px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -0.02em;
    transition: color 0.4s ease;
  }
  .big-number .frac { color: var(--muted); }
  .big-number-wrap.as-header .big-number { font-size: 72px; }

  .hero-label {
    font-size: 18px;
    color: var(--muted);
    margin-top: 12px;
    font-weight: 500;
    transition: opacity 0.3s ease;
  }
  .hero-sub {
    font-size: 14px;
    color: var(--very-muted);
    margin-top: 6px;
    font-weight: 400;
    transition: opacity 0.3s ease;
  }
  .details-link {
    font-size: 12px;
    color: var(--very-muted);
    margin-top: 14px;
    cursor: pointer;
    transition: color 0.2s ease;
    font-weight: 400;
  }
  .details-link:hover { color: var(--muted); }

  /* Drill-down panel */
  .drill-panel {
    max-width: 520px;
    width: 100%;
    margin-top: 24px;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
  }
  .drill-panel.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  .drill-summary {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
    text-align: center;
  }

  /* Sub-stage rows */
  .stage-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s ease;
    font-size: 14px;
  }
  .stage-row:hover { background: var(--highlight-row); }
  .stage-row.highlighted { background: var(--highlight-row); }
  .stage-row .icon {
    width: 20px;
    text-align: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .stage-row .icon.done { color: var(--green); }
  .stage-row .icon.active { color: var(--blue); }
  .stage-row .icon.pending { color: var(--very-muted); }
  .stage-row .name {
    font-weight: 600;
    color: var(--text);
    min-width: 100px;
  }
  .stage-row .desc {
    color: var(--muted);
    font-weight: 400;
  }

  /* Sub-stage drill (artifact list / iteration list) */
  .sub-drill-panel {
    max-width: 520px;
    width: 100%;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
  }
  .sub-drill-panel.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  .sub-hero-number {
    font-size: 48px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-align: center;
    letter-spacing: -0.02em;
  }
  .sub-hero-label {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    font-weight: 500;
  }
  .sub-hero-sub {
    font-size: 13px;
    color: var(--very-muted);
    text-align: center;
    margin-top: 4px;
  }

  .artifact-list {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .artifact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    transition: background 0.2s ease;
  }
  .artifact-row:hover { background: var(--highlight-row); }
  .artifact-row .icon { width: 18px; text-align: center; flex-shrink: 0; }
  .artifact-row .icon.done { color: var(--green); }
  .artifact-row .icon.active { color: var(--blue); }
  .artifact-row .icon.pending { color: var(--very-muted); }
  .artifact-row .a-name { color: var(--text); font-weight: 500; }
  .artifact-row .a-detail {
    color: var(--muted);
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }

  /* Iteration rows for hypothesis drill */
  .iter-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s ease;
    font-size: 14px;
  }
  .iter-row:hover { background: var(--highlight-row); }
  .iter-score {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 48px;
    text-align: right;
  }
  .iter-info { display: flex; flex-direction: column; gap: 2px; }
  .iter-info .iter-title { color: var(--text); font-weight: 500; }
  .iter-info .iter-desc { color: var(--muted); font-size: 13px; }

  /* Iteration detail (hypothesis content) */
  .iter-detail-panel {
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    position: absolute;
    top: 0;
    left: 50%;
    width: 100%;
    max-width: 520px;
    transform: translateX(-50%) translateY(8px);
  }
  .iter-detail-panel.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .iter-detail-panel h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .iter-detail-panel .abstract {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .iter-detail-panel .review-block {
    background: var(--surface);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .iter-detail-panel .review-block .review-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--very-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  /* Back button */
  .back-btn {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    transition: color 0.2s ease;
    user-select: none;
  }
  .back-btn:hover { color: var(--text); }
  .back-btn .arrow { font-size: 15px; }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 28px;
    font-size: 13px;
    color: var(--very-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
  }

  /* Fade utility */
  .fade-content {
    transition: opacity 0.25s ease;
  }
  .fade-content.fading { opacity: 0; }
</style>
</head>
<body>

<div class="module-selector" id="moduleSelector">
  <span data-module="seed">Seed</span>
  <span data-module="hypothesis">Hypothesis</span>
  <span data-module="invention" class="active">Invention</span>
  <span data-module="paper">Paper</span>
</div>

<div class="hero" id="hero">
  <div class="ring-container" id="ringContainer">
    <svg width="180" height="180" viewBox="0 0 180 180">
      <circle class="ring-track" cx="90" cy="90" r="82" />
      <circle class="ring-fill" id="ringFill" cx="90" cy="90" r="82"
        stroke-dasharray="515.22" stroke-dashoffset="206.09"
        transform="rotate(-90 90 90)" />
    </svg>
  </div>

  <div class="big-number-wrap fade-content" id="bigNumberWrap">
    <div class="big-number" id="bigNumber">
      <span class="num" style="color: var(--blue)">3</span><span class="frac"> / 5</span>
    </div>
    <div class="hero-label" id="heroLabel">Artifacts Complete</div>
    <div class="hero-sub" id="heroSub">Invention Loop &bull; Iteration 2</div>
    <div class="details-link" id="detailsLink">Details</div>
  </div>

  <div class="drill-panel" id="drillPanel"></div>
</div>

<div class="footer" id="footer">02:34:17 &bull; $12.47</div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// --- Module data ---
const modules = {
  seed: {
    number: '12',
    frac: '',
    label: 'Research Gaps Found',
    sub: '847 papers mined &bull; Complete',
    color: 'var(--green)',
    progress: 1.0,
    drill: {
      summary: 'Knowledge graph analysis identified 12 under-explored research gaps from 847 surveyed papers.',
      stages: [
        { icon: 'done', name: 'Mining', desc: '847 papers processed' },
        { icon: 'done', name: 'KG Build', desc: '3,241 concept nodes' },
        { icon: 'done', name: 'Gap Analysis', desc: '12 gaps ranked' },
      ]
    }
  },
  hypothesis: {
    number: '8.4',
    frac: '',
    label: 'Hypothesis Score',
    sub: '3 iterations &bull; Complete',
    color: 'var(--purple)',
    progress: 1.0,
    drill: {
      summary: 'Hypothesis refined over 3 review iterations, converging to a score of 8.4 with zero major issues.',
      iterations: [
        {
          score: '6.2', title: 'Iteration 1',
          desc: 'Initial proposal, 3 major issues',
          detail: {
            heading: 'Contrastive Pre-training for Low-Resource Cross-Lingual Transfer',
            abstract: 'We propose a contrastive alignment objective that jointly pre-trains multilingual encoders on parallel sentence pairs, achieving zero-shot transfer to unseen languages without target-language fine-tuning.',
            review: 'Novelty is moderate. The contrastive loss formulation overlaps with prior work (Feng et al., 2022). Missing: (1) theoretical grounding for alignment convergence, (2) ablation separating contrastive vs. MLM contributions, (3) evaluation on truly low-resource languages beyond the XTREME benchmark.'
          }
        },
        {
          score: '7.8', title: 'Iteration 2',
          desc: 'Added contrastive pre-training',
          detail: {
            heading: 'Contrastive Pre-training for Low-Resource Cross-Lingual Transfer (v2)',
            abstract: 'Building on reviewer feedback, we add a convergence proof for the contrastive alignment objective and introduce a curriculum that progressively increases language pair difficulty during pre-training.',
            review: 'Significant improvement. Convergence proof is sound. Curriculum strategy is novel. Remaining issue: ablation study still incomplete — need to isolate contrastive component contribution on at least 3 language pairs.'
          }
        },
        {
          score: '8.4', title: 'Iteration 3',
          desc: 'Final, 0 major issues',
          detail: {
            heading: 'Contrastive Pre-training for Low-Resource Cross-Lingual Transfer (v3)',
            abstract: 'Final version incorporates complete ablation across 5 language pairs, showing the contrastive component contributes 62% of the total improvement. Curriculum scheduling adds an additional 17.5% gain over random pair sampling.',
            review: 'Strong submission. All prior concerns addressed. Ablation is thorough and convincing. Minor: consider adding a limitations section discussing compute requirements for the curriculum approach.'
          }
        }
      ]
    }
  },
  invention: {
    number: '3',
    frac: ' / 5',
    label: 'Artifacts Complete',
    sub: 'Invention Loop &bull; Iteration 2',
    color: 'var(--blue)',
    progress: 0.6,
    drill: {
      summary: 'Generating research artifacts to test the hypothesis. Baseline shows 17.5% improvement.',
      stages: [
        { icon: 'done', name: 'Strategy', desc: 'Contrastive alignment' },
        { icon: 'done', name: 'Plan', desc: '5 artifact plans' },
        {
          icon: 'active', name: 'Artifacts', desc: '3/5 complete', highlighted: true,
          subDrill: {
            heroNum: '0.847', heroLabel: 'Baseline Accuracy', heroSub: '+17.5% vs prior work',
            heroColor: 'var(--blue)',
            artifacts: [
              { icon: 'done', name: 'Contrastive Baseline', detail: 'acc: 0.847' },
              { icon: 'done', name: 'Multilingual Pairs', detail: '2,400 examples' },
              { icon: 'done', name: 'Convergence Proof', detail: 'verified' },
              { icon: 'active', name: 'Ablation Study', detail: 'running' },
              { icon: 'pending', name: 'Cross-lingual Eval', detail: 'pending' },
            ]
          }
        },
        { icon: 'pending', name: 'Paper', desc: '' },
        { icon: 'pending', name: 'Review', desc: '' },
        { icon: 'pending', name: 'Update', desc: '' },
      ]
    }
  },
  paper: {
    number: '0%',
    frac: '',
    label: 'Paper Progress',
    sub: 'Pending &bull; Awaiting invention loop',
    color: 'var(--orange)',
    progress: 0,
    drill: {
      summary: 'Paper generation has not started. Waiting for the invention loop to complete all artifacts and reviews.',
      stages: [
        { icon: 'pending', name: 'Visualizations', desc: '' },
        { icon: 'pending', name: 'Full Paper', desc: '' },
        { icon: 'pending', name: 'Repository', desc: '' },
      ]
    }
  }
};

let currentModule = 'invention';
let drillOpen = false;
let subDrillOpen = false;
let iterDetailOpen = false;

// --- Circumference for ring ---
const CIRC = 2 * Math.PI * 82; // ~515.22

// --- Animation helper: count-up for numbers ---
function animateNumber(el, target, duration = 600) {
  const text = target;
  // If it looks like a pure number or decimal, animate it
  const num = parseFloat(text);
  if (isNaN(num) || text.includes('%') || text.includes('/')) {
    el.textContent = text;
    return;
  }
  const decimals = text.includes('.') ? text.split('.')[1].length : 0;
  const start = performance.now();
  const startVal = 0;
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic
    const val = startVal + (num - startVal) * ease;
    el.textContent = val.toFixed(decimals);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// --- Set ring progress ---
function setRing(pct, color) {
  const fill = $('#ringFill');
  const offset = CIRC * (1 - pct);
  fill.style.strokeDashoffset = offset;
  fill.style.stroke = color;
  fill.style.filter = `drop-shadow(0 0 ${pct > 0 ? 4 : 0}px ${color})`;
}

// --- Render top-level view ---
function renderModule(mod, animate = true) {
  const d = modules[mod];
  const wrap = $('#bigNumberWrap');
  const ring = $('#ringContainer');

  // Reset drill states
  drillOpen = false;
  subDrillOpen = false;
  iterDetailOpen = false;
  wrap.classList.remove('as-header');
  ring.style.opacity = '1';
  ring.style.transition = 'opacity 0.3s ease';
  $('#drillPanel').classList.remove('visible');
  $('#drillPanel').innerHTML = '';

  // Fade out then update
  wrap.classList.add('fading');
  setTimeout(() => {
    // Build number HTML
    const numSpan = `<span class="num" style="color: ${d.color}">${d.number}</span>`;
    const fracSpan = d.frac ? `<span class="frac">${d.frac}</span>` : '';
    $('#bigNumber').innerHTML = numSpan + fracSpan;

    $('#heroLabel').textContent = d.label;
    $('#heroSub').innerHTML = d.sub;
    $('#detailsLink').textContent = 'Details';
    $('#detailsLink').style.display = '';

    setRing(d.progress, d.color);

    // Animate number
    if (animate && !d.frac && !d.number.includes('%')) {
      animateNumber($('#bigNumber .num'), d.number, 500);
    }

    wrap.classList.remove('fading');
  }, 200);

  // Update selector
  $$('.module-selector span').forEach(s => {
    s.classList.toggle('active', s.dataset.module === mod);
  });

  currentModule = mod;
}

// --- Render drill-down ---
function openDrill() {
  if (drillOpen) return;
  drillOpen = true;

  const d = modules[currentModule];
  const wrap = $('#bigNumberWrap');
  const ring = $('#ringContainer');
  const panel = $('#drillPanel');

  // Shrink hero
  wrap.classList.add('as-header');
  ring.style.opacity = '0';
  $('#detailsLink').style.display = 'none';

  // Build drill content
  let html = `<div class="back-btn" onclick="closeDrill()"><span class="arrow">&larr;</span> Back</div>`;
  html += `<div class="drill-summary">${d.drill.summary}</div>`;

  if (d.drill.stages) {
    html += `<div class="stages-list">`;
    d.drill.stages.forEach((s, i) => {
      const iconCh = s.icon === 'done' ? '&#10003;' : s.icon === 'active' ? '&#9654;' : '&#9675;';
      const hl = s.highlighted ? ' highlighted' : '';
      const clickable = s.subDrill ? ` onclick="openSubDrill(${i})"` : '';
      html += `<div class="stage-row${hl}"${clickable}>
        <span class="icon ${s.icon}">${iconCh}</span>
        <span class="name">${s.name}</span>
        <span class="desc">${s.desc}</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (d.drill.iterations) {
    html += `<div class="iterations-list">`;
    d.drill.iterations.forEach((it, i) => {
      html += `<div class="iter-row" onclick="openIterDetail(${i})">
        <span class="iter-score" style="color: ${d.color}">${it.score}</span>
        <div class="iter-info">
          <span class="iter-title">${it.title}</span>
          <span class="iter-desc">${it.desc}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Sub-drill container (hidden initially)
  html += `<div class="sub-drill-panel" id="subDrillContent"></div>`;
  // Iter detail container
  html += `<div class="iter-detail-panel" id="iterDetailContent"></div>`;

  panel.innerHTML = html;
  // Trigger reflow then show
  void panel.offsetHeight;
  panel.classList.add('visible');
}

function closeDrill() {
  drillOpen = false;
  subDrillOpen = false;
  iterDetailOpen = false;
  const wrap = $('#bigNumberWrap');
  const ring = $('#ringContainer');
  const panel = $('#drillPanel');

  wrap.classList.remove('as-header');
  ring.style.opacity = '1';
  panel.classList.remove('visible');
  $('#detailsLink').style.display = '';

  setTimeout(() => { panel.innerHTML = ''; }, 350);
}

// --- Sub-drill (artifact list) ---
function openSubDrill(stageIdx) {
  const d = modules[currentModule];
  const stage = d.drill.stages[stageIdx];
  if (!stage || !stage.subDrill) return;

  subDrillOpen = true;
  const sd = stage.subDrill;
  const panel = $('#subDrillContent');
  const stagesList = panel.parentElement.querySelector('.stages-list');
  const backMain = panel.parentElement.querySelector('.back-btn');
  const summary = panel.parentElement.querySelector('.drill-summary');

  // Hide stages list
  if (stagesList) stagesList.style.display = 'none';
  if (backMain) backMain.style.display = 'none';
  if (summary) summary.style.display = 'none';

  let html = `<div class="back-btn" onclick="closeSubDrill()"><span class="arrow">&larr;</span> Back</div>`;
  html += `<div class="sub-hero-number" style="color: ${sd.heroColor}">${sd.heroNum}</div>`;
  html += `<div class="sub-hero-label">${sd.heroLabel}</div>`;
  html += `<div class="sub-hero-sub">${sd.heroSub}</div>`;
  html += `<div class="artifact-list">`;
  sd.artifacts.forEach(a => {
    const iconCh = a.icon === 'done' ? '&#10003;' : a.icon === 'active' ? '&#9654;' : '&#9675;';
    html += `<div class="artifact-row">
      <span class="icon ${a.icon}">${iconCh}</span>
      <span class="a-name">${a.name}</span>
      <span class="a-detail">${a.detail}</span>
    </div>`;
  });
  html += `</div>`;

  panel.innerHTML = html;
  void panel.offsetHeight;
  panel.classList.add('visible');
}

function closeSubDrill() {
  subDrillOpen = false;
  const panel = $('#subDrillContent');
  const stagesList = panel.parentElement.querySelector('.stages-list');
  const backMain = panel.parentElement.querySelector('.back-btn:not(.sub-drill-panel .back-btn)');
  const summary = panel.parentElement.querySelector('.drill-summary');

  panel.classList.remove('visible');
  if (stagesList) stagesList.style.display = '';
  // Re-show the original back btn and summary
  const allBacks = panel.parentElement.querySelectorAll(':scope > .back-btn');
  allBacks.forEach(b => b.style.display = '');
  if (summary) summary.style.display = '';

  setTimeout(() => { panel.innerHTML = ''; }, 300);
}

// --- Iteration detail (hypothesis) ---
function openIterDetail(iterIdx) {
  const d = modules[currentModule];
  const it = d.drill.iterations[iterIdx];
  if (!it || !it.detail) return;

  iterDetailOpen = true;
  const panel = $('#iterDetailContent');
  const iterList = panel.parentElement.querySelector('.iterations-list');
  const backMain = panel.parentElement.querySelector(':scope > .back-btn');
  const summary = panel.parentElement.querySelector('.drill-summary');

  if (iterList) iterList.style.display = 'none';
  if (backMain) backMain.style.display = 'none';
  if (summary) summary.style.display = 'none';

  let html = `<div class="back-btn" onclick="closeIterDetail()"><span class="arrow">&larr;</span> Back</div>`;
  html += `<div class="sub-hero-number" style="color: ${d.color}">${it.score}</div>`;
  html += `<div class="sub-hero-label">${it.title}</div>`;
  html += `<div class="sub-hero-sub" style="margin-bottom: 24px">${it.desc}</div>`;
  html += `<h3>${it.detail.heading}</h3>`;
  html += `<div class="abstract">${it.detail.abstract}</div>`;
  html += `<div class="review-block">
    <div class="review-label">Review</div>
    ${it.detail.review}
  </div>`;

  panel.innerHTML = html;
  void panel.offsetHeight;
  panel.classList.add('visible');
}

function closeIterDetail() {
  iterDetailOpen = false;
  const panel = $('#iterDetailContent');
  const iterList = panel.parentElement.querySelector('.iterations-list');
  const backMain = panel.parentElement.querySelector(':scope > .back-btn');
  const summary = panel.parentElement.querySelector('.drill-summary');

  panel.classList.remove('visible');
  if (iterList) iterList.style.display = '';
  if (backMain) backMain.style.display = '';
  if (summary) summary.style.display = '';

  setTimeout(() => { panel.innerHTML = ''; }, 300);
}

// --- Event listeners ---
$$('.module-selector span').forEach(s => {
  s.addEventListener('click', () => {
    renderModule(s.dataset.module);
  });
});

$('#bigNumberWrap').addEventListener('click', (e) => {
  if (e.target.closest('.details-link') || e.target.closest('.big-number') || e.target.closest('.hero-label')) {
    openDrill();
  }
});

// --- Timer ---
let elapsed = 2 * 3600 + 34 * 60 + 17; // 02:34:17
function updateTimer() {
  elapsed++;
  const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  const cost = (12.47 + (elapsed - (2 * 3600 + 34 * 60 + 17)) * 0.0008).toFixed(2);
  $('#footer').innerHTML = `${h}:${m}:${s} &bull; $${cost}`;
}
setInterval(updateTimer, 1000);

// Init
renderModule('invention', false);
</script>
</body>
