<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Simple View</title>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --border: #1e1e30;
    --text: #c8c8d8;
    --text-dim: #6a6a80;
    --green: #34d399;
    --green-glow: rgba(52, 211, 153, 0.45);
    --purple: #a78bfa;
    --purple-glow: rgba(167, 139, 250, 0.45);
    --blue: #60a5fa;
    --blue-glow: rgba(96, 165, 250, 0.45);
    --gray: #4a4a5e;
    --gray-glow: rgba(74, 74, 94, 0.2);
    --orange: #fb923c;
    --orange-glow: rgba(251, 146, 60, 0.45);
    --cyan: #22d3ee;
    --cyan-glow: rgba(34, 211, 238, 0.45);
    --rose: #fb7185;
    --rose-glow: rgba(251, 113, 133, 0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── TOP STRIP CONTAINER ── */
  .strip-container {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px 0;
    flex-shrink: 0;
    position: relative;
  }

  /* ── ROW 1: MODULE DOTS ── */
  .module-row {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 50px;
    position: relative;
    gap: 0;
  }

  .module-line {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 2px;
    z-index: 0;
    border-radius: 1px;
  }

  .module-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    z-index: 1;
    padding: 0 36px;
    user-select: none;
    transition: transform 0.2s ease;
  }
  .module-node:hover { transform: scale(1.08); }
  .module-node.focused .module-dot { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 4px; }

  .module-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    transition: all 0.3s ease;
    position: relative;
  }
  .module-dot.completed {
    background: var(--dot-color);
    box-shadow: 0 0 12px var(--dot-glow), 0 0 4px var(--dot-glow);
  }
  .module-dot.active {
    width: 22px;
    height: 22px;
    background: var(--dot-color);
    box-shadow: 0 0 20px var(--dot-glow), 0 0 8px var(--dot-glow), 0 0 40px var(--dot-glow);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .module-dot.pending {
    background: transparent;
    border: 2px solid var(--gray);
    box-shadow: 0 0 6px var(--gray-glow);
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 20px var(--dot-glow), 0 0 8px var(--dot-glow), 0 0 40px var(--dot-glow); }
    50% { box-shadow: 0 0 30px var(--dot-glow), 0 0 14px var(--dot-glow), 0 0 60px var(--dot-glow); transform: scale(1.15); }
  }

  .module-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-top: 6px;
    text-transform: uppercase;
    color: var(--text-dim);
    transition: color 0.3s ease;
  }
  .module-node.selected .module-label { color: var(--text); font-weight: 600; }

  /* ── ROW 2: SUB-MODULE DOTS ── */
  .sub-row-wrapper {
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    max-height: 0;
    opacity: 0;
  }
  .sub-row-wrapper.open {
    max-height: 60px;
    opacity: 1;
  }

  .sub-row {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    position: relative;
    gap: 0;
    padding-bottom: 8px;
  }

  .sub-line {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    height: 1.5px;
    z-index: 0;
    border-radius: 1px;
    opacity: 0.5;
  }

  .sub-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    z-index: 1;
    padding: 0 20px;
    user-select: none;
    transition: transform 0.15s ease;
  }
  .sub-node:hover { transform: scale(1.12); }
  .sub-node.focused .sub-dot { outline: 2px solid rgba(255,255,255,0.25); outline-offset: 3px; }

  .sub-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    transition: all 0.3s ease;
  }
  .sub-dot.completed {
    background: var(--dot-color);
    box-shadow: 0 0 8px var(--dot-glow);
  }
  .sub-dot.active {
    width: 12px;
    height: 12px;
    background: var(--dot-color);
    box-shadow: 0 0 14px var(--dot-glow), 0 0 6px var(--dot-glow);
    animation: pulse-sub 2s ease-in-out infinite;
  }
  .sub-dot.pending {
    background: transparent;
    border: 1.5px solid var(--gray);
  }

  @keyframes pulse-sub {
    0%, 100% { box-shadow: 0 0 14px var(--dot-glow), 0 0 6px var(--dot-glow); }
    50% { box-shadow: 0 0 22px var(--dot-glow), 0 0 10px var(--dot-glow); transform: scale(1.2); }
  }

  .sub-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-top: 4px;
    color: var(--text-dim);
    white-space: nowrap;
    transition: color 0.3s ease;
  }
  .sub-node.selected .sub-label { color: var(--text); font-weight: 600; }

  .sub-status {
    font-size: 8px;
    margin-left: 2px;
  }
  .sub-status.done { color: var(--green); }
  .sub-status.running { color: var(--blue); }

  /* ── KEYBOARD HINTS ── */
  .kb-hints {
    position: absolute;
    bottom: 4px;
    right: 16px;
    display: flex;
    gap: 8px;
    opacity: 0.35;
    font-size: 9px;
    color: var(--text-dim);
    pointer-events: none;
  }
  .kb-hints kbd {
    background: var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 9px;
  }

  /* ── CONTENT AREA ── */
  .content-area {
    flex: 1;
    padding: 24px 32px;
    overflow-y: auto;
  }

  .content-panel {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .content-panel.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .panel-header .indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .panel-header h2 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .panel-header .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-badge.done { background: rgba(52,211,153,0.15); color: var(--green); }
  .status-badge.running { background: rgba(96,165,250,0.15); color: var(--blue); }
  .status-badge.pending { background: rgba(74,74,94,0.15); color: var(--gray); }

  .panel-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .panel-body p {
    line-height: 1.7;
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .panel-body p:last-child { margin-bottom: 0; }

  .detail-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 8px 16px;
    font-size: 13px;
    margin-top: 14px;
  }
  .detail-grid .label {
    color: var(--text-dim);
    font-weight: 500;
  }
  .detail-grid .value {
    color: var(--text);
  }

  .artifact-list {
    list-style: none;
    margin-top: 12px;
  }
  .artifact-list li {
    padding: 8px 12px;
    border-left: 2px solid var(--border);
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-dim);
    transition: border-color 0.2s ease;
  }
  .artifact-list li.done { border-color: var(--green); }
  .artifact-list li.active { border-color: var(--blue); }
  .artifact-list li .item-name { color: var(--text); font-weight: 500; }

  .progress-bar-container {
    margin-top: 14px;
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .log-block {
    margin-top: 14px;
    background: #080810;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-dim);
    max-height: 180px;
    overflow-y: auto;
  }
  .log-block .ts { color: var(--green); }
  .log-block .lvl { color: var(--purple); }
  .log-block .fn { color: var(--cyan); }

  /* ── TRANSITION GROUP for sub-row slide ── */
  .sub-row-slide-enter {
    animation: slideDown 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes slideDown {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ── NAVIGATION FOCUS RING ── */
  .nav-layer { position: relative; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

             <span class="label">Format</span><span class="value">LaTeX / PDF</span>
             <span class="label">Status</span><span class="value">Not started</span>
           </div>`
  },
  'pap-viz': {
    title: 'Visualization Generation', status: 'pending',
    body: `<p>Generate publication-quality figures from artifact outputs.
           Includes pore structure diagrams, performance plots, and
           comparison charts.</p>
           <div class="detail-grid">
             <span class="label">Est. Figures</span><span class="value">6-8</span>
             <span class="label">Status</span><span class="value">Not started</span>
           </div>`
  },
  'pap-full': {
    title: 'Full Document Assembly', status: 'pending',
    body: `<p>Assemble complete paper repository: LaTeX source, figures,
           supplementary materials, and README with reproduction instructions.</p>
           <div class="detail-grid">
             <span class="label">Output</span><span class="value">Git repository</span>
             <span class="label">Status</span><span class="value">Not started</span>
           </div>`
  },
  'pap-review': {
    title: 'Final Review', status: 'pending',
    body: `<p>Final quality gate before paper output. Checks formatting,
           figure quality, reference completeness, and repository structure.</p>
           <div class="detail-grid">
             <span class="label">Checks</span><span class="value">12 quality gates</span>
             <span class="label">Status</span><span class="value">Not started</span>
           </div>`
  }
};

// ── STATE ──
let selectedModuleIdx = 2;   // Invention
let selectedSubIdx = 2;      // Artifacts
let navLayer = 'module';     // 'module' | 'sub'
let prevModuleIdx = -1;

// ── RENDERING ──
function renderModuleRow() {
  const row = document.getElementById('moduleRow');
  // Remove old nodes (keep canvas)
  row.querySelectorAll('.module-node').forEach(n => n.remove());

  MODULES.forEach((mod, i) => {
    const node = document.createElement('div');
    node.className = 'module-node';
    if (i === selectedModuleIdx) node.classList.add('selected');
    if (navLayer === 'module' && i === selectedModuleIdx) node.classList.add('focused');

    const dot = document.createElement('div');
    dot.className = `module-dot ${mod.state}`;
    dot.style.setProperty('--dot-color', mod.color);
    dot.style.setProperty('--dot-glow', mod.glow);

    const label = document.createElement('div');
    label.className = 'module-label';
    label.textContent = mod.label;

    node.appendChild(dot);
    node.appendChild(label);
    node.addEventListener('click', () => {
      selectedModuleIdx = i;
      navLayer = 'module';
      openSubRow();
      render();
    });

    row.appendChild(node);
  });

  drawModuleLine();
}

function renderSubRow() {
  const wrapper = document.getElementById('subRowWrapper');
  const row = document.getElementById('subRow');
  const mod = MODULES[selectedModuleIdx];

  // Remove old sub-nodes (keep canvas)
  row.querySelectorAll('.sub-node').forEach(n => n.remove());

  if (!mod.subs || mod.subs.length === 0) {
    wrapper.classList.remove('open');
    return;
  }

  // Clamp sub index
  if (selectedSubIdx >= mod.subs.length) selectedSubIdx = mod.subs.length - 1;
  if (selectedSubIdx < 0) selectedSubIdx = 0;

  mod.subs.forEach((sub, i) => {
    const node = document.createElement('div');
    node.className = 'sub-node';
    if (i === selectedSubIdx) node.classList.add('selected');
    if (navLayer === 'sub' && i === selectedSubIdx) node.classList.add('focused');

    const dot = document.createElement('div');
    dot.className = `sub-dot ${sub.state}`;
    dot.style.setProperty('--dot-color', mod.color);
    dot.style.setProperty('--dot-glow', mod.glow);

    const labelSpan = document.createElement('div');
    labelSpan.className = 'sub-label';

    const statusIcon = sub.state === 'completed' ? ' \u2713' : sub.state === 'active' ? ' \u25B6' : '';
    const statusClass = sub.state === 'completed' ? 'done' : sub.state === 'active' ? 'running' : '';
    labelSpan.innerHTML = `${sub.label}<span class="sub-status ${statusClass}">${statusIcon}</span>`;

    node.appendChild(dot);
    node.appendChild(labelSpan);
    node.addEventListener('click', () => {
      selectedSubIdx = i;
      navLayer = 'sub';
      render();
    });

    row.appendChild(node);
  });

  wrapper.classList.add('open');

  // Add slide animation if module changed
  if (prevModuleIdx !== selectedModuleIdx) {
    row.classList.remove('sub-row-slide-enter');
    void row.offsetWidth;
    row.classList.add('sub-row-slide-enter');
    prevModuleIdx = selectedModuleIdx;
  }

  requestAnimationFrame(drawSubLine);
}

function renderContent() {
  const area = document.getElementById('contentArea');
  area.innerHTML = '';

  const mod = MODULES[selectedModuleIdx];
  const sub = mod.subs[selectedSubIdx];
  if (!sub) return;

  const data = CONTENT[sub.id];
  if (!data) return;

  const panel = document.createElement('div');
  panel.className = 'content-panel visible';

  const statusClass = data.status === 'done' ? 'done' : data.status === 'running' ? 'running' : 'pending';
  const statusText = data.status === 'done' ? 'Complete' : data.status === 'running' ? 'Running' : 'Pending';

  panel.innerHTML = `
    <div class="panel-header">
      <div class="indicator" style="background: ${mod.color}; box-shadow: 0 0 8px ${mod.glow};"></div>
      <h2>${data.title}</h2>
      <span class="status-badge ${statusClass}">${statusText}</span>
    </div>
    <div class="panel-body">${data.body}</div>
  `;

  area.appendChild(panel);
}

function render() {
  renderModuleRow();
  renderSubRow();
  renderContent();
}

// ── CONNECTING LINES ──
function drawModuleLine() {
  const canvas = document.getElementById('moduleLine');
  const row = document.getElementById('moduleRow');
  const nodes = row.querySelectorAll('.module-node');
  if (nodes.length < 2) return;

  const rowRect = row.getBoundingClientRect();
  canvas.width = rowRect.width;
  canvas.height = rowRect.height;
  canvas.style.width = rowRect.width + 'px';
  canvas.style.height = rowRect.height + 'px';
  canvas.style.left = '0';
  canvas.style.transform = 'none';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const dots = Array.from(nodes).map(n => {
    const dot = n.querySelector('.module-dot');
    const r = dot.getBoundingClientRect();
    return { x: r.left + r.width / 2 - rowRect.left, y: r.top + r.height / 2 - rowRect.top };
  });

  for (let i = 0; i < dots.length - 1; i++) {
    const from = dots[i];
    const to = dots[i + 1];
    const grad = ctx.createLinearGradient(from.x, 0, to.x, 0);

    const cFrom = getComputedColor(MODULES[i].color);
    const cTo = getComputedColor(MODULES[i + 1].color);
    grad.addColorStop(0, cFrom);
    grad.addColorStop(1, cTo);

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawSubLine() {
  const canvas = document.getElementById('subLine');
  const row = document.getElementById('subRow');
  const nodes = row.querySelectorAll('.sub-node');
  if (nodes.length < 2) return;

  const rowRect = row.getBoundingClientRect();
  canvas.width = rowRect.width;
  canvas.height = rowRect.height;
  canvas.style.width = rowRect.width + 'px';
  canvas.style.height = rowRect.height + 'px';
  canvas.style.left = '0';
  canvas.style.transform = 'none';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const dots = Array.from(nodes).map(n => {
    const dot = n.querySelector('.sub-dot');
    const r = dot.getBoundingClientRect();
    return { x: r.left + r.width / 2 - rowRect.left, y: r.top + r.height / 2 - rowRect.top };
  });

  const mod = MODULES[selectedModuleIdx];
  const c = getComputedColor(mod.color);

  for (let i = 0; i < dots.length - 1; i++) {
    ctx.beginPath();
    ctx.moveTo(dots[i].x, dots[i].y);
    ctx.lineTo(dots[i + 1].x, dots[i + 1].y);
    ctx.strokeStyle = c;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.25;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function getComputedColor(cssVar) {
  const temp = document.createElement('div');
  temp.style.color = cssVar;
  document.body.appendChild(temp);
  const c = getComputedStyle(temp).color;
  document.body.removeChild(temp);
  return c;
}

// ── SUB-ROW OPEN/CLOSE ──
function openSubRow() {
  const mod = MODULES[selectedModuleIdx];
  // Auto-select the first active or last completed sub
  const activeIdx = mod.subs.findIndex(s => s.state === 'active');
  if (activeIdx >= 0) {
    selectedSubIdx = activeIdx;
  } else {
    const lastDone = mod.subs.map((s, i) => s.state === 'completed' ? i : -1).filter(i => i >= 0);
    selectedSubIdx = lastDone.length > 0 ? lastDone[lastDone.length - 1] : 0;
  }
}

// ── KEYBOARD NAVIGATION ──
document.addEventListener('keydown', (e) => {
  const mod = MODULES[selectedModuleIdx];

  switch (e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if (navLayer === 'module') {
        if (selectedModuleIdx > 0) {
          selectedModuleIdx--;
          openSubRow();
        }
      } else {
        if (selectedSubIdx > 0) selectedSubIdx--;
      }
      render();
      break;

    case 'ArrowRight':
      e.preventDefault();
      if (navLayer === 'module') {
        if (selectedModuleIdx < MODULES.length - 1) {
          selectedModuleIdx++;
          openSubRow();
        }
      } else {
        if (selectedSubIdx < mod.subs.length - 1) selectedSubIdx++;
      }
      render();
      break;

    case 'ArrowDown':
      e.preventDefault();
      if (navLayer === 'module' && mod.subs.length > 0) {
        navLayer = 'sub';
      }
      render();
      break;

    case 'ArrowUp':
      e.preventDefault();
      if (navLayer === 'sub') {
        navLayer = 'module';
      }
      render();
      break;

    case 'Enter':
    case ' ':
      e.preventDefault();
      if (navLayer === 'module') {
        navLayer = 'sub';
      }
      render();
      break;
  }
});

// ── RESIZE HANDLER ──
window.addEventListener('resize', () => {
  drawModuleLine();
  drawSubLine();
});

// ── INIT ──
openSubRow();
render();
</script>
