<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Fix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fafafa;color:#111827;padding:40px 60px}
h1{font-size:16px;font-weight:700;margin-bottom:20px;color:#6b7280}

.cards-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:4px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 18px;text-align:center;font-size:13px;font-weight:600;color:#6b7280}
.card.active{border-color:#60a5fa;color:#111827}

.tree-panel{padding-left:calc(33.33% + 24px);padding-top:12px}

/*
  STRUCTURE:
  │
  ├── ● Round 5        >
  │
  ├── ● Round 6        >
  │
  ├── ● Round 7       ⌄
  │   │
  │   ├── ○ Plan Approach
  │   ├── ○ Plan Artifacts
  │   ├── ● Create Artifacts
  │   ├── ○ Write Paper
  │   └── ...
  │
  └── ○ Round 8

  Trunk is the leftmost vertical line.
  Horizontal branches go RIGHT from trunk to round dots.
  Sub-trunk drops from Round 7 dot position.
  Sub-step branches go RIGHT from sub-trunk to sub-step dots.
*/

.tree{position:relative;padding-left:40px}

/* Main trunk — leftmost vertical line */
.trunk{position:absolute;left:5px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,#60a5fa,rgba(96,165,250,.15));border-radius:1px}

/* Round row */
.round{position:relative;display:flex;align-items:center;gap:10px;height:36px}

/* Horizontal branch: trunk (left:5px) → round dot (left:40px padding, dot starts there) */
/* Branch from trunk center (6px) to dot left edge (40px) = left:-34px from dot, width 34px */
.round::before{
  content:'';position:absolute;left:-34px;top:50%;
  width:32px;height:2px;
  background:rgba(96,165,250,.25);border-radius:1px;
}

.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;position:relative;z-index:2;background:#fff}
.dot.done{background:#4ade80}
.dot.active{background:#60a5fa}
.dot.pending{border:1.5px solid #d1d5db}

.label{font-size:13px;white-space:nowrap}
.label.active{font-weight:600;color:#111827}
.label.done{color:#6b7280}
.label.pending{color:#9ca3af}

/* Sub-steps container — indented from round dot position */
.subs{position:relative;margin-left:0px;padding-left:30px}

/* Sub-trunk — drops straight down from Round 7's dot center
   Round dot center is at: tree padding (40px) + dot half (5px) = 45px from .tree
   .subs starts at tree padding (40px) + 0 margin = 40px from .tree
   So sub-trunk relative to .subs = 45 - 40 = 5px, minus half width = 4px */
.sub-trunk{position:absolute;left:4px;top:0;bottom:14px;width:2px;background:rgba(96,165,250,.15);border-radius:1px}

/* Sub-step row */
.sub{position:relative;display:flex;align-items:center;gap:8px;height:32px}

/* Horizontal branch from sub-trunk to sub-step dot
   Sub-trunk at left:4px (center 5px)
   Sub-step dot at padding-left (30px), dot half = 3.5px → center at 33.5px
   Branch: from 5px to 30px = 25px, starting at left:-25px from dot */
.sub::before{
  content:'';position:absolute;left:-25px;top:50%;
  width:25px;height:1.5px;
  background:rgba(96,165,250,.15);border-radius:1px;
}

.sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;position:relative;z-index:2;background:#fff}
.sub-dot.done{background:#4ade80;opacity:.6}
.sub-dot.active{background:#60a5fa}
.sub-dot.pending{border:1.5px solid #d1d5db}

.sub-label{font-size:12px;white-space:nowrap}
.sub-label.active{font-weight:600;color:#111827}
.sub-label.done{color:#9ca3af}
.sub-label.pending{color:#d1d5db}

.ellipsis{height:28px;display:flex;align-items:center;padding-left:4px;font-size:12px;color:#d1d5db}

.ghost-chev{opacity:0;transition:opacity .2s;color:#9ca3af;margin-left:auto}
.round:hover .ghost-chev{opacity:.4}
</style>
</head>
<body>

<h1>Tree Fix</h1>

<div class="cards-row">
  <div class="card">Create Hypothesis</div>
  <div class="card active">Test Ideas</div>
  <div class="card" style="opacity:.4">Report Results</div>
</div>

<div class="tree-panel">
  <div class="tree">
    <div class="trunk"></div>

    <div class="round">
      <div class="dot done"></div>
      <span class="label done">Round 5</span>
      <span class="ghost-chev">›</span>
    </div>

    <div class="round">
      <div class="dot done"></div>
      <span class="label done">Round 6</span>
      <span class="ghost-chev">›</span>
    </div>

    <div class="round">
      <div class="dot active"></div>
      <span class="label active">Round 7</span>
      <span style="font-size:11px;color:#9ca3af;margin-left:4px">3/5</span>
    </div>

    <div class="subs">
      <div class="sub-trunk"></div>

      <div class="sub">
        <div class="sub-dot done"></div>
        <span class="sub-label done">Plan Approach</span>
      </div>

      <div class="sub">
        <div class="sub-dot done"></div>
        <span class="sub-label done">Plan Artifacts</span>
      </div>

      <div class="sub">
        <div class="sub-dot active"></div>
        <span class="sub-label active">Create Artifacts</span>
        <span style="font-size:11px;color:#60a5fa;letter-spacing:2px;margin-left:4px">····</span>
      </div>

      <div class="sub">
        <div class="sub-dot pending"></div>
        <span class="sub-label pending">Write Paper</span>
      </div>

      <div class="ellipsis">···</div>
    </div>

    <div class="round">
      <div class="dot pending"></div>
      <span class="label pending">Round 8</span>
    </div>
  </div>
</div>

</body>
</html>
