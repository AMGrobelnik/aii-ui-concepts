<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Mix 08</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Slate surfaces */
  --bg-deep:     #0c0f1a;
  --bg-surface:  #131828;
  --bg-card:     #1a1f32;
  --bg-hover:    #212740;
  --bg-elevated: #272d48;

  /* Borders */
  --border:      #2a3050;
  --border-dim:  #1e2340;
  --border-lite: #343a5c;

  /* Text hierarchy */
  --text-100:    #e4e7f0;
  --text-200:    #a8adc4;
  --text-300:    #6e7494;
  --text-400:    #4a5070;

  /* Accents */
  --accent:      #5b8af5;
  --accent-dim:  #3a5fb8;
  --accent-glow: rgba(91, 138, 245, 0.25);
  --accent-bg:   rgba(91, 138, 245, 0.08);

  /* Semantic colors */
  --green:       #34d399;
  --green-dim:   rgba(52, 211, 153, 0.15);
  --green-glow:  rgba(52, 211, 153, 0.30);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251, 191, 36, 0.12);
  --red:         #f87171;
  --red-dim:     rgba(248, 113, 113, 0.12);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167, 139, 250, 0.12);
  --cyan:        #22d3ee;
  --cyan-dim:    rgba(34, 211, 238, 0.12);

  /* Layout */
  --ring-size:   180px;
  --sidebar-w:   280px;
  --topbar-h:    50px;

  /* Shared tokens */
  --radius:      8px;
  --radius-lg:   12px;
  --transition:  180ms ease;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.25), 0 0 0 1px var(--border-dim);
}

html { font-size: 14px; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-200);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Layout Shell ──────────────────────────────────────────── */
.shell {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-surface);
  border-right: 1px solid var(--border-dim);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 10;
}

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* ── Particle Canvas ───────────────────────────────────────── */
#particleCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

/* ── Topbar ────────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: relative;
  z-index: 5;
  flex-shrink: 0;
}

.topbar-left { display: flex; align-items: center; gap: 10px; }
.topbar-title { font-size: 0.8rem; font-weight: 500; color: var(--text-300); letter-spacing: 0.04em; text-transform: uppercase; }
.topbar-sep { color: var(--text-400); font-size: 0.7rem; }
.topbar-sub { font-size: 0.78rem; color: var(--text-200); font-weight: 500; }
.topbar-sub2 { font-size: 0.74rem; color: var(--accent); font-weight: 500; }
.topbar-run { margin-left: auto; display: flex; align-items: center; gap: 10px; }

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-glow); }
  50%      { opacity: 0.7; box-shadow: 0 0 8px 3px var(--green-glow); }
}

.topbar-run-label { font-size: 0.73rem; color: var(--text-300); font-variant-numeric: tabular-nums; }
.topbar-run-id { font-weight: 600; color: var(--text-200); }

/* ── Content Area ──────────────────────────────────────────── */
.content-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 28px 40px;
  position: relative;
  z-index: 2;
}

.content-area::-webkit-scrollbar { width: 5px; }
.content-area::-webkit-scrollbar-track { background: transparent; }
.content-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* ── Sidebar: Ring Progress ────────────────────────────────── */
.ring-container {
  width: var(--ring-size);
  height: var(--ring-size);
  margin: 18px auto 8px;
  position: relative;
  flex-shrink: 0;
}

.ring-svg { width: 100%; height: 100%; }

.ring-track {
  fill: none;
  stroke: var(--border);
  stroke-width: 3;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 440;
  stroke-dashoffset: 264;
  filter: drop-shadow(0 0 4px var(--accent-glow));
  transition: stroke-dashoffset 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
}

.ring-dashed {
  fill: none;
  stroke: var(--text-400);
  stroke-width: 1;
  stroke-dasharray: 6 8;
  opacity: 0.2;
  animation: ringRotate 12s linear infinite;
  transform-origin: 50% 50%;
}

@keyframes ringRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.ring-endpoint {
  fill: var(--accent);
  filter: drop-shadow(0 0 4px rgba(91,138,245,0.5));
  animation: endpointGlow 2.5s ease-in-out infinite;
}

@keyframes endpointGlow {
  0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px rgba(91,138,245,0.4)); }
  50%      { opacity: 0.6; filter: drop-shadow(0 0 10px rgba(91,138,245,0.7)); }
}

.ring-center-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; }
.ring-pct { font-size: 1.5rem; font-weight: 700; color: var(--text-100); line-height: 1.1; }
.ring-label { font-size: 0.64rem; color: var(--text-300); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.ring-phase { text-align: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-dim); margin: 0 16px 4px; }
.ring-phase-text { font-size: 0.66rem; color: var(--text-300); }
.ring-phase-name { font-size: 0.76rem; font-weight: 600; color: var(--accent); margin-top: 1px; }

/* ── Sidebar: Module Tree ──────────────────────────────────── */
.module-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px 16px;
  position: relative;
}

.module-list::-webkit-scrollbar { width: 3px; }
.module-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

/* ── Module Card (Level 0) ─────────────────────────────────── */
.module-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 4px;
  cursor: pointer;
  transition: all var(--transition);
  overflow: hidden;
}

.module-card:hover {
  background: var(--bg-hover);
  border-color: var(--border);
}

.module-card.active {
  border-color: var(--accent-dim);
  background: var(--bg-hover);
  animation: cardGlow 2.5s ease-in-out infinite;
}

@keyframes cardGlow {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(91,138,245,0.0),
                inset 0 0 0 0 rgba(91,138,245,0);
  }
  50% {
    box-shadow: 0 0 12px 0 rgba(91,138,245,0.1),
                inset 0 0 20px -8px rgba(91,138,245,0.05);
  }
}

.module-card.active::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(91,138,245,0.06), transparent);
  animation: shimmerSweep 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes shimmerSweep {
  0%   { left: -50%; }
  45%  { left: 120%; }
  100% { left: 120%; }
}

.module-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
}

.module-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 600;
  flex-shrink: 0;
}

.module-card-info { flex: 1; min-width: 0; }
.module-name { font-size: 0.76rem; font-weight: 600; color: var(--text-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.module-status { font-size: 0.64rem; color: var(--text-300); margin-top: 2px; display: flex; align-items: center; gap: 6px; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.62rem;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 500;
  line-height: 1.4;
}

.status-badge.done    { background: var(--green-dim); color: var(--green); }
.status-badge.running { background: var(--accent-bg); color: var(--accent); }
.status-badge.pending { background: rgba(74,80,112,0.15); color: var(--text-400); }

.module-timing { font-size: 0.6rem; color: var(--text-400); font-variant-numeric: tabular-nums; }

/* Collapse toggle */
.collapse-toggle {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: none;
  background: rgba(255,255,255,0.04);
  color: var(--text-300);
  font-size: 0.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.collapse-toggle:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-100);
}

.collapse-toggle.collapsed {
  transform: rotate(-90deg);
}

/* ── Sub-Modules (Level 1) ─────────────────────────────────── */
.sub-modules {
  margin-top: 8px;
  padding-top: 6px;
  border-top: 1px solid var(--border-dim);
  position: relative;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.25s ease;
}

.sub-modules.collapsed {
  max-height: 0 !important;
  opacity: 0;
  padding-top: 0;
  margin-top: 0;
  border-top-color: transparent;
}

/* Colored tree line (Level 1) */
.sub-modules::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 10px;
  bottom: 6px;
  width: 2px;
  border-radius: 1px;
  opacity: 0.4;
}

.sub-module {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 4px 6px 4px 20px;
  border-radius: 5px;
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}

/* Branch connector (Level 1) */
.sub-module::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 50%;
  width: 8px;
  height: 2px;
  border-radius: 1px;
  opacity: 0.3;
}

.sub-module:hover {
  background: rgba(255,255,255,0.03);
}

.sub-module.active {
  background: var(--accent-bg);
}

.sub-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: all var(--transition);
}

.sub-dot.done    { background: var(--green); }
.sub-dot.running { background: var(--accent); }
.sub-dot.pending { background: var(--text-400); }

.sub-module.active .sub-dot.running {
  animation: subDotPulse 2s ease-in-out infinite;
}

@keyframes subDotPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(91,138,245,0.4);
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 8px 3px rgba(91,138,245,0.25);
    transform: scale(1.35);
  }
}

.sub-label { font-size: 0.68rem; color: var(--text-300); flex: 1; }
.sub-module.active .sub-label { color: var(--text-100); font-weight: 500; }
.sub-module.done-item .sub-label { color: var(--text-300); }
.sub-meta { font-size: 0.58rem; color: var(--text-400); font-variant-numeric: tabular-nums; }

/* ── Deep Children (Level 2) ───────────────────────────────── */
.deep-children {
  margin-top: 2px;
  padding-left: 18px;
  position: relative;
  overflow: hidden;
  transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.25s ease;
}

.deep-children.collapsed {
  max-height: 0 !important;
  opacity: 0;
}

/* Colored tree line (Level 2) */
.deep-children::before {
  content: '';
  position: absolute;
  left: 28px;
  top: 4px;
  bottom: 6px;
  width: 2px;
  border-radius: 1px;
  opacity: 0.35;
}

.deep-child {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 3px 6px 3px 20px;
  border-radius: 5px;
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
  margin-left: 2px;
}

/* Branch connector (Level 2) */
.deep-child::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 50%;
  width: 7px;
  height: 2px;
  border-radius: 1px;
  opacity: 0.3;
}

.deep-child:hover {
  background: rgba(255,255,255,0.03);
}

.deep-child.active {
  background: var(--accent-bg);
}

.deep-child.active .sub-dot.running {
  animation: subDotPulse 2s ease-in-out infinite;
}

.deep-child.active .sub-label {
  color: var(--text-100);
  font-weight: 500;
}

/* ── Dashboard Grid ────────────────────────────────────────── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin-bottom: 18px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  transition: border-color var(--transition);
}

.stat-card:hover { border-color: var(--border); }

.stat-label { font-size: 0.66rem; color: var(--text-300); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
.stat-value { font-size: 1.4rem; font-weight: 700; color: var(--text-100); margin-bottom: 8px; font-variant-numeric: tabular-nums; }

.stat-bar-track {
  width: 100%; height: 4px;
  background: var(--border-dim);
  border-radius: 2px;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.6s cubic-bezier(0.22, 0.61, 0.36, 1);
}

.stat-bar-fill.blue   { background: var(--accent); }
.stat-bar-fill.green  { background: var(--green); }
.stat-bar-fill.purple { background: var(--purple); }
.stat-bar-fill.amber  { background: var(--amber); }

.stat-sub { font-size: 0.64rem; color: var(--text-400); margin-top: 5px; font-variant-numeric: tabular-nums; }

/* ── Summary Panel ─────────────────────────────────────────── */
.summary-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 18px 20px;
  margin-bottom: 18px;
}

.summary-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.summary-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 600;
  flex-shrink: 0;
}

.summary-title { font-size: 0.78rem; font-weight: 600; color: var(--text-100); }
.summary-text { font-size: 0.78rem; color: var(--text-200); line-height: 1.7; }
.summary-text p { margin-bottom: 8px; }  .summary-text p:last-child { margin-bottom: 0; }

/* ── Item List ─────────────────────────────────────────────── */
.item-list-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}

.panel-title {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--text-100);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-count {
  font-size: 0.62rem;
  font-weight: 500;
  color: var(--text-400);
  background: var(--bg-hover);
  padding: 1px 6px;
  border-radius: 4px;
}

.item-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--radius);
  margin-bottom: 2px;
  position: relative;
  overflow: hidden;
  transition: background var(--transition);
}

.item-row:last-child { margin-bottom: 0; }
.item-row:hover { background: var(--bg-hover); }

.item-row.running-item::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(91,138,245,0.045), transparent);
  animation: rowShimmer 2.5s ease-in-out infinite;
  pointer-events: none;
}

@keyframes rowShimmer {
  0%   { left: -60%; }
  55%  { left: 120%; }
  100% { left: 120%; }
}

.item-row.running-item {
  background: rgba(91,138,245,0.03);
}

.item-idx { font-size: 0.62rem; color: var(--text-400); width: 18px; text-align: center; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.item-dot.done { background: var(--green); }  .item-dot.running { background: var(--accent); }  .item-dot.pending { background: var(--text-400); }
.item-name { font-size: 0.76rem; color: var(--text-200); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-row.running-item .item-name { color: var(--text-100); font-weight: 500; }
.item-score { font-size: 0.64rem; color: var(--text-300); flex-shrink: 0; font-variant-numeric: tabular-nums; }
.item-meta { font-size: 0.64rem; color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* ── Activity Log ──────────────────────────────────────────── */
.activity-panel {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}

.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-dim);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

.activity-item:last-child { border-bottom: none; }

.activity-time { font-size: 0.62rem; color: var(--text-400); flex-shrink: 0; width: 42px; padding-top: 1px; font-variant-numeric: tabular-nums; }
.activity-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); margin-top: 6px; flex-shrink: 0; }
.activity-dot.green { background: var(--green); }  .activity-dot.amber { background: var(--amber); }  .activity-dot.blue { background: var(--accent); }
.activity-msg { font-size: 0.72rem; color: var(--text-200); flex: 1; line-height: 1.5; }
.activity-item.entering { opacity: 0; transform: translateY(-6px); }

/* ── Content View Transition ───────────────────────────────── */
.content-view {
  animation: contentFadeIn 200ms ease-out forwards;
}

@keyframes contentFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Bottom Columns ────────────────────────────────────────── */
.bottom-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ── Detail Chips ──────────────────────────────────────────── */
.detail-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.detail-chip {
  font-size: 0.62rem;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg-hover);
  color: var(--text-300);
  border: 1px solid var(--border-dim);
}

.detail-chip.accent {
  background: var(--accent-bg);
  color: var(--accent);
  border-color: rgba(91,138,245,0.15);
}
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 160 160">
        <circle class="ring-dashed" cx="80" cy="80" r="76" />
        <circle class="ring-track" cx="80" cy="80" r="70"
                transform="rotate(-90 80 80)" />
        <circle class="ring-progress" cx="80" cy="80" r="70"
                transform="rotate(-90 80 80)" id="ringProgress" />
        <circle class="ring-endpoint" cx="0" cy="0" r="4" id="ringEndpoint" />
      </svg>
      <div class="ring-center-text">
        <div class="ring-pct" id="ringPct">62%</div>
        <div class="ring-label">Complete</div>
      </div>
    </div>

    <div class="ring-phase">
      <div class="ring-phase-text">Current phase</div>
      <div class="ring-phase-name" id="ringPhaseName">Ablation</div>
    </div>

    <div class="module-list" id="moduleList"></div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">
    <canvas id="particleCanvas"></canvas>

    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="topbarTitle">Dashboard</span>
        <span class="topbar-sep" id="topbarSep" style="display:none">/</span>

/* ── Render Sidebar ── */
function renderModules() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';

  MODULES.forEach(mod => {

                      : 'Pending';

    /* Build sub-modules (Level 1) */
    let subHtml = '';
    if (mod.subModules.length) {
      const isCollapsed = collapsedSubs.has(mod.id);
      const subItems = mod.subModules.map((s, si) => {
        const isActive = s.id === activeSubId && mod.id === activeModuleId;

        let deepHtml = '';

          const deepCollapsed = collapsedSubs.has(s.id);
          const deepItems = s.children.map((dc, di) => {
            const dcActive = dc.id === activeDeepId && s.id === activeSubId;
            const dcDone = dc.status === 'done' ? ' done-item' : '';
            const isLast = di === s.children.length - 1;
            return `
              <div class="deep-child${dcActive ? ' active' : ''}${dcDone}"

                   data-sub-id="${s.id}"
                   data-module-id="${mod.id}">

          }).join('');

          const deepMaxH = deepCollapsed ? '0' : (s.children.length * 30 + 10) + 'px';
          deepHtml = `<div class="deep-children${deepCollapsed ? ' collapsed' : ''}"
                           data-deep-parent="${s.id}"
                           style="max-height:${deepMaxH}">
                        ${deepItems}

        }

        /* Collapse toggle for sub-module with children */

          ? `<button class="collapse-toggle${collapsedSubs.has(s.id) ? ' collapsed' : ''}"

                     title="Toggle">&#9660;</button>`

function applyTreeLineColors() {
  MODULES.forEach(mod => {
    /* Level 1 tree line */
    const subContainer = document.querySelector(`[data-sub-parent="${mod.id}"]`);
    if (subContainer) {
      subContainer.style.setProperty('--tree-color', mod.color);
      subContainer.querySelectorAll(':scope > .sub-module::before').forEach(el => {
        el.style.background = mod.color;
      });
    }

    /* Set color on pseudo-elements via CSS custom properties */
    mod.subModules.forEach(sub => {
      if (sub.children) {
        const deepContainer = document.querySelector(`[data-deep-parent="${sub.id}"]`);
        if (deepContainer) {
          deepContainer.style.setProperty('--tree-color', mod.color);
        }
      }
    });
  });

  /* Inject dynamic color rules */
  let dynamicStyle = document.getElementById('dynamic-tree-colors');
  if (!dynamicStyle) {
    dynamicStyle = document.createElement('style');
    dynamicStyle.id = 'dynamic-tree-colors';
    document.head.appendChild(dynamicStyle);
  }

  let rules = '';
  MODULES.forEach(mod => {
    const esc = CSS.escape(mod.id);
    rules += `
      [data-sub-parent="${esc}"]::before { background: ${mod.color}; }
      [data-sub-parent="${esc}"] > .sub-module::before { background: ${mod.color}; }
    `;
    mod.subModules.forEach(sub => {
      if (sub.children) {
        const subEsc = CSS.escape(sub.id);
        rules += `
          [data-deep-parent="${subEsc}"]::before { background: ${mod.color}; }
          [data-deep-parent="${subEsc}"] > .deep-child::before { background: ${mod.color}; }
        `;
      }
    });
  });
  dynamicStyle.textContent = rules;
}

function wireClickHandlers() {
  /* Module card click */
  document.querySelectorAll('.module-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.collapse-toggle') || e.target.closest('.sub-module') || e.target.closest('.deep-child')) return;
      const modId = card.dataset.moduleId;
      const mod = MODULES.find(m => m.id === modId);
      selectModule(modId, mod?.subModules[0]?.id, null);
    });
  });

  /* Sub-module click */
  document.querySelectorAll('.sub-module').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.collapse-toggle')) return;
      e.stopPropagation();
      const modId = el.dataset.moduleId;
      const subId = el.dataset.subId;
      const mod = MODULES.find(m => m.id === modId);
      const sub = mod?.subModules.find(s => s.id === subId);
      const firstChild = sub?.children?.[0]?.id || null;
      selectModule(modId, subId, firstChild);
    });
  });

  /* Deep child click */
  document.querySelectorAll('.deep-child').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      selectModule(el.dataset.moduleId, el.dataset.subId, el.dataset.deepId);
    });
  });

  /* Collapse toggles */
  document.querySelectorAll('.collapse-toggle').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const target = btn.dataset.toggleTarget;
      if (collapsedSubs.has(target)) {
        collapsedSubs.delete(target);
      } else {
        collapsedSubs.add(target);
      }
      renderModules();
      renderContent();
      requestAnimationFrame(initParticles);
    });
  });
}

function updatePhaseLabel() {
  const mod = MODULES.find(m => m.id === activeModuleId);
  const sub = mod?.subModules.find(s => s.id === activeSubId);
  let label = mod?.name || 'Pipeline';

  if (activeDeepId && sub?.children) {
    const deep = sub.children.find(c => c.id === activeDeepId);
    if (deep) label = deep.label;
  } else if (sub) {
    label = sub.label;
  }

  document.getElementById('ringPhaseName').textContent = label;
}

function selectModule(modId, subId, deepId) {
  activeModuleId = modId;
  const mod = MODULES.find(m => m.id === modId);
  activeSubId = subId || (mod?.subModules[0]?.id ?? '');

  /* Resolve deep child */
  const sub = mod?.subModules.find(s => s.id === activeSubId);
  if (deepId) {
    activeDeepId = deepId;
  } else if (sub?.children?.length) {
    /* Auto-select first running or first child */
    const running = sub.children.find(c => c.status === 'running');
    activeDeepId = running ? running.id : sub.children[0].id;
  } else {
    activeDeepId = null;
  }

  renderModules();
  renderContent();
  requestAnimationFrame(initParticles);
}

/* ── Render Dashboard Content ── */
function renderContent() {
  const area = document.getElementById('contentArea');

  if (!mod) return;

  /* Update topbar breadcrumb */
  const titleEl = document.getElementById('topbarTitle');

    subEl.textContent = activeSub.label;
  } else {
    sepEl.style.display = 'none';
    subEl.textContent = '';

  if (activeDeepId && activeSub?.children) {

      sep2El.style.display = '';
      deepEl.textContent = deep.label;
    } else {
      sep2El.style.display = 'none';
      deepEl.textContent = '';
    }

    sep2El.style.display = 'none';
    deepEl.textContent = '';
  }

  /* Items */
  let itemsHtml;
  if (mod.items.length) {
    itemsHtml = mod.items.map((it, i) => {
      const runClass = it.status === 'running' ? ' running-item' : '';
      return `
        <div class="item-row${runClass}">

          <span class="item-dot ${it.status}"></span>

  } else {
    itemsHtml = `
      <div style="font-size:0.73rem;color:var(--text-400);padding:14px 0;text-align:center;">
        No items yet -- waiting for upstream modules.
      </div>`;
  }

  /* Activity log (latest 3) */
  const logEvents = [];
  for (let i = 0; i < 3; i++) {

  const logHtml = logEvents.map(ev => `
    <div class="activity-item">

      <span class="activity-msg">${ev.msg}</span>

  /* Chips */

    `<span class="detail-chip${c.accent ? ' accent' : ''}">${c.text}</span>`
  ).join('');

  /* Determine subtitle for summary */
  let subtitleParts = [mod.name];

    const deep = activeSub.children.find(c => c.id === activeDeepId);
    if (deep) subtitleParts.push(deep.label);
  }

  area.innerHTML = `
    <div class="content-view">
      <div class="dashboard-grid">
        ${mod.stats.map(st => `
          <div class="stat-card">
            <div class="stat-label">${st.label}</div>
            <div class="stat-value">${st.value}</div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill ${st.bar}" data-pct="${st.pct}"></div>

            <div class="stat-sub">${st.pct}% of target</div>
          </div>
        `).join('')}
      </div>

      <div class="summary-panel">
        <div class="summary-header">
          <div class="summary-icon"
               style="background:${mod.color}14;color:${mod.color}">
            ${mod.icon}
          </div>
          <div class="summary-title">${subtitleParts.join(' / ')}</div>
        </div>
        <div class="summary-text">${mod.summary}</div>
        <div class="detail-chips">${chipsHtml}</div>
      </div>

      <div class="bottom-columns">
        <div class="item-list-panel">
          <div class="panel-title">
            Items
            <span class="panel-count">${mod.items.length}</span>
          </div>
          ${itemsHtml}
        </div>

        <div class="activity-panel">
          <div class="panel-title">Activity</div>
          <div id="activityLog">${logHtml}</div>
        </div>
      </div>
    </div>
  `;

  /* Trigger stat bar fill */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      area.querySelectorAll('.stat-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.pct + '%';
      });
    });
  });
}

/* ── Particle Flow Canvas ── */
const particleCanvas = document.getElementById('particleCanvas');
const pCtx = particleCanvas.getContext('2d');
let particles = [];
let particleSource = { x: 0, y: 0 };
let particleTarget = { x: 0, y: 0 };
let particleColor = '91, 138, 245';

function resizeParticleCanvas() {
  const rect = particleCanvas.parentElement.getBoundingClientRect();
  particleCanvas.width = rect.width;
  particleCanvas.height = rect.height;
}

function initParticles() {
  const mainRect = document.querySelector('.main-area').getBoundingClientRect();

  /* Source: the active module card */
  const activeCard = document.querySelector('.module-card.active');
  if (activeCard) {
    const cr = activeCard.getBoundingClientRect();
    particleSource = {
      x: cr.right - mainRect.left + 4,
      y: cr.top + cr.height * 0.35 - mainRect.top
    };
  }

  /* Target: deepest active element */
  let targetEl = null;
  if (activeDeepId) {
    targetEl = document.querySelector(`.deep-child[data-deep-id="${activeDeepId}"]`);
  }
  if (!targetEl) {
    targetEl = document.querySelector('.sub-module.active');
  }
  if (!targetEl) {
    targetEl = activeCard;
  }

  if (targetEl) {
    const tr = targetEl.getBoundingClientRect();
    particleTarget = {
      x: tr.right - mainRect.left + 20,
      y: tr.top + tr.height / 2 - mainRect.top
    };
  }

  /* Color from active module */
  const mod = MODULES.find(m => m.id === activeModuleId);
  if (mod) {
    const hex = mod.color;
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    particleColor = `${r}, ${g}, ${b}`;
  }

  /* Create staggered particles */
  particles = [];
  const count = 5;
  for (let i = 0; i < count; i++) {
    particles.push(createParticle(i / count));
  }
}

function createParticle(startProgress) {
  return {
    progress: startProgress % 1,
    speed: 0.002 + Math.random() * 0.002,
    size: 2 + Math.random() * 1.5,
    opacity: 0.4 + Math.random() * 0.35,
    offsetY: (Math.random() - 0.5) * 20,
  };
}

function drawParticles() {
  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  const sx = particleSource.x, sy = particleSource.y;
  const tx = particleTarget.x, ty = particleTarget.y;

  /* Control points for bezier */
  const cx1 = sx + (tx - sx) * 0.3;
  const cy1 = sy - 40;
  const cx2 = sx + (tx - sx) * 0.7;
  const cy2 = ty + 30;

  /* Draw faint path */
  pCtx.beginPath();
  pCtx.moveTo(sx, sy);
  pCtx.bezierCurveTo(cx1, cy1, cx2, cy2, tx, ty);
  pCtx.strokeStyle = `rgba(${particleColor}, 0.04)`;
  pCtx.lineWidth = 1;
  pCtx.stroke();

  /* Draw particles */
  particles.forEach(p => {
    p.progress += p.speed;
    if (p.progress >= 1) {
      Object.assign(p, createParticle(0));
      p.progress = 0;
    }

    const t = p.progress;
    const u = 1 - t;

    const x = u*u*u*sx + 3*u*u*t*cx1 + 3*u*t*t*cx2 + t*t*t*tx;
    const y = u*u*u*sy + 3*u*u*t*cy1 + 3*u*t*t*cy2 + t*t*t*ty
              + p.offsetY * Math.sin(t * Math.PI);

    const edgeFade = Math.min(t * 5, (1 - t) * 5, 1);
    const alpha = p.opacity * edgeFade;

    /* Core dot */
    pCtx.beginPath();
    pCtx.arc(x, y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(${particleColor}, ${alpha})`;
    pCtx.fill();

    /* Glow halo */
    pCtx.beginPath();
    pCtx.arc(x, y, p.size * 3, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(${particleColor}, ${alpha * 0.1})`;
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}

/* ── Ring Endpoint ── */
function updateRingEndpoint() {
  const progress = 0.62;
  const circumference = 2 * Math.PI * 70;
  const offset = circumference * (1 - progress);

  const ring = document.getElementById('ringProgress');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = offset;

  const angle = -90 + (360 * progress);
  const rad = angle * (Math.PI / 180);
  const cx = 80 + 70 * Math.cos(rad);
  const cy = 80 + 70 * Math.sin(rad);

  const ep = document.getElementById('ringEndpoint');
  ep.setAttribute('cx', cx.toFixed(2));
  ep.setAttribute('cy', cy.toFixed(2));
}

/* ── Activity Log Rotation ── */
function rotateActivity() {
  const activeMod = MODULES.find(m => m.id === activeModuleId);
  if (!activeMod || activeMod.status === 'pending') return;

  activityIdx = (activityIdx + 1) % ACTIVITY_EVENTS.length;

  const logEl = document.getElementById('activityLog');
  if (!logEl) return;

  const events = [];
  for (let i = 0; i < 3; i++) {
    const idx = (activityIdx - 2 + i + ACTIVITY_EVENTS.length) % ACTIVITY_EVENTS.length;
    events.push(ACTIVITY_EVENTS[idx]);
  }

  const existing = logEl.querySelectorAll('.activity-item');
  existing.forEach(it => it.classList.add('entering'));

  setTimeout(() => {
    logEl.innerHTML = events.map(ev => `
      <div class="activity-item entering">
        <span class="activity-time">${ev.time}</span>
        <span class="activity-dot ${ev.dot}"></span>
        <span class="activity-msg">${ev.msg}</span>
      </div>
    `).join('');

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        logEl.querySelectorAll('.activity-item').forEach(it => {
          it.classList.remove('entering');
        });
      });
    });
  }, 160);
}

/* ── Init ── */
function init() {
  resizeParticleCanvas();
  updateRingEndpoint();
  renderModules();
  renderContent();

  requestAnimationFrame(() => {
    initParticles();
    drawParticles();
  });

  setInterval(rotateActivity, 5000);
}

window.addEventListener('resize', () => {
  resizeParticleCanvas();
  initParticles();
});

init();
</script>
</body>
</html>
