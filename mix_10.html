<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pipeline Dashboard with Glassmorphism Tooltips</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Slate Palette ────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Slate surfaces */
  --slate-950: #0a0e17;
  --slate-900: #0f1320;
  --slate-850: #141829;
  --slate-800: #1a1f33;
  --slate-750: #1f2540;
  --slate-700: #262d4a;
  --slate-600: #333c5e;
  --slate-500: #4a5580;
  --slate-400: #6b7aaa;
  --slate-300: #94a3c8;
  --slate-200: #c2cce6;
  --slate-100: #e2e8f5;

  /* Functional */
  --bg:          var(--slate-950);
  --surface:     var(--slate-900);
  --surface-2:   var(--slate-850);
  --surface-3:   var(--slate-800);
  --border:      var(--slate-700);
  --border-dim:  var(--slate-750);
  --text:        var(--slate-100);
  --text-dim:    var(--slate-300);
  --text-muted:  var(--slate-500);

  /* Phase accents */
  --seed:       #34d399;
  --seed-glow:  rgba(52,211,153,0.30);
  --seed-bg:    rgba(52,211,153,0.08);
  --hypo:       #a78bfa;
  --hypo-glow:  rgba(167,139,250,0.30);
  --hypo-bg:    rgba(167,139,250,0.08);
  --inv:        #60a5fa;
  --inv-glow:   rgba(96,165,250,0.30);
  --inv-bg:     rgba(96,165,250,0.08);
  --paper:      #f472b6;
  --paper-glow: rgba(244,114,182,0.30);
  --paper-bg:   rgba(244,114,182,0.08);

  /* Status */
  --green:  #34d399;
  --amber:  #fbbf24;
  --red:    #f87171;

  /* Layout */
  --sidebar-w: 280px;
  --topbar-h:  50px;
  --radius:    8px;
  --radius-lg: 12px;
}

html { font-size: 14px; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-dim);
  line-height: 1.55;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout Shell ─────────────────────────────────────────────── */
.shell { display: flex; height: 100vh; }

.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border-dim);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 20;
}

.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* ── Particle Canvas ──────────────────────────────────────────── */
#particleCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── Topbar ───────────────────────────────────────────────────── */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  position: relative;
  z-index: 5;
  flex-shrink: 0;
}

.topbar-brand {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
}

.topbar-sep { color: var(--text-muted); font-size: 0.7rem; }

.topbar-sub {
  font-size: 0.78rem;
  color: var(--text-dim);
  font-weight: 500;
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.live-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--text-muted);
}

.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--seed-glow); opacity: 1; }
  50%      { box-shadow: 0 0 8px 3px var(--seed-glow); opacity: 0.7; }
}

.topbar-stat {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.topbar-stat b {
  color: var(--text-dim);
  font-weight: 600;
}

/* ── Sidebar: Ring Progress ───────────────────────────────────── */
.ring-section {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
}

.ring-wrap {
  width: 160px; height: 160px;
  margin: 0 auto;
  position: relative;
}

.ring-svg { width: 100%; height: 100%; }
.ring-track { fill: none; stroke: var(--slate-750); stroke-width: 4; }
.ring-arc {
  fill: none; stroke-width: 4; stroke-linecap: round;
  transition: stroke-dashoffset 0.8s cubic-bezier(0.22,0.61,0.36,1);
}
.ring-dashed {
  fill: none; stroke: var(--slate-600); stroke-width: 1;
  stroke-dasharray: 5 7; opacity: 0.3;
  animation: ringSpin 12s linear infinite;
  transform-origin: 50% 50%;
}
@keyframes ringSpin { to { transform: rotate(360deg); } }

.ring-center {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  text-align: center; pointer-events: none;
}

.ring-pct {
  font-size: 1.5rem; font-weight: 700;
  color: var(--text); line-height: 1.1;
}

.ring-label {
  font-size: 0.62rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em;
  margin-top: 2px;
}

.ring-phase-info { text-align: center; margin-top: 10px; }
.ring-phase-name {
  font-size: 0.76rem; font-weight: 600;
  color: var(--inv); /* updates dynamically */
}
.ring-phase-sub {
  font-size: 0.64rem; color: var(--text-muted); margin-top: 1px;
}

/* ── Sidebar: Phase List ──────────────────────────────────────── */
.phase-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.phase-list::-webkit-scrollbar { width: 4px; }
.phase-list::-webkit-scrollbar-track { background: transparent; }
.phase-list::-webkit-scrollbar-thumb { background: var(--slate-700); border-radius: 2px; }

.phase-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}

.phase-item:hover { background: var(--surface-2); }
.phase-item.selected { background: var(--surface-3); }
.phase-item.selected::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 0 2px 2px 0;
}

.phase-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
  transition: transform 0.2s, box-shadow 0.2s;
}

.phase-item:hover .phase-dot { transform: scale(1.2); }

.phase-dot.completed { background: var(--dot-color); border-color: var(--dot-color); }
.phase-dot.active {
  border-color: var(--dot-color);
  animation: dotPulse 2s ease-in-out infinite;
}
.phase-dot.pending { border-color: var(--text-muted); opacity: 0.5; }

@keyframes dotPulse {
  0%,100% { box-shadow: 0 0 3px var(--dot-glow); }
  50%     { box-shadow: 0 0 10px var(--dot-glow); }
}

.phase-text { flex: 1; min-width: 0; }
.phase-name {
  font-size: 0.78rem; font-weight: 600;
  color: var(--text); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}

.phase-meta {
  font-size: 0.64rem; color: var(--text-muted);
  display: flex; gap: 8px; margin-top: 1px;
}

.phase-progress-bar {
  width: 40px; height: 4px;
  background: var(--slate-750);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}

.phase-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ── Content Area ─────────────────────────────────────────────── */
.content-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 28px 32px 60px;
  position: relative;
  z-index: 2;
}

.content-area::-webkit-scrollbar { width: 5px; }
.content-area::-webkit-scrollbar-track { background: transparent; }
.content-area::-webkit-scrollbar-thumb { background: var(--slate-700); border-radius: 3px; }
.content-area::-webkit-scrollbar-thumb:hover { background: var(--slate-600); }

/* ── Phase Header ─────────────────────────────────────────────── */
.phase-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
  animation: fadeSlideIn 0.3s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.phase-icon {
  width: 42px; height: 42px;
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.phase-header-text { flex: 1; }
.phase-header-title {
  font-size: 1.3rem; font-weight: 700; color: var(--text);
}
.phase-header-desc {
  font-size: 0.82rem; color: var(--text-dim); margin-top: 2px;
}

.phase-header-stats {
  display: flex; gap: 16px;
}

.header-stat { text-align: center; }
.header-stat-val {
  font-size: 1.1rem; font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.header-stat-label {
  font-size: 0.62rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
}

/* ── Colored Connection Lines ─────────────────────────────────── */
.module-tree {
  position: relative;
  padding-left: 20px;
}

.tree-line-trunk {
  position: absolute;
  left: 9px; top: 0;
  width: 2px;
  background: var(--phase-line-color, var(--slate-700));
  border-radius: 1px;
  transition: height 0.3s ease;
  opacity: 0.5;
}

/* ── Sub-Module Card (hover = glassmorphism tooltip) ───────────── */
.module-card {
  position: relative;
  background: var(--surface-2);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  margin-bottom: 10px;
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
  animation: fadeSlideIn 0.3s ease both;
}

.module-card:hover {
  border-color: var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}

.module-card::before {
  content: '';
  position: absolute;
  left: -20px; top: 50%;
  width: 18px; height: 2px;
  background: var(--phase-line-color, var(--slate-700));
  opacity: 0.5;
}

.module-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  user-select: none;
}

.module-status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.module-status-dot.completed { background: var(--green); }
.module-status-dot.active {
  background: var(--amber);
  animation: statusBlink 1.5s ease-in-out infinite;
}
.module-status-dot.pending { background: var(--slate-600); }

@keyframes statusBlink {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.4; }
}

.module-card-name {
  font-size: 0.84rem; font-weight: 600;
  color: var(--text); flex: 1;
}

.module-card-badge {
  font-size: 0.62rem; font-weight: 600;
  padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.03em;
}

.module-card-badge.completed { background: rgba(52,211,153,0.12); color: var(--green); }
.module-card-badge.active    { background: rgba(251,191,36,0.12); color: var(--amber); }
.module-card-badge.pending   { background: rgba(100,116,160,0.12); color: var(--slate-400); }

.module-card-meta {
  font-size: 0.68rem;
  color: var(--text-muted);
  display: flex; gap: 10px;
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

.collapse-chevron {
  width: 16px; height: 16px;
  color: var(--text-muted);
  transition: transform 0.25s ease;
  flex-shrink: 0;
}

.module-card.expanded .collapse-chevron { transform: rotate(180deg); }

/* ── Collapsible Inner Content ────────────────────────────────── */
.module-card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.25s ease;
  padding: 0 16px;
}

.module-card.expanded .module-card-body {
  max-height: 600px;
  padding: 0 16px 16px;
}

.module-body-divider {
  height: 1px;
  background: var(--border-dim);
  margin-bottom: 14px;
}

.detail-steps { display: flex; flex-direction: column; gap: 6px; }

.detail-step {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 0.76rem;
  transition: background 0.15s;
}

.detail-step:hover { background: var(--surface-3); }

.detail-step-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.detail-step-dot.completed { background: var(--green); }
.detail-step-dot.active {
  background: var(--amber);
  animation: statusBlink 1.5s ease-in-out infinite;
}
.detail-step-dot.pending { background: var(--slate-600); }

.detail-step-name { color: var(--text-dim); flex: 1; }
.detail-step-status {
  font-size: 0.64rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  font-weight: 600;
}

.detail-step-status.completed { color: var(--green); }
.detail-step-status.active    { color: var(--amber); }
.detail-step-status.pending   { color: var(--slate-500); }

.module-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 14px;
}

.mini-metric {
  background: var(--surface-3);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  padding: 10px 8px;
  text-align: center;
}

.mini-metric-val {
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.mini-metric-label {
  font-size: 0.58rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* ── Glassmorphism Preview Tooltip ─────────────────────────────── */
.glass-tooltip {
  position: fixed;
  width: 280px;
  padding: 16px;
  border-radius: var(--radius-lg);
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 1000;

  /* Glassmorphism */
  background: rgba(20, 24, 41, 0.78);
  backdrop-filter: blur(18px) saturate(1.4);
  -webkit-backdrop-filter: blur(18px) saturate(1.4);
  border: 1px solid rgba(140, 160, 220, 0.14);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.45),
    0 1px 0 rgba(255,255,255,0.04) inset;
}

.glass-tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.glass-tooltip::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: inherit;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.05) 0%,
    transparent 50%,
    rgba(255,255,255,0.02) 100%
  );
  pointer-events: none;
}

.glass-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  position: relative;
}

.glass-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.glass-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.glass-badge {
  font-size: 0.58rem;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.glass-badge.completed { background: rgba(52,211,153,0.15); color: var(--green); }
.glass-badge.active    { background: rgba(251,191,36,0.15); color: var(--amber); }
.glass-badge.pending   { background: rgba(100,116,160,0.15); color: var(--slate-400); }

.glass-summary {
  font-size: 0.72rem;
  color: var(--slate-300);
  line-height: 1.5;
  margin-bottom: 12px;
  position: relative;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.glass-stats {
  display: flex;
  gap: 0;
  position: relative;
}

.glass-stat {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  border-radius: 6px;
  background: rgba(255,255,255,0.03);
}

.glass-stat + .glass-stat { margin-left: 6px; }

.glass-stat-val {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.glass-stat-label {
  font-size: 0.54rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 1px;
}

.glass-hint {
  margin-top: 10px;
  text-align: center;
  font-size: 0.6rem;
  color: var(--slate-500);
  letter-spacing: 0.03em;
}

.glass-progress-bar {
  width: 100%;
  height: 3px;
  background: var(--slate-750);
  border-radius: 2px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

.glass-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* ── Summary Metrics Bar (bottom of content) ──────────────────── */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 28px;
  animation: fadeSlideIn 0.4s ease 0.1s both;
}

.summary-tile {
  background: var(--surface-2);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  transition: border-color 0.2s, transform 0.2s;
}

.summary-tile:hover {
  border-color: var(--border);
  transform: translateY(-1px);
}

.summary-tile-val {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.summary-tile-label {
  font-size: 0.64rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 3px;
}

/* ── Keyboard Hint ────────────────────────────────────────────── */
.kb-hint {
  position: fixed;
  bottom: 12px; right: 20px;
  display: flex; gap: 6px; align-items: center;
  font-size: 0.68rem; color: var(--slate-500);
  z-index: 30;
}

.kb-key {
  display: inline-flex;
  align-items: center; justify-content: center;
  min-width: 22px; height: 20px;
  padding: 0 5px;
  border: 1px solid var(--slate-700);
  border-radius: 4px;
  background: var(--surface-2);
  font-size: 0.6rem; font-weight: 600;
  color: var(--text-muted);
}

/* ── Responsive ───────────────────────────────────────────────── */
@media (max-width: 860px) {
  .sidebar { display: none; }
  .module-metrics { grid-template-columns: repeat(2, 1fr); }
  .summary-bar { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<div class="shell">
  <!-- ── Sidebar ───────────────────────────────────── -->
  <aside class="sidebar">
    <div class="ring-section">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 160 160">
          <circle class="ring-dashed" cx="80" cy="80" r="72"/>
          <circle class="ring-track" cx="80" cy="80" r="62"/>
          <circle class="ring-arc" id="ringArc" cx="80" cy="80" r="62"
                  stroke-dasharray="389.56" stroke-dashoffset="389.56"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">0%</div>
          <div class="ring-label">Overall</div>
        </div>
      </div>
      <div class="ring-phase-info">
        <div class="ring-phase-name" id="ringPhaseName">Invention Loop</div>
        <div class="ring-phase-sub" id="ringPhaseSub">Paper Text Gen in progress</div>
      </div>
    </div>
    <div class="phase-list" id="phaseList"></div>
  </aside>

  <!-- ── Main ──────────────────────────────────────── -->
  <div class="main-area">
    <div class="topbar">
      <span class="topbar-brand">AI Inventor</span>
      <span class="topbar-sep">/</span>
      <span class="topbar-sub" id="topbarPhase">Invention Loop</span>
      <div class="topbar-right">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span>LIVE</span>
        </div>
        <span class="topbar-stat">Run <b>#047</b></span>
        <span class="topbar-stat">Elapsed <b id="elapsedTime">02:14:38</b></span>
        <span class="topbar-stat">Cost <b id="totalCost">$12.47</b></span>
      </div>
    </div>

    <div class="content-area" id="contentArea"></div>
  </div>
</div>

<!-- Glassmorphism tooltip (repositioned via JS) -->
<div class="glass-tooltip" id="glassTooltip">
  <div class="glass-header">
    <span class="glass-dot" id="glassDot"></span>
    <span class="glass-name" id="glassName"></span>

<script>

}

        [Met('312','Candidates'), Met('24','Selected'), Met('0.73','Novelty'), Met('0.68','Feasibility')])

    progress: 100, totalDuration: '34m 16s', totalCost: '$3.92',
    modules: [

/* ====================================================================
   STATE
   ==================================================================== */
let selectedPhaseIdx = 2;
let expandedModules = new Set();
let hoveredCard = null;
let tooltipVisible = false;

/* ====================================================================
   SIDEBAR RENDERING
   ==================================================================== */
function renderSidebar() {
  const list = document.getElementById('phaseList');
  list.innerHTML = '';

  PHASES.forEach((phase, pi) => {
    const el = document.createElement('div');
    el.className = 'phase-item' + (pi === selectedPhaseIdx ? ' selected' : '');
    el.style.setProperty('--dot-color', phase.color);
    el.style.setProperty('--dot-glow', phase.glow);
    if (pi === selectedPhaseIdx) {
      el.style.setProperty('--before-bg', phase.color);
      el.querySelector?.('::before')?.style?.setProperty('background', phase.color);
    }

    const dotStatus = phase.progress === 100 ? 'completed' : phase.progress > 0 ? 'active' : 'pending';

    el.innerHTML = `
      <span class="phase-dot ${dotStatus}" style="--dot-color:${phase.color};--dot-glow:${phase.glow}"></span>
      <div class="phase-text">
        <div class="phase-name">${phase.icon} ${phase.label}</div>
        <div class="phase-meta">
          <span>${phase.totalDuration}</span>
          <span>${phase.totalCost}</span>
        </div>
      </div>
      <div class="phase-progress-bar">
        <div class="phase-progress-fill" style="width:${phase.progress}%;background:${phase.color}"></div>
      </div>
    `;

    /* Color the left bar for selected */
    if (pi === selectedPhaseIdx) {
      const bar = document.createElement('div');
      bar.style.cssText = `position:absolute;left:0;top:0;bottom:0;width:3px;
        border-radius:0 2px 2px 0;background:${phase.color}`;
      el.appendChild(bar);
    }

    el.addEventListener('click', () => {
      selectedPhaseIdx = pi;
      expandedModules.clear();
      renderSidebar();
      renderContent();
      updateRing();
      updateTopbar();
    });

    list.appendChild(el);
  });
}

/* ====================================================================
   RING UPDATE
   ==================================================================== */
function updateRing() {
  const totalProgress = PHASES.reduce((s, p) => s + p.progress, 0) / PHASES.length;
  const circumference = 2 * Math.PI * 62; // ~389.56
  const offset = circumference * (1 - totalProgress / 100);

  const arc = document.getElementById('ringArc');
  arc.style.stroke = PHASES[selectedPhaseIdx].color;
  arc.style.filter = `drop-shadow(0 0 4px ${PHASES[selectedPhaseIdx].glow})`;
  arc.style.strokeDashoffset = offset;

  document.getElementById('ringPct').textContent = Math.round(totalProgress) + '%';

  const phase = PHASES[selectedPhaseIdx];
  const nameEl = document.getElementById('ringPhaseName');
  nameEl.textContent = phase.label;
  nameEl.style.color = phase.color;

  const activeModule = phase.modules.find(m => m.status === 'active');
  document.getElementById('ringPhaseSub').textContent =
    activeModule ? activeModule.name + ' in progress' : phase.progress === 100 ? 'Complete' : 'Pending';
}

/* ====================================================================
   TOPBAR UPDATE
   ==================================================================== */
function updateTopbar() {
  document.getElementById('topbarPhase').textContent = PHASES[selectedPhaseIdx].label;
}

/* ====================================================================
   CONTENT RENDERING
   ==================================================================== */
function renderContent() {
  const area = document.getElementById('contentArea');
  const phase = PHASES[selectedPhaseIdx];

  let html = '';

  /* Phase Header */
  html += `
    <div class="phase-header">
      <div class="phase-icon" style="background:${phase.bg};color:${phase.color};
        box-shadow:0 0 0 1px ${phase.color}22">${phase.icon}</div>
      <div class="phase-header-text">
        <div class="phase-header-title">${phase.label}</div>
        <div class="phase-header-desc">${phase.desc}</div>
      </div>
      <div class="phase-header-stats">
        <div class="header-stat">
          <div class="header-stat-val" style="color:${phase.color}">${phase.progress}%</div>
          <div class="header-stat-label">Progress</div>
        </div>
        <div class="header-stat">
          <div class="header-stat-val" style="color:${phase.color}">${phase.modules.length}</div>
          <div class="header-stat-label">Modules</div>
        </div>
      </div>
    </div>
  `;

  /* Module Tree */
  html += `<div class="module-tree" style="--phase-line-color:${phase.color}">`;
  html += `<div class="tree-line-trunk" id="treeTrunk"></div>`;

  phase.modules.forEach((mod, mi) => {
    const key = `${phase.id}-${mi}`;
    const expanded = expandedModules.has(key);
    const statusColor = mod.status === 'completed' ? 'var(--green)'
                      : mod.status === 'active' ? 'var(--amber)' : 'var(--slate-600)';

    html += `
      <div class="module-card ${expanded ? 'expanded' : ''}"
           data-phase="${selectedPhaseIdx}" data-mod="${mi}" data-key="${key}"
           style="animation-delay:${mi * 0.06}s">
        <div class="module-card-header" data-key="${key}">
          <span class="module-status-dot ${mod.status}"></span>
          <span class="module-card-name">${mod.name}</span>
          <span class="module-card-badge ${mod.status}">${mod.status}</span>
          <span class="module-card-meta">
            <span>${mod.duration}</span>
            <span>${mod.cost}</span>
          </span>
          <svg class="collapse-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </div>
        <div class="module-card-body">
          <div class="module-body-divider"></div>
          <div class="detail-steps">
            ${mod.details.map(d => `
              <div class="detail-step">
                <span class="detail-step-dot ${d.status}"></span>
                <span class="detail-step-name">${d.name}</span>
                <span class="detail-step-status ${d.status}">${d.status}</span>
              </div>
            `).join('')}
          </div>
          <div class="module-metrics">
            ${mod.metrics.map(m => `
              <div class="mini-metric">
                <div class="mini-metric-val">${m.value}</div>
                <div class="mini-metric-label">${m.label}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>'; /* end module-tree */

  /* Summary Metrics */
  const completedMods = phase.modules.filter(m => m.status === 'completed').length;
  const activeMods = phase.modules.filter(m => m.status === 'active').length;
  const totalSteps = phase.modules.reduce((s, m) => s + m.details.length, 0);
  const doneSteps = phase.modules.reduce((s, m) => s + m.details.filter(d => d.status === 'completed').length, 0);

  html += `
    <div class="summary-bar">
      <div class="summary-tile">
        <div class="summary-tile-val" style="color:${phase.color}">${completedMods}/${phase.modules.length}</div>
        <div class="summary-tile-label">Modules Done</div>
      </div>
      <div class="summary-tile">
        <div class="summary-tile-val" style="color:${phase.color}">${doneSteps}/${totalSteps}</div>
        <div class="summary-tile-label">Steps Done</div>
      </div>
      <div class="summary-tile">
        <div class="summary-tile-val" style="color:${phase.color}">${phase.totalDuration}</div>
        <div class="summary-tile-label">Duration</div>
      </div>
      <div class="summary-tile">
        <div class="summary-tile-val" style="color:${phase.color}">${phase.totalCost}</div>
        <div class="summary-tile-label">Cost</div>
      </div>
    </div>
  `;

  area.innerHTML = html;

  /* Fix trunk height */
  requestAnimationFrame(() => {
    const trunk = document.getElementById('treeTrunk');
    const cards = area.querySelectorAll('.module-card');
    if (trunk && cards.length > 0) {
      const first = cards[0].getBoundingClientRect();
      const last = cards[cards.length - 1].getBoundingClientRect();
      const treeRect = trunk.parentElement.getBoundingClientRect();
      trunk.style.height = (last.top + last.height / 2 - first.top + first.height / 2) + 'px';
      trunk.style.top = (first.top - treeRect.top + first.height / 2) + 'px';
    }
  });

  /* Wire click-to-collapse and hover events */
  area.querySelectorAll('.module-card-header').forEach(hdr => {
    hdr.addEventListener('click', (e) => {
      const key = hdr.dataset.key;
      if (expandedModules.has(key)) {
        expandedModules.delete(key);
      } else {
        expandedModules.add(key);
      }
      renderContent();
    });
  });

  area.querySelectorAll('.module-card').forEach(card => {
    card.addEventListener('mouseenter', (e) => showGlassTooltip(card, e));
    card.addEventListener('mousemove', (e) => moveGlassTooltip(e));
    card.addEventListener('mouseleave', () => hideGlassTooltip());
  });
}

/* ====================================================================
   GLASSMORPHISM TOOLTIP
   ==================================================================== */
const tooltip = document.getElementById('glassTooltip');

function showGlassTooltip(card, e) {
  const pi = parseInt(card.dataset.phase);
  const mi = parseInt(card.dataset.mod);
  const phase = PHASES[pi];
  const mod = phase.modules[mi];

  /* Dot color */
  const dot = document.getElementById('glassDot');
  const statusColor = mod.status === 'completed' ? 'var(--green)'
                    : mod.status === 'active' ? 'var(--amber)' : 'var(--slate-600)';
  dot.style.background = statusColor;

  /* Name */
  document.getElementById('glassName').textContent = mod.name;

  /* Badge */
  const badge = document.getElementById('glassBadge');
  badge.textContent = mod.status;
  badge.className = 'glass-badge ' + mod.status;

  /* Progress bar */
  const fill = document.getElementById('glassProgressFill');
  fill.style.width = mod.progress + '%';
  fill.style.background = phase.color;

  /* Summary */
  document.getElementById('glassSummary').textContent = mod.summary;

  /* Stats: Duration & Cost */
  document.getElementById('glassStats').innerHTML = `
    <div class="glass-stat">
      <div class="glass-stat-val">${mod.duration}</div>
      <div class="glass-stat-label">Duration</div>
    </div>
    <div class="glass-stat">
      <div class="glass-stat-val">${mod.cost}</div>
      <div class="glass-stat-label">Cost</div>
    </div>
    <div class="glass-stat">
      <div class="glass-stat-val">${mod.progress}%</div>
      <div class="glass-stat-label">Progress</div>
    </div>
  `;

  positionTooltip(e);
  tooltip.classList.add('visible');
  tooltipVisible = true;
}

function moveGlassTooltip(e) {
  if (!tooltipVisible) return;
  positionTooltip(e);
}

function positionTooltip(e) {
  const pad = 16;
  const tw = 280;
  const th = tooltip.offsetHeight || 200;
  let x = e.clientX + pad;
  let y = e.clientY - th / 2;

  /* Keep on screen */
  if (x + tw > window.innerWidth - pad) {
    x = e.clientX - tw - pad;
  }
  if (y < pad) y = pad;
  if (y + th > window.innerHeight - pad) {
    y = window.innerHeight - th - pad;
  }

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideGlassTooltip() {
  tooltip.classList.remove('visible');
  tooltipVisible = false;
}

/* ====================================================================
   KEYBOARD NAVIGATION
   ==================================================================== */
document.addEventListener('keydown', (e) => {
  const phase = PHASES[selectedPhaseIdx];
  if (!phase) return;

  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    const dir = e.key === 'ArrowDown' ? 1 : -1;
    const newIdx = selectedPhaseIdx + dir;
    if (newIdx >= 0 && newIdx < PHASES.length) {
      selectedPhaseIdx = newIdx;
      expandedModules.clear();
      renderSidebar();
      renderContent();
      updateRing();
      updateTopbar();
    }
  }

  if (e.key === 'Enter') {
    /* Toggle first non-expanded module, or collapse all */
    const cards = document.querySelectorAll('.module-card');
    let toggled = false;
    cards.forEach((card, i) => {
      const key = card.dataset.key;
      if (!toggled && !expandedModules.has(key)) {
        expandedModules.add(key);
        toggled = true;
      }
    });
    if (!toggled) {
      /* All expanded, collapse all */
      expandedModules.clear();
    }
    renderContent();
  }

  if (e.key === 'Escape') {
    expandedModules.clear();
    renderContent();
    hideGlassTooltip();
  }
});

/* ====================================================================
   PARTICLE SYSTEM
   ==================================================================== */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animFrame;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function createParticles() {
  particles = [];
  const count = Math.floor((canvas.width * canvas.height) / 18000);
  const phaseColors = ['#34d399','#a78bfa','#60a5fa','#f472b6'];

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      color: phaseColors[Math.floor(Math.random() * phaseColors.length)],
      alpha: Math.random() * 0.25 + 0.05
    });
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  /* Draw connecting lines between close particles */
  const maxDist = 100;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.06;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = particles[i].color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        /* Convert hex to rgba for line color */
        const hex = particles[i].color;
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }

  /* Draw particles */
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    const hex = p.color;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha})`;
    ctx.fill();

    /* Move */
    p.x += p.vx;
    p.y += p.vy;

    /* Wrap */
    if (p.x < -5) p.x = canvas.width + 5;
    if (p.x > canvas.width + 5) p.x = -5;
    if (p.y < -5) p.y = canvas.height + 5;
    if (p.y > canvas.height + 5) p.y = -5;
  }

  animFrame = requestAnimationFrame(drawParticles);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  createParticles();
});

resizeCanvas();
createParticles();
drawParticles();

/* ====================================================================
   ELAPSED TIME TICKER
   ==================================================================== */
let elapsedSeconds = 2 * 3600 + 14 * 60 + 38;
setInterval(() => {
  elapsedSeconds++;
  const h = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
  const s = String(elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('elapsedTime').textContent = `${h}:${m}:${s}`;
}, 1000);

/* ====================================================================
   INIT
   ==================================================================== */
renderSidebar();
renderContent();
updateRing();
updateTopbar();
</script>
