<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra Pipeline (Glass + Tints + Breadcrumbs)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #181b22;
  --surface-hi: #242830;
  --border: rgba(46, 52, 64, 0.8);
  --border-lite: rgba(60, 68, 82, 0.6);

  /* Glassmorphism tokens — strong values */
  --glass: rgba(28, 32, 42, 0.48);
  --glass-strong: rgba(22, 26, 34, 0.62);
  --glass-border: rgba(120, 140, 190, 0.13);
  --glass-border-hi: rgba(140, 160, 210, 0.2);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.03) 40%, transparent 60%);
  --glass-blur: 18px;
  --glass-blur-strong: 24px;

  --text-100: #e8ebf2;
  --text-200: #b4bccf;
  --text-300: #8a94aa;
  --text-400: #5e6878;
  --text-500: #3e4555;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --purple-glow: rgba(167,139,250,0.28);
  --purple-deep: rgba(167,139,250,0.55);
  --purple-tint: rgba(167,139,250,0.06);
  --purple-tint-strong: rgba(167,139,250,0.10);

  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --blue-glow: rgba(59,130,246,0.28);
  --blue-deep: rgba(59,130,246,0.55);
  --blue-tint: rgba(59,130,246,0.06);
  --blue-tint-strong: rgba(59,130,246,0.10);

  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.12);
  --orange-glow: rgba(245,158,11,0.28);
  --orange-deep: rgba(245,158,11,0.55);
  --orange-tint: rgba(245,158,11,0.05);
  --orange-tint-strong: rgba(245,158,11,0.09);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #ef4444;

  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 7px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --header-h: 52px;
  --sidebar-collapsed: 52px;
  --sidebar-expanded: 250px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* Subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(100,116,155,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,155,0.02) 1px, transparent 1px);
  background-size: 56px 56px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   PROMINENT BREADCRUMB HEADER (52px, full glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(15, 17, 23, 0.72);
  backdrop-filter: blur(var(--glass-blur-strong)) saturate(1.5);
  -webkit-backdrop-filter: blur(var(--glass-blur-strong)) saturate(1.5);
  border-bottom: 1px solid var(--glass-border-hi);
  display: flex; align-items: center; padding: 0 22px;
  z-index: 1000; gap: 0;
}
/* Glass shine on header */
.header::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}

.header-brand {
  font-weight: 800; font-size: 14px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap; flex-shrink: 0;
  margin-right: 6px;
}

/* Prominent breadcrumb — larger, centered, with glass pill backgrounds */
.breadcrumb {
  display: flex; align-items: center; gap: 4px; font-size: 12.5px;
  flex: 1; justify-content: center; position: relative;
}
.breadcrumb .crumb {
  color: var(--text-400); padding: 4px 10px; border-radius: 6px;
  transition: all 0.2s; cursor: pointer; white-space: nowrap;
}
.breadcrumb .crumb:hover {
  color: var(--text-200);
  background: rgba(255,255,255,0.04);
}
.breadcrumb .crumb.active {
  color: var(--text-100); font-weight: 600;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.06);
}
.breadcrumb .crumb.active.purple-crumb {
  background: rgba(167,139,250,0.1);
  border-color: rgba(167,139,250,0.15);
  color: var(--purple);
}
.breadcrumb .crumb.active.blue-crumb {
  background: rgba(59,130,246,0.1);
  border-color: rgba(59,130,246,0.15);
  color: var(--blue);
}
.breadcrumb .crumb.active.orange-crumb {
  background: rgba(245,158,11,0.1);
  border-color: rgba(245,158,11,0.15);
  color: var(--orange);
}
.breadcrumb .sep {
  color: rgba(100,116,155,0.3); font-size: 11px;
  margin: 0 2px; user-select: none;
}
.breadcrumb .crumb-icon {
  display: inline-flex; margin-right: 4px; font-size: 11px;
}

.header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.header-stat {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.header-stat .val.cost { color: var(--green); }
.header-stat .val.tokens { color: var(--purple); }
.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 4px 10px;
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15);
  border-radius: 6px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.3); }
  50% { opacity: 1; box-shadow: 0 0 10px rgba(239,68,68,0.6); }
}

/* ================================================================
   GLASSMORPHISM SIDEBAR (52px -> 250px on hover)
   ================================================================ */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-collapsed);
  background: rgba(15, 17, 23, 0.68);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-right: 1px solid var(--glass-border);
  z-index: 900; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden; display: flex; flex-direction: column;
  padding: 14px 0 18px; gap: 2px;
}
.sidebar::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 30%);
  pointer-events: none;
}
.sidebar:hover { width: var(--sidebar-expanded); }

/* Progress ring in sidebar */
.sidebar-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0 14px; flex-shrink: 0;
}
.sidebar-ring { width: 34px; height: 34px; position: relative; flex-shrink: 0; }
.sidebar-ring svg { width: 100%; height: 100%; }
.sidebar-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.sidebar-ring .ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease;
  filter: drop-shadow(0 0 4px var(--blue-deep));
}
.sidebar-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 8px; font-weight: 700; color: var(--text-100);
}
.sidebar-ring-text {
  font-size: 11px; color: var(--text-400); font-weight: 500;
  white-space: nowrap; margin-left: 10px;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-ring-text { opacity: 1; }

.sidebar-divider {
  width: 30px; height: 1px; background: var(--glass-border);
  margin: 4px auto 10px; flex-shrink: 0;
  transition: width 0.3s ease;
}
.sidebar:hover .sidebar-divider { width: calc(100% - 28px); }

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer; transition: var(--transition);
  white-space: nowrap; position: relative; flex-shrink: 0;
}
.sidebar-item:hover { background: rgba(100,116,155,0.06); }
.sidebar-item.active { background: rgba(59,130,246,0.06); }
.sidebar-item .indicator {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; border-radius: 0 3px 3px 0;
  transition: height 0.25s ease;
}
.sidebar-item.active .indicator { height: 20px; }
.sidebar-item[data-color="purple"] .indicator { background: var(--purple); }
.sidebar-item[data-color="blue"] .indicator { background: var(--blue); }
.sidebar-item[data-color="orange"] .indicator { background: var(--orange); }
.sidebar-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  position: relative;
}
.sidebar-dot.done { background: var(--green); opacity: 0.7; }
.sidebar-dot.running { background: var(--blue); animation: sbDotPulse 2s ease-in-out infinite; }
.sidebar-dot.pending { background: transparent; border: 1.5px solid var(--text-500); }
@keyframes sbDotPulse {
  0%, 100% { box-shadow: 0 0 4px var(--blue-glow); }
  50% { box-shadow: 0 0 12px var(--blue-glow), 0 0 20px rgba(59,130,246,0.15); }
}
.sidebar-label {
  font-size: 12px; color: var(--text-300); font-weight: 500;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.main {
  margin-left: var(--sidebar-collapsed); margin-top: var(--header-h);
  padding: 28px 32px 70px;
  position: relative; z-index: 1;
  max-width: 1440px;
}

/* ================================================================
   STRONG SECTION BACKGROUND TINTS (per-module color washes)
   ================================================================ */
.section-tint {
  position: absolute; pointer-events: none;
  border-radius: 40px; filter: blur(80px); z-index: -1;
}
.section-tint.purple-tint-1 {
  background: rgba(167,139,250,0.07); top: -40px; left: -60px; right: 60%;
  height: 360px;
}
.section-tint.purple-tint-2 {
  background: rgba(167,139,250,0.04); top: 80px; left: 5%; right: 40%;
  height: 240px;
}
.section-tint.blue-tint-1 {
  background: rgba(59,130,246,0.08); top: 60px; left: 20%; right: 20%;
  height: 420px;
}
.section-tint.blue-tint-2 {
  background: rgba(59,130,246,0.04); top: 200px; left: 30%; right: 10%;
  height: 280px;
}
.section-tint.orange-tint-1 {
  background: rgba(245,158,11,0.05); top: -20px; left: 55%; right: -40px;
  height: 340px;
}
.section-tint.orange-tint-2 {
  background: rgba(245,158,11,0.03); top: 120px; left: 60%; right: -20px;
  height: 240px;
}
/* Tree area tints */
.section-tint.tree-purple-tint {
  background: rgba(167,139,250,0.05); top: 200px; left: -40px; right: 68%;
  height: 500px;
}
.section-tint.tree-blue-tint {
  background: rgba(59,130,246,0.06); top: 260px; left: 24%; right: 28%;
  height: 500px;
}
.section-tint.tree-orange-tint {
  background: rgba(245,158,11,0.04); top: 230px; left: 60%; right: -30px;
  height: 500px;
}

/* ================================================================
   3 HORIZONTAL MODULE CARDS (full glassmorphism)
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-bottom: 8px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 16px 18px 14px; transition: all 0.35s ease; overflow: hidden;
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
/* Strong colored tint overlay on each card */
.mod-card .card-tint {
  position: absolute; inset: 0; border-radius: var(--radius);
  pointer-events: none; z-index: 0; opacity: 0.6;
  transition: opacity 0.4s ease;
}
.mod-card[data-color="purple"] .card-tint { background: linear-gradient(135deg, rgba(167,139,250,0.08) 0%, transparent 70%); }
.mod-card[data-color="blue"] .card-tint { background: linear-gradient(135deg, rgba(59,130,246,0.08) 0%, transparent 70%); }
.mod-card[data-color="orange"] .card-tint { background: linear-gradient(135deg, rgba(245,158,11,0.07) 0%, transparent 70%); }
.mod-card.active .card-tint { opacity: 1; }
.mod-card:hover .card-tint { opacity: 1; }

/* Glow halo behind card */
.mod-card .glow-halo {
  position: absolute; inset: -28px; border-radius: 32px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(36px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.14; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.2; } }

/* Inner glow */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 40px 10px var(--purple-dim), inset 0 0 20px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 40px 10px var(--blue-dim), inset 0 0 20px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 40px 10px var(--orange-dim), inset 0 0 20px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

/* Shimmer sweep on active */
.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(100,116,155,0.24); transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.06; }
.mod-card.active { border-color: rgba(255,255,255,0.1); }

/* Card internals */
.mc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; position: relative; z-index: 3; }
.mc-icon { font-size: 15px; flex-shrink: 0; }
.mc-name { font-size: 13.5px; font-weight: 700; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
  backdrop-filter: blur(6px);
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(59,130,246,0.2); } }

.mc-metrics { display: flex; align-items: center; gap: 12px; margin-bottom: 9px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* Mini ring gauge 30px */
.mc-ring { width: 30px; height: 30px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; }
.mc-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.mc-ring .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease; }
.mc-ring .ring-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7.5px; font-weight: 700; color: var(--text-200);
}

/* Progress bar at bottom */
.mc-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 8px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 8px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 8px var(--orange-deep); }

/* ================================================================
   TREE AREA (3 columns, one per module)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; position: relative; min-height: 100px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.1s; }
.tree-col:nth-child(3) { animation-delay: 0.2s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Tree vertical trunk line */
.tree-trunk {
  position: relative; padding-left: 24px;
  display: flex; flex-direction: column; gap: 4px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 20px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.2); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.2); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.2); }

/* Glow active branch */
.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.5); box-shadow: 0 0 8px rgba(167,139,250,0.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.5); box-shadow: 0 0 8px rgba(59,130,246,0.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.5); box-shadow: 0 0 8px rgba(245,158,11,0.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ================================================================
   GLASSMORPHISM SUB-MODULE CARDS (46px)
   ================================================================ */
.sub-card {
  height: 46px; display: flex; align-items: center; gap: 10px;
  padding: 0 13px; position: relative; border-radius: var(--radius-xs);
  background: var(--glass);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-12px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius-xs);
  background: var(--glass-shine); pointer-events: none; z-index: 0;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* L-shaped branch connector from trunk */
.sub-card::before {
  content: ''; position: absolute; left: -14px; top: 50%;
  width: 14px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.2); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.2); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.2); }

/* Done sub: subtle glass */
.sub-card.done-sub {
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(10px);
}

/* Active sub: colored glass tint + glow border */
.sub-card.active-sub { border-color: rgba(255,255,255,0.06); }
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.08);
  border-color: rgba(167,139,250,0.22);
  box-shadow: 0 0 22px rgba(167,139,250,0.1), 0 2px 10px rgba(0,0,0,0.25);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.08);
  border-color: rgba(59,130,246,0.22);
  box-shadow: 0 0 22px rgba(59,130,246,0.1), 0 2px 10px rgba(0,0,0,0.25);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.08);
  border-color: rgba(245,158,11,0.22);
  box-shadow: 0 0 22px rgba(245,158,11,0.1), 0 2px 10px rgba(0,0,0,0.25);
}

/* Shimmer overlay */
.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.025) 46%, rgba(255,255,255,0.06) 50%,
    rgba(255,255,255,0.025) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Inner glow pulse */
.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  animation: subGlowPulse 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 20px rgba(167,139,250,0.06); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 20px rgba(59,130,246,0.06); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 20px rgba(245,158,11,0.06); }
@keyframes subGlowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* Pending sub */
.sub-card.pending-sub {
  background: rgba(255,255,255,0.01);
  backdrop-filter: blur(6px); opacity: 0.45;
}
.sub-card.pending-sub.visible { opacity: 0.45; }

/* Left accent stripe */
.sub-card .accent-stripe {
  position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 2.5px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub .accent-stripe { opacity: 1; }
.sub-card.done-sub .accent-stripe { opacity: 0.3; }
.sub-card[data-pcolor="purple"] .accent-stripe { background: var(--purple); }
.sub-card[data-pcolor="blue"] .accent-stripe { background: var(--blue); }
.sub-card[data-pcolor="orange"] .accent-stripe { background: var(--orange); }

/* Hover lift */
.sub-card:not(.pending-sub):hover { transform: translateY(-1px); border-color: var(--glass-border-hi); }

/* Sub-card internals */
.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
  position: relative; z-index: 2;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] {
  background: var(--blue); box-shadow: 0 0 10px rgba(59,130,246,0.5);
}
.sub-dot.running[data-pcolor="purple"] {
  background: var(--purple); box-shadow: 0 0 10px rgba(167,139,250,0.5);
}
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

/* Spinner */
.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0; position: relative; z-index: 2;
  border: 2px solid rgba(59,130,246,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin {
  border-color: rgba(167,139,250,0.15);
  border-top-color: var(--purple);
}
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 11.5px; color: var(--text-300); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1;
  position: relative; z-index: 2;
}
.sub-card.active-sub .sub-label { color: var(--text-100); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-300); }

.sub-meta {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums;
  position: relative; z-index: 2;
}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

.sub-micro-badge {
  font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-left: 4px;
  position: relative; z-index: 2;
  backdrop-filter: blur(4px);
}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }

/* ================================================================
   LEVEL 3: ITEM CHECKLIST (32px) — glass items
   ================================================================ */
.level3-wrap {
  padding-left: 26px; position: relative; overflow: hidden;
  max-height: 500px; transition: max-height 0.4s ease;
}
.level3-wrap::before {
  content: ''; position: absolute; left: 11px; top: 0;
  width: 1px; height: calc(100% - 12px);
}
.tree-trunk[data-color="purple"] .level3-wrap::before { background: rgba(167,139,250,0.12); }
.tree-trunk[data-color="blue"] .level3-wrap::before { background: rgba(59,130,246,0.12); }
.tree-trunk[data-color="orange"] .level3-wrap::before { background: rgba(245,158,11,0.12); }

.level3-item {
  height: 32px; display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; color: var(--text-400); position: relative;
  padding: 0 8px; border-radius: 5px;
  background: rgba(255,255,255,0.015);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.02);
  margin-bottom: 2px;
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level3-item.visible { opacity: 1; transform: translateX(0); }
.level3-item:hover { background: rgba(255,255,255,0.03); border-color: var(--glass-border); }
.level3-item::before {
  content: ''; position: absolute; left: -11px; top: 50%;
  width: 11px; height: 1px;
}
.tree-trunk[data-color="blue"] .level3-item::before { background: rgba(59,130,246,0.12); }
.tree-trunk[data-color="purple"] .level3-item::before { background: rgba(167,139,250,0.12); }
.tree-trunk[data-color="orange"] .level3-item::before { background: rgba(245,158,11,0.12); }

.l3-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.l3-dot.done { background: var(--green); opacity: 0.5; }
.l3-dot.running { background: var(--blue); animation: l3Pulse 2s ease-in-out infinite; }
.l3-dot.pending { border: 1px solid var(--text-500); opacity: 0.35; }
@keyframes l3Pulse {
  0%, 100% { box-shadow: 0 0 4px rgba(59,130,246,0.4); }
  50% { box-shadow: 0 0 10px rgba(59,130,246,0.7); }
}
.l3-label { flex: 1; }
.l3-meta { font-size: 9px; color: var(--text-500); font-variant-numeric: tabular-nums; }

/* Collapsed tree */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {
  display: none; padding: 10px 16px; font-size: 11px; color: var(--text-400);
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 8px;
}
.tree-collapsed-bar::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius-sm);
  background: var(--glass-shine); pointer-events: none;
}
.tree-collapsed-bar { position: relative; overflow: hidden; }
.tree-collapsed-bar:hover { color: var(--text-300); border-color: var(--glass-border-hi); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }
.tree-col .collapse-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-400); cursor: pointer;
  padding: 2px 0 8px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* ================================================================
   GLASSMORPHISM TOOLTIP (420px)
   ================================================================ */
.tooltip-portal {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 420px; opacity: 0; transform: translateY(8px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.tooltip-portal.visible { opacity: 1; transform: translateY(0); }
.tooltip-inner {
  background: rgba(15, 17, 23, 0.88);
  backdrop-filter: blur(28px) saturate(1.3);
  -webkit-backdrop-filter: blur(28px) saturate(1.3);
  border: 1px solid var(--glass-border-hi);
  border-radius: var(--radius); padding: 18px 22px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03);
  position: relative; overflow: hidden;
}
.tooltip-inner::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}
.tooltip-title {
  font-size: 13px; font-weight: 600; color: var(--text-100); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px; position: relative;
}
.tooltip-summary { font-size: 12px; color: var(--text-300); line-height: 1.6; margin-bottom: 12px; position: relative; }
.tooltip-stats { display: flex; gap: 18px; position: relative; }
.tooltip-stat-val { font-size: 17px; font-weight: 700; color: var(--text-100); }
.tooltip-stat-label { font-size: 10px; color: var(--text-400); }

/* ================================================================
   GLASSMORPHISM DASHBOARD PANEL
   ================================================================ */
.dashboard-panel {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  margin-top: 24px;
}
.dashboard-panel.open { max-height: 650px; opacity: 1; }

.dashboard-inner {
  display: grid; grid-template-columns: 3fr 2fr; gap: 26px;
  background: var(--glass-strong);
  backdrop-filter: blur(var(--glass-blur-strong)) saturate(1.3);
  -webkit-backdrop-filter: blur(var(--glass-blur-strong)) saturate(1.3);
  border: 1px solid var(--glass-border-hi);
  border-radius: var(--radius); padding: 26px;
  position: relative;
  animation: dashSlide 0.3s ease-out;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}
@keyframes dashSlide {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.dashboard-inner .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}
/* Colored tint wash on dashboard */
.dashboard-inner .dash-tint {
  position: absolute; inset: 0; border-radius: var(--radius);
  pointer-events: none; opacity: 0.5; z-index: 0;
}
.dashboard-inner.purple-dash .dash-tint { background: linear-gradient(135deg, rgba(167,139,250,0.06), transparent 60%); }
.dashboard-inner.blue-dash .dash-tint { background: linear-gradient(135deg, rgba(59,130,246,0.06), transparent 60%); }
.dashboard-inner.orange-dash .dash-tint { background: linear-gradient(135deg, rgba(245,158,11,0.05), transparent 60%); }

.dash-close {
  position: absolute; top: 14px; right: 16px;
  width: 26px; height: 26px; border-radius: 7px; border: none;
  background: rgba(100,116,155,0.1); color: var(--text-400);
  backdrop-filter: blur(8px);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: var(--transition); z-index: 10;
}
.dash-close:hover { background: rgba(100,116,155,0.2); color: var(--text-100); }

.dash-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px; position: relative; z-index: 1;
}
.dash-summary {
  font-size: 13px; color: var(--text-200); line-height: 1.7;
  margin-bottom: 16px; padding: 14px 16px;
  background: rgba(15, 17, 23, 0.45);
  backdrop-filter: blur(10px);
  border-radius: var(--radius-sm);
  border-left: 2.5px solid var(--blue);
  border: 1px solid var(--glass-border);
  position: relative; z-index: 1;
}
.dash-summary.purple-accent { border-left: 2.5px solid var(--purple); }
.dash-summary.blue-accent { border-left: 2.5px solid var(--blue); }
.dash-summary.orange-accent { border-left: 2.5px solid var(--orange); }

.dash-item-list { list-style: none; position: relative; z-index: 1; }
.dash-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; font-size: 12px; color: var(--text-300);
  border-bottom: 1px solid rgba(100,116,155,0.06);
}
.dash-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* Glass stat cards in dashboard */
.dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; position: relative; z-index: 1; }
.dash-stat-card {
  background: rgba(15, 17, 23, 0.4);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-sm);
  padding: 14px 16px; text-align: center;
  border: 1px solid var(--glass-border);
  position: relative; overflow: hidden;
}
.dash-stat-card::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius-sm);
  background: var(--glass-shine); pointer-events: none;
}
.dash-stat-val { font-size: 23px; font-weight: 700; color: var(--text-100); font-variant-numeric: tabular-nums; position: relative; }
.dash-stat-label { font-size: 10px; color: var(--text-400); margin-top: 2px; position: relative; }

/* Mini live feed */
.dash-feed-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px; position: relative; z-index: 1;
}
.dash-feed-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400);
}
.mini-live-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  background: rgba(239,68,68,0.1); color: var(--red);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.dash-feed { max-height: 140px; overflow-y: auto; position: relative; z-index: 1; }
.dash-feed::-webkit-scrollbar { width: 4px; }
.dash-feed::-webkit-scrollbar-thumb { background: rgba(100,116,155,0.2); border-radius: 2px; }

.feed-entry {
  display: flex; gap: 8px; padding: 5px 0; font-size: 11px;
  border-bottom: 1px solid rgba(100,116,155,0.04);
  animation: feedFadeIn 0.35s ease both;
}
@keyframes feedFadeIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: var(--text-500); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 42px; }
.feed-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.feed-msg { color: var(--text-300); flex: 1; }

/* ================================================================
   DOT ANIMATION CONTAINER
   ================================================================ */
.dot-anim-container { position: fixed; inset: 0; pointer-events: none; z-index: 500; }
.flying-dot {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue); pointer-events: none;
  box-shadow: 0 0 8px var(--blue), 0 0 18px rgba(59,130,246,0.3);
}
/* Trail effect */
.flying-dot::after {
  content: ''; position: absolute;
  width: 16px; height: 2px; right: 4px; top: 1.5px;
  background: linear-gradient(to left, currentColor, transparent);
  opacity: 0.4; border-radius: 1px;
}

/* ================================================================
   SUB-CARD SELECTED STATE
   ================================================================ */
.sub-card.selected { outline: 1.5px solid rgba(255,255,255,0.14); outline-offset: -1px; }
.sub-card.selected[data-pcolor="purple"] { outline-color: rgba(167,139,250,0.35); }
.sub-card.selected[data-pcolor="blue"] { outline-color: rgba(59,130,246,0.35); }
.sub-card.selected[data-pcolor="orange"] { outline-color: rgba(245,158,11,0.35); }
</style>
</head>
<body>

<!-- ===== PROMINENT BREADCRUMB HEADER ===== -->

<!-- ===== MAIN CONTENT ===== -->
<main class="main" id="mainContent">
  <!-- Strong section tints — multiple per color -->
  <div class="section-tint purple-tint-1"></div>
  <div class="section-tint purple-tint-2"></div>

  <!-- 3 HORIZONTAL MODULE CARDS -->
  <section class="module-cards" id="moduleCards">

        <span class="mc-metric-value" style="color:var(--purple)">8.4/10</span>
        <div class="mc-ring">
          <svg viewBox="0 0 30 30">
            <circle class="ring-track" cx="15" cy="15" r="11"/>

/* ================================================================
   BREADCRUMB MANAGEMENT
   ================================================================ */
const crumbHome = document.getElementById('crumbHome');
const crumbModule = document.getElementById('crumbModule');
const crumbSub = document.getElementById('crumbSub');
const sep1 = document.getElementById('sep1');
const sep2 = document.getElementById('sep2');

function updateBreadcrumb(moduleIdx, subIdx) {
  // Always show Pipeline > Module
  crumbHome.className = 'crumb';
  sep1.className = 'sep';
  crumbModule.className = 'crumb';
  crumbModule.classList.remove('hidden');

  if (moduleIdx === null || moduleIdx === undefined) {
    crumbModule.textContent = 'Overview';
    crumbModule.classList.add('active');
    sep2.classList.add('hidden');
    crumbSub.classList.add('hidden');
    return;
  }

  const mod = MODULES[moduleIdx];
  crumbModule.textContent = mod.label;

  if (subIdx === null || subIdx === undefined || subIdx < 0) {
    crumbModule.classList.add('active', mod.color + '-crumb');
    sep2.classList.add('hidden');
    crumbSub.classList.add('hidden');
  } else {
    crumbModule.classList.remove('active');
    const sub = mod.subs[subIdx];
    sep2.classList.remove('hidden');
    crumbSub.classList.remove('hidden');
    crumbSub.textContent = sub.label;
    crumbSub.className = 'crumb active ' + mod.color + '-crumb';
  }
}

crumbHome.addEventListener('click', () => {
  updateBreadcrumb(null);
  closeDashboard();
});
crumbModule.addEventListener('click', () => {

});

/* ================================================================
   RENDER TREE AREA
   ================================================================ */
const treeArea = document.getElementById('treeArea');

function renderTrees() {
  treeArea.innerHTML = '';
  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' ? ' collapsed' : '');
    col.dataset.module = mi;

    // Collapse toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    // Trunk
    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      // Sub-card
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      // Glass shine + shimmer + glow overlays + accent stripe
      card.innerHTML = `<div class="glass-shine"></div><div class="sub-card-shimmer"></div><div class="sub-card-glow"></div><div class="accent-stripe"></div>`;

      // Status indicator
      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:11px; color:var(--green); flex-shrink:0; position:relative; z-index:2;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      // Label
      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      // Meta
      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      // Micro badge
      const badge = document.createElement('span');
      badge.className = `sub-micro-badge ${sub.status === 'done' ? 'done' : sub.status === 'running' ? 'running' : 'pending'}`;
      badge.textContent = sub.status === 'done' ? 'Done' : sub.status === 'running' ? 'Live' : 'Wait';
      card.appendChild(badge);

      // Click -> dashboard
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        openDashboard(mi, si);
      });

      // Hover -> tooltip
      card.addEventListener('mouseenter', (e) => showTooltip(e, mi, si));
      card.addEventListener('mousemove', (e) => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);

      trunk.appendChild(card);

      // Level 3 items
      if (sub.items && sub.items.length > 0) {
        const wrap = document.createElement('div');
        wrap.className = 'level3-wrap';
        sub.items.forEach((item, ii) => {
          const row = document.createElement('div');
          row.className = 'level3-item';
          const dotCls = item.status === 'done' ? 'done' : item.status === 'running' ? 'running' : 'pending';
          row.innerHTML = `<div class="l3-dot ${dotCls}"></div>

    treeArea.appendChild(col);

    document.querySelectorAll('.sub-card, .level3-item').forEach(el => {

}

const tooltipSummary = document.getElementById('tooltipSummary');
const tooltipStats = document.getElementById('tooltipStats');
let tooltipTimeout;

function showTooltip(e, mi, si) {
  clearTimeout(tooltipTimeout);
  const mod = MODULES[mi];
  const sub = mod.subs[si];
  tooltipTimeout = setTimeout(() => {
    const color = mod.color === 'purple' ? 'var(--purple)' :

      ? `Completed in ${sub.duration}. Result: ${sub.meta}`
      : sub.status === 'running'
      ? `Currently running (${sub.duration} elapsed). Progress: ${sub.meta}`
      : 'Waiting for preceding steps to complete.';
    tooltipStats.innerHTML = `
      <div><div class="tooltip-stat-val">${sub.duration}</div><div class="tooltip-stat-label">Duration</div></div>
      <div><div class="tooltip-stat-val">${sub.meta}</div><div class="tooltip-stat-label">Result</div></div>
      <div><div class="tooltip-stat-val">${sub.status === 'done' ? '\u2713' : sub.status === 'running' ? '\u25B6' : '\u25CB'}</div><div class="tooltip-stat-label">Status</div></div>`;
    moveTooltip(e);
    tooltipEl.classList.add('visible');
  }, 400);

function moveTooltip(e) {
  const x = Math.min(e.clientX + 16, window.innerWidth - 440);
  const y = Math.min(e.clientY + 12, window.innerHeight - 190);
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}
function hideTooltip() {

/* ================================================================
   AMBIENT PARTICLES (45 dots + connection lines)
   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.radius = Math.random() * 1.5 + 0.5;
    this.opacity = Math.random() * 0.1 + 0.02;
    // Tinted particles: some purple, some blue, some neutral
    const r = Math.random();
    if (r < 0.3) this.tint = [167, 139, 250]; // purple
    else if (r < 0.6) this.tint = [59, 130, 246]; // blue
    else this.tint = [140, 170, 220]; // neutral
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < 45; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  // Connection lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const alpha = (1 - dist / 140) * 0.035;
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = `rgba(100, 130, 200, ${alpha})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }

  // Dots
  particles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(${p.tint[0]}, ${p.tint[1]}, ${p.tint[2]}, ${p.opacity})`;
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ================================================================
   L-SHAPED TREE DOT ANIMATION (CORRECT IMPLEMENTATION)
   Dots travel along L-shaped paths following the tree structure:
   1. Start at the top of the trunk (or from a completed sub-card)
   2. Travel DOWN the vertical trunk line
   3. Turn RIGHT along the horizontal branch connector
   4. Arrive at the target running sub-card
   ================================================================ */
const dotContainer = document.getElementById('dotAnimContainer');

function getRunningSubCards() {
  return document.querySelectorAll('.sub-card.active-sub');
}

function spawnLShapedDot(targetEl) {
  const targetRect = targetEl.getBoundingClientRect();
  const pcolor = targetEl.dataset.pcolor;

  // Find the trunk element for this target
  const trunk = targetEl.closest('.tree-trunk');
  if (!trunk) return;
  const trunkRect = trunk.getBoundingClientRect();

  // Trunk X position: the vertical line is at left:10px inside trunk
  const trunkX = trunkRect.left + 10;

  // Start Y: top of the trunk
  const startY = trunkRect.top + 4;

  // Corner Y: where the horizontal branch meets the trunk (target's vertical center)
  const cornerY = targetRect.top + targetRect.height / 2;

  // End position: left edge of the sub-card (after the 14px branch connector)
  const endX = targetRect.left + 6;
  const endY = cornerY;

  const dot = document.createElement('div');
  dot.className = 'flying-dot';

  // Color the dot based on parent module color
  if (pcolor === 'purple') {
    dot.style.background = '#a78bfa';
    dot.style.boxShadow = '0 0 8px #a78bfa, 0 0 18px rgba(167,139,250,0.4)';
    dot.style.color = '#a78bfa';
  } else if (pcolor === 'orange') {
    dot.style.background = '#f59e0b';
    dot.style.boxShadow = '0 0 8px #f59e0b, 0 0 18px rgba(245,158,11,0.4)';
    dot.style.color = '#f59e0b';
  } else {
    dot.style.background = '#3b82f6';
    dot.style.boxShadow = '0 0 8px #3b82f6, 0 0 18px rgba(59,130,246,0.4)';
    dot.style.color = '#3b82f6';
  }

  dot.style.left = trunkX + 'px';
  dot.style.top = startY + 'px';
  dot.style.opacity = '0';
  dot.style.transform = 'scale(0.3)';

  dotContainer.appendChild(dot);

  const totalDist = Math.abs(cornerY - startY) + Math.abs(endX - trunkX);
  const vertDist = Math.abs(cornerY - startY);
  const horizDist = Math.abs(endX - trunkX);
  // Proportion of travel spent going vertical
  const vertRatio = totalDist > 0 ? vertDist / totalDist : 0.5;

  const duration = 1400 + Math.random() * 600;
  const startTime = performance.now();

  function animateDot(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    let x, y;

    if (t < vertRatio) {
      // Phase 1: traveling DOWN the vertical trunk
      const pt = t / vertRatio;
      const ease = pt < 0.5 ? 2 * pt * pt : -1 + (4 - 2 * pt) * pt;
      x = trunkX;
      y = startY + (cornerY - startY) * ease;
    } else {
      // Phase 2: traveling RIGHT along the horizontal branch
      const pt = (t - vertRatio) / (1 - vertRatio);
      const ease = pt < 0.5 ? 2 * pt * pt : -1 + (4 - 2 * pt) * pt;
      x = trunkX + (endX - trunkX) * ease;
      y = cornerY;
    }

    // Fade in/out
    const opacity = t < 0.08 ? t / 0.08 : t > 0.88 ? (1 - t) / 0.12 : 1;
    const scale = t < 0.08 ? 0.3 + 0.7 * (t / 0.08) : t > 0.92 ? 1 - 0.7 * ((t - 0.92) / 0.08) : 1;

    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.style.opacity = String(opacity * 0.85);
    dot.style.transform = `scale(${scale})`;

    if (t < 1) {
      requestAnimationFrame(animateDot);
    } else {
      dot.remove();
    }
  }
  requestAnimationFrame(animateDot);
}

function spawnDotWave() {
  const targets = getRunningSubCards();
  targets.forEach(target => {
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnLShapedDot(target), i * 250 + Math.random() * 350);
    }
  });
}

// Spawn dots every 2.8s

/* ================================================================
   KEYBOARD NAVIGATION
   ================================================================ */
let focusedModule = 1;
let focusedSub = -1;

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeDashboard();
    return;
  }
  if (e.key === 'ArrowLeft') {
    focusedModule = Math.max(0, focusedModule - 1);
    focusedSub = -1;
    updateBreadcrumb(focusedModule);
    updateSidebarActive(focusedModule);
    highlightModuleCard(focusedModule);
    e.preventDefault();
  }
  if (e.key === 'ArrowRight') {
    focusedModule = Math.min(MODULES.length - 1, focusedModule + 1);
    focusedSub = -1;
    updateBreadcrumb(focusedModule);
    updateSidebarActive(focusedModule);
    highlightModuleCard(focusedModule);
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    const mod = MODULES[focusedModule];
    focusedSub = Math.min(mod.subs.length - 1, focusedSub + 1);
    highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();
  }
  if (e.key === 'ArrowUp') {
    focusedSub = Math.max(-1, focusedSub - 1);
    if (focusedSub >= 0) highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();
  }
  if (e.key === 'Enter' && focusedSub >= 0) {
    openDashboard(focusedModule, focusedSub);
    e.preventDefault();
  }
});

function updateSidebarActive(mi) {
  document.querySelectorAll('.sidebar-item').forEach(si => si.classList.remove('active'));
  const item = document.querySelector(`.sidebar-item[data-module="${mi}"]`);
  if (item) item.classList.add('active');
}

function highlightModuleCard(mi) {
  document.querySelectorAll('.mod-card').forEach(c => {
    c.style.outline = 'none';
    c.style.outlineOffset = '';
  });
  const card = document.querySelector(`.mod-card[data-module="${mi}"]`);
  if (card) {
    const color = MODULES[mi].color;
    const outlineColor = color === 'purple' ? 'rgba(167,139,250,0.4)' :
                         color === 'blue' ? 'rgba(59,130,246,0.4)' : 'rgba(245,158,11,0.4)';
    card.style.outline = `1.5px solid ${outlineColor}`;
    card.style.outlineOffset = '2px';
  }
}

function highlightSubCard(mi, si) {
  document.querySelectorAll('.sub-card').forEach(c => c.style.outline = 'none');
  const card = document.querySelector(`.sub-card[data-module="${mi}"][data-sub="${si}"]`);
  if (card) {
    const color = MODULES[mi].color;
    const outlineColor = color === 'purple' ? 'rgba(167,139,250,0.4)' :
                         color === 'blue' ? 'rgba(59,130,246,0.4)' : 'rgba(245,158,11,0.4)';
    card.style.outline = `1.5px solid ${outlineColor}`;
    card.style.outlineOffset = '1px';
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
