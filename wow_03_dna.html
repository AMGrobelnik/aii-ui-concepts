<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor - DNA Pipeline Helix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050510;
    --green: #34d399;
    --green-dim: #065f46;
    --purple: #a78bfa;
    --purple-dim: #4c1d95;
    --blue: #60a5fa;
    --blue-dim: #1e3a5f;
    --orange: #fb923c;
    --orange-dim: #7c2d12;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --glass: rgba(255, 255, 255, 0.04);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* -- Ambient background -- */
  .bg-glow {
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-glow .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
  }
  .bg-glow .orb.o1 { width: 600px; height: 600px; background: var(--purple); top: -10%; left: 20%; }
  .bg-glow .orb.o2 { width: 500px; height: 500px; background: var(--blue); bottom: 10%; right: 10%; }
  .bg-glow .orb.o3 { width: 400px; height: 400px; background: var(--green); top: 50%; left: -5%; }
  .bg-glow .orb.o4 { width: 350px; height: 350px; background: var(--orange); bottom: -5%; left: 40%; }

  /* -- Layout -- */
  .overlay-top {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 28px 36px;
    pointer-events: none;
  }
  .overlay-top > * { pointer-events: auto; }

  .title-block h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--purple) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .title-block p {
    font-size: 12px; color: var(--text-dim); margin-top: 4px;
    font-weight: 400; letter-spacing: 0.3px;
  }

  .stats-block {
    display: flex; gap: 24px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 20px;
    backdrop-filter: blur(20px);
  }
  .stat { text-align: center; }
  .stat .val { font-size: 20px; font-weight: 700; }
  .stat .lbl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 2px; }
  .stat.green .val { color: var(--green); }
  .stat.purple .val { color: var(--purple); }
  .stat.blue .val { color: var(--blue); }
  .stat.orange .val { color: var(--orange); }

  /* -- Legend -- */
  .legend {
    position: fixed; left: 36px; top: 50%; transform: translateY(-50%);
    z-index: 100;
    display: flex; flex-direction: column; gap: 14px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 16px 18px;
    backdrop-filter: blur(20px);
  }
  .legend-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 500; color: var(--text-dim);
    cursor: default; transition: color 0.3s;
  }
  .legend-item:hover { color: var(--text); }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-item.green .legend-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .legend-item.purple .legend-dot { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
  .legend-item.blue .legend-dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .legend-item.orange .legend-dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }

  .legend-count {
    font-size: 10px; color: var(--text-dim); opacity: 0.6;
    margin-left: auto; padding-left: 8px;
  }

  /* -- Helix scene -- */
  .helix-scene {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1000px;
    perspective-origin: 50% 50%;
    z-index: 10;
    position: relative;
    padding: 120px 0;
  }

  .helix-container {
    transform-style: preserve-3d;
    animation: helixSpin 32s linear infinite;
    position: relative;
  }

  @keyframes helixSpin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }

  /* -- Backbone strands (SVG drawn via JS) -- */
  .backbone-svg {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1;
  }

  /* -- Rungs -- */
  .rung-wrapper {
    position: absolute;
    left: 50%;
    transform-style: preserve-3d;
    transform-origin: 0 50%;
    cursor: pointer;
    transition: filter 0.3s;
  }

  .rung {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transform-style: preserve-3d;
  }

  .rung-bar {
    width: 140px; height: 4px;
    border-radius: 2px;
    position: relative;
    transform: translateX(-50%);
  }

  /* Node at center of rung */
  .rung-node {
    position: absolute;
    left: 50%; top: 50%;
    width: 14px; height: 14px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .rung-wrapper:hover .rung-node {
    transform: translate(-50%, -50%) scale(1.5);
  }

  /* Endpoints (backbone attachment points) */
  .rung-endpoint {
    position: absolute;
    top: 50%;
    width: 8px; height: 8px;
    border-radius: 50%;
    transform: translateY(-50%);
  }
  .rung-endpoint.left { left: -4px; }
  .rung-endpoint.right { right: -4px; }

  /* -- Status styles -- */
  .rung-wrapper.completed .rung-bar { opacity: 0.9; }
  .rung-wrapper.completed .rung-node { box-shadow: 0 0 12px 3px currentColor; }

  .rung-wrapper.active .rung-bar { opacity: 1; }
  .rung-wrapper.active .rung-node {
    animation: activePulse 1.8s ease-in-out infinite;
  }
  .rung-wrapper.active::after {
    content: '';
    position: absolute;
    left: 50%; top: 50%;
    width: 60px; height: 60px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: energyBurst 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  .rung-wrapper.pending .rung-bar { opacity: 0.25; }
  .rung-wrapper.pending .rung-node { opacity: 0.35; }
  .rung-wrapper.pending .rung-endpoint { opacity: 0.2; }

  @keyframes activePulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 16px 6px currentColor; }
    50% { transform: translate(-50%, -50%) scale(1.6); box-shadow: 0 0 30px 12px currentColor; }
  }

  @keyframes energyBurst {
    0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.5); }
  }

  /* -- Color theming per module -- */
  .rung-wrapper.mod-seed .rung-bar { background: linear-gradient(90deg, transparent, var(--green), transparent); }
  .rung-wrapper.mod-seed .rung-node { background: var(--green); color: var(--green); }
  .rung-wrapper.mod-seed .rung-endpoint { background: var(--green); }
  .rung-wrapper.mod-seed.active::after { background: radial-gradient(circle, var(--green) 0%, transparent 70%); }

  .rung-wrapper.mod-hypo .rung-bar { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
  .rung-wrapper.mod-hypo .rung-node { background: var(--purple); color: var(--purple); }
  .rung-wrapper.mod-hypo .rung-endpoint { background: var(--purple); }
  .rung-wrapper.mod-hypo.active::after { background: radial-gradient(circle, var(--purple) 0%, transparent 70%); }

  .rung-wrapper.mod-inv .rung-bar { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
  .rung-wrapper.mod-inv .rung-node { background: var(--blue); color: var(--blue); }
  .rung-wrapper.mod-inv .rung-endpoint { background: var(--blue); }
  .rung-wrapper.mod-inv.active::after { background: radial-gradient(circle, var(--blue) 0%, transparent 70%); }

  .rung-wrapper.mod-paper .rung-bar { background: linear-gradient(90deg, transparent, var(--orange), transparent); }
  .rung-wrapper.mod-paper .rung-node { background: var(--orange); color: var(--orange); }
  .rung-wrapper.mod-paper .rung-endpoint { background: var(--orange); }
  .rung-wrapper.mod-paper.active::after { background: radial-gradient(circle, var(--orange) 0%, transparent 70%); }

  /* Pending override — desaturate */
  .rung-wrapper.pending .rung-bar { filter: saturate(0.3); }

  /* -- Tooltip -- */
  .tooltip {
    position: fixed;
    z-index: 500;
    background: rgba(10, 10, 30, 0.95);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 12px 16px;
    backdrop-filter: blur(20px);
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    max-width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tooltip.visible { opacity: 1; transform: translateY(0); }
  .tooltip .tt-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .tooltip .tt-module { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .tooltip .tt-status {
    font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 6px; display: inline-block;
  }
  .tooltip .tt-status.completed { background: rgba(52,211,153,0.15); color: var(--green); }
  .tooltip .tt-status.active { background: rgba(96,165,250,0.15); color: var(--blue); }
  .tooltip .tt-status.pending { background: rgba(100,116,139,0.15); color: var(--text-dim); }

  /* -- Detail card -- */
  .detail-card {
    position: fixed;
    bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: rgba(10, 10, 30, 0.92);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 24px 32px;
    backdrop-filter: blur(24px);
    max-width: 500px; width: 90%;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    transition: opacity 0.35s, transform 0.35s;
    pointer-events: none;
  }
  .detail-card.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .detail-card .dc-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .detail-card .dc-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .detail-card .dc-title { font-size: 16px; font-weight: 600; }
  .detail-card .dc-module {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-left: auto;
  }
  .detail-card .dc-body { font-size: 13px; color: var(--text-dim); line-height: 1.6; }
  .detail-card .dc-meta {
    display: flex; gap: 20px; margin-top: 14px;
    font-size: 11px; color: var(--text-dim);
  }
  .detail-card .dc-meta span { display: flex; align-items: center; gap: 5px; }
  .detail-card .dc-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; line-height: 1;
    transition: color 0.2s;
  }
  .detail-card .dc-close:hover { color: var(--text); }

  /* -- Particle canvas overlay -- */
  #particleCanvas {
    position: fixed; inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  /* -- Scanline overlay -- */
  .scanlines {
    position: fixed; inset: 0; z-index: 9999;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }
</style>
</head>
<body>

<div class="bg-glow">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
</div>

<canvas id="particleCanvas"></canvas>

<div class="overlay-top">
  <div class="title-block">
    <h1>AI Inventor</h1>
    <p>Autonomous Research Pipeline &mdash; DNA Topology</p>
  </div>
  <div class="stats-block">
    <div class="stat green"><div class="val">4/4</div><div class="lbl">Seed</div></div>
    <div class="stat purple"><div class="val">6/6</div><div class="lbl">Hypothesis</div></div>
    <div class="stat blue"><div class="val">5/8</div><div class="lbl">Invention</div></div>
    <div class="stat orange"><div class="val">0/4</div><div class="lbl">Paper</div></div>
  </div>
</div>

<div class="legend">
  <div class="legend-item green"><span class="legend-dot"></span>Seed Hypothesis<span class="legend-count">4</span></div>
  <div class="legend-item purple"><span class="legend-dot"></span>Hypothesis Loop<span class="legend-count">6</span></div>
  <div class="legend-item blue"><span class="legend-dot"></span>Invention Loop<span class="legend-count">8</span></div>
  <div class="legend-item orange"><span class="legend-dot"></span>Paper &amp; Repo<span class="legend-count">4</span></div>
</div>

<div class="helix-scene" id="helixScene">
  <div class="helix-container" id="helixContainer">
    <!-- Rungs injected by JS -->
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name"></div>
  <div class="tt-module"></div>
  <div class="tt-status"></div>
</div>

<div class="detail-card" id="detailCard">
  <button class="dc-close" id="dcClose">&times;</button>
  <div class="dc-header">
    <span class="dc-dot"></span>
    <span class="dc-title"></span>
    <span class="dc-module"></span>
  </div>
  <div class="dc-body"></div>
  <div class="dc-meta">
    <span class="dc-status-badge"></span>
    <span class="dc-duration"></span>
    <span class="dc-index"></span>
  </div>
</div>

<div class="scanlines"></div>

<script>
// === Pipeline step data ===
const STEPS = [
  // Seed Hypothesis (green) - 4 rungs
  { name: "Knowledge Graph Ingest",   module: "seed", mod_label: "Seed Hypothesis",  status: "completed", desc: "Parse domain literature into a structured knowledge graph of entities, relations, and research gaps.",  duration: "4m 12s" },
  { name: "Gap Analysis",             module: "seed", mod_label: "Seed Hypothesis",  status: "completed", desc: "Identify unexplored intersections and contradictions across the knowledge graph to surface promising directions.", duration: "2m 48s" },
  { name: "Hypothesis Generation",    module: "seed", mod_label: "Seed Hypothesis",  status: "completed", desc: "Generate candidate hypotheses grounded in identified gaps, scored by novelty and testability.",                duration: "3m 33s" },
  { name: "Seed Ranking",             module: "seed", mod_label: "Seed Hypothesis",  status: "completed", desc: "Rank seed hypotheses by composite score of feasibility, impact, and originality.",                            duration: "1m 05s" },

  // Hypothesis Loop (purple) - 6 rungs
  { name: "Expand Hypothesis",        module: "hypo", mod_label: "Hypothesis Loop",  status: "completed", desc: "Elaborate the top-ranked hypothesis into a detailed mechanistic proposal with testable sub-claims.",          duration: "5m 21s" },
  { name: "Review Hypothesis",        module: "hypo", mod_label: "Hypothesis Loop",  status: "completed", desc: "Adversarial review of the hypothesis — identify logical flaws, missing evidence, and scope issues.",           duration: "3m 47s" },
  { name: "Literature Validation",    module: "hypo", mod_label: "Hypothesis Loop",  status: "completed", desc: "Cross-reference hypothesis claims against retrieved literature to verify novelty and grounding.",              duration: "6m 10s" },
  { name: "Hypothesis Refinement",    module: "hypo", mod_label: "Hypothesis Loop",  status: "completed", desc: "Integrate review feedback — tighten claims, add caveats, reformulate weak sub-hypotheses.",                   duration: "4m 02s" },
  { name: "Feasibility Check",        module: "hypo", mod_label: "Hypothesis Loop",  status: "completed", desc: "Assess whether the refined hypothesis is testable with available methods and compute budget.",                 duration: "2m 15s" },
  { name: "Final Hypothesis Lock",    module: "hypo", mod_label: "Hypothesis Loop",  status: "completed", desc: "Freeze the hypothesis for invention — snapshot all claims, evidence links, and scope boundaries.",             duration: "0m 38s" },

  // Invention Loop (blue) - 8 rungs
  { name: "Strategy Generation",      module: "inv",  mod_label: "Invention Loop",   status: "completed", desc: "Generate multiple invention strategies — algorithmic, empirical, hybrid — ranked by expected yield.",            duration: "4m 55s" },
  { name: "Plan Generation",          module: "inv",  mod_label: "Invention Loop",   status: "completed", desc: "Expand the top strategy into a step-by-step experimental plan with resource estimates.",                        duration: "3m 12s" },
  { name: "Review Plan",              module: "inv",  mod_label: "Invention Loop",   status: "completed", desc: "Expert-panel review of the plan — check methodology, controls, statistical power.",                              duration: "2m 40s" },
  { name: "Generate Paper Text",      module: "inv",  mod_label: "Invention Loop",   status: "completed", desc: "Draft the scientific narrative — abstract, introduction, methods, expected results, discussion.",                duration: "8m 33s" },
  { name: "Generate Artifacts",       module: "inv",  mod_label: "Invention Loop",   status: "active",   desc: "Produce computational artifacts — code demos, simulation configs, proof-of-concept implementations.",            duration: "running" },
  { name: "Generate Visualizations",  module: "inv",  mod_label: "Invention Loop",   status: "pending",  desc: "Create figures, diagrams, and data visualizations for the paper draft.",                                         duration: "--"     },
  { name: "Review Paper",             module: "inv",  mod_label: "Invention Loop",   status: "pending",  desc: "Full review cycle — consistency, citation accuracy, figure-text alignment, claim support.",                       duration: "--"     },
  { name: "Paper Refinement",         module: "inv",  mod_label: "Invention Loop",   status: "pending",  desc: "Incorporate review edits, strengthen weak sections, polish prose and formatting.",                                duration: "--"     },

  // Paper & Repo (orange) - 4 rungs
  { name: "Compile Full Paper",       module: "paper", mod_label: "Paper & Repo",    status: "pending",  desc: "Assemble all sections, figures, and references into the final LaTeX manuscript.",                                  duration: "--"     },
  { name: "Build Code Repository",    module: "paper", mod_label: "Paper & Repo",    status: "pending",  desc: "Structure reproduction code — environment configs, data loaders, training scripts, eval harness.",                 duration: "--"     },
  { name: "Artifact Packaging",       module: "paper", mod_label: "Paper & Repo",    status: "pending",  desc: "Bundle demos, notebooks, and visualizations into a shareable artifact package.",                                   duration: "--"     },
  { name: "Final QA & Release",       module: "paper", mod_label: "Paper & Repo",    status: "pending",  desc: "End-to-end quality check — reproducibility test, license compliance, README generation.",                          duration: "--"     },
];

const MODULE_COLORS = {
  seed:  { main: '#34d399', dim: '#065f46' },
  hypo:  { main: '#a78bfa', dim: '#4c1d95' },
  inv:   { main: '#60a5fa', dim: '#1e3a5f' },
  paper: { main: '#fb923c', dim: '#7c2d12' },
};

const MODULE_CSS = { seed: 'mod-seed', hypo: 'mod-hypo', inv: 'mod-inv', paper: 'mod-paper' };

// === Build helix ===
const container = document.getElementById('helixContainer');
const RUNG_SPACING = 54;
const HELIX_RADIUS = 180;
const TOTAL_HEIGHT = STEPS.length * RUNG_SPACING;
const TURNS = 2.5;

container.style.width = (HELIX_RADIUS * 2 + 200) + 'px';
container.style.height = TOTAL_HEIGHT + 'px';

// Create rung elements
STEPS.forEach((step, i) => {
  const wrapper = document.createElement('div');
  wrapper.className = `rung-wrapper ${MODULE_CSS[step.module]} ${step.status}`;
  wrapper.dataset.index = i;

  const angle = (i / STEPS.length) * TURNS * 360;
  const y = i * RUNG_SPACING;

  wrapper.style.top = y + 'px';
  wrapper.style.transform = `translateX(-50%) rotateY(${angle}deg) translateZ(${HELIX_RADIUS}px)`;

  const rung = document.createElement('div');
  rung.className = 'rung';

  const bar = document.createElement('div');
  bar.className = 'rung-bar';

  const node = document.createElement('div');
  node.className = 'rung-node';

  const epLeft = document.createElement('div');
  epLeft.className = 'rung-endpoint left';
  const epRight = document.createElement('div');
  epRight.className = 'rung-endpoint right';

  bar.appendChild(node);
  bar.appendChild(epLeft);
  bar.appendChild(epRight);
  rung.appendChild(bar);
  wrapper.appendChild(rung);
  container.appendChild(wrapper);

  // Hover tooltip
  wrapper.addEventListener('mouseenter', (e) => showTooltip(e, step));
  wrapper.addEventListener('mousemove', (e) => moveTooltip(e));
  wrapper.addEventListener('mouseleave', hideTooltip);

  // Click detail card
  wrapper.addEventListener('click', () => showDetail(step, i));
});

// === Backbone strands (rendered as 3D points via the helix spin) ===
// We draw two strand paths using additional small elements
const STRAND_POINTS = 200;
for (let s = 0; s < 2; s++) {
  const offset = s * Math.PI;
  for (let p = 0; p <= STRAND_POINTS; p++) {
    const t = p / STRAND_POINTS;
    const angle = t * TURNS * 2 * Math.PI + offset;
    const y = t * TOTAL_HEIGHT;

    const dot = document.createElement('div');
    dot.style.cssText = `
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      left: 50%;
      top: ${y}px;
      transform-style: preserve-3d;
      transform: translateX(-50%) rotateY(${angle * 180 / Math.PI}deg) translateZ(${HELIX_RADIUS + 70}px);
      pointer-events: none;
    `;

    // Color based on which module zone this y-position falls in
    const stepIndex = Math.floor(t * STEPS.length);
    const clampedIndex = Math.min(stepIndex, STEPS.length - 1);
    const mod = STEPS[clampedIndex].module;
    const status = STEPS[clampedIndex].status;
    const color = MODULE_COLORS[mod].main;
    const opacity = status === 'pending' ? 0.12 : 0.45;

    dot.style.background = color;
    dot.style.opacity = opacity;
    dot.style.boxShadow = `0 0 4px ${color}`;

    container.appendChild(dot);
  }
}

// === Second backbone strand offset on the bar ===
for (let s = 0; s < 2; s++) {
  const offset = s * Math.PI;
  for (let p = 0; p <= STRAND_POINTS; p++) {
    const t = p / STRAND_POINTS;
    const angle = t * TURNS * 2 * Math.PI + offset + Math.PI;
    const y = t * TOTAL_HEIGHT;

    const dot = document.createElement('div');
    dot.style.cssText = `
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      left: 50%;
      top: ${y}px;
      transform-style: preserve-3d;
      transform: translateX(-50%) rotateY(${angle * 180 / Math.PI}deg) translateZ(${HELIX_RADIUS + 70}px);
      pointer-events: none;
    `;

    const stepIndex = Math.floor(t * STEPS.length);
    const clampedIndex = Math.min(stepIndex, STEPS.length - 1);
    const mod = STEPS[clampedIndex].module;
    const status = STEPS[clampedIndex].status;
    const color = MODULE_COLORS[mod].main;
    const opacity = status === 'pending' ? 0.08 : 0.3;

    dot.style.background = color;
    dot.style.opacity = opacity;
    dot.style.boxShadow = `0 0 3px ${color}`;

    container.appendChild(dot);
  }
}

// === Tooltip logic ===
const tooltip = document.getElementById('tooltip');

function showTooltip(e, step) {
  const tt = tooltip;
  tt.querySelector('.tt-name').textContent = step.name;
  tt.querySelector('.tt-module').textContent = step.mod_label;
  tt.querySelector('.tt-module').style.color = MODULE_COLORS[step.module].main;

  const badge = tt.querySelector('.tt-status');
  badge.textContent = step.status.charAt(0).toUpperCase() + step.status.slice(1);
  badge.className = 'tt-status ' + step.status;

  tt.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = tooltip;
  let x = e.clientX + 16;
  let y = e.clientY - 10;
  if (x + 250 > window.innerWidth) x = e.clientX - 260;
  if (y + 80 > window.innerHeight) y = e.clientY - 80;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// === Detail card logic ===
const detailCard = document.getElementById('detailCard');
let activeDetail = null;

function showDetail(step, index) {
  const card = detailCard;
  const color = MODULE_COLORS[step.module].main;

  card.querySelector('.dc-dot').style.background = color;
  card.querySelector('.dc-dot').style.boxShadow = `0 0 8px ${color}`;
  card.querySelector('.dc-title').textContent = step.name;
  card.querySelector('.dc-module').textContent = step.mod_label;
  card.querySelector('.dc-module').style.color = color;
  card.querySelector('.dc-body').textContent = step.desc;

  const statusBadge = card.querySelector('.dc-status-badge');
  statusBadge.innerHTML = `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${
    step.status === 'completed' ? 'var(--green)' :
    step.status === 'active' ? 'var(--blue)' : 'var(--text-dim)'
  };margin-right:4px;"></span>${step.status.charAt(0).toUpperCase() + step.status.slice(1)}`;

  card.querySelector('.dc-duration').textContent = step.duration !== '--' ? `Duration: ${step.duration}` : '';
  card.querySelector('.dc-index').textContent = `Step ${index + 1} of ${STEPS.length}`;

  card.classList.add('visible');
  activeDetail = index;
}

document.getElementById('dcClose').addEventListener('click', () => {
  detailCard.classList.remove('visible');
  activeDetail = null;
});

// Close detail on clicking elsewhere
document.addEventListener('click', (e) => {
  if (activeDetail !== null && !detailCard.contains(e.target) && !e.target.closest('.rung-wrapper')) {
    detailCard.classList.remove('visible');
    activeDetail = null;
  }
});

// === Floating particles ===
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const PARTICLE_COLORS = ['#34d399', '#a78bfa', '#60a5fa', '#fb923c'];

for (let i = 0; i < 50; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    size: Math.random() * 2 + 0.5,
    color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
    alpha: Math.random() * 0.3 + 0.05,
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();

// === Depth-based brightness: modulate opacity per rung based on Z position ===
function updateDepth() {
  const containerEl = document.getElementById('helixContainer');
  const wrappers = containerEl.querySelectorAll('.rung-wrapper');
  const style = getComputedStyle(containerEl);
  const matrix = new DOMMatrix(style.transform);

  // Extract current Y-axis rotation angle
  // Using atan2 on the matrix elements for rotateY
  const angle = Math.atan2(matrix.m13, matrix.m33);

  wrappers.forEach((w, i) => {
    const rungAngle = (i / STEPS.length) * TURNS * 360 * Math.PI / 180;
    const totalAngle = rungAngle + angle;
    const z = Math.cos(totalAngle);
    // z ranges from -1 (far) to 1 (near)
    const normalized = (z + 1) / 2; // 0 to 1
    const scale = 0.75 + normalized * 0.25;
    const brightness = 0.4 + normalized * 0.6;
    const blur = (1 - normalized) * 1.5;

    w.style.filter = `brightness(${brightness})${blur > 0.5 ? ` blur(${blur}px)` : ''}`;
    w.style.zIndex = Math.round(normalized * 100);

    // Scale rung bar for depth
    const bar = w.querySelector('.rung-bar');
    if (bar) {
      bar.style.transform = `translateX(-50%) scaleX(${scale})`;
    }
  });

  requestAnimationFrame(updateDepth);
}
updateDepth();

// === Keyboard: pause/resume rotation ===
let paused = false;
document.addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    paused = !paused;
    container.style.animationPlayState = paused ? 'paused' : 'running';
  }
});
</script>
