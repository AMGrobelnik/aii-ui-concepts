<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor v2.02 — Diamond Modules</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── Left Panel: Big Progress Ring ── */
  .left-panel {
    width: 80px;
    min-width: 80px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 28px;
    background: linear-gradient(180deg, rgba(20,20,30,0.6) 0%, rgba(10,10,15,0.9) 100%);
    border-right: 1px solid rgba(255,255,255,0.04);
    z-index: 10;
  }

  .big-ring-container { position: relative; width: 64px; height: 64px; }
  .big-ring-svg { width: 64px; height: 64px; transform: rotate(-90deg); filter: drop-shadow(0 0 8px rgba(100,200,140,0.25)); }
  .big-ring-bg { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 4; }
  .big-ring-progress {
    fill: none; stroke: url(#bigRingGradient); stroke-width: 4;
    stroke-linecap: round; transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .big-ring-glow-dot { r: 3; fill: #60d0ff; filter: url(#glowFilter); transition: all 0.8s cubic-bezier(0.4,0,0.2,1); }
  .big-ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .big-ring-percent { font-size: 13px; font-weight: 700; color: #fff; line-height: 1; }
  .big-ring-label {
    margin-top: 10px; font-size: 8px; font-weight: 500; color: rgba(255,255,255,0.35);
    text-transform: uppercase; letter-spacing: 0.5px; text-align: center; line-height: 1.3;
  }
  .big-ring-arc-highlight { fill: none; stroke-width: 4; stroke-linecap: round; opacity: 0; transition: opacity 0.4s ease; }
  .big-ring-arc-highlight.active { opacity: 1; filter: url(#glowFilter); }

  /* ── Main Area ── */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Row 1: Diamond Module Markers ── */
  .row-modules {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 32px 14px;
    gap: 0;
    position: relative;
  }

  .module-connector {
    width: 52px;
    height: 2px;
    position: relative;
    overflow: visible;
  }

  .module-connector::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--conn-from), var(--conn-to));
    opacity: 0.3;
    border-radius: 1px;
  }

  .module-marker {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.2s ease;
  }

  .module-marker:hover { transform: scale(1.06); }

  .module-marker.selected .diamond-ring-wrap {
    filter: drop-shadow(0 0 14px var(--mod-color));
  }

  .module-marker.active-row .module-name {
    color: rgba(255,255,255,0.7);
  }

  .diamond-ring-wrap {
    position: relative;
    width: 48px;
    height: 48px;
    transition: filter 0.3s ease;
  }

  .diamond-ring-svg {
    width: 48px;
    height: 48px;
    transform: rotate(-90deg);
  }

  .dr-ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.07);
    stroke-width: 2.5;
  }

  .dr-ring-progress {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
  }

  /* Diamond shape: 28px rotated square inside the ring */
  .diamond-inner {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 28px;
    height: 28px;
    transform: translate(-50%, -50%) rotate(45deg);
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease, box-shadow 0.3s ease, opacity 0.4s ease;
  }

  .diamond-inner span {
    transform: rotate(-45deg);
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    white-space: nowrap;
  }

  /* Glow halo around diamond */
  .diamond-inner.glow-halo {
    box-shadow: 0 0 8px var(--mod-color),
                0 0 18px color-mix(in srgb, var(--mod-color) 50%, transparent),
                0 0 32px color-mix(in srgb, var(--mod-color) 25%, transparent);
  }

  .module-name {
    margin-top: 6px;
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    transition: color 0.3s ease;
    text-align: center;
  }

  .module-marker.selected .module-name {
    color: var(--mod-color);
    font-weight: 600;
  }

  /* ── Row 2: Circular Sub-step Dots ── */
  .row-sub-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 32px 6px;
    gap: 6px;
    min-height: 44px;
    overflow: hidden;
    position: relative;
  }

  .row-sub-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .row-sub-inner.entering {
    opacity: 0;
    transform: translateY(-8px);
  }

  .sub-dot-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  .sub-dot-group:hover { transform: scale(1.12); }

  .sub-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    transition: background 0.3s ease, box-shadow 0.3s ease;
    position: relative;
  }

  .sub-dot.completed {
    background: var(--dot-color);
    opacity: 0.85;
  }

  .sub-dot.active {
    background: var(--dot-color);
    box-shadow: 0 0 8px var(--dot-color), 0 0 16px var(--dot-color);
    animation: dotPulse 2s ease-in-out infinite;
  }

  .sub-dot.pending {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.15);
  }

  .sub-dot.selected-dot {
    box-shadow: 0 0 10px var(--dot-color), 0 0 20px var(--dot-color), 0 0 4px #fff;
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 8px var(--dot-color), 0 0 16px var(--dot-color); }
    50% { box-shadow: 0 0 12px var(--dot-color), 0 0 24px var(--dot-color); }
  }

  .sub-dot-connector {
    width: 16px;
    height: 1.5px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
  }

  .sub-dot-label {
    font-size: 8px;
    color: rgba(255,255,255,0.28);
    text-align: center;
    white-space: nowrap;
  }

  .sub-dot-group.selected-sub .sub-dot-label {
    color: var(--dot-color);
    font-weight: 600;
  }

  .sub-dot-status {
    font-size: 7px;
    color: rgba(255,255,255,0.22);
    margin-left: -2px;
  }

  .sub-dot-group.selected-sub .sub-dot-status {
    color: var(--dot-color);
  }

  /* ── Divider ── */
  .section-divider {
    height: 1px;
    margin: 6px 40px 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  }

  /* ── Content Area ── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 40px 32px;
    display: flex;
    justify-content: center;
  }

  .content-inner {
    max-width: 700px;
    width: 100%;
    animation: contentFadeIn 0.35s ease;
  }

  @keyframes contentFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content-breadcrumb { font-size: 10px; color: rgba(255,255,255,0.25); margin-bottom: 12px; letter-spacing: 0.3px; }
  .content-breadcrumb span { color: rgba(255,255,255,0.4); }
  .content-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; line-height: 1.3; }
  .content-subtitle { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.4); margin-bottom: 18px; }
  .content-detail { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.55); }

  .artifact-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .artifact-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
    border-radius: 8px; transition: background 0.2s ease, border-color 0.2s ease; cursor: pointer;
  }
  .artifact-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
  .artifact-status-icon {
    width: 18px; height: 18px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0;
  }
  .artifact-status-icon.done { background: rgba(100,220,140,0.15); color: #64dc8c; }
  .artifact-status-icon.running { background: rgba(100,160,255,0.15); color: #64a0ff; animation: iconPulse 1.5s ease-in-out infinite; }
  .artifact-status-icon.waiting { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); }
  @keyframes iconPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .artifact-info { flex: 1; }
  .artifact-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.8); }
  .artifact-desc { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 1px; }
  .artifact-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .artifact-badge.done { background: rgba(100,220,140,0.12); color: #64dc8c; }
  .artifact-badge.running { background: rgba(100,160,255,0.12); color: #64a0ff; }
  .artifact-badge.waiting { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.25); }

  .nav-hint {
    position: fixed; bottom: 12px; right: 16px; font-size: 9px;
    color: rgba(255,255,255,0.15); display: flex; gap: 8px; align-items: center;
  }
  .nav-hint kbd {
    padding: 1px 5px; border: 1px solid rgba(255,255,255,0.1); border-radius: 3px;
    font-family: 'Inter', sans-serif; font-size: 8px; color: rgba(255,255,255,0.25);
  }
  .row-active-indicator {
    position: absolute; left: -12px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 16px; border-radius: 2px; background: rgba(255,255,255,0.2);
    transition: opacity 0.3s ease; opacity: 0;
  }
  .row-modules.active-nav .row-active-indicator,
  .row-sub-dots.active-nav .row-active-indicator { opacity: 1; }

  /* Scrollbar */
  .content-area::-webkit-scrollbar { width: 4px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<!-- SVG Defs -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="bigRingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#50e880"/>
      <stop offset="50%" stop-color="#b060ff"/>
      <stop offset="100%" stop-color="#60b0ff"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>

<!-- Left Panel -->
<div class="left-panel">
  <div class="big-ring-container">
    <svg class="big-ring-svg" viewBox="0 0 64 64" id="bigRingSvg">
      <circle class="big-ring-bg" cx="32" cy="32" r="27"/>
      <circle class="big-ring-arc-highlight" id="arcSeed" cx="32" cy="32" r="27"
              stroke="#50e880" stroke-dasharray="0 170" stroke-dashoffset="0"/>
      <circle class="big-ring-arc-highlight" id="arcHypo" cx="32" cy="32" r="27"
              stroke="#b060ff" stroke-dasharray="0 170" stroke-dashoffset="0"/>
      <circle class="big-ring-arc-highlight" id="arcInvention" cx="32" cy="32" r="27"
              stroke="#60a0ff" stroke-dasharray="0 170" stroke-dashoffset="0"/>
      <circle class="big-ring-arc-highlight" id="arcPaper" cx="32" cy="32" r="27"
              stroke="#555" stroke-dasharray="0 170" stroke-dashoffset="0"/>
      <circle class="big-ring-progress" cx="32" cy="32" r="27"
              stroke-dasharray="169.65 169.65" stroke-dashoffset="59.38" id="bigRingArc"/>
      <circle class="big-ring-glow-dot" cx="32" cy="32" id="bigRingDot" fill="#60b0ff"/>
    </svg>
    <div class="big-ring-center">
      <div class="big-ring-percent" id="bigRingText">65%</div>
    </div>
  </div>
  <div class="big-ring-label">Pipeline<br>Progress</div>
</div>

<!-- Main Area -->
<div class="main-area">

  <!-- Row 1: Diamond Module Markers -->
  <div class="row-modules" id="rowModules">
    <div class="row-active-indicator"></div>
  </div>

  <!-- Row 2: Circular Sub-step Dots -->
  <div class="row-sub-dots" id="rowSubDots">
    <div class="row-active-indicator"></div>
    <div class="row-sub-inner" id="subDotsInner"></div>
  </div>

  <div class="section-divider"></div>

  <!-- Content -->
  <div class="content-area">
    <div class="content-inner" id="contentArea"></div>
  </div>
</div>

<!-- Nav Hint -->
<div class="nav-hint">
  <kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate
  <kbd>&darr;</kbd> drill in
  <kbd>&uarr;</kbd> go back
</div>

<script>
// ── Module Data ──
const MODULES = [
  {
    id: 'seed', name: 'Seed', color: '#50e880', colorRgb: '80,232,128',
    progress: 100, diamondText: '\u2713', status: 'done',
    subSteps: [
      { name: 'Mine Papers', status: 'done', label: '\u2713' },
      { name: 'Build KG', status: 'done', label: '\u2713' },
      { name: 'Find Gaps', status: 'done', label: '\u2713' },
      { name: 'Select Seeds', status: 'done', label: '\u2713' },
    ],
    content: {
      title: 'Seed Hypotheses',
      subtitle: 'Knowledge graph built from 847 papers \u2014 4 seed gaps selected',
      detail: 'The seeding phase mined 847 papers across 12 domains, constructed a knowledge graph with 3,200 concept nodes and 11,400 edges, identified 23 underexplored gaps, and selected the 4 highest-potential seeds for hypothesis generation.'
    }
  },
  {
    id: 'hypothesis', name: 'Hypothesis', color: '#b060ff', colorRgb: '176,96,255',
    progress: 100, diamondText: '8.4', status: 'done',
    subSteps: [
      { name: 'Iter 1', status: 'done', label: '6.2' },
      { name: 'Iter 2', status: 'done', label: '7.8' },
      { name: 'Iter 3', status: 'done', label: '8.4' },
    ],
    content: {
      title: 'Hypothesis Refinement',
      subtitle: '3 iterations \u2014 score improved 6.2 \u2192 7.8 \u2192 8.4',
      detail: 'Each iteration generated candidate hypotheses and reviewed them against novelty, feasibility, and impact criteria. The final hypothesis scored 8.4/10: a cross-domain transfer learning approach combining contrastive self-supervision with domain-adaptive knowledge distillation for low-resource scientific NLP tasks.'
    }
  },
  {
    id: 'invention', name: 'Invention', color: '#60a0ff', colorRgb: '96,160,255',
    progress: 60, diamondText: '3/5', status: 'active',
    subSteps: [
      { name: 'Strategy', status: 'done', label: '\u2713' },
      { name: 'Plan', status: 'done', label: '\u2713' },
      { name: 'Artifacts', status: 'active', label: '\u25b6' },
      { name: 'Paper', status: 'pending', label: '' },
      { name: 'Review', status: 'pending', label: '' },
      { name: 'Update', status: 'pending', label: '' },
    ],
    content: {
      title: 'Invention Loop \u2014 Iteration 2',
      subtitle: 'Generating artifacts: 3/5 complete, ablation study in progress',
      detail: null
    }
  },
  {
    id: 'paper', name: 'Paper', color: '#555', colorRgb: '85,85,85',
    progress: 0, diamondText: '\u25cb', status: 'pending',
    subSteps: [
      { name: 'Demos', status: 'pending', label: '' },
      { name: 'Visualizations', status: 'pending', label: '' },
      { name: 'Full Draft', status: 'pending', label: '' },
      { name: 'References', status: 'pending', label: '' },
      { name: 'Final PDF', status: 'pending', label: '' },
    ],
    content: {
      title: 'Paper Generation',
      subtitle: '5 steps pending \u2014 waiting on invention loop',
      detail: 'Once the invention loop completes, the paper generation phase will produce interactive demos, data visualizations, a full LaTeX draft with figures, compile references, and render the final PDF for submission.'
    }
  },
];

const ARTIFACT_DETAILS = [
  { name: 'Baseline Implementation', desc: 'Standard transformer baseline on 3 benchmarks', status: 'done' },
  { name: 'Dataset Construction', desc: 'Cross-domain corpus with 12k annotated samples', status: 'done' },
  { name: 'Proof of Concept', desc: 'Contrastive pre-training + distillation pipeline', status: 'done' },
  { name: 'Ablation Study', desc: 'Component-wise ablation across 4 configurations', status: 'running' },
  { name: 'Evaluation Suite', desc: 'Full benchmark evaluation with significance tests', status: 'waiting' },
];

// ── State ──
let state = {
  activeRow: 1,     // 1=modules (diamonds), 2=sub-steps (circles)
  moduleIdx: 2,     // Invention selected
  subIdx: 2,        // Artifacts selected
};

// ── Constants ──
const C27 = 2 * Math.PI * 27;  // ~169.65 big ring
const C19 = 2 * Math.PI * 19;  // ~119.38 diamond ring (r=19 in 48px viewbox)

// ── Render: Row 1 Diamond Modules ──
function renderModules() {
  const container = document.getElementById('rowModules');
  // Preserve the indicator
  const indicator = container.querySelector('.row-active-indicator');
  container.innerHTML = '';
  container.appendChild(indicator);

  container.classList.toggle('active-nav', state.activeRow === 1);

  MODULES.forEach((mod, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'module-connector';
      conn.style.setProperty('--conn-from', MODULES[i - 1].color);
      conn.style.setProperty('--conn-to', mod.color);
      container.appendChild(conn);
    }

    const marker = document.createElement('div');
    marker.className = 'module-marker' + (i === state.moduleIdx ? ' selected' : '');
    if (state.activeRow === 1 && i === state.moduleIdx) marker.classList.add('active-row');
    marker.style.setProperty('--mod-color', mod.color);
    marker.onclick = () => {
      state.moduleIdx = i;
      state.activeRow = 1;
      state.subIdx = 0;
      renderAll();
    };

    const dashOffset = C19 * (1 - mod.progress / 100);

    const haloClass = (mod.status === 'done' || mod.status === 'active') ? ' glow-halo' : '';

    marker.innerHTML = `
      <div class="diamond-ring-wrap">
        <svg class="diamond-ring-svg" viewBox="0 0 48 48">
          <circle class="dr-ring-bg" cx="24" cy="24" r="19"/>
          <circle class="dr-ring-progress" cx="24" cy="24" r="19"
                  stroke="${mod.color}" stroke-dasharray="${C19}" stroke-dashoffset="${dashOffset}"/>
        </svg>
        <div class="diamond-inner${haloClass}" style="--mod-color:${mod.color}; background:${mod.color};">
          <span>${mod.diamondText}</span>
        </div>
      </div>
      <div class="module-name">${mod.name}</div>
    `;
    container.appendChild(marker);
  });

  updateBigRingHighlight();
}

// ── Big Ring Arc Highlight ──
function updateBigRingHighlight() {
  const arcIds = ['arcSeed', 'arcHypo', 'arcInvention', 'arcPaper'];
  const segmentSize = C27 / 4;
  const gap = 4;

  arcIds.forEach((id, i) => {
    const el = document.getElementById(id);
    const offset = -i * segmentSize;
    el.setAttribute('stroke-dasharray', `${segmentSize - gap} ${C27 - segmentSize + gap}`);
    el.setAttribute('stroke-dashoffset', `${-offset}`);
    el.classList.toggle('active', i === state.moduleIdx);
  });
}

function positionGlowDot(progress) {
  const r = 27;
  const angle = (progress / 100) * 2 * Math.PI - Math.PI / 2;
  const cx = 32 + r * Math.cos(angle);
  const cy = 32 + r * Math.sin(angle);
  const dot = document.getElementById('bigRingDot');
  dot.setAttribute('cx', cx);
  dot.setAttribute('cy', cy);
}

// ── Render: Row 2 Circular Sub-step Dots ──
function renderSubDots() {
  const row = document.getElementById('rowSubDots');
  const inner = document.getElementById('subDotsInner');
  const mod = MODULES[state.moduleIdx];
  const subs = mod.subSteps;

  row.classList.toggle('active-nav', state.activeRow === 2);

  inner.classList.add('entering');
  setTimeout(() => {
    inner.innerHTML = '';

    subs.forEach((sub, i) => {
      if (i > 0) {
        const conn = document.createElement('div');
        conn.className = 'sub-dot-connector';
        inner.appendChild(conn);
      }

      const group = document.createElement('div');
      group.className = 'sub-dot-group' + (state.activeRow === 2 && i === state.subIdx ? ' selected-sub' : '');
      group.style.setProperty('--dot-color', mod.color);
      group.onclick = () => {
        state.subIdx = i;
        state.activeRow = 2;
        renderAll();
      };

      const dotClass = sub.status === 'done' ? 'completed' :
                       sub.status === 'active' ? 'active' : 'pending';
      const selectedClass = (state.activeRow === 2 && i === state.subIdx) ? ' selected-dot' : '';
      const statusIcon = sub.status === 'done' ? '\u2713' :
                         sub.status === 'active' ? '\u25b6' : '\u25cb';

      group.innerHTML = `
        <div class="sub-dot ${dotClass}${selectedClass}" style="--dot-color:${mod.color}"></div>
        <div class="sub-dot-label">${sub.name}</div>
        <div class="sub-dot-status">${sub.label || statusIcon}</div>
      `;
      inner.appendChild(group);
    });

    inner.classList.remove('entering');
  }, 30);
}

// ── Render: Content Below ──
function renderContent() {
  const area = document.getElementById('contentArea');
  const mod = MODULES[state.moduleIdx];
  const sub = mod.subSteps[state.subIdx];

  let breadcrumb = `<span>${mod.name}</span>`;
  if (state.activeRow === 2 && sub) {
    breadcrumb += ` / <span>${sub.name}</span>`;
  }

  // Invention > Artifacts: show artifact list
  if (mod.id === 'invention' && sub && sub.name === 'Artifacts' && state.activeRow === 2) {
    let html = '<ul class="artifact-list">';
    ARTIFACT_DETAILS.forEach((art) => {
      const icon = art.status === 'done' ? '\u2713' : art.status === 'running' ? '\u25b6' : '\u25cb';
      html += `
        <li class="artifact-item" style="--mod-color:${mod.color}; --mod-color-rgb:${mod.colorRgb}">
          <div class="artifact-status-icon ${art.status}">${icon}</div>
          <div class="artifact-info">
            <div class="artifact-name">${art.name}</div>
            <div class="artifact-desc">${art.desc}</div>
          </div>
          <div class="artifact-badge ${art.status}">${art.status === 'done' ? 'Complete' : art.status === 'running' ? 'Running' : 'Pending'}</div>
        </li>`;
    });
    html += '</ul>';
    area.innerHTML = `
      <div class="content-breadcrumb">${breadcrumb}</div>
      <div class="content-title" style="color:${mod.color}">Artifact Generation</div>
      <div class="content-subtitle">Iteration 2 \u2014 3 of 5 artifacts complete</div>
      ${html}
    `;
    return;
  }

  // Hypothesis iterations
  if (mod.id === 'hypothesis' && sub && state.activeRow === 2) {
    const scores = ['6.2', '7.8', '8.4'];
    const descs = [
      'Initial hypothesis generation from seed gaps. Broad exploration phase with 12 candidates generated, narrowed to 3 via automated review.',
      'Refinement pass incorporating review feedback. Sharpened feasibility claims, added concrete evaluation plan. Score improved from 6.2 to 7.8.',
      'Final polishing iteration. Hypothesis fully specified with clear novelty claim, experimental protocol, and expected outcomes. Achieved 8.4/10.'
    ];
    area.innerHTML = `
      <div class="content-breadcrumb">${breadcrumb}</div>
      <div class="content-title" style="color:${mod.color}">${sub.name} \u2014 Score: ${scores[state.subIdx] || '?'}</div>
      <div class="content-subtitle">Generate + Review cycle</div>
      <div class="content-detail">${descs[state.subIdx] || ''}</div>
    `;
    return;
  }

  // Seed sub-steps
  if (mod.id === 'seed' && sub && state.activeRow === 2) {
    const seedDescs = {
      'Mine Papers': 'Crawled and parsed 847 papers from ArXiv, Semantic Scholar, and ACL Anthology. Extracted titles, abstracts, methodology sections, and citation graphs.',
      'Build KG': 'Constructed a knowledge graph with 3,200 concept nodes and 11,400 directed edges representing methodological dependencies, dataset usage, and result comparisons.',
      'Find Gaps': 'Identified 23 underexplored regions in the knowledge graph where promising methodological combinations have not been attempted.',
      'Select Seeds': 'Ranked gaps by potential impact and feasibility. Selected top 4 seeds for hypothesis generation.',
    };
    area.innerHTML = `
      <div class="content-breadcrumb">${breadcrumb}</div>
      <div class="content-title" style="color:${mod.color}">${sub.name}</div>
      <div class="content-subtitle">Completed</div>
      <div class="content-detail">${seedDescs[sub.name] || ''}</div>
    `;
    return;
  }

  // Invention sub-steps (non-Artifacts)
  if (mod.id === 'invention' && sub && state.activeRow === 2) {
    const invDescs = {
      'Strategy': 'Research strategy selected: comparative ablation study demonstrating the contribution of each component (contrastive loss, distillation, domain adaptation) to overall performance.',
      'Plan': 'Execution plan defined: 5 artifacts covering baseline, dataset, proof-of-concept, ablation, and evaluation. Estimated 3 compute-hours.',
      'Paper': 'Paper text generation will synthesize all artifacts into a coherent narrative with introduction, methodology, results, and discussion sections.',
      'Review': 'Automated review will assess the paper against venue-specific criteria: novelty, clarity, significance, and soundness.',
      'Update': 'Update step will incorporate review feedback and regenerate weak sections for the next iteration.',
    };
    area.innerHTML = `
      <div class="content-breadcrumb">${breadcrumb}</div>
      <div class="content-title" style="color:${mod.color}">${sub.name}</div>
      <div class="content-subtitle">${sub.status === 'done' ? 'Completed' : sub.status === 'active' ? 'In progress' : 'Pending'}</div>
      <div class="content-detail">${invDescs[sub.name] || ''}</div>
    `;
    return;
  }

  // Paper sub-steps
  if (mod.id === 'paper' && sub && state.activeRow === 2) {
    const paperDescs = {
      'Demos': 'Generate interactive Python demos showcasing key results and methodology.',
      'Visualizations': 'Create publication-quality figures, charts, and diagrams for the paper.',
      'Full Draft': 'Compile all sections into a complete LaTeX document with proper formatting.',
      'References': 'Resolve and format all citations, ensure bibliography completeness.',
      'Final PDF': 'Render the final PDF with all figures, tables, and supplementary materials.',
    };
    area.innerHTML = `
      <div class="content-breadcrumb">${breadcrumb}</div>
      <div class="content-title" style="color:${mod.color}">${sub.name}</div>
      <div class="content-subtitle">Pending</div>
      <div class="content-detail">${paperDescs[sub.name] || ''}</div>
    `;
    return;
  }

  // Default: module-level content
  area.innerHTML = `
    <div class="content-breadcrumb">${breadcrumb}</div>
    <div class="content-title" style="color:${mod.color}">${mod.content.title}</div>
    <div class="content-subtitle">${mod.content.subtitle}</div>
    <div class="content-detail">${mod.content.detail || ''}</div>
  `;
}

function renderAll() {
  renderModules();
  renderSubDots();
  renderContent();
}

// ── Keyboard Navigation ──
document.addEventListener('keydown', (e) => {
  const mod = MODULES[state.moduleIdx];
  const maxSub = mod.subSteps.length - 1;

  switch (e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if (state.activeRow === 1) {
        state.moduleIdx = Math.max(0, state.moduleIdx - 1);
        state.subIdx = 0;
      } else if (state.activeRow === 2) {
        state.subIdx = Math.max(0, state.subIdx - 1);
      }
      renderAll();
      break;

    case 'ArrowRight':
      e.preventDefault();
      if (state.activeRow === 1) {
        state.moduleIdx = Math.min(MODULES.length - 1, state.moduleIdx + 1);
        state.subIdx = 0;
      } else if (state.activeRow === 2) {
        state.subIdx = Math.min(maxSub, state.subIdx + 1);
      }
      renderAll();
      break;

    case 'ArrowDown':
      e.preventDefault();
      if (state.activeRow === 1) {
        state.activeRow = 2;
      }
      renderAll();
      break;

    case 'ArrowUp':
      e.preventDefault();
      if (state.activeRow === 2) {
        state.activeRow = 1;
      }
      renderAll();
      break;
  }
});

// ── Init ──
positionGlowDot(65);
renderAll();

// Pulse the active invention diamond
setInterval(() => {
  const markers = document.querySelectorAll('.module-marker');
  const inventionDiamond = markers[2]?.querySelector('.diamond-inner');
  if (inventionDiamond) {
    inventionDiamond.style.opacity = inventionDiamond.style.opacity === '0.6' ? '1' : '0.6';
  }
}, 1200);
</script>
