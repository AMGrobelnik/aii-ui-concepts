<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Simple View</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0d0f14;
    --surface:      #151821;
    --surface-alt:  #1a1e2a;
    --border:       #252a3a;
    --border-light: #2f3548;
    --text:         #e2e5ed;
    --text-dim:     #8890a4;
    --text-muted:   #5c6378;

    --green:        #34d399;
    --green-dim:    rgba(52, 211, 153, 0.15);
    --purple:       #a78bfa;
    --purple-dim:   rgba(167, 139, 250, 0.15);
    --blue:         #60a5fa;
    --blue-dim:     rgba(96, 165, 250, 0.15);
    --gray:         #6b7280;
    --gray-dim:     rgba(107, 114, 128, 0.10);

    --diamond-size: 36px;
    --diamond-lg:   42px;
    --glow-sm:      24px;
    --glow-lg:      40px;
    --line-color:   #2a2f40;
    --dot-color:    #60a5fa;

    --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ──────────────────────────────────────────── */
  .app {
    max-width: 920px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Header ──────────────────────────────────────────── */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 6px;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ── Top Strip — Diamond Pipeline ────────────────────── */
  .pipeline-strip {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 36px 0 56px;
    margin-bottom: 36px;
    user-select: none;
  }

  /* ── Connector Lines ─────────────────────────────────── */
  .connector {
    position: relative;
    width: 80px;
    height: 2px;
    background: var(--line-color);
    flex-shrink: 0;
    overflow: visible;
  }

  .connector::after {
    content: '';
    position: absolute;
    top: -2px;
    left: -6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dot-color);
    opacity: 0.9;
    animation: flowDot 2.4s linear infinite;
    box-shadow: 0 0 6px var(--dot-color);
  }

  .connector:nth-child(4)::after { animation-delay: 0.3s; }
  .connector:nth-child(6)::after { animation-delay: 0.6s; }

  @keyframes flowDot {
    0%   { left: -6px;  opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.9; }
    100% { left: calc(100% + 0px); opacity: 0; }
  }

  /* ── Diamond Node ────────────────────────────────────── */
  .diamond-node {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    flex-shrink: 0;
    z-index: 2;
  }

  .diamond-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc(var(--diamond-size) * 1.6);
    height: calc(var(--diamond-size) * 1.6);
  }

  .diamond-node.large .diamond-wrap {
    width: calc(var(--diamond-lg) * 1.6);
    height: calc(var(--diamond-lg) * 1.6);
  }

  /* Glow halo — sits behind diamond */
  .glow-halo {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out);
  }

  .diamond-node[data-color="green"] .glow-halo {
    background: radial-gradient(circle, rgba(52,211,153,0.25) 0%, transparent 70%);
    box-shadow: 0 0 var(--glow-sm) rgba(52,211,153,0.35);
  }
  .diamond-node[data-color="purple"] .glow-halo {
    background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, transparent 70%);
    box-shadow: 0 0 var(--glow-sm) rgba(167,139,250,0.35);
  }
  .diamond-node[data-color="blue"] .glow-halo {
    background: radial-gradient(circle, rgba(96,165,250,0.30) 0%, transparent 70%);
    box-shadow: 0 0 var(--glow-lg) rgba(96,165,250,0.45);
    animation: pulseBlue 2.5s ease-in-out infinite;
  }
  .diamond-node[data-color="gray"] .glow-halo {
    background: none;
    box-shadow: none;
  }

  @keyframes pulseBlue {
    0%, 100% { box-shadow: 0 0 var(--glow-lg) rgba(96,165,250,0.40); transform: scale(1); }
    50%      { box-shadow: 0 0 56px rgba(96,165,250,0.60); transform: scale(1.08); }
  }

  /* The diamond shape itself */
  .diamond {
    position: relative;
    width: var(--diamond-size);
    height: var(--diamond-size);
    transform: rotate(45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition:
      transform 0.35s var(--ease-spring),
      box-shadow 0.35s var(--ease-out),
      border-color 0.35s var(--ease-out);
    z-index: 1;
  }

  .diamond-node.large .diamond {
    width: var(--diamond-lg);
    height: var(--diamond-lg);
  }

  /* Filled diamonds */
  .diamond-node[data-color="green"] .diamond {
    background: linear-gradient(135deg, #2dd4a0, #22c088);
    border: 2px solid rgba(52,211,153,0.6);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.15);
  }
  .diamond-node[data-color="purple"] .diamond {
    background: linear-gradient(135deg, #a78bfa, #8b5cf6);
    border: 2px solid rgba(167,139,250,0.6);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.15);
  }
  .diamond-node[data-color="blue"] .diamond {
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    border: 2px solid rgba(96,165,250,0.6);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.15);
  }

  /* Outline-only diamond (gray/pending) */
  .diamond-node[data-color="gray"] .diamond {
    background: transparent;
    border: 2px solid var(--gray);
    box-shadow: none;
  }

  /* Inner label (counter-rotate to keep text upright) */
  .diamond-label {
    transform: rotate(-45deg);
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    line-height: 1;
    white-space: nowrap;
  }

  .diamond-node[data-color="gray"] .diamond-label {
    color: var(--gray);
    text-shadow: none;
  }

  /* Module name below */
  .diamond-name {
    margin-top: 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.2px;
    transition: color 0.3s var(--ease-out);
  }

  /* ── Selected State ──────────────────────────────────── */
  .diamond-node.selected .diamond {
    transform: rotate(45deg) scale(1.18);
  }

  .diamond-node.selected .glow-halo {
    transform: scale(1.35);
    opacity: 1;
  }

  .diamond-node.selected[data-color="green"] .glow-halo {
    box-shadow: 0 0 36px rgba(52,211,153,0.55);
  }
  .diamond-node.selected[data-color="purple"] .glow-halo {
    box-shadow: 0 0 36px rgba(167,139,250,0.55);
  }
  .diamond-node.selected[data-color="blue"] .glow-halo {
    box-shadow: 0 0 56px rgba(96,165,250,0.70);
    animation: pulseBlueSelected 2s ease-in-out infinite;
  }

  @keyframes pulseBlueSelected {
    0%, 100% { box-shadow: 0 0 56px rgba(96,165,250,0.65); transform: scale(1.35); }
    50%      { box-shadow: 0 0 72px rgba(96,165,250,0.85); transform: scale(1.45); }
  }

  .diamond-node.selected .diamond-name {
    color: var(--text);
  }

  /* Hover */
  .diamond-node:not(.selected):hover .diamond {
    transform: rotate(45deg) scale(1.08);
  }
  .diamond-node:not(.selected):hover .glow-halo {
    transform: scale(1.15);
  }

  /* ── Content Area ────────────────────────────────────── */
  .content-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeSlideIn 0.35s var(--ease-out);
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .content-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
  }

  .content-header .stage-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 12px;
  }

  .stage-badge.green  { background: var(--green-dim);  color: var(--green); }
  .stage-badge.purple { background: var(--purple-dim); color: var(--purple); }
  .stage-badge.blue   { background: var(--blue-dim);   color: var(--blue); }
  .stage-badge.gray   { background: var(--gray-dim);   color: var(--gray); }

  .stage-badge .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .stage-badge.green  .badge-dot { background: var(--green); }
  .stage-badge.purple .badge-dot { background: var(--purple); }
  .stage-badge.blue   .badge-dot { background: var(--blue); }
  .stage-badge.gray   .badge-dot { background: var(--gray); }

  .stage-badge.blue .badge-dot {
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  .content-header h2 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 10px;
    color: var(--text);
  }

  .content-header .summary {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-dim);
    max-width: 680px;
  }

  /* ── Sub-Stages (Expandable) ─────────────────────────── */
  .substages {
    padding: 8px 0;
  }

  .substage {
    border-bottom: 1px solid var(--border);
  }
  .substage:last-child { border-bottom: none; }

  .substage-trigger {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 32px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: background 0.2s;
  }
  .substage-trigger:hover {
    background: var(--surface-alt);
  }

  .substage-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .substage-icon.green  { background: var(--green-dim);  color: var(--green); }
  .substage-icon.purple { background: var(--purple-dim); color: var(--purple); }
  .substage-icon.blue   { background: var(--blue-dim);   color: var(--blue); }
  .substage-icon.gray   { background: var(--gray-dim);   color: var(--gray); }

  .substage-info {
    flex: 1;
    min-width: 0;
  }

  .substage-info .sub-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .substage-info .sub-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .substage-status {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .substage-status.done     { background: var(--green-dim);  color: var(--green); }
  .substage-status.active   { background: var(--blue-dim);   color: var(--blue); }
  .substage-status.pending  { background: var(--gray-dim);   color: var(--gray); }
  .substage-status.scored   { background: var(--purple-dim); color: var(--purple); }

  .substage-chevron {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: transform 0.25s var(--ease-out);
    flex-shrink: 0;
  }

  .substage.open .substage-chevron {
    transform: rotate(90deg);
  }

  /* Expandable detail */
  .substage-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s var(--ease-out), padding 0.35s var(--ease-out);
  }

  .substage.open .substage-detail {
    max-height: 600px;
  }

  .substage-detail-inner {
    padding: 0 32px 20px 78px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-dim);
  }

  .substage-detail-inner p {
    margin-bottom: 10px;
  }

  .substage-detail-inner .detail-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 6px 16px;
    font-size: 12px;
    margin-top: 8px;
  }

  .detail-grid .label {
    color: var(--text-muted);
    font-weight: 500;
  }

  .detail-grid .value {
    color: var(--text-dim);
  }

  .detail-grid .value.highlight {
    color: var(--blue);
    font-weight: 600;
  }

  /* ── Navigation ──────────────────────────────────────── */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 28px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease-out);
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--surface-alt);
    border-color: var(--border-light);
    color: var(--text);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .nav-btn svg {
    width: 16px;
    height: 16px;
  }

  .nav-indicator {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    min-width: 60px;
    text-align: center;
  }

  /* ── Keyboard Hint ───────────────────────────────────── */
  .key-hints {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .key-hints kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 20px;
    padding: 0 5px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    margin: 0 3px;
  }

  /* ── Transition helper ───────────────────────────────── */
  .content-area.transitioning {
    animation: contentSwitch 0.3s var(--ease-out);
  }

  @keyframes contentSwitch {
    0%   { opacity: 0.5; transform: translateY(6px); }
    100% { opacity: 1;   transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>AI Inventor</h1>
    <p>Pipeline run #0042 &middot; Simple view</p>
  </div>

  <!-- Pipeline Strip -->
  <div class="pipeline-strip" id="pipelineStrip">
    <!-- Seed -->
    <div class="diamond-node selected" data-color="green" data-index="0">
      <div class="diamond-wrap">
        <div class="glow-halo"></div>
        <div class="diamond">
          <span class="diamond-label">&check;</span>
        </div>
      </div>
      <span class="diamond-name">Seed</span>
    </div>

    <div class="connector"></div>

    <!-- Hypothesis -->
    <div class="diamond-node" data-color="purple" data-index="1">
      <div class="diamond-wrap">
        <div class="glow-halo"></div>
        <div class="diamond">
          <span class="diamond-label">8.4</span>
        </div>
      </div>
      <span class="diamond-name">Hypothesis</span>
    </div>

    <div class="connector"></div>

    <!-- Invention -->
    <div class="diamond-node large" data-color="blue" data-index="2">
      <div class="diamond-wrap">
        <div class="glow-halo"></div>
        <div class="diamond">
          <span class="diamond-label">3/5</span>
        </div>
      </div>
      <span class="diamond-name">Invention</span>
    </div>

    <div class="connector"></div>

    <!-- Paper -->
    <div class="diamond-node" data-color="gray" data-index="3">
      <div class="diamond-wrap">
        <div class="glow-halo"></div>
        <div class="diamond">
          <span class="diamond-label">&mdash;</span>
        </div>
      </div>
      <span class="diamond-name">Paper</span>
    </div>
  </div>

  <!-- Content Area -->
  <div class="content-area" id="contentArea">
    <!-- Populated by JS -->
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="nav-btn" id="btnPrev" disabled>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 12L6 8l4-4"/></svg>
      Previous
    </button>
    <span class="nav-indicator" id="navIndicator">1 / 4</span>
    <button class="nav-btn" id="btnNext">
      Next
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>
    </button>
  </div>

  <div class="key-hints">
    <span><kbd>&larr;</kbd> Previous stage</span>
    <span><kbd>&rarr;</kbd> Next stage</span>
    <span><kbd>Space</kbd> Toggle detail</span>
  </div>

</div>

<script>
/* ────────────────────────────────────────────────────────
   Stage Data
   ──────────────────────────────────────────────────────── */
const stages = [
  {
    key: "seed",
    color: "green",
    statusLabel: "Complete",
    title: "Seed Hypotheses",
    summary: "Generated 12 seed hypotheses from the knowledge graph by traversing cross-domain edges. The graph contains 847 concept nodes and 2,341 relational edges spanning materials science, photonics, and energy storage.",
    substages: [
      {
        icon: "1",
        iconColor: "green",
        title: "Knowledge Graph Construction",
        meta: "847 nodes, 2,341 edges",
        status: "done",
        statusLabel: "Done",
        detail: {
          text: "Built a heterogeneous knowledge graph from 156 source papers. Extracted entity mentions, co-occurrence relationships, and causal links using structured LLM extraction.",
          grid: [
            ["Nodes", "847 concepts"],
            ["Edges", "2,341 relations"],
            ["Sources", "156 papers"],
            ["Duration", "4m 12s"],
          ]
        }
      },
      {
        icon: "2",
        iconColor: "green",
        title: "Cross-Domain Traversal",
        meta: "38 bridge edges identified",
        status: "done",
        statusLabel: "Done",
        detail: {
          text: "Identified promising cross-domain connections by searching for shortest paths between distant clusters. Prioritized edges that connect disparate fields with high semantic similarity but low citation overlap.",
          grid: [
            ["Clusters", "6 domains"],
            ["Bridge edges", "38 found"],
            ["Avg path len", "3.2 hops"],
            ["Filter", "Cosine > 0.72"],
          ]
        }
      },
      {
        icon: "3",
        iconColor: "green",
        title: "Hypothesis Seeding",
        meta: "12 seed hypotheses generated",
        status: "done",
        statusLabel: "Done",
        detail: {
          text: "Prompted the LLM with each bridge edge pair and surrounding context to generate initial hypothesis statements. Each hypothesis articulates a novel mechanism or application enabled by the cross-domain link.",
          grid: [
            ["Generated", "12 hypotheses"],
            ["Avg length", "145 tokens"],
            ["Model", "Claude Opus 4"],
            ["Temperature", "0.9"],
          ]
        }
      },
    ]
  },
  {
    key: "hypothesis",
    color: "purple",
    statusLabel: "Scored 8.4",
    title: "Hypothesis Refinement",
    summary: "Iterative review loop refined 12 seed hypotheses down to 4 finalists. Each hypothesis was scored on novelty, feasibility, and specificity. Top candidate scored 8.4 / 10.",
    substages: [
      {
        icon: "1",
        iconColor: "purple",
        title: "Initial Scoring",
        meta: "12 hypotheses evaluated",
        status: "scored",
        statusLabel: "8.4",
        detail: {
          text: "Each hypothesis was independently scored by three LLM reviewers on a rubric covering novelty (0-10), feasibility (0-10), and specificity (0-10). Scores were averaged and calibrated against historical baselines.",
          grid: [
            ["Reviewers", "3 LLM passes"],
            ["Top score", "8.4 / 10"],
            ["Median", "6.7 / 10"],
            ["Threshold", "7.0 min"],
          ]
        }
      },
      {
        icon: "2",
        iconColor: "purple",
        title: "Critique & Revision",
        meta: "3 revision rounds",
        status: "done",
        statusLabel: "Done",
        detail: {
          text: "Hypotheses above threshold entered a critique-revision loop. The reviewer agent identified gaps in mechanistic reasoning, missing boundary conditions, and vague claims. The author agent revised accordingly.",
          grid: [
            ["Rounds", "3 iterations"],
            ["Avg delta", "+0.8 pts"],
            ["Rejected", "2 hypotheses"],
            ["Duration", "6m 45s"],
          ]
        }
      },
      {
        icon: "3",
        iconColor: "purple",
        title: "Final Selection",
        meta: "4 finalists chosen",
        status: "done",

/* ────────────────────────────────────────────────────────
   State
   ──────────────────────────────────────────────────────── */
let currentIndex = 0;

const nodes         = document.querySelectorAll('.diamond-node');
const contentArea   = document.getElementById('contentArea');
const btnPrev       = document.getElementById('btnPrev');
const btnNext       = document.getElementById('btnNext');
const navIndicator  = document.getElementById('navIndicator');

/* ────────────────────────────────────────────────────────
   Render
   ──────────────────────────────────────────────────────── */
function renderContent(index) {
  const s = stages[index];

  const subsHTML = s.substages.map((sub, i) => {
    const gridRows = sub.detail.grid.map(
      ([label, value]) => {
        const cls = sub.status === 'active' && label === 'Est. remain' ? 'value highlight' : 'value';
        return `<span class="label">${label}</span><span class="${cls}">${value}</span>`;
      }
    ).join('');

    return `
      <div class="substage" data-sub="${i}">
        <button class="substage-trigger" onclick="toggleSubstage(this)">
          <div class="substage-icon ${sub.iconColor}">${sub.icon}</div>
          <div class="substage-info">
            <div class="sub-title">${sub.title}</div>
            <div class="sub-meta">${sub.meta}</div>
          </div>
          <span class="substage-status ${sub.status}">${sub.statusLabel}</span>
          <div class="substage-chevron">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 4l4 4-4 4"/>
            </svg>
          </div>
        </button>
        <div class="substage-detail">
          <div class="substage-detail-inner">
            <p>${sub.detail.text}</p>
            <div class="detail-grid">${gridRows}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  contentArea.innerHTML = `
    <div class="content-header">
      <div class="stage-badge ${s.color}">
        <span class="badge-dot"></span>
        ${s.statusLabel}
      </div>
      <h2>${s.title}</h2>
      <p class="summary">${s.summary}</p>
    </div>
    <div class="substages">${subsHTML}</div>`;
}

/* ────────────────────────────────────────────────────────
   Navigation
   ──────────────────────────────────────────────────────── */
function goTo(index) {
  if (index < 0 || index >= stages.length) return;
  currentIndex = index;

  // Update diamond selection
  nodes.forEach((n, i) => {
    n.classList.toggle('selected', i === index);
  });

  // Animate content swap
  contentArea.classList.remove('transitioning');
  void contentArea.offsetWidth; // reflow
  contentArea.classList.add('transitioning');

  renderContent(index);

  // Update nav
  btnPrev.disabled = index === 0;
  btnNext.disabled = index === stages.length - 1;
  navIndicator.textContent = `${index + 1} / ${stages.length}`;
}

/* Diamond click */
nodes.forEach(node => {
  node.addEventListener('click', () => {
    goTo(parseInt(node.dataset.index, 10));
  });
});

/* Button click */
btnPrev.addEventListener('click', () => goTo(currentIndex - 1));
btnNext.addEventListener('click', () => goTo(currentIndex + 1));

/* Keyboard */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(currentIndex - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goTo(currentIndex + 1); }
  if (e.key === ' ') {
    e.preventDefault();
    // Toggle the first closed substage, or close all if all are open
    const subs = contentArea.querySelectorAll('.substage');
    const allOpen = [...subs].every(s => s.classList.contains('open'));
    if (allOpen) {
      subs.forEach(s => s.classList.remove('open'));
    } else {
      const firstClosed = [...subs].find(s => !s.classList.contains('open'));
      if (firstClosed) firstClosed.classList.add('open');
    }
  }
});

/* ────────────────────────────────────────────────────────
   Substage Toggle
   ──────────────────────────────────────────────────────── */
function toggleSubstage(btn) {
  const substage = btn.closest('.substage');
  substage.classList.toggle('open');
}

/* ────────────────────────────────────────────────────────
   Initial Render
   ──────────────────────────────────────────────────────── */
goTo(0);
</script>
