<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed v7 — Glow + Hover</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

.fh { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ft { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
.lb { display: inline-flex; align-items: center; gap: 5px; font-size: 8px; font-weight: 800; color: var(--red); background: var(--red-dim); padding: 2px 8px 2px 6px; border-radius: 4px; letter-spacing: .6px; text-transform: uppercase; }
.ld { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: bk 1.3s ease-in-out infinite; }
@keyframes bk { 0%,100%{opacity:1} 50%{opacity:.2} }
.fs { max-height: 360px; overflow-y: auto; }
.fs::-webkit-scrollbar { width: 3px; }
.fs::-webkit-scrollbar-track { background: transparent; }
.fs::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }
.tm { font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; font-weight: 500; flex-shrink: 0; }

/* ── Shared base for all variants ── */
.feed { display: flex; flex-direction: column; gap: 3px; }
.feed .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: all .15s;
}
.feed .row:hover { background: rgba(255,255,255,.02); }
.feed .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
  transition: all .15s;
}
.feed .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .15s; }

/* ── V1: Subtle glow + hover brighten ── */
.v1 .pill { box-shadow: 0 0 6px var(--glow); }
.v1 .row:hover .pill { filter: brightness(1.3); transform: scale(1.04); }

/* ── V2: Softer glow (3px only) + hover text brightens ── */
.v2 .pill { box-shadow: 0 0 3px var(--glow); }
.v2 .row:hover .pill { filter: brightness(1.25); }
.v2 .row:hover .tx { color: var(--text); }

/* ── V3: Medium glow + hover row gets faint tint ── */
.v3 .pill { box-shadow: 0 0 8px var(--glow); }
.v3 .row:hover { background: var(--row-tint); }
.v3 .row:hover .pill { filter: brightness(1.2); }

/* ── V4: Glow only on hover (clean at rest) ── */
.v4 .row:hover .pill { box-shadow: 0 0 10px var(--glow), 0 0 20px var(--glow); filter: brightness(1.35); transform: scale(1.06); }
.v4 .row:hover .tx { color: var(--text); }

/* ── V5: Persistent glow + hover scales pill + slides text ── */
.v5 .pill { box-shadow: 0 0 6px var(--glow); }
.v5 .row:hover .pill { transform: scale(1.08); filter: brightness(1.4); }
.v5 .row:hover .tx { transform: translateX(2px); }
.v5 .tx { transition: all .15s; }

/* ── V6: Double-ring glow + hover dims time, brightens text ── */
.v6 .pill { box-shadow: 0 0 4px var(--glow), 0 0 12px var(--glow-soft); }
.v6 .row:hover .pill { filter: brightness(1.3); }
.v6 .row:hover .tm { opacity: .3; }
.v6 .row:hover .tx { color: var(--text); font-weight: 500; }
.v6 .tm { transition: opacity .15s; }

/* ── V7: Tight glow + hover underline on text ── */
.v7 .pill { box-shadow: 0 0 5px var(--glow); }
.v7 .row:hover .pill { filter: brightness(1.25); transform: scale(1.04); }
.v7 .row:hover .tx { text-decoration: underline; text-decoration-color: var(--ul-color); text-underline-offset: 3px; color: var(--text); }

/* ── V8: Glow + hover shows colored left border ── */
.v8 .row { border-left: 2px solid transparent; padding-left: 8px; }
.v8 .pill { box-shadow: 0 0 5px var(--glow); }
.v8 .row:hover { border-left-color: var(--accent); }
.v8 .row:hover .pill { filter: brightness(1.3); }

/* ── V9: Wide soft glow + entire row lifts on hover ── */
.v9 .pill { box-shadow: 0 0 4px var(--glow), 0 0 14px var(--glow-soft); }
.v9 .row:hover { transform: translateY(-1px); background: rgba(255,255,255,.025); }
.v9 .row:hover .pill { filter: brightness(1.35); box-shadow: 0 0 6px var(--glow), 0 0 18px var(--glow-soft); }

/* ── V10: Minimal glow + hover swaps pill to outline style ── */
.v10 .pill { box-shadow: 0 0 4px var(--glow); transition: all .2s; }
.v10 .row:hover .pill { background: transparent !important; border: 1px solid var(--accent); box-shadow: 0 0 8px var(--glow); filter: brightness(1.2); }
.v10 .row:hover .tx { color: var(--text); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Activity Feed v7 — Glow + Hover</div>
  <div class="page-sub">Agent 3 — Combining colored pill glow with hover interactions. Real 30-50ch summaries.</div>
</div>

<div class="grid" id="grid"></div>

<script>
const E = [
  { time: '12:04', type: 'tool',     text: 'Add head_direction_ratio to regression subset' },
  { time: '12:03', type: 'thinking', text: 'Use absolute paths, inspect full data' },
  { time: '12:02', type: 'tool',     text: 'Read grammar, build treebank set and genre map' },
  { time: '12:01', type: 'result',   text: 'Saved 58KB report, increased to 185KB' },
  { time: '11:58', type: 'metric',   text: 'Track 95k context usage for exp_id3_it2__opus' },
  { time: '11:55', type: 'result',   text: 'Completed 7 turns, 393.8K\u219217.5K, $0.99' },
  { time: '11:51', type: 'warning',  text: 'Remind 112.7 minutes left to finish tasks' },
  { time: '11:47', type: 'warning',  text: 'Retry paper text after timeout, fork resume' },
  { time: '11:42', type: 'result',   text: 'Created pyproject.toml for exp_id1_it2__opus' },
  { time: '11:38', type: 'progress', text: 'Split script into 4 sections, add 4 markdowns' },
];

const C = {
  tool:     { c: '#60a5fa', bg: 'rgba(96,165,250,.12)',  glow: 'rgba(96,165,250,.3)',  glowSoft: 'rgba(96,165,250,.12)',  tint: 'rgba(96,165,250,.04)',  l: 'tool' },
  result:   { c: '#a78bfa', bg: 'rgba(167,139,250,.12)', glow: 'rgba(167,139,250,.3)', glowSoft: 'rgba(167,139,250,.12)', tint: 'rgba(167,139,250,.04)', l: 'result' },
  progress: { c: '#34d399', bg: 'rgba(52,211,153,.12)',  glow: 'rgba(52,211,153,.3)',  glowSoft: 'rgba(52,211,153,.12)',  tint: 'rgba(52,211,153,.04)',  l: 'prog' },
  metric:   { c: '#22d3ee', bg: 'rgba(34,211,238,.12)',  glow: 'rgba(34,211,238,.3)',  glowSoft: 'rgba(34,211,238,.12)',  tint: 'rgba(34,211,238,.04)',  l: 'metric' },
  warning:  { c: '#fb923c', bg: 'rgba(251,146,60,.12)',  glow: 'rgba(251,146,60,.3)',  glowSoft: 'rgba(251,146,60,.12)',  tint: 'rgba(251,146,60,.04)',  l: 'warn' },
  thinking: { c: '#a78bfa', bg: 'rgba(167,139,250,.12)', glow: 'rgba(167,139,250,.3)', glowSoft: 'rgba(167,139,250,.12)', tint: 'rgba(167,139,250,.04)', l: 'think' },
};

function hdr() {
  return `<div class="fh"><span class="ft">Activity</span><span class="lb"><span class="ld"></span> LIVE</span></div>`;
}

function rows(cls) {
  return E.map(e => {
    const t = C[e.type];
    return `<div class="row" style="--glow:${t.glow};--glow-soft:${t.glowSoft};--row-tint:${t.tint};--accent:${t.c};--ul-color:${t.c}">` +
      `<span class="tm">${e.time}</span>` +
      `<span class="pill" style="background:${t.bg};color:${t.c}">${t.l}</span>` +
      `<span class="tx">${e.text}</span>` +
    `</div>`;
  }).join('');
}

function render(cls) {
  return hdr() + `<div class="fs"><div class="feed ${cls}">${rows(cls)}</div></div>`;
}

const V = [
  { n:1,  name:'Subtle glow + hover pill brightens', cls:'v1' },
  { n:2,  name:'Soft 3px glow + hover text goes white', cls:'v2' },
  { n:3,  name:'Medium glow + hover row tints', cls:'v3' },
  { n:4,  name:'Glow only on hover (clean at rest)', cls:'v4' },
  { n:5,  name:'Glow + hover scales pill, nudges text', cls:'v5' },
  { n:6,  name:'Double-ring glow + hover dims time', cls:'v6' },
  { n:7,  name:'Glow + hover underlines text', cls:'v7' },
  { n:8,  name:'Glow + hover shows left accent bar', cls:'v8' },
  { n:9,  name:'Wide soft glow + hover lifts row', cls:'v9' },
  { n:10, name:'Glow + hover flips pill to outline', cls:'v10' },
];

const g = document.getElementById('grid');
V.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div><div class="vbody">${render(v.cls)}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
