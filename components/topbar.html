<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component — Top Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --blue: #3b82f6; --green: #10b981; --radius: 8px; --ease: cubic-bezier(.4,0,.2,1); }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: rgba(255,255,255,.5);
  padding: 32px;
  color: #1a1a2e;
}
h2 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }

/* Top bar */
.topbar {
  display: flex; align-items: center; padding: 0 14px;
  border-bottom: 1px solid rgba(0,0,0,.06);
  background: rgba(255,255,255,.4);
  min-height: 38px;
}
.tab {
  padding: 9px 12px 7px; font-size: 11px; font-weight: 500;
  color: #8a8a9e; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .12s; margin-bottom: -1px; white-space: nowrap;
}
.tab:hover { color: #4a4a5e; }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tab-spacer { flex: 1; }
.tb-sep { width: 1px; height: 16px; background: rgba(0,0,0,.06); margin: 0 6px; }
.tb-btn {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer; font-size: 11px;
  color: #9e9eb5; display: grid; place-items: center;
}
.tb-btn:hover { background: rgba(0,0,0,.04); color: #6e6e87; }
.tb-status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #9e9eb5; }
.tb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
</style>
</head>
<body>

<h2>Locked-in: D1 tabs — Overview / Details</h2>

<div class="topbar">
  <div class="tab active">Overview</div>
  <div class="tab">Details</div>
  <div class="tab-spacer"></div>
  <div class="tb-status"><div class="tb-dot"></div>Round 3/8</div>
  <div class="tb-sep"></div>
  <div class="tb-btn" title="Help">?</div>
</div>

</body>
</html>
