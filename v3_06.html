<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline — v3.06</title>
<style>
  :root {
    --bg: #1a1d23;
    --surface: #22262e;
    --border: #2e3440;
    --text: #e2e4e9;
    --muted: #8b919a;
    --green: #22c55e;
    --purple: #a78bfa;
    --blue: #3b82f6;
    --orange: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── Big Ring ── */
  .ring-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .ring-svg {
    width: 620px;
    height: 620px;
    opacity: 0.07;
  }

  .ring-track { fill: none; stroke: var(--border); stroke-width: 1.5; }

  .ring-arc {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    filter: blur(1px);
  }

  .ring-arc-green { stroke: var(--green); }
  .ring-arc-purple { stroke: var(--purple); }
  .ring-arc-blue { stroke: var(--blue); }
  .ring-arc-orange { stroke: var(--orange); }

  @keyframes ringRotate {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .ring-spin {
    transform-origin: 310px 310px;
    animation: ringRotate 40s linear infinite;
  }

  .ring-spin-reverse {
    transform-origin: 310px 310px;
    animation: ringRotate 55s linear infinite reverse;
  }

  /* ── Layout ── */
  .main-layout {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 28px 40px 20px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }

  .header-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header-title span { color: var(--muted); font-weight: 400; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 18px;
    font-size: 11px;
    color: var(--muted);
  }

  .status-pill {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-pill.active {
    background: rgba(34,197,94,0.12);
    color: var(--green);
  }

  .kbd-hint {
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    font-family: monospace;
  }

  /* ── Row 1: Card Nodes + Particle Canvas ── */
  .row1-wrapper {
    position: relative;
    flex-shrink: 0;
    margin-bottom: 16px;
    height: 75px;
  }

  .row1-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .row1-cards {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 100px;
    height: 100%;
    align-items: center;
  }

  .node-card {
    width: 140px;
    height: 55px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px 6px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }

  .node-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 8px 0 0 8px;
  }

  .node-card[data-color="green"]::before { background: var(--green); }
  .node-card[data-color="purple"]::before { background: var(--purple); }
  .node-card[data-color="blue"]::before { background: var(--blue); }
  .node-card[data-color="orange"]::before { background: var(--orange); }

  .node-card.active[data-color="green"] {
    border-color: rgba(34,197,94,0.35);
    box-shadow: 0 0 20px rgba(34,197,94,0.08), inset 0 0 12px rgba(34,197,94,0.03);
  }
  .node-card.active[data-color="purple"] {
    border-color: rgba(167,139,250,0.35);
    box-shadow: 0 0 20px rgba(167,139,250,0.08), inset 0 0 12px rgba(167,139,250,0.03);
  }
  .node-card.active[data-color="blue"] {
    border-color: rgba(59,130,246,0.35);
    box-shadow: 0 0 20px rgba(59,130,246,0.08), inset 0 0 12px rgba(59,130,246,0.03);
  }
  .node-card.active[data-color="orange"] {
    border-color: rgba(245,158,11,0.35);
    box-shadow: 0 0 20px rgba(245,158,11,0.08), inset 0 0 12px rgba(245,158,11,0.03);
  }

  @keyframes borderShimmer {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 0.8; }
  }

  .node-card.active::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 8px;
    border: 1px solid transparent;
    animation: borderShimmer 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  .node-card.active[data-color="green"]::after { border-color: rgba(34,197,94,0.2); }
  .node-card.active[data-color="purple"]::after { border-color: rgba(167,139,250,0.2); }
  .node-card.active[data-color="blue"]::after { border-color: rgba(59,130,246,0.2); }
  .node-card.active[data-color="orange"]::after { border-color: rgba(245,158,11,0.2); }

  .node-card .card-name {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .node-card .card-metric {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
  }

  .node-card[data-color="green"] .card-metric { color: var(--green); }
  .node-card[data-color="purple"] .card-metric { color: var(--purple); }
  .node-card[data-color="blue"] .card-metric { color: var(--blue); }
  .node-card[data-color="orange"] .card-metric { color: var(--orange); }

  .node-card.completed .card-metric { color: var(--muted); }

  .card-progress {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.04);
  }

  .card-progress-fill {
    height: 100%;
    border-radius: 0 2px 0 0;
    transition: width 0.5s ease;
  }

  .node-card[data-color="green"] .card-progress-fill { background: var(--green); }
  .node-card[data-color="purple"] .card-progress-fill { background: var(--purple); }
  .node-card[data-color="blue"] .card-progress-fill { background: var(--blue); }
  .node-card[data-color="orange"] .card-progress-fill { background: var(--orange); }

  .node-card.selected {
    outline: 2px solid rgba(255,255,255,0.2);
    outline-offset: 2px;
  }

  /* ── Row 2: Dot Nodes ── */
  .row2-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
    margin-bottom: 24px;
    height: 36px;
  }

  .dot-node {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .dot-node:hover { background: rgba(255,255,255,0.03); }

  .dot-node.selected { background: rgba(255,255,255,0.06); }

  .dot-circle {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-node.completed .dot-circle { opacity: 0.5; }
  .dot-node.active .dot-circle { box-shadow: 0 0 6px currentColor; }

  .dot-label {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.2px;
  }

  .dot-line {
    width: 24px;
    height: 1px;
    flex-shrink: 0;
  }

  .dot-line.completed { background: var(--muted); opacity: 0.3; }
  .dot-line.active    { background: var(--muted); opacity: 0.5; }
  .dot-line.pending   { background: var(--border); opacity: 0.4; }

  /* ── Detail Panel ── */
  .detail-panel {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    max-width: 900px;
    margin: 0 auto;
  }

  .detail-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .detail-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .detail-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .detail-title { font-size: 15px; font-weight: 600; }
  .detail-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .detail-badges {
    display: flex;
    gap: 8px;
  }

  .detail-badge {
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .detail-body {
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .detail-section {
    background: rgba(0,0,0,0.15);
    border-radius: 8px;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.03);
  }

  .detail-section.full-width {
    grid-column: 1 / -1;
  }

  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
  }

  .metric-label { font-size: 12px; color: var(--muted); }
  .metric-value { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .bar-row {
    margin-top: 6px;
  }

  .bar-label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
  }

  .bar-track {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .log-list {
    list-style: none;
  }

  .log-list li {
    font-size: 11px;
    color: var(--muted);
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.02);
  }

  .log-list li:last-child { border-bottom: none; }

  .log-time {
    font-size: 10px;
    font-family: monospace;
    color: var(--border);
    flex-shrink: 0;
    letter-spacing: -0.3px;
    width: 48px;
  }

  .log-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  .footer {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 10px 0 4px;
    font-size: 10px;
    color: var(--border);
  }

  .footer span { opacity: 0.6; }
</style>
</head>

// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
const allItems = [
  ...row1Data.map((d, i) => ({ row: 1, index: i, id: d.id })),
  ...row2Data.map((d, i) => ({ row: 2, index: i, id: d.id })),
];
let selectedIdx = 1; // start on active hypo loop

// ───────────────────────────────────────────────
// RENDER ROW 1 CARDS
// ───────────────────────────────────────────────
function renderRow1() {
  const container = document.getElementById('row1Cards');
  container.innerHTML = '';
  row1Data.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = `node-card ${d.status}`;
    card.dataset.color = d.color;
    card.dataset.row1Index = i;
    if (allItems[selectedIdx].row === 1 && allItems[selectedIdx].index === i) {
      card.classList.add('selected');
    }
    card.innerHTML = `
      <div class="card-name">${d.name}</div>
      <div class="card-metric">${d.metric}</div>
      <div class="card-progress"><div class="card-progress-fill" style="width:${d.progress}%"></div></div>
    `;
    card.addEventListener('click', () => {
      selectedIdx = i;
      render();
    });
    container.appendChild(card);
  });
}

// ───────────────────────────────────────────────
// RENDER ROW 2 DOTS
// ───────────────────────────────────────────────
function renderRow2() {
  const container = document.getElementById('row2Dots');
  container.innerHTML = '';
  row2Data.forEach((d, i) => {
    if (i > 0) {
      const line = document.createElement('div');
      line.className = `dot-line ${d.status === 'completed' || row2Data[i-1].status === 'completed' ? 'completed' : d.status === 'active' ? 'active' : 'pending'}`;
      container.appendChild(line);
    }
    const node = document.createElement('div');
    node.className = `dot-node ${d.status}`;
    if (allItems[selectedIdx].row === 2 && allItems[selectedIdx].index === i) {
      node.classList.add('selected');
    }
    node.innerHTML = `
      <div class="dot-circle" style="background:${COLORS[d.color].hex}; color:${COLORS[d.color].hex}"></div>
      <span class="dot-label">${d.label}</span>
    `;
    node.addEventListener('click', () => {
      selectedIdx = row1Data.length + i;
      render();
    });
    container.appendChild(node);
  });
}

// ───────────────────────────────────────────────
// RENDER DETAIL PANEL
// ───────────────────────────────────────────────
function renderDetail() {
  const panel = document.getElementById('detailPanel');
  const item = allItems[selectedIdx];
  let detail;
  let color;

  if (item.row === 1) {
    detail = row1Data[item.index].detail;
    color = row1Data[item.index].color;
  } else {
    detail = row2Details[item.id];
    color = row2Data[item.index].color;
  }

  const hex = COLORS[color].hex;

  let sectionsHTML = '';
  detail.sections.forEach(s => {
    const fw = s.full ? ' full-width' : '';
    let inner = '';

    if (s.type === 'metrics') {
      inner = s.items.map(m =>
        `<div class="metric-row"><span class="metric-label">${m.label}</span><span class="metric-value">${m.value}</span></div>`
      ).join('');
    } else if (s.type === 'bars') {
      inner = s.items.map(b =>
        `<div class="bar-row">
          <div class="bar-label"><span>${b.label}</span><span>${b.pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${b.pct}%;background:${b.color}"></div></div>
        </div>`

    } else if (s.type === 'log') {
      inner = '<ul class="log-list">' + s.items.map(l =>
        `<li><span class="log-time">${l.time}</span><span class="log-dot" style="background:${l.color}"></span>${l.text}</li>`
      ).join('') + '</ul>';

    sectionsHTML += `<div class="detail-section${fw}"><div class="section-title">${s.title}</div>${inner}</div>`;

  const badgesHTML = detail.badges.map(b =>

// ───────────────────────────────────────────────
// PARTICLE CANVAS SYSTEM
// ───────────────────────────────────────────────
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let cardPositions = []; // { cx, cy } for each row1 card

function resizeCanvas() {
  const wrapper = canvas.parentElement;
  canvas.width = wrapper.offsetWidth;
  canvas.height = wrapper.offsetHeight;
}

function getCardCenters() {
  const cards = document.querySelectorAll('.node-card');
  const wrapperRect = canvas.parentElement.getBoundingClientRect();
  cardPositions = [];
  cards.forEach(c => {
    const r = c.getBoundingClientRect();
    cardPositions.push({
      cx: r.left + r.width / 2 - wrapperRect.left,
      cy: r.top + r.height / 2 - wrapperRect.top,
      left: r.left - wrapperRect.left,
      right: r.right - wrapperRect.left,
      top: r.top - wrapperRect.top,
      bottom: r.bottom - wrapperRect.top,
    });
  });
}

function connectorStatus(i) {
  // Status of connector between card i and card i+1
  const a = row1Data[i].status;
  const b = row1Data[i + 1].status;
  if (a === 'completed' && b === 'completed') return 'completed';
  if (a === 'completed' && b === 'active') return 'active';
  if (a === 'active' && b === 'active') return 'active';
  if (a === 'active') return 'active';
  return 'pending';
}

function lerp(a, b, t) { return a + (b - a) * t; }

function lerpColor(c1, c2, t) {
  return [
    Math.round(lerp(c1[0], c2[0], t)),
    Math.round(lerp(c1[1], c2[1], t)),
    Math.round(lerp(c1[2], c2[2], t)),
  ];
}

function bezierPoint(p0x, p0y, p1x, p1y, p2x, p2y, p3x, p3y, t) {
  const u = 1 - t;
  const tt = t * t;
  const uu = u * u;
  const uuu = uu * u;
  const ttt = tt * t;
  return {
    x: uuu * p0x + 3 * uu * t * p1x + 3 * u * tt * p2x + ttt * p3x,
    y: uuu * p0y + 3 * uu * t * p1y + 3 * u * tt * p2y + ttt * p3y,
  };
}

function initParticles() {
  particles = [];
  for (let i = 0; i < row1Data.length - 1; i++) {
    const status = connectorStatus(i);
    if (status === 'pending') continue;

    const count = status === 'active' ? 5 : 2;
    const speed = status === 'active' ? 0.008 : 0.003;

    for (let p = 0; p < count; p++) {
      particles.push({
        connIdx: i,
        t: p / count,
        speed: speed + (Math.random() - 0.5) * 0.002,
        size: status === 'active' ? 2.5 : 1.8,
        glow: status === 'active',
      });
    }
  }
}

function drawConnectors() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (cardPositions.length < 2) return;

  // Draw base paths (dashed for pending)
  for (let i = 0; i < cardPositions.length - 1; i++) {
    const a = cardPositions[i];
    const b = cardPositions[i + 1];
    const status = connectorStatus(i);

    const startX = a.right + 4;
    const endX = b.left - 4;
    const midX = (startX + endX) / 2;
    const cpOffset = (endX - startX) * 0.25;

    ctx.beginPath();
    ctx.moveTo(startX, a.cy);
    ctx.bezierCurveTo(
      startX + cpOffset, a.cy - 12,
      endX - cpOffset, b.cy - 12,
      endX, b.cy
    );

    if (status === 'pending') {
      ctx.setLineDash([4, 6]);
      ctx.strokeStyle = 'rgba(46,52,64,0.6)';
      ctx.lineWidth = 1;
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw particles
  particles.forEach(p => {
    const i = p.connIdx;
    if (i >= cardPositions.length - 1) return;

    const a = cardPositions[i];
    const b = cardPositions[i + 1];

    const startX = a.right + 4;
    const endX = b.left - 4;
    const cpOffset = (endX - startX) * 0.25;

    const pos = bezierPoint(
      startX, a.cy,
      startX + cpOffset, a.cy - 12,
      endX - cpOffset, b.cy - 12,
      endX, b.cy,
      p.t
    );

    const srcColor = COLORS[row1Data[i].color].rgb;
    const dstColor = COLORS[row1Data[i + 1].color].rgb;
    const c = lerpColor(srcColor, dstColor, p.t);

    if (p.glow) {
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, p.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.12)`;
      ctx.fill();

      // Trail
      const trailT = Math.max(0, p.t - 0.06);
      const trailPos = bezierPoint(
        startX, a.cy,
        startX + cpOffset, a.cy - 12,
        endX - cpOffset, b.cy - 12,
        endX, b.cy,
        trailT
      );
      ctx.beginPath();
      ctx.moveTo(trailPos.x, trailPos.y);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.25)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${p.glow ? 0.9 : 0.5})`;
    ctx.fill();
  });
}

function updateParticles() {
  particles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
  });
}

// ───────────────────────────────────────────────
// ANIMATION LOOP
// ───────────────────────────────────────────────
function animate() {
  getCardCenters();
  updateParticles();
  drawConnectors();
  requestAnimationFrame(animate);
}

// ───────────────────────────────────────────────
// FULL RENDER
// ───────────────────────────────────────────────
function render() {
  renderRow1();
  renderRow2();
  renderDetail();
  // Re-acquire card positions after DOM update
  requestAnimationFrame(getCardCenters);
}

// ───────────────────────────────────────────────
// KEYBOARD NAVIGATION
// ───────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    selectedIdx = Math.min(selectedIdx + 1, allItems.length - 1);
    render();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectedIdx = Math.max(selectedIdx - 1, 0);
    render();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const cur = allItems[selectedIdx];
    if (cur.row === 1) {
      // Jump to row 2
      const targetIdx = row1Data.length + Math.min(cur.index, row2Data.length - 1);
      selectedIdx = Math.min(targetIdx, allItems.length - 1);
    }
    render();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const cur = allItems[selectedIdx];
    if (cur.row === 2) {
      // Jump to row 1
      selectedIdx = Math.min(cur.index, row1Data.length - 1);
    }
    render();
  }
});

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
window.addEventListener('resize', () => {
  resizeCanvas();
  getCardCenters();
});

resizeCanvas();
render();
initParticles();
animate();
</script>
