<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra Pipeline Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0e13;
  --bg-warm: #10121a;
  --surface: #151820;
  --surface-raised: #1a1e28;
  --surface-hover: #222733;
  --border: rgba(46, 52, 68, 0.7);
  --border-light: rgba(60, 70, 90, 0.5);
  --border-subtle: rgba(30, 36, 48, 0.8);

  --glass-bg: rgba(20, 24, 32, 0.62);
  --glass-bg-heavy: rgba(18, 22, 30, 0.78);
  --glass-border: rgba(120, 140, 180, 0.09);
  --glass-border-bright: rgba(160, 180, 220, 0.14);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.015) 40%, transparent 60%);
  --glass-blur: 20px;
  --glass-blur-heavy: 28px;

  --text: #e4e8f0;
  --text-muted: #8892a4;
  --text-dim: #535c6e;
  --text-faint: #3a4255;

  --purple: #a78bfa;
  --purple-glow: rgba(167,139,250,0.35);
  --purple-dim: rgba(167,139,250,0.10);
  --purple-deep: rgba(167,139,250,0.55);

  --blue: #3b82f6;
  --blue-glow: rgba(59,130,246,0.35);
  --blue-dim: rgba(59,130,246,0.10);
  --blue-deep: rgba(59,130,246,0.55);

  --orange: #f59e0b;
  --orange-glow: rgba(245,158,11,0.35);
  --orange-dim: rgba(245,158,11,0.10);
  --orange-deep: rgba(245,158,11,0.55);

  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.10);
  --red: #ef4444;

  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);

  --header-h: 46px;
  --sidebar-collapsed: 50px;
  --sidebar-expanded: 244px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* subtle grid underlay */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(100,120,160,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,120,160,0.02) 1px, transparent 1px);
  background-size: 56px 56px;
}

/* radial color nebulas */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 15%, rgba(167,139,250,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 55% 50%, rgba(59,130,246,0.035) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 85%, rgba(245,158,11,0.025) 0%, transparent 50%);
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   FIXED HEADER (46px glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(12, 14, 19, 0.82);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 22px;
  z-index: 1000; gap: 14px;
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
}

.header-brand {
  font-weight: 800; font-size: 14px; letter-spacing: -0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}

.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.breadcrumb span { color: var(--text-dim); }
.breadcrumb .sep { color: rgba(100,116,155,0.3); font-size: 10px; }
.breadcrumb .active { color: var(--text-muted); font-weight: 500; }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 18px; }
.header-stat {
  font-size: 11px; color: var(--text-dim);
  display: flex; align-items: center; gap: 5px;
}
.header-stat .val {
  color: var(--text); font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* Sparkline bars */
.sparkline {
  display: flex; align-items: flex-end; gap: 1px; height: 14px;
}
.sparkline-bar {
  width: 3px; border-radius: 1px; background: var(--blue);
  opacity: 0.4; transition: height 0.3s ease;
}

.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 3px 10px;
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.14);
  border-radius: 5px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.8px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.3); }
  50% { opacity: 1; box-shadow: 0 0 10px rgba(239,68,68,0.6); }
}

/* ================================================================
   COLLAPSED SIDEBAR (50px -> 244px on hover)
   ================================================================ */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-collapsed);
  background: rgba(12, 14, 19, 0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--glass-border);
  z-index: 900; transition: width 320ms var(--ease-out);
  overflow: hidden; display: flex; flex-direction: column;
  padding: 14px 0 18px; gap: 2px;
}
.sidebar:hover { width: var(--sidebar-expanded); }

/* Animated progress ring */
.sidebar-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 10px 0 14px; flex-shrink: 0;
}
.sidebar-ring { width: 34px; height: 34px; position: relative; flex-shrink: 0; }
.sidebar-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
.ring-fill {
  fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round;
  transition: stroke-dashoffset 1s var(--ease-smooth);
  filter: drop-shadow(0 0 4px rgba(34,197,94,0.4));
}
.ring-text {
  fill: var(--text); font-size: 9px; font-weight: 700;
  text-anchor: middle; dominant-baseline: central; font-family: 'Inter';
}
.ring-endpoint {
  position: absolute; width: 5px; height: 5px;
  background: var(--green); border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: ringEndGlow 2.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes ringEndGlow {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.6); }
}
.sidebar-ring-text {
  font-size: 11px; color: var(--text-dim); font-weight: 500;
  white-space: nowrap; margin-left: 12px;
  opacity: 0; transition: opacity 0.2s ease 0.12s;
}
.sidebar:hover .sidebar-ring-text { opacity: 1; }

.sidebar-divider {
  width: 28px; height: 1px; background: var(--border);
  margin: 4px auto 10px; flex-shrink: 0;
  transition: width 0.3s ease;
}
.sidebar:hover .sidebar-divider { width: calc(100% - 28px); }

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer; transition: var(--transition);
  white-space: nowrap; position: relative; flex-shrink: 0;
}
.sidebar-item:hover { background: rgba(100,130,180,0.05); }
.sidebar-item.active { background: rgba(59,130,246,0.06); }
.sidebar-item .indicator {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; border-radius: 0 3px 3px 0;
  transition: height 0.25s ease;
}
.sidebar-item.active .indicator { height: 20px; }
.sidebar-item[data-color="purple"] .indicator { background: var(--purple); }
.sidebar-item[data-color="blue"] .indicator { background: var(--blue); }
.sidebar-item[data-color="orange"] .indicator { background: var(--orange); }

.sidebar-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-dot.done { background: var(--green); opacity: 0.7; }
.sidebar-dot.running { background: var(--blue); animation: sbDotPulse 2s ease-in-out infinite; }
.sidebar-dot.pending { background: transparent; border: 1.5px solid var(--text-faint); }
@keyframes sbDotPulse {
  0%, 100% { box-shadow: 0 0 4px var(--blue-glow); }
  50% { box-shadow: 0 0 12px var(--blue-glow), 0 0 20px rgba(59,130,246,0.12); }
}
.sidebar-label {
  font-size: 12px; color: var(--text-muted); font-weight: 500;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.main {
  margin-left: var(--sidebar-collapsed); margin-top: var(--header-h);
  padding: 24px 30px 80px;
  position: relative; z-index: 1;
  max-width: 1440px;
}

/* ================================================================
   3 HEAVY GLASSMORPHISM MODULE CARDS
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 6px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass-bg-heavy);
  backdrop-filter: blur(var(--glass-blur-heavy)); -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 16px 18px 14px; transition: all 0.35s ease; overflow: hidden;
}

/* glass shine overlay */
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}

/* outer glow halo */
.mod-card .glow-halo {
  position: absolute; inset: -28px; border-radius: 32px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(36px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.14; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.20; } }

/* inner glow */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 40px 10px var(--purple-dim), inset 0 0 20px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 40px 10px var(--blue-dim), inset 0 0 20px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 40px 10px var(--orange-dim), inset 0 0 20px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

/* shimmer sweep */
.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 4s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 180%; } 100% { left: 180%; } }

.mod-card:not(.active):hover {
  border-color: rgba(120,140,180,0.18); transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.05; }
.mod-card.active { border-color: rgba(255,255,255,0.08); }

/* card top row */
.mc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; z-index: 3; }
.mc-icon { font-size: 15px; flex-shrink: 0; }
.mc-name { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 8px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.4px;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgePulse 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-dim); }
@keyframes badgePulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(59,130,246,0.18); } }

/* metrics row */
.mc-metrics { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* mini sparkline in card */
.mc-sparkline { display: flex; align-items: flex-end; gap: 1px; height: 20px; margin-left: auto; }
.mc-sparkline-bar {
  width: 3px; border-radius: 1px; opacity: 0.5;
  transition: height 0.4s ease;
}

/* mini ring gauge 30px */
.mc-ring { width: 30px; height: 30px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.mc-ring .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
.mc-ring .ring-fill-inner {
  fill: none; stroke-width: 3; stroke-linecap: round;
  transition: stroke-dashoffset 0.8s ease;
}
.mc-ring .ring-text-inner {
  fill: var(--text-muted); font-size: 7px; font-weight: 700;
  text-anchor: middle; dominant-baseline: central; font-family: 'Inter';
}

/* progress bar at bottom */
.mc-bar { height: 3px; background: rgba(255,255,255,0.03); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 6px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 6px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 6px var(--orange-deep); }

/* pending card desaturation */
.mod-card[data-status="pending"] { opacity: 0.6; }
.mod-card[data-status="pending"]:hover { opacity: 0.75; }

/* running card border pulse */
.mod-card[data-status="running"] { animation: runCardPulse 4s ease-in-out infinite; }
@keyframes runCardPulse {
  0%, 100% { border-color: rgba(59,130,246,0.12); }
  50% { border-color: rgba(59,130,246,0.24); }
}

/* ================================================================
   TREE AREA (3 columns)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; position: relative; min-height: 100px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.45s var(--ease-smooth) both;
}
.tree-col:nth-child(2) { animation-delay: 0.08s; }
.tree-col:nth-child(3) { animation-delay: 0.16s; }
@keyframes treeGrow {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* stem connector from card to tree */
.tree-stem {
  width: 2px; height: 10px; margin: 0 auto; border-radius: 1px;
}
.tree-stem[data-color="purple"] { background: var(--purple-dim); }
.tree-stem[data-color="blue"] { background: var(--blue-dim); }
.tree-stem[data-color="orange"] { background: var(--orange-dim); }

/* tree trunk line */
.tree-trunk {
  position: relative; padding-left: 24px;
  display: flex; flex-direction: column; gap: 3px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 20px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.14); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.14); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.14); }

/* INTENSE glow for active trunks */
.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.5); box-shadow: 0 0 8px rgba(167,139,250,0.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.5); box-shadow: 0 0 8px rgba(59,130,246,0.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.5); box-shadow: 0 0 8px rgba(245,158,11,0.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }

/* ================================================================
   XL SUB-MODULE CARDS (44px)
   ================================================================ */
.sub-card {
  height: 44px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px; position: relative; border-radius: var(--radius-xs);
  background: var(--surface); border: 1px solid transparent;
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* horizontal branch connector */
.sub-card::before {
  content: ''; position: absolute; left: -14px; top: 50%;
  width: 14px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.14); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.14); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.14); }

/* active branch: glow connector too */
.tree-trunk.glow-trunk .sub-card.active-sub::before { box-shadow: 0 0 4px currentColor; }
.tree-trunk.glow-trunk[data-color="blue"] .sub-card.active-sub::before { background: rgba(59,130,246,0.5); }
.tree-trunk.glow-trunk[data-color="purple"] .sub-card.active-sub::before { background: rgba(167,139,250,0.5); }

/* done state */
.sub-card.done-sub { background: rgba(255,255,255,0.012); }

/* active state */
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.06); border-color: rgba(167,139,250,0.20);
  box-shadow: 0 0 22px rgba(167,139,250,0.08), 0 2px 10px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.20);
  box-shadow: 0 0 22px rgba(59,130,246,0.08), 0 2px 10px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.20);
  box-shadow: 0 0 22px rgba(245,158,11,0.08), 0 2px 10px rgba(0,0,0,0.2);
}

/* shimmer overlay */
.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.02) 46%, rgba(255,255,255,0.05) 50%,
    rgba(255,255,255,0.02) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* inner glow pulse */
.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  animation: subGlowP 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 18px rgba(167,139,250,0.05); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 18px rgba(59,130,246,0.05); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 18px rgba(245,158,11,0.05); }
@keyframes subGlowP { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* pending state */
.sub-card.pending-sub { background: rgba(255,255,255,0.006); opacity: 0.45; }
.sub-card.pending-sub.visible { opacity: 0.45; }

/* left accent stripe */
.sub-card::after {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub::after { opacity: 1; }
.sub-card.done-sub::after { opacity: 0.25; }
.sub-card[data-pcolor="purple"]::after { background: var(--purple); }
.sub-card[data-pcolor="blue"]::after { background: var(--blue); }
.sub-card[data-pcolor="orange"]::after { background: var(--orange); }

/* hover lift */
.sub-card:not(.pending-sub):hover { transform: translateY(-1px); background: rgba(255,255,255,0.025); }

/* sub card elements */
.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotP 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] { background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.5); }
.sub-dot.running[data-pcolor="purple"] { background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.5); }
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-faint); opacity: 0.4; }
@keyframes subDotP { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

/* CSS spinner */
.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(59,130,246,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin { border-color: rgba(167,139,250,0.15); border-top-color: var(--purple); }
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 12px; color: var(--text-muted); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sub-card.active-sub .sub-label { color: var(--text); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-muted); }

.sub-meta {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-dim); flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.sub-card.active-sub .sub-meta { color: var(--text-muted); }

.sub-micro-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-left: 4px;
}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(74,81,104,0.10); color: var(--text-dim); }

/* progress bar inside sub-card */
.sub-progress {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: rgba(255,255,255,0.02);
}
.sub-progress-fill {
  height: 100%; border-radius: 0 1px 1px 0;
  transition: width 0.8s ease;
}

/* chevron for expandable sub-cards */
.sub-chevron {
  width: 14px; height: 14px; flex-shrink: 0; margin-left: 2px;
  color: var(--text-dim); transition: transform 250ms var(--ease-smooth), color 200ms;
  display: flex; align-items: center; justify-content: center;
}
.sub-chevron svg { width: 10px; height: 10px; }
.sub-card.expanded .sub-chevron { transform: rotate(90deg); color: var(--text-muted); }

/* ================================================================
   LEVEL 2: CHILDREN (30px items, second indent)
   ================================================================ */
.level2-wrap {
  padding-left: 26px; position: relative; overflow: hidden;
  max-height: 0; opacity: 0;
  transition: max-height 0.45s var(--ease-smooth), opacity 0.35s ease;
}
.level2-wrap.expanded { opacity: 1; }
/* continuation of parent trunk */
.level2-wrap::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 2px; height: calc(100% - 12px); border-radius: 1px;
}
.tree-trunk[data-color="purple"] .level2-wrap::before { background: rgba(167,139,250,0.08); }
.tree-trunk[data-color="blue"] .level2-wrap::before { background: rgba(59,130,246,0.08); }
.tree-trunk[data-color="orange"] .level2-wrap::before { background: rgba(245,158,11,0.08); }

/* L2 vertical rail (from L1 branch) */
.level2-wrap::after {
  content: ''; position: absolute; left: -14px; top: 0;
  width: 2px; height: 100%; border-radius: 1px;
}
.tree-trunk[data-color="blue"] .level2-wrap::after { background: rgba(59,130,246,0.14); }
.tree-trunk[data-color="purple"] .level2-wrap::after { background: rgba(167,139,250,0.14); }
.tree-trunk[data-color="orange"] .level2-wrap::after { background: rgba(245,158,11,0.14); }

/* active child glow rail */
.level2-wrap.has-active::after {
  box-shadow: 0 0 4px rgba(59,130,246,0.2);
  animation: railPulse 3s ease-in-out infinite;
}
@keyframes railPulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.level2-item {
  height: 32px; display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-dim); position: relative;
  padding-left: 8px; border-radius: var(--radius-xs);
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level2-item.visible { opacity: 1; transform: translateX(0); }
.level2-item:hover { background: rgba(255,255,255,0.018); }

/* L2 horizontal arm */
.level2-item::before {
  content: ''; position: absolute; left: -12px; top: 50%;
  width: 12px; height: 1.5px; border-radius: 1px;
}
.tree-trunk[data-color="blue"] .level2-item::before { background: rgba(59,130,246,0.08); }
.tree-trunk[data-color="purple"] .level2-item::before { background: rgba(167,139,250,0.08); }
.tree-trunk[data-color="orange"] .level2-item::before { background: rgba(245,158,11,0.08); }

/* L2 vertical line (between items) */
.level2-item::after {
  content: ''; position: absolute; left: -14px; top: 0; bottom: 0;
  width: 1.5px; border-radius: 1px;
}
.tree-trunk[data-color="blue"] .level2-item::after { background: rgba(59,130,246,0.06); }
.level2-item:last-child::after { bottom: 50%; }

/* L2 running item glow */
.level2-item.running::before { box-shadow: 0 0 3px rgba(59,130,246,0.25); }
.level2-item.running { color: var(--text); font-weight: 500; }

.l2-icon {
  width: 18px; height: 18px; flex-shrink: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; position: relative; z-index: 2;
}
.l2-icon.done { background: var(--green-dim); color: var(--green); font-weight: 700; }
.l2-icon.running { background: var(--blue-dim); }
.l2-icon.pending { border: 1.5px solid var(--border-light); color: var(--text-dim); font-size: 8px; }

.mini-spinner {
  width: 10px; height: 10px;
  border: 1.5px solid var(--border-light);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.l2-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.l2-detail {
  font-size: 10px; color: var(--text-dim); margin-left: auto; flex-shrink: 0;
  font-weight: 500; font-variant-numeric: tabular-nums;
}
.l2-detail.running-detail { color: var(--blue); animation: detailPulse 2s ease-in-out infinite; }
@keyframes detailPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

/* ================================================================
   COLLAPSIBLE TREE (for done/pending modules)
   ================================================================ */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-col.collapsed .tree-stem { display: none; }
.tree-collapsed-bar {
  display: none; padding: 9px 14px; font-size: 11px; color: var(--text-dim);
  background: var(--glass-bg); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 8px;
}
.tree-collapsed-bar:hover { color: var(--text-muted); background: var(--surface); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }

.collapse-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-dim); cursor: pointer;
  padding: 2px 0 6px; transition: color 0.2s;
}
.collapse-toggle:hover { color: var(--text-muted); }
.collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* ================================================================
   HOVER TOOLTIP (glassmorphism, 380px)
   ================================================================ */
.tooltip-portal {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 380px; opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.tooltip-portal.visible { opacity: 1; transform: translateY(0); }
.tooltip-inner {
  background: rgba(16, 20, 28, 0.94);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border: 1px solid var(--glass-border-bright);
  border-radius: var(--radius); padding: 16px 20px;
  box-shadow: 0 10px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
}
.tooltip-inner::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}
.tooltip-title {
  font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.tooltip-summary { font-size: 12px; color: var(--text-muted); line-height: 1.65; margin-bottom: 12px; }
.tooltip-stats { display: flex; gap: 18px; }
.tooltip-stat-val { font-size: 16px; font-weight: 700; color: var(--text); }
.tooltip-stat-label { font-size: 10px; color: var(--text-dim); }

/* ================================================================
   DASHBOARD PANEL (2-column, below tree, glassmorphism)
   ================================================================ */
.dashboard-panel {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.4s var(--ease-smooth), opacity 0.35s ease;
  margin-top: 22px;
}
.dashboard-panel.open { max-height: 700px; opacity: 1; }

.dashboard-inner {
  display: grid; grid-template-columns: 3fr 2fr; gap: 24px;
  background: var(--glass-bg-heavy);
  backdrop-filter: blur(var(--glass-blur-heavy)); -webkit-backdrop-filter: blur(var(--glass-blur-heavy));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 24px;
  position: relative; overflow: hidden;
  animation: dashSlide 0.35s var(--ease-smooth);
}
@keyframes dashSlide {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.dashboard-inner .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}
.dashboard-inner::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
}

.dash-close {
  position: absolute; top: 14px; right: 16px;
  width: 26px; height: 26px; border-radius: 7px; border: none;
  background: rgba(100,120,160,0.08); color: var(--text-dim);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: var(--transition); z-index: 10;
}
.dash-close:hover { background: rgba(100,120,160,0.16); color: var(--text); }

.dash-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.dash-summary {
  font-size: 13px; color: var(--text-muted); line-height: 1.7;
  margin-bottom: 16px; padding: 12px 14px;
  background: rgba(20, 24, 32, 0.5); border-radius: var(--radius-sm);
  border-left: 2px solid var(--blue);
}
.dash-item-list { list-style: none; }
.dash-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 0; font-size: 12px; color: var(--text-muted);
  border-bottom: 1px solid rgba(100,120,160,0.05);
}
.dash-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* stat cards */
.dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.dash-stat-card {
  background: rgba(20, 24, 32, 0.5); border-radius: var(--radius-sm);
  padding: 14px 16px; text-align: center;
  border: 1px solid rgba(100,120,160,0.05);
}
.dash-stat-val { font-size: 22px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
.dash-stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* mini live feed */
.dash-feed-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.dash-feed-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-dim);
}
.mini-live-badge {
  font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 4px;
  background: rgba(239,68,68,0.08); color: var(--red);
  letter-spacing: 0.5px; text-transform: uppercase;
  display: flex; align-items: center; gap: 3px;
}
.mini-live-dot {
  width: 4px; height: 4px; border-radius: 50%; background: var(--red);
  animation: livePulse 1.5s ease-in-out infinite;
}
.dash-feed { max-height: 140px; overflow-y: auto; }
.dash-feed::-webkit-scrollbar { width: 4px; }
.dash-feed::-webkit-scrollbar-thumb { background: rgba(100,120,160,0.15); border-radius: 2px; }

.feed-entry {
  display: flex; gap: 8px; padding: 5px 0; font-size: 11px;
  border-bottom: 1px solid rgba(100,120,160,0.04);
  animation: feedIn 0.35s ease both;
}
@keyframes feedIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 42px; }
.feed-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.feed-msg { color: var(--text-muted); flex: 1; }
.feed-msg strong { color: var(--text); font-weight: 600; }

/* ================================================================
   DOT ANIMATION OVERLAY CANVAS
   ================================================================ */
#dotCanvas {
  position: absolute; top: 0; left: 0;
  pointer-events: none; z-index: 50;
}

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(100,120,160,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(100,120,160,0.25); }

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media (max-width: 1100px) {
  .module-cards, .tree-area { grid-template-columns: 1fr; }
  .dashboard-inner { grid-template-columns: 1fr; }
}
</style>
</head>

<!-- ===== HEADER ===== -->

<!-- ===== MAIN CONTENT ===== -->
<main class="main" id="mainContent">
  <!-- Dot animation canvas (positioned within main) -->

  <!-- 3 MODULE CARDS -->
  <section class="module-cards" id="moduleCards">

    <!-- Module 1: Generate Hypothesis (purple, DONE) -->
    <div class="mod-card" data-color="purple" data-module="0" data-status="done">
      <div class="glass-shine"></div>

            <circle class="ring-track" cx="18" cy="18" r="15.5"/>
            <circle class="ring-fill-inner" cx="18" cy="18" r="15.5" stroke="var(--purple)"
              stroke-dasharray="97.4" stroke-dashoffset="0"

            <circle class="ring-fill-inner" cx="18" cy="18" r="15.5" stroke="var(--blue)"

<script>
/* ================================================================

/* ================================================================
   RENDER TREE AREA
   ================================================================ */
const treeArea = document.getElementById('treeArea');

function renderTrees() {
  treeArea.innerHTML = '';

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' || mod.status === 'pending' ? ' collapsed' : '');
    col.dataset.module = mi;

    // collapse toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    // stem
    const stem = document.createElement('div');
    stem.className = 'tree-stem';
    stem.dataset.color = mod.color;
    col.appendChild(stem);

    // trunk
    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      const hasChildren = sub.children && sub.children.length > 0;
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}` + (hasChildren && sub.status === 'running' ? ' expanded' : '');
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      // shimmer + glow overlays
      card.innerHTML = '<div class="sub-card-shimmer"></div><div class="sub-card-glow"></div>';

      // status indicator
      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:11px; color:var(--green); flex-shrink:0; font-weight:600;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      // label
      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      // meta
      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      // micro badge
      const badge = document.createElement('span');
      badge.className = `sub-micro-badge ${sub.status === 'done' ? 'done' : sub.status === 'running' ? 'running' : 'pending'}`;
      badge.textContent = sub.status === 'done' ? 'Done' : sub.status === 'running' ? 'Live' : 'Wait';
      card.appendChild(badge);

      // chevron for expandable
      if (hasChildren) {
        const chevron = document.createElement('span');
        chevron.className = 'sub-chevron';
        chevron.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>';
        card.appendChild(chevron);
      }

      // progress bar for items with progress
      if (sub.progress !== undefined) {
        const progWrap = document.createElement('div');
        progWrap.className = 'sub-progress';
        const progFill = document.createElement('div');
        progFill.className = 'sub-progress-fill';
        progFill.style.background = `var(--${mod.color})`;
        progFill.dataset.width = sub.progress + '%';
        progWrap.appendChild(progFill);
        card.appendChild(progWrap);
      }

      // click -> dashboard
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        if (hasChildren) {
          toggleLevel2(mi, si, card);
        }
        openDashboard(mi, si);
      });

      // hover -> tooltip
      card.addEventListener('mouseenter', (e) => showTooltip(e, mi, si));
      card.addEventListener('mousemove', (e) => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);

      trunk.appendChild(card);

      // Level 2 children
      if (hasChildren) {
        const wrap = document.createElement('div');
        wrap.className = 'level2-wrap' + (sub.status === 'running' ? ' expanded has-active' : '');
        wrap.dataset.module = mi;
        wrap.dataset.sub = si;

        sub.children.forEach((child, ci) => {
          const row = document.createElement('div');
          row.className = 'level2-item' + (child.status === 'running' ? ' running' : '');
          row.dataset.step = `${mi}-${si}-${ci}`;

          // icon
          const icon = document.createElement('span');
          if (child.status === 'done') {
            icon.className = 'l2-icon done';
            icon.textContent = '\u2713';
          } else if (child.status === 'running') {
            icon.className = 'l2-icon running';
            icon.innerHTML = '<div class="mini-spinner"></div>';
          } else {
            icon.className = 'l2-icon pending';
            icon.textContent = '\u25CB';
          }
          row.appendChild(icon);

          const label = document.createElement('span');
          label.className = 'l2-label';
          label.textContent = child.label;
          row.appendChild(label);

          const detail = document.createElement('span');
          detail.className = 'l2-detail' + (child.status === 'running' ? ' running-detail' : '');
          detail.textContent = child.detail;
          row.appendChild(detail);

          wrap.appendChild(row);
        });

        // set initial max-height for expanded
        if (sub.status === 'running') {
          requestAnimationFrame(() => { wrap.style.maxHeight = (wrap.scrollHeight + 20) + 'px'; });
        }

        trunk.appendChild(wrap);
      }
    });

    col.appendChild(trunk);

    // collapsed bar
    const collBar = document.createElement('div');
    collBar.className = 'tree-collapsed-bar';
    const doneCount = mod.subs.filter(s => s.status === 'done').length;
    const statusText = mod.status === 'done'
      ? `<span style="color:var(--green)">\u2713</span> ${doneCount}/${mod.subs.length} complete`
      : `<span style="color:var(--text-faint)">\u25CB</span> ${doneCount}/${mod.subs.length} pending`;
    collBar.innerHTML = `${statusText}<span style="margin-left:auto; font-size:10px; color:var(--text-faint);">Click to expand</span>`;
    collBar.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(collBar);

    treeArea.appendChild(col);
  });

  // Animate sub-cards visible
  requestAnimationFrame(() => {
    let delay = 0;
    document.querySelectorAll('.sub-card, .level2-item').forEach(el => {
      setTimeout(() => el.classList.add('visible'), delay);
      delay += 35;
    });
  });

  // Animate progress fills
  setTimeout(() => {
    document.querySelectorAll('.sub-progress-fill').forEach(f => { f.style.width = f.dataset.width; });
    document.querySelectorAll('.mc-bar-fill').forEach(f => { f.style.width = f.dataset.width; });
  }, 200);
}
renderTrees();

/* ================================================================

   ================================================================ */
function toggleLevel2(mi, si, card) {
  const wrap = document.querySelector(`.level2-wrap[data-module="${mi}"][data-sub="${si}"]`);
  if (!wrap) return;

  const isExpanded = card.classList.contains('expanded');
  if (isExpanded) {
    card.classList.remove('expanded');
    wrap.style.maxHeight = '0';
    wrap.classList.remove('expanded');
  } else {
    card.classList.add('expanded');
    wrap.style.maxHeight = (wrap.scrollHeight + 20) + 'px';
    wrap.classList.add('expanded');
    // Animate children in
    let d = 0;
    wrap.querySelectorAll('.level2-item').forEach(el => {
      el.classList.remove('visible');
      setTimeout(() => el.classList.add('visible'), d);
      d += 60;
    });
  }
  // Rebuild dot paths after transition
  setTimeout(rebuildDots, 500);
}

/* ================================================================
   AMBIENT PARTICLES (50 dots + connections)
   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.radius = Math.random() * 1.4 + 0.4;
    this.opacity = Math.random() * 0.10 + 0.02;
    this.hue = [271, 220, 40, 142][Math.floor(Math.random() * 4)];
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -10 || this.x > pCanvas.width + 10) this.vx *= -1;
    if (this.y < -10 || this.y > pCanvas.height + 10) this.vy *= -1;
  }
}

for (let i = 0; i < 50; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  // Connection lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const alpha = (1 - dist / 140) * 0.035;
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = `rgba(130, 155, 210, ${alpha})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }

  // Dots
  particles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `hsla(${p.hue}, 55%, 62%, ${p.opacity})`;
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ================================================================
   L-SHAPED DOT ANIMATION (getBoundingClientRect)
   Dots flow DOWN from active module card, then RIGHT along tree
   lines to ALL running sub-modules simultaneously.
   ================================================================ */
const dotCanvas = document.getElementById('dotCanvas');
const dotCtx = dotCanvas.getContext('2d');

function resizeDotCanvas() {
  const main = document.getElementById('mainContent');
  dotCanvas.width = main.scrollWidth;
  dotCanvas.height = main.scrollHeight;
  dotCanvas.style.width = main.scrollWidth + 'px';
  dotCanvas.style.height = main.scrollHeight + 'px';
}
resizeDotCanvas();
window.addEventListener('resize', resizeDotCanvas);

class FlowDot {
  constructor(path, color, speed, opacity, radius) {
    this.path = path;
    this.color = color;
    this.speed = speed;
    this.opacity = opacity;
    this.radius = radius || 1.5;
    this.totalLen = 0;
    this.segments = [];
    for (let i = 1; i < path.length; i++) {
      const dx = path[i].x - path[i-1].x;
      const dy = path[i].y - path[i-1].y;
      this.segments.push(Math.sqrt(dx*dx + dy*dy));
      this.totalLen += this.segments[this.segments.length-1];
    }
    this.progress = Math.random() * this.totalLen;
    this.trail = [];
    this.trailMax = 5;
  }
  update() {
    this.progress += this.speed;
    if (this.progress > this.totalLen) this.progress -= this.totalLen;
    const pos = this.getPos();
    this.trail.unshift({ x: pos.x, y: pos.y });
    if (this.trail.length > this.trailMax) this.trail.pop();
  }
  getPos() {
    let rem = this.progress;
    for (let i = 0; i < this.segments.length; i++) {
      if (rem <= this.segments[i]) {
        const t = rem / this.segments[i];
        return {
          x: this.path[i].x + (this.path[i+1].x - this.path[i].x) * t,
          y: this.path[i].y + (this.path[i+1].y - this.path[i].y) * t
        };
      }
      rem -= this.segments[i];
    }
    return this.path[this.path.length - 1];
  }
}

let flowDots = [];

function buildDotPaths() {
  flowDots = [];

  const main = document.getElementById('mainContent');
  const mainRect = main.getBoundingClientRect();
  const scrollTop = main.scrollTop || 0;
  const scrollLeft = main.scrollLeft || 0;

  // Find the active module card
  const activeCard = document.querySelector('.mod-card.active');
  if (!activeCard) return;

  const cardRect = activeCard.getBoundingClientRect();
  const startX = cardRect.left + cardRect.width / 2 - mainRect.left + scrollLeft;
  const startY = cardRect.bottom - mainRect.top + scrollTop;

  // Find ALL running sub-cards and L2 running items
  const runningTargets = [];

  // Running sub-cards
  document.querySelectorAll('.sub-card.active-sub').forEach(el => {
    runningTargets.push({ el, type: 'sub' });
  });

  // Running L2 items
  document.querySelectorAll('.level2-item.running').forEach(el => {
    runningTargets.push({ el, type: 'l2' });
  });

  runningTargets.forEach(({ el, type }) => {
    const targetRect = el.getBoundingClientRect();

    if (type === 'l2') {
      // Multi-segment L-path: DOWN from card, through L1 branch, then into L2
      const parent = el.closest('.level2-wrap');
      const parentSub = parent ? parent.previousElementSibling : null;

      const l1BranchX = (parentSub ? parentSub.getBoundingClientRect().left + 11 : targetRect.left + 11) - mainRect.left + scrollLeft;
      const l1Y = (parentSub ? parentSub.getBoundingClientRect().top + parentSub.getBoundingClientRect().height / 2 : targetRect.top) - mainRect.top + scrollTop;
      const l2X = targetRect.left + 20 - mainRect.left + scrollLeft;
      const l2Y = targetRect.top + targetRect.height / 2 - mainRect.top + scrollTop;
      const midY = startY + 8;

      const path = [
        { x: startX, y: startY },
        { x: startX, y: midY },
        { x: l1BranchX, y: midY },
        { x: l1BranchX, y: l1Y },
        { x: l1BranchX, y: l2Y },
        { x: l2X, y: l2Y }
      ];

      // Fast dots
      for (let i = 0; i < 4; i++) {
        flowDots.push(new FlowDot(path, '#3b82f6', 1.3 + Math.random() * 0.4, 0.55 + Math.random() * 0.2, 1.5));
      }
      // Slow ghost dots
      for (let i = 0; i < 2; i++) {
        flowDots.push(new FlowDot(path, '#3b82f6', 0.5 + Math.random() * 0.2, 0.15 + Math.random() * 0.1, 2.5));
      }
    } else {
      // Simple L-path: DOWN then RIGHT
      const tgtX = targetRect.left + 18 - mainRect.left + scrollLeft;
      const tgtY = targetRect.top + targetRect.height / 2 - mainRect.top + scrollTop;
      const midY = startY + 8;

      // L1 trunk X position (left edge of tree area column)
      const trunkX = targetRect.left - 14 - mainRect.left + scrollLeft;

      const path = [
        { x: startX, y: startY },
        { x: startX, y: midY },
        { x: trunkX, y: midY },
        { x: trunkX, y: tgtY },
        { x: tgtX, y: tgtY }
      ];

      for (let i = 0; i < 3; i++) {
        flowDots.push(new FlowDot(path, '#3b82f6', 1.1 + Math.random() * 0.3, 0.5 + Math.random() * 0.15, 1.5));
      }
    }
  });
}

function drawFlowDots() {
  dotCtx.clearRect(0, 0, dotCanvas.width, dotCanvas.height);

  flowDots.forEach(dot => {
    dot.update();
    const pos = dot.getPos();

    // Trail
    dot.trail.forEach((tp, idx) => {
      const fade = 1 - (idx / dot.trailMax);
      dotCtx.beginPath();
      dotCtx.arc(tp.x, tp.y, dot.radius * fade * 0.6, 0, Math.PI * 2);
      dotCtx.fillStyle = dot.color;
      dotCtx.globalAlpha = dot.opacity * fade * 0.3;
      dotCtx.fill();
    });

    // Main dot
    dotCtx.beginPath();
    dotCtx.arc(pos.x, pos.y, dot.radius, 0, Math.PI * 2);
    dotCtx.fillStyle = dot.color;
    dotCtx.globalAlpha = dot.opacity;
    dotCtx.fill();

    // Glow halo
    dotCtx.beginPath();
    dotCtx.arc(pos.x, pos.y, dot.radius * 3, 0, Math.PI * 2);
    dotCtx.fillStyle = dot.color;
    dotCtx.globalAlpha = dot.opacity * 0.1;
    dotCtx.fill();
  });

  dotCtx.globalAlpha = 1;
  requestAnimationFrame(drawFlowDots);
}

function rebuildDots() {
  resizeDotCanvas();
  buildDotPaths();
}

window.addEventListener('resize', rebuildDots);
setTimeout(() => { rebuildDots(); drawFlowDots(); }, 300);

function positionRingEndpoint() {
  const wrap = document.getElementById('sidebarRingWrap');

  const rect = wrap.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;
  const r = rect.width / 2 - 3;
  const pct = 0.65;
  const angle = (pct * 360 - 90) * (Math.PI / 180);
  ep.style.left = (cx + r * Math.cos(angle) - 2.5) + 'px';
  ep.style.top = (cy + r * Math.sin(angle) - 2.5) + 'px';
}

/* ================================================================
   KEYBOARD NAVIGATION
   ================================================================ */
let focusedModule = 1;
let focusedSub = -1;

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeDashboard(); return; }
  if (e.key === 'ArrowLeft') {
    focusedModule = Math.max(0, focusedModule - 1);
    focusedSub = -1;
    breadcrumbEl.textContent = MODULES[focusedModule].label;
    updateSidebarActive(focusedModule);
    e.preventDefault();
  }
  if (e.key === 'ArrowRight') {
    focusedModule = Math.min(MODULES.length - 1, focusedModule + 1);
    focusedSub = -1;
    breadcrumbEl.textContent = MODULES[focusedModule].label;
    updateSidebarActive(focusedModule);
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    focusedSub = Math.min(MODULES[focusedModule].subs.length - 1, focusedSub + 1);
    highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();
  }
  if (e.key === 'ArrowUp') {
    focusedSub = Math.max(-1, focusedSub - 1);
    if (focusedSub >= 0) highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();
  }
  if (e.key === 'Enter' && focusedSub >= 0) {
    openDashboard(focusedModule, focusedSub);
    e.preventDefault();
  }
});

function updateSidebarActive(mi) {
  document.querySelectorAll('.sidebar-item').forEach(si => si.classList.remove('active'));
  const item = document.querySelector(`.sidebar-item[data-module="${mi}"]`);
  if (item) item.classList.add('active');
}

function highlightSubCard(mi, si) {
  document.querySelectorAll('.sub-card').forEach(c => {
    c.style.outline = 'none';
  });
  const card = document.querySelector(`.sub-card[data-module="${mi}"][data-sub="${si}"]`);
  if (card) {
    const color = MODULES[mi].color;
    const cv = color === 'purple' ? 'rgba(167,139,250,0.35)' :
               color === 'blue' ? 'rgba(59,130,246,0.35)' : 'rgba(245,158,11,0.35)';
    card.style.outline = `1px solid ${cv}`;
    card.style.outlineOffset = '-1px';
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function animateCards() {
  document.querySelectorAll('.mod-card').forEach((card, i) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(14px)';
    card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    setTimeout(() => {
      card.style.opacity = '';
      card.style.transform = '';
    }, 100 + i * 100);
  });
}

/* ================================================================

   ================================================================ */
const ambientGlow = document.createElement('div');
ambientGlow.style.cssText = `
  position: fixed; width: 650px; height: 420px; border-radius: 50%;
  pointer-events: none; z-index: 0; filter: blur(90px); opacity: 0.035;
  transition: all 2s ease; top: 45%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, var(--blue), transparent 70%);
`;
document.body.insertBefore(ambientGlow, document.body.firstChild.nextSibling);

let glowAngle = 0;
function driftGlow() {
  glowAngle += 0.003;
  const ox = Math.sin(glowAngle) * 90;
  const oy = Math.cos(glowAngle * 0.7) * 45;
  ambientGlow.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
  requestAnimationFrame(driftGlow);
}
driftGlow();

/* ================================================================
   RESPONSIVE GRID HANDLER
   ================================================================ */
function handleResize() {
  const w = window.innerWidth;
  const cards = document.querySelector('.module-cards');
  const tree = document.getElementById('treeArea');
  if (w < 900) {
    cards.style.gridTemplateColumns = '1fr';
    tree.style.gridTemplateColumns = '1fr';
  } else if (w < 1200) {
    cards.style.gridTemplateColumns = 'repeat(2, 1fr)';
    tree.style.gridTemplateColumns = 'repeat(2, 1fr)';
  } else {
    cards.style.gridTemplateColumns = 'repeat(3, 1fr)';
    tree.style.gridTemplateColumns = 'repeat(3, 1fr)';
  }
}
window.addEventListener('resize', handleResize);
