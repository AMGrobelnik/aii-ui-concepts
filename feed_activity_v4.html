<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed v4 — Simple One-Row</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

/* Shared header */
.fh { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ft { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
.lb { display: inline-flex; align-items: center; gap: 5px; font-size: 8px; font-weight: 800; color: var(--red); background: var(--red-dim); padding: 2px 8px 2px 6px; border-radius: 4px; letter-spacing: .6px; text-transform: uppercase; }
.ld { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: bk 1.3s ease-in-out infinite; }
@keyframes bk { 0%,100%{opacity:1} 50%{opacity:.2} }
.fc { margin-left: auto; font-size: 10px; color: var(--text-faint); }
.fs { max-height: 360px; overflow-y: auto; }
.fs::-webkit-scrollbar { width: 3px; }
.fs::-webkit-scrollbar-track { background: transparent; }
.fs::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

/* Shared mono time */
.tm { font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; font-weight: 500; flex-shrink: 0; }

/* Type colors */
.tc-tool { color: var(--blue); }
.tc-result { color: var(--purple); }
.tc-progress { color: var(--green); }
.tc-metric { color: var(--cyan); }
.tc-warning { color: var(--orange); }
.tc-thinking { color: var(--purple); }

.bg-tool { background: var(--blue-dim); color: var(--blue); }
.bg-result { background: var(--purple-dim); color: var(--purple); }
.bg-progress { background: var(--green-dim); color: var(--green); }
.bg-metric { background: var(--cyan-dim); color: var(--cyan); }
.bg-warning { background: var(--orange-dim); color: var(--orange); }
.bg-thinking { background: var(--purple-dim); color: var(--purple); }

/* ── V1: time | type | summary ── */
.v1 { display: flex; flex-direction: column; gap: 1px; }
.v1 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v1 .row:hover { background: rgba(255,255,255,.02); }
.v1 .tp { font-size: 9px; font-weight: 700; min-width: 48px; flex-shrink: 0; }
.v1 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── V2: dot + type + summary + time (right) ── */
.v2 { display: flex; flex-direction: column; gap: 1px; }
.v2 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v2 .row:hover { background: rgba(255,255,255,.02); }
.v2 .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.v2 .tp { font-size: 9px; font-weight: 700; min-width: 48px; flex-shrink: 0; }
.v2 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── V3: pill type + summary + time ── */
.v3 { display: flex; flex-direction: column; gap: 2px; }
.v3 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v3 .row:hover { background: rgba(255,255,255,.02); }
.v3 .pill { font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0; }
.v3 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── V4: time | colored bar type | summary ── */
.v4 { display: flex; flex-direction: column; gap: 1px; }
.v4 .row {
  display: flex; align-items: center; gap: 0;
  padding: 4px 0; font-size: 11.5px; transition: background .1s;
}
.v4 .row:hover { background: rgba(255,255,255,.015); }
.v4 .bar { width: 3px; height: 20px; border-radius: 1px; flex-shrink: 0; margin-right: 8px; }
.v4 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v4 .tp { font-size: 8px; font-weight: 700; margin-right: 8px; min-width: 40px; flex-shrink: 0; text-transform: uppercase; }

/* ── V5: just summary with colored type prefix inline ── */
.v5 { display: flex; flex-direction: column; gap: 1px; }
.v5 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v5 .row:hover { background: rgba(255,255,255,.02); }
.v5 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v5 .tx b { font-weight: 600; }

/* ── V6: striped alternating rows ── */
.v6 { display: flex; flex-direction: column; }
.v6 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; font-size: 11.5px; transition: background .1s;
}
.v6 .row:nth-child(odd) { background: rgba(255,255,255,.012); }
.v6 .row:hover { background: rgba(255,255,255,.03); }
.v6 .tp { font-size: 9px; font-weight: 700; min-width: 48px; flex-shrink: 0; }
.v6 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── V7: left-border accent, type + summary ── */
.v7 { display: flex; flex-direction: column; gap: 2px; }
.v7 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px 5px 10px; border-radius: 5px; font-size: 11.5px;
  border-left: 2px solid transparent; transition: background .1s;
}
.v7 .row:hover { background: rgba(255,255,255,.02); }
.v7 .tp { font-size: 9px; font-weight: 700; min-width: 48px; flex-shrink: 0; }
.v7 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── V8: icon + type + summary ── */
.v8 { display: flex; flex-direction: column; gap: 1px; }
.v8 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v8 .row:hover { background: rgba(255,255,255,.02); }
.v8 .ic { width: 16px; height: 16px; border-radius: 4px; display: grid; place-items: center; font-size: 8px; flex-shrink: 0; }
.v8 .tp { font-size: 9px; font-weight: 700; min-width: 44px; flex-shrink: 0; }
.v8 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── V9: dense mono-spaced log ── */
.v9 {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  background: rgba(0,0,0,.2); border-radius: var(--radius-sm); padding: 10px 12px;
}
.v9 .row {
  display: flex; gap: 6px; padding: 2px 0; line-height: 1.5;
}
.v9 .tp { font-weight: 600; min-width: 44px; flex-shrink: 0; }
.v9 .tx { color: var(--text-dim); }

/* ── V10: ultra-minimal, just text with faint time ── */
.v10 { display: flex; flex-direction: column; gap: 0; }
.v10 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px; font-size: 11.5px; transition: background .1s;
  border-bottom: 1px solid rgba(255,255,255,.015);
}
.v10 .row:last-child { border-bottom: none; }
.v10 .row:hover { background: rgba(255,255,255,.02); }
.v10 .tx { color: var(--text-dim); flex: 1; }
.v10 .tx b { font-weight: 600; color: var(--text-muted); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Activity Feed v4 — Simple One-Row</div>
  <div class="page-sub">Agent 3 — time + type + summary, one line per event, real 30-50ch summaries</div>
</div>

<div class="grid" id="grid"></div>

<script>
const E = [
  { time: '12:04', type: 'tool',     text: 'Add head_direction_ratio to regression subset', icon: '\u270e' },
  { time: '12:03', type: 'thinking', text: 'Use absolute paths, inspect full data', icon: '\ud83d\udca1' },
  { time: '12:02', type: 'tool',     text: 'Read grammar, build treebank set and genre map', icon: '\ud83d\udcc4' },
  { time: '12:01', type: 'result',   text: 'Saved 58KB report, increased to 185KB', icon: '\u2705' },
  { time: '11:58', type: 'metric',   text: 'Track 95k context usage for exp_id3_it2__opus', icon: '\ud83d\udcca' },
  { time: '11:55', type: 'result',   text: 'Completed 7 turns, 393.8K\u219217.5K, $0.99', icon: '\u2705' },
  { time: '11:51', type: 'warning',  text: 'Remind 112.7 minutes left to finish tasks', icon: '\u26a0\ufe0f' },
  { time: '11:47', type: 'warning',  text: 'Retry paper text after timeout, fork resume', icon: '\u26a0\ufe0f' },
  { time: '11:42', type: 'result',   text: 'Created pyproject.toml for exp_id1_it2__opus', icon: '\u2705' },
  { time: '11:38', type: 'progress', text: 'Split script into 4 sections, add 4 markdowns', icon: '\u2699\ufe0f' },
];

const C = {
  tool:     { c: 'var(--blue)',   bg: 'var(--blue-dim)',   l: 'tool' },
  result:   { c: 'var(--purple)', bg: 'var(--purple-dim)', l: 'result' },
  progress: { c: 'var(--green)',  bg: 'var(--green-dim)',  l: 'prog' },
  metric:   { c: 'var(--cyan)',   bg: 'var(--cyan-dim)',   l: 'metric' },
  warning:  { c: 'var(--orange)', bg: 'var(--orange-dim)', l: 'warn' },
  thinking: { c: 'var(--purple)', bg: 'var(--purple-dim)', l: 'think' },
};

function hdr() {
  return `<div class="fh"><span class="ft">Activity</span><span class="lb"><span class="ld"></span> LIVE</span><span class="fc">${E.length}</span></div>`;
}

function v1() {
  return hdr() + `<div class="fs"><div class="v1">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v2() {
  return hdr() + `<div class="fs"><div class="v2">${E.map(e =>
    `<div class="row"><span class="dot" style="background:${C[e.type].c}"></span><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span><span class="tm">${e.time}</span></div>`
  ).join('')}</div></div>`;
}

function v3() {
  return hdr() + `<div class="fs"><div class="v3">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill bg-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v4() {
  return hdr() + `<div class="fs"><div class="v4">${E.map(e =>
    `<div class="row"><div class="bar" style="background:${C[e.type].c}"></div><span class="tm">${e.time}</span><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v5() {
  return hdr() + `<div class="fs"><div class="v5">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="tx"><b class="tc-${e.type}">${C[e.type].l}:</b> ${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v6() {
  return hdr() + `<div class="fs"><div class="v6">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v7() {
  return hdr() + `<div class="fs"><div class="v7">${E.map(e =>
    `<div class="row" style="border-left-color:${C[e.type].c}"><span class="tm">${e.time}</span><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v8() {
  return hdr() + `<div class="fs"><div class="v8">${E.map(e =>
    `<div class="row"><div class="ic" style="background:${C[e.type].bg};color:${C[e.type].c}">${e.icon}</div><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span><span class="tm">${e.time}</span></div>`
  ).join('')}</div></div>`;
}

function v9() {
  return hdr() + `<div class="fs"><div class="v9">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="tp tc-${e.type}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v10() {
  return hdr() + `<div class="fs"><div class="v10">${E.map(e =>
    `<div class="row"><span class="tm" style="opacity:.4">${e.time}</span><span class="tx"><b class="tc-${e.type}">${C[e.type].l}</b> ${e.text}</span></div>`
  ).join('')}</div></div>`;
}

const V = [
  { n:1, name:'Time | Type | Summary', r:v1 },
  { n:2, name:'Dot + Type + Summary + Time (right)', r:v2 },
  { n:3, name:'Time + Pill Type + Summary', r:v3 },
  { n:4, name:'Color Bar + Time + Type + Summary', r:v4 },
  { n:5, name:'Time + "type: summary" inline', r:v5 },
  { n:6, name:'Striped rows — Time + Type + Summary', r:v6 },
  { n:7, name:'Left accent — Time + Type + Summary', r:v7 },
  { n:8, name:'Icon + Type + Summary + Time (right)', r:v8 },
  { n:9, name:'Mono terminal — Time + Type + Summary', r:v9 },
  { n:10, name:'Ultra-minimal — faint time + type:summary', r:v10 },
];

const g = document.getElementById('grid');
V.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div><div class="vbody">${v.r()}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
