<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #0a0a0c;
    color: #e0e0e4;
    user-select: none;
    -webkit-user-select: none;
  }

  /* -- spotlight radial glow -- */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 700px 600px at 50% 48%, rgba(255,255,255,0.03) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* -- breadcrumb -- */
  #breadcrumb {
    position: fixed; top: 20px; left: 28px;
    font-size: 11px; font-weight: 400;
    color: rgba(255,255,255,0.25);
    z-index: 100;
    letter-spacing: 0.3px;
    transition: opacity 0.3s;
  }
  #breadcrumb span { cursor: pointer; }
  #breadcrumb span:hover { color: rgba(255,255,255,0.45); }
  #breadcrumb .sep { margin: 0 5px; opacity: 0.5; }

  /* -- viewport & slide container -- */
  #viewport {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1;
  }

  #slide-container {
    position: relative;
    width: 600px; max-width: 88vw;
    overflow: visible;
  }

  /* -- card -- */
  .card {
    position: absolute; top: 0; left: 0;
    width: 100%;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    padding: 0 12px;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.15, 1),
                opacity 0.32s cubic-bezier(0.4, 0, 0.15, 1);
  }
  .card.active {
    opacity: 1; pointer-events: auto;
    transform: translate(0, 0);
  }
  .card.exit-left  { transform: translateX(-120px); opacity: 0; }
  .card.exit-right { transform: translateX(120px);  opacity: 0; }
  .card.exit-up    { transform: translateY(-80px);   opacity: 0; }
  .card.exit-down  { transform: translateY(80px);    opacity: 0; }

  /* -- card internals -- */
  .card .stage-label {
    font-size: 12px; font-weight: 400;
    color: rgba(255,255,255,0.30);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  .card .main-title {
    font-size: 28px; font-weight: 600;
    color: #f0f0f2;
    line-height: 1.25;
    margin-bottom: 10px;
  }

  .card .sub-line {
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,0.55);
    margin-bottom: 20px;
    line-height: 1.4;
  }

  .card .status-chip {
    display: inline-block;
    font-size: 12px; font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 18px;
    letter-spacing: 0.3px;
  }
  .chip-running  { background: rgba(99,179,237,0.12); color: #63b3ed; }
  .chip-complete { background: rgba(104,211,145,0.12); color: #68d391; }
  .chip-pending  { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); }

  /* -- progress bar -- */
  .progress-wrap {
    width: 100%; max-width: 400px;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #63b3ed, #7f9cf5);
    transition: width 0.5s ease;
  }
  .progress-fill.complete {
    background: linear-gradient(90deg, #68d391, #4fd1c5);
  }

  /* -- summary -- */
  .card .summary {
    font-size: 14px; font-weight: 300;
    color: rgba(255,255,255,0.40);
    line-height: 1.65;
    max-width: 480px;
  }

  /* -- footer -- */
  #footer {
    position: fixed; bottom: 22px; left: 0; right: 0;
    text-align: center;
    font-size: 11px; font-weight: 400;
    color: rgba(255,255,255,0.18);
    z-index: 100;
    letter-spacing: 0.3px;
  }

  /* -- dot indicators -- */
  #dots {
    position: fixed; bottom: 48px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 8px;
    z-index: 100;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    cursor: pointer;
    transition: background 0.25s, transform 0.25s;
  }
  .dot.active {
    background: rgba(255,255,255,0.50);
    transform: scale(1.3);
  }
  .dot:hover { background: rgba(255,255,255,0.35); }

  /* -- edge arrows -- */
  .nav-arrow {
    position: fixed; top: 0; bottom: 0;
    width: 64px;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .nav-arrow:hover { opacity: 1; }
  .nav-arrow svg {
    width: 20px; height: 20px;
    stroke: rgba(255,255,255,0.30);
    stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  #arrow-left  { left: 0; }
  #arrow-right { right: 0; }

  /* show arrows when mouse is near edges */
  body.show-left  #arrow-left  { opacity: 1; }
  body.show-right #arrow-right { opacity: 1; }

  /* -- vertical arrow hints -- */
  #arrow-down, #arrow-up {
    position: fixed; left: 50%; transform: translateX(-50%);
    z-index: 100;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.25s;
  }
  #arrow-down { bottom: 72px; }
  #arrow-up   { top: 44px; }
  #arrow-down:hover, #arrow-up:hover { opacity: 1; }
  #arrow-down svg, #arrow-up svg {
    width: 16px; height: 16px;
    stroke: rgba(255,255,255,0.25);
    stroke-width: 2; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  body.can-drill  #arrow-down { opacity: 0.4; }
  body.can-ascend #arrow-up   { opacity: 0.4; }

  /* -- subtle key hint -- */
  #key-hint {
    position: fixed; bottom: 6px; right: 16px;
    font-size: 10px; color: rgba(255,255,255,0.10);
    z-index: 100;
  }
</style>
</head>
<body>

<div id="breadcrumb"></div>

<div id="viewport">
  <div id="slide-container"></div>
</div>

<div id="arrow-left" class="nav-arrow" onclick="navigate('left')">
  <svg><polyline points="14,4 6,10 14,16"/></svg>
</div>
<div id="arrow-right" class="nav-arrow" onclick="navigate('right')">
  <svg><polyline points="6,4 14,10 6,16"/></svg>
</div>
<div id="arrow-down" onclick="navigate('down')">
  <svg><polyline points="3,5 8,11 13,5"/></svg>
</div>
<div id="arrow-up" onclick="navigate('up')">
  <svg><polyline points="3,11 8,5 13,11"/></svg>
</div>

<div id="dots"></div>
<div id="footer">02:34:17 &middot; $12.47</div>
<div id="key-hint">arrow keys to navigate</div>

<script>
// ── Data tree ──────────────────────────────────────────────────
const DATA = {
  children: [
    {
      stageLabel: "Stage 1 of 4 — Seed",
      title: "Seed Hypotheses",
      sub: "Complete",
      chip: "complete",
      progress: 100,
      summary: "Generated 12 seed hypotheses from the research knowledge graph. Filtered to 4 candidates based on novelty scoring and domain coverage.",
      children: null
    },
    {
      stageLabel: "Stage 2 of 4 — Hypothesis Loop",
      title: "Hypothesis Loop",
      sub: "Complete \u2014 Score: 8.4 / 10",
      chip: "complete",
      progress: 100,
      summary: "Refined over 3 iterations of generation and adversarial review. Score improved 6.2 \u2192 7.8 \u2192 8.4.",
      children: {
        children: [
          {
            stageLabel: "Hypothesis Loop > Iteration 1",
            title: "Iteration 1",
            sub: "Score: 6.2 / 10",
            chip: "complete",
            progress: 100,
            summary: "Initial hypothesis generation. Identified contrastive learning approach for code-switching detection. Reviewer flagged weak experimental grounding.",
            children: null
          },
          {
            stageLabel: "Hypothesis Loop > Iteration 2",
            title: "Iteration 2",
            sub: "Score: 7.8 / 10",
            chip: "complete",
            progress: 100,
            summary: "Strengthened experimental design with ablation study. Added cross-lingual evaluation framework. Reviewer noted missing baseline comparison.",
            children: null
          },
          {
            stageLabel: "Hypothesis Loop > Iteration 3",
            title: "Iteration 3",
            sub: "Score: 8.4 / 10",
            chip: "complete",
            progress: 100,
            summary: "Added comprehensive baselines and statistical significance tests. Reviewer approved with minor suggestions for related work section.",
            children: null
          }
        ]
      }
    },
    {
      stageLabel: "Stage 3 of 4 — Invention Loop",
      title: "Generating Artifacts",
      sub: "3 of 5 complete \u2022 Iteration 2",
      chip: "running",
      progress: 60,
      summary: "Building research artifacts to support the hypothesis. Completed experiments, dataset, and proof. Running ablation study.",
      children: {
        children: [
          {
            stageLabel: "Invention Loop > Sub-stages",
            title: "Strategy",
            sub: "Complete",
            chip: "complete",
            progress: 100,
            summary: "Contrastive alignment with code-switching augmentation. Added ablation experiments to isolate each contribution.",
            children: null
          },
          {
            stageLabel: "Invention Loop > Sub-stages",
            title: "Plan",
            sub: "Complete",
            chip: "complete",
            progress: 100,
            summary: "5 artifacts planned: 2 experiments, 1 dataset, 1 evaluation, 1 proof. Estimated runtime 12 minutes.",
            children: null
          },
          {
            stageLabel: "Invention Loop > Sub-stages",
            title: "Artifacts",
            sub: "3 of 5 complete",
            chip: "running",
            progress: 60,
            summary: "Running ablation study. Baseline accuracy: 0.847. Isolating contribution of contrastive loss vs code-switching augmentation.",
            children: {
              children: [
                {
                  stageLabel: "Artifacts > Item 1 of 5",
                  title: "Contrastive Baseline Experiment",
                  sub: "Complete",
                  chip: "complete",
                  progress: 100,
                  summary: "Accuracy: 0.847 vs 0.721 baseline. 17.5% improvement. Runtime: 4m 32s. Cost: $2.14",
                  children: null
                },
                {
                  stageLabel: "Artifacts > Item 2 of 5",
                  title: "Code-Switching Dataset",
                  sub: "Complete",
                  chip: "complete",
                  progress: 100,
                  summary: "12,400 synthetic code-switching pairs generated across 6 language pairs. Validated with native speaker agreement: 94.2%. Cost: $1.87",
                  children: null
                },
                {
                  stageLabel: "Artifacts > Item 3 of 5",
                  title: "Formal Proof",
                  sub: "Complete",
                  chip: "complete",
                  progress: 100,
                  summary: "Proved convergence bound for contrastive loss under code-switching perturbation. O(1/sqrt(n)) rate. Runtime: 1m 48s. Cost: $0.92",
                  children: null
                },
                {
                  stageLabel: "Artifacts > Item 4 of 5",
                  title: "Ablation Study",
                  sub: "Running \u2014 1m 20s elapsed",
                  chip: "running",
                  progress: 45,
                  summary: "Isolating contribution of contrastive loss vs code-switching augmentation. Testing 4 configurations. 2 of 4 configs evaluated.",
                  children: null
                },
                {
                  stageLabel: "Artifacts > Item 5 of 5",
                  title: "Cross-Lingual Evaluation",
                  sub: "Pending",
                  chip: "pending",
                  progress: 0,
                  summary: "Will evaluate on 6 held-out language pairs not seen during training. Measures generalization to unseen code-switching patterns.",
                  children: null
                }
              ]
            }
          },
          {
            stageLabel: "Invention Loop > Sub-stages",
            title: "Paper Text",
            sub: "Pending",
            chip: "pending",
            progress: 0,
            summary: "Will generate full paper text once all artifacts are complete. Sections: introduction, method, experiments, results, discussion.",
            children: null
          },
          {
            stageLabel: "Invention Loop > Sub-stages",
            title: "Review",
            sub: "Pending",
            chip: "pending",
            progress: 0,
            summary: "Adversarial review of generated paper and artifacts. Checks for consistency, correctness, and completeness.",
            children: null
          }
        ]
      }
    },
    {
      stageLabel: "Stage 4 of 4 — Paper & Repository",
      title: "Paper & Repository",
      sub: "Pending",
      chip: "pending",
      progress: 0,
      summary: "Waiting for Invention Loop to complete. Will compile final paper, generate visualizations, and build the code repository.",
      children: null
    }
  ]
};

// ── State ──────────────────────────────────────────────────────
// navStack tracks the path through the tree. Each entry is { node, index }
// where node is the parent group and index is the active child.
let navStack = [{ node: DATA, index: 2 }]; // start at "Generating Artifacts"
let transitioning = false;

// ── Helpers ────────────────────────────────────────────────────
function currentLevel() { return navStack[navStack.length - 1]; }
function currentItem() { const l = currentLevel(); return l.node.children[l.index]; }
function siblingCount() { return currentLevel().node.children.length; }

// ── Render ─────────────────────────────────────────────────────
const container = document.getElementById('slide-container');
const breadcrumbEl = document.getElementById('breadcrumb');
const dotsEl = document.getElementById('dots');
let activeCard = null;

function buildCardHTML(item) {
  const chipClass = item.chip === 'running' ? 'chip-running'
                  : item.chip === 'complete' ? 'chip-complete'
                  : 'chip-pending';
  const chipLabel = item.chip === 'running' ? 'Running'
                  : item.chip === 'complete' ? 'Complete'
                  : 'Pending';
  const progressClass = item.chip === 'complete' ? 'complete' : '';
  const icon = item.chip === 'complete' ? '\u2713 '
             : item.chip === 'running'  ? '\u25B6 '
             : '';

  return `
    <div class="stage-label">${item.stageLabel}</div>
    <div class="main-title">${icon}${item.title}</div>
    <span class="status-chip ${chipClass}">${chipLabel}</span>
    <div class="sub-line">${item.sub}</div>
    <div class="progress-wrap"><div class="progress-fill ${progressClass}" style="width:${item.progress}%"></div></div>
    <div class="summary">${item.summary}</div>
  `;
}

function renderCard(item, entranceDir) {
  // Remove old card with exit animation
  if (activeCard) {
    const old = activeCard;
    old.classList.remove('active');
    // Opposite direction for exit
    const exitMap = { left: 'exit-right', right: 'exit-left', up: 'exit-down', down: 'exit-up', none: 'exit-left' };
    old.classList.add(exitMap[entranceDir] || 'exit-left');
    setTimeout(() => old.remove(), 340);
  }

  // Create new card
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = buildCardHTML(item);

  // Position off-screen in entrance direction
  const enterMap = { left: 'exit-left', right: 'exit-right', up: 'exit-up', down: 'exit-down', none: '' };
  if (enterMap[entranceDir]) card.classList.add(enterMap[entranceDir]);

  container.appendChild(card);

  // Force reflow then animate in
  void card.offsetWidth;
  requestAnimationFrame(() => {
    card.classList.remove('exit-left', 'exit-right', 'exit-up', 'exit-down');
    card.classList.add('active');
  });

  activeCard = card;
  updateDots();
  updateBreadcrumb();
  updateBodyClasses();
}

function updateDots() {
  const count = siblingCount();
  const idx = currentLevel().index;
  dotsEl.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === idx ? ' active' : '');
    d.addEventListener('click', () => goToSibling(i));
    dotsEl.appendChild(d);
  }
}

function updateBreadcrumb() {
  if (navStack.length <= 1) {
    breadcrumbEl.innerHTML = '';
    return;
  }
  let parts = [];
  for (let i = 0; i < navStack.length; i++) {
    const item = navStack[i].node.children[navStack[i].index];
    const label = item.title;
    if (i < navStack.length - 1) {
      parts.push(`<span data-level="${i}">${label}</span>`);
    } else {
      parts.push(`<span style="color:rgba(255,255,255,0.40)">${label}</span>`);
    }
  }
  breadcrumbEl.innerHTML = parts.join('<span class="sep">/</span>');

  // Click handlers for breadcrumb
  breadcrumbEl.querySelectorAll('span[data-level]').forEach(el => {
    el.addEventListener('click', () => {
      const targetLevel = parseInt(el.dataset.level);
      ascendToLevel(targetLevel);
    });
  });
}

function updateBodyClasses() {
  const item = currentItem();
  document.body.classList.toggle('can-drill', !!(item.children && item.children.children.length));
  document.body.classList.toggle('can-ascend', navStack.length > 1);
}

// ── Navigation ─────────────────────────────────────────────────
function navigate(dir) {
  if (transitioning) return;
  const level = currentLevel();
  const count = siblingCount();

  if (dir === 'left') {
    if (level.index <= 0) return;
    level.index--;
    renderCard(currentItem(), 'left');
  }
  else if (dir === 'right') {
    if (level.index >= count - 1) return;
    level.index++;
    renderCard(currentItem(), 'right');
  }
  else if (dir === 'down') {
    const item = currentItem();
    if (!item.children || !item.children.children.length) return;
    navStack.push({ node: item.children, index: 0 });
    renderCard(currentItem(), 'down');
  }
  else if (dir === 'up') {
    if (navStack.length <= 1) return;
    navStack.pop();
    renderCard(currentItem(), 'up');
  }

  lockTransition();
}

function goToSibling(idx) {
  if (transitioning) return;
  const level = currentLevel();
  if (idx === level.index) return;
  const dir = idx > level.index ? 'right' : 'left';
  level.index = idx;
  renderCard(currentItem(), dir);
  lockTransition();
}

function ascendToLevel(targetLevel) {
  if (transitioning) return;
  if (targetLevel >= navStack.length - 1) return;
  navStack.length = targetLevel + 1;
  renderCard(currentItem(), 'up');
  lockTransition();
}

function lockTransition() {
  transitioning = true;
  setTimeout(() => transitioning = false, 340);
}

// ── Keyboard ───────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowLeft':  e.preventDefault(); navigate('left');  break;
    case 'ArrowRight': e.preventDefault(); navigate('right'); break;
    case 'ArrowDown':  e.preventDefault(); navigate('down');  break;
    case 'ArrowUp':    e.preventDefault(); navigate('up');    break;
  }
});

// ── Mouse edge detection for arrow hints ───────────────────────
document.addEventListener('mousemove', (e) => {
  const threshold = 80;
  document.body.classList.toggle('show-left', e.clientX < threshold);
  document.body.classList.toggle('show-right', e.clientX > window.innerWidth - threshold);
});

// ── Timer tick ─────────────────────────────────────────────────
const footerEl = document.getElementById('footer');
let elapsed = 2 * 3600 + 34 * 60 + 17; // 02:34:17
let cost = 12.47;

function formatTime(s) {
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

setInterval(() => {
  elapsed++;
  // tiny cost trickle for realism
  if (Math.random() < 0.3) cost += 0.01;
  footerEl.textContent = `${formatTime(elapsed)} \u00B7 $${cost.toFixed(2)}`;
}, 1000);

// ── Initial render ─────────────────────────────────────────────
renderCard(currentItem(), 'none');

// Fade in key hint then remove
const hintEl = document.getElementById('key-hint');
setTimeout(() => { hintEl.style.transition = 'opacity 2s'; hintEl.style.opacity = '0'; }, 5000);
setTimeout(() => hintEl.remove(), 7500);
</script>
</body>
</html>
