<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Wide Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Slate surfaces */
  --bg-deep:     #0c0e14;
  --bg-surface:  #12151e;
  --bg-card:     #181c28;
  --bg-card-alt: #1a1f2c;
  --bg-hover:    #1f2536;
  --bg-elevated: #242a3a;

  /* Borders */
  --border:      #262c3e;
  --border-dim:  #1c2030;
  --border-lite: #303852;

  /* Text hierarchy */
  --text-100:    #e4e7ef;
  --text-200:    #a8adc0;
  --text-300:    #6e7590;
  --text-400:    #4a5168;

  /* Module colors */
  --green:       #34d399;
  --green-dim:   rgba(52, 211, 153, 0.12);
  --green-glow:  rgba(52, 211, 153, 0.25);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167, 139, 250, 0.12);
  --purple-glow: rgba(167, 139, 250, 0.25);
  --blue:        #60a5fa;
  --blue-dim:    rgba(96, 165, 250, 0.12);
  --blue-glow:   rgba(96, 165, 250, 0.25);
  --orange:      #fb923c;
  --orange-dim:  rgba(251, 146, 60, 0.12);
  --orange-glow: rgba(251, 146, 60, 0.25);

  /* Semantic */
  --amber:       #fbbf24;
  --red:         #f87171;

  /* Layout */
  --card-radius: 12px;
  --radius-sm:   8px;
  --transition:  200ms ease;
  --tree-line:   #262c3e;
}

html { font-size: 14px; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-200);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Background ambient canvas ───────────────────────────── */
#ambientCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Header Bar ──────────────────────────────────────────── */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  border-bottom: 1px solid var(--border-dim);
  background: var(--bg-surface);
  position: relative;
  z-index: 20;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(96,165,250,0.15), rgba(167,139,250,0.15));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

.header-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text-100);
}

.header-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
}

.header-run-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  background: rgba(96,165,250,0.08);
  border: 1px solid rgba(96,165,250,0.15);
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  color: var(--blue);
}

.header-run-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  animation: pulseGlow 2s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 4px var(--blue); opacity: 0.6; }
  50% { box-shadow: 0 0 10px var(--blue), 0 0 20px rgba(96,165,250,0.3); opacity: 1; }
}

.header-ring {
  width: 36px;
  height: 36px;
  position: relative;
  flex-shrink: 0;
  margin-left: 8px;
}

.header-ring svg { width: 100%; height: 100%; }
.header-ring .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
.header-ring .ring-fill {
  fill: none;
  stroke: var(--green);
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 87.96;
  stroke-dashoffset: 30.79;
  transition: stroke-dashoffset 1.2s ease;
}
.header-ring .ring-text {
  fill: var(--text-100);
  font-size: 9px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: central;
  font-family: 'Inter', sans-serif;
}

.header-stats {
  display: flex;
  gap: 18px;
  margin-left: auto;
  font-size: 11px;
  color: var(--text-300);
}

.header-stats span {
  display: flex;
  align-items: center;
  gap: 5px;
}

.stat-pip {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* ── Main Content ────────────────────────────────────────── */
.content-wrap {
  position: relative;
  z-index: 5;
  padding: 24px 28px 0;
}

/* ── Module Card Row ─────────────────────────────────────── */
.modules-row {
  display: flex;
  gap: 14px;
  position: relative;
}

/* ── Module Column ───────────────────────────────────────── */
.module-col {
  flex: 1;
  min-width: 0;
  position: relative;
}

/* ── MODULE CARD (wide ~25%) ─────────────────────────────── */
.module-card {
  width: 100%;
  background: linear-gradient(145deg, var(--bg-card), var(--bg-card-alt));
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 16px 18px 14px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
}

/* Left accent stripe */
.module-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: var(--card-radius) 0 0 var(--card-radius);
  transition: width 0.3s;
}

.module-card[data-color="green"]::before  { background: var(--green); }
.module-card[data-color="purple"]::before { background: var(--purple); }
.module-card[data-color="blue"]::before   { background: var(--blue); }
.module-card[data-color="orange"]::before { background: var(--orange); }

.module-card:hover {
  transform: translateY(-1px);
  border-color: var(--border-lite);
}

/* Active card */
.module-card.active { border-color: rgba(255,255,255,0.1); }
.module-card.active::before { width: 4px; }
.module-card.active[data-color="green"]  { box-shadow: 0 0 24px rgba(52,211,153,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active[data-color="purple"] { box-shadow: 0 0 24px rgba(167,139,250,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active[data-color="blue"]   { box-shadow: 0 0 24px rgba(96,165,250,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active[data-color="orange"] { box-shadow: 0 0 24px rgba(251,146,60,0.1), 0 4px 16px rgba(0,0,0,0.3); }

/* Active inner glow pulse */
.module-card.active .card-glow-inner {
  position: absolute;
  inset: -1px;
  border-radius: var(--card-radius);
  animation: cardPulse 3s ease-in-out infinite;
  pointer-events: none;
}

.module-card.active[data-color="green"] .card-glow-inner  { box-shadow: inset 0 0 24px rgba(52,211,153,0.05); }
.module-card.active[data-color="purple"] .card-glow-inner { box-shadow: inset 0 0 24px rgba(167,139,250,0.05); }
.module-card.active[data-color="blue"] .card-glow-inner   { box-shadow: inset 0 0 24px rgba(96,165,250,0.05); }
.module-card.active[data-color="orange"] .card-glow-inner { box-shadow: inset 0 0 24px rgba(251,146,60,0.05); }

@keyframes cardPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* ── Shimmer on active ───────────────────────────────────── */
.card-shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    115deg,
    transparent 28%,
    rgba(255,255,255,0.025) 46%,
    rgba(255,255,255,0.06) 50%,
    rgba(255,255,255,0.025) 54%,
    transparent 72%
  );
  background-size: 250% 100%;
  animation: shimmerSweep 3.5s ease-in-out infinite;
  pointer-events: none;
  opacity: 0;
  border-radius: var(--card-radius);
}

.module-card.active .card-shimmer { opacity: 1; }

@keyframes shimmerSweep {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ── Card Content ────────────────────────────────────────── */
.card-top-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.card-info {
  flex: 1;
  min-width: 0;
}

.card-name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}

.card-icon {
  font-size: 15px;
  flex-shrink: 0;
}

.card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-100);
  letter-spacing: -0.2px;
}

.card-status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: auto;
  flex-shrink: 0;
  white-space: nowrap;
}

.card-status-badge.done    { background: var(--green-dim); color: var(--green); }
.card-status-badge.running {
  background: var(--blue-dim);
  color: var(--blue);
  animation: badgeShimmer 2s ease-in-out infinite;
}
.card-status-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }

@keyframes badgeShimmer {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 1; background: rgba(96,165,250,0.2); }
}

.card-desc {
  font-size: 11px;
  color: var(--text-300);
  line-height: 1.45;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
}

/* Metric + mini ring row */
.card-metric-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.card-metric-label {
  font-size: 10px;
  color: var(--text-400);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.card-metric-value {
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* Mini ring */
.card-mini-ring {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  margin-left: auto;
}

.card-mini-ring svg { width: 100%; height: 100%; }
.card-mini-ring .mr-track { fill: none; stroke: var(--border); stroke-width: 3; }
.card-mini-ring .mr-fill  {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-dasharray: 69.12;
  transition: stroke-dashoffset 0.8s ease;
}
.card-mini-ring .mr-text {
  font-size: 7px;
  font-weight: 700;
  text-anchor: middle;
  dominant-baseline: central;
  font-family: 'Inter', sans-serif;
}

/* Progress bar */
.card-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}

.card-progress-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width 1s ease;
}

.card-sub-summary {
  font-size: 10px;
  color: var(--text-400);
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-sub-summary .chevron {
  display: inline-block;
  width: 12px;
  height: 12px;
  transition: transform 0.3s;
}

.card-sub-summary .chevron svg {
  width: 100%;
  height: 100%;
  stroke: var(--text-400);
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.module-col.collapsed .card-sub-summary .chevron {
  transform: rotate(-90deg);
}

/* ── Tree Container (sub-modules) ────────────────────────── */
.submods-wrap {
  overflow: hidden;
  transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.35s ease;
  max-height: 600px;
  opacity: 1;
}

.module-col.collapsed .submods-wrap {
  max-height: 0;
  opacity: 0;
}

.submods {
  padding: 8px 0 0 0;
  position: relative;
}

.tree-container {
  position: relative;
  padding-left: 20px;
}

/* Vertical tree line */
.tree-container::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 0;
  width: 1px;
  height: var(--tree-line-h, calc(100% - 18px));
  transition: height 0.4s ease;
}

/* Color-keyed tree lines */
.tree-container[data-color="green"]::before  { background: rgba(52,211,153,0.2); }
.tree-container[data-color="purple"]::before { background: rgba(167,139,250,0.2); }
.tree-container[data-color="blue"]::before   { background: rgba(96,165,250,0.2); }
.tree-container[data-color="orange"]::before { background: rgba(251,146,60,0.2); }

/* Sub-module rows */
.submod-row {
  height: 34px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  font-size: 12px;
  opacity: 0;
  transform: translateX(-14px) translateY(4px);
  transition: opacity 0.35s ease, transform 0.35s ease;
  cursor: pointer;
  padding-right: 8px;
  border-radius: 6px;
}

.submod-row.visible {
  opacity: 1;
  transform: translateX(0) translateY(0);
}

.submod-row:hover { background: rgba(255,255,255,0.02); }

/* Horizontal branch */
.submod-row::before {
  content: '';
  position: absolute;
  left: -12px;
  top: 50%;
  width: 12px;
  height: 1px;
}

.tree-container[data-color="green"] .submod-row::before  { background: rgba(52,211,153,0.2); }
.tree-container[data-color="purple"] .submod-row::before { background: rgba(167,139,250,0.2); }
.tree-container[data-color="blue"] .submod-row::before   { background: rgba(96,165,250,0.2); }
.tree-container[data-color="orange"] .submod-row::before { background: rgba(251,146,60,0.2); }

/* Sub-module dot */
.submod-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  transition: all 0.3s;
}

.submod-dot.done { background: var(--green); opacity: 0.65; }
.submod-dot.running {
  background: var(--blue);
  animation: subDotPulse 2s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(96,165,250,0.5);
}

@keyframes subDotPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 6px rgba(96,165,250,0.3); }
  50% { transform: scale(1.3); box-shadow: 0 0 14px rgba(96,165,250,0.6); }
}

.submod-dot.pending {
  background: transparent;
  border: 1.5px solid var(--text-400);
  opacity: 0.45;
}

.submod-label {
  color: var(--text-300);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.submod-row.active-sub .submod-label { color: var(--text-100); font-weight: 500; }
.submod-row.done-sub .submod-label { color: var(--text-300); }

.submod-meta {
  margin-left: auto;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-400);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ── Connector + Tree Particle Canvas ────────────────────── */
#particleCanvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 15;
}

/* ── Dashboard Detail Panel ──────────────────────────────── */
.dashboard {
  margin: 20px 28px 28px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  padding: 24px;
  min-height: 240px;
  position: relative;
  overflow: hidden;
  z-index: 5;
}

.dash-enter {
  animation: dashFadeIn 0.35s ease;
}

@keyframes dashFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.dash-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.dash-icon { font-size: 20px; }

.dash-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-100);
}

.dash-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 6px;
}

.dash-badge.done    { background: var(--green-dim); color: var(--green); }
.dash-badge.running { background: var(--blue-dim); color: var(--blue); }
.dash-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }

.dash-summary {
  font-size: 12px;
  color: var(--text-300);
  line-height: 1.65;
  margin-bottom: 18px;
  max-width: 780px;
  font-style: italic;
}

.dash-stats-row {
  display: flex;
  gap: 14px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.dash-stat {
  flex: 1;
  min-width: 140px;
  max-width: 220px;
  background: rgba(255,255,255,0.015);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}

.dash-stat-label {
  font-size: 10px;
  color: var(--text-400);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.dash-stat-value {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.dash-stat-bar {
  height: 4px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  overflow: hidden;
}

.dash-stat-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width 0.7s ease;
}

/* Items list */
.dash-items {
  margin-bottom: 16px;
}

.dash-items-title {
  font-size: 10px;
  color: var(--text-400);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.dash-item-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
  overflow: hidden;
}

.dash-item-row:hover { background: rgba(255,255,255,0.025); }

.dash-item-row.running-item::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.04) 45%, rgba(96,165,250,0.08) 50%, rgba(96,165,250,0.04) 55%, transparent);
  background-size: 200% 100%;
  animation: rowShimmer 2.5s ease-in-out infinite;
  pointer-events: none;
  border-radius: 6px;
}

@keyframes rowShimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.dash-item-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dash-item-dot.done    { background: var(--green); }
.dash-item-dot.running { background: var(--blue); animation: itemPulse 1.5s ease-in-out infinite; }
.dash-item-dot.pending { border: 1px solid var(--text-400); }

@keyframes itemPulse {
  0%, 100% { opacity: 0.6; } 50% { opacity: 1; }
}

.dash-item-name { color: var(--text-300); }
.dash-item-meta {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-400);
  font-variant-numeric: tabular-nums;
}

/* Activity log */
.dash-activity {
  border-top: 1px solid var(--border-dim);
  padding-top: 14px;
}

.dash-activity-title {
  font-size: 10px;
  color: var(--text-400);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.activity-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 11px;
  color: var(--text-300);
  transition: opacity 0.4s, transform 0.4s;
}

.activity-time {
  color: var(--text-400);
  font-size: 10px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  width: 44px;
}

.activity-pip {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1100px) {
  .modules-row { flex-wrap: wrap; }
  .module-col { flex: 0 0 calc(50% - 7px); min-width: calc(50% - 7px); }
}

@media (max-width: 600px) {
  .module-col { flex: 0 0 100%; min-width: 100%; }
  .header-stats { display: none; }
}
</style>
</head>
<body>

<!-- Background ambient particles -->
<canvas id="ambientCanvas"></canvas>

<!-- Header -->
<div class="header">
  <div class="header-logo">
    <div class="header-logo-icon">&#x2726;</div>
    <span class="header-title">AI Inventor</span>
  </div>
  <div class="header-sep"></div>
  <div class="header-run-badge">
    <span class="header-run-dot"></span>
    Run 47
  </div>
  <div class="header-ring">
    <svg viewBox="0 0 36 36">
      <circle class="ring-track" cx="18" cy="18" r="14" />
      <circle class="ring-fill" cx="18" cy="18" r="14"
              transform="rotate(-90 18 18)" />
      <text class="ring-text" x="18" y="18">65%</text>
    </svg>
  </div>
  <div class="header-stats">
    <span><span class="stat-pip" style="background:var(--green)"></span>3 Done</span>

  resolvedColors[name] = v;
  return v;
}

function computeTreeLineHeights() {

    const last = rows[rows.length - 1];
    const tcRect = tc.getBoundingClientRect();
    const lastRect = last.getBoundingClientRect();
    const h = (lastRect.top + lastRect.height / 2) - tcRect.top;
    tc.style.setProperty('--tree-line-h', Math.max(0, h) + 'px');
  });
}

function animateSubEntrance(mi) {
  const subs = subEls[mi];
  if (!subs) return;
  subs.forEach((el, i) => {
    el.classList.remove('visible');
    setTimeout(() => el.classList.add('visible'), 60 + i * 55);
  });
}

function selectModule(mi) {

  cardEls.forEach((c, i) => c.classList.toggle('active', i === mi));

    col.classList.add('collapsed');

// =====================================================
// AMBIENT PARTICLE CANVAS (background)
// =====================================================
function initAmbientCanvas() {
  aCanvas = document.getElementById('ambientCanvas');
  aCtx = aCanvas.getContext('2d');
  resizeAmbient();

  // Seed ambient particles
  const colorPalette = ['#60a5fa', '#a78bfa', '#34d399', '#fb923c'];
  for (let i = 0; i < 55; i++) {
    ambientParticles.push({
      x: Math.random() * aCanvas.width,
      y: Math.random() * aCanvas.height,
      vx: (Math.random() - 0.5) * 7,
      vy: (Math.random() - 0.5) * 7,
      size: 0.8 + Math.random() * 1.6,
      alpha: 0.06 + Math.random() * 0.1,
      color: colorPalette[Math.floor(Math.random() * 4)],
    });
  }
}

function resizeAmbient() {
  aCanvas.width = window.innerWidth;
  aCanvas.height = window.innerHeight;
}

function drawAmbientParticles(dt) {
  aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);

  const w = aCanvas.width;
  const h = aCanvas.height;

  for (const p of ambientParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Wrap edges
    if (p.x < -10) p.x = w + 10;
    if (p.x > w + 10) p.x = -10;
    if (p.y < -10) p.y = h + 10;
    if (p.y > h + 10) p.y = -10;

    // Dot
    aCtx.globalAlpha = p.alpha;
    aCtx.beginPath();
    aCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    aCtx.fillStyle = p.color;
    aCtx.fill();

    // Soft glow halo
    aCtx.globalAlpha = p.alpha * 0.25;
    aCtx.beginPath();
    aCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    aCtx.fillStyle = p.color;
    aCtx.fill();
  }

  // Faint connecting lines for nearby pairs
  aCtx.lineWidth = 0.5;
  const maxDist = 110;
  for (let i = 0; i < ambientParticles.length; i++) {
    for (let j = i + 1; j < ambientParticles.length; j++) {
      const a = ambientParticles[i];
      const b = ambientParticles[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const distSq = dx * dx + dy * dy;
      if (distSq < maxDist * maxDist) {
        const dist = Math.sqrt(distSq);
        const alpha = (1 - dist / maxDist) * 0.035;
        aCtx.globalAlpha = alpha;
        aCtx.beginPath();
        aCtx.moveTo(a.x, a.y);
        aCtx.lineTo(b.x, b.y);
        aCtx.strokeStyle = '#60a5fa';
        aCtx.stroke();
      }
    }
  }

  aCtx.globalAlpha = 1;
}

// MAIN PARTICLE CANVAS (connectors + tree)

function resizeMain() {

  pCanvas.height = window.innerHeight;

// ── Colored connector lines between cards ──
function drawConnectorLines() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardEls[i];
    const toCard = cardEls[i + 1];
    if (!fromCard || !toCard) continue;

    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);

    const y = fromRect.top + fromRect.height / 2;
    const x1 = fromRect.right + 2;
    const x2 = toRect.left - 2;

    if (x2 <= x1) continue;

    const isPending = toMod.status === 'pending';
    const color = resolveColor(fromMod.color);

    pCtx.beginPath();
    pCtx.moveTo(x1, y);
    pCtx.lineTo(x2, y);

    if (isPending) {
      pCtx.strokeStyle = '#262c3e';
      pCtx.globalAlpha = 0.35;
      pCtx.setLineDash([4, 4]);
    } else {
      pCtx.strokeStyle = color;
      pCtx.globalAlpha = 0.2;
      pCtx.setLineDash([]);
    }

    pCtx.lineWidth = 1;
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.globalAlpha = 1;
  }
}

// ── Connector particles (between cards) ──
function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardEls[i];
    const toCard = cardEls[i + 1];
    if (!fromCard || !toCard) continue;

    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];

    // Skip if either end is pending
    if (fromMod.status === 'pending' || toMod.status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;
    const color = resolveColor(fromMod.color);

    const isActive = fromMod.status === 'running' || toMod.status === 'running';

    connectorParticles.push({
      x: fromRect.right,
      y: y + (Math.random() - 0.5) * 4,
      targetX: toRect.left,
      speed: isActive ? 50 + Math.random() * 20 : 30 + Math.random() * 15,
      color,
      size: isActive ? 2.8 : 2,
      alpha: isActive ? 0.75 : 0.35,
      trail: [],
    });
  }
}

// ── Tree particles (card -> active sub-module) ──
function findRunningSub(mi) {
  const mod = MODULES[mi];
  for (let i = 0; i < mod.subs.length; i++) {
    if (mod.subs[i].status === 'running') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  const mi = activeIdx;
  // Don't spawn if tree is collapsed
  if (collapsedSet.has(mi)) return;

  const si = findRunningSub(mi);
  if (si < 0) return;
  if (!cardEls[mi] || !subEls[mi] || !subEls[mi][si]) return;

  const card = cardEls[mi];
  const subRow = subEls[mi][si];
  const subDot = subRow.querySelector('.submod-dot');
  if (!subDot) return;

  const tc = treeContainerEls[mi];
  if (!tc) return;

  // Use getBoundingClientRect for proper positioning
  const cardRect = elRect(card);
  const dotRect = elRect(subDot);
  const tcRect = elRect(tc);

  // Start: bottom center of card
  const startX = cardRect.left + cardRect.width / 2;
  const startY = cardRect.bottom;

  // Vertical tree line X: 8px from left edge of tree container
  const vertX = tcRect.left + 8;

  // Branch point: center of target sub row dot
  const branchY = dotRect.top + dotRect.height / 2;
  const endX = dotRect.left + dotRect.width / 2;
  const endY = branchY;

  // Waypoints: start -> shift to vert line -> down vert line -> branch right
  const waypoints = [
    { x: startX, y: startY },
    { x: vertX, y: startY + 8 },
    { x: vertX, y: branchY },
    { x: endX, y: endY },
  ];

  const color = resolveColor('blue');

  treeParticles.push({
    waypoints,
    wpIdx: 0,
    x: waypoints[0].x,
    y: waypoints[0].y,
    speed: 90,
    color,
    size: 2.8,
    alpha: 0.8,
    trail: [],
  });
}

// ── Burst effect at end of tree particle path ──
function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.4;
    const speed = 25 + Math.random() * 45;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.4 + Math.random() * 0.6,
      color,
      size: 2,
    });
  }
}

// =====================================================
// ANIMATION LOOP
// =====================================================
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  // ── Ambient background ──
  drawAmbientParticles(dt);

  // ── Clear main canvas ──
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  // ── Static colored connector lines ──
  drawConnectorLines();

  // ── Spawn timers ──
  connSpawnT += dt;
  if (connSpawnT > 0.9) {
    connSpawnT = 0;
    spawnConnectorParticle();
  }

  treeSpawnT += dt;
  if (treeSpawnT > 0.55) {
    treeSpawnT = 0;
    spawnTreeParticle();
  }

  // ── Update + draw connector particles ──
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 14) p.trail.shift();

    // Trail line
    if (p.trail.length > 1) {
      pCtx.beginPath();
      pCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      pCtx.strokeStyle = p.color;
      pCtx.globalAlpha = p.alpha * 0.25;
      pCtx.lineWidth = p.size * 0.5;
      pCtx.stroke();
    }

    // Head dot
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Head glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;

    // Remove when past target
    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }

  // ── Update + draw tree particles ──
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      // Arrived at destination: burst
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }

    const dx = wp.x - p.x;
    const dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 2) {
      p.x = wp.x;
      p.y = wp.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();

    // Trail segments with fading
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        pCtx.globalAlpha = ratio * p.alpha * 0.35;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = p.color;
        pCtx.lineWidth = p.size * 0.5 * ratio;
        pCtx.stroke();
      }
    }

    // Head glow halo
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Head dot
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }

  // ── Update + draw burst particles ──
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.94;
    p.vy *= 0.94;

    // Dot
    pCtx.globalAlpha = p.life * 0.7;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Glow
    pCtx.globalAlpha = p.life * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5 * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }
}

// =====================================================
// INIT
// =====================================================
function init() {
  buildModules();
  buildDashboard();
  initAmbientCanvas();
  initMainCanvas();

  window.addEventListener('resize', () => {
    resizeAmbient();
    resizeMain();
  });

  lastT = performance.now();
  requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
