<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor - Rings All The Way Down</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1d23; --surface: #22262e; --surface2: #282d37;
    --border: #2e3440; --text: #e2e4e9; --text-dim: #8b919a;
    --green: #22c55e; --purple: #a78bfa; --blue: #3b82f6; --orange: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ── Top Bar ── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 48px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { width: 20px; height: 20px; }
  .topbar-title { font-weight: 700; font-size: 14px; letter-spacing: -0.3px; }
  .topbar-run { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .topbar-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--text-dim); }
  .topbar-pill {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 3px 10px; font-weight: 600; font-size: 11px; color: var(--green);
  }
  .topbar-keys { display: flex; gap: 4px; }
  .topbar-keys kbd {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 6px; font-size: 10px; font-family: 'Inter', sans-serif;
    color: var(--text-dim); font-weight: 500;
  }

  /* ── Main Layout ── */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* ── Left: Big Ring ── */
  .ring-panel {
    width: 200px; min-width: 200px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; gap: 16px;
    background: var(--surface); border-right: 1px solid var(--border);
  }
  .big-ring-wrap { position: relative; width: 140px; height: 140px; }
  .big-ring-svg { width: 140px; height: 140px; transform: rotate(-90deg); }
  .big-ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
  .big-ring-arc {
    fill: none; stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
  }
  .big-ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; pointer-events: none;
  }
  .big-ring-pct {
    font-size: 32px; font-weight: 700; letter-spacing: -1.5px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .big-ring-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* Module segment highlights on ring */
  .big-ring-segment {
    fill: none; stroke-width: 12; stroke-linecap: round;
    opacity: 0; transition: opacity 0.4s;
  }
  .big-ring-segment.visible { opacity: 0.3; }

  /* Legend items */
  .legend { width: 100%; display: flex; flex-direction: column; gap: 4px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    font-size: 11px; color: var(--text-dim);
  }
  .legend-item:hover { background: var(--surface2); color: var(--text); }
  .legend-item.active { background: var(--surface2); color: #fff; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-pct { margin-left: auto; font-size: 10px; font-weight: 600; opacity: 0.6; }

  /* ── Right Content ── */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Row 1: Module Ring Gauges (40px) ── */
  .row1 {
    display: flex; align-items: center; justify-content: center;
    padding: 16px 24px 12px; gap: 0;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: relative; flex-shrink: 0;
  }
  .mod-node {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; position: relative; z-index: 2;
    transition: transform 0.25s;
  }
  .mod-node:hover { transform: translateY(-2px); }
  .mod-ring-wrap { position: relative; width: 40px; height: 40px; }
  .mod-ring-svg { width: 40px; height: 40px; transform: rotate(-90deg); }
  .mod-ring-track { fill: none; stroke: var(--border); stroke-width: 3.5; }
  .mod-ring-arc {
    fill: none; stroke-width: 3.5; stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .mod-ring-center {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; pointer-events: none;
    font-size: 9px; font-weight: 700;
  }
  .mod-ring-glow {
    position: absolute; inset: -5px; border-radius: 50%;
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  .mod-node.selected .mod-ring-wrap { transform: scale(1.15); }
  .mod-node.selected .mod-ring-glow { opacity: 0.4; }
  .mod-node.active .mod-ring-glow { opacity: 0.25; }
  .mod-node.completed .mod-ring-glow { opacity: 0.15; }
  .mod-name {
    font-size: 10px; font-weight: 500; color: var(--text-dim);
    transition: color 0.2s; white-space: nowrap;
  }
  .mod-node.selected .mod-name { color: #fff; }
  .mod-pct-tip {
    position: absolute; top: -20px; left: 50%; transform: translateX(-50%) scale(0.9);
    font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s;
  }
  .mod-node:hover .mod-pct-tip { opacity: 1; transform: translateX(-50%) scale(1); }

  /* Connector lines between module rings */
  .connector-canvas {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
  }

  /* ── Row 2: Sub-step Micro Rings (24px) ── */
  .row2 {
    display: flex; align-items: center; justify-content: center;
    padding: 12px 24px 10px; gap: 6px;
    border-bottom: 1px solid var(--border);
    background: rgba(34,38,46,0.5);
    flex-shrink: 0; min-height: 60px;
    transition: opacity 0.3s;
  }
  .micro-node {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; position: relative;
    transition: transform 0.2s;
  }
  .micro-node:hover { transform: translateY(-1px); }
  .micro-ring-wrap { position: relative; width: 24px; height: 24px; }
  .micro-ring-svg { width: 24px; height: 24px; transform: rotate(-90deg); }
  .micro-ring-track { fill: none; stroke: var(--border); stroke-width: 2.5; }
  .micro-ring-arc {
    fill: none; stroke-width: 2.5; stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .micro-ring-center {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; pointer-events: none;
    font-size: 6px; font-weight: 700;
  }
  .micro-ring-glow {
    position: absolute; inset: -3px; border-radius: 50%;
    opacity: 0; transition: opacity 0.4s; pointer-events: none;
  }
  .micro-node.completed .micro-ring-glow { opacity: 0.2; }
  .micro-node.active .micro-ring-glow { opacity: 0.35; }
  .micro-node.selected .micro-ring-glow { opacity: 0.5; }
  .micro-name {
    font-size: 8px; color: var(--text-dim); max-width: 56px;
    text-align: center; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; transition: color 0.2s;
  }
  .micro-node.selected .micro-name { color: #fff; }
  .micro-tip {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 8px; font-weight: 600; padding: 2px 6px; border-radius: 3px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s;
  }
  .micro-node:hover .micro-tip { opacity: 1; }

  /* ── Detail Panel ── */
  .detail {
    flex: 1; overflow-y: auto; padding: 24px 32px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .detail::-webkit-scrollbar { width: 4px; }
  .detail::-webkit-scrollbar-track { background: transparent; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .detail-header { display: flex; align-items: center; gap: 12px; }
  .detail-dot { width: 10px; height: 10px; border-radius: 50%; }
  .detail-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .detail-status {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .detail-summary { font-size: 13px; color: var(--text-dim); line-height: 1.7; max-width: 700px; }

  .step-card {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px; border-radius: 12px;
    background: var(--surface); border: 1px solid var(--border);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .step-card:hover { border-color: #3a4050; background: var(--surface2); }
  .step-card.selected { border-color: #4a5568; }
  .step-ring-wrap { position: relative; width: 32px; height: 32px; flex-shrink: 0; }
  .step-ring-svg { width: 32px; height: 32px; transform: rotate(-90deg); }
  .step-ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .step-ring-arc { fill: none; stroke-width: 3; stroke-linecap: round; }
  .step-ring-center {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; pointer-events: none; font-size: 8px; font-weight: 700;
  }
  .step-info { flex: 1; min-width: 0; }
  .step-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .step-name { font-size: 13px; font-weight: 600; }
  .step-metric {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
    background: var(--bg); color: var(--text-dim);
  }
  .step-detail { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

  /* Animated pulse for active micro rings */
  @keyframes microPulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.15); }
  }
  .micro-node.active .micro-ring-glow { animation: microPulse 2s ease-in-out infinite; }

  /* Animated fill for active ring */
  @keyframes activeFill { 0% { stroke-dashoffset: var(--start); } 100% { stroke-dashoffset: var(--end); } }

  /* Particle animation on connectors */
  @keyframes particleFlow { 0% { offset-distance: 0%; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { offset-distance: 100%; opacity: 0; } }
  .particle {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    offset-rotate: 0deg; animation: particleFlow 2s linear infinite;
  }

  /* ── Micro connector canvas (row 2) ── */
  .micro-connector-canvas {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
  }
  .row2 { position: relative; }

  /* ── Detail Stats Grid ── */
  .detail-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px; margin-top: 4px;
  }
  .detail-stat {
    display: flex; flex-direction: column; gap: 4px;
    padding: 12px 14px; border-radius: 10px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .detail-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
  .detail-stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .detail-stat-sub { font-size: 10px; color: var(--text-dim); }

  /* ── Step card sub-details ── */
  .step-timing {
    display: flex; gap: 12px; margin-top: 6px;
    font-size: 10px; color: var(--text-dim);
  }
  .step-timing span { display: flex; align-items: center; gap: 4px; }
  .step-timing .dot { width: 4px; height: 4px; border-radius: 50%; }

  /* ── Progress mini bar inside step card ── */
  .step-progress-bar {
    width: 100%; height: 3px; border-radius: 2px;
    background: var(--border); margin-top: 8px; overflow: hidden;
  }
  .step-progress-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Section dividers in detail ── */
  .detail-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-top: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Elapsed timer animation ── */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .elapsed-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); display: inline-block;
    animation: blink 1.5s ease-in-out infinite;
  }

  /* ── Module ring endpoint dot ── */
  .mod-ring-ep {
    position: absolute; width: 5px; height: 5px; border-radius: 50%;
    pointer-events: none; opacity: 0;
    transition: all 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .mod-node.active .mod-ring-ep,
  .mod-node.completed .mod-ring-ep { opacity: 1; }

  /* ── Breadcrumb path ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-dim); margin-bottom: 4px;
  }
  .breadcrumb span { cursor: pointer; transition: color 0.2s; }
  .breadcrumb span:hover { color: var(--text); }
  .breadcrumb .sep { color: var(--border); font-size: 9px; }
  .breadcrumb .current { color: var(--text); font-weight: 600; }
</style>
</head>

// ── STATE ──
let selMod = 2;    // selected module index
let selStep = 3;   // selected sub-step index within module

// ── UTILITIES ──
function modPct(m) {
  if (m.status === 'completed') return 100;
  if (m.status === 'pending') return 0;
  const total = m.steps.length;
  const done = m.steps.filter(s => s.status === 'completed').length;
  const active = m.steps.find(s => s.status === 'active');
  return Math.round(((done + (active ? active.pct / 100 : 0)) / total) * 100);
}

function overallPct() {
  let totalW = 0, sumW = 0;
  MODULES.forEach(m => { totalW += m.weight; sumW += m.weight * modPct(m) / 100; });
  return Math.round(sumW / totalW * 100);
}

function ringDash(r, pct) {
  const c = 2 * Math.PI * r;
  return { array: c, offset: c - (c * Math.min(pct, 100) / 100) };
}

function statusColor(status, raw) {
  if (status === 'completed') return raw;
  if (status === 'active') return raw;
  return '#3a4050';
}

// ── RENDER: Big Ring ──
function renderBigRing() {
  const pct = overallPct();
  document.getElementById('bigPct').textContent = pct + '%';
  const arc = document.querySelector('.big-ring-arc');
  const r = 58;
  const d = ringDash(r, pct);
  arc.setAttribute('stroke-dasharray', d.array);
  arc.setAttribute('stroke-dashoffset', d.offset);

  // Segment highlights
  const circ = 2 * Math.PI * r;
  let accum = 0;
  const totalW = MODULES.reduce((s, m) => s + m.weight, 0);
  MODULES.forEach((m, i) => {
    const seg = document.getElementById('seg-' + m.id);
    const segLen = (m.weight / totalW) * circ;
    seg.setAttribute('stroke-dasharray', segLen + ' ' + (circ - segLen));
    seg.setAttribute('stroke-dashoffset', -(accum));
    seg.setAttribute('stroke', m.raw);
    seg.classList.toggle('visible', i === selMod);
    accum += segLen;
  });
}

function renderLegend() {

// ── RENDER: Connectors with particles ──
function renderConnectors() {
  const canvas = document.getElementById('connCanvas');
  const row = document.getElementById('row1');
  canvas.width = row.offsetWidth;
  canvas.height = row.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const nodes = row.querySelectorAll('.mod-node');
  for (let i = 0; i < nodes.length - 1; i++) {
    const a = nodes[i].querySelector('.mod-ring-wrap');
    const b = nodes[i + 1].querySelector('.mod-ring-wrap');
    const rA = a.getBoundingClientRect();
    const rB = b.getBoundingClientRect();
    const rowR = row.getBoundingClientRect();
    const x1 = rA.right - rowR.left;
    const y1 = rA.top + rA.height / 2 - rowR.top;
    const x2 = rB.left - rowR.left;
    const y2 = rB.top + rB.height / 2 - rowR.top;

    const grad = ctx.createLinearGradient(x1, y1, x2, y2);
    const cA = MODULES[i].raw;
    const cB = MODULES[i + 1].raw;
    grad.addColorStop(0, cA + '60');
    grad.addColorStop(1, cB + '60');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw particle dots (animated via requestAnimationFrame)
  drawParticles(ctx, nodes, row);
}

let particleT = 0;
function drawParticles(ctx, nodes, row) {
  const rowR = row.getBoundingClientRect();
  for (let i = 0; i < nodes.length - 1; i++) {
    const a = nodes[i].querySelector('.mod-ring-wrap');
    const b = nodes[i + 1].querySelector('.mod-ring-wrap');
    const rA = a.getBoundingClientRect();
    const rB = b.getBoundingClientRect();
    const x1 = rA.right - rowR.left;
    const y1 = rA.top + rA.height / 2 - rowR.top;
    const x2 = rB.left - rowR.left;
    const y2 = rB.top + rB.height / 2 - rowR.top;

    // 2 particles per segment at different offsets
    for (let p = 0; p < 2; p++) {
      const t = ((particleT / 120 + p * 0.5 + i * 0.25) % 1);
      const px = x1 + (x2 - x1) * t;
      const py = y1 + (y2 - y1) * t;
      const alpha = Math.sin(t * Math.PI) * 0.8;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = MODULES[i].raw + Math.round(alpha * 255).toString(16).padStart(2, '0');
      ctx.fill();
    }
  }
}

// ── RENDER: Micro Connectors (row 2 lines between micro rings) ──
function renderMicroConnectors() {
  const canvas = document.getElementById('microConnCanvas');
  if (!canvas) return;
  const row = document.getElementById('row2');
  canvas.width = row.offsetWidth;
  canvas.height = row.offsetHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const nodes = row.querySelectorAll('.micro-node');
  const m = MODULES[selMod];
  const rowR = row.getBoundingClientRect();

  for (let i = 0; i < nodes.length - 1; i++) {
    const aWrap = nodes[i].querySelector('.micro-ring-wrap');
    const bWrap = nodes[i + 1].querySelector('.micro-ring-wrap');
    const rA = aWrap.getBoundingClientRect();
    const rB = bWrap.getBoundingClientRect();

    const x1 = rA.right - rowR.left;
    const y1 = rA.top + rA.height / 2 - rowR.top;
    const x2 = rB.left - rowR.left;
    const y2 = rB.top + rB.height / 2 - rowR.top;

    // Determine line color based on step status
    const sA = m.steps[i];
    const sB = m.steps[i + 1];
    const isCompleted = sA.status === 'completed';
    const alpha = isCompleted ? '60' : '30';

    ctx.strokeStyle = m.raw + alpha;
    ctx.lineWidth = 1;
    ctx.setLineDash(isCompleted ? [] : [3, 3]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Tiny particle on completed connectors
    if (isCompleted) {
      const t = ((particleT / 80 + i * 0.3) % 1);
      const px = x1 + (x2 - x1) * t;
      const py = y1 + (y2 - y1) * t;
      const a = Math.sin(t * Math.PI) * 0.6;
      ctx.beginPath();
      ctx.arc(px, py, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = m.raw + Math.round(a * 255).toString(16).padStart(2, '0');
      ctx.fill();
    }
  }
}

// ── SELECT MODULE ──
function selectModule(idx) {
  selMod = Math.max(0, Math.min(MODULES.length - 1, idx));
  selStep = Math.min(selStep, MODULES[selMod].steps.length - 1);
  // Auto-select the active step if any
  const activeIdx = MODULES[selMod].steps.findIndex(s => s.status === 'active');
  if (activeIdx >= 0) selStep = activeIdx;
  else selStep = Math.min(selStep, MODULES[selMod].steps.length - 1);
  renderAll();
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  const m = MODULES[selMod];
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    selectModule(selMod + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectModule(selMod - 1);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selStep = Math.min(selStep + 1, m.steps.length - 1);
    renderRow2();
    renderDetail();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selStep = Math.max(selStep - 1, 0);
    renderRow2();
    renderDetail();
  }
});

// ── RENDER ALL ──
function renderAll() {
  renderBigRing();
  renderLegend();
  renderRow1();
  renderRow2();
  renderDetail();
}

// ── ANIMATION LOOP (particles + active micro ring fill) ──
let animFrame;
function animLoop() {
  particleT++;
  // Redraw connectors for particles
  const canvas = document.getElementById('connCanvas');
  const row = document.getElementById('row1');
  const nodes = row.querySelectorAll('.mod-node');
  if (canvas && nodes.length > 1) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const rowR = row.getBoundingClientRect();

    // Draw lines
    for (let i = 0; i < nodes.length - 1; i++) {
      const a = nodes[i].querySelector('.mod-ring-wrap');
      const b = nodes[i + 1].querySelector('.mod-ring-wrap');
      const rA = a.getBoundingClientRect();
      const rB = b.getBoundingClientRect();
      const x1 = rA.right - rowR.left;
      const y1 = rA.top + rA.height / 2 - rowR.top;
      const x2 = rB.left - rowR.left;
      const y2 = rB.top + rB.height / 2 - rowR.top;
      const grad = ctx.createLinearGradient(x1, y1, x2, y2);
      grad.addColorStop(0, MODULES[i].raw + '50');
      grad.addColorStop(1, MODULES[i + 1].raw + '50');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    drawParticles(ctx, nodes, row);
  }

  // Animate active micro ring fill (slowly increase)
  const activeArc = document.querySelector('.micro-active-arc');
  if (activeArc) {
    const currentStep = MODULES[selMod].steps.find(s => s.status === 'active');
    if (currentStep) {
      const wobble = Math.sin(particleT / 60) * 2;
      const r = 8;
      const d = ringDash(r, currentStep.pct + wobble);
      activeArc.setAttribute('stroke-dashoffset', d.offset);
    }
  }

  // Redraw micro connectors for their particles
  renderMicroConnectors();

  // Animate the big ring endpoint (subtle glow pulsation)
  const bigArc = document.querySelector('.big-ring-arc');
  if (bigArc) {
    const glowIntensity = 2 + Math.sin(particleT / 40) * 1.5;
    bigArc.style.filter = `drop-shadow(0 0 ${glowIntensity}px rgba(59,130,246,0.5))`;
  }

  animFrame = requestAnimationFrame(animLoop);
}

// ── ELAPSED TIME TICKER ──
let elapsedSec = 28 * 60 + 14;
function tickElapsed() {
  elapsedSec++;
  const mins = Math.floor(elapsedSec / 60);
  const secs = elapsedSec % 60;
  const elSpan = document.querySelector('.topbar-right span:nth-child(2)');
  if (elSpan) {
    elSpan.textContent = `Elapsed: ${mins}m ${String(secs).padStart(2, '0')}s`;
  }
}
setInterval(tickElapsed, 1000);

// ── RESIZE ──
window.addEventListener('resize', () => {
  const canvas = document.getElementById('connCanvas');
  const row = document.getElementById('row1');
  if (canvas && row) {
    canvas.width = row.offsetWidth;
    canvas.height = row.offsetHeight;
  }
  const microCanvas = document.getElementById('microConnCanvas');
  const row2 = document.getElementById('row2');
  if (microCanvas && row2) {
    microCanvas.width = row2.offsetWidth;
    microCanvas.height = row2.offsetHeight;
  }
});

// ── INIT ──
renderAll();
animLoop();
</script>
</body>
</html>
