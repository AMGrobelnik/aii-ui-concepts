<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Aurora Borealis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050515;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    color: #fff;
    cursor: default;
    user-select: none;
  }

  canvas#aurora {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
  }

  canvas#stars {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 0;
  }

  /* ---------- Top bar ---------- */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: linear-gradient(180deg, rgba(5,5,21,0.7) 0%, transparent 100%);
    pointer-events: none;
  }
  .top-bar .title {
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .top-bar .meta {
    display: flex; gap: 28px;
    font-size: 12px; font-weight: 300;
    opacity: 0.45;
    letter-spacing: 0.5px;
  }
  .top-bar .meta span { white-space: nowrap; }

  /* ---------- Band labels ---------- */
  .band-labels {
    position: fixed;
    left: 0; top: 0;
    width: 100vw; height: 100vh;
    z-index: 5;
    pointer-events: none;
  }
  .band-label {
    position: absolute;
    left: 40px;
    font-weight: 200;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0.35;
    transition: opacity 0.6s ease;
    pointer-events: auto;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 6px;
  }
  .band-label:hover { opacity: 0.8; }
  .band-label.active {
    opacity: 0.7;
    font-weight: 300;
  }
  .band-label .status {
    display: block;
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 3px;
    opacity: 0.5;
  }

  /* ---------- Progress bar ---------- */
  .progress-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    height: 3px;
    background: rgba(255,255,255,0.04);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #3eff8b, #8b5cf6, #38bdf8, #f97316);
    width: 58%;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 12px rgba(56,189,248,0.3);
    transition: width 2s ease;
  }
  .progress-label {
    position: fixed;
    bottom: 10px; right: 32px;
    z-index: 10;
    font-size: 10px; font-weight: 300;
    letter-spacing: 1px;
    opacity: 0.3;
  }

  /* ---------- Glassmorphism card ---------- */
  .card-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,21,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .card-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 36px 42px;
    max-width: 420px;
    width: 90%;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.4s ease;
  }
  .card-overlay.visible .card {
    transform: translateY(0) scale(1);
  }
  .card h2 {
    font-weight: 300;
    font-size: 20px;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .card .card-status {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.5;
  }
  .card p {
    font-size: 13px;
    font-weight: 300;
    line-height: 1.7;
    opacity: 0.7;
    margin-bottom: 12px;
  }
  .card .card-stats {
    display: flex;
    gap: 24px;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .card .stat { text-align: center; }
  .card .stat .val {
    font-size: 22px; font-weight: 200;
    letter-spacing: -0.5px;
  }
  .card .stat .lbl {
    font-size: 9px; font-weight: 300;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.4;
    margin-top: 4px;
  }
  .card .close-hint {
    text-align: center;
    margin-top: 20px;
    font-size: 10px;
    opacity: 0.25;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="aurora"></canvas>

<!-- Top bar -->
<div class="top-bar">
  <div class="title">AI Inventor</div>
  <div class="meta">
    <span>run-2026-0326-alpha</span>
    <span>01:47:32 elapsed</span>
    <span>$4.28 cost</span>
  </div>
</div>

<!-- Band labels (positioned by JS) -->
<div class="band-labels" id="bandLabels"></div>

<!-- Progress -->
<div class="progress-bar"><div class="progress-fill"></div></div>
<div class="progress-label">58% complete</div>

<!-- Card overlay -->
<div class="card-overlay" id="cardOverlay">
  <div class="card" id="cardContent"></div>
</div>

<script>
// ============================================================
//  CONFIGURATION
// ============================================================
const BANDS = [
  {
    name: 'Seed Hypothesis',
    status: 'complete',
    color: [62, 255, 139],       // green
    yCenter: 0.16,
    height: 0.10,
    layers: 4,
    intensity: 0.45,
    speed: 0.3,
    desc: 'Generates initial hypotheses from seed topics using literature graphs and knowledge embedding.',
    stats: { Hypotheses: 12, Sources: 340, 'Time': '14m' }
  },
  {
    name: 'Hypothesis Loop',
    status: 'complete',
    color: [139, 92, 246],       // purple
    yCenter: 0.36,
    height: 0.12,
    layers: 4,
    intensity: 0.55,
    speed: 0.4,
    desc: 'Iteratively refines hypotheses through review, critique, and re-generation cycles until convergence.',
    stats: { Iterations: 4, Refined: 8, 'Time': '38m' }
  },
  {
    name: 'Invention Loop',
    status: 'active',
    color: [56, 189, 248],       // blue
    yCenter: 0.58,
    height: 0.18,
    layers: 5,
    intensity: 0.85,
    speed: 0.6,
    desc: 'The core engine — generates plans, strategies, paper text, and iterates until a complete invention emerges.',
    stats: { Cycle: '3/5', Papers: 2, 'Time': '55m' }
  },
  {
    name: 'Paper & Repo',
    status: 'pending',
    color: [249, 115, 22],       // orange
    yCenter: 0.80,
    height: 0.08,
    layers: 3,
    intensity: 0.12,
    speed: 0.15,
    desc: 'Assembles final paper, generates visualizations and demo artifacts, and publishes the repository.',
    stats: { Sections: '--', Figures: '--', 'Time': '--' }
  }
];

// ============================================================
//  STARS CANVAS (static, drawn once)
// ============================================================
const starsCanvas = document.getElementById('stars');
const starsCtx = starsCanvas.getContext('2d');

function initStars() {
  const dpr = window.devicePixelRatio || 1;
  starsCanvas.width = window.innerWidth * dpr;
  starsCanvas.height = window.innerHeight * dpr;
  starsCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = window.innerWidth;
  const h = window.innerHeight;

  starsCtx.clearRect(0, 0, w, h);

  // Background gradient — subtle deep-space glow
  const bgGrad = starsCtx.createRadialGradient(w * 0.5, h * 0.35, 0, w * 0.5, h * 0.35, h * 0.9);
  bgGrad.addColorStop(0, '#0a0a2e');
  bgGrad.addColorStop(1, '#050515');
  starsCtx.fillStyle = bgGrad;
  starsCtx.fillRect(0, 0, w, h);

  // Stars
  for (let i = 0; i < 160; i++) {
    const x = Math.random() * w;
    const y = Math.random() * h;
    const r = Math.random() * 1.2 + 0.2;
    const alpha = Math.random() * 0.6 + 0.1;
    starsCtx.beginPath();
    starsCtx.arc(x, y, r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    starsCtx.fill();
  }
}

// ============================================================
//  TWINKLING STARS (a few that pulse)
// ============================================================
const twinklers = [];
function createTwinklers() {
  twinklers.length = 0;
  const w = window.innerWidth;
  const h = window.innerHeight;
  for (let i = 0; i < 30; i++) {
    twinklers.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.0 + 0.5,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.8 + 0.3
    });
  }
}

// ============================================================
//  AURORA CANVAS
// ============================================================
const auroraCanvas = document.getElementById('aurora');
const ctx = auroraCanvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  auroraCanvas.width = W * dpr;
  auroraCanvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initStars();
  createTwinklers();
  positionLabels();
}
window.addEventListener('resize', resize);

// ============================================================
//  INTERACTION STATE
// ============================================================
let hoveredBand = -1;
let mouseY = -1;

auroraCanvas.addEventListener('mousemove', (e) => {
  mouseY = e.clientY;
  hoveredBand = -1;
  for (let i = 0; i < BANDS.length; i++) {
    const b = BANDS[i];
    const top = (b.yCenter - b.height * 0.7) * H;
    const bot = (b.yCenter + b.height * 0.7) * H;
    if (mouseY >= top && mouseY <= bot) {
      hoveredBand = i;
      break;
    }
  }
});

auroraCanvas.addEventListener('mouseleave', () => {
  hoveredBand = -1;
  mouseY = -1;
});

auroraCanvas.addEventListener('click', () => {
  if (hoveredBand >= 0) showCard(hoveredBand);
});

// ============================================================
//  CARD
// ============================================================
const overlay = document.getElementById('cardOverlay');
const cardEl = document.getElementById('cardContent');

function showCard(idx) {
  const b = BANDS[idx];
  const [r, g, bl] = b.color;
  let statsHtml = '';
  for (const [k, v] of Object.entries(b.stats)) {
    statsHtml += `<div class="stat"><div class="val" style="color:rgba(${r},${g},${bl},0.9)">${v}</div><div class="lbl">${k}</div></div>`;
  }
  cardEl.innerHTML = `
    <h2 style="color:rgba(${r},${g},${bl},0.9)">${b.name}</h2>
    <div class="card-status">${b.status}</div>
    <p>${b.desc}</p>
    <div class="card-stats">${statsHtml}</div>
    <div class="close-hint">click anywhere to close</div>
  `;
  cardEl.style.borderColor = `rgba(${r},${g},${bl},0.15)`;
  overlay.classList.add('visible');
}

overlay.addEventListener('click', (e) => {
  if (e.target === overlay || e.target.closest('.close-hint')) {
    overlay.classList.remove('visible');
  }
});

// ============================================================
//  BAND LABELS
// ============================================================
function positionLabels() {
  const cont = document.getElementById('bandLabels');
  cont.innerHTML = '';
  BANDS.forEach((b, i) => {
    const el = document.createElement('div');
    el.className = 'band-label' + (b.status === 'active' ? ' active' : '');
    el.style.top = `${b.yCenter * 100}vh`;
    el.style.transform = 'translateY(-50%)';
    const [r, g, bl] = b.color;
    el.style.color = `rgba(${r},${g},${bl},0.9)`;
    el.innerHTML = `${b.name}<span class="status">${b.status}</span>`;
    el.addEventListener('click', () => showCard(i));
    cont.appendChild(el);
  });
}

// ============================================================
//  BURST PARTICLES (for active band)
// ============================================================
const bursts = [];
const MAX_BURSTS = 40;

function spawnBurst(band) {
  if (bursts.length > MAX_BURSTS) return;
  const [r, g, b] = band.color;
  bursts.push({
    x: Math.random() * W,
    y: band.yCenter * H + (Math.random() - 0.5) * band.height * H * 0.5,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -(Math.random() * 1.2 + 0.4),
    life: 1.0,
    decay: Math.random() * 0.006 + 0.004,
    r, g, b,
    size: Math.random() * 2.5 + 1.0
  });
}

function updateBursts() {
  for (let i = bursts.length - 1; i >= 0; i--) {
    const p = bursts[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) bursts.splice(i, 1);
  }
}

function drawBursts() {
  for (const p of bursts) {
    const a = p.life * 0.7;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${a})`;
    ctx.fill();

    // Glow
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4 * p.life);
    glow.addColorStop(0, `rgba(${p.r},${p.g},${p.b},${a * 0.3})`);
    glow.addColorStop(1, `rgba(${p.r},${p.g},${p.b},0)`);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 4 * p.life, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }
}

// ============================================================
//  AURORA RENDERING
// ============================================================
function drawAuroraBand(band, bandIdx, t) {
  const { color, yCenter, height, layers, speed, status } = band;
  let { intensity } = band;
  const [cr, cg, cb] = color;

  // Hover boost
  const isHovered = bandIdx === hoveredBand;
  if (isHovered) intensity = Math.min(intensity * 1.6, 1.0);

  const yBase = yCenter * H;
  const bandH = height * H;

  // For each layer, draw a flowing sine-wave ribbon
  for (let L = 0; L < layers; L++) {
    const layerOffset = (L / layers) * Math.PI * 0.8;
    const freqBase = 0.002 + L * 0.0008;
    const ampBase = bandH * (0.25 + L * 0.12);
    const layerAlpha = intensity * (0.12 + 0.06 * (layers - L) / layers);
    const phaseSpeed = speed * (0.6 + L * 0.15);

    // Compute wave path
    const step = 4;
    const pts = [];
    for (let x = -20; x <= W + 20; x += step) {
      const wave1 = Math.sin(x * freqBase + t * phaseSpeed + layerOffset) * ampBase * 0.6;
      const wave2 = Math.sin(x * freqBase * 1.7 + t * phaseSpeed * 0.7 + layerOffset * 1.3) * ampBase * 0.3;
      const wave3 = Math.sin(x * freqBase * 0.5 + t * phaseSpeed * 1.2 + L * 0.5) * ampBase * 0.15;

      // Brightness modulation along x — creates curtain effect
      const curtain = (Math.sin(x * 0.003 + t * 0.2 + L) * 0.5 + 0.5) *
                      (Math.sin(x * 0.0017 + t * 0.13) * 0.3 + 0.7);

      pts.push({ x, y: yBase + wave1 + wave2 + wave3, curtain });
    }

    // Draw filled band with vertical gradient
    const ribbonH = bandH * (0.5 + L * 0.15);

    ctx.save();
    ctx.globalCompositeOperation = 'screen';

    // Top ribbon
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y - ribbonH * 0.5);
    for (const p of pts) {
      ctx.lineTo(p.x, p.y - ribbonH * 0.05);
    }
    for (let i = pts.length - 1; i >= 0; i--) {
      ctx.lineTo(pts[i].x, pts[i].y - ribbonH * 0.5);
    }
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, yBase - ribbonH * 0.5, 0, yBase + ribbonH * 0.5);
    grad.addColorStop(0, `rgba(${cr},${cg},${cb},0)`);
    grad.addColorStop(0.3, `rgba(${cr},${cg},${cb},${layerAlpha * 0.7})`);
    grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${layerAlpha})`);
    grad.addColorStop(0.7, `rgba(${cr},${cg},${cb},${layerAlpha * 0.7})`);
    grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = grad;
    ctx.fill();

    // Curtain brightness streaks — vertical columns of light
    for (const p of pts) {
      if (p.curtain > 0.65) {
        const streakAlpha = (p.curtain - 0.65) * layerAlpha * 2.5 * intensity;
        const streakGrad = ctx.createLinearGradient(0, p.y - ribbonH * 0.6, 0, p.y + ribbonH * 0.3);
        streakGrad.addColorStop(0, `rgba(${cr},${cg},${cb},0)`);
        streakGrad.addColorStop(0.3, `rgba(${cr},${cg},${cb},${streakAlpha * 0.5})`);
        streakGrad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${streakAlpha})`);
        streakGrad.addColorStop(0.8, `rgba(${cr},${cg},${cb},${streakAlpha * 0.3})`);
        streakGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
        ctx.fillStyle = streakGrad;
        ctx.fillRect(p.x - 2, p.y - ribbonH * 0.6, 4, ribbonH * 0.9);
      }
    }

    // Bottom ribbon (mirror, more diffuse)
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y + ribbonH * 0.05);
    for (const p of pts) {
      ctx.lineTo(p.x, p.y + ribbonH * 0.05);
    }
    for (let i = pts.length - 1; i >= 0; i--) {
      ctx.lineTo(pts[i].x, pts[i].y + ribbonH * 0.5);
    }
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.restore();
  }

  // Active band — additional glow core
  if (status === 'active') {
    const pulseIntensity = (Math.sin(t * 0.8) * 0.3 + 0.7) * intensity;
    const glowGrad = ctx.createRadialGradient(
      W * 0.5, yBase, 0,
      W * 0.5, yBase, bandH * 2
    );
    glowGrad.addColorStop(0, `rgba(${cr},${cg},${cb},${pulseIntensity * 0.06})`);
    glowGrad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${pulseIntensity * 0.025})`);
    glowGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, yBase - bandH * 2, W, bandH * 4);
    ctx.restore();

    // Rolling brightness wave (travels left to right)
    const waveX = ((t * 60) % (W + 400)) - 200;
    const waveGrad = ctx.createRadialGradient(waveX, yBase, 0, waveX, yBase, 180);
    waveGrad.addColorStop(0, `rgba(${cr},${cg},${cb},${0.12 * intensity})`);
    waveGrad.addColorStop(0.5, `rgba(${cr},${cg},${cb},${0.04 * intensity})`);
    waveGrad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = waveGrad;
    ctx.fillRect(waveX - 180, yBase - bandH * 1.5, 360, bandH * 3);
    ctx.restore();

    // Second wave, slower, opposite direction
    const waveX2 = W - ((t * 35) % (W + 400)) + 200;
    const waveGrad2 = ctx.createRadialGradient(waveX2, yBase, 0, waveX2, yBase, 140);
    waveGrad2.addColorStop(0, `rgba(${cr},${cg},${cb},${0.08 * intensity})`);
    waveGrad2.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = waveGrad2;
    ctx.fillRect(waveX2 - 140, yBase - bandH, 280, bandH * 2);
    ctx.restore();
  }
}

// ============================================================
//  TWINKLING STAR RENDERING
// ============================================================
function drawTwinklers(t) {
  for (const s of twinklers) {
    const brightness = (Math.sin(t * s.speed + s.phase) * 0.5 + 0.5);
    const alpha = 0.1 + brightness * 0.6;
    const r = s.r * (0.7 + brightness * 0.3);
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();

    // Small glow for bright ones
    if (brightness > 0.6) {
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 4);
      glow.addColorStop(0, `rgba(255,255,255,${(brightness - 0.6) * 0.3})`);
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(s.x, s.y, r * 4, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();
    }
  }
}

// ============================================================
//  HORIZON GLOW
// ============================================================
function drawHorizonGlow(t) {
  // Subtle glow at the bottom edge, as if city lights or distant dawn
  const grad = ctx.createLinearGradient(0, H, 0, H * 0.7);
  const pulse = Math.sin(t * 0.15) * 0.005 + 0.015;
  grad.addColorStop(0, `rgba(20,15,40,${pulse + 0.02})`);
  grad.addColorStop(0.3, `rgba(10,8,30,${pulse})`);
  grad.addColorStop(1, 'rgba(5,5,21,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);
}

// ============================================================
//  TOP ATMOSPHERIC HAZE
// ============================================================
function drawAtmosphericHaze(t) {
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.12);
  const subtle = Math.sin(t * 0.1) * 0.003 + 0.008;
  grad.addColorStop(0, `rgba(30,60,40,${subtle})`);
  grad.addColorStop(1, 'rgba(5,5,21,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.12);
}

// ============================================================
//  MAIN ANIMATION LOOP
// ============================================================
let lastTime = 0;
let burstTimer = 0;
let elapsed = 0;

function animate(now) {
  requestAnimationFrame(animate);

  const dt = lastTime ? (now - lastTime) / 1000 : 0.016;
  lastTime = now;
  elapsed += dt;

  const t = elapsed;

  // Clear with full transparency (stars canvas is beneath)
  ctx.clearRect(0, 0, W, H);

  // Atmospheric effects
  drawHorizonGlow(t);
  drawAtmosphericHaze(t);

  // Twinkling stars
  drawTwinklers(t);

  // Draw aurora bands
  for (let i = 0; i < BANDS.length; i++) {
    drawAuroraBand(BANDS[i], i, t);
  }

  // Spawn bursts for active band
  burstTimer += dt;
  if (burstTimer > 0.06) {
    burstTimer = 0;
    const activeBand = BANDS.find(b => b.status === 'active');
    if (activeBand && Math.random() < 0.4) {
      spawnBurst(activeBand);
    }
  }

  // Hovered band also gets some bursts
  if (hoveredBand >= 0 && BANDS[hoveredBand].status !== 'active') {
    if (Math.random() < 0.15) spawnBurst(BANDS[hoveredBand]);
  }

  updateBursts();
  drawBursts();

  // Edge vignette
  const vignette = ctx.createRadialGradient(W * 0.5, H * 0.5, H * 0.3, W * 0.5, H * 0.5, H * 0.9);
  vignette.addColorStop(0, 'rgba(5,5,21,0)');
  vignette.addColorStop(1, 'rgba(5,5,21,0.35)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // Animate elapsed time display
  updateClock(dt);
}

// ============================================================
//  CLOCK UPDATE
// ============================================================
let clockSeconds = 1 * 3600 + 47 * 60 + 32; // start at 01:47:32
function updateClock(dt) {
  clockSeconds += dt;
  const h = Math.floor(clockSeconds / 3600);
  const m = Math.floor((clockSeconds % 3600) / 60);
  const s = Math.floor(clockSeconds % 60);
  const pad = n => String(n).padStart(2, '0');
  const spans = document.querySelectorAll('.top-bar .meta span');
  if (spans[1]) spans[1].textContent = `${pad(h)}:${pad(m)}:${pad(s)} elapsed`;

  // Slowly tick cost
  const costEl = spans[2];
  if (costEl) {
    const baseCost = 4.28;
    const addedCost = (clockSeconds - (1 * 3600 + 47 * 60 + 32)) * 0.00018;
    costEl.textContent = `$${(baseCost + addedCost).toFixed(2)} cost`;
  }
}

// ============================================================
//  INIT
// ============================================================
resize();
requestAnimationFrame(animate);
</script>
</body>
