<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Compact Dashboard (mix_18)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0e1117;
    --surface:    #151921;
    --surface-h:  #1b2028;
    --card:       #181d27;
    --card-h:     #1f2533;
    --border:     #232a36;
    --border-lit: #2e3847;
    --text:       #dfe3ea;
    --text-dim:   #7e8a9e;
    --text-muted: #495366;
    --green:      #34d399;
    --green-dim:  rgba(52,211,153,0.10);
    --purple:     #a78bfa;
    --purple-dim: rgba(167,139,250,0.10);
    --blue:       #60a5fa;
    --blue-dim:   rgba(96,165,250,0.10);
    --amber:      #fbbf24;
    --amber-dim:  rgba(251,191,36,0.10);
    --sidebar-w:  154px;
    --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 12px;
  }

  /* ── Sidebar ─────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 10px;
    gap: 12px;
    z-index: 10;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ring-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
  .ring-wrap canvas { width: 90px; height: 90px; }
  .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; pointer-events: none; }
  .ring-sub { text-align: center; font-size: 8px; color: var(--text-muted); margin-top: -2px; letter-spacing: 1px; text-transform: uppercase; }

  .legend { display: flex; flex-direction: column; gap: 1px; width: 100%; }
  .legend-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 5px; cursor: pointer; transition: all 0.2s ease; font-size: 10.5px; color: var(--text-dim); user-select: none; }
  .legend-item:hover { background: var(--surface-h); color: var(--text); }
  .legend-item.active { background: var(--card); color: var(--text); font-weight: 600; }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: box-shadow 0.2s ease; }
  .legend-item.active .legend-dot { box-shadow: 0 0 5px 1px currentColor; }
  .legend-label { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend-pct { font-size: 9px; opacity: 0.55; font-weight: 400; font-variant-numeric: tabular-nums; }

  .sidebar-stats { width: 100%; display: flex; flex-direction: column; gap: 5px; padding-top: 8px; border-top: 1px solid var(--border); }
  .sidebar-stat { display: flex; justify-content: space-between; align-items: center; font-size: 9.5px; }
  .sidebar-stat-label { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .sidebar-stat-val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  .row1-wrap { position: relative; padding: 12px 20px 4px; flex-shrink: 0; }
  .row1 { display: flex; gap: 10px; position: relative; z-index: 2; }
  #particleCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }

  .mod-card { width: 160px; height: 60px; background: rgba(24,29,39,0.88); border: 1px solid var(--border); border-left: 2px solid var(--border); border-radius: 6px; padding: 6px 10px; cursor: pointer; position: relative; transition: all 0.22s ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
  .mod-card:hover { background: var(--card-h); transform: scale(1.015); }
  .mod-card.selected { transform: scale(1.015); }
  .mod-card .mc-name { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }
  .mod-card .mc-row { display: flex; align-items: baseline; justify-content: space-between; margin-top: 3px; }
  .mod-card .mc-metric { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .mod-card .mc-pct { font-size: 9px; color: var(--text-muted); font-weight: 500; font-variant-numeric: tabular-nums; }
  .mod-card .mc-bar { position: absolute; bottom: 0; left: 0; height: 2px; border-radius: 0 0 0 6px; transition: width 0.4s ease; }
  .mod-card .mc-glow { position: absolute; inset: -1px; border-radius: 6px; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
  .mod-card.active .mc-glow, .mod-card.selected .mc-glow { opacity: 1; }
  .mod-card.active::after { content: ''; position: absolute; top: 0; left: -60%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); animation: shimmer 3s ease-in-out infinite; }
  @keyframes shimmer { 0% { left: -60%; } 100% { left: 120%; } }

  #treeCanvas { height: 18px; position: relative; z-index: 2; margin: 0 20px; flex-shrink: 0; }
  .row2-wrap { padding: 0 20px 6px; overflow: hidden; flex-shrink: 0; }
  .row2 { display: flex; gap: 4px; transition: transform 0.3s ease; padding: 2px 0; flex-wrap: wrap; }

  .sub-chip { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s ease; background: transparent; border: 1px solid transparent; height: 30px; flex-shrink: 0; }
  .sub-chip:hover { background: var(--surface-h); }
  .sub-chip.sel { background: var(--card); border-color: var(--border-lit); }
  .sub-chip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: all 0.2s ease; position: relative; }
  .sub-chip-dot.glow { animation: dotPulse 2s ease-in-out infinite; }
  @keyframes dotPulse { 0%, 100% { box-shadow: 0 0 4px 1px currentColor; } 50% { box-shadow: 0 0 9px 2px currentColor; } }
  .sub-chip-label { font-size: 9px; color: var(--text-muted); white-space: nowrap; transition: color 0.2s ease; }
  .sub-chip:hover .sub-chip-label { color: var(--text-dim); }
  .sub-chip.sel .sub-chip-label { color: var(--text); font-weight: 500; }
  .sub-chip-status { font-size: 7px; padding: 1px 4px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0; }

  .content-scroll { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
  .content-scroll::-webkit-scrollbar { width: 4px; }
  .content-scroll::-webkit-scrollbar-track { background: transparent; }
  .content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .content { max-width: 780px; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
  .content-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .tag-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
  .content-header h2 { font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .step-status-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .step-counter { font-size: 10px; color: var(--text-muted); margin-left: auto; }

  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; transition: border-color 0.2s ease; }
  .summary-card:hover { border-color: var(--border-lit); }
  .summary-card .sc-icon { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
  .summary-card .sc-icon svg { width: 13px; height: 13px; }
  .summary-card .sc-text { font-size: 11px; line-height: 1.55; color: var(--text-dim); }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; display: flex; flex-direction: column; gap: 3px; transition: border-color 0.2s ease, transform 0.15s ease; }
  .stat-card:hover { border-color: var(--border-lit); transform: translateY(-1px); }
  .stat-card-top { display: flex; align-items: center; gap: 5px; }
  .stat-card-icon { width: 20px; height: 20px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stat-card-icon svg { width: 11px; height: 11px; }
  .stat-card-label { font-size: 8.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.3px; }
  .stat-card-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-top: 1px; }
  .stat-card-bar-fill { height: 100%; border-radius: 1px; transition: width 0.6s ease; position: relative; }
  .stat-card-bar-fill::after { content: ''; position: absolute; right: 0; top: -1px; width: 4px; height: 4px; border-radius: 50%; background: inherit; }

  .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .item-card { background: var(--card); border: 1px solid var(--border); border-left: 2px solid var(--text-muted); border-radius: 7px; padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; }
  .item-card:hover { border-color: var(--border-lit); transform: translateY(-1px); }
  .item-card.active-item { animation: itemGlow 2.5s ease-in-out infinite; }
  @keyframes itemGlow { 0%, 100% { box-shadow: -1px 0 8px -3px var(--blue); } 50% { box-shadow: -1px 0 14px -1px var(--blue); } }
  .item-card-header { display: flex; align-items: center; gap: 6px; }
  .item-card-status { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; flex-shrink: 0; }
  .item-card-name { font-size: 11px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-card-body { display: flex; justify-content: space-between; align-items: flex-end; }
  .item-card-metric { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .item-card-time { font-size: 9px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .item-card-mini-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .item-card-mini-bar-fill { height: 100%; border-radius: 1px; transition: width 0.4s ease; }
  .item-card-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .item-card-detail-inner { font-size: 10.5px; color: var(--text-dim); line-height: 1.55; padding-top: 6px; border-top: 1px solid var(--border); }

  .content-footer { display: flex; gap: 16px; margin-top: 4px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text-muted); }
  .content-footer span { display: flex; align-items: center; gap: 4px; }
  .content-footer .ft-val { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .timer-live { animation: timerPulse 1.5s ease-in-out infinite; color: var(--blue); }
  .collapse-btn { display: flex; align-items: center; gap: 5px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text-dim); font-size: 9px; cursor: pointer; transition: all 0.2s ease; user-select: none; margin-bottom: 8px; }
  .collapse-btn:hover { background: var(--surface-h); color: var(--text); border-color: var(--border-lit); }
  .collapse-btn .arrow { transition: transform 0.2s ease; font-size: 8px; }
  .collapse-btn.collapsed .arrow { transform: rotate(-90deg); }
  .collapsible { overflow: hidden; transition: max-height 0.35s var(--ease-out), opacity 0.25s ease; max-height: 600px; opacity: 1; }
  .collapsible.hidden { max-height: 0; opacity: 0; }
  .kbd-hint { position: fixed; bottom: 8px; right: 14px; font-size: 9px; color: var(--text-muted); display: flex; gap: 8px; z-index: 100; }
  .kbd { padding: 1px 5px; border: 1px solid var(--border); border-radius: 2px; background: var(--surface); font-family: monospace; font-size: 9px; }

  @media (max-width: 900px) { .sidebar { --sidebar-w: 120px; padding: 10px 6px; gap: 8px; } .ring-wrap, .ring-wrap canvas { width: 70px; height: 70px; } .ring-pct { font-size: 14px; } .mod-card { width: 130px; height: 52px; } .stat-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<div class="sidebar">
  <div class="ring-wrap">
    <canvas id="ringCanvas" width="180" height="180"></canvas>
    <div class="ring-pct" id="ringPct">65%</div>
  </div>
  <div class="ring-sub">pipeline progress</div>
  <div class="legend" id="legend"></div>
  <div class="sidebar-stats" id="sidebarStats"></div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="row1-wrap">
    <canvas id="particleCanvas"></canvas>
    <div class="row1" id="row1"></div>
  </div>
  <canvas id="treeCanvas"></canvas>
  <div class="row2-wrap">
    <div class="row2" id="row2"></div>
  </div>
  <div class="content-scroll">
    <div class="content" id="content"></div>
  </div>
</div>

<div class="kbd-hint">
  <span><span class="kbd">&uarr;&darr;</span> modules</span>
  <span><span class="kbd">&larr;&rarr;</span> steps</span>
  <span><span class="kbd">c</span> collapse</span>
</div>

<script>
// ===================================================================
// Data Model
// ===================================================================
const COLORS = {
  seed: '#34d399',
  hypothesis: '#a78bfa',
  invention: '#60a5fa',
  paper: '#fbbf24'
};

const MODULES = [
  {
    id: 'seed',
    label: 'Seed',
    color: COLORS.seed,
    metric: '12 gaps',
    progress: 1.0,
    steps: [
      {
        name: 'Fetch Papers',
        status: 'done',
        metric: '847 papers',
        time: '4m 12s',
        cost: '$0.00',
        messages: 34,
        tokens: '142k',
        detail: 'Fetched 847 papers from Semantic Scholar API across 3 research domains: geometric deep learning, attention mechanisms, and cross-modal transfer. Applied filters for citation count (>10), recency (<3 years), and venue quality. Reduced to 312 relevant candidates.',
        metrics: { papers: '847', filtered: '312', domains: '3' }
      },
      {
        name: 'Extract Claims',
        status: 'done',
        metric: '2,841 claims',
        time: '6m 38s',
        cost: '$1.24',
        messages: 67,
        tokens: '284k',
        detail: 'Extracted key claims using structured output parsing with claim type classification (empirical, theoretical, methodological). Average 9.1 claims per paper with confidence scoring.',
        metrics: { claims: '2,841', avgPer: '9.1', confidence: '0.87' }
      },
      {
        name: 'Build KG',
        status: 'done',
        metric: '1,204 nodes',
        time: '3m 05s',

        tokens: '98k',

    totalMessages: 151,

  {

      {

        metrics: { mean: '6.2', eliminated: '8', remaining: '16' }
      },
      {
        name: 'Refine',
        status: 'done',
        metric: '16 revised',

        cost: '$1.89',

        tokens: '230k',

      {

      {

      {

        time: '1m 48s',

      {

        metrics: { strategies: '3', selected: 'Hybrid', ratio: '0.82' }
      },
      {
        name: 'Plan',
        status: 'done',
        metric: '14 tasks',
        time: '3m 18s',
        cost: '$1.45',

        ]
      },
      {
        name: 'Paper Text',
        status: 'pending',

        time: '--',
        cost: '--',

        metrics: null
      },
      {
        name: 'Review',
        status: 'pending',
        metric: '--',
        time: '--',
        cost: '--',
        messages: 0,

        metrics: null

// ===================================================================
// Color Utilities
// ===================================================================
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.substring(0,2),16), parseInt(h.substring(2,4),16), parseInt(h.substring(4,6),16)];
}

function lerpColor(a, b, t) {
  const ra = hexToRgb(a), rb = hexToRgb(b);
  return `rgb(${Math.round(ra[0]+(rb[0]-ra[0])*t)},${Math.round(ra[1]+(rb[1]-ra[1])*t)},${Math.round(ra[2]+(rb[2]-ra[2])*t)})`;
}

// ===================================================================
// Progress Ring (Canvas)
// ===================================================================
function drawRing() {
  const c = document.getElementById('ringCanvas');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = 180 * dpr;
  c.height = 180 * dpr;
  ctx.scale(dpr, dpr);

  const cx = 90, cy = 90, r = 36, lw = 5;

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#232a36';
  ctx.lineWidth = lw;
  ctx.stroke();

  const total = MODULES.reduce((s, m) => s + m.steps.length, 0);
  const gap = 0.05;
  let angle = -Math.PI / 2;

  MODULES.forEach((mod, mi) => {
    const sweep = (mod.steps.length / total) * (Math.PI * 2 - gap * MODULES.length);
    const startA = angle + gap / 2;
    const endA = startA + sweep * mod.progress;
    const fullEnd = startA + sweep;

    ctx.beginPath();
    ctx.arc(cx, cy, r, startA, fullEnd);
    ctx.strokeStyle = mod.color + '22';
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.stroke();

    if (mod.progress > 0) {
      const grad = ctx.createLinearGradient(
        cx + r * Math.cos(startA), cy + r * Math.sin(startA),
        cx + r * Math.cos(endA), cy + r * Math.sin(endA)
      );
      grad.addColorStop(0, mod.color + 'aa');
      grad.addColorStop(1, mod.color);
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, endA);
      ctx.strokeStyle = grad;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.stroke();

      if (mod.progress < 1 && mod.progress > 0) {
        const ex = cx + r * Math.cos(endA);
        const ey = cy + r * Math.sin(endA);
        const glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 8);
        glow.addColorStop(0, mod.color + 'dd');
        glow.addColorStop(0.5, mod.color + '44');
        glow.addColorStop(1, mod.color + '00');
        ctx.beginPath();
        ctx.arc(ex, ey, 8, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = mod.color;
        ctx.fill();
      }
    }

    if (mi === selMod) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, startA + sweep);
      ctx.strokeStyle = mod.color + '28';
      ctx.lineWidth = lw + 4;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    angle += sweep + gap;
  });
}

// ===================================================================
// Particle System (Canvas)
// ===================================================================
function initParticles() {
  particles = [];
  const cards = document.querySelectorAll('.mod-card');
  if (cards.length < 2) return;

  const wrap = document.querySelector('.row1-wrap').getBoundingClientRect();

  for (let i = 0; i < cards.length - 1; i++) {
    const ra = cards[i].getBoundingClientRect();
    const rb = cards[i + 1].getBoundingClientRect();
    const ax = ra.right - wrap.left;
    const ay = ra.top + ra.height / 2 - wrap.top;
    const bx = rb.left - wrap.left;
    const by = rb.top + rb.height / 2 - wrap.top;
    const modA = MODULES[i], modB = MODULES[i + 1];
    const bothDone = modA.progress >= 1 && modB.progress >= 1;
    const anyActive = modA.steps.some(s => s.status === 'active') || modB.steps.some(s => s.status === 'active');
    const count = bothDone ? 2 : anyActive ? 4 : 0;
    const speed = bothDone ? 0.002 : 0.005;
    const isPending = !bothDone && !anyActive;

    for (let p = 0; p < count; p++) {
      particles.push({
        ax, ay, bx, by,
        t: p / count,
        speed: speed + (Math.random() * 0.001 - 0.0005),
        colorA: modA.color,
        colorB: modB.color,
        idx: i,
        size: 1.5 + Math.random() * 1
      });
    }

    if (isPending) {
      particles.push({ ax, ay, bx, by, dashed: true, colorA: modA.color, colorB: modB.color, idx: i });
    }
  }
}

function animateParticles() {
  const canvas = document.getElementById('particleCanvas');
  const wrap = document.querySelector('.row1-wrap');
  if (!wrap) return;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.offsetWidth * dpr;
  canvas.height = wrap.offsetHeight * dpr;
  canvas.style.width = wrap.offsetWidth + 'px';
  canvas.style.height = wrap.offsetHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, wrap.offsetWidth, wrap.offsetHeight);

  const drawn = new Set();
  particles.forEach(p => {
    if (drawn.has(p.idx)) return;
    drawn.add(p.idx);
    const mx = (p.ax + p.bx) / 2;
    const my = Math.min(p.ay, p.by) - 8;
    ctx.beginPath();
    ctx.moveTo(p.ax, p.ay);
    ctx.quadraticCurveTo(mx, my, p.bx, p.by);
    if (p.dashed) {
      ctx.setLineDash([3, 6]);
      ctx.strokeStyle = '#232a36';
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle = '#232a3670';
    }
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  particles.forEach(p => {
    if (p.dashed) return;
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;

    const t = p.t;
    const mx = (p.ax + p.bx) / 2;
    const my = Math.min(p.ay, p.by) - 8;
    const x = (1-t)*(1-t)*p.ax + 2*(1-t)*t*mx + t*t*p.bx;
    const y = (1-t)*(1-t)*p.ay + 2*(1-t)*t*my + t*t*p.by;
    const c = lerpColor(p.colorA, p.colorB, t);

    const glow = ctx.createRadialGradient(x, y, 0, x, y, 8);
    glow.addColorStop(0, c.replace('rgb','rgba').replace(')',',0.35)'));
    glow.addColorStop(1, c.replace('rgb','rgba').replace(')',',0)'));
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = c;
    ctx.fill();
  });

  animFrameId = requestAnimationFrame(animateParticles);
}

// ===================================================================
// Tree Line Canvas (thin colored connector)

function drawTreeLine() {
  const canvas = document.getElementById('treeCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.offsetWidth - 40;
  canvas.width = w * dpr;
  canvas.height = 18 * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = '18px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, 18);

  const cards = document.querySelectorAll('.mod-card');
  const chips = document.querySelectorAll('.sub-chip');
  if (!cards[selMod] || !chips[selStep]) return;

  const wrapRect = canvas.getBoundingClientRect();
  const cardRect = cards[selMod].getBoundingClientRect();
  const chipRect = chips[selStep].getBoundingClientRect();

  const x1 = cardRect.left + cardRect.width / 2 - wrapRect.left;
  const x2 = chipRect.left + chipRect.width / 2 - wrapRect.left;
  const mod = MODULES[selMod];

  // Thin colored line with 1px width
  const grad = ctx.createLinearGradient(x1, 0, x2, 18);
  grad.addColorStop(0, mod.color + 'bb');
  grad.addColorStop(0.5, mod.color + '44');
  grad.addColorStop(1, mod.color + 'bb');

  ctx.beginPath();
  ctx.moveTo(x1, 0);
  ctx.quadraticCurveTo((x1 + x2) / 2, 9, x2, 18);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Subtle glow
  ctx.save();
  ctx.shadowColor = mod.color;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(x1, 0);
  ctx.quadraticCurveTo((x1 + x2) / 2, 9, x2, 18);
  ctx.strokeStyle = mod.color + '18';
  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.restore();
}

        }

        html += `<div class="item-card-detail">
            <div class="item-card-detail-inner">${item.detail}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    } else if (step.metrics) {
      const entries = Object.entries(step.metrics);
      html += `<div class="item-grid">`;
      entries.forEach(([key, val]) => {
        html += `<div class="item-card" style="border-left-color:${mod.color}">
          <div class="item-card-header">
            <div class="item-card-status" style="background:${mod.color}15;color:${mod.color}">&#9670;</div>
            <div class="item-card-name" style="text-transform:capitalize">${key}</div>
          </div>
          <div class="item-card-body">
            <div class="item-card-metric" style="color:${mod.color}">${val}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  } else {
    html += `<div class="summary-card" style="border-left:2px solid ${mod.color}">
      <div class="sc-text" style="font-size:11px">${step.detail}</div>
    </div>`;
  }

  // Footer
  const isLive = mod.steps.some(s => s.status === 'active');
  const timeClass = isLive ? 'ft-val timer-live' : 'ft-val';
  html += `<div class="content-footer">
    <span>${ICONS.clock.replace('viewBox','width="10" height="10" viewBox')}<span class="${timeClass}">${mod.totalTime}</span></span>
    <span>${ICONS.dollar.replace('viewBox','width="10" height="10" viewBox')}<span class="ft-val">${mod.totalCost}</span></span>
    <span>${ICONS.check.replace('viewBox','width="10" height="10" viewBox')}<span class="ft-val">${Math.round(mod.progress * 100)}%</span></span>
  </div>`;

  el.innerHTML = html;

  // Re-apply collapsed states to toggles
  if (collapsed.stats) {
    const btn = document.getElementById('statsToggle');
    if (btn) btn.classList.add('collapsed');
  }
  if (collapsed.items) {
    const btn = document.getElementById('itemsToggle');
    if (btn) btn.classList.add('collapsed');
  }
}

function toggleSection(name) {
  collapsed[name] = !collapsed[name];
  const section = document.getElementById(name + 'Section');
  const btn = document.getElementById(name + 'Toggle');
  if (section) section.classList.toggle('hidden', collapsed[name]);
  if (btn) btn.classList.toggle('collapsed', collapsed[name]);
}

function toggleItemDetail(card) {
  const body = card.querySelector('.item-card-detail');
  if (!body) return;
  const inner = body.querySelector('.item-card-detail-inner');
  if (!inner) return;
  if (body.style.maxHeight && body.style.maxHeight !== '0px') {
    body.style.maxHeight = '0px';
  } else {
    body.style.maxHeight = inner.scrollHeight + 12 + 'px';
  }
}

// ===================================================================
// Master Render
// ===================================================================
function render() {
  const mod = MODULES[selMod];
  if (selStep >= mod.steps.length) selStep = mod.steps.length - 1;
  if (selStep < 0) selStep = 0;

  drawRing();
  buildLegend();
  buildSidebarStats();
  buildRow1();
  buildRow2();
  buildContent();

  requestAnimationFrame(() => {
    initParticles();
    drawTreeLine();
  });
}

// ===================================================================
// Keyboard Navigation
// ===================================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    selMod = (selMod - 1 + MODULES.length) % MODULES.length;
    selStep = 0;
    render();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selMod = (selMod + 1) % MODULES.length;
    selStep = 0;
    render();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selStep = Math.max(0, selStep - 1);
    render();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    selStep = Math.min(MODULES[selMod].steps.length - 1, selStep + 1);
    render();
  } else if (e.key === 'c' || e.key === 'C') {
    // Toggle all collapse sections
    const allCollapsed = collapsed.stats && collapsed.items;
    collapsed.stats = !allCollapsed;
    collapsed.items = !allCollapsed;
    buildContent();
  }
});

// ===================================================================
// Resize
// ===================================================================
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(), 50);
});

// ===================================================================
// Init
// ===================================================================
render();
animateParticles();
</script>
</body>
</html>
