<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline — Ultra 15</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES  (ultra-dark palette)
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #12141a;
  --surface: #1a1d24;
  --surface-hi: #242830;
  --border: rgba(36, 40, 48, 0.85);
  --border-lite: rgba(50, 56, 68, 0.6);
  --glass: rgba(26, 29, 36, 0.6);
  --glass-border: rgba(80, 96, 130, 0.11);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.015) 40%, transparent 60%);
  --glass-blur: 18px;

  --text-100: #e2e6ee;
  --text-200: #a8b0c2;
  --text-300: #7e889e;
  --text-400: #535c70;
  --text-500: #363d4d;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.10);
  --purple-glow: rgba(167,139,250,0.22);
  --purple-deep: rgba(167,139,250,0.50);

  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.10);
  --blue-glow: rgba(59,130,246,0.22);
  --blue-deep: rgba(59,130,246,0.50);

  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.10);
  --orange-glow: rgba(245,158,11,0.22);
  --orange-deep: rgba(245,158,11,0.50);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.10);
  --red: #ef4444;

  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --header-h: 44px;
  --sidebar-collapsed: 48px;
  --sidebar-expanded: 240px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(80,96,130,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(80,96,130,0.018) 1px, transparent 1px);
  background-size: 52px 52px;
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   FIXED HEADER (44px glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(18, 20, 26, 0.86);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 20px;
  z-index: 1000; gap: 14px;
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(167,139,250,0.10) 30%, rgba(59,130,246,0.10) 70%, transparent);
}
.header-brand {
  font-weight: 800; font-size: 13px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.breadcrumb span { color: var(--text-400); }
.breadcrumb .sep { color: rgba(80,96,130,0.30); font-size: 10px; }
.breadcrumb .active { color: var(--text-200); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.header-stat {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 5px;
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 2px 8px;
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.14);
  border-radius: 4px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.25); }
  50% { opacity: 1; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
}

/* ================================================================
   COLLAPSED SIDEBAR (48px -> 240px on hover)
   ================================================================ */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-collapsed);
  background: rgba(18, 20, 26, 0.92);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-right: 1px solid var(--glass-border);
  z-index: 900; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden; display: flex; flex-direction: column;
  padding: 12px 0 16px; gap: 2px;
}
.sidebar:hover { width: var(--sidebar-expanded); }

/* Overall progress ring in sidebar */
.sidebar-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0 12px; flex-shrink: 0;
}
.sidebar-ring { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
.sidebar-ring svg { width: 100%; height: 100%; }
.sidebar-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.sidebar-ring .ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease;
  filter: drop-shadow(0 0 4px var(--blue-deep));
}
.sidebar-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 8px; font-weight: 700; color: var(--text-100);
}
.sidebar-ring-text {
  font-size: 11px; color: var(--text-400); font-weight: 500;
  white-space: nowrap; margin-left: 10px;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-ring-text { opacity: 1; }

.sidebar-divider {
  width: 28px; height: 1px; background: var(--border);
  margin: 4px auto 8px; flex-shrink: 0;
  transition: width 0.3s ease;
}
.sidebar:hover .sidebar-divider { width: calc(100% - 24px); }

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; cursor: pointer; transition: var(--transition);
  white-space: nowrap; position: relative; flex-shrink: 0;
}
.sidebar-item:hover { background: rgba(80,96,130,0.05); }
.sidebar-item.active { background: rgba(59,130,246,0.06); }
.sidebar-item .indicator {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; border-radius: 0 3px 3px 0;
  transition: height 0.25s ease;
}
.sidebar-item.active .indicator { height: 18px; }
.sidebar-item[data-color="purple"] .indicator { background: var(--purple); }
.sidebar-item[data-color="blue"] .indicator { background: var(--blue); }
.sidebar-item[data-color="orange"] .indicator { background: var(--orange); }
.sidebar-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  position: relative;
}
.sidebar-dot.done { background: var(--green); opacity: 0.7; }
.sidebar-dot.running { background: var(--blue); animation: sbDotPulse 2s ease-in-out infinite; }
.sidebar-dot.pending { background: transparent; border: 1.5px solid var(--text-500); }
@keyframes sbDotPulse {
  0%, 100% { box-shadow: 0 0 4px var(--blue-glow); }
  50% { box-shadow: 0 0 10px var(--blue-glow), 0 0 18px rgba(59,130,246,0.12); }
}
.sidebar-label {
  font-size: 12px; color: var(--text-300); font-weight: 500;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.main {
  margin-left: var(--sidebar-collapsed); margin-top: var(--header-h);
  padding: 24px 28px 60px;
  position: relative; z-index: 1;
  max-width: 1400px;
}

/* ================================================================
   SECTION BACKGROUND TINTS
   ================================================================ */
.section-tint {
  position: absolute; left: 0; right: 0; pointer-events: none;
  border-radius: 20px; filter: blur(70px); z-index: -1;
}
.section-tint.purple-tint {
  background: rgba(167,139,250,0.02); top: 0; height: 300px;
}
.section-tint.blue-tint {
  background: rgba(59,130,246,0.035); top: 180px; height: 500px;
}

/* ================================================================
   3 HORIZONTAL MODULE CARDS (glassmorphism)
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 6px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px 12px; transition: all 0.35s ease; overflow: hidden;
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
/* glow halo behind active */
.mod-card .glow-halo {
  position: absolute; inset: -24px; border-radius: 28px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(36px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.10; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.06; } 50% { opacity: 0.14; } }

/* inner glow */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 36px 8px var(--purple-dim), inset 0 0 18px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 36px 8px var(--blue-dim), inset 0 0 18px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 36px 8px var(--orange-dim), inset 0 0 18px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

/* shimmer sweep on active */
.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.035), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(80,96,130,0.18); transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.04; }
.mod-card.active { border-color: rgba(255,255,255,0.07); }

/* card internals */
.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; position: relative; z-index: 3; }
.mc-icon { font-size: 14px; flex-shrink: 0; }
.mc-name { font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(60,68,86,0.12); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(59,130,246,0.16); } }

.mc-metrics { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* mini ring gauge 28px */
.mc-ring { width: 28px; height: 28px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; }
.mc-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.mc-ring .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease; }
.mc-ring .ring-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7px; font-weight: 700; color: var(--text-200);
}

/* 3px progress bar at bottom */
.mc-bar { height: 3px; background: rgba(255,255,255,0.025); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 6px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 6px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 6px var(--orange-deep); }

/* ================================================================
   TREE AREA (3 columns, one per module)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; position: relative; min-height: 100px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.1s; }
.tree-col:nth-child(3) { animation-delay: 0.2s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* tree vertical trunk line */
.tree-trunk {
  position: relative; padding-left: 22px;
  display: flex; flex-direction: column; gap: 3px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 9px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 18px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.14); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.14); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.14); }

/* glow active branch */
.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.40); box-shadow: 0 0 6px rgba(167,139,250,0.20);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.40); box-shadow: 0 0 6px rgba(59,130,246,0.20);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.40); box-shadow: 0 0 6px rgba(245,158,11,0.20);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }

/* ================================================================
   XL SUB-MODULE CARDS (44px)
   ================================================================ */
.sub-card {
  height: 44px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px; position: relative; border-radius: var(--radius-xs);
  background: var(--surface); border: 1px solid transparent;
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* L-shaped branch connector from trunk: vertical down then horizontal right */
.sub-card::before {
  content: ''; position: absolute; left: -13px; top: 50%;
  width: 13px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.14); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.14); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.14); }

/* done state */
.sub-card.done-sub { background: rgba(255,255,255,0.012); }

/* active state: colored bg tint + glow border + shimmer */
.sub-card.active-sub { border-color: rgba(255,255,255,0.04); }
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.05); border-color: rgba(167,139,250,0.15);
  box-shadow: 0 0 18px rgba(167,139,250,0.06), 0 2px 8px rgba(0,0,0,0.25);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.05); border-color: rgba(59,130,246,0.15);
  box-shadow: 0 0 18px rgba(59,130,246,0.06), 0 2px 8px rgba(0,0,0,0.25);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.05); border-color: rgba(245,158,11,0.15);
  box-shadow: 0 0 18px rgba(245,158,11,0.06), 0 2px 8px rgba(0,0,0,0.25);
}

/* shimmer overlay for active subs */
.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.02) 46%, rgba(255,255,255,0.045) 50%,
    rgba(255,255,255,0.02) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* glow pulse for active subs */
.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  animation: subGlowPulse 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(167,139,250,0.04); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(59,130,246,0.04); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(245,158,11,0.04); }
@keyframes subGlowPulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }

/* pending state */
.sub-card.pending-sub { background: rgba(255,255,255,0.006); opacity: 0.5; }
.sub-card.pending-sub.visible { opacity: 0.5; }

/* left accent stripe */
.sub-card::after {
  content: ''; position: absolute; left: 0; top: 7px; bottom: 7px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub::after { opacity: 1; }
.sub-card.done-sub::after { opacity: 0.3; }
.sub-card[data-pcolor="purple"]::after { background: var(--purple); }
.sub-card[data-pcolor="blue"]::after { background: var(--blue); }
.sub-card[data-pcolor="orange"]::after { background: var(--orange); }

/* sub-card hover lift */
.sub-card:not(.pending-sub):hover { transform: translateY(-1px); background: rgba(255,255,255,0.02); }

/* sub-card internal elements */
.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] {
  background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.45);
}
.sub-dot.running[data-pcolor="purple"] {
  background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.45);
}
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

/* CSS spinner for running items */
.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(59,130,246,0.12);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin {
  border-color: rgba(167,139,250,0.12);
  border-top-color: var(--purple);
}
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 11.5px; color: var(--text-300); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sub-card.active-sub .sub-label { color: var(--text-100); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-300); }

.sub-meta {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

.sub-micro-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-left: 4px;
}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(60,68,86,0.10); color: var(--text-400); }

/* ================================================================
   LEVEL 3: ITEM CHECKLIST (30px)
   ================================================================ */
.level3-wrap {
  padding-left: 24px; position: relative; overflow: hidden;
  max-height: 500px; transition: max-height 0.4s ease;
}
.level3-wrap::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 1px; height: calc(100% - 10px);
}
.tree-trunk[data-color="purple"] .level3-wrap::before { background: rgba(167,139,250,0.08); }
.tree-trunk[data-color="blue"] .level3-wrap::before { background: rgba(59,130,246,0.08); }
.tree-trunk[data-color="orange"] .level3-wrap::before { background: rgba(245,158,11,0.08); }

.level3-item {
  height: 30px; display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; color: var(--text-400); position: relative;
  padding-left: 6px; border-radius: 4px;
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level3-item.visible { opacity: 1; transform: translateX(0); }
.level3-item:hover { background: rgba(255,255,255,0.015); }
.level3-item::before {
  content: ''; position: absolute; left: -10px; top: 50%;
  width: 10px; height: 1px;
}
.tree-trunk[data-color="blue"] .level3-item::before { background: rgba(59,130,246,0.08); }
.tree-trunk[data-color="purple"] .level3-item::before { background: rgba(167,139,250,0.08); }
.tree-trunk[data-color="orange"] .level3-item::before { background: rgba(245,158,11,0.08); }

.l3-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.l3-dot.done { background: var(--green); opacity: 0.5; }
.l3-dot.running { background: var(--blue); animation: l3Pulse 2s ease-in-out infinite; }
.l3-dot.pending { border: 1px solid var(--text-500); opacity: 0.35; }
@keyframes l3Pulse {
  0%, 100% { box-shadow: 0 0 3px rgba(59,130,246,0.35); }
  50% { box-shadow: 0 0 8px rgba(59,130,246,0.6); }
}
.l3-label { flex: 1; }
.l3-meta { font-size: 9px; color: var(--text-500); font-variant-numeric: tabular-nums; }

/* collapsed tree for complete modules */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {
  display: none; padding: 8px 14px; font-size: 11px; color: var(--text-400);
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 8px;
}
.tree-collapsed-bar:hover { color: var(--text-300); background: var(--surface); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }
.tree-col .collapse-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-400); cursor: pointer;
  padding: 2px 0 6px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* ================================================================
   HOVER TOOLTIP (400px glassmorphism)
   ================================================================ */
.tooltip-portal {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 400px; opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.tooltip-portal.visible { opacity: 1; transform: translateY(0); }
.tooltip-inner {
  background: rgba(18, 20, 26, 0.96);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 16px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.tooltip-title {
  font-size: 13px; font-weight: 600; color: var(--text-100); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.tooltip-summary { font-size: 12px; color: var(--text-300); line-height: 1.6; margin-bottom: 10px; }
.tooltip-stats { display: flex; gap: 16px; }
.tooltip-stat-val { font-size: 16px; font-weight: 700; color: var(--text-100); }
.tooltip-stat-label { font-size: 10px; color: var(--text-400); }

/* ================================================================
   DASHBOARD PANEL (slides below tree on sub-module click)
   ================================================================ */
.dashboard-panel {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  margin-top: 20px;
}
.dashboard-panel.open { max-height: 600px; opacity: 1; }

.dashboard-inner {
  display: grid; grid-template-columns: 3fr 2fr; gap: 24px;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 24px;
  position: relative;
  animation: dashSlide 0.3s ease-out;
}
@keyframes dashSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.dashboard-inner .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}

.dash-close {
  position: absolute; top: 12px; right: 14px;
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: rgba(80,96,130,0.08); color: var(--text-400);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: var(--transition); z-index: 10;
}
.dash-close:hover { background: rgba(80,96,130,0.16); color: var(--text-100); }

.dash-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.dash-summary {
  font-size: 13px; color: var(--text-200); line-height: 1.7;
  margin-bottom: 16px; padding: 12px 14px;
  background: rgba(18, 20, 26, 0.55); border-radius: var(--radius-sm);
  border-left: 2px solid var(--blue);
}
.dash-item-list { list-style: none; }
.dash-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 12px; color: var(--text-300);
  border-bottom: 1px solid rgba(80,96,130,0.05);
}
.dash-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* Right column: stat cards */
.dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.dash-stat-card {
  background: rgba(18, 20, 26, 0.55); border-radius: var(--radius-sm);
  padding: 12px 14px; text-align: center;
  border: 1px solid rgba(80,96,130,0.05);
}
.dash-stat-val { font-size: 22px; font-weight: 700; color: var(--text-100); font-variant-numeric: tabular-nums; }
.dash-stat-label { font-size: 10px; color: var(--text-400); margin-top: 2px; }

/* Mini live feed */
.dash-feed-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.dash-feed-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400);
}
.mini-live-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  background: rgba(239,68,68,0.08); color: var(--red);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.dash-feed { max-height: 130px; overflow-y: auto; }
.dash-feed::-webkit-scrollbar { width: 4px; }
.dash-feed::-webkit-scrollbar-thumb { background: rgba(80,96,130,0.16); border-radius: 2px; }

.feed-entry {
  display: flex; gap: 8px; padding: 5px 0; font-size: 11px;
  border-bottom: 1px solid rgba(80,96,130,0.03);
  animation: feedFadeIn 0.35s ease both;
}
@keyframes feedFadeIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: var(--text-500); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 42px; }
.feed-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.feed-msg { color: var(--text-300); flex: 1; }

/* ================================================================
   DOT ANIMATION CONTAINER  (L-shaped tree dots)
   ================================================================ */
.dot-anim-container { position: fixed; inset: 0; pointer-events: none; z-index: 500; }
.flying-dot {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  background: var(--blue); pointer-events: none;
  box-shadow: 0 0 8px var(--blue), 0 0 16px rgba(59,130,246,0.25);
}

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }
</style>
</head>

<!-- ===== HEADER ===== -->

<!-- ===== MAIN CONTENT ===== -->

<script>
/* ================================================================
   DATA MODEL
   ================================================================ */
const MODULES = [
  {
    id: 'gen_hypo', label: 'Create Hypothesis', color: 'purple', status: 'done',
    summary: 'Refined hypothesis through 3 adversarial review iterations: 6.2 -> 7.8 -> 8.4/10. Final review found 0 major issues.',
    duration: '01:12:34', cost: '$4.21', messages: 847,
    subs: [
      { id: 'gen1', label: 'Gen Hypo Iter 1', status: 'done', meta: '6.2/10', duration: '14m', items: [] },
      { id: 'rev1', label: 'Review Iter 1', status: 'done', meta: '3 issues', duration: '8m', items: [] },
      { id: 'gen2', label: 'Gen Hypo Iter 2', status: 'done', meta: '7.8/10', duration: '16m', items: [] },
      { id: 'rev2', label: 'Review Iter 2', status: 'done', meta: '1 issue', duration: '9m', items: [] },
      { id: 'gen3', label: 'Gen Hypo Iter 3', status: 'done', meta: '8.4/10', duration: '18m', items: [] },
      { id: 'rev3', label: 'Review Iter 3', status: 'done', meta: '0 major', duration: '7m', items: [] }
    ]
  },
  {
    id: 'test_hypo', label: 'Test Ideas', color: 'blue', status: 'running',
    summary: 'Building research artifacts. Baseline evaluation shows +17.5% accuracy improvement over prior work.',
    duration: '01:18:42', cost: '$7.83', messages: 1204,
    subs: [
      { id: 'strat', label: 'Strategy', status: 'done', meta: 'Contrastive', duration: '12m', items: [] },
      { id: 'plan', label: 'Plan', status: 'done', meta: '5 artifacts', duration: '8m', items: [] },
      {
        id: 'artifacts', label: 'Artifacts', status: 'running', meta: '3/5', duration: '41m',
        items: [
          { label: 'Baseline Implementation', status: 'done', time: '12m' },
          { label: 'Dataset Preparation', status: 'done', time: '8m' },
          { label: 'Proof of Concept', status: 'done', time: '15m' },
          { label: 'Ablation Study', status: 'running', time: '6m' },
          { label: 'Evaluation Suite', status: 'pending', time: '--' }
        ]
      },
      { id: 'paper', label: 'Paper Draft', status: 'running', meta: 'Writing...', duration: '18m', items: [] },
      { id: 'review', label: 'Review', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'update', label: 'Update Hypo', status: 'pending', meta: '--', duration: '--', items: [] }
    ]
  },
  {
    id: 'disseminate', label: 'Report Results', color: 'orange', status: 'pending',
    summary: 'Awaiting completion of Test Ideas module before generating paper repository.',
    duration: '--', cost: '$0.00', messages: 0,
    subs: [
      { id: 'repo', label: 'Gen Repo', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'demos', label: 'Demos + Viz', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'full_paper', label: 'Full Paper', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'deploy_src', label: 'Deploy Source', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'deploy_paper', label: 'Deploy Paper', status: 'pending', meta: '--', duration: '--', items: [] }
    ]
  }
];

/* ================================================================
   RENDER TREE AREA
   ================================================================ */
const treeArea = document.getElementById('treeArea');

function renderTrees() {
  treeArea.innerHTML = '';
  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' ? ' collapsed' : '');
    col.dataset.module = mi;

    // collapse toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    // trunk
    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      // sub-card
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      // shimmer + glow overlays
      card.innerHTML = `<div class="sub-card-shimmer"></div><div class="sub-card-glow"></div>`;

      // status indicator
      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:11px; color:var(--green); flex-shrink:0;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      // label
      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      // meta
      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      // micro badge
      const badge = document.createElement('span');

      if (sub.items && sub.items.length > 0) {

    col.appendChild(trunk);

    // collapsed bar
    const collBar = document.createElement('div');
    collBar.className = 'tree-collapsed-bar';
    const doneCount = mod.subs.filter(s => s.status === 'done').length;
    collBar.innerHTML = `<span style="font-size:11px; color:var(--green);">\u2713</span>
      <span>${doneCount}/${mod.subs.length} complete</span>
      <span style="margin-left:auto; font-size:10px; color:var(--text-500);">Click to expand</span>`;
    collBar.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(collBar);

    treeArea.appendChild(col);
  });

  // animate sub-cards visible
  requestAnimationFrame(() => {
    let delay = 0;
    document.querySelectorAll('.sub-card, .level3-item').forEach(el => {
      setTimeout(() => el.classList.add('visible'), delay);
      delay += 40;
    });
  });
}

/* ================================================================
   AMBIENT PARTICLES (40 dots + connection lines)
   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.radius = Math.random() * 1.3 + 0.4;
    this.opacity = Math.random() * 0.08 + 0.02;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < 40; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  // connection lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const alpha = (1 - dist / 140) * 0.03;
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = `rgba(80, 110, 180, ${alpha})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }

  // dots
  particles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(120, 150, 200, ${p.opacity})`;
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ================================================================
   CORRECT L-SHAPED TREE DOT ANIMATION
   Dots travel along the tree structure: from trunk top, DOWN the
   vertical trunk line, then RIGHT along the horizontal branch
   connector to reach the target sub-card. True L-shape path.
   ================================================================ */
const dotContainer = document.getElementById('dotAnimContainer');

function getRunningSubCards() {
  return document.querySelectorAll('.sub-card.active-sub');
}

/**
 * Compute the L-shaped path for a dot:
 *  1. Start at the top of the trunk line (vertical line's x, module card bottom)
 *  2. Travel DOWN the trunk to the Y-level of the target sub-card
 *  3. Travel RIGHT along the horizontal branch to the sub-card's left edge
 */
function computeLPath(targetEl) {
  const targetRect = targetEl.getBoundingClientRect();
  const trunk = targetEl.closest('.tree-trunk');
  if (!trunk) return null;

  const trunkRect = trunk.getBoundingClientRect();
  // The trunk vertical line is at left: 9px inside the trunk element
  const trunkLineX = trunkRect.left + 10;
  // Start Y: top of the trunk
  const startY = trunkRect.top;
  // Corner Y: center of the target sub-card (where the horizontal branch meets)
  const cornerY = targetRect.top + targetRect.height / 2;
  // End X: left edge of the sub-card
  const endX = targetRect.left + 8;

  return {
    startX: trunkLineX,
    startY: startY,
    cornerX: trunkLineX,
    cornerY: cornerY,
    endX: endX,
    endY: cornerY
  };
}

function spawnLShapedDot(targetEl) {
  const path = computeLPath(targetEl);
  if (!path) return;

  const dot = document.createElement('div');
  dot.className = 'flying-dot';

  // Color based on parent module
  const pcolor = targetEl.dataset.pcolor;
  if (pcolor === 'purple') {
    dot.style.background = 'var(--purple)';
    dot.style.boxShadow = '0 0 8px var(--purple), 0 0 16px rgba(167,139,250,0.25)';
  } else if (pcolor === 'orange') {
    dot.style.background = 'var(--orange)';
    dot.style.boxShadow = '0 0 8px var(--orange), 0 0 16px rgba(245,158,11,0.25)';
  }
  // default blue is already set in CSS

  dot.style.left = path.startX + 'px';
  dot.style.top = path.startY + 'px';
  dot.style.opacity = '0';
  dot.style.transform = 'scale(0.3)';

  dotContainer.appendChild(dot);

  // Total path length determines duration
  const verticalDist = Math.abs(path.cornerY - path.startY);
  const horizontalDist = Math.abs(path.endX - path.cornerX);
  const totalDist = verticalDist + horizontalDist;

  // Fraction of path that is vertical
  const vertFrac = totalDist > 0 ? verticalDist / totalDist : 0.5;

  const duration = 1400 + Math.random() * 600;
  const startTime = performance.now();
  // Small random start offset along the trunk for variety
  const startOffset = Math.random() * 20;

  function animateDot(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    let x, y;
    if (t <= vertFrac) {
      // Phase 1: moving DOWN the trunk (vertical)
      const pt = t / vertFrac;
      const eased = pt < 0.5 ? 2 * pt * pt : -1 + (4 - 2 * pt) * pt;
      x = path.startX;
      y = path.startY + startOffset + (path.cornerY - path.startY - startOffset) * eased;
    } else {
      // Phase 2: moving RIGHT along the branch (horizontal)
      const pt = (t - vertFrac) / (1 - vertFrac);
      const eased = pt < 0.5 ? 2 * pt * pt : -1 + (4 - 2 * pt) * pt;
      x = path.cornerX + (path.endX - path.cornerX) * eased;
      y = path.cornerY;
    }

    // Fade in at start, fade out at end
    const opacity = t < 0.08 ? t / 0.08 : t > 0.88 ? (1 - t) / 0.12 : 1;
    const scale = t < 0.08 ? 0.3 + 0.7 * (t / 0.08) : t > 0.92 ? 1 - 0.7 * ((t - 0.92) / 0.08) : 1;

    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.style.opacity = (opacity * 0.75).toString();
    dot.style.transform = `scale(${scale})`;

    if (t < 1) {
      requestAnimationFrame(animateDot);
    } else {
      // Brief flash on arrival
      dot.style.transform = 'scale(1.6)';
      dot.style.opacity = '0.9';
      setTimeout(() => dot.remove(), 120);
    }
  }
  requestAnimationFrame(animateDot);
}

function spawnDotWave() {
  const targets = getRunningSubCards();
  targets.forEach(target => {
    // spawn 1-2 dots per target per wave
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnLShapedDot(target), i * 250 + Math.random() * 350);
    }
  });
}

    const mod = MODULES[focusedModule];
    focusedSub = Math.min(mod.subs.length - 1, focusedSub + 1);
    highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();

  if (e.key === 'ArrowUp') {
    focusedSub = Math.max(-1, focusedSub - 1);
    if (focusedSub >= 0) highlightSubCard(focusedModule, focusedSub);

// Slowly drift the ambient glow

function driftGlow() {
  glowAngle += 0.003;
  const ox = Math.sin(glowAngle) * 80;
  const oy = Math.cos(glowAngle * 0.7) * 40;
  ambientGlow.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
  requestAnimationFrame(driftGlow);
}
driftGlow();

/* ================================================================
   MODULE CARD ENTRANCE ANIMATIONS
   ================================================================ */
function animateCardEntrance() {
  const cards = document.querySelectorAll('.mod-card');
  cards.forEach((card, i) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(12px)';
    card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 120 + i * 100);
  });
}
animateCardEntrance();

/* ================================================================
   PROGRESS PULSE on running module card border
   ================================================================ */
const runningCardBorderStyle = document.createElement('style');
runningCardBorderStyle.textContent = `
  .mod-card[data-status="running"] {
    animation: runningBorderPulse 4s ease-in-out infinite;
  }
  @keyframes runningBorderPulse {
    0%, 100% { border-color: rgba(59,130,246,0.10); }
    50% { border-color: rgba(59,130,246,0.22); }
  }
`;
document.head.appendChild(runningCardBorderStyle);

/* ================================================================
   ACTIVE RUNNING SUB-CARD MICRO-ANIMATION (border color cycle)
   ================================================================ */
const runningSubStyle = document.createElement('style');
runningSubStyle.textContent = `
  .sub-card.active-sub[data-pcolor="blue"] {
    animation: blueSubPulse 3s ease-in-out infinite;
  }
  @keyframes blueSubPulse {
    0%, 100% { border-color: rgba(59,130,246,0.10); }
    50% { border-color: rgba(59,130,246,0.22); }
  }
`;
document.head.appendChild(runningSubStyle);

/* ================================================================
   PENDING MODULE: subtle desaturation
   ================================================================ */
const pendingStyle = document.createElement('style');
pendingStyle.textContent = `
  .mod-card[data-status="pending"] {
    opacity: 0.60;
  }
  .mod-card[data-status="pending"]:hover {
    opacity: 0.75;
  }
`;
document.head.appendChild(pendingStyle);

/* ================================================================
   SMOOTH SCROLL for main content
   ================================================================ */
document.documentElement.style.scrollBehavior = 'smooth';

/* ================================================================
   KEYBOARD HINT (bottom-right)
   ================================================================ */
const kbdHint = document.createElement('div');
kbdHint.style.cssText = `
  position: fixed; bottom: 12px; right: 20px; font-size: 10px;
  color: var(--text-500); z-index: 50; opacity: 0.55;
  display: flex; gap: 8px; align-items: center;
`;
kbdHint.innerHTML = `
  <span style="display:inline-block; padding:1px 5px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:3px; font-size:9px;
    color:var(--text-400);">\u2190\u2192</span> modules
  <span style="display:inline-block; padding:1px 5px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:3px; font-size:9px;
    color:var(--text-400);">\u2191\u2193</span> subs
  <span style="display:inline-block; padding:1px 5px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:3px; font-size:9px;
    color:var(--text-400);">Enter</span> open
  <span style="display:inline-block; padding:1px 5px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:3px; font-size:9px;
    color:var(--text-400);">Esc</span> close
`;
document.body.appendChild(kbdHint);

/* ================================================================
   PARTICLE TRAIL EFFECT on flying dots (afterimage)
   ================================================================ */
const trailStyle = document.createElement('style');
trailStyle.textContent = `
  .flying-dot-trail {
    position: absolute; width: 3px; height: 3px; border-radius: 50%;
    pointer-events: none; opacity: 0.25;
    transition: opacity 0.6s ease;
  }
`;
document.head.appendChild(trailStyle);

/* ================================================================
   RUNNING ITEM ROW SHIMMER in dashboard
   ================================================================ */
const dashItemStyle = document.createElement('style');
dashItemStyle.textContent = `
  .dash-item-running {
    position: relative; overflow: hidden;
  }
  .dash-item-running::after {
    content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.03), transparent);
    animation: dashItemShimmer 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes dashItemShimmer {
    0% { left: -100%; } 60% { left: 150%; } 100% { left: 150%; }
  }
`;
document.head.appendChild(dashItemStyle);

/* ================================================================
   AUTO-EXPAND Test Ideas tree on load (since it is active)
   ================================================================ */
setTimeout(() => {
  const activeCols = document.querySelectorAll('.tree-col');
  activeCols.forEach(col => {
    const mi = parseInt(col.dataset.module);
    if (MODULES[mi] && MODULES[mi].status === 'pending') {
      col.classList.add('collapsed');
    }
  });
}, 100);

/* ================================================================
   COST SPARKLINE MICRO-ANIMATION in header (visual indicator)
   ================================================================ */
const sparkDot = document.createElement('span');
sparkDot.style.cssText = `
  width: 4px; height: 4px; border-radius: 50%; background: var(--green);
  display: inline-block; margin-left: 4px; vertical-align: middle;
  animation: costPulse 3s ease-in-out infinite;
`;
const sparkStyle = document.createElement('style');
sparkStyle.textContent = `
  @keyframes costPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
`;
document.head.appendChild(sparkStyle);
costEl.parentElement.appendChild(sparkDot);

/* ================================================================
   RESIZE HANDLER for responsive module cards
   ================================================================ */
function handleResize() {
  const w = window.innerWidth;
  const cards = document.querySelector('.module-cards');
  if (w < 900) {
    cards.style.gridTemplateColumns = '1fr';
  } else if (w < 1200) {
    cards.style.gridTemplateColumns = 'repeat(2, 1fr)';
  } else {
    cards.style.gridTemplateColumns = 'repeat(3, 1fr)';
  }

  const tree = document.getElementById('treeArea');
  if (w < 900) {
    tree.style.gridTemplateColumns = '1fr';
  } else if (w < 1200) {
    tree.style.gridTemplateColumns = 'repeat(2, 1fr)';
  } else {
    tree.style.gridTemplateColumns = 'repeat(3, 1fr)';
  }
}
window.addEventListener('resize', handleResize);
handleResize();
</script>
</body>
</html>
