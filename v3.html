<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline — Elite 10</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --bg-raised: #0c1220;
  --surface: rgba(15,23,42,.72);
  --surface-hi: rgba(30,41,59,.65);
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12); --purple-glow: rgba(167,139,250,.25);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);   --blue-glow: rgba(96,165,250,.25);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12); --orange-glow: rgba(251,146,60,.25);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);  --green-glow: rgba(52,211,153,.25);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text-dim);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
}

/* ===== AMBIENT BACKGROUND ===== */
#ambientCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(ellipse 800px 400px at 20% 10%, rgba(167,139,250,.03), transparent),
    radial-gradient(ellipse 600px 500px at 80% 60%, rgba(96,165,250,.025), transparent),
    linear-gradient(rgba(148,163,184,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.02) 1px, transparent 1px);
  background-size: 100%, 100%, 52px 52px, 52px 52px;
}

/* ===== GLASSMORPHISM HEADER (hidden per whiteboard) ===== */
.header {
  display: none;
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(167,139,250,.15) 30%, rgba(96,165,250,.15) 70%, transparent);
}

.brand {
  font-weight: 800; font-size: 15px; color: var(--text);
  letter-spacing: -.5px; display: flex; align-items: center; gap: 8px;
}
.brand-icon {
  width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  font-size: 13px; color: #fff; font-weight: 700;
  box-shadow: 0 0 12px rgba(167,139,250,.2);
}

.breadcrumb {
  font-size: 12px; color: var(--text-muted); white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.breadcrumb .sep { color: var(--text-faint); font-size: 10px; }
.breadcrumb .active-crumb { color: var(--text); font-weight: 600; }

.header-spacer { flex: 1; }

/* Header ring */
.header-ring {
  width: 38px; height: 38px; position: relative; flex-shrink: 0;
}
.header-ring svg { width: 100%; height: 100%; }
.h-ring-track { fill: none; stroke: rgba(148,163,184,.1); stroke-width: 3; }
.h-ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s var(--ease);
  filter: drop-shadow(0 0 4px var(--blue-glow));
}
.h-ring-label {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 9.5px; font-weight: 700; color: var(--text);
}
.header-ring::after {
  content: ''; position: absolute; inset: -5px; border-radius: 50%;
  border: 1.5px dashed rgba(96,165,250,.3); opacity: .5;
  animation: orbitSpin 14s linear infinite;
}
.header-ring::before {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  background: radial-gradient(circle, var(--blue-glow), transparent 70%);
  animation: ringPulse 2.5s ease-in-out infinite;
}
@keyframes orbitSpin { to { transform: rotate(360deg); } }
@keyframes ringPulse { 0%,100% { opacity: .25; } 50% { opacity: .65; } }

.header-divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.header-stat {
  font-size: 12px; color: var(--text-dim); white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.header-stat .lbl {
  font-size: 9px; text-transform: uppercase; letter-spacing: .5px;
  color: var(--text-faint); font-weight: 600;
}
.header-stat strong { color: var(--text); font-weight: 700; }

/* ===== SIDEBAR (48px collapsed, expands on hover) ===== */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 48px; z-index: 150;
  background: rgba(6,9,15,.85); backdrop-filter: blur(16px);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 16px 0 12px; gap: 4px;
  transition: width 280ms var(--ease);
  overflow: hidden;
}
.sidebar:hover { width: 200px; }

.sidebar-ring {
  width: 34px; height: 34px; position: relative; margin-bottom: 14px;
}
.sidebar-ring svg { width: 100%; height: 100%; }
.s-ring-track { fill: none; stroke: rgba(148,163,184,.1); stroke-width: 2.5; }
.s-ring-fill {
  fill: none; stroke-width: 2.5; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s var(--ease);
}
.s-ring-text {
  font-size: 7px; font-weight: 700; text-anchor: middle; dominant-baseline: central;
  font-family: 'Inter', sans-serif;
}
.sidebar-ring::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  border: 1px dashed rgba(96,165,250,.2); opacity: .4;
  animation: orbitSpin 10s linear infinite;
}

.sidebar-sep { width: 28px; height: 1px; background: var(--border); margin: 4px 0; }

.sidebar-btn {
  width: 40px; height: 40px; border-radius: 10px; border: none;
  background: transparent; cursor: pointer; position: relative;
  display: grid; place-items: center; transition: all .2s var(--ease);
  color: var(--text-muted);
}
.sidebar-btn:hover { background: rgba(148,163,184,.06); color: var(--text-dim); }
.sidebar-btn.active { background: rgba(148,163,184,.08); }
.sidebar-btn .sb-dot {
  position: absolute; top: 7px; right: 7px; width: 6px; height: 6px;
  border-radius: 50%; opacity: .9;
}
.sidebar-btn .sb-icon {
  width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center;
  font-size: 10px; font-weight: 700; color: #fff;
}
.sidebar-btn { width: 100%; padding: 0 14px; display: flex; align-items: center; gap: 10px; justify-content: flex-start; }
.sidebar-btn .sb-label {
  font-size: 12px; font-weight: 500; color: var(--text-muted); white-space: nowrap;
  opacity: 0; transition: opacity 200ms ease 80ms;
}
.sidebar:hover .sb-label { opacity: 1; }
.sidebar-btn.active .sb-label { color: var(--text); }

/* ===== MAIN CONTENT ===== */
.main {
  position: relative; z-index: 1;
  margin-left: 48px; padding: 20px 28px 32px;
  max-width: 1420px;
}

/* ===== PARTICLE CANVAS (module row) ===== */
#particleCanvas {
  position: absolute; inset: -20px; z-index: 0; pointer-events: none;
}

/* ===== MODULE CARDS ROW ===== */
.modules-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; position: relative; margin-bottom: 20px;
}

/* ===== HEAVY GLASSMORPHISM MODULE CARD ===== */
.mod-card {
  position: relative; z-index: 1; cursor: pointer;
  background: var(--surface-card);
  backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px 16px;
  transition: all .35s var(--ease);
  overflow: hidden;
}
.mod-card:hover { transform: translateY(-2px); border-color: var(--border-hi); }

/* Glow halo */
.mod-card::before {
  content: ''; position: absolute; inset: -2px; border-radius: var(--radius);
  opacity: 0; transition: opacity .5s; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 40px 8px var(--purple-dim), 0 0 80px 16px rgba(167,139,250,.06), inset 0 0 20px var(--purple-dim); }
.mod-card[data-color="blue"]::before   { box-shadow: 0 0 40px 8px var(--blue-dim), 0 0 80px 16px rgba(96,165,250,.06), inset 0 0 20px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 40px 8px var(--orange-dim), 0 0 80px 16px rgba(251,146,60,.06), inset 0 0 20px var(--orange-dim); }
.mod-card.done::before { opacity: .35; }
.mod-card.active::before { opacity: 1; animation: haloBreath 3s ease-in-out infinite; }
@keyframes haloBreath { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

/* Shimmer sweep */
.mod-card::after {
  content: ''; position: absolute; top: 0; left: -120%; width: 70%; height: 100%;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,.03), rgba(255,255,255,.06), rgba(255,255,255,.03), transparent);
  transform: skewX(-18deg); pointer-events: none;
}
.mod-card.active::after { animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -120%; } 50% { left: 170%; } 100% { left: 170%; } }

/* Spinning partial circle on running card */
.mod-card.active .spin-arc {
  position: absolute; inset: -3px; border-radius: calc(var(--radius) + 3px);
  border: 2px solid transparent; border-top-color: var(--blue);
  opacity: 0.4; animation: spinArc 2.5s linear infinite;
  pointer-events: none; z-index: 10;
}
@keyframes spinArc { to { transform: rotate(360deg); } }

/* Top accent line */
.mod-card .accent-line {
  position: absolute; top: 0; left: 16px; right: 16px; height: 2px;
  border-radius: 0 0 2px 2px; opacity: .6;
}
.mod-card[data-color="purple"] .accent-line { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
.mod-card[data-color="blue"] .accent-line   { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
.mod-card[data-color="orange"] .accent-line { background: linear-gradient(90deg, transparent, var(--orange), transparent); }

/* Card layout */
.mc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.mc-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: grid; place-items: center; font-size: 16px; flex-shrink: 0;
}
.mod-card[data-color="purple"] .mc-icon { background: var(--purple-dim); color: var(--purple); }
.mod-card[data-color="blue"] .mc-icon   { background: var(--blue-dim); color: var(--blue); }
.mod-card[data-color="orange"] .mc-icon { background: var(--orange-dim); color: var(--orange); }

.mc-title-area { flex: 1; min-width: 0; }
.mc-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.mc-subtitle { font-size: 11px; color: var(--text-muted); }

.mc-badge {
  font-size: 9px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0;
}
.mc-badge.done    { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgePulse 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(100,116,139,.08); color: var(--text-muted); }
@keyframes badgePulse { 0%,100% { opacity: .7; } 50% { opacity: 1; background: rgba(96,165,250,.2); } }

/* Sparkline row */
.mc-sparkline-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.mc-sparkline-wrap { flex: 1; height: 28px; position: relative; }
.mc-sparkline-wrap svg { width: 100%; height: 100%; }
.sparkline-path {
  fill: none; stroke-width: 1.5; stroke-linecap: round;
  opacity: .7;
}
.sparkline-area { opacity: .08; }
.mc-spark-stat {
  font-size: 11px; color: var(--text-muted); white-space: nowrap;
  display: flex; flex-direction: column; align-items: flex-end; gap: 1px;
}
.mc-spark-stat strong {
  font-size: 16px; font-weight: 700; letter-spacing: -.3px;
}
.mod-card[data-color="purple"] .mc-spark-stat strong { color: var(--purple); }
.mod-card[data-color="blue"] .mc-spark-stat strong   { color: var(--blue); }
.mod-card[data-color="orange"] .mc-spark-stat strong  { color: var(--orange); }

/* Progress bar */
.mc-progress { height: 3px; border-radius: 2px; background: rgba(148,163,184,.06); overflow: hidden; margin-bottom: 10px; }
.mc-progress-fill { height: 100%; border-radius: 2px; width: 0; transition: width .8s var(--ease); }
.mod-card[data-color="purple"] .mc-progress-fill { background: linear-gradient(90deg, var(--purple), rgba(167,139,250,.5)); }
.mod-card[data-color="blue"] .mc-progress-fill   { background: linear-gradient(90deg, var(--blue), rgba(96,165,250,.5)); }
.mod-card[data-color="orange"] .mc-progress-fill { background: linear-gradient(90deg, var(--orange), rgba(251,146,60,.5)); }

/* Stats row */
.mc-stats { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); }
.mc-stats span { display: flex; align-items: center; gap: 4px; }
.mc-stats .val { color: var(--text-dim); font-weight: 600; }

/* ===== XL SUB-MODULE CARDS (44px) ===== */
.tree-area {
  position: relative; min-height: 50px;
  max-width: 420px;
  margin-left: calc(33.33% + 8px);
}

.tree-col { position: relative; z-index: 1; }
.tree-col-header {
  display: flex; align-items: center; gap: 6px; padding: 0 0 8px;
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: .6px; font-weight: 600; cursor: pointer; user-select: none;
}
.tree-col-header .chevron {
  font-size: 8px; display: inline-block; transition: transform .3s var(--ease);
}
.tree-col-header.collapsed .chevron { transform: rotate(-90deg); }
.tree-col-header .count { margin-left: auto; font-variant-numeric: tabular-nums; }

.tree-list { list-style: none; overflow: hidden; transition: max-height .45s var(--ease), opacity .3s; }
.tree-list.collapsed { max-height: 0 !important; opacity: 0; }

/* Tree vertical line */
.tree-list-inner { position: relative; padding-left: 18px; }
.tree-list-inner::before {
  content: ''; position: absolute; left: 7px; top: 0; bottom: 16px;
  width: 1.5px; border-radius: 1px;
}
.tree-col[data-color="purple"] .tree-list-inner::before { background: linear-gradient(180deg, var(--purple), rgba(167,139,250,.1)); }
.tree-col[data-color="blue"] .tree-list-inner::before   { background: linear-gradient(180deg, var(--blue), rgba(96,165,250,.1)); }
.tree-col[data-color="orange"] .tree-list-inner::before { background: linear-gradient(180deg, var(--orange), rgba(251,146,60,.1)); }

/* Individual sub-module row */
.sub-row {
  height: 44px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px 0 0; border-radius: var(--radius-sm);
  position: relative; cursor: pointer;
  opacity: 0; transform: translateX(-10px);
  transition: opacity .3s var(--ease), transform .3s var(--ease), background .15s;
}
.sub-row.visible { opacity: 1; transform: translateX(0); }
.sub-row:hover { background: rgba(255,255,255,.02); }
.sub-row.selected { background: rgba(255,255,255,.03); }

/* Horizontal branch line */
.sub-row::before {
  content: ''; position: absolute; left: -11px; top: 50%;
  width: 11px; height: 1.5px; border-radius: 1px;
}
.tree-col[data-color="purple"] .sub-row::before { background: rgba(167,139,250,.25); }
.tree-col[data-color="blue"] .sub-row::before   { background: rgba(96,165,250,.25); }
.tree-col[data-color="orange"] .sub-row::before { background: rgba(251,146,60,.25); }

/* Active branch INTENSE glow */
.sub-row.active .sub-glow-line {
  position: absolute; left: -11px; top: 50%;
  width: 11px; height: 1.5px; border-radius: 1px;
}

/* Sub-module dot */
.sub-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  transition: all .3s;
}
.sub-dot.done { opacity: .65; }
.sub-dot.running { animation: dotPulse 2s ease-in-out infinite; }
.sub-dot.pending { background: transparent !important; border: 1.5px solid var(--text-faint); opacity: .4; }
@keyframes dotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.35); } }

/* Sub label + badge + progress */
.sub-info { flex: 1; min-width: 0; }
.sub-label-row { display: flex; align-items: center; gap: 6px; }
.sub-label {
  font-size: 12.5px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sub-row.active-sub .sub-label { color: var(--text); font-weight: 600; }
.sub-row.done-sub .sub-label { color: var(--text-muted); }

.sub-badge {
  font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.sub-badge.done    { background: var(--green-dim); color: var(--green); }
.sub-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-badge.pending { background: rgba(100,116,139,.06); color: var(--text-faint); }

.sub-progress {
  height: 2px; border-radius: 1px; background: rgba(148,163,184,.05);
  margin-top: 4px; overflow: hidden;
}
.sub-progress-fill {
  height: 100%; border-radius: 1px; width: 0;
  transition: width .6s var(--ease);
}
.tree-col[data-color="purple"] .sub-progress-fill { background: var(--purple); }
.tree-col[data-color="blue"] .sub-progress-fill   { background: var(--blue); }
.tree-col[data-color="orange"] .sub-progress-fill { background: var(--orange); }

/* Color tints for active sub-rows */
.tree-col[data-color="purple"] .sub-row.active-sub { background: rgba(167,139,250,.04); }
.tree-col[data-color="blue"] .sub-row.active-sub   { background: rgba(96,165,250,.04); }
.tree-col[data-color="orange"] .sub-row.active-sub { background: rgba(251,146,60,.04); }

.sub-meta { font-size: 10px; color: var(--text-faint); white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* Ghost chevron on rounds */
.sub-row .ghost-chevron {
  font-size: 10px; color: var(--text-faint); margin-left: auto;
  opacity: 0; transition: opacity 200ms, transform 200ms;
  flex-shrink: 0; padding-left: 4px;
}
.sub-row:hover .ghost-chevron { opacity: 0.4; }
.sub-row.expanded .ghost-chevron { opacity: 0.7; transform: rotate(90deg); }

/* ===== 2-LEVEL TREE CHILDREN ===== */
.child-list { list-style: none; position: relative; padding-left: 20px; margin-left: 4px; }
.child-list::before {
  content: ''; position: absolute; left: 10px; top: 0; bottom: 18px;
  width: 1px; border-radius: 1px;
}
.tree-col[data-color="purple"] .child-list::before { background: rgba(167,139,250,.12); }
.tree-col[data-color="blue"] .child-list::before   { background: rgba(96,165,250,.12); }
.tree-col[data-color="orange"] .child-list::before { background: rgba(251,146,60,.12); }

.child-row {
  height: 36px; display: flex; align-items: center; gap: 8px;
  padding: 0 8px 0 0; border-radius: 6px;
  position: relative; cursor: pointer;
  opacity: 0; transform: translateX(-8px);
  transition: opacity .3s var(--ease), transform .3s var(--ease), background .15s;
}
.child-row.visible { opacity: 1; transform: translateX(0); }
.child-row:hover { background: rgba(255,255,255,.02); }

.child-row::before {
  content: ''; position: absolute; left: -10px; top: 50%;
  width: 10px; height: 1px; border-radius: 1px;
}
.tree-col[data-color="purple"] .child-row::before { background: rgba(167,139,250,.15); }
.tree-col[data-color="blue"] .child-row::before   { background: rgba(96,165,250,.15); }
.tree-col[data-color="orange"] .child-row::before { background: rgba(251,146,60,.15); }

/* Active child glow */
.tree-col[data-color="blue"] .child-row.active-child {
  background: rgba(96,165,250,.04);
}
.tree-col[data-color="blue"] .child-row.active-child::before {
  background: rgba(96,165,250,.45);
  box-shadow: 0 0 6px rgba(96,165,250,.3);
  animation: childBranchGlow 2.5s ease-in-out infinite;
}
@keyframes childBranchGlow { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

.child-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.child-dot.done { opacity: .5; }
.child-dot.running { animation: dotPulse 2s ease-in-out infinite; }
.child-dot.pending { background: transparent !important; border: 1px solid var(--text-faint); opacity: .35; }

.child-label { font-size: 11.5px; color: var(--text-muted); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.child-row.active-child .child-label { color: var(--text-dim); font-weight: 500; }
.child-row.done-child .child-label { color: var(--text-faint); }
.child-meta { font-size: 9px; color: var(--text-faint); white-space: nowrap; }

/* ===== ACTIVE BRANCH GLOW (tree lines) ===== */
.tree-col[data-color="blue"] .sub-row.active-sub::before {
  background: rgba(96,165,250,.55); box-shadow: 0 0 8px rgba(96,165,250,.3);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

/* ===== BELOW-TREE DASHBOARD ===== */
.dashboard {
  display: grid; grid-template-columns: 1fr 380px;
  gap: 18px; margin-top: 22px;
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .5s var(--ease), opacity .35s, margin-top .4s;
}
.dashboard.open { max-height: 800px; opacity: 1; }
.dashboard.hidden { max-height: 0; opacity: 0; margin-top: 0; }

.panel {
  background: var(--surface-card);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px; overflow: hidden;
  position: relative;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  border-radius: 0 0 1px 1px;
}

.dash-fade { animation: dashFadeIn .35s var(--ease); }
@keyframes dashFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.dash-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.dash-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dash-title { font-size: 15px; font-weight: 700; color: var(--text); }
.dash-badge {
  font-size: 9px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: .4px;
}
.dash-badge.done    { background: var(--green-dim); color: var(--green); }
.dash-badge.running { background: var(--blue-dim); color: var(--blue); }
.dash-badge.pending { background: rgba(100,116,139,.08); color: var(--text-muted); }

.dash-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.72;
  margin-bottom: 18px; max-width: 680px; font-style: italic;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}

/* Item list */
.dash-items { display: flex; flex-direction: column; gap: 4px; }
.dash-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: var(--radius-sm); font-size: 12px;
  transition: background .15s; cursor: default; position: relative; overflow: hidden;
}
.dash-item:hover { background: rgba(255,255,255,.02); }
.di-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.di-dot.done { background: var(--green); opacity: .7; }
.di-dot.running { background: var(--blue); animation: dotPulse 1.5s ease-in-out infinite; }
.di-dot.pending { border: 1px solid var(--text-faint); }
.di-label { color: var(--text-dim); flex: 1; }
.di-meta { font-size: 10px; color: var(--text-muted); white-space: nowrap; }

.dash-item.running-item::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.04), rgba(96,165,250,.07), rgba(96,165,250,.04), transparent);
  background-size: 250% 100%; animation: itemShimmer 2.8s ease-in-out infinite;
  border-radius: var(--radius-sm);
}
@keyframes itemShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== RIGHT COLUMN: Stats + Feed ===== */
.right-col { display: flex; flex-direction: column; gap: 16px; }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card {
  background: rgba(255,255,255,.02); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
}
.sc-label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; font-weight: 600; }
.sc-value { font-size: 22px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.5px; }
.sc-bar { height: 3px; border-radius: 2px; background: rgba(148,163,184,.06); overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width .7s var(--ease); }

/* ===== LIVE ACTIVITY FEED ===== */
.feed-section { }
.feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.feed-title {
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: .6px; font-weight: 600;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; font-weight: 800; color: var(--red);
  background: var(--red-dim); padding: 2px 8px 2px 6px;
  border-radius: 4px; letter-spacing: .6px; text-transform: uppercase;
}
.live-badge-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: liveBlink 1.3s ease-in-out infinite;
}
@keyframes liveBlink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

.feed-count { margin-left: auto; font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums; }

.feed-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
.feed-list::-webkit-scrollbar { width: 3px; }
.feed-list::-webkit-scrollbar-track { background: transparent; }
.feed-list::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

.feed-event {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
  border-radius: 7px; font-size: 11px;
  background: rgba(255,255,255,.015); border: 1px solid transparent;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(8px); animation: feedIn .4s var(--ease) forwards;
}
.feed-event.is-new { border-color: rgba(96,165,250,.12); background: rgba(96,165,250,.03); }
.feed-event.is-new::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.05), transparent);
  background-size: 300% 100%; animation: feedShimmer 2s ease-in-out;
}
@keyframes feedShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes feedIn { to { opacity: 1; transform: translateY(0); } }

.fe-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  font-weight: 500; flex-shrink: 0; width: 42px; padding-top: 1px;
}
.fe-icon {
  width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center;
  font-size: 9px; flex-shrink: 0;
}
.fe-body { flex: 1; min-width: 0; }
.fe-module { font-size: 9px; font-weight: 700; margin-bottom: 1px; display: flex; align-items: center; gap: 5px; }
.fe-module-tag { font-size: 7px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.fe-text { color: var(--text-dim); font-size: 11px; line-height: 1.4; }
.fe-type {
  font-size: 7px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0; margin-left: auto; align-self: flex-start;
}
.fe-type.t-gen   { background: var(--blue-dim); color: var(--blue); }
.fe-type.t-ok    { background: var(--green-dim); color: var(--green); }
.fe-type.t-warn  { background: var(--orange-dim); color: var(--orange); }
.fe-type.t-score { background: var(--purple-dim); color: var(--purple); }
.fe-type.t-info  { background: var(--cyan-dim); color: var(--cyan); }

/* ===== HOVER TOOLTIP (400px) ===== */
.tooltip {
  position: fixed; z-index: 500; pointer-events: none;
  width: 400px; max-width: 90vw;
  background: rgba(12,18,32,.92); backdrop-filter: blur(20px) saturate(1.3);
  border: 1px solid var(--border-hi); border-radius: var(--radius);
  padding: 18px 20px; box-shadow: 0 16px 48px rgba(0,0,0,.5), 0 0 1px rgba(255,255,255,.05);
  opacity: 0; transform: translateY(6px);
  transition: opacity .2s, transform .2s;
}
.tooltip.show { opacity: 1; transform: translateY(0); }
.tooltip .tt-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.tooltip .tt-dot { width: 8px; height: 8px; border-radius: 50%; }
.tooltip .tt-title { font-size: 13px; font-weight: 700; color: var(--text); }
.tooltip .tt-badge {
  font-size: 8px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
  text-transform: uppercase; margin-left: auto;
}
.tooltip .tt-summary { font-size: 12px; line-height: 1.65; color: var(--text-dim); font-style: italic; margin-bottom: 10px; }
.tooltip .tt-items { display: flex; flex-direction: column; gap: 3px; }
.tooltip .tt-item { display: flex; align-items: center; gap: 7px; font-size: 11px; padding: 3px 0; }
.tooltip .tt-item-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.tooltip .tt-item-label { color: var(--text-dim); }
.tooltip .tt-item-meta { margin-left: auto; font-size: 10px; color: var(--text-muted); }

/* ===== MULTI-TARGET DOTS ===== */
#dotCanvas {
  position: fixed; inset: 0; z-index: 50; pointer-events: none;
}

/* ===== MODULE CARD HOVER MICRO-INTERACTIONS ===== */
.mod-card .mc-icon { transition: transform .3s var(--ease-spring), box-shadow .3s; }
.mod-card:hover .mc-icon { transform: scale(1.08); }
.mod-card.active .mc-icon {
  animation: iconFloat 3s ease-in-out infinite;
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

/* Module card active running indicator */
.mod-card.active .mc-title::after {
  content: '';
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--blue); margin-left: 8px; vertical-align: middle;
  animation: titleDotBlink 1.5s ease-in-out infinite;
}
@keyframes titleDotBlink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* Sidebar mini-map indicator */
.sidebar-btn::before {
  content: ''; position: absolute; left: -1px; top: 50%; transform: translateY(-50%);
  width: 2px; height: 0; border-radius: 1px; transition: height .2s var(--ease);
}
.sidebar-btn.active::before { height: 18px; }
.sidebar-btn[data-mod="0"]::before { background: var(--purple); }
.sidebar-btn[data-mod="1"]::before { background: var(--blue); }
.sidebar-btn[data-mod="2"]::before { background: var(--orange); }

/* Sidebar progress mini-bars */
.sidebar-progress {
  width: 28px; height: 2px; border-radius: 1px; background: rgba(148,163,184,.06);
  overflow: hidden; margin-top: 2px;
}
.sidebar-progress-fill { height: 100%; border-radius: 1px; transition: width .6s var(--ease); }

/* ===== SUB-ROW RUNNING SHIMMER ===== */
.sub-row.active-sub::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.02), rgba(96,165,250,.05), rgba(96,165,250,.02), transparent);
  background-size: 250% 100%; animation: subRowShimmer 3s ease-in-out infinite;
  border-radius: var(--radius-sm);
}
@keyframes subRowShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== CHILD ROW RUNNING SHIMMER ===== */
.child-row.active-child::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.02), rgba(96,165,250,.04), rgba(96,165,250,.02), transparent);
  background-size: 250% 100%; animation: subRowShimmer 3.5s ease-in-out infinite;
  border-radius: 6px;
}

/* ===== TREE GROW ANIMATION ===== */
@keyframes treeGrow {
  from { max-height: 0; opacity: 0; }
  to { max-height: 600px; opacity: 1; }
}
.tree-list.growing { animation: treeGrow .5s var(--ease) forwards; }

/* ===== DASHBOARD SLIDE ANIMATION ===== */
.dashboard { transition: max-height .55s var(--ease), opacity .4s, margin-top .4s, padding .4s; }
.dashboard.open { padding: 0; }
.panel { transition: transform .35s var(--ease), opacity .3s; }
.dashboard.open .panel { transform: translateY(0); opacity: 1; }
.dashboard.hidden .panel { transform: translateY(12px); opacity: 0; }

/* Panel accent lines */
.panel[id="leftPanel"]::before { background: linear-gradient(90deg, transparent, var(--blue), transparent); opacity: .3; }
.panel[id="rightPanel"]::before { background: linear-gradient(90deg, transparent, rgba(148,163,184,.15), transparent); }

/* ===== STAT CARD MICRO ANIMATIONS ===== */
.stat-card { transition: transform .2s var(--ease), border-color .2s; }
.stat-card:hover { transform: translateY(-1px); border-color: var(--border-hi); }
.sc-value { transition: color .3s; }

/* ===== FEED EVENT ENTER STAGGER ===== */
.feed-event:nth-child(1) { animation-delay: 0ms; }
.feed-event:nth-child(2) { animation-delay: 60ms; }
.feed-event:nth-child(3) { animation-delay: 120ms; }
.feed-event:nth-child(4) { animation-delay: 180ms; }
.feed-event:nth-child(5) { animation-delay: 240ms; }
.feed-event:nth-child(6) { animation-delay: 300ms; }
.feed-event:nth-child(7) { animation-delay: 360ms; }
.feed-event:nth-child(8) { animation-delay: 420ms; }

/* ===== TOOLTIP ENHANCEMENTS ===== */
.tooltip::before {
  content: ''; position: absolute; top: 0; left: 16px; right: 16px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.2), transparent);
  border-radius: 0 0 1px 1px;
}
.tooltip .tt-progress {
  height: 2px; border-radius: 1px; background: rgba(148,163,184,.06);
  overflow: hidden; margin: 8px 0 12px;
}
.tooltip .tt-progress-fill { height: 100%; border-radius: 1px; transition: width .5s var(--ease); }

/* ===== RUNNING SPINNER for active badges ===== */
.mc-badge.running::before, .sub-badge.running::before, .dash-badge.running::before {
  content: ''; display: inline-block; width: 8px; height: 8px;
  border: 1.5px solid transparent; border-top-color: currentColor;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
  animation: spinBadge .8s linear infinite;
}
@keyframes spinBadge { to { transform: rotate(360deg); } }

/* ===== FOCUS RING for keyboard nav ===== */
.mod-card:focus-visible, .sub-row:focus-visible {
  outline: 2px solid var(--blue); outline-offset: 2px;
}

/* ===== KEYBOARD HINT ===== */
.kbd-hint {
  position: fixed; bottom: 10px; right: 16px; font-size: 10px; color: var(--text-faint); z-index: 100;
  display: flex; align-items: center; gap: 8px;
  background: rgba(6,9,15,.7); backdrop-filter: blur(10px);
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
}
.kbd-hint kbd {
  display: inline-block; padding: 1px 5px; background: rgba(30,41,59,.7);
  border: 1px solid var(--border); border-radius: 3px;
  font-family: inherit; font-size: 9px; color: var(--text-muted);
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(148,163,184,.12); border-radius: 3px; }
</style>

function buildSparklineSVG(data, color) {
  const w = 200, h = 28, pad = 2;
  const max = Math.max(...data, 1);
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - (v / max) * (h - pad * 2);
    return `${x},${y}`;
  });
  const linePath = `M${pts.join(' L')}`;
  const areaPath = `${linePath} L${w - pad},${h} L${pad},${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="sparkline-area" d="${areaPath}" fill="${color}"/>
    <path class="sparkline-path" d="${linePath}" stroke="${color}"/>
  </svg>`;
}

function selectModule(mi) {
  if (selectedMod === mi) {
    selectedMod = -1;
    selectedSub = -1;
    closeDashboard();
    updateBreadcrumb(null);
    return;
  }
  selectedMod = mi;
  selectedSub = -1;
  closeDashboard();
  updateBreadcrumb(MODULES[mi].label);
  highlightModule(mi);
}

function selectSub(mi, si) {
  if (selectedMod === mi && selectedSub === si) {
    closeDashboard();
    selectedSub = -1;
    return;
  }
  selectedMod = mi;
  selectedSub = si;
  highlightModule(mi);
  highlightSub(mi, si);
  openDashboard(mi, si);
}

function highlightModule(mi) {
  document.querySelectorAll('.sidebar-btn').forEach((b, i) => b.classList.toggle('active', i === mi));

function highlightSub(mi, si) {
  document.querySelectorAll('.sub-row').forEach(r => r.classList.remove('selected'));
  const target = document.querySelector(`.sub-row[data-mod="${mi}"][data-sub="${si}"]`);

/* ====================================================================
   AMBIENT PARTICLE SYSTEM
   ==================================================================== */
function initAmbientParticles() {
  const canvas = document.getElementById('ambientCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const COUNT = 60;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - .5) * .15,
      vy: (Math.random() - .5) * .1,
      r: Math.random() * 1.5 + .5,
      o: Math.random() * .15 + .03,
      color: ['rgba(167,139,250,', 'rgba(96,165,250,', 'rgba(251,146,60,'][Math.floor(Math.random() * 3)],
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color + p.o + ')';
      ctx.fill();
    });

    // Connection lines
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(148,163,184,${.015 * (1 - dist / 120)})`;
          ctx.lineWidth = .5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

/* ====================================================================
   MULTI-TARGET DOT SYSTEM
   ==================================================================== */
function initDotSystem() {
  const canvas = document.getElementById('dotCanvas');
  const ctx = canvas.getContext('2d');
  let dots = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function getTargetRects() {
    const targets = [];
    // Find all running sub-rows and child-rows
    document.querySelectorAll('.sub-row.active-sub, .child-row.active-child').forEach(el => {
      const rect = el.getBoundingClientRect();
      targets.push({
        x: rect.left + 5,
        y: rect.top + rect.height / 2,
        color: el.closest('.tree-col')?.dataset.color || 'blue',
      });
    });
    return targets;
  }

  function getSourceRect() {
    const activeCard = document.querySelector('.mod-card.active');
    if (!activeCard) return null;
    const rect = activeCard.getBoundingClientRect();
    return { x: rect.left + rect.width / 2, y: rect.bottom };
  }

  function spawnDot(src, tgt) {
    const c = COLOR_MAP[tgt.color] || COLOR_MAP.blue;
    dots.push({
      x: src.x + (Math.random() - .5) * 30,
      y: src.y,
      tx: tgt.x + (Math.random() - .5) * 8,
      ty: tgt.y + (Math.random() - .5) * 4,
      progress: 0,
      speed: .008 + Math.random() * .006,
      color: c.main,
      glow: c.glow,
      r: 2 + Math.random() * 1.5,
      trail: [],
    });
  }

  let spawnTimer = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const src = getSourceRect();
    const targets = getTargetRects();

    if (src && targets.length > 0) {
      spawnTimer++;
      if (spawnTimer % 12 === 0) {
        const tgt = targets[Math.floor(Math.random() * targets.length)];
        spawnDot(src, tgt);
      }
    }

    dots = dots.filter(d => d.progress <= 1);
    dots.forEach(d => {
      d.progress += d.speed;
      const t = d.progress;
      const ct = 1 - t;

      // Bezier control point
      const cx = (d.x + d.tx) / 2 + (Math.random() - .5) * 2;
      const cy = d.y + (d.ty - d.y) * .3;

      d.x = ct * ct * d.x + 2 * ct * t * cx + t * t * d.tx;
      d.y = ct * ct * d.y + 2 * ct * t * cy + t * t * d.ty;

      d.trail.push({ x: d.x, y: d.y });
      if (d.trail.length > 8) d.trail.shift();

      // Trail
      for (let i = 0; i < d.trail.length - 1; i++) {
        const alpha = (i / d.trail.length) * .3;
        ctx.beginPath();
        ctx.moveTo(d.trail[i].x, d.trail[i].y);
        ctx.lineTo(d.trail[i + 1].x, d.trail[i + 1].y);
        ctx.strokeStyle = d.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
        ctx.lineWidth = d.r * .6;
        ctx.stroke();
      }

      // Dot
      const alpha = t < .1 ? t * 10 : t > .9 ? (1 - t) * 10 : 1;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = d.color;
      ctx.globalAlpha = alpha * .8;
      ctx.fill();

      // Glow
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r * 3, 0, Math.PI * 2);
      ctx.fillStyle = d.glow;
      ctx.globalAlpha = alpha * .3;
      ctx.fill();

      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(draw);
  }
  draw();
}

/* ====================================================================
   KEYBOARD NAVIGATION
   ==================================================================== */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    selectModule(Math.min(selectedMod + 1, MODULES.length - 1));
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectModule(Math.max(selectedMod - 1, 0));
  } else if (e.key === 'ArrowDown' && selectedMod >= 0) {
    e.preventDefault();
    const maxSub = MODULES[selectedMod].subs.length - 1;
    selectSub(selectedMod, Math.min(selectedSub + 1, maxSub));
  } else if (e.key === 'ArrowUp' && selectedMod >= 0) {
    e.preventDefault();
    if (selectedSub <= 0) {
      selectedSub = -1;
      closeDashboard();
    } else {
      selectSub(selectedMod, selectedSub - 1);
    }
  } else if (e.key === 'Escape') {
    selectedMod = -1;
    selectedSub = -1;
    closeDashboard();
    updateBreadcrumb(null);
    highlightModule(-1);
  }
});

/* Sidebar nav */
document.querySelectorAll('.sidebar-btn[data-mod]').forEach(btn => {
  btn.addEventListener('click', () => {
    const mi = parseInt(btn.dataset.mod);
    selectModule(mi);
  });
});

/* ====================================================================
   LIVE TIMER SYSTEM
   ==================================================================== */
let baseTime = 18 * 60 + 42; // 18m 42s
function initLiveTimer() {
  setInterval(() => {
    baseTime++;
    const m = Math.floor(baseTime / 60);
    const s = baseTime % 60;
    const timeStr = `${m}m ${String(s).padStart(2, '0')}s`;
    document.getElementById('hTime').textContent = timeStr;

    // Slowly increment cost
    const baseCost = 3.87 + (baseTime - (18 * 60 + 42)) * 0.002;
    document.getElementById('hCost').textContent = '$' + baseCost.toFixed(2);

    // Slowly increment progress ring
    const progress = Math.min(42 + (baseTime - (18 * 60 + 42)) * 0.015, 65);
    const circumference = 94.25;
    const offset = circumference * (1 - progress / 100);
    document.getElementById('hRingFill').setAttribute('stroke-dashoffset', offset.toFixed(2));
    document.getElementById('hRingLabel').textContent = Math.round(progress) + '%';
  }, 1000);
}

/* ====================================================================
   SPARKLINE HOVER INTERACTION
   ==================================================================== */
function initSparklineHover() {
  document.querySelectorAll('.mc-sparkline-wrap').forEach(wrap => {
    wrap.addEventListener('mousemove', (e) => {
      const rect = wrap.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pct = Math.round((x / rect.width) * 100);
      wrap.title = `${pct}% through this module`;
    });
  });
}

/* ====================================================================
   STAGGERED ENTRY ANIMATIONS
   ==================================================================== */
function animateEntry() {
  // Cards fade in with stagger
  document.querySelectorAll('.mod-card').forEach((card, i) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(16px)';
    card.style.transition = 'opacity .5s var(--ease), transform .5s var(--ease)';
    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 100 + i * 120);
  });

  // Tree columns slide in
  document.querySelectorAll('.tree-col').forEach((col, i) => {
    col.style.opacity = '0';
    col.style.transform = 'translateY(12px)';
    col.style.transition = 'opacity .4s var(--ease), transform .4s var(--ease)';
    setTimeout(() => {
      col.style.opacity = '1';
      col.style.transform = 'translateY(0)';
    }, 350 + i * 100);
  });
}

/* ====================================================================
   PERIODIC FEED UPDATE (simulated live events)
   ==================================================================== */
const LIVE_EVENTS = [
  'Gradient norm stabilized at 0.42 for hypothesis 7 epoch 12',
  'Memory checkpoint written: 847MB compressed state',
  'Hypothesis 7 loss curve inflection detected at epoch 14',
  'Ablation #5 component removal: encoder self-attention',
  'Validation metric improved: BLEU +2.3 points on hypothesis 6',
  'Cross-attention weights converging for multi-modal fusion layer',
  'Batch processing rate: 142 samples/sec on A100 cluster',
  'Hypothesis 8 data preparation beginning -- dataset calibration in progress',
];
let feedEventIdx = 0;

function initPeriodicFeedUpdate() {
  setInterval(() => {
    const feedList = document.querySelector('.feed-list');
    if (!feedList) return;

    const evt = LIVE_EVENTS[feedEventIdx % LIVE_EVENTS.length];
    feedEventIdx++;

    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

    const eventEl = document.createElement('div');
    eventEl.className = 'feed-event is-new';
    eventEl.innerHTML = `
      <span class="fe-time">${timeStr}</span>
      <div class="fe-body">
        <div class="fe-text">${evt}</div>
      </div>
      <span class="fe-type t-info">Live</span>
    `;

    feedList.insertBefore(eventEl, feedList.firstChild);

    // Remove old events if too many
    while (feedList.children.length > 10) {
      feedList.removeChild(feedList.lastChild);
    }

    // Update count
    const countEl = feedList.closest('.feed-section')?.querySelector('.feed-count');
    if (countEl) {
      countEl.textContent = feedList.children.length + ' events';
    }
  }, 8000);
}

/* ====================================================================
   SIDEBAR PROGRESS BARS
   ==================================================================== */
function updateSidebarProgress() {
  document.querySelectorAll('.sidebar-btn[data-mod]').forEach(btn => {
    const mi = parseInt(btn.dataset.mod);
    const m = MODULES[mi];
    let bar = btn.querySelector('.sidebar-progress');
    if (!bar) {
      bar = document.createElement('div');
      bar.className = 'sidebar-progress';
      bar.innerHTML = '<div class="sidebar-progress-fill"></div>';
      btn.appendChild(bar);
    }
    const fill = bar.querySelector('.sidebar-progress-fill');
    const colors = { purple: 'var(--purple)', blue: 'var(--blue)', orange: 'var(--orange)' };
    fill.style.background = colors[m.color];
    requestAnimationFrame(() => {
      fill.style.width = m.progress + '%';
    });
  });
}

/* ====================================================================
   RESIZE HANDLER
   ==================================================================== */
function initResizeHandler() {
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      // Re-adjust tree list max-heights
      document.querySelectorAll('.tree-list:not(.collapsed)').forEach(list => {
        list.style.maxHeight = list.scrollHeight + 'px';
      });
    }, 150);
  });
}

/* ====================================================================
   INITIALIZE
   ==================================================================== */
renderModuleCards();
renderTreeColumns();
initAmbientParticles();
initDotSystem();
initLiveTimer();
initSparklineHover();
initResizeHandler();
updateSidebarProgress();

// Staggered entry
animateEntry();

// Auto-select module 1 (Test Ideas) after entry animations
setTimeout(() => selectModule(1), 600);
// Then open the "Run Simulations" sub
setTimeout(() => selectSub(1, 2), 1000);
// Start periodic feed updates after dashboard is open
setTimeout(() => initPeriodicFeedUpdate(), 2000);
</script>
