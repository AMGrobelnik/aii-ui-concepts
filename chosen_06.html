<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor -- Rich Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #161922;
    --surface-raised: #1c1f2e;
    --surface-hover: #22263a;
    --border: #1e2235;
    --border-light: #2a2f48;
    --text: #e2e5ee;
    --text-dim: #7a82a0;
    --text-muted: #454b64;
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --cyan: #22d3ee;
    --cyan-dim: rgba(34,211,238,0.10);
    --gray-ring: #2a2e40;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
    line-height: 1.5; overflow: hidden;
  }
  body { display: flex; }

  /* ================================================================
     SIDEBAR
     ================================================================ */
  .sidebar {
    width: 280px; min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
    position: relative;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-weight: 700; font-size: 15px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.3px;
  }
  .run-label {
    font-size: 11px; color: var(--text-muted);
    margin-top: 4px; display: flex; align-items: center; gap: 6px;
  }
  .run-label .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Ring gauge in sidebar */
  .ring-container {
    display: flex; justify-content: center;
    padding: 20px 16px 12px; position: relative;
  }
  .ring-svg-main { overflow: visible; }

  /* Module cards */
  .module-list {
    flex: 1; overflow-y: auto; padding: 4px 12px 12px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .module-list::-webkit-scrollbar { width: 4px; }
  .module-list::-webkit-scrollbar-track { background: transparent; }
  .module-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .module-card {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 6px; cursor: pointer;
    transition: all 200ms var(--ease);
    position: relative; overflow: hidden;
  }
  .module-card:hover { background: var(--surface-hover); border-color: var(--border-light); }
  .module-card.selected { border-color: var(--blue); box-shadow: 0 0 20px rgba(96,165,250,0.08); }
  .module-card.selected::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; border-radius: 10px 0 0 10px;
  }
  .module-card.selected[data-color="green"]::before { background: var(--green); }
  .module-card.selected[data-color="purple"]::before { background: var(--purple); }
  .module-card.selected[data-color="blue"]::before { background: var(--blue); }
  .module-card.selected[data-color="gray"]::before { background: var(--text-muted); }

  .mc-top { display: flex; align-items: center; justify-content: space-between; }
  .mc-name { font-weight: 600; font-size: 13px; }
  .mc-badge {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 8px; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .mc-badge.completed { background: var(--green-dim); color: var(--green); }
  .mc-badge.running   { background: var(--blue-dim);  color: var(--blue); }
  .mc-badge.pending   { background: rgba(100,110,140,0.10); color: var(--text-muted); }

  .mc-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .mc-bar-fill { height: 100%; border-radius: 2px; transition: width 800ms var(--ease); }

  /* Sub-modules */
  .sub-modules {
    max-height: 0; overflow: hidden; opacity: 0;
    transition: max-height 350ms var(--ease), opacity 300ms var(--ease), margin 300ms var(--ease);
  }
  .module-card.selected .sub-modules { max-height: 600px; opacity: 1; margin-top: 10px; }

  .sub-mod {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 6px;
    cursor: pointer; transition: all 150ms var(--ease);
    font-size: 12px; margin-bottom: 2px;
  }
  .sub-mod:hover { background: rgba(255,255,255,0.04); }
  .sub-mod.active { background: rgba(96,165,250,0.08); }
  .sub-mod-icon {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .sub-mod-icon.completed { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }
  .sub-mod-icon.running   { background: var(--blue); box-shadow: 0 0 6px rgba(96,165,250,0.4); animation: pulse-dot 1.5s infinite; }
  .sub-mod-icon.pending   { background: var(--text-muted); }
  .sub-mod-name { flex: 1; font-weight: 500; }
  .sub-mod-time { color: var(--text-muted); font-size: 11px; }

  /* Particle canvas */
  .particle-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 10px 16px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-muted);
    display: flex; justify-content: space-between;
  }
  .sidebar-footer .timer { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ================================================================
     MAIN CONTENT
     ================================================================ */
  .main-content {
    flex: 1; overflow-y: auto; padding: 28px 36px;
    scroll-behavior: smooth;
  }
  .main-content::-webkit-scrollbar { width: 6px; }
  .main-content::-webkit-scrollbar-track { background: transparent; }
  .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Dashboard header */
  .dash-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px; animation: fadeUp 400ms var(--ease);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .dash-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .dash-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .dash-subtitle {
    font-size: 13px; color: var(--text-dim); margin-top: 2px; line-height: 1.5;
  }

  /* Summary card */
  .summary-card {
    background: var(--surface-raised); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 22px; margin-bottom: 20px;
    animation: fadeUp 450ms var(--ease);
  }
  .summary-text {
    font-size: 13px; color: var(--text-dim); line-height: 1.7;
    font-style: italic;
  }
  .summary-text::before { content: '"'; font-size: 22px; color: var(--purple); line-height: 0; vertical-align: -6px; margin-right: 2px; }
  .summary-text::after  { content: '"'; font-size: 22px; color: var(--purple); line-height: 0; vertical-align: -6px; margin-left: 2px; }

  /* ================================================================
     STAT CARDS (4-column grid)
     ================================================================ */
  .stat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 14px; margin-bottom: 20px;
    animation: fadeUp 500ms var(--ease);
  }
  .stat-card {
    background: var(--surface-raised); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
    transition: border-color 200ms var(--ease);
  }
  .stat-card:hover { border-color: var(--border-light); }
  .sc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sc-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .sc-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .sc-pct {
    font-size: 11px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px; margin-left: 8px;
  }

  /* Bar containers */
  .bar-track {
    height: 8px; background: rgba(255,255,255,0.04);
    border-radius: 4px; overflow: hidden; margin-top: 8px;
  }
  .bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s var(--ease);
  }

  /* Stacked bar (messages) */
  .stacked-bar {
    display: flex; height: 8px; border-radius: 4px; overflow: hidden;
    margin-top: 8px; background: rgba(255,255,255,0.04);
  }
  .stacked-seg {
    height: 100%; transition: width 800ms var(--ease);
    min-width: 2px;
  }

  /* Legend for stacked bar */
  .bar-legend {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--text-dim);
  }
  .legend-dot {
    width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0;
  }

  /* Dual bar (tokens) */
  .dual-bar-wrap { margin-top: 8px; }
  .dual-bar-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
  }
  .dual-bar-label { font-size: 10px; color: var(--text-muted); width: 24px; text-align: right; }
  .dual-bar-track {
    flex: 1; height: 6px; background: rgba(255,255,255,0.04);
    border-radius: 3px; overflow: hidden;
  }
  .dual-bar-fill { height: 100%; border-radius: 3px; transition: width 800ms var(--ease); }
  .dual-bar-val { font-size: 10px; color: var(--text-dim); min-width: 36px; font-variant-numeric: tabular-nums; }

  /* ================================================================
     MINI TIMELINE (Gantt-like)
     ================================================================ */
  .mini-timeline {
    background: var(--surface-raised); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    animation: fadeUp 550ms var(--ease);
  }
  .mt-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px; }
  .mt-track {
    position: relative; height: 20px;
    background: rgba(255,255,255,0.03);
    border-radius: 6px; overflow: hidden;
  }
  .mt-segment {
    position: absolute; top: 2px; bottom: 2px;
    border-radius: 4px; transition: left 600ms var(--ease), width 600ms var(--ease);
  }
  .mt-ticks {
    display: flex; justify-content: space-between; margin-top: 6px;
    font-size: 10px; color: var(--text-muted); font-variant-numeric: tabular-nums;
  }
  .mt-caption {
    font-size: 11px; color: var(--text-dim); margin-top: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .mt-caption .marker {
    display: inline-block; width: 12px; height: 4px; border-radius: 2px;
  }

  /* ================================================================
     ACTIVITY BREAKDOWN TABLE
     ================================================================ */
  .activity-breakdown {
    background: var(--surface-raised); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px;
    animation: fadeUp 600ms var(--ease); margin-bottom: 20px;
  }
  .ab-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px; }
  .ab-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .ab-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 13px;
  }
  .ab-row:nth-child(odd) { background: rgba(255,255,255,0.015); border-radius: 4px 0 0 4px; }
  .ab-row:nth-child(even) { border-radius: 0 4px 4px 0; }
  .ab-metric { color: var(--text-dim); }
  .ab-value { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ================================================================
     PLACEHOLDER / WELCOME
     ================================================================ */
  .welcome-panel {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted);
    text-align: center; padding: 40px;
  }
  .welcome-panel .big-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .welcome-panel .hint { font-size: 13px; max-width: 300px; line-height: 1.6; }

  /* ================================================================
     UTILITY
     ================================================================ */
  .tag-green  { color: var(--green); }
  .tag-blue   { color: var(--blue); }
  .tag-purple { color: var(--purple); }
  .tag-amber  { color: var(--amber); }
  .tag-red    { color: var(--red); }
  .tag-cyan   { color: var(--cyan); }
  .tag-dim    { color: var(--text-muted); }
</style>
</head>
<body>

<!-- Hidden SVG definitions -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>

      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>

      <feFlood flood-color="#60a5fa" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>

    <linearGradient id="grad-gray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a3f55"/><stop offset="100%" stop-color="#2a2e40"/>
    </linearGradient>
  </defs>
</svg>

<!-- ================================================================
     SIDEBAR
     ================================================================ -->
<aside class="sidebar">
  <canvas class="particle-canvas" id="particleCanvas"></canvas>

  <div class="sidebar-header">
    <div class="brand">AI Inventor</div>
    <div class="run-label"><span class="dot"></span> ssl-low-resource-v3</div>
  </div>

  <!-- Central ring gauge -->
  <div class="ring-container" id="ringContainer"></div>

  <!-- Module cards with sub-modules -->
  <div class="module-list" id="moduleList"></div>

  <div class="sidebar-footer">
    <span>Cost <b class="tag-amber">$12.47</b></span>
    <span class="timer" id="timerDisplay">02:34:17</span>

</aside>

<!-- ================================================================
     MAIN CONTENT
     ================================================================ -->
<main class="main-content" id="mainContent">
  <div class="welcome-panel" id="welcomePanel">
    <div class="big-icon">&#9881;</div>
    <div class="hint">Select a sub-module from the sidebar to view detailed execution stats and activity breakdown.</div>
  </div>
  <div id="dashboardContent" style="display:none;"></div>
</main>

function colorVar(c) {
  return { green: '#34d399', purple: '#a78bfa', blue: '#60a5fa', gray: '#454b64', amber: '#fbbf24', red: '#f87171', cyan: '#22d3ee' }[c] || '#fff';
}
function colorVarDim(c) {
  return { green: 'rgba(52,211,153,0.12)', purple: 'rgba(167,139,250,0.12)', blue: 'rgba(96,165,250,0.12)', gray: 'rgba(100,110,140,0.10)' }[c] || 'rgba(255,255,255,0.05)';
}

/* ==================================================================
   RING GAUGE (sidebar central)
   ================================================================== */
const R = 42, STROKE = 6, CX = 56, CY = 56, CIRC = 2 * Math.PI * R;

function renderRingGauge() {
  const container = document.getElementById('ringContainer');
  container.innerHTML = '';
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 112 112');
  svg.setAttribute('width', '112');
  svg.setAttribute('height', '112');
  svg.classList.add('ring-svg-main');
  svg.style.overflow = 'visible';

  // Concentric rings for each module (outer to inner)
  const ringData = [
    { mod: MODULES[0], r: 50, sw: 5 },
    { mod: MODULES[1], r: 42, sw: 5 },
    { mod: MODULES[2], r: 34, sw: 5 },
    { mod: MODULES[3], r: 26, sw: 5 },
  ];

  ringData.forEach(({ mod, r, sw }) => {
    const circ = 2 * Math.PI * r;

    // Track
    const track = document.createElementNS(ns, 'circle');
    track.setAttribute('cx', CX); track.setAttribute('cy', CY); track.setAttribute('r', r);
    track.setAttribute('fill', 'none');
    track.setAttribute('stroke', mod.status === 'pending' ? 'var(--gray-ring)' : 'rgba(255,255,255,0.04)');
    track.setAttribute('stroke-width', sw);
    if (mod.status === 'pending') {
      track.setAttribute('stroke-dasharray', '5 3');
      track.setAttribute('opacity', '0.5');
    }
    svg.appendChild(track);

    // Arc fill
    if (mod.pct > 0) {
      const arc = document.createElementNS(ns, 'circle');
      arc.setAttribute('cx', CX); arc.setAttribute('cy', CY); arc.setAttribute('r', r);
      arc.setAttribute('fill', 'none');
      arc.setAttribute('stroke', mod.gradient);
      arc.setAttribute('stroke-width', sw);
      arc.setAttribute('stroke-linecap', 'round');
      arc.setAttribute('stroke-dasharray', circ);
      arc.setAttribute('stroke-dashoffset', circ);
      arc.setAttribute('transform', `rotate(-90 ${CX} ${CY})`);
      arc.classList.add('ring-arc');
      arc.dataset.circ = circ;
      arc.dataset.pct = mod.pct;
      if (mod.glow) arc.setAttribute('filter', mod.glow);
      svg.appendChild(arc);

      // Glow dot for active ring
      if (mod.status === 'active') {
        const dot = document.createElementNS(ns, 'circle');
        dot.setAttribute('r', '3');
        dot.setAttribute('fill', colorVar(mod.color));
        dot.setAttribute('filter', 'url(#glow-blue-bright)');
        dot.classList.add('ring-dot');
        dot.dataset.r = r;
        dot.dataset.pct = mod.pct;
        svg.appendChild(dot);
      }
    }
  });

  // Center text -- overall progress
  const pctDone = MODULES.filter(m => m.status === 'completed').length;
  const total = MODULES.length;
  const txt = document.createElementNS(ns, 'text');
  txt.setAttribute('x', CX); txt.setAttribute('y', CY - 4);
  txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'central');
  txt.setAttribute('fill', 'var(--text)'); txt.setAttribute('font-family', 'Inter, system-ui, sans-serif');
  txt.setAttribute('font-weight', '700'); txt.setAttribute('font-size', '16');
  txt.textContent = `${pctDone}/${total}`;
  svg.appendChild(txt);

  const sub = document.createElementNS(ns, 'text');
  sub.setAttribute('x', CX); sub.setAttribute('y', CY + 14);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('dominant-baseline', 'central');
  sub.setAttribute('fill', 'var(--text-muted)'); sub.setAttribute('font-family', 'Inter, system-ui, sans-serif');
  sub.setAttribute('font-size', '9');
  sub.textContent = 'modules';
  svg.appendChild(sub);

  container.appendChild(svg);

  // Animate arcs
  requestAnimationFrame(() => {
    setTimeout(() => {
      svg.querySelectorAll('.ring-arc').forEach(arc => {
        const c = parseFloat(arc.dataset.circ);
        const p = parseFloat(arc.dataset.pct);
        arc.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
        arc.setAttribute('stroke-dashoffset', c * (1 - p));
      });
      updateDots(svg);
    }, 150);
  });

  // Drift animation for active rings
  let phase = 0;
  function drift() {
    phase += 0.015;
    svg.querySelectorAll('.ring-arc').forEach(arc => {
      const mod = MODULES.find(m => m.status === 'active');
      if (!mod) return;
      // Only drift the active ring
      const basePct = parseFloat(arc.dataset.pct);
      if (basePct < 1 && basePct > 0) {
        const d = Math.sin(phase) * 0.02;
        const c = parseFloat(arc.dataset.circ);
        arc.setAttribute('stroke-dashoffset', c * (1 - (basePct + d)));
      }
    });
    svg.querySelectorAll('.ring-dot').forEach(dot => {
      const basePct = parseFloat(dot.dataset.pct);
      const r = parseFloat(dot.dataset.r);
      const d = Math.sin(phase) * 0.02;
      const angle = -90 + ((basePct + d) * 360);
      const rad = (angle * Math.PI) / 180;
      dot.setAttribute('cx', CX + r * Math.cos(rad));
      dot.setAttribute('cy', CY + r * Math.sin(rad));
      dot.setAttribute('opacity', 0.7 + 0.3 * Math.sin(phase * 3));
    });
    requestAnimationFrame(drift);
  }
  requestAnimationFrame(drift);
}

function updateDots(svg) {
  svg.querySelectorAll('.ring-dot').forEach(dot => {
    const pct = parseFloat(dot.dataset.pct);
    const r = parseFloat(dot.dataset.r);
    const angle = -90 + (pct * 360);
    const rad = (angle * Math.PI) / 180;
    dot.setAttribute('cx', CX + r * Math.cos(rad));
    dot.setAttribute('cy', CY + r * Math.sin(rad));
  });
}

/* ==================================================================
   PARTICLE FLOW
   ================================================================== */
function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const sidebar = canvas.parentElement;
  const ctx = canvas.getContext('2d');
  let particles = [];
  const MAX = 30;

  function resize() {
    canvas.width = sidebar.offsetWidth;
    canvas.height = sidebar.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function spawn() {
    if (particles.length >= MAX) return;
    particles.push({
      x: Math.random() * canvas.width,
      y: canvas.height + 5,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -(0.3 + Math.random() * 0.5),
      r: 1 + Math.random() * 1.5,
      alpha: 0.15 + Math.random() * 0.2,
      color: ['#34d399', '#a78bfa', '#60a5fa'][Math.floor(Math.random() * 3)],
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= 0.001;
      if (p.y < -10 || p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if (Math.random() < 0.15) spawn();
    requestAnimationFrame(animate);
  }
  animate();
}

   ================================================================== */
let selectedModIdx = 2;
let selectedSubIdx = 2; // gen_art in Invention Loop

function renderModuleList() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';

  MODULES.forEach((mod, mi) => {
    const card = document.createElement('div');
    card.className = `module-card${mi === selectedModIdx ? ' selected' : ''}`;
    card.dataset.color = mod.color;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.sub-mod')) return;
      if (selectedModIdx === mi) return;
      selectedModIdx = mi;
      selectedSubIdx = -1;
      renderModuleList();
      showWelcome();
    });

    const badgeCls = mod.status === 'completed' ? 'completed' : mod.status === 'active' ? 'running' : 'pending';
    const badgeText = mod.status === 'completed' ? 'Done' : mod.status === 'active' ? 'Running' : 'Pending';

    card.innerHTML = `
      <div class="mc-top">
        <div class="mc-name">${mod.name}</div>
        <div class="mc-badge ${badgeCls}">${badgeText}</div>
      </div>
      <div class="mc-bar"><div class="mc-bar-fill" style="width:${mod.pct * 100}%;background:${colorVar(mod.color)}"></div></div>
    `;

    // Sub-modules
    const subsDiv = document.createElement('div');
    subsDiv.className = 'sub-modules';

    mod.subs.forEach((sub, si) => {
      const subEl = document.createElement('div');
      subEl.className = `sub-mod${mi === selectedModIdx && si === selectedSubIdx ? ' active' : ''}`;
      subEl.innerHTML = `
        <div class="sub-mod-icon ${sub.status}"></div>
        <div class="sub-mod-name">${sub.name}</div>
        <div class="sub-mod-time">${sub.time}</div>
      `;
      subEl.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedModIdx = mi;
        selectedSubIdx = si;
        renderModuleList();
        renderDashboard(mod, sub);
      });
      subsDiv.appendChild(subEl);
    });

    card.appendChild(subsDiv);
    list.appendChild(card);
  });
}

function showWelcome() {
  document.getElementById('welcomePanel').style.display = 'flex';
  document.getElementById('dashboardContent').style.display = 'none';
}

function parseCost(s) {
  if (!s || s === '---') return 0;
  return parseFloat(s.replace('$', ''));
}

function parseDuration(s) {
  if (!s || s === '---') return 0;
  const parts = s.replace('s', '').split('m ');
  if (parts.length === 2) return parseFloat(parts[0]) + parseFloat(parts[1]) / 60;
  return parseFloat(parts[0]);
}

function fmtK(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

    }, 50);
  });
}

/* ==================================================================
   TIMER
   ================================================================== */
let timerSec = 2 * 3600 + 34 * 60 + 17;
function tickTimer() {
  timerSec++;
  const h = String(Math.floor(timerSec / 3600)).padStart(2, '0');
  const m = String(Math.floor((timerSec % 3600) / 60)).padStart(2, '0');
  const s = String(timerSec % 60).padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
}
setInterval(tickTimer, 1000);

/* ==================================================================
   KEYBOARD NAVIGATION
   ================================================================== */
document.addEventListener('keydown', (e) => {
  const mod = MODULES[selectedModIdx];
  if (!mod) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (selectedSubIdx < mod.subs.length - 1) {
      selectedSubIdx++;
      renderModuleList();
      renderDashboard(mod, mod.subs[selectedSubIdx]);
    }
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (selectedSubIdx > 0) {
      selectedSubIdx--;
      renderModuleList();
      renderDashboard(mod, mod.subs[selectedSubIdx]);
    }
  }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (selectedModIdx < MODULES.length - 1) {
      selectedModIdx++;
      selectedSubIdx = 0;
      renderModuleList();
      renderDashboard(MODULES[selectedModIdx], MODULES[selectedModIdx].subs[0]);
    }
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (selectedModIdx > 0) {
      selectedModIdx--;
      selectedSubIdx = 0;
      renderModuleList();
      renderDashboard(MODULES[selectedModIdx], MODULES[selectedModIdx].subs[0]);
    }
  }
});

/* ==================================================================
   INIT
   ================================================================== */
renderRingGauge();
renderModuleList();
initParticles();

// Auto-select gen_art in Invention Loop
const initMod = MODULES[selectedModIdx];
const initSub = initMod.subs[selectedSubIdx];
renderDashboard(initMod, initSub);
</script>
