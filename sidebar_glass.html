<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar — Glass Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --radius: 14px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --blue: #3b82f6;
  --blue-light: rgba(59,130,246,.08);
  --purple: #7c5cfc;
  --green: #10b981;
  --orange: #f59e0b;
  --cyan: #06b6d4;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  /* Rich gradient background so glass effect is visible */
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(124,92,252,.15), transparent),
    radial-gradient(ellipse 500px 500px at 80% 70%, rgba(59,130,246,.12), transparent),
    radial-gradient(ellipse 400px 300px at 50% 40%, rgba(245,158,11,.06), transparent),
    linear-gradient(135deg, #f8f4ef 0%, #eee8e0 30%, #e8e0f0 60%, #dde8f8 100%);
  padding: 32px;
  color: #1a1a2e;
}
h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.subtitle { font-size: 12px; color: #7a7a94; margin-bottom: 32px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 272px);
  gap: 28px;
  margin-bottom: 48px;
}
.variant-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: #9e9eb5; margin-bottom: 10px;
}
.variant-note {
  font-size: 10px; color: #9e9eb5; font-style: italic; margin-top: 8px; max-width: 264px;
}

/* ===== SIDEBAR BASE ===== */
.sb {
  width: 264px;
  height: 560px;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ===== BRAND ===== */
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px 14px;
}
.sb-brand-logo {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  object-fit: contain;
}
.sb-brand-text { font-weight: 800; font-size: 14.5px; letter-spacing: -.3px; }

/* ===== NAV ===== */
.sb-nav { padding: 6px 10px; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .15s var(--ease);
  font-size: 13px; font-weight: 500; position: relative;
}
.sb-nav-icon { width: 20px; height: 20px; display: grid; place-items: center; flex-shrink: 0; }
.sb-nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.sb-nav-count {
  margin-left: auto; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 4px; font-variant-numeric: tabular-nums;
}
.sb-divider { height: 1px; margin: 6px 16px; }
.sb-section-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; padding: 10px 16px 4px;
}
.sb-items {
  padding: 4px 10px; flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.06) transparent;
}
.sb-items::-webkit-scrollbar { width: 4px; }
.sb-items::-webkit-scrollbar-track { background: transparent; }
.sb-items::-webkit-scrollbar-thumb { background: rgba(0,0,0,.06); border-radius: 2px; }
.sb-items[style*="flex:0"] { overflow: visible; }
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px;
  cursor: pointer; transition: background .15s;
  font-size: 12.5px; font-weight: 500;
}
.sb-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sb-item-star { font-size: 11px; flex-shrink: 0; width: 16px; text-align: center; }
.sb-item-text { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ======================================= */
/* GLASS VARIANTS                          */
/* ======================================= */

/* G1: Classic frosted — white glass, subtle border */
.g1 {
  background: rgba(255,255,255,.45);
  backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid rgba(255,255,255,.6);
  box-shadow: 0 4px 24px rgba(0,0,0,.06), inset 0 1px 0 rgba(255,255,255,.7);
}
.g1 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.g1 .sb-nav-item { color: #5a5a72; }
.g1 .sb-nav-item:hover { background: rgba(255,255,255,.4); color: #2a2a42; }
.g1 .sb-nav-item.active {
  background: rgba(255,255,255,.55); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.g1 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g1 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g1 .sb-nav-count { background: rgba(59,130,246,.08); color: var(--blue); }
.g1 .sb-divider { background: rgba(0,0,0,.05); }
.g1 .sb-section-label { color: #a09ab0; }
.g1 .sb-item { color: #4a4a5e; }
.g1 .sb-item:hover { background: rgba(255,255,255,.35); }
.g1 .sb-item.active { background: rgba(255,255,255,.5); color: #1a1a2e; }
.g1 .sb-item-star { color: var(--orange); }

/* G2: Warm tinted glass — warm undertone */
.g2 {
  background: rgba(255,248,235,.4);
  backdrop-filter: blur(24px) saturate(1.5);
  border: 1px solid rgba(255,245,220,.5);
  box-shadow: 0 4px 28px rgba(120,90,40,.06), inset 0 1px 0 rgba(255,250,240,.6);
}
.g2 .sb-brand { border-bottom: 1px solid rgba(180,160,120,.08); }
.g2 .sb-nav-item { color: #6a6050; }
.g2 .sb-nav-item:hover { background: rgba(255,250,235,.5); color: #3a3428; }
.g2 .sb-nav-item.active {
  background: rgba(255,252,245,.6); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 4px rgba(120,90,40,.06);
}
.g2 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g2 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g2 .sb-nav-count { background: rgba(59,130,246,.08); color: var(--blue); }
.g2 .sb-divider { background: rgba(160,140,100,.08); }
.g2 .sb-section-label { color: #b5a890; }
.g2 .sb-item { color: #5a5040; }
.g2 .sb-item:hover { background: rgba(255,250,235,.4); }
.g2 .sb-item.active { background: rgba(255,252,245,.55); color: #2a2418; }
.g2 .sb-item-star { color: var(--orange); }

/* G3: Icy glass — cool blue tint */
.g3 {
  background: rgba(235,242,255,.4);
  backdrop-filter: blur(22px) saturate(1.3);
  border: 1px solid rgba(200,220,255,.4);
  box-shadow: 0 4px 24px rgba(40,60,120,.06), inset 0 1px 0 rgba(220,235,255,.5);
}
.g3 .sb-brand { border-bottom: 1px solid rgba(40,60,120,.05); }
.g3 .sb-nav-item { color: #506080; }
.g3 .sb-nav-item:hover { background: rgba(220,235,255,.45); color: #283858; }
.g3 .sb-nav-item.active {
  background: rgba(220,235,255,.55); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 4px rgba(40,60,120,.06);
}
.g3 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g3 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g3 .sb-nav-count { background: rgba(59,130,246,.1); color: var(--blue); }
.g3 .sb-divider { background: rgba(40,60,120,.06); }
.g3 .sb-section-label { color: #8090b0; }
.g3 .sb-item { color: #405070; }
.g3 .sb-item:hover { background: rgba(220,235,255,.4); }
.g3 .sb-item.active { background: rgba(220,235,255,.5); color: #1a2840; }
.g3 .sb-item-star { color: var(--orange); }

/* G4: Ultra-thin glass — barely there, max blur */
.g4 {
  background: rgba(255,255,255,.2);
  backdrop-filter: blur(40px) saturate(1.6);
  border: 1px solid rgba(255,255,255,.3);
  box-shadow: 0 8px 32px rgba(0,0,0,.05);
}
.g4 .sb-brand { border-bottom: 1px solid rgba(255,255,255,.2); }
.g4 .sb-nav-item { color: rgba(30,30,50,.55); }
.g4 .sb-nav-item:hover { background: rgba(255,255,255,.2); color: rgba(30,30,50,.8); }
.g4 .sb-nav-item.active {
  background: rgba(255,255,255,.35); color: var(--blue); font-weight: 600;
}
.g4 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g4 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g4 .sb-nav-count { background: rgba(255,255,255,.25); color: var(--blue); }
.g4 .sb-divider { background: rgba(255,255,255,.2); }
.g4 .sb-section-label { color: rgba(30,30,50,.35); }
.g4 .sb-item { color: rgba(30,30,50,.5); }
.g4 .sb-item:hover { background: rgba(255,255,255,.2); }
.g4 .sb-item.active { background: rgba(255,255,255,.3); color: rgba(30,30,50,.85); }
.g4 .sb-item-star { color: var(--orange); }

/* G5: Layered glass — stacked pane look, inner shadow */
.g5 {
  background: rgba(255,255,255,.35);
  backdrop-filter: blur(20px) saturate(1.3);
  border: 1px solid rgba(255,255,255,.45);
  box-shadow:
    0 4px 24px rgba(0,0,0,.06),
    inset 0 1px 0 rgba(255,255,255,.6),
    inset 0 -1px 0 rgba(0,0,0,.02);
}
.g5::after {
  content: ''; position: absolute; inset: 6px; border-radius: 10px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
  pointer-events: none; z-index: 0;
}
.g5 > * { position: relative; z-index: 1; }
.g5 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.g5 .sb-nav-item { color: #5a5a72; }
.g5 .sb-nav-item:hover { background: rgba(255,255,255,.35); color: #2a2a42; }
.g5 .sb-nav-item.active {
  background: rgba(255,255,255,.5); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.g5 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g5 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g5 .sb-nav-count { background: rgba(59,130,246,.08); color: var(--blue); }
.g5 .sb-divider { background: rgba(0,0,0,.04); }
.g5 .sb-section-label { color: #a09ab0; }
.g5 .sb-item { color: #4a4a5e; }
.g5 .sb-item:hover { background: rgba(255,255,255,.3); }
.g5 .sb-item.active { background: rgba(255,255,255,.45); color: #1a1a2e; }
.g5 .sb-item-star { color: var(--orange); }

/* G6: Gradient border glass — prismatic edge */
.g6 {
  background: rgba(255,255,255,.38);
  backdrop-filter: blur(22px) saturate(1.4);
  border: none;
  box-shadow: 0 4px 24px rgba(0,0,0,.06);
  position: relative;
}
.g6::before {
  content: ''; position: absolute; inset: -1px; border-radius: calc(var(--radius) + 1px);
  background: linear-gradient(135deg, rgba(124,92,252,.3), rgba(59,130,246,.3), rgba(16,185,129,.3), rgba(245,158,11,.2));
  z-index: -1;
}
.g6::after {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius);
  background: rgba(255,255,255,.38); backdrop-filter: blur(22px);
  z-index: -1;
}
.g6 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.g6 .sb-nav-item { color: #5a5a72; }
.g6 .sb-nav-item:hover { background: rgba(255,255,255,.35); color: #2a2a42; }
.g6 .sb-nav-item.active {
  background: rgba(255,255,255,.5); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.g6 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g6 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g6 .sb-nav-count { background: rgba(59,130,246,.08); color: var(--blue); }
.g6 .sb-divider { background: rgba(0,0,0,.04); }
.g6 .sb-section-label { color: #a09ab0; }
.g6 .sb-item { color: #4a4a5e; }
.g6 .sb-item:hover { background: rgba(255,255,255,.3); }
.g6 .sb-item.active { background: rgba(255,255,255,.45); color: #1a1a2e; }
.g6 .sb-item-star { color: var(--orange); }

/* G7: Matte glass — high opacity, very soft */
.g7 {
  background: rgba(255,253,250,.7);
  backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid rgba(0,0,0,.03);
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
}
.g7 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.g7 .sb-nav-item { color: #6e6e87; }
.g7 .sb-nav-item:hover { background: rgba(0,0,0,.025); color: #3d3d56; }
.g7 .sb-nav-item.active {
  background: rgba(59,130,246,.07); color: var(--blue); font-weight: 600;
}
.g7 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:var(--blue);
}
.g7 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.g7 .sb-nav-count { background: rgba(59,130,246,.07); color: var(--blue); }
.g7 .sb-divider { background: rgba(0,0,0,.04); }
.g7 .sb-section-label { color: #b0a898; }
.g7 .sb-item { color: #4a4a5e; }
.g7 .sb-item:hover { background: rgba(0,0,0,.025); }
.g7 .sb-item.active { background: rgba(59,130,246,.06); color: #1a1a2e; }
.g7 .sb-item-star { color: var(--orange); }

/* G8: Dark glass — smoked */
.g8 {
  background: rgba(20,20,35,.45);
  backdrop-filter: blur(24px) saturate(1.5);
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 4px 30px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.06);
  color: #e2e8f0;
}
.g8 .sb-brand { border-bottom: 1px solid rgba(255,255,255,.06); }
.g8 .sb-brand-text { color: #f1f5f9; }
.g8 .sb-nav-item { color: rgba(148,163,184,.7); }
.g8 .sb-nav-item:hover { background: rgba(255,255,255,.06); color: #cbd5e1; }
.g8 .sb-nav-item.active {
  background: rgba(59,130,246,.12); color: #93c5fd; font-weight: 600;
}
.g8 .sb-nav-item.active::before {
  content:''; position:absolute; left:2px; top:50%; transform:translateY(-50%);
  width:3px; height:14px; border-radius:2px; background:#60a5fa;
}
.g8 .sb-nav-item.active .sb-nav-icon { color: #93c5fd; }
.g8 .sb-nav-count { background: rgba(96,165,250,.12); color: #93c5fd; }
.g8 .sb-divider { background: rgba(255,255,255,.06); }
.g8 .sb-section-label { color: rgba(148,163,184,.45); }
.g8 .sb-item { color: rgba(148,163,184,.65); }
.g8 .sb-item:hover { background: rgba(255,255,255,.05); }
.g8 .sb-item.active { background: rgba(96,165,250,.1); color: #e2e8f0; }
.g8 .sb-item-star { color: #fbbf24; }
.g8 .sb-item-dot { opacity: .8; }
</style>
</head>
<body>

<h1>Glass Sidebar Variants</h1>
<p class="subtitle">8 frosted glass designs — warm base, blue accent, wider text, no timestamps, no bottom bar</p>

<div class="grid" id="grid"></div>

<script>
const ICONS = {
  invent: `<svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a6 6 0 0 1 4 10.47V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-3.53A6 6 0 0 1 12 3z"/></svg>`,
  inventions: `<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/></svg>`,
  discover: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>`,
};
const STARRED = [
  { text: 'DDM Rankings Study' },
  { text: 'Circuit Motif Spectroscopy' },
];
const RECENTS = [
  { text: 'Syntactic Load Smoothing', color: 'var(--blue)', active: true },
  { text: 'Schema Treewidth Complexity', color: 'var(--orange)' },
  { text: 'Oblique Tree Sums Analysis', color: 'var(--purple)' },
  { text: 'Balance-Guided Trees Study', color: 'var(--blue)' },
  { text: 'Simplicial Constrained Sums', color: 'var(--cyan)' },
];

function navHTML() {
  return `<div class="sb-nav">
    <div class="sb-nav-item active" data-nav="invent"><div class="sb-nav-icon">${ICONS.invent}</div><span>Invent</span></div>
    <div class="sb-nav-item" data-nav="inventions"><div class="sb-nav-icon">${ICONS.inventions}</div><span>Inventions</span><span class="sb-nav-count">7</span></div>
    <div class="sb-nav-item" data-nav="discover"><div class="sb-nav-icon">${ICONS.discover}</div><span>Discover</span></div>
  </div>`;
}
function starredHTML() {
  return STARRED.map(s => `<div class="sb-item"><span class="sb-item-star">&#9733;</span><span class="sb-item-text">${s.text}</span></div>`).join('');
}
function recentsHTML() {
  return RECENTS.map(r => `<div class="sb-item${r.active?' active':''}"><span class="sb-item-dot" style="background:${r.color}"></span><span class="sb-item-text">${r.text}</span></div>`).join('');
}

function sb(cls, label, note) {
  return `<div>
    <div class="variant-label">${label}</div>
    <div class="sb ${cls}">
      <div class="sb-brand"><img src="logo_64.png" class="sb-brand-logo" alt=""><span class="sb-brand-text">AI Inventor</span></div>
      ${navHTML()}
      <div class="sb-divider"></div>
      <div class="sb-section-label">Starred</div>
      <div class="sb-items" style="flex:0">${starredHTML()}</div>
      <div class="sb-section-label">Recents</div>
      <div class="sb-items">${recentsHTML()}</div>
    </div>
    <div class="variant-note">${note}</div>
  </div>`;
}

document.getElementById('grid').innerHTML = [
  sb('g1', 'G1 — Classic Frosted', 'White glass, white inner border, subtle shadow'),
  sb('g2', 'G2 — Warm Tinted', 'Warm amber undertone, creamy glass'),
  sb('g3', 'G3 — Icy Blue', 'Cool blue tint, blue inner glow'),
  sb('g4', 'G4 — Ultra Thin', 'Barely-there 20% opacity, max 40px blur'),
  sb('g5', 'G5 — Layered Panes', 'Inner floating pane for depth effect'),
  sb('g6', 'G6 — Prismatic Edge', 'Gradient border (purple > blue > green > orange)'),
  sb('g7', 'G7 — Matte Glass', 'High opacity 70%, soft, almost solid but glassy'),
  sb('g8', 'G8 — Smoked Dark', 'Dark tinted glass, dark mode through frosted pane'),
].join('');
</script>

</body>
</html>
