<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Variants — Light Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f7;
  --bg-white: #ffffff;
  --surface: rgba(255,255,255,.92);
  --surface-hover: rgba(0,0,0,.03);
  --border: rgba(0,0,0,.06);
  --border-hi: rgba(0,0,0,.1);
  --text: #1a1a2e;
  --text-secondary: #3d3d56;
  --text-muted: #6e6e87;
  --text-faint: #9e9eb5;
  --purple: #7c5cfc; --purple-light: rgba(124,92,252,.08); --purple-mid: rgba(124,92,252,.15);
  --blue: #3b82f6; --blue-light: rgba(59,130,246,.08); --blue-mid: rgba(59,130,246,.15);
  --orange: #f59e0b; --orange-light: rgba(245,158,11,.08);
  --green: #10b981; --green-light: rgba(16,185,129,.08); --green-mid: rgba(16,185,129,.15);
  --red: #ef4444; --red-light: rgba(239,68,68,.08);
  --cyan: #06b6d4; --cyan-light: rgba(6,182,212,.08);
  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding: 32px;
}
h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
.subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 32px; }
.variant-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-faint); margin-bottom: 10px;
}
.variant-note {
  font-size: 10px; color: var(--text-faint); font-style: italic; margin-top: 8px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 260px);
  gap: 28px;
  margin-bottom: 48px;
}

/* ===== SIDEBAR SHELL ===== */
.sb {
  width: 252px;
  height: 620px;
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-md);
  transition: box-shadow .2s var(--ease);
}

/* ===== BRAND ===== */
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.sb-brand-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.sb-brand-text {
  font-weight: 800; font-size: 14px; color: var(--text);
  letter-spacing: -.3px;
}
.sb-brand-sub {
  font-size: 10px; color: var(--text-faint); margin-top: 1px;
}

/* ===== NAV ITEMS ===== */
.sb-nav { padding: 10px 10px 6px; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .15s var(--ease);
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  position: relative;
}
.sb-nav-item:hover { background: var(--surface-hover); color: var(--text-secondary); }
.sb-nav-item.active { color: var(--text); font-weight: 600; }
.sb-nav-icon {
  width: 20px; height: 20px; display: grid; place-items: center; flex-shrink: 0;
}
.sb-nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.sb-nav-item.active .sb-nav-icon svg { stroke-width: 2.2; }

/* Active left bar (base) */
.sb-nav-item.active::before {
  content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px;
}

/* count badge */
.sb-nav-count {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-faint); font-variant-numeric: tabular-nums;
  background: rgba(0,0,0,.04); padding: 1px 6px; border-radius: 4px;
}

/* ===== SECTION DIVIDER ===== */
.sb-divider { height: 1px; margin: 6px 16px; background: var(--border); }

/* ===== SECTION LABEL ===== */
.sb-section-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-faint);
  padding: 10px 16px 4px;
}

/* ===== ITEMS ===== */
.sb-items {
  padding: 4px 10px; flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.1) transparent;
}
.sb-items::-webkit-scrollbar { width: 4px; }
.sb-items::-webkit-scrollbar-track { background: transparent; }
.sb-items::-webkit-scrollbar-thumb { background: rgba(0,0,0,.1); border-radius: 2px; }
.sb-items[style*="flex:0"] { overflow: visible; }
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px;
  cursor: pointer; transition: background .15s;
  font-size: 12px; color: var(--text-secondary);
}
.sb-item:hover { background: var(--surface-hover); }
.sb-item.active { background: rgba(0,0,0,.04); color: var(--text); font-weight: 500; }
.sb-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sb-item-star { font-size: 10px; flex-shrink: 0; width: 16px; text-align: center; }
.sb-item-text {
  flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; font-weight: 500;
}
.sb-item-time {
  font-size: 10px; color: var(--text-faint); flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ===== BOTTOM STATUS ===== */
.sb-bottom { padding: 12px 16px; border-top: 1px solid var(--border); }
.sb-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-muted);
}
.sb-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

/* ============================================ */
/* LIGHT VARIANTS                               */
/* ============================================ */

/* L1: Clean white, purple accent — Linear-style */
.l1 .sb-brand-icon {
  background: var(--purple); color: #fff;
}
.l1 .sb-nav-item.active { background: var(--purple-light); color: var(--purple); }
.l1 .sb-nav-item.active::before { background: var(--purple); }
.l1 .sb-nav-item.active .sb-nav-icon { color: var(--purple); }
.l1 .sb-nav-count { background: var(--purple-light); color: var(--purple); }

/* L2: Soft gray bg, blue accent — Notion-style */
.l2 { background: #fafafa; }
.l2 .sb-brand-icon {
  background: var(--text); color: #fff; border-radius: 6px;
}
.l2 .sb-nav-item.active { background: rgba(0,0,0,.05); color: var(--text); }
.l2 .sb-nav-item.active::before { display: none; }
.l2 .sb-nav-item.active .sb-nav-icon { color: var(--text); }
.l2 .sb-item.active { background: rgba(0,0,0,.05); }

/* L3: White, green accent, rounded — Vercel-style */
.l3 .sb-brand-icon {
  background: #000; color: #fff; border-radius: 50%;
  width: 26px; height: 26px; font-size: 10px;
}
.l3 .sb-brand-text { font-weight: 700; font-size: 13.5px; }
.l3 .sb-nav-item { border-radius: 6px; }
.l3 .sb-nav-item.active { background: #000; color: #fff; }
.l3 .sb-nav-item.active .sb-nav-icon { color: #fff; }
.l3 .sb-nav-item.active::before { display: none; }
.l3 .sb-nav-count { background: rgba(0,0,0,.06); }
.l3 .sb-nav-item.active .sb-nav-count { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); }

/* L4: Warm white, orange accent */
.l4 { background: #fffcf8; border-color: rgba(0,0,0,.05); }
.l4 .sb-brand-icon {
  background: linear-gradient(135deg, #f59e0b, #f97316);
  color: #fff;
}
.l4 .sb-brand { border-bottom-color: rgba(245,158,11,.1); }
.l4 .sb-nav-item.active { background: var(--orange-light); color: #b45309; }
.l4 .sb-nav-item.active::before { background: var(--orange); }
.l4 .sb-nav-item.active .sb-nav-icon { color: #b45309; }
.l4 .sb-divider { background: rgba(245,158,11,.1); }

/* L5: Frosted glass on light — Apple-style */
.l5 {
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(20px) saturate(1.5);
  border-color: rgba(0,0,0,.04);
  box-shadow: 0 1px 20px rgba(0,0,0,.05), inset 0 0 0 1px rgba(255,255,255,.5);
}
.l5 .sb-brand-icon {
  background: linear-gradient(135deg, #007aff, #5856d6);
  color: #fff; border-radius: 7px;
}
.l5 .sb-nav-item.active { background: rgba(0,122,255,.08); color: #007aff; }
.l5 .sb-nav-item.active::before { background: #007aff; }
.l5 .sb-nav-item.active .sb-nav-icon { color: #007aff; }
.l5 .sb-nav-count { background: rgba(0,122,255,.08); color: #007aff; }

/* L6: Minimal border-left only, very clean */
.l6 { border: none; box-shadow: none; border-right: 1px solid var(--border); border-radius: 0; }
.l6 .sb-brand-icon { display: none; }
.l6 .sb-brand { padding: 20px 18px 16px; }
.l6 .sb-brand-text { font-size: 15px; letter-spacing: -.5px; }
.l6 .sb-nav-item.active { background: transparent; color: var(--text); }
.l6 .sb-nav-item.active::before { background: var(--purple); width: 2px; height: 20px; left: 0; }
.l6 .sb-nav-item { padding: 9px 12px; }

/* L7: Colored nav icon backgrounds, playful */
.l7 .sb-brand-icon {
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff;
}
.l7 .sb-nav-icon { width: 26px; height: 26px; border-radius: 7px; }
.l7 .sb-nav-icon svg { width: 14px; height: 14px; }
.l7 .sb-nav-item[data-nav="invent"] .sb-nav-icon { background: var(--purple-light); color: var(--purple); }
.l7 .sb-nav-item[data-nav="inventions"] .sb-nav-icon { background: var(--blue-light); color: var(--blue); }
.l7 .sb-nav-item[data-nav="discover"] .sb-nav-icon { background: var(--green-light); color: var(--green); }
.l7 .sb-nav-item.active[data-nav="invent"] .sb-nav-icon { background: var(--purple-mid); }
.l7 .sb-nav-item.active[data-nav="inventions"] .sb-nav-icon { background: var(--blue-mid); }
.l7 .sb-nav-item.active[data-nav="discover"] .sb-nav-icon { background: var(--green-mid); }
.l7 .sb-nav-item.active { background: transparent; }
.l7 .sb-nav-item.active::before { display: none; }

/* L8: Elevated card sidebar, subtle gradient top */
.l8 {
  box-shadow: var(--shadow-lg);
  border: none;
  overflow: visible;
}
.l8::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  background: linear-gradient(90deg, var(--purple), var(--blue), var(--green));
  z-index: 10;
}
.l8 .sb-brand { padding-top: 22px; }
.l8 .sb-brand-icon {
  background: var(--purple-light); color: var(--purple);
  border: 1px solid var(--purple-mid);
}
.l8 .sb-nav-item.active {
  background: var(--purple-light);
  color: var(--purple);
  box-shadow: inset 0 0 0 1px rgba(124,92,252,.1);
}
.l8 .sb-nav-item.active::before { display: none; }
.l8 .sb-nav-item.active .sb-nav-icon { color: var(--purple); }

</style>
</head>
<body>

<h1>Light Mode Sidebar Variants</h1>
<p class="subtitle">8 light/modern designs — AI Inventor / Invent / Inventions / Discover / Starred / Recents</p>

<div class="grid" id="grid"></div>

<script>
const ICONS = {
  invent: `<svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a6 6 0 0 1 4 10.47V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-3.53A6 6 0 0 1 12 3z"/></svg>`,
  inventions: `<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/></svg>`,
  discover: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>`,
};

const STARRED = [
  { text: 'DDM Rankings', color: 'var(--purple)', time: '2h' },
  { text: 'Circuit Motifs', color: 'var(--blue)', time: '1d' },
];

const RECENTS = [
  { text: 'Syntactic Load Smo...', color: 'var(--green)', time: '4m', active: true },
  { text: 'Schema Treewidth', color: 'var(--orange)', time: '12h' },
  { text: 'Oblique Tree Sums', color: 'var(--purple)', time: '2d' },
  { text: 'Balance-Guided Tr...', color: 'var(--blue)', time: '3d' },
  { text: 'Simplicial Constr...', color: 'var(--cyan)', time: '5d' },
];

function navHTML() {
  return `
    <div class="sb-nav">
      <div class="sb-nav-item active" data-nav="invent">
        <div class="sb-nav-icon">${ICONS.invent}</div>
        <span>Invent</span>
      </div>
      <div class="sb-nav-item" data-nav="inventions">
        <div class="sb-nav-icon">${ICONS.inventions}</div>
        <span>Inventions</span>
        <span class="sb-nav-count">7</span>
      </div>
      <div class="sb-nav-item" data-nav="discover">
        <div class="sb-nav-icon">${ICONS.discover}</div>
        <span>Discover</span>
      </div>
    </div>`;
}

function starredHTML() {
  return STARRED.map(s => `
    <div class="sb-item">
      <span class="sb-item-star" style="color:${s.color}">&#9733;</span>
      <span class="sb-item-text">${s.text}</span>
      <span class="sb-item-time">${s.time}</span>
    </div>`).join('');
}

function recentsHTML() {
  return RECENTS.map(r => `
    <div class="sb-item${r.active ? ' active' : ''}">
      <span class="sb-item-dot" style="background:${r.color}"></span>
      <span class="sb-item-text">${r.text}</span>
      <span class="sb-item-time">${r.time}</span>
    </div>`).join('');
}

function bottomHTML(color) {
  return `
    <div class="sb-bottom">
      <div class="sb-status">
        <span class="sb-status-dot" style="background:${color}; box-shadow:0 0 4px ${color}"></span>
        <span>Running &middot; Round 3 of 8</span>
      </div>
    </div>`;
}

function sb(cls, label, brandIcon, note, extra) {
  extra = extra || '';
  const noBrandIcon = cls === 'l6';
  return `
  <div>
    <div class="variant-label">${label}</div>
    <div class="sb ${cls}" style="position:relative">
      <div class="sb-brand">
        ${noBrandIcon ? '' : `<div class="sb-brand-icon">${brandIcon}</div>`}
        <div>
          <div class="sb-brand-text">AI Inventor</div>
          ${extra}
        </div>
      </div>
      ${navHTML()}
      <div class="sb-divider"></div>
      <div class="sb-section-label">Starred</div>
      <div class="sb-items" style="flex:0">${starredHTML()}</div>
      <div class="sb-section-label">Recents</div>
      <div class="sb-items">${recentsHTML()}</div>
      ${bottomHTML(cls === 'l4' ? 'var(--orange)' : cls === 'l5' ? '#007aff' : cls === 'l3' ? '#000' : 'var(--purple)')}
    </div>
    <div class="variant-note">${note}</div>
  </div>`;
}

document.getElementById('grid').innerHTML = [
  sb('l1', '1 — Linear', 'AI', 'Clean white, purple accent, left indicator'),
  sb('l2', '2 — Notion', 'AI', 'Soft gray, dark icon, minimal color'),
  sb('l3', '3 — Vercel', 'AI', 'Black/white inverted active, circular icon'),
  sb('l4', '4 — Warm', 'AI', 'Warm cream bg, orange gradient accent'),
  sb('l5', '5 — Apple', 'AI', 'Frosted glass, system blue, soft glow'),
  sb('l6', '6 — Minimal', '', 'No icon, text-only, left border accent'),
  sb('l7', '7 — Playful', 'AI', 'Colored icon pills per nav item'),
  sb('l8', '8 — Elevated', 'AI', 'Card with gradient top bar, shadow'),
].join('');
</script>

</body>
</html>
