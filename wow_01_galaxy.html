<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Particle Galaxy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050510;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff;
    width: 100vw;
    height: 100vh;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* ── Overlay layer ── */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Title ── */
  .title {
    position: absolute;
    top: 32px; left: 40px;
  }
  .title h1 {
    font-weight: 200;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }
  .title p {
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
  }

  /* ── Run info ── */
  .run-info {
    position: absolute;
    top: 36px; right: 40px;
    text-align: right;
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
  }
  .run-info .run-name {
    color: rgba(255,255,255,0.75);
    font-weight: 400;
  }
  .run-info .separator {
    margin: 0 8px;
    color: rgba(255,255,255,0.2);
  }
  .run-info .cost {
    color: rgba(130,220,160,0.8);
    font-weight: 400;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
  }
  .progress-label {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35);
    text-align: center;
    margin-bottom: 8px;
  }
  .progress-track {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 65%;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(80,220,140,0.7), rgba(120,140,255,0.7), rgba(180,120,255,0.5));
    box-shadow: 0 0 12px rgba(120,140,255,0.3);
    transition: width 1s ease;
  }

  /* ── Tooltip ── */
  .tooltip {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateY(6px);
    padding: 16px 20px;
    border-radius: 14px;
    background: rgba(20, 20, 40, 0.55);
    backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    min-width: 200px;
  }
  .tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .tooltip .tt-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .tooltip .tt-status {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .tooltip .tt-metric {
    font-size: 12px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }
  .tooltip .tt-metric span {
    color: rgba(255,255,255,0.8);
    font-weight: 400;
  }
</style>
</head>
<body>

<canvas id="galaxy"></canvas>

<div class="overlay">
  <div class="title">
    <h1>AI Inventor</h1>
    <p>Autonomous Scientific Research</p>
  </div>
  <div class="run-info">
    <span class="run-name">ssl-low-resource-v3</span>
    <span class="separator">&bull;</span>
    <span class="elapsed">02:34:17</span>
    <span class="separator">&bull;</span>
    <span class="cost">$12.47</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">PIPELINE PROGRESS</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
  </div>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-status" id="tt-status"></div>
  <div class="tt-metric" id="tt-metric"></div>
</div>

<script>
// ─────────────────────────────────────────────────
//  Constants & Setup
// ─────────────────────────────────────────────────
const canvas = document.getElementById('galaxy');
const ctx = canvas.getContext('2d');
let W, H;
const dpr = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Recompute nebula positions on resize
  nebulae.forEach(n => {
    n.x = n.xRatio * W;
    n.y = n.yRatio * H;
  });
}
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────────
//  Nebula Definitions
// ─────────────────────────────────────────────────
const nebulae = [
  {
    id: 'seed',
    label: 'Seed Hypothesis',
    xRatio: 0.17, yRatio: 0.22,
    x: 0, y: 0,
    radius: 55,
    color: [80, 220, 140],
    status: 'Complete',
    statusColor: 'rgba(80,220,140,0.9)',
    metric: '<span>12</span> hypotheses seeded<br><span>42</span> papers ingested<br><span>00:08:31</span> elapsed',
    state: 'complete',
    particleCount: 40,
    rings: 0,
    orbitNodes: 0,
  },
  {
    id: 'hypo',
    label: 'Hypothesis Loop',
    xRatio: 0.38, yRatio: 0.42,
    x: 0, y: 0,
    radius: 65,
    color: [170, 120, 255],
    status: 'Complete',
    statusColor: 'rgba(170,120,255,0.9)',
    metric: '<span>3</span> iterations run<br><span>4</span> hypotheses refined<br><span>00:22:05</span> elapsed',
    state: 'complete',
    particleCount: 50,
    rings: 3,
    orbitNodes: 0,
  },
  {
    id: 'invent',
    label: 'Invention Loop',
    xRatio: 0.63, yRatio: 0.52,
    x: 0, y: 0,
    radius: 90,
    color: [100, 150, 255],
    status: 'Active',
    statusColor: 'rgba(100,180,255,0.9)',
    metric: '<span>Generating</span> experiment plan<br><span>2/5</span> artifacts created<br><span>02:03:41</span> elapsed',
    state: 'active',
    particleCount: 70,
    rings: 0,
    orbitNodes: 5,
  },
  {
    id: 'paper',
    label: 'Paper & Repository',
    xRatio: 0.84, yRatio: 0.75,
    x: 0, y: 0,
    radius: 50,
    color: [255, 170, 80],
    status: 'Waiting',
    statusColor: 'rgba(255,170,80,0.5)',
    metric: '<span>Pending</span> invention loop<br><span>--</span> pages generated<br><span>--:--:--</span> elapsed',
    state: 'waiting',
    particleCount: 20,
    rings: 0,
    orbitNodes: 0,
  },
];

resize();

// ─────────────────────────────────────────────────
//  Background Stars (static layer — drawn once)
// ─────────────────────────────────────────────────
const bgStars = [];
for (let i = 0; i < 600; i++) {
  bgStars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.0 + 0.2,
    alpha: Math.random() * 0.4 + 0.05,
    twinkleSpeed: Math.random() * 0.002 + 0.001,
    twinkleOffset: Math.random() * Math.PI * 2,
    depth: Math.random(),  // parallax depth 0..1
  });
}

// ─────────────────────────────────────────────────
//  Nebula Particles (cluster around each nebula)
// ─────────────────────────────────────────────────
const nebulaParticles = [];

function spawnNebulaParticle(neb) {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * neb.radius * 1.8;
  const [r, g, b] = neb.color;
  return {
    x: neb.x + Math.cos(angle) * dist,
    y: neb.y + Math.sin(angle) * dist,
    baseX: neb.x,
    baseY: neb.y,
    angle,
    dist,
    speed: (Math.random() * 0.0003 + 0.0001) * (Math.random() < 0.5 ? 1 : -1),
    drift: Math.random() * 0.15 + 0.05,
    r: Math.random() * 1.2 + 0.3,
    cr: r, cg: g, cb: b,
    alpha: Math.random() * 0.6 + 0.15,
    nebId: neb.id,
  };
}

nebulae.forEach(neb => {
  for (let i = 0; i < neb.particleCount; i++) {
    nebulaParticles.push(spawnNebulaParticle(neb));
  }
});

// ─────────────────────────────────────────────────
//  Stream Particles (flow between nebulae)
// ─────────────────────────────────────────────────
const streamParticles = [];
const streams = [
  { from: nebulae[0], to: nebulae[1], count: 35, active: true },
  { from: nebulae[1], to: nebulae[2], count: 40, active: true },
  { from: nebulae[2], to: nebulae[3], count: 12, active: false },  // dim/sparse — not yet active
];

function bezierPoint(t, p0x, p0y, cp1x, cp1y, cp2x, cp2y, p1x, p1y) {
  const u = 1 - t;
  return {
    x: u*u*u*p0x + 3*u*u*t*cp1x + 3*u*t*t*cp2x + t*t*t*p1x,
    y: u*u*u*p0y + 3*u*u*t*cp1y + 3*u*t*t*cp2y + t*t*t*p1y,
  };
}

function spawnStreamParticle(stream) {
  const f = stream.from;
  const to = stream.to;
  const midX = (f.x + to.x) / 2;
  const midY = (f.y + to.y) / 2;
  const dx = to.x - f.x;
  const dy = to.y - f.y;
  const perpX = -dy * 0.25;
  const perpY = dx * 0.25;
  const curveDir = (Math.random() < 0.5 ? 1 : -1) * (Math.random() * 0.5 + 0.5);

  const [r1, g1, b1] = f.color;
  const [r2, g2, b2] = to.color;

  return {
    t: Math.random(),
    speed: (Math.random() * 0.0008 + 0.0004),
    fromX: f.x, fromY: f.y,
    toX: to.x, toY: to.y,
    cp1x: midX + perpX * curveDir * 0.6,
    cp1y: midY + perpY * curveDir * 0.6,
    cp2x: midX + perpX * curveDir * 0.3,
    cp2y: midY + perpY * curveDir * 0.3,
    r: Math.random() * 1.0 + 0.3,
    r1, g1, b1, r2, g2, b2,
    alpha: stream.active ? (Math.random() * 0.5 + 0.25) : (Math.random() * 0.15 + 0.05),
    active: stream.active,
  };
}

streams.forEach(s => {
  for (let i = 0; i < s.count; i++) {
    streamParticles.push(spawnStreamParticle(s));
  }
});

// ─────────────────────────────────────────────────
//  Floating Ambient Particles (deep space dust)
// ─────────────────────────────────────────────────
const ambientParticles = [];
for (let i = 0; i < 80; i++) {
  ambientParticles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.12,
    vy: (Math.random() - 0.5) * 0.08,
    r: Math.random() * 0.8 + 0.2,
    alpha: Math.random() * 0.2 + 0.03,
    depth: Math.random() * 0.5,
  });
}

// ─────────────────────────────────────────────────
//  Mouse tracking & tooltip
// ─────────────────────────────────────────────────
let mouseX = -1000, mouseY = -1000;
let hoveredNebula = null;
const tooltip = document.getElementById('tooltip');
const ttName = document.getElementById('tt-name');
const ttStatus = document.getElementById('tt-status');
const ttMetric = document.getElementById('tt-metric');

window.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  let found = null;
  for (const neb of nebulae) {
    const dx = mouseX - neb.x;
    const dy = mouseY - neb.y;
    if (Math.sqrt(dx*dx + dy*dy) < neb.radius * 1.5) {
      found = neb;
      break;
    }
  }

  if (found) {
    hoveredNebula = found;
    ttName.textContent = found.label;
    ttName.style.color = `rgb(${found.color.join(',')})`;
    ttStatus.textContent = found.status;
    ttStatus.style.color = found.statusColor;
    ttMetric.innerHTML = found.metric;
    tooltip.classList.add('visible');
    // Position tooltip
    let tx = mouseX + 20;
    let ty = mouseY - 20;
    if (tx + 240 > W) tx = mouseX - 240;
    if (ty + 120 > H) ty = mouseY - 130;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  } else {
    hoveredNebula = null;
    tooltip.classList.remove('visible');
  }
});

// ─────────────────────────────────────────────────
//  Drawing Helpers
// ─────────────────────────────────────────────────
function drawRadialGlow(x, y, radius, color, alpha, time) {
  const [r, g, b] = color;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, `rgba(${r},${g},${b},${alpha * 0.5})`);
  grad.addColorStop(0.3, `rgba(${r},${g},${b},${alpha * 0.2})`);
  grad.addColorStop(0.7, `rgba(${r},${g},${b},${alpha * 0.05})`);
  grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawCore(x, y, radius, color, pulse) {
  const [r, g, b] = color;
  const coreR = radius * 0.12;
  const glowR = radius * 0.35;

  // Outer soft glow
  const g1 = ctx.createRadialGradient(x, y, 0, x, y, glowR * (1 + pulse * 0.2));
  g1.addColorStop(0, `rgba(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)},${0.6 + pulse * 0.2})`);
  g1.addColorStop(0.4, `rgba(${r},${g},${b},${0.2 + pulse * 0.1})`);
  g1.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = g1;
  ctx.beginPath();
  ctx.arc(x, y, glowR * (1 + pulse * 0.2), 0, Math.PI * 2);
  ctx.fill();

  // Bright core
  const g2 = ctx.createRadialGradient(x, y, 0, x, y, coreR);
  g2.addColorStop(0, `rgba(255,255,255,${0.7 + pulse * 0.3})`);
  g2.addColorStop(0.5, `rgba(${Math.min(r+80,255)},${Math.min(g+80,255)},${Math.min(b+80,255)},${0.5 + pulse * 0.2})`);
  g2.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = g2;
  ctx.beginPath();
  ctx.arc(x, y, coreR, 0, Math.PI * 2);
  ctx.fill();
}

function drawRings(x, y, baseRadius, color, count, time) {
  const [r, g, b] = color;
  for (let i = 0; i < count; i++) {
    const ringR = baseRadius * (0.5 + i * 0.28);
    const rotSpeed = 0.0004 * (i % 2 === 0 ? 1 : -1) * (1 + i * 0.3);
    const angle = time * rotSpeed;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(0, 0, ringR, ringR * 0.35, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},${0.12 - i * 0.02})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
}

function drawOrbitNodes(x, y, baseRadius, color, count, time) {
  const [r, g, b] = color;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + time * 0.0003;
    const orbitR = baseRadius * 0.75;
    const nx = x + Math.cos(angle) * orbitR;
    const ny = y + Math.sin(angle) * orbitR * 0.5;
    const nodeR = 3;

    // Node glow
    const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, 12);
    const completed = i < 2;
    const a = completed ? 0.7 : 0.25;
    grad.addColorStop(0, `rgba(${r},${g},${b},${a})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(nx, ny, 12, 0, Math.PI * 2);
    ctx.fill();

    // Node dot
    ctx.fillStyle = `rgba(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)},${a})`;
    ctx.beginPath();
    ctx.arc(nx, ny, nodeR, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─────────────────────────────────────────────────
//  Background gradient (cached off-screen)
// ─────────────────────────────────────────────────
let bgCanvas = null;
function renderBgGradient() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W * dpr;
  bgCanvas.height = H * dpr;
  const bgCtx = bgCanvas.getContext('2d');
  bgCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  // Base fill
  bgCtx.fillStyle = '#050510';
  bgCtx.fillRect(0, 0, W, H);

  // Subtle radial accents
  const g1 = bgCtx.createRadialGradient(W * 0.2, H * 0.3, 0, W * 0.2, H * 0.3, W * 0.5);
  g1.addColorStop(0, 'rgba(15, 10, 40, 0.6)');
  g1.addColorStop(1, 'rgba(5, 5, 16, 0)');
  bgCtx.fillStyle = g1;
  bgCtx.fillRect(0, 0, W, H);

  const g2 = bgCtx.createRadialGradient(W * 0.75, H * 0.6, 0, W * 0.75, H * 0.6, W * 0.4);
  g2.addColorStop(0, 'rgba(10, 15, 35, 0.5)');
  g2.addColorStop(1, 'rgba(5, 5, 16, 0)');
  bgCtx.fillStyle = g2;
  bgCtx.fillRect(0, 0, W, H);
}
renderBgGradient();

window.addEventListener('resize', () => {
  resize();
  renderBgGradient();
  // Reposition ambient particles
  ambientParticles.forEach(p => {
    if (p.x > W) p.x = Math.random() * W;
    if (p.y > H) p.y = Math.random() * H;
  });
  // Reposition bg stars
  bgStars.forEach(s => {
    s.x = Math.random() * W;
    s.y = Math.random() * H;
  });
});

// ─────────────────────────────────────────────────
//  Parallax
// ─────────────────────────────────────────────────
let parallaxX = 0, parallaxY = 0;
let targetPX = 0, targetPY = 0;

window.addEventListener('mousemove', e => {
  targetPX = (e.clientX / W - 0.5) * 12;
  targetPY = (e.clientY / H - 0.5) * 8;
});

// ─────────────────────────────────────────────────
//  Animation Loop
// ─────────────────────────────────────────────────
let time = 0;
let lastTS = performance.now();

function frame(ts) {
  const dt = ts - lastTS;
  lastTS = ts;
  time += dt;

  // Smooth parallax
  parallaxX += (targetPX - parallaxX) * 0.03;
  parallaxY += (targetPY - parallaxY) * 0.03;

  // ── Clear & background ──
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(bgCanvas, 0, 0, W, H);

  // ── Background stars with twinkle + parallax ──
  for (const s of bgStars) {
    const px = s.x + parallaxX * s.depth * 0.5;
    const py = s.y + parallaxY * s.depth * 0.5;
    const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
    const alpha = s.alpha * twinkle;
    ctx.fillStyle = `rgba(200,210,240,${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Ambient dust ──
  for (const p of ambientParticles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < -20) p.x = W + 20;
    if (p.x > W + 20) p.x = -20;
    if (p.y < -20) p.y = H + 20;
    if (p.y > H + 20) p.y = -20;
    const px = p.x + parallaxX * p.depth;
    const py = p.y + parallaxY * p.depth;
    ctx.fillStyle = `rgba(180,190,220,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Nebula glows (bottom layer) ──
  for (const neb of nebulae) {
    let alphaMult = 1;
    if (neb.state === 'waiting') alphaMult = 0.35;
    if (neb.state === 'complete') alphaMult = 0.55;

    const shimmer = neb.state === 'complete'
      ? 0.04 * Math.sin(time * 0.001 + neb.xRatio * 10)
      : 0;

    // Large diffuse glow
    drawRadialGlow(neb.x, neb.y, neb.radius * 2.5, neb.color, (0.12 + shimmer) * alphaMult, time);
    // Medium glow
    drawRadialGlow(neb.x, neb.y, neb.radius * 1.4, neb.color, (0.18 + shimmer) * alphaMult, time);
  }

  // ── Stream particles (between nebulae) ──
  for (const sp of streamParticles) {
    sp.t += sp.speed;
    if (sp.t > 1) sp.t -= 1;

    const pos = bezierPoint(
      sp.t,
      sp.fromX, sp.fromY,
      sp.cp1x, sp.cp1y,
      sp.cp2x, sp.cp2y,
      sp.toX, sp.toY
    );

    // Color interpolation
    const cr = sp.r1 + (sp.r2 - sp.r1) * sp.t;
    const cg = sp.g1 + (sp.g2 - sp.g1) * sp.t;
    const cb = sp.b1 + (sp.b2 - sp.b1) * sp.t;

    // Slight glow
    const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, sp.r * 3);
    grad.addColorStop(0, `rgba(${cr|0},${cg|0},${cb|0},${sp.alpha * 0.6})`);
    grad.addColorStop(1, `rgba(${cr|0},${cg|0},${cb|0},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, sp.r * 3, 0, Math.PI * 2);
    ctx.fill();

    // Core dot
    ctx.fillStyle = `rgba(${Math.min(cr+60,255)|0},${Math.min(cg+60,255)|0},${Math.min(cb+60,255)|0},${sp.alpha})`;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, sp.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Nebula cluster particles ──
  for (const p of nebulaParticles) {
    // Find the current nebula center (in case of resize)
    const neb = nebulae.find(n => n.id === p.nebId);
    if (neb) {
      p.baseX = neb.x;
      p.baseY = neb.y;
    }

    p.angle += p.speed * dt;
    const wobble = Math.sin(time * 0.0008 + p.angle * 3) * p.drift;
    const curDist = p.dist + wobble * 10;
    p.x = p.baseX + Math.cos(p.angle) * curDist;
    p.y = p.baseY + Math.sin(p.angle) * curDist;

    // Particle glow
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.5);
    grad.addColorStop(0, `rgba(${p.cr},${p.cg},${p.cb},${p.alpha * 0.5})`);
    grad.addColorStop(1, `rgba(${p.cr},${p.cg},${p.cb},0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(${Math.min(p.cr+40,255)},${Math.min(p.cg+40,255)},${Math.min(p.cb+40,255)},${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Nebula rings & orbit nodes ──
  for (const neb of nebulae) {
    if (neb.rings > 0) {
      drawRings(neb.x, neb.y, neb.radius, neb.color, neb.rings, time);
    }
    if (neb.orbitNodes > 0) {
      drawOrbitNodes(neb.x, neb.y, neb.radius, neb.color, neb.orbitNodes, time);
    }
  }

  // ── Nebula cores (top layer) ──
  for (const neb of nebulae) {
    let pulse = 0;
    if (neb.state === 'active') {
      pulse = 0.5 + 0.5 * Math.sin(time * 0.002);
    } else if (neb.state === 'complete') {
      pulse = 0.15 + 0.15 * Math.sin(time * 0.001 + neb.xRatio * 5);
    } else {
      pulse = 0.05;
    }
    drawCore(neb.x, neb.y, neb.radius, neb.color, pulse);
  }

  // ── Active nebula extra pulse ring ──
  const activeNeb = nebulae[2];
  const pulseProgress = (time * 0.0005) % 1;
  const pulseR = activeNeb.radius * 0.4 + pulseProgress * activeNeb.radius * 1.2;
  const pulseAlpha = (1 - pulseProgress) * 0.15;
  ctx.strokeStyle = `rgba(${activeNeb.color.join(',')},${pulseAlpha})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(activeNeb.x, activeNeb.y, pulseR, 0, Math.PI * 2);
  ctx.stroke();

  // Second pulse ring (offset)
  const pulse2Progress = ((time * 0.0005) + 0.5) % 1;
  const pulse2R = activeNeb.radius * 0.4 + pulse2Progress * activeNeb.radius * 1.2;
  const pulse2Alpha = (1 - pulse2Progress) * 0.1;
  ctx.strokeStyle = `rgba(${activeNeb.color.join(',')},${pulse2Alpha})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(activeNeb.x, activeNeb.y, pulse2R, 0, Math.PI * 2);
  ctx.stroke();

  // ── Nebula labels (subtle, beneath each cluster) ──
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (const neb of nebulae) {
    const [r, g, b] = neb.color;
    const labelAlpha = neb.state === 'waiting' ? 0.2 : (neb.state === 'active' ? 0.6 : 0.4);
    ctx.font = '500 11px Inter, system-ui';
    ctx.fillStyle = `rgba(${r},${g},${b},${labelAlpha})`;
    ctx.fillText(neb.label.toUpperCase(), neb.x, neb.y + neb.radius * 1.1 + 8);
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// ── Elapsed time ticker ──
const elapsedEl = document.querySelector('.elapsed');
let baseSeconds = 2 * 3600 + 34 * 60 + 17;
setInterval(() => {
  baseSeconds++;
  const h = String(Math.floor(baseSeconds / 3600)).padStart(2, '0');
  const m = String(Math.floor((baseSeconds % 3600) / 60)).padStart(2, '0');
  const s = String(baseSeconds % 60).padStart(2, '0');
  elapsedEl.textContent = `${h}:${m}:${s}`;
}, 1000);
</script>
</body>
</html>
