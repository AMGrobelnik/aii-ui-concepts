<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra Pipeline (Inline Expand)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  /* ================================================================
     RESET & CSS VARIABLES
     ================================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1d23;
    --surface: #22262e;
    --surface-raised: #282d36;
    --border: #2e3440;
    --border-light: #3a4150;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --text-muted: #5a6577;

    --green: #22c55e;
    --green-glow: rgba(34, 197, 94, 0.35);
    --green-dim: rgba(34, 197, 94, 0.12);
    --purple: #a78bfa;
    --purple-glow: rgba(167, 139, 250, 0.35);
    --purple-dim: rgba(167, 139, 250, 0.12);
    --blue: #3b82f6;
    --blue-glow: rgba(59, 130, 246, 0.35);
    --blue-dim: rgba(59, 130, 246, 0.12);
    --orange: #f59e0b;
    --orange-glow: rgba(245, 158, 11, 0.35);
    --orange-dim: rgba(245, 158, 11, 0.12);
    --red: #ef4444;

    --card-radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --tree-line: #2e3440;
    --transition: 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    --transition-fast: 0.2s cubic-bezier(0.22, 1, 0.36, 1);
  }

  html { font-size: 14px; height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* subtle grid background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(100,116,155,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100,116,155,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ================================================================
     HEADER
     ================================================================ */
  .header {
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(34, 38, 46, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-brand {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }
  .header-sep {
    width: 1px; height: 20px;
    background: var(--border);
  }
  .header-run {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }

  /* progress ring */
  .header-ring {
    width: 36px; height: 36px;
    position: relative;
    flex-shrink: 0;
  }
  .header-ring svg { width: 100%; height: 100%; }
  .header-ring .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .header-ring .ring-fill {
    fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 100.5; stroke-dashoffset: 35.2;
    transition: stroke-dashoffset 1.2s ease;
  }
  .header-ring .ring-text {
    fill: var(--text); font-size: 9px; font-weight: 700;
    text-anchor: middle; dominant-baseline: central;
    font-family: 'Inter', sans-serif;
  }
  .ring-glow {
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 1px dashed rgba(34, 197, 94, 0.3);
    animation: ringRotate 10s linear infinite;
  }
  @keyframes ringRotate { to { transform: rotate(360deg); } }

  .header-stats {
    display: flex; gap: 18px; margin-left: auto;
    font-size: 11px; color: var(--text-dim);
  }
  .header-stats span { display: flex; align-items: center; gap: 5px; }
  .stat-indicator {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* ================================================================
     MODULES CONTAINER
     ================================================================ */
  .modules-area {
    padding: 24px 28px 40px;
    position: relative;
    z-index: 1;
  }
  .modules-row {
    display: flex;
    gap: 16px;
    position: relative;
    align-items: flex-start;
  }

  /* ================================================================
     MODULE COLUMN
     ================================================================ */
  .module-col {
    flex: 1;
    min-width: 0;
    position: relative;
    transition: flex var(--transition);
  }

  /* ================================================================
     MODULE CARD (top-level)
     ================================================================ */
  .module-card {
    width: 100%;
    background: linear-gradient(135deg, rgba(34,38,46,0.95), rgba(34,38,46,0.75));
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color var(--transition), transform var(--transition-fast),
                box-shadow var(--transition);
  }
  .module-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: var(--card-radius) 0 0 var(--card-radius);
    transition: width var(--transition);
  }
  .module-card:hover { transform: translateY(-1px); }

  .module-card[data-color="green"]::before { background: var(--green); }
  .module-card[data-color="purple"]::before { background: var(--purple); }
  .module-card[data-color="blue"]::before { background: var(--blue); }
  .module-card[data-color="orange"]::before { background: var(--orange); }

  .module-card.active { border-color: rgba(255,255,255,0.1); }
  .module-card.active[data-color="green"] { box-shadow: 0 0 24px rgba(34,197,94,0.12); }
  .module-card.active[data-color="purple"] { box-shadow: 0 0 24px rgba(167,139,250,0.12); }
  .module-card.active[data-color="blue"] { box-shadow: 0 0 24px rgba(59,130,246,0.12); }
  .module-card.active[data-color="orange"] { box-shadow: 0 0 24px rgba(245,158,11,0.12); }

  /* glow pulse on active cards */
  .module-card.active::after {
    content: '';
    position: absolute; inset: -1px;
    border-radius: var(--card-radius);
    animation: cardGlow 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  .module-card.active[data-color="green"]::after { box-shadow: inset 0 0 24px rgba(34,197,94,0.05); }
  .module-card.active[data-color="purple"]::after { box-shadow: inset 0 0 24px rgba(167,139,250,0.05); }
  .module-card.active[data-color="blue"]::after { box-shadow: inset 0 0 24px rgba(59,130,246,0.05); }
  .module-card.active[data-color="orange"]::after { box-shadow: inset 0 0 24px rgba(245,158,11,0.05); }
  @keyframes cardGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* shimmer */
  .card-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.025) 48%,
                rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.025) 52%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 3.5s ease-in-out infinite;
    pointer-events: none; opacity: 0;
    border-radius: var(--card-radius);
  }
  .module-card.active .card-shimmer { opacity: 1; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-icon { font-size: 15px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-status {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: 6px; margin-left: auto;
  }
  .card-status.done { background: var(--green-dim); color: var(--green); }
  .card-status.running {
    background: var(--blue-dim); color: var(--blue);
    animation: statusPulse 2s ease-in-out infinite;
  }
  .card-status.pending { background: rgba(136,146,164,0.1); color: var(--text-muted); }
  @keyframes statusPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; background: rgba(59,130,246,0.2); }
  }

  .card-progress {
    height: 3px; background: rgba(255,255,255,0.05);
    border-radius: 2px; overflow: hidden;
  }
  .card-progress-fill {
    height: 100%; border-radius: 2px;
    width: 0; transition: width 0.8s ease;
  }
  .card-sub-label {
    font-size: 10px; color: var(--text-muted); margin-top: 5px;
  }

  /* ================================================================
     TREE SUB-MODULES (below each module card)
     ================================================================ */
  .submods {
    padding: 10px 0 0 0;
    position: relative;
  }
  .tree-container {
    position: relative;
    padding-left: 20px;
  }
  /* vertical tree trunk */
  .tree-container::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    width: 1px;
    background: var(--tree-line);
    height: var(--tree-line-h, calc(100% - 18px));
    transition: height var(--transition);
  }

  /* ================================================================
     SUB-MODULE ROW (collapsed state)
     ================================================================ */
  .submod-row {
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    font-size: 13px;
    cursor: pointer;
    padding: 6px 8px 6px 0;
    border-radius: var(--radius-xs);
    opacity: 0;
    transform: translateX(-12px);
    transition: opacity 0.3s ease, transform 0.3s ease,
                background var(--transition-fast), margin var(--transition),
                padding var(--transition);
  }
  .submod-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .submod-row:hover { background: rgba(255,255,255,0.02); }

  /* horizontal branch line (L-connector arm) */
  .submod-row::before {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    width: 12px;
    height: 1px;
    background: var(--tree-line);
    transition: top var(--transition);
  }

  .submod-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    transition: all 0.3s;
  }
  .submod-dot.done { background: var(--green); opacity: 0.7; }
  .submod-dot.running {
    background: var(--blue);
    animation: dotPulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--blue-glow);
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 6px rgba(59,130,246,0.4); }
    50% { transform: scale(1.3); box-shadow: 0 0 16px rgba(59,130,246,0.7); }
  }
  .submod-dot.pending {
    background: transparent;
    border: 1.5px solid var(--text-muted);
    opacity: 0.5;
  }

  .submod-label {
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color var(--transition-fast), font-weight var(--transition-fast);
  }
  .submod-row.active-sub .submod-label { color: var(--text); font-weight: 500; }
  .submod-row.done-sub .submod-label { color: var(--text-dim); }
  .submod-score {
    margin-left: auto; font-size: 10px; font-weight: 600;
    color: var(--text-muted); flex-shrink: 0;
  }

  /* ================================================================
     EXPANDED SUB-MODULE (inline detail card)
     ================================================================ */
  .submod-row.expanded {
    flex-direction: column;
    align-items: stretch;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    padding: 0;
    margin: 6px 0;
    overflow: hidden;
  }
  /* hide the horizontal tree branch on expanded rows */
  .submod-row.expanded::before {
    width: 12px;
    top: 22px;
  }

  .expand-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    position: relative;
  }
  .expand-header:hover {
    background: rgba(255,255,255,0.015);
  }
  .expand-chevron {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 11px;
    transition: transform var(--transition);
    flex-shrink: 0;
  }
  .submod-row.expanded .expand-chevron {
    transform: rotate(180deg);
  }

  .expand-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                padding 0.3s ease, opacity 0.3s ease;
    opacity: 0;
    padding: 0 14px;
    border-top: 0px solid transparent;
  }
  .submod-row.expanded .expand-body {
    max-height: 500px;
    opacity: 1;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }

  .expand-summary {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin: 10px 0;
    font-style: italic;
  }

  /* inline stat row */
  .expand-stats {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .expand-stat {
    flex: 1;
    min-width: 90px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: var(--radius-xs);
    padding: 8px 10px;
  }
  .expand-stat-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .expand-stat-value {
    font-size: 15px;
    font-weight: 700;
  }
  .expand-stat-bar {
    height: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 6px;
  }
  .expand-stat-bar-fill {
    height: 100%; border-radius: 2px;
    width: 0;
    transition: width 0.6s ease;
  }

  /* inline items list */
  .expand-items { margin-bottom: 8px; }
  .expand-items-title {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .expand-item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 11px;
    transition: background 0.15s;
  }
  .expand-item-row:hover { background: rgba(255,255,255,0.02); }
  .expand-item-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .expand-item-dot.done { background: var(--green); }
  .expand-item-dot.running {
    background: var(--blue);
    animation: miniDotPulse 1.5s ease-in-out infinite;
  }
  .expand-item-dot.pending { border: 1px solid var(--text-muted); }
  @keyframes miniDotPulse {
    0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
  }
  .expand-item-name { color: var(--text-dim); }
  .expand-item-meta { margin-left: auto; font-size: 10px; color: var(--text-muted); }

  /* running shimmer on item rows */
  .expand-item-row.running-item {
    position: relative; overflow: hidden;
  }
  .expand-item-row.running-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.04) 45%,
                rgba(59,130,246,0.08) 50%, rgba(59,130,246,0.04) 55%, transparent 100%);
    background-size: 200% 100%;
    animation: rowShimmer 2.5s ease-in-out infinite;
    pointer-events: none;
    border-radius: 4px;
  }
  @keyframes rowShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* activity log */
  .expand-log {
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 4px;
  }
  .expand-log-title {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .expand-log-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
    font-size: 10px;
    color: var(--text-dim);
  }
  .expand-log-time {
    color: var(--text-muted);
    font-size: 9px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    width: 38px;
  }
  .expand-log-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ================================================================
     PARTICLE CANVAS
     ================================================================ */
  #particleCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  /* ================================================================
     RESPONSIVE
     ================================================================ */
  @media (max-width: 1000px) {
    .modules-row { flex-wrap: wrap; }
    .module-col { flex: 0 0 48%; min-width: 48%; }
  }
  @media (max-width: 600px) {
    .modules-row { flex-direction: column; }
    .module-col { flex: 1 1 100%; }
    .header { padding: 0 16px; gap: 10px; }
    .modules-area { padding: 16px 16px 32px; }
    .header-stats { display: none; }
  }

  /* ================================================================
     SCROLLBAR
     ================================================================ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="header-brand">AI Inventor</span>
  <div class="header-sep"></div>
  <span class="header-run">Run #47</span>
  <div class="header-ring">
    <div class="ring-glow"></div>
    <svg viewBox="0 0 36 36">
      <circle class="ring-track" cx="18" cy="18" r="16" />
      <circle class="ring-fill" cx="18" cy="18" r="16" transform="rotate(-90 18 18)" />
      <text class="ring-text" x="18" y="18">65%</text>
    </svg>
  </div>
  <div class="header-stats">
    <span><span class="stat-indicator" style="background:var(--green)"></span>3 Done</span>
    <span><span class="stat-indicator" style="background:var(--blue)"></span>1 Active</span>

    <span style="color:var(--text-muted)">3h 12m &middot; $4.82</span>
  </div>
</div>

<!-- PARTICLE CANVAS -->
<canvas id="particleCanvas"></canvas>

<!-- MODULES -->
<div class="modules-area" id="modulesArea">
  <div class="modules-row" id="modulesRow">
    <!-- JS builds these -->
  </div>
</div>

// =====================================================================
// STATE
// =====================================================================
let activeModuleIdx = 2;
let expandedSubs = {};       // key: "mi-si", value: true
let cardElements = [];
let submodElements = [];     // submodElements[mi][si] = row element
let treeContainers = [];     // treeContainers[mi] = tree-container div

// Canvas
let particleCanvas, pCtx;
let connectorParticles = [];
let treeParticles = [];
let burstParticles = [];
let animFrame;
let lastTime = 0;
let connectorTimer = 0;
let treeTimer = 0;

// =====================================================================
// BUILD UI
// =====================================================================
function buildModules() {
  const row = document.getElementById('modulesRow');
  row.innerHTML = '';
  cardElements = [];
  submodElements = [];
  treeContainers = [];

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'module-col';
    col.dataset.mi = mi;

    // ---------- Module Card ----------
    const card = document.createElement('div');
    card.className = 'module-card' + (mi === activeModuleIdx ? ' active' : '');
    card.dataset.color = mod.color;
    card.dataset.idx = mi;
    card.innerHTML = `
      <div class="card-shimmer"></div>
      <div class="card-header">
        <span class="card-icon">${mod.icon}</span>
        <span class="card-title">${mod.title}</span>
        <span class="card-status ${mod.status}">${statusLabel(mod.status)}</span>
      </div>
      <div class="card-progress">
        <div class="card-progress-fill" style="background:var(--${mod.color})" data-pct="${mod.progress}"></div>
      </div>
      <div class="card-sub-label">${mod.subLabel}</div>
    `;
    card.addEventListener('click', () => selectModule(mi));
    col.appendChild(card);
    cardElements.push(card);

    // ---------- Sub-modules tree ----------
    const subsDiv = document.createElement('div');
    subsDiv.className = 'submods';
    const tree = document.createElement('div');
    tree.className = 'tree-container';
    tree.dataset.mi = mi;

    const subEls = [];
    mod.subs.forEach((sub, si) => {
      const rowEl = buildSubRow(mod, mi, sub, si);
      tree.appendChild(rowEl);
      subEls.push(rowEl);
    });

    subsDiv.appendChild(tree);
    col.appendChild(subsDiv);
    submodElements.push(subEls);
    treeContainers.push(tree);

    row.appendChild(col);
  });

  // Animate progress bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.card-progress-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });

  // Stagger sub-module entrance
  MODULES.forEach((mod, mi) => {
    if (mi === activeModuleIdx) {
      animateSubEntrance(mi);
    } else {
      submodElements[mi].forEach(el => el.classList.add('visible'));
    }
  });

  // Auto-expand running sub-module
  MODULES.forEach((mod, mi) => {
    mod.subs.forEach((sub, si) => {
      if (sub.status === 'running') {
        setTimeout(() => toggleExpand(mi, si), 600);
      }
    });
  });

  // Compute tree line heights after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(computeTreeLineHeights);
  });
}

function buildSubRow(mod, mi, sub, si) {
  const row = document.createElement('div');
  row.className = 'submod-row';
  if (sub.status === 'done') row.classList.add('done-sub');
  if (sub.status === 'running') row.classList.add('active-sub');
  row.dataset.modIdx = mi;
  row.dataset.subIdx = si;

  const key = mi + '-' + si;
  const isExpanded = !!expandedSubs[key];

  if (isExpanded) {
    row.classList.add('expanded');
    row.innerHTML = buildExpandedContent(mod, mi, sub, si);
  } else {
    row.innerHTML = buildCollapsedContent(sub);
  }

  row.addEventListener('click', (e) => {
    // prevent double-firing from child clicks
    if (e.target.closest('.expand-header') || !row.classList.contains('expanded')) {
      toggleExpand(mi, si);
    }
  });

  return row;
}

function buildCollapsedContent(sub) {
  const dotClass = 'submod-dot ' + sub.status;
  const scoreHtml = sub.score ? `<span class="submod-score">${sub.score}</span>` : '';
  const extraHtml = sub.extra ? `<span class="submod-score" style="color:var(--blue)">${sub.extra}</span>` : '';
  return `
    <span class="${dotClass}"></span>
    <span class="submod-label">${sub.label}</span>
    ${scoreHtml}${extraHtml}
    <span class="expand-chevron">\u25BC</span>
  `;
}

function buildExpandedContent(mod, mi, sub, si) {
  const dotClass = 'submod-dot ' + sub.status;
  const scoreHtml = sub.score ? `<span class="submod-score">${sub.score}</span>` : '';
  const extraHtml = sub.extra ? `<span class="submod-score" style="color:var(--blue)">${sub.extra}</span>` : '';

  const colorVar = `var(--${mod.color})`;

  let itemsHtml = '';
  if (sub.items && sub.items.length > 0) {
    itemsHtml = `
      <div class="expand-items">
        <div class="expand-items-title">Artifacts</div>
        ${sub.items.map(it => `
          <div class="expand-item-row ${it.status === 'running' ? 'running-item' : ''}">
            <span class="expand-item-dot ${it.status}"></span>
            <span class="expand-item-name">${it.name}</span>
            <span class="expand-item-meta">${it.meta}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  const logHtml = sub.log.map(l => `
    <div class="expand-log-item">
      <span class="expand-log-time">${l.time}</span>
      <span class="expand-log-dot" style="background:${l.color}"></span>
      <span>${l.text}</span>
    </div>
  `).join('');

  return `
    <div class="expand-header">
      <span class="${dotClass}"></span>
      <span class="submod-label">${sub.label}</span>
      ${scoreHtml}${extraHtml}
      <span class="expand-chevron">\u25BC</span>
    </div>
    <div class="expand-body">
      <div class="expand-summary">"${sub.summary}"</div>
      <div class="expand-stats">
        <div class="expand-stat">
          <div class="expand-stat-label">Duration</div>
          <div class="expand-stat-value" style="color:${colorVar}">${sub.stats.duration}</div>
          <div class="expand-stat-bar">
            <div class="expand-stat-bar-fill" style="background:${colorVar}" data-pct="${sub.stats.durationPct}"></div>
          </div>
        </div>
        <div class="expand-stat">
          <div class="expand-stat-label">Cost</div>
          <div class="expand-stat-value" style="color:${colorVar}">${sub.stats.cost}</div>
          <div class="expand-stat-bar">
            <div class="expand-stat-bar-fill" style="background:${colorVar}" data-pct="${sub.stats.costPct}"></div>
          </div>
        </div>
      </div>
      ${itemsHtml}
      <div class="expand-log">
        <div class="expand-log-title">Activity</div>
        ${logHtml}
      </div>
    </div>
  `;
}

function statusLabel(s) {
  if (s === 'done') return 'Done';
  if (s === 'running') return 'Running';
  return 'Pending';
}

// =====================================================================
// EXPAND / COLLAPSE
// =====================================================================
function toggleExpand(mi, si) {
  const key = mi + '-' + si;
  const wasExpanded = !!expandedSubs[key];

  if (wasExpanded) {
    delete expandedSubs[key];
  } else {
    expandedSubs[key] = true;
  }

  // Rebuild the row in place
  const mod = MODULES[mi];
  const sub = mod.subs[si];
  const oldRow = submodElements[mi][si];
  const newRow = document.createElement('div');
  newRow.className = 'submod-row visible';
  if (sub.status === 'done') newRow.classList.add('done-sub');
  if (sub.status === 'running') newRow.classList.add('active-sub');
  newRow.dataset.modIdx = mi;
  newRow.dataset.subIdx = si;

  if (expandedSubs[key]) {
    newRow.classList.add('expanded');
    newRow.innerHTML = buildExpandedContent(mod, mi, sub, si);
  } else {
    newRow.innerHTML = buildCollapsedContent(sub);
  }

  newRow.addEventListener('click', (e) => {
    const header = e.target.closest('.expand-header');
    if (header || !newRow.classList.contains('expanded')) {
      toggleExpand(mi, si);
    }
  });

  oldRow.replaceWith(newRow);
  submodElements[mi][si] = newRow;

  // Animate stat bars if expanded
  if (expandedSubs[key]) {
    requestAnimationFrame(() => {
      newRow.querySelectorAll('.expand-stat-bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });
  }

  // Recompute tree line heights
  requestAnimationFrame(() => {
    requestAnimationFrame(computeTreeLineHeights);
  });

  // Reset tree particles since geometry changed
  treeParticles = [];
}

// =====================================================================
// MODULE SELECTION
// =====================================================================
function selectModule(mi) {
  if (mi === activeModuleIdx) return;
  activeModuleIdx = mi;
  cardElements.forEach((c, i) => c.classList.toggle('active', i === mi));
  animateSubEntrance(mi);
  treeParticles = [];
}

// =====================================================================
// TREE HELPERS
// =====================================================================
function computeTreeLineHeights() {
  document.querySelectorAll('.tree-container').forEach(tc => {
    const rows = tc.querySelectorAll('.submod-row');
    if (rows.length === 0) return;
    const lastRow = rows[rows.length - 1];
    const tcRect = tc.getBoundingClientRect();
    const lastRect = lastRow.getBoundingClientRect();
    // For expanded rows, connect to the header area (top ~22px)
    let targetY;
    if (lastRow.classList.contains('expanded')) {
      const header = lastRow.querySelector('.expand-header');
      if (header) {
        const hRect = header.getBoundingClientRect();
        targetY = hRect.top + hRect.height / 2;
      } else {
        targetY = lastRect.top + 22;
      }
    } else {
      targetY = lastRect.top + lastRect.height / 2;
    }
    const h = targetY - tcRect.top;
    tc.style.setProperty('--tree-line-h', Math.max(0, h) + 'px');
  });
}

function animateSubEntrance(mi) {
  const subs = submodElements[mi];
  if (!subs) return;
  subs.forEach((el, i) => {
    el.classList.remove('visible');
    setTimeout(() => el.classList.add('visible'), 60 + i * 45);
  });
}

// =====================================================================
// PARTICLE CANVAS
// =====================================================================
function initCanvas() {
  particleCanvas = document.getElementById('particleCanvas');
  pCtx = particleCanvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
  computeTreeLineHeights();
}

function elRect(el) {
  return el.getBoundingClientRect();
}

// =====================================================================
// CONNECTOR PARTICLES (horizontal, between module cards)
// =====================================================================
function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardElements[i];
    const toCard = cardElements[i + 1];
    if (!fromCard || !toCard) continue;

    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];
    if (fromMod.status === 'pending' || toMod.status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;

    const cs = getComputedStyle(document.documentElement);
    let color, speed, size, alpha;
    if (fromMod.status === 'done' && (toMod.status === 'done' || toMod.status === 'running')) {
      speed = 40 + Math.random() * 20;
      color = cs.getPropertyValue('--' + fromMod.color).trim();
      size = 2.5;
      alpha = 0.45;
    } else {
      speed = 65 + Math.random() * 30;
      color = cs.getPropertyValue('--blue').trim();
      size = 3;
      alpha = 0.7;
    }

    connectorParticles.push({
      x: fromRect.right,
      y: y + (Math.random() - 0.5) * 4,
      targetX: toRect.left,
      speed, color, size, alpha,
      trail: [],
    });
  }
}

// =====================================================================
// TREE PARTICLES (L-shaped: card -> vertical trunk -> horizontal branch -> dot)
// =====================================================================
function findActiveSubIdx(mi) {
  const mod = MODULES[mi];
  for (let i = 0; i < mod.subs.length; i++) {
    if (mod.subs[i].status === 'running') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  const mi = activeModuleIdx;
  const si = findActiveSubIdx(mi);
  if (si < 0) return;
  if (!cardElements[mi] || !submodElements[mi] || !submodElements[mi][si]) return;

  const cardEl = cardElements[mi];
  const subRow = submodElements[mi][si];
  const subDot = subRow.querySelector('.submod-dot');
  if (!subDot) return;

  const treeContainer = subRow.closest('.tree-container');
  if (!treeContainer) return;

  const cardRect = elRect(cardEl);
  const dotRect = elRect(subDot);
  const treeRect = elRect(treeContainer);

  // L-shaped path:
  // 1) Start at bottom-center of card
  // 2) Drop down to the vertical trunk X position
  // 3) Travel down the trunk to the branch Y
  // 4) Travel right along the branch to the dot

  const startX = cardRect.left + cardRect.width / 2;
  const startY = cardRect.bottom;
  const trunkX = treeRect.left + 8;  // matches CSS left: 8px
  const branchY = dotRect.top + dotRect.height / 2;
  const endX = dotRect.left + dotRect.width / 2;
  const endY = branchY;

  const waypoints = [
    { x: startX, y: startY },
    { x: trunkX, y: startY + 8 },    // diagonal move to trunk
    { x: trunkX, y: branchY },       // travel down trunk
    { x: endX,   y: endY },          // branch right to dot
  ];

  const cs = getComputedStyle(document.documentElement);
  const color = cs.getPropertyValue('--blue').trim();

  treeParticles.push({
    waypoints,
    wpIdx: 0,
    x: waypoints[0].x,
    y: waypoints[0].y,
    speed: 90,
    color,
    size: 3,
    alpha: 0.85,
    trail: [],
  });
}

// =====================================================================
// BURST EFFECT (when tree particle reaches target)
// =====================================================================
function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.3;
    const speed = 25 + Math.random() * 35;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.8 + Math.random() * 0.5,
      color,
      size: 2,
    });
  }
}

// =====================================================================
// ANIMATION LOOP
// =====================================================================
function animate(now) {
  animFrame = requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  // Ambient background
  drawAmbientParticles(dt);

  // Spawn timers
  connectorTimer += dt;
  if (connectorTimer > 0.9) {
    connectorTimer = 0;
    spawnConnectorParticle();
  }
  treeTimer += dt;
  if (treeTimer > 0.55) {
    treeTimer = 0;
    spawnTreeParticle();
  }

  // Static connectors
  drawStaticConnectors();

  // Animated particles
  drawConnectorParticles(dt);
  drawTreeParticles(dt);
  drawBurstParticles(dt);
}

function drawStaticConnectors() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardElements[i];
    const toCard = cardElements[i + 1];
    if (!fromCard || !toCard) continue;
    if (MODULES[i].status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;
    const toPending = MODULES[i + 1].status === 'pending';

    pCtx.beginPath();
    pCtx.moveTo(fromRect.right + 2, y);
    pCtx.lineTo(toRect.left - 2, y);
    pCtx.strokeStyle = '#2e3440';
    pCtx.lineWidth = 1;
    pCtx.globalAlpha = toPending ? 0.25 : 0.5;
    pCtx.setLineDash(toPending ? [4, 4] : []);
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.globalAlpha = 1;
  }
}

function drawConnectorParticles(dt) {
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 14) p.trail.shift();

    // trail
    if (p.trail.length > 1) {
      pCtx.beginPath();
      pCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      pCtx.strokeStyle = p.color;
      pCtx.globalAlpha = p.alpha * 0.25;
      pCtx.lineWidth = p.size * 0.5;
      pCtx.stroke();
    }

    // head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // glow
    pCtx.globalAlpha = p.alpha * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;

    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }
}

function drawTreeParticles(dt) {
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }

    const dx = wp.x - p.x;
    const dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 2) {
      p.x = wp.x;
      p.y = wp.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();

    // trail segments with fade
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        pCtx.globalAlpha = ratio * p.alpha * 0.35;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = p.color;
        pCtx.lineWidth = p.size * 0.5 * ratio;
        pCtx.stroke();
      }
    }

    // head glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }
}

function drawBurstParticles(dt) {
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.94;
    p.vy *= 0.94;

    pCtx.globalAlpha = p.life * 0.7;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // glow
    pCtx.globalAlpha = p.life * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3 * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }
}

// =====================================================================
// LOG ROTATION (for running sub-modules)
// =====================================================================
let logRotateTimers = [];

function startLogRotation() {
  logRotateTimers.forEach(t => clearInterval(t));
  logRotateTimers = [];

  // Find all expanded running subs
  Object.keys(expandedSubs).forEach(key => {
    const [mi, si] = key.split('-').map(Number);
    const sub = MODULES[mi].subs[si];
    if (sub.status !== 'running') return;

    const extraLogs = [
      { time: '16:31', text: 'Token count: 14,282 in / 3,841 out', color: 'var(--text-dim)' },
      { time: '16:31', text: 'Writing Gumbel temperature scheduler...', color: 'var(--blue)' },
      { time: '16:30', text: 'Tool call: file_write gumbel_gates.py', color: 'var(--text-dim)' },
      { time: '16:30', text: 'Forward pass implementation started', color: 'var(--blue)' },
      { time: '16:29', text: 'Validation: search_cell.py all checks passed', color: 'var(--green)' },
    ];
    let logIdx = 0;

    const timer = setInterval(() => {
      const row = submodElements[mi][si];
      if (!row || !row.classList.contains('expanded')) return;
      const logContainer = row.querySelector('.expand-log');
      if (!logContainer) return;

      const items = logContainer.querySelectorAll('.expand-log-item');
      const extra = extraLogs[logIdx % extraLogs.length];
      logIdx++;

      // Remove last if 4+
      if (items.length >= 4) {
        const last = items[items.length - 1];
        last.style.opacity = '0';
        last.style.transform = 'translateX(-4px)';
        last.style.transition = 'opacity 0.3s, transform 0.3s';
        setTimeout(() => last.remove(), 300);
      }

      const newItem = document.createElement('div');
      newItem.className = 'expand-log-item';
      newItem.style.opacity = '0';
      newItem.style.transform = 'translateX(-4px)';
      newItem.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      newItem.innerHTML = `
        <span class="expand-log-time">${extra.time}</span>
        <span class="expand-log-dot" style="background:${extra.color}"></span>
        <span>${extra.text}</span>
      `;

      // Insert after the title
      const title = logContainer.querySelector('.expand-log-title');
      if (title && title.nextSibling) {
        logContainer.insertBefore(newItem, title.nextSibling);
      } else {
        logContainer.appendChild(newItem);
      }

      requestAnimationFrame(() => {
        newItem.style.opacity = '1';
        newItem.style.transform = 'translateX(0)';
      });
    }, 4000);

    logRotateTimers.push(timer);
  });
}

// Wrap toggleExpand to restart log rotation after each expand/collapse
const _baseToggleExpand = toggleExpand;
toggleExpand = function(mi, si) {
  _baseToggleExpand(mi, si);
  setTimeout(startLogRotation, 100);
};

// =====================================================================
// AMBIENT BACKGROUND PARTICLES
// =====================================================================
let ambientParticles = [];

function initAmbientParticles() {
  const count = 30;
  for (let i = 0; i < count; i++) {
    ambientParticles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      size: 1 + Math.random() * 1.5,
      alpha: 0.03 + Math.random() * 0.06,
    });
  }
}

function drawAmbientParticles(dt) {
  const w = particleCanvas.width;
  const h = particleCanvas.height;

  for (const p of ambientParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // wrap
    if (p.x < 0) p.x = w;
    if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h;
    if (p.y > h) p.y = 0;

    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = '#8892a4';
    pCtx.fill();
  }

  // Draw faint connection lines between nearby particles
  pCtx.lineWidth = 0.5;
  for (let i = 0; i < ambientParticles.length; i++) {
    for (let j = i + 1; j < ambientParticles.length; j++) {
      const a = ambientParticles[i];
      const b = ambientParticles[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        pCtx.globalAlpha = (1 - dist / 120) * 0.03;
        pCtx.beginPath();
        pCtx.moveTo(a.x, a.y);
        pCtx.lineTo(b.x, b.y);
        pCtx.strokeStyle = '#8892a4';
        pCtx.stroke();
      }
    }
  }
  pCtx.globalAlpha = 1;
}

// (ambient particles integrated directly in animate loop above)

// =====================================================================
// INIT
// =====================================================================
function init() {
  buildModules();
  initCanvas();
  initAmbientParticles();
  lastTime = performance.now();
  animFrame = requestAnimationFrame(animate);
  setTimeout(startLogRotation, 800);
}

document.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => {
  requestAnimationFrame(() => {
    requestAnimationFrame(computeTreeLineHeights);
  });
});
</script>
