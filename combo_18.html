<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Diamond Tab Modules</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --bg-panel: #0f1520; --bg-surface: #141c2b; --bg-card: #182030;
    --border: #1e2a3e; --border-light: #263248;
    --text: #c8d4e6; --text-dim: #6b7a92; --text-muted: #3d4e66;
    --blue: #4a9eff; --blue-dim: #2a6fcc; --blue-glow: rgba(74,158,255,0.35);
    --green: #34d399; --green-dim: #1a7a52;
    --amber: #f59e0b; --amber-dim: #9a6400;
    --red: #ef4444; --cyan: #22d3ee; --purple: #a78bfa;
    --ring-size: 40px; --diamond-size: 14px; --dot-size: 12px; --sub-dot-size: 9px;
    --tr: 0.25s ease; --tr-f: 0.15s ease;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px; overflow-x: hidden;
  }

  /* ── Overall 4px progress bar ── */
  .overall-progress {
    width: 100%; max-width: 820px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 0;
  }
  .overall-progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--blue-dim), var(--blue), var(--cyan));
    transition: width 0.6s ease; position: relative;
  }
  .overall-progress-fill::after {
    content: ''; position: absolute; right: 0; top: -1px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan), 0 0 16px rgba(34,211,238,0.3);
  }

  /* ── Tab bar ── */
  .tab-bar {
    display: flex; width: 100%; max-width: 820px;
    background: var(--bg-panel); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 10px 10px; overflow: hidden;
  }
  .tab {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px 12px 14px; cursor: pointer; position: relative;
    transition: background var(--tr); user-select: none;
    border-right: 1px solid var(--border);
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: rgba(74,158,255,0.04); }
  .tab.active { background: rgba(74,158,255,0.06); }
  .tab::after {
    content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 3px;
    border-radius: 3px 3px 0 0; background: transparent;
    transition: background var(--tr), box-shadow var(--tr);
  }
  .tab.active::after {
    background: var(--blue);
    box-shadow: 0 0 10px var(--blue-glow), 0 -2px 20px var(--blue-glow);
  }
  .tab:focus-visible { outline: 2px solid var(--blue); outline-offset: -2px; }

  /* ── Diamond-in-ring marker ── */
  .diamond-ring { width: var(--ring-size); height: var(--ring-size); position: relative; flex-shrink: 0; }
  .diamond-ring .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid var(--text-muted); transition: border-color var(--tr), box-shadow var(--tr);
  }
  .diamond-ring .diamond {
    position: absolute; top: 50%; left: 50%;
    width: var(--diamond-size); height: var(--diamond-size);
    transform: translate(-50%,-50%) rotate(45deg);
    background: var(--text-muted); border-radius: 2px;
    transition: background var(--tr), box-shadow var(--tr);
  }
  /* Diamond states */
  .diamond-ring.st-done .ring { border-color: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.2); }
  .diamond-ring.st-done .diamond { background: var(--green); }
  .diamond-ring.st-active .ring {
    border-color: var(--blue); box-shadow: 0 0 10px var(--blue-glow);
    animation: ring-pulse 2.5s ease-in-out infinite;
  }
  .diamond-ring.st-active .diamond { background: var(--blue); box-shadow: 0 0 8px var(--blue-glow); }
  .diamond-ring.st-pending .ring { border-color: var(--text-muted); }
  .diamond-ring.st-pending .diamond {
    background: transparent; border: 2px solid var(--text-muted); border-radius: 2px;
  }
  @keyframes ring-pulse {
    0%,100% { box-shadow: 0 0 8px var(--blue-glow); }
    50%     { box-shadow: 0 0 18px var(--blue-glow), 0 0 30px rgba(74,158,255,0.15); }
  }

  /* Tab label */
  .tab-label { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
  .tab-name {
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    letter-spacing: 0.03em; transition: color var(--tr);
  }
  .tab.active .tab-name { color: var(--text); }
  .tab-status {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    font-variant-numeric: tabular-nums; transition: color var(--tr);
  }
  .tab-status.done  { color: var(--green-dim); }
  .tab-status.score { color: var(--blue-dim); }
  .tab-status.prog  { color: var(--amber-dim); }
  .tab.active .tab-status.done  { color: var(--green); }
  .tab.active .tab-status.score { color: var(--blue); }
  .tab.active .tab-status.prog  { color: var(--amber); }

  /* ── Dot row (sub-modules) ── */
  .dot-row-container { width: 100%; max-width: 820px; margin-top: 16px; min-height: 48px; }
  .dot-row {
    display: flex; align-items: center; justify-content: center;
    padding: 12px 20px; background: var(--bg-panel);
    border: 1px solid var(--border); border-radius: 10px;
    opacity: 0; transform: translateY(-6px); animation: slide-in 0.3s ease forwards;
  }
  @keyframes slide-in { to { opacity: 1; transform: translateY(0); } }

  .dot-item {
    display: flex; align-items: center; gap: 7px; cursor: pointer;
    padding: 4px 8px; border-radius: 6px; position: relative;
    transition: background var(--tr-f);
  }
  .dot-item:hover { background: rgba(74,158,255,0.06); }
  .dot-item.selected { background: rgba(74,158,255,0.1); }
  .dot-item:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
  .dot-connector { width: 20px; height: 1px; background: var(--border-light); flex-shrink: 0; }

  .dot-marker {
    width: var(--dot-size); height: var(--dot-size); border-radius: 50%;
    flex-shrink: 0; position: relative; transition: all var(--tr);
  }
  .dot-marker.d-done { background: var(--green); box-shadow: 0 0 5px rgba(52,211,153,0.3); }
  .dot-marker.d-active {
    background: var(--blue); box-shadow: 0 0 8px var(--blue-glow);
    animation: dot-pulse 2s ease-in-out infinite;
  }
  .dot-marker.d-active::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid rgba(74,158,255,0.4);
    animation: dot-ring-pulse 2s ease-in-out infinite;
  }
  .dot-marker.d-pending { background: transparent; border: 2px solid var(--text-muted); }
  .dot-marker.d-error { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }
  @keyframes dot-pulse {
    0%,100% { box-shadow: 0 0 6px var(--blue-glow); }
    50%     { box-shadow: 0 0 14px var(--blue-glow); }
  }
  @keyframes dot-ring-pulse {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50%     { opacity: 1;   transform: scale(1.1); }
  }
  .dot-label {
    font-size: 11.5px; font-weight: 500; color: var(--text-dim);
    white-space: nowrap; transition: color var(--tr-f);
  }
  .dot-item.selected .dot-label, .dot-item:hover .dot-label { color: var(--text); }
  .dot-suffix { font-size: 10px; color: var(--text-muted); margin-left: -3px; }
  .dot-suffix.sf-done { color: var(--green-dim); }
  .dot-suffix.sf-run  { color: var(--blue-dim); }

  /* ── Sub-dot row (detail level, e.g. artifact dots) ── */
  .sub-dot-container { width: 100%; max-width: 820px; min-height: 0; overflow: hidden; }
  .sub-dot-row {
    display: flex; align-items: center; justify-content: center;
    padding: 8px 20px; margin-top: 8px; background: var(--bg-surface);
    border: 1px solid var(--border); border-radius: 8px;
    opacity: 0; transform: translateY(-4px); animation: sub-in 0.25s ease forwards;
  }
  @keyframes sub-in { to { opacity: 1; transform: translateY(0); } }
  .sub-dot-item {
    display: flex; align-items: center; gap: 5px; padding: 3px 6px;
    border-radius: 5px; cursor: pointer; transition: background var(--tr-f);
  }
  .sub-dot-item:hover { background: rgba(74,158,255,0.06); }
  .sub-dot-item.selected { background: rgba(74,158,255,0.1); }
  .sub-dot-connector { width: 14px; height: 1px; background: var(--border); flex-shrink: 0; }
  .sub-dot-marker { width: var(--sub-dot-size); height: var(--sub-dot-size); border-radius: 50%; flex-shrink: 0; }
  .sub-dot-marker.sd-done   { background: var(--green); }
  .sub-dot-marker.sd-active { background: var(--blue); box-shadow: 0 0 6px var(--blue-glow); }
  .sub-dot-marker.sd-pending { background: transparent; border: 1.5px solid var(--text-muted); }
  .sub-dot-marker.sd-error  { background: var(--red); }
  .sub-dot-label { font-size: 10.5px; color: var(--text-dim); white-space: nowrap; }

  /* ── Content panel ── */
  .content-panel {
    width: 100%; max-width: 820px; margin-top: 16px;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; opacity: 0; transform: translateY(6px);
    animation: content-in 0.35s ease 0.1s forwards;
  }
  @keyframes content-in { to { opacity: 1; transform: translateY(0); } }
  .content-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .content-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .content-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .badge-done    { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
  .badge-running { background: rgba(74,158,255,0.12); color: var(--blue);  border: 1px solid rgba(74,158,255,0.2); }
  .badge-pending { background: rgba(59,78,102,0.2);   color: var(--text-dim); border: 1px solid var(--border); }
  .badge-score   { background: rgba(74,158,255,0.12); color: var(--blue);  border: 1px solid rgba(74,158,255,0.2); }
  .content-body { padding: 20px 24px 24px; }
  .content-summary { font-size: 13.5px; line-height: 1.7; color: var(--text-dim); margin-bottom: 20px; }

  /* Detail grid */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-card {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; transition: border-color var(--tr-f);
  }
  .detail-card:hover { border-color: var(--border-light); }
  .detail-card-label {
    font-size: 10.5px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .detail-card-value { font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .detail-card-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .detail-card.full { grid-column: 1 / -1; }
  .mini-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
  .mini-bar-fill.bar-green { background: var(--green); }
  .mini-bar-fill.bar-blue  { background: var(--blue); }
  .mini-bar-fill.bar-amber { background: var(--amber); }

  /* Log block */
  .log-block {
    margin-top: 16px; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-family: 'JetBrains Mono','Fira Code',monospace;
    font-size: 11.5px; line-height: 1.8; color: var(--text-dim);
    max-height: 160px; overflow-y: auto;
  }
  .log-block::-webkit-scrollbar { width: 4px; }
  .log-block::-webkit-scrollbar-track { background: transparent; }
  .log-block::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
  .log-line { display: flex; gap: 8px; }
  .log-ts   { color: var(--text-muted); flex-shrink: 0; }
  .log-ok   { color: var(--green); }
  .log-info { color: var(--blue); }
  .log-warn { color: var(--amber); }

  /* Artifact list */
  .artifact-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .artifact-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
    transition: border-color var(--tr-f);
  }
  .artifact-row:hover { border-color: var(--border-light); }
  .artifact-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; font-weight: 600;
  }
  .ai-py   { background: rgba(74,158,255,0.12); color: var(--blue); }
  .ai-viz  { background: rgba(167,139,250,0.12); color: var(--purple); }
  .ai-data { background: rgba(34,211,238,0.12);  color: var(--cyan); }
  .artifact-info { flex: 1; min-width: 0; }
  .artifact-name { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .artifact-desc { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .artifact-status {
    font-size: 10.5px; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; flex-shrink: 0;
  }
  .as-done    { background: rgba(52,211,153,0.1); color: var(--green); }
  .as-running { background: rgba(74,158,255,0.1); color: var(--blue); }
  .as-pending { background: rgba(59,78,102,0.15); color: var(--text-dim); }

  /* Keyboard hint */
  .kb-hint { margin-top: 24px; display: flex; align-items: center; gap: 16px; justify-content: center; }
  .kb-hint span { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  kbd {
    display: inline-block; font-family: inherit; font-size: 10px; font-weight: 600;
    padding: 2px 6px; background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim);
  }

  @media (max-width: 640px) {
    .tab { flex-direction: column; gap: 6px; padding: 12px 6px 10px; }
    .tab-label { align-items: center; }
    .detail-grid { grid-template-columns: 1fr; }
    .dot-connector { width: 10px; }
    .dot-label { font-size: 10px; }
  }
</style>
</head>
<body>

<!-- Overall thin progress bar -->
<div class="overall-progress">
  <div class="overall-progress-fill" id="overallBar" style="width: 65%"></div>
</div>

<!-- Tab bar (rendered by JS) -->
<div class="tab-bar" id="tabBar" role="tablist"></div>

<!-- Dot row for sub-modules -->
<div class="dot-row-container" id="dotRowContainer"></div>

<!-- Sub-dot row (detail level) -->
<div class="sub-dot-container" id="subDotContainer"></div>

<!-- Content panel -->
<div class="content-panel" id="contentPanel"></div>

<!-- Keyboard hints -->
<div class="kb-hint">
  <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> Tabs</span>
  <span><kbd>&darr;</kbd> Dots</span>
  <span><kbd>Enter</kbd> Expand</span>
  <span><kbd>Esc</kbd> Back</span>

// ================================================================

let activeDotIdx    = 2;    // Artifacts dot
let activeSubDotIdx = -1;
let focusZone       = 'tabs';  // tabs | dots | subdots

// ================================================================
//  RENDER HELPERS
// ================================================================
const stMap  = { done: 'st-done', active: 'st-active', pending: 'st-pending' };
const dotMap = { done: 'd-done',  active: 'd-active',  pending: 'd-pending',  error: 'd-error' };
const sdMap  = { done: 'sd-done', active: 'sd-active', pending: 'sd-pending', error: 'sd-error' };

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  MODULES.forEach((mod, i) => {
    const el = document.createElement('div');
    el.className = 'tab' + (i === activeTabIdx ? ' active' : '');
    el.setAttribute('role', 'tab');
    el.setAttribute('tabindex', i === activeTabIdx ? '0' : '-1');
    el.setAttribute('aria-selected', i === activeTabIdx);
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="diamond-ring ${stMap[mod.state]}">
        <div class="ring"></div><div class="diamond"></div>
      </div>
      <div class="tab-label">
        <span class="tab-name">${mod.name}</span>
        <span class="tab-status ${mod.statusClass}">${mod.statusText}</span>
      </div>`;
    el.addEventListener('click', () => switchTab(i));
    bar.appendChild(el);
  });
}

function renderDotRow() {
  const container = document.getElementById('dotRowContainer');
  const mod = MODULES[activeTabIdx];
  if (!mod.subs || !mod.subs.length) { container.innerHTML = ''; return; }

  const row = document.createElement('div');
  row.className = 'dot-row';
  row.setAttribute('role', 'tablist');

  mod.subs.forEach((sub, i) => {
    if (i > 0) { const c = document.createElement('div'); c.className = 'dot-connector'; row.appendChild(c); }
    const item = document.createElement('div');
    item.className = 'dot-item' + (i === activeDotIdx ? ' selected' : '');
    item.setAttribute('role', 'tab');
    item.setAttribute('tabindex', i === activeDotIdx ? '0' : '-1');
    item.dataset.idx = i;
    const sfx = sub.suffix ? `<span class="dot-suffix ${sub.sfClass || ''}">${sub.suffix}</span>` : '';
    item.innerHTML = `<div class="dot-marker ${dotMap[sub.state]}"></div><span class="dot-label">${sub.label}</span>${sfx}`;
    item.addEventListener('click', () => selectDot(i));
    row.appendChild(item);
  });
  container.innerHTML = '';
  container.appendChild(row);
}

function renderSubDots() {
  const container = document.getElementById('subDotContainer');
  const mod = MODULES[activeTabIdx];
  if (!mod.subs || activeDotIdx < 0) { container.innerHTML = ''; return; }
  const sub = mod.subs[activeDotIdx];
  if (!sub || !sub.subDots) { container.innerHTML = ''; return; }

  const row = document.createElement('div');
  row.className = 'sub-dot-row';
  sub.subDots.forEach((sd, i) => {
    if (i > 0) { const c = document.createElement('div'); c.className = 'sub-dot-connector'; row.appendChild(c); }
    const item = document.createElement('div');
    item.className = 'sub-dot-item' + (i === activeSubDotIdx ? ' selected' : '');
    item.dataset.idx = i;
    item.innerHTML = `<div class="sub-dot-marker ${sdMap[sd.state]}"></div><span class="sub-dot-label">${sd.label}</span>`;
    item.addEventListener('click', () => selectSubDot(i));
    row.appendChild(item);
  });
  container.innerHTML = '';
  container.appendChild(row);
}

function renderContent() {
  const panel = document.getElementById('contentPanel');
  const c = MODULES[activeTabIdx].content;
  let body = `<p class="content-summary">${c.summary}</p>`;

  if (c.details) {
    body += '<div class="detail-grid">';
    c.details.forEach(d => {
      const bar = d.bar ? `<div class="mini-bar"><div class="mini-bar-fill ${d.bar.cls}" style="width:${d.bar.pct}%"></div></div>` : '';
      body += `<div class="detail-card">
        <div class="detail-card-label">${d.label}</div>
        <div class="detail-card-value">${d.value}</div>
        ${d.sub ? `<div class="detail-card-sub">${d.sub}</div>` : ''}${bar}</div>`;
    });
    body += '</div>';
  }

  if (c.artifacts) {
    body += '<div class="artifact-list">';
    c.artifacts.forEach(a => {
      body += `<div class="artifact-row">
        <div class="artifact-icon ${a.iconClass}">${a.icon}</div>
        <div class="artifact-info"><div class="artifact-name">${a.name}</div><div class="artifact-desc">${a.desc}</div></div>
        <span class="artifact-status ${a.statusClass}">${a.status}</span></div>`;
    });
    body += '</div>';
  }

  if (c.logs) {
    body += '<div class="log-block">';
    c.logs.forEach(l => { body += `<div class="log-line"><span class="log-ts">${l.ts}</span><span class="${l.cls}">${l.msg}</span></div>`; });
    body += '</div>';
  }

  panel.innerHTML = `<div class="content-header">
    <span class="content-title">${c.title}</span>
    <span class="content-badge ${c.badgeClass}">${c.badge}</span>
  </div><div class="content-body">${body}</div>`;
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = '';
}

function renderAll() { renderTabs(); renderDotRow(); renderSubDots(); renderContent(); }

// ================================================================
//  INTERACTIONS
// ================================================================
function switchTab(idx) {
  if (idx < 0 || idx >= MODULES.length) return;
  activeTabIdx = idx;
  activeDotIdx = findActiveDot(MODULES[idx]);
  activeSubDotIdx = -1;
  focusZone = 'tabs';
  renderAll();
}

function selectDot(idx) {
  const mod = MODULES[activeTabIdx];
  if (!mod.subs || idx < 0 || idx >= mod.subs.length) return;
  activeDotIdx = idx;
  activeSubDotIdx = -1;
  focusZone = 'dots';
  renderContent();
  renderDotRow();
  renderSubDots();
}

function selectSubDot(idx) {
  activeSubDotIdx = idx;
  focusZone = 'subdots';
  renderSubDots();
}

function findActiveDot(mod) {
  if (!mod.subs) return -1;
  const i = mod.subs.findIndex(s => s.state === 'active');
  return i >= 0 ? i : 0;
}

// ================================================================
//  KEYBOARD NAVIGATION
// ================================================================
document.addEventListener('keydown', (e) => {
  const k = e.key;
  if (focusZone === 'tabs') {
    if (k === 'ArrowRight')  { e.preventDefault(); switchTab(Math.min(activeTabIdx + 1, MODULES.length - 1)); }
    else if (k === 'ArrowLeft') { e.preventDefault(); switchTab(Math.max(activeTabIdx - 1, 0)); }
    else if (k === 'ArrowDown') {
      e.preventDefault();
      const mod = MODULES[activeTabIdx];
      if (mod.subs && mod.subs.length) { focusZone = 'dots'; renderDotRow(); focusEl('.dot-item', activeDotIdx); }
    }
  } else if (focusZone === 'dots') {
    const mod = MODULES[activeTabIdx];
    if (k === 'ArrowRight')  { e.preventDefault(); selectDot(Math.min(activeDotIdx + 1, mod.subs.length - 1)); focusEl('.dot-item', activeDotIdx); }
    else if (k === 'ArrowLeft') { e.preventDefault(); selectDot(Math.max(activeDotIdx - 1, 0)); focusEl('.dot-item', activeDotIdx); }
    else if (k === 'ArrowDown' || k === 'Enter') {
      e.preventDefault();
      const sub = mod.subs[activeDotIdx];
      if (sub && sub.subDots && sub.subDots.length) {
        activeSubDotIdx = Math.max(sub.subDots.findIndex(s => s.state === 'active'), 0);
        focusZone = 'subdots'; renderSubDots(); focusEl('.sub-dot-item', activeSubDotIdx);
      }
    } else if (k === 'ArrowUp' || k === 'Escape') {
      e.preventDefault(); focusZone = 'tabs'; focusEl('.tab', activeTabIdx);
    }
  } else if (focusZone === 'subdots') {
    const sub = MODULES[activeTabIdx].subs[activeDotIdx];
    if (!sub || !sub.subDots) return;
    if (k === 'ArrowRight')  { e.preventDefault(); activeSubDotIdx = Math.min(activeSubDotIdx + 1, sub.subDots.length - 1); renderSubDots(); focusEl('.sub-dot-item', activeSubDotIdx); }
    else if (k === 'ArrowLeft') { e.preventDefault(); activeSubDotIdx = Math.max(activeSubDotIdx - 1, 0); renderSubDots(); focusEl('.sub-dot-item', activeSubDotIdx); }
    else if (k === 'ArrowUp' || k === 'Escape') {
      e.preventDefault(); activeSubDotIdx = -1; focusZone = 'dots'; renderSubDots(); focusEl('.dot-item', activeDotIdx);
    }
  }
});

function focusEl(sel, idx) {
  const el = document.querySelector(`${sel}[data-idx="${idx}"]`);
  if (el) el.focus();
}

// ================================================================
//  INIT
// ================================================================
renderAll();
setTimeout(() => {
  const bar = document.getElementById('overallBar');
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => { bar.style.width = '65%'; }));
}, 100);
</script>
</body>
</html>
