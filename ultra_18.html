<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline — Ultra 18</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0d14;
  --surface: rgba(16,20,30,0.82);
  --surface-hi: rgba(28,34,48,0.7);
  --surface-card: rgba(14,18,28,0.88);
  --border: rgba(100,116,155,0.08);
  --border-hi: rgba(100,116,155,0.16);
  --glass: rgba(18,22,34,0.65);
  --glass-border: rgba(100,116,155,0.12);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.015) 40%, transparent 60%);
  --glass-blur: 18px;

  --text-100: #e8ecf4;
  --text-200: #b4bdd0;
  --text-300: #8a95ab;
  --text-400: #5e6a80;
  --text-500: #3c4556;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.10);
  --purple-glow: rgba(167,139,250,0.25);
  --purple-deep: rgba(167,139,250,0.50);

  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.10);
  --blue-glow: rgba(96,165,250,0.25);
  --blue-deep: rgba(96,165,250,0.50);

  --orange: #fb923c;
  --orange-dim: rgba(251,146,60,0.10);
  --orange-glow: rgba(251,146,60,0.25);
  --orange-deep: rgba(251,146,60,0.50);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.10);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.10);
  --cyan: #22d3ee;

  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --header-h: 48px;
  --sidebar-collapsed: 52px;
  --sidebar-expanded: 240px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(ellipse 900px 400px at 15% 8%, rgba(167,139,250,0.025), transparent),
    radial-gradient(ellipse 700px 500px at 80% 55%, rgba(96,165,250,0.02), transparent),
    linear-gradient(rgba(100,116,155,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,155,0.02) 1px, transparent 1px);
  background-size: 100%, 100%, 52px 52px, 52px 52px;
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   GLASSMORPHISM HEADER (48px)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(10, 13, 20, 0.82);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 20px;
  z-index: 1000; gap: 14px;
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(167,139,250,0.12) 30%, rgba(96,165,250,0.12) 70%, transparent);
}

.header-brand {
  font-weight: 800; font-size: 14px; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 8px;
}
.brand-icon {
  width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  font-size: 11px; color: #fff; font-weight: 700;
  box-shadow: 0 0 10px rgba(167,139,250,0.2);
}
.brand-text {
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}

.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.breadcrumb span { color: var(--text-400); }
.breadcrumb .sep { color: rgba(100,116,155,0.3); font-size: 10px; }
.breadcrumb .active { color: var(--text-200); font-weight: 500; }

.header-spacer { flex: 1; }

/* Header progress ring */
.header-ring {
  width: 34px; height: 34px; position: relative; flex-shrink: 0;
}
.header-ring svg { width: 100%; height: 100%; }
.h-ring-track { fill: none; stroke: rgba(100,116,155,0.1); stroke-width: 2.5; }
.h-ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 2.5; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s var(--ease);
  filter: drop-shadow(0 0 3px var(--blue-glow));
}
.h-ring-label {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--text-100);
}

.header-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

.header-stat {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 5px;
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}

.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 2px 8px;
  background: var(--red-dim); border: 1px solid rgba(248,113,113,0.18);
  border-radius: 4px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(248,113,113,0.3); }
  50% { opacity: 1; box-shadow: 0 0 8px rgba(248,113,113,0.6); }
}

/* ================================================================
   COLLAPSED SIDEBAR (52px -> 240px on hover)
   ================================================================ */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-collapsed);
  background: rgba(10, 13, 20, 0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--glass-border);
  z-index: 900; transition: width 0.3s var(--ease);
  overflow: hidden; display: flex; flex-direction: column;
  padding: 14px 0 16px; gap: 2px;
}
.sidebar:hover { width: var(--sidebar-expanded); }

.sidebar-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 6px 0 12px; flex-shrink: 0;
}
.sidebar-ring { width: 30px; height: 30px; position: relative; flex-shrink: 0; }
.sidebar-ring svg { width: 100%; height: 100%; }
.s-ring-track { fill: none; stroke: rgba(100,116,155,0.1); stroke-width: 2.5; }
.s-ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 2.5; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  filter: drop-shadow(0 0 3px var(--blue-glow));
}
.s-ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 8px; font-weight: 700; color: var(--text-100);
}
.sidebar-ring-text {
  font-size: 11px; color: var(--text-400); font-weight: 500;
  white-space: nowrap; margin-left: 10px;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-ring-text { opacity: 1; }

.sidebar-divider {
  width: 26px; height: 1px; background: var(--border);
  margin: 4px auto 8px; flex-shrink: 0;
  transition: width 0.3s ease;
}
.sidebar:hover .sidebar-divider { width: calc(100% - 24px); }

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 14px; cursor: pointer; transition: var(--transition);
  white-space: nowrap; position: relative; flex-shrink: 0;
}
.sidebar-item:hover { background: rgba(100,116,155,0.06); }
.sidebar-item.active { background: rgba(96,165,250,0.06); }
.sidebar-item .indicator {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; border-radius: 0 3px 3px 0;
  transition: height 0.25s ease;
}
.sidebar-item.active .indicator { height: 18px; }
.sidebar-item[data-color="purple"] .indicator { background: var(--purple); }
.sidebar-item[data-color="blue"] .indicator { background: var(--blue); }
.sidebar-item[data-color="orange"] .indicator { background: var(--orange); }

.sidebar-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-dot.done { background: var(--green); opacity: 0.7; }
.sidebar-dot.running { background: var(--blue); animation: sbDotPulse 2s ease-in-out infinite; }
.sidebar-dot.pending { background: transparent; border: 1.5px solid var(--text-500); }
@keyframes sbDotPulse {
  0%, 100% { box-shadow: 0 0 4px var(--blue-glow); }
  50% { box-shadow: 0 0 10px var(--blue-glow), 0 0 18px rgba(96,165,250,0.15); }
}
.sidebar-label {
  font-size: 12px; color: var(--text-300); font-weight: 500;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.main {
  margin-left: var(--sidebar-collapsed); margin-top: var(--header-h);
  padding: 24px 28px 60px;
  position: relative; z-index: 1;
  max-width: 1440px;
}

/* ================================================================
   3 HORIZONTAL MODULE CARDS (glassmorphism)
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 8px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px 12px; transition: all 0.35s ease; overflow: hidden;
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
.mod-card .glow-halo {
  position: absolute; inset: -24px; border-radius: 28px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(32px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.10; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.06; } 50% { opacity: 0.14; } }

.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 30px 6px var(--purple-dim), inset 0 0 14px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 30px 6px var(--blue-dim), inset 0 0 14px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 30px 6px var(--orange-dim), inset 0 0 14px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(100,116,155,0.2); transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.04; }
.mod-card.active { border-color: rgba(255,255,255,0.08); }

.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; position: relative; z-index: 3; }
.mc-icon { font-size: 14px; flex-shrink: 0; }
.mc-name { font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(96,165,250,0.18); } }

.mc-metrics { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

.mc-ring { width: 28px; height: 28px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; }
.mc-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.mc-ring .ring-fill {
  fill: none; stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease;
}
.mc-ring .ring-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7px; font-weight: 700; color: var(--text-200);
}

.mc-bar { height: 3px; background: rgba(255,255,255,0.03); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 6px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 6px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 6px var(--orange-deep); }

/* ================================================================
   TREE AREA (3 columns)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; position: relative; min-height: 100px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.1s; }
.tree-col:nth-child(3) { animation-delay: 0.2s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* tree vertical trunk line */
.tree-trunk {
  position: relative; padding-left: 22px;
  display: flex; flex-direction: column; gap: 3px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 9px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 18px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"]::before { background: rgba(96,165,250,0.18); }
.tree-trunk[data-color="orange"]::before { background: rgba(251,146,60,0.18); }

.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.4); box-shadow: 0 0 6px rgba(167,139,250,0.2);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(96,165,250,0.4); box-shadow: 0 0 6px rgba(96,165,250,0.2);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(251,146,60,0.4); box-shadow: 0 0 6px rgba(251,146,60,0.2);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ================================================================
   SUB-MODULE CARDS (44px)
   ================================================================ */
.sub-card {
  height: 44px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px; position: relative; border-radius: var(--radius-xs);
  background: var(--surface); border: 1px solid transparent;
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* horizontal branch connector from trunk */
.sub-card::before {
  content: ''; position: absolute; left: -13px; top: 50%;
  width: 13px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(96,165,250,0.18); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(251,146,60,0.18); }

.sub-card.done-sub { background: rgba(255,255,255,0.015); }

.sub-card.active-sub { border-color: rgba(255,255,255,0.06); }
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.06); border-color: rgba(167,139,250,0.18);
  box-shadow: 0 0 18px rgba(167,139,250,0.06), 0 2px 8px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(96,165,250,0.06); border-color: rgba(96,165,250,0.18);
  box-shadow: 0 0 18px rgba(96,165,250,0.06), 0 2px 8px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(251,146,60,0.06); border-color: rgba(251,146,60,0.18);
  box-shadow: 0 0 18px rgba(251,146,60,0.06), 0 2px 8px rgba(0,0,0,0.2);
}

.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.02) 46%, rgba(255,255,255,0.05) 50%,
    rgba(255,255,255,0.02) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  animation: subGlowPulse 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 14px rgba(167,139,250,0.04); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 14px rgba(96,165,250,0.04); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 14px rgba(251,146,60,0.04); }
@keyframes subGlowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

.sub-card.pending-sub { background: rgba(255,255,255,0.008); opacity: 0.5; }
.sub-card.pending-sub.visible { opacity: 0.5; }

/* left accent stripe */
.sub-card::after {
  content: ''; position: absolute; left: 0; top: 7px; bottom: 7px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub::after { opacity: 1; }
.sub-card.done-sub::after { opacity: 0.3; }
.sub-card[data-pcolor="purple"]::after { background: var(--purple); }
.sub-card[data-pcolor="blue"]::after { background: var(--blue); }
.sub-card[data-pcolor="orange"]::after { background: var(--orange); }

.sub-card:not(.pending-sub):hover { transform: translateY(-1px); background: rgba(255,255,255,0.025); }

.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] { background: var(--blue); box-shadow: 0 0 8px rgba(96,165,250,0.5); }
.sub-dot.running[data-pcolor="purple"] { background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.5); }
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(96,165,250,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin {
  border-color: rgba(167,139,250,0.15);

}

.sub-label {

.sub-meta {

}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

.sub-micro-badge {

}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(74,81,104,0.10); color: var(--text-400); }

/* ================================================================
   LEVEL 3: ITEM CHECKLIST (30px)
   ================================================================ */
.level3-wrap {
  padding-left: 24px; position: relative; overflow: hidden;
  max-height: 500px; transition: max-height 0.4s ease;
}
.level3-wrap::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 1px; height: calc(100% - 10px);
}
.tree-trunk[data-color="purple"] .level3-wrap::before { background: rgba(167,139,250,0.08); }
.tree-trunk[data-color="blue"] .level3-wrap::before { background: rgba(96,165,250,0.08); }
.tree-trunk[data-color="orange"] .level3-wrap::before { background: rgba(251,146,60,0.08); }

.level3-item {
  height: 30px; display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; color: var(--text-400); position: relative;
  padding-left: 6px; border-radius: 4px;
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level3-item.visible { opacity: 1; transform: translateX(0); }
.level3-item:hover { background: rgba(255,255,255,0.015); }
.level3-item::before {
  content: ''; position: absolute; left: -10px; top: 50%;
  width: 10px; height: 1px;
}
.tree-trunk[data-color="blue"] .level3-item::before { background: rgba(96,165,250,0.08); }
.tree-trunk[data-color="purple"] .level3-item::before { background: rgba(167,139,250,0.08); }
.tree-trunk[data-color="orange"] .level3-item::before { background: rgba(251,146,60,0.08); }

.l3-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.l3-dot.done { background: var(--green); opacity: 0.5; }
.l3-dot.running { background: var(--blue); animation: l3Pulse 2s ease-in-out infinite; }
.l3-dot.pending { border: 1px solid var(--text-500); opacity: 0.35; }
@keyframes l3Pulse {
  0%, 100% { box-shadow: 0 0 3px rgba(96,165,250,0.4); }
  50% { box-shadow: 0 0 8px rgba(96,165,250,0.7); }
}
.l3-label { flex: 1; }
.l3-meta { font-size: 9px; color: var(--text-500); font-variant-numeric: tabular-nums; }

/* collapsed tree */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {
  display: none; padding: 8px 14px; font-size: 11px; color: var(--text-400);
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 8px;
}
.tree-collapsed-bar:hover { color: var(--text-300); background: var(--surface); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }
.tree-col .collapse-toggle {

  font-size: 10px; color: var(--text-400); cursor: pointer;
  padding: 2px 0 6px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* ================================================================
   CARD-GRID DASHBOARD PANEL
   Everything is a card. Slides below tree on sub-module click.
   ================================================================ */
.dashboard-panel {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.4s var(--ease), opacity 0.35s ease;
  margin-top: 20px;
}
.dashboard-panel.open { max-height: 900px; opacity: 1; }

.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 12px;
  animation: dashSlide 0.35s ease-out;
}
@keyframes dashSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Shared card base */
.dash-card {
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative; overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.dash-card:hover { border-color: rgba(100,116,155,0.18); }
.dash-card .card-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}

/* Summary card: spans full width */
.dash-summary-card {
  grid-column: 1 / -1;
}
.dash-summary-card .dash-card-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.dash-card-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.dash-card-title {
  font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px;
}
.dash-card-badge {
  font-size: 8px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto;
}
.dash-card-badge.done { background: var(--green-dim); color: var(--green); }
.dash-card-badge.running { background: var(--blue-dim); color: var(--blue); }
.dash-card-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }

.dash-summary-text {
  font-size: 12.5px; color: var(--text-300); line-height: 1.7;
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: rgba(10,13,20,0.4);
  border-left: 2px solid var(--blue);
}

.dash-close-btn {
  position: absolute; top: 12px; right: 14px;
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: rgba(100,116,155,0.08); color: var(--text-400);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: var(--transition); z-index: 10;
}
.dash-close-btn:hover { background: rgba(100,116,155,0.2); color: var(--text-100); }

/* Stat cards: 2x2 grid (each takes one cell of the main 2-col grid) */
.dash-stat-card {
  text-align: center; display: flex; flex-direction: column;
  align-items: center; justify-content: center; min-height: 90px;
}
.dash-stat-val {
  font-size: 24px; font-weight: 700; color: var(--text-100);
  font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
  margin-bottom: 2px;
}
.dash-stat-label {
  font-size: 10px; color: var(--text-400); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 600;
}
.dash-stat-bar {
  width: 60px; height: 3px; background: rgba(255,255,255,0.04);
  border-radius: 2px; margin-top: 8px; overflow: hidden;
}
.dash-stat-bar-fill {
  height: 100%; border-radius: 2px; transition: width 0.8s ease;
}

/* Item cards: 2-column grid below stats */
.dash-items-section {
  grid-column: 1 / -1;
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}

.dash-item-card {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; min-height: 48px;
  transition: transform 0.2s, border-color 0.2s;
}
.dash-item-card:hover { transform: translateY(-1px); border-color: rgba(100,116,155,0.2); }

.dash-item-icon {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  display: grid; place-items: center; font-size: 11px;
}
.dash-item-icon.done-icon { background: var(--green-dim); color: var(--green); }
.dash-item-icon.running-icon { background: var(--blue-dim); color: var(--blue); }
.dash-item-icon.pending-icon { background: rgba(74,81,104,0.10); color: var(--text-400); }

.dash-item-info { flex: 1; min-width: 0; }
.dash-item-name {
  font-size: 12px; color: var(--text-200); font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dash-item-desc {
  font-size: 10px; color: var(--text-400); margin-top: 1px;
}
.dash-item-meta {
  font-size: 10px; font-weight: 600; color: var(--text-400);
  font-variant-numeric: tabular-nums; flex-shrink: 0;
}

/* Feed card: full width at bottom */
.dash-feed-card {
  grid-column: 1 / -1;
}
.dash-feed-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.dash-feed-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400);
}
.mini-live-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  background: var(--red-dim); color: var(--red);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.dash-feed-list { max-height: 140px; overflow-y: auto; }
.dash-feed-list::-webkit-scrollbar { width: 4px; }
.dash-feed-list::-webkit-scrollbar-thumb { background: rgba(100,116,155,0.15); border-radius: 2px; }

.feed-entry {
  display: flex; gap: 8px; padding: 5px 0; font-size: 11px;
  border-bottom: 1px solid rgba(100,116,155,0.04);
  animation: feedFadeIn 0.35s ease both;
}
@keyframes feedFadeIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: var(--text-500); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 42px; }
.feed-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.feed-msg { color: var(--text-300); flex: 1; }

/* ================================================================
   TOOLTIP (400px glassmorphism)
   ================================================================ */
.tooltip-portal {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 380px; opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.tooltip-portal.visible { opacity: 1; transform: translateY(0); }
.tooltip-inner {
  background: rgba(14, 18, 28, 0.94);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 14px 18px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}
.tooltip-title {
  font-size: 13px; font-weight: 600; color: var(--text-100); margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
}
.tooltip-summary { font-size: 12px; color: var(--text-300); line-height: 1.6; margin-bottom: 8px; }
.tooltip-stats { display: flex; gap: 16px; }
.tooltip-stat-val { font-size: 16px; font-weight: 700; color: var(--text-100); }
.tooltip-stat-label { font-size: 10px; color: var(--text-400); }

/* ================================================================
   DOT ANIMATION CONTAINER
   ================================================================ */
.dot-anim-container { position: fixed; inset: 0; pointer-events: none; z-index: 500; }
.flying-dot {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  pointer-events: none;
}
/* Dot trail effect */
.flying-dot::after {
  content: ''; position: absolute; inset: -1px; border-radius: 50%;
  background: inherit; filter: blur(4px); opacity: 0.4;
}

/* ================================================================
   SELECTED STATE
   ================================================================ */
.sub-card.selected { outline: 1px solid rgba(255,255,255,0.1); outline-offset: -1px; }
.sub-card.selected[data-pcolor="purple"] { outline-color: rgba(167,139,250,0.25); }
.sub-card.selected[data-pcolor="blue"] { outline-color: rgba(96,165,250,0.25); }
.sub-card.selected[data-pcolor="orange"] { outline-color: rgba(251,146,60,0.25); }

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }

/* ================================================================
   RESPONSIVE (narrow screens)
   ================================================================ */
@media (max-width: 1000px) {
  .module-cards { grid-template-columns: 1fr; }
  .tree-area { grid-template-columns: 1fr; }
  .dashboard-grid { grid-template-columns: 1fr; }
  .dash-items-section { grid-template-columns: 1fr; }
}
</style>
</head>

   ================================================================ */
const treeArea = document.getElementById('treeArea');

function renderTrees() {
  treeArea.innerHTML = '';
  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' ? ' collapsed' : '');
    col.dataset.module = mi;

    // collapse toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    // trunk
    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      card.innerHTML = `<div class="sub-card-shimmer"></div><div class="sub-card-glow"></div>`;

      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:11px; color:var(--green); flex-shrink:0;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      const badge = document.createElement('span');
      badge.className = `sub-micro-badge ${sub.status === 'done' ? 'done' : sub.status === 'running' ? 'running' : 'pending'}`;
      badge.textContent = sub.status === 'done' ? 'Done' : sub.status === 'running' ? 'Live' : 'Wait';
      card.appendChild(badge);

      card.addEventListener('click', (e) => { e.stopPropagation(); openDashboard(mi, si); });
      card.addEventListener('mouseenter', (e) => showTooltip(e, mi, si));
      card.addEventListener('mousemove', (e) => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);

      trunk.appendChild(card);

      // level 3 items
      if (sub.items && sub.items.length > 0) {
        const wrap = document.createElement('div');
        wrap.className = 'level3-wrap';
        sub.items.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'level3-item';
          const dotCls = item.status === 'done' ? 'done' : item.status === 'running' ? 'running' : 'pending';
          row.innerHTML = `<div class="l3-dot ${dotCls}"></div>
            <span class="l3-label">${item.label}</span>
            <span class="l3-meta">${item.time}</span>`;
          wrap.appendChild(row);
        });
        trunk.appendChild(wrap);
      }
    });

    col.appendChild(trunk);

    // collapsed bar
    const collBar = document.createElement('div');
    collBar.className = 'tree-collapsed-bar';
    const doneCount = mod.subs.filter(s => s.status === 'done').length;
    collBar.innerHTML = `<span style="font-size:11px; color:var(--green);">\u2713</span>
      <span>${doneCount}/${mod.subs.length} complete</span>
      <span style="margin-left:auto; font-size:10px; color:var(--text-500);">Click to expand</span>`;
    collBar.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(collBar);

    treeArea.appendChild(col);
  });

  // animate visible
  requestAnimationFrame(() => {
    let delay = 0;
    document.querySelectorAll('.sub-card, .level3-item').forEach(el => {
      setTimeout(() => el.classList.add('visible'), delay);
      delay += 40;
    });
  });
}

/* ================================================================
   AMBIENT PARTICLES (40 dots + connection lines)
   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.radius = Math.random() * 1.5 + 0.5;
    this.opacity = Math.random() * 0.10 + 0.02;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < 40; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const alpha = (1 - dist / 140) * 0.035;
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = `rgba(100, 130, 200, ${alpha})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }
  particles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(140, 170, 220, ${p.opacity})`;
    pCtx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ================================================================
   CORRECT L-SHAPED TREE DOT ANIMATION
   Dot travels from the trunk line DOWN to the sub-card Y level,
   then HORIZONTALLY along the branch connector into the card.
   This is the correct L-shape: vertical first, then horizontal.
   ================================================================ */
const dotContainer = document.getElementById('dotAnimContainer');

function getRunningSubCards() {
  return document.querySelectorAll('.sub-card.active-sub');
}

function spawnLDot(targetEl) {
  const rect = targetEl.getBoundingClientRect();
  const dot = document.createElement('div');
  dot.className = 'flying-dot';

  // Determine color from parent module
  const pcolor = targetEl.dataset.pcolor;
  let dotColor, glowColor;
  if (pcolor === 'purple') {
    dotColor = '#a78bfa';
    glowColor = 'rgba(167,139,250,0.5)';
  } else if (pcolor === 'orange') {
    dotColor = '#fb923c';
    glowColor = 'rgba(251,146,60,0.5)';
  } else {
    dotColor = '#60a5fa';
    glowColor = 'rgba(96,165,250,0.5)';
  }
  dot.style.background = dotColor;
  dot.style.boxShadow = `0 0 6px ${dotColor}, 0 0 14px ${glowColor}`;

  // Find the trunk line position (the vertical line to the left of sub-cards)
  // The trunk ::before is at left: 9px within the tree-trunk container
  const trunkEl = targetEl.closest('.tree-trunk');
  if (!trunkEl) return;
  const trunkRect = trunkEl.getBoundingClientRect();

  // Trunk X position (9px from trunk container left + half of 2px line width)
  const trunkX = trunkRect.left + 10;

  // Start position: top of the trunk (or slightly above the target)
  const startY = trunkRect.top + Math.random() * 20;

  // Corner position: where L turns from vertical to horizontal
  const cornerY = rect.top + rect.height / 2;

  // End position: left edge of the sub-card
  const endX = rect.left + 8;
  const endY = cornerY;

  dot.style.left = trunkX + 'px';
  dot.style.top = startY + 'px';
  dot.style.opacity = '0';
  dot.style.transform = 'scale(0.3)';

  dotContainer.appendChild(dot);

  const verticalDist = Math.abs(cornerY - startY);
  const horizontalDist = Math.abs(endX - trunkX);
  const totalDist = verticalDist + horizontalDist;

  // Duration proportional to distance, with some randomness
  const duration = 1200 + Math.random() * 600;
  const startTime = performance.now();

  // Fraction of time spent on vertical leg
  const vertFrac = totalDist > 0 ? verticalDist / totalDist : 0.5;

  function animateDot(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    let x, y;
    if (t < vertFrac) {
      // Vertical phase: travel down the trunk
      const vt = t / vertFrac;
      const eased = vt < 0.5 ? 2 * vt * vt : -1 + (4 - 2 * vt) * vt;
      x = trunkX;
      y = startY + (cornerY - startY) * eased;
    } else {
      // Horizontal phase: travel along branch connector to card
      const ht = (t - vertFrac) / (1 - vertFrac);
      const eased = ht < 0.5 ? 2 * ht * ht : -1 + (4 - 2 * ht) * ht;
      x = trunkX + (endX - trunkX) * eased;
      y = cornerY;
    }

    // Opacity: fade in at start, fade out at end
    const opacity = t < 0.08 ? t / 0.08 : t > 0.88 ? (1 - t) / 0.12 : 1;
    const scale = t < 0.08 ? 0.3 + 0.7 * (t / 0.08) : t > 0.92 ? 1 - 0.7 * ((t - 0.92) / 0.08) : 1;

    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.style.opacity = (opacity * 0.85).toString();
    dot.style.transform = `scale(${scale})`;

    if (t < 1) {
      requestAnimationFrame(animateDot);
    } else {
      dot.remove();
    }
  }
  requestAnimationFrame(animateDot);
}

function spawnDotWave() {
  const targets = getRunningSubCards();
  targets.forEach(target => {
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnLDot(target), i * 250 + Math.random() * 400);
    }
  });
}

  costEl.textContent = `$${costValue.toFixed(2)}`;
}, 8000);

/* ================================================================
   KEYBOARD NAVIGATION
   ================================================================ */
let focusedModule = 1;
let focusedSub = -1;

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeDashboard(); return; }
  if (e.key === 'ArrowLeft') {
    focusedModule = Math.max(0, focusedModule - 1);
    focusedSub = -1;
    breadcrumbEl.textContent = MODULES[focusedModule].label;
    updateSidebarActive(focusedModule);
    highlightModuleCard(focusedModule);
    e.preventDefault();
  }
  if (e.key === 'ArrowRight') {
    focusedModule = Math.min(MODULES.length - 1, focusedModule + 1);
    focusedSub = -1;
    breadcrumbEl.textContent = MODULES[focusedModule].label;
    updateSidebarActive(focusedModule);
    highlightModuleCard(focusedModule);
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    const mod = MODULES[focusedModule];
    focusedSub = Math.min(mod.subs.length - 1, focusedSub + 1);
    highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();
  }
  if (e.key === 'ArrowUp') {
    focusedSub = Math.max(-1, focusedSub - 1);
    if (focusedSub >= 0) highlightSubCard(focusedModule, focusedSub);
    e.preventDefault();
  }
  if (e.key === 'Enter' && focusedSub >= 0) {
    openDashboard(focusedModule, focusedSub);
    e.preventDefault();
  }
});

function updateSidebarActive(mi) {
  document.querySelectorAll('.sidebar-item').forEach(si => si.classList.remove('active'));
  const item = document.querySelector(`.sidebar-item[data-module="${mi}"]`);
  if (item) item.classList.add('active');
}

function highlightModuleCard(mi) {
  document.querySelectorAll('.mod-card').forEach(c => c.style.outline = 'none');
  const card = document.querySelector(`.mod-card[data-module="${mi}"]`);
  if (card) {
    const color = MODULES[mi].color;
    const colorVal = color === 'purple' ? 'rgba(167,139,250,0.35)' :
                     color === 'blue' ? 'rgba(96,165,250,0.35)' : 'rgba(251,146,60,0.35)';
    card.style.outline = `1px solid ${colorVal}`;
    card.style.outlineOffset = '-1px';
  }
}

function highlightSubCard(mi, si) {
  document.querySelectorAll('.sub-card').forEach(c => {
    c.style.outline = 'none';
    c.style.outlineOffset = '';
  });
  const card = document.querySelector(`.sub-card[data-module="${mi}"][data-sub="${si}"]`);
  if (card) {
    const color = MODULES[mi].color;
    const colorVal = color === 'purple' ? 'rgba(167,139,250,0.4)' :
                     color === 'blue' ? 'rgba(96,165,250,0.4)' : 'rgba(251,146,60,0.4)';
    card.style.outline = `1px solid ${colorVal}`;
    card.style.outlineOffset = '-1px';
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}
</script>
