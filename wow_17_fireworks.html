<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Fireworks Celebration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; font-family: 'Segoe UI', system-ui, sans-serif; }

  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

  /* --- Cityscape --- */
  .cityscape {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 120px;
    z-index: 2; pointer-events: none;
  }
  .building {
    position: absolute; bottom: 0; background: #0a0a14;
    border-top: 1px solid #12122a;
  }
  .building .window-row {
    display: flex; gap: 3px; padding: 4px 5px; flex-wrap: wrap; justify-content: center;
  }
  .building .win {
    width: 4px; height: 5px; border-radius: 0.5px;
  }
  .win.on  { background: #ffd87022; box-shadow: 0 0 3px #ffd87018; }
  .win.off { background: #0e0e1c; }

  /* --- Title overlay --- */
  .title-area {
    position: fixed; bottom: 24px; left: 0; width: 100%; text-align: center;
    z-index: 3; pointer-events: none; user-select: none;
  }
  .title-main {
    font-size: 52px; font-weight: 800; letter-spacing: 12px;
    color: #e8e8f0; text-transform: uppercase;
    text-shadow: 0 0 30px rgba(180, 160, 255, 0.15);
    transition: text-shadow 0.3s, color 0.3s;
  }
  .title-sub {
    font-size: 13px; letter-spacing: 3px; color: #555570; margin-top: 6px;
  }

  /* --- HUD --- */
  .hud {
    position: fixed; bottom: 8px; left: 0; width: 100%;
    display: flex; justify-content: center; gap: 32px;
    z-index: 4; pointer-events: none; user-select: none;
  }
  .hud-item {
    font-size: 11px; color: #44445a; letter-spacing: 1px;
  }
  .hud-item span { color: #7a7a9a; }

  /* --- Click hint --- */
  .click-hint {
    position: fixed; top: 16px; right: 20px; z-index: 4;
    font-size: 11px; color: #44445a; letter-spacing: 1px;
    opacity: 0.7; pointer-events: none;
    animation: hintPulse 3s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div class="cityscape" id="cityscape"></div>

<div class="title-area">
  <div class="title-main" id="titleText">AI Inventor</div>
  <div class="title-sub">ssl-low-resource-v3 &bull; Celebrating 23 completed milestones</div>
</div>

<div class="hud">
  <div class="hud-item">MILESTONES <span id="hudCount">23</span></div>
  <div class="hud-item">ELAPSED <span id="hudTime">04:12:38</span></div>
  <div class="hud-item">COST <span id="hudCost">$14.72</span></div>
</div>

<div class="click-hint">click anywhere to launch</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const COLORS = {
  seed:       ['#22dd66', '#33ff88', '#44ee77', '#11cc55'],
  hypothesis: ['#aa55ff', '#cc77ff', '#9944ee', '#bb66ff'],
  invention:  ['#4488ff', '#55aaff', '#3377ee', '#66bbff'],
  paper:      ['#ff8844', '#ffaa55', '#ee7733', '#ffbb66'],
};

const FIREWORK_TYPES = ['burst', 'willow', 'crossette', 'palm'];
const GRAVITY = 0.04;
const MAX_PARTICLES = 4000;
const GHOST_LIFETIME = 5000;

// ============================================================
//  CANVAS SETUP
// ============================================================
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
//  PARTICLE POOL (recycled for performance)
// ============================================================
const particlePool = [];
const activeParticles = [];
const ghosts = [];         // residual glow points
const rockets = [];        // rising launch trails

function getParticle() {
  return particlePool.length > 0 ? particlePool.pop() : {};
}
function releaseParticle(p) {
  if (particlePool.length < MAX_PARTICLES) particlePool.push(p);
}

// ============================================================
//  FIREWORK LAUNCH
// ============================================================
function launchFirework(opts = {}) {
  const x      = opts.x      || (0.1 + Math.random() * 0.8) * W;
  const peakY  = opts.peakY  || (0.08 + Math.random() * 0.35) * H;
  const colors = opts.colors || COLORS.invention;
  const type   = opts.type   || FIREWORK_TYPES[Math.floor(Math.random() * FIREWORK_TYPES.length)];

  rockets.push({
    x, y: H + 10,
    targetY: peakY,
    speed: 4 + Math.random() * 3,
    color: colors[0],
    colors, type,
    trail: [],
  });
}

// ============================================================
//  EXPLOSION
// ============================================================
function explode(x, y, colors, type) {
  const count = type === 'crossette' ? 30 : (50 + Math.floor(Math.random() * 50));

  // Title illumination flash
  flashTitle(colors[0]);

  for (let i = 0; i < count; i++) {
    if (activeParticles.length >= MAX_PARTICLES) break;
    const p = getParticle();
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
    let speed;

    switch (type) {
      case 'palm':
        // Palm: particles go mostly upward, spread out, then droop
        speed = 1.5 + Math.random() * 3;
        p.vx = Math.cos(angle) * speed * 0.5;
        p.vy = -Math.abs(Math.sin(angle)) * speed - 1;
        p.gravity = GRAVITY * 1.4;
        p.drag = 0.985;
        break;

      case 'willow':
        // Willow: low speed, high gravity — arcs droop beautifully
        speed = 1 + Math.random() * 2.5;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.gravity = GRAVITY * 1.8;
        p.drag = 0.98;
        break;

      case 'crossette':
        // Crossette: fast initial, will split later
        speed = 2.5 + Math.random() * 2;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.gravity = GRAVITY;
        p.drag = 0.99;
        p.splitTime = 300 + Math.random() * 200;
        p.canSplit = true;
        break;

      default: // burst
        speed = 1.5 + Math.random() * 3;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.gravity = GRAVITY;
        p.drag = 0.99;
        break;
    }

    p.x = x;
    p.y = y;
    p.life = 1.0;
    p.decay = 0.008 + Math.random() * 0.008;
    p.color = colors[Math.floor(Math.random() * colors.length)];
    p.size = 2 + Math.random() * 1.5;
    p.type = type;
    p.born = performance.now();
    p.isSub = false;

    activeParticles.push(p);
  }

  // Ghost glow at explosion center
  ghosts.push({ x, y, color: colors[0], born: performance.now(), size: 40 + Math.random() * 20 });
}

// Crossette sub-explosion
function subExplode(x, y, color) {
  const subCount = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < subCount; i++) {
    if (activeParticles.length >= MAX_PARTICLES) break;
    const p = getParticle();
    const angle = (Math.PI * 2 * i) / subCount + Math.random() * 0.5;
    const speed = 0.8 + Math.random() * 1.5;
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.life = 1.0;
    p.decay = 0.015 + Math.random() * 0.01;
    p.color = color;
    p.size = 1.5;
    p.gravity = GRAVITY;
    p.drag = 0.99;
    p.type = 'burst';
    p.isSub = true;
    p.canSplit = false;
    activeParticles.push(p);
  }
}

// ============================================================
//  TITLE FLASH
// ============================================================
let titleGlow = 0;
function flashTitle(color) {
  titleGlow = 1.0;
  const el = document.getElementById('titleText');
  el.style.textShadow = `0 0 60px ${color}88, 0 0 120px ${color}44`;
}

// ============================================================
//  UPDATE LOOP
// ============================================================
const now = () => performance.now();

function update() {
  const t = now();

  // Update rockets
  for (let i = rockets.length - 1; i >= 0; i--) {
    const r = rockets[i];
    r.y -= r.speed;
    r.trail.push({ x: r.x + (Math.random() - 0.5) * 2, y: r.y, life: 1.0 });
    if (r.trail.length > 12) r.trail.shift();
    r.trail.forEach(t => t.life -= 0.08);

    if (r.y <= r.targetY) {
      explode(r.x, r.y, r.colors, r.type);
      rockets.splice(i, 1);
    }
  }

  // Update particles
  for (let i = activeParticles.length - 1; i >= 0; i--) {
    const p = activeParticles[i];
    p.vy += p.gravity;
    p.vx *= p.drag;
    p.vy *= p.drag;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;

    // Crossette split
    if (p.canSplit && (t - p.born) > p.splitTime) {
      p.canSplit = false;
      subExplode(p.x, p.y, p.color);
    }

    if (p.life <= 0) {
      releaseParticle(activeParticles.splice(i, 1)[0]);
    }
  }

  // Prune old ghosts
  for (let i = ghosts.length - 1; i >= 0; i--) {
    if (t - ghosts[i].born > GHOST_LIFETIME) ghosts.splice(i, 1);
  }

  // Dim title glow
  if (titleGlow > 0) {
    titleGlow -= 0.012;
    if (titleGlow <= 0) {
      titleGlow = 0;
      document.getElementById('titleText').style.textShadow = '0 0 30px rgba(180,160,255,0.15)';
    }
  }
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  // Dark sky with slight fade (trails persist briefly)
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(5, 5, 16, 0.18)';
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'lighter';

  // Draw ghosts (residual glow)
  const t = now();
  for (const g of ghosts) {
    const age = (t - g.born) / GHOST_LIFETIME;
    const alpha = Math.max(0, 0.12 * (1 - age));
    const grad = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.size * (1 + age * 0.5));
    grad.addColorStop(0, g.color + alphaHex(alpha));
    grad.addColorStop(1, g.color + '00');
    ctx.fillStyle = grad;
    ctx.fillRect(g.x - g.size * 1.5, g.y - g.size * 1.5, g.size * 3, g.size * 3);
  }

  // Draw rockets
  for (const r of rockets) {
    // Rocket head
    ctx.beginPath();
    ctx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = r.color;
    ctx.fill();

    // Launch trail
    for (const tp of r.trail) {
      if (tp.life <= 0) continue;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, 1.2 * tp.life, 0, Math.PI * 2);
      ctx.fillStyle = r.color + alphaHex(tp.life * 0.7);
      ctx.fill();
    }
  }

  // Draw particles
  for (const p of activeParticles) {
    const alpha = p.life;
    const size = p.size * Math.max(0.2, p.life);

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = p.color + alphaHex(alpha);
    ctx.fill();

    // Tiny tail for willows and palms
    if ((p.type === 'willow' || p.type === 'palm') && p.life > 0.3) {
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
      ctx.strokeStyle = p.color + alphaHex(alpha * 0.4);
      ctx.lineWidth = size * 0.6;
      ctx.stroke();
    }
  }

  ctx.globalCompositeOperation = 'source-over';
}

function alphaHex(a) {
  const v = Math.max(0, Math.min(255, Math.floor(a * 255)));
  return v.toString(16).padStart(2, '0');
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ============================================================
//  CITYSCAPE GENERATION
// ============================================================
function buildCity() {
  const container = document.getElementById('cityscape');
  const bCount = 30 + Math.floor(W / 50);
  let xCursor = -5;

  for (let i = 0; i < bCount; i++) {
    const bWidth = 20 + Math.floor(Math.random() * 40);
    const bHeight = 30 + Math.floor(Math.random() * 90);
    const div = document.createElement('div');
    div.className = 'building';
    div.style.left = xCursor + 'px';
    div.style.width = bWidth + 'px';
    div.style.height = bHeight + 'px';

    // Windows
    const rows = Math.floor(bHeight / 12);
    const cols = Math.floor(bWidth / 9);
    for (let r = 0; r < rows; r++) {
      const row = document.createElement('div');
      row.className = 'window-row';
      for (let c = 0; c < cols; c++) {
        const win = document.createElement('div');
        win.className = 'win ' + (Math.random() > 0.6 ? 'on' : 'off');
        row.appendChild(win);
      }
      div.appendChild(row);
    }

    container.appendChild(div);
    xCursor += bWidth + Math.floor(Math.random() * 6) - 2;
  }
}

// ============================================================
//  HUD TIMER
// ============================================================
let elapsedSec = 4 * 3600 + 12 * 60 + 38;
let totalCost = 14.72;
let milestoneCount = 23;

function tickHud() {
  elapsedSec++;
  const hh = String(Math.floor(elapsedSec / 3600)).padStart(2, '0');
  const mm = String(Math.floor((elapsedSec % 3600) / 60)).padStart(2, '0');
  const ss = String(elapsedSec % 60).padStart(2, '0');
  document.getElementById('hudTime').textContent = `${hh}:${mm}:${ss}`;

  // Simulate slow cost accrual
  totalCost += 0.002 + Math.random() * 0.004;
  document.getElementById('hudCost').textContent = '$' + totalCost.toFixed(2);
}
setInterval(tickHud, 1000);

// ============================================================
//  SHOW CHOREOGRAPHY
// ============================================================

// The completed milestones — 23 total (4 seed + 6 hypo + 13 invention so far)
const completedShow = [
  // Seed steps — green, clustered left
  { delay: 200,  x: () => W * (0.08 + Math.random() * 0.12), colors: COLORS.seed, type: 'burst' },
  { delay: 500,  x: () => W * (0.10 + Math.random() * 0.10), colors: COLORS.seed, type: 'burst' },
  { delay: 800,  x: () => W * (0.06 + Math.random() * 0.14), colors: COLORS.seed, type: 'palm' },
  { delay: 1100, x: () => W * (0.12 + Math.random() * 0.08), colors: COLORS.seed, type: 'burst' },

  // Hypothesis steps — purple, center-left
  { delay: 1800, x: () => W * (0.25 + Math.random() * 0.12), colors: COLORS.hypothesis, type: 'burst' },
  { delay: 2100, x: () => W * (0.28 + Math.random() * 0.10), colors: COLORS.hypothesis, type: 'willow' },
  { delay: 2400, x: () => W * (0.22 + Math.random() * 0.14), colors: COLORS.hypothesis, type: 'burst' },
  { delay: 2700, x: () => W * (0.30 + Math.random() * 0.08), colors: COLORS.hypothesis, type: 'crossette' },
  { delay: 3000, x: () => W * (0.24 + Math.random() * 0.12), colors: COLORS.hypothesis, type: 'burst' },
  { delay: 3300, x: () => W * (0.27 + Math.random() * 0.10), colors: COLORS.hypothesis, type: 'palm' },

  // Invention steps — blue, spread center-right (13 fireworks)
  { delay: 4200, x: () => W * (0.42 + Math.random() * 0.20), colors: COLORS.invention, type: 'burst' },
  { delay: 4500, x: () => W * (0.48 + Math.random() * 0.18), colors: COLORS.invention, type: 'willow' },
  { delay: 4800, x: () => W * (0.45 + Math.random() * 0.22), colors: COLORS.invention, type: 'crossette' },
  { delay: 5100, x: () => W * (0.50 + Math.random() * 0.16), colors: COLORS.invention, type: 'burst' },
  { delay: 5400, x: () => W * (0.44 + Math.random() * 0.20), colors: COLORS.invention, type: 'palm' },
  { delay: 5700, x: () => W * (0.52 + Math.random() * 0.14), colors: COLORS.invention, type: 'burst' },
  { delay: 6000, x: () => W * (0.46 + Math.random() * 0.18), colors: COLORS.invention, type: 'willow' },
  { delay: 6300, x: () => W * (0.55 + Math.random() * 0.16), colors: COLORS.invention, type: 'burst' },
  { delay: 6600, x: () => W * (0.40 + Math.random() * 0.22), colors: COLORS.invention, type: 'crossette' },
  { delay: 6900, x: () => W * (0.48 + Math.random() * 0.20), colors: COLORS.invention, type: 'burst' },
  { delay: 7200, x: () => W * (0.53 + Math.random() * 0.14), colors: COLORS.invention, type: 'palm' },
  { delay: 7500, x: () => W * (0.42 + Math.random() * 0.18), colors: COLORS.invention, type: 'burst' },
  { delay: 7800, x: () => W * (0.50 + Math.random() * 0.16), colors: COLORS.invention, type: 'willow' },
];

function runShow() {
  completedShow.forEach(fw => {
    setTimeout(() => {
      launchFirework({
        x: fw.x(),
        peakY: (0.1 + Math.random() * 0.3) * H,
        colors: fw.colors,
        type: fw.type,
      });
    }, fw.delay);
  });

  // After replay, start periodic "active work" fireworks
  setTimeout(startPeriodicLaunches, 9000);
}

function startPeriodicLaunches() {
  function scheduleNext() {
    const delay = 3000 + Math.random() * 2000;
    setTimeout(() => {
      // Blue invention fireworks — active work
      launchFirework({
        x: W * (0.35 + Math.random() * 0.35),
        peakY: (0.08 + Math.random() * 0.32) * H,
        colors: COLORS.invention,
        type: FIREWORK_TYPES[Math.floor(Math.random() * FIREWORK_TYPES.length)],
      });
      scheduleNext();
    }, delay);
  }
  scheduleNext();
}

// ============================================================
//  CLICK TO LAUNCH
// ============================================================
canvas.addEventListener('click', (e) => {
  const allColors = [...COLORS.seed, ...COLORS.hypothesis, ...COLORS.invention, ...COLORS.paper];
  const colorSet = [
    allColors[Math.floor(Math.random() * allColors.length)],
    allColors[Math.floor(Math.random() * allColors.length)],
    allColors[Math.floor(Math.random() * allColors.length)],
  ];
  launchFirework({
    x: e.clientX,
    peakY: e.clientY * 0.4 + Math.random() * 60,
    colors: colorSet,
    type: FIREWORK_TYPES[Math.floor(Math.random() * FIREWORK_TYPES.length)],
  });

  milestoneCount++;
  document.getElementById('hudCount').textContent = milestoneCount;
});

// ============================================================
//  FLOATING EMBERS (ambient between fireworks)
// ============================================================
const embers = [];
function initEmbers() {
  for (let i = 0; i < 40; i++) {
    embers.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.7,
      vx: (Math.random() - 0.5) * 0.2,
      vy: -0.1 - Math.random() * 0.2,
      size: 0.5 + Math.random() * 1,
      alpha: 0.1 + Math.random() * 0.2,
      color: ['#ff884422', '#aa55ff22', '#4488ff22', '#22dd6622'][Math.floor(Math.random() * 4)],
    });
  }
}

function updateEmbers() {
  for (const e of embers) {
    e.x += e.vx + Math.sin(performance.now() * 0.001 + e.y) * 0.05;
    e.y += e.vy;
    if (e.y < -10) { e.y = H * 0.7; e.x = Math.random() * W; }
    if (e.x < -10) e.x = W + 10;
    if (e.x > W + 10) e.x = -10;
  }
}

function renderEmbers() {
  for (const e of embers) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    ctx.fillStyle = e.color;
    ctx.fill();
  }
}

// Patch the main loop to include embers
const _origUpdate = update;
const _origRender = render;

function fullUpdate()  { _origUpdate(); updateEmbers(); }
function fullRender()  { _origRender(); renderEmbers(); }

function mainLoop() {
  fullUpdate();
  fullRender();
  requestAnimationFrame(mainLoop);
}

// ============================================================
//  STARFIELD (subtle background stars)
// ============================================================
const stars = [];
function initStars() {
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.65,
      size: 0.3 + Math.random() * 0.8,
      twinkle: Math.random() * Math.PI * 2,
      speed: 0.5 + Math.random() * 1.5,
    });
  }
}

function renderStars() {
  const t = performance.now() * 0.001;
  ctx.globalCompositeOperation = 'lighter';
  for (const s of stars) {
    const alpha = 0.15 + 0.12 * Math.sin(t * s.speed + s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 200, 240, ${alpha})`;
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

// Final main loop with stars
function finalLoop() {
  fullUpdate();
  // Clear with trail effect
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(5, 5, 16, 0.18)';
  ctx.fillRect(0, 0, W, H);

  renderStars();

  // Re-render particles etc. (use lighter blending)
  ctx.globalCompositeOperation = 'lighter';

  // Ghosts
  const t = now();
  for (const g of ghosts) {
    const age = (t - g.born) / GHOST_LIFETIME;
    const a = Math.max(0, 0.12 * (1 - age));
    const grad = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.size * (1 + age * 0.5));
    grad.addColorStop(0, g.color + alphaHex(a));
    grad.addColorStop(1, g.color + '00');
    ctx.fillStyle = grad;
    ctx.fillRect(g.x - g.size * 1.5, g.y - g.size * 1.5, g.size * 3, g.size * 3);
  }

  // Rockets
  for (const r of rockets) {
    ctx.beginPath();
    ctx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = r.color;
    ctx.fill();
    for (const tp of r.trail) {
      if (tp.life <= 0) continue;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, 1.2 * tp.life, 0, Math.PI * 2);
      ctx.fillStyle = r.color + alphaHex(tp.life * 0.7);
      ctx.fill();
    }
  }

  // Particles
  for (const p of activeParticles) {
    const alpha = p.life;
    const size = p.size * Math.max(0.2, p.life);
    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = p.color + alphaHex(alpha);
    ctx.fill();
    if ((p.type === 'willow' || p.type === 'palm') && p.life > 0.3) {
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 3, p.y - p.vy * 3);
      ctx.strokeStyle = p.color + alphaHex(alpha * 0.4);
      ctx.lineWidth = size * 0.6;
      ctx.stroke();
    }
  }

  // Embers
  for (const e of embers) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    ctx.fillStyle = e.color;
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(finalLoop);
}

// ============================================================
//  INIT
// ============================================================
buildCity();
initStars();
initEmbers();

// Small delay before the show starts
setTimeout(() => {
  runShow();
  requestAnimationFrame(finalLoop);
}, 400);
</script>
</body>
</html>
