<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pulse Line</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08090e;
    --surface: #0d0f16;
    --border: #171a25;
    --bsub: rgba(255,255,255,0.05);
    --green: #22c55e;
    --purple: #a78bfa;
    --blue: #38bdf8;
    --gray: #4b5563;
    --text: #e2e8f0;
    --dim: #94a3b8;
    --muted: #64748b;
    --gG: rgba(34,197,94,0.4);
    --gP: rgba(167,139,250,0.4);
    --gB: rgba(56,189,248,0.5);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }
  .hdr-l { display: flex; align-items: center; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-dot {
    width: 8px; height: 8px;
    background: var(--blue);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gB);
    animation: bp 2.5s ease-in-out infinite;
  }
  @keyframes bp {
    0%, 100% { box-shadow: 0 0 6px var(--gB); }
    50% { box-shadow: 0 0 14px var(--gB); }
  }
  .brand-name { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .run-tag {
    font-size: 11px;
    color: var(--muted);
    background: rgba(167,139,250,0.08);
    border: 1px solid rgba(167,139,250,0.15);
    padding: 3px 10px;
    border-radius: 5px;
    font-weight: 500;
  }
  .hdr-r { display: flex; align-items: center; gap: 20px; font-size: 11px; color: var(--muted); }
  .hdr-r .v { font-weight: 600; margin-left: 5px; }
  .hdr-r .v.t { color: var(--blue); }
  .hdr-r .v.c { color: var(--green); }
  .nav-h { font-size: 10px; color: var(--muted); opacity: 0.5; }

  /* ─── Pulse Strip ─── */
  .pulse-strip {
    position: relative;
    height: 80px;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }
  .pulse-strip canvas { display: block; width: 100%; height: 100%; }

  .strip-labels {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    z-index: 5;
  }
  .strip-label {
    flex: 1;
    text-align: center;
    padding-bottom: 6px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    transition: color 0.3s, opacity 0.3s;
    cursor: pointer;
  }
  .strip-label[data-s="complete"] { color: var(--green); opacity: 0.7; }
  .strip-label[data-s="active"]   { color: var(--blue); opacity: 1; }
  .strip-label[data-s="pending"]  { color: var(--gray); opacity: 0.4; }
  .strip-label.sel { opacity: 1 !important; }
  .strip-label.sel::after {
    content: '';
    display: block;
    width: 32px; height: 2px;
    background: currentColor;
    margin: 3px auto 0;
    border-radius: 1px;
  }

  /* ─── Content ─── */
  .content { flex: 1; display: flex; overflow: hidden; }

  .detail {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .detail::-webkit-scrollbar { width: 5px; }
  .detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .card {
    background: rgba(13,15,22,0.8);
    border: 1px solid var(--bsub);
    border-radius: 14px;
    padding: 28px;
    backdrop-filter: blur(16px);
    animation: ci 0.25s ease-out;
  }
  @keyframes ci {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cb {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 10px;
    border-radius: 5px;
    margin-bottom: 14px;
  }
  .cb.complete { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .cb.active   { background: rgba(56,189,248,0.1); color: var(--blue); border: 1px solid rgba(56,189,248,0.2); }
  .cb.pending  { background: rgba(75,85,99,0.08); color: var(--gray); border: 1px solid rgba(75,85,99,0.2); }
  .cb-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .cb.active .cb-dot { animation: bd 2s ease-in-out infinite; }
  @keyframes bd { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .ct { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 4px; }
  .cs { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .cd { height: 1px; background: var(--bsub); margin-bottom: 20px; }

  .cbody { font-size: 14px; line-height: 1.75; color: var(--dim); }
  .cbody p { margin-bottom: 12px; }
  .cbody p:last-child { margin-bottom: 0; }
  .cbody strong { color: var(--text); font-weight: 600; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--bsub);
  }
  .metric {
    background: rgba(255,255,255,0.015);
    border: 1px solid var(--bsub);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .ml { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 4px; }
  .mv { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .mv.green { color: var(--green); }
  .mv.blue  { color: var(--blue); }
  .mv.purple { color: var(--purple); }
  .mv.white { color: var(--text); }

  /* Sub-steps */
  .subs { margin-top: 18px; }
  .sg {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--muted); margin-bottom: 8px; margin-top: 14px;
  }
  .sg:first-child { margin-top: 0; }
  .sr {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px; border-radius: 8px;
    font-size: 12px; color: var(--dim);
    transition: background 0.15s;
  }
  .sr:hover { background: rgba(255,255,255,0.025); }
  .sd { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .sd.done    { background: var(--green); box-shadow: 0 0 5px var(--gG); }
  .sd.running { background: var(--blue); box-shadow: 0 0 5px var(--gB); animation: sdp 1.8s ease-in-out infinite; }
  .sd.wait    { background: var(--gray); opacity: 0.35; }
  @keyframes sdp { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .sn { flex: 1; }
  .st { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Progress bar */
  .pt { width: 100%; height: 5px; background: rgba(255,255,255,0.04); border-radius: 3px; margin-top: 14px; overflow: hidden; }
  .pf { height: 100%; border-radius: 3px; background: var(--blue); box-shadow: 0 0 8px var(--gB); transition: width 0.5s ease; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 5px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sbt { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 18px; }
  .sbm {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 9px; margin-bottom: 4px;
    cursor: pointer; transition: background 0.15s, border-color 0.2s;
    border: 1px solid transparent;
  }
  .sbm:hover { background: rgba(255,255,255,0.025); }
  .sbm.sel { background: rgba(56,189,248,0.04); border-color: rgba(56,189,248,0.12); }
  .sbd { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sbd.complete { background: var(--green); box-shadow: 0 0 5px var(--gG); }
  .sbd.active   { background: var(--blue); box-shadow: 0 0 6px var(--gB); animation: sdp 2s ease-in-out infinite; }
  .sbd.pending  { background: var(--gray); opacity: 0.3; }
  .sbtx { flex: 1; min-width: 0; }
  .sbtn { font-size: 12px; font-weight: 600; }
  .sbts { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sbdiv { height: 1px; background: var(--bsub); margin: 16px 0; }
  .sbp { margin-bottom: 12px; }
  .sbpl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 3px; }
  .sbpv { font-size: 14px; font-weight: 600; }
  .sbpv.green  { color: var(--green); }
  .sbpv.blue   { color: var(--blue); }
  .sbpv.purple { color: var(--purple); }

  /* ─── Footer ─── */
  .ftr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 28px; border-top: 1px solid var(--border);
    font-size: 9px; color: var(--muted); opacity: 0.5;
    letter-spacing: 0.5px; flex-shrink: 0; background: var(--surface);
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="brand"><div class="brand-dot"></div><div class="brand-name">AI Inventor</div></div>
    <div class="run-tag">ssl-low-resource-v3</div>
  </div>
  <div class="hdr-r">
    <span>Runtime <span class="v t" id="hdr-time">02:34:17</span></span>

<div class="pulse-strip">

<script>
// ═══════════════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════════════

const MODULES = [
  {

  },
  {

    col: { r: 167, g: 139, b: 250 }, amp: 0.55,

        + '<p>The final hypothesis proposes a <strong>contrastive auxiliary task</strong> for low-resource SSL that leverages cross-lingual phonetic alignment, reducing labeled data requirements by an estimated 40%.</p>',
    metrics: [
      { l: 'Final Score', v: '8.4/10', c: 'purple' },
      { l: 'Iterations', v: '3', c: 'white' },
      { l: 'Duration', v: '24m 15s', c: 'blue' },

    ],

        { n: 'Review hypothesis', s: 'done', t: '2m 48s' },
        { n: 'Revise hypothesis', s: 'done', t: '2m 10s' }
      ]},
      { g: 'Iteration 2 (7.6/10)', items: [
        { n: 'Generate hypothesis', s: 'done', t: '3m 05s' },
        { n: 'Review hypothesis', s: 'done', t: '2m 55s' },
        { n: 'Revise hypothesis', s: 'done', t: '2m 35s' }
      ]},
      { g: 'Iteration 3 (8.4/10)', items: [
        { n: 'Generate hypothesis', s: 'done', t: '2m 58s' },
        { n: 'Review hypothesis', s: 'done', t: '2m 40s' },
        { n: 'Accept hypothesis', s: 'done', t: '1m 42s' }
      ]}
    ]
  },
  {
    id: 'inv', name: 'Invention Loop', short: 'INVENTION', status: 'active',
    col: { r: 56, g: 189, b: 248 }, amp: 0.85,
    sub: 'Iteration 2 of 3 -- generating artifacts',
    body: '<p>Currently in <strong>iteration 2</strong> of the invention loop. The plan has been approved and artifact generation is in progress.</p>'
        + '<p>3 of 5 artifacts have been generated: two Python demos showing the contrastive alignment mechanism, and a training curve visualization. Remaining: ablation study table, architecture diagram.</p>',
    metrics: [
      { l: 'Iteration', v: '2/3', c: 'blue' },
      { l: 'Artifacts', v: '3/5', c: 'green' },
      { l: 'Plan Score', v: '7.8', c: 'purple' },
      { l: 'Elapsed', v: '47m', c: 'white' }
    ],
    steps: [
      { g: 'Iteration 1 (revised)', items: [
        { n: 'Generate plan', s: 'done', t: '4m 12s' },
        { n: 'Generate paper text', s: 'done', t: '6m 33s' },
        { n: 'Review paper', s: 'done', t: '3m 08s' }
      ]},
      { g: 'Iteration 2 (current)', items: [
        { n: 'Revise plan', s: 'done', t: '3m 44s' },
        { n: 'Generate paper text', s: 'done', t: '5m 52s' },
        { n: 'Generate artifacts', s: 'running', t: '3/5 done' },
        { n: 'Review paper', s: 'wait', t: '--' },
        { n: 'Accept / revise', s: 'wait', t: '--' }
      ]}
    ],
    progress: 0.6
  },
  {
    id: 'paper', name: 'Paper Repository', short: 'PAPER', status: 'pending',
    col: { r: 75, g: 85, b: 99 }, amp: 0,
    sub: 'Waiting for invention loop',
    body: '<p>The paper repository step will compile the final paper, generate all visualizations, and produce a complete Git repository with reproducible code.</p>'
        + '<p>This step runs once after the invention loop converges.</p>',
    metrics: [
      { l: 'Status', v: 'Pending', c: 'white' },
      { l: 'Est. Duration', v: '~15m', c: 'blue' }
    ],
    steps: [
      { g: null, items: [
        { n: 'Compile LaTeX paper', s: 'wait', t: '--' },
        { n: 'Generate visualizations', s: 'wait', t: '--' },
        { n: 'Generate full paper', s: 'wait', t: '--' },
        { n: 'Build repository', s: 'wait', t: '--' }
      ]}
    ]

];

let selIdx = 2; // Start on the active module

// ═══════════════════════════════════════════════════════════════════
// ECG CANVAS — Heartbeat Strip
// ═══════════════════════════════════════════════════════════════════

const DPR = window.devicePixelRatio || 1;
const cvs = document.getElementById('ecg');
const cx = cvs.getContext('2d');
let cw = 0, ch = 0, modX = [], ecgPts = [];

function resize() {
  const strip = cvs.parentElement;
  cw = strip.clientWidth;
  ch = strip.clientHeight;
  cvs.width = cw * DPR;
  cvs.height = ch * DPR;
  cvs.style.width = cw + 'px';
  cvs.style.height = ch + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // Module center X positions: evenly spaced with padding
  const pad = cw * 0.1, span = cw - pad * 2;
  modX = MODULES.map((_, i) => pad + (span * i) / (MODULES.length - 1));
}

// ECG spike as {dx, dy} deltas; amp controls height (0..1)
function spike(a) {
  if (a <= 0) return [];
  return [
    // P-wave bump
    { dx: 4, dy: -0.06 * a }, { dx: 5, dy: -0.10 * a },
    { dx: 5, dy: -0.06 * a }, { dx: 3, dy: 0 },
    // PR segment
    { dx: 4, dy: 0 },
    // Q dip
    { dx: 2, dy: 0.06 * a },
    // R spike (the big one)
    { dx: 3, dy: -0.80 * a },
    // S dip
    { dx: 3, dy: 0.90 * a }, { dx: 2, dy: 0.12 * a },
    // Return to baseline
    { dx: 3, dy: -0.22 * a },
    // ST segment
    { dx: 5, dy: 0 },
    // T-wave
    { dx: 4, dy: -0.14 * a }, { dx: 5, dy: -0.20 * a },
    { dx: 5, dy: -0.14 * a }, { dx: 4, dy: 0 },
    // Trailing flat
    { dx: 6, dy: 0 }
  ];
}

// Build the full ECG path: flat baseline with spikes at module positions
function buildPath() {
  const bl = ch * 0.48, hw = 32;
  const pts = [{ x: 0, y: bl }];
  let x = 0;

  for (let i = 0; i < MODULES.length; i++) {
    const m = MODULES[i];
    const spikeStart = modX[i] - hw;

    // Flat line with micro-noise leading up to spike
    while (x < spikeStart) {
      x += 2;
      const noiseLevel = (m.status === 'pending' && i > 0) ? 0.15 : 0.3;
      pts.push({ x, y: bl + (Math.random() - 0.5) * noiseLevel });
    }

    // Draw ECG spike if this module has amplitude
    if (m.amp > 0) {
      const sp = spike(m.amp);
      let sy = bl;
      for (const d of sp) {
        x += d.dx;
        sy += d.dy * (ch * 0.9);
        pts.push({ x, y: sy });
      }
    }

    // Flat line after spike to next module or end
    const nextTarget = (i < MODULES.length - 1)
      ? modX[i + 1] - hw
      : cw + 10;
    const isPending = MODULES[Math.min(i + 1, MODULES.length - 1)].status === 'pending';
    while (x < nextTarget) {
      x += 2;
      pts.push({ x, y: bl + (Math.random() - 0.5) * (isPending ? 0.15 : 0.3) });
    }
  }

  ecgPts = pts;
}

// Identify indices near the active module spike for pulsing
let activeSpikeIdxs = [];
let spikeBaseY = 0;

function findActiveSpike() {
  const ai = MODULES.findIndex(m => m.status === 'active');
  activeSpikeIdxs = [];
  spikeBaseY = ch * 0.48;
  if (ai < 0) return;
  const acx = modX[ai];
  for (let i = 0; i < ecgPts.length; i++) {
    if (Math.abs(ecgPts[i].x - acx) < 45) activeSpikeIdxs.push(i);
  }
}

// Dot animation state
let dotPhase = 0;

function drawECG(time) {
  cx.clearRect(0, 0, cw, ch);

  // Subtle background grid
  cx.strokeStyle = 'rgba(255,255,255,0.015)';
  cx.lineWidth = 0.5;
  for (let gx = 0; gx < cw; gx += 40) {
    cx.beginPath(); cx.moveTo(gx, 0); cx.lineTo(gx, ch); cx.stroke();
  }
  for (let gy = 0; gy < ch; gy += 20) {
    cx.beginPath(); cx.moveTo(0, gy); cx.lineTo(cw, gy); cx.stroke();
  }

  if (ecgPts.length < 2) return;

  const aIdx = MODULES.findIndex(m => m.status === 'active');

  // Pulse multiplier: active spike breathes every 2 seconds
  const pulseM = 1.0 + 0.12 * Math.sin((time % 2000) / 2000 * Math.PI * 2);

  // Clone points and apply pulse to active spike region
  const dp = ecgPts.map(p => ({ x: p.x, y: p.y }));
  for (const idx of activeSpikeIdxs) {
    const dy = dp[idx].y - spikeBaseY;
    dp[idx].y = spikeBaseY + dy * pulseM;
  }

  // Draw line segments with per-module coloring and glow
  for (let i = 1; i < dp.length; i++) {
    const px = dp[i].x;

    // Determine which module region this segment belongs to
    let col = { r: 75, g: 85, b: 99 };
    let alpha = 0.2;
    for (let m = MODULES.length - 1; m >= 0; m--) {
      const start = m === 0 ? 0 : (modX[m - 1] + modX[m]) / 2;
      const end = m === MODULES.length - 1 ? cw + 10 : (modX[m] + modX[m + 1]) / 2;
      if (px >= start && px <= end) {
        col = MODULES[m].col;
        alpha = MODULES[m].status === 'pending' ? 0.15 : 0.7;
        break;
      }
    }

    // Extra glow near active module
    let glowBlur = 4, glowAlpha = alpha * 0.3;
    if (aIdx >= 0) {
      const dist = Math.abs(px - modX[aIdx]);
      if (dist < 60) {
        const intensity = 1 - dist / 60;
        glowBlur = 4 + 14 * intensity;
        glowAlpha = alpha * 0.3 + 0.5 * intensity;
        alpha = Math.min(1, alpha + 0.3 * intensity * pulseM);
      }
    }

    cx.save();
    cx.shadowColor = `rgba(${col.r},${col.g},${col.b},${glowAlpha})`;
    cx.shadowBlur = glowBlur;
    cx.strokeStyle = `rgba(${col.r},${col.g},${col.b},${alpha})`;
    cx.lineWidth = 2;
    cx.lineCap = 'round';
    cx.lineJoin = 'round';
    cx.beginPath();
    cx.moveTo(dp[i - 1].x, dp[i - 1].y);
    cx.lineTo(dp[i].x, dp[i].y);
    cx.stroke();
    cx.restore();
  }

  // Bright traveling dot oscillating around the active module
  if (aIdx >= 0) {
    const tgtX = modX[aIdx];
    let tgtI = 0;
    for (let i = 0; i < ecgPts.length; i++) {
      if (ecgPts[i].x >= tgtX) { tgtI = i; break; }
    }
    dotPhase += 0.015;
    const di = Math.max(0, Math.min(
      Math.floor(tgtI + Math.sin(dotPhase) * 40),
      dp.length - 1
    ));
    const pt = dp[di];
    const { r, g, b } = MODULES[aIdx].col;
    const dotGlow = 0.6 + 0.4 * Math.sin(time * 0.004);

    // Glow halo
    cx.save();
    cx.shadowColor = `rgba(${r},${g},${b},${dotGlow})`;
    cx.shadowBlur = 18;
    cx.fillStyle = `rgba(${r},${g},${b},0.9)`;
    cx.beginPath();
    cx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
    cx.fill();
    cx.restore();

    // Bright center
    cx.fillStyle = 'rgba(255,255,255,0.95)';
    cx.beginPath();
    cx.arc(pt.x, pt.y, 2, 0, Math.PI * 2);
    cx.fill();

    // Fading trail behind the dot
    for (let t = 1; t <= 5; t++) {
      const ti = Math.max(0, di - t * 5);
      const tp = dp[ti];
      const trailAlpha = (1 - t / 6) * 0.3;
      cx.fillStyle = `rgba(${r},${g},${b},${trailAlpha})`;
      cx.beginPath();
      cx.arc(tp.x, tp.y, 2.5 - t * 0.3, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // Selection indicator triangle
  const sx = modX[selIdx];
  cx.fillStyle = 'rgba(255,255,255,0.25)';
  cx.beginPath();
  cx.moveTo(sx, ch - 14);
  cx.lineTo(sx - 4, ch - 8);
  cx.lineTo(sx + 4, ch - 8);
  cx.closePath();
  cx.fill();
}

// ═══════════════════════════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════════════════════════

function renderLabels() {
  const el = document.getElementById('strip-labels');
  el.innerHTML = MODULES.map((m, i) =>
    `<div class="strip-label${i === selIdx ? ' sel' : ''}" data-s="${m.status}" onclick="selIdx=${i};renderUI()">${m.short}</div>`
  ).join('');
}

function renderDetail() {
  const m = MODULES[selIdx];
  const statusLabel = m.status === 'complete' ? 'Complete' : m.status === 'active' ? 'Active' : 'Pending';

  let h = `<div class="card">
    <div class="cb ${m.status}"><div class="cb-dot"></div>${statusLabel}</div>
    <div class="ct">${m.name}</div>
    <div class="cs">${m.sub}</div>
    <div class="cd"></div>
    <div class="cbody">${m.body}</div>`;

  // Metric cards
  if (m.metrics.length) {
    h += '<div class="metrics">';
    for (const x of m.metrics) {
      h += `<div class="metric"><div class="ml">${x.l}</div><div class="mv ${x.c}">${x.v}</div></div>`;
    }
    h += '</div>';
  }

  // Progress bar for active module
  if (m.progress !== undefined) {
    h += `<div class="pt"><div class="pf" style="width:${m.progress * 100}%"></div></div>`;
  }

  // Sub-step list
  if (m.steps.length) {
    h += '<div class="subs">';
    for (const g of m.steps) {
      if (g.g) h += `<div class="sg">${g.g}</div>`;
      for (const s of g.items) {
        const dc = s.s === 'done' ? 'done' : s.s === 'running' ? 'running' : 'wait';
        h += `<div class="sr"><div class="sd ${dc}"></div><span class="sn">${s.n}</span><span class="st">${s.t}</span></div>`;
      }
    }
    h += '</div>';
  }

  h += '</div>';
  document.getElementById('detail').innerHTML = h;
}

function renderSidebar() {
  let h = '<div class="sbt">Pipeline Modules</div>';
  MODULES.forEach((m, i) => {
    const sel = i === selIdx ? ' sel' : '';
    h += `<div class="sbm${sel}" onclick="selIdx=${i};renderUI()">
      <div class="sbd ${m.status}"></div>
      <div class="sbtx">
        <div class="sbtn">${m.name}</div>
        <div class="sbts">${m.sub}</div>
      </div>
    </div>`;
  });

  const done = MODULES.filter(m => m.status === 'complete').length;
  h += `<div class="sbdiv"></div>
    <div class="sbp"><div class="sbpl">Progress</div><div class="sbpv blue">${done}/${MODULES.length} complete</div></div>
    <div class="sbp"><div class="sbpl">Active Step</div><div class="sbpv purple">Artifact Gen</div></div>
    <div class="sbp"><div class="sbpl">Total Cost</div><div class="sbpv green" id="sb-cost">$12.47</div></div>
    <div class="sbp"><div class="sbpl">Tokens Used</div><div class="sbpv" style="color:var(--text)">847K</div></div>`;
  document.getElementById('sidebar').innerHTML = h;
}

function renderUI() {
  renderLabels();
  renderDetail();
  renderSidebar();
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD NAVIGATION
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    selIdx = Math.min(selIdx + 1, MODULES.length - 1);
    renderUI();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    selIdx = Math.max(selIdx - 1, 0);
    renderUI();
  }
});

// ═══════════════════════════════════════════════════════════════════
// LIVE CLOCK & COST
// ═══════════════════════════════════════════════════════════════════

const t0 = Date.now() - (2 * 3600 + 34 * 60 + 17) * 1000;
let cost = 12.47;

function tick() {
  const s = Math.floor((Date.now() - t0) / 1000);
  const hh = String(Math.floor(s / 3600)).padStart(2, '0');
  const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const ss = String(s % 60).padStart(2, '0');
  document.getElementById('hdr-time').textContent = `${hh}:${mm}:${ss}`;
  cost += 0.001 + Math.random() * 0.002;
  const cs = '$' + cost.toFixed(2);
  document.getElementById('hdr-cost').textContent = cs;
  const sc = document.getElementById('sb-cost');
  if (sc) sc.textContent = cs;
}

// ═══════════════════════════════════════════════════════════════════
// ANIMATION LOOP & INIT
// ═══════════════════════════════════════════════════════════════════

function animate(t) {
  drawECG(t);
  requestAnimationFrame(animate);
}

function init() {
  resize();
  buildPath();
  findActiveSpike();
  renderUI();
  tick();
  setInterval(tick, 1000);
  requestAnimationFrame(animate);
}

let rt;
window.addEventListener('resize', () => {
  clearTimeout(rt);
  rt = setTimeout(() => {
    resize();
    buildPath();
    findActiveSpike();
    renderUI();
  }, 100);
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
