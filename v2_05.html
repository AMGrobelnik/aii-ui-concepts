<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor - Mini Ring Gauges</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3a; --text: #e0e0e8; --text-dim: #8888a0;
    --green: #34d399; --purple: #a78bfa; --blue: #60a5fa; --orange: #fb923c; --gray: #4a4a5e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  .layout {
    display: grid;
    grid-template-columns: 160px 1fr;
    grid-template-rows: auto auto 1fr;
    min-height: 100vh;
  }

  /* ── Ring Panel (left sidebar) ── */
  .ring-panel {
    grid-column: 1; grid-row: 1 / 4;
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 12px;
    border-right: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; height: 100vh;
  }
  .ring-container { position: relative; width: 120px; height: 120px; margin-bottom: 8px; }
  .ring-svg { width: 120px; height: 120px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 7; }
  .ring-progress {
    fill: none; stroke-width: 7; stroke-linecap: round;
    stroke-dasharray: 301.6; stroke-dashoffset: 301.6;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 0 6px rgba(96,165,250,0.4));
  }
  .ring-endpoint {
    position: absolute; width: 10px; height: 10px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 10px rgba(96,165,250,.6), 0 0 20px rgba(96,165,250,.3);
    transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
  }
  .ring-center-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
  }
  .ring-percent {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, var(--green), var(--purple), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .ring-label-text {
    font-size: 10px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; text-align: center; margin-bottom: 20px;
  }
  .ring-highlight {
    fill: none; stroke-width: 11; stroke-linecap: round; opacity: 0;
    transition: opacity 0.4s, stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .ring-highlight.visible { opacity: 0.25; }

  /* Legend in ring panel */
  .legend { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px;
    border-radius: 6px; cursor: pointer; transition: all 0.2s;
    font-size: 11px; color: var(--text-dim);
  }
  .legend-item:hover { background: var(--surface2); color: var(--text); }
  .legend-item.active { background: var(--surface2); color: var(--text); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-count { margin-left: auto; font-size: 10px; font-weight: 600; opacity: 0.6; }

  /* ── Row 1: Mini Ring Gauges ── */
  .module-row {
    grid-column: 2; grid-row: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 24px 10px; gap: 10px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; z-index: 11;
  }

  .mini-ring-node {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; transition: all 0.3s; position: relative;
  }
  .mini-ring-node:hover { transform: translateY(-2px); }
  .mini-ring-wrap {
    position: relative; width: 36px; height: 36px;
    transition: transform 0.3s;
  }
  .mini-ring-node.selected .mini-ring-wrap {
    transform: scale(1.2);
  }
  .mini-ring-svg {
    width: 36px; height: 36px; transform: rotate(-90deg);
  }
  .mini-ring-track {
    fill: none; stroke: var(--border); stroke-width: 3;
  }
  .mini-ring-arc {
    fill: none; stroke-width: 3; stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* Completed rings get a subtle full-ring background tint */
  .mini-ring-node.completed .mini-ring-track {
    stroke: color-mix(in srgb, var(--color) 15%, var(--border));
  }
  .mini-ring-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 9px; font-weight: 700; white-space: nowrap;
    pointer-events: none;
  }

  /* Percentage tooltip on hover */
  .mini-ring-pct-tip {
    position: absolute; top: -22px; left: 50%;
    transform: translateX(-50%) scale(0.9);
    font-size: 9px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text);
  }
  .mini-ring-node:hover .mini-ring-pct-tip {
    opacity: 1; transform: translateX(-50%) scale(1);
  }

  /* Glow behind mini ring */
  .mini-ring-glow {
    position: absolute; inset: -4px; border-radius: 50%;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }
  .mini-ring-node.completed .mini-ring-glow { opacity: 0.25; }
  .mini-ring-node.active .mini-ring-glow { opacity: 0.35; }
  .mini-ring-node.selected .mini-ring-glow { opacity: 0.5; }
  .mini-ring-node.pending .mini-ring-glow { opacity: 0; }

  /* Animated glowing endpoint on active ring */
  .mini-ring-ep {
    position: absolute; width: 5px; height: 5px; border-radius: 50%;
    pointer-events: none; opacity: 0;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .mini-ring-node.active .mini-ring-ep {
    opacity: 1;
    animation: epGlow 2s ease-in-out infinite;
  }
  @keyframes epGlow {
    0%, 100% {
      box-shadow: 0 0 4px currentColor, 0 0 8px currentColor;
      transform: scale(1);
    }
    50% {
      box-shadow: 0 0 8px currentColor, 0 0 16px currentColor, 0 0 24px currentColor;
      transform: scale(1.3);
    }
  }

  /* Pending rings are dimmed */
  .mini-ring-node.pending .mini-ring-wrap { opacity: 0.45; }
  .mini-ring-node.pending .mini-ring-center { opacity: 0.5; }

  .mini-ring-label {
    font-size: 10px; color: var(--text-dim); transition: color 0.3s;
    white-space: nowrap;
  }
  .mini-ring-node.selected .mini-ring-label {
    color: var(--text); font-weight: 600;
  }

  /* Connector between mini rings */
  .mod-connector {
    width: 36px; height: 2px; border-radius: 1px; transition: background 0.3s;
    flex-shrink: 0;
  }
  .mod-connector.done { background: linear-gradient(90deg, var(--from), var(--to)); }
  .mod-connector.pending { background: var(--gray); opacity: 0.3; }
  .mod-connector.active {
    background: linear-gradient(90deg, var(--from), var(--to));
    position: relative; overflow: hidden;
  }
  .mod-connector.active::after {
    content: ''; position: absolute; top: -1px; width: 12px; height: 4px;
    border-radius: 2px; background: white; opacity: 0.6;
    animation: flowDot 1.5s linear infinite;
  }
  @keyframes flowDot { from { left: -12px; } to { left: calc(100% + 12px); } }

  /* ── Row 2: Sub-step Dots ── */
  .sub-row {
    grid-column: 2; grid-row: 2;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 24px 10px; gap: 6px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--surface) 80%, var(--bg));
    position: sticky; top: 68px; z-index: 10;
    max-height: 60px; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.3s;
    opacity: 1;
  }
  .sub-row.collapsed { max-height: 0; padding: 0 24px; opacity: 0; border-bottom: none; }
  .sub-dot-wrapper {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: all 0.2s;
  }
  .sub-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid transparent; transition: all 0.3s;
  }
  .sub-dot.completed { background: var(--color); border-color: var(--color); opacity: 0.8; }
  .sub-dot.active {
    background: color-mix(in srgb, var(--color) 30%, transparent);
    border-color: var(--color);
    box-shadow: 0 0 8px var(--color);
    animation: subPulse 2s ease-in-out infinite;
  }
  .sub-dot.pending { border-color: var(--gray); opacity: 0.4; }
  .sub-dot.selected {
    transform: scale(1.4);
    box-shadow: 0 0 12px var(--color), 0 0 24px color-mix(in srgb, var(--color) 40%, transparent);
  }
  .sub-dot-label { font-size: 9px; color: var(--text-dim); white-space: nowrap; transition: color 0.3s; }
  .sub-dot-wrapper.sel .sub-dot-label { color: var(--text); }
  .sub-connector { width: 16px; height: 1px; background: var(--border); flex-shrink: 0; }
  @keyframes subPulse {
    0%, 100% { box-shadow: 0 0 6px var(--color); }
    50% { box-shadow: 0 0 14px var(--color); }
  }

  /* ── Content Area ── */
  .content {
    grid-column: 2; grid-row: 3;
    padding: 24px 32px; overflow-y: auto;
  }
  .content-inner { max-width: 700px; }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 8px; border: 1px solid;
  }
  .title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .summary {
    font-size: 14px; color: var(--text-dim); line-height: 1.65;
    margin-bottom: 20px; max-width: 650px;
  }

  /* Expandable detail rows */
  .rows { display: flex; flex-direction: column; gap: 6px; }
  .row-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; transition: all 0.3s;
  }
  .row-card:hover { border-color: #3a3a50; }
  .row-card.expanded { box-shadow: 0 2px 16px rgba(0,0,0,.3); }
  .row-hdr {
    display: flex; align-items: center; padding: 12px 16px;
    cursor: pointer; gap: 12px; transition: background 0.2s;
  }
  .row-hdr:hover { background: var(--surface2); }
  .row-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .row-name { font-size: 13px; font-weight: 600; flex: 1; }
  .row-meta { font-size: 11px; color: var(--text-dim); }
  .row-chev {
    width: 16px; height: 16px; color: var(--text-dim);
    transition: transform 0.3s; flex-shrink: 0;
  }
  .row-card.expanded .row-chev { transform: rotate(180deg); }
  .row-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .row-card.expanded .row-body { max-height: 300px; }
  .row-detail {
    padding: 0 16px 14px 36px; font-size: 12.5px;
    color: var(--text-dim); line-height: 1.65;
  }

  /* Module progress bar in content */
  .mod-progress-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px;
  }
  .mod-progress-ring {
    width: 32px; height: 32px; flex-shrink: 0;
    transform: rotate(-90deg);
  }
  .mod-progress-ring .track { fill: none; stroke: var(--border); stroke-width: 3; }
  .mod-progress-ring .bar { fill: none; stroke-width: 3; stroke-linecap: round; }
  .mod-progress-info { display: flex; flex-direction: column; gap: 2px; }
  .mod-progress-label {
    font-size: 12px; font-weight: 600;
  }
  .mod-progress-detail {
    font-size: 11px; color: var(--text-dim);
  }
  .mod-progress-pct {
    margin-left: auto; font-size: 18px; font-weight: 700;
    letter-spacing: -0.5px;
  }

  .footer { margin-top: 20px; font-size: 11px; color: var(--text-dim); }
  .nav-hint {
    display: flex; align-items: center; gap: 8px; margin-top: 14px;
    font-size: 11px; color: var(--text-dim);
  }
  .key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 24px; height: 22px; padding: 0 5px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; font-size: 10px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: none; }
  }
  .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
</style>
</head>
<body>
<div class="layout">

  <!-- Big Ring Panel (left sidebar) -->
  <div class="ring-panel">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--green)"/>
            <stop offset="40%" stop-color="var(--purple)"/>
            <stop offset="70%" stop-color="var(--blue)"/>
            <stop offset="100%" stop-color="var(--gray)"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="60" cy="60" r="48"/>
        <circle class="ring-progress" cx="60" cy="60" r="48" stroke="url(#rg)"/>
        <circle class="ring-highlight" cx="60" cy="60" r="48"/>
      </svg>
      <div class="ring-endpoint" id="ep"></div>
      <div class="ring-center-text"><div class="ring-percent" id="pct">0%</div></div>
    </div>
    <div class="ring-label-text">Pipeline Progress</div>
    <div class="legend" id="legend"></div>
  </div>

  <!-- Row 1: Mini Ring Gauges -->
  <div class="module-row" id="modRow"></div>

  <!-- Row 2: Sub-step dots -->
  <div class="sub-row" id="subRow"></div>

  <!-- Content -->
  <div class="content">
    <div class="content-inner" id="contentInner"></div>
  </div>

</div>

<script>
const CIRC = 2 * Math.PI * 48;       // big ring circumference ~301.6
const MINI_R = 14;                     // mini ring radius (inside 36px viewBox)
const MINI_CIRC = 2 * Math.PI * MINI_R; // ~87.96

const MODULES = [
  {
    id: 'seed', name: 'Seed Hypothesis', short: 'Seed',
    color: 'var(--green)', raw: '#34d399',
    status: 'completed', metric: '\u2713', weight: 10,
    summary: 'Mined 847 papers from OpenAlex, built knowledge graph with 2,341 triples. Identified 12 research gaps. Selected 5 seed topics.',
    steps: [
      { name: 'Mine Papers', status: 'completed', metric: '847 papers',
        detail: 'Extracted papers from OpenAlex API across computational linguistics domain.' },
      { name: 'Build KG', status: 'completed', metric: '2,341 triples',
        detail: 'Constructed knowledge graph from paper abstracts using NER and relation extraction.' },
      { name: 'Find Gaps', status: 'completed', metric: '12 gaps',
        detail: 'Identified unexplored intersections in the knowledge graph via blind spot analysis.' },
      { name: 'Select Seeds', status: 'completed', metric: '5 topics',
        detail: 'BM25-matched seed topics against research direction. Round-robin agent assignment.' },
    ]
  },
  {
    id: 'hypo', name: 'Hypothesis Loop', short: 'Hypothesis',
    color: 'var(--purple)', raw: '#a78bfa',
    status: 'completed', metric: '8.4', weight: 25,
    summary: 'Refined hypothesis over 3 iterations of generation and adversarial review. Score improved from 6.2 to 8.4/10. Final: "Cross-lingual Contrastive Pre-training with Synthetic Code-Switching."',
    steps: [
      { name: 'Gen Hypo 1', status: 'completed', metric: 'Score 6.2',
        detail: 'Generated 8 hypotheses across 3 models. Best: cross-lingual transfer via code-switching. 3 major issues flagged.' },
      { name: 'Review 1', status: 'completed', metric: '3 major',
        detail: 'Adversarial review: weak baselines, unclear methodology, missing related work.' },
      { name: 'Gen Hypo 2', status: 'completed', metric: 'Score 7.8',
        detail: 'Refined to 4 hypotheses. Added contrastive pre-training approach. 1 major issue remaining.' },
      { name: 'Review 2', status: 'completed', metric: '1 major',
        detail: 'Needs convergence analysis. 2 minor: strengthen baselines, tighten abstract.' },
      { name: 'Gen Hypo 3', status: 'completed', metric: 'Score 8.4',
        detail: 'Final refinement. Narrowed to 8 language families. Added convergence analysis.' },
      { name: 'Review 3', status: 'completed', metric: '0 major',
        detail: 'Score 8.4/10. Confidence 4/5. 0 major issues, 2 minor. Ready for research.' },
    ]
  },
  {
    id: 'inv', name: 'Invention Loop', short: 'Invention',
    color: 'var(--blue)', raw: '#60a5fa',
    status: 'active', metric: '3/5', weight: 40,
    summary: 'Iteration 2 of 3. Generating artifacts to validate the hypothesis. Baseline shows 17.5% accuracy improvement. Ablation study running.',
    steps: [
      { name: 'Strategy', status: 'completed', metric: 'Selected',
        detail: 'Contrastive alignment with code-switching augmentation. Added ablation experiments per reviewer feedback.' },
      { name: 'Plan', status: 'completed', metric: '5 planned',
        detail: '5 artifacts: 2 experiments, 1 dataset, 1 evaluation, 1 proof. Compute profiles assigned.' },
      { name: 'Artifacts', status: 'active', metric: '3/5',
        detail: '3 complete: Contrastive Baseline (acc 0.847, +17.5%), Multilingual Pairs (2,400 examples), Convergence Proof (Lean 4 verified). Running: Ablation Study. Pending: Cross-lingual Eval.',
        children: [
          { name: 'Contrastive Baseline', status: 'completed', metric: 'acc: 0.847 (+17.5%)', time: '4m 32s', cost: '$2.14' },
          { name: 'Multilingual Pairs', status: 'completed', metric: '2,400 examples', time: '3m 15s', cost: '$1.02' },
          { name: 'Convergence Proof', status: 'completed', metric: 'Verified (Lean 4)', time: '2m 41s', cost: '$0.89' },
          { name: 'Ablation Study', status: 'active', metric: 'Running...', time: '1m 20s', cost: '$1.36' },
          { name: 'Cross-lingual Eval', status: 'pending', metric: 'Pending', time: '\u2014', cost: '\u2014' },
        ]
      },
      { name: 'Paper Draft', status: 'pending', metric: '\u2014',
        detail: 'Will synthesize paper from artifact results.' },
      { name: 'Review', status: 'pending', metric: '\u2014',
        detail: 'Adversarial review of paper draft.' },
      { name: 'Update Hypo', status: 'pending', metric: '\u2014',
        detail: 'Refine hypothesis based on findings.' },
    ]
  },
  {
    id: 'paper', name: 'Paper & Repository', short: 'Paper',
    color: 'var(--orange)', raw: '#fb923c',
    status: 'pending', metric: '\u25CB', weight: 25,
    summary: 'Waiting for Invention Loop to complete. Will generate demos, visualizations, compile LaTeX paper, and deploy to GitHub.',
    steps: [
      { name: 'Gen Repo', status: 'pending', metric: '\u2014',
        detail: 'Initialize GitHub repository.' },
      { name: 'Demos + Viz', status: 'pending', metric: '\u2014',
        detail: 'Generate artifact demos and figure visualizations.' },
      { name: 'Full Paper', status: 'pending', metric: '\u2014',
        detail: 'Compile LaTeX paper with all sections and figures.' },
      { name: 'Deploy Source', status: 'pending', metric: '\u2014',
        detail: 'Push code and data to GitHub.' },
      { name: 'Deploy Paper', status: 'pending', metric: '\u2014',
        detail: 'Upload compiled PDF and deploy.' },
    ]
  }
];

let selMod = 2;   // Invention (active)
let selStep = 2;  // Artifacts (active)

// ── Compute overall progress ──
function progress() {
  let total = 0, done = 0;
  MODULES.forEach(m => {
    const w = m.weight / m.steps.length;
    m.steps.forEach(s => {
      total += w;
      if (s.status === 'completed') done += w;
      else if (s.status === 'active') done += w * 0.5;
    });
  });
  return Math.round(done / total * 100);
}

// ── Compute per-module completion (0-100) ──
function moduleProgress(m) {
  if (!m.steps.length) return 0;
  let done = 0;
  m.steps.forEach(s => {
    if (s.status === 'completed') done += 1;
    else if (s.status === 'active') done += 0.5;
  });
  return Math.round((done / m.steps.length) * 100);
}

// ── Big Ring ──
function updateRing(pct) {
  document.querySelector('.ring-progress').style.strokeDashoffset = CIRC - (pct / 100) * CIRC;
  const el = document.getElementById('pct');
  let c = 0; const step = pct / 30;
  const iv = setInterval(() => {
    c += step; if (c >= pct) { c = pct; clearInterval(iv); }
    el.textContent = Math.round(c) + '%';
  }, 30);
  // Endpoint position
  const ang = (pct / 100) * 360 - 90, rad = ang * Math.PI / 180;
  const ep = document.getElementById('ep');
  ep.style.left = (60 + 48 * Math.cos(rad) - 5) + 'px';
  ep.style.top = (60 + 48 * Math.sin(rad) - 5) + 'px';
}

function highlightArc(mi) {
  const hl = document.querySelector('.ring-highlight');
  if (mi < 0) { hl.classList.remove('visible'); return; }
  let off = 0;
  for (let i = 0; i < mi; i++) off += (MODULES[i].weight / 100) * CIRC;
  const len = (MODULES[mi].weight / 100) * CIRC;
  hl.style.stroke = MODULES[mi].color;
  hl.style.strokeDasharray = `${len} ${CIRC}`;
  hl.style.strokeDashoffset = -off;
  hl.classList.add('visible');
}

// ── Legend (sidebar) ──
function buildLegend() {
  const el = document.getElementById('legend');
  MODULES.forEach((m, i) => {
    const done = m.steps.filter(s => s.status === 'completed').length;
    const d = document.createElement('div');
    d.className = 'legend-item' + (i === selMod ? ' active' : '');
    d.innerHTML = `<span class="legend-dot" style="background:${m.color}"></span>` +
      `<span>${m.short}</span>` +
      `<span class="legend-count">${done}/${m.steps.length}</span>`;
    d.onclick = () => selectModule(i);
    el.appendChild(d);
  });
}

// ── Row 1: Mini Ring Gauges ──
function buildModuleRow() {
  const row = document.getElementById('modRow');
  row.innerHTML = '';

  MODULES.forEach((m, i) => {
    // Connector between rings
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'mod-connector';
      const prev = MODULES[i - 1];
      if (prev.status === 'completed' && (m.status === 'completed' || m.status === 'active')) {
        conn.classList.add(m.status === 'active' ? 'active' : 'done');
        conn.style.setProperty('--from', prev.raw);
        conn.style.setProperty('--to', m.raw);
      } else {
        conn.classList.add('pending');
      }
      row.appendChild(conn);
    }

    const pct = moduleProgress(m);
    const dashOffset = MINI_CIRC - (pct / 100) * MINI_CIRC;

    // Endpoint angle for the active animated glow
    const epAng = (pct / 100) * 360 - 90;
    const epRad = epAng * Math.PI / 180;
    const epX = 18 + MINI_R * Math.cos(epRad) - 2.5;
    const epY = 18 + MINI_R * Math.sin(epRad) - 2.5;

    const node = document.createElement('div');
    node.className = `mini-ring-node ${m.status}`;
    node.style.setProperty('--color', m.raw);
    if (i === selMod) node.classList.add('selected');
    node.dataset.idx = i;

    // Build the mini ring HTML with percentage tooltip
    node.innerHTML = `
      <div class="mini-ring-pct-tip">${pct}%</div>
      <div class="mini-ring-wrap">
        <div class="mini-ring-glow" style="background:radial-gradient(circle, ${m.raw}40 0%, transparent 70%);"></div>
        <svg class="mini-ring-svg" viewBox="0 0 36 36">
          <circle class="mini-ring-track" cx="18" cy="18" r="${MINI_R}"/>
          <circle class="mini-ring-arc" cx="18" cy="18" r="${MINI_R}"
            stroke="${m.raw}" fill="none"
            stroke-dasharray="${MINI_CIRC}"
            stroke-dashoffset="${dashOffset}"
            style="filter: drop-shadow(0 0 3px ${m.raw}60);"/>
        </svg>
        <div class="mini-ring-center" style="color:${m.raw}">${m.metric}</div>
        <div class="mini-ring-ep" style="
          left:${epX}px; top:${epY}px;
          background:${m.raw}; color:${m.raw};
        "></div>
      </div>
      <div class="mini-ring-label">${m.short}</div>
    `;
    node.onclick = () => selectModule(i);
    row.appendChild(node);
  });
}

// ── Row 2: Sub-step dots ──
function buildSubRow() {
  const row = document.getElementById('subRow');
  row.innerHTML = '';
  const m = MODULES[selMod];
  if (!m.steps.length) { row.classList.add('collapsed'); return; }
  row.classList.remove('collapsed');

  m.steps.forEach((s, i) => {
    if (i > 0) {
      const c = document.createElement('div');
      c.className = 'sub-connector';
      row.appendChild(c);
    }
    const w = document.createElement('div');
    w.className = 'sub-dot-wrapper' + (i === selStep ? ' sel' : '');
    w.style.setProperty('--color', m.raw);
    const dot = document.createElement('div');
    dot.className = `sub-dot ${s.status}`;
    dot.style.setProperty('--color', m.raw);
    if (i === selStep) dot.classList.add('selected');
    const lbl = document.createElement('div');
    lbl.className = 'sub-dot-label';
    lbl.textContent = s.name;
    w.appendChild(dot);
    w.appendChild(lbl);
    w.onclick = () => selectStep(i);
    row.appendChild(w);
  });
}

// ── Content ──
function renderContent() {
  const m = MODULES[selMod];
  const s = m.steps[selStep];
  const el = document.getElementById('contentInner');

  const mPct = moduleProgress(m);
  const mDone = m.steps.filter(s2 => s2.status === 'completed').length;
  const mActive = m.steps.filter(s2 => s2.status === 'active').length;
  const miniR2 = 12;
  const miniC2 = 2 * Math.PI * miniR2;
  const miniOff2 = miniC2 - (mPct / 100) * miniC2;

  let html = `<div class="fade-in">
    <div class="tag" style="border-color:${m.color};color:${m.raw};background:${m.raw}15">
      ${m.status === 'completed' ? '\u2713' : m.status === 'active' ? '\u25B6' : '\u25CB'} ${m.short} / ${s.name}
    </div>
    <div class="title">${s.name} \u2014 ${m.name}</div>

    <div class="mod-progress-bar">
      <svg class="mod-progress-ring" viewBox="0 0 28 28">
        <circle class="track" cx="14" cy="14" r="${miniR2}"/>
        <circle class="bar" cx="14" cy="14" r="${miniR2}"
          stroke="${m.raw}"
          stroke-dasharray="${miniC2}"
          stroke-dashoffset="${miniOff2}"
          style="filter: drop-shadow(0 0 2px ${m.raw}80);"/>
      </svg>
      <div class="mod-progress-info">
        <div class="mod-progress-label" style="color:${m.raw}">${m.name}</div>
        <div class="mod-progress-detail">${mDone} done${mActive ? ', ' + mActive + ' running' : ''} of ${m.steps.length} steps</div>
      </div>
      <div class="mod-progress-pct" style="color:${m.raw}">${mPct}%</div>
    </div>

    <div class="summary">${s.detail || m.summary}</div>`;

  if (s.children) {
    html += '<div class="rows">';
    s.children.forEach((c, ci) => {
      const sc = c.status === 'completed' ? m.raw : c.status === 'active' ? m.raw : 'var(--gray)';
      const glow = c.status === 'active' ? `box-shadow:0 0 6px ${sc}` : '';
      const icon = c.status === 'completed' ? '\u2713' : c.status === 'active' ? '\u25B6' : '\u25CB';
      html += `<div class="row-card fade-in" style="animation-delay:${ci * 0.06}s">
        <div class="row-hdr" onclick="this.parentElement.classList.toggle('expanded')">
          <div class="row-dot" style="background:${sc};${glow}"></div>
          <div class="row-name">${icon} ${c.name}</div>
          <div class="row-meta">${c.metric}</div>
          <svg class="row-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="row-body"><div class="row-detail">${c.time} \u2022 ${c.cost}</div></div>
      </div>`;
    });
    html += '</div>';
  } else if (s.status !== 'pending') {
    html += `<div class="rows">`;
    html += `<div class="row-card expanded fade-in">
      <div class="row-hdr" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="row-dot" style="background:${m.raw}"></div>
        <div class="row-name">Details</div>
        <div class="row-meta">${s.metric}</div>
        <svg class="row-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="row-body"><div class="row-detail">${s.detail}</div></div>
    </div>`;
    html += '</div>';
  }

  html += `<div class="footer">
    ${m.status === 'completed' ? '\u2713 Complete' : m.status === 'active' ? '\u25B6 Running \u2014 42m \u2022 $12.47' : '\u25CB Pending'}
  </div>
  <div class="nav-hint">
    <span class="key">\u2190</span><span class="key">\u2192</span> Navigate steps
    <span style="margin-left:8px">|</span>
    <span class="key">\u2191</span><span class="key">\u2193</span> Switch modules
  </div></div>`;

  el.innerHTML = html;
}

// ── Selection ──
function selectModule(i) {
  selMod = i;
  const m = MODULES[i];
  selStep = 0;
  for (let j = 0; j < m.steps.length; j++) {
    if (m.steps[j].status === 'active') { selStep = j; break; }
    if (m.steps[j].status !== 'completed') { selStep = j; break; }
  }
  updateAll();
}

function selectStep(i) {
  selStep = Math.max(0, Math.min(i, MODULES[selMod].steps.length - 1));
  updateAll();
}

function updateAll() {
  highlightArc(selMod);
  // Update mini ring selection
  document.querySelectorAll('.mini-ring-node').forEach((n, i) => {
    n.classList.toggle('selected', i === selMod);
  });
  // Update legend
  document.querySelectorAll('.legend-item').forEach((n, i) => {
    n.classList.toggle('active', i === selMod);
  });
  buildSubRow();
  renderContent();
}

// ── Keyboard nav ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { e.preventDefault(); selectModule(Math.max(0, selMod - 1)); }
  if (e.key === 'ArrowDown') { e.preventDefault(); selectModule(Math.min(MODULES.length - 1, selMod + 1)); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); selectStep(selStep - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); selectStep(selStep + 1); }
});

// ── Init ──
buildLegend();
buildModuleRow();
requestAnimationFrame(() => setTimeout(() => updateRing(progress()), 200));
selectModule(selMod);
</script>
</body>
</html>
