<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Panels — Detail + Activity Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --bg-raised: #0c1220;
  --surface: rgba(15,23,42,.72);
  --surface-hi: rgba(30,41,59,.65);
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12); --purple-glow: rgba(167,139,250,.25);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);   --blue-glow: rgba(96,165,250,.25);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);  --orange-glow: rgba(251,146,60,.25);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);   --green-glow: rgba(52,211,153,.25);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text-dim);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-y: auto;
  padding: 32px 40px;
}

/* ===== PAGE HEADER ===== */
.page-header { margin-bottom: 28px; }
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

/* ===== VARIANT WRAPPER ===== */
.variant-block { margin-bottom: 36px; }
.variant-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px;
  color: var(--text-faint); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.variant-title .num {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 18px;
}
.dashboard.wide-feed { grid-template-columns: 1fr 1fr; }
.dashboard.feed-only { grid-template-columns: 1fr; }

.panel {
  background: var(--surface-card);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  overflow: hidden;
  position: relative;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  border-radius: 0 0 1px 1px;
}
.panel.detail::before { background: linear-gradient(90deg, transparent, var(--blue), transparent); opacity: .3; }
.panel.feed::before { background: linear-gradient(90deg, transparent, var(--green), transparent); opacity: .25; }

/* ===== DETAIL PANEL (left) ===== */
.detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.detail-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.detail-title { font-size: 15px; font-weight: 700; color: var(--text); }
.detail-badge {
  font-size: 9px; font-weight: 700; padding: 3px 10px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: .4px;
}
.detail-badge.running { background: var(--blue-dim); color: var(--blue); }
.detail-badge.running::before {
  content: ''; display: inline-block; width: 8px; height: 8px;
  border: 1.5px solid transparent; border-top-color: currentColor;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
  animation: spinBadge .8s linear infinite;
}
@keyframes spinBadge { to { transform: rotate(360deg); } }
.detail-badge.done { background: var(--green-dim); color: var(--green); }
.detail-meta {
  margin-left: auto; font-size: 10px; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
}

.detail-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.72;
  margin-bottom: 18px; max-width: 680px; font-style: italic;
  padding-bottom: 16px; border-bottom: 1px solid var(--border);
}

.detail-items { display: flex; flex-direction: column; gap: 4px; }
.di-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: var(--radius-sm); font-size: 12px;
  transition: background .15s; cursor: default; position: relative; overflow: hidden;
}
.di-row:hover { background: rgba(255,255,255,.02); }
.di-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.di-dot.done { background: var(--green); opacity: .7; }
.di-dot.running { background: var(--blue); animation: dotPulse 1.5s ease-in-out infinite; }
.di-dot.pending { border: 1px solid var(--text-faint); }
@keyframes dotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
.di-label { color: var(--text-dim); flex: 1; }
.di-meta { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.di-row.is-running::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.04), rgba(96,165,250,.07), rgba(96,165,250,.04), transparent);
  background-size: 250% 100%; animation: itemShimmer 2.8s ease-in-out infinite;
  border-radius: var(--radius-sm);
}
@keyframes itemShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== FEED PANEL (right) ===== */
.feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.feed-title {
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: .6px; font-weight: 600;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; font-weight: 800; color: var(--red);
  background: var(--red-dim); padding: 2px 8px 2px 6px;
  border-radius: 4px; letter-spacing: .6px; text-transform: uppercase;
}
.live-badge-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: liveBlink 1.3s ease-in-out infinite;
}
@keyframes liveBlink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
.feed-count { margin-left: auto; font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums; }

/* Stat grid */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: rgba(255,255,255,.02); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  transition: transform .2s, border-color .2s;
}
.stat-card:hover { transform: translateY(-1px); border-color: var(--border-hi); }
.sc-label { font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; font-weight: 600; }
.sc-value { font-size: 20px; font-weight: 800; margin-bottom: 8px; letter-spacing: -.5px; }
.sc-bar { height: 3px; border-radius: 2px; background: rgba(148,163,184,.06); overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 2px; transition: width .7s var(--ease); }

/* Feed list */
.feed-list { display: flex; flex-direction: column; gap: 3px; max-height: 260px; overflow-y: auto; }
.feed-list::-webkit-scrollbar { width: 3px; }
.feed-list::-webkit-scrollbar-track { background: transparent; }
.feed-list::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

.feed-event {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
  border-radius: 7px; font-size: 11px;
  background: rgba(255,255,255,.015); border: 1px solid transparent;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(8px); animation: feedIn .4s var(--ease) forwards;
}
.feed-event.is-new { border-color: rgba(96,165,250,.12); background: rgba(96,165,250,.03); }
.feed-event.is-new::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.05), transparent);
  background-size: 300% 100%; animation: feedShimmer 2s ease-in-out;
}
@keyframes feedShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes feedIn { to { opacity: 1; transform: translateY(0); } }

.fe-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  font-weight: 500; flex-shrink: 0; width: 42px; padding-top: 1px;
}
.fe-icon {
  width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center;
  font-size: 9px; flex-shrink: 0;
}
.fe-body { flex: 1; min-width: 0; }
.fe-module { font-size: 9px; font-weight: 700; margin-bottom: 1px; display: flex; align-items: center; gap: 5px; }
.fe-module-tag { font-size: 7px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
.fe-text { color: var(--text-dim); font-size: 11px; line-height: 1.4; }
.fe-type {
  font-size: 7px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0; margin-left: auto; align-self: flex-start;
}
.fe-type.t-gen   { background: var(--blue-dim); color: var(--blue); }
.fe-type.t-ok    { background: var(--green-dim); color: var(--green); }
.fe-type.t-warn  { background: var(--orange-dim); color: var(--orange); }
.fe-type.t-score { background: var(--purple-dim); color: var(--purple); }
.fe-type.t-info  { background: var(--cyan-dim); color: var(--cyan); }

.feed-event:nth-child(1) { animation-delay: 0ms; }
.feed-event:nth-child(2) { animation-delay: 60ms; }
.feed-event:nth-child(3) { animation-delay: 120ms; }
.feed-event:nth-child(4) { animation-delay: 180ms; }
.feed-event:nth-child(5) { animation-delay: 240ms; }
.feed-event:nth-child(6) { animation-delay: 300ms; }
.feed-event:nth-child(7) { animation-delay: 360ms; }
.feed-event:nth-child(8) { animation-delay: 420ms; }

/* ===== COMPACT FEED (for variants 2 & 3) ===== */
.compact-list { display: flex; flex-direction: column; gap: 1px; }
.compact-event {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px; font-size: 11px;
  transition: background .12s;
}
.compact-event:hover { background: rgba(255,255,255,.025); }
.compact-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  font-weight: 500; width: 38px; flex-shrink: 0;
}
.compact-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.compact-tool { font-size: 10px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; min-width: 56px; }
.compact-text { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.compact-event.is-new { background: rgba(96,165,250,.03); }
.compact-event.is-new .compact-text { color: var(--text); }

/* ===== TERMINAL FEED (for variant 4) ===== */
.term-box {
  background: rgba(0,0,0,.3); border-radius: var(--radius-sm);
  padding: 12px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.term-toolbar {
  display: flex; align-items: center; gap: 6px; padding-bottom: 8px;
  margin-bottom: 8px; border-bottom: 1px solid rgba(148,163,184,.06);
}
.term-dots { display: flex; gap: 5px; }
.term-dots span { width: 8px; height: 8px; border-radius: 50%; }
.term-title { font-size: 10px; color: var(--text-muted); margin-left: 8px; }
.term-log { display: flex; flex-direction: column; gap: 2px; max-height: 200px; overflow-y: auto; }
.term-line { display: flex; gap: 8px; padding: 2px 0; line-height: 1.5; }
.term-ts { color: var(--text-faint); flex-shrink: 0; }
.term-level { flex-shrink: 0; min-width: 36px; font-weight: 600; }
.term-level.ok { color: var(--green); }
.term-level.run { color: var(--blue); }
.term-level.warn { color: var(--orange); }
.term-level.info { color: var(--cyan); }
.term-msg { color: var(--text-dim); }
.term-cursor {
  display: inline-block; width: 7px; height: 14px; background: var(--green); opacity: .7;
  animation: cursorBlink 1s step-end infinite; vertical-align: middle; margin-left: 2px;
}
@keyframes cursorBlink { 0%,100% { opacity: .7; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Dashboard Panels — Detail + Activity Feed</div>
  <div class="page-sub">Agent 3 — Feeds & Panels | Bottom dashboard layout from whiteboard: step detail (left) + live feed (right)</div>
</div>

<div id="panels"></div>

<script>
/* ====================================================================
   DATA
   ==================================================================== */
const DETAIL = {
  label: 'Create Artifacts',
  status: 'running',
  meta: 'xRg.on',
  summary: 'Generating computational artifacts for hypothesis 7. Building simulation harness for nano-scale thermal transport in layered metamaterials with gradient checkpointing optimization.',
  items: [
    { label: 'Text about something done', meta: '2m 14s', done: true },
    { label: 'Text about something running', meta: '47s', running: true },
    { label: 'Text about future steps', meta: 'queued', done: false },
  ],
};

const EVENTS = [
  { time: '12:04', tool: 'Simulate', text: 'Checkpoint saved for hypothesis 7 -- thermal transport at 62%', status: 'info', icon: '\u26a1', isNew: true },
  { time: '12:02', tool: 'Ablation', text: 'Study complete for H4 -- attention module contributes 18.3%', status: 'done', icon: '\u2705', isNew: true },
  { time: '11:58', tool: 'Simulate', text: 'Main experiment initiated for H7: nano-scale thermal transport', status: 'running', icon: '\ud83e\uddea', isNew: false },
  { time: '11:55', tool: 'Evaluate', text: 'Statistical significance confirmed for H6: p < 0.001, d = 1.42', status: 'done', icon: '\ud83d\udcca', isNew: false },
  { time: '11:51', tool: 'Ablation', text: 'H5 flagged -- attention contribution 3.1%, below threshold', status: 'warn', icon: '\u26a0\ufe0f', isNew: false },
  { time: '11:47', tool: 'Simulate', text: 'H6 complete: +27.4% over strongest baseline (ResNet-KG)', status: 'done', icon: '\u2705', isNew: false },
  { time: '11:42', tool: 'Evaluate', text: 'Baseline comparison table for H1-6: mean delta +19.8%', status: 'done', icon: '\ud83d\udcca', isNew: false },
  { time: '11:38', tool: 'Optimize', text: 'GPU memory reduced 14.2GB to 11.8GB via gradient checkpointing', status: 'info', icon: '\u26a1', isNew: false },
];

const STATUS_COLORS = {
  done: { dot: 'var(--green)', bg: 'var(--green-dim)', cls: 't-ok', label: 'Done' },
  running: { dot: 'var(--blue)', bg: 'var(--blue-dim)', cls: 't-gen', label: 'Run' },
  warn: { dot: 'var(--orange)', bg: 'var(--orange-dim)', cls: 't-warn', label: 'Alert' },
  info: { dot: 'var(--cyan)', bg: 'var(--cyan-dim)', cls: 't-info', label: 'Info' },
};

/* ====================================================================
   DETAIL PANEL (shared across variants)
   ==================================================================== */
function renderDetail() {
  return `
    <div class="detail-header">
      <div class="detail-dot" style="background:var(--blue)"></div>
      <div class="detail-title">${DETAIL.label}</div>
      <span class="detail-badge running">Running</span>
      <span class="detail-meta">${DETAIL.meta}</span>
    </div>
    <div class="detail-summary">${DETAIL.summary}</div>
    <div class="detail-items">
      ${DETAIL.items.map(it => {
        const dotCls = it.done ? 'done' : it.running ? 'running' : 'pending';
        const rowCls = it.running ? 'is-running' : '';
        return `<div class="di-row ${rowCls}">
          <div class="di-dot ${dotCls}"></div>
          <span class="di-label">${it.label}</span>
          <span class="di-meta">${it.meta}</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

/* ====================================================================
   VARIANT 1 — Detail + Rich Feed (stats + feed from v4)
   ==================================================================== */
function renderVariant1() {
  const stats = [
    { label: 'Progress', value: '62%', bar: 62, color: 'var(--blue)' },
    { label: 'Token Usage', value: '172k', bar: 62, color: 'var(--blue)' },
    { label: 'Time Elapsed', value: '12m 04s', bar: 55, color: 'var(--blue)' },
    { label: 'Cost', value: '$2.63', bar: 48, color: 'var(--blue)' },
  ];

  return `
    <div class="dashboard">
      <div class="panel detail">${renderDetail()}</div>
      <div class="panel feed">
        <div class="stat-grid">
          ${stats.map(st => `
            <div class="stat-card">
              <div class="sc-label">${st.label}</div>
              <div class="sc-value" style="color:${st.color}">${st.value}</div>
              <div class="sc-bar"><div class="sc-bar-fill" style="width:${st.bar}%;background:${st.color}"></div></div>
            </div>
          `).join('')}
        </div>
        <div class="feed-header">
          <span class="feed-title">Activity Feed</span>
          <span class="live-badge"><span class="live-badge-dot"></span> LIVE</span>
          <span class="feed-count">${EVENTS.length} events</span>
        </div>
        <div class="feed-list">
          ${EVENTS.map((e, i) => `
            <div class="feed-event ${e.isNew ? 'is-new' : ''}" style="animation-delay:${i * 60}ms">
              <span class="fe-time">${e.time}</span>
              <div class="fe-icon" style="background:var(--blue-dim);color:var(--blue)">${e.icon}</div>
              <div class="fe-body">
                <div class="fe-module">Test Hypothesis <span class="fe-module-tag" style="background:var(--blue-dim);color:var(--blue)">BLUE</span></div>
                <div class="fe-text">${e.text}</div>
              </div>
              <span class="fe-type ${STATUS_COLORS[e.status].cls}">${STATUS_COLORS[e.status].label}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 2 — Detail + Compact Feed (wider detail)
   ==================================================================== */
function renderVariant2() {
  return `
    <div class="dashboard wide-feed">
      <div class="panel detail">${renderDetail()}</div>
      <div class="panel feed">
        <div class="feed-header">
          <span class="feed-title">Activity Feed</span>
          <span class="live-badge"><span class="live-badge-dot"></span> LIVE</span>
          <span class="feed-count">${EVENTS.length} events</span>
        </div>
        <div class="feed-list" style="max-height:340px">
          <div class="compact-list">
            ${EVENTS.map(e => `
              <div class="compact-event ${e.isNew ? 'is-new' : ''}">
                <span class="compact-time">${e.time}</span>
                <div class="compact-dot" style="background:${STATUS_COLORS[e.status].dot}"></div>
                <span class="compact-tool">${e.tool}</span>
                <span class="compact-text">${e.text}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 3 — Detail + Compact Feed (narrow feed, like whiteboard)
   ==================================================================== */
function renderVariant3() {
  return `
    <div class="dashboard">
      <div class="panel detail">${renderDetail()}</div>
      <div class="panel feed">
        <div class="feed-header">
          <span class="feed-title">Activity Feed</span>
          <span class="live-badge"><span class="live-badge-dot"></span> LIVE</span>
          <span class="feed-count">${EVENTS.length}</span>
        </div>
        <div class="feed-list" style="max-height:340px">
          <div class="compact-list">
            ${EVENTS.map(e => `
              <div class="compact-event ${e.isNew ? 'is-new' : ''}">
                <span class="compact-time">${e.time}</span>
                <div class="compact-dot" style="background:${STATUS_COLORS[e.status].dot}"></div>
                <span class="compact-tool">${e.tool}</span>
                <span class="compact-text">${e.text}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 4 — Detail + Terminal Feed
   ==================================================================== */
function renderVariant4() {
  const levels = { done: 'ok', running: 'run', warn: 'warn', info: 'info' };
  const levelLabels = { done: ' OK ', running: 'RUN ', warn: 'WARN', info: 'INFO' };

  return `
    <div class="dashboard wide-feed">
      <div class="panel detail">${renderDetail()}</div>
      <div class="panel feed" style="padding:16px">
        <div class="term-box">
          <div class="term-toolbar">
            <div class="term-dots">
              <span style="background:var(--red);opacity:.7"></span>
              <span style="background:var(--orange);opacity:.7"></span>
              <span style="background:var(--green);opacity:.7"></span>
            </div>
            <span class="term-title">aii-pipeline.log</span>
          </div>
          <div class="term-log">
            ${EVENTS.map(e => `
              <div class="term-line">
                <span class="term-ts">${e.time}</span>
                <span class="term-level ${levels[e.status]}">[${levelLabels[e.status]}]</span>
                <span class="term-msg">${e.tool.toLowerCase()}: ${e.text}</span>
              </div>
            `).join('')}
            <div class="term-line">
              <span class="term-ts">12:05</span>
              <span class="term-level run">[RUN ]</span>
              <span class="term-msg">simulate: processing...<span class="term-cursor"></span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ====================================================================
   RENDER ALL
   ==================================================================== */
const VARIANTS = [
  { num: 1, name: 'Detail + Rich Feed (stats + events, 380px feed)', render: renderVariant1 },
  { num: 2, name: 'Detail + Compact Feed (50/50 split)', render: renderVariant2 },
  { num: 3, name: 'Detail + Compact Feed (narrow 380px, whiteboard match)', render: renderVariant3 },
  { num: 4, name: 'Detail + Terminal Feed (50/50 split)', render: renderVariant4 },
];

const container = document.getElementById('panels');
VARIANTS.forEach(v => {
  const block = document.createElement('div');
  block.className = 'variant-block';
  block.innerHTML = `
    <div class="variant-title"><span class="num">${v.num}</span> ${v.name}</div>
    ${v.render()}
  `;
  container.appendChild(block);
});
</script>
</body>
</html>
