<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed v5 — Pill Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

/* Header */
.fh { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ft { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
.lb { display: inline-flex; align-items: center; gap: 5px; font-size: 8px; font-weight: 800; color: var(--red); background: var(--red-dim); padding: 2px 8px 2px 6px; border-radius: 4px; letter-spacing: .6px; text-transform: uppercase; }
.ld { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: bk 1.3s ease-in-out infinite; }
@keyframes bk { 0%,100%{opacity:1} 50%{opacity:.2} }
.fs { max-height: 360px; overflow-y: auto; }
.fs::-webkit-scrollbar { width: 3px; }
.fs::-webkit-scrollbar-track { background: transparent; }
.fs::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

/* Shared time */
.tm { font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; font-weight: 500; flex-shrink: 0; }

/* ============================================================
   V1 — Base (exact V3 from v4): time + pill + summary
   ============================================================ */
.v1 { display: flex; flex-direction: column; gap: 2px; }
.v1 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v1 .row:hover { background: rgba(255,255,255,.02); }
.v1 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.v1 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V2 — Rounded pill, slightly larger, more padding
   ============================================================ */
.v2 { display: flex; flex-direction: column; gap: 3px; }
.v2 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v2 .row:hover { background: rgba(255,255,255,.02); }
.v2 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v2 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V3 — Pill with dot indicator inside
   ============================================================ */
.v3 { display: flex; flex-direction: column; gap: 2px; }
.v3 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v3 .row:hover { background: rgba(255,255,255,.02); }
.v3 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px 2px 4px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
  display: inline-flex; align-items: center; gap: 4px;
}
.v3 .pill .d { width: 4px; height: 4px; border-radius: 50%; }
.v3 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V4 — Pill on right side, time left, summary center
   ============================================================ */
.v4 { display: flex; flex-direction: column; gap: 2px; }
.v4 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v4 .row:hover { background: rgba(255,255,255,.02); }
.v4 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.v4 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V5 — Subtle background tint per type on full row
   ============================================================ */
.v5 { display: flex; flex-direction: column; gap: 2px; }
.v5 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v5 .row:hover { filter: brightness(1.15); }
.v5 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
  background: rgba(255,255,255,.06) !important; border: 1px solid rgba(255,255,255,.06);
}
.v5 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V6 — Outline pill (border only, no fill)
   ============================================================ */
.v6 { display: flex; flex-direction: column; gap: 2px; }
.v6 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v6 .row:hover { background: rgba(255,255,255,.02); }
.v6 .pill {
  font-size: 7px; font-weight: 800; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
  background: transparent !important; border: 1px solid;
}
.v6 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V7 — Wider pill, monospace font in pill
   ============================================================ */
.v7 { display: flex; flex-direction: column; gap: 2px; }
.v7 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v7 .row:hover { background: rgba(255,255,255,.02); }
.v7 .pill {
  font-size: 8px; font-weight: 600; padding: 2px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; min-width: 52px; text-align: center;
}
.v7 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V8 — Left glow accent + pill
   ============================================================ */
.v8 { display: flex; flex-direction: column; gap: 2px; }
.v8 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px 5px 10px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s; position: relative;
}
.v8 .row:hover { background: rgba(255,255,255,.02); }
.v8 .row::before {
  content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
  width: 2px; border-radius: 1px;
}
.v8 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.v8 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V9 — Pill with soft glow shadow
   ============================================================ */
.v9 { display: flex; flex-direction: column; gap: 3px; }
.v9 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; border-radius: 5px; font-size: 11.5px;
  transition: background .1s;
}
.v9 .row:hover { background: rgba(255,255,255,.02); }
.v9 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
  position: relative;
}
.v9 .pill::after {
  content: ''; position: absolute; inset: -3px; border-radius: 5px;
  opacity: .5; z-index: -1; filter: blur(6px);
}
.v9 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V10 — Compact pill, separator line between items
   ============================================================ */
.v10 { display: flex; flex-direction: column; gap: 0; }
.v10 .row {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px; font-size: 11.5px;
  transition: background .1s;
  border-bottom: 1px solid rgba(148,163,184,.04);
}
.v10 .row:last-child { border-bottom: none; }
.v10 .row:hover { background: rgba(255,255,255,.02); }
.v10 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.v10 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Activity Feed v5 — Pill Variants</div>
  <div class="page-sub">Agent 3 — 10 variants of the pill-style feed. Real 30-50ch summaries. One row per item.</div>
</div>

<div class="grid" id="grid"></div>

<script>
const E = [
  { time: '12:04', type: 'tool',     text: 'Add head_direction_ratio to regression subset' },
  { time: '12:03', type: 'thinking', text: 'Use absolute paths, inspect full data' },
  { time: '12:02', type: 'tool',     text: 'Read grammar, build treebank set and genre map' },
  { time: '12:01', type: 'result',   text: 'Saved 58KB report, increased to 185KB' },
  { time: '11:58', type: 'metric',   text: 'Track 95k context usage for exp_id3_it2__opus' },
  { time: '11:55', type: 'result',   text: 'Completed 7 turns, 393.8K\u219217.5K, $0.99' },
  { time: '11:51', type: 'warning',  text: 'Remind 112.7 minutes left to finish tasks' },
  { time: '11:47', type: 'warning',  text: 'Retry paper text after timeout, fork resume' },
  { time: '11:42', type: 'result',   text: 'Created pyproject.toml for exp_id1_it2__opus' },
  { time: '11:38', type: 'progress', text: 'Split script into 4 sections, add 4 markdowns' },
];

const C = {
  tool:     { c: 'var(--blue)',   bg: 'var(--blue-dim)',   l: 'tool' },
  result:   { c: 'var(--purple)', bg: 'var(--purple-dim)', l: 'result' },
  progress: { c: 'var(--green)',  bg: 'var(--green-dim)',  l: 'prog' },
  metric:   { c: 'var(--cyan)',   bg: 'var(--cyan-dim)',   l: 'metric' },
  warning:  { c: 'var(--orange)', bg: 'var(--orange-dim)', l: 'warn' },
  thinking: { c: 'var(--purple)', bg: 'var(--purple-dim)', l: 'think' },
};

function hdr() {
  return `<div class="fh"><span class="ft">Activity</span><span class="lb"><span class="ld"></span> LIVE</span></div>`;
}

function pill(e, cls) {
  return `<span class="${cls}" style="background:${C[e.type].bg};color:${C[e.type].c}">${C[e.type].l}</span>`;
}

/* V1 — Base (exact copy of v4's V3) */
function v1() {
  return hdr() + `<div class="fs"><div class="v1">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${pill(e,'pill')}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V2 — Rounded pill, more breathing room */
function v2() {
  return hdr() + `<div class="fs"><div class="v2">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill" style="background:${C[e.type].bg};color:${C[e.type].c}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V3 — Pill with dot inside */
function v3() {
  return hdr() + `<div class="fs"><div class="v3">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill" style="background:${C[e.type].bg};color:${C[e.type].c}"><span class="d" style="background:${C[e.type].c}"></span>${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V4 — Pill on right */
function v4() {
  return hdr() + `<div class="fs"><div class="v4">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="tx">${e.text}</span>${pill(e,'pill')}</div>`
  ).join('')}</div></div>`;
}

/* V5 — Subtle row tint matching type color */
function v5() {
  return hdr() + `<div class="fs"><div class="v5">${E.map(e =>
    `<div class="row" style="background:${C[e.type].bg}"><span class="tm">${e.time}</span><span class="pill" style="color:${C[e.type].c}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V6 — Outline pill */
function v6() {
  return hdr() + `<div class="fs"><div class="v6">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill" style="color:${C[e.type].c};border-color:${C[e.type].c}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V7 — Mono pill, fixed width */
function v7() {
  return hdr() + `<div class="fs"><div class="v7">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill" style="background:${C[e.type].bg};color:${C[e.type].c}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V8 — Left glow bar + pill */
function v8() {
  return hdr() + `<div class="fs"><div class="v8">${E.map(e =>
    `<div class="row" style="--ac:${C[e.type].c}"><style>.v8 .row[style*="${C[e.type].c}"]::before{background:${C[e.type].c}}</style><span class="tm">${e.time}</span>${pill(e,'pill')}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V9 — Pill with soft glow */
const GLOW = {
  tool: 'rgba(96,165,250,.4)', result: 'rgba(167,139,250,.4)',
  progress: 'rgba(52,211,153,.4)', metric: 'rgba(34,211,238,.4)',
  warning: 'rgba(251,146,60,.4)', thinking: 'rgba(167,139,250,.4)',
};
function v9() {
  return hdr() + `<div class="fs"><div class="v9">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill" style="background:${C[e.type].bg};color:${C[e.type].c};box-shadow:0 0 10px ${GLOW[e.type]}, 0 0 20px ${GLOW[e.type]}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

/* V10 — Separator lines */
function v10() {
  return hdr() + `<div class="fs"><div class="v10">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${pill(e,'pill')}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

const V = [
  { n:1, name:'Base — time + filled pill + summary', r:v1 },
  { n:2, name:'Rounded pill, more spacing', r:v2 },
  { n:3, name:'Pill with status dot inside', r:v3 },
  { n:4, name:'Pill on right side', r:v4 },
  { n:5, name:'Full row tinted by type color', r:v5 },
  { n:6, name:'Outline pill (border only)', r:v6 },
  { n:7, name:'Monospace fixed-width pill', r:v7 },
  { n:8, name:'Left glow accent bar + pill', r:v8 },
  { n:9, name:'Pill with soft glow shadow', r:v9 },
  { n:10, name:'Separator lines between items', r:v10 },
];

const g = document.getElementById('grid');
V.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div><div class="vbody">${v.r()}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
