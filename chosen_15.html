<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1118;
    --bg-deep: #0a0c12;
    --surface: #161921;
    --surface-2: #1c1f2a;
    --surface-3: #222636;
    --border: #252938;
    --border-light: #2e3348;
    --text: #c9ced9;
    --text-dim: #6b7280;
    --text-bright: #eef0f6;
    --text-muted: #454b5c;
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --green-glow: rgba(52,211,153,.35);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,.12);
    --purple-glow: rgba(167,139,250,.35);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,.12);
    --blue-glow: rgba(96,165,250,.4);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.12);
    --amber-glow: rgba(251,191,36,.35);
    --gray: #6b7280;
    --gray-dim: rgba(107,114,128,.12);
    --sidebar-w: 220px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body { display: flex; }

  /* ================================================================
     SIDEBAR
     ================================================================ */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100vh;
    background: var(--bg-deep);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px 16px;
    gap: 16px;
    position: relative;
    z-index: 10;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ---- Logo / Title ---- */
  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: 4px;
  }

  /* ---- Ring ---- */
  .ring-container {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }

  .ring-glow {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    filter: blur(16px);
    transition: opacity .6s ease, background .6s ease;
  }

  .ring-glow.visible { opacity: .2; }

  .ring-svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    position: relative;
    z-index: 2;
  }

  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .ring-segment {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1), opacity .3s;
    cursor: pointer;
  }

  .ring-segment:hover { filter: brightness(1.2); }

  .ring-center-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
  }

  .ring-pct {
    font-size: 26px;
    font-weight: 800;
    color: var(--text-bright);
    line-height: 1;
    letter-spacing: -1px;
  }

  .ring-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-top: 2px;
  }

  /* ---- Module cards ---- */
  .module-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .mod-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 11px;
    cursor: pointer;
    transition: all .2s ease;
    position: relative;
    overflow: hidden;
  }

  .mod-card:hover { background: var(--surface-2); border-color: var(--border-light); }
  .mod-card.selected { border-color: var(--border-light); background: var(--surface-2); }

  .mod-card .mc-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mod-card .mc-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow .3s;
  }

  .mod-card.selected .mc-dot { box-shadow: 0 0 8px 2px currentColor; }

  .mod-card .mc-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    flex: 1;
    transition: color .2s;
  }

  .mod-card.selected .mc-name,
  .mod-card:hover .mc-name { color: var(--text-bright); }

  .mod-card .mc-status {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 4px;
  }

  .mod-card .mc-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    border-radius: 0 0 0 8px;
    transition: width .6s ease;
  }

  /* Glow overlay for selected card */
  .mod-card .mc-glow {
    position: absolute;
    inset: -1px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }

  .mod-card.selected .mc-glow { opacity: 1; }

  /* Shimmer on active card */
  .mod-card.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -80%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
    animation: cardShimmer 3s ease-in-out infinite;
  }

  @keyframes cardShimmer {
    0% { left: -80%; }
    100% { left: 140%; }
  }

  /* ---- Sub-modules ---- */
  .sub-modules {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 4px;
    border-top: 1px solid var(--border);
  }

  .sub-module {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: all .2s;
    font-size: 10.5px;
    color: var(--text-dim);
  }

  .sub-module:hover { background: var(--surface); color: var(--text); }
  .sub-module.selected { background: var(--surface-2); color: var(--text-bright); font-weight: 600; }

  .sub-module .sm-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all .25s;
  }

  .sub-module.selected .sm-dot {
    box-shadow: 0 0 6px 1px currentColor;
    width: 7px;
    height: 7px;
  }

  .sub-module.active .sm-dot {
    animation: subPulse 2s ease-in-out infinite;
  }

  @keyframes subPulse {
    0%, 100% { box-shadow: 0 0 4px 1px currentColor; }
    50% { box-shadow: 0 0 10px 3px currentColor; }
  }

  .sub-module .sm-label { flex: 1; }

  .sub-module .sm-status {
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    opacity: .7;
  }

  /* ---- Particle canvas (sidebar overlay) ---- */
  #sidebarParticles {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--sidebar-w);
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ================================================================
     MAIN CONTENT AREA
     ================================================================ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 14px;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-bright);
    flex: 1;
  }

  .topbar-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
  }

  .topbar-time {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    font-family: 'Inter', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  /* Two-column layout */
  .two-col {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .col-left {
    width: 60%;
    overflow-y: auto;
    padding: 22px 24px 32px 28px;
    border-right: 1px solid var(--border);
  }

  .col-right {
    width: 40%;
    overflow-y: auto;
    padding: 22px 24px 32px 20px;
  }

  .col-left::-webkit-scrollbar,
  .col-right::-webkit-scrollbar { width: 4px; }

  .col-left::-webkit-scrollbar-track,
  .col-right::-webkit-scrollbar-track { background: transparent; }

  .col-left::-webkit-scrollbar-thumb,
  .col-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Panel fade transition */
  .panel {
    display: none;
    animation: panelIn .3s ease;
  }

  .panel.visible { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Left column: Summary + Items ---- */
  .summary-block {
    margin-bottom: 20px;
  }

  .summary-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .summary-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .summary-heading h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .summary-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    position: relative;
  }

  .summary-text::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    border-radius: 10px 0 0 10px;
  }

  .summary-text p { margin-bottom: 8px; }
  .summary-text p:last-child { margin-bottom: 0; }

  /* Item list */
  .item-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-list-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 4px;
  }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: all .2s;
    cursor: default;
  }

  .item-card:hover { border-color: var(--border-light); background: var(--surface-2); }

  .item-card.active-item {
    border-left: 3px solid var(--blue);
    box-shadow: -2px 0 12px -4px var(--blue-glow);
  }

  .item-card h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 4px;
  }

  .item-card p {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  .item-card .item-tags {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .item-card .item-tag {
    font-size: 9.5px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-dim);
    letter-spacing: .3px;
  }

  .item-card .item-progress {
    margin-top: 8px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .item-card .item-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }

  /* ---- Right column: Stat cards + Activity table ---- */
  .stat-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all .2s;
  }

  .stat-card:hover { border-color: var(--border-light); }

  .stat-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .stat-info { flex: 1; }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-top: 1px;
  }

  .stat-change {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: .3px;
  }

  /* Activity breakdown table */
  .activity-section {
    margin-top: 0;
  }

  .activity-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 10px;
  }

  .activity-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .activity-table th {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 9px 12px;
    text-align: left;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .activity-table th:last-child,
  .activity-table td:last-child { text-align: right; }

  .activity-table td {
    font-size: 12px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .activity-table tr:last-child td { border-bottom: none; }

  .activity-table tr:hover td { background: rgba(255,255,255,.015); }

  .activity-table .at-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }

  .activity-table .at-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .activity-table .at-dim { color: var(--text-dim); font-size: 11px; }

  /* Running pulse */
  @keyframes runPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  .pulse-live { animation: runPulse 1.8s ease-in-out infinite; }

  /* Empty state */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 10px;
    margin-top: 12px;
  }

  .empty-state .es-icon {
    font-size: 28px;
    opacity: .25;
    margin-bottom: 10px;
  }

  .empty-state p {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- ================================================================
     SIDEBAR
     ================================================================ -->
<aside class="sidebar" id="sidebar">
  <canvas id="sidebarParticles"></canvas>

  <div class="sidebar-title">AI Inventor</div>

  <!-- Progress Ring -->
  <div class="ring-container">
    <div class="ring-glow visible" id="ringGlow" style="background:radial-gradient(circle,var(--blue) 0%,transparent 70%)"></div>
    <svg class="ring-svg" viewBox="0 0 120 120">
      <circle class="ring-track" cx="60" cy="60" r="50"/>
      <!-- Seed: 15% of circle (green) -->
      <circle class="ring-segment" data-mod="0"
        cx="60" cy="60" r="50"
        stroke="var(--green)"
        stroke-dasharray="314.16"
        stroke-dashoffset="267.03"
        style="filter:drop-shadow(0 0 3px var(--green-glow))"/>
      <!-- Hypothesis: 20% (purple) -->
      <circle class="ring-segment" data-mod="1"
        cx="60" cy="60" r="50"
        stroke="var(--purple)"
        stroke-dasharray="314.16"
        stroke-dashoffset="251.33"
        style="transform:rotate(54deg);transform-origin:60px 60px;filter:drop-shadow(0 0 3px var(--purple-glow))"/>
      <!-- Invention: 30% * 0.42 filled (blue) -->
      <circle class="ring-segment" data-mod="2"
        cx="60" cy="60" r="50"
        stroke="var(--blue)"
        stroke-dasharray="314.16"
        stroke-dashoffset="274.59"
        style="transform:rotate(126deg);transform-origin:60px 60px;filter:drop-shadow(0 0 3px var(--blue-glow))"/>
      <!-- Paper: pending (gray dashed) -->
      <circle class="ring-segment" data-mod="3"
        cx="60" cy="60" r="50"
        stroke="var(--gray)"
        stroke-dasharray="8 6"
        stroke-width="3"
        opacity=".25"
        style="transform:rotate(234deg);transform-origin:60px 60px"/>
    </svg>
    <div class="ring-center-text">
      <div class="ring-pct">65<span style="font-size:14px;font-weight:600;opacity:.6">%</span></div>
      <div class="ring-label">Progress</div>
    </div>
  </div>

  <!-- Module cards -->
  <div class="module-list" id="moduleList">
    <div class="mod-card selected" data-mod="0" onclick="selectModule(0)">
      <div class="mc-glow" style="box-shadow:inset 0 0 20px -6px var(--green-glow),0 0 12px -4px var(--green-glow)"></div>
      <div class="mc-row">
        <div class="mc-dot" style="background:var(--green);color:var(--green)"></div>
        <div class="mc-name">Seed</div>
        <div class="mc-status" style="background:var(--green-dim);color:var(--green)">Done</div>
      </div>
      <div class="mc-bar" style="width:100%;background:var(--green)"></div>
    </div>
    <div class="mod-card" data-mod="1" onclick="selectModule(1)">
      <div class="mc-glow" style="box-shadow:inset 0 0 20px -6px var(--purple-glow),0 0 12px -4px var(--purple-glow)"></div>
      <div class="mc-row">
        <div class="mc-dot" style="background:var(--purple);color:var(--purple)"></div>
        <div class="mc-name">Hypothesis</div>
        <div class="mc-status" style="background:var(--purple-dim);color:var(--purple)">Done</div>
      </div>
      <div class="mc-bar" style="width:100%;background:var(--purple)"></div>
    </div>
    <div class="mod-card active" data-mod="2" onclick="selectModule(2)">
      <div class="mc-glow" style="box-shadow:inset 0 0 20px -6px var(--blue-glow),0 0 12px -4px var(--blue-glow)"></div>
      <div class="mc-row">
        <div class="mc-dot" style="background:var(--blue);color:var(--blue)"></div>
        <div class="mc-name">Invention</div>
        <div class="mc-status pulse-live" style="background:var(--blue-dim);color:var(--blue)">Running</div>
      </div>
      <div class="mc-bar" style="width:42%;background:linear-gradient(90deg,var(--blue),#818cf8)"></div>
    </div>
    <div class="mod-card" data-mod="3" onclick="selectModule(3)">
      <div class="mc-glow" style="box-shadow:inset 0 0 20px -6px rgba(107,114,128,.2),0 0 12px -4px rgba(107,114,128,.15)"></div>
      <div class="mc-row">
        <div class="mc-dot" style="background:var(--gray);color:var(--gray)"></div>
        <div class="mc-name">Paper</div>
        <div class="mc-status" style="background:var(--gray-dim);color:var(--gray)">Pending</div>
      </div>
      <div class="mc-bar" style="width:0%;background:var(--gray)"></div>
    </div>
  </div>

  <!-- Sub-modules (dynamic) -->
  <div class="sub-modules" id="subModules"></div>
</aside>

<!-- ================================================================
     MAIN CONTENT
     ================================================================ -->
<div class="main">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-title" id="topbarTitle">Seed Hypotheses</div>
    <div class="topbar-badge" id="topbarBadge" style="background:var(--green-dim);color:var(--green)">Complete</div>
    <div class="topbar-time">
      <span class="kbd">&larr;</span><span class="kbd">&rarr;</span> navigate &nbsp;|&nbsp;
      <span id="topbarClock" style="font-variant-numeric:tabular-nums">56m 50s elapsed</span>
    </div>
  </div>

  <!-- Two-column content -->
  <div class="two-col">
    <!-- LEFT COLUMN: summary + items -->
    <div class="col-left" id="colLeft"></div>
    <!-- RIGHT COLUMN: stats + activity -->
    <div class="col-right" id="colRight"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ============================
  // DATA MODEL
  // ============================
  const COLORS = {
    seed: { main: '#34d399', dim: 'rgba(52,211,153,.12)', glow: 'rgba(52,211,153,.35)' },
    hypothesis: { main: '#a78bfa', dim: 'rgba(167,139,250,.12)', glow: 'rgba(167,139,250,.35)' },
    invention: { main: '#60a5fa', dim: 'rgba(96,165,250,.12)', glow: 'rgba(96,165,250,.4)' },

  const MODULES = [

      items: [

      ],

    },
    {

      steps: [
        { name: 'Gen Initial', status: 'done', statusLabel: 'Done' },
        { name: 'Review R1', status: 'done', statusLabel: 'Done' },

      ],

      items: [

        { title: 'Spectral Transfer Kernels', desc: 'Spectral decomposition of transfer operators for domain-agnostic representation bridging.', tags: ['Score: 8.1', 'Runner-up'], progress: 100, progressColor: COLORS.hypothesis.main },
        { title: 'Adaptive Modality Fusion', desc: 'Adaptive gating mechanism for flexible multi-modal fusion with learned importance weighting.', tags: ['Score: 7.9', 'Third'], progress: 100, progressColor: COLORS.hypothesis.main }
      ],
      stats: { duration: '21m 54s', cost: '$9.73', messages: '142', tokens: '387K' },
      activity: [

        { step: 'Review Round 1', time: '5m 14s', cost: '$2.31', msgs: '32', tokens: '94K', color: COLORS.hypothesis.main },
        { step: 'Refine', time: '4m 08s', cost: '$1.89', msgs: '28', tokens: '76K', color: COLORS.hypothesis.main },

    {

        { name: 'Update', status: 'pending', statusLabel: 'Pending' }
      ],
      summary: "I am currently in iteration 2 of the invention loop, working on the \"Geometric Attention Bridges\" hypothesis. I evaluated three invention strategies -- compositional, ablative, and hybrid -- and selected the hybrid approach for its novelty-to-effort ratio of 0.82. The execution plan decomposes the work into 14 sub-tasks across theory (4), implementation (6), and evaluation (4) tracks. Artifact generation is at 3 out of 5: the baseline transformer model achieved 0.847 F1 with geometric attention disabled, the synthetic dataset pipeline produced 2,400 paired samples validated by 3 human annotators (Cohen's kappa = 0.91), and the formal proof module verified all three core lemmas. The ablation study is actively running at 67% completion, exploring 6 hyperparameter dimensions. The evaluation suite is queued next.",
      items: [
        { title: 'Baseline Model', desc: 'Standard transformer without geometric attention. Achieved 0.847 F1, establishing the performance floor for ablations.', tags: ['Done', '0.847 F1', '3m 22s'], progress: 100, progressColor: COLORS.invention.main },
        { title: 'Dataset Pipeline', desc: '2,400 paired samples across 3 difficulty tiers. Validated with human annotators (kappa = 0.91).', tags: ['Done', '2,400 samples', '2m 56s'], progress: 100, progressColor: COLORS.invention.main },
        { title: 'Proof Module', desc: 'Formal verification of core geometric attention theorem. All 3 lemmas verified via Lean4-style checking.', tags: ['Done', 'Verified', '2m 18s'], progress: 100, progressColor: COLORS.invention.main },
        { title: 'Ablation Study', desc: 'Exploring 6 hyperparameter dimensions: heads, depth, basis, LR, dropout, seq length. Currently at 67%.', tags: ['Running', '4/6 dims', '3m 32s'], progress: 67, progressColor: '#60a5fa', isActive: true },
        { title: 'Evaluation Suite', desc: '4 benchmarks planned: CrossModal-100, GeoAttention-Bench, TransferQA, ModalBridge-v2.', tags: ['Pending'], progress: 0, progressColor: COLORS.invention.main }
      ],
      stats: { duration: '18m 10s', cost: '$6.80', messages: '96', tokens: '268K' },
      activity: [
        { step: 'Strategy', time: '2m 44s', cost: '$1.12', msgs: '14', tokens: '38K', color: COLORS.invention.main },
        { step: 'Plan', time: '3m 18s', cost: '$1.45', msgs: '18', tokens: '52K', color: COLORS.invention.main },
        { step: 'Artifacts (3/5)', time: '12m 08s', cost: '$4.23', msgs: '64', tokens: '178K', color: COLORS.invention.main, active: true },
        { step: 'Paper Text', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true },
        { step: 'Review', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true },
        { step: 'Update', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true }
      ]
    },
    {
      id: 'paper', label: 'Paper Generation', color: COLORS.paper,
      status: 'Pending', statusColor: 'gray',
      steps: [
        { name: 'Structure', status: 'pending', statusLabel: 'Pending' },
        { name: 'Demos', status: 'pending', statusLabel: 'Pending' },
        { name: 'Visualizations', status: 'pending', statusLabel: 'Pending' },
        { name: 'Full Draft', status: 'pending', statusLabel: 'Pending' },
        { name: 'LaTeX Build', status: 'pending', statusLabel: 'Pending' }
      ],
      summary: "This phase has not started yet. Once the invention loop completes its final review pass, I will begin assembling the paper. The plan is to generate an 8-section outline following NeurIPS 2024 formatting guidelines, produce 6 publication-quality visualizations (architecture diagram, training curves, ablation heatmaps, benchmark comparisons, and qualitative examples), draft the full text with 40+ references, compile to LaTeX, and perform a final quality check covering grammar, citation consistency, figure resolution, and page-limit compliance. Estimated total time: approximately 25-30 minutes at current throughput.",
      items: [],
      stats: { duration: '--', cost: '--', messages: '--', tokens: '--' },
      activity: [
        { step: 'Structure', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true },
        { step: 'Demos', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true },
        { step: 'Visualizations', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true },
        { step: 'Full Draft', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true },
        { step: 'LaTeX Build', time: '--', cost: '--', msgs: '--', tokens: '--', color: '#454b5c', pending: true }
      ]
    }
  ];

  // ============================
  // STATE
  // ============================
  let selMod = 0;
  let selStep = -1; // -1 means module overview

  // ============================
  // DOM REFS
  // ============================
  const colLeft = document.getElementById('colLeft');
  const colRight = document.getElementById('colRight');
  const subModules = document.getElementById('subModules');
  const topbarTitle = document.getElementById('topbarTitle');
  const topbarBadge = document.getElementById('topbarBadge');
  const moduleCards = document.querySelectorAll('.mod-card');

  // ============================
  // RENDER: Sub-modules in sidebar
  // ============================
  function renderSubModules() {
    const mod = MODULES[selMod];
    let html = '';
    mod.steps.forEach((s, i) => {
      const isSel = (i === selStep);
      const isActive = s.status === 'active';
      const isPending = s.status === 'pending';
      const dotColor = isPending ? '#454b5c' : mod.color.main;
      const statusColor = isActive ? mod.color.main : (isPending ? '#454b5c' : '#34d399');
      html += `<div class="sub-module${isSel ? ' selected' : ''}${isActive ? ' active' : ''}" data-step="${i}" onclick="selectStep(${i})" style="opacity:${isPending ? '.45' : '1'}">
        <div class="sm-dot" style="background:${dotColor};color:${dotColor}"></div>
        <div class="sm-label">${s.name}</div>
        <div class="sm-status" style="color:${statusColor}">${s.statusLabel}</div>
      </div>`;
    });
    subModules.innerHTML = html;
  }

  // ============================
  // RENDER: Left Column (Summary + Items)
  // ============================
  function renderLeft() {
    const mod = MODULES[selMod];
    const iconMap = { seed: '&#9670;', hypothesis: '&#9733;', invention: '&#9881;', paper: '&#9998;' };
    const icon = iconMap[mod.id];

    let html = `<div class="summary-block">
      <div class="summary-heading">
        <div class="summary-icon" style="background:${mod.color.dim};color:${mod.color.main}">${icon}</div>
        <h2>${mod.label}</h2>
      </div>
      <div class="summary-text" style="--accent:${mod.color.main}">
        <style>.summary-text::before{background:${mod.color.main} !important}</style>
        <p>${mod.summary}</p>
      </div>
    </div>`;

    if (mod.items.length > 0) {
      const listTitle = mod.id === 'seed' ? 'Research Gaps' :
                        mod.id === 'hypothesis' ? 'Top Hypotheses' :
                        mod.id === 'invention' ? 'Artifacts' : 'Outputs';
      html += `<div class="item-list-title">${listTitle}</div><div class="item-list">`;
      mod.items.forEach(item => {
        const activeClass = item.isActive ? ' active-item' : '';
        html += `<div class="item-card${activeClass}">
          <h4>${item.title}</h4>
          <p>${item.desc}</p>`;
        if (item.progress !== undefined) {
          html += `<div class="item-progress"><div class="item-progress-fill" style="width:${item.progress}%;background:${item.progressColor || mod.color.main}"></div></div>`;
        }
        if (item.tags) {
          html += `<div class="item-tags">${item.tags.map(t => `<span class="item-tag">${t}</span>`).join('')}</div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    } else if (mod.id === 'paper') {
      html += `<div class="empty-state">
        <div class="es-icon">&#9998;</div>
        <p>Paper generation will begin after the invention loop completes its final review pass.<br>
        <span style="opacity:.6;font-size:11px">Estimated start: after iteration 3 review</span></p>
      </div>`;
    }

    colLeft.innerHTML = html;
  }

  // ============================
  // RENDER: Right Column (Stats + Activity)
  // ============================
  function renderRight() {
    const mod = MODULES[selMod];
    const isPending = mod.id === 'paper';
    const isRunning = mod.id === 'invention';

    const statIcons = [
      { icon: '&#9202;', label: 'Duration', key: 'duration', bg: 'var(--blue-dim)', fg: 'var(--blue)' },
      { icon: '&#36;', label: 'Cost', key: 'cost', bg: 'var(--green-dim)', fg: 'var(--green)' },
      { icon: '&#9993;', label: 'Messages', key: 'messages', bg: 'var(--purple-dim)', fg: 'var(--purple)' },
      { icon: '&#9641;', label: 'Tokens', key: 'tokens', bg: 'var(--amber-dim)', fg: 'var(--amber)' }
    ];

    let html = `<div class="stat-stack">`;
    statIcons.forEach(si => {
      const val = mod.stats[si.key];
      const pulseClass = (isRunning && si.key === 'duration') ? ' pulse-live' : '';
      html += `<div class="stat-card">
        <div class="stat-icon" style="background:${si.bg};color:${si.fg}">${si.icon}</div>
        <div class="stat-info">
          <div class="stat-value${pulseClass}">${val}</div>
          <div class="stat-label">${si.label}</div>
        </div>
      </div>`;
    });
    html += `</div>`;

    // Activity breakdown table
    html += `<div class="activity-section">
      <div class="activity-title">Activity Breakdown</div>
      <table class="activity-table">
        <thead><tr>
          <th>Step</th>
          <th>Time</th>
          <th>Cost</th>
          <th>Msgs</th>
          <th>Tokens</th>
        </tr></thead>
        <tbody>`;
    mod.activity.forEach(a => {
      const dimClass = a.pending ? ' at-dim' : '';
      const rowStyle = a.active ? 'background:rgba(96,165,250,.04)' : '';
      html += `<tr style="${rowStyle}">
        <td><div class="at-step${dimClass}">
          <span class="at-dot" style="background:${a.color}${a.active ? ';box-shadow:0 0 6px ' + a.color : ''}"></span>
          ${a.step}${a.active ? ' <span class="pulse-live" style="color:var(--blue);font-size:9px;font-weight:600">LIVE</span>' : ''}
        </div></td>
        <td class="${dimClass}">${a.time}</td>
        <td class="${dimClass}">${a.cost}</td>
        <td class="${dimClass}">${a.msgs}</td>
        <td class="${dimClass}">${a.tokens}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

    colRight.innerHTML = html;
  }

  // ============================
  // RENDER: Topbar
  // ============================
  function renderTopbar() {
    const mod = MODULES[selMod];
    topbarTitle.textContent = mod.label;
    const colorMap = { green: { bg: 'var(--green-dim)', fg: 'var(--green)' },
                       purple: { bg: 'var(--purple-dim)', fg: 'var(--purple)' },
                       blue: { bg: 'var(--blue-dim)', fg: 'var(--blue)' },
                       gray: { bg: 'var(--gray-dim)', fg: 'var(--gray)' } };
    const c = colorMap[mod.statusColor];
    topbarBadge.style.background = c.bg;
    topbarBadge.style.color = c.fg;
    topbarBadge.textContent = mod.status;
    if (mod.status === 'Running') {
      topbarBadge.classList.add('pulse-live');
    } else {
      topbarBadge.classList.remove('pulse-live');
    }
  }

  // ============================
  // MODULE SELECTION
  // ============================
  window.selectModule = function(idx) {
    if (idx < 0 || idx >= MODULES.length) return;
    selMod = idx;
    selStep = -1;
    moduleCards.forEach((c, i) => {
      c.classList.toggle('selected', i === idx);
    });
    // Update ring glow color
    const mod = MODULES[idx];
    document.getElementById('ringGlow').style.background =
      `radial-gradient(circle,${mod.color.main} 0%,transparent 70%)`;
    renderAll();
    colLeft.scrollTop = 0;
    colRight.scrollTop = 0;
  };

  window.selectStep = function(idx) {
    selStep = (selStep === idx) ? -1 : idx;
    renderSubModules();
  };

  function renderAll() {
    renderTopbar();
    renderSubModules();
    renderLeft();
    renderRight();
  }

  // ============================
  // KEYBOARD NAVIGATION
  // ============================
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      selectModule(Math.min(selMod + 1, MODULES.length - 1));
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      selectModule(Math.max(selMod - 1, 0));
    }
  });

  // ============================
  // RING CLICK NAVIGATION
  // ============================
  document.querySelectorAll('.ring-segment').forEach(seg => {
    seg.style.cursor = 'pointer';
    seg.addEventListener('click', function() {
      const idx = parseInt(this.dataset.mod);
      selectModule(idx);
    });
  });

  // ============================
  // PARTICLE SYSTEM (sidebar)
  // ============================
  const pCanvas = document.getElementById('sidebarParticles');
  const pCtx = pCanvas.getContext('2d');
  let particles = [];

  function resizeParticleCanvas() {
    const sb = document.getElementById('sidebar');
    pCanvas.width = sb.offsetWidth;
    pCanvas.height = sb.offsetHeight;
  }

  function spawnParticle() {
    const mod = MODULES[selMod];
    const colors = [mod.color.main, mod.color.glow];
    const color = colors[Math.floor(Math.random() * colors.length)];
    particles.push({
      x: 20 + Math.random() * (pCanvas.width - 40),
      y: pCanvas.height * .15 + Math.random() * pCanvas.height * .25,
      vx: (Math.random() - .5) * .3,
      vy: -(0.3 + Math.random() * .5),
      r: 1 + Math.random() * 1.5,
      life: 1,
      decay: .006 + Math.random() * .008,
      color: color
    });
  }

  function animateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      pCtx.fillStyle = p.color;
      pCtx.globalAlpha = p.life * .6;
      pCtx.fill();
      pCtx.globalAlpha = 1;
    });
    requestAnimationFrame(animateParticles);
  }

  resizeParticleCanvas();
  window.addEventListener('resize', resizeParticleCanvas);
  setInterval(spawnParticle, 250);
  animateParticles();

  // ============================
  // RING ENTRANCE ANIMATION
  // ============================
  function animateRing() {
    const segments = document.querySelectorAll('.ring-segment');
    segments.forEach((seg, i) => {
      const original = seg.getAttribute('stroke-dashoffset');
      if (i < 3) {
        seg.style.transition = 'none';
        seg.setAttribute('stroke-dashoffset', '314.16');
        requestAnimationFrame(() => {
          setTimeout(() => {
            seg.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)';
            seg.setAttribute('stroke-dashoffset', original);
          }, i * 200);
        });
      }
    });
  }

  // ============================
  // INIT
  // ============================
  renderAll();
  animateRing();

})();
</script>
