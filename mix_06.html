<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Glowing Branch Paths</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --bg-raised: #161921;
    --bg-card: #1a1d27;
    --bg-card-hover: #1e2230;
    --border: rgba(255,255,255,0.06);
    --border-subtle: rgba(255,255,255,0.03);
    --fg: #c8cad2;
    --fg-bright: #e2e4ea;
    --fg-muted: #6e7080;
    --fg-dim: #484a58;

    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.15);
    --green-glow: rgba(74,222,128,0.4);
    --purple: #a855f7;
    --purple-dim: rgba(168,85,247,0.15);
    --purple-glow: rgba(168,85,247,0.4);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.15);
    --blue-glow: rgba(96,165,250,0.4);
    --orange: #fb923c;
    --orange-dim: rgba(251,146,60,0.15);
    --orange-glow: rgba(251,146,60,0.4);

    --inactive-line: rgba(255,255,255,0.08);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font);
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ============================================
     HEADER BAR
     ============================================ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: linear-gradient(180deg, rgba(22,25,33,0.95) 0%, rgba(15,17,23,0.95) 100%);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    backdrop-filter: blur(12px);
    z-index: 20;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-logo {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--fg-bright);
    letter-spacing: -0.01em;
  }

  .header-run {
    font-size: 12px;
    color: var(--fg-muted);
    margin-left: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--fg-muted);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--blue);
    animation: statusPulse 2s ease-in-out infinite;
  }

  @keyframes statusPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--blue-glow); }
    50% { opacity: 0.5; box-shadow: 0 0 8px var(--blue-glow); }
  }

  .header-time {
    font-size: 12px;
    color: var(--fg-dim);
    font-variant-numeric: tabular-nums;
  }

  /* ============================================
     MAIN LAYOUT: SVG Canvas + Right Panel
     ============================================ */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SVG Branch Canvas (left) ── */
  .branch-canvas {
    flex: 1;
    min-width: 0;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(96,165,250,0.02) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 30%, rgba(168,85,247,0.015) 0%, transparent 50%),
      var(--bg);
  }

  /* Subtle dot grid */
  .branch-canvas::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .branch-canvas svg {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 1;
  }

  /* ── Right Detail Panel ── */
  .detail-panel {
    width: 380px;
    min-width: 380px;
    border-left: 1px solid var(--border);
    background: var(--bg-raised);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* ── Detail Header ── */
  .detail-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .detail-module-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  .detail-module-badge.seed { background: var(--green-dim); color: var(--green); }
  .detail-module-badge.hypothesis { background: var(--purple-dim); color: var(--purple); }
  .detail-module-badge.invention { background: var(--blue-dim); color: var(--blue); }
  .detail-module-badge.paper { background: var(--orange-dim); color: var(--orange); }

  .detail-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--fg-bright);
    margin-bottom: 4px;
  }

  .detail-subtitle {
    font-size: 13px;
    color: var(--fg-muted);
    line-height: 1.5;
  }

  /* ── Detail Body ── */
  .detail-body {
    padding: 16px 24px 32px;
    flex: 1;
  }

  /* ── Sub-step Rows (collapsible) ── */
  .sub-step {
    border-radius: 8px;
    margin-bottom: 2px;
    overflow: hidden;
  }

  .sub-step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s ease;
    user-select: none;
  }

  .sub-step-header:hover {
    background: rgba(255,255,255,0.025);
  }

  .sub-step.expanded .sub-step-header {
    background: rgba(255,255,255,0.025);
  }

  .sub-step-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }

  .sub-step-icon.done {
    background: var(--green-dim);
    color: var(--green);
  }

  .sub-step-icon.active {
    background: var(--blue-dim);
    color: var(--blue);
    animation: iconPulse 2s ease-in-out infinite;
  }

  .sub-step-icon.pending {
    background: rgba(255,255,255,0.04);
    color: var(--fg-dim);
  }

  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 0 0 transparent; }
    50% { box-shadow: 0 0 8px var(--blue-glow); }
  }

  .sub-step-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-bright);
    flex: 1;
    min-width: 0;
  }

  .sub-step-label.pending-label {
    color: var(--fg-dim);
  }

  .sub-step-meta {
    font-size: 12px;
    color: var(--fg-muted);
    flex-shrink: 0;
  }

  .sub-step-meta.active-meta {
    color: var(--blue);
    font-weight: 500;
    animation: textPulse 2s ease-in-out infinite;
  }

  @keyframes textPulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .sub-step-chevron {
    font-size: 10px;
    color: var(--fg-dim);
    transition: transform 0.2s ease;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
  }

  .sub-step.expanded .sub-step-chevron {
    transform: rotate(90deg);
  }

  .sub-step-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    padding-left: 40px;
    padding-right: 12px;
  }

  .sub-step.expanded .sub-step-body {
    max-height: 280px;
    padding-bottom: 10px;
  }

  .sub-detail-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    font-size: 12px;
    color: var(--fg-muted);
  }

  .sub-detail-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sub-detail-dot.done { background: var(--green); opacity: 0.6; }
  .sub-detail-dot.active { background: var(--blue); animation: statusPulse 2s ease-in-out infinite; }
  .sub-detail-dot.pending { background: var(--fg-dim); opacity: 0.3; }

  .sub-detail-label { flex: 1; }
  .sub-detail-label.active-label { color: var(--blue); font-weight: 500; }

  .sub-detail-value {
    font-size: 11px;
    color: var(--fg-dim);
    font-variant-numeric: tabular-nums;
  }

  .sub-detail-value.done-val { color: rgba(74,222,128,0.5); }
  .sub-detail-value.active-val { color: var(--blue); }

  /* ── Hypothesis iterations ── */
  .iter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 12px;
    color: var(--fg-muted);
  }

  .iter-num {
    font-weight: 600;
    width: 18px;
    color: var(--purple);
    opacity: 0.7;
  }

  .iter-score { flex: 1; }

  .iter-badge {
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .iter-badge.best {
    background: var(--purple-dim);
    color: var(--purple);
  }

  /* ── Stats Footer ── */
  .detail-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 20px;
    flex-shrink: 0;
  }

  .stat-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--fg-bright);
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 11px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ============================================
     MODULE CARDS (on the SVG canvas, rendered in HTML overlay)
     ============================================ */
  .cards-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
  }

  .module-card {
    position: absolute;
    width: 200px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    pointer-events: auto;
    cursor: pointer;
    transition: border-color 0.3s ease, box-shadow 0.3s ease, transform 0.2s ease;
    user-select: none;
  }

  .module-card:hover {
    border-color: rgba(255,255,255,0.1);
    transform: translateY(-1px);
  }

  .module-card.selected {
    transform: translateY(-1px);
  }

  .module-card.selected.seed {
    border-color: rgba(74,222,128,0.3);
    box-shadow: 0 0 20px rgba(74,222,128,0.08);
  }
  .module-card.selected.hypothesis {
    border-color: rgba(168,85,247,0.3);
    box-shadow: 0 0 20px rgba(168,85,247,0.08);
  }
  .module-card.selected.invention {
    border-color: rgba(96,165,250,0.3);
    box-shadow: 0 0 20px rgba(96,165,250,0.08);
  }
  .module-card.selected.paper {
    border-color: rgba(251,146,60,0.3);
    box-shadow: 0 0 20px rgba(251,146,60,0.08);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .seed .card-dot { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
  .hypothesis .card-dot { background: var(--purple); box-shadow: 0 0 6px var(--purple-glow); }
  .invention .card-dot { background: var(--blue); box-shadow: 0 0 6px var(--blue-glow); }
  .paper .card-dot { background: var(--orange); box-shadow: 0 0 6px var(--orange-glow); }

  .card-module-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--fg-bright);
  }

  .card-status-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .card-status-badge.done { background: var(--green-dim); color: var(--green); }
  .card-status-badge.active { background: var(--blue-dim); color: var(--blue); }
  .card-status-badge.pending { background: rgba(255,255,255,0.04); color: var(--fg-dim); }

  .card-desc {
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .card-progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
  }

  .card-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .seed .card-progress-fill { background: var(--green); }
  .hypothesis .card-progress-fill { background: var(--purple); }
  .invention .card-progress-fill { background: var(--blue); }
  .paper .card-progress-fill { background: var(--orange); }

  /* ── Sub-module labels on canvas ── */
  .sub-label {
    position: absolute;
    font-size: 11px;
    font-weight: 500;
    color: var(--fg-dim);
    pointer-events: auto;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
    transition: color 0.2s ease, background 0.2s ease;
    white-space: nowrap;
    user-select: none;
  }

  .sub-label:hover {
    color: var(--fg-muted);
    background: rgba(255,255,255,0.03);
  }

  .sub-label.active {
    color: var(--fg-bright);
    background: rgba(255,255,255,0.04);
  }

  .sub-label.done-label { color: var(--fg-muted); }

  .sub-label .sub-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -0.5px;
    flex-shrink: 0;
  }

  .sub-label.done-label .sub-dot { background: var(--green); opacity: 0.5; }
  .sub-label.active .sub-dot { background: var(--blue); animation: statusPulse 2s ease-in-out infinite; }
  .sub-label .sub-dot.pending { background: var(--fg-dim); opacity: 0.3; }

  /* Active glow ring around the active sub-label dot */
  .sub-label.active .sub-dot::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: var(--blue);
    opacity: 0;
    animation: subDotRing 2s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes subDotRing {
    0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.15; transform: translate(-50%, -50%) scale(2); }
  }

  /* ── Overall progress mini-bar in detail header ── */
  .detail-progress-bar {
    margin-top: 12px;
    height: 3px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    overflow: hidden;
  }

  .detail-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .detail-progress-fill.seed { background: var(--green); }
  .detail-progress-fill.hypothesis { background: var(--purple); }
  .detail-progress-fill.invention { background: var(--blue); }
  .detail-progress-fill.paper { background: var(--orange); }

  /* ── Active sub-step highlight bar ── */
  .sub-step.expanded .sub-step-header {
    border-left: 2px solid var(--blue);
    padding-left: 10px;
  }

  .sub-step.expanded.step-done .sub-step-header {
    border-left-color: var(--green);
  }

  /* ============================================
     KEYBOARD HINT
     ============================================ */
  .key-hint {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--fg-dim);
    z-index: 20;
    user-select: none;
  }

  .key-hint kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 18px;
    padding: 0 5px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
    font-family: var(--font);
    font-size: 10px;
    color: var(--fg-muted);
    background: rgba(255,255,255,0.03);
  }
</style>
</head>
<body>

<!-- ============================================
     HEADER
     ============================================ -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">Ai</div>
    <div>
      <div class="header-title">AI Inventor <span class="header-run">/ run-2026-03-25-a</span></div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-status">
      <div class="status-dot"></div>
      Running &mdash; Invention Loop
    </div>
    <div class="header-time">02:47:13 elapsed</div>
  </div>
</div>

<!-- ============================================
     MAIN: Canvas + Detail Panel
     ============================================ -->
<div class="main">

  <!-- Branch Canvas -->
  <div class="branch-canvas" id="branchCanvas">
    <svg id="branchSvg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Glow filters: 10px blur for intense branch glow -->
        <filter id="glowGreen" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
          <feMerge>
            <feMergeNode in="blur10"/>
            <feMergeNode in="blur5"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="glowPurple" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
          <feMerge>
            <feMergeNode in="blur10"/>
            <feMergeNode in="blur5"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="glowBlue" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
          <feMerge>
            <feMergeNode in="blur10"/>
            <feMergeNode in="blur5"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="glowOrange" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur5"/>
          <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur10"/>
          <feMerge>
            <feMergeNode in="blur10"/>
            <feMergeNode in="blur5"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Particle glow -->
        <filter id="particleGlow" x="-150%" y="-150%" width="400%" height="400%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>

        <!-- Endpoint dot glow -->
        <filter id="endpointGlow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Branch lines will be drawn by JS -->
      <g id="branchLines"></g>
      <!-- Endpoint dots -->
      <g id="endpointDots"></g>
      <!-- Particles group -->
      <g id="particlesGroup"></g>
    </svg>

    <!-- Card + sub-label overlays positioned over SVG -->
    <div class="cards-overlay" id="cardsOverlay"></div>
  </div>

  <!-- Right Detail Panel -->
  <div class="detail-panel" id="detailPanel">
    <!-- Populated by JS based on selected card -->
  </div>

</div>

<!-- Keyboard hint -->
<div class="key-hint">
  <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> modules
  <span style="margin: 0 4px; opacity:0.3;">|</span>
  click branch to inspect
</div>

<script>
/* ============================================================
   DATA MODEL
   ============================================================ */
const MODULES = [
  {
    id: 'seed',
    label: 'Seed Hypotheses',
    color: '#4ade80',
    colorDim: 'rgba(74,222,128,0.15)',
    colorGlow: 'rgba(74,222,128,0.4)',
    filter: 'url(#glowGreen)',
    status: 'done',
    progress: 100,
    desc: '847 papers ingested, 12 research gaps identified from knowledge graph analysis.',
    subs: [
      { id: 'paper_collection', label: 'Paper Collection', status: 'done', meta: '847 papers',
        details: [
          { label: 'Semantic Scholar crawl', status: 'done', val: '1,204 hits' },
          { label: 'PDF extraction', status: 'done', val: '847 unique' },

/* ============================================================
   LAYOUT CONFIG
   ============================================================ */
const CARD_W = 200;
const CARD_H = 110;
const SUB_LABEL_H = 28;
const CARD_GAP_Y = 56;
const SUB_START_X_OFFSET = 260;
const SUB_GAP_Y = 34;

let selectedModuleId = 'invention';
let selectedSubId = 'gen_text';

/* Card positions: computed once on resize */
let cardPositions = {};
let subPositions = {};

/* ============================================================
   RENDER CARDS + SUB-LABELS
   ============================================================ */
function renderOverlay() {
  const overlay = document.getElementById('cardsOverlay');
  const canvas = document.getElementById('branchCanvas');
  const cw = canvas.clientWidth;
  const ch = canvas.clientHeight;

  overlay.innerHTML = '';
  cardPositions = {};
  subPositions = {};

  const totalModules = MODULES.length;
  const totalH = totalModules * CARD_H + (totalModules - 1) * CARD_GAP_Y;
  const startY = Math.max(40, (ch - totalH) / 2);
  const cardX = 48;

  MODULES.forEach((mod, i) => {
    const cardY = startY + i * (CARD_H + CARD_GAP_Y);

    cardPositions[mod.id] = {
      x: cardX,
      y: cardY,
      cx: cardX + CARD_W / 2,
      cy: cardY + CARD_H / 2,
      right: cardX + CARD_W
    };

    /* Card element */
    const card = document.createElement('div');
    card.className = `module-card ${mod.id}${selectedModuleId === mod.id ? ' selected' : ''}`;
    card.style.left = cardX + 'px';
    card.style.top = cardY + 'px';
    card.dataset.module = mod.id;

    const statusText = mod.status === 'done' ? 'Done' : mod.status === 'active' ? 'Active' : 'Pending';
    card.innerHTML = `
      <div class="card-top">
        <div class="card-dot"></div>
        <div class="card-module-name">${mod.label}</div>
        <div class="card-status-badge ${mod.status}">${statusText}</div>
      </div>
      <div class="card-desc">${mod.desc.substring(0, 80)}${mod.desc.length > 80 ? '...' : ''}</div>
      <div class="card-progress-bar">
        <div class="card-progress-fill" style="width:${mod.progress}%"></div>
      </div>
    `;

    card.addEventListener('click', () => selectModule(mod.id));
    overlay.appendChild(card);

    /* Sub-labels to the right */
    const subStartX = cardX + SUB_START_X_OFFSET;
    const subsH = mod.subs.length * SUB_GAP_Y;
    const subsStartY = cardY + (CARD_H - subsH) / 2 + SUB_GAP_Y / 2;

    mod.subs.forEach((sub, si) => {
      const sy = subsStartY + si * SUB_GAP_Y;
      const sx = subStartX;

      subPositions[sub.id] = {
        x: sx,
        y: sy,
        left: sx,
        cy: sy + SUB_LABEL_H / 2
      };

      const lbl = document.createElement('div');
      let cls = 'sub-label';
      if (sub.status === 'done') cls += ' done-label';
      else if (sub.status === 'active') cls += ' active';
      if (selectedModuleId === mod.id && selectedSubId === sub.id) cls += ' active';
      lbl.className = cls;
      lbl.style.left = sx + 'px';
      lbl.style.top = sy + 'px';
      lbl.dataset.module = mod.id;
      lbl.dataset.sub = sub.id;

      const dotCls = sub.status === 'done' ? '' : sub.status === 'active' ? '' : 'pending';
      lbl.innerHTML = `<span class="sub-dot ${dotCls}"></span>${sub.label}`;

      lbl.addEventListener('click', () => {
        selectedModuleId = mod.id;
        selectedSubId = sub.id;
        renderAll();
      });

      overlay.appendChild(lbl);
    });
  });
}

/* ============================================================
   RENDER SVG BRANCH LINES
   ============================================================ */
function renderBranches() {
  const g = document.getElementById('branchLines');
  const dotsG = document.getElementById('endpointDots');
  g.innerHTML = '';
  dotsG.innerHTML = '';

  MODULES.forEach((mod) => {
    const cp = cardPositions[mod.id];
    if (!cp) return;

    const isActive = (selectedModuleId === mod.id);

    mod.subs.forEach((sub) => {
      const sp = subPositions[sub.id];
      if (!sp) return;

      const x1 = cp.right + 4;
      const y1 = cp.cy;
      const x2 = sp.left - 4;
      const y2 = sp.cy;

      const midX = x1 + (x2 - x1) * 0.5;

      const d = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;

      const isActiveBranch = isActive && (selectedSubId === sub.id);
      const isModuleActive = isActive;

      if (isActiveBranch) {
        /* Outer glow layer (wide 10px blur) — creates the intense bloom */
        const outerGlow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        outerGlow.setAttribute('d', d);
        outerGlow.setAttribute('fill', 'none');
        outerGlow.setAttribute('stroke', mod.color);
        outerGlow.setAttribute('stroke-width', '4');
        outerGlow.setAttribute('filter', mod.filter);
        outerGlow.setAttribute('opacity', '0.5');
        outerGlow.setAttribute('stroke-linecap', 'round');
        g.appendChild(outerGlow);

        /* Inner glow layer (tighter) */
        const innerGlow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        innerGlow.setAttribute('d', d);
        innerGlow.setAttribute('fill', 'none');
        innerGlow.setAttribute('stroke', mod.color);
        innerGlow.setAttribute('stroke-width', '2');
        innerGlow.setAttribute('filter', mod.filter);
        innerGlow.setAttribute('opacity', '0.8');
        innerGlow.setAttribute('stroke-linecap', 'round');
        g.appendChild(innerGlow);

        /* Bright core line (2px solid) */
        const corePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        corePath.setAttribute('d', d);
        corePath.setAttribute('fill', 'none');
        corePath.setAttribute('stroke', mod.color);
        corePath.setAttribute('stroke-width', '2');
        corePath.setAttribute('opacity', '1');
        corePath.setAttribute('stroke-linecap', 'round');
        corePath.dataset.active = 'true';
        corePath.dataset.module = mod.id;
        corePath.dataset.sub = sub.id;
        g.appendChild(corePath);

        /* Endpoint dots for active branch */
        const startDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        startDot.setAttribute('cx', x1);
        startDot.setAttribute('cy', y1);
        startDot.setAttribute('r', '4');
        startDot.setAttribute('fill', mod.color);
        startDot.setAttribute('filter', 'url(#endpointGlow)');
        startDot.setAttribute('opacity', '0.9');
        dotsG.appendChild(startDot);

        const endDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        endDot.setAttribute('cx', x2);
        endDot.setAttribute('cy', y2);
        endDot.setAttribute('r', '3.5');
        endDot.setAttribute('fill', mod.color);
        endDot.setAttribute('filter', 'url(#endpointGlow)');
        endDot.setAttribute('opacity', '0.9');
        dotsG.appendChild(endDot);

      } else if (isModuleActive) {
        /* Other branches of the selected module: thin colored line */
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', mod.color);
        path.setAttribute('stroke-width', '1');
        path.setAttribute('opacity', '0.2');
        path.setAttribute('stroke-linecap', 'round');
        g.appendChild(path);

        /* Small dim endpoint dots */
        const sDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        sDot.setAttribute('cx', x2);
        sDot.setAttribute('cy', y2);
        sDot.setAttribute('r', '2');
        sDot.setAttribute('fill', mod.color);
        sDot.setAttribute('opacity', '0.2');
        dotsG.appendChild(sDot);

      } else {
        /* Inactive modules: thin 1px gray */
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', d);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', 'rgba(255,255,255,0.06)');
        path.setAttribute('stroke-width', '1');
        path.setAttribute('stroke-linecap', 'round');
        g.appendChild(path);

        /* Tiny gray endpoint */
        const eDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        eDot.setAttribute('cx', x2);
        eDot.setAttribute('cy', y2);
        eDot.setAttribute('r', '1.5');
        eDot.setAttribute('fill', 'rgba(255,255,255,0.06)');
        dotsG.appendChild(eDot);
      }
    });

    /* Vertical trunk line connecting cards */
    if (mod !== MODULES[MODULES.length - 1]) {
      const nextMod = MODULES[MODULES.indexOf(mod) + 1];
      const ncp = cardPositions[nextMod.id];
      if (ncp) {
        const tx = cp.x + CARD_W / 2;
        const ty1 = cp.y + CARD_H + 2;
        const ty2 = ncp.y - 2;

        /* Check if this trunk segment is between active modules */
        const curIdx = MODULES.indexOf(mod);
        const activeIdx = MODULES.findIndex(m => m.id === selectedModuleId);
        const isTrunkActive = (curIdx < activeIdx) ||
          (curIdx === activeIdx - 1);

        if (isTrunkActive) {
          /* Slightly brighter trunk for path to active module */
          const trunkGlow = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          trunkGlow.setAttribute('x1', tx);
          trunkGlow.setAttribute('y1', ty1);
          trunkGlow.setAttribute('x2', tx);
          trunkGlow.setAttribute('y2', ty2);
          trunkGlow.setAttribute('stroke', 'rgba(255,255,255,0.12)');
          trunkGlow.setAttribute('stroke-width', '1');
          trunkGlow.setAttribute('stroke-dasharray', '4,4');
          g.appendChild(trunkGlow);
        } else {
          const trunk = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          trunk.setAttribute('x1', tx);
          trunk.setAttribute('y1', ty1);
          trunk.setAttribute('x2', tx);
          trunk.setAttribute('y2', ty2);
          trunk.setAttribute('stroke', 'rgba(255,255,255,0.04)');
          trunk.setAttribute('stroke-width', '1');
          trunk.setAttribute('stroke-dasharray', '3,6');
          g.appendChild(trunk);
        }
      }
    }
  });
}

/* ============================================================
   PARTICLES ALONG ACTIVE GLOW PATH
   ============================================================ */
const particles = [];
const MAX_PARTICLES = 6;
let animFrame = null;

function getActivePathData() {
  const mod = MODULES.find(m => m.id === selectedModuleId);
  if (!mod) return null;
  const cp = cardPositions[mod.id];
  const sp = subPositions[selectedSubId];
  if (!cp || !sp) return null;
  return { mod, cp, sp };
}

function bezierPoint(t, x1, y1, cx1, cy1, cx2, cy2, x2, y2) {
  const u = 1 - t;
  const tt = t * t;
  const uu = u * u;
  const uuu = uu * u;
  const ttt = tt * t;
  const x = uuu * x1 + 3 * uu * t * cx1 + 3 * u * tt * cx2 + ttt * x2;
  const y = uuu * y1 + 3 * uu * t * cy1 + 3 * u * tt * cy2 + ttt * y2;
  return { x, y };
}

function initParticles() {
  const pg = document.getElementById('particlesGroup');
  pg.innerHTML = '';
  particles.length = 0;

  const data = getActivePathData();
  if (!data) return;

  for (let i = 0; i < MAX_PARTICLES; i++) {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', '2.5');
    circle.setAttribute('fill', data.mod.color);
    circle.setAttribute('filter', 'url(#particleGlow)');
    circle.setAttribute('opacity', '0');
    pg.appendChild(circle);

    particles.push({
      el: circle,
      t: i / MAX_PARTICLES,
      speed: 0.002 + Math.random() * 0.001,
      opacity: 0.4 + Math.random() * 0.5
    });
  }
}

function animateParticles() {
  const data = getActivePathData();
  if (!data) {
    animFrame = requestAnimationFrame(animateParticles);
    return;
  }

  const { cp, sp } = data;
  const x1 = cp.right + 4;
  const y1 = cp.cy;
  const x2 = sp.left - 4;
  const y2 = sp.cy;
  const midX = x1 + (x2 - x1) * 0.5;

  /* Cubic bezier: M x1,y1 C midX,y1 midX,y2 x2,y2 */
  const cx1 = midX, cy1 = y1;
  const cx2 = midX, cy2 = y2;

  particles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;

    const pos = bezierPoint(p.t, x1, y1, cx1, cy1, cx2, cy2, x2, y2);
    p.el.setAttribute('cx', pos.x);
    p.el.setAttribute('cy', pos.y);

    /* Fade in/out at endpoints */
    let alpha = p.opacity;
    if (p.t < 0.1) alpha *= p.t / 0.1;
    else if (p.t > 0.9) alpha *= (1 - p.t) / 0.1;
    p.el.setAttribute('opacity', alpha.toFixed(2));
  });

  animFrame = requestAnimationFrame(animateParticles);
}

   ============================================================ */
function renderDetailPanel() {
  const panel = document.getElementById('detailPanel');
  const mod = MODULES.find(m => m.id === selectedModuleId);
  if (!mod) { panel.innerHTML = ''; return; }

  let subsHTML = '';
  mod.subs.forEach(sub => {
    const isExpanded = (sub.id === selectedSubId);
    const expandedCls = isExpanded ? ' expanded' : '';

    let iconCls = 'pending';
    let iconChar = '&#9679;';
    if (sub.status === 'done') { iconCls = 'done'; iconChar = '&#10003;'; }
    else if (sub.status === 'active') { iconCls = 'active'; iconChar = '&#9679;'; }

    const labelCls = sub.status === 'pending' ? ' pending-label' : '';
    const metaCls = sub.status === 'active' ? ' active-meta' : '';

    let detailsHTML = '';
    if (sub.details) {
      sub.details.forEach(d => {
        const dotCls = d.status === 'done' ? 'done' : d.status === 'active' ? 'active' : 'pending';
        const lblCls = d.status === 'active' ? ' active-label' : '';
        const valCls = d.status === 'done' ? ' done-val' : d.status === 'active' ? ' active-val' : '';
        detailsHTML += `
          <div class="sub-detail-row">
            <div class="sub-detail-dot ${dotCls}"></div>
            <div class="sub-detail-label${lblCls}">${d.label}</div>
            <div class="sub-detail-value${valCls}">${d.val}</div>
          </div>`;
      });
    }

    const stepStatusCls = sub.status === 'done' ? ' step-done' : '';
    subsHTML += `
      <div class="sub-step${expandedCls}${stepStatusCls}" data-sub="${sub.id}">
        <div class="sub-step-header">
          <div class="sub-step-icon ${iconCls}">${iconChar}</div>
          <div class="sub-step-label${labelCls}">${sub.label}</div>
          <div class="sub-step-meta${metaCls}">${sub.meta}</div>
          <div class="sub-step-chevron">&#9654;</div>
        </div>
        <div class="sub-step-body">
          ${detailsHTML}
        </div>
      </div>`;
  });

  let statsHTML = '';
  mod.stats.forEach(s => {
    statsHTML += `
      <div class="stat-block">
        <div class="stat-value">${s.value}</div>
        <div class="stat-label">${s.label}</div>
      </div>`;
  });

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-module-badge ${mod.id}">${mod.label}</div>
      <div class="detail-title">${mod.label}</div>
      <div class="detail-subtitle">${mod.desc}</div>
      <div class="detail-progress-bar">
        <div class="detail-progress-fill ${mod.id}" style="width:${mod.progress}%"></div>
      </div>
    </div>
    <div class="detail-body">
      ${subsHTML}
    </div>
    <div class="detail-footer">
      ${statsHTML}
    </div>
  `;

  /* Bind collapse/expand */
  panel.querySelectorAll('.sub-step-header').forEach(header => {
    header.addEventListener('click', () => {
      const row = header.parentElement;
      const subId = row.dataset.sub;
      if (row.classList.contains('expanded')) {
        row.classList.remove('expanded');
      } else {
        /* Collapse all others first */
        panel.querySelectorAll('.sub-step.expanded').forEach(el => el.classList.remove('expanded'));
        row.classList.add('expanded');
        selectedSubId = subId;
        renderOverlay();
        renderBranches();
        initParticles();
      }
    });
  });
}

/* ============================================================
   MODULE SELECTION
   ============================================================ */
function selectModule(modId) {
  const mod = MODULES.find(m => m.id === modId);
  if (!mod) return;
  selectedModuleId = modId;

  /* Default to first active sub, or first sub */
  const activeSub = mod.subs.find(s => s.status === 'active');
  selectedSubId = activeSub ? activeSub.id : mod.subs[0].id;

  renderAll();
}

function renderAll() {
  renderOverlay();
  renderBranches();
  renderDetailPanel();
  initParticles();
}

/* ============================================================
   RESIZE HANDLING
   ============================================================ */
function handleResize() {
  const svg = document.getElementById('branchSvg');
  const canvas = document.getElementById('branchCanvas');
  svg.setAttribute('width', canvas.clientWidth);
  svg.setAttribute('height', canvas.clientHeight);
  renderAll();
}

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (key >= '1' && key <= '4') {
    const idx = parseInt(key) - 1;
    if (MODULES[idx]) selectModule(MODULES[idx].id);
  }
  /* Arrow up/down to navigate subs */
  if (key === 'ArrowDown' || key === 'ArrowUp') {
    e.preventDefault();
    const mod = MODULES.find(m => m.id === selectedModuleId);
    if (!mod) return;
    const idx = mod.subs.findIndex(s => s.id === selectedSubId);
    let newIdx = key === 'ArrowDown' ? idx + 1 : idx - 1;
    if (newIdx < 0) newIdx = mod.subs.length - 1;
    if (newIdx >= mod.subs.length) newIdx = 0;
    selectedSubId = mod.subs[newIdx].id;
    renderAll();
  }
});

/* ============================================================
   ELAPSED TIME TICKER
   ============================================================ */
let elapsedSeconds = 2 * 3600 + 47 * 60 + 13; /* 02:47:13 start */

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function tickClock() {
  elapsedSeconds++;
  const el = document.querySelector('.header-time');
  if (el) el.textContent = formatTime(elapsedSeconds) + ' elapsed';
}

setInterval(tickClock, 1000);

/* ============================================================
   WRITING ANIMATION — simulated word count increment
   ============================================================ */
let wordCount = 834;
const wordTarget = 1200;

function tickWriting() {
  if (wordCount >= wordTarget) return;
  wordCount += Math.floor(Math.random() * 3) + 1;
  if (wordCount > wordTarget) wordCount = wordTarget;

  /* Update the detail panel if it shows the active writing step */
  const activeRow = document.querySelector('.sub-detail-value.active-val');
  if (activeRow && activeRow.textContent.includes('writing')) {
    activeRow.textContent = `${wordCount} words...`;
  }
}

setInterval(tickWriting, 2000);

/* ============================================================
   CANVAS BACKGROUND ANIMATION — subtle breathing gradient
   ============================================================ */
let breathPhase = 0;

function breatheCanvas() {
  breathPhase += 0.005;
  const canvas = document.getElementById('branchCanvas');
  if (!canvas) return;
  const intensity = 0.015 + Math.sin(breathPhase) * 0.005;
  canvas.style.background = `
    radial-gradient(ellipse at 30% 50%, rgba(96,165,250,${intensity}) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 30%, rgba(168,85,247,${intensity * 0.8}) 0%, transparent 50%),
    var(--bg)
  `;
  requestAnimationFrame(breatheCanvas);
}

breatheCanvas();

/* ============================================================
   INIT
   ============================================================ */
window.addEventListener('resize', handleResize);
handleResize();
animateParticles();
</script>
