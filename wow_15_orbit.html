<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Solar System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #030310;
    --sun-core: #fff8e1;
    --sun-mid: #ffb300;
    --sun-outer: #ff6f00;
    --seed-color: #4caf50;
    --hypo-color: #b388ff;
    --invention-color: #42a5f5;
    --paper-color: #ff9800;
    --ring-dim: rgba(255,255,255,0.06);
    --label-font: 'Inter', sans-serif;
  }

  body {
    background: var(--bg);
    font-family: var(--label-font);
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: relative;
  }

  /* ── Top bar ─────────────────────────────────────── */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: linear-gradient(180deg, rgba(3,3,16,0.92) 60%, transparent);
    backdrop-filter: blur(6px);
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .top-bar .title {
    font-weight: 700;
    font-size: 15px;
    background: linear-gradient(135deg, var(--sun-mid), #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .top-bar .meta { display: flex; gap: 28px; color: #888; font-weight: 400; }
  .top-bar .meta span { display: flex; align-items: center; gap: 6px; }
  .top-bar .meta .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .top-bar .meta .dot.active { background: var(--invention-color); box-shadow: 0 0 6px var(--invention-color); }

  #starfield { position: fixed; inset: 0; z-index: 0; }

  .solar-system { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) perspective(900px) rotateX(58deg); transform-style: preserve-3d; width: 0; height: 0; z-index: 10; }

  .sun { position: absolute; width: 80px; height: 80px; top: -40px; left: -40px; border-radius: 50%; background: radial-gradient(circle at 40% 38%, var(--sun-core) 0%, var(--sun-mid) 40%, var(--sun-outer) 75%, transparent 100%); box-shadow: 0 0 40px 10px rgba(255,179,0,0.5), 0 0 80px 30px rgba(255,179,0,0.25), 0 0 140px 60px rgba(255,111,0,0.12); z-index: 50; transform: rotateX(-58deg); }
  .sun::before, .sun::after { content: ''; position: absolute; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .sun::before { width: 130%; height: 130%; background: radial-gradient(circle, rgba(255,179,0,0.18) 0%, transparent 70%); animation: corona-pulse 3s ease-in-out infinite; }
  .sun::after { width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,179,0,0.08) 0%, transparent 60%); animation: corona-pulse 4.5s ease-in-out infinite reverse; }
  @keyframes corona-pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.18); opacity: 0.6; } }
  .corona-ray { position: absolute; top: 50%; left: 50%; width: 2px; height: 60px; transform-origin: center top; background: linear-gradient(to bottom, rgba(255,200,50,0.35), transparent); border-radius: 1px; z-index: 49; animation: ray-flicker 2.5s ease-in-out infinite alternate; transform: rotateX(-58deg); }
  @keyframes ray-flicker { 0% { opacity: 0.3; height: 50px; } 100% { opacity: 0.8; height: 70px; } }

  .orbit-ring { position: absolute; border: 1px dashed var(--ring-dim); border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
  .orbit-ring.r1 { width: 260px; height: 260px; }
  .orbit-ring.r2 { width: 420px; height: 420px; }
  .orbit-ring.r3 { width: 640px; height: 640px; }
  .orbit-ring.r4 { width: 860px; height: 860px; }
  .asteroid-belt { position: absolute; width: 530px; height: 530px; top: -265px; left: -265px; border-radius: 50%; animation: belt-rotate 120s linear infinite; pointer-events: none; }
  @keyframes belt-rotate { to { transform: rotate(360deg); } }
  .asteroid { position: absolute; width: 2px; height: 2px; background: rgba(180,170,150,0.5); border-radius: 50%; }
  .orbit-arm { position: absolute; top: 0; left: 0; width: 0; height: 0; transform-origin: 0 0; }
  .orbit-arm.arm-seed      { animation: spin 8s  linear infinite; }
  .orbit-arm.arm-hypo      { animation: spin 15s linear infinite; }
  .orbit-arm.arm-invention { animation: spin 25s linear infinite; }
  .orbit-arm.arm-paper     { animation: spin 40s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .planet-wrapper { position: absolute; transform-style: preserve-3d; cursor: pointer; transition: filter 0.3s; }
  .planet-wrapper:hover { filter: brightness(1.3); }
  .pw-seed      { top: -10px; left: 120px; }
  .pw-hypo      { top: -15px; left: 195px; }
  .pw-invention { top: -25px; left: 295px; }
  .pw-paper     { top: -12px; left: 415px; }
  .planet-upright { transform: rotateX(-58deg); }
  .pw-seed .planet-upright      { animation: counter-spin 8s  linear infinite; }
  .pw-hypo .planet-upright      { animation: counter-spin 15s linear infinite; }
  .pw-invention .planet-upright { animation: counter-spin 25s linear infinite; }
  .pw-paper .planet-upright     { animation: counter-spin 40s linear infinite; }
  @keyframes counter-spin { to { transform: rotateX(-58deg) rotate(-360deg); } }

  .planet { border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; color: rgba(255,255,255,0.85); text-shadow: 0 0 4px rgba(0,0,0,0.7); }
  .planet.seed { width: 20px; height: 20px; background: radial-gradient(circle at 35% 30%, #a5d6a7, var(--seed-color) 60%, #2e7d32); box-shadow: 0 0 12px 3px rgba(76,175,80,0.35); }
  .planet.seed::after { content: ''; position: absolute; width: 30px; height: 30px; border: 1.5px solid rgba(76,175,80,0.35); border-radius: 50%; top: -5px; left: -5px; }
  .planet.hypo { width: 30px; height: 30px; background: radial-gradient(circle at 35% 30%, #e1bee7, var(--hypo-color) 55%, #7c4dff); box-shadow: 0 0 18px 5px rgba(179,136,255,0.3); }
  .planet.invention { width: 50px; height: 50px; background: radial-gradient(circle at 38% 32%, #bbdefb, var(--invention-color) 50%, #1565c0); box-shadow: 0 0 25px 8px rgba(66,165,245,0.45), 0 0 60px 20px rgba(66,165,245,0.15); animation: invention-pulse 2s ease-in-out infinite; }
  @keyframes invention-pulse { 0%, 100% { box-shadow: 0 0 25px 8px rgba(66,165,245,0.45), 0 0 60px 20px rgba(66,165,245,0.15); } 50% { box-shadow: 0 0 35px 12px rgba(66,165,245,0.55), 0 0 80px 30px rgba(66,165,245,0.22); } }
  .saturn-ring { position: absolute; width: 90px; height: 22px; top: 50%; left: 50%; transform: translate(-50%, -50%) rotateX(75deg); border: 2.5px solid rgba(66,165,245,0.25); border-radius: 50%; pointer-events: none; }
  .saturn-ring.ring2 { width: 78px; height: 18px; border-color: rgba(100,180,255,0.15); }
  .planet.paper { width: 25px; height: 25px; background: radial-gradient(circle at 35% 30%, #ffe0b2, var(--paper-color) 55%, #e65100); box-shadow: 0 0 10px 3px rgba(255,152,0,0.2); opacity: 0.45; }
  .planet-label { position: absolute; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 11px; font-weight: 500; letter-spacing: 0.6px; pointer-events: none; text-align: center; }
  .planet-label .name { display: block; }
  .planet-label .status { font-size: 9px; font-weight: 400; opacity: 0.6; margin-top: 1px; }
  .pw-seed .planet-label      { bottom: -28px; color: var(--seed-color); }
  .pw-hypo .planet-label      { bottom: -28px; color: var(--hypo-color); }
  .pw-invention .planet-label { bottom: -32px; color: var(--invention-color); }
  .pw-paper .planet-label     { bottom: -28px; color: var(--paper-color); }
  .moon-system { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-origin: 0 0; animation: spin linear infinite; pointer-events: none; }
  .moon { position: absolute; border-radius: 50%; background: #ccc; }

  .moon-system.hypo-m1 { animation-duration: 3s; }
  .moon-system.hypo-m2 { animation-duration: 4.2s; }
  .moon-system.hypo-m3 { animation-duration: 5.5s; }
  .moon.hypo-moon { width: 5px; height: 5px; background: radial-gradient(circle, #e1bee7, #9c27b0); box-shadow: 0 0 4px rgba(156,39,176,0.4); top: -2.5px; }
  .moon-system.hypo-m1 .moon { left: 24px; }
  .moon-system.hypo-m2 .moon { left: 30px; }
  .moon-system.hypo-m3 .moon { left: 36px; }
  .moon-system.inv-m1 { animation-duration: 3.5s; }
  .moon-system.inv-m2 { animation-duration: 5s; }
  .moon-system.inv-m3 { animation-duration: 6.5s; }
  .moon-system.inv-m4 { animation-duration: 8s; }
  .moon.inv-moon { width: 7px; height: 7px; top: -3.5px; }
  .moon-system.inv-m1 .moon { left: 42px; background: radial-gradient(circle, #fff, #64b5f6); box-shadow: 0 0 8px 2px rgba(100,181,246,0.6); }
  .moon.inv-moon.active-moon { background: radial-gradient(circle, #fff, #29b6f6) !important; box-shadow: 0 0 12px 4px rgba(41,182,246,0.8) !important; animation: moon-glow 1.5s ease-in-out infinite; }
  @keyframes moon-glow { 0%, 100% { box-shadow: 0 0 12px 4px rgba(41,182,246,0.8); } 50% { box-shadow: 0 0 18px 7px rgba(41,182,246,1); } }
  .moon-system.inv-m2 .moon { left: 50px; background: radial-gradient(circle, #e0e0e0, #78909c); box-shadow: 0 0 4px rgba(120,144,156,0.3); }
  .moon-system.inv-m3 .moon { left: 56px; background: radial-gradient(circle, #e0e0e0, #90a4ae); box-shadow: 0 0 4px rgba(144,164,174,0.3); }
  .moon-system.inv-m4 .moon { left: 62px; background: radial-gradient(circle, #e0e0e0, #b0bec5); box-shadow: 0 0 3px rgba(176,190,197,0.25); opacity: 0.5; }

  /* ── Tooltip ─────────────────────────────────────── */
  .tooltip { position: fixed; z-index: 200; background: rgba(10,10,30,0.92); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 16px 20px; min-width: 220px; max-width: 300px; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; font-size: 12px; line-height: 1.6; }
  .tooltip.visible { opacity: 1; transform: translateY(0); }
  .tooltip h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .tooltip .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .tooltip .status-badge.complete { background: rgba(76,175,80,0.2); color: #81c784; }
  .tooltip .status-badge.active { background: rgba(66,165,245,0.2); color: #64b5f6; }
  .tooltip .status-badge.pending { background: rgba(255,255,255,0.06); color: #888; }
  .tooltip .detail { color: #aaa; }

  /* ── Detail card (click) ─────────────────────────── */
  .detail-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(3,3,16,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
  .detail-overlay.open { opacity: 1; pointer-events: all; }
  .detail-card { background: rgba(12,12,36,0.95); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 32px 36px; max-width: 420px; width: 90%; box-shadow: 0 20px 80px rgba(0,0,0,0.6); transform: scale(0.92); transition: transform 0.35s; }
  .detail-overlay.open .detail-card { transform: scale(1); }
  .detail-card h2 { font-size: 20px; margin-bottom: 6px; }
  .detail-card .phase-status { font-size: 12px; margin-bottom: 16px; opacity: 0.6; }
  .detail-card .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; font-size: 13px; margin-bottom: 18px; }
  .detail-card .info-grid .label { color: #666; font-size: 11px; }
  .detail-card .info-grid .value { color: #ccc; font-weight: 500; }
  .detail-card .sub-modules { font-size: 12px; color: #999; list-style: none; }
  .detail-card .sub-modules li { margin: 4px 0; padding-left: 12px; position: relative; }
  .detail-card .sub-modules li::before { content: ''; position: absolute; left: 0; top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #555; }
  .detail-card .sub-modules li.done::before { background: var(--seed-color); }
  .detail-card .sub-modules li.running::before { background: var(--invention-color); box-shadow: 0 0 6px var(--invention-color); }
  .detail-card .close-btn { margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: #aaa; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-family: var(--label-font); font-size: 12px; transition: background 0.2s; }
  .detail-card .close-btn:hover { background: rgba(255,255,255,0.1); }

  /* ── Legend ───────────────────────────────────────── */
  .legend { position: fixed; bottom: 24px; left: 32px; z-index: 100; display: flex; gap: 18px; font-size: 11px; color: #555; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<!-- Starfield canvas -->
<canvas id="starfield"></canvas>

<!-- Top bar -->
<div class="top-bar">
  <div class="title">AI INVENTOR SOLAR SYSTEM</div>
  <div class="meta">
    <span>run-2026-0326-alpha</span>
    <span><span class="dot active"></span> Invention Loop Active</span>
    <span>03:42:17 elapsed</span>
    <span>$4.82 cost</span>
  </div>
</div>

<!-- Solar system scene -->
<div class="solar-system" id="solarSystem">

  <!-- Orbital track rings -->
  <div class="orbit-ring r1"></div>
  <div class="orbit-ring r2"></div>
  <div class="orbit-ring r3"></div>
  <div class="orbit-ring r4"></div>

  <!-- Asteroid belt -->
  <div class="asteroid-belt" id="asteroidBelt"></div>

  <!-- Sun -->
  <div class="sun" id="sun"></div>

  <!-- Corona rays (generated via JS) -->

  <!-- Planet 1: Seed -->
  <div class="orbit-arm arm-seed">
    <div class="planet-wrapper pw-seed" data-planet="seed">
      <div class="planet-upright">
        <div class="planet seed"></div>
        <div class="planet-label">
          <span class="name">Seed</span>
          <span class="status">Complete</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Planet 2: Hypothesis -->
  <div class="orbit-arm arm-hypo">
    <div class="planet-wrapper pw-hypo" data-planet="hypo">
      <div class="planet-upright">
        <div class="planet hypo"></div>
        <div class="planet-label">
          <span class="name">Hypothesis</span>
          <span class="status">Complete</span>
        </div>
        <!-- Moons -->
        <div class="moon-system hypo-m1"><div class="moon hypo-moon"></div></div>
        <div class="moon-system hypo-m2"><div class="moon hypo-moon"></div></div>
        <div class="moon-system hypo-m3"><div class="moon hypo-moon"></div></div>
      </div>
    </div>
  </div>

  <!-- Planet 3: Invention -->
  <div class="orbit-arm arm-invention">
    <div class="planet-wrapper pw-invention" data-planet="invention">
      <div class="planet-upright">
        <div class="planet invention">
          <div class="saturn-ring"></div>
          <div class="saturn-ring ring2"></div>
        </div>
        <div class="planet-label">
          <span class="name">Invention</span>
          <span class="status">Active</span>
        </div>
        <!-- Moons (sub-modules) -->
        <div class="moon-system inv-m1"><div class="moon inv-moon active-moon"></div></div>
        <div class="moon-system inv-m2"><div class="moon inv-moon"></div></div>
        <div class="moon-system inv-m3"><div class="moon inv-moon"></div></div>
        <div class="moon-system inv-m4"><div class="moon inv-moon"></div></div>
      </div>
    </div>
  </div>

  <!-- Planet 4: Paper -->
  <div class="orbit-arm arm-paper">
    <div class="planet-wrapper pw-paper" data-planet="paper">
      <div class="planet-upright">
        <div class="planet paper"></div>
        <div class="planet-label">
          <span class="name">Paper</span>
          <span class="status">Pending</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard"></div>
</div>

<!-- Legend -->
<div class="legend">
  <span><span class="swatch" style="background:var(--seed-color)"></span>Complete</span>
  <span><span class="swatch" style="background:var(--invention-color);box-shadow:0 0 4px var(--invention-color)"></span>Active</span>
  <span><span class="swatch" style="background:#555"></span>Pending</span>
</div>

<script>
(function() {
  'use strict';

  /* ── Starfield ────────────────────────────────────── */
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function initStars() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = [];
    const count = 280;
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        baseAlpha: Math.random() * 0.6 + 0.2,
        twinkleSpeed: Math.random() * 0.02 + 0.005,
        twinkleOffset: Math.random() * Math.PI * 2,
        color: ['#fff', '#e3f2fd', '#fce4ec', '#fff9c4', '#e8eaf6'][Math.floor(Math.random() * 5)]
      });
    }
  }

  function drawStars(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      const flicker = Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
      const alpha = s.baseAlpha + flicker * 0.25;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = Math.max(0.05, Math.min(1, alpha));
      ctx.fill();
      /* Tiny glow for brighter stars */
      if (s.r > 1.0) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.globalAlpha = Math.max(0, alpha * 0.12);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
  }

  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', initStars);

  /* ── Corona rays ──────────────────────────────────── */
  const sun = document.getElementById('sun');
  for (let i = 0; i < 16; i++) {
    const ray = document.createElement('div');
    ray.className = 'corona-ray';
    ray.style.transform = `rotateX(-58deg) rotate(${i * 22.5}deg) translateY(-40px)`;
    ray.style.animationDelay = `${(i * 0.15)}s`;
    ray.style.height = `${50 + Math.random() * 30}px`;
    sun.parentElement.insertBefore(ray, sun);
  }

  /* ── Asteroid belt ────────────────────────────────── */
  const belt = document.getElementById('asteroidBelt');
  for (let i = 0; i < 80; i++) {
    const a = document.createElement('div');
    a.className = 'asteroid';
    const angle = Math.random() * Math.PI * 2;
    const radiusJitter = 245 + Math.random() * 40;
    const x = Math.cos(angle) * radiusJitter + 265;
    const y = Math.sin(angle) * radiusJitter + 265;
    a.style.left = x + 'px';
    a.style.top = y + 'px';
    a.style.width = (1 + Math.random() * 2) + 'px';
    a.style.height = a.style.width;
    a.style.opacity = (0.2 + Math.random() * 0.45).toString();
    belt.appendChild(a);
  }

  /* ── Planet data ──────────────────────────────────── */
  const planetData = {
    seed: {
      name: 'Seed Hypotheses',
      color: 'var(--seed-color)',
      status: 'complete',
      statusLabel: 'Complete',
      summary: 'Generated initial research hypotheses from the knowledge graph and literature corpus.',
      details: {
        'Hypotheses': '24 generated',
        'Duration': '00:08:42',
        'Tokens': '142K',
        'Cost': '$0.34'
      },
      subModules: [
        { name: 'Knowledge Graph Extraction', done: true },
        { name: 'Literature Embedding', done: true },
        { name: 'Hypothesis Generation', done: true }
      ]
    },
    hypo: {
      name: 'Hypothesis Loop',
      color: 'var(--hypo-color)',
      status: 'complete',
      statusLabel: 'Complete',
      summary: 'Iteratively refined hypotheses through review cycles. 3 iterations converged on 6 strong candidates.',
      details: {
        'Iterations': '3',
        'Candidates': '24 -> 6',
        'Duration': '00:34:15',
        'Cost': '$1.12'
      },
      subModules: [
        { name: 'Generate Hypotheses', done: true },
        { name: 'Review & Score', done: true },
        { name: 'Prune & Refine', done: true }
      ]
    },
    invention: {
      name: 'Invention Loop',
      color: 'var(--invention-color)',
      status: 'active',
      statusLabel: 'Active',
      summary: 'Developing detailed research plans and generating paper text for the top hypothesis.',
      details: {
        'Iteration': '2 of 3',
        'Sub-step': 'Gen Paper Text',
        'Duration': '02:51:30',
        'Cost': '$3.18'
      },
      subModules: [
        { name: 'Select Strategy', done: true },
        { name: 'Generate Plan', done: true },
        { name: 'Generate Paper Text', running: true },
        { name: 'Review Paper', done: false }
      ]
    },
    paper: {
      name: 'Paper Generation',
      color: 'var(--paper-color)',
      status: 'pending',
      statusLabel: 'Pending',
      summary: 'Will compile the final paper with visualizations, artifacts, and formatted output.',
      details: {
        'Estimated': '~45 min',
        'Sub-steps': '4',
        'Dependencies': 'Invention Loop',
        'Output': 'LaTeX + repo'
      },
      subModules: [
        { name: 'Generate Artifact Demos', done: false },
        { name: 'Generate Visualizations', done: false },
        { name: 'Compile Full Paper', done: false },
        { name: 'Build Repository', done: false }
      ]
    }
  };

  /* ── Tooltip ──────────────────────────────────────── */
  const tooltip = document.getElementById('tooltip');
  const wrappers = document.querySelectorAll('.planet-wrapper');

  wrappers.forEach(pw => {
    const key = pw.dataset.planet;
    const data = planetData[key];

    pw.addEventListener('mouseenter', (e) => {
      /* Pause orbit */
      const arm = pw.closest('.orbit-arm');
      arm.style.animationPlayState = 'paused';

      const badgeClass = data.status === 'complete' ? 'complete' : data.status === 'active' ? 'active' : 'pending';
      const icon = data.status === 'complete' ? '&#10003;' : data.status === 'active' ? '&#9654;' : '&#9675;';
      tooltip.innerHTML = `
        <h3 style="color:${data.color}">${icon}&nbsp;${data.name}
          <span class="status-badge ${badgeClass}">${data.statusLabel}</span>
        </h3>
        <div class="detail">${data.summary}</div>
      `;
      tooltip.classList.add('visible');
    });

    pw.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY + 16) + 'px';
    });

    pw.addEventListener('mouseleave', () => {
      const arm = pw.closest('.orbit-arm');
      arm.style.animationPlayState = 'running';
      tooltip.classList.remove('visible');
    });

    /* Click -> detail card */
    pw.addEventListener('click', () => {
      showDetail(key);
    });
  });

  /* ── Detail card ──────────────────────────────────── */
  const overlay = document.getElementById('detailOverlay');
  const card = document.getElementById('detailCard');

  function showDetail(key) {
    const data = planetData[key];
    const icon = data.status === 'complete' ? '&#10003; ' : data.status === 'active' ? '&#9654; ' : '&#9675; ';
    let detailHTML = `
      <h2 style="color:${data.color}">${data.name}</h2>
      <div class="phase-status">${icon} ${data.statusLabel}</div>
      <p style="font-size:13px;color:#999;margin-bottom:18px;">${data.summary}</p>
      <div class="info-grid">
    `;
    for (const [label, value] of Object.entries(data.details)) {
      detailHTML += `<div><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }
    detailHTML += `</div><div style="font-size:12px;color:#666;margin-bottom:8px;">Sub-modules</div><ul class="sub-modules">`;
    for (const sm of data.subModules) {
      const cls = sm.running ? 'running' : sm.done ? 'done' : '';
      const suffix = sm.running ? ' <span style="color:var(--invention-color)">running</span>' : sm.done ? ' <span style="color:var(--seed-color)">done</span>' : '';
      detailHTML += `<li class="${cls}">${sm.name}${suffix}</li>`;
    }
    detailHTML += `</ul><button class="close-btn" id="closeDetail">Close</button>`;
    card.innerHTML = detailHTML;
    overlay.classList.add('open');

    document.getElementById('closeDetail').addEventListener('click', () => {
      overlay.classList.remove('open');
    });
  }

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  /* ── Elapsed time ticker ──────────────────────────── */
  let elapsed = 3 * 3600 + 42 * 60 + 17;
  function tickClock() {
    elapsed++;
    const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    const spans = document.querySelectorAll('.top-bar .meta span');
    spans[2].textContent = `${h}:${m}:${s} elapsed`;
  }
  setInterval(tickClock, 1000);

})();
</script>
</body>
</html>
