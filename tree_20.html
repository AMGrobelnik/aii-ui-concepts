<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline — Ultimate Dashboard</title>
<style>
/* ============================================================
   RESET + BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* slate palette */
  --s950: #020617;
  --s900: #0f172a;
  --s850: #131c2e;
  --s800: #1e293b;
  --s750: #253349;
  --s700: #334155;
  --s600: #475569;
  --s500: #64748b;
  --s400: #94a3b8;
  --s300: #cbd5e1;
  --s200: #e2e8f0;
  --s100: #f1f5f9;

  /* module accent colors */
  --c1: #38bdf8;
  --c1g: rgba(56, 189, 248, .18);
  --c1d: rgba(56, 189, 248, .55);
  --c2: #a78bfa;
  --c2g: rgba(167, 139, 250, .18);
  --c2d: rgba(167, 139, 250, .55);
  --c3: #34d399;
  --c3g: rgba(52, 211, 153, .18);
  --c3d: rgba(52, 211, 153, .55);
  --c4: #fb923c;
  --c4g: rgba(251, 146, 60, .18);
  --c4d: rgba(251, 146, 60, .55);

  /* surfaces */
  --glass: rgba(15, 23, 42, .62);
  --glass-border: rgba(148, 163, 184, .10);
  --surface: rgba(30, 41, 59, .72);
  --surface-hi: rgba(51, 65, 85, .55);
  --radius: 10px;
  --radius-sm: 7px;
  font-size: 14px;
}

html { height: 100%; }

body {
  min-height: 100%;
  background: var(--s950);
  color: var(--s300);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow-x: hidden;
  line-height: 1.5;
}

/* subtle grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(148, 163, 184, .03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148, 163, 184, .03) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* radial gradient ambience behind the page */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(ellipse, rgba(56, 189, 248, .04), transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ============================================================
   HEADER (44px fixed)
   ============================================================ */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 20px;
  background: rgba(15, 23, 42, .88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--glass-border);
}

.brand {
  font-weight: 700;
  font-size: 14px;
  color: var(--s100);
  white-space: nowrap;
  letter-spacing: -.3px;
}
.brand span { color: var(--c1); margin-right: 2px; }

.breadcrumb {
  font-size: 12px;
  color: var(--s500);
  white-space: nowrap;
}
.breadcrumb b { color: var(--s300); font-weight: 600; }

.header-spacer { flex: 1; }

/* ring */
.header-ring {
  width: 36px;
  height: 36px;
  position: relative;
  flex-shrink: 0;
}
.header-ring svg { width: 100%; height: 100%; }
.header-ring .ring-track {
  fill: none;
  stroke: var(--s700);
  stroke-width: 3;
}
.header-ring .ring-fill {
  fill: none;
  stroke: var(--c1);
  stroke-width: 3;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  transition: stroke-dashoffset .8s ease, stroke .5s ease;
  filter: drop-shadow(0 0 4px var(--c1d));
}
.header-ring .ring-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  font-weight: 700;
  color: var(--s200);
}

/* rotating dashed outline (animation 5a) */
.header-ring::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1.5px dashed var(--c1d);
  opacity: .5;
  animation: ringRotate 12s linear infinite;
}
@keyframes ringRotate { to { transform: rotate(360deg); } }

/* ring glow pulse (animation 5b) */
.header-ring::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--c1g), transparent 70%);
  animation: ringGlow 2.5s ease-in-out infinite;
}
@keyframes ringGlow { 0%, 100% { opacity: .35; } 50% { opacity: .8; } }

.header-sep {
  width: 1px;
  height: 20px;
  background: var(--glass-border);
  flex-shrink: 0;
}

.header-stat {
  font-size: 12px;
  color: var(--s400);
  white-space: nowrap;
}
.header-stat strong { color: var(--s200); font-weight: 600; }
.header-stat .label { color: var(--s600); font-size: 10px; margin-right: 3px; text-transform: uppercase; letter-spacing: .4px; }

/* ============================================================
   MAIN CONTAINER
   ============================================================ */
.main {
  position: relative;
  z-index: 1;
  padding: 58px 24px 32px;
  max-width: 1360px;
  margin: 0 auto;
}

/* ============================================================
   MODULE CARDS ROW (4 horizontal glassmorphism cards)
   ============================================================ */
.modules-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 0;
  position: relative;
}

/* horizontal particle canvas */
#particleCanvasH {
  position: absolute;
  inset: -10px -24px;
  z-index: 0;
  pointer-events: none;
}

.mod-card {
  position: relative;
  z-index: 1;
  cursor: pointer;
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: all .3s ease;
  overflow: hidden;
}

/* glow halo (animation 3: active card glow pulse) */
.mod-card::before {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: var(--radius);
  opacity: 0;
  transition: opacity .4s ease;
  pointer-events: none;
  z-index: -1;
}
.mod-card[data-color="1"]::before { box-shadow: 0 0 32px 6px var(--c1g), inset 0 0 14px var(--c1g); }
.mod-card[data-color="2"]::before { box-shadow: 0 0 32px 6px var(--c2g), inset 0 0 14px var(--c2g); }
.mod-card[data-color="3"]::before { box-shadow: 0 0 32px 6px var(--c3g), inset 0 0 14px var(--c3g); }
.mod-card[data-color="4"]::before { box-shadow: 0 0 32px 6px var(--c4g), inset 0 0 14px var(--c4g); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: .65; } 50% { opacity: 1; } }

/* shimmer sweep (animation 6) */
.mod-card::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .04), transparent);
  transform: skewX(-20deg);
  pointer-events: none;
}
.mod-card.active::after { animation: shimmerSweep 3s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card.active { border-color: rgba(148, 163, 184, .22); }
.mod-card:not(.active):hover {
  background: var(--surface);
  border-color: rgba(148, 163, 184, .15);
  transform: translateY(-1px);
}

.mc-top {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 7px;
}

.mc-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: box-shadow .3s;
}
.mod-card[data-color="1"] .mc-dot { background: var(--c1); box-shadow: 0 0 6px var(--c1d); }
.mod-card[data-color="2"] .mc-dot { background: var(--c2); box-shadow: 0 0 6px var(--c2d); }
.mod-card[data-color="3"] .mc-dot { background: var(--c3); box-shadow: 0 0 6px var(--c3d); }
.mod-card[data-color="4"] .mc-dot { background: var(--c4); box-shadow: 0 0 6px var(--c4d); }

.mc-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--s200);
}

.mc-status {
  font-size: 11px;
  color: var(--s500);
  margin-left: auto;
  white-space: nowrap;
}
.mc-status.st-running { color: var(--c2); }
.mc-status.st-done { color: var(--s500); }
.mc-status.st-queued { color: var(--s600); }

.mc-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 11px;
  color: var(--s500);
}
.mc-meta span { white-space: nowrap; }

.mc-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--s800);
  overflow: hidden;
}
.mc-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width .6s ease;
}
.mod-card[data-color="1"] .mc-bar-fill { background: var(--c1); }
.mod-card[data-color="2"] .mc-bar-fill { background: var(--c2); }
.mod-card[data-color="3"] .mc-bar-fill { background: var(--c3); }
.mod-card[data-color="4"] .mc-bar-fill { background: var(--c4); }

/* ============================================================
   TREE COLUMNS AREA
   ============================================================ */
.tree-area {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 14px;
  min-height: 200px;
  position: relative;
}

#particleCanvasT {
  position: absolute;
  inset: -10px -24px;
  z-index: 0;
  pointer-events: none;
}

.tree-col {
  position: relative;
  z-index: 1;
  min-height: 60px;
}

/* tree structure */
.tree-list {
  padding: 2px 0 0 0;
  list-style: none;
}

.tree-node {
  display: flex;
  align-items: center;
  gap: 0;
  height: 38px;
  position: relative;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .28s ease, transform .28s ease;
}
.tree-col.visible .tree-node {
  opacity: 1;
  transform: translateY(0);
}

/* tree connector lines (custom SVG-style via pseudo-elements) */
.tree-gutter {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 24px;
  flex-shrink: 0;
  position: relative;
  align-self: stretch;
}

/* vertical line segment */
.tree-gutter::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 0;
  bottom: 0;
  width: 2px;
  border-radius: 1px;
}
.tree-node:last-child .tree-gutter::before {
  bottom: 50%;
}

/* horizontal branch */
.tree-gutter::after {
  content: '';
  position: absolute;
  left: 11px;
  top: 50%;
  width: 10px;
  height: 2px;
  border-radius: 1px;
}

/* color the tree lines per module */
.tree-col[data-color="1"] .tree-gutter::before,
.tree-col[data-color="1"] .tree-gutter::after { background: rgba(56, 189, 248, .18); }
.tree-col[data-color="2"] .tree-gutter::before,
.tree-col[data-color="2"] .tree-gutter::after { background: rgba(167, 139, 250, .18); }
.tree-col[data-color="3"] .tree-gutter::before,
.tree-col[data-color="3"] .tree-gutter::after { background: rgba(52, 211, 153, .18); }
.tree-col[data-color="4"] .tree-gutter::before,
.tree-col[data-color="4"] .tree-gutter::after { background: rgba(251, 146, 60, .18); }

/* active branch glow (animation 11) */
.tree-node.active .tree-gutter::before,
.tree-node.active .tree-gutter::after {
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-col[data-color="1"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="1"] .tree-node.active .tree-gutter::after { background: rgba(56, 189, 248, .55); box-shadow: 0 0 6px rgba(56, 189, 248, .3); }
.tree-col[data-color="2"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="2"] .tree-node.active .tree-gutter::after { background: rgba(167, 139, 250, .55); box-shadow: 0 0 6px rgba(167, 139, 250, .3); }
.tree-col[data-color="3"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="3"] .tree-node.active .tree-gutter::after { background: rgba(52, 211, 153, .55); box-shadow: 0 0 6px rgba(52, 211, 153, .3); }
.tree-col[data-color="4"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="4"] .tree-node.active .tree-gutter::after { background: rgba(251, 146, 60, .55); box-shadow: 0 0 6px rgba(251, 146, 60, .3); }

@keyframes branchGlow {
  0%, 100% { opacity: .7; }
  50% { opacity: 1; }
}

/* sub-module mini card */
.tree-sub {
  display: flex;
  align-items: center;
  gap: 7px;
  height: 32px;
  padding: 0 10px;
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  color: var(--s400);
  cursor: pointer;
  transition: all .2s ease;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tree-sub:hover {
  background: var(--surface-hi);
  color: var(--s300);
}
.tree-node.active .tree-sub {
  color: var(--s200);
  border-color: rgba(148, 163, 184, .18);
  background: var(--surface-hi);
}
.tree-node.done .tree-sub { color: var(--s500); }

/* dot inside sub card (animation 4: pulse for active, 14px effective) */
.tree-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--s600);
  transition: all .2s ease;
}
.tree-col[data-color="1"] .tree-node.active .tree-dot {
  background: var(--c1);
  width: 14px; height: 14px;
  box-shadow: 0 0 10px var(--c1d);
  animation: dotPulse1 2s ease-in-out infinite;
}
.tree-col[data-color="2"] .tree-node.active .tree-dot {
  background: var(--c2);
  width: 14px; height: 14px;
  box-shadow: 0 0 10px var(--c2d);
  animation: dotPulse2 2s ease-in-out infinite;
}
.tree-col[data-color="3"] .tree-node.active .tree-dot {
  background: var(--c3);
  width: 14px; height: 14px;
  box-shadow: 0 0 10px var(--c3d);
  animation: dotPulse3 2s ease-in-out infinite;
}
.tree-col[data-color="4"] .tree-node.active .tree-dot {
  background: var(--c4);
  width: 14px; height: 14px;
  box-shadow: 0 0 10px var(--c4d);
  animation: dotPulse4 2s ease-in-out infinite;
}
@keyframes dotPulse1 {
  0%, 100% { box-shadow: 0 0 6px var(--c1d); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--c1d); transform: scale(1.25); }
}
@keyframes dotPulse2 {
  0%, 100% { box-shadow: 0 0 6px var(--c2d); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--c2d); transform: scale(1.25); }
}
@keyframes dotPulse3 {
  0%, 100% { box-shadow: 0 0 6px var(--c3d); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--c3d); transform: scale(1.25); }
}
@keyframes dotPulse4 {
  0%, 100% { box-shadow: 0 0 6px var(--c4d); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--c4d); transform: scale(1.25); }
}

.tree-node.done .tree-dot { background: var(--s600); opacity: .5; }

.tree-check {
  font-size: 10px;
  color: var(--s500);
  margin-left: auto;
  flex-shrink: 0;
  padding-right: 2px;
}

/* collapsed summary for non-active modules */
.tree-collapsed {
  padding: 8px 14px;
  font-size: 11.5px;
  color: var(--s500);
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  margin-top: 4px;
  cursor: pointer;
  transition: all .2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tree-collapsed:hover {
  color: var(--s400);
  background: var(--surface-hi);
}
.tree-collapsed .tc-icon {
  font-size: 10px;
  opacity: .6;
}

/* ============================================================
   CONTENT DASHBOARD (2-column)
   ============================================================ */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 16px;
  margin-top: 18px;
}

.panel {
  background: var(--glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 18px 20px;
  overflow: hidden;
}

/* content fade+slide animation (animation 8) */
.panel-content {
  opacity: 1;
  transform: translateY(0);
  transition: opacity .3s ease, transform .3s ease;
}
.panel-content.fading {
  opacity: 0;
  transform: translateY(10px);
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--s200);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-title .pt-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}
.panel-title .pt-badge {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  color: var(--s500);
  background: var(--s800);
  padding: 2px 8px;
  border-radius: 4px;
}

/* summary text block */
.summary-text {
  font-size: 13px;
  line-height: 1.72;
  color: var(--s400);
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--glass-border);
}

/* item list */
.item-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.item-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .2s ease;
  position: relative;
  overflow: hidden;
}
.item-row:hover {
  background: var(--surface-hi);
  border-color: var(--glass-border);
}
.item-row .ir-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.item-row .ir-label {
  font-size: 12.5px;
  color: var(--s300);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.item-row .ir-meta {
  font-size: 11px;
  color: var(--s500);
  white-space: nowrap;
}
.item-row .ir-arrow {
  font-size: 14px;
  color: var(--s600);
  transition: color .2s, transform .2s;
  flex-shrink: 0;
  width: 14px;
  text-align: center;
}
.item-row:hover .ir-arrow { color: var(--s400); }
.item-row.expanded .ir-arrow { transform: rotate(90deg); color: var(--s400); }

/* running items shimmer (animation 9) */
.item-row.running::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .03), transparent);
  animation: itemShimmer 2s ease-in-out infinite;
}
@keyframes itemShimmer { 0% { left: -100%; } 60% { left: 150%; } 100% { left: 150%; } }

/* expandable detail panel */
.item-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
  padding: 0 12px;
  font-size: 12px;
  color: var(--s500);
  line-height: 1.65;
  background: rgba(15, 23, 42, .4);
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  margin-top: -2px;
  border: 1px solid transparent;
  border-top: none;
}
.item-detail.open {
  max-height: 140px;
  padding: 10px 12px;
  border-color: var(--glass-border);
}

/* ============================================================
   RIGHT COLUMN — stat cards, activity, live feed
   ============================================================ */
.right-col {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* stat cards grid */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.sc-label {
  font-size: 10px;
  color: var(--s500);
  margin-bottom: 3px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.sc-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--s200);
  margin-bottom: 6px;
  letter-spacing: -.3px;
}
/* stat bar fill animation (animation 7) */
.sc-bar {
  height: 4px;
  border-radius: 2px;
  background: var(--s800);
  overflow: hidden;
}
.sc-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width .6s ease;
}

/* activity breakdown section */
.activity-section { margin-top: 2px; }
.activity-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  font-size: 12px;
}
.activity-row .ar-color {
  width: 10px;
  height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}
.activity-row .ar-label { color: var(--s400); flex: 1; }
.activity-row .ar-val { color: var(--s300); font-weight: 600; min-width: 32px; text-align: right; }
.activity-row .ar-bar {
  flex: 0 0 56px;
  height: 4px;
  border-radius: 2px;
  background: var(--s800);
  overflow: hidden;
}
.activity-row .ar-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0;
  transition: width .6s ease;
}

/* mini live feed (animation 12) */
.live-feed { margin-top: 2px; }
.feed-window {
  height: 108px;
  overflow: hidden;
  position: relative;
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
}
.feed-item {
  position: absolute;
  left: 0;
  right: 0;
  padding: 8px 12px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 11.5px;
  line-height: 1.45;
  opacity: 0;
  transform: translateY(10px);
  transition: all .45s ease;
}
.feed-item.visible { opacity: 1; transform: translateY(0); }
.feed-item.exiting { opacity: 0; transform: translateY(-10px); }
.feed-time {
  color: var(--s600);
  white-space: nowrap;
  flex-shrink: 0;
  font-size: 10.5px;
  margin-top: 1px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
}
.feed-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 4px;
}
.feed-msg { color: var(--s400); flex: 1; }

/* ============================================================
   KEYBOARD HINT
   ============================================================ */
.kbd-hint {
  position: fixed;
  bottom: 12px;
  right: 20px;
  font-size: 10.5px;
  color: var(--s600);
  z-index: 50;
}
.kbd-hint kbd {
  display: inline-block;
  padding: 1px 5px;
  background: var(--s800);
  border: 1px solid var(--glass-border);
  border-radius: 3px;
  font-family: inherit;
  font-size: 10px;
  color: var(--s500);
  margin: 0 2px;
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s700); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--s600); }
</style>
</head>

    const card = document.createElement('div');

    card.dataset.idx = i;

        <div class="mc-dot"></div>
        <div class="mc-label">${m.label}</div>

/* ============================================================
   RENDER: TREE COLUMNS
   ============================================================ */
function renderTreeColumns() {
  const area = document.getElementById('treeArea');
  area.querySelectorAll('.tree-col').forEach(c => c.remove());

  MODULES.forEach((m, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col';
    col.dataset.color = m.color;
    col.dataset.idx = mi;

    const isActive = mi === activeModule;
    const isDone = m.status === 'done';
    const isQueued = m.status === 'queued';

    if (!isActive && isQueued) {
      /* collapsed: queued */
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#9654;</span>
        ${m.subs.length} sub-modules &middot; queued
      </div>`;
    } else if (!isActive && isDone) {
      /* collapsed: done */
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#10003;</span>
        ${m.subs.length} sub-modules &middot; all complete
      </div>`;
    } else {
      /* expanded tree with gutter connectors */
      let html = '<ul class="tree-list">';
      m.subs.forEach((s, si) => {
        const stateCls = s.state === 'active' ? ' active' : s.state === 'done' ? ' done' : '';
        const highlight = (isActive && si === activeSubIdx) ? ' active' : '';
        /* use actual state if not the active module, otherwise use local selection */
        const effectiveCls = isActive ? (si === activeSubIdx ? ' active' : (s.state === 'done' ? ' done' : '')) : stateCls;
        const check = s.state === 'done' ? '<span class="tree-check">&#10003;</span>' : '';
        html += `<li class="tree-node${effectiveCls}" data-sub="${s.id}" data-sidx="${si}"
          onclick="selectSub(${mi}, ${si})">
          <div class="tree-gutter"></div>
          <div class="tree-sub">
            <span class="tree-dot"></span>
            <span>${s.label}</span>
            ${check}
          </div>
        </li>`;
      });
      html += '</ul>';
      col.innerHTML = html;
    }

    area.appendChild(col);

    /* staggered tree grow entrance (animation 10) */
    if (isActive || (!isQueued)) {
      requestAnimationFrame(() => {
        setTimeout(() => {
          col.classList.add('visible');
          col.querySelectorAll('.tree-node').forEach((n, ni) => {
            n.style.transitionDelay = `${ni * 90}ms`;
          });
        }, isActive ? 40 : 180);
      });
    }
  });
}

  const m = MODULES[activeModule];
  return m.subs[activeSubIdx] || m.subs[0];
}

function renderDashboard(animate) {
  const sub = getActiveSub();
  const m = MODULES[activeModule];
  const c = COLORS[m.color - 1];

  if (animate) {
    document.getElementById('leftContent').classList.add('fading');
    document.getElementById('rightContent').classList.add('fading');
    setTimeout(() => renderDashboardInner(sub, m, c), 280);
  } else {
    renderDashboardInner(sub, m, c);
  }
}

function renderDashboardInner(sub, m, c) {
  const leftEl = document.getElementById('leftContent');
  const rightEl = document.getElementById('rightContent');

  let lh = '';
  const stateLabel = sub.state === 'active' ? 'Active' : sub.state === 'done' ? 'Complete' : 'Pending';

    <span class="pt-dot" style="background:${c}"></span>
    ${sub.label}
    <span class="pt-badge">${stateLabel}</span>
  </div>`;
  lh += `<div class="summary-text">${sub.summary}</div>`;
  lh += '<div class="item-list">';
  sub.items.forEach((it, ii) => {
    const dotColor = it.done ? 'var(--s500)' : (it.running ? c : 'var(--s700)');

      <span class="ir-dot" style="background:${dotColor}"></span>
      <span class="ir-label">${it.label}</span>
      <span class="ir-meta">${it.meta}</span>
      <span class="ir-arrow">&#8250;</span>
    </div>
    <div class="item-detail" data-detail="${ii}">${it.detail}</div>`;
  });
  lh += '</div>';
  leftEl.innerHTML = lh;
  leftEl.classList.remove('fading');

  /* ---- RIGHT PANEL ---- */
  let rh = '';

  /* stat cards */
  const stats = getModuleStats(m);

  stats.forEach(st => {
    rh += `<div class="stat-card">
      <div class="sc-label">${st.label}</div>
      <div class="sc-value" style="color:${st.valColor || 'var(--s200)'}">${st.value}</div>
      <div class="sc-bar"><div class="sc-bar-fill" data-width="${st.bar}" style="background:${st.barColor || c}"></div></div>
    </div>`;
  });
  rh += '</div>';

  /* activity breakdown */
  rh += `<div class="activity-section">
    <div class="panel-title" style="margin-top:6px">Activity Breakdown</div>`;
  const acts = getActivityBreakdown(m);
  acts.forEach(a => {
    rh += `<div class="activity-row">
      <span class="ar-color" style="background:${a.color}"></span>
      <span class="ar-label">${a.label}</span>
      <span class="ar-val">${a.value}</span>
      <span class="ar-bar"><span class="ar-bar-fill" data-width="${a.bar}" style="background:${a.color}"></span></span>
    </div>`;
  });
  rh += '</div>';

  /* live feed */
  rh += `<div class="live-feed">
    <div class="panel-title">Live Feed</div>
    <div class="feed-window" id="feedWindow"></div>
  </div>`;

  rightEl.innerHTML = rh;
  rightEl.classList.remove('fading');

  /* animate stat bar fills (animation 7) */
  setTimeout(() => {
    document.querySelectorAll('.sc-bar-fill[data-width]').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
    document.querySelectorAll('.ar-bar-fill[data-width]').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  }, 60);

  startFeed();
}

/* ============================================================
   USER INTERACTIONS
   ============================================================ */
function selectModule(idx) {
  if (idx === activeModule) return;
  activeModule = idx;
  expandedItem = null;

  /* find the "natural" active sub for this module */
  const m = MODULES[idx];
  const naturalIdx = m.subs.findIndex(s => s.state === 'active');
  activeSubIdx = naturalIdx >= 0 ? naturalIdx : 0;

  /* breadcrumb */
  document.getElementById('breadcrumbActive').textContent = m.label;

  /* ring color + progress */
  updateRing();

  renderModuleCards();
  renderTreeColumns();
  renderDashboard(true);
  setTimeout(() => initTreeParticles(), 120);
}

function selectSub(modIdx, subIdx) {
  if (modIdx !== activeModule) {
    activeModule = modIdx;
    document.getElementById('breadcrumbActive').textContent = MODULES[modIdx].label;
    updateRing();
    renderModuleCards();
  }
  activeSubIdx = subIdx;
  expandedItem = null;

  /* update tree highlights */
  const col = document.querySelector(`.tree-col[data-idx="${activeModule}"]`);
  if (col) {
    col.querySelectorAll('.tree-node').forEach(n => {
      const si = parseInt(n.dataset.sidx);
      const s = MODULES[activeModule].subs[si];
      n.classList.remove('active', 'done');
      if (si === activeSubIdx) {
        n.classList.add('active');
      } else if (s && s.state === 'done') {
        n.classList.add('done');
      }
    });
  }

  renderDashboard(true);
  setTimeout(() => initTreeParticles(), 120);
}

function toggleDetail(idx) {
  const detail = document.querySelector(`.item-detail[data-detail="${idx}"]`);
  const row = document.querySelector(`.item-row[data-item="${idx}"]`);
  if (!detail) return;
  if (expandedItem === idx) {
    detail.classList.remove('open');
    if (row) row.classList.remove('expanded');
    expandedItem = null;
  } else {
    document.querySelectorAll('.item-detail.open').forEach(d => d.classList.remove('open'));
    document.querySelectorAll('.item-row.expanded').forEach(r => r.classList.remove('expanded'));
    detail.classList.add('open');
    if (row) row.classList.add('expanded');
    expandedItem = idx;
  }
}

function updateRing() {
  const totalProgress = MODULES.reduce((s, m) => s + m.progress, 0) / MODULES.length;
  const circ = 87.96;
  const fill = document.getElementById('ringFill');
  fill.style.strokeDashoffset = circ * (1 - totalProgress / 100);
  fill.style.stroke = COLORS[MODULES[activeModule].color - 1];
  document.getElementById('ringLabel').textContent = Math.round(totalProgress) + '%';
}

/* keyboard navigation */
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectModule(Math.max(0, activeModule - 1));
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    selectModule(Math.min(MODULES.length - 1, activeModule + 1));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const m = MODULES[activeModule];
    selectSub(activeModule, Math.max(0, activeSubIdx - 1));
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const m = MODULES[activeModule];
    selectSub(activeModule, Math.min(m.subs.length - 1, activeSubIdx + 1));
  }
});

/* ============================================================
   LIVE FEED (animation 12: rotates entries every 5s)
   ============================================================ */
let feedIdx = 0;
let feedInterval = null;

function startFeed() {
  if (feedInterval) clearInterval(feedInterval);
  feedIdx = 0;
  const win = document.getElementById('feedWindow');
  if (!win) return;

  function showBatch() {
    win.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const entry = FEED_ENTRIES[(feedIdx + i) % FEED_ENTRIES.length];
      const fi = document.createElement('div');
      fi.className = 'feed-item';
      fi.style.top = (i * 36) + 'px';
      fi.innerHTML = `
        <span class="feed-time">${entry.time}</span>
        <span class="feed-dot" style="background:${entry.color}"></span>
        <span class="feed-msg">${entry.msg}</span>`;
      win.appendChild(fi);
      setTimeout(() => fi.classList.add('visible'), 40 + i * 70);
    }
  }

  showBatch();
  feedInterval = setInterval(() => {
    const items = win.querySelectorAll('.feed-item');
    items.forEach(it => { it.classList.remove('visible'); it.classList.add('exiting'); });
    setTimeout(() => {
      feedIdx = (feedIdx + 1) % FEED_ENTRIES.length;
      showBatch();
    }, 420);
  }, 5000);
}

/* ============================================================
   HORIZONTAL PARTICLE CANVAS (animation 1)
   Particles flow left-to-right between adjacent module cards
   ============================================================ */
const hCanvas = document.getElementById('particleCanvasH');
const hCtx = hCanvas.getContext('2d');
let hParticles = [];

function resizeHCanvas() {
  const row = document.getElementById('modulesRow');
  hCanvas.width = row.offsetWidth + 48;
  hCanvas.height = row.offsetHeight + 20;
}

class HParticle {
  constructor() { this.reset(); }

  reset() {
    const cards = document.querySelectorAll('.mod-card');
    if (cards.length < 2) return;
    const seg = Math.floor(Math.random() * (cards.length - 1));
    const c1 = cards[seg];
    const c2 = cards[seg + 1];
    const row = document.getElementById('modulesRow');
    const rr = row.getBoundingClientRect();
    const r1 = c1.getBoundingClientRect();
    const r2 = c2.getBoundingClientRect();
    this.sx = r1.right - rr.left + 10;
    this.sy = r1.top - rr.top + r1.height * 0.5 + (Math.random() - 0.5) * 14;
    this.tx = r2.left - rr.left - 10;
    this.x = this.sx;
    this.y = this.sy;
    this.speed = 0.35 + Math.random() * 0.55;
    this.size = 1.2 + Math.random() * 1.6;
    this.color = COLORS[MODULES[seg].color - 1];
    this.alpha = 0.25 + Math.random() * 0.4;
    this.drift = (Math.random() - 0.5) * 0.15;
    this.life = 1;
  }

  update() {
    this.x += this.speed;
    this.y += this.drift;
    if (this.x >= this.tx) {
      this.life -= 0.06;
      this.alpha *= 0.9;
    }
    if (this.life <= 0 || this.alpha < 0.01) this.reset();
  }

  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x + 24, this.y + 10, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    /* faint trail */
    ctx.beginPath();
    ctx.arc(this.x + 24 - 4, this.y + 10, this.size * 0.5, 0, Math.PI * 2);
    ctx.globalAlpha = this.alpha * 0.3;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initHParticles() {
  resizeHCanvas();
  hParticles = [];
  for (let i = 0; i < 35; i++) {
    const p = new HParticle();
    /* stagger across the gap so they are not all clumped */
    if (p.tx > p.sx) {
      p.x = p.sx + Math.random() * (p.tx - p.sx);
    }
    hParticles.push(p);
  }
}

/* ============================================================
   TREE-PATH PARTICLE CANVAS (animation 2)
   L-shaped flow: card -> down vertical -> right into active sub
   Flash on arrival
   ============================================================ */
const tCanvas = document.getElementById('particleCanvasT');
const tCtx = tCanvas.getContext('2d');
let tParticles = [];

function resizeTCanvas() {
  const area = document.getElementById('treeArea');
  tCanvas.width = area.offsetWidth + 48;
  tCanvas.height = area.offsetHeight + 20;
}

class TParticle {
  constructor() { this.alive = false; this.flash = 0; this.reset(); }

  reset() {
    const col = document.querySelector(`.tree-col[data-idx="${activeModule}"]`);
    if (!col) { this.alive = false; return; }
    const activeNode = col.querySelector('.tree-node.active');
    if (!activeNode) { this.alive = false; return; }

    const area = document.getElementById('treeArea');
    const ar = area.getBoundingClientRect();
    const cr = col.getBoundingClientRect();
    const nr = activeNode.getBoundingClientRect();

    /* path: top of column down to active node row, then right */
    this.startX = cr.left - ar.left + 12;
    this.startY = Math.max(cr.top - ar.top - 4, 0);
    this.cornerX = this.startX;
    this.cornerY = nr.top - ar.top + nr.height * 0.5;
    this.endX = nr.left - ar.left + nr.offsetWidth * 0.45;
    this.endY = this.cornerY;

    this.x = this.startX;
    this.y = this.startY;
    this.phase = 0;
    this.speed = 0.8 + Math.random() * 1.6;
    this.size = 1.0 + Math.random() * 1.4;
    this.color = COLORS[MODULES[activeModule].color - 1];
    this.alpha = 0.4 + Math.random() * 0.35;
    this.alive = true;
    this.flash = 0;
  }

  update() {
    if (!this.alive && this.flash <= 0) return this.reset();
    if (this.flash > 0) { this.flash -= 0.04; return; }
    if (this.phase === 0) {
      this.y += this.speed;
      if (this.y >= this.cornerY) { this.y = this.cornerY; this.phase = 1; }
    } else {
      this.x += this.speed;
      if (this.x >= this.endX) { this.flash = 1; this.alive = false; }
    }
  }

  draw(ctx) {
    const ox = 24, oy = 10;
    /* arrival flash */
    if (!this.alive && this.flash > 0) {
      ctx.beginPath();
      ctx.arc(this.endX + ox, this.endY + oy, 5 + (1 - this.flash) * 4, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = this.flash * 0.45;
      ctx.fill();
      ctx.globalAlpha = 1;
      return;
    }
    if (!this.alive) return;
    /* main dot */
    ctx.beginPath();
    ctx.arc(this.x + ox, this.y + oy, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    /* trail */
    const tdx = this.phase === 0 ? 0 : -3;
    const tdy = this.phase === 0 ? -3 : 0;
    ctx.beginPath();
    ctx.arc(this.x + ox + tdx, this.y + oy + tdy, this.size * 0.55, 0, Math.PI * 2);
    ctx.globalAlpha = this.alpha * 0.35;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initTreeParticles() {
  resizeTCanvas();
  tParticles = [];
  for (let i = 0; i < 14; i++) {
    const p = new TParticle();
    /* stagger along the L-path */
    if (p.alive) {
      const vd = Math.max(p.cornerY - p.startY, 1);
      const hd = Math.max(p.endX - p.cornerX, 1);
      const total = vd + hd;
      const pos = Math.random() * total;
      if (pos < vd) {
        p.y = p.startY + pos;
        p.phase = 0;
      } else {
        p.y = p.cornerY;
        p.x = p.cornerX + (pos - vd);
        p.phase = 1;
      }
    }
    tParticles.push(p);
  }
}

/* ============================================================
   MAIN ANIMATION LOOP
   ============================================================ */
function animationLoop() {
  /* horizontal particles */
  hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
  for (let i = 0; i < hParticles.length; i++) {
    hParticles[i].update();
    hParticles[i].draw(hCtx);
  }

  /* tree particles */
  tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
  for (let i = 0; i < tParticles.length; i++) {
    tParticles[i].update();
    tParticles[i].draw(tCtx);
  }

  requestAnimationFrame(animationLoop);
}

/* ============================================================
   RESIZE
   ============================================================ */
let resizeTimer;
function onResize() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    resizeHCanvas();
    resizeTCanvas();
    initHParticles();
    initTreeParticles();
  }, 100);
}

/* ============================================================
   CLOCK + COST TICKER
   ============================================================ */
function startClock() {
  let seconds = 872; /* 14m 32s */
  setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('hTime').textContent = m + 'm ' + String(s).padStart(2, '0') + 's';
    const cost = (2.84 + (seconds - 872) * 0.0032).toFixed(2);
    document.getElementById('hCost').textContent = cost;
  }, 1000);
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  /* set initial active sub to the one with state='active' */
  const m = MODULES[activeModule];
  const ai = m.subs.findIndex(s => s.state === 'active');
  activeSubIdx = ai >= 0 ? ai : 0;

  updateRing();
  renderModuleCards();
  renderTreeColumns();
  renderDashboard(false);
  initHParticles();
  initTreeParticles();
  animationLoop();
  startClock();
  window.addEventListener('resize', onResize);
}

init();
</script>
