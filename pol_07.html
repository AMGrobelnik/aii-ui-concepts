<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pipeline Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0c0e14; --bg-surface: #12151e; --bg-card: #181c28;
  --bg-card-alt: #1a1f2c; --bg-hover: #1f2536; --bg-elevated: #242a3a;
  --border: #262c3e; --border-dim: #1c2030; --border-lite: #303852;
  --text-100: #e4e7ef; --text-200: #a8adc0; --text-300: #6e7590; --text-400: #4a5168;
  --green: #34d399; --green-dim: rgba(52,211,153,0.12); --green-glow: rgba(52,211,153,0.25);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.12); --purple-glow: rgba(167,139,250,0.25);
  --blue: #60a5fa; --blue-dim: rgba(96,165,250,0.12); --blue-glow: rgba(96,165,250,0.25);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,0.12); --orange-glow: rgba(251,146,60,0.25);
  --amber: #fbbf24; --red: #f87171;
  --card-radius: 12px; --radius-sm: 8px; --transition: 200ms ease;
  --header-h: 44px;
}
html { font-size: 14px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg-deep); color: var(--text-200); line-height: 1.5;
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* ── Canvases ────────────────────────────────────────── */
#ambientCanvas, #particleCanvas {
  position: fixed; inset: 0; pointer-events: none;
}
#ambientCanvas { z-index: 0; }
#particleCanvas { z-index: 15; }

/* ── FIXED 44px HEADER ───────────────────────────────── */
.top-header {
  height: var(--header-h); min-height: var(--header-h); max-height: var(--header-h);
  display: flex; align-items: center; padding: 0 20px; gap: 0;
  background: rgba(18,21,30,0.82);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid var(--border-dim);
  position: sticky; top: 0; z-index: 50;
  flex-shrink: 0;
}
.top-header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.12) 20%, rgba(167,139,250,0.10) 50%, rgba(96,165,250,0.12) 80%, transparent);
}

/* Brand */
.hdr-brand {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-right: 16px;
}
.hdr-brand-icon {
  width: 26px; height: 26px; border-radius: 7px;
  background: linear-gradient(135deg, rgba(96,165,250,0.2), rgba(167,139,250,0.2));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
  box-shadow: 0 0 12px rgba(96,165,250,0.08);
}
.hdr-brand-text {
  font-size: 13px; font-weight: 700; color: var(--text-100);
  letter-spacing: -0.4px; white-space: nowrap;
}

/* Separator */
.hdr-sep {
  width: 1px; height: 20px; background: var(--border); margin: 0 12px; flex-shrink: 0;
}

/* Breadcrumb */
.hdr-breadcrumb {
  display: flex; align-items: center; gap: 0; flex-shrink: 1; min-width: 0; overflow: hidden;
}
.hdr-crumb {
  display: flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 6px; font-size: 11px; font-weight: 500;
  white-space: nowrap; cursor: pointer; transition: background 0.18s, color 0.18s;
  color: var(--text-400); position: relative;
}
.hdr-crumb:hover { background: var(--bg-hover); color: var(--text-200); }
.hdr-crumb.active { color: var(--text-100); background: rgba(255,255,255,0.04); }
.hdr-crumb .crumb-icon { font-size: 11px; flex-shrink: 0; }
.hdr-crumb .crumb-dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.hdr-crumb .crumb-dot.done { background: var(--green); }
.hdr-crumb .crumb-dot.running { background: var(--blue); animation: crumbDotPulse 2s ease-in-out infinite; }
.hdr-crumb .crumb-dot.pending { border: 1px solid var(--text-400); }
@keyframes crumbDotPulse {
  0%, 100% { box-shadow: 0 0 3px var(--blue); }
  50% { box-shadow: 0 0 8px var(--blue), 0 0 14px rgba(96,165,250,0.3); }
}
.hdr-crumb-arrow {
  color: var(--text-400); font-size: 9px; margin: 0 2px; flex-shrink: 0;
  opacity: 0.4;
}

/* Run badge */
.hdr-run-badge {
  display: flex; align-items: center; gap: 5px; padding: 3px 10px;
  background: rgba(96,165,250,0.07); border: 1px solid rgba(96,165,250,0.14);
  border-radius: 14px; font-size: 10px; font-weight: 600; color: var(--blue);
  white-space: nowrap; flex-shrink: 0; margin-left: 8px;
}
.hdr-run-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--blue);
  animation: pulseGlow 2s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 4px var(--blue); opacity: 0.6; }
  50% { box-shadow: 0 0 10px var(--blue), 0 0 20px rgba(96,165,250,0.3); opacity: 1; }
}

/* Right cluster: ring, time, cost */
.hdr-right {
  display: flex; align-items: center; gap: 14px; margin-left: auto; flex-shrink: 0;
}
.hdr-ring { width: 28px; height: 28px; position: relative; flex-shrink: 0; }
.hdr-ring svg { width: 100%; height: 100%; }
.hdr-ring .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
.hdr-ring .ring-fill { fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 69.12; }
.hdr-ring .ring-text { fill: var(--text-100); font-size: 7.5px; font-weight: 700; text-anchor: middle; dominant-baseline: central; font-family: 'Inter', sans-serif; }
.hdr-stat {
  display: flex; align-items: center; gap: 5px; font-size: 11px;
  color: var(--text-300); white-space: nowrap; flex-shrink: 0;
}
.hdr-stat .stat-icon { font-size: 11px; opacity: 0.5; }
.hdr-stat .stat-value { font-weight: 600; color: var(--text-200); font-variant-numeric: tabular-nums; }
.hdr-stat .stat-value.cost-value { color: var(--amber); }

/* ── Main Content Area ───────────────────────────────── */
.main-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; position: relative; z-index: 5;
}
.content-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content-inner { padding: 16px 20px 28px; display: flex; flex-direction: column; gap: 14px; }

/* ── Horizontal Module Row ───────────────────────────── */
.modules-row { display: flex; gap: 12px; position: relative; }
.module-col { flex: 1; min-width: 0; position: relative; }

/* ── MODULE CARD ─────────────────────────────────────── */
.module-card {
  width: 100%;
  background: linear-gradient(145deg, rgba(24,28,40,0.75), rgba(26,31,44,0.75));
  backdrop-filter: blur(12px) saturate(1.2);
  -webkit-backdrop-filter: blur(12px) saturate(1.2);
  border: 1px solid var(--border); border-radius: var(--card-radius);
  padding: 14px 16px 12px; cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
}
.module-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: var(--card-radius) 0 0 var(--card-radius); transition: width 0.3s;
}
.module-card[data-color="green"]::before  { background: var(--green); }
.module-card[data-color="purple"]::before { background: var(--purple); }
.module-card[data-color="blue"]::before   { background: var(--blue); }
.module-card[data-color="orange"]::before { background: var(--orange); }
.module-card:hover { transform: translateY(-1px); border-color: var(--border-lite); }
.module-card.active { border-color: rgba(255,255,255,0.1); }
.module-card.active::before { width: 4px; }
.module-card.active[data-color="green"]  { box-shadow: 0 0 24px rgba(52,211,153,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active[data-color="purple"] { box-shadow: 0 0 24px rgba(167,139,250,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active[data-color="blue"]   { box-shadow: 0 0 24px rgba(96,165,250,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active[data-color="orange"] { box-shadow: 0 0 24px rgba(251,146,60,0.1), 0 4px 16px rgba(0,0,0,0.3); }
.module-card.active .card-glow-inner {
  position: absolute; inset: -1px; border-radius: var(--card-radius);
  animation: cardPulse 3s ease-in-out infinite; pointer-events: none;
}
.module-card.active[data-color="green"]  .card-glow-inner { box-shadow: inset 0 0 24px rgba(52,211,153,0.05); }
.module-card.active[data-color="purple"] .card-glow-inner { box-shadow: inset 0 0 24px rgba(167,139,250,0.05); }
.module-card.active[data-color="blue"]   .card-glow-inner { box-shadow: inset 0 0 24px rgba(96,165,250,0.05); }
.module-card.active[data-color="orange"] .card-glow-inner { box-shadow: inset 0 0 24px rgba(251,146,60,0.05); }
@keyframes cardPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Card shimmer */
.card-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(115deg, transparent 28%,
    rgba(255,255,255,0.025) 46%, rgba(255,255,255,0.06) 50%,
    rgba(255,255,255,0.025) 54%, transparent 72%);
  background-size: 250% 100%; animation: shimmerSweep 3.5s ease-in-out infinite;
  pointer-events: none; opacity: 0; border-radius: var(--card-radius);
}
.module-card.active .card-shimmer { opacity: 1; }
@keyframes shimmerSweep { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Card internals */
.card-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.card-icon { font-size: 14px; flex-shrink: 0; }
.card-name { font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.card-status-badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.card-status-badge.done { background: var(--green-dim); color: var(--green); }
.card-status-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.card-status-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(96,165,250,0.2); } }
.card-desc {
  font-size: 11px; color: var(--text-300); line-height: 1.45;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px;
}
.card-metric-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.card-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.card-metric-value { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
.card-mini-ring { width: 26px; height: 26px; flex-shrink: 0; margin-left: auto; }
.card-mini-ring svg { width: 100%; height: 100%; }
.card-mini-ring .mr-track { fill: none; stroke: var(--border); stroke-width: 3; }
.card-mini-ring .mr-fill { fill: none; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 69.12; transition: stroke-dashoffset 0.8s ease; }
.card-mini-ring .mr-text { font-size: 7px; font-weight: 700; text-anchor: middle; dominant-baseline: central; font-family: 'Inter', sans-serif; }
.card-progress-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.card-progress-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.card-sub-summary { font-size: 10px; color: var(--text-400); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.card-sub-summary .chevron { display: inline-block; width: 12px; height: 12px; transition: transform 0.3s; }
.card-sub-summary .chevron svg { width: 100%; height: 100%; stroke: var(--text-400); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.module-col.collapsed .card-sub-summary .chevron { transform: rotate(-90deg); }

/* ── Tree (3-level) ──────────────────────────────────── */
.submods-wrap {
  overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  max-height: 800px; opacity: 1;
}
.module-col.collapsed .submods-wrap { max-height: 0; opacity: 0; }
.submods { padding: 6px 0 0; position: relative; }
.tree-container { position: relative; padding-left: 20px; }
.tree-container::before {
  content: ''; position: absolute; left: 8px; top: 0; width: 1px;
  height: var(--tree-line-h, calc(100% - 16px)); transition: height 0.4s ease;
}
.tree-container[data-color="green"]::before  { background: rgba(52,211,153,0.2); }
.tree-container[data-color="purple"]::before { background: rgba(167,139,250,0.2); }
.tree-container[data-color="blue"]::before   { background: rgba(96,165,250,0.2); }
.tree-container[data-color="orange"]::before { background: rgba(251,146,60,0.2); }
.submod-row {
  height: 30px; display: flex; align-items: center; gap: 8px; position: relative;
  font-size: 11.5px; opacity: 0; transform: translateX(-12px) translateY(3px);
  transition: opacity 0.35s ease, transform 0.35s ease; cursor: pointer; padding-right: 6px; border-radius: 6px;
}
.submod-row.visible { opacity: 1; transform: translateX(0) translateY(0); }
.submod-row:hover { background: rgba(255,255,255,0.02); }
.submod-row::before { content: ''; position: absolute; left: -12px; top: 50%; width: 12px; height: 1px; }
.tree-container[data-color="green"]  .submod-row::before { background: rgba(52,211,153,0.2); }
.tree-container[data-color="purple"] .submod-row::before { background: rgba(167,139,250,0.2); }
.tree-container[data-color="blue"]   .submod-row::before { background: rgba(96,165,250,0.2); }
.tree-container[data-color="orange"] .submod-row::before { background: rgba(251,146,60,0.2); }
.submod-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; position: relative; transition: all 0.3s; }
.submod-dot.done { background: var(--green); opacity: 0.65; }
.submod-dot.running { background: var(--blue); animation: subDotPulse 2s ease-in-out infinite; box-shadow: 0 0 8px rgba(96,165,250,0.5); }
@keyframes subDotPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 6px rgba(96,165,250,0.3); }
  50% { transform: scale(1.25); box-shadow: 0 0 14px rgba(96,165,250,0.6); }
}
.submod-dot.pending { background: transparent; border: 1.5px solid var(--text-400); opacity: 0.45; }
.submod-spinner { width: 14px; height: 14px; flex-shrink: 0; animation: spinRotate 1s linear infinite; }
.submod-spinner svg { width: 100%; height: 100%; }
@keyframes spinRotate { to { transform: rotate(360deg); } }
.submod-label { color: var(--text-300); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.submod-row.active-sub .submod-label { color: var(--text-100); font-weight: 500; }
.submod-row.done-sub .submod-label { color: var(--text-300); }
.submod-meta { margin-left: auto; font-size: 10px; font-weight: 600; color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* Level 3 */
.level3-wrap { padding-left: 22px; position: relative; overflow: hidden; max-height: 300px; }
.level3-wrap::before { content: ''; position: absolute; left: 10px; top: 0; width: 1px; height: calc(100% - 12px); }
.tree-container[data-color="green"]  .level3-wrap::before { background: rgba(52,211,153,0.12); }
.tree-container[data-color="purple"] .level3-wrap::before { background: rgba(167,139,250,0.12); }
.tree-container[data-color="blue"]   .level3-wrap::before { background: rgba(96,165,250,0.12); }
.tree-container[data-color="orange"] .level3-wrap::before { background: rgba(251,146,60,0.12); }
.level3-item {
  height: 24px; display: flex; align-items: center; gap: 7px; font-size: 10.5px;
  color: var(--text-400); position: relative; padding-left: 4px;
  opacity: 0; transform: translateX(-8px); transition: opacity 0.25s ease, transform 0.25s ease;
}
.level3-item.visible { opacity: 1; transform: translateX(0); }
.level3-item::before { content: ''; position: absolute; left: -8px; top: 50%; width: 8px; height: 1px; }
.tree-container[data-color="green"]  .level3-item::before { background: rgba(52,211,153,0.12); }
.tree-container[data-color="purple"] .level3-item::before { background: rgba(167,139,250,0.12); }
.tree-container[data-color="blue"]   .level3-item::before { background: rgba(96,165,250,0.12); }
.tree-container[data-color="orange"] .level3-item::before { background: rgba(251,146,60,0.12); }
.level3-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.level3-dot.done { background: var(--green); opacity: 0.5; }
.level3-dot.running { background: var(--blue); animation: l3DotPulse 2s ease-in-out infinite; }
.level3-dot.pending { border: 1px solid var(--text-400); opacity: 0.35; }
@keyframes l3DotPulse {
  0%, 100% { box-shadow: 0 0 3px rgba(96,165,250,0.4); }
  50% { box-shadow: 0 0 8px rgba(96,165,250,0.7); }
}

/* ── Bottom Panels ───────────────────────────────────── */
.bottom-panels { display: flex; gap: 14px; min-height: 300px; }
.dashboard {
  flex: 1; min-width: 0;
  background: rgba(18,21,30,0.72);
  backdrop-filter: blur(10px) saturate(1.2);
  -webkit-backdrop-filter: blur(10px) saturate(1.2);
  border: 1px solid var(--border); border-radius: var(--card-radius);
  padding: 20px; position: relative; overflow: hidden;
}
.dash-enter { animation: dashFadeIn 0.35s ease; }
@keyframes dashFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.dash-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.dash-icon { font-size: 18px; }
.dash-title { font-size: 15px; font-weight: 600; color: var(--text-100); }
.dash-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
.dash-badge.done { background: var(--green-dim); color: var(--green); }
.dash-badge.running { background: var(--blue-dim); color: var(--blue); }
.dash-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }
.dash-summary {
  font-size: 12px; color: var(--text-300); line-height: 1.65;
  margin-bottom: 16px; max-width: 700px; font-style: italic;
}
.dash-stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.dash-stat {
  flex: 1; min-width: 120px; max-width: 200px;
  background: rgba(255,255,255,0.015); border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm); padding: 10px 12px;
}
.dash-stat-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.dash-stat-value { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.dash-stat-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; }
.dash-stat-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.7s ease; }
.dash-items { margin-bottom: 14px; }
.dash-items-title { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.dash-item-row {
  display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 6px;
  font-size: 12px; cursor: pointer; transition: background 0.15s; position: relative; overflow: hidden;
}
.dash-item-row:hover { background: rgba(255,255,255,0.025); }
.dash-item-row.running-item::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent,
    rgba(96,165,250,0.04) 45%, rgba(96,165,250,0.08) 50%,
    rgba(96,165,250,0.04) 55%, transparent);
  background-size: 200% 100%; animation: rowShimmer 2.5s ease-in-out infinite;
  pointer-events: none; border-radius: 6px;
}
@keyframes rowShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.dash-item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dash-item-dot.done { background: var(--green); }
.dash-item-dot.running { background: var(--blue); animation: itemPulse 1.5s ease-in-out infinite; }
.dash-item-dot.pending { border: 1px solid var(--text-400); }
@keyframes itemPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
.dash-item-name { color: var(--text-300); }
.dash-item-meta { margin-left: auto; font-size: 10px; color: var(--text-400); font-variant-numeric: tabular-nums; }

/* ── Hypothesis details section ──────────────────────── */
.dash-hypo-section { margin-bottom: 14px; }
.dash-hypo-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.dash-hypo-title-row .section-label {
  font-size: 10px; color: var(--text-400); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 600;
}
.dash-hypo-score-bar {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.dash-hypo-score-track {

      </div>
      <div class="card-desc">${mod.desc}</div>
      <div class="card-metric-row">
        <span class="card-metric-label">${mod.metric.label}</span>
        <span class="card-metric-value" style="color:var(--${mod.color})">${mod.metric.value}</span>
        <div class="card-mini-ring">
          <svg viewBox="0 0 28 28">
            <circle class="mr-track" cx="14" cy="14" r="11"/>
            <circle class="mr-fill" cx="14" cy="14" r="11"
              stroke="${ringCol}" stroke-dashoffset="${ringOff}"
              transform="rotate(-90 14 14)"/>
            <text class="mr-text" x="14" y="14" fill="var(--text-200)">${pct}%</text>
          </svg>
        </div>
      </div>
      <div class="card-progress-bar">
        <div class="card-progress-fill" style="background:var(--${mod.color})" data-pct="${pct}"></div>
      </div>
      <div class="card-sub-summary" data-collapse-toggle="${mi}">
        <span class="chevron"><svg viewBox="0 0 12 12"><polyline points="3 4 6 8 9 4"/></svg></span>
        ${mod.subLabel}
      </div>`;

    card.addEventListener('click', (e) => {
      if (e.target.closest('[data-collapse-toggle]')) {
        toggleCollapse(mi);
        e.stopPropagation();
        return;
      }
      selectModule(mi);
    });

    col.appendChild(card);
    cardEls.push(card);

    // Sub-modules tree
    const subsWrap = document.createElement('div');
    subsWrap.className = 'submods-wrap';
    const subsDiv = document.createElement('div');
    subsDiv.className = 'submods';
    const tree = document.createElement('div');
    tree.className = 'tree-container';
    tree.dataset.color = mod.color;

    const sEls = [];
    mod.subs.forEach((sub, si) => {
      const sr = document.createElement('div');
      sr.className = 'submod-row';
      if (sub.status === 'done') sr.classList.add('done-sub');
      if (sub.status === 'running') sr.classList.add('active-sub');
      const spinner = sub.status === 'running'
        ? '<span class="submod-spinner"><svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="rgba(96,165,250,0.25)" stroke-width="1.5"/><path d="M 7 1.5 A 5.5 5.5 0 0 1 12.5 7" stroke="var(--blue)" stroke-width="1.5" stroke-linecap="round"/></svg></span>'
        : '';
      sr.innerHTML = `
        <span class="submod-dot ${sub.status}"></span>
        <span class="submod-label">${sub.label}</span>
        ${spinner}
        ${sub.meta ? `<span class="submod-meta">${sub.meta}</span>` : ''}`;
      tree.appendChild(sr);
      sEls.push(sr);

      // Level 3
      if (sub.children && sub.children.length > 0) {
        const l3w = document.createElement('div');
        l3w.className = 'level3-wrap';
        sub.children.forEach(ch => {
          const l3 = document.createElement('div');
          l3.className = 'level3-item';
          l3.innerHTML = `<span class="level3-dot ${ch.status}"></span><span>${ch.label}</span>`;
          l3w.appendChild(l3);
        });
        tree.appendChild(l3w);
      }
    });

    subsDiv.appendChild(tree);
    subsWrap.appendChild(subsDiv);
    col.appendChild(subsWrap);
    subEls.push(sEls);
    treeContainerEls.push(tree);
    row.appendChild(col);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.card-progress-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
  animateSubEntrance(activeIdx);
  MODULES.forEach((m, mi) => {
    if (mi !== activeIdx) subEls[mi].forEach(el => el.classList.add('visible'));
  });
  requestAnimationFrame(() => {
    document.querySelectorAll('.level3-item').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 100 + i * 40);
    });
    requestAnimationFrame(computeTreeLineHeights);
  });
}

function computeTreeLineHeights() {
  treeContainerEls.forEach(tc => {
    const nodes = tc.querySelectorAll('.submod-row, .level3-item');
    if (!nodes.length) return;
    const last = nodes[nodes.length - 1];
    const tcR = tc.getBoundingClientRect();
    const lR = last.getBoundingClientRect();
    tc.style.setProperty('--tree-line-h', Math.max(0, (lR.top + lR.height / 2) - tcR.top) + 'px');
  });
}

function animateSubEntrance(mi) {
  const subs = subEls[mi];
  if (!subs) return;
  subs.forEach((el, i) => {
    el.classList.remove('visible');
    setTimeout(() => el.classList.add('visible'), 60 + i * 55);
  });
}

function selectModule(mi) {
  if (mi === activeIdx) return;
  activeIdx = mi;
  cardEls.forEach((c, i) => c.classList.toggle('active', i === mi));
  updateBreadcrumbActive();
  animateSubEntrance(mi);
  treeParticles = [];
  buildDashboard();
}

function toggleCollapse(mi) {
  const col = cardEls[mi].closest('.module-col');
  if (collapsedSet.has(mi)) {
    collapsedSet.delete(mi);
    col.classList.remove('collapsed');
    animateSubEntrance(mi);
  } else {
    collapsedSet.add(mi);
    col.classList.add('collapsed');
  }
  setTimeout(computeTreeLineHeights, 480);
}

/* ================================================================
   DASHBOARD
   ================================================================ */
function buildDashboard() {
  const dash = document.getElementById('dashboard');
  const mod = MODULES[activeIdx];
  dash.classList.remove('dash-enter');
  void dash.offsetWidth;
  dash.classList.add('dash-enter');
  const cv = `var(--${mod.color})`;
  const rc = resolveColor(mod.color);

  // Artifact items section
  let itemsH = '';
  if (mod.items.length > 0) {
    itemsH = `<div class="dash-items"><div class="dash-items-title">Artifacts</div>
      ${mod.items.map(it => `<div class="dash-item-row ${it.status === 'running' ? 'running-item' : ''}">
        <span class="dash-item-dot ${it.status}"></span>
        <span class="dash-item-name">${it.name}</span>
        <span class="dash-item-meta">${it.meta}</span>
      </div>`).join('')}</div>`;
  }

  // Hypothesis section (for hypothesis loop)
  let hypoH = '';
  if (mod.hypothesis) {
    const hp = mod.hypothesis;
    const pctFill = (hp.score / hp.maxScore) * 100;
    const hColor = hp.score >= 8 ? 'var(--green)' : hp.score >= 6 ? 'var(--amber)' : 'var(--red)';
    hypoH = `<div class="dash-hypo-section">
      <div class="dash-hypo-title-row">
        <span class="section-label">Final Hypothesis</span>
      </div>
      <div class="dash-hypo-score-bar">
        <div class="dash-hypo-score-track">
          <div class="dash-hypo-score-fill" style="background:${hColor}" data-pct="${pctFill}"></div>
        </div>
        <span class="dash-hypo-score-label" style="color:${hColor}">${hp.score} / ${hp.maxScore}</span>
      </div>
      <div class="dash-hypo-text">${hp.text}</div>
    </div>`;
  }

  // KG stats grid (for seed module)
  let kgH = '';
  if (mod.kgStats) {
    const kg = mod.kgStats;
    kgH = `<div class="dash-kg-section">
      <div class="dash-items-title">Knowledge Graph</div>
      <div class="dash-kg-grid">
        <div class="dash-kg-card">
          <div class="kg-value" style="color:${cv}">${kg.entities}</div>
          <div class="kg-label">Entities</div>
          <div class="kg-bar"><div class="kg-bar-fill" style="background:${cv}" data-pct="${(kg.entities/kg.entityCap)*100}"></div></div>
        </div>
        <div class="dash-kg-card">
          <div class="kg-value" style="color:${cv}">${kg.relations}</div>
          <div class="kg-label">Relations</div>
          <div class="kg-bar"><div class="kg-bar-fill" style="background:${cv}" data-pct="${(kg.relations/kg.relationCap)*100}"></div></div>
        </div>
        <div class="dash-kg-card">
          <div class="kg-value" style="color:${cv}">${kg.accuracy}%</div>
          <div class="kg-label">Accuracy</div>
          <div class="kg-bar"><div class="kg-bar-fill" style="background:${cv}" data-pct="${kg.accuracy}"></div></div>
        </div>
      </div>
    </div>`;
  }

  // Iteration history table (for hypo module)
  let iterH = '';
  if (mod.iterHistory) {
    const rows = mod.iterHistory.map(r => {
      const deltaStr = r.delta !== null
        ? `<span class="iter-delta ${r.delta >= 0 ? 'positive' : 'negative'}">${r.delta >= 0 ? '+' : ''}${r.delta.toFixed(1)}</span>`
        : '';
      const sColor = r.score >= 8 ? 'var(--green)' : r.score >= 7 ? 'var(--amber)' : 'var(--purple)';
      return `<tr>
        <td>${r.iter}</td>
        <td><span class="iter-score" style="color:${sColor}">${r.score}</span>${deltaStr}</td>
        <td>${r.action}</td>
      </tr>`;
    }).join('');
    iterH = `<div class="dash-iter-section">
      <div class="dash-items-title">Iteration History</div>
      <table class="dash-iter-table">
        <thead><tr><th>Iteration</th><th>Score</th><th>Action</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // Token usage bars
  let tokH = '';
  if (mod.tokenBars) {
    const maxTok = Math.max(...mod.tokenBars.map(b => b.inTok + b.outTok));
    const barGroups = mod.tokenBars.map(b => {
      const inH = Math.round((b.inTok / maxTok) * 36);
      const outH = Math.round((b.outTok / maxTok) * 36);
      return `<div class="dash-token-bar-group">
        <div class="dash-token-bar-wrap">
          <div class="dash-token-bar" style="height:${inH}px;background:${rc};opacity:0.6" title="In: ${b.inTok.toLocaleString()}"></div>
          <div class="dash-token-bar" style="height:${outH}px;background:${rc};opacity:0.3" title="Out: ${b.outTok.toLocaleString()}"></div>
        </div>
        <span class="dash-token-bar-label">${b.label}</span>
      </div>`;
    }).join('');
    tokH = `<div class="dash-tokens-section">
      <div class="dash-items-title">Token Usage <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;color:var(--text-400)">(in/out per step)</span></div>
      <div class="dash-tokens-row">${barGroups}</div>
    </div>`;
  }

  dash.innerHTML = `
    <div class="dash-header">
      <span class="dash-icon">${mod.icon}</span>
      <span class="dash-title">${mod.title}</span>
      <span class="dash-badge ${mod.status}">
        ${mod.status === 'done' ? 'Complete' : mod.status === 'running' ? 'Running' : 'Pending'}
      </span>
    </div>
    <div class="dash-summary">"${mod.summary}"</div>
    ${hypoH}
    ${kgH}
    ${iterH}
    <div class="dash-stats-row">
      <div class="dash-stat">
        <div class="dash-stat-label">Duration</div>
        <div class="dash-stat-value" style="color:${cv}">${mod.stats.duration}</div>
        <div class="dash-stat-bar">
          <div class="dash-stat-bar-fill" style="background:${cv}" data-pct="${mod.stats.durationPct}"></div>
        </div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Cost</div>
        <div class="dash-stat-value" style="color:${cv}">${mod.stats.cost}</div>
        <div class="dash-stat-bar">
          <div class="dash-stat-bar-fill" style="background:${cv}" data-pct="${mod.stats.costPct}"></div>
        </div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Messages</div>
        <div class="dash-stat-value" style="color:${cv};font-size:14px;margin-top:4px">${mod.stats.messages}</div>
      </div>
    </div>
    ${tokH}
    ${itemsH}`;

  requestAnimationFrame(() => {
    dash.querySelectorAll('.dash-stat-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
    dash.querySelectorAll('.dash-hypo-score-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
    dash.querySelectorAll('.kg-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
}

/* ================================================================
   AMBIENT CANVAS
   ================================================================ */
function initAmbientCanvas() {
  aCanvas = document.getElementById('ambientCanvas');
  aCtx = aCanvas.getContext('2d');
  resizeAmbient();
  const pal = ['#60a5fa', '#a78bfa', '#34d399', '#fb923c'];
  for (let i = 0; i < 45; i++) {
    ambientParticles.push({
      x: Math.random() * aCanvas.width,
      y: Math.random() * aCanvas.height,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      size: 0.8 + Math.random() * 1.4,
      alpha: 0.05 + Math.random() * 0.08,
      color: pal[Math.floor(Math.random() * 4)]
    });
  }
}

function resizeAmbient() {
  aCanvas.width = window.innerWidth;
  aCanvas.height = window.innerHeight;
}

function drawAmbientParticles(dt) {
  aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);
  const w = aCanvas.width, h = aCanvas.height;
  for (const p of ambientParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < -10) p.x = w + 10;
    if (p.x > w + 10) p.x = -10;
    if (p.y < -10) p.y = h + 10;
    if (p.y > h + 10) p.y = -10;
    aCtx.globalAlpha = p.alpha;
    aCtx.beginPath();
    aCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    aCtx.fillStyle = p.color;
    aCtx.fill();
    // Glow halo
    aCtx.globalAlpha = p.alpha * 0.25;
    aCtx.beginPath();
    aCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    aCtx.fill();
  }
  // Constellation lines
  aCtx.lineWidth = 0.5;
  const maxD = 100;
  for (let i = 0; i < ambientParticles.length; i++) {
    for (let j = i + 1; j < ambientParticles.length; j++) {
      const a = ambientParticles[i], b = ambientParticles[j];
      const dx = a.x - b.x, dy = a.y - b.y, dSq = dx * dx + dy * dy;
      if (dSq < maxD * maxD) {
        aCtx.globalAlpha = (1 - Math.sqrt(dSq) / maxD) * 0.03;
        aCtx.beginPath();
        aCtx.moveTo(a.x, a.y);
        aCtx.lineTo(b.x, b.y);
        aCtx.strokeStyle = '#60a5fa';
        aCtx.stroke();
      }
    }
  }
  aCtx.globalAlpha = 1;
}

/* ================================================================
   MAIN PARTICLE CANVAS
   ================================================================ */
function initMainCanvas() {
  pCanvas = document.getElementById('particleCanvas');
  pCtx = pCanvas.getContext('2d');
  resizeMain();
}

function resizeMain() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
  computeTreeLineHeights();
}

/* ── Connector Lines between Cards ───────────────────── */
function drawConnectorLines() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fc = cardEls[i], tc = cardEls[i + 1];
    if (!fc || !tc) continue;
    const fm = MODULES[i], tm = MODULES[i + 1];
    const fr = elRect(fc), tr = elRect(tc);
    const y = fr.top + fr.height / 2;
    const x1 = fr.right + 2, x2 = tr.left - 2;
    if (x2 <= x1) continue;
    const isPend = tm.status === 'pending';
    const col = resolveColor(fm.color);
    pCtx.beginPath();
    pCtx.moveTo(x1, y);
    pCtx.lineTo(x2, y);
    if (isPend) {
      pCtx.strokeStyle = '#262c3e';
      pCtx.globalAlpha = 0.35;
      pCtx.setLineDash([4, 4]);
    } else {
      pCtx.strokeStyle = col;
      pCtx.globalAlpha = 0.2;
      pCtx.setLineDash([]);
    }
    pCtx.lineWidth = 1;
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.globalAlpha = 1;
  }
}

/* ── Connector Particles ─────────────────────────────── */
function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fc = cardEls[i], tc = cardEls[i + 1];
    if (!fc || !tc) continue;
    const fm = MODULES[i], tm = MODULES[i + 1];
    if (fm.status === 'pending' || tm.status === 'pending') continue;
    const fr = elRect(fc), tr = elRect(tc);
    const y = fr.top + fr.height / 2;
    const col = resolveColor(fm.color);
    const isAct = fm.status === 'running' || tm.status === 'running';
    connectorParticles.push({
      x: fr.right,
      y: y + (Math.random() - 0.5) * 4,
      targetX: tr.left,
      speed: isAct ? 50 + Math.random() * 20 : 30 + Math.random() * 15,
      color: col,
      size: isAct ? 2.6 : 1.8,
      alpha: isAct ? 0.7 : 0.3,
      trail: []
    });
  }
}

/* ── Tree Particles ──────────────────────────────────── */
function findRunningSub(mi) {
  for (let i = 0; i < MODULES[mi].subs.length; i++) {
    if (MODULES[mi].subs[i].status === 'running') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  const mi = activeIdx;
  if (collapsedSet.has(mi)) return;
  const si = findRunningSub(mi);
  if (si < 0) return;
  if (!cardEls[mi] || !subEls[mi] || !subEls[mi][si]) return;
  const card = cardEls[mi];
  const subRow = subEls[mi][si];
  const subDot = subRow.querySelector('.submod-dot');
  if (!subDot) return;
  const tc = treeContainerEls[mi];
  if (!tc) return;
  const cR = elRect(card), dR = elRect(subDot), tR = elRect(tc);
  const sX = cR.left + cR.width / 2;
  const sY = cR.bottom;
  const vX = tR.left + 8;
  const bY = dR.top + dR.height / 2;
  const wp = [
    { x: sX, y: sY },
    { x: vX, y: sY + 8 },
    { x: vX, y: bY },
    { x: dR.left + dR.width / 2, y: bY }
  ];
  treeParticles.push({
    waypoints: wp, wpIdx: 0,
    x: wp[0].x, y: wp[0].y,
    speed: 85, color: resolveColor('blue'),
    size: 2.6, alpha: 0.75, trail: []
  });
}

/* ── Burst Particles ─────────────────────────────────── */
function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 * i) / 8 + Math.random() * 0.4;
    const s = 25 + Math.random() * 45;
    burstParticles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 1, decay: 1.4 + Math.random() * 0.6,
      color, size: 2
    });
  }
}

/* ================================================================
   ANIMATION LOOP
   ================================================================ */
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastT) / 1000, 0.05);
  lastT = now;

  // Ambient background
  drawAmbientParticles(dt);

  // Main particle canvas
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  drawConnectorLines();

  // Spawn timers
  connSpawnT += dt;
  if (connSpawnT > 0.9) { connSpawnT = 0; spawnConnectorParticle(); }
  treeSpawnT += dt;
  if (treeSpawnT > 0.55) { treeSpawnT = 0; spawnTreeParticle(); }

  // Draw connector particles
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 14) p.trail.shift();
    // Trail
    if (p.trail.length > 1) {
      pCtx.beginPath();
      pCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) pCtx.lineTo(p.trail[t].x, p.trail[t].y);
      pCtx.strokeStyle = p.color;
      pCtx.globalAlpha = p.alpha * 0.25;
      pCtx.lineWidth = p.size * 0.5;
      pCtx.stroke();
    }
    // Dot
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    // Glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    pCtx.fill();
    pCtx.globalAlpha = 1;
    if (p.x >= p.targetX) connectorParticles.splice(i, 1);
  }

  // Draw tree particles
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }
    const dx = wp.x - p.x, dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 2) { p.x = wp.x; p.y = wp.y; p.wpIdx++; }
    else {
      const st = p.speed * dt;
      p.x += (dx / dist) * st;
      p.y += (dy / dist) * st;
    }
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();
    // Trail segments
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const r = t / p.trail.length;
        pCtx.globalAlpha = r * p.alpha * 0.35;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = p.color;
        pCtx.lineWidth = p.size * 0.5 * r;
        pCtx.stroke();
      }
    }
    // Glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    // Dot
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }

  // Draw burst particles
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) { burstParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.94;
    p.vy *= 0.94;
    pCtx.globalAlpha = p.life * 0.7;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    pCtx.globalAlpha = p.life * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5 * p.life, 0, Math.PI * 2);
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  buildBreadcrumb();
  buildModules();
  buildDashboard();
  buildActivityFeed();
  initAmbientCanvas();
  initMainCanvas();
  startHeaderCounters();
  window.addEventListener('resize', () => {
    resizeAmbient();
    resizeMain();
  });
  lastT = performance.now();
  requestAnimationFrame(animate);
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
