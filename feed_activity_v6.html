<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed v6 — Rounded Pill Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

/* Header */
.fh { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ft { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
.lb { display: inline-flex; align-items: center; gap: 5px; font-size: 8px; font-weight: 800; color: var(--red); background: var(--red-dim); padding: 2px 8px 2px 6px; border-radius: 4px; letter-spacing: .6px; text-transform: uppercase; }
.ld { width: 5px; height: 5px; border-radius: 50%; background: var(--red); animation: bk 1.3s ease-in-out infinite; }
@keyframes bk { 0%,100%{opacity:1} 50%{opacity:.2} }
.fs { max-height: 360px; overflow-y: auto; }
.fs::-webkit-scrollbar { width: 3px; }
.fs::-webkit-scrollbar-track { background: transparent; }
.fs::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

/* Shared time */
.tm { font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; font-weight: 500; flex-shrink: 0; }

/* ============================================================
   V1 — Base rounded pill (the chosen one, exact copy)
   ============================================================ */
.v1 { display: flex; flex-direction: column; gap: 3px; }
.v1 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v1 .row:hover { background: rgba(255,255,255,.02); }
.v1 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v1 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V2 — Slightly bigger pill, bolder text, tighter summary
   ============================================================ */
.v2 { display: flex; flex-direction: column; gap: 3px; }
.v2 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 12px;
  transition: background .12s;
}
.v2 .row:hover { background: rgba(255,255,255,.02); }
.v2 .pill {
  font-size: 8.5px; font-weight: 800; padding: 3px 10px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.v2 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }

/* ============================================================
   V3 — Smaller pill, more gap, lighter summary color
   ============================================================ */
.v3 { display: flex; flex-direction: column; gap: 4px; }
.v3 .row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v3 .row:hover { background: rgba(255,255,255,.02); }
.v3 .pill {
  font-size: 7px; font-weight: 800; padding: 2px 7px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.v3 .tx { color: var(--text-muted); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V4 — Pill + summary, time on far right
   ============================================================ */
.v4 { display: flex; flex-direction: column; gap: 3px; }
.v4 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v4 .row:hover { background: rgba(255,255,255,.02); }
.v4 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v4 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v4 .tm { margin-left: auto; }

/* ============================================================
   V5 — Taller rows, more vertical breathing room
   ============================================================ */
.v5 { display: flex; flex-direction: column; gap: 2px; }
.v5 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 7px; font-size: 11.5px;
  transition: background .12s;
}
.v5 .row:hover { background: rgba(255,255,255,.02); }
.v5 .pill {
  font-size: 8px; font-weight: 700; padding: 3px 9px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v5 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V6 — Hover highlights pill brighter
   ============================================================ */
.v6 { display: flex; flex-direction: column; gap: 3px; }
.v6 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: all .15s;
}
.v6 .row:hover { background: rgba(255,255,255,.02); }
.v6 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
  transition: filter .15s, transform .15s;
}
.v6 .row:hover .pill { filter: brightness(1.4); transform: scale(1.05); }
.v6 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V7 — Summary text brighter (closer to white)
   ============================================================ */
.v7 { display: flex; flex-direction: column; gap: 3px; }
.v7 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v7 .row:hover { background: rgba(255,255,255,.02); }
.v7 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v7 .tx { color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }

/* ============================================================
   V8 — Subtle row border bottom separator
   ============================================================ */
.v8 { display: flex; flex-direction: column; gap: 0; }
.v8 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; font-size: 11.5px;
  transition: background .12s;
  border-bottom: 1px solid rgba(148,163,184,.04);
}
.v8 .row:last-child { border-bottom: none; }
.v8 .row:hover { background: rgba(255,255,255,.02); }
.v8 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v8 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V9 — Pill with subtle outer glow
   ============================================================ */
.v9 { display: flex; flex-direction: column; gap: 3px; }
.v9 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v9 .row:hover { background: rgba(255,255,255,.02); }
.v9 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v9 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   V10 — Pill + dot before time, subtle row highlight on odd
   ============================================================ */
.v10 { display: flex; flex-direction: column; gap: 2px; }
.v10 .row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: background .12s;
}
.v10 .row:nth-child(odd) { background: rgba(255,255,255,.008); }
.v10 .row:hover { background: rgba(255,255,255,.025); }
.v10 .pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px; flex-shrink: 0;
}
.v10 .dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; opacity: .5; }
.v10 .tx { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Activity Feed v6 — Rounded Pill Variants</div>
  <div class="page-sub">Agent 3 — 10 tweaks on the rounded pill style. Real 30-50ch summaries.</div>
</div>

<div class="grid" id="grid"></div>

<script>
const E = [
  { time: '12:04', type: 'tool',     text: 'Add head_direction_ratio to regression subset' },
  { time: '12:03', type: 'thinking', text: 'Use absolute paths, inspect full data' },
  { time: '12:02', type: 'tool',     text: 'Read grammar, build treebank set and genre map' },
  { time: '12:01', type: 'result',   text: 'Saved 58KB report, increased to 185KB' },
  { time: '11:58', type: 'metric',   text: 'Track 95k context usage for exp_id3_it2__opus' },
  { time: '11:55', type: 'result',   text: 'Completed 7 turns, 393.8K\u219217.5K, $0.99' },
  { time: '11:51', type: 'warning',  text: 'Remind 112.7 minutes left to finish tasks' },
  { time: '11:47', type: 'warning',  text: 'Retry paper text after timeout, fork resume' },
  { time: '11:42', type: 'result',   text: 'Created pyproject.toml for exp_id1_it2__opus' },
  { time: '11:38', type: 'progress', text: 'Split script into 4 sections, add 4 markdowns' },
];

const C = {
  tool:     { c: 'var(--blue)',   bg: 'var(--blue-dim)',   l: 'tool' },
  result:   { c: 'var(--purple)', bg: 'var(--purple-dim)', l: 'result' },
  progress: { c: 'var(--green)',  bg: 'var(--green-dim)',  l: 'prog' },
  metric:   { c: 'var(--cyan)',   bg: 'var(--cyan-dim)',   l: 'metric' },
  warning:  { c: 'var(--orange)', bg: 'var(--orange-dim)', l: 'warn' },
  thinking: { c: 'var(--purple)', bg: 'var(--purple-dim)', l: 'think' },
};

const GLOW = {
  tool: 'rgba(96,165,250,.35)', result: 'rgba(167,139,250,.35)',
  progress: 'rgba(52,211,153,.35)', metric: 'rgba(34,211,238,.35)',
  warning: 'rgba(251,146,60,.35)', thinking: 'rgba(167,139,250,.35)',
};

function hdr() {
  return `<div class="fh"><span class="ft">Activity</span><span class="lb"><span class="ld"></span> LIVE</span></div>`;
}

function p(e) { return `<span class="pill" style="background:${C[e.type].bg};color:${C[e.type].c}">${C[e.type].l}</span>`; }

function v1() {
  return hdr() + `<div class="fs"><div class="v1">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v2() {
  return hdr() + `<div class="fs"><div class="v2">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v3() {
  return hdr() + `<div class="fs"><div class="v3">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v4() {
  return hdr() + `<div class="fs"><div class="v4">${E.map(e =>
    `<div class="row">${p(e)}<span class="tx">${e.text}</span><span class="tm">${e.time}</span></div>`
  ).join('')}</div></div>`;
}

function v5() {
  return hdr() + `<div class="fs"><div class="v5">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v6() {
  return hdr() + `<div class="fs"><div class="v6">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v7() {
  return hdr() + `<div class="fs"><div class="v7">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v8() {
  return hdr() + `<div class="fs"><div class="v8">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v9() {
  return hdr() + `<div class="fs"><div class="v9">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span><span class="pill" style="background:${C[e.type].bg};color:${C[e.type].c};box-shadow:0 0 8px ${GLOW[e.type]}, 0 0 16px ${GLOW[e.type]}">${C[e.type].l}</span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

function v10() {
  return hdr() + `<div class="fs"><div class="v10">${E.map(e =>
    `<div class="row"><span class="tm">${e.time}</span>${p(e)}<span class="dot" style="background:${C[e.type].c}"></span><span class="tx">${e.text}</span></div>`
  ).join('')}</div></div>`;
}

const V = [
  { n:1, name:'Base — the chosen rounded pill', r:v1 },
  { n:2, name:'Bigger pill, bolder type label', r:v2 },
  { n:3, name:'Smaller pill, wider gaps, muted text', r:v3 },
  { n:4, name:'Pill first, time on far right', r:v4 },
  { n:5, name:'Taller rows, more vertical space', r:v5 },
  { n:6, name:'Hover: pill brightens + scales', r:v6 },
  { n:7, name:'Brighter summary text (near-white)', r:v7 },
  { n:8, name:'Separator lines between rows', r:v8 },
  { n:9, name:'Pill with colored glow halo', r:v9 },
  { n:10, name:'Alternating row tint + small dot', r:v10 },
];

const g = document.getElementById('grid');
V.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div><div class="vbody">${v.r()}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
