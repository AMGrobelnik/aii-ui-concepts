<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor - Simple View (Three-Row Dots)</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface-2: #1a1e2a;
    --border: #252a38;
    --border-lit: #3a4058;
    --text: #e2e4ea;
    --text-dim: #8a8fa3;
    --text-muted: #5a5f73;

    --green: #34d399;
    --green-dim: #065f46;
    --purple: #a78bfa;
    --purple-dim: #4c1d95;
    --blue: #60a5fa;
    --blue-dim: #1e3a5f;
    --gray: #4b5563;
    --amber: #fbbf24;
    --amber-dim: #78350f;
    --rose: #fb7185;
    --rose-dim: #881337;
    --cyan: #22d3ee;
    --cyan-dim: #164e63;

    --row-height-1: 56px;
    --row-height-2: 44px;
    --row-height-3: 40px;
    --content-top-gap: 20px;

    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Top Strip ─── */
  #top-strip {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    transition: height 0.4s var(--ease-out);
  }

  /* Row containers */
  .dot-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    overflow: hidden;
    transition: height 0.35s var(--ease-out), opacity 0.3s ease;
    opacity: 1;
  }
  .dot-row.collapsed {
    height: 0 !important;
    opacity: 0;
    pointer-events: none;
  }

  #row-1 { height: var(--row-height-1); }
  #row-2 { height: var(--row-height-2); border-top: 1px solid var(--border); }
  #row-3 { height: var(--row-height-3); border-top: 1px solid var(--border); }

  /* Breadcrumb hint */
  .row-label {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    user-select: none;
  }

  /* ─── Dot + connector layout ─── */
  .dot-track {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }

  .dot-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    cursor: pointer;
    user-select: none;
    outline: none;
  }
  .dot-unit:focus-visible .dot-circle {
    outline: 2px solid var(--blue);
    outline-offset: 3px;
  }

  .dot-circle {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--gray);
    background: transparent;
    transition: all 0.3s ease;
    position: relative;
    z-index: 2;
    flex-shrink: 0;
  }

  /* Row 1 uses larger dots */
  #row-1 .dot-circle {
    width: 24px;
    height: 24px;
    border-width: 2.5px;
  }

  /* States */
  .dot-unit[data-state="done"] .dot-circle {
    border-color: var(--dot-color, var(--green));
    background: var(--dot-color, var(--green));
  }
  .dot-unit[data-state="active"] .dot-circle {
    border-color: var(--dot-color, var(--blue));
    background: var(--dot-color, var(--blue));
    animation: pulse-dot 2s ease-in-out infinite;
  }
  .dot-unit[data-state="pending"] .dot-circle {
    border-color: var(--gray);
    background: transparent;
  }

  /* Inner ring for active */
  .dot-unit[data-state="active"] .dot-circle::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: 50%;
    background: var(--surface);
  }
  #row-1 .dot-unit[data-state="active"] .dot-circle::after { inset: 4px; }

  /* Glow halo for selected */
  .dot-unit.selected .dot-circle {
    box-shadow: 0 0 12px 4px color-mix(in srgb, var(--dot-color, var(--blue)) 40%, transparent);
  }

  /* Dot label */
  .dot-label {
    font-size: 0.6rem;
    margin-top: 3px;
    color: var(--text-dim);
    white-space: nowrap;
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }
  .dot-unit.selected .dot-label { color: var(--text); font-weight: 600; }
  #row-1 .dot-label { font-size: 0.68rem; margin-top: 4px; }

  /* Status icons on labels */
  .dot-label .status-icon {
    font-size: 0.55rem;
    margin-left: 2px;
  }

  /* Connectors between dots */
  .dot-connector {
    width: 40px;
    height: 2px;
    position: relative;
    flex-shrink: 0;
    z-index: 1;
  }
  #row-1 .dot-connector { width: 64px; }
  .dot-connector::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gray);
    border-radius: 1px;
    transition: background 0.3s ease;
  }
  .dot-connector.lit::after {
    background: linear-gradient(90deg, var(--from-color, var(--green)), var(--to-color, var(--green)));
  }

  /* ─── Content Area ─── */
  #content-area {
    max-width: 840px;
    margin: 0 auto;
    padding: var(--content-top-gap) 24px 60px;
    animation: fadeUp 0.4s var(--ease-out);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content-panel {
    display: none;
    animation: fadeUp 0.35s var(--ease-out);
  }
  .content-panel.visible { display: block; }

  /* Card components */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s ease;
  }
  .card:hover { border-color: var(--border-lit); }
  .card h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h3 .badge {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .card p, .card li {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .card ul { padding-left: 18px; margin-top: 6px; }
  .card li { margin-bottom: 4px; }

  .badge-green  { background: var(--green-dim); color: var(--green); }
  .badge-purple { background: var(--purple-dim); color: var(--purple); }
  .badge-blue   { background: var(--blue-dim); color: var(--blue); }
  .badge-amber  { background: var(--amber-dim); color: var(--amber); }
  .badge-rose   { background: var(--rose-dim); color: var(--rose); }
  .badge-cyan   { background: var(--cyan-dim); color: var(--cyan); }
  .badge-gray   { background: #1f2937; color: var(--text-muted); }

  /* Metric row */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .metric-box {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    text-align: center;
  }
  .metric-box .val {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1;
  }
  .metric-box .lbl {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Log-like display */
  .log-lines {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    line-height: 1.8;
    max-height: 200px;
    overflow-y: auto;
    color: var(--text-dim);
  }
  .log-lines .ts { color: var(--green); }
  .log-lines .lvl { color: var(--amber); }
  .log-lines .fn { color: var(--cyan); }
  .log-lines .msg { color: var(--text-dim); }

  /* Key nav hint bar */
  #nav-hints {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 36px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    font-size: 0.68rem;
    color: var(--text-muted);
    z-index: 100;
  }
  .nav-key {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .nav-key kbd {
    display: inline-block;
    padding: 1px 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: inherit;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  /* Pulse animation */
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--dot-color, var(--blue)) 50%, transparent); }
    50%      { box-shadow: 0 0 10px 4px color-mix(in srgb, var(--dot-color, var(--blue)) 25%, transparent); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Small status table */
  .status-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
    margin-top: 8px;
  }
  .status-table th {
    text-align: left;
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .status-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
  }
  .status-table tr:last-child td { border-bottom: none; }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  /* Responsive */
  @media (max-width: 640px) {
    #row-1 .dot-connector { width: 36px; }
    .dot-connector { width: 24px; }
    #row-1 .dot-circle { width: 20px; height: 20px; }
    .dot-circle { width: 14px; height: 14px; }
    .dot-label { font-size: 0.55rem; }
    #content-area { padding: var(--content-top-gap) 14px 60px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- TOP STRIP: Three rows of dots                              -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="top-strip">

  <div class="dot-row" id="row-1">
    <span class="row-label">Module</span>
    <div class="dot-track" id="track-1"></div>
  </div>

  <!-- ROW 2: Iteration dots (visible when module selected) -->
  <div class="dot-row collapsed" id="row-2">
    <span class="row-label">Iteration</span>
    <div class="dot-track" id="track-2"></div>
  </div>

  <!-- ROW 3: Sub-step dots (visible when iteration selected) -->
  <div class="dot-row collapsed" id="row-3">
    <span class="row-label">Step</span>
    <div class="dot-track" id="track-3"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- CONTENT AREA                                               -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="content-area"></div>

<!-- ═══════════════════════════════════════════════════════════ -->
<!-- KEYBOARD NAV HINTS                                         -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div id="nav-hints">
  <span class="nav-key"><kbd>&larr;</kbd><kbd>&rarr;</kbd> Navigate</span>
  <span class="nav-key"><kbd>&darr;</kbd> Drill in</span>
  <span class="nav-key"><kbd>&uarr;</kbd> Go back</span>
  <span class="nav-key"><kbd>Esc</kbd> Top level</span>
</div>

// STATE
// ═════════════════════════════════════════════════════════════

const state = {
  activeRow: 1,          // 1, 2, or 3
  selectedModule: null,  // index into DATA.modules
  selectedIter: null,    // index into module.iterations
  selectedStep: null,    // index into iteration.steps
  // highlight (cursor) within each row
  cursor: { 1: 0, 2: 0, 3: 0 },
};

// ═════════════════════════════════════════════════════════════
// RENDERING
// ═════════════════════════════════════════════════════════════

function buildDotHTML(items, parentColor) {
  let html = '';
  items.forEach((item, i) => {
    if (i > 0) {
      // connector
      const prev = items[i - 1];
      const fromDone = prev.state === 'done' || prev.state === 'active';
      const toDone   = item.state === 'done' || item.state === 'active';
      const lit = fromDone && toDone;
      const fromCol = parentColor || colorForState(prev);
      const toCol   = parentColor || colorForState(item);
      html += `<div class="dot-connector ${lit ? 'lit' : ''}" style="--from-color:${fromCol};--to-color:${toCol}"></div>`;
    }
    const color = parentColor || colorForState(item);
    const stateIcon = item.state === 'done' ? ' <span class="status-icon">&#10003;</span>'
                    : item.state === 'active' ? ' <span class="status-icon">&#9654;</span>'
                    : '';
    html += `<div class="dot-unit" tabindex="0" data-index="${i}" data-state="${item.state}" style="--dot-color:${color}">
      <div class="dot-circle"></div>
      <div class="dot-label">${item.label}${stateIcon}</div>
    </div>`;
  });
  return html;
}

function colorForState(item) {
  if (item.color) return item.color;
  switch (item.state) {
    case 'done':   return 'var(--green)';
    case 'active': return 'var(--blue)';
    default:       return 'var(--gray)';
  }
}

function renderRow1() {
  const track = document.getElementById('track-1');
  track.innerHTML = buildDotHTML(DATA.modules, null);
  attachDotListeners(track, 1);
  highlightCursor(1);
}

function renderRow2() {
  const row = document.getElementById('row-2');
  const track = document.getElementById('track-2');

  if (state.selectedModule === null) {
    row.classList.add('collapsed');
    track.innerHTML = '';
    return;
  }

  const mod = DATA.modules[state.selectedModule];
  if (!mod.iterations || mod.iterations.length === 0) {
    // Single-dot for modules with no iterations (like Seed or Paper)
    if (mod.iterations.length === 0 && mod.state !== 'pending') {
      const single = [{ id: mod.id + '-run', label: 'Single Run', state: mod.state }];
      track.innerHTML = buildDotHTML(single, mod.color);
    } else {
      row.classList.add('collapsed');
      track.innerHTML = '';
      return;
    }
  } else {
    track.innerHTML = buildDotHTML(mod.iterations, mod.color);
  }

  row.classList.remove('collapsed');
  attachDotListeners(track, 2);
  highlightCursor(2);
}

function renderRow3() {
  const row = document.getElementById('row-3');
  const track = document.getElementById('track-3');

  if (state.selectedIter === null || state.selectedModule === null) {
    row.classList.add('collapsed');
    track.innerHTML = '';
    return;
  }

  const mod = DATA.modules[state.selectedModule];
  const iter = mod.iterations[state.selectedIter];
  if (!iter || !iter.steps || iter.steps.length === 0) {
    row.classList.add('collapsed');
    track.innerHTML = '';
    return;
  }

  const parentColor = mod.color;
  track.innerHTML = buildDotHTML(iter.steps, null);
  row.classList.remove('collapsed');
  attachDotListeners(track, 3);
  highlightCursor(3);
}

function highlightCursor(rowNum) {
  const track = document.getElementById('track-' + rowNum);
  const dots = track.querySelectorAll('.dot-unit');
  dots.forEach((d, i) => {
    d.classList.toggle('selected', i === state.cursor[rowNum]);
  });
}

function attachDotListeners(track, rowNum) {
  const dots = track.querySelectorAll('.dot-unit');
  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.index, 10);
      state.cursor[rowNum] = idx;
      selectAtRow(rowNum, idx);
    });
  });
}

function selectAtRow(rowNum, idx) {
  state.cursor[rowNum] = idx;

  if (rowNum === 1) {
    state.selectedModule = idx;
    state.selectedIter = null;
    state.selectedStep = null;
    state.activeRow = 1;
    state.cursor[2] = 0;
    state.cursor[3] = 0;
    renderRow2();
    renderRow3();
    highlightCursor(1);
    renderContent();
  } else if (rowNum === 2) {
    state.selectedIter = idx;
    state.selectedStep = null;
    state.activeRow = 2;
    state.cursor[3] = 0;
    renderRow3();
    highlightCursor(2);
    renderContent();
  } else if (rowNum === 3) {
    state.selectedStep = idx;
    state.activeRow = 3;
    highlightCursor(3);
    renderContent();
  }
}

function renderContent() {
  const area = document.getElementById('content-area');
  let content = null;

  if (state.activeRow === 3 && state.selectedStep !== null) {
    // Sub-step detail
    const mod = DATA.modules[state.selectedModule];
    const iter = mod.iterations[state.selectedIter];
    const step = iter.steps[state.selectedStep];
    content = STEP_CONTENT[step.id];
  } else if (state.activeRow === 2 && state.selectedIter !== null) {
    // Iteration detail
    const mod = DATA.modules[state.selectedModule];
    const iter = mod.iterations[state.selectedIter];
    content = iter.content;
  } else if (state.selectedModule !== null) {
    // Module detail
    const mod = DATA.modules[state.selectedModule];
    content = mod.content;
  }

  if (!content) {
    area.innerHTML = `
      <div class="card" style="text-align:center;padding:40px;">
        <h3 style="color:var(--text-muted)">Select a module to view details</h3>
        <p>Click any dot above or use arrow keys to navigate.</p>
      </div>
    `;
    return;
  }

  area.innerHTML = `
    <div class="content-panel visible">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <h2 style="font-size:1.15rem;font-weight:700;">${content.title}</h2>
        ${content.badge ? `<span class="badge ${content.badge.cls}">${content.badge.text}</span>` : ''}
      </div>
      ${content.body}
    </div>
  `;
}

// ═════════════════════════════════════════════════════════════
// KEYBOARD NAVIGATION
// ═════════════════════════════════════════════════════════════

function getRowItemCount(rowNum) {
  if (rowNum === 1) return DATA.modules.length;
  if (rowNum === 2) {
    if (state.selectedModule === null) return 0;
    const mod = DATA.modules[state.selectedModule];
    return mod.iterations.length || 0;
  }
  if (rowNum === 3) {
    if (state.selectedModule === null || state.selectedIter === null) return 0;
    const mod = DATA.modules[state.selectedModule];
    const iter = mod.iterations[state.selectedIter];
    return iter ? iter.steps.length : 0;
  }
  return 0;
}

function isRowVisible(rowNum) {
  if (rowNum === 1) return true;
  const row = document.getElementById('row-' + rowNum);
  return row && !row.classList.contains('collapsed');
}

document.addEventListener('keydown', (e) => {
  const key = e.key;

  if (key === 'ArrowLeft' || key === 'ArrowRight') {
    e.preventDefault();
    const row = state.activeRow;
    const count = getRowItemCount(row);
    if (count === 0) return;
    const dir = key === 'ArrowRight' ? 1 : -1;
    let next = state.cursor[row] + dir;
    if (next < 0) next = 0;
    if (next >= count) next = count - 1;
    state.cursor[row] = next;
    highlightCursor(row);
    // Also trigger selection to update content
    selectAtRow(row, next);
  }

  if (key === 'ArrowDown') {
    e.preventDefault();
    if (state.activeRow === 1) {
      // Drill from module to iteration
      if (state.selectedModule === null) {
        selectAtRow(1, state.cursor[1]);
      }
      const mod = DATA.modules[state.selectedModule];
      if (mod.iterations && mod.iterations.length > 0) {
        state.activeRow = 2;
        selectAtRow(2, state.cursor[2]);
      }
    } else if (state.activeRow === 2) {
      // Drill from iteration to sub-step
      if (state.selectedIter === null) {
        selectAtRow(2, state.cursor[2]);
      }
      if (isRowVisible(3) && getRowItemCount(3) > 0) {
        state.activeRow = 3;
        selectAtRow(3, state.cursor[3]);
      }
    }
  }

  if (key === 'ArrowUp') {
    e.preventDefault();
    if (state.activeRow === 3) {
      state.activeRow = 2;
      state.selectedStep = null;
      highlightCursor(2);
      // Remove row 3 selection visual
      const track3 = document.getElementById('track-3');
      track3.querySelectorAll('.dot-unit').forEach(d => d.classList.remove('selected'));
      renderContent();
    } else if (state.activeRow === 2) {
      state.activeRow = 1;
      state.selectedIter = null;
      state.selectedStep = null;
      renderRow3();
      highlightCursor(1);
      // Remove row 2 selection visual
      const track2 = document.getElementById('track-2');
      track2.querySelectorAll('.dot-unit').forEach(d => d.classList.remove('selected'));
      renderContent();
    }
  }

  if (key === 'Escape') {
    e.preventDefault();
    state.activeRow = 1;
    state.selectedModule = null;
    state.selectedIter = null;
    state.selectedStep = null;
    renderRow2();
    renderRow3();
    highlightCursor(1);
    renderContent();
  }
});

// ═════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════

function init() {
  renderRow1();
  renderRow2();
  renderRow3();

  // Default: select Invention module (index 2)
  state.cursor[1] = 2;
  selectAtRow(1, 2);
}

init();
</script>
