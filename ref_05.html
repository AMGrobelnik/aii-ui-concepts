<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Simple View</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e1117; --surface: #161b22; --border: #21262d;
    --text: #e6edf3; --text-dim: #7d8590;
    --green: #3fb950; --green-dim: #238636;
    --purple: #a371f7; --purple-dim: #6e40c9;
    --blue: #58a6ff; --blue-dim: #1f6feb;
    --gray: #484f58; --orange: #d29922;
    --ring-track: #21262d; --dot-size: 8px; --ring-size: 32px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; overflow-x: hidden;
  }
  /* Strip container */
  .strip-wrapper {
    width: 100%; max-width: 960px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 32px 18px; margin-bottom: 20px;
  }
  .strip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .strip-title { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .nav-arrows { display: flex; gap: 6px; }
  .nav-btn {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--border); color: var(--text); }
  .nav-btn:active { transform: scale(0.92); }
  /* Dots + Rings strip */
  .strip { display: flex; align-items: center; gap: 0; padding: 4px 0; position: relative; }
  .strip::before {
    content: ""; position: absolute; top: 50%; left: 16px; right: 16px;
    height: 1px; background: var(--border); transform: translateY(-50%); z-index: 0;
  }
  .strip-item { position: relative; z-index: 1; flex-shrink: 0; cursor: pointer; }
  /* Ring gauge */
  .ring-container { display: flex; flex-direction: column; align-items: center; margin: 0 4px; }
  .ring { width: var(--ring-size); height: var(--ring-size); position: relative; transition: transform 0.2s; }
  .ring:hover { transform: scale(1.15); }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--ring-track); stroke-width: 3; }
  .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
  .ring-label {
    font-size: 8px; font-weight: 700; position: absolute;
    top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--text-dim);
  }
  .ring-name {
    font-size: 9px; color: var(--text-dim); margin-top: 6px; white-space: nowrap;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; transition: color 0.2s;
  }
  .ring-container:hover .ring-name { color: var(--text); }
  .ring-container.active .ring-name { color: var(--text); font-weight: 600; }
  .ring-container.active .ring::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid currentColor; opacity: 0; animation: ringPulse 2s ease-in-out infinite;
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0; transform: scale(0.9); }
    50%      { opacity: 0.4; transform: scale(1.05); }
  }
  /* Dots */
  .dot-gap { width: 8px; flex-shrink: 0; }
  .dot { width: var(--dot-size); height: var(--dot-size); border-radius: 50%; transition: all 0.2s; position: relative; }
  .dot:hover { transform: scale(1.5); }
  .dot.complete { background: var(--module-color); opacity: 1; }
  .dot.active   { background: var(--module-color); opacity: 1; }
  .dot.pending  { background: transparent; border: 1.5px solid var(--module-color); opacity: 0.45; }
  .dot.active::after {
    content: ""; position: absolute; top: 50%; left: 50%; width: 24px; height: 24px;
    border-radius: 50%; background: var(--module-color); opacity: 0.25;
    transform: translate(-50%, -50%); animation: dotGlow 2s ease-in-out infinite; pointer-events: none;
  }
  @keyframes dotGlow {
    0%, 100% { opacity: 0.15; transform: translate(-50%, -50%) scale(0.8); }
    50%      { opacity: 0.35; transform: translate(-50%, -50%) scale(1.2); }
  }
  .dots-group { display: flex; align-items: center; gap: 6px; padding: 0 6px; }
  /* Tooltip on dots */
  .dot[data-tip]:hover::before {
    content: attr(data-tip); position: absolute; bottom: calc(100% + 8px); left: 50%;
    transform: translateX(-50%); background: #1c2128; color: var(--text);
    font-size: 11px; padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    border: 1px solid var(--border); pointer-events: none; z-index: 10;
  }
  /* Content area */
  .content-area { width: 100%; max-width: 960px; flex: 1; }
  .module-summary, .step-detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 32px; animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Module summary */
  .mod-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .mod-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .mod-title-block { flex: 1; }
  .mod-title { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
  .mod-subtitle { font-size: 12px; color: var(--text-dim); }
  .mod-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-complete { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-running  { background: rgba(88,166,255,0.15); color: var(--blue); }
  .badge-pending  { background: rgba(72,79,88,0.2); color: var(--text-dim); }
  .step-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .step-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 14px;
    border-radius: 8px; background: rgba(255,255,255,0.02); cursor: pointer; transition: background 0.15s;
  }
  .step-row:hover { background: rgba(255,255,255,0.05); }
  .step-dot-indicator { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .step-dot-indicator.done    { background: var(--green); }
  .step-dot-indicator.running { background: var(--blue); animation: dotGlow 2s infinite; }
  .step-dot-indicator.waiting { border: 1.5px solid var(--gray); }
  .step-name { font-size: 13px; font-weight: 500; flex: 1; }
  .step-duration { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .step-status-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .tag-done    { background: rgba(63,185,80,0.12); color: var(--green); }
  .tag-running { background: rgba(88,166,255,0.12); color: var(--blue); }
  .tag-waiting { background: rgba(72,79,88,0.15); color: var(--text-dim); }
  /* Step detail panel */
  .detail-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .detail-back {
    width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s;
  }
  .detail-back:hover { background: var(--border); color: var(--text); }
  .detail-title { font-size: 15px; font-weight: 600; flex: 1; }
  .detail-module-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
  }
  .detail-kv { display: grid; grid-template-columns: 120px 1fr; gap: 6px 16px; font-size: 13px; }
  .detail-kv dt { color: var(--text-dim); font-weight: 500; }
  .detail-kv dd { color: var(--text); }
  .detail-log {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px; line-height: 1.7; color: var(--text-dim); max-height: 200px; overflow-y: auto;
  }
  .detail-log .log-ts   { color: var(--green-dim); }
  .detail-log .log-info { color: var(--blue); }
  .detail-log .log-warn { color: var(--orange); }
  .detail-output {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; font-size: 13px; line-height: 1.6; color: var(--text);
  }
  .detail-output p { margin-bottom: 8px; }
  .detail-output p:last-child { margin-bottom: 0; }
  .kbd-hint { text-align: center; margin-top: 16px; font-size: 11px; color: var(--text-dim); }
  .kbd-hint kbd {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface); font-family: inherit; font-size: 11px; margin: 0 2px;
  }
  /* Progress bar inside module summary */
  .mod-progress-bar {
    width: 100%; height: 4px; background: var(--border);
    border-radius: 2px; margin-top: 12px; overflow: hidden;
  }
  .mod-progress-fill {
    height: 100%; border-radius: 2px; transition: width 0.6s ease;
  }
  /* Metrics row in step detail */
  .metrics-row {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-top: 6px;
  }
  .metric-card {
    flex: 1; min-width: 120px; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px;
  }
  .metric-label {
    font-size: 10px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .metric-value { font-size: 16px; font-weight: 600; font-variant-numeric: tabular-nums; }
  /* Separator */
  .section-sep {
    border: none; border-top: 1px solid var(--border);
    margin: 20px 0;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ================================================================
     TOP STRIP — Rings + Dots
     ================================================================ -->
<div class="strip-wrapper">
  <div class="strip-header">
    <span class="strip-title">Pipeline Progress</span>
    <div class="nav-arrows">
      <button class="nav-btn" id="navLeft" title="Previous module (Left arrow)">&#8592;</button>
      <button class="nav-btn" id="navRight" title="Next module (Right arrow)">&#8594;</button>
    </div>
  </div>

  <div class="strip" id="strip">
    <!-- Rendered by JS -->
  </div>
</div>

<!-- ================================================================
     CONTENT AREA — Module summary or Step detail
     ================================================================ -->
<div class="content-area" id="contentArea">
  <!-- Rendered by JS -->
</div>

<div class="kbd-hint">
  <kbd>&#8592;</kbd> <kbd>&#8594;</kbd> navigate modules &nbsp;&middot;&nbsp; click ring for summary &nbsp;&middot;&nbsp; click dot for step detail
</div>

<!-- ================================================================
     DATA + LOGIC
     ================================================================ -->
<script>
/* ── Pipeline data ───────────────────────────────── */
const MODULES = [
  {
    id: "seed",
    name: "Seed",
    color: "#3fb950",
    progress: 1.0,
    status: "complete",
    icon: "\uD83C\uDF31",
    description: "Seed hypothesis generation from knowledge graph traversal.",
    steps: [
      { name: "Load Knowledge Graph",     status: "done", duration: "4.2s",  output: "Loaded 1,247 nodes and 3,891 edges. Identified 42 frontier concepts with high novelty scores." },
      { name: "Sample Frontier Nodes",   status: "done", duration: "1.8s",  output: "Sampled 8 frontier node clusters via diversity-weighted selection across materials science, computational biology, and energy storage." },
      { name: "Generate Seed Hypotheses", status: "done", duration: "12.1s", output: "Generated 8 seed hypotheses with core claims, supporting rationale, and testability criteria." },
      { name: "Validate Seeds",           status: "done", duration: "3.4s",  output: "All 8 seeds passed novelty and consistency checks. Forwarding to hypothesis loop." }
    ]
  },
  {
    id: "hypothesis",
    name: "Hypothesis",
    color: "#a371f7",
    progress: 1.0,
    status: "complete",
    icon: "\uD83D\uDD2C",
    description: "Iterative hypothesis refinement with review feedback loops.",
    steps: [
      { name: "Expand Hypotheses",       status: "done", duration: "18.7s", output: "Expanded 8 seeds into 24 detailed variants specifying mechanism, predicted outcome, and boundary conditions." },
      { name: "Review Pass 1",           status: "done", duration: "22.3s", output: "Identified 6 hypotheses with weak mechanistic grounding. Provided structured improvement suggestions." },
      { name: "Revise Hypotheses",       status: "done", duration: "15.9s", output: "Revised 6 flagged hypotheses. Strengthened causal chains and added explicit falsification criteria." },
      { name: "Review Pass 2",           status: "done", duration: "19.1s", output: "Approved 22/24 hypotheses. 2 flagged as overlapping with literature \u2014 merged into stronger variants." },
      { name: "Select Top Hypotheses",   status: "done", duration: "2.4s",  output: "Selected top 5 by composite score (novelty 0.4, feasibility 0.3, impact 0.3). Range: 0.82\u20130.94." },
      { name: "Finalize Hypothesis Set", status: "done", duration: "1.1s",  output: "Finalized 5 hypotheses with domain tags, confidence intervals, and required experimental apparatus." }
    ]
  },
  {
    id: "invention",
    name: "Invention",
    color: "#58a6ff",
    progress: 0.6,
    status: "running",
    icon: "\u2699\uFE0F",
    description: "Core invention loop \u2014 plan generation, paper drafting, and review.",
    steps: [
      { name: "Generate Strategy",        status: "done",    duration: "8.3s",  output: "Strategy for \"Hierarchical meta-learning for few-shot materials property prediction.\" 3 phases: architecture design, synthetic data augmentation, transfer evaluation." },
      { name: "Generate Plan",            status: "done",    duration: "14.6s", output: "12 milestones. Architecture: transformer + graph attention. Datasets: MP-20, OQMD. Evaluation: MAE, R\u00B2, learning curves." },
      { name: "Draft Experimental Setup", status: "done",    duration: "21.4s", output: "4 baseline comparisons, 3 ablation studies, 2 scaling experiments. Estimated compute: 480 GPU-hours (A100)." },
      { name: "Generate Paper Text",      status: "done",    duration: "45.2s", output: "Initial draft: Introduction, Methods (hierarchical meta-learning framework), and preliminary Results with placeholder tables." },
      { name: "Review: Novelty Check",    status: "done",    duration: "16.8s", output: "Passed. Closest work (Chen et al., 2024) uses flat meta-learning without graph attention component." },
      { name: "Review: Methodology",      status: "done",    duration: "18.2s", output: "Passed with suggestions: (1) dropout schedule, (2) random seed protocol, (3) meta-task construction details." },
      { name: "Review: Feasibility",      status: "done",    duration: "11.7s", output: "Passed. All experiments computationally tractable. Datasets publicly available. No ethical concerns." },
      { name: "Revise Paper Text",        status: "running", duration: "32.1s", output: "Incorporating reviewer feedback. Methodology updated with dropout schedule and seed protocol. Working on ablation descriptions." },
      { name: "Generate Figures",        status: "waiting", duration: "\u2014",   output: null },
      { name: "Review: Completeness",    status: "waiting", duration: "\u2014",   output: null },
      { name: "Final Revision",          status: "waiting", duration: "\u2014",   output: null },
      { name: "Export Invention Record", status: "waiting", duration: "\u2014",   output: null }
    ]
  },
  {
    id: "paper",
    name: "Paper",
    color: "#484f58",
    progress: 0.0,
    status: "pending",
    icon: "\uD83D\uDCC4",
    description: "Final paper assembly, visualization generation, and repository packaging.",
    steps: [
      { name: "Generate Artifact Demos",   status: "waiting", duration: "\u2014", output: null },
      { name: "Generate Visualizations",   status: "waiting", duration: "\u2014", output: null },
      { name: "Assemble Full Paper",       status: "waiting", duration: "\u2014", output: null },
      { name: "Generate Repository",       status: "waiting", duration: "\u2014", output: null },
      { name: "Final Quality Check",       status: "waiting", duration: "\u2014", output: null }
    ]
  }
];

/* ── State ───────────────────────────────────────── */
let activeModuleIdx = 2;          // Invention is active
let selectedDot     = null;       // { moduleIdx, stepIdx } or null
let viewMode        = "summary";  // "summary" | "detail"

/* ── Helpers ─────────────────────────────────────── */
function getActiveStepIdx(mod) {
  const idx = mod.steps.findIndex(s => s.status === "running");
  return idx >= 0 ? idx : -1;
}

/* circumference for a ring with radius r */
function ringCircum(r) { return 2 * Math.PI * r; }

/* ── Render strip ────────────────────────────────── */
function renderStrip() {
  const strip = document.getElementById("strip");
  strip.innerHTML = "";

  MODULES.forEach((mod, mi) => {
    /* Ring */
    const rc = document.createElement("div");
    rc.className = "ring-container strip-item" + (mi === activeModuleIdx ? " active" : "");
    rc.style.color = mod.color;

    const r = 12;
    const c = ringCircum(r);
    const offset = c * (1 - mod.progress);
    const pctText = Math.round(mod.progress * 100) + "%";

    rc.innerHTML = `
      <div class="ring" data-module="${mi}">
        <svg viewBox="0 0 32 32">
          <circle class="ring-track" cx="16" cy="16" r="${r}" />
          <circle class="ring-fill" cx="16" cy="16" r="${r}"
            stroke="${mod.color}"
            stroke-dasharray="${c}"
            stroke-dashoffset="${offset}" />
        </svg>
        <span class="ring-label" style="color:${mod.color}">${pctText}</span>
      </div>
      <span class="ring-name">${mod.name}</span>
    `;

    rc.addEventListener("click", () => {
      activeModuleIdx = mi;
      selectedDot = null;
      viewMode = "summary";
      renderStrip();
      renderContent();
    });

    strip.appendChild(rc);

    /* Dots group */
    const dg = document.createElement("div");
    dg.className = "dots-group";

    mod.steps.forEach((step, si) => {
      const dot = document.createElement("div");
      dot.className = "dot strip-item";
      dot.style.setProperty("--module-color", mod.color);
      dot.setAttribute("data-tip", step.name);

      if (step.status === "done")         dot.classList.add("complete");
      else if (step.status === "running") dot.classList.add("active");
      else                                dot.classList.add("pending");

      dot.addEventListener("click", () => {
        activeModuleIdx = mi;
        selectedDot = { moduleIdx: mi, stepIdx: si };
        viewMode = "detail";
        renderStrip();
        renderContent();
      });

      dg.appendChild(dot);
    });

    strip.appendChild(dg);
  });
}

/* ── Render content: module summary ──────────────── */
function renderModuleSummary(mod) {
  const badgeClass = mod.status === "complete" ? "badge-complete"
                   : mod.status === "running"  ? "badge-running"
                   : "badge-pending";
  const badgeText  = mod.status === "complete" ? "Complete"
                   : mod.status === "running"  ? "Running"
                   : "Pending";

  const doneCount = mod.steps.filter(s => s.status === "done").length;
  const total     = mod.steps.length;

  let html = `
    <div class="module-summary" style="--mod-color: ${mod.color}">
      <div class="mod-header">
        <div class="mod-icon" style="background:${mod.color}22; color:${mod.color}">${mod.icon}</div>
        <div class="mod-title-block">
          <div class="mod-title">${mod.name} Module</div>
          <div class="mod-subtitle">${mod.description}</div>
        </div>
        <span class="mod-badge ${badgeClass}">${badgeText} &mdash; ${doneCount}/${total}</span>
      </div>
      <ul class="step-list">
  `;

  mod.steps.forEach((step, si) => {
    const dotCls = step.status === "done" ? "done"
                 : step.status === "running" ? "running"
                 : "waiting";
    const tagCls = step.status === "done" ? "tag-done"
                 : step.status === "running" ? "tag-running"
                 : "tag-waiting";
    const tagTxt = step.status === "done" ? "Done"
                 : step.status === "running" ? "Running"
                 : "Waiting";

    html += `
      <li class="step-row" data-module="${mod.id}" data-step="${si}">
        <span class="step-dot-indicator ${dotCls}" style="--module-color:${mod.color}"></span>
        <span class="step-name">${step.name}</span>
        <span class="step-duration">${step.duration}</span>
        <span class="step-status-tag ${tagCls}">${tagTxt}</span>
      </li>
    `;
  });

  const pct = Math.round(mod.progress * 100);
  html += `
      </ul>
      <div class="mod-progress-bar">
        <div class="mod-progress-fill" style="width:${pct}%; background:${mod.color}"></div>
      </div>
    </div>
  `;
  return html;
}

/* ── Render content: step detail ─────────────────── */
function renderStepDetail(mod, stepIdx) {
  const step = mod.steps[stepIdx];
  const tagCls = step.status === "done" ? "tag-done"
               : step.status === "running" ? "tag-running"
               : "tag-waiting";
  const tagTxt = step.status === "done" ? "Done"
               : step.status === "running" ? "Running"
               : "Waiting";

  const logLines = generateMockLog(mod, step);

  let html = `
    <div class="step-detail">
      <div class="detail-header">
        <button class="detail-back" id="detailBack" title="Back to module summary">&#8592;</button>
        <span class="detail-title">${step.name}</span>
        <span class="detail-module-tag" style="background:${mod.color}22; color:${mod.color}">${mod.name}</span>
        <span class="step-status-tag ${tagCls}">${tagTxt}</span>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Overview</div>
        <dl class="detail-kv">
          <dt>Module</dt>      <dd>${mod.name}</dd>
          <dt>Step</dt>        <dd>${stepIdx + 1} of ${mod.steps.length}</dd>
          <dt>Duration</dt>    <dd>${step.duration}</dd>
          <dt>Status</dt>      <dd style="color:${step.status === 'done' ? 'var(--green)' : step.status === 'running' ? 'var(--blue)' : 'var(--text-dim)'}">${tagTxt}</dd>
        </dl>
      </div>
  `;

  /* Metrics — mock token/cost data */
  const tokens = step.status !== "waiting"
    ? Math.floor(1500 + Math.random() * 9000)
    : 0;
  const cost = (tokens * 0.000015).toFixed(4);
  const model = "claude-opus-4-20250514";

  if (step.status !== "waiting") {
    html += `
      <div class="detail-section">
        <div class="detail-section-title">Metrics</div>
        <div class="metrics-row">
          <div class="metric-card">
            <div class="metric-label">Tokens</div>
            <div class="metric-value" style="color:${mod.color}">${tokens.toLocaleString()}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Cost</div>
            <div class="metric-value" style="color:var(--green)">$${cost}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Model</div>
            <div class="metric-value" style="font-size:11px; color:var(--text-dim)">${model}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Retries</div>
            <div class="metric-value" style="color:var(--text)">0</div>
          </div>
        </div>
      </div>
      <hr class="section-sep">
    `;
  }

  if (step.output) {
    html += `
      <div class="detail-section">
        <div class="detail-section-title">Output</div>
        <div class="detail-output"><p>${step.output}</p></div>
      </div>
    `;
  }

  html += `
      <div class="detail-section">
        <div class="detail-section-title">Log</div>
        <div class="detail-log">${logLines}</div>
      </div>
    </div>
  `;

  return html;
}

/* ── Mock log generator ──────────────────────────── */
function generateMockLog(mod, step) {
  const ts = (s) => {
    const mm = String(Math.floor(s / 60)).padStart(2, "0");
    const ss = String(s % 60).padStart(2, "0");
    return `<span class="log-ts">[${mm}:${ss}]</span>`;
  };

  if (step.status === "waiting") {
    return `${ts(0)} <span class="log-info">INFO</span>  Step queued, waiting for upstream completion.\n`;
  }

  let lines = "";
  const dur = parseFloat(step.duration) || 0;

  lines += `${ts(0)} <span class="log-info">INFO</span>  === ${step.name} ===\n`;
  lines += `${ts(0)} <span class="log-info">INFO</span>  Module: ${mod.name} | Pipeline: ai-inventor\n`;
  lines += `${ts(1)} <span class="log-info">INFO</span>  Loading execution context...\n`;

  if (dur > 10) {
    lines += `${ts(2)} <span class="log-info">INFO</span>  Initializing LLM session (claude-opus-4-20250514)\n`;
    lines += `${ts(3)} <span class="log-info">INFO</span>  System prompt: ${Math.floor(800 + Math.random() * 2000)} tokens\n`;
    lines += `${ts(4)} <span class="log-info">INFO</span>  User prompt: ${Math.floor(1000 + Math.random() * 5000)} tokens\n`;
    lines += `${ts(5)} <span class="log-info">INFO</span>  Sending request to API...\n`;
  }

  if (step.status === "running") {
    lines += `${ts(Math.floor(dur * 0.2))} <span class="log-info">INFO</span>  Response streaming started\n`;
    lines += `${ts(Math.floor(dur * 0.4))} <span class="log-info">INFO</span>  Processing structured output...\n`;
    lines += `${ts(Math.floor(dur * 0.6))} <span class="log-warn">WARN</span>  Rate limit approached (429), backing off 2s\n`;
    lines += `${ts(Math.floor(dur * 0.7))} <span class="log-info">INFO</span>  Resumed after backoff\n`;
    lines += `${ts(Math.floor(dur))} <span class="log-info">INFO</span>  Still running \u2014 awaiting final LLM output\n`;
  } else {
    lines += `${ts(Math.floor(dur * 0.3))} <span class="log-info">INFO</span>  Response received (${Math.floor(500 + Math.random() * 3000)} tokens)\n`;
    lines += `${ts(Math.floor(dur * 0.5))} <span class="log-info">INFO</span>  Validating structured output against schema\n`;
    lines += `${ts(Math.floor(dur * 0.6))} <span class="log-info">INFO</span>  Schema validation passed\n`;
    lines += `${ts(Math.floor(dur * 0.8))} <span class="log-info">INFO</span>  Checkpoint saved to execution store\n`;
    lines += `${ts(Math.floor(dur))} <span class="log-info">INFO</span>  Completed: ${step.name} (${step.duration})\n`;
  }

  return lines;
}

/* ── Render content dispatcher ───────────────────── */
function renderContent() {
  const area = document.getElementById("contentArea");
  const mod  = MODULES[activeModuleIdx];

  if (viewMode === "detail" && selectedDot) {
    area.innerHTML = renderStepDetail(
      MODULES[selectedDot.moduleIdx],
      selectedDot.stepIdx
    );
    /* Back button */
    document.getElementById("detailBack").addEventListener("click", () => {
      viewMode = "summary";
      selectedDot = null;
      renderContent();
    });
  } else {
    area.innerHTML = renderModuleSummary(mod);
    /* Click step rows to drill in */
    area.querySelectorAll(".step-row").forEach(row => {
      row.addEventListener("click", () => {
        const mi = MODULES.findIndex(m => m.id === row.dataset.module);
        const si = parseInt(row.dataset.step, 10);
        selectedDot = { moduleIdx: mi, stepIdx: si };
        viewMode = "detail";
        renderStrip();
        renderContent();
      });
    });
  }
}

/* ── Keyboard navigation ─────────────────────────── */
function navigateModule(delta) {
  const next = activeModuleIdx + delta;
  if (next < 0 || next >= MODULES.length) return;
  activeModuleIdx = next;
  selectedDot = null;
  viewMode = "summary";
  renderStrip();
  renderContent();
}

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft")  navigateModule(-1);
  if (e.key === "ArrowRight") navigateModule(1);
});

document.getElementById("navLeft").addEventListener("click",  () => navigateModule(-1));
document.getElementById("navRight").addEventListener("click", () => navigateModule(1));

/* ── Initial render ──────────────────────────────── */
renderStrip();
renderContent();
</script>
</body>
</html>
