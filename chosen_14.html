<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Chosen 14: Prominent Status Badges</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --surface: #14171f;
    --surface-hover: #1a1e2a;
    --surface-raised: #1e2230;
    --border: #1e2230;
    --border-light: #282d3e;
    --text: #e4e6ec;
    --text-dim: #7a7f91;
    --text-muted: #555a6e;
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --green-glow: rgba(52,211,153,.25);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,.12);
    --blue-glow: rgba(96,165,250,.3);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.10);
    --slate-dim: rgba(75,85,99,.15);
    --slate: #4b5563;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- PARTICLES CANVAS ---- */
  #particles {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* ---- TOP BAR ---- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 56px;
    background: rgba(12,14,20,.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 15px; letter-spacing: -.3px;
  }
  .topbar-brand svg { width: 22px; height: 22px; }
  .topbar-meta {
    display: flex; align-items: center; gap: 24px;
    font-size: 13px; color: var(--text-dim);
  }
  .topbar-meta span { display: flex; align-items: center; gap: 6px; }
  .topbar-pill {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 12px; font-weight: 500;
    color: var(--text); font-size: 13px;
  }

  /* ---- LAYOUT: SIDEBAR + MAIN ---- */
  .layout {
    display: flex; min-height: calc(100vh - 56px);
    position: relative; z-index: 1;
  }

  /* ---- RING SIDEBAR ---- */
  .ring-sidebar {
    width: 340px; min-width: 340px;
    border-right: 1px solid var(--border);
    padding: 32px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 28px;
    background: rgba(14,17,25,.6);
  }
  .rings-wrap {
    position: relative;
    width: 280px; height: 280px;
  }
  .rings-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .rings-center .pct {
    font-size: 46px; font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .rings-center .label {
    font-size: 11px; color: var(--text-dim);
    margin-top: 2px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .6px;
  }

  /* ---- SIDEBAR MODULE LIST ---- */
  .sidebar-modules {
    width: 100%; display: flex; flex-direction: column; gap: 8px;
  }
  .sidebar-module-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .2s, border-color .2s, transform .15s;
  }
  .sidebar-module-item:hover {
    background: var(--surface-hover);
    border-color: var(--border-light);
    transform: translateX(3px);
  }
  .sidebar-module-item.active {
    border-color: var(--blue);
    background: var(--blue-dim);
  }

  /* --- LARGE STATUS BADGE (module card level) --- */
  .module-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 8px;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .5px;
    white-space: nowrap; flex-shrink: 0;
  }
  .module-badge.complete {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(52,211,153,.2);
  }
  .module-badge.running {
    background: var(--blue-dim);
    color: var(--blue);
    border: 1px solid rgba(96,165,250,.2);
    position: relative;
    overflow: hidden;
  }
  .module-badge.running::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(96,165,250,.15), transparent);
    animation: shimmerBadge 2s ease-in-out infinite;
  }
  .module-badge.pending {
    background: var(--slate-dim);
    color: var(--slate);
    border: 1px solid rgba(75,85,99,.2);
  }

  /* spinner inside running badge */
  .badge-spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(96,165,250,.25);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes shimmerBadge {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .module-info { flex: 1; min-width: 0; }
  .module-name { font-size: 14px; font-weight: 600; }
  .module-stat { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ---- MAIN CONTENT ---- */
  .main-content {
    flex: 1; overflow-y: auto;
    padding: 32px 36px 64px;
    display: flex; flex-direction: column; gap: 24px;
  }

  /* ---- DASHBOARD STATUS BANNER ---- */
  .status-banner {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px; border-radius: 14px;
    font-size: 15px; font-weight: 600;
  }
  .status-banner.complete {
    background: linear-gradient(135deg, rgba(52,211,153,.08), rgba(52,211,153,.03));
    border: 1px solid rgba(52,211,153,.18);
    color: var(--green);
  }
  .status-banner.running {
    background: linear-gradient(135deg, rgba(96,165,250,.08), rgba(96,165,250,.03));
    border: 1px solid rgba(96,165,250,.18);
    color: var(--blue);
    position: relative; overflow: hidden;
  }
  .status-banner.running::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(96,165,250,.06), transparent);
    animation: shimmerBanner 3s ease-in-out infinite;
  }
  .status-banner.pending {
    background: linear-gradient(135deg, rgba(75,85,99,.08), rgba(75,85,99,.03));
    border: 1px solid rgba(75,85,99,.18);
    color: var(--slate);
  }
  .banner-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; position: relative; z-index: 1;
  }
  .banner-icon.complete { background: var(--green-dim); }
  .banner-icon.running { background: var(--blue-dim); }
  .banner-icon.pending { background: var(--slate-dim); }
  .banner-text { position: relative; z-index: 1; }
  .banner-title { font-size: 16px; font-weight: 700; }
  .banner-subtitle { font-size: 12px; font-weight: 400; opacity: .7; margin-top: 2px; }

  .banner-spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(96,165,250,.25);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes shimmerBanner {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ---- MODULE DETAIL SECTION ---- */
  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .8px; color: var(--text-dim);
    padding-left: 2px;
  }

  /* ---- SUB-MODULE ROWS ---- */
  .sub-module-list {
    display: flex; flex-direction: column; gap: 6px;
  }
  .sub-module-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px; border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: background .15s, border-color .15s;
  }
  .sub-module-row:hover {
    background: var(--surface-hover);
    border-color: var(--border-light);
  }
  .sub-row-left {
    display: flex; align-items: center; gap: 12px;
  }
  .sub-row-name { font-size: 13px; font-weight: 500; }
  .sub-row-detail { font-size: 12px; color: var(--text-dim); }

  /* --- STATUS PILL (sub-module level) --- */
  .status-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
    white-space: nowrap;
  }
  .status-pill.done {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(52,211,153,.15);
  }
  .status-pill.running {
    background: var(--blue-dim);
    color: var(--blue);
    border: 1px solid rgba(96,165,250,.15);
    position: relative; overflow: hidden;
  }
  .status-pill.running::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(96,165,250,.18), transparent);
    animation: shimmerPill 1.8s ease-in-out infinite;
  }
  .status-pill.pending-pill {
    background: var(--slate-dim);
    color: var(--text-muted);
    border: 1px solid rgba(75,85,99,.12);
  }
  .pill-spinner {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(96,165,250,.3);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .pill-text { position: relative; z-index: 1; }

  @keyframes shimmerPill {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* ---- METRIC CARDS ---- */
  .metric-row {
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .metric-card {
    flex: 1; min-width: 120px;
    padding: 14px 18px; border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .metric-val { font-size: 22px; font-weight: 700; }
  .metric-lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ---- ARTIFACT TABLE ---- */
  .artifact-table {
    width: 100%; border-collapse: collapse;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .artifact-table thead th {
    text-align: left; padding: 12px 18px;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--text-dim);
    background: var(--surface-raised);
    border-bottom: 1px solid var(--border);
  }
  .artifact-table tbody td {
    padding: 10px 18px; font-size: 13px;
    border-bottom: 1px solid rgba(30,34,48,.5);
  }
  .artifact-table tbody tr:last-child td { border-bottom: none; }
  .artifact-table tbody tr:hover { background: rgba(255,255,255,.02); }
  .artifact-name-cell {
    display: flex; align-items: center; gap: 10px;
    font-weight: 500;
  }
  .artifact-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  /* ---- PROGRESS BAR ---- */
  .progress-bar-wrap {
    height: 6px; border-radius: 3px;
    background: rgba(255,255,255,.06);
    overflow: hidden; width: 120px;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 1.2s ease;
  }

  /* ---- PENDING STEPS ---- */
  .pending-steps {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .pending-step {
    font-size: 12px; padding: 8px 14px; border-radius: 10px;
    background: rgba(255,255,255,.03); color: var(--text-dim);
    border: 1px dashed rgba(255,255,255,.06);
  }

  /* ---- ITERATION BADGE ---- */
  .iteration-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600;
    background: var(--purple-dim);
    color: var(--purple);
    border: 1px solid rgba(167,139,250,.15);
  }

  /* ---- SVG GLOW FILTERS ---- */
  .glow-filter { position: absolute; width: 0; height: 0; }

  /* ---- RING LABELS ---- */
  .ring-label {
    position: absolute;
    font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity .6s ease;
  }
  .ring-label.visible { opacity: 1; }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-fade-up {
    opacity: 0;
    animation: fadeUp .5s ease forwards;
  }
  @keyframes dotpulse {
    0%,100% { box-shadow: 0 0 0 0 currentColor; }
    50%     { box-shadow: 0 0 0 5px transparent; }
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    .layout { flex-direction: column; }
    .ring-sidebar {
      width: 100%; min-width: unset;
      flex-direction: row; flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      border-right: none; border-bottom: 1px solid var(--border);
    }
    .rings-wrap { width: 220px; height: 220px; }
    .main-content { padding: 20px 16px 48px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- SVG glow filters -->
<svg class="glow-filter" aria-hidden="true">
  <defs>
    <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#34d399" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<!-- ====== TOP BAR ====== -->
<header class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    AI Inventor
  </div>
  <div class="topbar-meta">
    <span class="topbar-pill">quantum-chem-42</span>
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      1h 23m
    </span>
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      $4.87
    </span>
  </div>
</header>

<!-- ====== LAYOUT ====== -->
<div class="layout">

  <!-- ====== RING SIDEBAR ====== -->
  <aside class="ring-sidebar" id="ringSidebar">
    <div class="rings-wrap" id="ringsWrap">
      <div class="rings-center">
        <span class="pct" id="centerPct">0%</span>
        <span class="label">Pipeline</span>
      </div>
    </div>
    <div class="sidebar-modules" id="sidebarModules">
      <!-- built by JS -->
    </div>
  </aside>

  <!-- ====== MAIN CONTENT ====== -->
  <main class="main-content" id="mainContent">
    <!-- built by JS -->
  </main>

</div>

<script>
(function() {
  "use strict";

  /* ============================================================
     DATA
     ============================================================ */
  const MODULES = [
    {
      id: "seed",
      name: "Seed Hypotheses",
      status: "complete",
      statLine: "12 gaps found",
      pct: 100,
      color1: "#34d399", color2: "#6ee7b7",
      metrics: [

        { val: "12", lbl: "Gaps found" },
        { val: "38", lbl: "KG nodes" },
        { val: "6m 12s", lbl: "Duration" }
      ],
      subModules: [
        { name: "Literature Fetch", status: "done", detail: "247 papers" },
        { name: "Knowledge Graph", status: "done", detail: "38 nodes, 94 edges" },
        { name: "Gap Analysis", status: "done", detail: "12 gaps identified" },
        { name: "Seed Generation", status: "done", detail: "12 hypotheses" }
      ]
    },
    {
      id: "hypothesis",
      name: "Hypothesis Loop",
      status: "complete",
      statLine: "8.4 / 10 best",
      pct: 100,
      color1: "#34d399", color2: "#a78bfa",
      metrics: [
        { val: "8.4", lbl: "Best score" },
        { val: "3", lbl: "Iterations" },
        { val: "6", lbl: "Hypotheses" },
        { val: "14m 8s", lbl: "Duration" }
      ],
      subModules: [
        { name: "Generate Hypotheses", status: "done", detail: "6 candidates" },
        { name: "Review Hypotheses", status: "done", detail: "Scored 5.2 - 8.4" },
        { name: "Refine & Select", status: "done", detail: "Top: quantum-chem bridge" }
      ]
    },
    {
      id: "invention",
      name: "Invention Loop",
      status: "running",
      statLine: "Iter 2/3 - Artifacts",
      pct: 58,
      color1: "#3b82f6", color2: "#60a5fa",
      iteration: { current: 2, total: 3 },
      metrics: [
        { val: "3/5", lbl: "Artifacts done" },
        { val: "2/3", lbl: "Iteration" },
        { val: "22m", lbl: "Elapsed" },
        { val: "~18m", lbl: "Est. remaining" }
      ],
      subModules: [
        { name: "Strategy", status: "done", detail: "Multi-scale approach" },
        { name: "Plan", status: "done", detail: "5 artifacts planned" },
        { name: "Artifacts", status: "running", detail: "3/5 complete" },
        { name: "Paper Draft", status: "pending", detail: "Waiting" },
        { name: "Review", status: "pending", detail: "Waiting" },
        { name: "Update Hypo", status: "pending", detail: "Waiting" }
      ],
      artifacts: [
        { name: "quantum_sim.py", icon: "\uD83D\uDCDC", status: "done", bg: "rgba(52,211,153,.12)", fg: "#34d399" },
        { name: "loss_landscape.py", icon: "\uD83D\uDCC8", status: "done", bg: "rgba(52,211,153,.12)", fg: "#34d399" },
        { name: "encoder_module.py", icon: "\u2699\uFE0F", status: "done", bg: "rgba(52,211,153,.12)", fg: "#34d399" },
        { name: "benchmark_suite.py", icon: "\uD83E\uDDEA", status: "running", bg: "rgba(96,165,250,.12)", fg: "#60a5fa" },
        { name: "ablation_study.py", icon: "\uD83D\uDD2C", status: "pending", bg: "rgba(255,255,255,.04)", fg: "#7a7f91" }
      ]
    },
    {
      id: "paper",
      name: "Paper & Repo",
      status: "pending",
      statLine: "Waiting",
      pct: 0,
      color1: "#4b5563", color2: "#4b5563",
      subModules: [
        { name: "Visualizations", status: "pending", detail: "Waiting" },
        { name: "Diagrams", status: "pending", detail: "Waiting" },
        { name: "Full Paper", status: "pending", detail: "Waiting" },
        { name: "Repository", status: "pending", detail: "Waiting" },
        { name: "Final Review", status: "pending", detail: "Waiting" }
      ]
    }
  ];

  const RING_CONFIG = {
    cx: 140, cy: 140,
    radii: [126, 108, 90, 72],
    strokeWidth: 14,
    bgOpacity: 0.10
  };

  let activeModuleIdx = 2; // invention loop is active

  /* ============================================================
     PARTICLES
     ============================================================ */
  function initParticles() {
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        alpha: Math.random() * 0.3 + 0.05
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(96,165,250,${p.alpha})`;
        ctx.fill();
      });

      // draw faint connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(96,165,250,${0.04 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  }

  /* ============================================================
     BUILD RING SVG
     ============================================================ */
  function buildRings() {
    const container = document.getElementById("ringsWrap");
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 280 280");
    svg.setAttribute("width", "100%");
    svg.setAttribute("height", "100%");
    svg.style.position = "absolute";
    svg.style.inset = "0";

    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    MODULES.forEach(mod => {
      const grad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
      grad.id = `grad-${mod.id}`;
      grad.setAttribute("gradientUnits", "userSpaceOnUse");
      grad.setAttribute("x1", "0"); grad.setAttribute("y1", "0");
      grad.setAttribute("x2", "280"); grad.setAttribute("y2", "280");
      const s1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s1.setAttribute("offset", "0%"); s1.setAttribute("stop-color", mod.color1);
      const s2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s2.setAttribute("offset", "100%"); s2.setAttribute("stop-color", mod.color2);
      grad.appendChild(s1); grad.appendChild(s2);
      defs.appendChild(grad);
    });
    svg.appendChild(defs);

    const { cx, cy, radii, strokeWidth, bgOpacity } = RING_CONFIG;

    MODULES.forEach((mod, i) => {
      const r = radii[i];
      const circ = 2 * Math.PI * r;

      // background ring
      const bg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      bg.setAttribute("cx", cx); bg.setAttribute("cy", cy); bg.setAttribute("r", r);
      bg.setAttribute("fill", "none");
      bg.setAttribute("stroke", mod.pct === 0 ? "#4b5563" : mod.color1);
      bg.setAttribute("stroke-opacity", bgOpacity);
      bg.setAttribute("stroke-width", strokeWidth);
      if (mod.pct === 0) bg.setAttribute("stroke-dasharray", "5 7");
      svg.appendChild(bg);

      if (mod.pct > 0) {
        const fg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        fg.setAttribute("cx", cx); fg.setAttribute("cy", cy); fg.setAttribute("r", r);
        fg.setAttribute("fill", "none");
        fg.setAttribute("stroke", `url(#grad-${mod.id})`);
        fg.setAttribute("stroke-width", strokeWidth);
        fg.setAttribute("stroke-linecap", "round");
        fg.setAttribute("stroke-dasharray", circ);
        fg.setAttribute("stroke-dashoffset", circ);
        fg.setAttribute("transform", `rotate(-90 ${cx} ${cy})`);
        if (mod.status === "running") fg.setAttribute("filter", "url(#glow-blue)");
        fg.dataset.target = circ * (1 - mod.pct / 100);
        fg.dataset.circ = circ;
        fg.classList.add("ring-fg");
        svg.appendChild(fg);

        // glow dot for active ring
        if (mod.status === "running") {
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("r", "4");
          dot.setAttribute("fill", mod.color2);
          dot.setAttribute("filter", "url(#glow-blue)");
          dot.classList.add("ring-endpoint-dot");
          dot.dataset.ring = i;
          dot.setAttribute("cx", cx); dot.setAttribute("cy", cy - r);
          svg.appendChild(dot);
        }
      }
    });

    container.insertBefore(svg, container.firstChild);

    // endpoint labels
    MODULES.forEach((mod, i) => {
      if (mod.pct === 0) return;
      const lbl = document.createElement("div");
      lbl.className = "ring-label";
      lbl.textContent = mod.name.split(" ")[0];
      lbl.style.background = mod.color1 + "22";
      lbl.style.color = mod.color2;
      lbl.style.border = `1px solid ${mod.color1}33`;
      lbl.dataset.ring = i;
      container.appendChild(lbl);
    });
  }

  /* ============================================================
     ANIMATE RINGS
     ============================================================ */
  function animateRings() {
    const { cx, cy, radii } = RING_CONFIG;
    const fgs = document.querySelectorAll(".ring-fg");

    fgs.forEach((el, idx) => {
      const target = parseFloat(el.dataset.target);
      el.style.transition = `stroke-dashoffset 1.2s cubic-bezier(.4,.0,.2,1) ${idx * 0.12}s`;
      requestAnimationFrame(() => el.setAttribute("stroke-dashoffset", target));
    });

    // animate endpoint dots
    document.querySelectorAll(".ring-endpoint-dot").forEach(dot => {
      const ri = parseInt(dot.dataset.ring);
      const mod = MODULES[ri];
      const r = radii[ri];
      const angle = (mod.pct / 100) * 2 * Math.PI - Math.PI / 2;
      const ex = cx + r * Math.cos(angle);
      const ey = cy + r * Math.sin(angle);
      dot.style.transition = `cx 1.2s cubic-bezier(.4,.0,.2,1) ${ri * 0.12}s, cy 1.2s cubic-bezier(.4,.0,.2,1) ${ri * 0.12}s`;
      requestAnimationFrame(() => { dot.setAttribute("cx", ex); dot.setAttribute("cy", ey); });
      pulseDot(dot);
    });

    animateCounter(document.getElementById("centerPct"), 0, 65, 1200);

    setTimeout(positionLabels, 1400);
  }

  function pulseDot(dot) {
    let r = 4, growing = true;
    (function loop() {
      r += growing ? 0.05 : -0.05;
      if (r >= 6) growing = false;
      if (r <= 4) growing = true;
      dot.setAttribute("r", r);
      requestAnimationFrame(loop);
    })();
  }

  function positionLabels() {
    const { cx, cy, radii } = RING_CONFIG;
    const container = document.getElementById("ringsWrap");
    const rect = container.getBoundingClientRect();

    document.querySelectorAll(".ring-label").forEach(lbl => {
      const ri = parseInt(lbl.dataset.ring);
      const mod = MODULES[ri];
      const r = radii[ri];
      const angle = (mod.pct / 100) * 2 * Math.PI - Math.PI / 2;
      const scale = rect.width / 280;
      let x = cx * scale + r * scale * Math.cos(angle);
      let y = cy * scale + r * scale * Math.sin(angle);
      x += (Math.cos(angle) > 0 ? 12 : -lbl.offsetWidth - 12);
      y -= lbl.offsetHeight / 2;
      lbl.style.left = x + "px";
      lbl.style.top = y + "px";
      lbl.classList.add("visible");
    });
  }

  function animateCounter(el, from, to, duration) {
    const start = performance.now();
    (function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * ease) + "%";
      if (t < 1) requestAnimationFrame(tick);
    })(start);
  }

  /* ============================================================
     BUILD SIDEBAR MODULE LIST
     ============================================================ */
  function buildSidebarModules() {
    const container = document.getElementById("sidebarModules");

    MODULES.forEach((mod, i) => {
      const item = document.createElement("div");
      item.className = "sidebar-module-item" + (i === activeModuleIdx ? " active" : "");
      item.style.animationDelay = (i * 0.08) + "s";
      item.classList.add("anim-fade-up");

      // badge HTML
      let badgeHTML = "";
      if (mod.status === "complete") {
        badgeHTML = `<span class="module-badge complete">\u2713 Complete</span>`;
      } else if (mod.status === "running") {
        badgeHTML = `<span class="module-badge running"><span class="badge-spinner"></span> Running</span>`;
      } else {
        badgeHTML = `<span class="module-badge pending">\u25CB Pending</span>`;
      }

      item.innerHTML = `
        <div class="module-info">
          <div class="module-name">${mod.name}</div>
          <div class="module-stat">${mod.statLine}</div>
        </div>
        ${badgeHTML}
      `;

      item.addEventListener("click", () => {
        activeModuleIdx = i;
        document.querySelectorAll(".sidebar-module-item").forEach((el, j) => {
          el.classList.toggle("active", j === i);
        });
        buildMainContent();
      });

      container.appendChild(item);
    });
  }

  /* ============================================================
     BUILD MAIN CONTENT (dashboard for selected module)
     ============================================================ */
  function buildMainContent() {
    const main = document.getElementById("mainContent");
    main.innerHTML = "";

    const mod = MODULES[activeModuleIdx];

    // --- STATUS BANNER ---
    const banner = document.createElement("div");
    let bannerClass, bannerIconClass, bannerIconContent, bannerTitle, bannerSubtitle;

    if (mod.status === "complete") {
      bannerClass = "complete";
      bannerIconClass = "complete";
      bannerIconContent = "\u2713";
      bannerTitle = mod.name + " \u2014 Complete";
      bannerSubtitle = "All steps finished successfully";
    } else if (mod.status === "running") {
      bannerClass = "running";
      bannerIconClass = "running";
      bannerIconContent = `<div class="banner-spinner"></div>`;
      bannerTitle = mod.name + " \u2014 Running";
      bannerSubtitle = mod.iteration
        ? `Iteration ${mod.iteration.current} of ${mod.iteration.total}`
        : "In progress...";
    } else {
      bannerClass = "pending";
      bannerIconClass = "pending";
      bannerIconContent = "\u25CB";
      bannerTitle = mod.name + " \u2014 Pending";
      bannerSubtitle = "Waiting for previous modules to complete";
    }

    banner.className = `status-banner ${bannerClass} anim-fade-up`;
    banner.innerHTML = `
      <div class="banner-icon ${bannerIconClass}">${bannerIconContent}</div>
      <div class="banner-text">
        <div class="banner-title">${bannerTitle}</div>
        <div class="banner-subtitle">${bannerSubtitle}</div>
      </div>
      ${mod.iteration ? `<span class="iteration-badge" style="margin-left:auto; position:relative; z-index:1;">Iter ${mod.iteration.current}/${mod.iteration.total}</span>` : ''}
    `;
    main.appendChild(banner);

    // --- METRICS ---
    if (mod.metrics) {
      const label = document.createElement("div");
      label.className = "section-label anim-fade-up";
      label.style.animationDelay = ".1s";
      label.textContent = "Metrics";
      main.appendChild(label);

      const row = document.createElement("div");
      row.className = "metric-row anim-fade-up";
      row.style.animationDelay = ".15s";
      mod.metrics.forEach(m => {
        const card = document.createElement("div");
        card.className = "metric-card";
        card.innerHTML = `<div class="metric-val">${m.val}</div><div class="metric-lbl">${m.lbl}</div>`;
        row.appendChild(card);
      });
      main.appendChild(row);
    }

    // --- SUB-MODULES ---
    if (mod.subModules) {
      const label = document.createElement("div");
      label.className = "section-label anim-fade-up";
      label.style.animationDelay = ".2s";
      label.textContent = "Sub-modules";
      main.appendChild(label);

      const list = document.createElement("div");
      list.className = "sub-module-list anim-fade-up";
      list.style.animationDelay = ".25s";

      mod.subModules.forEach(sub => {
        const row = document.createElement("div");
        row.className = "sub-module-row";

        let pillHTML = "";
        if (sub.status === "done") {
          pillHTML = `<span class="status-pill done"><span class="pill-text">\u2713 Done</span></span>`;
        } else if (sub.status === "running") {
          pillHTML = `<span class="status-pill running"><span class="pill-spinner"></span><span class="pill-text">\u25B6 Running</span></span>`;
        } else {
          pillHTML = `<span class="status-pill pending-pill"><span class="pill-text">\u25CB Pending</span></span>`;
        }

        row.innerHTML = `
          <div class="sub-row-left">
            <div>
              <div class="sub-row-name">${sub.name}</div>
              <div class="sub-row-detail">${sub.detail}</div>
            </div>
          </div>
          ${pillHTML}
        `;
        list.appendChild(row);
      });
      main.appendChild(list);
    }

    // --- ARTIFACTS TABLE (invention loop) ---
    if (mod.artifacts) {
      const label = document.createElement("div");
      label.className = "section-label anim-fade-up";
      label.style.animationDelay = ".3s";
      label.textContent = "Artifacts";
      main.appendChild(label);

      const table = document.createElement("table");
      table.className = "artifact-table anim-fade-up";
      table.style.animationDelay = ".35s";

      let thead = `<thead><tr><th>Artifact</th><th>Status</th><th>Progress</th></tr></thead>`;
      let tbody = "<tbody>";
      mod.artifacts.forEach(a => {
        let statusPill = "";
        let progressBar = "";
        if (a.status === "done") {
          statusPill = `<span class="status-pill done"><span class="pill-text">\u2713 Done</span></span>`;
          progressBar = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:100%;background:var(--green);"></div></div>`;
        } else if (a.status === "running") {
          statusPill = `<span class="status-pill running"><span class="pill-spinner"></span><span class="pill-text">\u25B6 Running</span></span>`;
          progressBar = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:62%;background:var(--blue);"></div></div>`;
        } else {
          statusPill = `<span class="status-pill pending-pill"><span class="pill-text">\u25CB Pending</span></span>`;
          progressBar = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:0%;"></div></div>`;
        }

        tbody += `<tr>
          <td>
            <div class="artifact-name-cell">
              <div class="artifact-icon" style="background:${a.bg};color:${a.fg}">${a.icon}</div>
              ${a.name}
            </div>
          </td>
          <td>${statusPill}</td>
          <td>${progressBar}</td>
        </tr>`;
      });
      tbody += "</tbody>";
      table.innerHTML = thead + tbody;
      main.appendChild(table);
    }

    // --- PENDING STEPS (paper module) ---
    if (mod.status === "pending" && mod.subModules) {
      const label = document.createElement("div");
      label.className = "section-label anim-fade-up";
      label.style.animationDelay = ".3s";
      label.textContent = "Expected Steps";
      main.appendChild(label);

      const wrap = document.createElement("div");
      wrap.className = "pending-steps anim-fade-up";
      wrap.style.animationDelay = ".35s";
      mod.subModules.forEach(sub => {
        const chip = document.createElement("div");
        chip.className = "pending-step";
        chip.textContent = sub.name;
        wrap.appendChild(chip);
      });
      main.appendChild(wrap);
    }
  }

  /* ============================================================
     INIT
     ============================================================ */
  function init() {
    initParticles();
    buildRings();
    buildSidebarModules();
    buildMainContent();

    requestAnimationFrame(() => {
      setTimeout(animateRings, 100);
    });

    window.addEventListener("resize", () => {
      positionLabels();
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
