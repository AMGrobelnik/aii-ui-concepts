<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Simple View</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Left Sidebar ── */
  .sidebar {
    width: 160px;
    min-width: 160px;
    height: 100vh;
    position: sticky;
    top: 0;
    background: #0e0e16;
    border-right: 1px solid #1a1a28;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 12px 20px;
    gap: 24px;
    z-index: 10;
  }

  /* Ring container */
  .ring-wrap {
    position: relative;
    width: 110px;
    height: 110px;
  }
  .ring-wrap svg { width: 110px; height: 110px; }
  .ring-bg {
    fill: none;
    stroke: #1a1a28;
    stroke-width: 7;
  }
  .ring-fill {
    fill: none;
    stroke-width: 7;
    stroke-linecap: round;
    stroke: url(#ringGrad);
    filter: url(#ringGlow);
    transition: stroke-dasharray 0.6s ease, stroke-dashoffset 0.6s ease;
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .ring-pct { font-size: 22px; font-weight: 700; color: #fff; }
  .ring-label { font-size: 9px; color: #888; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.6px; }

  /* Ring arc highlight segment */
  .ring-segment {
    fill: none;
    stroke-width: 7;
    stroke-linecap: round;
    opacity: 0;
    transition: opacity 0.4s ease, stroke-dasharray 0.4s ease, stroke-dashoffset 0.4s ease;
  }
  .ring-segment.visible { opacity: 0.35; }

  /* Endpoint dot on ring */
  .ring-endpoint {
    fill: #7c6aff;
    filter: url(#ringGlow);
    transition: cx 0.6s ease, cy 0.6s ease;
  }

  /* Module legend */
  .legend { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.25s ease;
    font-size: 11.5px;
    user-select: none;
  }
  .legend-item:hover { background: #16162a; }
  .legend-item.selected { background: #1a1a36; }
  .legend-icon {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-name { flex: 1; color: #c0c0cc; font-weight: 500; }
  .legend-item.selected .legend-name { color: #fff; }
  .legend-stat { color: #666; font-size: 10px; font-weight: 400; }

  /* ── Main Area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Dot Strips (sticky) ── */
  .dot-strips {
    position: sticky;
    top: 0;
    z-index: 5;
    background: #0a0a0f;
    border-bottom: 1px solid #1a1a28;
    padding: 0 32px;
  }

  /* Row 1 — Module dots */
  .row1 {
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
  }
  .mod-node-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    z-index: 2;
    user-select: none;
  }
  .mod-node {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    position: relative;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }
  .mod-node.done { background: var(--clr); }
  .mod-node.active {
    background: var(--clr);
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .mod-node.pending {
    background: transparent;
    border: 2px solid #333;
    color: #555;
  }
  .mod-node.selected-ring {
    box-shadow: 0 0 0 3px #0a0a0f, 0 0 0 5px rgba(255,255,255,0.7);
  }
  .mod-name {
    font-size: 9px;
    color: #666;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: color 0.3s ease;
    white-space: nowrap;
  }
  .mod-node-wrap.sel .mod-name { color: #bbb; }

  /* Connector lines between module nodes */
  .mod-connector {
    width: 60px;
    height: 2px;
    position: relative;
    z-index: 1;
    margin: 0 4px;
    margin-bottom: 14px;
    border-radius: 1px;
    overflow: hidden;
  }
  .mod-connector-bg {
    position: absolute;
    inset: 0;
    background: #1a1a28;
    border-radius: 1px;
  }
  .mod-connector-fill {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    border-radius: 1px;
    transition: width 0.4s ease;
  }
  .mod-connector-fill.full { width: 100%; }
  .mod-connector-fill.partial {
    width: 50%;
    animation: connectorPulse 1.5s ease-in-out infinite;
  }
  .mod-connector-fill.empty { width: 0; }

  /* Row 2 — Sub-module dots */
  .row2 {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    overflow: hidden;
  }
  .row2-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .row2-inner.entering {
    opacity: 0;
    transform: translateY(6px);
  }

  .sub-node-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    z-index: 2;
    user-select: none;
  }
  .sub-node {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 600;
    color: #fff;
    transition: box-shadow 0.3s ease, transform 0.3s ease, width 0.3s ease, height 0.3s ease;
  }
  .sub-node.done { background: var(--clr); opacity: 0.85; }
  .sub-node.active {
    background: var(--clr);
    box-shadow: 0 0 10px var(--clr);
  }
  .sub-node.pending {
    background: transparent;
    border: 1.5px solid #333;
    color: #555;
  }
  .sub-node.sel {
    width: 22px;
    height: 22px;
    box-shadow: 0 0 0 2px #0a0a0f, 0 0 0 4px rgba(255,255,255,0.65);
  }
  .sub-name {
    font-size: 8px;
    color: #555;
    margin-top: 3px;
    white-space: nowrap;
    transition: color 0.3s ease;
  }
  .sub-node-wrap.sel .sub-name { color: #bbb; }

  .sub-connector {
    width: 32px;
    height: 1.5px;
    background: #1a1a28;
    margin: 0 2px;
    margin-bottom: 12px;
    border-radius: 1px;
    z-index: 1;
  }

  /* ── Content Area ── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 28px 40px 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .content-inner {
    max-width: 700px;
    width: 100%;
  }

  .content-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
  }
  .content-subtitle {
    font-size: 12px;
    color: #666;
    margin-bottom: 16px;
  }
  .content-summary {
    font-size: 13.5px;
    color: #aaa;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Artifact / detail cards */
  .card-list { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .card {
    background: #111119;
    border: 1px solid #1a1a28;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.25s ease;
  }
  .card:hover { border-color: #2a2a40; }
  .card-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .card-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }
  .card-icon.done { background: #1a3a2a; color: #4ade80; }
  .card-icon.running { background: #1a2a3a; color: #60a5fa; animation: pulseGlow 2s ease-in-out infinite; }
  .card-icon.pending-icon { background: #1a1a22; color: #555; }
  .card-title { flex: 1; font-size: 13px; font-weight: 500; color: #ddd; }
  .card-meta { font-size: 11px; color: #666; display: flex; gap: 12px; }
  .card-meta span { white-space: nowrap; }
  .card-chevron {
    color: #444;
    font-size: 12px;
    transition: transform 0.25s ease;
    width: 16px;
    text-align: center;
  }
  .card.open .card-chevron { transform: rotate(90deg); }
  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }
  .card.open .card-body {
    max-height: 200px;
    padding: 0 16px 14px 46px;
  }
  .card-body-text {
    font-size: 12px;
    color: #888;
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    padding: 14px 40px;
    border-top: 1px solid #1a1a28;
    display: flex;
    gap: 24px;
    font-size: 11px;
    color: #555;
  }
  .footer span { display: flex; align-items: center; gap: 5px; }

  /* ── Animations ── */
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 8px var(--clr, #7c6aff); }
    50% { box-shadow: 0 0 18px var(--clr, #7c6aff); }
  }
  @keyframes connectorPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Scrollbar */
  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
</style>
</head>
<body>

<!-- ── SVG Defs ── -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>

      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

  </defs>
</svg>

<!-- ── Sidebar ── -->

</aside>

<!-- ── Main ── -->
<div class="main">

    <div class="row1" id="row1"></div>
    <div class="row2"><div class="row2-inner" id="row2"></div></div>

  <div class="content">

  <div class="footer">

// ── State ──
let selMod = 2;   // Invention
let selSub = 2;   // Artifacts

// ── Ring helpers ──
const CIRC = 2 * Math.PI * 46; // ~289.03
const TOTAL_STEPS = MODULES.reduce((s, m) => s + m.subs.length, 0); // 21

function getProgress() {
  let done = 0;
  MODULES.forEach(m => m.subs.forEach(s => { if (s.status === 'done') done++; }));
  return done / TOTAL_STEPS;
}

function updateRing() {
  const pct = getProgress();
  const offset = CIRC * (1 - pct);
  document.getElementById('ringFill').setAttribute('stroke-dashoffset', offset);
  document.getElementById('ringPct').textContent = Math.round(pct * 100) + '%';

  // Endpoint dot position
  const angle = -Math.PI / 2 + 2 * Math.PI * pct;
  const ex = 55 + 46 * Math.cos(angle);
  const ey = 55 + 46 * Math.sin(angle);
  const ep = document.getElementById('ringEndpoint');
  ep.setAttribute('cx', ex);
  ep.setAttribute('cy', ey);

  // Segment highlight for selected module
  updateRingSegment();
}

function updateRingSegment() {
  const seg = document.getElementById('ringSegment');
  // Calculate where this module's arc starts and its length
  let before = 0;
  for (let i = 0; i < selMod; i++) before += MODULES[i].subs.length;
  const modSteps = MODULES[selMod].subs.length;
  const startFrac = before / TOTAL_STEPS;
  const lenFrac = modSteps / TOTAL_STEPS;

  const dashLen = CIRC * lenFrac;
  const gapLen = CIRC - dashLen;
  const dashOffset = -CIRC * startFrac;

  seg.setAttribute('stroke-dasharray', `${dashLen} ${gapLen}`);
  seg.setAttribute('stroke-dashoffset', dashOffset);
  seg.classList.add('visible');
}

// ── Legend ──
function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = MODULES.map((m, i) => `
    <div class="legend-item ${i === selMod ? 'selected' : ''}" data-mod="${i}">
      <div class="legend-icon" style="background:${m.color}"></div>
      <span class="legend-name">${m.name}</span>
      <span class="legend-stat">${m.legendStat}</span>
    </div>
  `).join('');
  el.querySelectorAll('.legend-item').forEach(item => {
    item.addEventListener('click', () => selectModule(+item.dataset.mod));
  });
}

// ── Row 1 — Module Dots ──
function renderRow1() {
  const el = document.getElementById('row1');
  let html = '';
  MODULES.forEach((m, i) => {
    if (i > 0) {
      const gradId = `connGrad${i}`;
      const prevDone = MODULES[i-1].status === 'done';
      const curActive = m.status !== 'pending';
      const fillClass = prevDone && curActive ? 'full' : (prevDone ? 'partial' : 'empty');
      html += `<div class="mod-connector">
        <div class="mod-connector-bg"></div>
        <div class="mod-connector-fill ${fillClass}" style="background:url(#${gradId});background:linear-gradient(90deg,${MODULES[i-1].color},${m.color})"></div>
      </div>`;
    }
    const stCls = m.status === 'done' ? 'done' : (m.status === 'active' ? 'active' : 'pending');
    const selCls = i === selMod ? 'selected-ring' : '';
    const wrapSel = i === selMod ? 'sel' : '';
    html += `<div class="mod-node-wrap ${wrapSel}" data-mod="${i}">
      <div class="mod-node ${stCls} ${selCls}" style="--clr:${m.color}">${m.label}</div>
      <span class="mod-name">${m.name}</span>
    </div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.mod-node-wrap').forEach(w => {
    w.addEventListener('click', () => selectModule(+w.dataset.mod));
  });
}

// ── Row 2 — Sub-module Dots ──
function renderRow2(animate) {
  const el = document.getElementById('row2');
  const mod = MODULES[selMod];

  if (animate) {
    el.classList.add('entering');
    setTimeout(() => {
      buildRow2Inner(el, mod);
      el.classList.remove('entering');
    }, 150);
  } else {
    buildRow2Inner(el, mod);
  }
}

function buildRow2Inner(el, mod) {
  let html = '';
  mod.subs.forEach((s, i) => {
    if (i > 0) {
      html += `<div class="sub-connector"></div>`;
    }
    const stCls = s.status === 'done' ? 'done' : (s.status === 'active' ? 'active' : 'pending');
    const selCls = i === selSub ? 'sel' : '';
    const wrapSel = i === selSub ? 'sel' : '';
    const icon = s.status === 'done' ? '\\u2713' : (s.status === 'active' ? '\\u25b6' : '');
    html += `<div class="sub-node-wrap ${wrapSel}" data-sub="${i}">
      <div class="sub-node ${stCls} ${selCls}" style="--clr:${mod.color}">${icon}</div>
      <span class="sub-name">${s.name}</span>
    </div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll('.sub-node-wrap').forEach(w => {
    w.addEventListener('click', () => selectSub(+w.dataset.sub));
  });
}

// ── Content ──
function renderContent() {
  const mod = MODULES[selMod];
  const sub = mod.subs[selSub];
  const data = CONTENT[sub.id];
  if (!data) {
    document.getElementById('contentInner').innerHTML = `<div class="content-title">${sub.name}</div><div class="content-summary" style="margin-top:12px">No data available.</div>`;
    return;
  }

  let html = `
    <div class="content-title">${data.title}</div>
    <div class="content-subtitle">${data.subtitle}</div>
    <div class="content-summary">${data.summary}</div>
    <div class="card-list">
  `;

  data.cards.forEach((c, i) => {
    const iconCls = c.status === 'done' ? 'done' : (c.status === 'running' ? 'running' : 'pending-icon');
    const iconChar = c.status === 'done' ? '\u2713' : (c.status === 'running' ? '\u25b6' : '\u25cb');
    html += `
      <div class="card" data-card="${i}">
        <div class="card-header">
          <div class="card-icon ${iconCls}">${iconChar}</div>
          <span class="card-title">${c.title}</span>
          <div class="card-meta">
            ${c.meta.map(m => `<span>${m}</span>`).join('')}
          </div>
          <span class="card-chevron">\u25b8</span>
        </div>
        <div class="card-body">
          <div class="card-body-text">${c.detail}</div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('contentInner').innerHTML = html;

  // Card expand/collapse
  document.querySelectorAll('.card').forEach(card => {
    card.querySelector('.card-header').addEventListener('click', () => {
      card.classList.toggle('open');
    });
  });
}

// ── Selection Logic ──
function selectModule(idx) {
  selMod = Math.max(0, Math.min(MODULES.length - 1, idx));
  // Find the active or first sub
  const mod = MODULES[selMod];
  const activeIdx = mod.subs.findIndex(s => s.status === 'active');
  selSub = activeIdx >= 0 ? activeIdx : 0;
  renderAll(true);
}

function selectSub(idx) {
  const mod = MODULES[selMod];
  selSub = Math.max(0, Math.min(mod.subs.length - 1, idx));
  renderAll(false);
}

function renderAll(animateRow2) {
  renderLegend();
  renderRow1();
  renderRow2(animateRow2);
  renderContent();
  updateRing();
}

// ── Keyboard Navigation ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectSub(selSub - 1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    selectSub(selSub + 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectModule(selMod - 1);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectModule(selMod + 1);
  }
});

// ── Init ──
renderAll(false);
</script>
