<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Glowing Tree</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1d23;
    --surface: #22262e;
    --border: #2e3440;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --text-muted: #5a6577;
    --green: #22c55e;
    --purple: #a78bfa;
    --blue: #3b82f6;
    --orange: #f59e0b;
    --red: #ef4444;
    --card-radius: 12px;
    --tree-line: #2e3440;
    --glow-color: #3b82f6;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 20;
  }
  .header-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    white-space: nowrap;
  }
  .header-ring {
    width: 40px; height: 40px;
    position: relative;
    flex-shrink: 0;
  }
  .header-ring svg { width: 100%; height: 100%; }
  .header-ring .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .header-ring .ring-fill { fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 113; stroke-dashoffset: 39.5; transition: stroke-dashoffset 1s ease; }
  .header-ring .ring-text { fill: var(--text); font-size: 9px; font-weight: 600;
    text-anchor: middle; dominant-baseline: central; font-family: 'Inter', sans-serif; }
  .ring-glow {
    position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 50%;
    border: 1px dashed var(--green);
    opacity: 0.4;
    animation: ringRotate 8s linear infinite;
  }
  @keyframes ringRotate { to { transform: rotate(360deg); } }
  .ring-endpoint {
    position: absolute; width: 6px; height: 6px;
    background: var(--green); border-radius: 50%;
    top: -1px; left: 50%; transform: translateX(-50%);
    animation: ringEndGlow 2s ease-in-out infinite;
    box-shadow: 0 0 6px var(--green);
  }
  @keyframes ringEndGlow {
    0%, 100% { opacity: 0.6; box-shadow: 0 0 4px var(--green); }
    50% { opacity: 1; box-shadow: 0 0 10px var(--green), 0 0 20px var(--green); }
  }

  .header-stats {
    display: flex; gap: 20px; margin-left: auto;
    font-size: 11px; color: var(--text-dim);
  }
  .header-stats span { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── MODULES CONTAINER ── */
  .modules-area {
    padding: 20px 28px 0;
    position: relative;
  }
  .modules-row {
    display: flex;
    gap: 16px;
    position: relative;
  }

  /* ── MODULE COLUMN ── */
  .module-col {
    flex: 1;
    min-width: 0;
    max-width: 260px;
    position: relative;
  }

  /* ── MODULE CARD ── */
  .module-card {
    width: 100%;
    height: 80px;
    background: linear-gradient(135deg, rgba(34,38,46,0.95), rgba(34,38,46,0.7));
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.15s;
  }
  .module-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: var(--card-radius) 0 0 var(--card-radius);
  }
  .module-card:hover { transform: translateY(-1px); }

  .module-card[data-color="green"]::before { background: var(--green); }
  .module-card[data-color="purple"]::before { background: var(--purple); }
  .module-card[data-color="blue"]::before { background: var(--blue); }
  .module-card[data-color="orange"]::before { background: var(--orange); }

  .module-card.active { border-color: rgba(255,255,255,0.12); }
  .module-card.active[data-color="green"] { box-shadow: 0 0 20px rgba(34,197,94,0.15); }
  .module-card.active[data-color="purple"] { box-shadow: 0 0 20px rgba(167,139,250,0.15); }
  .module-card.active[data-color="blue"] { box-shadow: 0 0 20px rgba(59,130,246,0.15); }
  .module-card.active[data-color="orange"] { box-shadow: 0 0 20px rgba(245,158,11,0.15); }

  /* active glow pulse */
  .module-card.active::after {
    content: '';
    position: absolute; inset: -1px;
    border-radius: var(--card-radius);
    animation: cardGlow 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  .module-card.active[data-color="green"]::after { box-shadow: inset 0 0 20px rgba(34,197,94,0.06); }
  .module-card.active[data-color="purple"]::after { box-shadow: inset 0 0 20px rgba(167,139,250,0.06); }
  .module-card.active[data-color="blue"]::after { box-shadow: inset 0 0 20px rgba(59,130,246,0.06); }
  .module-card.active[data-color="orange"]::after { box-shadow: inset 0 0 20px rgba(245,158,11,0.06); }
  @keyframes cardGlow {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* shimmer sweep on active */
  .card-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.03) 48%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 52%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 3s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
    border-radius: var(--card-radius);
  }
  .module-card.active .card-shimmer { opacity: 1; }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .card-icon { font-size: 14px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-status {
    font-size: 10px; font-weight: 500; padding: 2px 7px;
    border-radius: 6px; margin-left: auto;
  }
  .card-status.done { background: rgba(34,197,94,0.12); color: var(--green); }
  .card-status.running { background: rgba(59,130,246,0.12); color: var(--blue);
    animation: statusShimmer 2s ease-in-out infinite; }
  .card-status.pending { background: rgba(136,146,164,0.1); color: var(--text-muted); }
  @keyframes statusShimmer {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; background: rgba(59,130,246,0.2); }
  }
  .card-progress {
    height: 3px; background: rgba(255,255,255,0.05);
    border-radius: 2px; overflow: hidden;
  }
  .card-progress-fill {
    height: 100%; border-radius: 2px;
    width: 0; transition: width 0.8s ease;
  }
  .card-sub-label {
    font-size: 10px; color: var(--text-muted); margin-top: 4px;
  }

  /* ── TREE SUB-MODULES ── */
  .submods {
    padding: 8px 0 0 0;
    position: relative;
    min-height: 40px;
  }
  .tree-container {
    position: relative;
    padding-left: 18px;
  }
  /* vertical tree line -- base (thin gray, always present) */
  .tree-container::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 0;
    width: 1px;
    background: rgba(46,52,64,0.6);
    height: var(--tree-line-h, calc(100% - 18px));
    z-index: 1;
  }

  .submod-row {
    height: 36px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    font-size: 13px;
    opacity: 0;
    transform: translateX(-16px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    cursor: pointer;
    padding-right: 8px;
    border-radius: 6px;
  }
  .submod-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .submod-row:hover { background: rgba(255,255,255,0.02); }

  /* horizontal branch line -- default thin gray 1px */
  .submod-row::before {
    content: '';
    position: absolute;
    left: -11px;
    top: 50%;
    width: 11px;
    height: 1px;
    background: rgba(46,52,64,0.6);
    z-index: 1;
  }

  .submod-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    transition: all 0.3s;
    z-index: 3;
  }
  .submod-dot.done { background: var(--green); opacity: 0.7; }
  .submod-dot.running {
    background: var(--blue);
    animation: dotPulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(59,130,246,0.5);
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 6px rgba(59,130,246,0.4); }
    50% { transform: scale(1.25); box-shadow: 0 0 14px rgba(59,130,246,0.7); }
  }
  .submod-dot.pending {
    background: transparent;
    border: 1.5px solid var(--text-muted);
    opacity: 0.5;
  }

  .submod-label { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .submod-row.active-sub .submod-label { color: var(--text); font-weight: 500; }
  .submod-row.done-sub .submod-label { color: var(--text-dim); }
  .submod-score {
    margin-left: auto; font-size: 10px; font-weight: 600;
    color: var(--text-muted); flex-shrink: 0;
  }

  /* ── GLOW OVERLAY for active branch path ── */
  /* Applied via SVG overlay drawn on canvas -- these are fallback CSS classes */
  .submod-row.on-glow-path::before {
    background: var(--glow-color);
    height: 2px;
    top: calc(50% - 1px);
    box-shadow: 0 0 12px var(--glow-color), 0 0 4px var(--glow-color);
    z-index: 2;
  }

  /* ── CANVAS overlay ── */
  #particleCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 15;
  }

  /* ── BACKGROUND PARTICLES overlay ── */
  #bgCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── CONTENT DASHBOARD ── */
  .dashboard {
    margin: 20px 28px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 24px;
    min-height: 260px;
    position: relative;
    overflow: hidden;
  }
  .dash-transition {
    animation: dashFadeIn 0.35s ease;
  }
  @keyframes dashFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dash-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .dash-title { font-size: 16px; font-weight: 600; }
  .dash-badge {
    font-size: 10px; font-weight: 600; padding: 3px 10px;
    border-radius: 6px;
  }
  .dash-badge.done { background: rgba(34,197,94,0.12); color: var(--green); }
  .dash-badge.running { background: rgba(59,130,246,0.12); color: var(--blue); }
  .dash-badge.pending { background: rgba(136,146,164,0.1); color: var(--text-muted); }

  .dash-summary {
    font-size: 13px; color: var(--text-dim); line-height: 1.6;
    margin-bottom: 20px; max-width: 720px;
    font-style: italic;
  }

  .stat-cards {
    display: flex; gap: 14px; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 160px; max-width: 240px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-card-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card-value { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .stat-bar {
    height: 4px; background: rgba(255,255,255,0.05);
    border-radius: 2px; overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%; border-radius: 2px;
    width: 0;
    transition: width 0.6s ease;
  }

  .item-list { margin-bottom: 16px; }
  .item-list-title { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .item-row:hover { background: rgba(255,255,255,0.03); }
  .item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .item-dot.done { background: var(--green); }
  .item-dot.running { background: var(--blue); animation: itemDotPulse 1.5s ease-in-out infinite; }
  .item-dot.pending { border: 1px solid var(--text-muted); }
  @keyframes itemDotPulse {
    0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
  }
  .item-name { color: var(--text-dim); }
  .item-meta { margin-left: auto; font-size: 10px; color: var(--text-muted); }

  /* running shimmer on item rows */
  .item-row.running-item {
    position: relative; overflow: hidden;
  }
  .item-row.running-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.04) 45%, rgba(59,130,246,0.08) 50%, rgba(59,130,246,0.04) 55%, transparent 100%);
    background-size: 200% 100%;
    animation: rowShimmer 2.5s ease-in-out infinite;
    pointer-events: none;
    border-radius: 6px;
  }
  @keyframes rowShimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .activity-log {
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
  .activity-title { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .activity-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: 11px; color: var(--text-dim);
    transition: opacity 0.4s, transform 0.4s;
  }
  .activity-time { color: var(--text-muted); font-size: 10px; font-variant-numeric: tabular-nums; flex-shrink: 0; width: 44px; }
  .activity-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ── RESPONSIVE ── */
  @media (max-width: 960px) {
    .modules-row { flex-wrap: wrap; }
    .module-col { max-width: 48%; flex: 0 0 48%; }
  }
</style>
</head>
<body>

<!-- BACKGROUND PARTICLES CANVAS -->
<canvas id="bgCanvas"></canvas>

<!-- HEADER -->
<div class="header">
  <div class="header-title">AI Inventor</div>
  <div class="header-ring">
    <div class="ring-glow"></div>
    <div class="ring-endpoint"></div>
    <svg viewBox="0 0 40 40">
      <circle class="ring-track" cx="20" cy="20" r="16" />
      <circle class="ring-fill" cx="20" cy="20" r="16" transform="rotate(-90 20 20)" />
      <text class="ring-text" x="20" y="20">65%</text>
    </svg>
  </div>
  <div class="header-stats">
    <span><span class="stat-dot" style="background:var(--green)"></span>3 Done</span>
    <span><span class="stat-dot" style="background:var(--blue)"></span>1 Running</span>
    <span><span class="stat-dot" style="background:var(--text-muted)"></span>1 Pending</span>
    <span style="color:var(--text-muted)">Run 47 &middot; 3h 12m &middot; $4.82</span>
  </div>
</div>

<!-- PARTICLE CANVAS (full-page overlay) -->
<canvas id="particleCanvas"></canvas>

<!-- MODULES AREA -->
<div class="modules-area" id="modulesArea">
  <div class="modules-row" id="modulesRow">
    <!-- JS builds these -->
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <!-- JS fills this -->
</div>

<script>
// =============================================================
// DATA
// =============================================================
const MODULES = [
  {
    id: 'seed', title: 'Seed', icon: '\u{1F331}', color: 'green',
    status: 'done', progress: 100,
    subLabel: '4/4 steps',
    summary: "I seeded the knowledge graph by extracting 142 entities and 89 relationships from 12 source papers on neural architecture search. The KG now covers the core design space including search strategies, performance predictors, and hardware constraints.",
    subs: [
      { label: 'Parse Sources', status: 'done' },
      { label: 'Extract Entities', status: 'done' },
      { label: 'Build KG', status: 'done' },
      { label: 'Validate Links', status: 'done' },
    ],
    stats: { duration: '18m', durationPct: 22, cost: '$0.34', costPct: 7, messages: '48 msgs (12 tool)' },
    items: [],
    log: [
      { time: '14:02', text: 'KG validated \u2014 142 entities, 89 edges', color: 'var(--green)' },
      { time: '13:58', text: 'Link validation pass: 94% accuracy', color: 'var(--green)' },
      { time: '13:51', text: 'Entity extraction complete', color: 'var(--green)' },
    ]
  },
  {
    id: 'hypo', title: 'Hypothesis', icon: '\u{1F9EA}', color: 'purple',
    status: 'done', progress: 100,
    subLabel: '6/6 loops (6.2 \u2192 8.4)',
    summary: "I iterated on the hypothesis 6 times, improving the novelty score from 6.2 to 8.4. The final hypothesis proposes a differentiable hardware-aware search space that jointly optimizes architecture topology and quantization bit-widths using a Gumbel-softmax relaxation.",
    subs: [
      { label: 'Gen Hypothesis', status: 'done', score: '6.2' },
      { label: 'Review #1', status: 'done', score: '6.8' },
      { label: 'Revise #1', status: 'done', score: '7.4' },
      { label: 'Review #2', status: 'done', score: '7.9' },
      { label: 'Revise #2', status: 'done', score: '8.1' },
      { label: 'Final Review', status: 'done', score: '8.4' },
    ],
    stats: { duration: '1h 24m', durationPct: 55, cost: '$1.86', costPct: 39, messages: '312 msgs (84 tool)' },
    items: [],
    log: [
      { time: '15:26', text: 'Final score 8.4 \u2014 threshold met', color: 'var(--green)' },
      { time: '15:18', text: 'Revise #2 improved novelty framing', color: 'var(--purple)' },
      { time: '15:04', text: 'Review #2 flagged weak baselines', color: 'var(--orange)' },
    ]
  },
  {
    id: 'invent', title: 'Invention', icon: '\u{1F528}', color: 'blue',
    status: 'running', progress: 50,
    subLabel: 'Iter 2 \u2014 Artifacts 3/5',
    summary: "I am on iteration 2 of the invention loop. Strategy and plan are locked. Currently generating artifact 3 of 5 \u2014 a PyTorch module implementing the differentiable search space with Gumbel-softmax gates. The first two artifacts (config schema and base search cell) passed validation.",
    subs: [
      { label: 'Strategy', status: 'done' },
      { label: 'Plan', status: 'done' },
      { label: 'Artifacts', status: 'running', extra: '3/5' },
      { label: 'Paper Draft', status: 'pending' },
      { label: 'Review', status: 'pending' },
      { label: 'Update Hypo', status: 'pending' },
    ],
    stats: { duration: '1h 28m', durationPct: 58, cost: '$2.14', costPct: 44, messages: '286 msgs (92 tool)' },
    items: [
      { name: 'config_schema.py', status: 'done', meta: '142 lines' },
      { name: 'search_cell.py', status: 'done', meta: '289 lines' },
      { name: 'gumbel_gates.py', status: 'running', meta: 'generating...' },
      { name: 'hw_predictor.py', status: 'pending', meta: '' },
      { name: 'train_loop.py', status: 'pending', meta: '' },
    ],
    log: [
      { time: '16:30', text: 'Generating gumbel_gates.py module...', color: 'var(--blue)' },
      { time: '16:24', text: 'search_cell.py passed validation', color: 'var(--green)' },
      { time: '16:18', text: 'config_schema.py generated (142 LOC)', color: 'var(--green)' },
    ]
  },
  {
    id: 'paper', title: 'Paper', icon: '\u{1F4C4}', color: 'orange',
    status: 'pending', progress: 0,
    subLabel: '0/5 steps',
    summary: "Waiting for the invention loop to complete before generating the final paper. The paper will include LaTeX source, figures, and a reproducibility appendix.",
    subs: [
      { label: 'Gen Demos', status: 'pending' },
      { label: 'Gen Viz', status: 'pending' },
      { label: 'Full Paper', status: 'pending' },
      { label: 'Build Repo', status: 'pending' },
      { label: 'Final Check', status: 'pending' },
    ],
    stats: { duration: '\u2014', durationPct: 0, cost: '\u2014', costPct: 0, messages: '\u2014' },
    items: [],
    log: [
      { time: '\u2014', text: 'Waiting for invention loop', color: 'var(--text-muted)' },
    ]
  }
];

let activeModuleIdx = 2; // invention is active
let activeSubIdx = -1;
let particleCanvas, pCtx;
let bgCanvas, bgCtx;
let cardElements = [];
let submodElements = [];
let treeParticles = [];
let connectorParticles = [];
let burstParticles = [];
let bgParticles = [];
let animFrame;
let logRotateTimer;

// Track glow path segments for each module (computed after layout)
// Each entry: { modIdx, segments: [{x1,y1,x2,y2},...], color }
let glowPaths = [];

// =============================================================
// BUILD UI
// =============================================================
function buildModules() {
  const row = document.getElementById('modulesRow');
  row.innerHTML = '';
  cardElements = [];
  submodElements = [];

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'module-col';

    // Card
    const card = document.createElement('div');
    card.className = 'module-card' + (mi === activeModuleIdx ? ' active' : '');
    card.dataset.color = mod.color;
    card.dataset.idx = mi;
    card.innerHTML = `
      <div class="card-shimmer"></div>
      <div class="card-header">
        <span class="card-icon">${mod.icon}</span>
        <span class="card-title">${mod.title}</span>
        <span class="card-status ${mod.status}">${mod.status === 'done' ? 'Done' : mod.status === 'running' ? 'Running' : 'Pending'}</span>
      </div>
      <div class="card-progress">
        <div class="card-progress-fill" style="background:var(--${mod.color})" data-pct="${mod.progress}"></div>
      </div>
      <div class="card-sub-label">${mod.subLabel}</div>
    `;
    card.addEventListener('click', () => selectModule(mi));
    col.appendChild(card);
    cardElements.push(card);

    // Sub-modules
    const subsDiv = document.createElement('div');
    subsDiv.className = 'submods';
    const tree = document.createElement('div');
    tree.className = 'tree-container';
    tree.dataset.modIdx = mi;

    const subEls = [];
    mod.subs.forEach((sub, si) => {
      const srow = document.createElement('div');
      srow.className = 'submod-row';
      if (sub.status === 'done') srow.classList.add('done-sub');
      if (sub.status === 'running') srow.classList.add('active-sub');
      srow.dataset.modIdx = mi;
      srow.dataset.subIdx = si;

      let dotClass = 'submod-dot ' + sub.status;
      let scoreHtml = sub.score ? `<span class="submod-score">${sub.score}</span>` : '';
      let extraHtml = sub.extra ? `<span class="submod-score" style="color:var(--blue)">${sub.extra}</span>` : '';

      srow.innerHTML = `
        <span class="${dotClass}"></span>
        <span class="submod-label">${sub.label}</span>
        ${scoreHtml}${extraHtml}
      `;
      tree.appendChild(srow);
      subEls.push(srow);
    });

    subsDiv.appendChild(tree);
    col.appendChild(subsDiv);
    submodElements.push(subEls);

    row.appendChild(col);
  });

  // Animate progress bars
  requestAnimationFrame(() => {
    document.querySelectorAll('.card-progress-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });

  // Stagger entrance for active module's subs
  animateSubEntrance(activeModuleIdx);
  // show all other subs immediately
  MODULES.forEach((mod, mi) => {
    if (mi !== activeModuleIdx) {
      submodElements[mi].forEach(el => el.classList.add('visible'));
    }
  });

  // compute tree line heights and glow paths after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      computeTreeLineHeights();
      computeGlowPaths();
    });
  });
}

function computeTreeLineHeights() {
  document.querySelectorAll('.tree-container').forEach(tc => {
    const rows = tc.querySelectorAll('.submod-row');
    if (rows.length === 0) return;
    const lastRow = rows[rows.length - 1];
    const tcRect = tc.getBoundingClientRect();
    const lastRect = lastRow.getBoundingClientRect();
    const h = (lastRect.top + lastRect.height / 2) - tcRect.top;
    tc.style.setProperty('--tree-line-h', h + 'px');
  });
}

// =============================================================
// GLOW PATH COMPUTATION
// =============================================================
// For each module, compute the "active path" -- from card bottom-center,
// down the vertical tree trunk, then branching horizontally to
// each sub-module that is done or running (the "active" path).
// The active sub and all preceding (done) subs are on the glow path.
function computeGlowPaths() {
  glowPaths = [];

  MODULES.forEach((mod, mi) => {
    if (!cardElements[mi]) return;
    const subs = submodElements[mi];
    if (!subs || subs.length === 0) return;

    // Find the last "active" sub (running, or last done if no running)
    let activeIdx = -1;
    for (let i = 0; i < mod.subs.length; i++) {
      if (mod.subs[i].status === 'running') { activeIdx = i; break; }
    }
    if (activeIdx < 0) {
      // If all done, glow the full path
      const allDone = mod.subs.every(s => s.status === 'done');
      if (allDone) activeIdx = mod.subs.length - 1;
      else return; // all pending, no glow
    }

    const cardRect = cardElements[mi].getBoundingClientRect();
    const treeContainer = subs[0].closest('.tree-container');
    if (!treeContainer) return;
    const treeRect = treeContainer.getBoundingClientRect();

    // Vertical line x = left edge of tree trunk (7px from tree-container left)
    const vertX = treeRect.left + 7;

    // Start point: bottom-center of card
    const startX = cardRect.left + cardRect.width / 2;
    const startY = cardRect.bottom;

    const segments = [];
    const cs = getComputedStyle(document.documentElement);
    const color = cs.getPropertyValue('--' + mod.color).trim();

    // Segment from card bottom-center down to the tree trunk X
    segments.push({ x1: startX, y1: startY, x2: vertX, y2: startY + 6 });

    // For each sub on the active path, add vertical + horizontal segments
    for (let si = 0; si <= activeIdx; si++) {
      const subRow = subs[si];
      const subDot = subRow.querySelector('.submod-dot');
      if (!subDot) continue;
      const dotRect = subDot.getBoundingClientRect();
      const branchY = dotRect.top + dotRect.height / 2;

      // Previous Y for vertical segment
      let prevY;
      if (si === 0) {
        prevY = startY + 6;
      } else {
        const prevRow = subs[si - 1];
        const prevDot = prevRow.querySelector('.submod-dot');
        if (prevDot) {
          const prevDotRect = prevDot.getBoundingClientRect();
          prevY = prevDotRect.top + prevDotRect.height / 2;
        } else {
          prevY = startY + 6;
        }
      }

      // Vertical segment (trunk)
      segments.push({ x1: vertX, y1: prevY, x2: vertX, y2: branchY });

      // Horizontal branch to the dot
      const endX = dotRect.left + dotRect.width / 2;
      segments.push({ x1: vertX, y1: branchY, x2: endX, y2: branchY });

      // Mark this row as on the glow path
      subRow.classList.add('on-glow-path');
    }

    glowPaths.push({ modIdx: mi, segments, color, activeIdx });
  });
}

function animateSubEntrance(mi) {
  const subs = submodElements[mi];
  if (!subs) return;
  subs.forEach((el, i) => {
    el.classList.remove('visible');
    setTimeout(() => el.classList.add('visible'), 80 + i * 50);
  });
}

function selectModule(mi) {
  if (mi === activeModuleIdx) return;
  activeModuleIdx = mi;

  cardElements.forEach((c, i) => c.classList.toggle('active', i === mi));

  // re-entrance animation on new module's subs
  animateSubEntrance(mi);

  // reset tree particles and recompute glow paths
  treeParticles = [];
  // Remove old glow path classes
  document.querySelectorAll('.on-glow-path').forEach(el => el.classList.remove('on-glow-path'));
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      computeGlowPaths();
    });
  });
  buildDashboard();
}

// =============================================================
// DASHBOARD
// =============================================================
function buildDashboard() {
  const dash = document.getElementById('dashboard');
  const mod = MODULES[activeModuleIdx];
  dash.classList.remove('dash-transition');
  void dash.offsetWidth;
  dash.classList.add('dash-transition');

  let itemsHtml = '';
  if (mod.items.length > 0) {
    itemsHtml = `
      <div class="item-list">
        <div class="item-list-title">Artifacts</div>
        ${mod.items.map(it => `
          <div class="item-row ${it.status === 'running' ? 'running-item' : ''}">
            <span class="item-dot ${it.status}"></span>
            <span class="item-name">${it.name}</span>
            <span class="item-meta">${it.meta}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  const colorVar = `var(--${mod.color})`;
  dash.innerHTML = `
    <div class="dash-header">
      <span style="font-size:20px">${mod.icon}</span>
      <span class="dash-title">${mod.title}</span>
      <span class="dash-badge ${mod.status}">${mod.status === 'done' ? 'Complete' : mod.status === 'running' ? 'Running' : 'Pending'}</span>
    </div>
    <div class="dash-summary">"${mod.summary}"</div>
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-card-label">Duration</div>
        <div class="stat-card-value" style="color:${colorVar}">${mod.stats.duration}</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="background:${colorVar}" data-pct="${mod.stats.durationPct}"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Cost</div>
        <div class="stat-card-value" style="color:${colorVar}">${mod.stats.cost}</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="background:${colorVar}" data-pct="${mod.stats.costPct}"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Messages</div>
        <div class="stat-card-value" style="color:${colorVar};font-size:14px;margin-top:4px">${mod.stats.messages}</div>
      </div>
    </div>
    ${itemsHtml}
    <div class="activity-log">
      <div class="activity-title">Activity</div>
      <div id="activityItems">
        ${mod.log.map(l => `
          <div class="activity-item">
            <span class="activity-time">${l.time}</span>
            <span class="activity-dot" style="background:${l.color}"></span>
            <span>${l.text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // animate stat bars
  requestAnimationFrame(() => {
    dash.querySelectorAll('.stat-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });

  // rotate log for running modules
  startLogRotation();
}

function startLogRotation() {
  if (logRotateTimer) clearInterval(logRotateTimer);
  const mod = MODULES[activeModuleIdx];
  if (mod.status !== 'running') return;

  const extraLogs = [
    { time: '16:31', text: 'Token count: 14,282 in / 3,841 out', color: 'var(--text-dim)' },
    { time: '16:30', text: 'gumbel_gates.py \u2014 writing forward() method', color: 'var(--blue)' },
    { time: '16:29', text: 'Tool call: file_write search_cell.py', color: 'var(--text-dim)' },
    { time: '16:28', text: 'Validation: search_cell.py all checks passed', color: 'var(--green)' },
  ];
  let logIdx = 0;

  logRotateTimer = setInterval(() => {
    const container = document.getElementById('activityItems');
    if (!container) return;

    const extra = extraLogs[logIdx % extraLogs.length];
    logIdx++;

    const items = container.querySelectorAll('.activity-item');
    if (items.length >= 3) {
      const last = items[items.length - 1];
      last.style.opacity = '0';
      last.style.transform = 'translateY(4px)';
      setTimeout(() => last.remove(), 300);
    }

    const newItem = document.createElement('div');
    newItem.className = 'activity-item';
    newItem.style.opacity = '0';
    newItem.style.transform = 'translateY(-4px)';
    newItem.innerHTML = `
      <span class="activity-time">${extra.time}</span>
      <span class="activity-dot" style="background:${extra.color}"></span>
      <span>${extra.text}</span>
    `;
    container.insertBefore(newItem, container.firstChild);
    requestAnimationFrame(() => {
      newItem.style.opacity = '1';
      newItem.style.transform = 'translateY(0)';
    });
  }, 5000);
}

// =============================================================
// BACKGROUND PARTICLES
// =============================================================
function initBgParticles() {
  const count = 60;
  for (let i = 0; i < count; i++) {
    bgParticles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      size: 0.8 + Math.random() * 1.2,
      alpha: 0.08 + Math.random() * 0.12,
      baseAlpha: 0.08 + Math.random() * 0.12,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.3 + Math.random() * 0.6,
    });
  }
}

function updateBgParticles(dt) {
  const W = bgCanvas.width;
  const H = bgCanvas.height;

  for (const p of bgParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.pulse += p.pulseSpeed * dt;
    p.alpha = p.baseAlpha * (0.6 + 0.4 * Math.sin(p.pulse));

    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
  }
}

function drawBgParticles() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  for (const p of bgParticles) {
    // Faint dot
    bgCtx.globalAlpha = p.alpha;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    bgCtx.fillStyle = '#8892a4';
    bgCtx.fill();

    // Soft glow
    bgCtx.globalAlpha = p.alpha * 0.3;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    bgCtx.fillStyle = '#8892a4';
    bgCtx.fill();
  }

  // Draw faint connecting lines between nearby particles
  bgCtx.lineWidth = 0.5;
  for (let i = 0; i < bgParticles.length; i++) {
    for (let j = i + 1; j < bgParticles.length; j++) {
      const a = bgParticles[i];
      const b = bgParticles[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const fade = 1 - dist / 120;
        bgCtx.globalAlpha = fade * 0.04;
        bgCtx.beginPath();
        bgCtx.moveTo(a.x, a.y);
        bgCtx.lineTo(b.x, b.y);
        bgCtx.strokeStyle = '#8892a4';
        bgCtx.stroke();
      }
    }
  }
  bgCtx.globalAlpha = 1;
}

// =============================================================
// PARTICLE CANVAS (connectors, tree, burst, glow)
// =============================================================
function initCanvas() {
  particleCanvas = document.getElementById('particleCanvas');
  pCtx = particleCanvas.getContext('2d');
  bgCanvas = document.getElementById('bgCanvas');
  bgCtx = bgCanvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  computeTreeLineHeights();
  // Recompute glow paths on resize
  document.querySelectorAll('.on-glow-path').forEach(el => el.classList.remove('on-glow-path'));
  requestAnimationFrame(() => computeGlowPaths());
}

function elRect(el) {
  return el.getBoundingClientRect();
}

// ── CONNECTOR PARTICLES (between cards) ──
function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardElements[i];
    const toCard = cardElements[i + 1];
    if (!fromCard || !toCard) continue;

    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];

    if (fromMod.status === 'pending' || toMod.status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;

    let speed, color, size, alpha;
    const cs = getComputedStyle(document.documentElement);
    if (fromMod.status === 'done' && (toMod.status === 'done' || toMod.status === 'running')) {
      speed = 40 + Math.random() * 20;
      color = cs.getPropertyValue('--' + fromMod.color).trim();
      size = 2.5;
      alpha = 0.5;
    } else {
      speed = 70 + Math.random() * 30;
      color = cs.getPropertyValue('--blue').trim();
      size = 3;
      alpha = 0.8;
    }

    connectorParticles.push({
      x: fromRect.right,
      y: y + (Math.random() - 0.5) * 4,
      targetX: toRect.left,
      speed,
      color,
      size,
      alpha,
      trail: [],
    });
  }
}

// ── TREE PARTICLES (along the glow path to active sub) ──
function findActiveSubIdx(mi) {
  const mod = MODULES[mi];
  for (let i = 0; i < mod.subs.length; i++) {
    if (mod.subs[i].status === 'running') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  const mi = activeModuleIdx;
  const si = findActiveSubIdx(mi);
  if (si < 0) return;
  if (!cardElements[mi] || !submodElements[mi] || !submodElements[mi][si]) return;

  // Find the glow path for this module
  const gp = glowPaths.find(g => g.modIdx === mi);
  if (!gp || gp.segments.length === 0) return;

  // Convert segments to waypoints (just use segment endpoints in order)
  const waypoints = [{ x: gp.segments[0].x1, y: gp.segments[0].y1 }];
  for (const seg of gp.segments) {
    waypoints.push({ x: seg.x2, y: seg.y2 });
  }

  treeParticles.push({
    waypoints,
    wpIdx: 0,
    x: waypoints[0].x,
    y: waypoints[0].y,
    speed: 90,
    color: gp.color,
    size: 3,
    alpha: 0.9,
    trail: [],
  });
}

// ── BURST EFFECT ──
function spawnBurst(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 * i) / 6 + Math.random() * 0.3;
    const speed = 30 + Math.random() * 40;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.5 + Math.random() * 0.5,
      color,
      size: 2,
    });
  }
}

// =============================================================
// DRAW GLOW PATHS ON CANVAS
// =============================================================
// Draws the intense 2px + 12px blur glow lines on the particle canvas
// for each active path. Non-active branches remain as CSS 1px gray.
let glowPulse = 0;

function drawGlowPaths(dt) {
  glowPulse += dt * 1.8;
  const pulseIntensity = 0.7 + 0.3 * Math.sin(glowPulse);

  for (const gp of glowPaths) {
    if (gp.segments.length === 0) continue;

    const col = gp.color;

    // Draw the blurred glow layer (12px blur effect via thick transparent lines)
    pCtx.save();
    pCtx.lineCap = 'round';
    pCtx.lineJoin = 'round';

    // Outer glow (wide, faint)
    pCtx.globalAlpha = 0.12 * pulseIntensity;
    pCtx.lineWidth = 14;
    pCtx.strokeStyle = col;
    pCtx.shadowColor = col;
    pCtx.shadowBlur = 16;
    pCtx.beginPath();
    for (const seg of gp.segments) {
      pCtx.moveTo(seg.x1, seg.y1);
      pCtx.lineTo(seg.x2, seg.y2);
    }
    pCtx.stroke();

    // Mid glow (medium, brighter)
    pCtx.globalAlpha = 0.25 * pulseIntensity;
    pCtx.lineWidth = 6;
    pCtx.shadowBlur = 12;
    pCtx.beginPath();
    for (const seg of gp.segments) {
      pCtx.moveTo(seg.x1, seg.y1);
      pCtx.lineTo(seg.x2, seg.y2);
    }
    pCtx.stroke();

    // Core line (2px, full intensity)
    pCtx.globalAlpha = 0.8 * pulseIntensity;
    pCtx.lineWidth = 2;
    pCtx.shadowBlur = 8;
    pCtx.beginPath();
    for (const seg of gp.segments) {
      pCtx.moveTo(seg.x1, seg.y1);
      pCtx.lineTo(seg.x2, seg.y2);
    }
    pCtx.stroke();

    // Bright center (1px white-ish core for contrast)
    pCtx.globalAlpha = 0.35 * pulseIntensity;
    pCtx.lineWidth = 1;
    pCtx.strokeStyle = '#ffffff';
    pCtx.shadowBlur = 4;
    pCtx.shadowColor = col;
    pCtx.beginPath();
    for (const seg of gp.segments) {
      pCtx.moveTo(seg.x1, seg.y1);
      pCtx.lineTo(seg.x2, seg.y2);
    }
    pCtx.stroke();

    pCtx.restore();
  }
}

// =============================================================
// ANIMATION LOOP
// =============================================================
let lastTime = 0;
let connectorTimer = 0;
let treeTimer = 0;

function animate(now) {
  animFrame = requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  // Background particles
  updateBgParticles(dt);
  drawBgParticles();

  // ── Draw glow paths (before particles so particles appear on top) ──
  drawGlowPaths(dt);

  // Spawn timers
  connectorTimer += dt;
  if (connectorTimer > 0.8) {
    connectorTimer = 0;
    spawnConnectorParticle();
  }
  treeTimer += dt;
  if (treeTimer > 0.5) {
    treeTimer = 0;
    spawnTreeParticle();
  }

  // ── Draw connector particles ──
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 12) p.trail.shift();

    // draw trail
    if (p.trail.length > 1) {
      pCtx.beginPath();
      pCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      pCtx.strokeStyle = p.color;
      pCtx.globalAlpha = p.alpha * 0.3;
      pCtx.lineWidth = p.size * 0.6;
      pCtx.stroke();
    }

    // draw head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // glow
    pCtx.globalAlpha = p.alpha * 0.3;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;

    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }

  // ── Draw tree particles (on glow path) ──
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      // reached end -- burst
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }

    const dx = wp.x - p.x;
    const dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 2) {
      p.x = wp.x;
      p.y = wp.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 16) p.trail.shift();

    // draw trail
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        pCtx.globalAlpha = ratio * p.alpha * 0.4;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = p.color;
        pCtx.lineWidth = p.size * 0.5 * ratio;
        pCtx.stroke();
      }
    }

    // head glow
    pCtx.globalAlpha = p.alpha * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }

  // ── Draw burst particles ──
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;

    pCtx.globalAlpha = p.life * 0.8;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // glow
    pCtx.globalAlpha = p.life * 0.3;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3 * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }

  // ── Draw connector lines between cards (static) ──
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardElements[i];
    const toCard = cardElements[i + 1];
    if (!fromCard || !toCard) continue;
    if (MODULES[i].status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;

    const toPending = MODULES[i + 1].status === 'pending';
    pCtx.beginPath();
    pCtx.moveTo(fromRect.right + 2, y);
    pCtx.lineTo(toRect.left - 2, y);
    pCtx.strokeStyle = '#2e3440';
    pCtx.lineWidth = 1;
    pCtx.globalAlpha = toPending ? 0.3 : 0.6;
    pCtx.setLineDash(toPending ? [4, 4] : []);
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.globalAlpha = 1;
  }
}

// =============================================================
// COLLAPSE / EXPAND
// =============================================================
// Click on a module card toggles its sub-module tree visibility
// (the collapse feature from the spec)
function setupCollapse() {
  document.addEventListener('dblclick', (e) => {
    const card = e.target.closest('.module-card');
    if (!card) return;
    const mi = parseInt(card.dataset.idx);
    const subs = card.closest('.module-col').querySelector('.submods');
    if (!subs) return;

    const isCollapsed = subs.style.maxHeight === '0px';
    if (isCollapsed) {
      subs.style.maxHeight = '';
      subs.style.overflow = '';
      subs.style.opacity = '';
      // Recompute after expand
      requestAnimationFrame(() => {
        computeTreeLineHeights();
        document.querySelectorAll('.on-glow-path').forEach(el => el.classList.remove('on-glow-path'));
        computeGlowPaths();
      });
    } else {
      subs.style.maxHeight = '0px';
      subs.style.overflow = 'hidden';
      subs.style.opacity = '0';
    }
  });
}

// =============================================================
// TREE-GROW ANIMATION
// =============================================================
// On initial load, each module's tree "grows" in -- the sub-module rows
// stagger in with a slight delay, creating a tree-grow visual effect.
// This is handled by animateSubEntrance, which is called during buildModules.

// =============================================================
// INIT
// =============================================================
function init() {
  buildModules();
  buildDashboard();
  initCanvas();
  initBgParticles();
  setupCollapse();
  lastTime = performance.now();
  animFrame = requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
