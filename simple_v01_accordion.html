<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Simple View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --card: #0f1117;
    --card-border: #1a1b26;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --green: #22c55e;
    --gray: #4b5563;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --glow-blue: rgba(59, 130, 246, 0.35);
    --glow-green: rgba(34, 197, 94, 0.25);
    --glow-purple: rgba(139, 92, 246, 0.25);
    --glass-bg: rgba(15, 17, 23, 0.75);
    --glass-border: rgba(255, 255, 255, 0.06);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Top Bar ─── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    background: var(--card);
    border-bottom: 1px solid var(--card-border);
    flex-shrink: 0;
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 15px;
    box-shadow: 0 0 16px var(--glow-purple);
  }
  .brand-name {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.3px;
  }
  .run-info {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .run-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid rgba(139, 92, 246, 0.2);
    padding: 4px 12px;
    border-radius: 6px;
    font-family: 'Inter', monospace;
  }
  .run-stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .run-stat .label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .run-stat .value { font-weight: 600; }
  .run-stat .value.cost { color: var(--green); }
  .run-stat .value.time { color: var(--blue); }

  /* ─── Main Layout ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Left Panel: Accordion Timeline ─── */
  .left-panel {
    width: 42%;
    min-width: 380px;
    border-right: 1px solid var(--card-border);
    overflow-y: auto;
    padding: 28px 24px 28px 28px;
    scrollbar-width: thin;
    scrollbar-color: var(--card-border) transparent;
  }
  .left-panel::-webkit-scrollbar { width: 6px; }
  .left-panel::-webkit-scrollbar-track { background: transparent; }
  .left-panel::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  /* ─── Module Node ─── */
  .module {
    position: relative;
    margin-bottom: 8px;
  }
  .module:last-child { margin-bottom: 0; }

  /* Vertical connector between modules */
  .module:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 20px;
    top: 56px;
    bottom: -8px;
    width: 2px;
    background: linear-gradient(180deg, var(--card-border), rgba(26, 27, 38, 0.3));
    z-index: 0;
  }
  .module.complete:not(:last-child)::after {
    background: linear-gradient(180deg, rgba(34, 197, 94, 0.4), rgba(34, 197, 94, 0.1));
  }
  .module.active:not(:last-child)::after {
    background: linear-gradient(180deg, rgba(59, 130, 246, 0.4), rgba(26, 27, 38, 0.3));
  }

  .module-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--card-border);
  }
  .module-header:hover {
    background: #12131e;
    border-color: #252736;
  }
  .module.expanded > .module-header {
    border-color: #252736;
    background: #12131e;
  }

  .module-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 16px;
    flex-shrink: 0;
    position: relative;
    transition: box-shadow 0.3s;
  }
  .module.complete .module-icon {
    background: rgba(34, 197, 94, 0.12);
    border: 1.5px solid rgba(34, 197, 94, 0.3);
    color: var(--green);
  }
  .module.active .module-icon {
    background: rgba(59, 130, 246, 0.12);
    border: 1.5px solid rgba(59, 130, 246, 0.35);
    color: var(--blue);
    box-shadow: 0 0 20px var(--glow-blue);
    animation: pulse-icon 2.5s ease-in-out infinite;
  }
  .module.pending .module-icon {
    background: rgba(75, 85, 99, 0.12);
    border: 1.5px solid rgba(75, 85, 99, 0.3);
    color: var(--gray);
  }

  @keyframes pulse-icon {
    0%, 100% { box-shadow: 0 0 12px var(--glow-blue); }
    50% { box-shadow: 0 0 28px var(--glow-blue), 0 0 48px rgba(59, 130, 246, 0.12); }
  }

  .module-text { flex: 1; min-width: 0; }
  .module-name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.2px;
    margin-bottom: 2px;
  }
  .module-summary {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .module-chevron {
    color: var(--text-muted);
    font-size: 11px;
    transition: transform 0.3s ease;
    flex-shrink: 0;
  }
  .module.expanded > .module-header .module-chevron {
    transform: rotate(180deg);
  }

  /* ─── Sub-module Accordion Body ─── */
  .module-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .module.expanded > .module-body {
    max-height: 1200px;
  }

  .module-body-inner {
    padding: 12px 0 8px 20px;
  }

  /* Iteration group */
  .iteration {
    margin-bottom: 12px;
    position: relative;
  }
  .iteration:last-child { margin-bottom: 4px; }

  .iter-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-left: 24px;
  }

  .substeps {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    padding-left: 24px;
  }

  .substep {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    border: 1px solid transparent;
    position: relative;
  }
  .substep:hover { background: rgba(255,255,255,0.04); }
  .substep.selected {
    border-color: rgba(139, 92, 246, 0.4);
    background: rgba(139, 92, 246, 0.08);
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.1);
  }

  .substep .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .substep.complete .dot { background: var(--green); box-shadow: 0 0 6px var(--glow-green); }
  .substep.active .dot  { background: var(--blue); box-shadow: 0 0 6px var(--glow-blue); animation: pulse-dot 2s ease-in-out infinite; }
  .substep.pending .dot { background: var(--gray); }
  .substep .sname { color: var(--text-dim); }
  .substep.pending .sname { color: var(--text-muted); }
  .substep .sprogress {
    font-size: 10px;
    color: var(--blue);
    font-weight: 600;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 4px var(--glow-blue); }
    50% { box-shadow: 0 0 10px var(--glow-blue); }
  }

  /* Arrow between substeps */
  .arrow {
    color: var(--text-muted);
    font-size: 9px;
    opacity: 0.5;
    user-select: none;
  }

  /* Seed Hypothesis has no iterations — just a single-line summary */
  .single-summary {
    padding: 10px 16px 10px 44px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* ─── Right Panel: Summary Card ─── */
  .right-panel {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--card-border) transparent;
  }
  .right-panel::-webkit-scrollbar { width: 6px; }
  .right-panel::-webkit-scrollbar-track { background: transparent; }
  .right-panel::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

  .summary-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 28px;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 4px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
    animation: card-in 0.3s ease-out;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateX(16px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 4px 10px;
    border-radius: 6px;
    width: fit-content;
    margin-bottom: 16px;
  }
  .card-badge.complete { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .card-badge.active   { background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }
  .card-badge.pending   { background: rgba(75,85,99,0.1); color: var(--gray); border: 1px solid rgba(75,85,99,0.2); }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }
  .card-context {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .card-divider {
    height: 1px;
    background: var(--glass-border);
    margin-bottom: 20px;
  }

  .card-body {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text-dim);
    flex: 1;
  }
  .card-body p { margin-bottom: 14px; }
  .card-body p:last-child { margin-bottom: 0; }

  .card-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--glass-border);
  }
  .metric {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .metric-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .metric-value {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .metric-value.green { color: var(--green); }
  .metric-value.blue  { color: var(--blue); }
  .metric-value.purple { color: var(--purple); }
  .metric-value.white { color: var(--text); }

  /* ─── Overview (default) Card ─── */
  .overview-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }
  .overview-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 16px;
  }
  .overview-item .oi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .overview-item .oi-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .overview-item .oi-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Progress bar used inside active cards */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    transition: width 0.5s ease;
  }

  /* Active artifact list */
  .artifact-list {
    margin-top: 12px;
  }
  .artifact-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--glass-border);
    font-size: 13px;
  }
  .artifact-item:last-child { border-bottom: none; }
  .artifact-item .ai-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .artifact-item .ai-status.done { background: var(--green); }
  .artifact-item .ai-status.running { background: var(--blue); animation: pulse-dot 2s ease-in-out infinite; }
  .artifact-item .ai-status.waiting { background: var(--gray); }
  .artifact-item .ai-name { color: var(--text-dim); flex: 1; }
  .artifact-item .ai-result { color: var(--text-muted); font-size: 11px; font-style: italic; }

  /* ─── Bottom Stats Bar ─── */
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 36px;
    background: var(--card);
    border-top: 1px solid var(--card-border);
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .bottom-bar .stats { display: flex; gap: 20px; }
  .bottom-bar .stat { display: flex; align-items: center; gap: 5px; }
  .bottom-bar .stat .s-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .bottom-bar .stat .s-dot.green { background: var(--green); }
  .bottom-bar .stat .s-dot.blue  { background: var(--blue); }
  .bottom-bar .stat .s-dot.gray  { background: var(--gray); }
  .bottom-bar .engine { opacity: 0.6; }
</style>
</head>

// ─── State ───
let expandedModule = 'inv_loop'; // active module starts expanded
let selectedStep = null;

// ─── Render Timeline ───
function renderTimeline() {
  const container = document.getElementById('timeline');
  container.innerHTML = '';

  DATA.modules.forEach(mod => {
    const el = document.createElement('div');
    el.className = `module ${mod.status}${mod.id === expandedModule ? ' expanded' : ''}`;
    el.dataset.id = mod.id;

    // Header
    const header = document.createElement('div');
    header.className = 'module-header';
    header.innerHTML = `
      <div class="module-icon">${mod.icon}</div>
      <div class="module-text">
        <div class="module-name">${mod.name}</div>
        <div class="module-summary">${mod.summary}</div>
      </div>
      <div class="module-chevron">\u25BC</div>
    `;
    header.addEventListener('click', () => toggleModule(mod.id));
    el.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'module-body';

    const inner = document.createElement('div');
    inner.className = 'module-body-inner';

    if (mod.iterations) {
      mod.iterations.forEach(iter => {
        const iterDiv = document.createElement('div');
        iterDiv.className = 'iteration';
        iterDiv.innerHTML = `<div class="iter-label">${iter.label}</div>`;

        const stepsDiv = document.createElement('div');
        stepsDiv.className = 'substeps';

        iter.steps.forEach((step, si) => {
          if (si > 0) {
            const arrow = document.createElement('span');
            arrow.className = 'arrow';
            arrow.textContent = '\u2192';
            stepsDiv.appendChild(arrow);
          }

          const stepEl = document.createElement('div');
          stepEl.className = `substep ${step.status}${selectedStep === step.id ? ' selected' : ''}`;
          stepEl.dataset.stepId = step.id;

          let inner_html = `<span class="dot"></span><span class="sname">${step.name}</span>`;
          if (step.progress) {
            inner_html += `<span class="sprogress">${step.progress}</span>`;
          }
          stepEl.innerHTML = inner_html;

          stepEl.addEventListener('click', (e) => {
            e.stopPropagation();
            selectStep(step);
          });

          stepsDiv.appendChild(stepEl);
        });

        iterDiv.appendChild(stepsDiv);
        inner.appendChild(iterDiv);
      });
    } else {
      inner.innerHTML = `<div class="single-summary">${mod.singleSummary ? mod.singleSummary.body.replace(/<\/?p>/g, ' ').trim() : ''}</div>`;
    }

    body.appendChild(inner);
    el.appendChild(body);
    container.appendChild(el);
  });
}

// ─── Toggle Module ───
function toggleModule(moduleId) {
  if (expandedModule === moduleId) {
    expandedModule = null;
  } else {
    expandedModule = moduleId;
  }
  renderTimeline();

  // If no step is selected and we expanded a module with iterations, show its overview
  if (expandedModule) {
    const mod = DATA.modules.find(m => m.id === expandedModule);
    if (mod && !mod.iterations && mod.singleSummary) {
      renderSummaryFromData(mod.singleSummary);
    }
  }
}

// ─── Select Step ───
function selectStep(step) {
  selectedStep = step.id;
  renderTimeline();
  renderSummaryFromData(step.summary);
}

// ─── Render Summary Card ───
function renderSummaryFromData(data) {
  const card = document.getElementById('summary-card');

  let statusLabel = data.status === 'complete' ? 'Complete' : data.status === 'active' ? 'In Progress' : 'Pending';
  let statusIcon = data.status === 'complete' ? '\u2713' : data.status === 'active' ? '\u25B6' : '\u25CB';

  let html = `<div class="summary-card" style="animation: card-in 0.3s ease-out">`;
  html += `<div class="card-badge ${data.status}">${statusIcon} ${statusLabel}</div>`;
  html += `<div class="card-title">${data.title}</div>`;
  html += `<div class="card-context">${data.context}</div>`;
  html += `<div class="card-divider"></div>`;
  html += `<div class="card-body">${data.body}`;

  // Artifact list for active gen_art
  if (data.artifacts) {
    html += `<div class="progress-bar"><div class="fill" style="width: 60%"></div></div>`;
    html += `<div class="artifact-list">`;
    data.artifacts.forEach(a => {
      const statusCls = a.status === 'done' ? 'done' : a.status === 'running' ? 'running' : 'waiting';
      html += `<div class="artifact-item">
        <span class="ai-status ${statusCls}"></span>
        <span class="ai-name">${a.name}</span>
        <span class="ai-result">${a.result}</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // card-body

  // Metrics
  if (data.metrics && data.metrics.length) {
    html += `<div class="card-metrics">`;
    data.metrics.forEach(m => {
      html += `<div class="metric">
        <div class="metric-label">${m.label}</div>
        <div class="metric-value ${m.cls}">${m.value}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  card.innerHTML = html;
}

// ─── Elapsed Timer ───
let elapsedSeconds = 2 * 3600 + 34 * 60 + 17;
function updateElapsed() {
  elapsedSeconds++;
  const h = String(Math.floor(elapsedSeconds / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsedSeconds % 3600) / 60)).padStart(2, '0');
  const s = String(elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('elapsed').textContent = `${h}:${m}:${s}`;
}
