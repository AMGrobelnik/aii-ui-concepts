<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c10;
    --surface:   #0f1117;
    --surface2:  #0d0f15;
    --border:    #1e2130;
    --text:      #c9cdd6;
    --text-dim:  #6b7280;
    --text-bright: #e8ecf4;
    --accent:    #3b82f6;
    --green:     #22c55e;
    --green-dim: #166534;
    --purple:    #a855f7;
    --purple-dim:#6b21a8;
    --blue:      #3b82f6;
    --blue-dim:  #1d4ed8;
    --orange:    #f59e0b;
    --orange-dim:#b45309;
    --row-h:     28px;
    --label-w:   220px;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px; line-height: 1;
  }

  /* ── Top Bar ─────────────────────────────────────── */
  .topbar {
    height: 48px; display: flex; align-items: center;
    padding: 0 20px; gap: 16px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-brand {
    font-weight: 700; font-size: 14px; color: var(--text-bright);
    display: flex; align-items: center; gap: 8px;
  }
  .topbar-brand svg { flex-shrink: 0; }
  .topbar-sep { width: 1px; height: 20px; background: var(--border); }
  .topbar-run { color: var(--text-dim); font-size: 12px; }
  .topbar-run span { color: var(--text); font-weight: 500; }
  .topbar-spacer { flex: 1; }
  .topbar-stat {
    display: flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums; font-size: 12px; color: var(--text-dim);
  }
  .topbar-stat .val {
    color: var(--text-bright); font-weight: 600; font-size: 13px;
  }

  /* ── Main Layout ─────────────────────────────────── */
  .main {
    display: flex; flex-direction: column;
    height: calc(100vh - 48px - 36px);
  }

  .gantt-wrapper {
    display: flex; flex: 1; overflow: hidden; position: relative;
  }

  /* ── Label Column (left, fixed) ──────────────────── */
  .label-col {
    width: var(--label-w); min-width: var(--label-w); flex-shrink: 0;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border); background: var(--bg);
    z-index: 5;
  }
  .label-header {
    height: 36px; display: flex; align-items: center;
    padding: 0 12px; font-size: 11px; color: var(--text-dim);
    font-weight: 600; text-transform: uppercase; letter-spacing: .5px;
    border-bottom: 1px solid var(--border); background: var(--surface);
    flex-shrink: 0;
  }
  .label-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
  }
  .label-body::-webkit-scrollbar { width: 0; }

  .label-row {
    height: var(--row-h); display: flex; align-items: center;
    padding: 0 12px; cursor: default; white-space: nowrap;
    border-bottom: 1px solid transparent;
  }
  .label-row.module {
    font-weight: 600; color: var(--text-bright); font-size: 12.5px;
    cursor: pointer; user-select: none;
  }
  .label-row.module:hover { background: rgba(255,255,255,.03); }
  .label-row.module .chevron {
    display: inline-block; width: 14px; font-size: 10px;
    color: var(--text-dim); transition: transform .15s;
    margin-right: 4px; text-align: center;
  }
  .label-row.module.collapsed .chevron { transform: rotate(-90deg); }
  .label-row.sub {
    padding-left: 34px; font-size: 12px; color: var(--text);
  }
  .label-row.sub.active { color: var(--accent); font-weight: 500; }
  .label-row.sub.pending { color: var(--text-dim); font-style: italic; }
  .label-row.hidden { display: none; }

  /* Module color dots */
  .mod-dot {
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block; margin-right: 6px; flex-shrink: 0;
  }

  /* ── Chart Area (right, scrollable) ──────────────── */
  .chart-col {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    position: relative;
  }

  .time-header {
    height: 36px; overflow: hidden; flex-shrink: 0;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: relative;
  }
  .time-header-inner {
    height: 100%; position: relative;
  }
  .time-tick {
    position: absolute; top: 0; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-variant-numeric: tabular-nums;
    color: var(--text-dim); font-weight: 500;
    border-left: 1px solid var(--border);
    padding-left: 6px; box-sizing: border-box;
  }
  .time-tick:first-child { border-left: none; }

  .chart-body {
    flex: 1; overflow: auto; position: relative;
  }
  .chart-body::-webkit-scrollbar { width: 8px; height: 8px; }
  .chart-body::-webkit-scrollbar-track { background: var(--bg); }
  .chart-body::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 4px; }
  .chart-body::-webkit-scrollbar-corner { background: var(--bg); }

  .chart-inner {
    position: relative; min-height: 100%;
  }

  /* Grid lines */
  .grid-line {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: rgba(255,255,255,.025); pointer-events: none;
  }

  /* Row backgrounds */
  .chart-row {
    height: var(--row-h); position: relative;
    border-bottom: 1px solid transparent;
  }
  .chart-row.even { background: var(--surface); }
  .chart-row.odd  { background: var(--surface2); }
  .chart-row.highlight { background: rgba(59,130,246,.04); }
  .chart-row.hidden { display: none; }

  /* Gantt bars */
  .bar {
    position: absolute; top: 4px; height: 20px;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; padding: 0 8px;
    font-size: 10px; font-weight: 500; color: #fff;
    font-variant-numeric: tabular-nums;
    transition: filter .12s, transform .12s;
    overflow: hidden; white-space: nowrap;
    z-index: 2;
  }
  .bar:hover {
    filter: brightness(1.25);
    transform: translateY(-1px);
    z-index: 10;
  }
  .bar.complete {
    background: linear-gradient(90deg, var(--bar-color) 0%, var(--bar-dim) 4%, var(--bar-color) 10%, var(--bar-color) 90%, var(--bar-dim) 96%, var(--bar-color) 100%);
  }
  .bar.active {
    background: repeating-linear-gradient(
      -45deg,
      var(--bar-color),
      var(--bar-color) 8px,
      var(--bar-dim) 8px,
      var(--bar-dim) 16px
    );
    background-size: 200% 100%;
    animation: stripe-move 1.2s linear infinite;
  }
  @keyframes stripe-move {
    0%   { background-position: 0 0; }
    100% { background-position: 32px 0; }
  }

  .bar .bar-label {
    overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 2px rgba(0,0,0,.5);
  }

  /* Now line */
  .now-line {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: var(--accent); z-index: 4; pointer-events: none;
    animation: now-pulse 2s ease-in-out infinite;
  }
  @keyframes now-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: .55; }
  }
  .now-label {
    position: absolute; top: -34px; transform: translateX(-50%);
    background: var(--accent); color: #fff; font-size: 10px;
    font-weight: 600; padding: 2px 7px; border-radius: 4px;
    pointer-events: none; white-space: nowrap; z-index: 5;
  }
  .now-line-header {
    position: absolute; top: 0; height: 36px; width: 2px;
    background: var(--accent); z-index: 6; pointer-events: none;
    animation: now-pulse 2s ease-in-out infinite;
  }

  /* Tooltip */
  .tooltip {
    position: fixed; z-index: 100; pointer-events: none;
    background: #1a1d28; border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    font-size: 12px; max-width: 280px;
    opacity: 0; transition: opacity .12s;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .tt-title {
    font-weight: 600; color: var(--text-bright); margin-bottom: 6px;
    font-size: 13px;
  }
  .tooltip .tt-row {
    display: flex; justify-content: space-between; gap: 16px;
    padding: 2px 0; color: var(--text);
  }
  .tooltip .tt-row .tt-key { color: var(--text-dim); }
  .tooltip .tt-row .tt-val { font-variant-numeric: tabular-nums; font-weight: 500; }
  .tooltip .tt-status {
    display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin-top: 4px;
  }

  /* ── Bottom Bar ──────────────────────────────────── */
  .bottombar {
    height: 36px; display: flex; align-items: center;
    padding: 0 20px; gap: 24px;
    background: var(--surface); border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-dim);
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  .bottombar .bval { color: var(--text-bright); font-weight: 600; }
  .bottombar .active-step { color: var(--accent); font-weight: 500; }
  .progress-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px;
  }
  .progress-track {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px;
    max-width: 180px;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--green), var(--accent));
    transition: width .3s;
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-brand">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect width="20" height="20" rx="5" fill="#3b82f6"/>
      <path d="M6 14V8l4-3 4 3v6" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="10" cy="10.5" r="1.5" fill="#fff"/>
    </svg>
    AI Inventor
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-run">Run: <span>quantum-catalyst-7f3a</span></div>
  <div class="topbar-spacer"></div>
  <div class="topbar-stat">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#6b7280" stroke-width="1.2"/><path d="M7 4v3.5l2.2 1.3" stroke="#6b7280" stroke-width="1.2" stroke-linecap="round"/></svg>
    Running for <span class="val" id="topElapsed">02:34:17</span>
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-stat">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5C4.5 1.5 3 3.5 3 5c0 2.5 4 7.5 4 7.5s4-5 4-7.5c0-1.5-1.5-3.5-4-3.5z" stroke="#6b7280" stroke-width="1.2"/><circle cx="7" cy="5.2" r="1.3" stroke="#6b7280" stroke-width="1"/></svg>
    Cost <span class="val" id="topCost">$12.47</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="gantt-wrapper">
    <!-- Label Column -->
    <div class="label-col">
      <div class="label-header">Pipeline Step</div>
      <div class="label-body" id="labelBody"></div>
    </div>
    <!-- Chart Column -->
    <div class="chart-col">
      <div class="time-header" id="timeHeader">
        <div class="time-header-inner" id="timeHeaderInner"></div>
      </div>
      <div class="chart-body" id="chartBody">
        <div class="chart-inner" id="chartInner"></div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottombar">
  <div>Elapsed: <span class="bval" id="btmElapsed">02:34:17</span></div>
  <div>Active: <span class="active-step">Artifacts (Iter 2)</span></div>
  <div>Cost: <span class="bval" id="btmCost">$12.47</span></div>
  <div class="progress-wrap">
    <span><span class="bval" id="btmPct">65</span>% complete</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:65%"></div></div>
  </div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────

const TOTAL_SECONDS = 2 * 3600 + 34 * 60 + 17; // 02:34:17
const PX_PER_SEC = 1.6; // zoom level
const COLORS = {
  green:  { bar: '#22c55e', dim: '#166534' },
  purple: { bar: '#a855f7', dim: '#6b21a8' },
  blue:   { bar: '#3b82f6', dim: '#1d4ed8' },
  orange: { bar: '#f59e0b', dim: '#b45309' },
};

function t(m, s) { return m * 60 + (s || 0); }

const modules = [
  {
    id: 'seed', name: 'Seed Hypothesis', color: 'green', collapsed: false,
    steps: [
      { name: 'Mine Papers',   status: 'complete', start: t(0),     end: t(12, 45), cost: '$0.83' },
      { name: 'Build KG',      status: 'complete', start: t(12,45), end: t(26, 10), cost: '$0.61' },
      { name: 'Find Gaps',     status: 'complete', start: t(26,10), end: t(33, 50), cost: '$0.42' },
      { name: 'Select Seeds',  status: 'complete', start: t(33,50), end: t(38, 20), cost: '$0.19' },
    ]
  },
  {
    id: 'hypo', name: 'Hypothesis Loop', color: 'purple', collapsed: false,
    steps: [
      { name: 'Iter 1: Generate', status: 'complete', start: t(38,20), end: t(46, 5),  cost: '$0.55' },
      { name: 'Iter 1: Review',   status: 'complete', start: t(46, 5), end: t(54, 30), cost: '$0.72' },
      { name: 'Iter 2: Generate', status: 'complete', start: t(54,30), end: t(62, 15), cost: '$0.48' },
      { name: 'Iter 2: Review',   status: 'complete', start: t(62,15), end: t(71, 0),  cost: '$0.68' },
      { name: 'Iter 3: Generate', status: 'complete', start: t(71, 0), end: t(78, 40), cost: '$0.51' },
      { name: 'Iter 3: Review',   status: 'complete', start: t(78,40), end: t(87, 10), cost: '$0.73' },
    ]
  },
  {
    id: 'inv', name: 'Invention Loop', color: 'blue', collapsed: false,
    steps: [
      { name: 'Iter 1: Strategy',  status: 'complete', start: t(87,10),  end: t(93, 25),  cost: '$0.38' },
      { name: 'Iter 1: Plan',      status: 'complete', start: t(93,25),  end: t(101, 0),  cost: '$0.44' },
      { name: 'Iter 1: Artifacts', status: 'complete', start: t(101, 0), end: t(112, 30), cost: '$0.92' },
      { name: 'Iter 1: Paper',     status: 'complete', start: t(112,30), end: t(121, 45), cost: '$0.85' },
      { name: 'Iter 1: Review',    status: 'complete', start: t(121,45), end: t(128, 15), cost: '$0.62' },
      { name: 'Iter 1: Update',    status: 'complete', start: t(128,15), end: t(132, 50), cost: '$0.31' },
      { name: 'Iter 2: Strategy',  status: 'complete', start: t(132,50), end: t(138, 20), cost: '$0.35', highlight: true },
      { name: 'Iter 2: Plan',      status: 'complete', start: t(138,20), end: t(145, 55), cost: '$0.47', highlight: true },
      { name: 'Iter 2: Artifacts', status: 'active',   start: t(145,55), end: TOTAL_SECONDS, cost: '$0.81', highlight: true },
      { name: 'Iter 2: Paper',     status: 'pending',  start: null, end: null, highlight: true },
      { name: 'Iter 2: Review',    status: 'pending',  start: null, end: null, highlight: true },
      { name: 'Iter 2: Update',    status: 'pending',  start: null, end: null, highlight: true },
    ]
  },
  {
    id: 'paper', name: 'Paper & Repository', color: 'orange', collapsed: false,
    steps: [
      { name: '(not started)', status: 'pending', start: null, end: null },
    ]
  },
];

// ── UTILITY ───────────────────────────────────────────────────────────

function fmtDuration(secs) {
  if (secs < 0) secs = 0;
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  if (m > 0) return `${m}m ${String(s).padStart(2,'0')}s`;
  return `${s}s`;
}

function fmtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── RENDER ────────────────────────────────────────────────────────────

const labelBody   = document.getElementById('labelBody');
const chartBody   = document.getElementById('chartBody');
const chartInner  = document.getElementById('chartInner');
const timeHeader  = document.getElementById('timeHeader');
const timeHeaderInner = document.getElementById('timeHeaderInner');
const tooltipEl   = document.getElementById('tooltip');

const totalWidth = Math.ceil(TOTAL_SECONDS * PX_PER_SEC) + 120; // extra space after "now"

function buildTimeAxis() {
  timeHeaderInner.style.width = totalWidth + 'px';
  const interval = 600; // 10 minutes
  for (let s = 0; s <= TOTAL_SECONDS + 60; s += interval) {
    const tick = document.createElement('div');
    tick.className = 'time-tick';
    tick.style.left = (s * PX_PER_SEC) + 'px';
    tick.style.width = (interval * PX_PER_SEC) + 'px';
    tick.textContent = fmtTime(s);
    timeHeaderInner.appendChild(tick);
  }
  // Now indicator in header
  const nowH = document.createElement('div');
  nowH.className = 'now-line-header';
  nowH.style.left = (TOTAL_SECONDS * PX_PER_SEC) + 'px';
  timeHeaderInner.appendChild(nowH);

  const nowLbl = document.createElement('div');
  nowLbl.className = 'now-label';
  nowLbl.textContent = 'Now';
  nowLbl.style.position = 'absolute';
  nowLbl.style.left = (TOTAL_SECONDS * PX_PER_SEC) + 'px';
  nowLbl.style.top = '6px';
  nowLbl.style.transform = 'translateX(-50%)';
  nowLbl.style.zIndex = '7';
  timeHeaderInner.appendChild(nowLbl);
}

let allRows = []; // { el (label), chartEl, moduleId, type:'module'|'sub', step? }

function buildRows() {
  chartInner.style.width = totalWidth + 'px';
  let rowIdx = 0;

  // Grid lines
  const interval = 600;
  for (let s = interval; s <= TOTAL_SECONDS + 60; s += interval) {
    const gl = document.createElement('div');
    gl.className = 'grid-line';
    gl.style.left = (s * PX_PER_SEC) + 'px';
    chartInner.appendChild(gl);
  }

  // Now line in chart
  const nowLine = document.createElement('div');
  nowLine.className = 'now-line';
  nowLine.style.left = (TOTAL_SECONDS * PX_PER_SEC) + 'px';
  chartInner.appendChild(nowLine);

  modules.forEach((mod) => {
    const c = COLORS[mod.color];

    // Module label row
    const labelRow = document.createElement('div');
    labelRow.className = 'label-row module';
    labelRow.innerHTML = `<span class="chevron">&#9662;</span><span class="mod-dot" style="background:${c.bar}"></span>${mod.name}`;
    labelBody.appendChild(labelRow);

    // Module chart row
    const chartRow = document.createElement('div');
    chartRow.className = 'chart-row ' + (rowIdx % 2 === 0 ? 'even' : 'odd');
    chartInner.appendChild(chartRow);

    const modRowData = { el: labelRow, chartEl: chartRow, moduleId: mod.id, type: 'module' };
    allRows.push(modRowData);

    labelRow.addEventListener('click', () => toggleModule(mod.id));
    rowIdx++;

    // Sub-step rows
    mod.steps.forEach((step) => {
      const subLabel = document.createElement('div');
      subLabel.className = 'label-row sub' +
        (step.status === 'active' ? ' active' : '') +
        (step.status === 'pending' ? ' pending' : '');
      subLabel.dataset.module = mod.id;
      subLabel.textContent = step.name;
      labelBody.appendChild(subLabel);

      const subChart = document.createElement('div');
      subChart.className = 'chart-row ' + (rowIdx % 2 === 0 ? 'even' : 'odd');
      if (step.highlight) subChart.classList.add('highlight');
      subChart.dataset.module = mod.id;
      chartInner.appendChild(subChart);

      // Draw bar
      if (step.start !== null && step.end !== null) {
        const bar = document.createElement('div');
        const dur = step.end - step.start;
        const left = step.start * PX_PER_SEC;
        const width = dur * PX_PER_SEC;

        bar.className = 'bar ' + step.status;
        bar.style.left = left + 'px';
        bar.style.width = Math.max(width, 6) + 'px';
        bar.style.setProperty('--bar-color', c.bar);
        bar.style.setProperty('--bar-dim', c.dim);

        // Label inside bar
        if (width > 55) {
          const lbl = document.createElement('span');
          lbl.className = 'bar-label';
          lbl.textContent = fmtDuration(dur);
          bar.appendChild(lbl);
        }

        // Tooltip data
        bar.dataset.tipTitle = mod.name + ' / ' + step.name;
        bar.dataset.tipStart = fmtTime(step.start);
        bar.dataset.tipEnd = step.status === 'active' ? 'ongoing' : fmtTime(step.end);
        bar.dataset.tipDur = fmtDuration(dur);
        bar.dataset.tipCost = step.cost || '---';
        bar.dataset.tipStatus = step.status;
        bar.dataset.tipColor = c.bar;

        bar.addEventListener('mouseenter', showTooltip);
        bar.addEventListener('mousemove', moveTooltip);
        bar.addEventListener('mouseleave', hideTooltip);
        bar.addEventListener('click', (e) => { e.stopPropagation(); pinTooltip(bar); });

        subChart.appendChild(bar);
      }

      allRows.push({ el: subLabel, chartEl: subChart, moduleId: mod.id, type: 'sub', step });
      rowIdx++;
    });
  });

  // Set chart height
  chartInner.style.height = (rowIdx * parseInt(getComputedStyle(document.documentElement).getPropertyValue('--row-h'))) + 'px';
}

// ── COLLAPSE / EXPAND ─────────────────────────────────────────────────

const collapsedModules = new Set();

function toggleModule(modId) {
  if (collapsedModules.has(modId)) {
    collapsedModules.delete(modId);
  } else {
    collapsedModules.add(modId);
  }
  applyCollapse();
}

function applyCollapse() {
  allRows.forEach(row => {
    if (row.type === 'module') {
      if (collapsedModules.has(row.moduleId)) {
        row.el.classList.add('collapsed');
      } else {
        row.el.classList.remove('collapsed');
      }
    }
    if (row.type === 'sub') {
      const hidden = collapsedModules.has(row.moduleId);
      row.el.classList.toggle('hidden', hidden);
      row.chartEl.classList.toggle('hidden', hidden);
    }
  });
  // Re-stripe visible rows
  let vis = 0;
  allRows.forEach(row => {
    if (!row.el.classList.contains('hidden')) {
      row.chartEl.classList.remove('even', 'odd');
      row.chartEl.classList.add(vis % 2 === 0 ? 'even' : 'odd');
      vis++;
    }
  });
}

// ── TOOLTIP ───────────────────────────────────────────────────────────

let pinnedBar = null;

function showTooltip(e) {
  const d = e.currentTarget.dataset;
  const statusColor = d.tipStatus === 'complete' ? '#22c55e' : d.tipStatus === 'active' ? '#3b82f6' : '#6b7280';
  const statusLabel = d.tipStatus === 'complete' ? 'Complete' : d.tipStatus === 'active' ? 'Running' : 'Pending';

  tooltipEl.innerHTML = `
    <div class="tt-title" style="color:${d.tipColor}">${d.tipTitle}</div>
    <div class="tt-row"><span class="tt-key">Start</span><span class="tt-val">${d.tipStart}</span></div>
    <div class="tt-row"><span class="tt-key">End</span><span class="tt-val">${d.tipEnd}</span></div>
    <div class="tt-row"><span class="tt-key">Duration</span><span class="tt-val">${d.tipDur}</span></div>
    <div class="tt-row"><span class="tt-key">Cost</span><span class="tt-val">${d.tipCost}</span></div>
    <div><span class="tt-status" style="background:${statusColor}22;color:${statusColor}">${statusLabel}</span></div>
  `;
  tooltipEl.classList.add('show');
}

function moveTooltip(e) {
  if (pinnedBar) return;
  let x = e.clientX + 14;
  let y = e.clientY + 14;
  const tw = tooltipEl.offsetWidth;
  const th = tooltipEl.offsetHeight;
  if (x + tw > window.innerWidth - 8) x = e.clientX - tw - 10;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - 10;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}

function hideTooltip() {
  if (pinnedBar) return;
  tooltipEl.classList.remove('show');
}

function pinTooltip(bar) {
  if (pinnedBar === bar) {
    pinnedBar = null;
    tooltipEl.classList.remove('show');
    return;
  }
  pinnedBar = bar;
  const d = bar.dataset;
  showTooltip({ currentTarget: bar });
  const rect = bar.getBoundingClientRect();
  let x = rect.right + 8;
  let y = rect.top;
  const tw = tooltipEl.offsetWidth;
  if (x + tw > window.innerWidth - 8) x = rect.left - tw - 8;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}

document.addEventListener('click', (e) => {
  if (pinnedBar && !tooltipEl.contains(e.target)) {
    pinnedBar = null;
    tooltipEl.classList.remove('show');
  }
});

// ── SCROLL SYNC ───────────────────────────────────────────────────────

chartBody.addEventListener('scroll', () => {
  timeHeaderInner.style.transform = `translateX(-${chartBody.scrollLeft}px)`;
  labelBody.scrollTop = chartBody.scrollTop;
});

labelBody.addEventListener('scroll', () => {
  chartBody.scrollTop = labelBody.scrollTop;
});

// ── INIT ──────────────────────────────────────────────────────────────

buildTimeAxis();
buildRows();

// Scroll so "now" line is visible with some space on the right
requestAnimationFrame(() => {
  const nowPx = TOTAL_SECONDS * PX_PER_SEC;
  const viewW = chartBody.clientWidth;
  chartBody.scrollLeft = Math.max(0, nowPx - viewW + 100);
});
</script>
