<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Best 09</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f172a;
    --bg-raised:  #1e293b;
    --surface:    #1e293b;
    --surface-2:  #334155;
    --border:     #334155;
    --border-dim: #1e293b;
    --text:       #e2e8f0;
    --text-dim:   #94a3b8;
    --text-muted: #64748b;
    --text-faint: #475569;
    --green:      #22c55e;
    --green-dim:  rgba(34,197,94,0.12);
    --purple:     #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --blue:       #3b82f6;
    --blue-dim:   rgba(59,130,246,0.12);
    --orange:     #f59e0b;
    --orange-dim: rgba(245,158,11,0.12);
    --red:        #ef4444;
    --cyan:       #06b6d4;
    --cyan-dim:   rgba(6,182,212,0.12);
    --card-radius: 10px;
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; flex-direction: column; }

  /* ===== HEADER ===== */
  .header {
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    border-bottom: 1px solid var(--border-dim);
    background: var(--bg-raised);
    flex-shrink: 0;
    position: relative;
    z-index: 20;
  }
  .header-logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .header-logo-icon {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 6px;
    display: grid; place-items: center;
    font-size: 12px; color: #fff;
  }

  /* Header master ring */
  .header-ring-wrap {
    width: 36px; height: 36px;
    position: relative;
    flex-shrink: 0;
  }
  .header-ring-wrap svg { width: 100%; height: 100%; }
  .h-ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .h-ring-fill  { fill: none; stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 94.25; transition: stroke-dashoffset 1.2s var(--ease); }
  .h-ring-text  { fill: var(--text); font-size: 8.5px; font-weight: 700;
    text-anchor: middle; dominant-baseline: central; font-family: 'Inter', sans-serif; }
  .h-ring-glow  {
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 1px dashed var(--green);
    opacity: 0.35;
    animation: hRingSpin 10s linear infinite;
  }
  @keyframes hRingSpin { to { transform: rotate(360deg); } }

  .header-stats {
    display: flex; gap: 18px; margin-left: auto;
    font-size: 11px; color: var(--text-dim);
  }
  .header-stats span { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ===== MAIN LAYOUT ===== */
  .main-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ===== PARTICLE CANVAS ===== */
  #particleCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 15;
  }

  /* ===== MODULES ROW ===== */
  .modules-area {
    padding: 18px 24px 0;
    position: relative;
    z-index: 10;
  }
  .modules-row {
    display: flex;
    gap: 14px;
  }

  /* ===== MODULE COLUMN ===== */
  .module-col {
    flex: 1;
    min-width: 0;
    max-width: 280px;
    position: relative;
  }

  /* ===== MODULE CARD ===== */
  .module-card {
    width: 100%;
    background: linear-gradient(135deg, var(--surface), rgba(30,41,59,0.8));
    border: 1px solid var(--border-dim);
    border-radius: var(--card-radius);
    padding: 12px 14px 12px 12px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s var(--ease), box-shadow 0.3s;
    display: flex;
    gap: 11px;
    align-items: flex-start;
  }
  .module-card:hover { transform: translateY(-1px); }
  .module-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: var(--card-radius) 0 0 var(--card-radius);
    transition: opacity 0.3s;
  }
  .module-card[data-color="green"]::before  { background: var(--green); }
  .module-card[data-color="purple"]::before { background: var(--purple); }
  .module-card[data-color="blue"]::before   { background: var(--blue); }
  .module-card[data-color="orange"]::before { background: var(--orange); }

  .module-card.active {
    border-color: rgba(255,255,255,0.1);
  }
  .module-card.active[data-color="green"]  { box-shadow: 0 0 24px rgba(34,197,94,0.1); }
  .module-card.active[data-color="purple"] { box-shadow: 0 0 24px rgba(167,139,250,0.1); }
  .module-card.active[data-color="blue"]   { box-shadow: 0 0 24px rgba(59,130,246,0.1); }
  .module-card.active[data-color="orange"] { box-shadow: 0 0 24px rgba(245,158,11,0.1); }

  /* shimmer sweep on active */
  .card-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.02) 48%,
      rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 52%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 3.5s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
    border-radius: var(--card-radius);
  }
  .module-card.active .card-shimmer { opacity: 1; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* MINI RING GAUGE (28px) */
  .mini-ring-wrap {
    width: 28px; height: 28px;
    flex-shrink: 0;
    position: relative;
    margin-top: 2px;
  }
  .mini-ring-wrap svg {
    width: 28px; height: 28px;
    display: block;
  }
  .mini-ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 2.5;
  }
  .mini-ring-fill {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-dasharray: 62.83;
    stroke-dashoffset: 62.83;
    transition: stroke-dashoffset 1s var(--ease);
  }
  .mini-ring-text {
    font-size: 6.5px;
    font-weight: 700;
    text-anchor: middle;
    dominant-baseline: central;
    font-family: 'Inter', sans-serif;
  }
  .mini-ring-text.done    { fill: var(--green); }
  .mini-ring-text.running { fill: var(--blue); }
  .mini-ring-text.pending { fill: var(--text-muted); }

  /* ring glow dot */
  .mini-ring-glow-dot {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .module-card[data-status="running"] .mini-ring-glow-dot {
    opacity: 1;
    animation: miniGlowPulse 2s ease-in-out infinite;
  }
  @keyframes miniGlowPulse {
    0%, 100% { box-shadow: 0 0 3px var(--blue); opacity: 0.7; }
    50%      { box-shadow: 0 0 8px var(--blue), 0 0 14px var(--blue); opacity: 1; }
  }

  /* card body */
  .card-body { flex: 1; min-width: 0; }
  .card-top {
    display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
  }
  .card-icon { font-size: 13px; line-height: 1; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .card-badge {
    margin-left: auto;
    font-size: 9px; font-weight: 600;
    padding: 2px 7px; border-radius: 5px;
    white-space: nowrap;
  }
  .card-badge.done    { background: var(--green-dim); color: var(--green); }
  .card-badge.running { background: var(--blue-dim);  color: var(--blue);
    animation: badgePulse 2.2s ease-in-out infinite; }
  .card-badge.pending { background: rgba(100,116,139,0.1); color: var(--text-muted); }
  @keyframes badgePulse {
    0%, 100% { opacity: 0.75; }
    50%      { opacity: 1; background: rgba(59,130,246,0.2); }
  }

  .card-progress-bar {
    height: 2.5px; background: rgba(255,255,255,0.04);
    border-radius: 2px; overflow: hidden; margin-bottom: 5px;
  }
  .card-progress-fill {
    height: 100%; border-radius: 2px;
    width: 0; transition: width 1s var(--ease);
  }
  .card-sub-label {
    font-size: 10px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ===== COLLAPSE TOGGLE ===== */
  .collapse-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text-faint);
    cursor: pointer;
    padding: 6px 0 2px;
    user-select: none;
    transition: color 0.2s;
  }
  .collapse-toggle:hover { color: var(--text-dim); }
  .collapse-chevron {
    display: inline-block;
    transition: transform 0.3s var(--ease);
    font-size: 8px;
  }
  .collapse-toggle.collapsed .collapse-chevron {
    transform: rotate(-90deg);
  }

  /* ===== TREE SUB-MODULES ===== */
  .submods-wrap {
    overflow: hidden;
    transition: max-height 0.4s var(--ease), opacity 0.3s;
    opacity: 1;
  }
  .submods-wrap.collapsed {
    max-height: 0 !important;
    opacity: 0;
  }

  .tree-container {
    position: relative;
    padding-left: 20px;
    padding-bottom: 4px;
  }
  /* vertical colored tree line */
  .tree-container::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 0;
    width: 1.5px;
    height: var(--tree-line-h, calc(100% - 16px));
    border-radius: 1px;
    transition: height 0.3s;
  }
  .tree-container[data-color="green"]::before  { background: linear-gradient(180deg, var(--green), rgba(34,197,94,0.15)); }
  .tree-container[data-color="purple"]::before { background: linear-gradient(180deg, var(--purple), rgba(167,139,250,0.15)); }
  .tree-container[data-color="blue"]::before   { background: linear-gradient(180deg, var(--blue), rgba(59,130,246,0.15)); }
  .tree-container[data-color="orange"]::before { background: linear-gradient(180deg, var(--orange), rgba(245,158,11,0.15)); }

  .submod-row {
    height: 32px;
    display: flex;
    align-items: center;
    gap: 9px;
    position: relative;
    font-size: 12px;
    opacity: 0;
    transform: translateX(-12px);
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease), background 0.15s;
    cursor: pointer;
    padding: 0 8px 0 0;
    border-radius: 5px;
  }
  .submod-row.visible { opacity: 1; transform: translateX(0); }
  .submod-row:hover   { background: rgba(255,255,255,0.02); }

  /* horizontal branch line */
  .submod-row::before {
    content: '';
    position: absolute;
    left: -12px;
    top: 50%;
    width: 12px;
    height: 1.5px;
    border-radius: 1px;
  }
  [data-color="green"]  .submod-row::before { background: var(--green);  opacity: 0.3; }
  [data-color="purple"] .submod-row::before { background: var(--purple); opacity: 0.3; }
  [data-color="blue"]   .submod-row::before { background: var(--blue);   opacity: 0.3; }
  [data-color="orange"] .submod-row::before { background: var(--orange); opacity: 0.3; }

  .submod-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .submod-dot.done { opacity: 0.7; }
  .submod-dot.running {
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.3); }
  }
  .submod-dot.pending {
    background: transparent !important;
    border: 1.5px solid var(--text-muted);
    opacity: 0.45;
  }

  .submod-label {
    color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .submod-row.active-sub .submod-label { color: var(--text); font-weight: 500; }
  .submod-row.done-sub .submod-label   { color: var(--text-dim); }
  .submod-score {
    margin-left: auto; font-size: 10px; font-weight: 600;
    color: var(--text-muted); flex-shrink: 0;
  }

  /* ===== DETAIL DASHBOARD ===== */
  .dashboard {
    margin: 16px 24px 24px;
    background: var(--surface);
    border: 1px solid var(--border-dim);
    border-radius: var(--card-radius);
    padding: 22px 24px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    position: relative;
  }
  .dashboard::-webkit-scrollbar { width: 4px; }
  .dashboard::-webkit-scrollbar-track { background: transparent; }
  .dashboard::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .dash-fade { animation: dashFadeIn 0.32s var(--ease); }
  @keyframes dashFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dash-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .dash-title { font-size: 15px; font-weight: 600; }
  .dash-badge {
    font-size: 10px; font-weight: 600;
    padding: 3px 9px; border-radius: 5px;
  }
  .dash-badge.done    { background: var(--green-dim); color: var(--green); }
  .dash-badge.running { background: var(--blue-dim);  color: var(--blue); }
  .dash-badge.pending { background: rgba(100,116,139,0.1); color: var(--text-muted); }

  .dash-summary {
    font-size: 13px; color: var(--text-dim);
    line-height: 1.65; margin-bottom: 18px;
    max-width: 740px; font-style: italic;
  }

  .stat-cards {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .stat-card {
    flex: 1; min-width: 140px; max-width: 220px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-dim);
    border-radius: 8px; padding: 12px 14px;
  }
  .stat-card-label {
    font-size: 9px; color: var(--text-muted);
    margin-bottom: 5px; text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .stat-card-value {
    font-size: 17px; font-weight: 700; margin-bottom: 7px;
  }
  .stat-bar {
    height: 3px; background: rgba(255,255,255,0.04);
    border-radius: 2px; overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%; border-radius: 2px;
    width: 0; transition: width 0.7s var(--ease);
  }

  .item-list { margin-bottom: 14px; }
  .item-list-title {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 6px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .item-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px; border-radius: 5px;
    font-size: 12px; cursor: pointer;
    transition: background 0.15s;
    position: relative; overflow: hidden;
  }
  .item-row:hover { background: rgba(255,255,255,0.025); }
  .item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .item-dot.done    { background: var(--green); }
  .item-dot.running { background: var(--blue); animation: idotPulse 1.5s ease-in-out infinite; }
  .item-dot.pending { border: 1px solid var(--text-muted); }
  @keyframes idotPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  .item-name { color: var(--text-dim); }
  .item-meta { margin-left: auto; font-size: 10px; color: var(--text-muted); }
  .item-row.running-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(59,130,246,0.04) 45%,
      rgba(59,130,246,0.08) 50%, rgba(59,130,246,0.04) 55%, transparent 100%);
    background-size: 200% 100%;
    animation: rowShim 2.5s ease-in-out infinite;
    pointer-events: none; border-radius: 5px;
  }
  @keyframes rowShim { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ===== STATIC ACTIVITY LOG (per-module) ===== */
  .activity-log {
    border-top: 1px solid var(--border-dim);
    padding-top: 14px;
  }
  .activity-title {
    font-size: 9px; color: var(--text-muted);
    margin-bottom: 8px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .activity-item {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0;
    font-size: 11px; color: var(--text-dim);
  }
  .activity-time {
    color: var(--text-muted); font-size: 10px;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0; width: 40px;
  }
  .activity-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ===== LIVE ACTIVITY FEED (new for best_09) ===== */
  .live-feed-section {
    margin-top: 18px;
    border-top: 1px solid var(--border-dim);
    padding-top: 16px;
  }
  .live-feed-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .live-feed-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    font-weight: 700;
    color: var(--red);
    background: rgba(239,68,68,0.1);
    padding: 2px 8px 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .live-badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: liveDotBlink 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes liveDotBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }
  .live-feed-count { margin-left: auto; font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .live-feed-list { display: flex; flex-direction: column; gap: 2px; max-height: 220px; overflow-y: auto; }
  .live-feed-list::-webkit-scrollbar { width: 3px; }
  .live-feed-list::-webkit-scrollbar-track { background: transparent; }
  .live-feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .live-event {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
    border-radius: 6px; font-size: 12px; background: rgba(255,255,255,0.015);
    border: 1px solid transparent; position: relative; overflow: hidden;
    opacity: 0; transform: translateY(8px); animation: liveEventIn 0.45s var(--ease) forwards;
  }
  .live-event.is-new { border-color: rgba(59,130,246,0.15); background: rgba(59,130,246,0.03); }
  .live-event.is-new::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.05), transparent);
    background-size: 300% 100%; animation: liveEventShimmer 2s ease-in-out;
  }
  @keyframes liveEventShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes liveEventIn { to { opacity: 1; transform: translateY(0); } }
  .live-event-time { font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 50px; padding-top: 1px; }
  .live-event-icon { width: 20px; height: 20px; border-radius: 5px; display: grid; place-items: center; font-size: 10px; flex-shrink: 0; }
  .live-event-body { flex: 1; min-width: 0; }
  .live-event-module { font-size: 10px; font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
  .live-event-module-tag { font-size: 8px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
  .live-event-text { color: var(--text-dim); font-size: 11px; line-height: 1.45; }
  .live-event-meta { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
  .live-event-type { font-size: 8px; font-weight: 600; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
  .live-event-type.type-gen   { background: var(--blue-dim);   color: var(--blue); }
  .live-event-type.type-ok    { background: var(--green-dim);  color: var(--green); }
  .live-event-type.type-warn  { background: var(--orange-dim); color: var(--orange); }
  .live-event-type.type-score { background: var(--purple-dim); color: var(--purple); }
  .live-event-type.type-info  { background: var(--cyan-dim);   color: var(--cyan); }
  .live-event-type.type-start { background: rgba(255,255,255,0.05); color: var(--text-dim); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 960px) {
    .modules-row { flex-wrap: wrap; }
    .module-col { max-width: 48%; flex: 0 0 48%; }
  }
  @media (max-width: 600px) {
    .modules-row { flex-direction: column; }
    .module-col { max-width: 100%; }
    .header-stats { display: none; }
  }

// =============================================================================
// MINI RING SVG HELPER
// =============================================================================
function miniRingSVG(pct, colorCSS, status) {
  const r = 10;
  const circ = 2 * Math.PI * r;
  const offset = circ - (circ * pct / 100);
  const textClass = status;
  const label = pct + '%';
  return `
    <svg viewBox="0 0 28 28">
      <circle class="mini-ring-track" cx="14" cy="14" r="${r}" />
      <circle class="mini-ring-fill" cx="14" cy="14" r="${r}"
        transform="rotate(-90 14 14)"
        stroke="${colorCSS}"
        style="stroke-dashoffset:${offset}" />
      <text class="mini-ring-text ${textClass}" x="14" y="14">${label}</text>
    </svg>
  `;
}

// =============================================================================
// BUILD MODULES

function buildModules() {
  const row = document.getElementById('modulesRow');
  row.innerHTML = '';
  cardEls = [];
  subEls  = [];
  treeContainers = [];

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'module-col';

    const card = document.createElement('div');
    card.className = 'module-card' + (mi === activeModuleIdx ? ' active' : '');
    card.dataset.color  = mod.color;
    card.dataset.status = mod.status;
    card.dataset.idx    = mi;

    const colorCSS = COLORS[mod.color].css;

    card.innerHTML = `
      <div class="card-shimmer"></div>
      <div class="mini-ring-wrap">
        ${miniRingSVG(mod.progress, colorCSS, mod.status)}
        <div class="mini-ring-glow-dot" style="background:${colorCSS}"></div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <span class="card-icon">${mod.icon}</span>
          <span class="card-title">${mod.title}</span>
          <span class="card-badge ${mod.status}">${mod.status === 'done' ? 'Done' : mod.status === 'running' ? 'Running' : 'Pending'}</span>
        </div>
        <div class="card-progress-bar">
          <div class="card-progress-fill" style="background:${colorCSS}" data-pct="${mod.progress}"></div>
        </div>
        <div class="card-sub-label">${mod.subLabel}</div>
      </div>
    `;
    card.addEventListener('click', () => selectModule(mi));
    col.appendChild(card);
    cardEls.push(card);

    positionGlowDot(card, mod.progress, colorCSS);

    // Collapse Toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle' + (collapsedModules.has(mi) ? ' collapsed' : '');
    toggle.innerHTML = `<span class="collapse-chevron">\u25BC</span> <span>${mod.subs.length} steps</span>`;
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCollapse(mi, toggle, wrap);
    });
    col.appendChild(toggle);

    // Sub-modules tree
    const wrap = document.createElement('div');
    wrap.className = 'submods-wrap' + (collapsedModules.has(mi) ? ' collapsed' : '');

    const tree = document.createElement('div');
    tree.className = 'tree-container';
    tree.dataset.color = mod.color;

    const sEls = [];
    mod.subs.forEach((sub, si) => {
      const sRow = document.createElement('div');
      sRow.className = 'submod-row';
      if (sub.status === 'done')    sRow.classList.add('done-sub');
      if (sub.status === 'running') sRow.classList.add('active-sub');
      sRow.dataset.modIdx = mi;
      sRow.dataset.subIdx = si;

      const dotColor = sub.status === 'pending' ? '' : `background:${colorCSS}`;
      const dotShadow = sub.status === 'running' ? `box-shadow:0 0 8px ${colorCSS}` : '';
      const scoreH = sub.score ? `<span class="submod-score">${sub.score}</span>` : '';
      const extraH = sub.extra ? `<span class="submod-score" style="color:${colorCSS}">${sub.extra}</span>` : '';

      sRow.innerHTML = `
        <span class="submod-dot ${sub.status}" style="${dotColor};${dotShadow}"></span>
        <span class="submod-label">${sub.label}</span>
        ${scoreH}${extraH}
      `;
      tree.appendChild(sRow);
      sEls.push(sRow);
    });

    wrap.appendChild(tree);
    col.appendChild(wrap);
    subEls.push(sEls);
    treeContainers.push(tree);

    row.appendChild(col);
  });

  // Animate progress fills
  requestAnimationFrame(() => {
    document.querySelectorAll('.card-progress-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });

  // Stagger sub-module entrance
  MODULES.forEach((mod, mi) => {
    animateSubEntrance(mi, mi === activeModuleIdx ? 60 : 0);
  });

  // Compute tree line heights after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(computeTreeLineHeights);
  });

  // Set initial collapsed max-heights
  requestAnimationFrame(() => {
    document.querySelectorAll('.submods-wrap').forEach(w => {
      if (!w.classList.contains('collapsed')) {
        w.style.maxHeight = w.scrollHeight + 'px';
      }
    });
  });
}

function positionGlowDot(card, pct, color) {
  requestAnimationFrame(() => {
    const dot = card.querySelector('.mini-ring-glow-dot');
    if (!dot) return;
    const angle = (pct / 100) * 2 * Math.PI - Math.PI / 2;
    const cx = 14, cy = 14, r = 10;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    dot.style.left = (x - 2) + 'px';
    dot.style.top  = (y - 2) + 'px';
  });
}

function toggleCollapse(mi, toggleEl, wrapEl) {
  if (collapsedModules.has(mi)) {
    collapsedModules.delete(mi);
    toggleEl.classList.remove('collapsed');
    wrapEl.style.maxHeight = wrapEl.scrollHeight + 'px';
    wrapEl.classList.remove('collapsed');
  } else {
    collapsedModules.add(mi);
    toggleEl.classList.add('collapsed');
    wrapEl.style.maxHeight = wrapEl.scrollHeight + 'px';
    requestAnimationFrame(() => {
      wrapEl.classList.add('collapsed');
    });
  }
  setTimeout(computeTreeLineHeights, 420);
}

function animateSubEntrance(mi, baseDelay) {
  const subs = subEls[mi];
  if (!subs) return;
  subs.forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), (baseDelay || 0) + i * 50);
  });
}

function computeTreeLineHeights() {
  treeContainers.forEach(tc => {
    const rows = tc.querySelectorAll('.submod-row');
    if (rows.length === 0) return;
    const lastRow = rows[rows.length - 1];
    const tcRect = tc.getBoundingClientRect();
    const lastRect = lastRow.getBoundingClientRect();
    const h = (lastRect.top + lastRect.height / 2) - tcRect.top;
    tc.style.setProperty('--tree-line-h', Math.max(0, h) + 'px');
  });
}

function selectModule(mi) {
  if (mi === activeModuleIdx) return;
  activeModuleIdx = mi;

  cardEls.forEach((c, i) => {
    c.classList.toggle('active', i === mi);

  const card = cardEls[mi];
  if (card) {
    const rect = card.getBoundingClientRect();
    spawnBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, MODULES[mi].color, 12);
  }

  buildDashboard();
}

  const s = String(d.getSeconds()).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function liveEventHTML(ev, isNew, delay) {
  const cc = COLORS[ev.color], cCSS = cc ? cc.css : 'var(--text-muted)';
  return `<div class="live-event${isNew ? ' is-new' : ''}" style="animation-delay:${delay || '0s'}">
    <span class="live-event-time">${ev.time}</span>
    <span class="live-event-icon" style="background:${cCSS}20">${ev.icon}</span>
    <div class="live-event-body">
      <div class="live-event-module" style="color:${cCSS}">${ev.module}
        <span class="live-event-module-tag" style="background:${cCSS}18;color:${cCSS}">${ev.subStep || 'Step'}</span></div>
      <div class="live-event-text">${ev.text}</div>
    </div>
    <div class="live-event-meta"><span class="live-event-type type-${ev.type}">${ev.typeLabel}</span></div>
  </div>`;
}

function buildLiveFeedHTML() {
  const hdr = `<div class="live-feed-section"><div class="live-feed-header">
    <span class="live-feed-label">Live Activity Feed</span>
    <span class="live-badge"><span class="live-badge-dot"></span>LIVE</span>
    <span class="live-feed-count">${liveEvents.length ? liveEvents.length + ' event' + (liveEvents.length !== 1 ? 's' : '') : 'Waiting for events...'}</span>
  </div><div class="live-feed-list" id="liveFeedList">`;

  if (liveEvents.length === 0) {
    return hdr + `<div class="live-event" style="opacity:1;transform:none;">
      <span class="live-event-time">\u2014</span>
      <span class="live-event-icon" style="background:rgba(255,255,255,0.04)">\u{23F3}</span>
      <div class="live-event-body"><div class="live-event-module" style="color:var(--text-muted)">System</div>
        <div class="live-event-text">Listening for sub-module events...</div></div>
      <div class="live-event-meta"><span class="live-event-type type-start">IDLE</span></div>
    </div></div></div>`;
  }

  return hdr + liveEvents.map((ev, i) => liveEventHTML(ev, i === 0, i === 0 ? '0s' : i * 0.04 + 's')).join('') + '</div></div>';
}

function pushLiveEvent() {
  const poolIdx = liveEventCounter % LIVE_EVENT_POOL.length;

  const subSteps = ['Artifacts', 'Strategy', 'Plan', 'Paper Draft', 'Review'];
  const mod = MODULES[template.modIdx];
  const runningSub = mod.subs.find(s => s.status === 'running');

  const event = {
    ...template,
    time: getNowTimestamp(),
    subStep: runningSub ? runningSub.label : (template.modIdx === 2 ? subSteps[Math.floor(Math.random() * subSteps.length)] : mod.subs[0].label),
    id: liveEventCounter,
  };

  // Add to front
  liveEvents.unshift(event);
  if (liveEvents.length > MAX_LIVE_EVENTS) {
    liveEvents.pop();
  }

  // Only do incremental DOM update if the live feed section is visible
  const feedList = document.getElementById('liveFeedList');
  if (feedList) {
    updateLiveFeedIncremental(feedList, event);
  }
}

function updateLiveFeedIncremental(feedList, ev) {
  feedList.querySelectorAll('.live-event.is-new').forEach(el => el.classList.remove('is-new'));
  const tmp = document.createElement('template');
  tmp.innerHTML = liveEventHTML(ev, true, '0s');
  const div = tmp.content.firstElementChild;
  feedList.insertBefore(div, feedList.firstChild);
  while (feedList.children.length > MAX_LIVE_EVENTS) {
    const last = feedList.lastChild;
    last.style.transition = 'opacity 0.3s, transform 0.3s';
    last.style.opacity = '0';
    last.style.transform = 'translateY(4px)';
    setTimeout(() => { if (last.parentNode) last.parentNode.removeChild(last); }, 300);
  }
  const countEl = document.querySelector('.live-feed-count');
  if (countEl) countEl.textContent = `${liveEvents.length} event${liveEvents.length !== 1 ? 's' : ''}`;
  setTimeout(() => { div.classList.remove('is-new'); }, 2200);
}

// =============================================================================
// PARTICLE SYSTEM
// =============================================================================
function initCanvas() {
  canvas = document.getElementById('particleCanvas');
  ctx    = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

// --- Tree Particles ---
function spawnTreeParticle() {
  if (treeParticles.length >= MAX_TREE_P) return;

  const visibleTrees = [];
  treeContainers.forEach((tc, i) => {
    if (!collapsedModules.has(i)) visibleTrees.push({ tc, mi: i });
  });
  if (visibleTrees.length === 0) return;

  const pick = visibleTrees[Math.floor(Math.random() * visibleTrees.length)];
  const tc = pick.tc;
  const mi = pick.mi;
  const mod = MODULES[mi];
  const rgb = COLORS[mod.color].rgb;

  const tcRect = tc.getBoundingClientRect();
  if (tcRect.height < 10) return;

  const rows = tc.querySelectorAll('.submod-row');
  if (rows.length === 0) return;

  const targetRow = rows[Math.floor(Math.random() * rows.length)];
  const rowRect = targetRow.getBoundingClientRect();

  // Start at top of vertical tree line
  const startX = tcRect.left + 8;
  const startY = tcRect.top;
  const branchY = rowRect.top + rowRect.height / 2;
  const endX = rowRect.left + 5;

  const totalDist = Math.abs(branchY - startY) + Math.abs(endX - startX);
  const speed = 40 + Math.random() * 30;

  treeParticles.push({
    startX, startY, branchY, endX,
    totalDist, speed,
    traveled: 0,
    r: rgb,
    size: 1.5 + Math.random() * 1,
    alpha: 0.6 + Math.random() * 0.4,
    trail: [],
  });
}

function updateTreeParticles(dt) {
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    p.traveled += p.speed * dt;

    if (p.traveled >= p.totalDist) {
      treeParticles.splice(i, 1);
      continue;
    }

    const vertDist = Math.abs(p.branchY - p.startY);
    let x, y;

    if (p.traveled <= vertDist) {
      x = p.startX;
      y = p.startY + (p.branchY > p.startY ? 1 : -1) * p.traveled;
    } else {
      const horizProgress = p.traveled - vertDist;
      const horizTotal = Math.abs(p.endX - p.startX);
      const t = Math.min(horizProgress / horizTotal, 1);
      x = p.startX + (p.endX - p.startX) * t;
      y = p.branchY;
    }

    p.trail.push({ x, y, alpha: p.alpha });
    if (p.trail.length > 8) p.trail.shift();

    p.x = x;
    p.y = y;
  }
}

function drawTreeParticles() {
  treeParticles.forEach(p => {
    p.trail.forEach((t, i) => {
      const a = t.alpha * (i / p.trail.length) * 0.35;
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.size * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${a})`;
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${p.alpha})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${p.alpha * 0.12})`;
    ctx.fill();
  });
}

// --- Connector Particles ---
function spawnConnectorParticle() {
  if (connParticles.length >= MAX_CONN_P) return;
  if (cardEls.length < 2) return;

  const srcIdx = Math.floor(Math.random() * (cardEls.length - 1));
  const dstIdx = srcIdx + 1;
  const srcRect = cardEls[srcIdx].getBoundingClientRect();
  const dstRect = cardEls[dstIdx].getBoundingClientRect();

  const srcMod = MODULES[srcIdx];
  if (srcMod.status === 'pending') return;

  const rgb = COLORS[srcMod.color].rgb;
  const startX = srcRect.right;
  const startY = srcRect.top + srcRect.height / 2 + (Math.random() - 0.5) * 20;
  const endX   = dstRect.left;
  const endY   = dstRect.top + dstRect.height / 2 + (Math.random() - 0.5) * 20;

  connParticles.push({
    startX, startY, endX, endY,
    t: 0,
    speed: 0.15 + Math.random() * 0.2,
    r: rgb,
    size: 1 + Math.random() * 0.8,
    alpha: 0.3 + Math.random() * 0.3,
    trail: [],
  });
}

function updateConnectorParticles(dt) {
  for (let i = connParticles.length - 1; i >= 0; i--) {
    const p = connParticles[i];
    p.t += p.speed * dt;

    if (p.t >= 1) {
      connParticles.splice(i, 1);
      continue;
    }

    const t = p.t;
    const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const x = p.startX + (p.endX - p.startX) * ease;
    const y = p.startY + (p.endY - p.startY) * ease
            + Math.sin(t * Math.PI * 2) * 6;

    p.trail.push({ x, y, alpha: p.alpha });
    if (p.trail.length > 6) p.trail.shift();
    p.x = x;
    p.y = y;
  }
}

function drawConnectorParticles() {
  connParticles.forEach(p => {
    p.trail.forEach((t, i) => {
      const a = t.alpha * (i / p.trail.length) * 0.3;
      ctx.beginPath();
      ctx.arc(t.x, t.y, p.size * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${a})`;
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${p.alpha})`;
    ctx.fill();
  });
}

// --- Burst Particles ---
function spawnBurst(cx, cy, colorName, count) {
  const rgb = COLORS[colorName].rgb;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = 60 + Math.random() * 80;
    burstParticles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.6 + Math.random() * 0.4,
      maxLife: 0.6 + Math.random() * 0.4,
      r: rgb,
      size: 1.5 + Math.random() * 1.5,
    });
  }
}

function updateBurstParticles(dt) {
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
    }
  }
}

function drawBurstParticles() {
  burstParticles.forEach(p => {
    const alpha = (p.life / p.maxLife) * 0.8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${alpha})`;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${alpha * 0.15})`;
    ctx.fill();
  });
}

// --- Ambient Background Particles ---
let ambientParticles = [];
const MAX_AMBIENT = 40;

function initAmbientParticles() {
  for (let i = 0; i < MAX_AMBIENT; i++) {
    ambientParticles.push(createAmbientParticle());
  }
}

function createAmbientParticle() {
  const colors = Object.values(COLORS);
  const c = colors[Math.floor(Math.random() * colors.length)];
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 8,
    vy: (Math.random() - 0.5) * 8,
    r: c.rgb,
    size: 0.5 + Math.random() * 1,
    alpha: 0.05 + Math.random() * 0.12,
    drift: Math.random() * Math.PI * 2,
    driftSpeed: 0.3 + Math.random() * 0.5,
  };
}

function updateAmbientParticles(dt) {
  ambientParticles.forEach(p => {
    p.drift += p.driftSpeed * dt;
    p.x += p.vx * dt + Math.sin(p.drift) * 0.3;
    p.y += p.vy * dt + Math.cos(p.drift) * 0.2;

    if (p.x < -10) p.x = canvas.width + 10;
    if (p.x > canvas.width + 10) p.x = -10;
    if (p.y < -10) p.y = canvas.height + 10;
    if (p.y > canvas.height + 10) p.y = -10;
  });
}

function drawAmbientParticles() {
  ambientParticles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r[0]},${p.r[1]},${p.r[2]},${p.alpha})`;
    ctx.fill();
  });
}

// =============================================================================
// ANIMATION LOOP
// =============================================================================
let lastTime = 0;
let spawnTreeAcc = 0;
let spawnConnAcc = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  spawnTreeAcc += dt;
  if (spawnTreeAcc > 0.12) {
    spawnTreeAcc = 0;
    spawnTreeParticle();
  }

  spawnConnAcc += dt;
  if (spawnConnAcc > 0.3) {
    spawnConnAcc = 0;
    spawnConnectorParticle();
  }

  updateTreeParticles(dt);
  updateConnectorParticles(dt);
  updateBurstParticles(dt);
  updateAmbientParticles(dt);

  drawAmbientParticles();
  drawConnectorParticles();
  drawTreeParticles();
  drawBurstParticles();
}

  { modIdx: 2, time: '16:32', text: 'Writing forward() method\u2026',        color: '#3b82f6' },
  { modIdx: 2, time: '16:33', text: 'Adding temperature parameter\u2026',    color: '#3b82f6' },
  { modIdx: 2, time: '16:34', text: 'Unit tests for gumbel_gates.py\u2026',  color: '#3b82f6' },
  { modIdx: 2, time: '16:35', text: 'gumbel_gates.py generated (198 LOC)',    color: '#22c55e' },
  { modIdx: 2, time: '16:36', text: 'Starting hw_predictor.py\u2026',        color: '#3b82f6' },
  { modIdx: 2, time: '16:37', text: 'Profiling latency tables\u2026',        color: '#3b82f6' },
];

function rotateLog() {
  if (logRotateIdx >= LOG_MESSAGES.length) logRotateIdx = 0;
  const msg = LOG_MESSAGES[logRotateIdx++];
  const mod = MODULES[msg.modIdx];

  mod.log.unshift({ time: msg.time, text: msg.text, color: msg.color });
  if (mod.log.length > 6) mod.log.pop();

  if (activeModuleIdx === msg.modIdx) {
    buildDashboard();
  }
}

// =============================================================================
// SIMULATED PROGRESS TICK
// =============================================================================
let progressTick = 0;
function simulateProgress() {
  progressTick++;
  const inv = MODULES[2];
  if (inv.progress < 68) {
    inv.progress += 1;
    const card = cardEls[2];
    if (card) {
      const ringWrap = card.querySelector('.mini-ring-wrap');
      const colorCSS = COLORS[inv.color].css;
      ringWrap.innerHTML = miniRingSVG(inv.progress, colorCSS, inv.status)
        + `<div class="mini-ring-glow-dot" style="background:${colorCSS}"></div>`;
      positionGlowDot(card, inv.progress, colorCSS);

      const fill = card.querySelector('.card-progress-fill');
      if (fill) fill.style.width = inv.progress + '%';
    }

    updateHeader();
  }
}

// =============================================================================
// INIT
// =============================================================================
function init() {
  initCanvas();
  initAmbientParticles();
  buildModules();
  buildDashboard();
  updateHeader();

  requestAnimationFrame(animate);

  // Per-module log rotation (every 4s)
  setInterval(rotateLog, 4000);

  // Live activity feed events (every 4s, offset by 2s from log rotation)
  setTimeout(() => {
    pushLiveEvent(); // initial event immediately
    setInterval(pushLiveEvent, 4000);
  }, 2000);

  // Simulate progress
  setInterval(simulateProgress, 3000);
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => {
  computeTreeLineHeights();
  document.querySelectorAll('.submods-wrap:not(.collapsed)').forEach(w => {
    w.style.maxHeight = w.scrollHeight + 'px';
  });
});
