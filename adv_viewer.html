<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced View — Layout Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #06090f; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
.tab-bar { display: flex; gap: 2px; padding: 6px 8px; background: #0c1220; border-bottom: 1px solid rgba(148,163,184,.1); flex-shrink: 0; z-index: 10; }
.tab { font-size: 12px; font-weight: 600; padding: 6px 16px; border-radius: 6px; cursor: pointer; color: #64748b; background: transparent; border: 1px solid transparent; transition: all .15s; }
.tab:hover { color: #94a3b8; background: rgba(255,255,255,.03); }
.tab.active { color: #e2e8f0; background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.25); }
.frame-wrap { flex: 1; position: relative; }
.frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.frame-wrap iframe.hidden { display: none; }
</style>
</head>
<body>
<div class="tab-bar" id="tabs"></div>
<div class="frame-wrap" id="frames"></div>
<script>
const layouts = [
  { id: 'a', label: 'A: Messages + Stats Panel', src: 'adv_layout_a.html' },
  { id: 'b', label: 'B: Full Messages + Filter + Strip', src: 'adv_layout_b.html' },
  { id: 'c', label: 'C: Messages + Swappable Panel', src: 'adv_layout_c.html' },
];

const tabBar = document.getElementById('tabs');
const frameWrap = document.getElementById('frames');

layouts.forEach((l, i) => {
  const tab = document.createElement('div');
  tab.className = 'tab' + (i === 0 ? ' active' : '');
  tab.textContent = l.label;
  tab.dataset.id = l.id;
  tab.onclick = () => switchTo(l.id);
  tabBar.appendChild(tab);

  const iframe = document.createElement('iframe');
  iframe.src = l.src;
  iframe.id = 'frame-' + l.id;
  iframe.className = i === 0 ? '' : 'hidden';
  frameWrap.appendChild(iframe);
});

function switchTo(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.id === id));
  document.querySelectorAll('iframe').forEach(f => f.classList.toggle('hidden', f.id !== 'frame-' + id));
}
</script>
</body>
</html>
