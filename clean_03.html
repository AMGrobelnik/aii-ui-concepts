<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0c10;
    color: #c8cdd5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- layout shell ---------- */
  #app {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- top breadcrumb ---------- */
  #breadcrumb-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: #0a0c10;
    border-bottom: 1px solid #16181e;
  }
  #breadcrumb-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #4a4f5c;
  }
  .bc-item {
    cursor: pointer;
    transition: color .2s;
    white-space: nowrap;
  }
  .bc-item:hover { color: #8b90a0; }
  .bc-item.active { color: #e0e4ec; font-weight: 500; }
  .bc-sep { color: #2a2d36; user-select: none; }
  #back-btn {
    width: 22px; height: 22px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #4a4f5c;
    margin-right: 6px;
    transition: color .2s;
    flex-shrink: 0;
  }
  #back-btn:hover { color: #e0e4ec; }
  #back-btn svg { width: 14px; height: 14px; }

  /* ---------- compressed headers ---------- */
  .compressed-header {
    background: #0f1117;
    border-bottom: 1px solid #16181e;
    padding: 12px 0;
    cursor: pointer;
    transition: background .2s;
    overflow: hidden;
  }
  .compressed-header:hover { background: #12141b; }
  .ch-inner {
    max-width: 700px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ch-title { font-size: 14px; font-weight: 500; color: #e0e4ec; }
  .ch-detail { font-size: 12px; color: #4a4f5c; }
  .ch-accent { color: #5b8def; }

  #header-stack {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 90;
    display: flex;
    flex-direction: column;
  }
  #header-stack .compressed-header { display: none; }

  /* ---------- main content area ---------- */
  #content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 48px;
  }

  /* ---------- layer 0 ---------- */
  .l0-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    padding: 60px 0;
    user-select: none;
  }
  .l0-module {
    font-size: 36px;
    font-weight: 600;
    color: #e8ecf4;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .l0-substage {
    font-size: 20px;
    font-weight: 400;
    color: #5b8def;
    margin-bottom: 16px;
  }
  .l0-progress {
    font-size: 16px;
    color: #4a4f5c;
    margin-bottom: 24px;
  }
  .l0-bar-wrap {
    width: 280px;
    height: 2px;
    background: #16181e;
    border-radius: 1px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .l0-bar {
    height: 100%;
    border-radius: 1px;
    background: linear-gradient(90deg, #5b8def, #7ea8f8);
    animation: barPulse 2.5s ease-in-out infinite;
  }
  @keyframes barPulse {
    0%, 100% { opacity: .7; }
    50% { opacity: 1; }
  }
  .l0-summary {
    font-size: 14px;
    color: #6b7080;
    line-height: 1.65;
    max-width: 520px;
  }
  .l0-footer {
    font-size: 12px;
    color: #32363f;
    margin-top: 48px;
    display: flex;
    gap: 20px;
  }
  .l0-see-more {
    font-size: 12px;
    color: #3d6bc4;
    margin-top: 20px;
    letter-spacing: .3px;
  }

  /* ---------- layer 1: sub-stage list ---------- */
  .l1-wrap { padding: 32px 0 48px; }
  .l1-row {
    display: grid;
    grid-template-columns: 130px 110px 1fr;
    align-items: baseline;
    padding: 16px 16px 16px 20px;
    border-left: 3px solid transparent;
    border-radius: 2px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    gap: 4px;
  }
  .l1-row:hover { background: #0f1117; }
  .l1-row.active-row {
    border-left-color: #5b8def;
    background: #0d0f15;
  }
  .l1-row.active-row .l1-name { color: #d4dae6; }
  .l1-name {
    font-size: 14px;
    font-weight: 500;
    color: #7a7f8e;
  }
  .l1-status {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .st-done { color: #3dbd6e; }
  .st-run  { color: #5b8def; }
  .st-pend { color: #32363f; }
  .pulse { animation: statusPulse 1.8s ease-in-out infinite; }
  @keyframes statusPulse {
    0%, 100% { opacity: .55; }
    50% { opacity: 1; }
  }
  .l1-summary {
    font-size: 13px;
    color: #4a4f5c;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---------- layer 2: detail ---------- */
  .l2-wrap { padding: 32px 0 48px; }
  .l2-header-line {
    font-size: 18px;
    font-weight: 500;
    color: #e0e4ec;
    margin-bottom: 6px;
  }
  .l2-meta {
    font-size: 13px;
    color: #4a4f5c;
    margin-bottom: 36px;
  }
  .l2-item {
    margin-bottom: 28px;
    padding-left: 18px;
    border-left: 2px solid #1a1d26;
  }
  .l2-item.item-done  { border-left-color: #26633c; }
  .l2-item.item-run   { border-left-color: #3460a8; }
  .l2-item.item-pend  { border-left-color: #1a1d26; }
  .l2-item-title {
    font-size: 14px;
    font-weight: 500;
    color: #c8cdd5;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .l2-item-body {
    font-size: 13px;
    color: #5a5f6e;
    line-height: 1.55;
  }

  /* ---------- transitions ---------- */
  .layer-enter {
    animation: slideUp 350ms ease-out forwards;
  }
  .layer-exit {
    animation: slideDown 250ms ease-in forwards;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideDown {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(30px); }
  }
  .header-enter {
    animation: headerSlide 300ms ease-out forwards;
  }
  @keyframes headerSlide {
    from { max-height: 0; opacity: 0; }
    to   { max-height: 60px; opacity: 1; }
  }
</style>
</head>
<body>

<div id="header-stack">
  <div id="breadcrumb-bar">
    <div id="breadcrumb-inner">
      <div id="back-btn" onclick="goUp()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <span class="bc-item" data-module="seed">Seed</span>
      <span class="bc-sep">&rsaquo;</span>
      <span class="bc-item" data-module="hypothesis">Hypothesis</span>
      <span class="bc-sep">&rsaquo;</span>
      <span class="bc-item active" data-module="invention">Invention</span>
      <span class="bc-sep">&rsaquo;</span>
      <span class="bc-item" data-module="paper">Paper</span>
    </div>
  </div>
  <div id="ch-l0" class="compressed-header" onclick="goToLayer(0)">
    <div class="ch-inner">
      <span class="ch-title" id="ch-l0-title"></span>
      <span class="ch-detail" id="ch-l0-detail"></span>
    </div>
  </div>
  <div id="ch-l1" class="compressed-header" onclick="goToLayer(1)">
    <div class="ch-inner">
      <span class="ch-title" id="ch-l1-title"></span>
      <span class="ch-detail" id="ch-l1-detail"></span>
    </div>
  </div>
</div>

<div id="app">
  <div id="content-area"></div>
</div>

/* ================================================================
   STATE
   ================================================================ */
let currentModule = "invention";
let currentLayer  = 0;
let selectedStage = null;

const contentArea = document.getElementById("content-area");
const chL0        = document.getElementById("ch-l0");
const chL1        = document.getElementById("ch-l1");
const backBtn     = document.getElementById("back-btn");

/* ================================================================
   RENDERERS
   ================================================================ */
function statusIcon(s) {
  if (s === "done") return '<span class="st-done">\u2713</span>';
  if (s === "run")  return '<span class="st-run pulse">\u25b6</span>';
  return '<span class="st-pend">\u25cb</span>';
}
function statusLabel(s) {
  if (s === "done") return '<span class="st-done">Complete</span>';
  if (s === "run")  return '<span class="st-run pulse">Running</span>';
  return '<span class="st-pend">Pending</span>';
}

function renderLayer0(mod) {
  const d = DATA[mod];
  const barStyle = d.barDone
    ? `width:100%; background:#3dbd6e; animation:none; opacity:.5`
    : `width:${d.barPct}%`;
  return `
    <div class="l0-wrap" onclick="goToLayer(1)">
      <div class="l0-module">${d.name}</div>
      <div class="l0-substage" style="color:${d.substageColor}">${d.substage}</div>
      <div class="l0-progress">${d.progress}</div>
      <div class="l0-bar-wrap"><div class="l0-bar" style="${barStyle}"></div></div>
      <div class="l0-summary">${d.summary}</div>
      <div class="l0-see-more">See more</div>
      <div class="l0-footer">
        <span>${d.time}</span>
        <span>${d.cost}</span>
      </div>
    </div>`;
}

function renderLayer1(mod) {
  const d = DATA[mod];
  let rows = d.stages.map(s => {
    const active = s.status === "run" ? "active-row" : "";
    return `
      <div class="l1-row ${active}" onclick="openStageDetail('${s.name}')">
        <span class="l1-name">${s.name}</span>
        <span class="l1-status">${statusIcon(s.status)} ${statusLabel(s.status)}</span>
        <span class="l1-summary">${s.summary}</span>
      </div>`;
  }).join("");
  return `<div class="l1-wrap">${rows}</div>`;
}

function renderLayer2(mod, stageName) {
  const detail = DATA[mod].details[stageName];
  if (!detail) return `<div class="l2-wrap"><div class="l2-header-line">${stageName}</div><div class="l2-meta">No data</div></div>`;
  let items = detail.items.map(it => {
    const cls = it.status === "done" ? "item-done" : it.status === "run" ? "item-run" : "item-pend";
    return `
      <div class="l2-item ${cls}">
        <div class="l2-item-title">${statusIcon(it.status)} ${it.title}</div>
        <div class="l2-item-body">${it.body}</div>
      </div>`;
  }).join("");
  if (!detail.items.length) {
    items = '<div style="color:#32363f;font-size:13px;padding:20px 0;">No details yet.</div>';
  }
  return `
    <div class="l2-wrap">
      <div class="l2-header-line">${detail.title}</div>
      <div class="l2-meta">${detail.meta}</div>
      ${items}
    </div>`;
}

/* ================================================================
   LAYER TRANSITIONS
   ================================================================ */
function setContent(html) {
  contentArea.innerHTML = `<div class="layer-enter">${html}</div>`;
}

function updateHeaders() {
  const d = DATA[currentModule];

  chL0.style.display = "none";
  chL1.style.display = "none";
  backBtn.style.display = currentLayer > 0 ? "flex" : "none";

  if (currentLayer >= 1) {
    document.getElementById("ch-l0-title").textContent = d.name;
    document.getElementById("ch-l0-detail").innerHTML =
      `<span class="ch-accent">${d.substage}</span> &middot; ${d.progress}`;
    chL0.style.display = "block";
  }
  if (currentLayer >= 2 && selectedStage) {
    document.getElementById("ch-l1-title").textContent = selectedStage;
    const st = d.stages.find(s => s.name === selectedStage);
    document.getElementById("ch-l1-detail").textContent = st ? st.summary : "";
    chL1.style.display = "block";
  }

  /* adjust content top padding so it clears fixed headers */
  const headerCount = (currentLayer >= 1 ? 1 : 0) + (currentLayer >= 2 ? 1 : 0);
  contentArea.style.paddingTop = (48 + headerCount * 48) + "px";
}

function updateBreadcrumb() {
  document.querySelectorAll(".bc-item").forEach(el => {
    el.classList.toggle("active", el.dataset.module === currentModule);
  });
}

function goToLayer(layer) {
  if (layer === currentLayer) return;
  currentLayer = layer;
  if (layer === 0) { selectedStage = null; setContent(renderLayer0(currentModule)); }
  if (layer === 1) { selectedStage = null; setContent(renderLayer1(currentModule)); }
  if (layer === 2 && selectedStage) { setContent(renderLayer2(currentModule, selectedStage)); }
  updateHeaders();
}

function openStageDetail(name) {
  selectedStage = name;
  currentLayer = 2;
  setContent(renderLayer2(currentModule, name));
  updateHeaders();
}

function goUp() {
  if (currentLayer > 0) goToLayer(currentLayer - 1);
}

function switchModule(mod) {
  if (mod === currentModule && currentLayer === 0) return;
  currentModule = mod;
  currentLayer = 0;
  selectedStage = null;
  setContent(renderLayer0(mod));
  updateHeaders();
  updateBreadcrumb();
}

/* breadcrumb clicks */
document.querySelectorAll(".bc-item").forEach(el => {
  el.addEventListener("click", () => switchModule(el.dataset.module));
});

/* escape key */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") goUp();
});

/* ================================================================
   INIT
   ================================================================ */
setContent(renderLayer0(currentModule));
updateHeaders();
updateBreadcrumb();
</script>
</body>
</html>
