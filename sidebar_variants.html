<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Variants — AI Inventor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #06090f;
  --bg-raised: #0c1220;
  --surface: rgba(15,23,42,.72);
  --surface-hi: rgba(30,41,59,.65);
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12); --purple-glow: rgba(167,139,250,.25);
  --blue: #60a5fa; --blue-dim: rgba(96,165,250,.12); --blue-glow: rgba(96,165,250,.25);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399; --green-dim: rgba(52,211,153,.12);
  --cyan: #22d3ee; --cyan-dim: rgba(34,211,238,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --sidebar-bg: rgba(10,15,26,.88);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 50%);
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding: 32px;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(ellipse 800px 400px at 20% 10%, rgba(167,139,250,.03), transparent),
    radial-gradient(ellipse 600px 500px at 80% 60%, rgba(96,165,250,.025), transparent);
}
h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; position: relative; z-index: 1; }
.subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 32px; position: relative; z-index: 1; }
.variant-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-faint); margin-bottom: 10px; position: relative; z-index: 1;
}
.variant-note {
  font-size: 10px; color: var(--text-faint); font-style: italic; margin-top: 8px;
  position: relative; z-index: 1;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 260px);
  gap: 28px;
  position: relative;
  z-index: 1;
  margin-bottom: 48px;
}

/* ===== SIDEBAR SHELL ===== */
.sb {
  width: 252px;
  height: 620px;
  background: var(--sidebar-bg);
  backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.sb::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}

/* ===== BRAND ===== */
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 2;
}
.sb-brand-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: grid; place-items: center;
  font-size: 13px; flex-shrink: 0;
}
.sb-brand-text {
  font-weight: 800; font-size: 14px; color: var(--text);
  letter-spacing: -.3px;
}

/* ===== NAV ITEMS ===== */
.sb-nav { padding: 10px 10px 6px; position: relative; z-index: 2; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .15s var(--ease);
  font-size: 13px; font-weight: 500; color: var(--text-muted);
  position: relative;
}
.sb-nav-item:hover { background: rgba(148,163,184,.06); color: var(--text-dim); }
.sb-nav-item.active { background: rgba(148,163,184,.08); color: var(--text); font-weight: 600; }
.sb-nav-icon {
  width: 20px; height: 20px; display: grid; place-items: center;
  font-size: 13px; flex-shrink: 0;
}
.sb-nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.sb-nav-item.active .sb-nav-icon svg { stroke-width: 2.2; }

/* Active indicator dot */
.sb-nav-item.active::before {
  content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px;
}

/* count badge */
.sb-nav-count {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-faint); font-variant-numeric: tabular-nums;
}

/* ===== SECTION DIVIDER ===== */
.sb-divider {
  height: 1px; margin: 6px 16px;
  background: var(--border); position: relative; z-index: 2;
}

/* ===== SECTION LABEL ===== */
.sb-section-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-faint);
  padding: 10px 16px 4px; position: relative; z-index: 2;
}

/* ===== RECENT / STARRED ITEMS ===== */
.sb-items {
  padding: 4px 10px; flex: 1; overflow-y: auto; position: relative; z-index: 2;
  scrollbar-width: thin; scrollbar-color: rgba(71,85,105,.3) transparent;
}
.sb-items::-webkit-scrollbar { width: 4px; }
.sb-items::-webkit-scrollbar-track { background: transparent; }
.sb-items::-webkit-scrollbar-thumb { background: rgba(71,85,105,.3); border-radius: 2px; }
.sb-items[style*="flex:0"] { overflow: visible; }
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px;
  cursor: pointer; transition: background .15s;
  font-size: 12px; color: var(--text-dim);
}
.sb-item:hover { background: rgba(148,163,184,.05); }
.sb-item.active { background: rgba(148,163,184,.08); color: var(--text); }
.sb-item-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.sb-item-star {
  font-size: 10px; flex-shrink: 0; width: 16px; text-align: center;
}
.sb-item-text {
  flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; font-weight: 500;
}
.sb-item-time {
  font-size: 10px; color: var(--text-faint); flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ===== BOTTOM STATUS BAR ===== */
.sb-bottom {
  padding: 12px 16px; border-top: 1px solid var(--border);
  position: relative; z-index: 2;
}
.sb-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-muted);
}
.sb-status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; animation: statusPulse 2s ease-in-out infinite;
}
@keyframes statusPulse {
  0%,100% { opacity: .6; } 50% { opacity: 1; }
}

/* =============================== */
/* VARIANT-SPECIFIC OVERRIDES      */
/* =============================== */

/* V1: Purple gradient brand icon, purple active indicator */
.v1 .sb-brand-icon {
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff; font-weight: 700;
}
.v1 .sb-nav-item.active::before { background: var(--purple); }
.v1 .sb-nav-item.active { color: var(--purple); }
.v1 .sb-nav-item.active .sb-nav-icon { color: var(--purple); }

/* V2: Blue brand icon, blue accent, rounded pill active */
.v2 .sb-brand-icon {
  background: var(--blue-dim); color: var(--blue);
  border: 1px solid rgba(96,165,250,.2);
}
.v2 .sb-nav-item.active {
  background: var(--blue-dim); color: var(--blue);
  border: 1px solid rgba(96,165,250,.15);
}
.v2 .sb-nav-item.active::before { display: none; }
.v2 .sb-nav-item { border: 1px solid transparent; }

/* V3: Minimal, no brand icon, text-only brand, thin left accent */
.v3 .sb-brand { padding: 20px 18px 16px; }
.v3 .sb-brand-icon { display: none; }
.v3 .sb-brand-text { font-size: 15px; letter-spacing: -.5px; }
.v3 .sb-nav-item.active::before { background: var(--green); width: 2px; height: 18px; }
.v3 .sb-nav-item.active { color: var(--text); }

/* V4: Gradient sidebar border, cyan accent */
.v4 {
  border-image: linear-gradient(180deg, rgba(34,211,238,.2), rgba(167,139,250,.2), transparent) 1;
  border-width: 1px; border-style: solid;
}
.v4 .sb-brand-icon {
  background: linear-gradient(135deg, var(--cyan), var(--blue));
  color: #fff; font-weight: 700;
}
.v4 .sb-nav-item.active::before { background: var(--cyan); }
.v4 .sb-nav-item.active { color: var(--cyan); }
.v4 .sb-nav-item.active .sb-nav-icon { color: var(--cyan); }

/* V5: Compact, smaller text, denser */
.v5 .sb-brand { padding: 14px 14px 10px; }
.v5 .sb-brand-icon { width: 24px; height: 24px; font-size: 11px; border-radius: 6px;
  background: linear-gradient(135deg, var(--purple), var(--blue)); color: #fff; font-weight: 700; }
.v5 .sb-brand-text { font-size: 13px; }
.v5 .sb-nav { padding: 8px 8px 4px; }
.v5 .sb-nav-item { padding: 6px 8px; font-size: 12px; gap: 8px; }
.v5 .sb-nav-icon { width: 18px; height: 18px; }
.v5 .sb-nav-icon svg { width: 14px; height: 14px; }
.v5 .sb-nav-item.active::before { background: var(--purple); width: 2px; height: 12px; }
.v5 .sb-nav-item.active { color: var(--purple); }
.v5 .sb-item { padding: 5px 8px; font-size: 11px; }

/* V6: Icon-heavy, colored icon backgrounds */
.v6 .sb-brand-icon {
  background: linear-gradient(135deg, var(--orange), #f59e0b);
  color: #fff; font-weight: 700;
}
.v6 .sb-nav-icon {
  width: 26px; height: 26px; border-radius: 7px;
}
.v6 .sb-nav-item[data-nav="invent"] .sb-nav-icon { background: var(--purple-dim); color: var(--purple); }
.v6 .sb-nav-item[data-nav="inventions"] .sb-nav-icon { background: var(--blue-dim); color: var(--blue); }
.v6 .sb-nav-item[data-nav="discover"] .sb-nav-icon { background: var(--green-dim); color: var(--green); }
.v6 .sb-nav-item.active::before { display: none; }
.v6 .sb-nav-item.active { background: rgba(148,163,184,.06); }

/* V7: Segmented tabs for nav, flat style */
.v7 .sb-nav {
  padding: 10px 12px 6px;
  display: flex; flex-direction: column; gap: 2px;
}
.v7 .sb-nav-item {
  border-radius: 6px; padding: 7px 10px;
}
.v7 .sb-brand-icon {
  background: var(--purple-dim); color: var(--purple);
  border-radius: 6px;
}
.v7 .sb-nav-item.active {
  background: rgba(167,139,250,.08);
  color: var(--text);
  box-shadow: inset 0 0 0 1px rgba(167,139,250,.12);
}
.v7 .sb-nav-item.active::before { display: none; }

/* V8: Wide brand with subtitle */
.v8 .sb-brand { flex-direction: column; align-items: flex-start; gap: 2px; padding: 20px 16px 14px; }
.v8 .sb-brand-icon {
  width: 32px; height: 32px; font-size: 15px; border-radius: 8px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  color: #fff; font-weight: 700; margin-bottom: 6px;
}
.v8 .sb-brand-text { font-size: 16px; }
.v8 .sb-brand-sub { font-size: 10px; color: var(--text-faint); margin-top: 1px; }
.v8 .sb-nav-item.active::before { background: var(--blue); }
.v8 .sb-nav-item.active { color: var(--blue); }

</style>
</head>
<body>

<h1>Sidebar Variants</h1>
<p class="subtitle">8 variants of the sidebar navigation — AI Inventor / Invent / Inventions / Discover / Starred / Recents</p>

<div class="grid" id="grid"></div>

<script>
const ICONS = {
  invent: `<svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a6 6 0 0 1 4 10.47V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-3.53A6 6 0 0 1 12 3z"/></svg>`,
  inventions: `<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/></svg>`,
  discover: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>`,
};

const STARRED = [
  { text: 'DDM Rankings', color: 'var(--purple)', time: '2h' },
  { text: 'Circuit Motifs', color: 'var(--blue)', time: '1d' },
];

const RECENTS = [
  { text: 'Syntactic Load Smo...', color: 'var(--green)', time: '4m', active: true },
  { text: 'Schema Treewidth', color: 'var(--orange)', time: '12h' },
  { text: 'Oblique Tree Sums', color: 'var(--purple)', time: '2d' },
  { text: 'Balance-Guided Tr...', color: 'var(--blue)', time: '3d' },
  { text: 'Simplicial Constr...', color: 'var(--cyan)', time: '5d' },
];

function navHTML(variant) {
  return `
    <div class="sb-nav">
      <div class="sb-nav-item active" data-nav="invent">
        <div class="sb-nav-icon">${ICONS.invent}</div>
        <span>Invent</span>
      </div>
      <div class="sb-nav-item" data-nav="inventions">
        <div class="sb-nav-icon">${ICONS.inventions}</div>
        <span>Inventions</span>
        <span class="sb-nav-count">7</span>
      </div>
      <div class="sb-nav-item" data-nav="discover">
        <div class="sb-nav-icon">${ICONS.discover}</div>
        <span>Discover</span>
      </div>
    </div>`;
}

function starredHTML() {
  return STARRED.map(s => `
    <div class="sb-item">
      <span class="sb-item-star" style="color:${s.color}">&#9733;</span>
      <span class="sb-item-text">${s.text}</span>
      <span class="sb-item-time">${s.time}</span>
    </div>`).join('');
}

function recentsHTML() {
  return RECENTS.map(r => `
    <div class="sb-item${r.active ? ' active' : ''}">
      <span class="sb-item-dot" style="background:${r.color}${r.active ? ';box-shadow:0 0 6px '+r.color : ''}"></span>
      <span class="sb-item-text">${r.text}</span>
      <span class="sb-item-time">${r.time}</span>
    </div>`).join('');
}

function bottomHTML(runColor) {
  return `
    <div class="sb-bottom">
      <div class="sb-status">
        <span class="sb-status-dot" style="background:${runColor}; box-shadow:0 0 6px ${runColor}"></span>
        <span>Running &middot; Round 3 of 8</span>
      </div>
    </div>`;
}

function sidebar(cls, label, brandIcon, brandExtra) {
  brandExtra = brandExtra || '';
  return `
  <div>
    <div class="variant-label">${label}</div>
    <div class="sb ${cls}">
      <div class="sb-brand">
        <div class="sb-brand-icon">${brandIcon}</div>
        <div>
          <div class="sb-brand-text">AI Inventor</div>
          ${brandExtra}
        </div>
      </div>
      ${navHTML(cls)}
      <div class="sb-divider"></div>
      <div class="sb-section-label">Starred</div>
      <div class="sb-items" style="flex:0">
        ${starredHTML()}
      </div>
      <div class="sb-section-label">Recents</div>
      <div class="sb-items">
        ${recentsHTML()}
      </div>
      ${bottomHTML(cls === 'v4' ? 'var(--cyan)' : cls === 'v3' ? 'var(--green)' : 'var(--blue)')}
    </div>
    <div class="variant-note">${getNote(cls)}</div>
  </div>`;
}

function getNote(cls) {
  const notes = {
    v1: 'Purple gradient icon, purple active accent bar',
    v2: 'Blue outlined icon, pill-style active state',
    v3: 'Minimal — no icon, text-only brand, green thin accent',
    v4: 'Gradient border, cyan accent theme',
    v5: 'Compact dense — smaller everything, fits more',
    v6: 'Colored icon backgrounds per nav item',
    v7: 'Inset box active state, subtle card feel',
    v8: 'Stacked brand with subtitle, blue accent',
  };
  return notes[cls] || '';
}

// V3 has no brand icon, handle separately
function sidebarV3(cls, label) {
  return `
  <div>
    <div class="variant-label">${label}</div>
    <div class="sb ${cls}">
      <div class="sb-brand">
        <div class="sb-brand-text">AI Inventor</div>
      </div>
      ${navHTML(cls)}
      <div class="sb-divider"></div>
      <div class="sb-section-label">Starred</div>
      <div class="sb-items" style="flex:0">
        ${starredHTML()}
      </div>
      <div class="sb-section-label">Recents</div>
      <div class="sb-items">
        ${recentsHTML()}
      </div>
      ${bottomHTML('var(--green)')}
    </div>
    <div class="variant-note">${getNote(cls)}</div>
  </div>`;
}

// V8 has subtitle
function sidebarV8(cls, label) {
  return `
  <div>
    <div class="variant-label">${label}</div>
    <div class="sb ${cls}">
      <div class="sb-brand">
        <div class="sb-brand-icon">AI</div>
        <div>
          <div class="sb-brand-text">AI Inventor</div>
          <div class="sb-brand-sub">Automated Research Pipeline</div>
        </div>
      </div>
      ${navHTML(cls)}
      <div class="sb-divider"></div>
      <div class="sb-section-label">Starred</div>
      <div class="sb-items" style="flex:0">
        ${starredHTML()}
      </div>
      <div class="sb-section-label">Recents</div>
      <div class="sb-items">
        ${recentsHTML()}
      </div>
      ${bottomHTML('var(--blue)')}
    </div>
    <div class="variant-note">${getNote(cls)}</div>
  </div>`;
}

const grid = document.getElementById('grid');
grid.innerHTML = [
  sidebar('v1', '1 — Purple Gradient', 'AI'),
  sidebar('v2', '2 — Blue Outlined', 'AI'),
  sidebarV3('v3', '3 — Minimal Text'),
  sidebar('v4', '4 — Gradient Border + Cyan', 'AI'),
  sidebar('v5', '5 — Compact Dense', 'AI'),
  sidebar('v6', '6 — Colored Nav Icons', 'AI'),
  sidebar('v7', '7 — Inset Card Active', 'AI'),
  sidebarV8('v8', '8 — Stacked Brand'),
].join('');
</script>

</body>
</html>
