<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra Compact 14</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1d23;
  --surface: #22262e;
  --surface-hi: #2e3440;
  --border: rgba(46, 52, 64, 0.8);
  --border-lite: rgba(60, 68, 82, 0.6);
  --glass: rgba(34, 38, 46, 0.55);
  --glass-border: rgba(100, 116, 155, 0.14);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 40%, transparent 60%);
  --glass-blur: 16px;

  --text-100: #e6e9f0;
  --text-200: #b0b8c9;
  --text-300: #8892a6;
  --text-400: #5c6578;
  --text-500: #3e4555;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --purple-glow: rgba(167,139,250,0.25);
  --purple-deep: rgba(167,139,250,0.55);

  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --blue-glow: rgba(59,130,246,0.25);
  --blue-deep: rgba(59,130,246,0.55);

  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.12);
  --orange-glow: rgba(245,158,11,0.25);
  --orange-deep: rgba(245,158,11,0.55);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #ef4444;

  --radius: 10px;
  --radius-sm: 6px;
  --radius-xs: 4px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --header-h: 38px;
  --sidebar-collapsed: 42px;
  --sidebar-expanded: 200px;
}

html { font-size: 13px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.45;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(100,116,155,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,155,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   FIXED HEADER (38px glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(26, 29, 35, 0.84);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 16px;
  z-index: 1000; gap: 10px;
}
.header-brand {
  font-weight: 800; font-size: 11px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.breadcrumb { display: flex; align-items: center; gap: 5px; font-size: 10px; }
.breadcrumb span { color: var(--text-400); }
.breadcrumb .sep { color: rgba(100,116,155,0.35); font-size: 9px; }
.breadcrumb .active { color: var(--text-200); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.header-stat {
  font-size: 10px; color: var(--text-400);
  display: flex; align-items: center; gap: 4px;
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.live-badge {
  display: flex; align-items: center; gap: 4px; padding: 1px 6px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.18);
  border-radius: 3px; font-size: 8px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.3); }
  50% { opacity: 1; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
}

/* ================================================================
   COLLAPSED SIDEBAR (42px -> 200px on hover)
   ================================================================ */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-collapsed);
  background: rgba(26, 29, 35, 0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--glass-border);
  z-index: 900; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden; display: flex; flex-direction: column;
  padding: 8px 0 12px; gap: 1px;
}
.sidebar:hover { width: var(--sidebar-expanded); }

.sidebar-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 6px 0 8px; flex-shrink: 0;
}
.sidebar-ring { width: 26px; height: 26px; position: relative; flex-shrink: 0; }
.sidebar-ring svg { width: 100%; height: 100%; }
.sidebar-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.sidebar-ring .ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease;
  filter: drop-shadow(0 0 4px var(--blue-deep));
}
.sidebar-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7px; font-weight: 700; color: var(--text-100);
}
.sidebar-ring-text {
  font-size: 10px; color: var(--text-400); font-weight: 500;
  white-space: nowrap; margin-left: 8px;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-ring-text { opacity: 1; }

.sidebar-divider {
  width: 24px; height: 1px; background: var(--border);
  margin: 3px auto 6px; flex-shrink: 0;
  transition: width 0.3s ease;
}
.sidebar:hover .sidebar-divider { width: calc(100% - 20px); }

.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 10px; cursor: pointer; transition: var(--transition);
  white-space: nowrap; position: relative; flex-shrink: 0;
}
.sidebar-item:hover { background: rgba(100,116,155,0.06); }
.sidebar-item.active { background: rgba(59,130,246,0.08); }
.sidebar-item .indicator {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 2px; height: 0; border-radius: 0 2px 2px 0;
  transition: height 0.25s ease;
}
.sidebar-item.active .indicator { height: 14px; }
.sidebar-item[data-color="purple"] .indicator { background: var(--purple); }
.sidebar-item[data-color="blue"] .indicator { background: var(--blue); }
.sidebar-item[data-color="orange"] .indicator { background: var(--orange); }
.sidebar-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.sidebar-dot.done { background: var(--green); opacity: 0.7; }
.sidebar-dot.running { background: var(--blue); animation: sbDotPulse 2s ease-in-out infinite; }
.sidebar-dot.pending { background: transparent; border: 1.5px solid var(--text-500); }
@keyframes sbDotPulse {
  0%, 100% { box-shadow: 0 0 4px var(--blue-glow); }
  50% { box-shadow: 0 0 10px var(--blue-glow), 0 0 18px rgba(59,130,246,0.15); }
}
.sidebar-label {
  font-size: 10px; color: var(--text-300); font-weight: 500;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.main {
  margin-left: var(--sidebar-collapsed); margin-top: var(--header-h);
  padding: 16px 20px 48px;
  position: relative; z-index: 1;
  max-width: 1400px;
}

/* ================================================================
   SECTION BACKGROUND TINTS
   ================================================================ */
.section-tint {
  position: absolute; left: 0; right: 0; pointer-events: none;
  border-radius: 20px; filter: blur(60px); z-index: -1;
}
.section-tint.purple-tint { background: rgba(167,139,250,0.03); top: 0; height: 200px; }
.section-tint.blue-tint { background: rgba(59,130,246,0.04); top: 120px; height: 350px; }

/* ================================================================
   3 HORIZONTAL MODULE CARDS — COMPACT 160x65px
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 4px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 10px 12px 8px; transition: all 0.35s ease; overflow: hidden;
  min-height: 65px;
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
.mod-card .glow-halo {
  position: absolute; inset: -20px; border-radius: 24px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(28px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.12; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.18; } }

.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 30px 6px var(--purple-dim), inset 0 0 14px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 30px 6px var(--blue-dim), inset 0 0 14px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 30px 6px var(--orange-dim), inset 0 0 14px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(100,116,155,0.22); transform: translateY(-1px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.05; }
.mod-card.active { border-color: rgba(255,255,255,0.1); }

/* card internals — compact */
.mc-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; position: relative; z-index: 3; }
.mc-icon { font-size: 11px; flex-shrink: 0; }
.mc-name { font-size: 11px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 8px; font-weight: 600; padding: 1px 5px; border-radius: 4px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(59,130,246,0.2); } }

.mc-metrics { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 9px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.3px; }
.mc-metric-value { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* mini ring gauge 22px */
.mc-ring { width: 22px; height: 22px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; }
.mc-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.mc-ring .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease; }
.mc-ring .ring-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 6px; font-weight: 700; color: var(--text-200);
}

/* 2px progress bar at bottom */
.mc-bar { height: 2px; background: rgba(255,255,255,0.04); border-radius: 1px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 1px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 4px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 4px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 4px var(--orange-deep); }

/* ================================================================
   TREE AREA (3 columns)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; position: relative; min-height: 80px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.1s; }
.tree-col:nth-child(3) { animation-delay: 0.2s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* tree vertical trunk line */
.tree-trunk {
  position: relative; padding-left: 18px;
  display: flex; flex-direction: column; gap: 2px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 7px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 14px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.18); }

.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.45); box-shadow: 0 0 6px rgba(167,139,250,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.45); box-shadow: 0 0 6px rgba(59,130,246,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.45); box-shadow: 0 0 6px rgba(245,158,11,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ================================================================
   SUB-MODULE CARDS — COMPACT 36px
   ================================================================ */
.sub-card {
  height: 36px; display: flex; align-items: center; gap: 7px;
  padding: 0 10px; position: relative; border-radius: var(--radius-xs);
  background: var(--surface); border: 1px solid transparent;
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-8px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* L-shaped branch connector: vertical + horizontal */
.sub-card::before {
  content: ''; position: absolute; left: -11px; top: 50%;
  width: 11px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.18); }

/* states */
.sub-card.done-sub { background: rgba(255,255,255,0.015); }

.sub-card.active-sub { border-color: rgba(255,255,255,0.06); }
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.06); border-color: rgba(167,139,250,0.18);
  box-shadow: 0 0 14px rgba(167,139,250,0.08), 0 2px 6px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.18);
  box-shadow: 0 0 14px rgba(59,130,246,0.08), 0 2px 6px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.18);
  box-shadow: 0 0 14px rgba(245,158,11,0.08), 0 2px 6px rgba(0,0,0,0.2);
}

.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.025) 46%, rgba(255,255,255,0.06) 50%,
    rgba(255,255,255,0.025) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  animation: subGlowPulse 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 12px rgba(167,139,250,0.05); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 12px rgba(59,130,246,0.05); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 12px rgba(245,158,11,0.05); }
@keyframes subGlowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

.sub-card.pending-sub { background: rgba(255,255,255,0.008); opacity: 0.5; }
.sub-card.pending-sub.visible { opacity: 0.5; }

/* left accent stripe */
.sub-card::after {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub::after { opacity: 1; }
.sub-card.done-sub::after { opacity: 0.3; }
.sub-card[data-pcolor="purple"]::after { background: var(--purple); }
.sub-card[data-pcolor="blue"]::after { background: var(--blue); }
.sub-card[data-pcolor="orange"]::after { background: var(--orange); }

.sub-card:not(.pending-sub):hover { transform: translateY(-1px); background: rgba(255,255,255,0.03); }

/* sub-card internals */
.sub-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] {
  background: var(--blue); box-shadow: 0 0 6px rgba(59,130,246,0.5);
}
.sub-dot.running[data-pcolor="purple"] {
  background: var(--purple); box-shadow: 0 0 6px rgba(167,139,250,0.5);
}
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

.sub-spinner {
  width: 12px; height: 12px; flex-shrink: 0;
  border: 1.5px solid rgba(59,130,246,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin {
  border-color: rgba(167,139,250,0.15);
  border-top-color: var(--purple);
}
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 10px; color: var(--text-300); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sub-card.active-sub .sub-label { color: var(--text-100); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-300); }

.sub-meta {
  margin-left: auto; font-size: 9px; font-weight: 600;
  color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

.sub-micro-badge {
  font-size: 7px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0; margin-left: 2px;
}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }

/* ================================================================
   LEVEL 3: ITEM CHECKLIST — COMPACT 24px
   ================================================================ */
.level3-wrap {
  padding-left: 20px; position: relative; overflow: hidden;
  max-height: 400px; transition: max-height 0.4s ease;
}
.level3-wrap::before {
  content: ''; position: absolute; left: 8px; top: 0;
  width: 1px; height: calc(100% - 8px);
}
.tree-trunk[data-color="purple"] .level3-wrap::before { background: rgba(167,139,250,0.1); }
.tree-trunk[data-color="blue"] .level3-wrap::before { background: rgba(59,130,246,0.1); }
.tree-trunk[data-color="orange"] .level3-wrap::before { background: rgba(245,158,11,0.1); }

.level3-item {
  height: 24px; display: flex; align-items: center; gap: 5px;
  font-size: 9px; color: var(--text-400); position: relative;
  padding-left: 4px; border-radius: 3px;
  opacity: 0; transform: translateX(-5px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level3-item.visible { opacity: 1; transform: translateX(0); }
.level3-item:hover { background: rgba(255,255,255,0.02); }
.level3-item::before {
  content: ''; position: absolute; left: -8px; top: 50%;
  width: 8px; height: 1px;
}
.tree-trunk[data-color="blue"] .level3-item::before { background: rgba(59,130,246,0.1); }
.tree-trunk[data-color="purple"] .level3-item::before { background: rgba(167,139,250,0.1); }
.tree-trunk[data-color="orange"] .level3-item::before { background: rgba(245,158,11,0.1); }

.l3-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.l3-dot.done { background: var(--green); opacity: 0.5; }
.l3-dot.running { background: var(--blue); animation: l3Pulse 2s ease-in-out infinite; }
.l3-dot.pending { border: 1px solid var(--text-500); opacity: 0.35; }
@keyframes l3Pulse {
  0%, 100% { box-shadow: 0 0 3px rgba(59,130,246,0.4); }
  50% { box-shadow: 0 0 6px rgba(59,130,246,0.7); }
}
.l3-label { flex: 1; }
.l3-meta { font-size: 8px; color: var(--text-500); font-variant-numeric: tabular-nums; }

/* collapsed tree */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {
  display: none; padding: 6px 10px; font-size: 10px; color: var(--text-400);
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 6px;
}
.tree-collapsed-bar:hover { color: var(--text-300); background: var(--surface); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }
.tree-col .collapse-toggle {
  display: flex; align-items: center; gap: 4px;
  font-size: 9px; color: var(--text-400); cursor: pointer;
  padding: 1px 0 4px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 10px; height: 10px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* ================================================================
   HOVER TOOLTIP
   ================================================================ */
.tooltip-portal {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 340px; opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.tooltip-portal.visible { opacity: 1; transform: translateY(0); }
.tooltip-inner {
  background: rgba(26, 29, 35, 0.94);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 12px 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.tooltip-title {
  font-size: 11px; font-weight: 600; color: var(--text-100); margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.tooltip-summary { font-size: 10px; color: var(--text-300); line-height: 1.5; margin-bottom: 8px; }
.tooltip-stats { display: flex; gap: 14px; }
.tooltip-stat-val { font-size: 14px; font-weight: 700; color: var(--text-100); }
.tooltip-stat-label { font-size: 9px; color: var(--text-400); }

/* ================================================================
   DASHBOARD PANEL
   ================================================================ */
.dashboard-panel {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  margin-top: 14px;
}
.dashboard-panel.open { max-height: 500px; opacity: 1; }

.dashboard-inner {
  display: grid; grid-template-columns: 3fr 2fr; gap: 18px;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 18px;
  position: relative;
  animation: dashSlide 0.3s ease-out;
}
@keyframes dashSlide {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.dashboard-inner .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}

.dash-close {
  position: absolute; top: 10px; right: 12px;
  width: 20px; height: 20px; border-radius: 5px; border: none;
  background: rgba(100,116,155,0.1); color: var(--text-400);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; transition: var(--transition); z-index: 10;
}
.dash-close:hover { background: rgba(100,116,155,0.2); color: var(--text-100); }

.dash-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-400); margin-bottom: 8px;
  display: flex; align-items: center; gap: 5px;
}
.dash-summary {
  font-size: 11px; color: var(--text-200); line-height: 1.6;
  margin-bottom: 12px; padding: 10px 12px;
  background: rgba(26, 29, 35, 0.5); border-radius: var(--radius-sm);
  border-left: 2px solid var(--blue);
}
.dash-item-list { list-style: none; }
.dash-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; font-size: 10px; color: var(--text-300);
  border-bottom: 1px solid rgba(100,116,155,0.06);
}
.dash-item-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.dash-stat-card {
  background: rgba(26, 29, 35, 0.5); border-radius: var(--radius-sm);
  padding: 10px 12px; text-align: center;
  border: 1px solid rgba(100,116,155,0.06);
}
.dash-stat-val { font-size: 18px; font-weight: 700; color: var(--text-100); font-variant-numeric: tabular-nums; }
.dash-stat-label { font-size: 9px; color: var(--text-400); margin-top: 1px; }

.dash-feed-header { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }
.dash-feed-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-400);
}
.mini-live-badge {
  font-size: 7px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
  background: rgba(239,68,68,0.1); color: var(--red);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.dash-feed { max-height: 110px; overflow-y: auto; }
.dash-feed::-webkit-scrollbar { width: 3px; }
.dash-feed::-webkit-scrollbar-thumb { background: rgba(100,116,155,0.2); border-radius: 2px; }

.feed-entry {
  display: flex; gap: 6px; padding: 4px 0; font-size: 10px;
  border-bottom: 1px solid rgba(100,116,155,0.04);
  animation: feedFadeIn 0.35s ease both;
}
@keyframes feedFadeIn {
  from { opacity: 0; transform: translateX(5px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: var(--text-500); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 36px; }
.feed-pip { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.feed-msg { color: var(--text-300); flex: 1; }

/* ================================================================
   L-SHAPED DOT ANIMATION CONTAINER
   ================================================================ */
.dot-anim-container { position: fixed; inset: 0; pointer-events: none; z-index: 500; }
.flying-dot {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: var(--blue); pointer-events: none;
  box-shadow: 0 0 6px var(--blue), 0 0 12px rgba(59,130,246,0.3);
}
.flying-dot-trail {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  pointer-events: none; opacity: 0.3;
  transition: opacity 0.5s ease;
}

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }
</style>
</head>

<script>
/* ================================================================
   DATA MODEL
   ================================================================ */
const MODULES = [
  {
    id: 'gen_hypo', label: 'Generate Hypothesis', color: 'purple', status: 'done',
    summary: 'Refined hypothesis through 3 adversarial review iterations: 6.2 -> 7.8 -> 8.4/10. Final review found 0 major issues.',
    duration: '01:12:34', cost: '$4.21', messages: 847,
    subs: [
      { id: 'gen1', label: 'Gen Hypo Iter 1', status: 'done', meta: '6.2/10', duration: '14m', items: [] },
      { id: 'rev1', label: 'Review Iter 1', status: 'done', meta: '3 issues', duration: '8m', items: [] },
      { id: 'gen2', label: 'Gen Hypo Iter 2', status: 'done', meta: '7.8/10', duration: '16m', items: [] },
      { id: 'rev2', label: 'Review Iter 2', status: 'done', meta: '1 issue', duration: '9m', items: [] },
      { id: 'gen3', label: 'Gen Hypo Iter 3', status: 'done', meta: '8.4/10', duration: '18m', items: [] },
      { id: 'rev3', label: 'Review Iter 3', status: 'done', meta: '0 major', duration: '7m', items: [] }
    ]
  },
  {
    id: 'test_hypo', label: 'Test Hypothesis', color: 'blue', status: 'running',
    summary: 'Building research artifacts. Baseline evaluation shows +17.5% accuracy improvement over prior work.',
    duration: '01:18:42', cost: '$7.83', messages: 1204,
    subs: [
      { id: 'strat', label: 'Strategy', status: 'done', meta: 'Contrastive', duration: '12m', items: [] },
      { id: 'plan', label: 'Plan', status: 'done', meta: '5 artifacts', duration: '8m', items: [] },
      {
        id: 'artifacts', label: 'Artifacts', status: 'running', meta: '3/5', duration: '41m',
        items: [
          { label: 'Baseline Implementation', status: 'done', time: '12m' },
          { label: 'Dataset Preparation', status: 'done', time: '8m' },
          { label: 'Proof of Concept', status: 'done', time: '15m' },
          { label: 'Ablation Study', status: 'running', time: '6m' },
          { label: 'Evaluation Suite', status: 'pending', time: '--' }
        ]
      },
      { id: 'paper', label: 'Paper Draft', status: 'running', meta: 'Writing...', duration: '18m', items: [] },
      { id: 'review', label: 'Review', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'update', label: 'Update Hypo', status: 'pending', meta: '--', duration: '--', items: [] }
    ]
  },
  {
    id: 'disseminate', label: 'Disseminate Results', color: 'orange', status: 'pending',
    summary: 'Awaiting completion of Test Hypothesis module before generating paper repository.',
    duration: '--', cost: '$0.00', messages: 0,
    subs: [
      { id: 'repo', label: 'Gen Repo', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'demos', label: 'Demos + Viz', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'full_paper', label: 'Full Paper', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'deploy_src', label: 'Deploy Source', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'deploy_paper', label: 'Deploy Paper', status: 'pending', meta: '--', duration: '--', items: [] }
    ]
  }
];

/* ================================================================
   RENDER TREE AREA
   ================================================================ */
const treeArea = document.getElementById('treeArea');

function renderTrees() {
  treeArea.innerHTML = '';
  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' ? ' collapsed' : '');
    col.dataset.module = mi;

    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      card.innerHTML = `<div class="sub-card-shimmer"></div><div class="sub-card-glow"></div>`;

      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:9px; color:var(--green); flex-shrink:0;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      const badge = document.createElement('span');
      badge.className = `sub-micro-badge ${sub.status === 'done' ? 'done' : sub.status === 'running' ? 'running' : 'pending'}`;
      badge.textContent = sub.status === 'done' ? 'Done' : sub.status === 'running' ? 'Live' : 'Wait';
      card.appendChild(badge);

      card.addEventListener('click', (e) => {
        e.stopPropagation();
        openDashboard(mi, si);
      });
      card.addEventListener('mouseenter', (e) => showTooltip(e, mi, si));
      card.addEventListener('mousemove', (e) => moveTooltip(e));
      card.addEventListener('mouseleave', hideTooltip);

      trunk.appendChild(card);

      if (sub.items && sub.items.length > 0) {
        const wrap = document.createElement('div');
        wrap.className = 'level3-wrap';
        sub.items.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'level3-item';
          const dotCls = item.status === 'done' ? 'done' : item.status === 'running' ? 'running' : 'pending';
          row.innerHTML = `<div class="l3-dot ${dotCls}"></div>
            <span class="l3-label">${item.label}</span>
            <span class="l3-meta">${item.time}</span>`;
          wrap.appendChild(row);
        });
        trunk.appendChild(wrap);
      }
    });

    col.appendChild(trunk);

/* ================================================================
   AMBIENT PARTICLES (30 dots + connection lines)
   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.radius = Math.random() * 1.2 + 0.4;
    this.opacity = Math.random() * 0.1 + 0.03;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < 30; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const alpha = (1 - dist / 140) * 0.035;
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = `rgba(100, 130, 200, ${alpha})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }

  particles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(140, 170, 220, ${p.opacity})`;
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ================================================================
   L-SHAPED TREE DOT ANIMATION
   Dots travel down the trunk (vertical), then turn 90 degrees
   along the horizontal branch connector to reach the sub-card.
   This creates the correct L-shaped path along the tree lines.
   ================================================================ */
const dotContainer = document.getElementById('dotAnimContainer');

function getRunningSubCards() {
  return document.querySelectorAll('.sub-card.active-sub');
}

/**
 * Spawns a glowing dot that follows the L-shaped tree connector:
 *  1) Starts at the top of the trunk vertical line
 *  2) Travels DOWN the trunk to the sub-card's vertical position
 *  3) Turns RIGHT along the horizontal branch to reach the sub-card
 *
 * This matches the actual L-shaped connector geometry in the tree.
 */
function spawnLShapeDot(targetEl) {
  const targetRect = targetEl.getBoundingClientRect();

  // Find the trunk element (parent of the sub-card)
  const trunk = targetEl.closest('.tree-trunk');
  if (!trunk) return;
  const trunkRect = trunk.getBoundingClientRect();

  // The trunk's vertical line is at left: 7px inside .tree-trunk
  // .tree-trunk has padding-left: 18px, so the line is at trunkRect.left + 7
  const trunkLineX = trunkRect.left + 7;

  // The horizontal connector meets the sub-card at its vertical center
  const targetCenterY = targetRect.top + targetRect.height / 2;

  // Start position: top of the trunk line, slightly above first sub-card
  const startY = trunkRect.top + (Math.random() * 12);

  // Corner of the L-shape: where trunk meets horizontal branch
  const cornerX = trunkLineX;
  const cornerY = targetCenterY;

  // End position: left edge of the sub-card
  const endX = targetRect.left;
  const endY = targetCenterY;

  // Total path lengths
  const verticalLen = Math.abs(cornerY - startY);
  const horizontalLen = Math.abs(endX - cornerX);
  const totalLen = verticalLen + horizontalLen;
  if (totalLen < 5) return;

  const verticalFraction = verticalLen / totalLen;

  // Create dot
  const dot = document.createElement('div');
  dot.className = 'flying-dot';
  dot.style.left = cornerX + 'px';
  dot.style.top = startY + 'px';
  dot.style.opacity = '0';
  dot.style.transform = 'scale(0.4)';

  // Color the dot based on module color
  const pcolor = targetEl.dataset.pcolor;
  if (pcolor === 'purple') {
    dot.style.background = 'var(--purple)';
    dot.style.boxShadow = '0 0 6px var(--purple), 0 0 12px rgba(167,139,250,0.3)';
  } else if (pcolor === 'orange') {
    dot.style.background = 'var(--orange)';
    dot.style.boxShadow = '0 0 6px var(--orange), 0 0 12px rgba(245,158,11,0.3)';
  }
  // Default is blue from CSS

  dotContainer.appendChild(dot);

  const duration = 1200 + Math.random() * 600;
  const startTime = performance.now();
  let lastTrailTime = 0;

  function animateDot(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Smooth ease: accelerate at start, decelerate at end
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

    let x, y;

    if (ease <= verticalFraction) {
      // Phase 1: traveling DOWN the trunk
      const localT = ease / verticalFraction;
      x = cornerX;
      y = startY + (cornerY - startY) * localT;
    } else {
      // Phase 2: traveling RIGHT along horizontal branch
      const localT = (ease - verticalFraction) / (1 - verticalFraction);
      x = cornerX + (endX - cornerX) * localT;
      y = cornerY;
    }

    // Opacity: fade in at start, fade out at end
    const opacity = t < 0.08 ? t / 0.08 : t > 0.88 ? (1 - t) / 0.12 : 1;
    const scale = t < 0.08 ? 0.4 + 0.6 * (t / 0.08) : t > 0.92 ? 1 - 0.6 * ((t - 0.92) / 0.08) : 1;

    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    dot.style.opacity = (opacity * 0.85).toString();
    dot.style.transform = `scale(${scale})`;

    // Spawn trail particles every ~60ms
    if (now - lastTrailTime > 60 && t > 0.05 && t < 0.9) {
      lastTrailTime = now;
      spawnTrail(x, y, pcolor);
    }

    if (t < 1) {
      requestAnimationFrame(animateDot);
    } else {
      // Small flash on arrival
      dot.style.transform = 'scale(1.8)';
      dot.style.opacity = '0.6';
      dot.style.transition = 'all 0.15s ease-out';
      setTimeout(() => dot.remove(), 160);
    }
  }
  requestAnimationFrame(animateDot);
}

function spawnTrail(x, y, pcolor) {
  const trail = document.createElement('div');
  trail.className = 'flying-dot-trail';
  trail.style.left = x + 'px';
  trail.style.top = y + 'px';

  if (pcolor === 'purple') {
    trail.style.background = 'var(--purple)';
  } else if (pcolor === 'orange') {
    trail.style.background = 'var(--orange)';
  } else {
    trail.style.background = 'var(--blue)';
  }

  dotContainer.appendChild(trail);
  requestAnimationFrame(() => {
    trail.style.opacity = '0';
  });
  setTimeout(() => trail.remove(), 500);
}

function spawnDotWave() {
  const targets = getRunningSubCards();
  targets.forEach(target => {
    const count = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnLShapeDot(target), i * 180 + Math.random() * 250);
    }
  });
}

  const cards = document.querySelectorAll('.mod-card');
  cards.forEach((card, i) => {
    card.style.opacity = '0';
    card.style.transform = 'translateY(10px)';
    card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 100 + i * 80);
  });
}
animateCardEntrance();

/* ================================================================
   RUNNING MODULE CARD BORDER PULSE
   ================================================================ */
const runningCardBorderStyle = document.createElement('style');
runningCardBorderStyle.textContent = `
  .mod-card[data-status="running"] {
    animation: runningBorderPulse 4s ease-in-out infinite;
  }
  @keyframes runningBorderPulse {
    0%, 100% { border-color: rgba(59,130,246,0.14); }
    50% { border-color: rgba(59,130,246,0.28); }
  }
`;
document.head.appendChild(runningCardBorderStyle);

/* ================================================================
   ACTIVE SUB-CARD BORDER CYCLE
   ================================================================ */
const runningSubStyle = document.createElement('style');
runningSubStyle.textContent = `
  .sub-card.active-sub[data-pcolor="blue"] {
    animation: blueSubPulse 3s ease-in-out infinite;
  }
  @keyframes blueSubPulse {
    0%, 100% { border-color: rgba(59,130,246,0.14); }
    50% { border-color: rgba(59,130,246,0.28); }
  }
`;
document.head.appendChild(runningSubStyle);

/* ================================================================
   PENDING MODULE DESATURATION
   ================================================================ */
const pendingStyle = document.createElement('style');
pendingStyle.textContent = `
  .mod-card[data-status="pending"] { opacity: 0.65; }
  .mod-card[data-status="pending"]:hover { opacity: 0.8; }
`;
document.head.appendChild(pendingStyle);

/* ================================================================
   SMOOTH SCROLL
   ================================================================ */
document.documentElement.style.scrollBehavior = 'smooth';

/* ================================================================
   KEYBOARD HINT
   ================================================================ */
const kbdHint = document.createElement('div');
kbdHint.style.cssText = `
  position: fixed; bottom: 8px; right: 16px; font-size: 9px;
  color: var(--text-500); z-index: 50; opacity: 0.6;
  display: flex; gap: 6px; align-items: center;
`;
kbdHint.innerHTML = `
  <span style="display:inline-block; padding:1px 4px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:2px; font-size:8px;
    color:var(--text-400);">\u2190\u2192</span> modules
  <span style="display:inline-block; padding:1px 4px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:2px; font-size:8px;
    color:var(--text-400);">\u2191\u2193</span> subs
  <span style="display:inline-block; padding:1px 4px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:2px; font-size:8px;
    color:var(--text-400);">Enter</span> open
  <span style="display:inline-block; padding:1px 4px; background:var(--surface);
    border:1px solid var(--glass-border); border-radius:2px; font-size:8px;
    color:var(--text-400);">Esc</span> close
`;
document.body.appendChild(kbdHint);
</script>
</body>
