<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — The Chosen (Mini Cards)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1219;
    --surface: #171c26;
    --surface-h: #1e2430;
    --card: #1a2030;
    --card-h: #212938;
    --border: #252d3a;
    --border-lit: #313b4c;
    --text: #e2e6ed;
    --text-dim: #8892a4;
    --text-muted: #4d576a;
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --sidebar-w: 180px;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Sidebar ─────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 14px;
    gap: 20px;
    z-index: 10;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Progress Ring ───────────────────────────────── */
  .ring-wrap {
    position: relative;
    width: 120px;
    height: 120px;
  }

  .ring-wrap canvas {
    width: 120px;
    height: 120px;
  }

  .ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    pointer-events: none;
  }

  .ring-sub {
    text-align: center;
    font-size: 9px;
    color: var(--text-muted);
    margin-top: -2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── Legend ───────────────────────────────────────── */
  .legend {
    display: flex;
    flex-direction: column;
    gap: 3px;
    width: 100%;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 11.5px;
    color: var(--text-dim);
    user-select: none;
  }

  .legend-item:hover {
    background: var(--surface-h);
    color: var(--text);
  }

  .legend-item.active {
    background: var(--card);
    color: var(--text);
    font-weight: 600;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow 0.2s ease;
  }

  .legend-item.active .legend-dot {
    box-shadow: 0 0 6px 1px currentColor;
  }

  .legend-label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .legend-pct {
    font-size: 10px;
    opacity: 0.6;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
  }

  /* ── Sidebar Stats ───────────────────────────────── */
  .sidebar-stats {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .sidebar-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10.5px;
  }

  .sidebar-stat-label {
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sidebar-stat-val {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* ── Main Area ───────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Row 1: Module Cards + Particles ─────────────── */
  .row1-wrap {
    position: relative;
    padding: 20px 28px 8px;
  }

  .row1 {
    display: flex;
    gap: 14px;
    position: relative;
    z-index: 2;
  }

  #particleCanvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .mod-card {
    width: 136px;
    height: 56px;
    background: rgba(26, 32, 48, 0.85);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    cursor: pointer;
    position: relative;
    transition: all 0.25s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-shrink: 0;
    overflow: hidden;
  }

  .mod-card:hover {
    background: var(--card-h);
    transform: scale(1.02);
  }

  .mod-card.selected { transform: scale(1.02); }

  .mod-card .mc-name {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mod-card .mc-metric {
    font-size: 16px;
    font-weight: 700;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .mod-card .mc-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    border-radius: 0 0 0 8px;
    transition: width 0.4s ease;
  }

  .mod-card .mc-glow {
    position: absolute;
    inset: -1px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .mod-card.active .mc-glow,
  .mod-card.selected .mc-glow { opacity: 1; }

  .mod-card.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    animation: shimmer 2.8s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 120%; }
  }

  /* ── Beam Canvas ─────────────────────────────────── */
  #beamCanvas {
    height: 24px;
    position: relative;
    z-index: 2;
    margin: 0 28px;
    flex-shrink: 0;
  }

  /* ── Row 2: Sub-Module Dots ──────────────────────── */
  .row2-wrap {
    padding: 0 28px 12px;
    overflow: hidden;
  }

  .row2 {
    display: flex;
    gap: 20px;
    transition: transform 0.3s ease;
    padding: 4px 0;
  }

  .sub-dot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 42px;
  }

  .sub-dot-wrap:hover { transform: translateY(-1px); }

  .sub-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transition: all 0.25s ease;
    position: relative;
  }

  .sub-dot.glow {
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px 1px currentColor; }
    50% { box-shadow: 0 0 12px 3px currentColor; }
  }

  .sub-dot.sel {
    box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px #fff;
  }

  .sub-dot.sel.glow {
    animation: dotPulseSel 2s ease-in-out infinite;
  }

  @keyframes dotPulseSel {
    0%, 100% { box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px #fff, 0 0 8px 2px currentColor; }
    50% { box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px #fff, 0 0 14px 4px currentColor; }
  }

  .sub-dot-label {
    font-size: 9.5px;
    color: var(--text-muted);
    text-align: center;
    white-space: nowrap;
    transition: color 0.2s ease;
  }

  .sub-dot-wrap:hover .sub-dot-label { color: var(--text); }

  /* ── Content Scroll Area ─────────────────────────── */
  .content-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 28px 28px;
  }

  .content-scroll::-webkit-scrollbar { width: 5px; }
  .content-scroll::-webkit-scrollbar-track { background: transparent; }
  .content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .content {
    max-width: 720px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Tag Badge ───────────────────────────────────── */
  .tag-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .content h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .step-status-line {
    font-size: 11px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-status-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 10px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Summary Card ────────────────────────────────── */
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: border-color 0.2s ease;
  }

  .summary-card:hover { border-color: var(--border-lit); }

  .summary-card .sc-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
  }

  .summary-card .sc-icon svg {
    width: 16px;
    height: 16px;
  }

  .summary-card .sc-text {
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-dim);
  }

  /* ── Stat Cards (2x2) ───────────────────────────── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.2s ease, transform 0.15s ease;
  }

  .stat-card:hover {
    border-color: var(--border-lit);
    transform: translateY(-1px);
  }

  .stat-card-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-card-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stat-card-icon svg {
    width: 14px;
    height: 14px;
  }

  .stat-card-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-card-value {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.3px;
  }

  .stat-card-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
  }

  .stat-card-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
    position: relative;
  }

  .stat-card-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -1px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: inherit;
  }

  /* ── Item Cards (2-column grid) ──────────────────── */
  .item-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--text-muted);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .item-card:hover {
    border-color: var(--border-lit);
    transform: translateY(-1px);
  }

  .item-card.active-item {
    animation: itemGlow 2.5s ease-in-out infinite;
  }

  @keyframes itemGlow {
    0%, 100% { box-shadow: -2px 0 10px -4px var(--blue); }
    50% { box-shadow: -2px 0 18px -2px var(--blue); }
  }

  .item-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .item-card-status {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
  }

  .item-card-name {
    font-size: 12.5px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-card-body {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .item-card-metric {
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .item-card-time {
    font-size: 10px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .item-card-mini-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .item-card-mini-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.4s ease;
    position: relative;
  }

  /* ── Expandable detail ───────────────────────────── */
  .item-card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .item-card-detail-inner {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.6;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* ── Content Footer ──────────────────────────────── */
  .content-footer {
    display: flex;
    gap: 20px;
    margin-top: 4px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--text-muted);
  }

  .content-footer span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .content-footer .ft-val {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  @keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .timer-live {
    animation: timerPulse 1.5s ease-in-out infinite;
    color: var(--blue);
  }

  /* ── Keyboard Hints ──────────────────────────────── */
  .kbd-hint {
    position: fixed;
    bottom: 12px;
    right: 18px;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .kbd {
    padding: 1px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    font-family: monospace;
    font-size: 10px;
  }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<div class="sidebar">
  <div class="ring-wrap">
    <canvas id="ringCanvas" width="240" height="240"></canvas>
    <div class="ring-pct" id="ringPct">65%</div>
  </div>
  <div class="ring-sub">pipeline progress</div>
  <div class="legend" id="legend"></div>
  <div class="sidebar-stats" id="sidebarStats"></div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="row1-wrap">
    <canvas id="particleCanvas"></canvas>
    <div class="row1" id="row1"></div>
  </div>
  <canvas id="beamCanvas"></canvas>
  <div class="row2-wrap">
    <div class="row2" id="row2"></div>
  </div>
  <div class="content-scroll">
    <div class="content" id="content"></div>
  </div>
</div>

<div class="kbd-hint">
  <span><span class="kbd">&uarr;&darr;</span> modules</span>
  <span><span class="kbd">&larr;&rarr;</span> steps</span>
</div>

<script>
// ─────────────────────────────────────
// Data Model
// ─────────────────────────────────────
const COLORS = {
  seed: '#34d399',
  hypothesis: '#a78bfa',
  invention: '#60a5fa',
  paper: '#fbbf24'
};

const MODULES = [
  {
    id: 'seed',
    label: 'Seed',
    color: COLORS.seed,
    metric: '12 gaps',
    progress: 1.0,
    steps: [
      {
        name: 'Fetch Papers',
        status: 'done',
        metric: '847 papers',
        time: '4m 12s',
        cost: '$0.00',
        messages: 34,
        tokens: '142k',
        detail: 'Fetched 847 papers from Semantic Scholar API across 3 research domains: geometric deep learning, attention mechanisms, and cross-modal transfer. Applied filters for citation count (>10), recency (<3 years), and venue quality (top-tier). Reduced to 312 highly relevant candidates after deduplication and relevance scoring.',
        metrics: { papers: '847', filtered: '312', domains: '3' }
      },
      {
        name: 'Extract Claims',
        status: 'done',
        metric: '2,841 claims',
        time: '6m 38s',
        cost: '$1.24',
        messages: 67,
        tokens: '284k',
        detail: 'Extracted key claims using structured output parsing with claim type classification (empirical, theoretical, methodological). Average 9.1 claims per paper with confidence scoring.',
        metrics: { claims: '2,841', avgPer: '9.1', confidence: '0.87' }
      },
      {
        name: 'Build KG',
        status: 'done',
        metric: '1,204 nodes',
        time: '3m 05s',
        cost: '$0.87',
        messages: 28,
        tokens: '98k',
        detail: 'Constructed knowledge graph with 1,204 concept nodes and 3,847 directed edges. Identified 48 disconnected clusters and 12 bridge concepts connecting major research threads.',
        metrics: { nodes: '1,204', edges: '3,847', clusters: '48' }
      },
      {
        name: 'Find Gaps',
        status: 'done',
        metric: '12 gaps',
        time: '2m 51s',
        cost: '$0.92',
        messages: 22,
        tokens: '76k',
        detail: 'Gap analysis found 12 research gaps ranked by composite novelty score. Top gap: "cross-modal transfer without aligned pretraining" (score 0.94). Each gap includes evidence chain and difficulty rating.',
        metrics: { gaps: '12', topScore: '0.94', feasible: '8' }
      }
    ],
    summary: '847 papers analyzed across 3 domains. 2,841 claims extracted and cross-referenced. Knowledge graph built with 1,204 nodes and 3,847 edges. 12 research gaps identified and ranked by novelty, with top-scoring gap at 0.94.',
    totalTime: '16m 46s',
    totalCost: '$3.03',
    totalMessages: 151,
    totalTokens: '600k'
  },
  {
    id: 'hypothesis',
    label: 'Hypothesis',
    color: COLORS.hypothesis,
    metric: 'Score 8.4',
    progress: 1.0,
    steps: [
      {
        name: 'Gen Initial',
        status: 'done',
        metric: '24 hypos',
        time: '3m 22s',
        cost: '$1.58',
        messages: 42,
        tokens: '196k',
        detail: 'Generated 24 initial hypotheses from top 6 research gaps (4 per gap). Each includes mechanism, testable prediction, falsifiability criteria, and estimated resources.',
        metrics: { generated: '24', perGap: '4', gaps: '6' }
      },
      {
        name: 'Review Round 1',
        status: 'done',
        metric: 'Score 6.2',
        time: '5m 14s',
        cost: '$2.31',
        messages: 88,
        tokens: '312k',
        detail: 'First review scored on novelty, feasibility, and impact. Mean composite 6.2/10. Eight hypotheses eliminated below 5.0 threshold.',
        metrics: { mean: '6.2', eliminated: '8', remaining: '16' }
      },
      {
        name: 'Refine',
        status: 'done',
        metric: '16 revised',
        time: '4m 08s',
        cost: '$1.89',
        messages: 54,
        tokens: '230k',
        detail: 'Refined 16 hypotheses based on structured reviewer feedback. Strengthened experimental designs, clarified theoretical grounding, added related work connections.',
        metrics: { revised: '16', avgEdits: '3.2', improved: '14' }
      },
      {
        name: 'Review Round 2',
        status: 'done',
        metric: 'Score 7.8',
        time: '4m 52s',
        cost: '$2.14',
        messages: 76,
        tokens: '288k',
        detail: 'Second review with stricter criteria. Mean improved to 7.8/10. Top 6 advanced with detailed justifications. Scoring: novelty 40%, feasibility 35%, impact 25%.',
        metrics: { mean: '7.8', advanced: '6', minScore: '7.0' }
      },
      {
        name: 'Final Select',
        status: 'done',
        metric: 'Top 3',
        time: '2m 30s',
        cost: '$1.05',
        messages: 18,
        tokens: '68k',
        detail: 'Selected top 3 by composite score with diversity penalty. Winner: "Geometric Attention Bridges" (8.4). Verified via pairwise comparison tournament.',
        metrics: { selected: '3', topScore: '8.4', method: 'Tournament' }
      },
      {
        name: 'Polish',
        status: 'done',
        metric: 'Score 8.4',
        time: '1m 48s',
        cost: '$0.76',

// ─────────────────────────────────────
// Color Utilities
// ─────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [
    parseInt(h.substring(0, 2), 16),
    parseInt(h.substring(2, 4), 16),
    parseInt(h.substring(4, 6), 16)
  ];
}

function lerpColor(a, b, t) {
  const ra = hexToRgb(a), rb = hexToRgb(b);
  const r = Math.round(ra[0] + (rb[0] - ra[0]) * t);
  const g = Math.round(ra[1] + (rb[1] - ra[1]) * t);
  const bl = Math.round(ra[2] + (rb[2] - ra[2]) * t);
  return `rgb(${r},${g},${bl})`;
}

// ─────────────────────────────────────
// Progress Ring (Canvas)
// ─────────────────────────────────────
function drawRing() {
  const c = document.getElementById('ringCanvas');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = 240 * dpr;
  c.height = 240 * dpr;
  ctx.scale(dpr, dpr);

  const cx = 120, cy = 120, r = 50, lw = 7;

  // Background track
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#252d3a';
  ctx.lineWidth = lw;
  ctx.stroke();

  const total = MODULES.reduce((s, m) => s + m.steps.length, 0);
  const gap = 0.04;
  let angle = -Math.PI / 2;

  MODULES.forEach((mod, mi) => {
    const sweep = (mod.steps.length / total) * (Math.PI * 2 - gap * MODULES.length);
    const startA = angle + gap / 2;
    const endA = startA + sweep * mod.progress;
    const fullEnd = startA + sweep;

    // Dim background arc
    ctx.beginPath();
    ctx.arc(cx, cy, r, startA, fullEnd);
    ctx.strokeStyle = mod.color + '22';
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Filled arc with gradient
    if (mod.progress > 0) {
      const grad = ctx.createLinearGradient(
        cx + r * Math.cos(startA), cy + r * Math.sin(startA),
        cx + r * Math.cos(endA), cy + r * Math.sin(endA)
      );
      grad.addColorStop(0, mod.color + 'aa');
      grad.addColorStop(1, mod.color);
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, endA);
      ctx.strokeStyle = grad;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Glow endpoint for in-progress
      if (mod.progress < 1 && mod.progress > 0) {
        const ex = cx + r * Math.cos(endA);
        const ey = cy + r * Math.sin(endA);
        const glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 12);
        glow.addColorStop(0, mod.color + 'dd');
        glow.addColorStop(0.5, mod.color + '44');
        glow.addColorStop(1, mod.color + '00');
        ctx.beginPath();
        ctx.arc(ex, ey, 12, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex, ey, 3, 0, Math.PI * 2);
        ctx.fillStyle = mod.color;
        ctx.fill();
      }
    }

    // Highlight halo on selected module
    if (mi === selMod) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, startA + sweep);
      ctx.strokeStyle = mod.color + '30';
      ctx.lineWidth = lw + 6;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    angle += sweep + gap;
  });
}

// ─────────────────────────────────────
// Particle System (Canvas)
// ─────────────────────────────────────
function initParticles() {
  particles = [];
  const cards = document.querySelectorAll('.mod-card');
  if (cards.length < 2) return;

  const wrap = document.querySelector('.row1-wrap').getBoundingClientRect();

  for (let i = 0; i < cards.length - 1; i++) {
    const ra = cards[i].getBoundingClientRect();
    const rb = cards[i + 1].getBoundingClientRect();
    const ax = ra.right - wrap.left;
    const ay = ra.top + ra.height / 2 - wrap.top;
    const bx = rb.left - wrap.left;
    const by = rb.top + rb.height / 2 - wrap.top;
    const modA = MODULES[i], modB = MODULES[i + 1];
    const bothDone = modA.progress >= 1 && modB.progress >= 1;
    const anyActive = modA.steps.some(s => s.status === 'active') ||
                      modB.steps.some(s => s.status === 'active');
    const count = bothDone ? 2 : anyActive ? 4 : 0;
    const speed = bothDone ? 0.0018 : 0.0045;
    const isPending = !bothDone && !anyActive;

    for (let p = 0; p < count; p++) {
      particles.push({
        ax, ay, bx, by,
        t: p / count,
        speed: speed + (Math.random() * 0.001 - 0.0005),
        colorA: modA.color,
        colorB: modB.color,
        idx: i,
        size: 2 + Math.random() * 1
      });
    }

    if (isPending) {
      particles.push({
        ax, ay, bx, by,
        dashed: true,
        colorA: modA.color,
        colorB: modB.color,
        idx: i
      });
    }
  }
}

function animateParticles() {
  const canvas = document.getElementById('particleCanvas');
  const wrap = document.querySelector('.row1-wrap');
  if (!wrap) return;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.offsetWidth * dpr;
  canvas.height = wrap.offsetHeight * dpr;
  canvas.style.width = wrap.offsetWidth + 'px';
  canvas.style.height = wrap.offsetHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, wrap.offsetWidth, wrap.offsetHeight);

  // Bezier paths
  const drawn = new Set();
  particles.forEach(p => {
    if (drawn.has(p.idx)) return;
    drawn.add(p.idx);
    const mx = (p.ax + p.bx) / 2;
    const my = Math.min(p.ay, p.by) - 10;
    ctx.beginPath();
    ctx.moveTo(p.ax, p.ay);
    ctx.quadraticCurveTo(mx, my, p.bx, p.by);
    if (p.dashed) {
      ctx.setLineDash([4, 7]);
      ctx.strokeStyle = '#252d3a';
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle = '#252d3a80';
    }
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Animate particles with glow
  particles.forEach(p => {
    if (p.dashed) return;
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;

    const t = p.t;
    const mx = (p.ax + p.bx) / 2;
    const my = Math.min(p.ay, p.by) - 10;
    const x = (1 - t) * (1 - t) * p.ax + 2 * (1 - t) * t * mx + t * t * p.bx;
    const y = (1 - t) * (1 - t) * p.ay + 2 * (1 - t) * t * my + t * t * p.by;
    const c = lerpColor(p.colorA, p.colorB, t);

    // Outer glow
    const glow = ctx.createRadialGradient(x, y, 0, x, y, 12);
    glow.addColorStop(0, c.replace('rgb', 'rgba').replace(')', ',0.4)'));
    glow.addColorStop(1, c.replace('rgb', 'rgba').replace(')', ',0)'));
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = c;
    ctx.fill();
  });

  animFrameId = requestAnimationFrame(animateParticles);
}

// ─────────────────────────────────────
// Beam Canvas (vertical connector)
// ─────────────────────────────────────
function drawBeam() {
  const canvas = document.getElementById('beamCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.offsetWidth - 56;
  canvas.width = w * dpr;
  canvas.height = 24 * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = '24px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, 24);

  const cards = document.querySelectorAll('.mod-card');
  const dots = document.querySelectorAll('.sub-dot-wrap');
  if (!cards[selMod] || !dots[selStep]) return;

  const wrapRect = canvas.getBoundingClientRect();
  const cardRect = cards[selMod].getBoundingClientRect();
  const dotRect = dots[selStep].getBoundingClientRect();

  const x1 = cardRect.left + cardRect.width / 2 - wrapRect.left;
  const x2 = dotRect.left + dotRect.width / 2 - wrapRect.left;
  const mod = MODULES[selMod];

  const grad = ctx.createLinearGradient(x1, 0, x2, 24);
  grad.addColorStop(0, mod.color + 'cc');
  grad.addColorStop(0.5, mod.color + '55');
  grad.addColorStop(1, mod.color + 'cc');

  ctx.beginPath();
  ctx.moveTo(x1, 0);
  ctx.quadraticCurveTo((x1 + x2) / 2, 12, x2, 24);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Outer glow
  ctx.save();
  ctx.shadowColor = mod.color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(x1, 0);
  ctx.quadraticCurveTo((x1 + x2) / 2, 12, x2, 24);
  ctx.strokeStyle = mod.color + '28';
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.restore();
}

        <span class="stat-card-label">Duration</span>
      </div>
      <div class="stat-card-value" style="color:${step.status === 'active' ? mod.color : 'var(--text)'}">${duration}</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill" style="width:${durationPct}%;background:${mod.color}"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-card-icon" style="background:${mod.color}15;color:${mod.color}">
          ${ICONS.dollar}
        </div>
        <span class="stat-card-label">Cost</span>
      </div>
      <div class="stat-card-value" style="color:${step.status === 'active' ? mod.color : 'var(--text)'}">${cost}</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill" style="width:${costPct}%;background:${mod.color}"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-card-icon" style="background:${mod.color}15;color:${mod.color}">
          ${ICONS.message}
        </div>
        <span class="stat-card-label">Messages</span>
      </div>
      <div class="stat-card-value">${messages}</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill" style="width:${msgPct}%;background:${mod.color}"></div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-card-top">
        <div class="stat-card-icon" style="background:${mod.color}15;color:${mod.color}">
          ${ICONS.token}
        </div>
        <span class="stat-card-label">Tokens</span>
      </div>
      <div class="stat-card-value">${tokens}</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill" style="width:${tokPct}%;background:${mod.color}"></div>
      </div>
    </div>
  </div>`;

  // ── Item Cards (artifacts or step metrics) ──
  if (step.items) {
    html += `<div class="item-grid">`;
    step.items.forEach((item) => {
      const isDone = item.status === 'done';
      const isActive = item.status === 'active';
      const statusBg = isDone ? 'rgba(52,211,153,0.15)' :
                        isActive ? 'rgba(96,165,250,0.15)' : 'rgba(77,87,106,0.2)';
      const statusColor = isDone ? '#34d399' : isActive ? '#60a5fa' : '#4d576a';
      const statusIcon = isDone ? '&#10003;' : isActive ? '&#9654;' : '&#9679;';
      const borderColor = isDone ? '#34d399' : isActive ? '#60a5fa' : 'var(--text-muted)';
      const metricColor = isDone ? mod.color : isActive ? '#60a5fa' : 'var(--text-muted)';

      html += `<div class="item-card${isActive ? ' active-item' : ''}"
                    style="border-left-color:${borderColor}"
                    onclick="toggleItemDetail(this)">
        <div class="item-card-header">
          <div class="item-card-status" style="background:${statusBg};color:${statusColor}">
            ${statusIcon}
          </div>
          <div class="item-card-name">${item.name}</div>
        </div>
        <div class="item-card-body">
          <div class="item-card-metric" style="color:${metricColor}">${item.metric}</div>
          <div class="item-card-time">${item.time} &middot; ${item.cost}</div>
        </div>`;

      // Mini progress bar for active items
      if (isActive && item.progressPct != null) {
        html += `<div class="item-card-mini-bar">
          <div class="item-card-mini-bar-fill"
            style="width:${item.progressPct * 100}%;background:var(--blue)">
          </div>
        </div>`;
      }

      html += `<div class="item-card-detail">
          <div class="item-card-detail-inner">${item.detail}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  } else if (step.metrics) {
    // Render step metrics as item-style cards
    const entries = Object.entries(step.metrics);
    html += `<div class="item-grid">`;
    entries.forEach(([key, val]) => {
      html += `<div class="item-card" style="border-left-color:${mod.color}">
        <div class="item-card-header">
          <div class="item-card-status" style="background:${mod.color}18;color:${mod.color}">
            &#9670;
          </div>
          <div class="item-card-name" style="text-transform:capitalize">${key}</div>
        </div>
        <div class="item-card-body">
          <div class="item-card-metric" style="color:${mod.color}">${val}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  } else {
    // Single detail card for steps without items/metrics
    html += `<div class="summary-card" style="border-left:3px solid ${mod.color}">
      <div class="sc-text" style="font-size:12px">${step.detail}</div>
    </div>`;
  }

  // Footer
  const isLive = mod.steps.some(s => s.status === 'active');
  const timeClass = isLive ? 'ft-val timer-live' : 'ft-val';
  html += `<div class="content-footer">
    <span>
      ${ICONS.clock.replace('viewBox', 'width="12" height="12" viewBox')}
      <span class="${timeClass}">${mod.totalTime}</span>
    </span>
    <span>
      ${ICONS.dollar.replace('viewBox', 'width="12" height="12" viewBox')}
      <span class="ft-val">${mod.totalCost}</span>
    </span>
    <span>
      ${ICONS.check.replace('viewBox', 'width="12" height="12" viewBox')}
      <span class="ft-val">${Math.round(mod.progress * 100)}% complete</span>
    </span>
  </div>`;

  el.innerHTML = html;
}

function toggleItemDetail(card) {
  const body = card.querySelector('.item-card-detail');
  if (!body) return;
  const inner = body.querySelector('.item-card-detail-inner');
  if (!inner) return;

  if (body.style.maxHeight && body.style.maxHeight !== '0px') {
    body.style.maxHeight = '0px';
  } else {
    body.style.maxHeight = inner.scrollHeight + 16 + 'px';
  }
}

// ─────────────────────────────────────
// Master Render
// ─────────────────────────────────────
function render() {
  const mod = MODULES[selMod];
  if (selStep >= mod.steps.length) selStep = mod.steps.length - 1;
  if (selStep < 0) selStep = 0;

  drawRing();
  buildLegend();
  buildSidebarStats();
  buildRow1();
  buildRow2();
  buildContent();

  requestAnimationFrame(() => {
    initParticles();
    drawBeam();
  });
}

// ─────────────────────────────────────
// Keyboard Navigation
// ─────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    selMod = (selMod - 1 + MODULES.length) % MODULES.length;
    selStep = 0;
    render();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selMod = (selMod + 1) % MODULES.length;
    selStep = 0;
    render();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selStep = Math.max(0, selStep - 1);
    render();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    selStep = Math.min(MODULES[selMod].steps.length - 1, selStep + 1);
    render();
  }
});

// ─────────────────────────────────────
// Resize
// ─────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(), 50);
});

// ─────────────────────────────────────
// Init
// ─────────────────────────────────────
render();
animateParticles();
</script>
</body>
</html>
