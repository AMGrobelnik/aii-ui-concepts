<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar — Warm Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.08);
  --blue: #3b82f6;
  --blue-light: rgba(59,130,246,.08);
  --blue-mid: rgba(59,130,246,.15);
  --purple: #7c5cfc;
  --purple-light: rgba(124,92,252,.08);
  --green: #10b981;
  --orange: #f59e0b;
  --cyan: #06b6d4;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #f5f0eb;
  color: #1a1a2e;
  -webkit-font-smoothing: antialiased;
  padding: 32px;
}
h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.subtitle { font-size: 12px; color: #8a8a9e; margin-bottom: 32px; }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, 272px);
  gap: 28px;
  margin-bottom: 48px;
}
.variant-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
  color: #9e9eb5; margin-bottom: 10px;
}
.variant-note {
  font-size: 10px; color: #9e9eb5; font-style: italic; margin-top: 8px;
}

/* ===== SIDEBAR BASE ===== */
.sb {
  width: 264px;
  height: 560px;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ===== BRAND ===== */
.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 16px 14px;
}
.sb-brand-logo {
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  object-fit: contain;
}
.sb-brand-text { font-weight: 800; font-size: 14.5px; letter-spacing: -.3px; }

/* ===== NAV ===== */
.sb-nav { padding: 6px 10px; }
.sb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .15s var(--ease);
  font-size: 13px; font-weight: 500; position: relative;
}
.sb-nav-icon { width: 20px; height: 20px; display: grid; place-items: center; flex-shrink: 0; }
.sb-nav-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.sb-nav-count {
  margin-left: auto; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 4px; font-variant-numeric: tabular-nums;
}

/* ===== DIVIDER ===== */
.sb-divider { height: 1px; margin: 6px 16px; }

/* ===== SECTION LABEL ===== */
.sb-section-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; padding: 10px 16px 4px;
}

/* ===== ITEMS ===== */
.sb-items {
  padding: 4px 10px; flex: 1; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.08) transparent;
}
.sb-items::-webkit-scrollbar { width: 4px; }
.sb-items::-webkit-scrollbar-track { background: transparent; }
.sb-items::-webkit-scrollbar-thumb { background: rgba(0,0,0,.08); border-radius: 2px; }
.sb-items[style*="flex:0"] { overflow: visible; }

.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px;
  cursor: pointer; transition: background .15s;
  font-size: 12.5px; font-weight: 500;
}
.sb-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sb-item-star { font-size: 11px; flex-shrink: 0; width: 16px; text-align: center; }
.sb-item-text {
  flex: 1; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}

/* ======================================= */
/* SHARED DATA                             */
/* ======================================= */

/* W1: Warm solid, blue accent */
.w1 {
  background: #fffcf8;
  border: 1px solid rgba(0,0,0,.06);
  box-shadow: var(--shadow-md);
}
.w1 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.05); }
.w1 .sb-nav-item { color: #6e6e87; }
.w1 .sb-nav-item:hover { background: rgba(0,0,0,.03); color: #3d3d56; }
.w1 .sb-nav-item.active {
  background: var(--blue-light); color: var(--blue); font-weight: 600;
}
.w1 .sb-nav-item.active::before {
  content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px; background: var(--blue);
}
.w1 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.w1 .sb-nav-count { background: var(--blue-light); color: var(--blue); }
.w1 .sb-divider { background: rgba(0,0,0,.05); }
.w1 .sb-section-label { color: #b0a898; }
.w1 .sb-item { color: #4a4a5e; }
.w1 .sb-item:hover { background: rgba(0,0,0,.03); }
.w1 .sb-item.active { background: rgba(59,130,246,.06); color: #1a1a2e; }
.w1 .sb-item-star { color: var(--orange); }

/* W2: Warm cream, glass-ish frosted */
.w2 {
  background: rgba(255,252,248,.75);
  backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid rgba(0,0,0,.04);
  box-shadow: 0 1px 24px rgba(0,0,0,.06), inset 0 0 0 1px rgba(255,255,255,.5);
}
.w2 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.w2 .sb-nav-item { color: #6e6e87; }
.w2 .sb-nav-item:hover { background: rgba(0,0,0,.03); color: #3d3d56; }
.w2 .sb-nav-item.active {
  background: var(--blue-light); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 3px rgba(59,130,246,.08);
}
.w2 .sb-nav-item.active::before {
  content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px; background: var(--blue);
}
.w2 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.w2 .sb-nav-count { background: rgba(59,130,246,.06); color: var(--blue); }
.w2 .sb-divider { background: rgba(0,0,0,.04); }
.w2 .sb-section-label { color: #b0a898; }
.w2 .sb-item { color: #4a4a5e; }
.w2 .sb-item:hover { background: rgba(0,0,0,.02); }
.w2 .sb-item.active { background: rgba(59,130,246,.05); color: #1a1a2e; }
.w2 .sb-item-star { color: var(--orange); }

/* W3: Warm, elevated card with top gradient line */
.w3 {
  background: #fffcf8;
  border: none;
  box-shadow: var(--shadow-lg);
}
.w3::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
  background: linear-gradient(90deg, var(--blue), var(--purple));
  z-index: 10;
}
.w3 .sb-brand { padding-top: 20px; border-bottom: 1px solid rgba(0,0,0,.05); }
.w3 .sb-nav-item { color: #6e6e87; }
.w3 .sb-nav-item:hover { background: rgba(0,0,0,.03); color: #3d3d56; }
.w3 .sb-nav-item.active {
  background: var(--blue-light); color: var(--blue); font-weight: 600;
}
.w3 .sb-nav-item.active::before {
  content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px; background: var(--blue);
}
.w3 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.w3 .sb-nav-count { background: var(--blue-light); color: var(--blue); }
.w3 .sb-divider { background: rgba(0,0,0,.05); }
.w3 .sb-section-label { color: #b0a898; }
.w3 .sb-item { color: #4a4a5e; }
.w3 .sb-item:hover { background: rgba(0,0,0,.03); }
.w3 .sb-item.active { background: rgba(59,130,246,.06); color: #1a1a2e; }
.w3 .sb-item-star { color: var(--orange); }

/* W4: Warm, no border, just shadow, pill active */
.w4 {
  background: #fffdf9;
  border: none;
  box-shadow: 0 2px 16px rgba(120,100,60,.08);
  border-radius: 16px;
}
.w4 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.w4 .sb-nav { padding: 8px 10px; }
.w4 .sb-nav-item { color: #6e6e87; border-radius: 20px; }
.w4 .sb-nav-item:hover { background: rgba(0,0,0,.03); color: #3d3d56; }
.w4 .sb-nav-item.active {
  background: var(--blue); color: #fff; font-weight: 600;
}
.w4 .sb-nav-item.active .sb-nav-icon { color: #fff; }
.w4 .sb-nav-count { background: rgba(0,0,0,.04); color: #6e6e87; }
.w4 .sb-nav-item.active .sb-nav-count { background: rgba(255,255,255,.2); color: rgba(255,255,255,.9); }
.w4 .sb-divider { background: rgba(0,0,0,.04); }
.w4 .sb-section-label { color: #b0a898; }
.w4 .sb-item { color: #4a4a5e; }
.w4 .sb-item:hover { background: rgba(0,0,0,.03); }
.w4 .sb-item.active { background: rgba(59,130,246,.06); color: #1a1a2e; }
.w4 .sb-item-star { color: var(--orange); }

/* W5: Warm glass, heavy blur, subtle inner border */
.w5 {
  background: rgba(255,252,245,.55);
  backdrop-filter: blur(24px) saturate(1.6);
  border: 1px solid rgba(255,255,255,.6);
  box-shadow: 0 4px 30px rgba(120,100,60,.07), inset 0 1px 0 rgba(255,255,255,.8);
}
.w5 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.04); }
.w5 .sb-nav-item { color: #6e6e87; }
.w5 .sb-nav-item:hover { background: rgba(255,255,255,.4); color: #3d3d56; }
.w5 .sb-nav-item.active {
  background: rgba(255,255,255,.5); color: var(--blue); font-weight: 600;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.w5 .sb-nav-item.active::before {
  content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 14px; border-radius: 2px; background: var(--blue);
}
.w5 .sb-nav-item.active .sb-nav-icon { color: var(--blue); }
.w5 .sb-nav-count { background: rgba(59,130,246,.08); color: var(--blue); }
.w5 .sb-divider { background: rgba(0,0,0,.04); }
.w5 .sb-section-label { color: #b0a898; }
.w5 .sb-item { color: #4a4a5e; }
.w5 .sb-item:hover { background: rgba(255,255,255,.35); }
.w5 .sb-item.active { background: rgba(255,255,255,.45); color: #1a1a2e; }
.w5 .sb-item-star { color: var(--orange); }

/* W6: Warm with colored icon backgrounds per nav */
.w6 {
  background: #fffcf8;
  border: 1px solid rgba(0,0,0,.06);
  box-shadow: var(--shadow-md);
}
.w6 .sb-brand { border-bottom: 1px solid rgba(0,0,0,.05); }
.w6 .sb-nav-item { color: #6e6e87; }
.w6 .sb-nav-item:hover { background: rgba(0,0,0,.03); color: #3d3d56; }
.w6 .sb-nav-icon { width: 26px; height: 26px; border-radius: 7px; }
.w6 .sb-nav-icon svg { width: 14px; height: 14px; }
.w6 .sb-nav-item[data-nav="invent"] .sb-nav-icon { background: rgba(59,130,246,.08); color: var(--blue); }
.w6 .sb-nav-item[data-nav="inventions"] .sb-nav-icon { background: rgba(124,92,252,.08); color: var(--purple); }
.w6 .sb-nav-item[data-nav="discover"] .sb-nav-icon { background: rgba(16,185,129,.08); color: var(--green); }
.w6 .sb-nav-item.active { font-weight: 600; color: #1a1a2e; }
.w6 .sb-nav-item.active[data-nav="invent"] .sb-nav-icon { background: var(--blue-mid); }
.w6 .sb-nav-item.active[data-nav="inventions"] .sb-nav-icon { background: rgba(124,92,252,.15); }
.w6 .sb-nav-item.active[data-nav="discover"] .sb-nav-icon { background: rgba(16,185,129,.15); }
.w6 .sb-nav-count { background: rgba(0,0,0,.04); color: #6e6e87; }
.w6 .sb-divider { background: rgba(0,0,0,.05); }
.w6 .sb-section-label { color: #b0a898; }
.w6 .sb-item { color: #4a4a5e; }
.w6 .sb-item:hover { background: rgba(0,0,0,.03); }
.w6 .sb-item.active { background: rgba(59,130,246,.06); color: #1a1a2e; }
.w6 .sb-item-star { color: var(--orange); }
</style>
</head>
<body>

<h1>Warm Sidebar Variants</h1>
<p class="subtitle">Warm cream base, blue accent, wider text, no time stamps, no bottom bar</p>

<div class="grid" id="grid"></div>

<script>
const ICONS = {
  invent: `<svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a6 6 0 0 1 4 10.47V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-3.53A6 6 0 0 1 12 3z"/></svg>`,
  inventions: `<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/></svg>`,
  discover: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg>`,
};

const STARRED = [
  { text: 'DDM Rankings Study', color: 'var(--purple)' },
  { text: 'Circuit Motif Spectroscopy', color: 'var(--blue)' },
];

const RECENTS = [
  { text: 'Syntactic Load Smoothing', color: 'var(--blue)', active: true },
  { text: 'Schema Treewidth Complexity', color: 'var(--orange)' },
  { text: 'Oblique Tree Sums Analysis', color: 'var(--purple)' },
  { text: 'Balance-Guided Trees Study', color: 'var(--blue)' },
  { text: 'Simplicial Constrained Sums', color: 'var(--cyan)' },
];

function navHTML() {
  return `
    <div class="sb-nav">
      <div class="sb-nav-item active" data-nav="invent">
        <div class="sb-nav-icon">${ICONS.invent}</div>
        <span>Invent</span>
      </div>
      <div class="sb-nav-item" data-nav="inventions">
        <div class="sb-nav-icon">${ICONS.inventions}</div>
        <span>Inventions</span>
        <span class="sb-nav-count">7</span>
      </div>
      <div class="sb-nav-item" data-nav="discover">
        <div class="sb-nav-icon">${ICONS.discover}</div>
        <span>Discover</span>
      </div>
    </div>`;
}

function starredHTML() {
  return STARRED.map(s => `
    <div class="sb-item">
      <span class="sb-item-star">&#9733;</span>
      <span class="sb-item-text">${s.text}</span>
    </div>`).join('');
}

function recentsHTML() {
  return RECENTS.map(r => `
    <div class="sb-item${r.active ? ' active' : ''}">
      <span class="sb-item-dot" style="background:${r.color}"></span>
      <span class="sb-item-text">${r.text}</span>
    </div>`).join('');
}

function sb(cls, label, note) {
  return `
  <div>
    <div class="variant-label">${label}</div>
    <div class="sb ${cls}">
      <div class="sb-brand">
        <img src="logo_64.png" class="sb-brand-logo" alt="">
        <span class="sb-brand-text">AI Inventor</span>
      </div>
      ${navHTML()}
      <div class="sb-divider"></div>
      <div class="sb-section-label">Starred</div>
      <div class="sb-items" style="flex:0">${starredHTML()}</div>
      <div class="sb-section-label">Recents</div>
      <div class="sb-items">${recentsHTML()}</div>
    </div>
    <div class="variant-note">${note}</div>
  </div>`;
}

document.getElementById('grid').innerHTML = [
  sb('w1', 'W1 — Solid Warm', 'Clean cream, blue left-bar accent, subtle border'),
  sb('w2', 'W2 — Frosted Glass', 'Semi-transparent, blur + saturation, inner glow'),
  sb('w3', 'W3 — Gradient Top Bar', 'Blue-to-purple top accent, elevated card'),
  sb('w4', 'W4 — Pill Active', 'Rounded pill nav, filled blue active, extra round corners'),
  sb('w5', 'W5 — Heavy Glass', 'Deep frosted blur, white inner border, floating feel'),
  sb('w6', 'W6 — Colored Icons', 'Each nav icon gets its own color background pill'),
].join('');
</script>

</body>
</html>
