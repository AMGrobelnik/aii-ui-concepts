<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AII Pipeline Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    /* Slate palette */
    --bg:#0f1219;
    --surface:#171c26;
    --surface-raised:#1c2230;
    --border:#252d3b;
    --border-light:#2e3a4d;
    --text:#cdd5e0;
    --text-dim:#7c879a;
    --text-muted:#4e5768;
    --text-bright:#eaf0f8;

    /* Accents */
    --blue:#5e81ac;
    --blue-bright:#81a1c1;
    --blue-glow:rgba(94,129,172,.35);
    --green:#a3be8c;
    --green-glow:rgba(163,190,140,.3);
    --amber:#ebcb8b;
    --amber-glow:rgba(235,203,139,.3);
    --red:#bf616a;
    --red-glow:rgba(191,97,106,.3);
    --purple:#b48ead;
    --purple-glow:rgba(180,142,173,.3);
    --cyan:#88c0d0;
    --cyan-glow:rgba(136,192,208,.35);

    --sidebar-w:232px;
  }

  html{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:13px;
    color:var(--text);
    background:var(--bg);
  }
  body{display:flex;min-height:100vh;overflow:hidden}

  /* ══════════════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════════════ */
  .sidebar{
    width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
    position:sticky;top:0;display:flex;flex-direction:column;
    background:var(--surface);border-right:1px solid var(--border);
    overflow-y:auto;overflow-x:hidden;padding:20px 14px;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  }
  .sidebar::-webkit-scrollbar{width:5px}
  .sidebar::-webkit-scrollbar-track{background:transparent}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  /* ── Progress Ring ── */
  .ring-wrap{display:flex;justify-content:center;margin-bottom:22px}
  .ring-container{position:relative;width:104px;height:104px}
  .ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:var(--border);stroke-width:5.5}
  .ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:5.5;stroke-linecap:round;
    stroke-dasharray:264;stroke-dashoffset:92.4;transition:stroke-dashoffset .6s ease}
  .ring-glow{fill:none;stroke:url(#ringGrad);stroke-width:11;stroke-linecap:round;
    stroke-dasharray:264;stroke-dashoffset:92.4;opacity:.22;filter:blur(5px)}
  .ring-endpoint{r:4.5;fill:var(--cyan);filter:drop-shadow(0 0 5px var(--cyan))}
  @keyframes ep-pulse{0%,100%{opacity:.65}50%{opacity:1}}
  .ring-endpoint{animation:ep-pulse 2.2s ease-in-out infinite}
  .ring-label{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none}
  .ring-pct{font-size:23px;font-weight:700;letter-spacing:-.5px;color:var(--text-bright)}
  .ring-sub{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.9px;margin-top:2px}

  /* ── Module Card ── */
  .mod-card{
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:12px 12px 10px;margin-bottom:4px;cursor:pointer;
    border-left:3px solid var(--text-muted);transition:all .2s ease;
    position:relative;
  }
  .mod-card:hover{border-color:var(--border-light);border-left-color:inherit}
  .mod-card.active{
    border-left-color:var(--blue)!important;
    animation:card-glow 2.5s ease-in-out infinite;
  }
  @keyframes card-glow{
    0%,100%{box-shadow:0 0 6px var(--blue-glow),inset 0 0 4px rgba(94,129,172,.06)}
    50%{box-shadow:0 0 18px var(--blue-glow),inset 0 0 8px rgba(94,129,172,.1)}
  }
  .mod-card[data-color="green"]{border-left-color:var(--green)}
  .mod-card[data-color="blue"]{border-left-color:var(--blue)}
  .mod-card[data-color="amber"]{border-left-color:var(--amber)}
  .mod-card[data-color="purple"]{border-left-color:var(--purple)}
  .mod-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .mod-name{font-weight:600;font-size:12px;letter-spacing:.2px}
  .badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .badge-done{background:rgba(163,190,140,.12);color:var(--green)}
  .badge-running{background:rgba(136,192,208,.14);color:var(--cyan)}
  .badge-pending{background:rgba(78,87,104,.14);color:var(--text-muted)}
  .badge-error{background:rgba(191,97,106,.12);color:var(--red)}
  .mod-metric{font-size:10px;color:var(--text-dim);margin-bottom:6px}
  .mod-metric b{color:var(--text);font-weight:600}
  .mod-bar-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .mod-bar{height:100%;border-radius:2px;transition:width .4s ease}

  /* ── Sub-module rows ── */
  .sub-list{padding:6px 0 10px}
  .sub-row{
    display:flex;align-items:center;gap:8px;
    padding:5px 10px 5px 14px;cursor:pointer;border-radius:6px;
    transition:background .15s;position:relative;
  }
  .sub-row:hover{background:rgba(94,129,172,.06)}
  .sub-row.active{background:rgba(94,129,172,.1)}
  .sub-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .2s}
  .sub-dot.done{background:var(--green)}
  .sub-dot.running{background:var(--cyan);animation:dot-pulse 1.8s ease-in-out infinite}
  .sub-dot.pending{background:var(--text-muted);opacity:.4}
  .sub-dot.error{background:var(--red)}
  @keyframes dot-pulse{0%,100%{box-shadow:0 0 0 0 rgba(136,192,208,.5)}50%{box-shadow:0 0 0 5px rgba(136,192,208,0)}}
  .sub-name{font-size:11px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-dim)}
  .sub-row.active .sub-name,.sub-row:hover .sub-name{color:var(--text)}
  .sub-metric{font-size:10px;color:var(--text-muted);flex-shrink:0}

  /* ══════════════════════════════════════════════
     PARTICLE CANVAS
     ══════════════════════════════════════════════ */
  #particleCanvas{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;pointer-events:none;z-index:10}

  /* ══════════════════════════════════════════════
     MAIN CONTENT
     ══════════════════════════════════════════════ */
  .main{flex:1;padding:32px 40px;overflow-y:auto;height:100vh}
  .main::-webkit-scrollbar{width:6px}
  .main::-webkit-scrollbar-track{background:transparent}
  .main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .main-title{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .main-title h1{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--text-bright)}
  .main-subtitle{font-size:12px;color:var(--text-dim);margin-bottom:28px}

  /* ── What happened ── */
  .what-section{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:18px 22px;margin-bottom:20px;
  }
  .what-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:8px;font-weight:600}
  .what-text{font-size:13px;line-height:1.7;color:var(--text-dim)}

  /* ── Stat Cards ── */
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
  .stat-card{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:16px 18px;transition:border-color .2s;
  }
  .stat-card:hover{border-color:var(--border-light)}
  .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:600;margin-bottom:8px}
  .stat-val{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.5px;color:var(--text-bright)}
  .stat-sub{font-size:10px;color:var(--text-dim);margin-bottom:10px}
  .stat-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .stat-bar{height:100%;border-radius:2px;transition:width .4s ease}

  /* ── Item list ── */
  .items-section{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:18px 22px;margin-bottom:20px;
  }
  .items-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:600;margin-bottom:12px}
  .item-row{
    display:flex;align-items:center;gap:10px;padding:8px 0;
    border-bottom:1px solid var(--border);
  }
  .item-row:last-child{border-bottom:none}
  .item-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
    justify-content:center;font-size:12px;background:rgba(94,129,172,.1);color:var(--blue);flex-shrink:0}
  .item-info{flex:1;min-width:0}
  .item-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-desc{font-size:10px;color:var(--text-muted)}
  .item-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}

  /* ══════════════════════════════════════════════
     LIVE ACTIVITY FEED
     ══════════════════════════════════════════════ */
  .feed-section{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:18px 22px;margin-bottom:20px;
    max-height:360px;display:flex;flex-direction:column;
  }
  .feed-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:14px;
  }
  .feed-label{
    font-size:10px;text-transform:uppercase;letter-spacing:.8px;
    color:var(--text-muted);font-weight:600;
  }
  .feed-live-indicator{
    display:flex;align-items:center;gap:6px;
    font-size:10px;font-weight:600;color:var(--cyan);
    text-transform:uppercase;letter-spacing:.5px;
  }
  .feed-live-dot{
    width:7px;height:7px;border-radius:50%;background:var(--cyan);
    animation:feed-live-blink 1.5s ease-in-out infinite;
    box-shadow:0 0 6px var(--cyan-glow);
  }
  @keyframes feed-live-blink{
    0%,100%{opacity:1;box-shadow:0 0 6px var(--cyan-glow)}
    50%{opacity:.35;box-shadow:0 0 2px var(--cyan-glow)}
  }
  .feed-completed-indicator{
    display:flex;align-items:center;gap:6px;
    font-size:10px;font-weight:600;color:var(--green);
    text-transform:uppercase;letter-spacing:.5px;
  }
  .feed-completed-dot{
    width:7px;height:7px;border-radius:50%;background:var(--green);
  }

  .feed-list{
    flex:1;overflow-y:auto;
    scrollbar-width:thin;scrollbar-color:var(--border) transparent;
  }
  .feed-list::-webkit-scrollbar{width:4px}
  .feed-list::-webkit-scrollbar-track{background:transparent}
  .feed-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .feed-entry{
    display:flex;align-items:flex-start;gap:10px;
    padding:9px 0;border-bottom:1px solid rgba(37,45,59,.6);
    animation:feed-fade-in .45s ease-out;
  }
  .feed-entry:last-child{border-bottom:none}
  @keyframes feed-fade-in{
    from{opacity:0;transform:translateY(-6px)}
    to{opacity:1;transform:translateY(0)}
  }

  .feed-time{
    font-size:11px;font-family:'Inter',monospace;color:var(--text-muted);
    flex-shrink:0;letter-spacing:.2px;min-width:52px;padding-top:1px;
  }
  .feed-dot-col{
    display:flex;align-items:flex-start;padding-top:5px;flex-shrink:0;
  }
  .feed-status-dot{
    width:7px;height:7px;border-radius:50%;flex-shrink:0;
  }
  .feed-status-dot.info{background:var(--blue);box-shadow:0 0 4px var(--blue-glow)}
  .feed-status-dot.success{background:var(--green);box-shadow:0 0 4px var(--green-glow)}
  .feed-status-dot.warning{background:var(--amber);box-shadow:0 0 4px var(--amber-glow)}
  .feed-status-dot.error{background:var(--red);box-shadow:0 0 4px var(--red-glow)}
  .feed-status-dot.progress{background:var(--cyan);box-shadow:0 0 4px var(--cyan-glow)}
  .feed-status-dot.metric{background:var(--purple);box-shadow:0 0 4px var(--purple-glow)}
  .feed-desc{font-size:12px;color:var(--text-dim);line-height:1.5;flex:1}
  .feed-desc strong{color:var(--text);font-weight:600}

  /* ── Empty state ── */
  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:60vh;color:var(--text-muted);
  }
  .empty-state svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
  .empty-state p{font-size:13px}

  /* ── Keyboard hint ── */
  .kbd-hint{
    position:fixed;bottom:14px;right:20px;display:flex;gap:10px;
    font-size:10px;color:var(--text-muted);opacity:.45;
  }
  kbd{
    padding:2px 6px;border:1px solid var(--border);border-radius:4px;
    font-family:inherit;font-size:10px;background:var(--surface);
  }

  /* ── Feed entry hover ── */
  .feed-entry:hover{
    background:rgba(94,129,172,.04);
    border-radius:6px;
    margin:0 -6px;
    padding-left:6px;
    padding-right:6px;
  }

  /* ── Feed entry separator subtle variant ── */
  .feed-entry + .feed-entry{
    border-top:none;
  }

  /* ── Feed scroll shadow indicators ── */
  .feed-list{
    position:relative;
    mask-image:linear-gradient(to bottom,black 0%,black 90%,transparent 100%);
    -webkit-mask-image:linear-gradient(to bottom,black 0%,black 90%,transparent 100%);
  }

  /* ── Stat card accent line ── */
  .stat-card{position:relative;overflow:hidden}
  .stat-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--border-light),transparent);
    opacity:0;transition:opacity .25s;
  }
  .stat-card:hover::before{opacity:1}

  /* ── Module card selected state ── */
  .mod-card.selected{
    background:var(--surface-raised);
    border-color:var(--border-light);
  }

  /* ── Activity feed new entry glow ── */
  .feed-entry.new-entry{
    background:rgba(136,192,208,.04);
    border-radius:6px;
    margin:0 -6px;
    padding-left:6px;
    padding-right:6px;
  }
  .feed-entry.new-entry .feed-time{color:var(--cyan)}

  /* New-entry glow fades after animation */
  @keyframes new-entry-fade{
    0%{background:rgba(136,192,208,.08)}
    100%{background:transparent}
  }
  .feed-entry.new-entry{
    animation:feed-fade-in .45s ease-out, new-entry-fade 3s ease-out .5s forwards;
  }

  /* ── Responsive ── */
  @media(max-width:800px){
    .sidebar{width:180px;min-width:180px;padding:14px 10px}
    .main{padding:20px 18px}
    .stat-row{grid-template-columns:1fr}
    .ring-container{width:80px;height:80px}
    .ring-pct{font-size:18px}
    .feed-section{max-height:260px}
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     SIDEBAR
     ═══════════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <!-- Progress Ring -->
  <div class="ring-wrap">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--blue)"/>
            <stop offset="100%" stop-color="var(--cyan)"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="50" cy="50" r="42"/>
        <circle class="ring-glow" cx="50" cy="50" r="42"/>
        <circle class="ring-fg" cx="50" cy="50" r="42"/>
        <circle class="ring-endpoint" cx="50" cy="50"/>
      </svg>
      <div class="ring-label">
        <span class="ring-pct">65%</span>
        <span class="ring-sub">Overall</span>
      </div>
    </div>
  </div>

  <!-- Module Cards + Sub-modules -->
  <div id="modList"></div>
</aside>

<!-- Particle Canvas -->
<canvas id="particleCanvas"></canvas>

<!-- ═══════════════════════════════════════════════
     MAIN CONTENT
     ═══════════════════════════════════════════════ -->
<main class="main" id="mainContent">
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25"/>
    </svg>
    <p>Select a sub-module to view details</p>
  </div>
  <div id="detailView" style="display:none"></div>
</main>

<!-- Keyboard Hints -->
<div class="kbd-hint">
  <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> sub-modules</span>
  <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> modules</span>
</div>

// ==========================================================
// BUILD SIDEBAR
// ==========================================================
function buildSidebar() {
  var wrap = document.getElementById('modList');
  wrap.innerHTML = '';
  MODULES.forEach(function(mod, mi) {
    // Module Card
    var card = document.createElement('div');
    card.className = 'mod-card' + (mi === activeModIdx ? ' active' : '');
    card.dataset.color = mod.color;
    card.dataset.mi = mi;
    card.innerHTML =
      '<div class="mod-head">' +
        '<span class="mod-name">' + mod.name + '</span>' +
        '<span class="badge badge-' + mod.status + '">' + mod.status + '</span>' +
      '</div>' +
      '<div class="mod-metric">' + mod.metric + '</div>' +
      '<div class="mod-bar-wrap">' +
        '<div class="mod-bar" style="width:' + mod.progress + '%;background:' + mod.barColor + '"></div>' +
      '</div>';
    card.addEventListener('click', (function(idx) {
      return function() {
        selectedModIdx = idx;
        selectedSubIdx = 0;
        renderDetail();
        highlightSidebar();
      };
    })(mi));
    wrap.appendChild(card);

    // Sub-module rows
    var subList = document.createElement('div');
    subList.className = 'sub-list';
    mod.subs.forEach(function(sub, si) {
      var row = document.createElement('div');
      row.className = 'sub-row' + (selectedModIdx === mi && selectedSubIdx === si ? ' active' : '');
      row.dataset.mi = mi;
      row.dataset.si = si;
      row.innerHTML =
        '<span class="sub-dot ' + sub.status + '"></span>' +
        '<span class="sub-name">' + sub.name + '</span>' +
        '<span class="sub-metric">' + sub.metric + '</span>';
      row.addEventListener('click', (function(midx, sidx) {
        return function(e) {
          e.stopPropagation();
          selectedModIdx = midx;
          selectedSubIdx = sidx;
          renderDetail();
          highlightSidebar();
        };
      })(mi, si));
      subList.appendChild(row);
    });
    wrap.appendChild(subList);
  });
}

function highlightSidebar() {
  var rows = document.querySelectorAll('.sub-row');
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var mi = +r.dataset.mi, si = +r.dataset.si;
    r.classList.toggle('active', mi === selectedModIdx && si === selectedSubIdx);
  }
}

  var mod = MODULES[selectedModIdx];

  detail.innerHTML =

      '<h1>' + sub.name + '</h1>' +

// ==========================================================
// LIVE FEED SIMULATION
// ==========================================================
function getSimulatedTime() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2, '0');
  var m = String(now.getMinutes()).padStart(2, '0');
  var s = String(now.getSeconds()).padStart(2, '0');
  return h + ':' + m + ':' + s;
}

// Polyfill for padStart
if (!String.prototype.padStart) {
  String.prototype.padStart = function(targetLength, padString) {
    targetLength = targetLength >> 0;
    padString = String(padString || ' ');
    if (this.length >= targetLength) return String(this);
    targetLength = targetLength - this.length;
    if (targetLength > padString.length) {
      padString += padString.repeat(targetLength / padString.length);
    }
    return padString.slice(0, targetLength) + String(this);
  };
}

function startLiveFeed(modIdx, subIdx) {
  // If already running for this target, do nothing
  if (currentLiveFeedTarget &&
      currentLiveFeedTarget.modIdx === modIdx &&
      currentLiveFeedTarget.subIdx === subIdx &&
      liveFeedTimer !== null) {
    return;
  }
  stopLiveFeed();
  currentLiveFeedTarget = { modIdx: modIdx, subIdx: subIdx };
  liveFeedQueueIdx = 0;

  liveFeedTimer = setInterval(function() {
    var sub = MODULES[currentLiveFeedTarget.modIdx].subs[currentLiveFeedTarget.subIdx];
    if (!sub.liveFeedQueue || liveFeedQueueIdx >= sub.liveFeedQueue.length) {
      stopLiveFeed();
      return;
    }

    var feedList = document.getElementById('feedList');
    if (!feedList) { stopLiveFeed(); return; }

    var nextEntry = sub.liveFeedQueue[liveFeedQueueIdx];
    var timeStr = getSimulatedTime();

    // Also push into feedEntries for persistence
    sub.feedEntries.unshift({ time: timeStr, dot: nextEntry.dot, text: nextEntry.text });

    // Create DOM element and prepend with new-entry class for glow
    var div = document.createElement('div');
    div.className = 'feed-entry new-entry';
    div.innerHTML =
      '<span class="feed-time">' + timeStr + '</span>' +
      '<div class="feed-dot-col"><span class="feed-status-dot ' + nextEntry.dot + '"></span></div>' +
      '<span class="feed-desc">' + nextEntry.text + '</span>';

    feedList.insertBefore(div, feedList.firstChild);

    liveFeedQueueIdx++;
  }, 4000);
}

function stopLiveFeed() {
  if (liveFeedTimer !== null) {
    clearInterval(liveFeedTimer);
    liveFeedTimer = null;
  }
  currentLiveFeedTarget = null;
  liveFeedQueueIdx = 0;
}

// ==========================================================
// KEYBOARD NAV
// ==========================================================
document.addEventListener('keydown', function(e) {
  if (selectedModIdx === null) { selectedModIdx = 0; selectedSubIdx = 0; renderDetail(); highlightSidebar(); return; }
  var mod = MODULES[selectedModIdx];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (selectedSubIdx < mod.subs.length - 1) selectedSubIdx++;
    renderDetail(); highlightSidebar(); scrollSubIntoView();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (selectedSubIdx > 0) selectedSubIdx--;
    renderDetail(); highlightSidebar(); scrollSubIntoView();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (selectedModIdx < MODULES.length - 1) { selectedModIdx++; selectedSubIdx = 0; }
    renderDetail(); highlightSidebar(); scrollSubIntoView();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (selectedModIdx > 0) { selectedModIdx--; selectedSubIdx = 0; }
    renderDetail(); highlightSidebar(); scrollSubIntoView();
  }
});

function scrollSubIntoView() {
  var row = document.querySelector('.sub-row[data-mi="' + selectedModIdx + '"][data-si="' + selectedSubIdx + '"]');
  if (row) row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ==========================================================
// RING ENDPOINT POSITION
// ==========================================================
function positionEndpoint() {
  var pct = 0.65;
  var angle = (2 * Math.PI * pct) - (Math.PI / 2);
  var ep = document.querySelector('.ring-endpoint');
  if (ep) {
    ep.setAttribute('cx', 50 + 42 * Math.cos(angle));
    ep.setAttribute('cy', 50 + 42 * Math.sin(angle));
  }
}

// ==========================================================
// PARTICLE FLOW
// ==========================================================
var particles = [];
var PARTICLE_COUNT = 20;
var PARTICLE_SPEED = 1.1;

function initParticles() {
  var canvas = document.getElementById('particleCanvas');
  canvas.width = 232;
  canvas.height = window.innerHeight;

  window.addEventListener('resize', function() { canvas.height = window.innerHeight; });

  function getActiveCardRect() {
    var card = document.querySelector('.mod-card.active');
    return card ? card.getBoundingClientRect() : null;
  }
  function getActiveSubDotRect() {
    var rows = document.querySelectorAll('.sub-row[data-mi="' + activeModIdx + '"]');
    for (var i = 0; i < rows.length; i++) {
      var dot = rows[i].querySelector('.sub-dot.running');
      if (dot) return dot.getBoundingClientRect();
    }
    return null;
  }

  function spawnParticle() {
    var cardR = getActiveCardRect();
    var dotR = getActiveSubDotRect();
    if (!cardR || !dotR) return;
    particles.push({
      x: cardR.left + cardR.width / 2 + (Math.random() - 0.5) * 22,
      y: cardR.bottom - 2,
      targetX: dotR.left + dotR.width / 2,
      targetY: dotR.top + dotR.height / 2,
      progress: 0,
      speed: PARTICLE_SPEED + Math.random() * 0.5,
      size: 1.8 + Math.random() * 1.5,
      opacity: 0.45 + Math.random() * 0.4
    });
  }

  var ctx = canvas.getContext('2d');

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Spawn particles
    if (particles.length < PARTICLE_COUNT && Math.random() < 0.14) spawnParticle();

    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.progress += p.speed / 100;

      if (p.progress >= 1) { particles.splice(i, 1); continue; }

      // Cubic bezier path from card to sub-dot
      var cp1x = p.x;
      var cp1y = p.y + (p.targetY - p.y) * 0.3;
      var cp2x = p.targetX;
      var cp2y = p.y + (p.targetY - p.y) * 0.7;
      var t = p.progress;
      var it = 1 - t;
      var cx = it*it*it*p.x + 3*it*it*t*cp1x + 3*it*t*t*cp2x + t*t*t*p.targetX;
      var cy = it*it*it*p.y + 3*it*it*t*cp1y + 3*it*t*t*cp2y + t*t*t*p.targetY;

      // Fade in/out
      var alpha = p.opacity;
      if (t < 0.15) alpha *= t / 0.15;
      if (t > 0.85) alpha *= (1 - t) / 0.15;

      // Core particle
      ctx.beginPath();
      ctx.arc(cx, cy, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(94, 129, 172, ' + alpha + ')';
      ctx.fill();

      // Glow halo
      ctx.beginPath();
      ctx.arc(cx, cy, p.size * 2.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(136, 192, 208, ' + (alpha * 0.12) + ')';
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }
  animate();
}

// ==========================================================
// INIT
// ==========================================================
positionEndpoint();
buildSidebar();
initParticles();

// Auto-select the running sub-module on load
selectedModIdx = activeModIdx;
selectedSubIdx = activeSubIdx;
renderDetail();
highlightSidebar();

})();
</script>
