<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline -- Top 06 (Inline Accordion)</title>
<style>
/* ── Reset + Variables ───────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --s950: #020617; --s900: #0f172a; --s850: #131c2e;
  --s800: #1e293b; --s750: #253349; --s700: #334155;
  --s600: #475569; --s500: #64748b; --s400: #94a3b8;
  --s300: #cbd5e1; --s200: #e2e8f0; --s100: #f1f5f9;

  --c1: #38bdf8; --c1g: rgba(56,189,248,.18); --c1d: rgba(56,189,248,.55);
  --c2: #a78bfa; --c2g: rgba(167,139,250,.18); --c2d: rgba(167,139,250,.55);
  --c3: #34d399; --c3g: rgba(52,211,153,.18); --c3d: rgba(52,211,153,.55);
  --c4: #fb923c; --c4g: rgba(251,146,60,.18); --c4d: rgba(251,146,60,.55);

  --glass: rgba(15,23,42,.62); --glass-border: rgba(148,163,184,.10);
  --surface: rgba(30,41,59,.72); --surface-hi: rgba(51,65,85,.55);
  --radius: 10px; --radius-sm: 7px;

  --ease: cubic-bezier(.4,0,.2,1);
  --dur-fast: .18s; --dur-med: .32s; --dur-slow: .5s;

  --mono: 'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;
  font-size: 14px;
}

html { height: 100%; }
body {
  min-height: 100%; background: var(--s950); color: var(--s300);
  font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  overflow-x: hidden; line-height: 1.5;
}

/* subtle grid bg */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(148,163,184,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.03) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* radial ambience */
body::after {
  content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px; border-radius: 50%; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse, rgba(56,189,248,.04), transparent 70%);
}

#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s700); border-radius: 3px; }

/* ── Header ──────────────────────────────────────────────── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
  display: flex; align-items: center; gap: 14px; padding: 0 20px;
  background: rgba(15,23,42,.88); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--glass-border);
}
.brand { font-weight: 700; font-size: 14px; color: var(--s100); letter-spacing: -.3px; }
.brand span { color: var(--c1); margin-right: 2px; }
.breadcrumb { font-size: 12px; color: var(--s500); white-space: nowrap; }
.breadcrumb b { color: var(--s300); font-weight: 600; }
.header-spacer { flex: 1; }

/* mini ring */
.header-ring { width: 36px; height: 36px; position: relative; flex-shrink: 0; }
.header-ring svg { width: 100%; height: 100%; }
.header-ring .ring-track { fill: none; stroke: var(--s700); stroke-width: 3; }
.header-ring .ring-fill {
  fill: none; stroke: var(--c1); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset .8s ease, stroke .5s ease;
  filter: drop-shadow(0 0 4px var(--c1d));
}
.header-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 9px; font-weight: 700; color: var(--s200);
}
.header-ring::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1.5px dashed var(--c1d); opacity: .5;
  animation: ringRotate 12s linear infinite;
}
@keyframes ringRotate { to { transform: rotate(360deg); } }
.header-ring::before {
  content: ''; position: absolute; inset: -2px; border-radius: 50%;
  background: radial-gradient(circle, var(--c1g), transparent 70%);
  animation: ringGlow 2.5s ease-in-out infinite;
}
@keyframes ringGlow { 0%, 100% { opacity: .35; } 50% { opacity: .8; } }

.header-sep { width: 1px; height: 20px; background: var(--glass-border); flex-shrink: 0; }
.header-stat { font-size: 12px; color: var(--s400); white-space: nowrap; }
.header-stat strong { color: var(--s200); font-weight: 600; }
.header-stat .label {
  color: var(--s600); font-size: 10px; margin-right: 3px;
  text-transform: uppercase; letter-spacing: .4px;
}

/* status chip */
.status-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px 3px 7px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: rgba(56,189,248,.1); color: var(--c1);
  border: 1px solid rgba(56,189,248,.18);
}
.status-chip .s-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .45; transform: scale(.85); } }

/* ── Main Layout ─────────────────────────────────────────── */
.main {
  position: relative; z-index: 1; padding: 58px 24px 32px;
  max-width: 1380px; margin: 0 auto;
}

/* ── Module Cards Row ────────────────────────────────────── */
.modules-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; position: relative;
}

.mod-card {
  position: relative; z-index: 1; cursor: pointer;
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px; transition: all .3s ease; overflow: hidden;
}

/* card glow halo */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity .4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="1"]::before { box-shadow: 0 0 32px 6px var(--c1g), inset 0 0 14px var(--c1g); }
.mod-card[data-color="2"]::before { box-shadow: 0 0 32px 6px var(--c2g), inset 0 0 14px var(--c2g); }
.mod-card[data-color="3"]::before { box-shadow: 0 0 32px 6px var(--c3g), inset 0 0 14px var(--c3g); }
.mod-card[data-color="4"]::before { box-shadow: 0 0 32px 6px var(--c4g), inset 0 0 14px var(--c4g); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%,100% { opacity: .65; } 50% { opacity: 1; } }

/* shimmer sweep */
.mod-card::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
  transform: skewX(-20deg); pointer-events: none;
}
.mod-card.active::after { animation: shimmerSweep 3s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card.active { border-color: rgba(148,163,184,.22); }
.mod-card:not(.active):hover {
  background: var(--surface); border-color: rgba(148,163,184,.15);
  transform: translateY(-1px);
}

.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.mc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; transition: all .3s ease; }
.mod-card[data-color="1"] .mc-dot { background: var(--c1); box-shadow: 0 0 6px var(--c1d); }
.mod-card[data-color="2"] .mc-dot { background: var(--c2); box-shadow: 0 0 6px var(--c2d); }
.mod-card[data-color="3"] .mc-dot { background: var(--c3); box-shadow: 0 0 6px var(--c3d); }
.mod-card[data-color="4"] .mc-dot { background: var(--c4); box-shadow: 0 0 6px var(--c4d); }

.mc-label { font-size: 13px; font-weight: 600; color: var(--s200); }
.mc-status { font-size: 11px; color: var(--s500); margin-left: auto; }
.mc-status.st-running { color: var(--c3); }
.mc-meta { display: flex; gap: 12px; margin-bottom: 8px; font-size: 11px; color: var(--s500); }
.mc-bar { height: 3px; border-radius: 2px; background: var(--s800); overflow: hidden; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width .6s ease; }
.mod-card[data-color="1"] .mc-bar-fill { background: var(--c1); }
.mod-card[data-color="2"] .mc-bar-fill { background: var(--c2); }
.mod-card[data-color="3"] .mc-bar-fill { background: var(--c3); }
.mod-card[data-color="4"] .mc-bar-fill { background: var(--c4); }

/* multi-target dots row in card */
.mc-subs-row { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.mc-sub-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--s700);
  transition: all .3s ease; cursor: pointer;
}
.mc-sub-dot.done { background: var(--s500); }
.mc-sub-dot.active { animation: subDotPulse 2s ease-in-out infinite; }
.mc-sub-dot.pending { background: var(--s700); opacity: .5; }
.mod-card[data-color="1"] .mc-sub-dot.done { background: rgba(56,189,248,.5); }
.mod-card[data-color="1"] .mc-sub-dot.active { background: var(--c1); box-shadow: 0 0 8px var(--c1d); }
.mod-card[data-color="2"] .mc-sub-dot.done { background: rgba(167,139,250,.5); }
.mod-card[data-color="2"] .mc-sub-dot.active { background: var(--c2); box-shadow: 0 0 8px var(--c2d); }
.mod-card[data-color="3"] .mc-sub-dot.done { background: rgba(52,211,153,.5); }
.mod-card[data-color="3"] .mc-sub-dot.active { background: var(--c3); box-shadow: 0 0 8px var(--c3d); }
.mod-card[data-color="4"] .mc-sub-dot.done { background: rgba(251,146,60,.5); }
.mod-card[data-color="4"] .mc-sub-dot.active { background: var(--c4); box-shadow: 0 0 8px var(--c4d); }
@keyframes subDotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.35); } }

/* ── Tree Columns Area ───────────────────────────────────── */
.tree-area {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-top: 14px; min-height: 200px; position: relative;
}

.tree-col { position: relative; z-index: 1; min-height: 60px; }
.tree-list { padding: 2px 0 0; list-style: none; }

/* ── XL Sub-module cards in tree ─────────────────────────── */
.tree-node {
  position: relative; margin-bottom: 4px;
  opacity: 0; transform: translateY(8px);
  transition: opacity .28s ease, transform .28s ease;
}
.tree-col.visible .tree-node { opacity: 1; transform: translateY(0); }

/* the clickable sub-module row */
.tree-sub {
  display: flex; align-items: center; gap: 8px;
  min-height: 42px; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); font-size: 12.5px; color: var(--s400);
  cursor: pointer; transition: all .25s var(--ease);
  position: relative; overflow: hidden;
}
.tree-sub:hover { background: var(--surface-hi); color: var(--s300); }

/* gutter connector line */
.tree-sub::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 3px 0 0 3px; background: transparent; transition: background .25s ease;
}

/* color tint on left edge per state */
.tree-node.done .tree-sub::before { background: var(--node-color); opacity: .3; }
.tree-node.active .tree-sub::before { background: var(--node-color); opacity: 1; }
.tree-node.active .tree-sub {
  color: var(--s200); border-color: rgba(148,163,184,.18);
  background: var(--surface-hi);
}
.tree-node.done .tree-sub { color: var(--s500); }

/* XL dot */
.tree-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  background: var(--s600); transition: all .25s ease;
}
.tree-node.done .tree-dot { background: var(--node-color); opacity: .45; }
.tree-node.active .tree-dot {
  background: var(--node-color); width: 12px; height: 12px;
  box-shadow: 0 0 10px var(--node-glow);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { box-shadow: 0 0 6px var(--node-glow); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--node-glow); transform: scale(1.25); }
}
.tree-node.pending .tree-dot { background: var(--s700); opacity: .4; }

.tree-sub-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-check { font-size: 10px; color: var(--s500); flex-shrink: 0; margin-left: auto; }

/* chevron for expandable */
.tree-chevron {
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--s600); flex-shrink: 0;
  transition: transform .25s var(--ease), color .2s;
  margin-left: auto;
}
.tree-node.expanded .tree-chevron { transform: rotate(90deg); color: var(--s400); }

/* ── Inline Accordion Detail (below the sub card) ────────── */
.tree-detail {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .4s var(--ease), opacity .3s ease, padding .3s ease;
  background: rgba(15,23,42,.55);
  border: 1px solid transparent; border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  margin-top: -4px; padding: 0 12px;
}
.tree-node.expanded .tree-detail {
  max-height: 600px; opacity: 1; padding: 12px 12px 14px;
  border-color: var(--glass-border); border-top: none;
}

/* summary text inside accordion */
.td-summary {
  font-size: 12px; line-height: 1.65; color: var(--s400);
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(148,163,184,.08);
}

/* mini stat pills row */
.td-stats {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
}
.td-stat {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 8px; border-radius: 4px;
  background: rgba(30,41,59,.8); border: 1px solid var(--glass-border);
  font-size: 10px; color: var(--s400);
}
.td-stat strong { color: var(--s200); font-weight: 600; }
.td-stat .ts-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* item rows inside accordion */
.td-items { display: flex; flex-direction: column; gap: 3px; }
.td-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: 5px; background: rgba(30,41,59,.5);
  border: 1px solid transparent; transition: all .18s ease;
  cursor: default; font-size: 11.5px;
}
.td-item:hover { background: var(--surface-hi); border-color: var(--glass-border); }
.td-item .tdi-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.td-item .tdi-label { color: var(--s400); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.td-item .tdi-meta { font-size: 10px; color: var(--s500); font-family: var(--mono); white-space: nowrap; }
.td-item.running .tdi-label { color: var(--s200); }
.td-item.running { position: relative; overflow: hidden; }
.td-item.running::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
  animation: itemShimmer 2s ease-in-out infinite;
}
@keyframes itemShimmer { 0% { left: -100%; } 60% { left: 150%; } 100% { left: 150%; } }

/* ── 2nd-level children (artifact sub-items) ─────────────── */
.tree-children { list-style: none; padding: 0 0 0 16px; margin: 0; }

.tree-child-node {
  position: relative; margin-bottom: 3px;
  opacity: 0; transform: translateY(6px);
  transition: opacity .28s ease, transform .28s ease;
}
.tree-col.visible .tree-child-node { opacity: 1; transform: translateY(0); }

.tree-child-sub {
  display: flex; align-items: center; gap: 6px;
  min-height: 34px; padding: 6px 10px;
  background: rgba(30,41,59,.50); border: 1px solid rgba(148,163,184,.07);
  border-radius: 5px; font-size: 11.5px; color: var(--s500);
  cursor: pointer; transition: all .2s ease;
  position: relative;
}
.tree-child-sub:hover { background: var(--surface-hi); color: var(--s400); }
.tree-child-sub::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  border-radius: 2px 0 0 2px; background: transparent; transition: background .2s ease;
}
.tree-child-node.active .tree-child-sub::before { background: var(--node-color); }
.tree-child-node.done .tree-child-sub::before { background: var(--node-color); opacity: .3; }
.tree-child-node.active .tree-child-sub {
  color: var(--s200); border-color: rgba(148,163,184,.15); background: var(--surface-hi);
}
.tree-child-node.done .tree-child-sub { color: var(--s500); }

.tree-child-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--s600); transition: all .2s ease;
}
.tree-child-node.done .tree-child-dot { background: var(--node-color); opacity: .4; }
.tree-child-node.active .tree-child-dot {
  background: var(--node-color); width: 10px; height: 10px;
  box-shadow: 0 0 8px var(--node-glow);
  animation: dotPulse 2s ease-in-out infinite;
}

/* child accordion detail */
.tree-child-detail {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .35s var(--ease), opacity .25s ease, padding .25s ease;
  background: rgba(10,15,28,.5);
  border: 1px solid transparent; border-top: none;
  border-radius: 0 0 5px 5px;
  margin-top: -3px; padding: 0 10px; margin-left: 0;
}
.tree-child-node.expanded .tree-child-detail {
  max-height: 500px; opacity: 1; padding: 10px 10px 12px;
  border-color: rgba(148,163,184,.07); border-top: none;
}
.tree-child-node.expanded .tree-child-sub {
  border-radius: 5px 5px 0 0;
}

/* ── Collapsed tree placeholder ──────────────────────────── */
.tree-collapsed {
  padding: 8px 14px; font-size: 11.5px; color: var(--s500);
  background: var(--surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); margin-top: 4px; cursor: pointer;
  transition: all .2s ease; display: flex; align-items: center; gap: 8px;
}
.tree-collapsed:hover { color: var(--s400); background: var(--surface-hi); }
.tree-collapsed .tc-icon { font-size: 10px; opacity: .6; }

/* ── Color assignments per tree column ───────────────────── */
.tree-col[data-color="1"] { --node-color: var(--c1); --node-glow: var(--c1d); }
.tree-col[data-color="2"] { --node-color: var(--c2); --node-glow: var(--c2d); }
.tree-col[data-color="3"] { --node-color: var(--c3); --node-glow: var(--c3d); }
.tree-col[data-color="4"] { --node-color: var(--c4); --node-glow: var(--c4d); }

/* ── Keyboard hint ───────────────────────────────────────── */
.kbd-hint {
  position: fixed; bottom: 12px; right: 20px;
  font-size: 10.5px; color: var(--s600); z-index: 50;
}
.kbd-hint kbd {
  display: inline-block; padding: 1px 5px; background: var(--s800);
  border: 1px solid var(--glass-border); border-radius: 3px;
  font-family: inherit; font-size: 10px; color: var(--s500); margin: 0 2px;
}

/* ── Empty state (no text until click) ───────────────────── */
.empty-hint {
  display: flex; align-items: center; justify-content: center;
  padding: 40px 20px; text-align: center;
  font-size: 12px; color: var(--s600); line-height: 1.6;
  min-height: 120px;
}
.empty-hint .eh-icon { font-size: 24px; margin-bottom: 8px; opacity: .3; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- Header -->
<header class="header">
  <div class="brand"><span>AI</span>Inventor</div>
  <div class="breadcrumb">Pipeline <b>&rsaquo;</b> Run #47 <b>&rsaquo;</b> <b id="breadcrumbActive">Overview</b></div>
  <div class="header-spacer"></div>
  <div class="status-chip"><span class="s-dot"></span>Running</div>
  <div class="header-sep"></div>
  <div class="header-ring">
    <svg viewBox="0 0 36 36">
      <circle class="ring-track" cx="18" cy="18" r="14"/>
      <circle class="ring-fill" cx="18" cy="18" r="14" id="ringFill"
        stroke-dasharray="87.96" stroke-dashoffset="35.18"/>
    </svg>
    <div class="ring-label" id="ringLabel">58%</div>
  </div>
  <div class="header-sep"></div>
  <div class="header-stat"><span class="label">Time</span> <strong id="hTime">22m 18s</strong></div>
  <div class="header-sep"></div>
  <div class="header-stat"><span class="label">Cost</span> $<strong id="hCost">4.71</strong></div>
  <div class="header-sep"></div>
  <div class="header-stat"><span class="label">Tokens</span> <strong id="hTokens">438k</strong></div>
</header>

<!-- Main Content -->
<div class="main">
  <div class="modules-row" id="modulesRow"></div>
  <div class="tree-area" id="treeArea"></div>
</div>

<div class="kbd-hint">
  <kbd>&larr;</kbd><kbd>&rarr;</kbd> modules &nbsp;
  <kbd>&uarr;</kbd><kbd>&darr;</kbd> sub-modules &nbsp;
  <kbd>Enter</kbd> expand/collapse
</div>

<script>
/* ── Color Constants ─────────────────────────────────────── */
const COLORS   = ['#38bdf8','#a78bfa','#34d399','#fb923c'];
const COLORS_G = ['rgba(56,189,248,.18)','rgba(167,139,250,.18)','rgba(52,211,153,.18)','rgba(251,146,60,.18)'];

/* ── State ───────────────────────────────────────────────── */
let activeModule = 2;       /* which top-level module card is selected */
let expandedSub = null;     /* { mi, si } -- which sub-node is expanded */
let expandedChild = null;   /* { mi, si, ci } -- which child node is expanded */

/* ── Render: Module Cards ────────────────────────────────── */
function renderModuleCards() {
  const row = document.getElementById('modulesRow');
  row.innerHTML = '';

  MODULES.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'mod-card' + (i === activeModule ? ' active' : '');
    card.dataset.color = m.color;
    card.onclick = () => selectModule(i);
    const stLabel = { done: 'Complete', running: 'Running', queued: 'Queued' }[m.status];

    /* multi-target sub-dots */
    let dotsHtml = '<div class="mc-subs-row">';
    m.subs.forEach(s => {
      const cls = s.state === 'done' ? 'done' : s.state === 'active' ? 'active' : 'pending';
      dotsHtml += `<span class="mc-sub-dot ${cls}" title="${s.label}"></span>`;
      if (s.children) {
        s.children.forEach(ch => {
          const ccls = ch.state === 'done' ? 'done' : ch.state === 'active' ? 'active' : 'pending';
          dotsHtml += `<span class="mc-sub-dot ${ccls}" title="${ch.label}"></span>`;
        });
      }
    });
    dotsHtml += '</div>';

    card.innerHTML = `
      <div class="mc-top">
        <div class="mc-dot"></div>
        <div class="mc-label">${m.label}</div>
        <div class="mc-status st-${m.status}">${stLabel}</div>
      </div>
      <div class="mc-meta"><span>${m.time}</span><span>${m.tokens} tokens</span></div>
      <div class="mc-bar"><div class="mc-bar-fill" data-width="${m.progress}"></div></div>
      ${dotsHtml}`;
    row.appendChild(card);
  });

  requestAnimationFrame(() => {
    row.querySelectorAll('.mc-bar-fill[data-width]').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  });
}

/* ── Render: Tree Columns with Inline Accordion ──────────── */
function renderTreeColumns() {
  const area = document.getElementById('treeArea');
  area.innerHTML = '';

  MODULES.forEach((m, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col';
    col.dataset.color = m.color;
    const isActive = mi === activeModule;
    const isDone = m.status === 'done';
    const isQueued = m.status === 'queued';

    if (!isActive && isQueued) {
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#9654;</span>${m.subs.length} sub-modules &middot; queued</div>`;
    } else if (!isActive && isDone) {
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#10003;</span>${m.subs.length} sub-modules &middot; complete</div>`;
    } else {
      let html = '<ul class="tree-list">';
      m.subs.forEach((s, si) => {
        const stateClass = s.state === 'done' ? 'done' : s.state === 'active' ? 'active' : 'pending';
        const isExpanded = expandedSub && expandedSub.mi === mi && expandedSub.si === si;
        const expandClass = isExpanded ? ' expanded' : '';
        const chk = s.state === 'done' ? '<span class="tree-check">&#10003;</span>' : '';
        const timeLabel = s.time && s.time !== '--' ? `<span class="tree-check" style="font-size:10px;font-family:var(--mono);color:var(--s600)">${s.time}</span>` : '';

        html += `<li class="tree-node ${stateClass}${expandClass}" data-mi="${mi}" data-si="${si}">
          <div class="tree-sub" onclick="toggleSub(${mi},${si})">
            <span class="tree-dot"></span>
            <span class="tree-sub-label">${s.label}</span>
            ${chk}${timeLabel}
            <span class="tree-chevron">&#8250;</span>
          </div>
          <div class="tree-detail">
            ${renderDetailContent(s, m.color)}
          </div>`;

        /* render 2nd-level children (for artifact sub-items) */
        if (s.children && s.children.length && isExpanded) {
          html += '<ul class="tree-children">';
          s.children.forEach((ch, ci) => {
            const cState = ch.state === 'done' ? 'done' : ch.state === 'active' ? 'active' : 'pending';
            const cExpanded = expandedChild && expandedChild.mi === mi && expandedChild.si === si && expandedChild.ci === ci;
            const cExpandClass = cExpanded ? ' expanded' : '';
            const cChk = ch.state === 'done' ? '<span class="tree-check" style="font-size:9px">&#10003;</span>' : '';

            html += `<li class="tree-child-node ${cState}${cExpandClass}" data-mi="${mi}" data-si="${si}" data-ci="${ci}">
              <div class="tree-child-sub" onclick="event.stopPropagation();toggleChild(${mi},${si},${ci})">
                <span class="tree-child-dot"></span>
                <span class="tree-sub-label">${ch.label}</span>
                ${cChk}
                <span class="tree-chevron">&#8250;</span>
              </div>
              <div class="tree-child-detail">
                ${renderDetailContent(ch, m.color)}
              </div>
            </li>`;
          });
          html += '</ul>';
        }

        html += '</li>';
      });
      html += '</ul>';
      col.innerHTML = html;
    }

    area.appendChild(col);

    /* staggered entrance animation */
    if (isActive || !isQueued) {
      requestAnimationFrame(() => {
        setTimeout(() => {
          col.classList.add('visible');
          let delay = 0;
          col.querySelectorAll('.tree-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 80;
          });
          col.querySelectorAll('.tree-child-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 60;
          });
        }, isActive ? 40 : 160);
      });
    }
  });
}

/* ── Render: Detail content for accordion ────────────────── */
function renderDetailContent(node, colorIdx) {
  const c = COLORS[colorIdx - 1];
  let html = '';

  if (node.summary) {
    html += `<div class="td-summary">${node.summary}</div>`;
  }

  if (node.stats && node.stats.length) {
    html += '<div class="td-stats">';
    node.stats.forEach(st => {
      html += `<div class="td-stat"><span class="ts-dot" style="background:${c}"></span><strong>${st.value}</strong> ${st.label}</div>`;
    });
    html += '</div>';
  }

  if (node.items && node.items.length) {
    html += '<div class="td-items">';
    node.items.forEach(it => {
      const dotColor = it.done ? 'var(--s500)' : (it.running ? c : 'var(--s700)');
      const cls = it.running ? ' running' : '';
      html += `<div class="td-item${cls}">
        <span class="tdi-dot" style="background:${dotColor}"></span>
        <span class="tdi-label">${it.label}</span>
        <span class="tdi-meta">${it.meta}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

/* ── Interaction: select module ──────────────────────────── */
function selectModule(mi) {
  if (mi === activeModule) return;
  activeModule = mi;
  expandedSub = null;
  expandedChild = null;
  updateBreadcrumb();
  renderModuleCards();
  renderTreeColumns();
}

/* ── Interaction: toggle sub-module accordion ────────────── */
function toggleSub(mi, si) {
  if (mi !== activeModule) {
    activeModule = mi;
    expandedSub = { mi, si };
    expandedChild = null;
  } else if (expandedSub && expandedSub.mi === mi && expandedSub.si === si) {
    expandedSub = null;
    expandedChild = null;
  } else {
    expandedSub = { mi, si };
    expandedChild = null;
  }
  updateBreadcrumb();
  renderModuleCards();
  renderTreeColumns();
}

/* ── Interaction: toggle child accordion ─────────────────── */
function toggleChild(mi, si, ci) {
  if (expandedChild && expandedChild.mi === mi && expandedChild.si === si && expandedChild.ci === ci) {
    expandedChild = null;
  } else {
    expandedChild = { mi, si, ci };
  }
  renderTreeColumns();
}

/* ── Breadcrumb ──────────────────────────────────────────── */
function updateBreadcrumb() {
  const el = document.getElementById('breadcrumbActive');
  const m = MODULES[activeModule];
  let text = m.label;
  if (expandedSub) {
    const s = m.subs[expandedSub.si];
    if (s) text = m.label + ' > ' + s.label;
  }
  el.textContent = text;
}

/* ── Keyboard Navigation ─────────────────────────────────── */
document.addEventListener('keydown', e => {
  const m = MODULES[activeModule];

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    const next = Math.min(activeModule + 1, MODULES.length - 1);
    if (next !== activeModule) selectModule(next);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    const prev = Math.max(activeModule - 1, 0);
    if (prev !== activeModule) selectModule(prev);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!expandedSub) {
      toggleSub(activeModule, 0);
    } else {
      const nextSi = Math.min(expandedSub.si + 1, m.subs.length - 1);
      if (nextSi !== expandedSub.si) {
        expandedSub = { mi: activeModule, si: nextSi };
        expandedChild = null;
        updateBreadcrumb();
        renderTreeColumns();
      }
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (expandedSub) {
      if (expandedSub.si > 0) {
        expandedSub = { mi: activeModule, si: expandedSub.si - 1 };
        expandedChild = null;
        updateBreadcrumb();
        renderTreeColumns();
      } else {
        expandedSub = null;
        expandedChild = null;
        updateBreadcrumb();
        renderTreeColumns();
      }
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (expandedSub) {
      const s = m.subs[expandedSub.si];
      if (s && s.children && s.children.length) {
        if (!expandedChild) {
          expandedChild = { mi: activeModule, si: expandedSub.si, ci: 0 };
        } else {
          expandedChild = null;
        }
        renderTreeColumns();
      }
    } else {
      /* find first active sub and expand */
      const idx = m.subs.findIndex(s => s.state === 'active');
      toggleSub(activeModule, idx >= 0 ? idx : 0);
    }
  } else if (e.key === 'Escape') {
    e.preventDefault();
    if (expandedChild) {
      expandedChild = null;
      renderTreeColumns();
    } else if (expandedSub) {
      expandedSub = null;
      updateBreadcrumb();
      renderTreeColumns();
    }
  }
});

/* ── Background Canvas (subtle floating particles) ───────── */
function initBgCanvas() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const PARTICLE_COUNT = 40;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.2,
      dy: (Math.random() - 0.5) * 0.15,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * 0.15 + 0.04,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.dx; p.y += p.dy;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();

      /* glow */
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha * 0.2;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    /* draw faint connections */
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = particles[i].color;
          ctx.globalAlpha = (1 - dist / 150) * 0.04;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
}

/* ── Simulated progress updates ──────────────────────────── */
let simTimer = 0;
function simulateProgress() {
  simTimer++;

  /* slowly advance the ablation sub-module */
  if (simTimer % 80 === 0) {
    const inv = MODULES[2];
    const art = inv.subs[3]; /* Artifacts */
    if (art.children) {
      const ablation = art.children[3];
      if (ablation.state === 'active') {
        const item = ablation.items[0]; /* Component isolation */
        if (item.meta === '5/8 papers') item.meta = '6/8 papers';
        else if (item.meta === '6/8 papers') item.meta = '7/8 papers';
      }
    }
  }

  /* update elapsed time display */
  const baseSeconds = 22 * 60 + 18;
  const elapsed = baseSeconds + Math.floor(simTimer / 2);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  const hTime = document.getElementById('hTime');
  if (hTime) hTime.textContent = m + 'm ' + (s < 10 ? '0' : '') + s + 's';

  /* update ring */
  const progress = 58 + Math.min(simTimer * 0.01, 10);
  const circ = 87.96;
  const offset = circ * (1 - progress / 100);
  const ringFill = document.getElementById('ringFill');
  const ringLabel = document.getElementById('ringLabel');
  if (ringFill) ringFill.setAttribute('stroke-dashoffset', offset.toFixed(2));
  if (ringLabel) ringLabel.textContent = Math.round(progress) + '%';

  setTimeout(simulateProgress, 500);
}

/* ── Init ────────────────────────────────────────────────── */

  renderModuleCards();
  renderTreeColumns();
  updateBreadcrumb();
  initBgCanvas();
  simulateProgress();
}
