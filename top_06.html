<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline -- Top 06 (Inline Accordion)</title>
<style>
/* ── Reset + Variables ───────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --s950: #020617; --s900: #0f172a; --s850: #131c2e;
  --s800: #1e293b; --s750: #253349; --s700: #334155;
  --s600: #475569; --s500: #64748b; --s400: #94a3b8;
  --s300: #cbd5e1; --s200: #e2e8f0; --s100: #f1f5f9;

  /* Module accent colors */
  --c1: #38bdf8; --c1g: rgba(56,189,248,.18); --c1d: rgba(56,189,248,.55);
  --c2: #a78bfa; --c2g: rgba(167,139,250,.18); --c2d: rgba(167,139,250,.55);
  --c3: #34d399; --c3g: rgba(52,211,153,.18); --c3d: rgba(52,211,153,.55);
  --c4: #fb923c; --c4g: rgba(251,146,60,.18); --c4d: rgba(251,146,60,.55);

  /* Glass + surface */
  --glass: rgba(15,23,42,.62);
  --glass-border: rgba(148,163,184,.10);
  --glass-border-hi: rgba(148,163,184,.18);
  --glass-shine: rgba(255,255,255,.04);
  --surface: rgba(30,41,59,.72);
  --surface-hi: rgba(51,65,85,.55);
  --inset: rgba(0,0,0,.22);

  /* Geometry */
  --radius: 10px;
  --radius-sm: 7px;

  /* Motion */
  --ease: cubic-bezier(.4,0,.2,1);
  --ease-out: cubic-bezier(0,0,.2,1);
  --dur-fast: .18s;
  --dur-med: .32s;
  --dur-slow: .5s;

  /* Type */
  --sans: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono: 'SF Mono','Cascadia Code','JetBrains Mono',Consolas,monospace;
  font-size: 14px;
}

html { height: 100%; }
body {
  min-height: 100%;
  background: var(--s950);
  color: var(--s300);
  font-family: var(--sans);
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* subtle grid bg */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(148,163,184,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.03) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* radial ambience blobs */
body::after {
  content: '';
  position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px; border-radius: 50%;
  pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse, rgba(56,189,248,.04), transparent 70%);
}

#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--s700); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--s600); }

/* ── Header ──────────────────────────────────────────────── */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 100;
  display: flex; align-items: center; gap: 14px; padding: 0 22px;
  background: rgba(15,23,42,.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--glass-border);
}

/* glass top-edge highlight */
.header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
}

.brand { font-weight: 700; font-size: 14px; color: var(--s100); letter-spacing: -.3px; }
.brand span { color: var(--c1); margin-right: 2px; }
.breadcrumb { font-size: 12px; color: var(--s500); white-space: nowrap; }
.breadcrumb b { color: var(--s300); font-weight: 600; }
.header-spacer { flex: 1; }

/* status chip */
.status-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px 3px 7px; border-radius: 999px;
  font-size: 11px; font-weight: 600;
  background: rgba(52,211,153,.1); color: var(--c3);
  border: 1px solid rgba(52,211,153,.2);
}
.status-chip .s-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: .45; transform: scale(.85); }
}

/* mini ring */
.header-ring { width: 36px; height: 36px; position: relative; flex-shrink: 0; }
.header-ring svg { width: 100%; height: 100%; }
.header-ring .ring-track { fill: none; stroke: var(--s700); stroke-width: 3; }
.header-ring .ring-fill {
  fill: none; stroke: var(--c3); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset .8s ease, stroke .5s ease;
  filter: drop-shadow(0 0 4px var(--c3d));
}
.header-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 9px; font-weight: 700; color: var(--s200);
}

/* ring dashed orbit */
.header-ring::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1.5px dashed rgba(52,211,153,.35); opacity: .5;
  animation: ringRotate 12s linear infinite;
}
@keyframes ringRotate { to { transform: rotate(360deg); } }

/* ring glow pulse */
.header-ring::before {
  content: ''; position: absolute; inset: -2px; border-radius: 50%;
  background: radial-gradient(circle, var(--c3g), transparent 70%);
  animation: ringGlow 2.5s ease-in-out infinite;
}
@keyframes ringGlow { 0%,100% { opacity: .35; } 50% { opacity: .8; } }

.header-sep { width: 1px; height: 20px; background: var(--glass-border); flex-shrink: 0; }
.header-stat { font-size: 12px; color: var(--s400); white-space: nowrap; }
.header-stat strong {
  color: var(--s200); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.header-stat .label {
  color: var(--s600); font-size: 10px; margin-right: 3px;
  text-transform: uppercase; letter-spacing: .4px;
}

/* ── Main Layout ─────────────────────────────────────────── */
.main {
  position: relative; z-index: 1;
  padding: 60px 24px 40px;
  max-width: 1400px; margin: 0 auto;
  min-height: 100vh;
}

/* ── Module Cards Row ────────────────────────────────────── */
.modules-row {
  display: flex; align-items: stretch; gap: 0;
  position: relative;
}

.mod-card {
  flex: 1; min-width: 0;
  position: relative; z-index: 1; cursor: pointer;
  background: var(--glass);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: all .3s var(--ease);
  overflow: hidden;
}

/* glass top-edge shine */
.mod-card .card-shine {
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-shine), transparent);
  pointer-events: none;
}

/* top color accent bar */
.mod-card .card-accent {
  position: absolute; top: 0; left: 16px; right: 16px; height: 2px;
  border-radius: 0 0 2px 2px; opacity: 0;
  transition: opacity .3s var(--ease);
}
.mod-card:hover .card-accent,
.mod-card.active .card-accent { opacity: 1; }
.mod-card[data-color="1"] .card-accent { background: var(--c1); }
.mod-card[data-color="2"] .card-accent { background: var(--c2); }
.mod-card[data-color="3"] .card-accent { background: var(--c3); }
.mod-card[data-color="4"] .card-accent { background: var(--c4); }

/* card glow halo */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity .4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="1"]::before { box-shadow: 0 0 32px 6px var(--c1g), inset 0 0 14px var(--c1g); }
.mod-card[data-color="2"]::before { box-shadow: 0 0 32px 6px var(--c2g), inset 0 0 14px var(--c2g); }
.mod-card[data-color="3"]::before { box-shadow: 0 0 32px 6px var(--c3g), inset 0 0 14px var(--c3g); }
.mod-card[data-color="4"]::before { box-shadow: 0 0 32px 6px var(--c4g), inset 0 0 14px var(--c4g); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

/* shimmer sweep on active */
.mod-card::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
  transform: skewX(-20deg); pointer-events: none;
}
.mod-card.active::after { animation: shimmerSweep 3s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card.active { border-color: var(--glass-border-hi); }
.mod-card:not(.active):hover {
  background: var(--surface); border-color: rgba(148,163,184,.15);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}

/* card inner layout */
.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.mc-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  transition: all .3s ease;
}
.mod-card.active .mc-dot { animation: pulse 2s ease-in-out infinite; }
.mod-card[data-color="1"] .mc-dot { background: var(--c1); box-shadow: 0 0 6px var(--c1d); }
.mod-card[data-color="2"] .mc-dot { background: var(--c2); box-shadow: 0 0 6px var(--c2d); }
.mod-card[data-color="3"] .mc-dot { background: var(--c3); box-shadow: 0 0 6px var(--c3d); }
.mod-card[data-color="4"] .mc-dot { background: var(--c4); box-shadow: 0 0 6px var(--c4d); }

.mc-label { font-size: 13px; font-weight: 600; color: var(--s200); }
.mc-status { font-size: 11px; color: var(--s500); margin-left: auto; }
.mc-status.st-running { color: var(--c3); }
.mc-status.st-done { color: var(--s500); }
.mc-meta { display: flex; gap: 12px; margin-bottom: 8px; font-size: 11px; color: var(--s500); }
.mc-meta span { font-variant-numeric: tabular-nums; }

/* progress bar */
.mc-bar { height: 3px; border-radius: 2px; background: var(--s800); overflow: hidden; }
.mc-bar-fill {
  height: 100%; border-radius: 2px; width: 0;
  transition: width .6s var(--ease);
  position: relative;
}
.mod-card.active .mc-bar-fill::after {
  content: ''; position: absolute; right: 0; top: 0;
  width: 20px; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.3));
  animation: barShimmer 1.8s ease-in-out infinite;
}
@keyframes barShimmer { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
.mod-card[data-color="1"] .mc-bar-fill { background: var(--c1); }
.mod-card[data-color="2"] .mc-bar-fill { background: var(--c2); }
.mod-card[data-color="3"] .mc-bar-fill { background: var(--c3); }
.mod-card[data-color="4"] .mc-bar-fill { background: var(--c4); }

/* multi-target sub-dots row */
.mc-subs-row { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.mc-sub-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--s700);
  transition: all .3s ease; cursor: pointer;
}
.mc-sub-dot.done { background: var(--s500); }
.mc-sub-dot.active { animation: subDotPulse 2s ease-in-out infinite; }
.mc-sub-dot.pending { background: var(--s700); opacity: .5; }
.mod-card[data-color="1"] .mc-sub-dot.done { background: rgba(56,189,248,.45); }
.mod-card[data-color="1"] .mc-sub-dot.active { background: var(--c1); box-shadow: 0 0 8px var(--c1d); }
.mod-card[data-color="2"] .mc-sub-dot.done { background: rgba(167,139,250,.45); }
.mod-card[data-color="2"] .mc-sub-dot.active { background: var(--c2); box-shadow: 0 0 8px var(--c2d); }
.mod-card[data-color="3"] .mc-sub-dot.done { background: rgba(52,211,153,.45); }
.mod-card[data-color="3"] .mc-sub-dot.active { background: var(--c3); box-shadow: 0 0 8px var(--c3d); }
.mod-card[data-color="4"] .mc-sub-dot.done { background: rgba(251,146,60,.45); }
.mod-card[data-color="4"] .mc-sub-dot.active { background: var(--c4); box-shadow: 0 0 8px var(--c4d); }
@keyframes subDotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }

/* connector dots between cards */
.card-connector {
  display: flex; align-items: center; gap: 3px; flex-shrink: 0;
  padding: 0 4px; align-self: center;
}
.conn-dot {
  width: 3px; height: 3px; border-radius: 50%; background: var(--s700);
  animation: connFlow 1.8s ease-in-out infinite;
}
.conn-dot:nth-child(2) { animation-delay: .3s; }
.conn-dot:nth-child(3) { animation-delay: .6s; }
.card-connector.done .conn-dot { background: var(--s600); animation: none; }
.card-connector.pending .conn-dot { background: var(--s800); opacity: .4; animation: none; }
@keyframes connFlow {
  0%,100% { opacity: .2; }
  50% { opacity: .7; background: var(--c3); }
}

/* ── Tree Columns Area ───────────────────────────────────── */
.tree-area {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-top: 14px; min-height: 200px;
  position: relative;
}

.tree-col {
  position: relative; z-index: 1; min-height: 60px;
  /* vertical gutter line for the column */
}
.tree-col::before {
  content: ''; position: absolute; left: 18px; top: 8px; bottom: 8px;
  width: 2px; border-radius: 1px; background: rgba(148,163,184,.06);
  pointer-events: none; z-index: 0;
}
.tree-col[data-color="1"]::before { background: rgba(56,189,248,.08); }
.tree-col[data-color="2"]::before { background: rgba(167,139,250,.08); }
.tree-col[data-color="3"]::before { background: rgba(52,211,153,.08); }
.tree-col[data-color="4"]::before { background: rgba(251,146,60,.08); }

.tree-list { padding: 2px 0 0; list-style: none; position: relative; z-index: 1; }

/* ── XL Sub-module nodes in tree ─────────────────────────── */
.tree-node {
  position: relative; margin-bottom: 4px;
  opacity: 0; transform: translateY(8px);
  transition: opacity .28s var(--ease), transform .28s var(--ease);
}
.tree-col.visible .tree-node { opacity: 1; transform: translateY(0); }

/* the clickable sub-module card */
.tree-sub {
  display: flex; align-items: center; gap: 8px;
  min-height: 44px; padding: 9px 12px;
  background: var(--surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); font-size: 12.5px; color: var(--s400);
  cursor: pointer; transition: all .25s var(--ease);
  position: relative; overflow: hidden;
}
.tree-sub:hover {
  background: var(--surface-hi); color: var(--s300);
  border-color: var(--glass-border-hi);
}

/* left edge tint bar */
.tree-sub::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  border-radius: 3px 0 0 3px; background: transparent;
  transition: background .25s ease;
}
.tree-node.done .tree-sub::before { background: var(--node-color); opacity: .3; }
.tree-node.active .tree-sub::before { background: var(--node-color); opacity: 1; }

/* active + done sub styling */
.tree-node.active .tree-sub {
  color: var(--s200); border-color: var(--glass-border-hi);
  background: var(--surface-hi);
}
.tree-node.done .tree-sub { color: var(--s500); }
.tree-node.pending .tree-sub { color: var(--s600); opacity: .7; }

/* expanded sub card rounds top only */
.tree-node.expanded .tree-sub {
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom-color: transparent;
}

/* hover glow effect on active sub */
.tree-node.active .tree-sub::after {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius-sm);
  box-shadow: 0 0 16px 2px var(--node-glow); opacity: .3; pointer-events: none;
  animation: subGlow 3s ease-in-out infinite;
}
@keyframes subGlow { 0%,100% { opacity: .2; } 50% { opacity: .5; } }

/* XL dot */
.tree-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
  background: var(--s600); transition: all .25s ease;
  position: relative; z-index: 1;
}
.tree-node.done .tree-dot { background: var(--node-color); opacity: .45; }
.tree-node.active .tree-dot {
  background: var(--node-color); width: 12px; height: 12px;
  box-shadow: 0 0 10px var(--node-glow);
  animation: dotPulse 2s ease-in-out infinite;
}
@keyframes dotPulse {
  0%,100% { box-shadow: 0 0 6px var(--node-glow); transform: scale(1); }
  50% { box-shadow: 0 0 16px var(--node-glow); transform: scale(1.25); }
}
.tree-node.pending .tree-dot { background: var(--s700); opacity: .4; }

.tree-sub-label {
  flex: 1; min-width: 0; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
  font-weight: 500;
}
.tree-check { font-size: 10px; color: var(--s500); flex-shrink: 0; }
.tree-time {
  font-size: 10px; font-family: var(--mono); color: var(--s600);
  flex-shrink: 0; font-variant-numeric: tabular-nums;
}

/* chevron */
.tree-chevron {
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--s600); flex-shrink: 0;
  transition: transform .25s var(--ease), color .2s;
  margin-left: auto;
}
.tree-node.expanded .tree-chevron { transform: rotate(90deg); color: var(--s400); }
.tree-sub:hover .tree-chevron { color: var(--s400); }

/* ── Inline Accordion Detail ─────────────────────────────── */
.tree-detail {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .4s var(--ease), opacity .3s ease, padding .3s ease;
  background: rgba(15,23,42,.55);
  border: 1px solid transparent; border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  margin-top: -1px; padding: 0 12px;
}
.tree-node.expanded .tree-detail {
  max-height: 650px; opacity: 1; padding: 12px 12px 14px;
  border-color: var(--glass-border); border-top-color: rgba(148,163,184,.05);
}

/* summary text */
.td-summary {
  font-size: 12px; line-height: 1.65; color: var(--s400);
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(148,163,184,.08);
}

/* mini stat pills */
.td-stats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.td-stat {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 4px;
  background: rgba(30,41,59,.8); border: 1px solid var(--glass-border);
  font-size: 10px; color: var(--s400);
}
.td-stat strong {
  color: var(--s200); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.td-stat .ts-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* mini progress bar in accordion */
.td-progress {
  height: 3px; border-radius: 2px; background: var(--s800);
  overflow: hidden; margin-bottom: 10px;
}
.td-progress-fill {
  height: 100%; border-radius: 2px;
  transition: width .6s var(--ease);
}

/* item rows */
.td-items { display: flex; flex-direction: column; gap: 3px; }
.td-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px;
  border-radius: 5px; background: rgba(30,41,59,.5);
  border: 1px solid transparent; transition: all .18s ease;
  cursor: default; font-size: 11.5px;
}
.td-item:hover { background: var(--surface-hi); border-color: var(--glass-border); }

.td-item .tdi-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.td-item .tdi-label {
  color: var(--s400); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.td-item .tdi-meta {
  font-size: 10px; color: var(--s500); font-family: var(--mono);
  white-space: nowrap; font-variant-numeric: tabular-nums;
}

/* running item shimmer */
.td-item.running .tdi-label { color: var(--s200); }
.td-item.running { position: relative; overflow: hidden; }
.td-item.running::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
  animation: itemShimmer 2s ease-in-out infinite;
}
@keyframes itemShimmer { 0% { left: -100%; } 60% { left: 150%; } 100% { left: 150%; } }

/* done item styling */
.td-item.done .tdi-label { color: var(--s500); }
.td-item.pending .tdi-label { color: var(--s600); }

/* ── 2nd-level Children (e.g., Artifact sub-items) ───────── */
.tree-children {
  list-style: none; padding: 4px 0 0 16px; margin: 0;
}

.tree-child-node {
  position: relative; margin-bottom: 3px;
  opacity: 0; transform: translateY(6px);
  transition: opacity .28s ease, transform .28s ease;
}
.tree-col.visible .tree-child-node { opacity: 1; transform: translateY(0); }

/* connector line from parent to children */
.tree-children::before {
  content: ''; position: absolute; left: 24px; top: 0;
  width: 2px; height: 100%; border-radius: 1px;
  background: rgba(148,163,184,.06);
}

.tree-child-sub {
  display: flex; align-items: center; gap: 6px;
  min-height: 36px; padding: 6px 10px;
  background: rgba(30,41,59,.50); border: 1px solid rgba(148,163,184,.07);
  border-radius: 5px; font-size: 11.5px; color: var(--s500);
  cursor: pointer; transition: all .2s ease;
  position: relative;
}
.tree-child-sub:hover { background: var(--surface-hi); color: var(--s400); }

/* left edge tint */
.tree-child-sub::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  border-radius: 2px 0 0 2px; background: transparent;
  transition: background .2s ease;
}
.tree-child-node.active .tree-child-sub::before { background: var(--node-color); }
.tree-child-node.done .tree-child-sub::before { background: var(--node-color); opacity: .3; }

.tree-child-node.active .tree-child-sub {
  color: var(--s200); border-color: rgba(148,163,184,.15);
  background: var(--surface-hi);
}
.tree-child-node.done .tree-child-sub { color: var(--s500); }

/* expanded child rounds top only */
.tree-child-node.expanded .tree-child-sub {
  border-radius: 5px 5px 0 0; border-bottom-color: transparent;
}

.tree-child-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--s600); transition: all .2s ease;
}
.tree-child-node.done .tree-child-dot { background: var(--node-color); opacity: .4; }
.tree-child-node.active .tree-child-dot {
  background: var(--node-color); width: 10px; height: 10px;
  box-shadow: 0 0 8px var(--node-glow);
  animation: dotPulse 2s ease-in-out infinite;
}
.tree-child-node.pending .tree-child-dot { background: var(--s700); opacity: .35; }

/* child chevron */
.tree-child-sub .tree-chevron { font-size: 9px; width: 14px; height: 14px; }
.tree-child-node.expanded .tree-child-sub .tree-chevron { transform: rotate(90deg); color: var(--s400); }

/* child inline accordion */
.tree-child-detail {
  max-height: 0; overflow: hidden; opacity: 0;
  transition: max-height .35s var(--ease), opacity .25s ease, padding .25s ease;
  background: rgba(10,15,28,.5);
  border: 1px solid transparent; border-top: none;
  border-radius: 0 0 5px 5px;
  margin-top: -1px; padding: 0 10px;
}
.tree-child-node.expanded .tree-child-detail {
  max-height: 500px; opacity: 1; padding: 10px 10px 12px;
  border-color: rgba(148,163,184,.07); border-top-color: transparent;
}

/* ── Collapsed tree placeholder ──────────────────────────── */
.tree-collapsed {
  padding: 10px 14px; font-size: 11.5px; color: var(--s500);
  background: var(--surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); margin-top: 4px; cursor: pointer;
  transition: all .2s ease; display: flex; align-items: center; gap: 8px;
}
.tree-collapsed:hover { color: var(--s400); background: var(--surface-hi); }
.tree-collapsed .tc-icon { font-size: 10px; opacity: .6; }
.tree-collapsed .tc-count {
  margin-left: auto; font-size: 10px; font-family: var(--mono);
  color: var(--s600); background: var(--inset); padding: 1px 6px; border-radius: 3px;
}

/* ── Color assignments per tree column ───────────────────── */
.tree-col[data-color="1"] { --node-color: var(--c1); --node-glow: var(--c1d); }
.tree-col[data-color="2"] { --node-color: var(--c2); --node-glow: var(--c2d); }
.tree-col[data-color="3"] { --node-color: var(--c3); --node-glow: var(--c3d); }
.tree-col[data-color="4"] { --node-color: var(--c4); --node-glow: var(--c4d); }

/* ── Keyboard hint ───────────────────────────────────────── */
.kbd-hint {
  position: fixed; bottom: 12px; right: 20px;
  font-size: 10.5px; color: var(--s600); z-index: 50;
  display: flex; align-items: center; gap: 8px;
}
.kbd-hint kbd {
  display: inline-block; padding: 1px 5px; background: var(--s800);
  border: 1px solid var(--glass-border); border-radius: 3px;
  font-family: inherit; font-size: 10px; color: var(--s500); margin: 0 1px;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 1100px) {
  .modules-row { flex-wrap: wrap; }
  .mod-card { flex: 1 1 calc(50% - 20px); min-width: 220px; }
  .card-connector { display: none; }
  .tree-area { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  .modules-row { flex-direction: column; }
  .mod-card { flex: none; }
  .tree-area { grid-template-columns: 1fr; }
  .header { gap: 8px; padding: 0 12px; }
  .header-stat { display: none; }
  .main { padding: 54px 12px 32px; }
}

function renderModuleCards() {
  const row = document.getElementById('modulesRow');
  row.innerHTML = '';

  MODULES.forEach((m, i) => {
    /* insert connector dots between cards */
    if (i > 0) {
      const conn = document.createElement('div');
      const prevStatus = MODULES[i - 1].status;
      const connClass = prevStatus === 'done'
        ? (m.status === 'queued' ? 'pending' : 'done')
        : (prevStatus === 'running' ? '' : 'pending');
      conn.className = 'card-connector ' + connClass;
      conn.innerHTML = '<span class="conn-dot"></span><span class="conn-dot"></span><span class="conn-dot"></span>';
      row.appendChild(conn);
    }

    const card = document.createElement('div');
    card.className = 'mod-card' + (i === activeModule ? ' active' : '');
    card.dataset.color = m.color;
    card.onclick = () => selectModule(i);

    const stLabel = { done: 'Complete', running: 'Running', queued: 'Queued' }[m.status];

    /* multi-target sub-dots */
    let dotsHtml = '<div class="mc-subs-row">';
    m.subs.forEach(s => {
      const cls = s.state === 'done' ? 'done' : s.state === 'active' ? 'active' : 'pending';
      dotsHtml += `<span class="mc-sub-dot ${cls}" title="${s.label}"></span>`;
      if (s.children) {
        s.children.forEach(ch => {
          const ccls = ch.state === 'done' ? 'done' : ch.state === 'active' ? 'active' : 'pending';
          dotsHtml += `<span class="mc-sub-dot ${ccls}" title="${ch.label}"></span>`;
        });
      }
    });
    dotsHtml += '</div>';

    card.innerHTML = `
      <div class="card-shine"></div>
      <div class="card-accent"></div>
      <div class="mc-top">
        <div class="mc-dot"></div>
        <div class="mc-label">${m.label}</div>
        <div class="mc-status st-${m.status}">${stLabel}</div>
      </div>
      <div class="mc-meta"><span>${m.time}</span><span>${m.tokens} tokens</span></div>
      <div class="mc-bar"><div class="mc-bar-fill" data-width="${m.progress}"></div></div>
      ${dotsHtml}`;
    row.appendChild(card);
  });

  /* animate progress bars */
  requestAnimationFrame(() => {
    row.querySelectorAll('.mc-bar-fill[data-width]').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  });

/* ═══════════════════════════════════════════════════════════

    const col = document.createElement('div');

    col.dataset.color = m.color;
    const isActive = mi === activeModule;
    const isDone = m.status === 'done';
    const isQueued = m.status === 'queued';

    /* collapsed state for inactive modules */
    if (!isActive && isQueued) {
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#9654;</span>${m.subs.length} sub-modules &middot; queued
        <span class="tc-count">${m.subs.length}</span></div>`;

      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#10003;</span>${m.subs.length} sub-modules &middot; complete
        <span class="tc-count">${m.subs.length}/${m.subs.length}</span></div>`;
    } else {
      /* full tree rendering */
      let html = '<ul class="tree-list">';
      m.subs.forEach((s, si) => {
        const stateClass = s.state === 'done' ? 'done' : s.state === 'active' ? 'active' : 'pending';
        const isExpanded = expandedSub && expandedSub.mi === mi && expandedSub.si === si;
        const expandClass = isExpanded ? ' expanded' : '';
        const chk = s.state === 'done' ? '<span class="tree-check">&#10003;</span>' : '';
        const timeHtml = s.time && s.time !== '--'
          ? `<span class="tree-time">${s.time}</span>` : '';

        html += `<li class="tree-node ${stateClass}${expandClass}" data-mi="${mi}" data-si="${si}">
          <div class="tree-sub" onclick="toggleSub(${mi},${si})">
            <span class="tree-dot"></span>
            <span class="tree-sub-label">${s.label}</span>
            ${chk}${timeHtml}
            <span class="tree-chevron">&#8250;</span>
          </div>
          <div class="tree-detail">
            ${renderDetailContent(s, m.color)}
          </div>`;

        /* 2nd-level children (e.g., artifact sub-items) */
        if (s.children && s.children.length && isExpanded) {
          html += '<ul class="tree-children">';
          s.children.forEach((ch, ci) => {
            const cState = ch.state === 'done' ? 'done' : ch.state === 'active' ? 'active' : 'pending';
            const cExp = expandedChild && expandedChild.mi === mi && expandedChild.si === si && expandedChild.ci === ci;
            const cExpClass = cExp ? ' expanded' : '';
            const cChk = ch.state === 'done' ? '<span class="tree-check" style="font-size:9px">&#10003;</span>' : '';

            html += `<li class="tree-child-node ${cState}${cExpClass}" data-mi="${mi}" data-si="${si}" data-ci="${ci}">
              <div class="tree-child-sub" onclick="event.stopPropagation();toggleChild(${mi},${si},${ci})">
                <span class="tree-child-dot"></span>
                <span class="tree-sub-label">${ch.label}</span>
                ${cChk}
                <span class="tree-chevron">&#8250;</span>
              </div>
              <div class="tree-child-detail">
                ${renderDetailContent(ch, m.color)}
              </div>
            </li>`;
          });
          html += '</ul>';
        }

        html += '</li>';
      });
      html += '</ul>';
      col.innerHTML = html;
    }

    area.appendChild(col);

    /* staggered entrance animation */
    if (isActive || (!isQueued && !isDone) || isDone) {
      requestAnimationFrame(() => {
        setTimeout(() => {
          col.classList.add('visible');
          let delay = 0;
          col.querySelectorAll('.tree-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 70;
          });
          col.querySelectorAll('.tree-child-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 55;
          });
        }, isActive ? 30 : 150);
      });
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   Render: Accordion Detail Content
   ═══════════════════════════════════════════════════════════ */
function renderDetailContent(node, colorIdx) {
  const c = COLORS[colorIdx - 1];
  let html = '';

  /* summary */
  if (node.summary) {
    html += `<div class="td-summary">${node.summary}</div>`;
  }

  /* mini progress bar */
  if (typeof node.progress === 'number' && node.progress > 0 && node.progress < 100) {
    html += `<div class="td-progress"><div class="td-progress-fill" style="width:${node.progress}%;background:${c}"></div></div>`;
  }

  /* stat pills */
  if (node.stats && node.stats.length) {
    html += '<div class="td-stats">';
    node.stats.forEach(st => {
      html += `<div class="td-stat"><span class="ts-dot" style="background:${c}"></span><strong>${st.value}</strong> ${st.label}</div>`;
    });
    html += '</div>';
  }

  /* item rows */
  if (node.items && node.items.length) {
    html += '<div class="td-items">';
    node.items.forEach(it => {
      const dotColor = it.done ? 'var(--s500)' : (it.running ? c : 'var(--s700)');
      const cls = it.running ? ' running' : (it.done ? ' done' : ' pending');
      html += `<div class="td-item${cls}">
        <span class="tdi-dot" style="background:${dotColor}"></span>
        <span class="tdi-label">${it.label}</span>
        <span class="tdi-meta">${it.meta}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

/* ═══════════════════════════════════════════════════════════
   Interaction Handlers
   ═══════════════════════════════════════════════════════════ */
function selectModule(mi) {
  if (mi === activeModule) return;
  activeModule = mi;
  expandedSub = null;
  expandedChild = null;
  updateBreadcrumb();
  renderModuleCards();
  renderTreeColumns();
}

function toggleSub(mi, si) {
  if (mi !== activeModule) {
    activeModule = mi;
    expandedSub = { mi, si };
    expandedChild = null;
    renderModuleCards();
  } else if (expandedSub && expandedSub.mi === mi && expandedSub.si === si) {
    /* collapse */
    expandedSub = null;
    expandedChild = null;
  } else {
    expandedSub = { mi, si };
    expandedChild = null;
  }
  updateBreadcrumb();
  renderTreeColumns();

  /* scroll expanded node into view after animation */
  setTimeout(() => {
    const node = document.querySelector(`.tree-node.expanded`);
    if (node) node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

function toggleChild(mi, si, ci) {
  if (expandedChild && expandedChild.mi === mi && expandedChild.si === si && expandedChild.ci === ci) {
    expandedChild = null;
  } else {
    expandedChild = { mi, si, ci };
  }
  renderTreeColumns();

  setTimeout(() => {
    const node = document.querySelector(`.tree-child-node.expanded`);
    if (node) node.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

/* ═══════════════════════════════════════════════════════════
   Breadcrumb
   ═══════════════════════════════════════════════════════════ */
function updateBreadcrumb() {
  const el = document.getElementById('breadcrumbActive');
  const m = MODULES[activeModule];
  let text = m.label;
  if (expandedSub) {
    const s = m.subs[expandedSub.si];
    if (s) text = m.label + ' > ' + s.label;
    if (expandedChild && s && s.children) {
      const ch = s.children[expandedChild.ci];
      if (ch) text += ' > ' + ch.label;
    }
  }
  el.textContent = text;
}

/* ═══════════════════════════════════════════════════════════
   Keyboard Navigation
   ═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  const m = MODULES[activeModule];

  switch (e.key) {
    case 'ArrowRight': {
      e.preventDefault();
      const next = Math.min(activeModule + 1, MODULES.length - 1);
      if (next !== activeModule) selectModule(next);
      break;
    }
    case 'ArrowLeft': {
      e.preventDefault();
      const prev = Math.max(activeModule - 1, 0);
      if (prev !== activeModule) selectModule(prev);
      break;
    }
    case 'ArrowDown': {
      e.preventDefault();
      if (!expandedSub) {
        /* open first (or active) sub */
        const idx = m.subs.findIndex(s => s.state === 'active');
        toggleSub(activeModule, idx >= 0 ? idx : 0);
      } else if (expandedChild) {
        /* move to next child */
        const s = m.subs[expandedSub.si];
        if (s && s.children) {
          const nextCi = Math.min(expandedChild.ci + 1, s.children.length - 1);
          if (nextCi !== expandedChild.ci) {
            expandedChild = { mi: activeModule, si: expandedSub.si, ci: nextCi };
            updateBreadcrumb();
            renderTreeColumns();
          }
        }
      } else {
        /* move to next sub */
        const nextSi = Math.min(expandedSub.si + 1, m.subs.length - 1);
        if (nextSi !== expandedSub.si) {
          expandedSub = { mi: activeModule, si: nextSi };
          expandedChild = null;
          updateBreadcrumb();
          renderTreeColumns();
        }
      }
      break;
    }
    case 'ArrowUp': {
      e.preventDefault();
      if (expandedChild) {
        if (expandedChild.ci > 0) {
          expandedChild = { mi: activeModule, si: expandedSub.si, ci: expandedChild.ci - 1 };
          updateBreadcrumb();
          renderTreeColumns();
        } else {
          expandedChild = null;
          updateBreadcrumb();
          renderTreeColumns();
        }
      } else if (expandedSub) {
        if (expandedSub.si > 0) {
          expandedSub = { mi: activeModule, si: expandedSub.si - 1 };
          expandedChild = null;
          updateBreadcrumb();
          renderTreeColumns();
        } else {
          expandedSub = null;
          expandedChild = null;
          updateBreadcrumb();
          renderTreeColumns();
        }
      }
      break;
    }
    case 'Enter': {
      e.preventDefault();
      if (expandedSub) {
        const s = m.subs[expandedSub.si];
        if (s && s.children && s.children.length) {
          if (!expandedChild) {
            /* open first child */
            const ci = s.children.findIndex(c => c.state === 'active');
            expandedChild = { mi: activeModule, si: expandedSub.si, ci: ci >= 0 ? ci : 0 };
          } else {
            expandedChild = null;
          }
          updateBreadcrumb();
          renderTreeColumns();
        }
      } else {
        const idx = m.subs.findIndex(s => s.state === 'active');
        toggleSub(activeModule, idx >= 0 ? idx : 0);
      }
      break;
    }
    case 'Escape': {
      e.preventDefault();
      if (expandedChild) {
        expandedChild = null;
        updateBreadcrumb();
        renderTreeColumns();
      } else if (expandedSub) {
        expandedSub = null;
        expandedChild = null;
        updateBreadcrumb();
        renderTreeColumns();
      }
      break;
    }
  }
});

/* ═══════════════════════════════════════════════════════════
   Background Canvas -- subtle floating particles + links
   ═══════════════════════════════════════════════════════════ */
function initBgCanvas() {
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const COUNT = 45;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.18,
      dy: (Math.random() - 0.5) * 0.12,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      alpha: Math.random() * 0.12 + 0.03,
    });
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    /* move + draw particles */
    for (const p of particles) {
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;

      /* core dot */
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();

      /* soft glow halo */
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha * 0.15;
      ctx.fill();
    }

    /* faint connector lines */
    ctx.lineWidth = 0.5;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = particles[i].color;
          ctx.globalAlpha = (1 - dist / 140) * 0.035;
          ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  frame();
}

/* ═══════════════════════════════════════════════════════════
   Simulated Progress Updates
   ═══════════════════════════════════════════════════════════ */
let simTick = 0;
function simulateProgress() {
  simTick++;

  /* advance ablation meta text periodically */
  if (simTick % 100 === 0) {
    const inv = MODULES[2];
    const art = inv.subs[3];
    if (art && art.children) {
      const ablation = art.children[3];
      if (ablation && ablation.state === 'active') {
        const item = ablation.items[0];
        if (item.meta === '5/8 papers') {
          item.meta = '6/8 papers';
          ablation.stats[0].value = '6/8';
          ablation.progress = 75;
        } else if (item.meta === '6/8 papers') {
          item.meta = '7/8 papers';
          ablation.stats[0].value = '7/8';
          ablation.progress = 87;
        }
        /* re-render if this accordion is visible */
        if (expandedChild && expandedChild.ci === 3) {
          renderTreeColumns();
        }
      }
    }
  }

  /* update elapsed time display */
  const baseS = 22 * 60 + 18;
  const elapsed = baseS + Math.floor(simTick / 2);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  const hTime = document.getElementById('hTime');
  if (hTime) hTime.textContent = mins + 'm ' + (secs < 10 ? '0' : '') + secs + 's';

  /* update cost */
  const baseCost = 4.71;
  const cost = baseCost + simTick * 0.0008;
  const hCost = document.getElementById('hCost');
  if (hCost) hCost.textContent = cost.toFixed(2);

  /* update tokens */
  const baseTokens = 438;
  const tokens = baseTokens + Math.floor(simTick * 0.1);
  const hTokens = document.getElementById('hTokens');
  if (hTokens) hTokens.textContent = tokens + 'k';

  /* update ring progress */
  const progress = 58 + Math.min(simTick * 0.008, 12);
  const circ = 87.96;
  const offset = circ * (1 - progress / 100);
  const ringFill = document.getElementById('ringFill');
  const ringLabel = document.getElementById('ringLabel');
  if (ringFill) ringFill.setAttribute('stroke-dashoffset', offset.toFixed(2));
  if (ringLabel) ringLabel.textContent = Math.round(progress) + '%';

  /* update module card progress bar slowly */
  if (simTick % 20 === 0) {
    const inv = MODULES[2];
    if (inv.progress < 68) {
      inv.progress += 0.5;
      const fill = document.querySelector('.mod-card.active .mc-bar-fill');
      if (fill) fill.style.width = inv.progress + '%';
    }
  }

  setTimeout(simulateProgress, 500);
}

/* ═══════════════════════════════════════════════════════════
   Init
   ═══════════════════════════════════════════════════════════ */
function init() {
  renderModuleCards();
  renderTreeColumns();
  updateBreadcrumb();
  initBgCanvas();
  simulateProgress();
}

init();
</script>
