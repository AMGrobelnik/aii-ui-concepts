<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Chevron Breadcrumb Path</title>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0c10;
    --bg-card: #12151c;
    --bg-card-hover: #181c26;
    --border-subtle: #1e2330;
    --text-primary: #e2e6f0;
    --text-secondary: #8891a5;
    --text-dim: #555d72;

    --color-seed: #6c5ce7;
    --color-seed-dark: #4a3db5;
    --color-hypo: #0984e3;
    --color-hypo-dark: #0667b3;
    --color-invention: #00b894;
    --color-invention-dark: #008e70;
    --color-paper: #e17055;
    --color-paper-dark: #b8553f;

    --chevron-height: 54px;
    --chevron-arrow: 22px;
    --chevron-gap: 3px;
    --strip-height: 68px;

    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Top Strip ─── */
  .top-strip {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--strip-height);
    background: linear-gradient(180deg, #0e1017 0%, #0c0e14 100%);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    backdrop-filter: blur(12px);
  }

  .top-strip::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 5%,
      var(--color-seed) 20%,
      var(--color-hypo) 40%,
      var(--color-invention) 60%,
      transparent 80%
    );
    opacity: 0.3;
  }

  /* ─── Chevron Path Container ─── */
  .chevron-path {
    display: flex;
    align-items: center;
    gap: var(--chevron-gap);
    position: relative;
  }

  /* ─── Individual Chevron ─── */
  .chevron {
    position: relative;
    height: var(--chevron-height);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 28px 0 32px;
    cursor: pointer;
    transition: transform 0.2s var(--ease-smooth), filter 0.2s var(--ease-smooth);
    user-select: none;
    min-width: 155px;
  }

  .chevron:first-child { padding-left: 20px; }
  .chevron:first-child .chevron-bg { border-radius: 6px 0 0 6px; }
  .chevron:first-child .chevron-bg::before { display: none; }

  .chevron:last-child .chevron-bg { border-radius: 0 6px 6px 0; }
  .chevron:last-child .chevron-bg::after { display: none; }

  .chevron:hover { transform: translateY(-1px); filter: brightness(1.1); }

  /* ─── Chevron Background Shape ─── */
  .chevron-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  /* Arrow notch on the left */
  .chevron-bg::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: var(--chevron-arrow);
    height: 100%;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    background: var(--bg-primary);
    z-index: 2;
  }

  /* Arrow point on the right */
  .chevron-bg::after {
    content: '';
    position: absolute;
    right: calc(-1 * var(--chevron-arrow));
    top: 0;
    width: var(--chevron-arrow);
    height: 100%;
    clip-path: polygon(0 0, 100% 50%, 0 100%);
    z-index: 3;
  }

  .chevron-content {
    position: relative;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding-left: 8px;
  }

  .chevron-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .chevron-metric {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
    opacity: 0.85;
  }

  .chevron-status {
    font-size: 11px;
    line-height: 1;
  }

  /* ─── Chevron States ─── */

  /* Complete */
  .chevron.complete .chevron-bg {
    background: var(--stage-color);
    opacity: 0.85;
  }
  .chevron.complete .chevron-bg::after {
    background: var(--stage-color);
    opacity: 0.85;
  }
  .chevron.complete .chevron-label { color: #fff; }
  .chevron.complete .chevron-metric { color: rgba(255,255,255,0.9); }
  .chevron.complete .chevron-status { color: rgba(255,255,255,0.7); }

  /* Active */
  .chevron.active .chevron-bg {
    background: var(--stage-color);
  }
  .chevron.active .chevron-bg::after {
    background: var(--stage-color);
  }
  .chevron.active .chevron-label { color: #fff; }
  .chevron.active .chevron-metric { color: rgba(255,255,255,0.95); }

  /* Active gradient sweep */
  .chevron.active .chevron-bg::before {
    background: var(--bg-primary);
  }
  .chevron.active .chevron-sweep {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }
  .chevron.active .chevron-sweep::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.12) 30%,
      rgba(255, 255, 255, 0.22) 50%,
      rgba(255, 255, 255, 0.12) 70%,
      transparent
    );
    animation: chevronSweep 2.8s ease-in-out infinite;
  }

  @keyframes chevronSweep {
    0%   { left: -60%; }
    100% { left: 120%; }
  }

  /* Active pulse glow under the chevron */
  .chevron.active::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 20%;
    right: 10%;
    height: 6px;
    background: var(--stage-color);
    filter: blur(6px);
    opacity: 0.5;
    animation: chevronGlow 2s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes chevronGlow {
    0%   { opacity: 0.3; }
    100% { opacity: 0.65; }
  }

  /* Pending */
  .chevron.pending .chevron-bg {
    background: transparent;
    border: 1.5px solid var(--border-subtle);
    border-right: none;
  }
  .chevron.pending .chevron-bg::after {
    background: transparent;
    /* Draw arrow outline for pending */
    box-shadow: none;
  }
  .chevron.pending .chevron-label { color: var(--text-dim); }
  .chevron.pending .chevron-metric { color: var(--text-dim); opacity: 0.5; }

  /* Pending outline arrow */
  .chevron.pending .chevron-outline-arrow {
    position: absolute;
    right: calc(-1 * var(--chevron-arrow));
    top: 0;
    width: var(--chevron-arrow);
    height: 100%;
    z-index: 3;
  }
  .chevron.pending .chevron-outline-arrow svg {
    width: 100%;
    height: 100%;
  }

  /* Stage-specific colors */
  .chevron[data-stage="seed"]      { --stage-color: var(--color-seed); }
  .chevron[data-stage="hypo"]      { --stage-color: var(--color-hypo); }
  .chevron[data-stage="invention"] { --stage-color: var(--color-invention); }
  .chevron[data-stage="paper"]     { --stage-color: var(--color-paper); }

  /* Selected/navigation highlight ring */
  .chevron.nav-selected {
    z-index: 10;
  }
  .chevron.nav-selected .chevron-ring {
    position: absolute;
    inset: -3px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 8px;
    pointer-events: none;
    animation: ringPulse 1.5s ease-in-out infinite alternate;
  }

  @keyframes ringPulse {
    0%   { border-color: rgba(255, 255, 255, 0.3); }
    100% { border-color: rgba(255, 255, 255, 0.6); }
  }

  /* ─── Navigation Hints ─── */
  .nav-hints {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    background: rgba(18, 21, 28, 0.9);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 8px 18px;
    backdrop-filter: blur(10px);
    z-index: 200;
  }

  .nav-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--text-dim);
  }

  .nav-key {
    background: #1a1e2a;
    border: 1px solid #2a2f3e;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    font-family: inherit;
    min-width: 22px;
    text-align: center;
  }

  /* ─── Content Area ─── */
  .content-area {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .stage-header {
    margin-bottom: 28px;
    animation: fadeSlide 0.35s var(--ease-smooth);
  }

  .stage-header h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stage-header h1 .stage-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }

  .stage-header p {
    font-size: 13.5px;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 640px;
  }

  @keyframes fadeSlide {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ─── Cards Grid ─── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    animation: fadeSlide 0.4s var(--ease-smooth) 0.05s both;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 18px 20px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: default;
  }

  .card:hover {
    background: var(--bg-card-hover);
    border-color: #282e40;
    transform: translateY(-1px);
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .card-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* ─── Progress Bar (for active stage) ─── */
  .progress-bar-wrap {
    background: #1a1e2a;
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
    margin-top: 12px;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s var(--ease-smooth);
    position: relative;
  }

  .progress-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 30px;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25));
    border-radius: 0 6px 6px 0;
    animation: barShimmer 1.5s ease-in-out infinite alternate;
  }

  @keyframes barShimmer {
    0%   { opacity: 0.3; }
    100% { opacity: 0.9; }
  }

  /* ─── Detail Rows ─── */
  .detail-section {
    margin-top: 24px;
    animation: fadeSlide 0.4s var(--ease-smooth) 0.1s both;
  }

  .detail-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .detail-rows {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .detail-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    transition: background 0.15s;
  }

  .detail-row:hover { background: var(--bg-card-hover); }

  .detail-row-label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .detail-row-value {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  /* ─── Status Badges ─── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 5px;
    letter-spacing: 0.3px;
  }

  .badge-complete {
    background: rgba(0, 184, 148, 0.12);
    color: #00b894;
  }

  .badge-active {
    background: rgba(9, 132, 227, 0.12);
    color: #74b9ff;
  }

  .badge-pending {
    background: rgba(85, 93, 114, 0.15);
    color: var(--text-dim);
  }

  /* ─── Item List (hypotheses, plans, etc) ─── */
  .item-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
    animation: fadeSlide 0.4s var(--ease-smooth) 0.15s both;
  }

  .item-entry {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: background 0.15s, border-color 0.15s;
  }

  .item-entry:hover {
    background: var(--bg-card-hover);
    border-color: #282e40;
  }

  .item-rank {
    font-size: 18px;
    font-weight: 800;
    color: var(--text-dim);
    min-width: 24px;
    text-align: center;
    padding-top: 2px;
  }

  .item-body {
    flex: 1;
  }

  .item-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .item-desc {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .item-meta {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .item-tag {
    font-size: 11px;
    color: var(--text-dim);
    background: #181c26;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .item-score {
    font-size: 20px;
    font-weight: 800;
    min-width: 38px;
    text-align: center;
    padding-top: 4px;
    letter-spacing: -0.5px;
  }

  /* ─── Transition wrapper ─── */
  .content-view {
    transition: opacity 0.2s var(--ease-smooth);
  }

  .content-view.fading { opacity: 0; transform: translateY(4px); }

  /* ─── Responsive ─── */
  @media (max-width: 700px) {
    .chevron { min-width: 120px; padding: 0 18px 0 22px; }
    .chevron-label { font-size: 10px; }
    .chevron-metric { font-size: 11px; }
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* ─── Fonts ─── */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
</style>
</head>

// ─── State ───
let currentIndex = 0;
const chevrons = document.querySelectorAll('.chevron');
const contentView = document.getElementById('contentView');

// ─── Render Content ───
function renderContent(idx) {
  const s = stages[idx];

  let html = `
    <div class="stage-header">
      <h1><span class="stage-dot" style="background: ${s.color}"></span>${s.title}</h1>
      <p>${s.desc}</p>
    </div>

    <div class="cards-grid">
      ${s.cards.map(c => `
        <div class="card">
          <div class="card-title">${c.title}</div>
          <div class="card-value" style="color: ${s.color}">${c.value}</div>
          <div class="card-sub">${c.sub}</div>
        </div>
      `).join('')}
    </div>
  `;

  if (s.progress) {
    html += `
      <div style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 6px;">
          <span style="font-size: 12px; color: var(--text-secondary);">${s.progress.label}</span>
          <span style="font-size: 12px; font-weight: 700; color: ${s.color};">${s.progress.pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width: ${s.progress.pct}%; background: ${s.color};"></div>
        </div>
      </div>
    `;
  }

  if (s.details) {
    const statusBadge = (val) => {
      const v = val.toLowerCase();
      if (v === 'complete') return `<span class="badge badge-complete">&#10003; ${val}</span>`;
      if (v === 'in progress') return `<span class="badge badge-active">&#9654; ${val}</span>`;
      if (v === 'pending') return `<span class="badge badge-pending">&#9675; ${val}</span>`;
      return `<span class="detail-row-value">${val}</span>`;
    };

    html += `
      <div class="detail-section">
        <div class="detail-section-title">${s.details.title}</div>
        <div class="detail-rows">
          ${s.details.rows.map(r => `
            <div class="detail-row">
              <span class="detail-row-label">${r.label}</span>
              ${statusBadge(r.value)}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  if (s.items.length > 0) {
    html += `
      <div class="item-list">
        ${s.items.map(it => `
          <div class="item-entry">
            <div class="item-rank">${it.rank}</div>
            <div class="item-body">
              <div class="item-title">${it.title}</div>
              <div class="item-desc">${it.desc}</div>
              <div class="item-meta">
                ${it.tags.map(t => `<span class="item-tag">${t}</span>`).join('')}
              </div>
            </div>
            <div class="item-score" style="color: ${it.scoreColor}">${it.score}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  contentView.innerHTML = html;
}

// ─── Update Chevron Selection ───
function updateChevrons(idx) {
  chevrons.forEach((ch, i) => {
    ch.classList.remove('nav-selected');
    // Remove any existing ring
    const ring = ch.querySelector('.chevron-ring');
    if (ring) ring.remove();
  });

  chevrons[idx].classList.add('nav-selected');
  const ring = document.createElement('div');
  ring.className = 'chevron-ring';
  chevrons[idx].appendChild(ring);
}

// ─── Navigate ───
function navigateTo(idx) {
  if (idx < 0 || idx >= stages.length || idx === currentIndex) return;

  contentView.classList.add('fading');
  setTimeout(() => {
    currentIndex = idx;
    updateChevrons(idx);
    renderContent(idx);
    contentView.classList.remove('fading');
  }, 150);
}

// ─── Keyboard Nav ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    navigateTo(currentIndex + 1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    navigateTo(currentIndex - 1);
  } else if (e.key >= '1' && e.key <= '4') {
    e.preventDefault();
    navigateTo(parseInt(e.key) - 1);
  }
});

// ─── Click Nav ───
chevrons.forEach((ch, i) => {
  ch.addEventListener('click', () => navigateTo(i));
});

// ─── Init ───
updateChevrons(0);
renderContent(0);
</script>
