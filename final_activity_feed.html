<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; align-items: center; justify-content: center;
}

/* ===== FEED CONTAINER ===== */
.feed-container {
  width: 420px;
  background: var(--surface-card);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}
.feed-container::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
}

/* ===== HEADER ===== */
.feed-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.feed-title {
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: .6px; font-weight: 600;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; font-weight: 800; color: var(--red);
  background: var(--red-dim); padding: 2px 8px 2px 6px;
  border-radius: 4px; letter-spacing: .6px; text-transform: uppercase;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: blink 1.3s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

/* ===== FEED LIST ===== */
.feed-list {
  padding: 8px;
  max-height: 400px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 3px;
}
.feed-list::-webkit-scrollbar { width: 3px; }
.feed-list::-webkit-scrollbar-track { background: transparent; }
.feed-list::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

/* ===== FEED ROW ===== */
.feed-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 11.5px;
  transition: all .15s;
}
.feed-row:hover { background: rgba(255,255,255,.02); }

/* Time */
.feed-time {
  font-size: 9px; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500; flex-shrink: 0;
}

/* Type pill — rounded, with subtle glow */
.feed-pill {
  font-size: 8px; font-weight: 700;
  padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .2px;
  flex-shrink: 0;
  transition: all .15s;
}
.feed-row:hover .feed-pill {
  filter: brightness(1.3);
  transform: scale(1.04);
}

/* Summary text */
.feed-text {
  color: var(--text-dim); flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
</style>
</head>
<body>

<div class="feed-container">
  <div class="feed-header">
    <span class="feed-title">Activity</span>
    <span class="live-badge"><span class="live-dot"></span> LIVE</span>
  </div>
  <div class="feed-list" id="feedList"></div>
</div>

<script>
/* ── Category config ── */
const CATEGORIES = {
  tool:     { color: '#60a5fa', bg: 'rgba(96,165,250,.12)',  glow: 'rgba(96,165,250,.3)',  label: 'tool' },
  result:   { color: '#a78bfa', bg: 'rgba(167,139,250,.12)', glow: 'rgba(167,139,250,.3)', label: 'result' },
  progress: { color: '#34d399', bg: 'rgba(52,211,153,.12)',  glow: 'rgba(52,211,153,.3)',  label: 'prog' },
  metric:   { color: '#22d3ee', bg: 'rgba(34,211,238,.12)',  glow: 'rgba(34,211,238,.3)',  label: 'metric' },
  warning:  { color: '#fb923c', bg: 'rgba(251,146,60,.12)',  glow: 'rgba(251,146,60,.3)',  label: 'warn' },
  thinking: { color: '#a78bfa', bg: 'rgba(167,139,250,.12)', glow: 'rgba(167,139,250,.3)', label: 'think' },
};

/* ── Render a feed item ── */
function renderEvent(time, category, text) {
  const cat = CATEGORIES[category] || CATEGORIES.progress;
  const row = document.createElement('div');
  row.className = 'feed-row';
  row.innerHTML =
    `<span class="feed-time">${time}</span>` +
    `<span class="feed-pill" style="background:${cat.bg};color:${cat.color};box-shadow:0 0 6px ${cat.glow}">${cat.label}</span>` +
    `<span class="feed-text">${text}</span>`;
  return row;
}

/* ── Demo data (real summaries from pipeline) ── */
const DEMO = [
  { time: '12:04', cat: 'tool',     text: 'Add head_direction_ratio to regression subset' },
  { time: '12:03', cat: 'thinking', text: 'Use absolute paths, inspect full data' },
  { time: '12:02', cat: 'tool',     text: 'Read grammar, build treebank set and genre map' },
  { time: '12:01', cat: 'result',   text: 'Saved 58KB report, increased to 185KB' },
  { time: '11:58', cat: 'metric',   text: 'Track 95k context usage for exp_id3_it2__opus' },
  { time: '11:55', cat: 'result',   text: 'Completed 7 turns, 393.8K\u219217.5K, $0.99' },
  { time: '11:51', cat: 'warning',  text: 'Remind 112.7 minutes left to finish tasks' },
  { time: '11:47', cat: 'warning',  text: 'Retry paper text after timeout, fork resume' },
  { time: '11:42', cat: 'result',   text: 'Created pyproject.toml for exp_id1_it2__opus' },
  { time: '11:38', cat: 'progress', text: 'Split script into 4 sections, add 4 markdowns' },
];

const list = document.getElementById('feedList');
DEMO.forEach(e => list.appendChild(renderEvent(e.time, e.cat, e.text)));
</script>
</body>
</html>
