<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor - Big Ring + Capsule Expansion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1d23; --surface: #22262e; --border: #2e3440;
    --text: #e2e4e9; --muted: #8b919a;
    --green: #22c55e; --purple: #a78bfa; --blue: #3b82f6; --orange: #f59e0b;
    --gray: #3e4451;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
    height: 100vh; overflow: hidden;
  }

  .layout {
    display: grid;
    grid-template-columns: 200px 1fr;
    grid-template-rows: auto auto 1fr;
    height: 100vh;
  }

  /* ── Left Panel: Big Ring ── */
  .ring-panel {
    grid-column: 1; grid-row: 1 / 4;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 24px;
    border-right: 1px solid var(--border); background: var(--surface);
  }
  .ring-wrap { position: relative; width: 160px; height: 160px; margin-bottom: 12px; }
  .ring-svg { width: 160px; height: 160px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-seg {
    fill: none; stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  }
  .ring-seg.dim { opacity: 0.25; }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .ring-pct {
    font-size: 36px; font-weight: 700; letter-spacing: -1.5px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .ring-label-text {
    font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.2px; font-weight: 500;
  }

  /* Legend under ring */
  .legend { width: 100%; display: flex; flex-direction: column; gap: 4px; margin-top: 16px; }
  .legend-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    font-size: 12px; color: var(--muted);
  }
  .legend-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .legend-item.active { background: rgba(255,255,255,0.06); color: var(--text); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-count { margin-left: auto; font-size: 10px; font-weight: 600; opacity: 0.5; }

  /* Timing info */
  .run-stats {
    margin-top: auto; width: 100%; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .stat-line {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--muted);
  }
  .stat-val { color: var(--text); font-weight: 600; }

  /* ── Row 1: Mini Ring Gauges ── */
  .module-row {
    grid-column: 2; grid-row: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 18px 32px 14px; gap: 0;
    border-bottom: 1px solid var(--border); background: var(--surface);
    position: relative; z-index: 20;
  }
  .mod-node {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    cursor: pointer; position: relative; z-index: 2; transition: all 0.25s;
  }
  .mod-ring-wrap { position: relative; width: 40px; height: 40px; }
  .mod-ring-svg { width: 40px; height: 40px; transform: rotate(-90deg); }
  .mod-ring-track { fill: none; stroke: var(--border); stroke-width: 3.5; }
  .mod-ring-fill {
    fill: none; stroke-width: 3.5; stroke-linecap: round;
    stroke-dasharray: 100.53; stroke-dashoffset: 100.53;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .mod-ring-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; pointer-events: none;
  }
  .mod-label {
    font-size: 10px; color: var(--muted); font-weight: 500;
    transition: color 0.2s; white-space: nowrap;
  }
  .mod-node.selected .mod-label { color: var(--text); }
  .mod-node.selected .mod-ring-wrap {
    filter: drop-shadow(0 0 8px var(--color));
  }
  .mod-node.pending { opacity: 0.4; }
  .mod-node.active .mod-ring-wrap { animation: modPulse 2.5s ease-in-out infinite; }
  @keyframes modPulse {
    0%, 100% { filter: drop-shadow(0 0 4px var(--color)); }
    50% { filter: drop-shadow(0 0 14px var(--color)); }
  }

  /* Connector space between modules */
  .mod-connector { width: 72px; height: 40px; position: relative; z-index: 1; flex-shrink: 0; }

  /* ── Row 2: Sub-step Dots + Capsule Expansion ── */
  .sub-row {
    grid-column: 2; grid-row: 2;
    display: flex; align-items: center; justify-content: center;
    padding: 10px 24px; gap: 6px;
    border-bottom: 1px solid var(--border);
    background: color-mix(in srgb, var(--surface) 70%, var(--bg));
    position: relative; z-index: 15;
    min-height: 44px;
    transition: opacity 0.3s, min-height 0.35s;
  }
  .sub-row.collapsed { min-height: 0; padding: 0 24px; opacity: 0; overflow: hidden; }

  .sub-item {
    display: flex; align-items: center; gap: 0;
    position: relative;
  }
  .sub-dot-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; transition: all 0.25s; position: relative;
  }
  .sub-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid transparent; transition: all 0.3s;
    flex-shrink: 0;
  }
  .sub-dot.completed { background: var(--color); border-color: var(--color); opacity: 0.85; }
  .sub-dot.active {
    background: color-mix(in srgb, var(--color) 25%, transparent);
    border-color: var(--color);
    box-shadow: 0 0 8px var(--color);
    animation: subPulse 2s ease-in-out infinite;
  }
  .sub-dot.pending { border-color: var(--gray); opacity: 0.4; }
  .sub-dot.selected {
    transform: scale(1.35);
    box-shadow: 0 0 12px var(--color), 0 0 24px color-mix(in srgb, var(--color) 30%, transparent);
  }
  .sub-dot-label {
    font-size: 8px; color: var(--muted); white-space: nowrap;
    transition: color 0.2s, opacity 0.25s;
    max-width: 60px; overflow: hidden; text-overflow: ellipsis; text-align: center;
  }
  .sub-dot-wrap.sel .sub-dot-label { color: var(--text); font-weight: 600; }
  .sub-dot-wrap.has-children .sub-dot { cursor: pointer; }
  .sub-dot-wrap.has-children .sub-dot::after {
    content: '+'; position: absolute;
    font-size: 7px; font-weight: 700; color: var(--muted);
    bottom: -1px; right: -4px; pointer-events: none;
    transition: opacity 0.2s;
  }
  .sub-dot-wrap.expanded .sub-dot::after { opacity: 0; }

  .sub-connector { width: 16px; height: 1px; background: var(--border); flex-shrink: 0; }

  @keyframes subPulse {
    0%, 100% { box-shadow: 0 0 6px var(--color); }
    50% { box-shadow: 0 0 14px var(--color); }
  }

  /* ── Capsule: inline expansion of a sub-dot ── */
  .capsule {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 4px 12px;
    height: 36px; min-width: 0; max-width: 0;
    overflow: hidden; opacity: 0;
    transition: max-width 0.4s cubic-bezier(0.4,0,0.2,1),
                min-width 0.4s cubic-bezier(0.4,0,0.2,1),
                padding 0.3s ease,
                opacity 0.3s ease;
    white-space: nowrap; flex-shrink: 0;
  }
  .capsule.open {
    min-width: 220px; max-width: 500px;
    opacity: 1; padding: 4px 14px;
  }
  .capsule-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; cursor: pointer;
    transition: all 0.2s; position: relative;
  }
  .capsule-dot.completed { opacity: 0.85; }
  .capsule-dot.active {
    box-shadow: 0 0 6px currentColor;
    animation: capPulse 2s ease-in-out infinite;
  }
  .capsule-dot.pending { opacity: 0.35; }
  .capsule-dot.selected {
    transform: scale(1.6);
    box-shadow: 0 0 8px currentColor, 0 0 16px color-mix(in srgb, currentColor 30%, transparent);
  }
  .capsule-dot:hover { transform: scale(1.4); }
  .capsule-label {
    font-size: 9px; color: var(--muted); font-weight: 500;
    max-width: 0; overflow: hidden;
    transition: max-width 0.3s ease, opacity 0.2s;
    opacity: 0; white-space: nowrap;
  }
  .capsule-dot:hover + .capsule-label,
  .capsule-dot.selected + .capsule-label {
    max-width: 120px; opacity: 1;
  }
  .capsule-sep {
    width: 1px; height: 14px; background: var(--border);
    flex-shrink: 0; margin: 0 2px;
  }
  @keyframes capPulse {
    0%, 100% { box-shadow: 0 0 4px currentColor; }
    50% { box-shadow: 0 0 10px currentColor; }
  }

  /* ── Particle Canvas ── */
  #particleCanvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 25;
  }

  /* ── Content Panel ── */
  .content {
    grid-column: 2; grid-row: 3;
    padding: 24px 36px; overflow-y: auto;
  }
  .content-inner { max-width: 720px; }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 14px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; margin-bottom: 10px; border: 1px solid;
  }
  .title { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
  .summary {
    font-size: 13px; color: var(--muted); line-height: 1.7;
    margin-bottom: 20px; max-width: 640px;
  }
  .detail-rows { display: flex; flex-direction: column; gap: 6px; }
  .detail-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: all 0.3s;
  }
  .detail-card:hover { border-color: #3a3f4e; }
  .detail-card.expanded { box-shadow: 0 2px 20px rgba(0,0,0,.25); }
  .detail-hdr {
    display: flex; align-items: center; padding: 11px 16px;
    cursor: pointer; gap: 12px; transition: background 0.2s;
  }
  .detail-hdr:hover { background: rgba(255,255,255,0.03); }
  .detail-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .detail-name { font-size: 13px; font-weight: 600; flex: 1; }
  .detail-meta { font-size: 11px; color: var(--muted); }
  .detail-chev {
    width: 14px; height: 14px; color: var(--muted);
    transition: transform 0.3s; flex-shrink: 0;
  }
  .detail-card.expanded .detail-chev { transform: rotate(180deg); }
  .detail-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
  .detail-card.expanded .detail-body { max-height: 200px; }
  .detail-text {
    padding: 0 16px 12px 36px; font-size: 12px;
    color: var(--muted); line-height: 1.6;
  }

  .footer {
    margin-top: 20px; font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 12px;
  }
  .nav-hint {
    display: flex; align-items: center; gap: 6px;
    margin-top: 14px; font-size: 11px; color: var(--muted);
    flex-wrap: wrap;
  }
  .key {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 22px; height: 20px; padding: 0 5px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; font-size: 10px; font-weight: 600;
  }
  .nav-sep { margin: 0 4px; opacity: 0.4; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .fade-in { animation: fadeIn 0.35s ease forwards; opacity: 0; }
</style>
</head>
<body>
<div class="layout">

  <!-- Big Ring Panel -->
  <div class="ring-panel">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 160 160">
        <circle class="ring-track" cx="80" cy="80" r="64"/>
        <!-- Segments drawn per-module -->
        <circle id="ringSeg0" class="ring-seg" cx="80" cy="80" r="64" stroke="var(--green)"/>
        <circle id="ringSeg1" class="ring-seg" cx="80" cy="80" r="64" stroke="var(--purple)"/>
        <circle id="ringSeg2" class="ring-seg" cx="80" cy="80" r="64" stroke="var(--blue)"/>
        <circle id="ringSeg3" class="ring-seg" cx="80" cy="80" r="64" stroke="var(--orange)"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="ringPct">0%</div>
        <div class="ring-label-text">Progress</div>
      </div>
    </div>
    <div class="legend" id="legend"></div>
    <div class="run-stats">
      <div class="stat-line"><span>Elapsed</span><span class="stat-val">42m 18s</span></div>
      <div class="stat-line"><span>Cost</span><span class="stat-val">$12.47</span></div>
      <div class="stat-line"><span>Iteration</span><span class="stat-val">2 / 3</span></div>
    </div>
  </div>

  <!-- Row 1: Mini Ring Gauges -->
  <div class="module-row" id="modRow"></div>

  <!-- Row 2: Sub-step Dots (with capsule expansion) -->
  <div class="sub-row" id="subRow"></div>

  <!-- Content -->
  <div class="content">
    <div class="content-inner" id="contentInner"></div>
  </div>

</div>

<canvas id="particleCanvas"></canvas>

<script>
// ============================================================
// DATA
// ============================================================
const CIRC_BIG = 2 * Math.PI * 64;  // big ring
const CIRC_MINI = 2 * Math.PI * 16; // mini ring gauge

const MODULES = [
  {
    id: 'seed', name: 'Seed Hypothesis', short: 'Seed', color: 'var(--green)', raw: '#22c55e',
    status: 'completed', metric: '\u2713', weight: 10,

    steps: [
      { name: 'Mine Papers', status: 'completed', metric: '847 papers',
        detail: 'Extracted papers from OpenAlex API across computational linguistics domain. Filtered by citation count and recency.' },
      { name: 'Build KG', status: 'completed', metric: '2,341 triples',
        detail: 'Constructed knowledge graph from paper abstracts using NER and relation extraction pipelines.' },

    summary: 'Refined hypothesis over 3 iterations of generation and adversarial review. Score improved from 6.2 to 8.4/10.',
    steps: [
      { name: 'Gen Hypo 1', status: 'completed', metric: 'Score 6.2',

      { name: 'Review 2', status: 'completed', metric: '1 major',
        detail: 'Needs convergence analysis. 2 minor: strengthen baselines, tighten abstract.' },
      { name: 'Gen Hypo 3', status: 'completed', metric: 'Score 8.4',
        detail: 'Final refinement. Narrowed to 8 language families. Added convergence analysis.' },
      { name: 'Review 3', status: 'completed', metric: '0 major',
        detail: 'Score 8.4/10. Confidence 4/5. 0 major issues, 2 minor suggestions. Ready for research.' },
    ]
  },
  {
    id: 'inv', name: 'Invention Loop', short: 'Invention', color: 'var(--blue)', raw: '#3b82f6',
    status: 'active', metric: '3/5', weight: 40,
    summary: 'Iteration 2 of 3. Generating artifacts to validate the hypothesis. Baseline shows 17.5% accuracy improvement. Ablation study running.',
    steps: [
      { name: 'Strategy', status: 'completed', metric: 'Selected',
        detail: 'Contrastive alignment with code-switching augmentation. Added ablation experiments per reviewer feedback.' },
      { name: 'Plan', status: 'completed', metric: '5 planned',
        detail: '5 artifacts: 2 experiments, 1 dataset, 1 evaluation, 1 proof. Compute profiles assigned.' },
      { name: 'Artifacts', status: 'active', metric: '3/5',
        detail: '3 complete, 1 running, 1 pending. Contrastive Baseline +17.5%, Multilingual Pairs 2.4k examples, Convergence Proof verified.',
        children: [
          { name: 'Baseline', status: 'completed', metric: 'acc 0.847', time: '4m 32s', cost: '$2.14' },
          { name: 'Dataset', status: 'completed', metric: '2,400 ex', time: '3m 15s', cost: '$1.02' },
          { name: 'Proof', status: 'completed', metric: 'Lean 4', time: '2m 41s', cost: '$0.89' },
          { name: 'Ablation', status: 'active', metric: 'Running', time: '1m 20s', cost: '$1.36' },
          { name: 'Eval', status: 'pending', metric: 'Pending', time: '\u2014', cost: '\u2014' },
        ]
      },
      { name: 'Paper Draft', status: 'pending', metric: '\u2014',
        detail: 'Will synthesize paper from artifact results and experimental data.' },
      { name: 'Review', status: 'pending', metric: '\u2014',
        detail: 'Adversarial review of paper draft. Checks novelty, rigor, and presentation.' },
      { name: 'Update Hypo', status: 'pending', metric: '\u2014',
        detail: 'Refine hypothesis based on experimental findings and reviewer feedback.' },
    ]
  },
  {
    id: 'paper', name: 'Paper & Repository', short: 'Paper', color: 'var(--orange)', raw: '#f59e0b',
    status: 'pending', metric: '\u25CB', weight: 25,
    summary: 'Waiting for Invention Loop to complete. Will generate demos, visualizations, compile LaTeX paper, and deploy to GitHub.',
    steps: [
      { name: 'Gen Repo', status: 'pending', metric: '\u2014',
        detail: 'Initialize GitHub repository with standard research template.' },

        detail: 'Generate interactive artifact demos and baseline comparisons.',
        children: [
          { name: 'Baseline', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
          { name: 'Dataset', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
          { name: 'Proof', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
          { name: 'Ablation', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
          { name: 'Eval', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
        ]
      },
      { name: 'Viz', status: 'pending', metric: '\u2014',
        detail: 'Generate figure visualizations: loss curves, attention maps, language-family heatmaps.',
        children: [
          { name: 'Loss Curves', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
          { name: 'Attn Maps', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
          { name: 'Heatmaps', status: 'pending', metric: '\u2014', time: '\u2014', cost: '\u2014' },
        ]
      },
      { name: 'Full Paper', status: 'pending', metric: '\u2014',
        detail: 'Compile LaTeX paper with all sections, figures, and bibliography.' },
      { name: 'Deploy', status: 'pending', metric: '\u2014',
        detail: 'Push code, data, and compiled PDF to GitHub. Deploy paper landing page.' },
    ]
  }
];

let selMod = 2;
let selStep = 2;
let selChild = -1;   // -1 = no child selected
let expandedStep = -1; // which step's capsule is open (-1 = none)

// ============================================================
// PROGRESS
// ============================================================
function calcProgress() {
  let total = 0, done = 0;
  MODULES.forEach(m => {
    const w = m.weight / m.steps.length;
    m.steps.forEach(s => {
      total += w;
      if (s.status === 'completed') done += w;
      else if (s.status === 'active') done += w * 0.5;
    });
  });
  return Math.round(done / total * 100);
}

// ============================================================
// BIG RING (segmented by module weight)
// ============================================================
function updateBigRing() {
  const pct = calcProgress();
  // Animate counter
  const el = document.getElementById('ringPct');
  let cur = 0; const step = pct / 25;
  const iv = setInterval(() => {
    cur += step;
    if (cur >= pct) { cur = pct; clearInterval(iv); }
    el.textContent = Math.round(cur) + '%';
  }, 30);

  // Draw segments
  const gap = 8; // gap in dasharray units between segments
  let offset = 0;
  MODULES.forEach((m, i) => {
    const seg = document.getElementById('ringSeg' + i);
    const arcLen = (m.weight / 100) * CIRC_BIG;
    const visLen = arcLen - gap;

    // How much of this segment is filled?
    let filled = 0;
    const stepW = 1 / m.steps.length;
    m.steps.forEach(s => {
      if (s.status === 'completed') filled += stepW;
      else if (s.status === 'active') filled += stepW * 0.5;
    });

    const filledLen = visLen * filled;
    seg.style.strokeDasharray = `${filledLen} ${CIRC_BIG}`;
    seg.style.strokeDashoffset = -offset;
    seg.classList.toggle('dim', i !== selMod);
    offset += arcLen;
  });
}

// ============================================================
// LEGEND
// ============================================================
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  MODULES.forEach((m, i) => {
    const done = m.steps.filter(s => s.status === 'completed').length;
    const d = document.createElement('div');
    d.className = 'legend-item' + (i === selMod ? ' active' : '');
    d.innerHTML = `<span class="legend-dot" style="background:${m.color}"></span>
      <span>${m.short}</span>
      <span class="legend-count">${done}/${m.steps.length}</span>`;
    d.onclick = () => selectModule(i);
    el.appendChild(d);
  });
}

// ============================================================
// ROW 1: MINI RING GAUGES
// ============================================================
function buildModuleRow() {
  const row = document.getElementById('modRow');
  row.innerHTML = '';
  MODULES.forEach((m, i) => {
    if (i > 0) {
      const spacer = document.createElement('div');
      spacer.className = 'mod-connector';
      spacer.dataset.connIdx = i - 1;
      row.appendChild(spacer);
    }
    const node = document.createElement('div');
    node.className = `mod-node ${m.status}`;
    node.style.setProperty('--color', m.raw);
    node.dataset.idx = i;
    if (i === selMod) node.classList.add('selected');

    // Mini ring gauge SVG
    let filled = 0;
    const stepW = 1 / m.steps.length;
    m.steps.forEach(s => {
      if (s.status === 'completed') filled += stepW;
      else if (s.status === 'active') filled += stepW * 0.5;
    });
    const fillDash = CIRC_MINI * filled;

    node.innerHTML = `
      <div class="mod-ring-wrap">
        <svg class="mod-ring-svg" viewBox="0 0 40 40">
          <circle class="mod-ring-track" cx="20" cy="20" r="16"/>
          <circle class="mod-ring-fill" cx="20" cy="20" r="16"
                  stroke="${m.raw}"
                  style="stroke-dashoffset:${CIRC_MINI - fillDash};
                         filter:drop-shadow(0 0 3px ${m.raw}40)"/>
        </svg>
        <div class="mod-ring-center" style="color:${m.raw}">${m.metric}</div>
      </div>
      <div class="mod-label">${m.short}</div>`;
    node.onclick = () => selectModule(i);
    row.appendChild(node);
  });
}

// ============================================================
// ROW 2: SUB-STEP DOTS + CAPSULE EXPANSION
// ============================================================
function buildSubRow() {
  const row = document.getElementById('subRow');
  row.innerHTML = '';
  const m = MODULES[selMod];
  if (!m.steps.length) { row.classList.add('collapsed'); return; }
  row.classList.remove('collapsed');

  m.steps.forEach((s, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'sub-connector';
      row.appendChild(conn);
    }

    const item = document.createElement('div');
    item.className = 'sub-item';

    const hasChildren = s.children && s.children.length > 0;
    const isExpanded = expandedStep === i;

    // The dot wrapper
    const wrap = document.createElement('div');
    wrap.className = 'sub-dot-wrap' + (i === selStep ? ' sel' : '') + (hasChildren ? ' has-children' : '') + (isExpanded ? ' expanded' : '');
    wrap.style.setProperty('--color', m.raw);

    const dot = document.createElement('div');
    dot.className = `sub-dot ${s.status}`;
    dot.style.setProperty('--color', m.raw);
    if (i === selStep && !isExpanded) dot.classList.add('selected');

    const lbl = document.createElement('div');
    lbl.className = 'sub-dot-label';
    lbl.textContent = s.name;

    wrap.appendChild(dot);
    wrap.appendChild(lbl);

    wrap.onclick = (e) => {
      e.stopPropagation();
      if (i === selStep && hasChildren) {
        // Toggle capsule
        if (expandedStep === i) {
          collapseCapsule();
        } else {
          expandCapsule(i);
        }
      } else {
        selectStep(i);
      }
    };

    item.appendChild(wrap);

    // Capsule (always in DOM, toggled via class)
    if (hasChildren) {
      const capsule = document.createElement('div');
      capsule.className = 'capsule' + (isExpanded ? ' open' : '');
      capsule.id = 'capsule-' + i;

      s.children.forEach((c, ci) => {
        if (ci > 0) {
          const sep = document.createElement('div');
          sep.className = 'capsule-sep';
          capsule.appendChild(sep);
        }
        const cdot = document.createElement('div');
        cdot.className = `capsule-dot ${c.status}`;
        cdot.style.color = m.raw;
        cdot.style.background = c.status === 'completed' ? m.raw :
                                c.status === 'active' ? `color-mix(in srgb, ${m.raw} 30%, transparent)` :
                                'var(--gray)';
        if (c.status === 'active') cdot.style.borderColor = m.raw;
        if (isExpanded && ci === selChild) cdot.classList.add('selected');

        cdot.onclick = (e) => {
          e.stopPropagation();
          selChild = ci;
          updateAll();
        };

        const clbl = document.createElement('div');
        clbl.className = 'capsule-label';
        clbl.textContent = c.name;

        capsule.appendChild(cdot);
        capsule.appendChild(clbl);
      });

      item.appendChild(capsule);
    }

    row.appendChild(item);
  });
}

function expandCapsule(stepIdx) {
  expandedStep = stepIdx;
  selStep = stepIdx;
  const s = MODULES[selMod].steps[stepIdx];
  // Default to first active or first child
  selChild = 0;
  if (s.children) {
    for (let j = 0; j < s.children.length; j++) {
      if (s.children[j].status === 'active') { selChild = j; break; }
      if (s.children[j].status !== 'completed') { selChild = j; break; }
    }
  }
  updateAll();
}

function collapseCapsule() {
  expandedStep = -1;
  selChild = -1;
  updateAll();
}

// ============================================================
// CONTENT
// ============================================================
function renderContent() {
  const m = MODULES[selMod];
  const s = m.steps[selStep];
  const el = document.getElementById('contentInner');
  const icon = s.status === 'completed' ? '\u2713' : s.status === 'active' ? '\u25B6' : '\u25CB';

  let html = `<div class="fade-in">
    <div class="tag" style="border-color:${m.color};color:${m.raw};background:${m.raw}12">
      ${icon} ${m.short} / ${s.name}
    </div>
    <div class="title">${s.name} \u2014 ${m.name}</div>`;

  // If capsule is open and a child is selected, show child detail
  if (expandedStep === selStep && s.children && selChild >= 0 && selChild < s.children.length) {
    const c = s.children[selChild];
    html += `<div class="summary">${s.detail}</div>`;
    html += `<div class="detail-rows">`;
    s.children.forEach((ch, ci) => {
      const sc = ch.status === 'completed' ? m.raw : ch.status === 'active' ? m.raw : 'var(--gray)';
      const glow = ch.status === 'active' ? `box-shadow:0 0 5px ${sc}` : '';
      const chIcon = ch.status === 'completed' ? '\u2713' : ch.status === 'active' ? '\u25B6' : '\u25CB';
      const isOpen = ci === selChild;
      html += `<div class="detail-card${isOpen ? ' expanded' : ''} fade-in" style="animation-delay:${ci*0.05}s">
        <div class="detail-hdr" onclick="this.parentElement.classList.toggle('expanded')">
          <div class="detail-dot" style="background:${sc};${glow}"></div>
          <div class="detail-name">${chIcon} ${ch.name}</div>
          <div class="detail-meta">${ch.metric}</div>
          <svg class="detail-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="detail-body"><div class="detail-text">${ch.time} \u2022 ${ch.cost}</div></div>
      </div>`;
    });
    html += `</div>`;
  } else if (s.children) {
    // Has children but capsule not open: show summary with children count
    html += `<div class="summary">${s.detail}</div>`;
    html += `<div class="detail-rows">`;
    s.children.forEach((ch, ci) => {
      const sc = ch.status === 'completed' ? m.raw : ch.status === 'active' ? m.raw : 'var(--gray)';
      const chIcon = ch.status === 'completed' ? '\u2713' : ch.status === 'active' ? '\u25B6' : '\u25CB';
      html += `<div class="detail-card fade-in" style="animation-delay:${ci*0.05}s">
        <div class="detail-hdr" onclick="this.parentElement.classList.toggle('expanded')">
          <div class="detail-dot" style="background:${sc}"></div>
          <div class="detail-name">${chIcon} ${ch.name}</div>
          <div class="detail-meta">${ch.metric}</div>
          <svg class="detail-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="detail-body"><div class="detail-text">${ch.time} \u2022 ${ch.cost}</div></div>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="summary">${s.detail || m.summary}</div>`;
    if (s.status !== 'pending') {
      html += `<div class="detail-rows"><div class="detail-card expanded fade-in">
        <div class="detail-hdr" onclick="this.parentElement.classList.toggle('expanded')">
          <div class="detail-dot" style="background:${m.raw}"></div>
          <div class="detail-name">Details</div>
          <div class="detail-meta">${s.metric}</div>
          <svg class="detail-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="detail-body"><div class="detail-text">${s.detail}</div></div>
      </div></div>`;
    }
  }

  const capsuleHint = expandedStep >= 0 ? '<span class="key">Esc</span> Collapse capsule' :
    (MODULES[selMod].steps[selStep]?.children ? '<span class="key">Enter</span> Expand children' : '');

  html += `<div class="footer">
    ${m.status === 'completed' ? '\u2713 Complete' : m.status === 'active' ? '\u25B6 Running \u2014 42m \u2022 $12.47' : '\u25CB Pending'}
  </div>
  <div class="nav-hint">
    <span class="key">\u2190</span><span class="key">\u2192</span> Navigate steps
    <span class="nav-sep">|</span>
    <span class="key">\u2191</span><span class="key">\u2193</span> Switch modules
    ${capsuleHint ? '<span class="nav-sep">|</span>' + capsuleHint : ''}
  </div></div>`;

  el.innerHTML = html;
}

// ============================================================
// SELECTION
// ============================================================
function selectModule(i) {
  selMod = i;
  const m = MODULES[i];
  selStep = 0;
  expandedStep = -1;
  selChild = -1;
  for (let j = 0; j < m.steps.length; j++) {
    if (m.steps[j].status === 'active') { selStep = j; break; }
    if (m.steps[j].status !== 'completed') { selStep = j; break; }
  }
  updateAll();
}

function selectStep(i) {
  const prev = selStep;
  selStep = Math.max(0, Math.min(i, MODULES[selMod].steps.length - 1));
  if (selStep !== expandedStep) {
    expandedStep = -1;
    selChild = -1;
  }
  updateAll();
}

function updateAll() {
  updateBigRing();
  buildLegend();
  document.querySelectorAll('.mod-node').forEach((n, i) => n.classList.toggle('selected', i === selMod));
  buildSubRow();
  renderContent();
  requestAnimationFrame(() => rebuildParticleGeometry());
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  const m = MODULES[selMod];
  const s = m.steps[selStep];

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    selectModule(Math.max(0, selMod - 1));
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selectModule(Math.min(MODULES.length - 1, selMod + 1));
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (expandedStep >= 0 && s.children) {
      // Navigate within capsule
      selChild = Math.max(0, selChild - 1);
      updateAll();
    } else {
      selectStep(selStep - 1);
    }
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (expandedStep >= 0 && s.children) {
      selChild = Math.min(s.children.length - 1, selChild + 1);
      updateAll();
    } else {
      selectStep(selStep + 1);
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (s.children && expandedStep < 0) {
      expandCapsule(selStep);
    }
  } else if (e.key === 'Escape') {
    e.preventDefault();
    if (expandedStep >= 0) {
      collapseCapsule();
    }
  }
});

// ============================================================
// PARTICLE SYSTEM
// ============================================================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); rebuildParticleGeometry(); });

function hexToRGB(hex) {
  hex = hex.replace('#', '');
  return { r: parseInt(hex.substring(0,2),16), g: parseInt(hex.substring(2,4),16), b: parseInt(hex.substring(4,6),16) };
}

function lerpColor(h1, h2, t) {
  const a = hexToRGB(h1), b = hexToRGB(h2);
  return { r: Math.round(a.r+(b.r-a.r)*t), g: Math.round(a.g+(b.g-a.g)*t), b: Math.round(a.b+(b.b-a.b)*t) };
}

let hConnectors = [];
let particles = [];

function rebuildParticleGeometry() {
  hConnectors = [];
  particles = [];

  const modNodes = document.querySelectorAll('.mod-node');
  const rects = [];
  modNodes.forEach(n => {
    const ringW = n.querySelector('.mod-ring-wrap');
    if (!ringW) return;
    const r = ringW.getBoundingClientRect();
    rects.push({ cx: r.left + r.width/2, cy: r.top + r.height/2, rad: r.width/2 });
  });

  for (let i = 0; i < MODULES.length - 1; i++) {
    const a = rects[i], b = rects[i+1];
    if (!a || !b) continue;
    const pm = MODULES[i], nm = MODULES[i+1];
    let type = 'pending';
    if (pm.status === 'completed' && (nm.status === 'completed' || nm.status === 'active'))
      type = nm.status === 'active' ? 'active' : 'completed';

    hConnectors.push({
      x1: a.cx + a.rad + 2, y1: a.cy,
      x2: b.cx - b.rad - 2, y2: b.cy,
      fromColor: pm.raw, toColor: nm.raw, type
    });
  }

  // Spawn particles
  hConnectors.forEach((conn, ci) => {
    if (conn.type === 'completed') {
      for (let p = 0; p < 2; p++) spawnParticle(ci, 0.4 + Math.random()*0.6);
    } else if (conn.type === 'active') {
      for (let p = 0; p < 4; p++) spawnParticle(ci, Math.random());
    }
  });
}

function spawnParticle(connIdx, t) {
  const conn = hConnectors[connIdx];
  if (!conn) return;
  const speed = conn.type === 'active' ? 0.006 + Math.random()*0.008 : 0.003 + Math.random()*0.004;
  particles.push({ connIdx, t, speed, size: 1.5 + Math.random()*1.5 });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

  // Draw connector lines
  hConnectors.forEach(conn => {
    ctx.beginPath();
    ctx.moveTo(conn.x1, conn.y1);
    ctx.lineTo(conn.x2, conn.y2);
    if (conn.type === 'pending') {
      ctx.strokeStyle = 'rgba(62,68,81,0.3)';
      ctx.setLineDash([4, 6]);
    } else {
      ctx.strokeStyle = 'rgba(62,68,81,0.5)';
      ctx.setLineDash([]);
    }
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Draw and update particles
  particles.forEach(p => {
    const conn = hConnectors[p.connIdx];
    if (!conn) return;
    p.t += p.speed;
    if (p.t > 1) { p.t = 0; }

    const x = conn.x1 + (conn.x2 - conn.x1) * p.t;
    const y = conn.y1 + (conn.y2 - conn.y1) * p.t;
    const c = lerpColor(conn.fromColor, conn.toColor, p.t);
    const alpha = Math.sin(p.t * Math.PI) * 0.8 + 0.2;

    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${alpha})`;
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(x, y, p.size * 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${alpha * 0.15})`;
    ctx.fill();
  });

  requestAnimationFrame(drawParticles);
}

// ============================================================
// INIT
// ============================================================
buildModuleRow();
updateAll();
drawParticles();
</script>
</body>
</html>
