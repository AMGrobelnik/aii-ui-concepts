<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES (elite_01 foundation)
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1d23;
  --surface: #22262e;
  --surface-hi: #2e3440;
  --border: rgba(46, 52, 64, 0.8);
  --border-lite: rgba(60, 68, 82, 0.6);
  --glass: rgba(34, 38, 46, 0.55);
  --glass-strong: rgba(34, 38, 46, 0.72);
  --glass-deep: rgba(26, 30, 38, 0.82);
  --glass-border: rgba(100, 116, 155, 0.14);
  --glass-border-bright: rgba(120, 140, 180, 0.22);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 40%, transparent 60%);
  --glass-shine-strong: rgba(255,255,255,0.14);
  --glass-blur: 16px;

  --text-100: #e6e9f0;
  --text-200: #b0b8c9;
  --text-300: #8892a6;
  --text-400: #5c6578;
  --text-500: #3e4555;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --purple-glow: rgba(167,139,250,0.25);
  --purple-deep: rgba(167,139,250,0.55);

  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --blue-glow: rgba(59,130,246,0.25);
  --blue-deep: rgba(59,130,246,0.55);

  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.12);
  --orange-glow: rgba(245,158,11,0.25);
  --orange-deep: rgba(245,158,11,0.55);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --red: #ef4444;

  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --header-h: 44px;
  --sidebar-collapsed: 48px;
  --sidebar-expanded: 240px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* Subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(100,116,155,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,155,0.025) 1px, transparent 1px);
  background-size: 52px 52px;
}

/* Glass noise overlay (elite_03) */
.glass-noise {
  position: fixed; inset: 0; z-index: 9999; pointer-events: none; opacity: 0.012;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   FIXED HEADER (44px glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(26, 29, 35, 0.82);
  backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 20px;
  z-index: 1000; gap: 14px;
  box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05), 0 4px 24px rgba(0,0,0,0.3);
}
.header::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 50%);
  pointer-events: none;
}
.header-brand {
  font-weight: 800; font-size: 13px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.breadcrumb span { color: var(--text-400); }
.breadcrumb .sep { color: rgba(100,116,155,0.35); font-size: 10px; }
.breadcrumb .active { color: var(--text-200); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.header-stat {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 5px;
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 2px 8px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.18);
  border-radius: 4px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.3); }
  50% { opacity: 1; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
}

/* ================================================================
   COLLAPSED SIDEBAR (48px -> 240px on hover)
   ================================================================ */
.sidebar {
  position: fixed; top: var(--header-h); left: 0; bottom: 0;
  width: var(--sidebar-collapsed);
  background: rgba(26, 29, 35, 0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-right: 1px solid var(--glass-border);
  z-index: 900; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow: hidden; display: flex; flex-direction: column;
  padding: 12px 0 16px; gap: 2px;
}
.sidebar:hover { width: var(--sidebar-expanded); }

/* Animated sidebar ring */
.sidebar-ring-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0 12px; flex-shrink: 0;
}
.sidebar-ring { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
.sidebar-ring svg { width: 100%; height: 100%; }
.sidebar-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.sidebar-ring .ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease;
  filter: drop-shadow(0 0 4px var(--blue-deep));
}
/* Animated orbiting dash ring */
.sidebar-ring .ring-orbit {
  fill: none; stroke: var(--blue); stroke-width: 1;
  stroke-dasharray: 3 5; opacity: 0.3;
  animation: ringOrbitSpin 10s linear infinite;
  transform-origin: 16px 16px;
}
@keyframes ringOrbitSpin { to { transform: rotate(360deg); } }

.sidebar-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 8px; font-weight: 700; color: var(--text-100);
}
/* Glow endpoint on ring */
.sidebar-ring .ring-endpoint {
  position: absolute; width: 5px; height: 5px;
  background: var(--blue); border-radius: 50%;
  box-shadow: 0 0 8px var(--blue-deep);
  animation: ringEndGlow 2.5s ease-in-out infinite;
  pointer-events: none;
}
@keyframes ringEndGlow {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

.sidebar-ring-text {
  font-size: 11px; color: var(--text-400); font-weight: 500;
  white-space: nowrap; margin-left: 10px;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-ring-text { opacity: 1; }

.sidebar-divider {
  width: 28px; height: 1px; background: var(--border);
  margin: 4px auto 8px; flex-shrink: 0;
  transition: width 0.3s ease;
}
.sidebar:hover .sidebar-divider { width: calc(100% - 24px); }

.sidebar-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; cursor: pointer; transition: var(--transition);
  white-space: nowrap; position: relative; flex-shrink: 0;
}
.sidebar-item:hover { background: rgba(100,116,155,0.06); }
.sidebar-item.active { background: rgba(59,130,246,0.08); }
.sidebar-item .indicator {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0; border-radius: 0 3px 3px 0;
  transition: height 0.25s ease;
}
.sidebar-item.active .indicator { height: 18px; }
.sidebar-item[data-color="purple"] .indicator { background: var(--purple); }
.sidebar-item[data-color="blue"] .indicator { background: var(--blue); }
.sidebar-item[data-color="orange"] .indicator { background: var(--orange); }
.sidebar-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  position: relative;
}
.sidebar-dot.done { background: var(--green); opacity: 0.7; }
.sidebar-dot.running { background: var(--blue); animation: sbDotPulse 2s ease-in-out infinite; }
.sidebar-dot.pending { background: transparent; border: 1.5px solid var(--text-500); }
@keyframes sbDotPulse {
  0%, 100% { box-shadow: 0 0 4px var(--blue-glow); }
  50% { box-shadow: 0 0 10px var(--blue-glow), 0 0 18px rgba(59,130,246,0.15); }
}
.sidebar-label {
  font-size: 12px; color: var(--text-300); font-weight: 500;
  opacity: 0; transition: opacity 0.2s ease 0.1s;
}
.sidebar:hover .sidebar-label { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.main {
  margin-left: var(--sidebar-collapsed); margin-top: var(--header-h);
  padding: 24px 28px 60px;
  position: relative; z-index: 1;
  max-width: 1400px;
}

/* ================================================================
   SECTION BACKGROUND TINTS (strong colored)
   ================================================================ */
.section-tint {
  position: absolute; left: 0; right: 0; pointer-events: none;
  border-radius: 20px; filter: blur(60px); z-index: -1;
}
.section-tint.purple-tint {
  background: rgba(167,139,250,0.05); top: 0; height: 300px;
}
.section-tint.blue-tint {
  background: rgba(59,130,246,0.07); top: 100px; height: 500px;
}
.section-tint.orange-tint {
  background: rgba(245,158,11,0.04); top: 400px; height: 400px;
}

/* ================================================================
   3 HORIZONTAL MODULE CARDS (max glassmorphism from elite_03)
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 6px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.3); -webkit-backdrop-filter: blur(20px) saturate(1.3);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px 12px; transition: all 0.35s ease; overflow: hidden;
  box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.2);
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
/* Glow halo behind active */
.mod-card .glow-halo {
  position: absolute; inset: -24px; border-radius: 28px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(40px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.15; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.10; transform: scale(1); } 50% { opacity: 0.22; transform: scale(1.06); } }

/* Inner glow */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 36px 8px var(--purple-dim), inset 0 0 18px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 36px 8px var(--blue-dim), inset 0 0 18px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 36px 8px var(--orange-dim), inset 0 0 18px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

/* Shimmer sweep on active */
.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(100,116,155,0.22); transform: translateY(-2px);
  box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.08), 0 12px 40px rgba(0,0,0,0.3);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.06; }
.mod-card.active { border-color: rgba(255,255,255,0.1); }

/* Card internals */
.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; position: relative; z-index: 3; }
.mc-icon { font-size: 14px; flex-shrink: 0; }
.mc-name { font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
  position: relative; overflow: hidden;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); }
.mc-badge.running::after {
  content: ''; position: absolute; inset: 0; border-radius: 6px; pointer-events: none;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 50%, transparent 100%);
  background-size: 200% 100%; animation: badgeShimmer 2s ease-in-out infinite;
}
@keyframes badgeShimmer { 0% { background-position: 200% 0; } 100% { background-position: -100% 0; } }
.mc-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }

.mc-metrics { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* Mini ring gauge 28px */
.mc-ring { width: 28px; height: 28px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; }
.mc-ring .ring-track { fill: none; stroke: var(--surface-hi); stroke-width: 3; }
.mc-ring .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease; }
.mc-ring .ring-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7px; font-weight: 700; color: var(--text-200);
}

/* Sparkline inside card (elite_08) */
.mc-sparkline {
  position: absolute; bottom: 18px; right: 14px;
  width: 60px; height: 16px; opacity: 0.5; transition: opacity 0.3s;
  z-index: 3;
}
.mod-card:hover .mc-sparkline,
.mod-card.active .mc-sparkline { opacity: 1; }
.mc-sparkline svg { width: 60px; height: 16px; overflow: visible; }
.sparkline-path { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.sparkline-area { opacity: 0.08; }
.sparkline-dot { r: 2; opacity: 0; }
.mod-card.active .sparkline-dot { opacity: 1; animation: sparkDotPulse 1.5s ease-in-out infinite; }
@keyframes sparkDotPulse { 0%, 100% { r: 2; opacity: 0.7; } 50% { r: 3; opacity: 1; } }

/* 3px progress bar at bottom */
.mc-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 6px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 6px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 6px var(--orange-deep); }

/* ================================================================
   TREE AREA (3 columns, 2-level tree from elite_09)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; position: relative; min-height: 100px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.1s; }
.tree-col:nth-child(3) { animation-delay: 0.2s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Collapse toggle */
.tree-col .collapse-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-400); cursor: pointer;
  padding: 2px 0 6px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* Tree vertical trunk line */
.tree-trunk {
  position: relative; padding-left: 22px;
  display: flex; flex-direction: column; gap: 3px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 9px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 18px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.18); }

/* Intense glow active trunk (elite_09) */
.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.50); box-shadow: 0 0 8px rgba(167,139,250,0.30);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.50); box-shadow: 0 0 8px rgba(59,130,246,0.30);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.50); box-shadow: 0 0 8px rgba(245,158,11,0.30);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ================================================================
   L1 SUB-MODULE CARDS (glassmorphism from elite_03)
   ================================================================ */
.sub-card {
  height: 44px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px; position: relative; border-radius: var(--radius-sm);
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
  /* Glass surface */
  background: var(--glass);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid var(--glass-border);
  box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05), 0 4px 16px rgba(0,0,0,0.15);
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* Glass inner shine */
.sub-card .sub-glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius-sm);
  background: linear-gradient(160deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 30%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* Horizontal branch connector from trunk */
.sub-card::before {
  content: ''; position: absolute; left: -13px; top: 50%;
  width: 13px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.18); }

/* Active sub card: glow branch connectors */
.sub-card.active-sub::before {
  box-shadow: 0 0 6px var(--active-glow);
}
.sub-card.active-sub[data-pcolor="purple"]::before { background: var(--purple); --active-glow: var(--purple-glow); }
.sub-card.active-sub[data-pcolor="blue"]::before { background: var(--blue); --active-glow: var(--blue-glow); }
.sub-card.active-sub[data-pcolor="orange"]::before { background: var(--orange); --active-glow: var(--orange-glow); }

/* Done state */
.sub-card.done-sub { background: rgba(255,255,255,0.015); border-color: var(--glass-border); }

/* Active state: colored bg tint + glow border + shimmer */
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.22);
  box-shadow: 0 0 18px rgba(167,139,250,0.10), inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 16px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.22);
  box-shadow: 0 0 18px rgba(59,130,246,0.10), inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 16px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.22);
  box-shadow: 0 0 18px rgba(245,158,11,0.10), inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 16px rgba(0,0,0,0.2);
}

/* Shimmer overlay for active subs */
.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-sm); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.025) 46%, rgba(255,255,255,0.06) 50%,
    rgba(255,255,255,0.025) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Glow pulse for active subs */
.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-sm); pointer-events: none; opacity: 0;
  animation: subGlowPulse 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(167,139,250,0.06); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(59,130,246,0.06); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(245,158,11,0.06); }
@keyframes subGlowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* Pending state */
.sub-card.pending-sub { background: rgba(255,255,255,0.008); opacity: 0.5; border-color: rgba(46,52,64,0.4); }
.sub-card.pending-sub.visible { opacity: 0.5; }

/* Left accent stripe */
.sub-card .accent-stripe {
  position: absolute; left: 0; top: 7px; bottom: 7px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub .accent-stripe { opacity: 1; }
.sub-card.done-sub .accent-stripe { opacity: 0.3; }
.sub-card[data-pcolor="purple"] .accent-stripe { background: var(--purple); }
.sub-card[data-pcolor="blue"] .accent-stripe { background: var(--blue); }
.sub-card[data-pcolor="orange"] .accent-stripe { background: var(--orange); }

/* Sub-card hover lift */
.sub-card:not(.pending-sub):hover { transform: translateY(-1px); border-color: var(--glass-border-bright); }

/* Sub-card internal elements */
.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
  position: relative; z-index: 2;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] {
  background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.5);
}
.sub-dot.running[data-pcolor="purple"] {
  background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.5);
}
.sub-dot.running[data-pcolor="orange"] {
  background: var(--orange); box-shadow: 0 0 8px rgba(245,158,11,0.5);
}
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

/* CSS spinner for running items */
.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(59,130,246,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  z-index: 2;
}
.sub-spinner.purple-spin { border-color: rgba(167,139,250,0.15); border-top-color: var(--purple); }
.sub-spinner.orange-spin { border-color: rgba(245,158,11,0.15); border-top-color: var(--orange); }
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 11.5px; color: var(--text-300); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1; z-index: 2;
}
.sub-card.active-sub .sub-label { color: var(--text-100); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-300); }

.sub-meta {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums;
  z-index: 2;
}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

/* Mini ring inside sub-card */
.sub-ring { width: 18px; height: 18px; flex-shrink: 0; position: relative; z-index: 2; }
.sub-ring svg { width: 100%; height: 100%; }
.sub-ring .sr-track { fill: none; stroke: var(--surface-hi); stroke-width: 2.5; }
.sub-ring .sr-fill { fill: none; stroke-width: 2.5; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%; }

/* Micro badge (elite_08) */
.sub-micro-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-left: 4px;
  z-index: 2;
}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }

/* ================================================================
   LEVEL 2: ITEM CHECKLIST (30px) from elite_01 level3
   ================================================================ */
.level2-wrap {
  padding-left: 24px; position: relative; overflow: hidden;
  max-height: 500px; transition: max-height 0.4s ease;
}
.level2-wrap::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 1px; height: calc(100% - 10px);
}
.tree-trunk[data-color="purple"] .level2-wrap::before { background: rgba(167,139,250,0.1); }
.tree-trunk[data-color="blue"] .level2-wrap::before { background: rgba(59,130,246,0.1); }
.tree-trunk[data-color="orange"] .level2-wrap::before { background: rgba(245,158,11,0.1); }

.level2-item {
  height: 30px; display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; color: var(--text-400); position: relative;
  padding-left: 6px; border-radius: 4px;
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level2-item.visible { opacity: 1; transform: translateX(0); }
.level2-item:hover { background: rgba(255,255,255,0.02); }
.level2-item::before {
  content: ''; position: absolute; left: -10px; top: 50%;
  width: 10px; height: 1px;
}
.tree-trunk[data-color="blue"] .level2-item::before { background: rgba(59,130,246,0.1); }
.tree-trunk[data-color="purple"] .level2-item::before { background: rgba(167,139,250,0.1); }
.tree-trunk[data-color="orange"] .level2-item::before { background: rgba(245,158,11,0.1); }

/* Active L2 items glow branch */
.level2-item.running::before {
  background: rgba(59,130,246,0.3) !important;
  box-shadow: 0 0 4px rgba(59,130,246,0.2);
}

.l2-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.l2-dot.done { background: var(--green); opacity: 0.5; }
.l2-dot.running { background: var(--blue); animation: l2Pulse 2s ease-in-out infinite; }
.l2-dot.pending { border: 1px solid var(--text-500); opacity: 0.35; }
@keyframes l2Pulse {
  0%, 100% { box-shadow: 0 0 3px rgba(59,130,246,0.4); }
  50% { box-shadow: 0 0 8px rgba(59,130,246,0.7); }
}

/* L2 mini ring */
.l2-ring { width: 14px; height: 14px; flex-shrink: 0; }
.l2-ring svg { width: 100%; height: 100%; }
.l2-ring .lr-track { fill: none; stroke: var(--surface-hi); stroke-width: 2; }
.l2-ring .lr-fill { fill: none; stroke-width: 2; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%; }

.l2-label { flex: 1; }
.l2-meta { font-size: 9px; color: var(--text-500); font-variant-numeric: tabular-nums; }

/* Collapsed tree for complete modules */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {
  display: none; padding: 8px 14px; font-size: 11px; color: var(--text-400);
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 8px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.tree-collapsed-bar:hover { color: var(--text-300); background: var(--surface); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }

/* ================================================================
   HOVER TOOLTIP (400px glassmorphism)
   ================================================================ */
.tooltip-portal {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 380px; opacity: 0; transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.tooltip-portal.visible { opacity: 1; transform: translateY(0); }
.tooltip-inner {
  background: rgba(26, 29, 35, 0.94);
  backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 16px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tooltip-inner::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius);
  background: linear-gradient(160deg, rgba(255,255,255,0.04) 0%, transparent 40%);
  pointer-events: none;
}
.tooltip-title {
  font-size: 13px; font-weight: 600; color: var(--text-100); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.tooltip-summary { font-size: 12px; color: var(--text-300); line-height: 1.6; margin-bottom: 10px; }
.tooltip-stats { display: flex; gap: 16px; }
.tooltip-stat-val { font-size: 16px; font-weight: 700; color: var(--text-100); }
.tooltip-stat-label { font-size: 10px; color: var(--text-400); }

/* ================================================================
   DASHBOARD PANEL (2-col below tree, 50% live feed)
   ================================================================ */
.dashboard-panel {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  margin-top: 20px;
}
.dashboard-panel.open { max-height: 700px; opacity: 1; }

.dashboard-inner {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  background: var(--glass-strong);
  backdrop-filter: blur(24px) saturate(1.4); -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 24px;
  position: relative;
  animation: dashSlide 0.3s ease-out;
  box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.06),
              inset 0 -1px 0 rgba(0,0,0,0.15),
              0 16px 60px rgba(0,0,0,0.3);
}
@keyframes dashSlide {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.dashboard-inner::before {
  content: ''; position: absolute; inset: 0; border-radius: var(--radius);
  background: linear-gradient(165deg, rgba(255,255,255,0.05) 0%, transparent 35%);
  pointer-events: none; z-index: 0;
}
.dashboard-inner .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}

.dash-close {
  position: absolute; top: 12px; right: 14px;
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: rgba(100,116,155,0.1); color: var(--text-400);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: var(--transition); z-index: 10;
}
.dash-close:hover { background: rgba(100,116,155,0.2); color: var(--text-100); }

.dash-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.dash-summary {
  font-size: 13px; color: var(--text-200); line-height: 1.7;
  margin-bottom: 16px; padding: 12px 14px;
  background: rgba(26, 29, 35, 0.5); border-radius: var(--radius-sm);
  border-left: 2px solid var(--blue);
}
.dash-item-list { list-style: none; }
.dash-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 12px; color: var(--text-300);
  border-bottom: 1px solid rgba(100,116,155,0.06);
}
.dash-item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* Stat cards grid */
.dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.dash-stat-card {
  background: rgba(26, 29, 35, 0.5);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-sm);
  padding: 12px 14px; text-align: center;
  border: 1px solid rgba(100,116,155,0.06);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.dash-stat-val { font-size: 22px; font-weight: 700; color: var(--text-100); font-variant-numeric: tabular-nums; }
.dash-stat-label { font-size: 10px; color: var(--text-400); margin-top: 2px; }

/* Live feed (50% width) */
.dash-feed-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.dash-feed-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--text-400);
}
.mini-live-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  background: rgba(239,68,68,0.1); color: var(--red);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.dash-feed { max-height: 180px; overflow-y: auto; }
.dash-feed::-webkit-scrollbar { width: 4px; }
.dash-feed::-webkit-scrollbar-thumb { background: rgba(100,116,155,0.2); border-radius: 2px; }

.feed-entry {
  display: flex; gap: 8px; padding: 5px 0; font-size: 11px;
  border-bottom: 1px solid rgba(100,116,155,0.04);
  animation: feedFadeIn 0.35s ease both;
}
@keyframes feedFadeIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}
.feed-time { color: var(--text-500); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 42px; }
.feed-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.feed-msg { color: var(--text-300); flex: 1; }

/* ================================================================
   DOT ANIMATION CONTAINER
   ================================================================ */
.dot-anim-container { position: fixed; inset: 0; pointer-events: none; z-index: 500; }
.flying-dot {
  position: absolute; width: 5px; height: 5px; border-radius: 50%;
  pointer-events: none;
}
.flying-dot-trail {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  pointer-events: none; opacity: 0.4;
}

/* ================================================================
   SCROLLBAR
   ================================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }
</style>
</head>
<body>

<!-- Glass noise overlay -->
<div class="glass-noise"></div>

<!-- Ambient Particles Canvas -->
<canvas id="particlesCanvas"></canvas>

<!-- Dot Animation Container -->
<div class="dot-anim-container" id="dotAnimContainer"></div>

<!-- Tooltip Portal -->
<div class="tooltip-portal" id="tooltipPortal">
  <div class="tooltip-inner">
    <div class="tooltip-title" id="tooltipTitle"></div>
    <div class="tooltip-summary" id="tooltipSummary"></div>
    <div class="tooltip-stats" id="tooltipStats"></div>
  </div>
</div>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-brand">AI Inventor</div>
  <nav class="breadcrumb">
    <span class="sep">/</span>
    <span>Pipeline</span>
    <span class="sep">/</span>
    <span class="active" id="breadcrumb">Overview</span>
  </nav>

      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M6 3v3l2 1.5"/></svg>
      <span class="val" id="timerDisplay">02:34:17</span>
    </div>
    <div class="header-stat">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v10M3 3.5l3-2.5 3 2.5M3 8.5l3 2.5 3-2.5"/></svg>
      <span class="val" id="costDisplay">$12.47</span>

      <span class="live-dot-red"></span>
      LIVE
    </div>
  </div>
</header>

<!-- ===== SIDEBAR ===== -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-ring-wrap">
    <div class="sidebar-ring" id="sidebarRingEl">
      <svg viewBox="0 0 32 32">
        <circle class="ring-track" cx="16" cy="16" r="12"/>
        <circle class="ring-orbit" cx="16" cy="16" r="14"/>
        <circle class="ring-fill" cx="16" cy="16" r="12"
          stroke-dasharray="75.4" stroke-dashoffset="30.16"/>
      </svg>
      <div class="ring-label">60%</div>
      <div class="ring-endpoint" id="ringEndpoint"></div>
    </div>
    <span class="sidebar-ring-text">Overall Progress</span>
  </div>
  <div class="sidebar-divider"></div>

  <div class="sidebar-item" data-module="0" data-color="purple">
    <div class="indicator"></div>
    <div class="sidebar-dot done"></div>
    <span class="sidebar-label">Generate Hypothesis</span>
  </div>
  <div class="sidebar-item active" data-module="1" data-color="blue">
    <div class="indicator"></div>
    <div class="sidebar-dot running"></div>
    <span class="sidebar-label">Test Hypothesis</span>
  </div>
  <div class="sidebar-item" data-module="2" data-color="orange">

    <div class="sidebar-dot" style="background:transparent; border:1.5px solid var(--text-500); width:8px; height:8px; border-radius:50%;"></div>
    <span class="sidebar-label" style="font-size:11px; color:var(--text-500);">Settings</span>
  </div>
</nav>

<!-- ===== MAIN CONTENT ===== -->
<main class="main" id="mainContent">
  <!-- Section tints -->
  <div class="section-tint purple-tint"></div>
  <div class="section-tint blue-tint"></div>
  <div class="section-tint orange-tint"></div>

  <!-- 3 HORIZONTAL MODULE CARDS -->
  <section class="module-cards" id="moduleCards">

    <!-- Module 1: Generate Hypothesis (purple, COMPLETE) -->
    <div class="mod-card" data-color="purple" data-module="0" data-status="done">
      <div class="glass-shine"></div>
      <div class="glow-halo"></div>
      <div class="card-shimmer"></div>
      <div class="mc-top">
        <span class="mc-icon">&#x1F9EA;</span>
        <span class="mc-name">Generate Hypothesis</span>
        <span class="mc-badge done">Complete</span>
      </div>
      <div class="mc-metrics">
        <span class="mc-metric-label">Score</span>
        <span class="mc-metric-value" style="color:var(--purple)">8.4/10</span>
        <div class="mc-ring">
          <svg viewBox="0 0 28 28">
            <circle class="ring-track" cx="14" cy="14" r="10"/>
            <circle class="ring-fill" cx="14" cy="14" r="10" stroke="var(--purple)"
              stroke-dasharray="62.83" stroke-dashoffset="0"
              style="transform:rotate(-90deg);transform-origin:50% 50%;filter:drop-shadow(0 0 3px var(--purple-deep))"/>
          </svg>
          <div class="ring-text" style="color:var(--purple)">100</div>
        </div>
      </div>
      <div class="mc-sparkline">
        <svg viewBox="0 0 60 16"><polyline class="sparkline-path" stroke="var(--purple)" points="0,14 10,10 20,12 30,6 40,8 50,3 60,1"/><polygon class="sparkline-area" fill="var(--purple)" points="0,16 0,14 10,10 20,12 30,6 40,8 50,3 60,1 60,16"/></svg>
      </div>
      <div class="mc-bar"><div class="mc-bar-fill" style="width:100%"></div></div>
    </div>

    <!-- Module 2: Test Hypothesis (blue, ACTIVE) -->
    <div class="mod-card active" data-color="blue" data-module="1" data-status="running">
      <div class="glass-shine"></div>
      <div class="glow-halo"></div>
      <div class="card-shimmer"></div>
      <div class="mc-top">
        <span class="mc-icon">&#x1F52C;</span>
        <span class="mc-name">Test Hypothesis</span>
        <span class="mc-badge running">Running</span>
      </div>
      <div class="mc-metrics">
        <span class="mc-metric-label">Artifacts</span>
        <span class="mc-metric-value" style="color:var(--blue)">3/5</span>
        <div class="mc-ring">
          <svg viewBox="0 0 28 28">
            <circle class="ring-track" cx="14" cy="14" r="10"/>
            <circle class="ring-fill" cx="14" cy="14" r="10" stroke="var(--blue)"
              stroke-dasharray="62.83" stroke-dashoffset="25.13"
              style="transform:rotate(-90deg);transform-origin:50% 50%;filter:drop-shadow(0 0 3px var(--blue-deep))"/>
          </svg>
          <div class="ring-text" style="color:var(--blue)">60</div>

<script>
/* ================================================================

const MODULES = [

/* ================================================================
   RENDER TREE AREA
   ================================================================ */
const treeArea = document.getElementById('treeArea');

function renderTrees() {
  treeArea.innerHTML = '';
  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' ? ' collapsed' : '');
    col.dataset.module = mi;

    // Collapse toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    // Trunk
    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      // Glass overlays
      card.innerHTML = `<div class="sub-glass-shine"></div><div class="sub-card-shimmer"></div><div class="sub-card-glow"></div><div class="accent-stripe"></div>`;

      // Status indicator
      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:11px; color:var(--green); flex-shrink:0; z-index:2;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : mod.color === 'orange' ? ' orange-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      // Label
      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      // Meta
      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      // Mini ring for non-pending items
      if (sub.status !== 'pending') {
        const ringWrap = document.createElement('div');
        ringWrap.className = 'sub-ring';
        const pct = sub.status === 'done' ? 100 : (sub.items.length > 0 ? Math.round((sub.items.filter(i => i.status === 'done').length / sub.items.length) * 100) : 50);
        const circ = 2 * Math.PI * 7;
        const offset = circ - (circ * pct / 100);
        const strokeColor = mod.color === 'purple' ? 'var(--purple)' : mod.color === 'blue' ? 'var(--blue)' : 'var(--orange)';
        ringWrap.innerHTML = `<svg viewBox="0 0 18 18"><circle class="sr-track" cx="9" cy="9" r="7"/><circle class="sr-fill" cx="9" cy="9" r="7" stroke="${strokeColor}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}" style="filter:drop-shadow(0 0 2px ${strokeColor})"/></svg>`;
        card.appendChild(ringWrap);
      }

      // Micro badge
      const badge = document.createElement('span');
      badge.className = `sub-micro-badge ${sub.status === 'done' ? 'done' : sub.status === 'running' ? 'running' : 'pending'}`;
      badge.textContent = sub.status === 'done' ? 'Done' : sub.status === 'running' ? 'Live' : 'Wait';
      card.appendChild(badge);

      // Click -> dashboard
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        openDashboard(mi, si);
      });

      // Hover -> tooltip

      card.addEventListener('mousemove', (e) => moveTooltip(e));

    let delay = 0;
    document.querySelectorAll('.sub-card, .level2-item').forEach(el => {

/* ================================================================

const tooltipEl = document.getElementById('tooltipPortal');
const tooltipTitle = document.getElementById('tooltipTitle');
const tooltipSummary = document.getElementById('tooltipSummary');
const tooltipStats = document.getElementById('tooltipStats');
let tooltipTimeout;

function showTooltip(e, mi, si) {
  clearTimeout(tooltipTimeout);
  const mod = MODULES[mi];
  const sub = mod.subs[si];
  tooltipTimeout = setTimeout(() => {
    const color = mod.color === 'purple' ? 'var(--purple)' :
                  mod.color === 'blue' ? 'var(--blue)' : 'var(--orange)';
    tooltipTitle.innerHTML = `<span style="color:${color}">\u25CF</span> ${sub.label}`;
    tooltipSummary.textContent = sub.tooltip || (sub.status === 'done'
      ? `Completed in ${sub.duration}. Result: ${sub.meta}`
      : sub.status === 'running'
      ? `Currently running (${sub.duration} elapsed). Progress: ${sub.meta}`
      : 'Waiting for preceding steps to complete.');
    tooltipStats.innerHTML = `
      <div><div class="tooltip-stat-val">${sub.duration}</div><div class="tooltip-stat-label">Duration</div></div>
      <div><div class="tooltip-stat-val">${sub.meta}</div><div class="tooltip-stat-label">Result</div></div>
      <div><div class="tooltip-stat-val">${sub.status === 'done' ? '\u2713' : sub.status === 'running' ? '\u25B6' : '\u25CB'}</div><div class="tooltip-stat-label">Status</div></div>`;
    moveTooltip(e);
    tooltipEl.classList.add('visible');
  }, 400);
}
function moveTooltip(e) {
  const x = Math.min(e.clientX + 16, window.innerWidth - 400);
  const y = Math.min(e.clientY + 12, window.innerHeight - 180);
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}
function hideTooltip() {
  clearTimeout(tooltipTimeout);
  tooltipEl.classList.remove('visible');
}

/* ================================================================
   DASHBOARD PANEL
   ================================================================ */
const dashPanel = document.getElementById('dashboardPanel');
const dashLeft = document.getElementById('dashLeft');
const dashRight = document.getElementById('dashRight');

dashClose.addEventListener('click', closeDashboard);

function closeDashboard() {

function openDashboard(mi, si) {
  const mod = MODULES[mi];
  const sub = mod.subs[si];
  const key = `${mi}-${si}`;
  if (currentDash === key) { closeDashboard(); return; }
  currentDash = key;

  breadcrumbEl.textContent = `${mod.label} > ${sub.label}`;
  document.querySelectorAll('.sub-card.selected').forEach(el => el.classList.remove('selected'));
  const target = document.querySelector(`.sub-card[data-module="${mi}"][data-sub="${si}"]`);
  if (target) target.classList.add('selected');

  const color = mod.color === 'purple' ? 'var(--purple)' :
                mod.color === 'blue' ? 'var(--blue)' : 'var(--orange)';

  // Left panel: summary + items
  let leftHTML = `<div class="dash-section-title"><span style="color:${color}">\u25CF</span> ${sub.label}</div>`;
  leftHTML += `<div class="dash-summary" style="border-left-color:${color}">
    ${sub.tooltip || (sub.status === 'done' ? `Completed in ${sub.duration}. Result: ${sub.meta}.` :

  if (sub.items && sub.items.length > 0) {
    leftHTML += `<div class="dash-section-title" style="margin-top:12px;">Items</div><ul class="dash-item-list">`;

      const dotColor = item.status === 'done' ? 'var(--green)' :

      const dotColor = s.status === 'done' ? 'var(--green)' :

        <div class="dash-item-dot" style="background:${dotColor}"></div>

        <span style="font-size:10px; color:var(--text-400)">${s.meta}</span>
        <span style="font-size:10px; color:var(--text-400); min-width:14px; text-align:center">${icon}</span>
      </li>`;
    });
    leftHTML += '</ul>';
  }
  dashLeft.innerHTML = leftHTML;

  // Right panel: stat cards + large live feed (50% width)
  let rightHTML = `<div class="dash-stat-grid">
    <div class="dash-stat-card"><div class="dash-stat-val">${mod.duration}</div><div class="dash-stat-label">Duration</div></div>

  dashPanel.classList.add('open');

    { time: '02:30', color: 'var(--purple)', msg: `Paper Draft: writing methodology section` },

   ================================================================ */
function positionRingEndpoint() {
  const ringEl = document.getElementById('sidebarRingEl');
  const ep = document.getElementById('ringEndpoint');
  if (!ringEl || !ep) return;
  const rect = ringEl.getBoundingClientRect();
  const cx = 16; // center in viewBox
  const cy = 16;
  const r = 12;
  const pct = 0.60;
  const angle = (pct * 360 - 90) * (Math.PI / 180);
  const scale = rect.width / 32;
  ep.style.left = ((cx + r * Math.cos(angle)) * scale - 2.5) + 'px';
  ep.style.top = ((cy + r * Math.sin(angle)) * scale - 2.5) + 'px';
}
positionRingEndpoint();
window.addEventListener('resize', positionRingEndpoint);

/* ================================================================
   AMBIENT PARTICLES (40 dots + connection lines)
   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.radius = Math.random() * 1.5 + 0.5;
    this.opacity = Math.random() * 0.12 + 0.03;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < 40; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  // Connection lines
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        pCtx.strokeStyle = `rgba(100, 116, 155, ${0.04 * (1 - dist / 150)})`;
        pCtx.lineWidth = 0.5;
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.stroke();
      }
    }
  }
  // Dots
  particles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(100, 116, 155, ${p.opacity})`;
    pCtx.fill();
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ================================================================
   DOT ANIMATION SYSTEM
   L-shaped path: dots flow DOWN the trunk, then RIGHT along
   the horizontal branch to reach the active sub-module.
   Uses getBoundingClientRect for exact DOM positioning.
   Multiple simultaneous targets. 2-3 dots per target.
   ================================================================ */
const dotContainer = document.getElementById('dotAnimContainer');
let dotTargets = [];
let dotSpawnTimers = [];

// Identify all active sub-cards as dot targets
function identifyDotTargets() {
  dotTargets = [];
  document.querySelectorAll('.sub-card.active-sub').forEach(card => {
    const mi = parseInt(card.dataset.module);
    const mod = MODULES[mi];
    if (!mod) return;

    // Find the trunk element for this module's column
    const col = card.closest('.tree-col');
    if (!col) return;
    const trunk = col.querySelector('.tree-trunk');
    if (!trunk) return;

    const colorMap = { purple: '#a78bfa', blue: '#3b82f6', orange: '#f59e0b' };
    dotTargets.push({
      card: card,
      trunk: trunk,
      color: colorMap[mod.color] || '#3b82f6',
      glowColor: mod.color === 'purple' ? 'rgba(167,139,250,0.6)' :
                 mod.color === 'orange' ? 'rgba(245,158,11,0.6)' :
                 'rgba(59,130,246,0.6)'
    });
  });
}

// Compute L-shaped waypoints using getBoundingClientRect
function computeWaypoints(target) {
  const trunkRect = target.trunk.getBoundingClientRect();
  const cardRect = target.card.getBoundingClientRect();

  // Start: top of the trunk, center X
  const trunkLeftPx = trunkRect.left + 9; // trunk ::before is at left:9px
  const startX = trunkLeftPx;
  const startY = trunkRect.top;

  // Corner: where trunk meets the card's horizontal branch
  const cardMidY = cardRect.top + cardRect.height / 2;
  const cornerX = trunkLeftPx;
  const cornerY = cardMidY;

  // End: left edge of the card
  const endX = cardRect.left;
  const endY = cardMidY;

  return [
    { x: startX, y: startY },
    { x: cornerX, y: cornerY },
    { x: endX, y: endY }
  ];
}

// Interpolate position along waypoint path
function interpolateWaypoints(waypoints, t) {
  // Calculate total path length
  let totalLen = 0;
  const segLens = [];
  for (let i = 1; i < waypoints.length; i++) {
    const dx = waypoints[i].x - waypoints[i-1].x;
    const dy = waypoints[i].y - waypoints[i-1].y;
    const len = Math.sqrt(dx * dx + dy * dy);
    segLens.push(len);
    totalLen += len;
  }

  if (totalLen === 0) return waypoints[0];

  let targetDist = t * totalLen;
  let accumulated = 0;

  for (let i = 0; i < segLens.length; i++) {
    if (accumulated + segLens[i] >= targetDist) {
      const segT = (targetDist - accumulated) / segLens[i];
      return {
        x: waypoints[i].x + (waypoints[i+1].x - waypoints[i].x) * segT,
        y: waypoints[i].y + (waypoints[i+1].y - waypoints[i].y) * segT
      };
    }
    accumulated += segLens[i];
  }

  return waypoints[waypoints.length - 1];
}

// Create a single flying dot
function createFlyingDot(target) {
  const waypoints = computeWaypoints(target);
  if (!waypoints || waypoints.length < 2) return;

  const dot = document.createElement('div');
  dot.className = 'flying-dot';
  dot.style.background = target.color;
  dot.style.boxShadow = `0 0 8px ${target.glowColor}, 0 0 16px ${target.glowColor}`;
  dotContainer.appendChild(dot);

  // Trail dots
  const trails = [];
  for (let i = 0; i < 3; i++) {
    const trail = document.createElement('div');
    trail.className = 'flying-dot-trail';
    trail.style.background = target.color;
    trail.style.boxShadow = `0 0 4px ${target.glowColor}`;
    trail.style.opacity = (0.3 - i * 0.1).toString();
    dotContainer.appendChild(trail);
    trails.push(trail);
  }

  const duration = 1800 + Math.random() * 400;
  const startTime = performance.now();

  function animateDot(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);

    // Ease-in-out
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

    const pos = interpolateWaypoints(waypoints, eased);
    dot.style.left = (pos.x - 2.5) + 'px';
    dot.style.top = (pos.y - 2.5) + 'px';

    // Trails follow with delay
    trails.forEach((trail, i) => {
      const trailT = Math.max(0, eased - (i + 1) * 0.06);
      const trailPos = interpolateWaypoints(waypoints, trailT);
      trail.style.left = (trailPos.x - 1.5) + 'px';
      trail.style.top = (trailPos.y - 1.5) + 'px';
    });

    // Fade out at the end
    if (t > 0.85) {
      const fadeT = (t - 0.85) / 0.15;
      dot.style.opacity = (1 - fadeT).toString();
      trails.forEach(tr => tr.style.opacity = ((0.3 - 0.1) * (1 - fadeT)).toString());
    }

    if (t < 1) {
      requestAnimationFrame(animateDot);
    } else {
      dot.remove();
      trails.forEach(tr => tr.remove());
    }
  }

  requestAnimationFrame(animateDot);
}

// Spawn dots on an interval for each target
function startDotSpawning() {
  // Clear any existing spawn timers
  dotSpawnTimers.forEach(id => clearInterval(id));
  dotSpawnTimers = [];

  identifyDotTargets();

  dotTargets.forEach((target, idx) => {
    // Initial burst: spawn 2-3 dots staggered
    for (let i = 0; i < 2; i++) {
      setTimeout(() => createFlyingDot(target), i * 800 + idx * 400);
    }

    // Ongoing: spawn every 2.5s with slight randomness
    const timerId = setInterval(() => {
      createFlyingDot(target);
      // Occasionally spawn a second dot close behind
      if (Math.random() < 0.4) {
        setTimeout(() => createFlyingDot(target), 300 + Math.random() * 500);
      }
    }, 2500 + Math.random() * 500);
    dotSpawnTimers.push(timerId);
  });
}

// Start dot animation after tree renders + slight delay for layout
setTimeout(startDotSpawning, 600);

// Restart dot animation on resize (waypoints change)
let dotResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(dotResizeTimer);
  dotResizeTimer = setTimeout(startDotSpawning, 300);
});

/* ================================================================
   TRUNK HEIGHT CALCULATION
   ================================================================ */
function updateTrunkHeights() {
  document.querySelectorAll('.tree-trunk').forEach(trunk => {
    const cards = trunk.querySelectorAll('.sub-card');
    if (cards.length === 0) return;
    const last = cards[cards.length - 1];
    // Check if there's a level2-wrap after the last card
    const wrap = trunk.querySelector('.level2-wrap');
    let totalH;
    if (wrap && wrap.previousElementSibling) {
      totalH = wrap.offsetTop + wrap.offsetHeight - 22;
    } else {
      totalH = last.offsetTop + last.offsetHeight / 2;
    }
    trunk.style.setProperty('--trunk-h', totalH + 'px');
  });
}
setTimeout(updateTrunkHeights, 100);
window.addEventListener('resize', updateTrunkHeights);
