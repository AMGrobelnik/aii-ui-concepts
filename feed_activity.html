<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed — 8 Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --bg-raised: #0c1220;
  --surface: rgba(15,23,42,.72);
  --surface-hi: rgba(30,41,59,.65);
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12); --purple-glow: rgba(167,139,250,.25);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);   --blue-glow: rgba(96,165,250,.25);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);  --orange-glow: rgba(251,146,60,.25);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);   --green-glow: rgba(52,211,153,.25);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text-dim);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-y: auto;
}

/* Grid of variants */
.page-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  padding: 32px 40px;
  max-width: 1400px;
}

.variant {
  background: var(--surface-card);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
  border-radius: 0 0 1px 1px;
}

.variant-label {
  padding: 14px 20px 10px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.variant-label .num {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.variant-body { padding: 16px 20px 20px; }

/* Shared feed styles */
.feed-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.feed-title {
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: .6px; font-weight: 600;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; font-weight: 800; color: var(--red);
  background: var(--red-dim); padding: 2px 8px 2px 6px;
  border-radius: 4px; letter-spacing: .6px; text-transform: uppercase;
}
.live-badge-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: liveBlink 1.3s ease-in-out infinite;
}
@keyframes liveBlink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

.feed-count {
  margin-left: auto; font-size: 10px; color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}

/* Shared scrollbar */
.feed-scroll {
  max-height: 320px; overflow-y: auto;
}
.feed-scroll::-webkit-scrollbar { width: 3px; }
.feed-scroll::-webkit-scrollbar-track { background: transparent; }
.feed-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

/* ============================================================
   VARIANT 1 — Compact (one-line per event)
   ============================================================ */
.v1-list { display: flex; flex-direction: column; gap: 1px; }
.v1-event {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px; font-size: 11px;
  transition: background .12s;
}
.v1-event:hover { background: rgba(255,255,255,.025); }
.v1-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  font-weight: 500; width: 38px; flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.v1-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.v1-dot.done { background: var(--green); opacity: .7; }
.v1-dot.running { background: var(--blue); animation: dotPulse 2s ease-in-out infinite; }
.v1-dot.warn { background: var(--orange); }
.v1-dot.error { background: var(--red); }
.v1-dot.info { background: var(--cyan); opacity: .6; }
@keyframes dotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
.v1-tool {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  flex-shrink: 0; min-width: 56px;
}
.v1-text { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v1-event.is-new { background: rgba(96,165,250,.03); }
.v1-event.is-new .v1-text { color: var(--text); }

/* ============================================================
   VARIANT 2 — Rich (icons + module tags + type badges)
   ============================================================ */
.v2-list { display: flex; flex-direction: column; gap: 3px; }
.v2-event {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
  border-radius: 7px; font-size: 11px;
  background: rgba(255,255,255,.015); border: 1px solid transparent;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(8px); animation: feedIn .4s var(--ease) forwards;
}
.v2-event.is-new { border-color: rgba(96,165,250,.12); background: rgba(96,165,250,.03); }
.v2-event.is-new::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.05), transparent);
  background-size: 300% 100%; animation: feedShimmer 2s ease-in-out;
}
@keyframes feedShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes feedIn { to { opacity: 1; transform: translateY(0); } }

.v2-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  font-weight: 500; flex-shrink: 0; width: 42px; padding-top: 1px;
}
.v2-icon {
  width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center;
  font-size: 9px; flex-shrink: 0;
}
.v2-body { flex: 1; min-width: 0; }
.v2-module {
  font-size: 9px; font-weight: 700; margin-bottom: 1px;
  display: flex; align-items: center; gap: 5px;
}
.v2-module-tag {
  font-size: 7px; padding: 1px 5px; border-radius: 3px; font-weight: 700;
}
.v2-text { color: var(--text-dim); font-size: 11px; line-height: 1.4; }
.v2-type {
  font-size: 7px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
  margin-left: auto; align-self: flex-start;
}
.v2-type.t-gen   { background: var(--blue-dim); color: var(--blue); }
.v2-type.t-ok    { background: var(--green-dim); color: var(--green); }
.v2-type.t-warn  { background: var(--orange-dim); color: var(--orange); }
.v2-type.t-score { background: var(--purple-dim); color: var(--purple); }
.v2-type.t-info  { background: var(--cyan-dim); color: var(--cyan); }

/* Stagger */
.v2-event:nth-child(1) { animation-delay: 0ms; }
.v2-event:nth-child(2) { animation-delay: 60ms; }
.v2-event:nth-child(3) { animation-delay: 120ms; }
.v2-event:nth-child(4) { animation-delay: 180ms; }
.v2-event:nth-child(5) { animation-delay: 240ms; }
.v2-event:nth-child(6) { animation-delay: 300ms; }
.v2-event:nth-child(7) { animation-delay: 360ms; }
.v2-event:nth-child(8) { animation-delay: 420ms; }

/* ============================================================
   VARIANT 3 — Timeline (vertical line + branch dots)
   ============================================================ */
.v3-timeline { position: relative; padding-left: 24px; }
.v3-timeline::before {
  content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px;
  width: 1.5px; border-radius: 1px;
  background: linear-gradient(180deg, var(--green), rgba(52,211,153,.1));
}
.v3-event {
  position: relative; padding: 6px 10px 6px 0; font-size: 11px;
}
.v3-event::before {
  content: ''; position: absolute; left: -17px; top: 12px;
  width: 9px; height: 9px; border-radius: 50%;
  border: 2px solid var(--bg); z-index: 1;
}
.v3-event.done::before { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.v3-event.running::before { background: var(--blue); box-shadow: 0 0 6px var(--blue-glow); animation: dotPulse 2s ease-in-out infinite; }
.v3-event.warn::before { background: var(--orange); box-shadow: 0 0 6px var(--orange-glow); }
.v3-event.info::before { background: var(--cyan); }
/* Horizontal branch */
.v3-event::after {
  content: ''; position: absolute; left: -8px; top: 16px;
  width: 8px; height: 1.5px; border-radius: 1px;
  background: rgba(52,211,153,.2);
}
.v3-head {
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
}
.v3-tool {
  font-size: 10px; font-weight: 700; color: var(--green);
  background: var(--green-dim); padding: 1px 6px; border-radius: 3px;
}
.v3-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  margin-left: auto;
}
.v3-text { color: var(--text-dim); line-height: 1.45; }
.v3-event.running .v3-tool { color: var(--blue); background: var(--blue-dim); }
.v3-event.warn .v3-tool { color: var(--orange); background: var(--orange-dim); }

/* ============================================================
   VARIANT 4 — Grouped by time window
   ============================================================ */
.v4-group { margin-bottom: 14px; }
.v4-group:last-child { margin-bottom: 0; }
.v4-group-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
  color: var(--text-faint); padding: 0 4px 6px; display: flex; align-items: center; gap: 6px;
}
.v4-group-label .line { flex: 1; height: 1px; background: var(--border); }
.v4-list { display: flex; flex-direction: column; gap: 2px; }
.v4-event {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px; font-size: 11px;
  transition: background .12s;
}
.v4-event:hover { background: rgba(255,255,255,.025); }
.v4-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.v4-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  width: 38px; flex-shrink: 0;
}
.v4-text { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v4-badge {
  font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; flex-shrink: 0;
}

/* ============================================================
   VARIANT 5 — Terminal / Log style
   ============================================================ */
.v5-terminal {
  background: rgba(0,0,0,.3); border-radius: var(--radius-sm);
  padding: 12px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
}
.v5-toolbar {
  display: flex; align-items: center; gap: 6px; padding-bottom: 10px;
  margin-bottom: 10px; border-bottom: 1px solid rgba(148,163,184,.06);
}
.v5-dot-row { display: flex; gap: 5px; }
.v5-dot-row span {
  width: 8px; height: 8px; border-radius: 50%;
}
.v5-toolbar-title {
  font-size: 10px; color: var(--text-muted); margin-left: 8px;
}
.v5-log { display: flex; flex-direction: column; gap: 2px; }
.v5-line {
  display: flex; gap: 8px; padding: 2px 0; line-height: 1.5;
  opacity: 0; animation: termIn .25s var(--ease) forwards;
}
.v5-line:nth-child(1) { animation-delay: 0ms; }
.v5-line:nth-child(2) { animation-delay: 40ms; }
.v5-line:nth-child(3) { animation-delay: 80ms; }
.v5-line:nth-child(4) { animation-delay: 120ms; }
.v5-line:nth-child(5) { animation-delay: 160ms; }
.v5-line:nth-child(6) { animation-delay: 200ms; }
.v5-line:nth-child(7) { animation-delay: 240ms; }
.v5-line:nth-child(8) { animation-delay: 280ms; }
@keyframes termIn { to { opacity: 1; } }
.v5-ts { color: var(--text-faint); flex-shrink: 0; }
.v5-level { flex-shrink: 0; min-width: 36px; font-weight: 600; }
.v5-level.ok { color: var(--green); }
.v5-level.run { color: var(--blue); }
.v5-level.warn { color: var(--orange); }
.v5-level.err { color: var(--red); }
.v5-level.info { color: var(--cyan); }
.v5-msg { color: var(--text-dim); }
.v5-cursor {
  display: inline-block; width: 7px; height: 14px;
  background: var(--green); opacity: .7;
  animation: cursorBlink 1s step-end infinite;
  vertical-align: middle; margin-left: 2px;
}
@keyframes cursorBlink { 0%,100% { opacity: .7; } 50% { opacity: 0; } }

/* ============================================================
   VARIANT 6 — Card feed (each event is a card)
   ============================================================ */
.v6-list { display: flex; flex-direction: column; gap: 6px; }
.v6-card {
  background: rgba(255,255,255,.02); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  transition: all .15s; cursor: default; position: relative; overflow: hidden;
}
.v6-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
.v6-card.is-new {
  border-color: rgba(96,165,250,.15);
  background: rgba(96,165,250,.025);
}
.v6-card.is-new::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: .5;
}
.v6-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.v6-icon {
  width: 22px; height: 22px; border-radius: 6px; display: grid; place-items: center;
  font-size: 11px; flex-shrink: 0;
}
.v6-tool { font-size: 11px; font-weight: 600; color: var(--text); }
.v6-time {
  margin-left: auto; font-size: 9px; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
}
.v6-type {
  font-size: 7px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px;
}
.v6-text { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
.v6-meta {
  display: flex; gap: 12px; margin-top: 6px; padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,.03);
  font-size: 9px; color: var(--text-faint);
}

/* ============================================================
   VARIANT 7 — Ticker + list combo
   ============================================================ */
.v7-ticker-strip {
  background: rgba(255,255,255,.02); border-radius: 6px;
  padding: 6px 0; margin-bottom: 12px; overflow: hidden;
  border: 1px solid var(--border); position: relative;
}
.v7-ticker-strip::before, .v7-ticker-strip::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 40px; z-index: 2;
}
.v7-ticker-strip::before { left: 0; background: linear-gradient(90deg, var(--surface-card), transparent); }
.v7-ticker-strip::after { right: 0; background: linear-gradient(-90deg, var(--surface-card), transparent); }
.v7-ticker-track {
  display: flex; gap: 24px; animation: tickerScroll 25s linear infinite;
  white-space: nowrap; padding: 0 12px;
}
@keyframes tickerScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.v7-ticker-item {
  display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-muted);
  flex-shrink: 0;
}
.v7-ticker-dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.v7-ticker-text { white-space: nowrap; }

.v7-list { display: flex; flex-direction: column; gap: 2px; }
.v7-event {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 5px; font-size: 11px;
  transition: background .12s;
}
.v7-event:hover { background: rgba(255,255,255,.025); }
.v7-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  width: 38px; flex-shrink: 0;
}
.v7-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.v7-text { color: var(--text-dim); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ============================================================
   VARIANT 8 — Minimal / Whisper style
   ============================================================ */
.v8-list { display: flex; flex-direction: column; }
.v8-event {
  display: flex; align-items: baseline; gap: 10px;
  padding: 6px 0; font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,.02);
  transition: background .12s;
}
.v8-event:last-child { border-bottom: none; }
.v8-event:hover { background: rgba(255,255,255,.015); }
.v8-time {
  font-size: 10px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0; opacity: .6;
}
.v8-text { color: var(--text-dim); flex: 1; line-height: 1.5; }
.v8-text strong { color: var(--text); font-weight: 600; }
.v8-text .tool-name { color: var(--green); font-weight: 500; }
.v8-text .highlight { color: var(--blue); }
.v8-event.is-new .v8-text { color: var(--text); }
.v8-event.is-new .v8-time { opacity: 1; color: var(--blue); }

/* ============================================================
   ONLINE INDICATOR
   ============================================================ */
.online-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; font-weight: 700; color: var(--green);
  background: var(--green-dim); padding: 2px 8px 2px 6px;
  border-radius: 4px; letter-spacing: .4px; text-transform: uppercase;
}
.online-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--green);
  animation: liveBlink 1.3s ease-in-out infinite;
}

/* Filter tabs */
.filter-tabs {
  display: flex; gap: 2px; margin-bottom: 10px;
}
.filter-tab {
  font-size: 9px; font-weight: 600; padding: 3px 8px; border-radius: 4px;
  color: var(--text-faint); cursor: pointer; transition: all .12s;
  border: none; background: none; font-family: inherit;
}
.filter-tab:hover { color: var(--text-muted); background: rgba(255,255,255,.03); }
.filter-tab.active { color: var(--text); background: rgba(255,255,255,.05); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Activity Feed Components</div>
  <div class="page-sub">Agent 3 — Feeds & Panels | 8 design variants for the live activity feed</div>
</div>

<div class="grid" id="grid"></div>

<script>
/* ====================================================================
   SHARED EVENT DATA
   ==================================================================== */
const EVENTS = [
  { time: '12:04', tool: 'Simulate', text: 'Checkpoint saved for hypothesis 7 -- thermal transport at 62%', status: 'info', icon: '\u26a1', isNew: true },
  { time: '12:02', tool: 'Ablation', text: 'Study complete for H4 -- attention module contributes 18.3%', status: 'done', icon: '\u2705', isNew: true },
  { time: '11:58', tool: 'Simulate', text: 'Main experiment initiated for H7: nano-scale thermal transport', status: 'running', icon: '\ud83e\uddea', isNew: false },
  { time: '11:55', tool: 'Evaluate', text: 'Statistical significance confirmed for H6: p < 0.001, d = 1.42', status: 'done', icon: '\ud83d\udcca', isNew: false },
  { time: '11:51', tool: 'Ablation', text: 'H5 flagged -- attention contribution 3.1%, below threshold', status: 'warn', icon: '\u26a0\ufe0f', isNew: false },
  { time: '11:47', tool: 'Simulate', text: 'H6 complete: +27.4% over strongest baseline (ResNet-KG)', status: 'done', icon: '\u2705', isNew: false },
  { time: '11:42', tool: 'Evaluate', text: 'Baseline comparison table for H1-6: mean delta +19.8%', status: 'done', icon: '\ud83d\udcca', isNew: false },
  { time: '11:38', tool: 'Optimize', text: 'GPU memory reduced 14.2GB to 11.8GB via gradient checkpointing', status: 'info', icon: '\u26a1', isNew: false },
];

const STATUS_COLORS = {
  done: { dot: 'var(--green)', bg: 'var(--green-dim)', label: 'Done' },
  running: { dot: 'var(--blue)', bg: 'var(--blue-dim)', label: 'Run' },
  warn: { dot: 'var(--orange)', bg: 'var(--orange-dim)', label: 'Alert' },
  info: { dot: 'var(--cyan)', bg: 'var(--cyan-dim)', label: 'Info' },
  error: { dot: 'var(--red)', bg: 'var(--red-dim)', label: 'Error' },
};

const TYPE_CLASS = { done: 't-ok', running: 't-gen', warn: 't-warn', info: 't-info' };

/* ====================================================================
   VARIANT 1 — Compact
   ==================================================================== */
function renderV1() {
  return `
    <div class="feed-header">
      <span class="feed-title">Activity Feed</span>
      <span class="online-badge"><span class="online-dot"></span> Online</span>
      <span class="feed-count">${EVENTS.length} events</span>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active">All</button>
      <button class="filter-tab">Done</button>
      <button class="filter-tab">Running</button>
      <button class="filter-tab">Alerts</button>
    </div>
    <div class="feed-scroll">
      <div class="v1-list">
        ${EVENTS.map(e => `
          <div class="v1-event ${e.isNew ? 'is-new' : ''}">
            <span class="v1-time">${e.time}</span>
            <div class="v1-dot ${e.status}"></div>
            <span class="v1-tool">${e.tool}</span>
            <span class="v1-text">${e.text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 2 — Rich (from v4.html pattern)
   ==================================================================== */
function renderV2() {
  return `
    <div class="feed-header">
      <span class="feed-title">Activity Feed</span>
      <span class="live-badge"><span class="live-badge-dot"></span> LIVE</span>
      <span class="feed-count">${EVENTS.length} events</span>
    </div>
    <div class="feed-scroll">
      <div class="v2-list">
        ${EVENTS.map((e, i) => `
          <div class="v2-event ${e.isNew ? 'is-new' : ''}" style="animation-delay:${i * 60}ms">
            <span class="v2-time">${e.time}</span>
            <div class="v2-icon" style="background:var(--blue-dim);color:var(--blue)">${e.icon}</div>
            <div class="v2-body">
              <div class="v2-module">Test Hypothesis <span class="v2-module-tag" style="background:var(--blue-dim);color:var(--blue)">BLUE</span></div>
              <div class="v2-text">${e.text}</div>
            </div>
            <span class="v2-type ${TYPE_CLASS[e.status]}">${STATUS_COLORS[e.status].label}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 3 — Timeline
   ==================================================================== */
function renderV3() {
  return `
    <div class="feed-header">
      <span class="feed-title">Activity Timeline</span>
      <span class="online-badge"><span class="online-dot"></span> Live</span>
      <span class="feed-count">${EVENTS.length}</span>
    </div>
    <div class="feed-scroll">
      <div class="v3-timeline">
        ${EVENTS.map(e => `
          <div class="v3-event ${e.status}">
            <div class="v3-head">
              <span class="v3-tool">${e.tool}</span>
              <span class="v3-time">${e.time}</span>
            </div>
            <div class="v3-text">${e.text}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 4 — Grouped by time window
   ==================================================================== */
function renderV4() {
  const groups = [
    { label: 'Last 5 minutes', events: EVENTS.slice(0, 2) },
    { label: '5-15 minutes ago', events: EVENTS.slice(2, 5) },
    { label: '15-30 minutes ago', events: EVENTS.slice(5) },
  ];
  return `
    <div class="feed-header">
      <span class="feed-title">Activity Feed</span>
      <span class="live-badge"><span class="live-badge-dot"></span> LIVE</span>
      <span class="feed-count">${EVENTS.length} events</span>
    </div>
    <div class="feed-scroll">
      ${groups.map(g => `
        <div class="v4-group">
          <div class="v4-group-label">${g.label} <span class="line"></span></div>
          <div class="v4-list">
            ${g.events.map(e => `
              <div class="v4-event">
                <span class="v4-time">${e.time}</span>
                <div class="v4-dot" style="background:${STATUS_COLORS[e.status].dot}"></div>
                <span class="v4-text">${e.text}</span>
                <span class="v4-badge" style="background:${STATUS_COLORS[e.status].bg};color:${STATUS_COLORS[e.status].dot}">${STATUS_COLORS[e.status].label}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

/* ====================================================================
   VARIANT 5 — Terminal / Log
   ==================================================================== */
function renderV5() {
  const levels = { done: 'ok', running: 'run', warn: 'warn', info: 'info', error: 'err' };
  const levelLabels = { done: ' OK ', running: 'RUN ', warn: 'WARN', info: 'INFO', error: ' ERR' };
  return `
    <div class="v5-terminal">
      <div class="v5-toolbar">
        <div class="v5-dot-row">
          <span style="background:var(--red);opacity:.7"></span>
          <span style="background:var(--orange);opacity:.7"></span>
          <span style="background:var(--green);opacity:.7"></span>
        </div>
        <span class="v5-toolbar-title">aii-pipeline.log</span>
      </div>
      <div class="feed-scroll">
        <div class="v5-log">
          ${EVENTS.map(e => `
            <div class="v5-line">
              <span class="v5-ts">${e.time}</span>
              <span class="v5-level ${levels[e.status]}">[${levelLabels[e.status]}]</span>
              <span class="v5-msg">${e.tool.toLowerCase()}: ${e.text}</span>
            </div>
          `).join('')}
          <div class="v5-line">
            <span class="v5-ts">12:05</span>
            <span class="v5-level run">[RUN ]</span>
            <span class="v5-msg">simulate: processing hypothesis 7...<span class="v5-cursor"></span></span>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 6 — Card feed
   ==================================================================== */
function renderV6() {
  return `
    <div class="feed-header">
      <span class="feed-title">Activity Feed</span>
      <span class="online-badge"><span class="online-dot"></span> Online</span>
      <span class="feed-count">${EVENTS.length} events</span>
    </div>
    <div class="feed-scroll">
      <div class="v6-list">
        ${EVENTS.slice(0, 5).map(e => `
          <div class="v6-card ${e.isNew ? 'is-new' : ''}">
            <div class="v6-top">
              <div class="v6-icon" style="background:${STATUS_COLORS[e.status].bg};color:${STATUS_COLORS[e.status].dot}">${e.icon}</div>
              <span class="v6-tool">${e.tool}</span>
              <span class="v6-time">${e.time}</span>
              <span class="v6-type" style="background:${STATUS_COLORS[e.status].bg};color:${STATUS_COLORS[e.status].dot}">${STATUS_COLORS[e.status].label}</span>
            </div>
            <div class="v6-text">${e.text}</div>
            <div class="v6-meta">
              <span>Module: Test Hypothesis</span>
              <span>Round 7</span>
              <span>Tokens: 4.2k</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 7 — Ticker + list combo
   ==================================================================== */
function renderV7() {
  const tickerItems = EVENTS.map(e =>
    `<div class="v7-ticker-item">
      <div class="v7-ticker-dot" style="background:${STATUS_COLORS[e.status].dot}"></div>
      <span class="v7-ticker-text">${e.tool}: ${e.text.split('--')[0].trim()}</span>
    </div>`
  ).join('');

  return `
    <div class="feed-header">
      <span class="feed-title">Activity Feed</span>
      <span class="live-badge"><span class="live-badge-dot"></span> LIVE</span>
      <span class="feed-count">${EVENTS.length}</span>
    </div>
    <div class="v7-ticker-strip">
      <div class="v7-ticker-track">${tickerItems}${tickerItems}</div>
    </div>
    <div class="feed-scroll">
      <div class="v7-list">
        ${EVENTS.map(e => `
          <div class="v7-event">
            <span class="v7-time">${e.time}</span>
            <div class="v7-dot" style="background:${STATUS_COLORS[e.status].dot}"></div>
            <span class="v7-text">${e.tool}: ${e.text}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ====================================================================
   VARIANT 8 — Minimal / Whisper
   ==================================================================== */
function renderV8() {
  return `
    <div class="feed-header">
      <span class="feed-title">Activity</span>
      <span class="feed-count">${EVENTS.length}</span>
    </div>
    <div class="feed-scroll">
      <div class="v8-list">
        ${EVENTS.map(e => `
          <div class="v8-event ${e.isNew ? 'is-new' : ''}">
            <span class="v8-time">${e.time}</span>
            <div class="v8-text">
              <span class="tool-name">${e.tool}</span>
              ${e.text.replace(/(\d+\.?\d*%?)/g, '<span class="highlight">$1</span>')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ====================================================================
   RENDER ALL VARIANTS
   ==================================================================== */
const VARIANTS = [
  { num: 1, name: 'Compact — One-line events', render: renderV1 },
  { num: 2, name: 'Rich — Icons + tags + badges', render: renderV2 },
  { num: 3, name: 'Timeline — Vertical line + branches', render: renderV3 },
  { num: 4, name: 'Grouped — By time window', render: renderV4 },
  { num: 5, name: 'Terminal — Log style', render: renderV5 },
  { num: 6, name: 'Card — Individual event cards', render: renderV6 },
  { num: 7, name: 'Ticker — Scrolling strip + list', render: renderV7 },
  { num: 8, name: 'Minimal — Whisper style', render: renderV8 },
];

const grid = document.getElementById('grid');
VARIANTS.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `
    <div class="variant-label"><span class="num">${v.num}</span> ${v.name}</div>
    <div class="variant-body">${v.render()}</div>
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
