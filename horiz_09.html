<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Horizontal Layout + Live Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:     #0f1117;
  --bg-surface:  #161921;
  --bg-card:     #1c1f2b;
  --bg-hover:    #242838;
  --bg-elevated: #282c3c;
  --border:      #2a2e3d;
  --border-dim:  #1f2333;
  --border-lite: #333750;
  --text-100:    #e8eaf0;
  --text-200:    #b0b4c4;
  --text-300:    #7a7f94;
  --text-400:    #545870;
  --accent:      #5b8af5;
  --accent-dim:  #3a5fb8;
  --accent-glow: rgba(91, 138, 245, 0.25);
  --accent-bg:   rgba(91, 138, 245, 0.08);
  --green:       #34d399;
  --green-dim:   rgba(52, 211, 153, 0.15);
  --green-glow:  rgba(52, 211, 153, 0.3);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251, 191, 36, 0.12);
  --red:         #f87171;
  --red-dim:     rgba(248, 113, 113, 0.12);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167, 139, 250, 0.12);
  --radius:      8px;
  --radius-lg:   12px;
  --transition:  180ms ease;
}

html { font-size: 14px; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-200);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout Shell ───────────────────────────────────────────── */
.shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── Topbar ─────────────────────────────────────────────────── */
.topbar {
  height: 48px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 14px;
  flex-shrink: 0;
  z-index: 20;
}

.topbar-brand {
  display: flex;
  align-items: center;
  gap: 9px;
}

.topbar-logo {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.66rem;
  font-weight: 700;
  color: #fff;
}

.topbar-title {
  font-size: 0.84rem;
  font-weight: 600;
  color: var(--text-100);
}

.topbar-sep {
  color: var(--text-400);
  font-size: 0.66rem;
}

.topbar-bc {
  font-size: 0.76rem;
  color: var(--text-300);
  font-weight: 500;
}

.topbar-run {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 9px;
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-glow); }
  50% { opacity: 0.7; box-shadow: 0 0 8px 3px var(--green-glow); }
}

.topbar-run-label {
  font-size: 0.72rem;
  color: var(--text-300);
  font-variant-numeric: tabular-nums;
}

.topbar-run-id {
  font-weight: 600;
  color: var(--text-200);
}

/* ── Horizontal Card Strip ──────────────────────────────────── */
.card-strip {
  display: flex;
  align-items: stretch;
  gap: 12px;
  padding: 14px 24px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-dim);
  flex-shrink: 0;
  z-index: 15;
}

/* Ring in the strip */
.strip-ring {
  width: 90px;
  min-width: 90px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.ring-container {
  position: relative;
  width: 66px;
  height: 66px;
}

.ring-svg { width: 100%; height: 100%; }

.ring-track {
  fill: none;
  stroke: var(--border);
  stroke-width: 3;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 3;
  stroke-linecap: round;
  filter: drop-shadow(0 0 4px var(--accent-glow));
}

.ring-dashed {
  fill: none;
  stroke: var(--text-400);
  stroke-width: 1;
  stroke-dasharray: 4 6;
  opacity: 0.2;
  animation: ringRot 12s linear infinite;
  transform-origin: 50% 50%;
}

@keyframes ringRot {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.ring-endpoint {
  fill: var(--accent);
  filter: drop-shadow(0 0 4px rgba(91,138,245,0.5));
  animation: epGlow 2.5s ease-in-out infinite;
}

@keyframes epGlow {
  0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px rgba(91,138,245,0.4)); }
  50%      { opacity: 0.6; filter: drop-shadow(0 0 10px rgba(91,138,245,0.7)); }
}

.ring-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}

.ring-pct {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-100);
  line-height: 1.1;
}

.ring-lbl {
  font-size: 0.52rem;
  color: var(--text-400);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ── Module Cards (Horizontal) ──────────────────────────────── */
.module-card {
  flex: 1;
  min-width: 0;
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 10px 12px 8px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.module-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: 12px 0 0 12px;
}

.module-card:hover {
  background: var(--bg-hover);
  border-color: var(--border);
}

.module-card.selected {
  background: var(--bg-hover);
  border-color: var(--border-lite);
}

.module-card.active-state {
  border-color: var(--accent-dim);
  animation: cardGlow 2.5s ease-in-out infinite;
}

@keyframes cardGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(91,138,245,0); }
  50%      { box-shadow: 0 0 14px 0 rgba(91,138,245,0.12); }
}

.module-card.active-state::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(91,138,245,0.06), transparent);
  animation: shimSweep 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes shimSweep {
  0%   { left: -50%; }
  45%  { left: 120%; }
  100% { left: 120%; }
}

.module-card[data-color="green"]::before  { background: var(--green); }
.module-card[data-color="blue"]::before   { background: var(--accent); }
.module-card[data-color="purple"]::before { background: var(--purple); }
.module-card[data-color="amber"]::before  { background: var(--amber); }
.mc-header { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.mc-icon { width:24px; height:24px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:0.66rem; font-weight:600; flex-shrink:0; }
.mc-name { font-size:0.72rem; font-weight:600; color:var(--text-100); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.mc-badge { font-size:0.58rem; padding:2px 6px; border-radius:4px; font-weight:500; flex-shrink:0; }

.mc-badge.done    { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--accent-bg); color: var(--accent); }
.mc-badge.pending { background: rgba(122,127,148,0.08); color: var(--text-400); }
.mc-metric { font-size:0.92rem; font-weight:700; color:var(--text-100); margin-bottom:5px; font-variant-numeric:tabular-nums; }
.mc-bar { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; margin-bottom:6px; }
.mc-bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }

/* Sub-module list */
.sub-list {
  border-top: 1px solid var(--border-dim);
  padding-top: 5px;
}

.sub-row {
  display: flex;
  align-items: center;
  height: 20px;
  padding: 0 3px;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.15s;
}

.sub-row:hover { background: rgba(255,255,255,0.04); }
.sub-row.selected { background: rgba(255,255,255,0.07); }

.sub-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 5px;
}

.sub-row.done .sub-dot    { background: var(--green); }
.sub-row.active .sub-dot  {
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: dotPulse 2s ease-in-out infinite;
}
.sub-row.pending .sub-dot { background: var(--text-400); opacity: 0.35; }

@keyframes dotPulse {
  0%, 100% { box-shadow: 0 0 5px var(--accent), 0 0 10px rgba(91,138,245,0.3); }
  50%      { box-shadow: 0 0 8px var(--accent), 0 0 16px rgba(91,138,245,0.5); }
}

.sub-name {
  font-size: 0.6rem;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sub-row.done .sub-name    { color: var(--text-200); }
.sub-row.active .sub-name  { color: var(--text-100); font-weight: 500; }
.sub-row.pending .sub-name { color: var(--text-400); opacity: 0.6; }
.sub-time { font-size:0.54rem; color:var(--text-400); flex-shrink:0; margin-left:3px; font-variant-numeric:tabular-nums; }

/* ── Content Area ───────────────────────────────────────────── */
.content-wrapper { flex:1; overflow:hidden; display:flex; flex-direction:column; position:relative; }
#particleCanvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }
.content-scroll { flex:1; overflow-y:auto; overflow-x:hidden; padding:20px 24px 36px; position:relative; z-index:2; }
.content-scroll::-webkit-scrollbar { width: 5px; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content-view { animation: cFadeIn 200ms ease-out forwards; }
@keyframes cFadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Content Header ─────────────────────────────────────────── */
.content-header { margin-bottom: 18px; }
.content-title { font-size:1.15rem; font-weight:700; color:var(--text-100); margin-bottom:3px; }
.content-subtitle { font-size:0.78rem; color:var(--text-300); margin-bottom:8px; }
.cstatus { display:inline-flex; align-items:center; gap:6px; font-size:0.7rem; font-weight:600; padding:3px 9px; border-radius:5px; }
.cstatus.done { background: var(--green-dim); color: var(--green); }
.cstatus.run  { background: var(--accent-bg); color: var(--accent); }
.cstatus.pend { background: rgba(122,127,148,0.08); color: var(--text-400); }
.cstatus.run .shimmer-text {
  background: linear-gradient(90deg, var(--accent) 0%, #93c5fd 50%, var(--accent) 100%);
  background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: shimTxt 2.5s linear infinite;
}
@keyframes shimTxt { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ── Stat Grid ──────────────────────────────────────────────── */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
.stat-card { background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--radius-lg); padding:14px 16px; }
.stat-label { font-size:0.64rem; color:var(--text-300); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px; }
.stat-value { font-size:1.25rem; font-weight:700; color:var(--text-100); margin-bottom:7px; font-variant-numeric:tabular-nums; }
.stat-bar-track { width:100%; height:4px; background:var(--border-dim); border-radius:2px; overflow:hidden; }
.stat-bar-fill { height:100%; border-radius:2px; width:0%; transition:width 0.6s cubic-bezier(0.22,0.61,0.36,1); }

.stat-bar-fill.blue   { background: var(--accent); }
.stat-bar-fill.green  { background: var(--green); }
.stat-bar-fill.purple { background: var(--purple); }
.stat-bar-fill.amber  { background: var(--amber); }
.stat-sub { font-size: 0.6rem; color: var(--text-400); margin-top: 4px; }

/* ── Summary Panel ──────────────────────────────────────────── */
.summary-panel { background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--radius-lg); padding:16px 18px; margin-bottom:18px; }
.summary-header { display:flex; align-items:center; gap:9px; margin-bottom:8px; }
.summary-icon { width:22px; height:22px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:0.66rem; font-weight:600; flex-shrink:0; }
.summary-title { font-size:0.76rem; font-weight:600; color:var(--text-100); }
.summary-text { font-size:0.78rem; color:var(--text-200); line-height:1.7; }

.summary-text p { margin-bottom: 7px; }
.summary-text p:last-child { margin-bottom: 0; }
.detail-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:10px; }
.detail-chip { font-size:0.6rem; padding:2px 7px; border-radius:4px; background:var(--bg-hover); color:var(--text-300); border:1px solid var(--border-dim); }
.detail-chip.accent { background:var(--accent-bg); color:var(--accent); border-color:rgba(91,138,245,0.15); }

/* ── Content Columns ────────────────────────────────────────── */
.content-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* ── Item Panel ─────────────────────────────────────────────── */
.item-panel { background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--radius-lg); padding:14px 16px; }
.panel-title { font-size:0.74rem; font-weight:600; color:var(--text-100); margin-bottom:9px; display:flex; align-items:center; gap:7px; }
.panel-count { font-size:0.6rem; color:var(--text-400); background:var(--bg-hover); padding:1px 5px; border-radius:3px; }
.item-row { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:var(--radius); margin-bottom:2px; position:relative; overflow:hidden; transition:background var(--transition); }
.item-row:hover { background: var(--bg-hover); }
.item-row.running-item { background: rgba(91,138,245,0.03); }
.item-row.running-item::before {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(91,138,245,0.04), transparent);
  animation:rowShim 2.5s ease-in-out infinite; pointer-events:none;
}
@keyframes rowShim { 0%{left:-60%} 55%{left:120%} 100%{left:120%} }
.item-idx { font-size:0.6rem; color:var(--text-400); width:14px; text-align:center; flex-shrink:0; }
.item-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

.item-dot.done    { background: var(--green); }
.item-dot.running { background: var(--accent); }
.item-dot.pending { background: var(--text-400); }
.item-name { font-size:0.72rem; color:var(--text-200); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-row.running-item .item-name { color: var(--text-100); font-weight: 500; }
.item-score { font-size:0.62rem; color:var(--text-300); flex-shrink:0; font-variant-numeric:tabular-nums; }
.item-meta { font-size:0.62rem; color:var(--text-400); flex-shrink:0; font-variant-numeric:tabular-nums; }

/* ═══════════════════════════════════════════════════════════════
   LIVE ACTIVITY FEED — scrolling log, new entries every 4s
   ═══════════════════════════════════════════════════════════════ */
.feed-panel { background:var(--bg-card); border:1px solid var(--border-dim); border-radius:var(--radius-lg); padding:14px 16px; margin-bottom:18px; }
.feed-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.feed-title { font-size:0.74rem; font-weight:600; color:var(--text-100); display:flex; align-items:center; gap:8px; }
.feed-live-badge { display:inline-flex; align-items:center; gap:4px; font-size:0.56rem; font-weight:600; padding:2px 7px; border-radius:4px; background:rgba(52,211,153,0.1); color:var(--green); text-transform:uppercase; letter-spacing:0.06em; }
.feed-live-dot { width:5px; height:5px; border-radius:50%; background:var(--green); animation:fDotP 1.5s ease-in-out infinite; }
@keyframes fDotP { 0%,100%{opacity:1} 50%{opacity:0.3} }
.feed-count { font-size:0.62rem; color:var(--text-400); font-variant-numeric:tabular-nums; }
.feed-scroll { max-height:240px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.feed-scroll::-webkit-scrollbar { width: 4px; }
.feed-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.feed-entry { display:flex; align-items:flex-start; gap:9px; padding:7px 8px; border-radius:5px; margin-bottom:2px; transition:opacity 0.4s ease, transform 0.4s ease, background 0.2s ease; }
.feed-entry:hover { background: rgba(255,255,255,0.02); }
.feed-entry.newest { background:rgba(91,138,245,0.04); border-left:2px solid var(--accent); padding-left:6px; }
.feed-entry.entering { opacity:0; transform:translateY(-10px); }
.feed-entry.entered { opacity:1; transform:translateY(0); }
.feed-ts { font-size:0.58rem; color:var(--text-400); flex-shrink:0; width:50px; padding-top:2px; font-variant-numeric:tabular-nums; font-weight:500; }
.feed-ind { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:5px; }

.feed-ind.green  { background: var(--green); }
.feed-ind.blue   { background: var(--accent); }
.feed-ind.amber  { background: var(--amber); }
.feed-ind.red    { background: var(--red); }
.feed-ind.purple { background: var(--purple); }
.feed-body { flex: 1; min-width: 0; }
.feed-msg { font-size:0.72rem; color:var(--text-200); line-height:1.5; }
.feed-entry.newest .feed-msg { color: var(--text-100); }
.feed-src { font-size:0.56rem; color:var(--text-400); margin-top:2px; }
.feed-src-badge { display:inline-flex; padding:1px 5px; border-radius:3px; font-size:0.52rem; font-weight:500; background:var(--bg-hover); border:1px solid var(--border-dim); }

/* ── Misc ───────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-400);
  font-size: 0.78rem;
}

.kbd-hint {
  position: fixed;
  bottom: 12px;
  right: 18px;
  display: flex;
  gap: 10px;
  z-index: 30;
}

.kbd-hint span {
  font-size: 0.6rem;
  color: var(--text-400);
  display: flex;
  align-items: center;
  gap: 3px;
}

.kbd-hint kbd {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 4px;
  font-family: inherit;
  font-size: 0.56rem;
}
</style>
</head>
<body>

<div class="shell">
  <!-- ═══════════════════════════════════════════════════════════
       TOPBAR
       ═══════════════════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">AI</div>
      <span class="topbar-title">AI Inventor</span>
    </div>
    <span class="topbar-sep">/</span>
    <span class="topbar-bc" id="topbarBC">Hypothesis Loop</span>
    <div class="topbar-run">
      <div class="live-dot"></div>
      <span class="topbar-run-label">
        Run <span class="topbar-run-id">#0047</span> &mdash; Active
      </span>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════════
       HORIZONTAL CARD STRIP: Ring + 4 Module Cards
       ═══════════════════════════════════════════════════════════ -->
  <div class="card-strip" id="cardStrip">
    <!-- Progress Ring -->
    <div class="strip-ring">
      <div class="ring-container">
        <svg class="ring-svg" viewBox="0 0 80 80">
          <circle class="ring-dashed" cx="40" cy="40" r="38"/>
          <circle class="ring-track" cx="40" cy="40" r="30"
                  transform="rotate(-90 40 40)"/>
          <circle class="ring-progress" cx="40" cy="40" r="30"
                  transform="rotate(-90 40 40)" id="ringProgress"/>
          <circle class="ring-endpoint" cx="0" cy="0" r="3"
                  id="ringEndpoint"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">40%</div>
          <div class="ring-lbl">Done</div>
        </div>
      </div>
    </div>

    <!-- Module cards injected by JS -->
    <div id="moduleContainer" style="display:contents;"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       CONTENT AREA: Summary + Stats + Live Activity Feed
       ═══════════════════════════════════════════════════════════ -->
  <div class="content-wrapper">
    <canvas id="particleCanvas"></canvas>
    <div class="content-scroll" id="contentScroll">
      <!-- Injected by JS -->
    </div>
  </div>
</div>

/* ═══════════════════════════════════════════════════════════════
   RENDER: Module Cards in Horizontal Strip
   ═══════════════════════════════════════════════════════════════ */
function renderCards() {
  const container = document.getElementById('moduleContainer');
  container.innerHTML = '';

  MODULES.forEach((mod, mi) => {
    const card = document.createElement('div');
    card.className = 'module-card'
      + (mi === activeModIdx ? ' selected' : '')
      + (mod.status === 'running' ? ' active-state' : '');
    card.dataset.color = mod.colorName;

    const bc = mod.status === 'done' ? 'done'
             : mod.status === 'running' ? 'running' : 'pending';
    const bl = mod.status === 'done' ? 'Done'
             : mod.status === 'running' ? 'Running' : 'Pending';

    /* Build sub-module rows */
    let subHtml = '';
    if (mod.subModules.length) {
      const rows = mod.subModules.map((s, si) => {
        const sc = s.status === 'done' ? 'done'
                 : s.status === 'running' ? 'active' : 'pending';
        const sel = (mi === activeModIdx && si === activeSubIdx) ? ' selected' : '';
        return `<div class="sub-row ${sc}${sel}" data-mi="${mi}" data-si="${si}">
          <span class="sub-dot"></span>
          <span class="sub-name">${s.label}</span>
          <span class="sub-time">${s.time}</span>
        </div>`;
      }).join('');
      subHtml = '<div class="sub-list">' + rows + '</div>';
    }

    card.innerHTML = `
      <div class="mc-header">
        <div class="mc-icon" style="background:${mod.color}12;color:${mod.color}">
          ${mod.icon}
        </div>
        <span class="mc-name">${mod.name}</span>
        <span class="mc-badge ${bc}">${bl}</span>
      </div>
      <div class="mc-metric">${mod.metric}</div>
      <div class="mc-bar">
        <div class="mc-bar-fill"
             style="width:${mod.progress}%;background:${mod.color}">
        </div>
      </div>
      ${subHtml}
    `;

    /* Click on card selects module */
    card.addEventListener('click', (e) => {
      if (e.target.closest('.sub-row')) return;
      activeModIdx = mi;
      activeSubIdx = 0;
      feedVisible = 10;
      refresh();
    });

    /* Click on sub-rows */
    card.querySelectorAll('.sub-row').forEach(row => {
      row.addEventListener('click', (e) => {
        e.stopPropagation();
        activeModIdx = parseInt(row.dataset.mi);
        activeSubIdx = parseInt(row.dataset.si);
        refresh();
      });
    });

    container.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════════════════════
   LIVE FEED TIMER — Appends a new entry every 4 seconds
   Only active when the selected module has running sub-modules.
   ═══════════════════════════════════════════════════════════════ */
function startFeedTimer() {
  if (feedTimerRef) clearInterval(feedTimerRef);

  feedTimerRef = setInterval(() => {
    const mod = MODULES[activeModIdx];
    const hasRunning = mod.subModules.some(s => s.status === 'running');
    if (!hasRunning) return;

    const relevant = FEED.filter(e => e.mod === mod.id || e.mod === 'seed');

    /* Cycle back when all events have been shown */
    if (feedVisible >= relevant.length) {
      feedVisible = Math.min(8, relevant.length);
      renderContent();
      return;
    }

    feedVisible++;

    const feedScroll = document.getElementById('feedScroll');
    const feedCount  = document.getElementById('feedCount');
    if (!feedScroll) return;

    /* Remove newest highlight from previous entry */
    const prevNewest = feedScroll.querySelector('.feed-entry.newest');
    if (prevNewest) prevNewest.classList.remove('newest');

    /* Build new entry */
    const display = relevant.slice(0, feedVisible);
    const ev = display[display.length - 1];

    const entry = document.createElement('div');
    entry.className = 'feed-entry entering newest';
    entry.innerHTML = `
      <span class="feed-ts">${ev.time}</span>
      <span class="feed-ind ${ev.c}"></span>
      <div class="feed-body">
        <div class="feed-msg">${ev.msg}</div>
        <div class="feed-src">
          <span class="feed-src-badge">${ev.src}</span>
        </div>
      </div>
    `;

    feedScroll.appendChild(entry);

    /* Trigger fade-in transition */
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        entry.classList.remove('entering');
        entry.classList.add('entered');
      });
    });

    /* Auto-scroll to bottom */
    if (autoScrollFeed) {
      setTimeout(() => {
        feedScroll.scrollTop = feedScroll.scrollHeight;
      }, 50);
    }

    /* Update event counter */
    if (feedCount) {
      feedCount.textContent =
        display.length + ' of ' + relevant.length + ' events';
    }
  }, 4000);
}

/* Pause auto-scroll when user manually scrolls up */
function setupFeedScroll() {
  const feedScroll = document.getElementById('feedScroll');
  if (!feedScroll) return;
  feedScroll.addEventListener('scroll', () => {
    const atBottom = feedScroll.scrollTop + feedScroll.clientHeight
                   >= feedScroll.scrollHeight - 20;
    autoScrollFeed = atBottom;
  });
}

/* ═══════════════════════════════════════════════════════════════
   RING ENDPOINT POSITION (40% progress)
   ═══════════════════════════════════════════════════════════════ */
function updateRing() {
  const progress = 0.4;
  const circumference = 2 * Math.PI * 30;

  const ring = document.getElementById('ringProgress');
  ring.style.strokeDasharray  = circumference;
  ring.style.strokeDashoffset = circumference * (1 - progress);

  /* Position glowing endpoint at arc tip */
  const angle = -90 + (360 * progress);
  const rad   = angle * Math.PI / 180;
  const cx    = 40 + 30 * Math.cos(rad);
  const cy    = 40 + 30 * Math.sin(rad);

  const ep = document.getElementById('ringEndpoint');
  ep.setAttribute('cx', cx.toFixed(2));
  ep.setAttribute('cy', cy.toFixed(2));
}

/* ═══════════════════════════════════════════════════════════════
   PARTICLE CANVAS — Subtle ambient particles rising upward
   ═══════════════════════════════════════════════════════════════ */
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizePCanvas() {
  const r = pCanvas.parentElement.getBoundingClientRect();
  pCanvas.width  = r.width;
  pCanvas.height = r.height;
}

function mkParticle() {
  return {
    x: Math.random() * pCanvas.width,
    y: Math.random() * pCanvas.height,
    vx: (Math.random() - 0.5) * 0.3,
    vy: -0.15 - Math.random() * 0.25,
    size: 1 + Math.random() * 1.5,
    opacity: 0.08 + Math.random() * 0.15,
    life: 0,
    maxLife: 300 + Math.random() * 200,
  };
}

function initParticles() {
  particles = [];
  for (let i = 0; i < 18; i++) {
    const p = mkParticle();
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }
}

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);

  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life++;

    if (p.life >= p.maxLife || p.y < -10) {
      particles[i] = mkParticle();
      particles[i].y = pCanvas.height + 10;
      return;
    }

    const fade  = Math.min(p.life / 40, (p.maxLife - p.life) / 40, 1);
    const alpha = p.opacity * fade;

    /* Soft glow halo */
    const g = pCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
    g.addColorStop(0, `rgba(91, 138, 245, ${alpha * 0.4})`);
    g.addColorStop(1, 'rgba(91, 138, 245, 0)');
    pCtx.fillStyle = g;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    pCtx.fill();

    /* Bright core dot */
    pCtx.fillStyle = `rgba(147, 197, 253, ${alpha})`;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fill();
  });

  requestAnimationFrame(drawParticles);
}

/* ═══════════════════════════════════════════════════════════════
   KEYBOARD NAVIGATION
   ═══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  const mod = MODULES[activeModIdx];

  if (e.key === 'ArrowRight' && activeModIdx < MODULES.length - 1) {
    e.preventDefault();
    activeModIdx++;
    activeSubIdx = 0;
    feedVisible = 10;
    refresh();
  } else if (e.key === 'ArrowLeft' && activeModIdx > 0) {
    e.preventDefault();
    activeModIdx--;
    activeSubIdx = 0;
    feedVisible = 10;
    refresh();
  } else if (e.key === 'ArrowDown' && activeSubIdx < mod.subModules.length - 1) {
    e.preventDefault();
    activeSubIdx++;
    refresh();
  } else if (e.key === 'ArrowUp' && activeSubIdx > 0) {
    e.preventDefault();
    activeSubIdx--;
    refresh();
  }
});

/* ═══════════════════════════════════════════════════════════════
   REFRESH + INIT
   ═══════════════════════════════════════════════════════════════ */
function refresh() {
  renderCards();
  renderContent();
  setupFeedScroll();
}

function init() {
  resizePCanvas();
  updateRing();
  renderCards();
  renderContent();
  setupFeedScroll();

  /* Start canvas particle animation */
  initParticles();
  drawParticles();

  /* Start live feed timer (4s interval) */
  startFeedTimer();
}

/* Resize handler */
window.addEventListener('resize', () => {
  resizePCanvas();
  initParticles();
});

/* Launch */
init();
</script>
</body>
