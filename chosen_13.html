<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — The Chosen Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f1117;
    --surface:  #181b23;
    --surface2: #1e222c;
    --border:   #272c38;
    --text:     #c9cdd8;
    --muted:    #6b7280;
    --bright:   #e8eaf0;
    --green:    #34d399;
    --purple:   #a78bfa;
    --blue:     #60a5fa;
    --amber:    #fbbf24;
    --slate:    #475569;
    --green-15: rgba(52, 211, 153, .12);
    --purple-15: rgba(167, 139, 250, .12);
    --blue-15:  rgba(96, 165, 250, .12);
    --amber-15: rgba(251, 191, 36, .12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--purple); color: #fff; }

  /* ── Ring Sidebar ──────────────────────────────────────── */
  .ring-sidebar {
    width: 96px;
    min-width: 96px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 0 14px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 10;
    overflow-y: auto;
  }
  .ring-sidebar::-webkit-scrollbar { width: 0; }

  .sidebar-logo {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green), var(--blue));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    margin-bottom: 22px;
    box-shadow: 0 0 22px rgba(52, 211, 153, .2);
    flex-shrink: 0;
  }

  /* Individual ring card */
  .ring-card {
    position: relative;
    width: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px 8px;
    margin-bottom: 6px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s;
    flex-shrink: 0;
  }
  .ring-card:hover { background: var(--surface2); }
  .ring-card.active { background: var(--surface2); }
  .ring-card.active::after {
    content: '';
    position: absolute;
    right: -8px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 22px;
    border-radius: 2px;
    background: var(--ring-accent, var(--green));
  }

  .ring-svg-wrap {
    position: relative;
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }
  .ring-svg-wrap svg { width: 52px; height: 52px; }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-progress {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset .6s ease, stroke .3s;
  }
  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    transition: color .3s;
  }
  .ring-card.active .ring-label { color: var(--bright); }

  .ring-name {
    font-size: 9px;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
    line-height: 1.2;
    transition: color .3s;
  }
  .ring-card.active .ring-name { color: var(--text); }

  /* ── Sparkline (canvas) ─────────────────────────────── */
  .sparkline-wrap {
    width: 60px;
    height: 16px;
    margin-top: 5px;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .sparkline-wrap canvas {
    display: block;
    width: 60px;
    height: 16px;
  }

  .ring-spacer { flex: 1; }
  .sidebar-status {
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    margin-top: 12px;
    flex-shrink: 0;
  }

  /* ── Main Area ─────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Row 1: Module Nodes ───────────────────────────────── */
  .row1 {
    padding: 18px 28px 12px;
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 5;
    min-height: 70px;
  }

  .mod-node {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mod-circle {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface);
    transition: all .3s ease;
    position: relative;
    z-index: 2;
  }
  .mod-node.active .mod-circle {
    border-color: var(--node-color);
    color: var(--bright);
    box-shadow: 0 0 14px color-mix(in srgb, var(--node-color) 35%, transparent);
  }
  .mod-node.active .mod-circle::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--node-color);
    opacity: 0;
    animation: nodeGlow 3s ease-in-out infinite;
  }
  @keyframes nodeGlow {
    0%, 100% { opacity: 0; transform: scale(.9); }
    50%      { opacity: .35; transform: scale(1.1); }
  }
  .mod-status {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    z-index: 3;
  }
  .mod-status.done    { background: var(--green); }
  .mod-status.running { background: var(--blue); animation: statusPulse 1.5s ease-in-out infinite; }
  .mod-status.pending { background: var(--border); }
  @keyframes statusPulse { 0%,100%{ opacity:1 } 50%{ opacity:.45 } }

  .mod-name {
    font-size: 9px;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
    max-width: 72px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    transition: color .3s;
  }
  .mod-node.active .mod-name { color: var(--bright); }

  /* Particle connectors between modules */
  .mod-conn {
    width: 48px;
    height: 2px;
    position: relative;
    flex-shrink: 0;
    margin: 0 2px;
    align-self: flex-start;
    margin-top: 16px;
  }
  .mod-conn .track { position: absolute; inset: 0; background: var(--border); border-radius: 1px; }
  .mod-conn .fill  { position: absolute; top: 0; left: 0; height: 100%; border-radius: 1px; transition: width .4s ease; }
  .mod-conn .p-lane { position: absolute; inset: 0; overflow: hidden; border-radius: 1px; }
  .mod-conn .particle {
    position: absolute;
    width: 6px;
    height: 2px;
    border-radius: 1px;
    top: 0;
    opacity: 0;
  }
  .mod-conn.passed .particle { animation: pFlow 2.4s linear infinite; }
  @keyframes pFlow { 0%{ left:-6px; opacity:0 } 10%{ opacity:.8 } 90%{ opacity:.8 } 100%{ left:100%; opacity:0 } }

  /* ── Row 2: Sub-step Dots ──────────────────────────────── */
  .row2 {
    padding: 0 28px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 28px;
    position: relative;
    z-index: 5;
  }
  .sub-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all .3s ease;
    position: relative;
    flex-shrink: 0;
  }
  .sub-dot.completed { background: var(--sub-color); border-color: var(--sub-color); opacity: .65; }
  .sub-dot.active {
    border-color: var(--sub-color);
    box-shadow: 0 0 8px color-mix(in srgb, var(--sub-color) 50%, transparent);
    transform: scale(1.25);
  }
  .sub-dot.active::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--sub-color);
    opacity: 0;
    animation: dotPulse 2s ease-out infinite;
  }
  @keyframes dotPulse { 0%{ transform:scale(.8); opacity:.6 } 100%{ transform:scale(1.6); opacity:0 } }
  .sub-dot:hover { border-color: var(--sub-color); transform: scale(1.15); }
  .sub-dot::after {
    content: attr(title);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    padding: 3px 9px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--text);
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
    z-index: 10;
  }
  .sub-dot:hover::after { opacity: 1; }
  .sub-conn { width: 14px; height: 1px; background: var(--border); flex-shrink: 0; }

  /* ── Glow Beam ─────────────────────────────────────────── */
  .beam-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 120px;
    pointer-events: none;
    z-index: 3;
    overflow: visible;
  }
  .beam-line {
    position: absolute;
    width: 2px;
    transition: left .3s cubic-bezier(.4,0,.2,1), height .3s ease, opacity .3s;
    opacity: 0;
  }
  .beam-line.visible { opacity: 1; }
  .beam-core { position: absolute; inset: 0; width: 2px; border-radius: 1px; }
  .beam-glow {
    position: absolute;
    top: 0;
    bottom: 0;
    left: -8px;
    width: 18px;
    border-radius: 9px;
    filter: blur(7px);
    opacity: .3;
  }
  .beam-glow-outer {
    position: absolute;
    top: 0;
    bottom: 0;
    left: -14px;
    width: 30px;
    border-radius: 15px;
    filter: blur(14px);
    opacity: .12;
  }
  .beam-spark {
    position: absolute;
    width: 2px;
    height: 14px;
    border-radius: 1px;
    left: 0;
    top: 0;
    opacity: 0;
  }
  .beam-line.visible .beam-spark { animation: sparkDrop 1.8s ease-in-out infinite; }
  @keyframes sparkDrop { 0%{ top:0; opacity:0 } 15%{ opacity:1 } 85%{ opacity:1 } 100%{ top:calc(100% - 14px); opacity:0 } }

  /* ── Breadcrumb ────────────────────────────────────────── */
  .breadcrumb {
    padding: 8px 28px 0;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    position: relative;
    z-index: 5;
  }
  .breadcrumb .sep { opacity: .4; }
  .breadcrumb .crumb { cursor: pointer; transition: color .2s; }
  .breadcrumb .crumb:hover { color: var(--bright); }
  .breadcrumb .crumb.current { color: var(--bright); font-weight: 500; }

  /* ── Content ───────────────────────────────────────────── */
  .content {
    flex: 1;
    padding: 0 28px 28px;
    overflow-y: auto;
    position: relative;
    z-index: 4;
  }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .content-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .content-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .content-title { font-size: 17px; font-weight: 600; color: var(--bright); letter-spacing: -.02em; }
  .content-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
  .content-body { display: grid; gap: 12px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 15px 18px;
    transition: border-color .3s, box-shadow .3s;
  }
  .card:hover { border-color: color-mix(in srgb, var(--card-accent, var(--green)) 25%, var(--border)); }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--bright);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .card-title .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .card-text { font-size: 12px; color: var(--text); line-height: 1.65; }
  .card-meta {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-size: 10px;
    color: var(--muted);
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    margin-right: 5px;
  }

  /* Mini progress bar */
  .mini-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .mini-bar .fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge.done    { background: var(--green-15);  color: var(--green); }
  .badge.running { background: var(--blue-15);   color: var(--blue);  }
  .badge.pending { background: rgba(107,114,128,.12); color: var(--muted); }

  /* Two-col on wide screens */
  @media (min-width: 1200px) {
    .content-body { grid-template-columns: 1fr 1fr; }
    .content-body .card:first-child { grid-column: 1 / -1; }
  }

  /* Card stagger animation */
  .content-body .card { animation: cardIn .35s ease-out both; }
  .content-body .card:nth-child(1) { animation-delay: 0s; }
  .content-body .card:nth-child(2) { animation-delay: .05s; }
  .content-body .card:nth-child(3) { animation-delay: .10s; }
  .content-body .card:nth-child(4) { animation-delay: .15s; }
  .content-body .card:nth-child(5) { animation-delay: .20s; }
  .content-body .card:nth-child(6) { animation-delay: .25s; }
  @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* Stats footer */
  .content-stats {
    display: flex;
    gap: 24px;
    padding: 14px 0;
    margin-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-size: 15px; font-weight: 600; color: var(--bright); }
  .stat-label { color: var(--muted); font-size: 9px; text-transform: uppercase; letter-spacing: .5px; }

  /* Keyboard hint */
  .kb-hint {
    position: fixed;
    bottom: 14px;
    right: 18px;
    display: flex;
    gap: 5px;
    align-items: center;
    z-index: 20;
  }
  .kb-hint kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 5px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 10px;
    font-family: inherit;
    color: var(--muted);
  }
  .kb-hint span { font-size: 9px; color: var(--muted); }
</style>
</head>
<body>

<!-- Ring Sidebar -->
<div class="ring-sidebar" id="ringSidebar"></div>

<!-- Main Area -->
<div class="main">
  <div class="beam-container" id="beamContainer">
    <div class="beam-line" id="beamLine">
      <div class="beam-glow-outer"></div>
      <div class="beam-glow"></div>
      <div class="beam-core"></div>
      <div class="beam-spark"></div>
    </div>
  </div>
  <div class="row1" id="row1"></div>
  <div class="row2" id="row2"></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="content" id="content"></div>
</div>

<div class="kb-hint">
  <kbd>&#8592;</kbd><kbd>&#8594;</kbd><span>module</span>
  <kbd>&#8593;</kbd><kbd>&#8595;</kbd><span>step</span>
</div>

<script>
// =====================================================================
// Pipeline Data — first-person summaries, same mock structure
// =====================================================================
const COLORS = {
  green:  '#34d399',
  purple: '#a78bfa',
  blue:   '#60a5fa',
  amber:  '#fbbf24',
  muted:  '#6b7280',
};

const PIPELINE = [
  {
    id: 'seed', name: 'Seed Hypotheses', short: 'SEED',
    color: 'green', progress: 100,
    // Sparkline data: array of 20 values 0-1 representing activity intensity over time
    sparkline: [.1,.3,.6,.9,1,.95,.8,.7,.85,.9,.75,.6,.5,.4,.3,.2,.15,.1,.05,.02],
    steps: [
      {
        name: 'Knowledge Graph',
        status: 'done',
        content: {
          title: 'Knowledge Graph Extraction',
          subtitle: 'I parsed 38 source papers and extracted a knowledge graph to seed the hypothesis generation process.',
          cards: [
            { title: 'Entity Extraction', dot: 'green', text: 'I identified 847 unique entities across the source corpus. The breakdown: 312 methods, 198 materials, 167 properties, and 170 applications. I resolved 63 duplicate references through entity linking against a canonical registry.', tags: [{ label: 'NER', color: 'green' }, { label: 'complete', color: 'green' }], meta: ['847 entities', '12 papers', '23s'] },
            { title: 'Relation Mining', dot: 'green', text: 'I extracted 1,204 typed relations using a combination of dependency parsing and LLM-based extraction. I found five relation types: enables (389), inhibits (124), requires (201), produces (178), and enhances (312).', tags: [{ label: 'RE', color: 'green' }], meta: ['1,204 relations', '5 types'] },
            { title: 'Graph Assembly', dot: 'green', text: 'I assembled the full knowledge graph: 847 nodes and 1,204 edges. I detected 3 major connected components and 7 minor ones. Graph density came out to 0.0034 with an average node degree of 2.84.', tags: [{ label: 'graph', color: 'blue' }], meta: ['density 0.0034', 'avg degree 2.84'] },
            { title: 'Embedding Generation', dot: 'green', text: 'I trained 128-dimensional TransE embeddings over 500 epochs. The final MRR on the validation set hit 0.68. I stored all embeddings in a FAISS index for sub-millisecond nearest-neighbor retrieval during hypothesis generation.', tags: [{ label: 'TransE', color: 'purple' }, { label: 'FAISS', color: 'blue' }], meta: ['128-dim', 'MRR 0.68'] }
          ]
        }
      },
      {
        name: 'Gap Analysis',
        status: 'done',
        content: {
          title: 'Gap Analysis',
          subtitle: 'I scanned the knowledge graph for structural holes and missing links that indicate unexplored research directions.',
          cards: [
            { title: 'Structural Holes', dot: 'green', text: 'I found 34 structural holes bridging major clusters. The most promising gap connects photocatalytic materials with self-healing polymer networks. 12 of the 34 holes scored above my high-confidence threshold.', tags: [{ label: 'gaps', color: 'amber' }], meta: ['34 holes', '12 high-conf'] },
            { title: 'Missing Link Prediction', dot: 'green', text: 'My TransE model predicted 156 likely-but-absent links. After filtering to score > 0.85, I retained 28 high-confidence candidates. Cross-validation against held-out edges yielded MRR = 0.72.', tags: [{ label: 'prediction', color: 'purple' }], meta: ['28 candidates', 'MRR 0.72'] },
            { title: 'Trend Analysis', dot: 'green', text: 'I analyzed publication-year distributions across the corpus. Three topics show clear exponential growth from 2022-2025: self-supervised materials discovery, LLM-guided synthesis, and adaptive metamaterials. I weighted these heavily in hypothesis generation.', tags: [{ label: 'trends', color: 'green' }], meta: ['3 emerging', '2022-2025'] }
          ]
        }
      },
      {
        name: 'Hypothesis Gen',
        status: 'done',
        content: {
          title: 'Hypothesis Generation',
          subtitle: 'I generated and filtered seed hypotheses by combining gap analysis with domain heuristics.',
          cards: [
            { title: 'Combinatorial Expansion', dot: 'green', text: 'I generated 96 raw hypotheses by pairing structural holes with predicted mechanisms. Each candidate links a gap to a concrete pathway through the knowledge graph.', tags: [{ label: 'gen', color: 'green' }], meta: ['96 hypotheses'] },
            { title: 'Novelty Filter', dot: 'green', text: 'I ran a semantic similarity check against 50K existing papers using Specter2 embeddings. I removed 31 hypotheses with cosine similarity > 0.82 to published work, leaving 65 novel candidates.', tags: [{ label: 'filter', color: 'blue' }], meta: ['65 remain', 'threshold 0.82'] },
            { title: 'Feasibility Scoring', dot: 'green', text: 'I scored each remaining hypothesis on material availability, method compatibility, and expected timeline. Mean feasibility score: 7.2/10. The scoring took about 18 seconds per hypothesis.', tags: [{ label: 'scoring', color: 'purple' }], meta: ['mean 7.2/10', '18s/hypo'] },
            { title: 'Diversity Sampling', dot: 'green', text: 'I applied DPP-based diversity sampling to ensure broad coverage. The final set spans 8 topical clusters with a minimum pairwise cosine distance of 0.45. No cluster dominates the candidate pool.', tags: [{ label: 'DPP', color: 'green' }, { label: 'sampling', color: 'blue' }], meta: ['8 clusters', 'min dist 0.45'] }
          ]
        }
      }
    ]
  },
  {
    id: 'hypo', name: 'Hypothesis Loop', short: 'HYPO',
    color: 'purple', progress: 75,
    sparkline: [.05,.1,.2,.35,.5,.65,.8,.9,.95,1,.9,.85,.95,1,.88,.92,.96,1,.7,.5],
    steps: [
      {
        name: 'Refine Hypotheses',
        status: 'done',
        content: {
          title: 'Refine Hypotheses',
          subtitle: 'I iteratively rewrote each hypothesis for clarity, specificity, and testability across three structured passes.',
          cards: [

let activeModule = 1;

// =====================================================================
// Sparkline rendering (canvas)
// =====================================================================
function drawSparkline(canvas, data, color, isActive, isPending) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = 60, h = 16;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const pts = data.length;
  const step = w / (pts - 1);

  // For pending: flat line at bottom
  if (isPending) {
    ctx.beginPath();
    ctx.moveTo(0, h - 2);
    ctx.lineTo(w, h - 2);
    ctx.strokeStyle = 'rgba(107,114,128,.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    return;
  }

  // Build path
  const points = data.map((v, i) => ({ x: i * step, y: h - 2 - v * (h - 4) }));

  // Gradient fill under curve
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '05');

  ctx.beginPath();
  ctx.moveTo(points[0].x, h);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Stroke the line
  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  if (isActive) {
    // Active: clip the stroke so it appears to be "drawing" — we animate via a mask
    // We draw the full line but the last 25% fades out
    ctx.stroke();
    // Overlay a pulsing dot at the "leading edge"
    const last = points[Math.floor(pts * 0.85)];
    if (last) {
      ctx.beginPath();
      ctx.arc(last.x, last.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(last.x, last.y, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = color + '30';
      ctx.fill();
    }
  } else {
    ctx.stroke();
  }
}

// Animate active sparklines
let sparklineAnimFrame = 0;
const activeSparklineCanvases = [];

function animateActiveSparklines() {
  sparklineAnimFrame++;
  activeSparklineCanvases.forEach(({ canvas, data, color }) => {
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = 60, h = 16;
    ctx.clearRect(0, 0, w * dpr, h * dpr);
    ctx.save();
    ctx.scale(dpr, dpr);

    const pts = data.length;
    const step = w / (pts - 1);
    // Animate the "drawing" extent — oscillates between 70% and 90%
    const extent = 0.7 + 0.2 * (0.5 + 0.5 * Math.sin(sparklineAnimFrame * 0.04));
    const visiblePts = Math.floor(pts * extent);

    const points = data.slice(0, visiblePts).map((v, i) => ({
      x: i * step,
      y: h - 2 - v * (h - 4)
    }));

    if (points.length < 2) { ctx.restore(); return; }

    // Fill
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color + '30');
    grad.addColorStop(1, color + '05');
    ctx.beginPath();
    ctx.moveTo(points[0].x, h);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length - 1].x, h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Stroke
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();

    // Leading dot with glow
    const last = points[points.length - 1];
    const pulseR = 2.5 + 0.8 * Math.sin(sparklineAnimFrame * 0.08);
    ctx.beginPath();
    ctx.arc(last.x, last.y, pulseR, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(last.x, last.y, pulseR + 3, 0, Math.PI * 2);
    ctx.fillStyle = color + '25';
    ctx.fill();

    // Faint trailing line to show where the rest will go
    const remaining = data.slice(visiblePts - 1).map((v, i) => ({
      x: (visiblePts - 1 + i) * step,
      y: h - 2
    }));
    if (remaining.length > 1) {
      ctx.beginPath();
      ctx.moveTo(last.x, h - 2);
      ctx.lineTo(w, h - 2);
      ctx.strokeStyle = 'rgba(107,114,128,.2)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.restore();
  });
  requestAnimationFrame(animateActiveSparklines);
}

// =====================================================================
// Render Ring Sidebar
// =====================================================================
function renderRings() {
  const sb = document.getElementById('ringSidebar');
  sb.innerHTML = '';
  activeSparklineCanvases.length = 0;

  const logo = document.createElement('div');
  logo.className = 'sidebar-logo';
  logo.textContent = 'AI';
  sb.appendChild(logo);

  PIPELINE.forEach((mod, i) => {
    const card = document.createElement('div');
    card.className = 'ring-card' + (i === activeModule ? ' active' : '');
    card.style.setProperty('--ring-accent', COLORS[mod.color]);

    const circumference = 2 * Math.PI * 21;
    const offset = circumference - (mod.progress / 100) * circumference;
    const hex = COLORS[mod.color];

    const isActive = mod.progress > 0 && mod.progress < 100;
    const isPending = mod.progress === 0;

    card.innerHTML = `
      <div class="ring-svg-wrap">
        <svg viewBox="0 0 52 52">
          <circle class="ring-track" cx="26" cy="26" r="21"/>
          <circle class="ring-progress" cx="26" cy="26" r="21"
            stroke="${hex}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"
            transform="rotate(-90 26 26)"/>
        </svg>
        <div class="ring-label">${mod.short}</div>
      </div>
      <div class="ring-name">${mod.name}</div>
      <div class="sparkline-wrap"><canvas class="sparkline-canvas"></canvas></div>
    `;

    card.addEventListener('click', () => { activeModule = i; activeStep = 0; render(); });
    sb.appendChild(card);

    // Draw sparkline after DOM insertion
    requestAnimationFrame(() => {
      const canvas = card.querySelector('.sparkline-canvas');
      if (!canvas) return;
      if (isActive) {
        activeSparklineCanvases.push({ canvas, data: mod.sparkline, color: hex });
      } else {
        drawSparkline(canvas, mod.sparkline, hex, false, isPending);
      }
    });
  });

  const spacer = document.createElement('div');
  spacer.className = 'ring-spacer';
  sb.appendChild(spacer);

  const status = document.createElement('div');
  status.className = 'sidebar-status';
  status.textContent = 'pipeline active';
  sb.appendChild(status);
}

function renderRow1() {
  const row = document.getElementById('row1');
  row.innerHTML = '';

  PIPELINE.forEach((mod, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      const prev = PIPELINE[i - 1];
      conn.className = 'mod-conn' + (prev.progress === 100 ? ' passed' : '');
      const c1 = COLORS[prev.color], c2 = COLORS[mod.color];
      conn.innerHTML = `
        <div class="track"></div>
        <div class="fill" style="width:${prev.progress === 100 ? '100' : '0'}%;background:linear-gradient(90deg,${c1},${c2})"></div>
        <div class="p-lane">
          <div class="particle" style="background:${c1};animation-delay:0s"></div>
          <div class="particle" style="background:${c2};animation-delay:1.2s"></div>
        </div>
      `;
      row.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'mod-node' + (i === activeModule ? ' active' : '');
    node.style.setProperty('--node-color', COLORS[mod.color]);
    node.dataset.index = i;

    const icon = mod.progress === 100 ? '\u2713' : (mod.progress > 0 ? '\u25B6' : (i + 1));
    const st = mod.progress === 100 ? 'done' : (mod.progress > 0 ? 'running' : 'pending');
    node.innerHTML = `
      <div class="mod-circle">
        ${icon}
        <div class="mod-status ${st}"></div>
      </div>
      <div class="mod-name">${mod.name}</div>
    `;
    node.addEventListener('click', () => { activeModule = i; activeStep = 0; render(); });
    row.appendChild(node);
  });
}

  const row = document.getElementById('row2');

  const mod = PIPELINE[activeModule];
  const color = COLORS[mod.color];

  mod.steps.forEach((step, i) => {
    if (i > 0) {
      const c = document.createElement('div');
      c.className = 'sub-conn';
      row.appendChild(c);
    }
    const dot = document.createElement('div');
    dot.className = 'sub-dot';
    dot.style.setProperty('--sub-color', color);
    dot.dataset.index = i;
    dot.title = step.name;
    if (i === activeStep) dot.classList.add('active');
    else if (step.status === 'done') dot.classList.add('completed');
    dot.addEventListener('click', () => { activeStep = i; render(); });
    row.appendChild(dot);
  });
}

// =====================================================================
// Render Glow Beam
// =====================================================================
function renderBeam() {
  const beam = document.getElementById('beamLine');
  const container = document.getElementById('beamContainer');
  const moduleNode = document.querySelector(`.mod-node[data-index="${activeModule}"]`);
  const subDot = document.querySelector(`.sub-dot[data-index="${activeStep}"]`);
  if (!moduleNode || !subDot) { beam.classList.remove('visible'); return; }

  const mainEl = document.querySelector('.main');
  const mr = mainEl.getBoundingClientRect();
  const mc = moduleNode.querySelector('.mod-circle').getBoundingClientRect();
  const sd = subDot.getBoundingClientRect();

  const mx = mc.left + mc.width / 2 - mr.left;
  const sx = sd.left + sd.width / 2 - mr.left;
  const top = mc.bottom - mr.top;
  const bot = sd.top - mr.top;
  const h = Math.max(bot - top, 4);
  const color = COLORS[PIPELINE[activeModule].color];

  beam.style.left = mx + 'px';
  beam.style.top = top + 'px';
  beam.style.height = h + 'px';
  beam.querySelector('.beam-core').style.background = color;
  beam.querySelector('.beam-glow').style.background = color;
  beam.querySelector('.beam-glow-outer').style.background = color;
  beam.querySelector('.beam-spark').style.background = `linear-gradient(to bottom, transparent, ${color}, transparent)`;
  container.style.height = (bot + 20) + 'px';
  beam.classList.add('visible');

  if (Math.abs(mx - sx) > 2) {
    const dx = sx - mx;
    const angle = Math.atan2(dx, h) * (180 / Math.PI);
    const len = Math.sqrt(dx * dx + h * h);
    beam.style.height = len + 'px';
    beam.style.transformOrigin = 'top center';
    beam.style.transform = `rotate(${angle}deg)`;
  } else {
    beam.style.transform = 'none';
  }
}

  const step = mod.steps[activeStep];
  el.innerHTML = `
    <span class="crumb" onclick="activeModule=0;activeStep=0;render();">Pipeline</span>
    <span class="sep">/</span>
    <span class="crumb" onclick="activeStep=0;render();">${mod.name}</span>
    <span class="sep">/</span>
    <span class="crumb current">${step.name}</span>
  `;
}

// =====================================================================
// Render Content
// =====================================================================
function renderContent() {
  const el = document.getElementById('content');
  const mod = PIPELINE[activeModule];
  const step = mod.steps[activeStep];
  const data = step.content;
  const color = COLORS[mod.color];

  let html = `
    <div class="content-header">
      <div class="content-icon" style="background:${color}18;color:${color}">${activeStep + 1}</div>
      <div class="content-title">${data.title}</div>
      <div style="flex:1"></div>
      <div class="badge ${step.status === 'done' ? 'done' : step.status === 'running' ? 'running' : 'pending'}">
        ${step.status === 'done' ? '\u2713 Done' : step.status === 'running' ? '\u25CF Running' : '\u25CB Pending'}
      </div>
    </div>
    <div class="content-subtitle">${data.subtitle}</div>
    <div class="content-body">
  `;

  data.cards.forEach(card => {
    const dc = COLORS[card.dot] || color;
    const tagColor = c => COLORS[c] || c;
    html += `<div class="card" style="--card-accent:${dc}">`;
    html += `<div class="card-title"><span class="dot" style="background:${dc}"></span>${card.title}</div>`;
    if (card.tags) {
      html += '<div style="margin-bottom:5px">';
      card.tags.forEach(t => {
        const tc = tagColor(t.color);
        html += `<span class="card-tag" style="background:${tc}15;color:${tc}">${t.label}</span>`;
      });
      html += '</div>';
    }
    html += `<div class="card-text">${card.text}</div>`;
    if (card.meta) {
      html += '<div class="card-meta">';
      card.meta.forEach(m => { html += `<span>${m}</span>`; });
      html += '</div>';
    }
    if (step.status === 'running' && (card.dot === 'blue' || card.dot === 'amber')) {
      html += `<div class="mini-bar"><div class="fill" style="width:65%;background:${color}"></div></div>`;
    }
    html += '</div>';
  });

  html += '</div>';

  // Stats
  const totalCards = data.cards.length;
  const activeTags = data.cards.reduce((s, c) => s + (c.tags?.length || 0), 0);
  html += `
    <div class="content-stats">
      <div class="stat-item"><span class="stat-value">${totalCards}</span><span class="stat-label">Components</span></div>
      <div class="stat-item"><span class="stat-value">${activeTags}</span><span class="stat-label">Tags</span></div>
      <div class="stat-item"><span class="stat-value">${activeStep + 1}/${mod.steps.length}</span><span class="stat-label">Step</span></div>
      <div class="stat-item"><span class="stat-value">${mod.progress}%</span><span class="stat-label">Module</span></div>
    </div>
  `;

  el.innerHTML = html;
  el.scrollTop = 0;
}

// =====================================================================
// Full Render
// =====================================================================
function render() {
  renderRings();
  renderRow1();
  renderRow2();
  renderBreadcrumb();
  renderContent();
  requestAnimationFrame(() => requestAnimationFrame(renderBeam));
}

// =====================================================================
// Keyboard Navigation
// =====================================================================
document.addEventListener('keydown', e => {
  const mod = PIPELINE[activeModule];
  let changed = false;
  switch (e.key) {
    case 'ArrowRight':
      if (activeModule < PIPELINE.length - 1) { activeModule++; activeStep = 0; changed = true; } break;
    case 'ArrowLeft':
      if (activeModule > 0) { activeModule--; activeStep = 0; changed = true; } break;
    case 'ArrowDown':
      if (activeStep < mod.steps.length - 1) { activeStep++; changed = true; } break;
    case 'ArrowUp':
      if (activeStep > 0) { activeStep--; changed = true; } break;
  }
  if (changed) { e.preventDefault(); render(); }
});

window.addEventListener('resize', () => requestAnimationFrame(renderBeam));

// =====================================================================
// Init
// =====================================================================
render();
requestAnimationFrame(animateActiveSparklines);
</script>
</body>
</html>
