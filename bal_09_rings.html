<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor - Pipeline Rings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0e14;
    --surface: #14171f;
    --surface-hover: #1a1e2a;
    --border: #1e2230;
    --text: #e4e6ec;
    --text-dim: #7a7f91;
    --green: #34d399;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --amber: #fbbf24;
    --ring-gap: 22;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---- TOP BAR ---- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 56px;
    background: rgba(12,14,20,.82);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 15px; letter-spacing: -.3px;
  }
  .topbar-brand svg { width: 22px; height: 22px; }
  .topbar-meta {
    display: flex; align-items: center; gap: 24px;
    font-size: 13px; color: var(--text-dim);
  }
  .topbar-meta span { display: flex; align-items: center; gap: 6px; }
  .topbar-pill {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 12px; font-weight: 500;
    color: var(--text); font-size: 13px;
  }

  /* ---- OVERVIEW SECTION ---- */
  .overview {
    display: flex; align-items: center; justify-content: center;
    gap: 64px; padding: 48px 32px 32px;
    min-height: calc(40vh + 56px);
  }

  .rings-container {
    position: relative;
    width: 380px; height: 380px;
    flex-shrink: 0;
  }

  /* center label */
  .rings-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .rings-center .pct {
    font-size: 52px; font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .rings-center .label {
    font-size: 13px; color: var(--text-dim);
    margin-top: 2px; font-weight: 500;
  }

  /* ring endpoint labels */
  .ring-label {
    position: absolute;
    font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity .6s ease;
  }
  .ring-label.visible { opacity: 1; }

  /* ---- STAT CARDS (right of rings) ---- */
  .stat-cards {
    display: flex; flex-direction: column; gap: 12px;
    min-width: 240px;
  }
  .stat-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border-radius: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .2s, border-color .2s, transform .15s;
  }
  .stat-card:hover {
    background: var(--surface-hover);
    border-color: #2a2e3e;
    transform: translateX(4px);
  }
  .stat-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .stat-dot.pulse {
    animation: dotpulse 1.6s ease-in-out infinite;
  }
  @keyframes dotpulse {
    0%,100% { box-shadow: 0 0 0 0 currentColor; }
    50%     { box-shadow: 0 0 0 5px transparent; }
  }
  .stat-info { display: flex; flex-direction: column; gap: 2px; }
  .stat-name { font-size: 14px; font-weight: 600; }
  .stat-detail { font-size: 12px; color: var(--text-dim); }

  /* ---- DETAIL SECTION ---- */
  .details {
    max-width: 880px; margin: 0 auto;
    padding: 8px 32px 64px; display: flex; flex-direction: column; gap: 16px;
  }
  .details-heading {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .8px; color: var(--text-dim);
    margin-bottom: 4px; padding-left: 4px;
  }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .detail-card:hover { border-color: #2a2e3e; }

  .detail-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; cursor: pointer;
    user-select: none;
  }
  .detail-header-left {
    display: flex; align-items: center; gap: 12px;
  }
  .detail-status-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .detail-title { font-size: 15px; font-weight: 600; }
  .detail-subtitle { font-size: 12px; color: var(--text-dim); margin-left: 8px; }
  .detail-chevron {
    transition: transform .25s ease;
    color: var(--text-dim);
  }
  .detail-card.open .detail-chevron { transform: rotate(180deg); }

  .detail-body {
    max-height: 0; overflow: hidden;
    transition: max-height .35s ease;
  }
  .detail-card.open .detail-body { max-height: 800px; }
  .detail-body-inner {
    padding: 0 22px 22px;
  }

  /* mini rings row */
  .mini-rings {
    display: flex; gap: 20px; flex-wrap: wrap;
    justify-content: center;
    padding: 12px 0 20px;
  }
  .mini-ring-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .mini-ring-item svg { filter: drop-shadow(0 0 3px rgba(96,165,250,.25)); }
  .mini-ring-label {
    font-size: 11px; font-weight: 500; color: var(--text-dim);
  }
  .mini-ring-pct {
    font-size: 10px; font-weight: 700; color: var(--text);
  }

  /* artifact list */
  .artifact-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .artifact-list-title {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .artifact-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 10px;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.04);
  }
  .artifact-item-left { display: flex; align-items: center; gap: 10px; }
  .artifact-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .artifact-name { font-size: 13px; font-weight: 500; }
  .artifact-status {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 6px;
  }

  /* metric row for completed cards */
  .metric-row {
    display: flex; gap: 16px; flex-wrap: wrap; padding: 4px 0 8px;
  }
  .metric {
    display: flex; flex-direction: column; gap: 2px;
    padding: 10px 16px; border-radius: 10px;
    background: rgba(255,255,255,.025);
    min-width: 100px;
  }
  .metric-val { font-size: 18px; font-weight: 700; }
  .metric-lbl { font-size: 11px; color: var(--text-dim); }

  /* pending card */
  .pending-steps {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 6px 0;
  }
  .pending-step {
    font-size: 12px; padding: 6px 12px; border-radius: 8px;
    background: rgba(255,255,255,.03); color: var(--text-dim);
    border: 1px dashed rgba(255,255,255,.06);
  }

  /* ---- SVG glow filter (shared) ---- */
  .glow-filter { position: absolute; width: 0; height: 0; }

  /* ---- Animations ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .anim-fade-up {
    opacity: 0;
    animation: fadeUp .5s ease forwards;
  }

  /* responsive */
  @media (max-width: 780px) {
    .overview { flex-direction: column; gap: 32px; padding: 32px 20px 24px; }
    .rings-container { width: 300px; height: 300px; }
    .stat-cards { flex-direction: row; flex-wrap: wrap; min-width: unset; }
    .stat-card { flex: 1; min-width: 180px; }
    .details { padding: 8px 16px 48px; }
  }
</style>
</head>
<body>

<!-- Shared SVG filters -->
<svg class="glow-filter" aria-hidden="true">
  <defs>
    <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#34d399" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<!-- ====== TOP BAR ====== -->
<header class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    AI Inventor
  </div>
  <div class="topbar-meta">
    <span class="topbar-pill">quantum-chem-42</span>
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      1h 23m
    </span>
    <span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      $4.87
    </span>
  </div>
</header>

<!-- ====== OVERVIEW: RINGS + STAT CARDS ====== -->
<section class="overview">
  <div class="rings-container" id="ringsContainer">
    <!-- SVG rings inserted by JS -->
    <div class="rings-center">
      <span class="pct" id="centerPct">0%</span>
      <span class="label">Pipeline Progress</span>
    </div>
  </div>

  <div class="stat-cards" id="statCards">
    <!-- built by JS -->
  </div>
</section>

<!-- ====== DETAIL CARDS ====== -->
<section class="details" id="detailsSection">
  <div class="details-heading">Module Details</div>
  <!-- built by JS -->
</section>

<script>
(function() {
  "use strict";

  /* ============================================================
     DATA
     ============================================================ */
  const MODULES = [
    {
      id: "seed",
      name: "Seed",
      statusIcon: "\u2713",
      statLine: "12 gaps found",
      pct: 100,
      color1: "#34d399", color2: "#6ee7b7",
      dotColor: "#34d399",
      active: false,
      done: true,
      metrics: [
        { val: "247", lbl: "Papers parsed" },
        { val: "12", lbl: "Gaps found" },
        { val: "38", lbl: "KG nodes" },
        { val: "6m 12s", lbl: "Duration" }
      ]
    },
    {
      id: "hypothesis",
      name: "Hypothesis",
      statusIcon: "\u2713",
      statLine: "8.4 / 10",
      pct: 100,
      color1: "#34d399", color2: "#a78bfa",
      dotColor: "#a78bfa",
      active: false,
      done: true,
      metrics: [
        { val: "8.4", lbl: "Best score" },
        { val: "3", lbl: "Iterations" },
        { val: "6", lbl: "Hypotheses" },
        { val: "14m 8s", lbl: "Duration" }
      ]
    },
    {
      id: "invention",
      name: "Invention",
      statusIcon: "\u25b6",
      statLine: "3 / 5 artifacts",
      pct: 58,
      color1: "#3b82f6", color2: "#60a5fa",
      dotColor: "#60a5fa",
      active: true,
      done: false,
      iteration: { current: 2, total: 3 },
      subSteps: [
        { name: "Strategy", pct: 100 },
        { name: "Plan", pct: 100 },
        { name: "Artifacts", pct: 60 },
        { name: "Paper", pct: 0 },
        { name: "Review", pct: 0 },
        { name: "UpdHypo", pct: 0 }
      ],
      artifacts: [
        { name: "quantum_sim.py", icon: "\ud83d\udcdc", status: "done", statusLabel: "Complete", bg: "rgba(52,211,153,.12)", fg: "#34d399" },
        { name: "loss_landscape.py", icon: "\ud83d\udcc8", status: "done", statusLabel: "Complete", bg: "rgba(52,211,153,.12)", fg: "#34d399" },
        { name: "encoder_module.py", icon: "\u2699\ufe0f", status: "done", statusLabel: "Complete", bg: "rgba(52,211,153,.12)", fg: "#34d399" },
        { name: "benchmark_suite.py", icon: "\ud83e\uddea", status: "running", statusLabel: "Running", bg: "rgba(96,165,250,.12)", fg: "#60a5fa" },
        { name: "ablation_study.py", icon: "\ud83d\udd2c", status: "pending", statusLabel: "Pending", bg: "rgba(255,255,255,.04)", fg: "#7a7f91" }
      ]
    },
    {
      id: "paper",
      name: "Paper",
      statusIcon: "\u25cb",
      statLine: "Waiting",
      pct: 0,
      color1: "#4b5563", color2: "#4b5563",
      dotColor: "#4b5563",
      active: false,
      done: false,
      pending: true,
      expectedSteps: ["Visualizations", "Diagrams", "Full paper", "Repository", "Final review"]
    }
  ];

  const RING_CONFIG = {
    cx: 190, cy: 190,
    radii: [170, 148, 126, 104],
    strokeWidth: 16,
    bgOpacity: 0.10
  };

  /* ============================================================
     BUILD MAIN RINGS (SVG)
     ============================================================ */
  function buildMainRings() {
    const container = document.getElementById("ringsContainer");
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 380 380");
    svg.setAttribute("width", "100%");
    svg.setAttribute("height", "100%");
    svg.style.position = "absolute";
    svg.style.inset = "0";

    // gradients
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    MODULES.forEach((mod, i) => {
      const grad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
      grad.id = `grad-${mod.id}`;
      grad.setAttribute("gradientUnits", "userSpaceOnUse");
      // diagonal gradient
      grad.setAttribute("x1", "0"); grad.setAttribute("y1", "0");
      grad.setAttribute("x2", "380"); grad.setAttribute("y2", "380");
      const s1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s1.setAttribute("offset", "0%"); s1.setAttribute("stop-color", mod.color1);
      const s2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
      s2.setAttribute("offset", "100%"); s2.setAttribute("stop-color", mod.color2);
      grad.appendChild(s1);
      grad.appendChild(s2);
      defs.appendChild(grad);
    });
    svg.appendChild(defs);

    const { cx, cy, radii, strokeWidth, bgOpacity } = RING_CONFIG;

    MODULES.forEach((mod, i) => {
      const r = radii[i];
      const circumference = 2 * Math.PI * r;

      // background ring
      const bgCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      bgCircle.setAttribute("cx", cx);
      bgCircle.setAttribute("cy", cy);
      bgCircle.setAttribute("r", r);
      bgCircle.setAttribute("fill", "none");
      bgCircle.setAttribute("stroke", mod.pct === 0 ? "#4b5563" : mod.color1);
      bgCircle.setAttribute("stroke-opacity", bgOpacity);
      bgCircle.setAttribute("stroke-width", strokeWidth);
      if (mod.pct === 0) {
        bgCircle.setAttribute("stroke-dasharray", "6 8");
      }
      svg.appendChild(bgCircle);

      if (mod.pct > 0) {
        // foreground ring
        const fgCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        fgCircle.setAttribute("cx", cx);
        fgCircle.setAttribute("cy", cy);
        fgCircle.setAttribute("r", r);
        fgCircle.setAttribute("fill", "none");
        fgCircle.setAttribute("stroke", `url(#grad-${mod.id})`);
        fgCircle.setAttribute("stroke-width", strokeWidth);
        fgCircle.setAttribute("stroke-linecap", "round");
        fgCircle.setAttribute("stroke-dasharray", circumference);
        // start fully hidden, animate in
        fgCircle.setAttribute("stroke-dashoffset", circumference);
        // rotate -90deg so arc starts at top
        fgCircle.setAttribute("transform", `rotate(-90 ${cx} ${cy})`);
        if (mod.active) {
          fgCircle.setAttribute("filter", "url(#glow-blue)");
        }
        fgCircle.dataset.target = circumference * (1 - mod.pct / 100);
        fgCircle.dataset.circ = circumference;
        fgCircle.classList.add("ring-fg");
        svg.appendChild(fgCircle);

        // Endpoint glow dot for active ring
        if (mod.active) {
          const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          dot.setAttribute("r", "5");
          dot.setAttribute("fill", mod.color2);
          dot.setAttribute("filter", "url(#glow-blue)");
          dot.classList.add("ring-endpoint-dot");
          dot.dataset.ring = i;
          dot.setAttribute("cx", cx);
          dot.setAttribute("cy", cy - r); // start at top
          svg.appendChild(dot);
        }
      }
    });

    container.insertBefore(svg, container.firstChild);

    // create endpoint labels
    MODULES.forEach((mod, i) => {
      if (mod.pct === 0) return;
      const lbl = document.createElement("div");
      lbl.className = "ring-label";
      lbl.textContent = mod.name;
      lbl.style.background = mod.color1 + "22";
      lbl.style.color = mod.color2;
      lbl.style.border = `1px solid ${mod.color1}33`;
      lbl.dataset.ring = i;
      container.appendChild(lbl);
    });
  }

  /* ============================================================
     ANIMATE RINGS ON LOAD
     ============================================================ */
  function animateRings() {
    const fgRings = document.querySelectorAll(".ring-fg");
    const { cx, cy, radii } = RING_CONFIG;

    fgRings.forEach((el, idx) => {
      const target = parseFloat(el.dataset.target);
      const circ = parseFloat(el.dataset.circ);
      el.style.transition = `stroke-dashoffset 1.2s cubic-bezier(.4,.0,.2,1) ${idx * 0.12}s`;
      requestAnimationFrame(() => {
        el.setAttribute("stroke-dashoffset", target);
      });
    });

    // animate endpoint dots
    const dots = document.querySelectorAll(".ring-endpoint-dot");
    dots.forEach(dot => {
      const ringIdx = parseInt(dot.dataset.ring);
      const mod = MODULES[ringIdx];
      const r = radii[ringIdx];
      const angle = (mod.pct / 100) * 2 * Math.PI - Math.PI / 2;
      const ex = cx + r * Math.cos(angle);
      const ey = cy + r * Math.sin(angle);

      dot.style.transition = `cx 1.2s cubic-bezier(.4,.0,.2,1) ${ringIdx * 0.12}s, cy 1.2s cubic-bezier(.4,.0,.2,1) ${ringIdx * 0.12}s`;
      requestAnimationFrame(() => {
        dot.setAttribute("cx", ex);
        dot.setAttribute("cy", ey);
      });

      // pulse animation
      animateDotPulse(dot);
    });

    // animate center percentage counter
    animateCounter(document.getElementById("centerPct"), 0, 65, 1200);

    // position endpoint labels after animation
    setTimeout(() => {
      positionEndpointLabels();
    }, 1400);
  }

  function animateDotPulse(dot) {
    let growing = true;
    let baseR = 5;
    function pulse() {
      baseR += growing ? 0.06 : -0.06;
      if (baseR >= 7) growing = false;
      if (baseR <= 5) growing = true;
      dot.setAttribute("r", baseR);
      requestAnimationFrame(pulse);
    }
    pulse();
  }

  function positionEndpointLabels() {
    const container = document.getElementById("ringsContainer");
    const rect = container.getBoundingClientRect();
    const { cx, cy, radii } = RING_CONFIG;
    const scaleX = rect.width / 380;
    const scaleY = rect.height / 380;

    document.querySelectorAll(".ring-label").forEach(lbl => {
      const i = parseInt(lbl.dataset.ring);
      const mod = MODULES[i];
      const r = radii[i];
      const angle = (mod.pct / 100) * 2 * Math.PI - Math.PI / 2;
      const px = cx + r * Math.cos(angle);
      const py = cy + r * Math.sin(angle);

      lbl.style.left = `${px * scaleX}px`;
      lbl.style.top = `${py * scaleY}px`;
      lbl.style.transform = "translate(-50%, -50%)";
      lbl.classList.add("visible");
    });
  }

  function animateCounter(el, from, to, duration) {
    const start = performance.now();
    function tick(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * ease) + "%";
      if (t < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ============================================================
     BUILD STAT CARDS
     ============================================================ */
  function buildStatCards() {
    const container = document.getElementById("statCards");
    MODULES.forEach((mod, i) => {
      const card = document.createElement("div");
      card.className = "stat-card anim-fade-up";
      card.style.animationDelay = `${0.3 + i * 0.08}s`;
      card.dataset.module = mod.id;

      const dot = document.createElement("span");
      dot.className = "stat-dot" + (mod.active ? " pulse" : "");
      dot.style.background = mod.dotColor;
      dot.style.color = mod.dotColor;

      const info = document.createElement("div");
      info.className = "stat-info";

      const name = document.createElement("div");
      name.className = "stat-name";
      name.textContent = `${mod.name} ${mod.statusIcon}`;

      const detail = document.createElement("div");
      detail.className = "stat-detail";
      detail.textContent = mod.statLine;

      info.appendChild(name);
      info.appendChild(detail);
      card.appendChild(dot);
      card.appendChild(info);

      card.addEventListener("click", () => {
        const target = document.getElementById(`detail-${mod.id}`);
        if (target) {
          target.scrollIntoView({ behavior: "smooth", block: "center" });
          // open it
          if (!target.classList.contains("open")) {
            target.classList.add("open");
          }
          // flash highlight
          target.style.borderColor = mod.color2;
          setTimeout(() => { target.style.borderColor = ""; }, 1200);
        }
      });

      container.appendChild(card);
    });
  }

  /* ============================================================
     BUILD DETAIL CARDS
     ============================================================ */
  function buildDetailCards() {
    const section = document.getElementById("detailsSection");

    MODULES.forEach((mod, i) => {
      const card = document.createElement("div");
      card.className = "detail-card anim-fade-up" + (mod.active ? " open" : "");
      card.style.animationDelay = `${0.5 + i * 0.1}s`;
      card.id = `detail-${mod.id}`;

      // header
      const header = document.createElement("div");
      header.className = "detail-header";

      const headerLeft = document.createElement("div");
      headerLeft.className = "detail-header-left";

      const dot = document.createElement("span");
      dot.className = "detail-status-dot";
      dot.style.background = mod.dotColor;

      const title = document.createElement("span");
      title.className = "detail-title";
      title.textContent = mod.name;

      headerLeft.appendChild(dot);
      headerLeft.appendChild(title);

      if (mod.iteration) {
        const sub = document.createElement("span");
        sub.className = "detail-subtitle";
        sub.textContent = `Iteration ${mod.iteration.current} of ${mod.iteration.total}`;
        headerLeft.appendChild(sub);
      } else if (mod.done) {
        const sub = document.createElement("span");
        sub.className = "detail-subtitle";
        sub.textContent = "Complete";
        headerLeft.appendChild(sub);
      } else if (mod.pending) {
        const sub = document.createElement("span");
        sub.className = "detail-subtitle";
        sub.textContent = "Waiting";
        sub.style.color = "#4b5563";
        headerLeft.appendChild(sub);
      }

      const chevron = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      chevron.setAttribute("width", "18");
      chevron.setAttribute("height", "18");
      chevron.setAttribute("viewBox", "0 0 24 24");
      chevron.setAttribute("fill", "none");
      chevron.setAttribute("stroke", "currentColor");
      chevron.setAttribute("stroke-width", "2");
      chevron.classList.add("detail-chevron");
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M6 9l6 6 6-6");
      chevron.appendChild(path);

      header.appendChild(headerLeft);
      header.appendChild(chevron);

      header.addEventListener("click", () => {
        card.classList.toggle("open");
      });

      // body
      const body = document.createElement("div");
      body.className = "detail-body";
      const inner = document.createElement("div");
      inner.className = "detail-body-inner";

      if (mod.active && mod.subSteps) {
        // mini rings
        const miniRow = document.createElement("div");
        miniRow.className = "mini-rings";
        mod.subSteps.forEach(step => {
          const item = document.createElement("div");
          item.className = "mini-ring-item";
          item.appendChild(buildMiniRingSVG(step.pct, mod.color1, mod.color2, 60));
          const lbl = document.createElement("div");
          lbl.className = "mini-ring-label";
          lbl.textContent = step.name;
          const pctLbl = document.createElement("div");
          pctLbl.className = "mini-ring-pct";
          pctLbl.textContent = step.pct + "%";
          item.appendChild(pctLbl);
          item.appendChild(lbl);
          miniRow.appendChild(item);
        });
        inner.appendChild(miniRow);

        // artifacts
        if (mod.artifacts) {
          const aTitle = document.createElement("div");
          aTitle.className = "artifact-list-title";
          aTitle.textContent = "Artifacts";
          inner.appendChild(aTitle);

          const aList = document.createElement("div");
          aList.className = "artifact-list";
          mod.artifacts.forEach(art => {
            const row = document.createElement("div");
            row.className = "artifact-item";

            const left = document.createElement("div");
            left.className = "artifact-item-left";

            const icon = document.createElement("span");
            icon.className = "artifact-icon";
            icon.textContent = art.icon;
            icon.style.background = art.bg;

            const name = document.createElement("span");
            name.className = "artifact-name";
            name.textContent = art.name;

            left.appendChild(icon);
            left.appendChild(name);

            const badge = document.createElement("span");
            badge.className = "artifact-status";
            badge.textContent = art.statusLabel;
            badge.style.background = art.bg;
            badge.style.color = art.fg;

            row.appendChild(left);
            row.appendChild(badge);
            aList.appendChild(row);
          });
          inner.appendChild(aList);
        }
      } else if (mod.done && mod.metrics) {
        const row = document.createElement("div");
        row.className = "metric-row";
        mod.metrics.forEach(m => {
          const metric = document.createElement("div");
          metric.className = "metric";
          const val = document.createElement("div");
          val.className = "metric-val";
          val.style.color = mod.color2;
          val.textContent = m.val;
          const lbl = document.createElement("div");
          lbl.className = "metric-lbl";
          lbl.textContent = m.lbl;
          metric.appendChild(val);
          metric.appendChild(lbl);
          row.appendChild(metric);
        });
        inner.appendChild(row);
      } else if (mod.pending && mod.expectedSteps) {
        const row = document.createElement("div");
        row.className = "pending-steps";
        mod.expectedSteps.forEach(s => {
          const step = document.createElement("span");
          step.className = "pending-step";
          step.textContent = s;
          row.appendChild(step);
        });
        inner.appendChild(row);
      }

      body.appendChild(inner);
      card.appendChild(header);
      card.appendChild(body);
      section.appendChild(card);
    });
  }

  /* ============================================================
     MINI RING SVG BUILDER
     ============================================================ */
  function buildMiniRingSVG(pct, color1, color2, size) {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    svg.setAttribute("viewBox", `0 0 ${size} ${size}`);

    const cx = size / 2, cy = size / 2;
    const r = (size / 2) - 6;
    const sw = 5;
    const circ = 2 * Math.PI * r;

    // unique gradient id
    const gid = `mini-grad-${Math.random().toString(36).slice(2, 8)}`;
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const grad = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
    grad.id = gid;
    grad.setAttribute("x1", "0"); grad.setAttribute("y1", "0");
    grad.setAttribute("x2", String(size)); grad.setAttribute("y2", String(size));
    grad.setAttribute("gradientUnits", "userSpaceOnUse");
    const s1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    s1.setAttribute("offset", "0%"); s1.setAttribute("stop-color", color1);
    const s2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    s2.setAttribute("offset", "100%"); s2.setAttribute("stop-color", color2);
    grad.appendChild(s1); grad.appendChild(s2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    // bg
    const bg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    bg.setAttribute("cx", cx); bg.setAttribute("cy", cy);
    bg.setAttribute("r", r); bg.setAttribute("fill", "none");
    bg.setAttribute("stroke", pct === 0 ? "#4b5563" : color1);
    bg.setAttribute("stroke-opacity", "0.12");
    bg.setAttribute("stroke-width", sw);
    if (pct === 0) bg.setAttribute("stroke-dasharray", "3 5");
    svg.appendChild(bg);

    if (pct > 0) {
      const fg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      fg.setAttribute("cx", cx); fg.setAttribute("cy", cy);
      fg.setAttribute("r", r); fg.setAttribute("fill", "none");
      fg.setAttribute("stroke", `url(#${gid})`);
      fg.setAttribute("stroke-width", sw);
      fg.setAttribute("stroke-linecap", "round");
      fg.setAttribute("stroke-dasharray", circ);
      fg.setAttribute("stroke-dashoffset", circ);
      fg.setAttribute("transform", `rotate(-90 ${cx} ${cy})`);
      fg.classList.add("mini-ring-fg");
      fg.dataset.target = circ * (1 - pct / 100);
      svg.appendChild(fg);
    }

    return svg;
  }

  /* ============================================================
     ANIMATE MINI RINGS (triggered after main ring animation)
     ============================================================ */
  function animateMiniRings() {
    document.querySelectorAll(".mini-ring-fg").forEach((el, idx) => {
      el.style.transition = `stroke-dashoffset 0.8s cubic-bezier(.4,.0,.2,1) ${idx * 0.07}s`;
      requestAnimationFrame(() => {
        el.setAttribute("stroke-dashoffset", el.dataset.target);
      });
    });
  }

  /* ============================================================
     INIT
     ============================================================ */
  function init() {
    buildMainRings();
    buildStatCards();
    buildDetailCards();

    // stagger animation start
    requestAnimationFrame(() => {
      animateRings();
      setTimeout(animateMiniRings, 400);
    });

    // reposition labels on resize
    window.addEventListener("resize", positionEndpointLabels);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
