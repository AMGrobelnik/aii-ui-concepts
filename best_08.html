<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Best 08</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0f1219;
    --bg-raised:  #151a24;
    --surface:    #1a2030;
    --border:     #252d3d;
    --border-dim: #1e2636;
    --text:       #e2e8f0;
    --text-dim:   #8892a4;
    --text-muted: #4e5a6e;
    --green:      #22c55e;
    --purple:     #a78bfa;
    --blue:       #3b82f6;
    --orange:     #f59e0b;
    --red:        #ef4444;
    --cyan:       #06b6d4;
    --card-radius: 12px;
    --tree-line:  #252d3d;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ================================================================
     HEADER
     ================================================================ */
  .header {
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 18px;
    border-bottom: 1px solid var(--border-dim);
    background: linear-gradient(180deg, var(--surface) 0%, var(--bg-raised) 100%);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    white-space: nowrap;
    background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── Header Ring ── */
  .header-ring {
    width: 40px; height: 40px;
    position: relative;
    flex-shrink: 0;
  }
  .header-ring svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .header-ring .ring-track {
    fill: none; stroke: var(--border); stroke-width: 3;
  }
  .header-ring .ring-fill {
    fill: none; stroke: var(--green); stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 100.53;
    stroke-dashoffset: 35.19;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 0 4px rgba(34,197,94,0.4));
  }
  .header-ring .ring-text {
    fill: var(--text); font-size: 9px; font-weight: 700;
    text-anchor: middle; dominant-baseline: central;
    font-family: 'Inter', sans-serif;
  }
  .ring-glow {
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 1px dashed rgba(34,197,94,0.3);
    animation: ringRotate 10s linear infinite;
  }
  @keyframes ringRotate { to { transform: rotate(360deg); } }
  .ring-endpoint {
    position: absolute; width: 5px; height: 5px;
    background: var(--green); border-radius: 50%;
    top: -1px; left: 50%; transform: translateX(-50%);
    animation: ringEndGlow 2.5s ease-in-out infinite;
    box-shadow: 0 0 6px var(--green);
  }
  @keyframes ringEndGlow {
    0%, 100% { opacity: 0.5; box-shadow: 0 0 4px var(--green); }
    50%      { opacity: 1;   box-shadow: 0 0 12px var(--green), 0 0 24px rgba(34,197,94,0.3); }
  }

  .header-stats {
    display: flex; gap: 20px; margin-left: auto;
    font-size: 11px; color: var(--text-dim);
  }
  .header-stats span { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ================================================================
     MODULES AREA (horizontal cards row)
     ================================================================ */
  .modules-area {
    padding: 20px 28px 0;
    position: relative;
  }
  .modules-row {
    display: flex;
    gap: 16px;
    position: relative;
  }

  /* ── Module Column ── */
  .module-col {
    flex: 1;
    min-width: 0;
    max-width: 260px;
    position: relative;
  }

  /* ── Module Card ── */
  .module-card {
    width: 100%;
    height: 82px;
    background: linear-gradient(135deg, rgba(26,32,48,0.95), rgba(21,26,36,0.8));
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 14px 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
  }
  .module-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: var(--card-radius) 0 0 var(--card-radius);
  }
  .module-card:hover { transform: translateY(-2px); }

  .module-card[data-color="green"]::before  { background: var(--green); }
  .module-card[data-color="purple"]::before { background: var(--purple); }
  .module-card[data-color="blue"]::before   { background: var(--blue); }
  .module-card[data-color="orange"]::before { background: var(--orange); }

  .module-card.active { border-color: rgba(255,255,255,0.1); }
  .module-card.active[data-color="green"]  { box-shadow: 0 0 24px rgba(34,197,94,0.12), 0 4px 16px rgba(0,0,0,0.3); }
  .module-card.active[data-color="purple"] { box-shadow: 0 0 24px rgba(167,139,250,0.12), 0 4px 16px rgba(0,0,0,0.3); }
  .module-card.active[data-color="blue"]   { box-shadow: 0 0 24px rgba(59,130,246,0.12), 0 4px 16px rgba(0,0,0,0.3); }
  .module-card.active[data-color="orange"] { box-shadow: 0 0 24px rgba(245,158,11,0.12), 0 4px 16px rgba(0,0,0,0.3); }

  /* Active glow pulse */
  .module-card.active::after {
    content: '';
    position: absolute; inset: -1px;
    border-radius: var(--card-radius);
    animation: cardGlow 2.5s ease-in-out infinite;
    pointer-events: none;
  }
  .module-card.active[data-color="green"]::after  { box-shadow: inset 0 0 24px rgba(34,197,94,0.06); }
  .module-card.active[data-color="purple"]::after { box-shadow: inset 0 0 24px rgba(167,139,250,0.06); }
  .module-card.active[data-color="blue"]::after   { box-shadow: inset 0 0 24px rgba(59,130,246,0.06); }
  .module-card.active[data-color="orange"]::after { box-shadow: inset 0 0 24px rgba(245,158,11,0.06); }
  @keyframes cardGlow {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }

  /* Shimmer sweep on active cards */
  .card-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg,
      transparent 30%,
      rgba(255,255,255,0.02) 46%,
      rgba(255,255,255,0.05) 50%,
      rgba(255,255,255,0.02) 54%,
      transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 3.5s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
    border-radius: var(--card-radius);
  }
  .module-card.active .card-shimmer { opacity: 1; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .card-icon { font-size: 14px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-status {
    font-size: 10px; font-weight: 500; padding: 2px 7px;
    border-radius: 6px; margin-left: auto;
  }
  .card-status.done    { background: rgba(34,197,94,0.12); color: var(--green); }
  .card-status.running {
    background: rgba(59,130,246,0.12); color: var(--blue);
    animation: statusPulse 2s ease-in-out infinite;
  }
  .card-status.pending { background: rgba(78,90,110,0.15); color: var(--text-muted); }
  @keyframes statusPulse {
    0%, 100% { opacity: 0.8; }
    50%      { opacity: 1; background: rgba(59,130,246,0.2); }
  }

  /* Mini ring inside each card */
  .card-mini-ring {
    position: absolute;
    right: 14px; bottom: 10px;
    width: 26px; height: 26px;
  }
  .card-mini-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .card-mini-ring .mr-track { fill: none; stroke: var(--border); stroke-width: 2.5; }
  .card-mini-ring .mr-fill  { fill: none; stroke-width: 2.5; stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }
  .card-mini-ring .mr-text  { fill: var(--text-dim); font-size: 7px; font-weight: 700;
    text-anchor: middle; dominant-baseline: central; font-family: 'Inter', sans-serif; }

  .card-progress {
    height: 3px; background: rgba(255,255,255,0.04);
    border-radius: 2px; overflow: hidden;
    margin-right: 36px;
  }
  .card-progress-fill {
    height: 100%; border-radius: 2px;
    width: 0; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .card-sub-label {
    font-size: 10px; color: var(--text-muted); margin-top: 4px;
  }

  /* ================================================================
     TREE SUB-MODULES
     ================================================================ */
  .submods {
    padding: 8px 0 0 0;
    position: relative;
    overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  }
  .submods.collapsed {
    max-height: 0 !important;
    opacity: 0;
    padding: 0;
  }
  .tree-container {
    position: relative;
    padding-left: 18px;
  }
  .tree-container::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 0;
    width: 1px;
    height: var(--tree-line-h, calc(100% - 18px));
    transition: height 0.4s ease;
  }
  /* Colored tree lines per module */
  .module-col[data-color="green"]  .tree-container::before { background: linear-gradient(180deg, rgba(34,197,94,0.4) 0%, rgba(34,197,94,0.1) 100%); }
  .module-col[data-color="purple"] .tree-container::before { background: linear-gradient(180deg, rgba(167,139,250,0.4) 0%, rgba(167,139,250,0.1) 100%); }
  .module-col[data-color="blue"]   .tree-container::before { background: linear-gradient(180deg, rgba(59,130,246,0.4) 0%, rgba(59,130,246,0.1) 100%); }
  .module-col[data-color="orange"] .tree-container::before { background: linear-gradient(180deg, rgba(245,158,11,0.4) 0%, rgba(245,158,11,0.1) 100%); }

  .submod-row {
    height: 36px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    font-size: 13px;
    opacity: 0;
    transform: translateX(-16px);
    transition: opacity 0.3s ease, transform 0.3s ease, background 0.15s;
    cursor: pointer;
    padding-right: 8px;
    border-radius: 6px;
  }
  .submod-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .submod-row:hover { background: rgba(255,255,255,0.025); }

  /* Colored horizontal branch lines */
  .module-col[data-color="green"]  .submod-row::before { background: rgba(34,197,94,0.3); }
  .module-col[data-color="purple"] .submod-row::before { background: rgba(167,139,250,0.3); }
  .module-col[data-color="blue"]   .submod-row::before { background: rgba(59,130,246,0.3); }
  .module-col[data-color="orange"] .submod-row::before { background: rgba(245,158,11,0.3); }
  .submod-row::before {
    content: '';
    position: absolute;
    left: -11px;
    top: 50%;
    width: 11px;
    height: 1px;
  }

  .submod-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
    transition: all 0.3s;
  }
  .submod-dot.done    { background: var(--green); opacity: 0.7; }
  .submod-dot.running {
    background: var(--blue);
    animation: dotPulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px rgba(59,130,246,0.5);
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1);    box-shadow: 0 0 6px rgba(59,130,246,0.4); }
    50%      { transform: scale(1.25); box-shadow: 0 0 14px rgba(59,130,246,0.7); }
  }
  .submod-dot.pending {
    background: transparent;
    border: 1.5px solid var(--text-muted);
    opacity: 0.45;
  }

  .submod-label {
    color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .submod-row.active-sub .submod-label { color: var(--text); font-weight: 500; }
  .submod-row.done-sub .submod-label   { color: var(--text-dim); }
  .submod-score {
    margin-left: auto; font-size: 10px; font-weight: 600;
    color: var(--text-muted); flex-shrink: 0;
  }

  /* Collapse toggle button on each card */
  .collapse-btn {
    position: absolute;
    right: 14px; top: 14px;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.3s ease, color 0.2s;
    z-index: 5;
    opacity: 0;
    border: none; background: none;
  }
  .module-card:hover .collapse-btn { opacity: 1; }
  .collapse-btn:hover { color: var(--text-dim); }
  .collapse-btn.collapsed { transform: rotate(-90deg); }

  /* ================================================================
     GLASSMORPHISM TOOLTIP
     ================================================================ */
  .sub-tooltip {
    position: fixed;
    width: 280px;
    padding: 16px 18px;
    background: rgba(21, 26, 40, 0.82);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 2px 8px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.06);
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px) scale(0.97);
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 200;
    font-size: 12px;
    color: var(--text);
  }
  .sub-tooltip.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .sub-tooltip::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 14px;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.04) 0%,
      transparent 50%,
      rgba(255,255,255,0.02) 100%);
    pointer-events: none;
  }

  .tt-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .tt-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .tt-dot.done    { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
  .tt-dot.running { background: var(--blue);  box-shadow: 0 0 6px rgba(59,130,246,0.4);
    animation: ttDotPulse 1.8s ease-in-out infinite; }
  .tt-dot.pending { background: transparent; border: 1.5px solid var(--text-muted); }
  @keyframes ttDotPulse {
    0%, 100% { box-shadow: 0 0 4px rgba(59,130,246,0.3); }
    50%      { box-shadow: 0 0 10px rgba(59,130,246,0.6); }
  }
  .tt-name {
    font-weight: 600; font-size: 13px;
    color: var(--text);
  }
  .tt-status {
    margin-left: auto;
    font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 5px;
  }
  .tt-status.done    { background: rgba(34,197,94,0.12); color: var(--green); }
  .tt-status.running { background: rgba(59,130,246,0.12); color: var(--blue); }
  .tt-status.pending { background: rgba(78,90,110,0.15); color: var(--text-muted); }

  .tt-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06) 20%, rgba(255,255,255,0.06) 80%, transparent);
    margin: 8px 0;
  }

  .tt-summary {
    font-size: 11.5px; color: var(--text-dim);
    line-height: 1.55;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .tt-meta {
    display: flex; gap: 16px;
  }
  .tt-meta-item {
    display: flex; flex-direction: column; gap: 2px;
  }
  .tt-meta-label {
    font-size: 9px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tt-meta-value {
    font-size: 12px; font-weight: 600;
  }

  /* ================================================================
     CANVAS (full page overlay for particles)
     ================================================================ */
  #particleCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 15;
  }

  /* ================================================================
     BACKGROUND PARTICLES (ambient floating motes)
     ================================================================ */
  #bgCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ================================================================
     DASHBOARD
     ================================================================ */
  .dashboard {
    margin: 20px 28px 28px;
    background: linear-gradient(135deg, var(--surface) 0%, var(--bg-raised) 100%);
    border: 1px solid var(--border-dim);
    border-radius: var(--card-radius);
    padding: 24px;
    min-height: 260px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }
  .dash-transition { animation: dashFadeIn 0.4s cubic-bezier(0.4,0,0.2,1); }
  @keyframes dashFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dash-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .dash-title { font-size: 16px; font-weight: 700; }
  .dash-badge {
    font-size: 10px; font-weight: 600; padding: 3px 10px;
    border-radius: 6px;
  }
  .dash-badge.done    { background: rgba(34,197,94,0.12); color: var(--green); }
  .dash-badge.running { background: rgba(59,130,246,0.12); color: var(--blue); }
  .dash-badge.pending { background: rgba(78,90,110,0.15); color: var(--text-muted); }

  .dash-summary {
    font-size: 13px; color: var(--text-dim); line-height: 1.6;
    margin-bottom: 20px; max-width: 720px;
    font-style: italic;
  }

  .stat-cards {
    display: flex; gap: 14px; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    flex: 1; min-width: 160px; max-width: 240px;
    background: rgba(255,255,255,0.015);
    border: 1px solid var(--border-dim);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-card-label {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .stat-card-value { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .stat-bar {
    height: 4px; background: rgba(255,255,255,0.04);
    border-radius: 2px; overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%; border-radius: 2px;
    width: 0;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .item-list { margin-bottom: 16px; }
  .item-list-title {
    font-size: 11px; color: var(--text-muted);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .item-row:hover { background: rgba(255,255,255,0.025); }
  .item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .item-dot.done    { background: var(--green); }
  .item-dot.running { background: var(--blue); animation: itemDotPulse 1.5s ease-in-out infinite; }
  .item-dot.pending { border: 1px solid var(--text-muted); }
  @keyframes itemDotPulse {
    0%, 100% { opacity: 0.7; } 50% { opacity: 1; }
  }
  .item-name { color: var(--text-dim); }
  .item-meta { margin-left: auto; font-size: 10px; color: var(--text-muted); }

  .item-row.running-item { position: relative; overflow: hidden; }
  .item-row.running-item::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(59,130,246,0.04) 45%,
      rgba(59,130,246,0.08) 50%,
      rgba(59,130,246,0.04) 55%,
      transparent 100%);
    background-size: 200% 100%;
    animation: rowShimmer 2.5s ease-in-out infinite;
    pointer-events: none;
    border-radius: 6px;
  }
  @keyframes rowShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .activity-log { border-top: 1px solid var(--border-dim); padding-top: 14px; }
  .activity-title {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .activity-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    font-size: 11px; color: var(--text-dim);
    transition: opacity 0.4s, transform 0.4s;
  }
  .activity-time {
    color: var(--text-muted); font-size: 10px;
    font-variant-numeric: tabular-nums; flex-shrink: 0; width: 44px;
  }
  .activity-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ================================================================
     RESPONSIVE
     ================================================================ */
  @media (max-width: 960px) {
    .modules-row { flex-wrap: wrap; }
    .module-col  { max-width: 48%; flex: 0 0 48%; }
  }
  @media (max-width: 600px) {
    .module-col { max-width: 100%; flex: 0 0 100%; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<!-- ================================================================
     HEADER
     ================================================================ -->
<div class="header">

// ================================================================

function buildModules() {
  const row = document.getElementById('modulesRow');
  row.innerHTML = '';
  cardElements = [];
  submodElements = [];

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'module-col';
    col.dataset.color = mod.color;

    // Card
    const card = document.createElement('div');
    card.className = 'module-card' + (mi === activeModuleIdx ? ' active' : '');
    card.dataset.color = mod.color;
    card.dataset.idx = mi;

    const circumference = 2 * Math.PI * 9;
    const offset = circumference - (mod.progress / 100) * circumference;

    card.innerHTML = `
      <div class="card-shimmer"></div>
      <div class="card-header">
        <span class="card-icon">${mod.icon}</span>
        <span class="card-title">${mod.title}</span>
        <span class="card-status ${mod.status}">${statusLabel(mod.status)}</span>
      </div>
      <div class="card-progress">
        <div class="card-progress-fill" style="background:var(--${mod.color})" data-pct="${mod.progress}"></div>
      </div>
      <div class="card-sub-label">${mod.subLabel}</div>
      <div class="card-mini-ring">
        <svg viewBox="0 0 24 24">
          <circle class="mr-track" cx="12" cy="12" r="9" />
          <circle class="mr-fill" cx="12" cy="12" r="9"
            style="stroke:var(--${mod.color}); stroke-dasharray:${circumference}; stroke-dashoffset:${offset}; filter:drop-shadow(0 0 3px var(--${mod.color}))" />
          <text class="mr-text" x="12" y="12.5" transform="rotate(90 12 12)">${mod.progress}%</text>
        </svg>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.closest('.collapse-btn')) return;
      selectModule(mi);
    });
    col.appendChild(card);
    cardElements.push(card);

    // Collapse button (added to card after build, using absolute positioning)
    const colBtn = document.createElement('button');
    colBtn.className = 'collapse-btn' + (collapsedModules.has(mi) ? ' collapsed' : '');
    colBtn.innerHTML = '\u25BE';
    colBtn.title = 'Toggle sub-modules';
    colBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCollapse(mi, colBtn);
    });
    card.appendChild(colBtn);

    // Sub-modules
    const subsDiv = document.createElement('div');
    subsDiv.className = 'submods';
    subsDiv.id = 'submods-' + mi;
    if (collapsedModules.has(mi)) {
      subsDiv.classList.add('collapsed');
    }
    const tree = document.createElement('div');
    tree.className = 'tree-container';

    const subEls = [];
    mod.subs.forEach((sub, si) => {
      const sRow = document.createElement('div');
      sRow.className = 'submod-row';
      if (sub.status === 'done') sRow.classList.add('done-sub');
      if (sub.status === 'running') sRow.classList.add('active-sub');
      sRow.dataset.modIdx = mi;
      sRow.dataset.subIdx = si;

      let dotClass = 'submod-dot ' + sub.status;
      let scoreHtml = sub.score ? `<span class="submod-score">${sub.score}</span>` : '';

      sRow.innerHTML = `
        <span class="${dotClass}"></span>
        <span class="submod-label">${sub.label}</span>
        ${scoreHtml}${extraHtml}
      `;

      // Tooltip events
      sRow.addEventListener('mouseenter', (e) => showTooltip(mi, si, e));
      sRow.addEventListener('mousemove', (e) => moveTooltip(e));
      sRow.addEventListener('mouseleave', hideTooltip);

      tree.appendChild(sRow);
      subEls.push(sRow);
    });

    subsDiv.appendChild(tree);
    col.appendChild(subsDiv);
    submodElements.push(subEls);
    row.appendChild(col);
  });

  requestAnimationFrame(() => {
    document.querySelectorAll('.card-progress-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';

  // Stagger entrance for active module; instant for others
  animateSubEntrance(activeModuleIdx);
  MODULES.forEach((mod, mi) => {
    if (mi !== activeModuleIdx) {
      submodElements[mi].forEach(el => el.classList.add('visible'));
    }

  // Set max-height for each submods container (for collapse animation)
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      computeTreeLineHeights();
      setSubmodsMaxHeight();
    });
  });

function statusLabel(s) {
  if (s === 'done') return 'Done';
  if (s === 'running') return 'Running';
  return 'Pending';
}

function setSubmodsMaxHeight() {
  MODULES.forEach((mod, mi) => {
    const el = document.getElementById('submods-' + mi);
    if (!el) return;
    if (!collapsedModules.has(mi)) {
      el.style.maxHeight = el.scrollHeight + 'px';
    }
  });
}

function computeTreeLineHeights() {
  document.querySelectorAll('.tree-container').forEach(tc => {
    const rows = tc.querySelectorAll('.submod-row');
    if (rows.length === 0) return;
    const lastRow = rows[rows.length - 1];
    const tcRect = tc.getBoundingClientRect();
    const lastRect = lastRow.getBoundingClientRect();
    const h = (lastRect.top + lastRect.height / 2) - tcRect.top;
    tc.style.setProperty('--tree-line-h', h + 'px');
  });
}

function animateSubEntrance(mi) {
  const subs = submodElements[mi];
  if (!subs) return;
  subs.forEach((el, i) => {
    el.classList.remove('visible');
    setTimeout(() => el.classList.add('visible'), 80 + i * 60);
  });
}

function selectModule(mi) {
  if (mi === activeModuleIdx) return;
  activeModuleIdx = mi;
  cardElements.forEach((c, i) => c.classList.toggle('active', i === mi));
  animateSubEntrance(mi);
  treeParticles = [];
  buildDashboard();
}

function toggleCollapse(mi, btn) {
  const el = document.getElementById('submods-' + mi);
  if (!el) return;
  if (collapsedModules.has(mi)) {
    collapsedModules.delete(mi);
    el.style.maxHeight = el.scrollHeight + 'px';
    el.classList.remove('collapsed');
    btn.classList.remove('collapsed');
    animateSubEntrance(mi);
  } else {
    collapsedModules.add(mi);
    el.style.maxHeight = el.scrollHeight + 'px';
    requestAnimationFrame(() => {
      el.classList.add('collapsed');
      btn.classList.add('collapsed');
    });
  }
  setTimeout(computeTreeLineHeights, 500);
}

function showTooltip(mi, si, e) {
  const mod = MODULES[mi];
  const sub = mod.subs[si];
  if (!sub) return;

  const ttDot = document.getElementById('ttDot');
  const ttName = document.getElementById('ttName');
  const ttStatus = document.getElementById('ttStatus');
  const ttSummary = document.getElementById('ttSummary');
  const ttDuration = document.getElementById('ttDuration');
  const ttCost = document.getElementById('ttCost');

  ttDot.className = 'tt-dot ' + sub.status;
  ttName.textContent = sub.label;
  ttStatus.className = 'tt-status ' + sub.status;
  ttStatus.textContent = statusLabel(sub.status);

  // First sentence of summary
  const firstSentence = (sub.summary || '').split(/\.\s/)[0];
  ttSummary.textContent = firstSentence + (firstSentence.endsWith('.') ? '' : '.');

  const colorVar = `var(--${mod.color})`;
  ttDuration.textContent = sub.duration || '\u2014';
  ttDuration.style.color = colorVar;
  ttCost.textContent = sub.cost || '\u2014';
  ttCost.style.color = colorVar;

  tooltipTarget = { mi, si };
  positionTooltip(e);
  tooltip.classList.add('visible');
  tooltipVisible = true;
}

function moveTooltip(e) {
  if (!tooltipVisible) return;
  positionTooltip(e);
}

function positionTooltip(e) {
  const ttW = 280;
  const ttH = tooltip.offsetHeight || 160;
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;

  // Keep within viewport
  if (x + ttW > window.innerWidth - 10) {
    x = e.clientX - ttW - pad;
  }
  if (y + ttH > window.innerHeight - 10) {
    y = e.clientY - ttH - pad;
  }
  if (x < 10) x = 10;
  if (y < 10) y = 10;

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
  tooltipVisible = false;
  tooltipTarget = null;
}

function startLogRotation() {
  if (logRotateTimer) clearInterval(logRotateTimer);
  const mod = MODULES[activeModuleIdx];
  if (mod.status !== 'running') return;

  const extraLogs = [
    { time: '16:31', text: 'Token count: 14,282 in / 3,841 out', color: 'var(--text-dim)' },
    { time: '16:30', text: 'gumbel_gates.py \u2014 writing forward() method', color: 'var(--blue)' },
    { time: '16:29', text: 'Tool call: file_write search_cell.py', color: 'var(--text-dim)' },
    { time: '16:28', text: 'Validation: search_cell.py all checks passed', color: 'var(--green)' },
  ];
  let logIdx = 0;

  logRotateTimer = setInterval(() => {
    const container = document.getElementById('activityItems');
    if (!container) return;

    const extra = extraLogs[logIdx % extraLogs.length];
    logIdx++;

    const items = container.querySelectorAll('.activity-item');
    if (items.length >= 3) {
      const last = items[items.length - 1];
      last.style.opacity = '0';
      last.style.transform = 'translateY(4px)';
      setTimeout(() => last.remove(), 300);
    }

    const newItem = document.createElement('div');
    newItem.className = 'activity-item';
    newItem.style.opacity = '0';
    newItem.style.transform = 'translateY(-4px)';
    newItem.innerHTML = `
      <span class="activity-time">${extra.time}</span>
      <span class="activity-dot" style="background:${extra.color}"></span>
      <span>${extra.text}</span>
    `;
    container.insertBefore(newItem, container.firstChild);
    requestAnimationFrame(() => {
      newItem.style.opacity = '1';
      newItem.style.transform = 'translateY(0)';
    });
  }, 5000);
}

// ================================================================
// BACKGROUND PARTICLES (ambient floating motes)
// ================================================================
function initBgCanvas() {
  bgCanvas = document.getElementById('bgCanvas');
  bgCtx = bgCanvas.getContext('2d');
  resizeBgCanvas();
  window.addEventListener('resize', resizeBgCanvas);
  spawnBgParticles();
}

function resizeBgCanvas() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}

function spawnBgParticles() {
  bgParticles = [];
  const count = Math.floor((window.innerWidth * window.innerHeight) / 18000);
  const colors = ['#22c55e', '#a78bfa', '#3b82f6', '#f59e0b', '#06b6d4'];
  for (let i = 0; i < count; i++) {
    bgParticles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      size: 1 + Math.random() * 1.8,
      alpha: 0.05 + Math.random() * 0.12,
      color: colors[Math.floor(Math.random() * colors.length)],
      phase: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.3 + Math.random() * 0.8,
    });
  }
}

function drawBgParticles(dt) {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const now = performance.now() / 1000;

  for (const p of bgParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Wrap around
    if (p.x < -10) p.x = bgCanvas.width + 10;
    if (p.x > bgCanvas.width + 10) p.x = -10;
    if (p.y < -10) p.y = bgCanvas.height + 10;
    if (p.y > bgCanvas.height + 10) p.y = -10;

    const twinkle = 0.5 + 0.5 * Math.sin(now * p.twinkleSpeed + p.phase);
    const alpha = p.alpha * twinkle;

    // Outer glow
    bgCtx.globalAlpha = alpha * 0.4;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    bgCtx.fillStyle = p.color;
    bgCtx.fill();

    // Core
    bgCtx.globalAlpha = alpha;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    bgCtx.fillStyle = p.color;
    bgCtx.fill();
  }
  bgCtx.globalAlpha = 1;
}

// ================================================================
// PARTICLE CANVAS (tree + connector + burst particles)
// ================================================================
function initCanvas() {
  particleCanvas = document.getElementById('particleCanvas');
  pCtx = particleCanvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
}

function resizeCanvas() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
  computeTreeLineHeights();
}

function elRect(el) { return el.getBoundingClientRect(); }

// ── CONNECTOR PARTICLES (between cards) ──
function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardElements[i];
    const toCard = cardElements[i + 1];
    if (!fromCard || !toCard) continue;

    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];

    if (fromMod.status === 'pending' || toMod.status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;

    const cs = getComputedStyle(document.documentElement);
    let color, speed, size, alpha;

    if (fromMod.status === 'done' && (toMod.status === 'done' || toMod.status === 'running')) {
      speed = 40 + Math.random() * 20;
      color = cs.getPropertyValue('--' + fromMod.color).trim();
      size = 2.5;
      alpha = 0.45;
    } else {
      speed = 70 + Math.random() * 30;
      color = cs.getPropertyValue('--blue').trim();
      size = 3;
      alpha = 0.7;
    }

    connectorParticles.push({
      x: fromRect.right,
      y: y + (Math.random() - 0.5) * 4,
      targetX: toRect.left,
      speed, color, size, alpha,
      trail: [],
    });
  }
}

// ── TREE PARTICLES (card -> active sub-module) ──
function findActiveSubIdx(mi) {
  const mod = MODULES[mi];
  for (let i = 0; i < mod.subs.length; i++) {
    if (mod.subs[i].status === 'running') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  const mi = activeModuleIdx;
  if (collapsedModules.has(mi)) return;
  const si = findActiveSubIdx(mi);
  if (si < 0) return;
  if (!cardElements[mi] || !submodElements[mi] || !submodElements[mi][si]) return;

  const cardRect = elRect(cardElements[mi]);
  const subRow = submodElements[mi][si];
  const subDot = subRow.querySelector('.submod-dot');
  if (!subDot) return;

  const dotRect = elRect(subDot);
  const treeContainer = subRow.closest('.tree-container');
  if (!treeContainer) return;
  const treeRect = elRect(treeContainer);

  // Start: bottom-center of card
  const startX = cardRect.left + cardRect.width / 2;
  const startY = cardRect.bottom;

  // Vertical line x = left edge of tree's vertical line
  const vertX = treeRect.left + 7;

  // Branch point y = center of target sub-module row
  const branchY = dotRect.top + dotRect.height / 2;

  // End: center of dot
  const endX = dotRect.left + dotRect.width / 2;
  const endY = branchY;

  const waypoints = [
    { x: startX, y: startY },
    { x: vertX, y: startY + 8 },
    { x: vertX, y: branchY },
    { x: endX, y: endY },
  ];

  const cs = getComputedStyle(document.documentElement);
  const mod = MODULES[mi];
  const color = cs.getPropertyValue('--' + mod.color).trim();

  treeParticles.push({
    waypoints,
    wpIdx: 0,
    x: waypoints[0].x,
    y: waypoints[0].y,
    speed: 85,
    color,
    size: 3,
    alpha: 0.85,
    trail: [],
  });
}

// ── BURST EFFECT ──
function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.3;
    const speed = 30 + Math.random() * 45;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.5 + Math.random() * 0.5,
      color,
      size: 2,
    });
  }
}

// ================================================================
// MAIN ANIMATION LOOP
// ================================================================
let lastTime = 0;
let connectorTimer = 0;
let treeTimer = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  // Background particles
  drawBgParticles(dt);

  // Main particle canvas
  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  // Spawn timers
  connectorTimer += dt;
  if (connectorTimer > 0.9) {
    connectorTimer = 0;
    spawnConnectorParticle();
  }
  treeTimer += dt;
  if (treeTimer > 0.55) {
    treeTimer = 0;
    spawnTreeParticle();
  }

  // ── Draw connector lines (static) between cards ──
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardElements[i];
    const toCard = cardElements[i + 1];
    if (!fromCard || !toCard) continue;
    if (MODULES[i].status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;

    const toPending = MODULES[i + 1].status === 'pending';
    const cs = getComputedStyle(document.documentElement);
    const lineColor = cs.getPropertyValue('--' + MODULES[i].color).trim();

    pCtx.beginPath();
    pCtx.moveTo(fromRect.right + 2, y);
    pCtx.lineTo(toRect.left - 2, y);
    pCtx.strokeStyle = toPending ? '#252d3d' : lineColor;
    pCtx.lineWidth = 1;
    pCtx.globalAlpha = toPending ? 0.3 : 0.25;
    pCtx.setLineDash(toPending ? [4, 4] : []);
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.globalAlpha = 1;
  }

  // ── Draw connector particles ──
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 14) p.trail.shift();

    // Trail
    if (p.trail.length > 1) {
      pCtx.beginPath();
      pCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      pCtx.strokeStyle = p.color;
      pCtx.globalAlpha = p.alpha * 0.25;
      pCtx.lineWidth = p.size * 0.6;
      pCtx.stroke();
    }

    // Head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Glow
    pCtx.globalAlpha = p.alpha * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;

    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }

  // ── Draw tree particles ──
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }

    const dx = wp.x - p.x;
    const dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 2) {
      p.x = wp.x;
      p.y = wp.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();

    // Trail
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        pCtx.globalAlpha = ratio * p.alpha * 0.35;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = p.color;
        pCtx.lineWidth = p.size * 0.5 * ratio;
        pCtx.stroke();
      }
    }

    // Head glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }

  // ── Draw burst particles ──
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;

    pCtx.globalAlpha = p.life * 0.7;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Glow
    pCtx.globalAlpha = p.life * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3 * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    pCtx.globalAlpha = 1;
  }
}

// ================================================================
// INIT
// ================================================================
function init() {
  buildModules();
  buildDashboard();
  initCanvas();
  initBgCanvas();
  lastTime = performance.now();
  requestAnimationFrame(animate);
}

document.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => {
  setSubmodsMaxHeight();
  spawnBgParticles();
});
</script>
</body>
</html>
