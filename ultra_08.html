<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra Pipeline Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1d23;
  --surface: #22262e;
  --surface-hi: #2e3440;
  --surface-raised: #282d36;
  --border: rgba(46, 52, 64, 0.8);
  --border-lite: rgba(60, 68, 82, 0.6);
  --glass: rgba(34, 38, 46, 0.55);
  --glass-border: rgba(100, 116, 155, 0.14);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 40%, transparent 60%);
  --glass-blur: 16px;

  --text-100: #e6e9f0;
  --text-200: #b0b8c9;
  --text-300: #8892a6;
  --text-400: #5c6578;
  --text-500: #3e4555;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --purple-glow: rgba(167,139,250,0.25);
  --purple-deep: rgba(167,139,250,0.55);

  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --blue-glow: rgba(59,130,246,0.25);
  --blue-deep: rgba(59,130,246,0.55);

  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.12);
  --orange-glow: rgba(245,158,11,0.25);
  --orange-deep: rgba(245,158,11,0.55);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --green-glow: rgba(52,211,153,0.25);
  --red: #ef4444;

  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --header-h: 44px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(100,116,155,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,155,0.025) 1px, transparent 1px);
  background-size: 52px 52px;
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   FIXED HEADER (44px glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(26, 29, 35, 0.82);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 24px;
  z-index: 1000; gap: 14px;
}
.header-brand {
  font-weight: 800; font-size: 13px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.breadcrumb span { color: var(--text-400); }
.breadcrumb .sep { color: rgba(100,116,155,0.35); font-size: 10px; }
.breadcrumb .active { color: var(--text-200); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.header-stat {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 5px;
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 2px 8px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.18);
  border-radius: 4px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.3); }
  50% { opacity: 1; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
}

/* ================================================================
   MAIN CONTENT AREA
   ================================================================ */
.main {
  margin-top: var(--header-h);
  padding: 24px 28px 60px;
  position: relative; z-index: 1;
  max-width: 1400px;
  margin-left: auto; margin-right: auto;
}

/* ================================================================
   SECTION BACKGROUND TINTS
   ================================================================ */
.section-tint {
  position: absolute; left: 0; right: 0; pointer-events: none;
  border-radius: 20px; filter: blur(60px); z-index: -1;
}
.section-tint.purple-tint { background: rgba(167,139,250,0.03); top: 0; height: 300px; }
.section-tint.blue-tint { background: rgba(59,130,246,0.04); top: 180px; height: 500px; }

/* ================================================================
   MODULE CARDS ROW (4 horizontal cards)
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-bottom: 8px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px 12px; transition: all 0.35s ease; overflow: hidden;
  min-height: 120px;
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
.mod-card .glow-halo {
  position: absolute; inset: -24px; border-radius: 28px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(32px);
}
.mod-card[data-color="green"] .glow-halo { background: var(--green); }
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.12; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.18; } }

/* inner glow */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="green"]::before { box-shadow: 0 0 36px 8px var(--green-dim), inset 0 0 18px var(--green-dim); }
.mod-card[data-color="purple"]::before { box-shadow: 0 0 36px 8px var(--purple-dim), inset 0 0 18px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 36px 8px var(--blue-dim), inset 0 0 18px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 36px 8px var(--orange-dim), inset 0 0 18px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

/* shimmer sweep */
.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(100,116,155,0.22); transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.05; }
.mod-card.active { border-color: rgba(255,255,255,0.1); }

/* card internals */
.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; position: relative; z-index: 3; }
.mc-icon { font-size: 14px; flex-shrink: 0; }
.mc-name { font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(59,130,246,0.2); } }

.mc-metrics { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

/* sparkline container */
.mc-sparkline-wrap {
  display: flex; align-items: center; margin-left: auto;
  position: relative; z-index: 3;
}
.mc-sparkline {
  width: 60px; height: 16px; flex-shrink: 0;
}
.mc-sparkline polyline {
  fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round;
}
.mc-sparkline .spark-area {
  stroke: none; opacity: 0.15;
}

/* 3px progress bar at bottom of card */
.mc-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; margin-top: 4px; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="green"] .mc-bar-fill { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 6px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 6px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 6px var(--orange-deep); }

/* ================================================================
   TREE AREA (4 columns, one per module)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; position: relative; min-height: 100px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.08s; }
.tree-col:nth-child(3) { animation-delay: 0.16s; }
.tree-col:nth-child(4) { animation-delay: 0.24s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* tree vertical trunk line */
.tree-trunk {
  position: relative; padding-left: 22px;
  display: flex; flex-direction: column; gap: 3px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 9px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 18px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="green"]::before { background: rgba(52,211,153,0.18); }
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.18); }

/* glow active branch */
.tree-trunk.glow-trunk[data-color="green"]::before {
  background: rgba(52,211,153,0.45); box-shadow: 0 0 6px rgba(52,211,153,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.45); box-shadow: 0 0 6px rgba(167,139,250,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.45); box-shadow: 0 0 6px rgba(59,130,246,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.45); box-shadow: 0 0 6px rgba(245,158,11,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ================================================================
   SUB-MODULE CARDS (48px rows with badge pills + progress bars)
   ================================================================ */
.sub-card {
  height: 48px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px; position: relative; border-radius: var(--radius-xs);
  background: var(--surface); border: 1px solid transparent;
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* horizontal branch connector from trunk (L-shape horizontal segment) */
.sub-card::before {
  content: ''; position: absolute; left: -13px; top: 50%;
  width: 13px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="green"] .sub-card::before { background: rgba(52,211,153,0.18); }
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.18); }

/* done state */
.sub-card.done-sub { background: rgba(255,255,255,0.015); }

/* active state */
.sub-card.active-sub { border-color: rgba(255,255,255,0.06); }
.sub-card.active-sub[data-pcolor="green"] {
  background: rgba(52,211,153,0.06); border-color: rgba(52,211,153,0.18);
  box-shadow: 0 0 18px rgba(52,211,153,0.08), 0 2px 8px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.06); border-color: rgba(167,139,250,0.18);
  box-shadow: 0 0 18px rgba(167,139,250,0.08), 0 2px 8px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.18);
  box-shadow: 0 0 18px rgba(59,130,246,0.08), 0 2px 8px rgba(0,0,0,0.2);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.18);
  box-shadow: 0 0 18px rgba(245,158,11,0.08), 0 2px 8px rgba(0,0,0,0.2);
}

/* shimmer overlay for active subs */
.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.025) 46%, rgba(255,255,255,0.06) 50%,
    rgba(255,255,255,0.025) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* glow pulse */
.sub-card-glow {
  position: absolute; inset: -1px; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  animation: subGlowPulse 2.5s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-glow { opacity: 1; }
.sub-card.active-sub[data-pcolor="green"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(52,211,153,0.05); }
.sub-card.active-sub[data-pcolor="purple"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(167,139,250,0.05); }
.sub-card.active-sub[data-pcolor="blue"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(59,130,246,0.05); }
.sub-card.active-sub[data-pcolor="orange"] .sub-card-glow { box-shadow: inset 0 0 16px rgba(245,158,11,0.05); }
@keyframes subGlowPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* pending state */
.sub-card.pending-sub { background: rgba(255,255,255,0.008); opacity: 0.5; }
.sub-card.pending-sub.visible { opacity: 0.5; }

/* left accent stripe */
.sub-card::after {
  content: ''; position: absolute; left: 0; top: 7px; bottom: 7px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub::after { opacity: 1; }
.sub-card.done-sub::after { opacity: 0.3; }
.sub-card[data-pcolor="green"]::after { background: var(--green); }
.sub-card[data-pcolor="purple"]::after { background: var(--purple); }
.sub-card[data-pcolor="blue"]::after { background: var(--blue); }
.sub-card[data-pcolor="orange"]::after { background: var(--orange); }

/* sub-card hover */
.sub-card:not(.pending-sub):hover { transform: translateY(-1px); background: rgba(255,255,255,0.03); }

/* sub-card internals */
.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] { background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.5); }
.sub-dot.running[data-pcolor="purple"] { background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.5); }
.sub-dot.running[data-pcolor="green"] { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.5); }
.sub-dot.running[data-pcolor="orange"] { background: var(--orange); box-shadow: 0 0 8px rgba(245,158,11,0.5); }
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

/* CSS spinner for running items */
.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(59,130,246,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin { border-color: rgba(167,139,250,0.15); border-top-color: var(--purple); }
.sub-spinner.green-spin { border-color: rgba(52,211,153,0.15); border-top-color: var(--green); }
.sub-spinner.orange-spin { border-color: rgba(245,158,11,0.15); border-top-color: var(--orange); }
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 11.5px; color: var(--text-300); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sub-card.active-sub .sub-label { color: var(--text-100); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-300); }

.sub-meta {
  font-size: 10px; font-weight: 600;
  color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

/* STATUS BADGE PILLS on sub-cards */
.sub-badge-pill {
  font-size: 8px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-left: 4px;
  white-space: nowrap;
}
.sub-badge-pill.done { background: var(--green-dim); color: var(--green); }
.sub-badge-pill.running { background: var(--blue-dim); color: var(--blue); animation: pillShimmer 2s ease-in-out infinite; }
.sub-badge-pill.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }
@keyframes pillShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

/* 3px PROGRESS BAR on sub rows */
.sub-progress {
  position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.03); overflow: hidden;
  border-radius: 0 0 var(--radius-xs) var(--radius-xs);
}
.sub-progress-fill {
  height: 100%; border-radius: 0 0 var(--radius-xs) var(--radius-xs);
  width: 0; transition: width 0.8s ease;
}
.sub-card[data-pcolor="green"] .sub-progress-fill { background: var(--green); box-shadow: 0 0 4px var(--green-glow); }
.sub-card[data-pcolor="purple"] .sub-progress-fill { background: var(--purple); box-shadow: 0 0 4px var(--purple-deep); }
.sub-card[data-pcolor="blue"] .sub-progress-fill { background: var(--blue); box-shadow: 0 0 4px var(--blue-deep); }
.sub-card[data-pcolor="orange"] .sub-progress-fill { background: var(--orange); box-shadow: 0 0 4px var(--orange-deep); }

/* collapsed tree toggle */
.tree-col .collapse-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-400); cursor: pointer;
  padding: 2px 0 6px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {

/* ================================================================

.dashboard-panel {

}
@keyframes dashSlide {

.dashboard-inner .glass-shine {

.dash-section-title {

      { id: 'build_repo', label: 'Build Repo', status: 'pending', meta: '--', progress: 0, duration: '--' },

/* ================================================================
   STATE
   ================================================================ */
let activeModuleIdx = 2;  // invention is active
let selectedSub = null;   // { mi, si } when dashboard is open
let subCardElements = []; // [mi][si] -> DOM element
let modCardElements = []; // [mi] -> DOM card element

/* ================================================================
   SPARKLINE GENERATOR (SVG 60x16)
   ================================================================ */
function genSparklineSVG(data, color) {
  if (!data || data.length < 2) return '';
  const w = 60, h = 16, pad = 1;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = pad + (i / (data.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const polyline = pts.join(' ');
  // area fill: same points but close at bottom
  const areaPoints = polyline + ` ${(w - pad).toFixed(1)},${h} ${pad},${h}`;
  const cssColor = `var(--${color})`;
  return `<svg class="mc-sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon class="spark-area" points="${areaPoints}" fill="${cssColor}"/>
    <polyline points="${polyline}" stroke="${cssColor}"/>
  </svg>`;
}

/* ================================================================
   COLOR HELPERS
   ================================================================ */
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue('--' + name).trim();
}

function statusLabel(s) {
  return s === 'done' ? 'Done' : s === 'running' ? 'Running' : 'Pending';
}

/* ================================================================
   BUILD MODULE CARDS
   ================================================================ */
function renderModuleCards() {
  const container = document.getElementById('moduleCards');
  container.innerHTML = '';
  modCardElements = [];

  MODULES.forEach((mod, mi) => {
    const card = document.createElement('div');
    card.className = 'mod-card' + (mi === activeModuleIdx ? ' active' : '');
    card.dataset.color = mod.color;
    card.dataset.module = mi;
    card.dataset.status = mod.status;

    const badgeClass = mod.status;
    const metricColor = mod.status === 'pending' ? 'var(--text-400)' : `var(--${mod.color})`;
    const sparkSVG = genSparklineSVG(mod.sparkline, mod.color);

    card.innerHTML = `
      <div class="glass-shine"></div>
      <div class="glow-halo"></div>
      <div class="card-shimmer"></div>
      <div class="mc-top">
        <span class="mc-icon">${mod.icon}</span>
        <span class="mc-name">${mod.label}</span>
        <span class="mc-badge ${badgeClass}">${statusLabel(mod.status)}</span>
      </div>
      <div class="mc-metrics">
        <span class="mc-metric-label">${mod.metric.label}</span>
        <span class="mc-metric-value" style="color:${metricColor}">${mod.metric.value}</span>
        <div class="mc-sparkline-wrap">${sparkSVG}</div>
      </div>
      <div class="mc-bar"><div class="mc-bar-fill" data-pct="${mod.progress}"></div></div>
    `;

    card.addEventListener('click', () => onModuleClick(mi));
    container.appendChild(card);
    modCardElements.push(card);
  });

  // animate progress bars
  requestAnimationFrame(() => {
    container.querySelectorAll('.mc-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  });
}

/* ================================================================
   BUILD TREE AREA
   ================================================================ */
function renderTrees() {
  const treeArea = document.getElementById('treeArea');
  treeArea.innerHTML = '';
  subCardElements = [];

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col';
    col.dataset.module = mi;
    subCardElements[mi] = [];

    // collapse toggle
    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    // trunk
    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      // shimmer + glow overlays
      let inner = '<div class="sub-card-shimmer"></div><div class="sub-card-glow"></div>';

      // status indicator
      if (sub.status === 'done') {
        inner += `<span style="font-size:11px; color:var(--green); flex-shrink:0;">\u2713</span>`;
      } else if (sub.status === 'running') {
        const spinClass = mod.color === 'purple' ? 'purple-spin' :
                          mod.color === 'green' ? 'green-spin' :
                          mod.color === 'orange' ? 'orange-spin' : '';
        inner += `<div class="sub-spinner ${spinClass}"></div>`;
      } else {
        inner += `<div class="sub-dot pending"></div>`;
      }

      // label
      inner += `<span class="sub-label">${sub.label}</span>`;

      // meta
      if (sub.meta && sub.meta !== '--') {
        inner += `<span class="sub-meta">${sub.meta}</span>`;
      }

      // status badge pill
      inner += `<span class="sub-badge-pill ${sub.status}">${statusLabel(sub.status)}</span>`;

      // 3px progress bar
      inner += `<div class="sub-progress"><div class="sub-progress-fill" data-pct="${sub.progress}"></div></div>`;

      card.innerHTML = inner;

      card.addEventListener('click', (e) => {
        e.stopPropagation();
        onSubClick(mi, si);
      });

      trunk.appendChild(card);
      subCardElements[mi].push(card);
    });

    // collapsed bar
    const bar = document.createElement('div');
    bar.className = 'tree-collapsed-bar';
    const doneCount = mod.subs.filter(s => s.status === 'done').length;
    bar.innerHTML = `<span style="font-size:11px; color:var(--green);">\u2713</span> ${doneCount}/${mod.subs.length} complete`;
    bar.addEventListener('click', () => col.classList.toggle('collapsed'));

    col.appendChild(trunk);
    col.appendChild(bar);
    treeArea.appendChild(col);
  });

  // stagger entrance
  MODULES.forEach((mod, mi) => {
    subCardElements[mi].forEach((el, si) => {
      setTimeout(() => el.classList.add('visible'), 100 + mi * 80 + si * 50);
    });
  });

  // animate sub progress bars
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.sub-progress-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });
  });

  // compute trunk heights
  requestAnimationFrame(() => {
    requestAnimationFrame(computeTrunkHeights);
  });
}

function computeTrunkHeights() {
  document.querySelectorAll('.tree-trunk').forEach(trunk => {
    const cards = trunk.querySelectorAll('.sub-card');
    if (cards.length === 0) return;
    const lastCard = cards[cards.length - 1];
    const trunkRect = trunk.getBoundingClientRect();
    const lastRect = lastCard.getBoundingClientRect();
    const h = (lastRect.top + lastRect.height / 2) - trunkRect.top;
    trunk.style.setProperty('--trunk-h', h + 'px');
  });
}

/* ================================================================
   MODULE CLICK HANDLER
   ================================================================ */
function onModuleClick(mi) {
  if (mi === activeModuleIdx) return;
  activeModuleIdx = mi;
  modCardElements.forEach((c, i) => c.classList.toggle('active', i === mi));

  // re-animate subs for clicked module
  subCardElements[mi].forEach((el, si) => {
    el.classList.remove('visible');
    setTimeout(() => el.classList.add('visible'), 50 + si * 50);
  });

  // close dashboard if open
  closeDashboard();

  // update breadcrumb
  document.getElementById('breadcrumb').textContent = MODULES[mi].label;

  // restart tree particles
  treeParticles = [];
}

/* ================================================================
   SUB-MODULE CLICK -> OPEN DASHBOARD
   ================================================================ */
function onSubClick(mi, si) {
  // highlight selected sub
  document.querySelectorAll('.sub-card').forEach(c => c.classList.remove('selected-sub'));
  const card = subCardElements[mi][si];
  card.classList.add('selected-sub');

  selectedSub = { mi, si };
  openDashboard(mi, si);
}

function openDashboard(mi, si) {
  const mod = MODULES[mi];
  const sub = mod.subs[si];
  const panel = document.getElementById('dashboardPanel');
  const inner = document.getElementById('dashboardInner');
  const left = document.getElementById('dashLeft');
  const right = document.getElementById('dashRight');
  const colorVar = `var(--${mod.color})`;

  // LEFT: summary + items
  let leftHTML = `
    <div class="dash-section-title">
      <span style="color:${colorVar}">\u25CF</span>
      ${mod.label} / ${sub.label}
    </div>
    <div class="dash-summary" style="border-left-color:${colorVar}">
      ${mod.summary}
    </div>
  `;

  // items list if present
  if (sub.items && sub.items.length > 0) {
    leftHTML += '<ul class="dash-item-list">';
    sub.items.forEach(item => {
      const dotColor = item.status === 'done' ? 'var(--green)' :
                       item.status === 'running' ? 'var(--blue)' : 'var(--text-500)';
      const runClass = item.status === 'running' ? ' style="color:var(--text-100);font-weight:500"' : '';
      leftHTML += `
        <li class="dash-item">
          <span class="dash-item-dot" style="background:${dotColor}"></span>
          <span${runClass}>${item.label}</span>
          <span style="margin-left:auto;font-size:10px;color:var(--text-400)">${item.time}</span>
        </li>
      `;
    });
    leftHTML += '</ul>';
  }
  left.innerHTML = leftHTML;

  // RIGHT: stats + feed
  right.innerHTML = `
    <div class="dash-stat-grid">
      <div class="dash-stat-card">
        <div class="dash-stat-val" style="color:${colorVar}">${mod.duration}</div>
        <div class="dash-stat-label">Duration</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-val" style="color:${colorVar}">${mod.cost}</div>
        <div class="dash-stat-label">Cost</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-val">${mod.messages}</div>
        <div class="dash-stat-label">Messages</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-stat-val">${sub.duration || '--'}</div>
        <div class="dash-stat-label">Step Duration</div>
      </div>
    </div>
    <div class="dash-feed-header">
      <span class="dash-feed-title">Activity</span>
      ${mod.status === 'running' ? '<span class="mini-live-badge">LIVE</span>' : ''}
    </div>
    <div class="dash-feed" id="dashFeed">
      ${mod.log.map(l => `
        <div class="feed-entry">
          <span class="feed-time">${l.time}</span>
          <span class="feed-pip" style="background:var(--${l.color})"></span>
          <span class="feed-msg">${l.text}</span>
        </div>
      `).join('')}
    </div>
  `;

  panel.classList.add('open');
  startFeedRotation(mi);
}

function closeDashboard() {
  document.getElementById('dashboardPanel').classList.remove('open');
  document.querySelectorAll('.sub-card').forEach(c => c.classList.remove('selected-sub'));
  selectedSub = null;
  if (feedTimer) clearInterval(feedTimer);
}

document.getElementById('dashClose').addEventListener('click', closeDashboard);

/* ================================================================
   LIVE FEED ROTATION
   ================================================================ */
let feedTimer = null;

const EXTRA_LOGS = [
  { time: '16:31', text: 'Token count: 14,282 in / 3,841 out', color: 'text-400' },
  { time: '16:30', text: 'gumbel_gates.py \u2014 writing forward() method', color: 'blue' },
  { time: '16:29', text: 'Tool call: file_write search_cell.py', color: 'text-400' },
  { time: '16:28', text: 'Validation: search_cell.py all checks passed', color: 'green' },
  { time: '16:27', text: 'Planning ablation study structure...', color: 'blue' },
  { time: '16:26', text: 'Dataset split: 80/10/10 train/val/test', color: 'green' },
];
let feedIdx = 0;

function startFeedRotation(mi) {
  if (feedTimer) clearInterval(feedTimer);
  if (MODULES[mi].status !== 'running') return;

  feedTimer = setInterval(() => {
    const feed = document.getElementById('dashFeed');
    if (!feed) return;

    const extra = EXTRA_LOGS[feedIdx % EXTRA_LOGS.length];
    feedIdx++;

    const entries = feed.querySelectorAll('.feed-entry');
    if (entries.length >= 4) {
      const last = entries[entries.length - 1];
      last.style.opacity = '0';
      last.style.transform = 'translateX(6px)';
      setTimeout(() => last.remove(), 300);
    }

    const newEntry = document.createElement('div');
    newEntry.className = 'feed-entry';
    newEntry.style.opacity = '0';
    newEntry.style.transform = 'translateX(6px)';
    newEntry.innerHTML = `
      <span class="feed-time">${extra.time}</span>
      <span class="feed-pip" style="background:var(--${extra.color})"></span>
      <span class="feed-msg">${extra.text}</span>
    `;
    feed.insertBefore(newEntry, feed.firstChild);
    requestAnimationFrame(() => {
      newEntry.style.opacity = '1';
      newEntry.style.transform = 'translateX(0)';
      newEntry.style.transition = 'opacity 0.3s, transform 0.3s';
    });
  }, 4000);
}

/* ================================================================
   AMBIENT PARTICLES (background floating)
   ================================================================ */
const ambientParticles = [];
let ambientCanvas, ambientCtx;

function initAmbient() {
  ambientCanvas = document.getElementById('particlesCanvas');
  ambientCtx = ambientCanvas.getContext('2d');
  resizeAmbient();
  window.addEventListener('resize', resizeAmbient);

  for (let i = 0; i < 40; i++) {
    ambientParticles.push({
      x: Math.random() * ambientCanvas.width,
      y: Math.random() * ambientCanvas.height,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      size: 1 + Math.random() * 1.5,
      alpha: 0.1 + Math.random() * 0.2,
      color: ['#a78bfa', '#3b82f6', '#34d399', '#f59e0b'][Math.floor(Math.random() * 4)]
    });
  }
}

function resizeAmbient() {
  ambientCanvas.width = window.innerWidth;
  ambientCanvas.height = window.innerHeight;
}

/* ================================================================
   L-SHAPED TREE DOT ANIMATION (CORRECT implementation)

   The dot travels an L-shaped path:
   1. Start at the bottom-center of the module card
   2. Travel vertically DOWN along the trunk line
   3. At the branch point (Y center of target sub), turn RIGHT
   4. Travel horizontally to the sub-card
   5. Burst effect on arrival
   ================================================================ */
let treeParticles = [];
let burstParticles = [];

function findRunningSubIdx(mi) {
  const mod = MODULES[mi];
  for (let i = 0; i < mod.subs.length; i++) {
    if (mod.subs[i].status === 'running') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  // Spawn for any module that has running subs
  MODULES.forEach((mod, mi) => {
    if (mod.status !== 'running') return;
    const si = findRunningSubIdx(mi);
    if (si < 0) return;

    const modCard = modCardElements[mi];
    const subCard = subCardElements[mi][si];
    if (!modCard || !subCard) return;

    const trunk = subCard.closest('.tree-trunk');
    if (!trunk) return;

    const cardRect = modCard.getBoundingClientRect();
    const trunkRect = trunk.getBoundingClientRect();
    const subRect = subCard.getBoundingClientRect();

    // The vertical trunk line is at left:9px inside the trunk element
    const trunkX = trunkRect.left + 9;

    // Start: bottom-center of module card
    const startX = cardRect.left + cardRect.width / 2;
    const startY = cardRect.bottom;

    // Point where trunk line begins (just below where we enter)
    const trunkTopY = trunkRect.top;

    // Branch point: Y center of the target sub-card
    const branchY = subRect.top + subRect.height / 2;

    // End: left edge of sub-card
    const endX = subRect.left;
    const endY = branchY;

    // L-shaped waypoints:
    // 1) Start at card bottom center
    // 2) Arrive at trunk X (horizontal move to align with trunk)
    // 3) Travel DOWN the trunk to branch Y (the L's vertical segment)
    // 4) Turn RIGHT and travel to sub-card (the L's horizontal segment)
    const waypoints = [
      { x: startX, y: startY },
      { x: trunkX, y: trunkTopY },      // top of trunk line
      { x: trunkX, y: branchY },         // down to branch point (vertical part of L)
      { x: endX,   y: endY }             // right to sub-card (horizontal part of L)
    ];

    const color = cssVar(mod.color);

    treeParticles.push({
      waypoints,
      wpIdx: 0,
      x: waypoints[0].x,
      y: waypoints[0].y,
      speed: 120,
      color,
      size: 3,
      alpha: 0.9,
      trail: []
    });
  });
}

function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.3;
    const speed = 30 + Math.random() * 50;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.5 + Math.random() * 0.5,
      color,
      size: 2
    });
  }
}

/* ================================================================
   MAIN ANIMATION LOOP
   ================================================================ */
let lastTime = 0;
let treeSpawnTimer = 0;
let animFrame;

function animate(now) {
  animFrame = requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  ambientCtx.clearRect(0, 0, ambientCanvas.width, ambientCanvas.height);

  // -- Ambient particles --
  for (const p of ambientParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < 0 || p.x > ambientCanvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > ambientCanvas.height) p.vy *= -1;

    ambientCtx.globalAlpha = p.alpha;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();
  }

  // -- Tree particle spawning --
  treeSpawnTimer += dt;
  if (treeSpawnTimer > 0.7) {
    treeSpawnTimer = 0;
    spawnTreeParticle();
  }

  // -- Draw tree particles (L-shaped path) --
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const nextWP = p.waypoints[p.wpIdx + 1];
    if (!nextWP) {
      // reached final waypoint -> burst
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }

    const dx = nextWP.x - p.x;
    const dy = nextWP.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 3) {
      p.x = nextWP.x;
      p.y = nextWP.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();

    // draw trail segments with fading opacity
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        ambientCtx.globalAlpha = ratio * p.alpha * 0.4;
        ambientCtx.beginPath();
        ambientCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        ambientCtx.lineTo(p.trail[t].x, p.trail[t].y);
        ambientCtx.strokeStyle = p.color;
        ambientCtx.lineWidth = p.size * 0.5 * ratio;
        ambientCtx.stroke();
      }
    }

    // head glow
    ambientCtx.globalAlpha = p.alpha * 0.25;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();

    // head dot
    ambientCtx.globalAlpha = p.alpha;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();
  }

  // -- Draw burst particles --
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.94;
    p.vy *= 0.94;

    ambientCtx.globalAlpha = p.life * 0.8;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();

    // glow ring
    ambientCtx.globalAlpha = p.life * 0.3;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size * 3 * p.life, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();
  }

  ambientCtx.globalAlpha = 1;

  // -- Draw static connector lines between module cards --
  drawConnectors();
}

function drawConnectors() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = modCardElements[i];
    const toCard = modCardElements[i + 1];
    if (!fromCard || !toCard) continue;
    if (MODULES[i].status === 'pending') continue;

    const fromRect = fromCard.getBoundingClientRect();
    const toRect = toCard.getBoundingClientRect();
    const y = fromRect.top + fromRect.height / 2;

    const toPending = MODULES[i + 1].status === 'pending';
    ambientCtx.beginPath();
    ambientCtx.moveTo(fromRect.right + 2, y);
    ambientCtx.lineTo(toRect.left - 2, y);
    ambientCtx.strokeStyle = '#2e3440';
    ambientCtx.lineWidth = 1;
    ambientCtx.globalAlpha = toPending ? 0.3 : 0.6;
    ambientCtx.setLineDash(toPending ? [4, 4] : []);
    ambientCtx.stroke();
    ambientCtx.setLineDash([]);
    ambientCtx.globalAlpha = 1;
  }

  // Also draw connector particles between done->running modules
  drawConnectorParticles();
}

/* ================================================================
   CONNECTOR PARTICLES (between module cards)
   ================================================================ */
let connectorParticles = [];
let connSpawnTimer = 0;

function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];
    if (fromMod.status === 'pending' || toMod.status === 'pending') continue;

    const fromCard = modCardElements[i];
    const toCard = modCardElements[i + 1];
    if (!fromCard || !toCard) continue;

    const fromRect = fromCard.getBoundingClientRect();
    const toRect = toCard.getBoundingClientRect();
    const y = fromRect.top + fromRect.height / 2;

    const color = cssVar(fromMod.color);
    const speed = fromMod.status === 'done' ? (40 + Math.random() * 20) : (60 + Math.random() * 30);

    connectorParticles.push({
      x: fromRect.right,
      y: y + (Math.random() - 0.5) * 4,
      targetX: toRect.left,
      speed,
      color,
      size: 2.5,
      alpha: 0.6,
      trail: []
    });
  }
}

function drawConnectorParticles() {
  const dt = 0.016; // approximate

  connSpawnTimer += dt;
  if (connSpawnTimer > 1.0) {
    connSpawnTimer = 0;
    spawnConnectorParticle();
  }

  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 10) p.trail.shift();

    // trail
    if (p.trail.length > 1) {
      ambientCtx.beginPath();
      ambientCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        ambientCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      ambientCtx.strokeStyle = p.color;
      ambientCtx.globalAlpha = p.alpha * 0.3;
      ambientCtx.lineWidth = p.size * 0.6;
      ambientCtx.stroke();
    }

    // head
    ambientCtx.globalAlpha = p.alpha;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();

    // glow
    ambientCtx.globalAlpha = p.alpha * 0.3;
    ambientCtx.beginPath();
    ambientCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    ambientCtx.fillStyle = p.color;
    ambientCtx.fill();

    ambientCtx.globalAlpha = 1;

    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }
}

/* ================================================================
   HEADER TIMER TICK
   ================================================================ */
let timerSeconds = 3 * 3600 + 12 * 60 + 47;

function tickTimer() {
  timerSeconds++;
  const h = Math.floor(timerSeconds / 3600);
  const m = Math.floor((timerSeconds % 3600) / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

/* ================================================================
   COST TICKER
   ================================================================ */
let costCents = 1482;

function tickCost() {
  costCents += Math.floor(Math.random() * 3);
  document.getElementById('costDisplay').textContent = '$' + (costCents / 100).toFixed(2);
}

/* ================================================================
   RESIZE HANDLER
   ================================================================ */
function onResize() {
  resizeAmbient();
  computeTrunkHeights();
  treeParticles = [];
  connectorParticles = [];
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  renderModuleCards();
  renderTrees();
  initAmbient();

  window.addEventListener('resize', onResize);
  setInterval(tickTimer, 1000);
  setInterval(tickCost, 3000);

  lastTime = performance.now();
  animFrame = requestAnimationFrame(animate);

  // auto-open dashboard for the running sub
  const runSi = findRunningSubIdx(activeModuleIdx);
  if (runSi >= 0) {
    setTimeout(() => onSubClick(activeModuleIdx, runSi), 600);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
