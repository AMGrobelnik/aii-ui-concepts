<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary Box</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: linear-gradient(135deg, #f8f4ef 0%, #eee8e0 30%, #e8e0f0 60%, #dde8f8 100%);
  --surface-card: rgba(255,253,250,.7);
  --border: rgba(0,0,0,.06);
  --border-hi: rgba(0,0,0,.1);
  --text: #1a1a2e;
  --text-dim: #4a4a5a;
  --text-muted: #6b7280;
  --text-faint: #9ca3af;

  --purple: #7c5cfc; --purple-dim: rgba(124,92,252,.1);
  --blue: #3b82f6;   --blue-dim: rgba(59,130,246,.1);
  --orange: #f59e0b; --orange-dim: rgba(245,158,11,.1);
  --green: #10b981;  --green-dim: rgba(16,185,129,.1);
  --red: #ef4444;    --red-dim: rgba(239,68,68,.1);
  --cyan: #06b6d4;   --cyan-dim: rgba(6,182,212,.1);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}

/* ===== SUMMARY CONTAINER ===== */
.summary-container {
  width: 420px;
  background: var(--surface-card);
  backdrop-filter: blur(16px) saturate(1.2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px 16px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.summary-container::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(59,130,246,.15), transparent);
}

/* ===== PROGRESS BAR — thick, shimmer + edge pulse ===== */
.progress-bar {
  height: 4px; background: rgba(0,0,0,.06);
  border-radius: 3px; overflow: hidden; margin-bottom: 14px;
  position: relative;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  position: relative; overflow: hidden;
  transition: width .6s;
}
.progress-fill::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), rgba(255,255,255,.7), rgba(255,255,255,.5), transparent);
  animation: shimmer 2.5s ease-in-out infinite;
}
@keyframes shimmer { 0%{left:-100%} 60%{left:180%} 100%{left:180%} }
.progress-fill::before {
  content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  animation: edgePulse 1.5s ease-in-out infinite;
}
@keyframes edgePulse { 0%,100%{opacity:.4;transform:translateY(-50%) scale(.8)} 50%{opacity:1;transform:translateY(-50%) scale(1.2)} }

/* ===== SUMMARY TEXT ===== */
.summary-text {
  font-size: 13px; color: var(--text-dim); line-height: 1.65;
  font-style: italic; margin-bottom: 14px;
}

/* ===== TODO LIST ===== */
.todo-list { display: flex; flex-direction: column; gap: 2px; }
.todo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; font-size: 12px;
}
.todo-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.todo-dot.done { background: var(--green); opacity: .8; }
.todo-dot.run  { background: var(--blue); animation: dotPulse 2s ease-in-out infinite; }
.todo-dot.up   { background: transparent; border: 1.5px solid var(--text-faint); opacity: .5; }
@keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
.todo-text { flex: 1; }
.todo-text.done { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(0,0,0,.15); }
.todo-text.run  { color: var(--text); }
.todo-text.up   { color: var(--text-muted); }

/* ===== DOT PROGRESS ===== */
.dot-progress { display: flex; gap: 3px; margin-top: 12px; }
.dot-progress .dot {
  width: 10px; height: 10px; border-radius: 50%;
  transition: all .3s;
}
</style>
</head>
<body>

<div class="summary-container" id="box"></div>

<script>
/* ── Config: pass module color to style the bar ── */
const MODULE_COLOR = '#3b82f6';
const MODULE_FADE = 'rgba(59,130,246,.35)';

/* ── Demo data (real from pipeline) ── */
const SUMMARY = "I'm running ablation studies on hypotheses 4-6 while main experiments continue for hypothesis 7's nano-scale thermal transport model with gradient checkpointing.";

const TODOS = [
  { status: 'done', text: 'Build knowledge graph (14.3k triples)' },
  { status: 'done', text: 'Identify research gaps (23 found)' },
  { status: 'done', text: 'Generate and rank seed hypotheses' },
  { status: 'run',  text: 'Run simulations for hypotheses 4-7' },
  { status: 'run',  text: 'Ablation studies on completed sims' },
  { status: 'up',   text: 'Analyze results and effect sizes' },
  { status: 'up',   text: 'Draft paper text with citations' },
];

/* ── Render ── */
const done = TODOS.filter(t => t.status === 'done').length;
const run = TODOS.filter(t => t.status === 'run').length;
const pct = Math.round((done + run * 0.5) / TODOS.length * 100);

const box = document.getElementById('box');
box.innerHTML =
  `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${MODULE_COLOR},${MODULE_FADE})"></div></div>` +
  `<div class="summary-text">${SUMMARY}</div>` +
  `<div class="todo-list">${TODOS.map(t =>
    `<div class="todo-item"><div class="todo-dot ${t.status}"></div><span class="todo-text ${t.status}">${t.text}</span></div>`
  ).join('')}</div>` +
  `<div class="dot-progress">${TODOS.map(t => {
    const c = t.status === 'done' ? 'var(--green)' : t.status === 'run' ? 'var(--blue)' : 'rgba(0,0,0,.08)';
    return `<span class="dot" style="background:${c}"></span>`;
  }).join('')}</div>`;
</script>
</body>
</html>
