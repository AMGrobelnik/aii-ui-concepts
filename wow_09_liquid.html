<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Liquid Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #06060f;
    --glass-border: rgba(255,255,255,0.08);
    --glass-bg: rgba(255,255,255,0.03);
    --text: #e0e0e8;
    --text-dim: #6a6a80;
    --seed-color: #2ecc71;
    --seed-dark: #145a30;
    --hypo-color: #a855f7;
    --hypo-dark: #4a1d7a;
    --inv-color: #3b82f6;
    --inv-dark: #1a3a6e;
    --paper-color: #f59e0b;
    --paper-dark: #6b4106;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Top bar ── */
  .top-bar {
    width: 100%;
    padding: 18px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(6,6,15,0.85);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .top-bar .brand {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    color: #fff;
  }
  .top-bar .brand span { color: var(--inv-color); }
  .top-bar .meta {
    display: flex;
    gap: 28px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
  }
  .top-bar .meta strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ── Main stage ── */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 40px 20px 20px;
    position: relative;
  }

  /* ── Ambient glow behind vessels ── */
  .glow {
    position: absolute;
    width: 220px;
    height: 320px;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Pipe connections ── */
  .pipe-wrap {
    display: flex;
    align-items: center;
    width: 90px;
    height: 28px;
    position: relative;
    z-index: 2;
    margin: 0 -6px;
    align-self: center;
    margin-top: -60px;
  }
  .pipe {
    width: 100%;
    height: 14px;
    border-radius: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .pipe-liquid {
    position: absolute;
    inset: 2px;
    border-radius: 5px;
    background: linear-gradient(90deg, var(--from), var(--to));
    opacity: 0;
    transition: opacity 0.5s;
  }
  .pipe-wrap.filled .pipe-liquid { opacity: 0.7; }
  .pipe-wrap.filled .pipe-liquid::after {
    content: '';
    position: absolute;
    top: 1px;
    left: -30px;
    width: 30px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.45);
    animation: pipe-flow 2s linear infinite;
  }
  @keyframes pipe-flow {
    to { left: calc(100% + 30px); }
  }

  /* Traveling particles in pipes */
  .pipe-particle {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
  }
  .pipe-wrap.filled .pipe-particle {
    animation: particle-travel 1.8s linear infinite;
    opacity: 0.9;
  }
  @keyframes particle-travel {
    0%   { left: -5px; opacity: 0; }
    10%  { opacity: 0.9; }
    90%  { opacity: 0.9; }
    100% { left: calc(100% + 5px); opacity: 0; }
  }

  /* ── Vessel column ── */
  .vessel-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 3;
    position: relative;
  }

  /* ── Glass vessel ── */
  .vessel {
    width: 160px;
    height: 400px;
    border-radius: 32px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease;
    /* glass border */
    border: 1.5px solid var(--glass-border);
    background: var(--glass-bg);
    backdrop-filter: blur(4px);
  }
  .vessel:hover { transform: scale(1.03); }

  /* Glass reflection lines */
  .vessel::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 12px;
    width: 2px;
    height: calc(100% - 16px);
    border-radius: 1px;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.06) 100%);
    z-index: 8;
    pointer-events: none;
  }
  .vessel::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 18px;
    width: 1px;
    height: calc(100% - 16px);
    border-radius: 1px;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 40%, rgba(255,255,255,0.03) 100%);
    z-index: 8;
    pointer-events: none;
  }

  /* ── Liquid fill (SVG positioned inside vessel) ── */
  .liquid-container {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    overflow: hidden;
    border-radius: 0 0 30px 30px;
    z-index: 1;
  }
  .liquid-container svg {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── Liquid surface highlight ── */
  .surface-highlight {
    position: absolute;
    left: 10%;
    width: 80%;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.25);
    filter: blur(2px);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .vessel-col[data-status="done"] .surface-highlight,
  .vessel-col[data-status="active"] .surface-highlight { opacity: 1; }

  /* ── Bubbles layer ── */
  .bubbles {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 4;
    overflow: hidden;
    border-radius: 0 0 30px 30px;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.35), rgba(255,255,255,0.06));
    opacity: 0;
  }

  /* ── Floating sub-labels inside liquid ── */
  .sub-labels {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 6;
    pointer-events: none;
    overflow: hidden;
    border-radius: 0 0 30px 30px;
  }
  .sub-label {
    position: absolute;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    animation: float-label 8s ease-in-out infinite alternate;
  }
  @keyframes float-label {
    0%   { transform: translateY(0) translateX(0); }
    50%  { transform: translateY(-8px) translateX(3px); }
    100% { transform: translateY(2px) translateX(-2px); }
  }

  /* ── Vessel label below ── */
  .vessel-label {
    text-align: center;
  }
  .vessel-label .name {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.4px;
  }
  .vessel-label .status {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .vessel-col[data-status="active"] .vessel-label .status {
    color: var(--inv-color);
  }

  /* ── Hover tooltip ── */
  .tooltip {
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    width: 220px;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(18,18,35,0.88);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 20;
  }
  .tooltip .tip-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
  }
  .vessel-col:hover .tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Status badges ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-top: 4px;
  }
  .badge.done    { background: rgba(46,204,113,0.15); color: var(--seed-color); }
  .badge.active  { background: rgba(59,130,246,0.15); color: var(--inv-color); }
  .badge.pending { background: rgba(255,255,255,0.05); color: var(--text-dim); }

  /* ── Pulsing ring on active vessel ── */
  .pulse-ring {
    position: absolute;
    inset: -6px;
    border-radius: 38px;
    border: 2px solid var(--inv-color);
    opacity: 0;
    z-index: 0;
    pointer-events: none;
    animation: pulse 2.5s ease-out infinite;
  }
  @keyframes pulse {
    0%   { opacity: 0.5; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.06); }
  }

  /* ── Bottom info row ── */
  .info-row {
    width: 100%;
    padding: 16px 32px;
    display: flex;
    justify-content: center;
    gap: 40px;
    font-size: 11px;
    color: var(--text-dim);
    border-top: 1px solid var(--glass-border);
    background: rgba(6,6,15,0.7);
  }
  .info-row span strong {
    color: var(--text);
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <div class="brand"><span>AI</span> Inventor</div>
  <div class="meta">
    <span>Run: <strong>quantum-spin-coupling-024</strong></span>
    <span>Elapsed: <strong id="elapsed">01:47:23</strong></span>
    <span>Cost: <strong>$4.82</strong></span>
  </div>
</div>

<!-- Main stage -->
<div class="stage" id="stage">
  <!-- Ambient glows (positioned by JS) -->
  <!-- Vessels + pipes injected by JS -->
</div>

<!-- Bottom info -->
<div class="info-row">
  <span>Pipeline: <strong>v23</strong></span>
  <span>Model: <strong>Claude Opus 4</strong></span>
  <span>Modules completed: <strong>2 / 4</strong></span>
  <span>Current step: <strong>Review Invention #3</strong></span>
</div>

<script>
// ── Configuration ──────────────────────────────────────────────
const VESSELS = [
  {
    id: 'seed',
    name: 'Seed',
    status: 'done',
    fillPct: 1.0,
    color: '#2ecc71',
    colorDark: '#145a30',
    subLabels: ['Literature', 'Knowledge Graph', 'Seed Ideas'],
    tip: 'Scanned 2,400 papers across 3 domains. Extracted 128 seed concepts for hypothesis generation.'
  },
  {
    id: 'hypothesis',
    name: 'Hypothesis',
    status: 'done',
    fillPct: 1.0,
    color: '#a855f7',
    colorDark: '#4a1d7a',
    subLabels: ['Generate', 'Review', 'Rank'],
    tip: 'Generated 40 hypotheses, reviewed for novelty and feasibility, ranked top 5 for invention.'
  },
  {
    id: 'invention',
    name: 'Invention',
    status: 'active',
    fillPct: 0.58,
    color: '#3b82f6',
    colorDark: '#1a3a6e',
    subLabels: ['Strategy', 'Plan', 'Paper Text', 'Review'],
    tip: 'Actively generating invention #3. Strategy and plan complete. Drafting paper text section 4/7.'
  },
  {
    id: 'paper',
    name: 'Paper',
    status: 'pending',
    fillPct: 0.0,
    color: '#f59e0b',
    colorDark: '#6b4106',
    subLabels: ['Artifacts', 'Figures', 'Full PDF'],
    tip: 'Waiting for invention loop to complete. Will generate demo artifacts, visualizations, and final PDF.'
  }
];

const stage = document.getElementById('stage');
let time = 0;

// ── Build DOM ──────────────────────────────────────────────────
function buildStage() {
  VESSELS.forEach((v, i) => {
    // Ambient glow
    const glow = document.createElement('div');
    glow.className = 'glow';
    glow.style.background = v.color;
    glow.style.opacity = v.status === 'pending' ? '0' : '0.18';
    stage.appendChild(glow);

    // Vessel column
    const col = document.createElement('div');
    col.className = 'vessel-col';
    col.dataset.status = v.status;
    col.dataset.idx = i;

    // Tooltip
    const tip = document.createElement('div');
    tip.className = 'tooltip';
    tip.innerHTML = `<div class="tip-title">${v.name} Module</div>` +
      `<div>${v.tip}</div>` +
      `<div class="badge ${v.status}" style="margin-top:8px">${v.status.toUpperCase()}</div>`;
    col.appendChild(tip);

    // Vessel element
    const vessel = document.createElement('div');
    vessel.className = 'vessel';
    vessel.id = `vessel-${v.id}`;

    // Pulse ring for active
    if (v.status === 'active') {
      const ring = document.createElement('div');
      ring.className = 'pulse-ring';
      vessel.appendChild(ring);
    }

    // Liquid container (SVG rendered by JS)
    const liquidCont = document.createElement('div');
    liquidCont.className = 'liquid-container';
    liquidCont.id = `liquid-${v.id}`;
    vessel.appendChild(liquidCont);

    // Bubbles container
    const bubbles = document.createElement('div');
    bubbles.className = 'bubbles';
    bubbles.id = `bubbles-${v.id}`;
    vessel.appendChild(bubbles);

    // Sub labels floating in liquid
    const subCont = document.createElement('div');
    subCont.className = 'sub-labels';
    subCont.id = `sublabels-${v.id}`;
    vessel.appendChild(subCont);

    // Surface highlight
    const hl = document.createElement('div');
    hl.className = 'surface-highlight';
    hl.id = `highlight-${v.id}`;
    vessel.appendChild(hl);

    col.appendChild(vessel);

    // Label
    const label = document.createElement('div');
    label.className = 'vessel-label';
    label.innerHTML = `<div class="name" style="color:${v.status === 'pending' ? 'var(--text-dim)' : v.color}">${v.name}</div>` +
      `<div class="status">${v.status === 'done' ? 'Complete' : v.status === 'active' ? '58% — Generating...' : 'Pending'}</div>`;
    col.appendChild(label);

    stage.appendChild(col);

    // Pipe after vessel (except last)
    if (i < VESSELS.length - 1) {
      const pw = document.createElement('div');
      pw.className = 'pipe-wrap';
      const bothDone = (v.status === 'done') &&
        (VESSELS[i+1].status === 'done' || VESSELS[i+1].status === 'active');
      if (bothDone) pw.classList.add('filled');
      pw.innerHTML = `<div class="pipe"><div class="pipe-liquid" style="--from:${v.color};--to:${VESSELS[i+1].color}"></div></div>`;

      // Particles in pipe
      if (bothDone) {
        for (let p = 0; p < 3; p++) {
          const dot = document.createElement('div');
          dot.className = 'pipe-particle';
          dot.style.background = VESSELS[i+1].color;
          dot.style.animationDelay = `${p * 0.6}s`;
          dot.style.width = `${3 + Math.random()*3}px`;
          dot.style.height = dot.style.width;
          pw.querySelector('.pipe').appendChild(dot);
        }
      }
      stage.appendChild(pw);
    }
  });

  // Position ambient glows
  requestAnimationFrame(() => {
    const cols = stage.querySelectorAll('.vessel-col');
    const glows = stage.querySelectorAll('.glow');
    cols.forEach((col, i) => {
      const rect = col.getBoundingClientRect();
      const stageRect = stage.getBoundingClientRect();
      glows[i].style.left = `${rect.left - stageRect.left + rect.width/2 - 110}px`;
      glows[i].style.top = `${rect.top - stageRect.top + rect.height/2 - 160}px`;
    });
  });
}

// ── Create bubbles ─────────────────────────────────────────────
function spawnBubbles() {
  VESSELS.forEach(v => {
    if (v.status === 'pending') return;
    const cont = document.getElementById(`bubbles-${v.id}`);
    const count = v.status === 'active' ? 18 : 12;
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 3 + Math.random() * 6;
      b.style.width = `${size}px`;
      b.style.height = `${size}px`;
      b.style.left = `${10 + Math.random() * 80}%`;
      b.dataset.baseLeft = 10 + Math.random() * 80;
      b.dataset.size = size;
      b.dataset.speed = v.status === 'active' ? 0.3 + Math.random() * 0.5 : 0.15 + Math.random() * 0.3;
      b.dataset.phase = Math.random() * Math.PI * 2;
      b.dataset.y = Math.random() * 100;
      cont.appendChild(b);
    }
  });
}

// ── Create sub-labels ──────────────────────────────────────────
function createSubLabels() {
  VESSELS.forEach(v => {
    if (v.status === 'pending') return;
    const cont = document.getElementById(`sublabels-${v.id}`);
    v.subLabels.forEach((txt, j) => {
      const el = document.createElement('div');
      el.className = 'sub-label';
      el.textContent = txt;
      el.style.left = `${12 + (j % 2) * 40}px`;
      el.style.bottom = `${15 + j * 22}%`;
      el.style.animationDelay = `${j * 1.5}s`;
      cont.appendChild(el);
    });
  });
}

// ── Render liquid SVG ──────────────────────────────────────────
function renderLiquid(vesselId, fillPct, color, colorDark, t) {
  const cont = document.getElementById(`liquid-${vesselId}`);
  const vesselH = 400;
  const liquidH = vesselH * fillPct;
  cont.style.height = `${liquidH}px`;

  // Update surface highlight position
  const hl = document.getElementById(`highlight-${vesselId}`);
  hl.style.bottom = `${liquidH - 2}px`;

  // Update bubbles container height
  const bc = document.getElementById(`bubbles-${vesselId}`);
  bc.style.height = `${liquidH}px`;

  // Update sub-labels container height
  const sc = document.getElementById(`sublabels-${vesselId}`);
  sc.style.height = `${liquidH}px`;

  // Wave parameters
  const waveH = 12;
  const svgH = liquidH + waveH + 4;
  const w = 160;

  // Build wave paths (3 overlapping sine waves)
  function wavePath(amp, freq, phaseOff, yOff) {
    let d = `M 0 ${waveH + 4 + yOff}`;
    for (let x = 0; x <= w; x += 2) {
      const y = waveH + 4 + yOff -
        amp * Math.sin((x / w) * Math.PI * 2 * freq + t * 1.2 + phaseOff) -
        (amp * 0.5) * Math.sin((x / w) * Math.PI * 2 * (freq * 1.6) + t * 0.8 + phaseOff + 1);
      d += ` L ${x} ${y}`;
    }
    d += ` L ${w} ${svgH} L 0 ${svgH} Z`;
    return d;
  }

  const svg = `<svg viewBox="0 0 ${w} ${svgH}" preserveAspectRatio="none" style="width:100%;height:${svgH}px">
    <defs>
      <linearGradient id="lg-${vesselId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.85"/>
        <stop offset="60%" stop-color="${color}" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="${colorDark}" stop-opacity="0.9"/>
      </linearGradient>
      <linearGradient id="lg2-${vesselId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${colorDark}" stop-opacity="0.3"/>
      </linearGradient>
    </defs>
    <path d="${wavePath(4, 1.5, 0, 0)}" fill="url(#lg2-${vesselId})"/>
    <path d="${wavePath(5, 1, 2, 1)}" fill="url(#lg2-${vesselId})"/>
    <path d="${wavePath(6, 1.2, 0.5, 2)}" fill="url(#lg-${vesselId})"/>
  </svg>`;

  cont.innerHTML = svg;
}

// ── Animate bubbles ────────────────────────────────────────────
function animateBubbles(dt) {
  VESSELS.forEach(v => {
    if (v.status === 'pending') return;
    const cont = document.getElementById(`bubbles-${v.id}`);
    const bubbles = cont.querySelectorAll('.bubble');
    const contH = parseFloat(cont.style.height) || 0;

    bubbles.forEach(b => {
      let y = parseFloat(b.dataset.y);
      const speed = parseFloat(b.dataset.speed);
      const phase = parseFloat(b.dataset.phase);
      const baseLeft = parseFloat(b.dataset.baseLeft);

      y -= speed;
      if (y < -5) {
        y = 105;
        b.dataset.phase = Math.random() * Math.PI * 2;
        b.dataset.baseLeft = 10 + Math.random() * 80;
      }
      b.dataset.y = y;

      const px = y / 100 * contH;
      b.style.bottom = `${px}px`;
      b.style.left = `${baseLeft + Math.sin(time * 0.8 + phase) * 4}%`;
      b.style.opacity = (y > 0 && y < 95) ? (0.2 + Math.sin(time + phase) * 0.15) : 0;
    });
  });
}

// ── Rising level for active vessel ─────────────────────────────
let activeFill = 0.58;
const FILL_RATE = 0.00004; // very slow rise

// ── Main loop ──────────────────────────────────────────────────
let lastT = performance.now();

function frame(now) {
  const dt = (now - lastT) / 1000;
  lastT = now;
  time += dt;

  // Slowly rise active vessel
  activeFill = Math.min(activeFill + FILL_RATE, 1.0);
  VESSELS[2].fillPct = activeFill;

  // Update active status label
  const activeLabel = document.querySelector('.vessel-col[data-idx="2"] .vessel-label .status');
  if (activeLabel) {
    activeLabel.textContent = `${Math.round(activeFill * 100)}% \u2014 Generating...`;
  }

  // Render each vessel's liquid
  VESSELS.forEach(v => {
    if (v.fillPct > 0) {
      renderLiquid(v.id, v.fillPct, v.color, v.colorDark, time);
    }
  });

  // Animate bubbles
  animateBubbles(dt);

  requestAnimationFrame(frame);
}

// ── Elapsed time counter ───────────────────────────────────────
let elapsedSec = 1*3600 + 47*60 + 23;
setInterval(() => {
  elapsedSec++;
  const h = String(Math.floor(elapsedSec / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsedSec % 3600) / 60)).padStart(2, '0');
  const s = String(elapsedSec % 60).padStart(2, '0');
  document.getElementById('elapsed').textContent = `${h}:${m}:${s}`;
}, 1000);

// ── Init ───────────────────────────────────────────────────────
buildStage();
spawnBubbles();
createSubLabels();
requestAnimationFrame(frame);
</script>
</body>
