<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Nested Rings UI</title>
<style>
  :root {
    --bg: #0e1117; --surface: #161b22; --border: #30363d;
    --text: #c9d1d9; --text-dim: #8b949e; --text-bright: #f0f6fc;
    --green: #3fb950; --green-dim: #1a3a2a;
    --purple: #a371f7; --purple-dim: #2d1f5e;
    --blue: #58a6ff; --blue-dim: #1a3152;
    --gray: #484f58; --gray-dim: #1c2028;
    --amber: #d29922; --amber-dim: #3d2e0a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px; line-height: 1.5;
    display: flex; justify-content: center; padding: 20px; min-height: 100vh;
  }
  .container { width: 520px; max-width: 100%; }

  /* ── Ring Area ── */
  .ring-area {
    height: 130px; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding-top: 6px; position: relative; user-select: none;
  }
  .rings-wrapper {
    position: relative; width: 170px; height: 170px;
    display: flex; align-items: center; justify-content: center;
    transform: scale(0.72); transform-origin: top center;
  }
  .ring-svg { position: absolute; top: 0; left: 0; width: 170px; height: 170px; }
  .ring-segment {
    fill: none; stroke-linecap: butt; cursor: pointer;
    transition: opacity 0.2s, filter 0.2s;
  }
  .ring-segment:hover { filter: brightness(1.25); }
  .ring-segment.selected { filter: brightness(1.3) drop-shadow(0 0 4px currentColor); }
  .ring-segment.dim { opacity: 0.35; }
  .ring-marker, .ring-dot {
    fill: var(--bg); stroke: var(--border); stroke-width: 1; pointer-events: none;
  }
  .center-metric {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); text-align: center;
    pointer-events: none; z-index: 2;
  }
  .center-metric .value {
    font-size: 18px; font-weight: 700; color: var(--text-bright); line-height: 1;
  }
  .center-metric .label {
    font-size: 9px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px;
  }

  /* ── Detail Dots ── */
  .detail-dots-row {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-top: -2px; min-height: 18px; transition: opacity 0.25s;
  }
  .detail-dots-row.hidden { opacity: 0; pointer-events: none; }
  .detail-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--gray-dim);
    cursor: pointer; transition: all 0.2s;
  }
  .detail-dot.done { background: var(--green); border-color: var(--green); }
  .detail-dot.partial { background: var(--amber); border-color: var(--amber); }
  .detail-dot.active { transform: scale(1.5); box-shadow: 0 0 6px rgba(255,255,255,0.2); }

  /* ── Nav Hint & Focus ── */
  .nav-hint {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin-top: 4px; font-size: 10px; color: var(--text-dim); opacity: 0.6;
  }
  .nav-hint kbd {
    display: inline-block; background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 0 4px; font-size: 9px; font-family: inherit; color: var(--text);
  }
  .focus-label {
    position: absolute; top: 2px; right: 2px; font-size: 9px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px; opacity: 0.7;
  }

  /* ── Content ── */
  .content-area { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
  .content-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .content-header .module-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px; white-space: nowrap;
  }
  .content-header .title { font-size: 14px; font-weight: 600; color: var(--text-bright); }
  .content-summary { color: var(--text-dim); font-size: 12px; margin-bottom: 10px; line-height: 1.6; }
  .content-expandable { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
  .expand-trigger {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--surface); cursor: pointer;
    font-size: 12px; color: var(--text); transition: background 0.15s;
  }
  .expand-trigger:hover { background: #1c2129; }
  .expand-trigger .arrow { font-size: 10px; transition: transform 0.2s; color: var(--text-dim); }
  .expand-trigger.open .arrow { transform: rotate(90deg); }
  .expand-body {
    display: none; padding: 10px 12px; font-size: 11px;
    color: var(--text-dim); line-height: 1.7;
    border-top: 1px solid var(--border); background: var(--bg);
  }
  .expand-body.open { display: block; }
  .expand-body ul { margin: 4px 0 4px 16px; list-style: disc; }
  .expand-body li { margin-bottom: 3px; }
  .status-tag {
    display: inline-block; font-size: 10px; padding: 1px 5px;
    border-radius: 3px; font-weight: 600; margin-left: 6px; vertical-align: middle;
  }
  .status-tag.done { background: var(--green-dim); color: var(--green); }
  .status-tag.partial { background: var(--amber-dim); color: var(--amber); }
  .status-tag.pending { background: var(--gray-dim); color: var(--gray); }
  .detail-item-card {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; margin-bottom: 8px;
    background: var(--surface); transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .detail-item-card.highlighted { border-color: var(--blue); background: var(--blue-dim); }
  .detail-item-card .item-title { font-size: 12px; font-weight: 600; color: var(--text-bright); margin-bottom: 4px; }
  .detail-item-card .item-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .breadcrumb {
    font-size: 10px; color: var(--text-dim); margin-bottom: 8px;
    display: flex; align-items: center; gap: 4px;
  }
  .breadcrumb span { opacity: 0.6; }
  .breadcrumb .bc-active { opacity: 1; color: var(--text); }
  .breadcrumb .bc-sep { opacity: 0.3; }
  .fade-enter { animation: fadeSlideIn 0.2s ease-out; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="ring-area">
    <div class="focus-label" id="focusLabel">outer ring</div>
    <div class="rings-wrapper">
      <svg class="ring-svg" viewBox="0 0 170 170" id="ringSvg"></svg>
      <div class="center-metric" id="centerMetric">
        <div class="value">3/5</div>
        <div class="label">hypos</div>
      </div>
    </div>
    <div class="detail-dots-row hidden" id="detailDots"></div>
    <div class="nav-hint">
      <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> navigate</span>
      <span><kbd>&darr;</kbd> drill in</span>
      <span><kbd>&uarr;</kbd> back out</span>
    </div>
  </div>
  <div class="content-area" id="contentArea"></div>
</div>

<script>
// ── DATA ──
const D = (title, desc, status) => ({ title, desc, status });
const S = (id, name, status, metric, summary, details, expandable) =>
  ({ id, name, status, metric, summary, details: details || [], expandable: expandable || null });

const MODULES = [
  {
    id: 'seed', name: 'Seed', color: '#3fb950', colorDim: '#1a3a2a',
    status: 'done', metric: { value: '12', label: 'papers' },
    summary: 'Knowledge graph seeded from 12 source papers across 3 research domains.',
    submodules: [
      S('fetch', 'Fetch Papers', 'done', { value: '12/12', label: 'fetched' },
        'All papers fetched and parsed successfully.',
        [D('ArXiv Batch', '8 papers from arXiv API, parsed via GROBID.', 'done'),
         D('Manual Uploads', '4 papers uploaded as PDF, OCR processed.', 'done')],
        { title: 'Fetch Log', body: '<ul><li>ArXiv query: "transformer attention mechanisms" (2024-2025)</li><li>8 results fetched, 8 parsed OK</li><li>4 manual PDFs: OCR confidence > 0.95</li></ul>' }),
      S('extract', 'Extract Entities', 'done', { value: '147', label: 'entities' },
        '147 entities extracted and linked into the knowledge graph.',
        [D('Methods', '42 method entities extracted from abstracts and body.', 'done'),
         D('Datasets', '31 dataset references identified and linked.', 'done'),
         D('Metrics', '74 performance metrics captured with values.', 'done')],
        { title: 'Extraction Stats', body: '<ul><li>Entity types: Method (42), Dataset (31), Metric (74)</li><li>Avg confidence: 0.91</li><li>Cross-paper links: 23 shared entities</li></ul>' }),
      S('kg', 'Build KG', 'done', { value: '289', label: 'edges' },
        'Knowledge graph assembled with 147 nodes and 289 edges.',
        [D('Node Dedup', 'Merged 18 duplicate entities via embedding similarity.', 'done'),
         D('Edge Inference', '42 inferred edges added from co-occurrence analysis.', 'done')],
        { title: 'Graph Summary', body: '<ul><li>Nodes: 147 (after dedup from 165)</li><li>Edges: 289 (247 explicit + 42 inferred)</li><li>Connected components: 2 (main + one outlier cluster)</li></ul>' }),
    ]
  },
  {
    id: 'hypo', name: 'Hypothesis', color: '#a371f7', colorDim: '#2d1f5e',
    status: 'done', metric: { value: '3/5', label: 'approved' },
    summary: '5 hypotheses generated, 3 approved after review loop.',
    submodules: [
      S('gen', 'Generate Hypos', 'done', { value: '5', label: 'generated' },
        '5 candidate hypotheses generated from knowledge graph gaps.',
        [D('Gap Analysis', 'Identified 8 under-explored regions in the KG.', 'done'),
         D('Hypo Synthesis', 'LLM generated 5 hypotheses targeting top gaps.', 'done')],
        { title: 'Generation Details', body: '<ul><li>KG gap regions: 8 identified, top 5 selected by novelty score</li><li>Avg novelty: 0.78, avg feasibility: 0.65</li><li>Generation model: claude-sonnet-4-20250514</li></ul>' }),
      S('review', 'Review Hypos', 'done', { value: '3/5', label: 'passed' },
        '3 of 5 hypotheses passed the review criteria.',
        [D('H1: Sparse Attn Fusion', 'Approved -- novel cross-domain approach.', 'done'),
         D('H2: Adaptive KV Cache', 'Approved -- strong feasibility score.', 'done'),
         D('H3: Gradient-Free Opt', 'Rejected -- too similar to existing work.', 'pending'),
         D('H4: Multi-Scale Embed', 'Approved -- unique combination of techniques.', 'done'),
         D('H5: Pruning via Info Flow', 'Rejected -- insufficient supporting evidence.', 'pending')],
        { title: 'Review Criteria', body: '<ul><li>Novelty threshold: >= 0.7</li><li>Feasibility threshold: >= 0.5</li><li>Evidence support: >= 3 papers</li><li>2 rejected: H3 (novelty 0.42), H5 (evidence 1 paper)</li></ul>' }),
    ]
  },
  {
    id: 'invention', name: 'Invention', color: '#58a6ff', colorDim: '#1a3152',
    status: 'partial', metric: { value: '2/6', label: 'steps' },
    summary: 'Invention loop in progress -- plan generated, writing paper text.',
    submodules: [
      S('strategy', 'Gen Strategy', 'done', { value: '1/1', label: 'done' },
        'Research strategy formulated targeting Sparse Attention Fusion.',
        [D('Strategy Doc', 'Three-phase approach: theoretical framework, ablation design, benchmark selection.', 'done')],
        { title: 'Strategy Outline', body: '<ul><li>Phase 1: Formalize sparse attention as a fusion operator</li><li>Phase 2: Design ablation over sparsity patterns</li><li>Phase 3: Evaluate on LRA + custom long-context tasks</li></ul>' }),
      S('plan', 'Gen Plan', 'done', { value: '7', label: 'sections' },
        'Paper plan with 7 sections and figure placements.',
        [D('Outline Complete', 'Introduction through conclusion, 4 figure slots, 3 table slots.', 'done'),
         D('Figure Plan', 'Architecture diagram, attention heatmaps, ablation charts, scaling curves.', 'done')],
        { title: 'Section Plan', body: '<ul><li>1. Introduction (motivation + contributions)</li><li>2. Related Work (sparse attention, fusion methods)</li><li>3. Method (formal definition + algorithm)</li><li>4. Experiments (setup, baselines, results)</li><li>5. Analysis (ablations, visualizations)</li><li>6. Discussion (limitations, broader impact)</li><li>7. Conclusion</li></ul>' }),
      S('text', 'Gen Paper Text', 'partial', { value: '3/7', label: 'sections' },
        'Writing section 4 of 7. Intro, related work, and method complete.',
        [D('Sec 1: Introduction', '1.2k words, 3 contribution bullets drafted.', 'done'),
         D('Sec 2: Related Work', '1.8k words, 24 citations integrated.', 'done'),
         D('Sec 3: Method', '2.1k words, algorithm pseudocode included.', 'done'),
         D('Sec 4: Experiments', 'In progress -- baseline descriptions written.', 'partial'),
         D('Sec 5: Analysis', 'Pending -- waiting for experiments section.', 'pending'),
         D('Sec 6: Discussion', 'Pending.', 'pending'),
         D('Sec 7: Conclusion', 'Pending.', 'pending')],
        { title: 'Writing Progress', body: '<ul><li>Total words so far: 5,100 / ~9,000 target</li><li>Citations used: 31 of 42 available</li><li>Current section ETA: ~4 minutes</li><li>Model: claude-sonnet-4-20250514 with structured output</li></ul>' }),
      S('review_p', 'Review Paper', 'pending', { value: '0/3', label: 'checks' },
        'Pending -- will review coherence, novelty, and technical rigor.', [],
        { title: 'Review Criteria', body: '<ul><li>Coherence: section flow and argument structure</li><li>Novelty: differentiation from related work</li><li>Rigor: formal correctness of method section</li></ul>' }),
      S('refine', 'Refine', 'pending', { value: '--', label: 'iterations' },
        'Pending -- will refine based on review feedback.'),
      S('finalize', 'Finalize', 'pending', { value: '--', label: '' },
        'Pending -- final assembly of paper document.'),
    ]
  },
  {
    id: 'paper', name: 'Paper', color: '#484f58', colorDim: '#1c2028',
    status: 'pending', metric: { value: '--', label: 'waiting' },
    summary: 'Paper generation will begin after the invention loop completes.',
    submodules: [
      S('artifacts', 'Gen Artifacts', 'pending', { value: '--', label: '' },
        'Will generate code demos and visualizations.'),
      S('viz', 'Gen Viz', 'pending', { value: '--', label: '' },
        'Will generate figures and diagrams.'),
      S('full', 'Gen Full Paper', 'pending', { value: '--', label: '' },
        'Will assemble the final LaTeX document.'),
    ]
  },
];

// ── STATE ──
const state = { focusLevel: 'outer', moduleIdx: 2, submoduleIdx: 0, detailIdx: -1 };

// ── RING GEOMETRY ──
const CX = 85, CY = 85, GAP_DEG = 4;

function polarToCart(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function describeArc(cx, cy, r, s, e) {
  if (e - s >= 359.99) {
    const p1 = polarToCart(cx, cy, r, s), p2 = polarToCart(cx, cy, r, s + 180);
    return `M ${p1.x} ${p1.y} A ${r} ${r} 0 0 1 ${p2.x} ${p2.y} A ${r} ${r} 0 0 1 ${p1.x} ${p1.y}`;
  }
  const ps = polarToCart(cx, cy, r, s), pe = polarToCart(cx, cy, r, e);
  return `M ${ps.x} ${ps.y} A ${r} ${r} 0 ${(e - s) > 180 ? 1 : 0} 1 ${pe.x} ${pe.y}`;
}

function statusOpacity(st) { return st === 'done' ? 1.0 : st === 'partial' ? 0.7 : 0.25; }

function makeSvgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function drawRings() {
  const svg = document.getElementById('ringSvg');
  svg.innerHTML = '';
  const mod = MODULES[state.moduleIdx];
  const n = MODULES.length;

  // ── Outer ring segment angles (proportional to submodule count) ──
  const totalSubs = MODULES.reduce((s, m) => s + Math.max(m.submodules.length, 1), 0);
  const availOuter = 360 - GAP_DEG * n;
  let outerAngles = MODULES.map(m => Math.max((Math.max(m.submodules.length, 1) / totalSubs) * availOuter, 40));
  const scale = availOuter / outerAngles.reduce((s, a) => s + a, 0);
  outerAngles = outerAngles.map(a => a * scale);

  let angle = 0;
  for (let i = 0; i < n; i++) {
    const start = angle + GAP_DEG / 2;
    const end = angle + outerAngles[i] + GAP_DEG / 2;

    const path = makeSvgEl('path', {
      d: describeArc(CX, CY, 78, start, end),
      class: 'ring-segment', stroke: MODULES[i].color,
      'stroke-width': 9, opacity: statusOpacity(MODULES[i].status),
    });
    if (state.focusLevel === 'outer' && i === state.moduleIdx) path.classList.add('selected');
    if (state.focusLevel !== 'outer' && i !== state.moduleIdx) path.classList.add('dim');
    path.dataset.idx = i;
    path.addEventListener('click', () => {
      state.moduleIdx = i; state.submoduleIdx = 0; state.detailIdx = -1;
      state.focusLevel = 'outer'; render();
    });
    svg.appendChild(path);

    // Diamond marker at segment boundary
    const mp = polarToCart(CX, CY, 78, start), ds = 3.5;
    svg.appendChild(makeSvgEl('polygon', {
      points: `${mp.x},${mp.y-ds} ${mp.x+ds},${mp.y} ${mp.x},${mp.y+ds} ${mp.x-ds},${mp.y}`,
      fill: MODULES[i].color, stroke: 'none', class: 'ring-marker',
    }));
    angle += outerAngles[i] + GAP_DEG;
  }

  // ── Inner ring (submodules of selected module) ──
  const subs = mod.submodules;
  if (subs.length === 0) return;
  const sn = subs.length;
  const availInner = 360 - GAP_DEG * sn;
  const segAngle = availInner / sn;
  let iAngle = 0;

  for (let j = 0; j < sn; j++) {
    const sub = subs[j];
    const iStart = iAngle + GAP_DEG / 2;
    const iEnd = iAngle + segAngle + GAP_DEG / 2;
    const segColor = sub.status === 'pending' ? '#484f58' : mod.color;
    let op = statusOpacity(sub.status);
    if (state.focusLevel === 'outer') op = Math.max(op * 0.5, 0.15);

    const path = makeSvgEl('path', {
      d: describeArc(CX, CY, 44, iStart, iEnd),
      class: 'ring-segment', stroke: segColor,
      'stroke-width': 7, opacity: op,
    });
    if ((state.focusLevel === 'inner' || state.focusLevel === 'detail') && j === state.submoduleIdx) {
      path.classList.add('selected');
    }
    path.dataset.idx = j;
    path.addEventListener('click', () => {
      state.submoduleIdx = j; state.detailIdx = -1;
      state.focusLevel = 'inner'; render();
    });
    svg.appendChild(path);

    // Dot at boundary
    const dp = polarToCart(CX, CY, 44, iStart);
    const dotFill = sub.status === 'done' ? mod.color : sub.status === 'partial' ? '#d29922' : '';
    svg.appendChild(makeSvgEl('circle', {
      cx: dp.x, cy: dp.y, r: 2.5, class: 'ring-dot',
      ...(dotFill ? { fill: dotFill, stroke: 'none' } : {}),
    }));
    iAngle += segAngle + GAP_DEG;
  }
}

// ── CENTER METRIC ──
function updateCenterMetric() {
  const el = document.getElementById('centerMetric');
  const mod = MODULES[state.moduleIdx];
  const metric = state.focusLevel === 'outer'
    ? mod.metric
    : (mod.submodules[state.submoduleIdx]?.metric || mod.metric);
  el.querySelector('.value').textContent = metric.value;
  el.querySelector('.label').textContent = metric.label;
}

// ── DETAIL DOTS ──
function updateDetailDots() {
  const row = document.getElementById('detailDots');
  row.innerHTML = '';
  const sub = MODULES[state.moduleIdx].submodules[state.submoduleIdx];
  if (!sub || sub.details.length === 0 || state.focusLevel === 'outer') {
    row.classList.add('hidden'); return;
  }
  row.classList.remove('hidden');
  sub.details.forEach((d, i) => {
    const dot = document.createElement('div');
    dot.className = 'detail-dot';
    if (d.status === 'done') dot.classList.add('done');
    else if (d.status === 'partial') dot.classList.add('partial');
    if (state.focusLevel === 'detail' && i === state.detailIdx) dot.classList.add('active');
    dot.addEventListener('click', () => { state.focusLevel = 'detail'; state.detailIdx = i; render(); });
    row.appendChild(dot);
  });
}

// ── CONTENT ──
function makeTag(status) {
  const labels = { done: 'DONE', partial: 'IN PROGRESS', pending: 'PENDING' };
  return `<span class="status-tag ${status}">${labels[status] || status}</span>`;
}

function makeHeader(mod, title, status) {
  return `<div class="content-header">
    <span class="module-badge" style="background:${mod.colorDim};color:${mod.color}">${mod.name}</span>
    <span class="title">${title}</span>${makeTag(status)}
  </div>`;
}

function makeExpandable(exp) {
  if (!exp) return '';
  return `<div class="content-expandable">
    <div class="expand-trigger" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
      <span>${exp.title}</span><span class="arrow">&#9656;</span>
    </div>
    <div class="expand-body">${exp.body}</div>
  </div>`;
}

function renderContent() {
  const area = document.getElementById('contentArea');
  const mod = MODULES[state.moduleIdx];
  const sub = mod.submodules[state.submoduleIdx];
  let html = '';

  // Breadcrumb
  const parts = [`<span class="${state.focusLevel === 'outer' ? 'bc-active' : ''}">${mod.name}</span>`];
  if (sub && state.focusLevel !== 'outer') {
    parts.push('<span class="bc-sep">&rsaquo;</span>');
    parts.push(`<span class="${state.focusLevel === 'inner' ? 'bc-active' : ''}">${sub.name}</span>`);
  }
  if (state.focusLevel === 'detail' && sub?.details[state.detailIdx]) {
    parts.push('<span class="bc-sep">&rsaquo;</span>');
    parts.push(`<span class="bc-active">${sub.details[state.detailIdx].title}</span>`);
  }
  html += `<div class="breadcrumb">${parts.join('')}</div>`;

  if (state.focusLevel === 'outer') {
    html += makeHeader(mod, mod.name + ' Module', mod.status);
    html += `<div class="content-summary">${mod.summary}</div>`;
    mod.submodules.forEach((s, j) => {
      html += `<div class="detail-item-card" data-sub="${j}">
        <div class="item-title">${s.name} ${makeTag(s.status)}</div>
        <div class="item-desc">${s.summary}</div>
      </div>`;
    });
  } else if (state.focusLevel === 'inner' && sub) {
    html += makeHeader(mod, sub.name, sub.status);
    html += `<div class="content-summary">${sub.summary}</div>`;
    html += makeExpandable(sub.expandable);
    if (sub.details.length > 0) {
      html += `<div style="font-size:10px;color:var(--text-dim);margin:10px 0 6px;text-transform:uppercase;letter-spacing:0.5px">Detail Items (${sub.details.length})</div>`;
      sub.details.forEach((d, i) => {
        html += `<div class="detail-item-card" data-detail="${i}">
          <div class="item-title">${d.title} ${makeTag(d.status)}</div>
          <div class="item-desc">${d.desc}</div>
        </div>`;
      });
    }
  } else if (state.focusLevel === 'detail' && sub?.details[state.detailIdx]) {
    const d = sub.details[state.detailIdx];
    html += makeHeader(mod, d.title, d.status);
    html += `<div class="content-summary">${d.desc}</div>`;
    html += `<div class="content-expandable">
      <div class="expand-trigger open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span>Parent: ${sub.name}</span><span class="arrow">&#9656;</span>
      </div>
      <div class="expand-body open">${sub.summary}</div>
    </div>`;
    // Sibling nav buttons
    const btns = [];
    if (state.detailIdx > 0)
      btns.push(`<button class="nav-btn" data-dir="-1">&larr; ${sub.details[state.detailIdx - 1].title}</button>`);
    if (state.detailIdx < sub.details.length - 1)
      btns.push(`<button class="nav-btn" data-dir="1" style="margin-left:auto">${sub.details[state.detailIdx + 1].title} &rarr;</button>`);
    if (btns.length) html += `<div style="display:flex;gap:8px;margin-top:12px">${btns.join('')}</div>`;
  }

  area.innerHTML = html;

  // Attach card click handlers
  area.querySelectorAll('.detail-item-card[data-sub]').forEach(el => {
    el.addEventListener('click', () => {
      state.submoduleIdx = +el.dataset.sub; state.detailIdx = -1;
      state.focusLevel = 'inner'; render();
    });
  });
  area.querySelectorAll('.detail-item-card[data-detail]').forEach(el => {
    el.addEventListener('click', () => {
      state.focusLevel = 'detail'; state.detailIdx = +el.dataset.detail; render();
    });
  });
  area.querySelectorAll('.nav-btn').forEach(btn => {
    Object.assign(btn.style, {
      background: 'var(--surface)', border: '1px solid var(--border)',
      color: 'var(--text)', padding: '4px 10px', borderRadius: '4px',
      fontFamily: 'inherit', fontSize: '11px', cursor: 'pointer',
    });
    btn.addEventListener('mouseenter', () => { btn.style.borderColor = 'var(--blue)'; });
    btn.addEventListener('mouseleave', () => { btn.style.borderColor = 'var(--border)'; });
    btn.addEventListener('click', () => { state.detailIdx += +btn.dataset.dir; render(); });
  });

  // Fade animation on first content child after breadcrumb
  const firstContent = area.querySelector('.breadcrumb + *');
  if (firstContent) firstContent.classList.add('fade-enter');
}

// ── KEYBOARD ──
document.addEventListener('keydown', (e) => {
  const mod = MODULES[state.moduleIdx];
  const sub = mod.submodules[state.submoduleIdx];
  let handled = true;

  switch (e.key) {
    case 'ArrowLeft':
      if (state.focusLevel === 'outer') {
        state.moduleIdx = (state.moduleIdx - 1 + MODULES.length) % MODULES.length;
        state.submoduleIdx = 0; state.detailIdx = -1;
      } else if (state.focusLevel === 'inner') {
        state.submoduleIdx = (state.submoduleIdx - 1 + mod.submodules.length) % mod.submodules.length;
        state.detailIdx = -1;
      } else if (state.focusLevel === 'detail' && sub) {
        state.detailIdx = (state.detailIdx - 1 + sub.details.length) % sub.details.length;
      }
      break;
    case 'ArrowRight':
      if (state.focusLevel === 'outer') {
        state.moduleIdx = (state.moduleIdx + 1) % MODULES.length;
        state.submoduleIdx = 0; state.detailIdx = -1;
      } else if (state.focusLevel === 'inner') {
        state.submoduleIdx = (state.submoduleIdx + 1) % mod.submodules.length;
        state.detailIdx = -1;
      } else if (state.focusLevel === 'detail' && sub) {
        state.detailIdx = (state.detailIdx + 1) % sub.details.length;
      }
      break;
    case 'ArrowDown':
      if (state.focusLevel === 'outer' && mod.submodules.length > 0) {
        state.focusLevel = 'inner'; state.submoduleIdx = 0; state.detailIdx = -1;
      } else if (state.focusLevel === 'inner' && sub?.details.length > 0) {
        state.focusLevel = 'detail'; state.detailIdx = 0;
      }
      break;
    case 'ArrowUp':
      if (state.focusLevel === 'detail') { state.focusLevel = 'inner'; state.detailIdx = -1; }
      else if (state.focusLevel === 'inner') { state.focusLevel = 'outer'; state.detailIdx = -1; }
      break;
    default: handled = false;
  }
  if (handled) { e.preventDefault(); render(); }
});

// ── RENDER ──
function render() {
  drawRings();
  updateCenterMetric();
  updateDetailDots();
  document.getElementById('focusLabel').textContent =
    { outer: 'outer ring', inner: 'inner ring', detail: 'detail items' }[state.focusLevel];
  renderContent();
}

render();
</script>
</body>
</html>
