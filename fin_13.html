<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AII Pipeline Dashboard — fin_13</title>
<style>
  /* ───────────────────────── Reset & Base ───────────────────────── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:        #0f1219;
    --bg-card:   #161b26;
    --bg-hover:  #1c2333;
    --border:    #252d3d;
    --text:      #c8cdd8;
    --text-dim:  #6b7589;
    --text-bright:#e8ecf4;
    --accent:    #6c8cff;
    --sidebar-w: 62px;
    --sidebar-exp: 260px;
    --ring-transition: 600ms cubic-bezier(.4,.0,.2,1);
  }
  html, body {
    height:100%; font-family:'Inter','Segoe UI',system-ui,sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden;
    font-size:13px; line-height:1.5;
  }
  /* ───────────────────────── Layout Shell ───────────────────────── */
  .shell { display:flex; height:100vh; }

  /* ───────────────────────── Sidebar ───────────────────────── */
  .sidebar {
    width:var(--sidebar-w); min-width:var(--sidebar-w);
    background:#0b0e14; border-right:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center;
    padding:12px 0 16px; gap:6px; transition:width .3s ease, min-width .3s ease;
    position:relative; z-index:50; overflow:hidden;
  }
  .sidebar.expanded {
    width:var(--sidebar-exp); min-width:var(--sidebar-exp);
  }
  .sidebar-toggle {
    width:36px; height:36px; border-radius:8px;
    background:transparent; border:1px solid var(--border);
    color:var(--text-dim); cursor:pointer; display:flex;
    align-items:center; justify-content:center; margin-bottom:8px;
    transition:background .2s, color .2s;
  }
  .sidebar-toggle:hover { background:var(--bg-hover); color:var(--text-bright); }
  .sidebar-toggle svg { width:16px; height:16px; transition:transform .3s; }
  .sidebar.expanded .sidebar-toggle svg { transform:rotate(180deg); }

  /* Ring Container */
  .ring-container {
    position:relative; width:44px; height:44px;
    margin:4px 0 10px; flex-shrink:0;
  }
  .sidebar.expanded .ring-container { width:120px; height:120px; margin:10px 0 14px; }

  .ring-svg {
    width:100%; height:100%;
    transition:var(--ring-transition);
  }
  .ring-bg {
    fill:none; stroke:#1e2536; stroke-width:3;
    transition:var(--ring-transition);
  }
  .ring-fill {
    fill:none; stroke-width:3; stroke-linecap:round;
    transition:stroke var(--ring-transition),
               stroke-dasharray var(--ring-transition),
               stroke-dashoffset var(--ring-transition),
               filter var(--ring-transition);
  }
  .ring-dashed {
    fill:none; stroke-width:1; stroke-dasharray:3 5;
    opacity:.35; transition:stroke var(--ring-transition);
    transform-origin:50% 50%;
    animation:ring-spin 20s linear infinite;
  }
  @keyframes ring-spin { to { transform:rotate(360deg); } }

  .ring-text {
    font-weight:700; fill:var(--text-bright);
    text-anchor:middle; dominant-baseline:central;
    transition:fill var(--ring-transition), font-size var(--ring-transition);
  }
  .ring-label {
    font-size:7px; font-weight:500; fill:var(--text-dim);
    text-anchor:middle; dominant-baseline:central;
    opacity:0; transition:opacity var(--ring-transition);
  }
  .sidebar.expanded .ring-label { opacity:1; }

  /* Sidebar Module Nav Items */
  .sidebar-nav { display:flex; flex-direction:column; gap:2px; width:100%; padding:0 8px; }
  .nav-item {
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; border-radius:8px; cursor:pointer;
    transition:background .2s, color .2s; color:var(--text-dim);
    white-space:nowrap; overflow:hidden; position:relative;
  }
  .nav-item:hover { background:var(--bg-hover); color:var(--text); }
  .nav-item.active { background:rgba(108,140,255,.1); }
  .nav-item .nav-icon {
    width:20px; height:20px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .nav-item .nav-icon svg { width:16px; height:16px; }
  .nav-item .nav-label { font-size:12px; opacity:0; transition:opacity .25s; }
  .sidebar.expanded .nav-item .nav-label { opacity:1; }
  .nav-dot {
    position:absolute; right:10px; width:6px; height:6px;
    border-radius:50%; opacity:0; transition:opacity .2s, background .2s;
  }
  .nav-item.active .nav-dot { opacity:1; }

  /* Sidebar bottom spacer */
  .sidebar-spacer { flex:1; }

  /* ───────────────────────── Main Content ───────────────────────── */
  .main-content {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:24px 28px; position:relative;
  }
  .main-content::-webkit-scrollbar { width:6px; }
  .main-content::-webkit-scrollbar-track { background:transparent; }
  .main-content::-webkit-scrollbar-thumb { background:#252d3d; border-radius:3px; }

  /* ───────────────────────── Header ───────────────────────── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:22px; gap:16px;
  }
  .header-title { font-size:18px; font-weight:700; color:var(--text-bright); }
  .header-sub { font-size:12px; color:var(--text-dim); margin-top:2px; }
  .header-badges { display:flex; gap:8px; }
  .badge {
    padding:4px 12px; border-radius:20px; font-size:11px;
    font-weight:600; border:1px solid transparent;
  }
  .badge-run { background:rgba(108,140,255,.12); color:#8aa4ff; border-color:rgba(108,140,255,.25); }
  .badge-ok  { background:rgba(52,211,153,.1); color:#34d399; border-color:rgba(52,211,153,.2); }

  /* ───────────────────────── 3-Level Cards ───────────────────────── */
  .module-section { margin-bottom:28px; }
  .module-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:12px; padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  .module-color-line {
    width:3px; height:18px; border-radius:2px;
    flex-shrink:0;
  }
  .module-name {
    font-size:14px; font-weight:700; color:var(--text-bright);
  }
  .module-status {
    margin-left:auto; font-size:11px; color:var(--text-dim);
    display:flex; align-items:center; gap:6px;
  }

  /* Level-2 Step */
  .step-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
    gap:10px;
  }
  .step-card {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px; position:relative;
    transition:border-color .25s, box-shadow .25s; cursor:default;
    overflow:hidden;
  }
  .step-card::before {
    content:''; position:absolute; top:0; left:0;
    width:100%; height:2px; border-radius:10px 10px 0 0;
    opacity:.7;
  }
  .step-card:hover {
    border-color:rgba(108,140,255,.3);
    box-shadow:0 0 20px rgba(108,140,255,.06);
  }
  .step-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .step-icon {
    width:28px; height:28px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; flex-shrink:0;
  }
  .step-name { font-size:12px; font-weight:600; color:var(--text-bright); }
  .step-desc { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .step-right { margin-left:auto; display:flex; align-items:center; gap:6px; }

  /* Level-3 Sub-tasks */
  .subtask-list { display:flex; flex-direction:column; gap:4px; margin-top:10px; }
  .subtask {
    display:flex; align-items:center; gap:8px;
    padding:6px 8px; border-radius:6px; font-size:11px;
    background:rgba(255,255,255,.015); transition:background .2s;
  }
  .subtask:hover { background:rgba(255,255,255,.04); }
  .subtask-dot {
    width:5px; height:5px; border-radius:50%; flex-shrink:0;
  }
  .subtask-name { color:var(--text); flex:1; }
  .subtask-badge {
    padding:1px 7px; border-radius:9px; font-size:10px;
    font-weight:600;
  }

  /* ───────────────────────── Dependency Dots ───────────────────────── */
  .dep-row {
    display:flex; align-items:center; gap:4px;
    margin-top:8px; padding-top:6px;
    border-top:1px dashed rgba(255,255,255,.05);
  }
  .dep-dot {
    width:7px; height:7px; border-radius:50%;
    border:1.5px solid; position:relative;
  }
  .dep-dot.filled::after {
    content:''; position:absolute; inset:1.5px; border-radius:50%;
    background:currentColor; opacity:.6;
  }
  .dep-label { font-size:10px; color:var(--text-dim); margin-left:4px; }

  /* ───────────────────────── Spinners ───────────────────────── */
  .spinner {
    width:14px; height:14px; border:2px solid rgba(255,255,255,.1);
    border-top-color:currentColor; border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ───────────────────────── Glow Pulse ───────────────────────── */
  .glow {
    animation:glow-pulse 2.5s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%,100% { filter:drop-shadow(0 0 2px currentColor); }
    50%     { filter:drop-shadow(0 0 8px currentColor); }
  }

  /* ───────────────────────── Particles ───────────────────────── */
  .particles-canvas {
    position:fixed; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:0; opacity:.35;
  }
  .main-content, .sidebar { position:relative; z-index:1; }

  /* ───────────────────────── Tooltips ───────────────────────── */
  [data-tip] { position:relative; }
  [data-tip]::after {
    content:attr(data-tip); position:absolute; bottom:calc(100% + 6px);
    left:50%; transform:translateX(-50%) translateY(4px);
    padding:5px 10px; border-radius:6px; font-size:11px;
    background:#1e2536; color:var(--text-bright);
    border:1px solid var(--border);
    white-space:nowrap; pointer-events:none;
    opacity:0; transition:opacity .2s, transform .2s; z-index:99;
  }
  [data-tip]:hover::after {
    opacity:1; transform:translateX(-50%) translateY(0);
  }

  /* ───────────────────────── Module Colors ───────────────────────── */
  .clr-seed   { --mc:#f59e0b; }
  .clr-hypo   { --mc:#6c8cff; }
  .clr-invent { --mc:#a78bfa; }
  .clr-paper  { --mc:#34d399; }
  .clr-deploy { --mc:#f472b6; }
  .clr-eval   { --mc:#fb923c; }

  .clr-seed   .module-color-line { background:#f59e0b; }
  .clr-hypo   .module-color-line { background:#6c8cff; }
  .clr-invent .module-color-line { background:#a78bfa; }
  .clr-paper  .module-color-line { background:#34d399; }
  .clr-deploy .module-color-line { background:#f472b6; }
  .clr-eval   .module-color-line { background:#fb923c; }

  .clr-seed   .step-card::before { background:#f59e0b; }
  .clr-hypo   .step-card::before { background:#6c8cff; }
  .clr-invent .step-card::before { background:#a78bfa; }
  .clr-paper  .step-card::before { background:#34d399; }
  .clr-deploy .step-card::before { background:#f472b6; }
  .clr-eval   .step-card::before { background:#fb923c; }

  .clr-seed   .step-icon { background:rgba(245,158,11,.12); color:#f59e0b; }
  .clr-hypo   .step-icon { background:rgba(108,140,255,.12); color:#6c8cff; }
  .clr-invent .step-icon { background:rgba(167,139,250,.12); color:#a78bfa; }
  .clr-paper  .step-icon { background:rgba(52,211,153,.1);  color:#34d399; }
  .clr-deploy .step-icon { background:rgba(244,114,182,.1); color:#f472b6; }
  .clr-eval   .step-icon { background:rgba(251,146,60,.1);  color:#fb923c; }

  /* ───────────────────────── Responsive ───────────────────────── */
  @media (max-width:768px) {
    .sidebar { width:0; min-width:0; border:none; }
    .sidebar.expanded { width:var(--sidebar-exp); min-width:var(--sidebar-exp); }
    .step-grid { grid-template-columns:1fr; }
  }
</style>
</head>

</div>

    icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    status:'pending',
    steps:[
      { name:'Quality metrics', desc:'Automated paper quality scoring',
        status:'pending', icon:'Q',
        subs:[
          { name:'Readability index', status:'pending' },
          { name:'Citation coverage', status:'pending' },

        ],
        deps:[{label:'paper-pdf', filled:false},{label:'seed-kg', filled:false}]
      },
      { name:'Comparison report', desc:'Compare against baselines',
        status:'pending', icon:'C',

/* ============================================================
   RENDER SIDEBAR NAV
   ============================================================ */
const sidebarNav = document.getElementById('sidebarNav');
let activeModuleIdx = 1; // default: hypo

function buildNav() {
  sidebarNav.innerHTML = '';
  MODULES.forEach((mod, i) => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (i === activeModuleIdx ? ' active' : '');
    item.setAttribute('data-tip', mod.name);
    item.innerHTML = `
      <span class="nav-icon" style="color:${mod.color}">${mod.icon}</span>
      <span class="nav-label" style="color:${i===activeModuleIdx?'var(--text-bright)':'var(--text-dim)'}">${mod.name}</span>
      <span class="nav-dot" style="background:${mod.color}"></span>
    `;
    item.addEventListener('click', () => selectModule(i));
    sidebarNav.appendChild(item);
  });
}

/* ============================================================
   UPDATE RING — core feature of fin_13
   ============================================================ */
const ringFill   = document.getElementById('ringFill');
const ringDashed = document.getElementById('ringDashed');
const ringText   = document.getElementById('ringText');
const ringLabel  = document.getElementById('ringLabel');
const CIRC       = 2 * Math.PI * 40; // ~251.33

function updateRing(mod) {
  const pct  = mod.fill;
  const off  = CIRC - (CIRC * pct / 100);
  const col  = mod.color;

  // Fill arc
  ringFill.style.stroke            = col;
  ringFill.style.strokeDasharray   = CIRC;
  ringFill.style.strokeDashoffset  = off;
  ringFill.style.filter            = `drop-shadow(0 0 6px ${col}80)`;

  // Dashed outline
  ringDashed.style.stroke = col;

  // Text
  ringText.textContent = pct + '%';
  ringLabel.textContent = mod.ringLabel;
}

/* ============================================================
   SELECT MODULE
   ============================================================ */
function selectModule(idx) {
  activeModuleIdx = idx;
  buildNav();
  updateRing(MODULES[idx]);
  renderModules();
}

/* ============================================================
   STATUS HELPERS
   ============================================================ */
function statusBadge(st) {
  const map = {
    done:    { bg:'rgba(52,211,153,.1)', c:'#34d399', t:'Done' },
    running: { bg:'rgba(108,140,255,.1)', c:'#8aa4ff', t:'Running' },
    pending: { bg:'rgba(255,255,255,.06)', c:'var(--text-dim)', t:'Pending' },
  };
  const s = map[st] || map.pending;
  return `<span class="subtask-badge" style="background:${s.bg};color:${s.c}">${s.t}</span>`;
}
function statusDot(st) {
  const map = { done:'#34d399', running:'#6c8cff', pending:'#3a4259' };
  return `<span class="subtask-dot" style="background:${map[st]||map.pending}"></span>`;
}
function stepStatus(st) {
  if (st === 'running') return '<span class="spinner" style="color:#8aa4ff"></span>';
  if (st === 'done')    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3a4259" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>';
}
function moduleStatusText(st) {
  if (st === 'done')    return '<span style="color:#34d399">Complete</span>';
  if (st === 'running') return '<span class="glow" style="color:#8aa4ff">In Progress</span>';
  return '<span style="color:var(--text-dim)">Queued</span>';
}

/* ============================================================
   RENDER MODULES
   ============================================================ */
const moduleContainer = document.getElementById('moduleContainer');

function renderModules() {
  let html = '';
  MODULES.forEach((mod, mi) => {
    html += `<div class="module-section ${mod.cls}">`;
    html += `<div class="module-header">`;
    html += `<div class="module-color-line"></div>`;
    html += `<span class="module-name">${mod.name}</span>`;
    html += `<div class="module-status">${moduleStatusText(mod.status)}</div>`;
    html += `</div>`;
    html += `<div class="step-grid">`;
    mod.steps.forEach(step => {
      html += `<div class="step-card">`;
      html += `<div class="step-top">`;
      html += `<div class="step-icon">${step.icon}</div>`;
      html += `<div><div class="step-name">${step.name}</div>`;
      html += `<div class="step-desc">${step.desc}</div></div>`;
      html += `<div class="step-right">${stepStatus(step.status)}</div>`;
      html += `</div>`;
      // Subtasks (level 3)
      if (step.subs && step.subs.length) {
        html += `<div class="subtask-list">`;
        step.subs.forEach(sub => {
          html += `<div class="subtask">`;
          html += statusDot(sub.status);
          html += `<span class="subtask-name">${sub.name}</span>`;
          html += statusBadge(sub.status);
          html += `</div>`;
        });
        html += `</div>`;
      }
      // Dependency dots
      if (step.deps && step.deps.length) {
        html += `<div class="dep-row">`;
        html += `<span class="dep-label">Deps:</span>`;
        step.deps.forEach(d => {
          html += `<span class="dep-dot ${d.filled?'filled':''}" `
                + `style="border-color:${d.filled?'#34d399':'#3a4259'};`
                + `color:${d.filled?'#34d399':'#3a4259'}" `
                + `data-tip="${d.label}"></span>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  moduleContainer.innerHTML = html;
}

const sidebar       = document.getElementById('sidebar');
const sidebarToggle = document.getElementById('sidebarToggle');
sidebarToggle.addEventListener('click', () => {

/* ============================================================
   PARTICLES
   ============================================================ */
(function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x  = Math.random() * W;
      this.y  = Math.random() * H;
      this.r  = Math.random() * 1.2 + 0.3;
      this.vx = (Math.random() - 0.5) * 0.15;
      this.vy = (Math.random() - 0.5) * 0.15;
      this.a  = Math.random() * 0.5 + 0.1;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      if (this.x < -10 || this.x > W+10 || this.y < -10 || this.y > H+10) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(108,140,255,${this.a})`;
      ctx.fill();
    }
  }

  for (let i=0; i<60; i++) particles.push(new Particle());

  function loop() {
    ctx.clearRect(0, 0, W, H);
    // Draw faint connecting lines
    for (let i=0; i<particles.length; i++) {
      for (let j=i+1; j<particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(108,140,255,${0.06*(1-d/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ============================================================
   INIT
   ============================================================ */
buildNav();
updateRing(MODULES[activeModuleIdx]);
renderModules();
</script>
