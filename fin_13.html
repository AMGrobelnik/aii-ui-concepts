<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AII Pipeline Dashboard — fin_13</title>
<style>
  /* ═══════════════════════════════════════════════════════════════
     RESET & CSS VARIABLES
     ═══════════════════════════════════════════════════════════════ */
  *,
  *::before,
  *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg:           #0f1219;
    --bg-raised:    #131825;
    --bg-card:      #161b26;
    --bg-card-alt:  #181e2c;
    --bg-hover:     #1c2333;
    --bg-input:     #111622;
    --border:       #252d3d;
    --border-dim:   #1d2435;
    --text:         #c8cdd8;
    --text-dim:     #6b7589;
    --text-muted:   #4a5268;
    --text-bright:  #e8ecf4;
    --accent:       #6c8cff;
    --sidebar-w:    62px;
    --sidebar-exp:  264px;
    --ring-tr:      600ms cubic-bezier(.4,.0,.2,1);
  }

  html, body {
    height: 100%;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-size: 13px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ═══════════════════════════════════════════════════════════════
     LAYOUT SHELL
     ═══════════════════════════════════════════════════════════════ */
  .shell {
    display: flex;
    height: 100vh;
    position: relative;
  }

  /* ═══════════════════════════════════════════════════════════════
     SIDEBAR — collapsed by default
     ═══════════════════════════════════════════════════════════════ */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: #0b0e14;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0 16px;
    gap: 4px;
    transition: width .32s ease, min-width .32s ease;
    position: relative;
    z-index: 50;
    overflow: hidden;
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 0; }
  .sidebar.expanded {
    width: var(--sidebar-exp);
    min-width: var(--sidebar-exp);
  }

  /* Toggle button */
  .sidebar-toggle {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    flex-shrink: 0;
    transition: background .2s, color .2s, border-color .2s;
  }
  .sidebar-toggle:hover {
    background: var(--bg-hover);
    color: var(--text-bright);
    border-color: #3a4566;
  }
  .sidebar-toggle svg {
    width: 16px;
    height: 16px;
    transition: transform .32s ease;
  }
  .sidebar.expanded .sidebar-toggle svg {
    transform: rotate(180deg);
  }

  /* ═══════════════════════════════════════════════════════════════
     RING — dynamic per-module indicator
     ═══════════════════════════════════════════════════════════════ */
  .ring-wrap {
    position: relative;
    width: 44px;
    height: 44px;
    margin: 6px 0 8px;
    flex-shrink: 0;
    transition: width var(--ring-tr), height var(--ring-tr), margin var(--ring-tr);
  }
  .sidebar.expanded .ring-wrap {
    width: 128px;
    height: 128px;
    margin: 12px 0 14px;
  }

  .ring-svg {
    width: 100%;
    height: 100%;
    transition: var(--ring-tr);
  }

  /* Track */
  .ring-track {
    fill: none;
    stroke: #1c2233;
    stroke-width: 3.2;
    transition: var(--ring-tr);
  }

  /* Fill arc */
  .ring-fill {
    fill: none;
    stroke-width: 3.2;
    stroke-linecap: round;
    transition:
      stroke            var(--ring-tr),
      stroke-dasharray  var(--ring-tr),
      stroke-dashoffset var(--ring-tr),
      filter            var(--ring-tr);
  }

  /* Rotating dashed outline */
  .ring-dashed {
    fill: none;
    stroke-width: 1;
    stroke-dasharray: 3.5 6;
    opacity: .3;
    transition: stroke var(--ring-tr);
    transform-origin: 50% 50%;
    animation: ring-rotate 22s linear infinite;
  }

  @keyframes ring-rotate {
    to { transform: rotate(360deg); }
  }

  /* Inner glow circle */
  .ring-inner-glow {
    fill: none;
    stroke-width: 0.6;
    opacity: .15;
    transition: stroke var(--ring-tr);
    animation: ring-glow-pulse 3s ease-in-out infinite;
  }
  @keyframes ring-glow-pulse {
    0%, 100% { opacity: .1; }
    50%      { opacity: .25; }
  }

  /* Center text */
  .ring-pct {
    font-weight: 700;
    fill: var(--text-bright);
    text-anchor: middle;
    dominant-baseline: central;
    transition: fill var(--ring-tr), font-size var(--ring-tr);
    font-size: 14px;
  }
  .sidebar.expanded .ring-pct { font-size: 22px; }

  .ring-label {
    font-size: 0px;
    font-weight: 500;
    fill: var(--text-dim);
    text-anchor: middle;
    dominant-baseline: central;
    opacity: 0;
    transition: opacity var(--ring-tr), font-size var(--ring-tr);
  }
  .sidebar.expanded .ring-label {
    opacity: 1;
    font-size: 9px;
  }

  .ring-sub-label {
    font-size: 0px;
    font-weight: 400;
    fill: var(--text-muted);
    text-anchor: middle;
    dominant-baseline: central;
    opacity: 0;
    transition: opacity var(--ring-tr), font-size var(--ring-tr);
  }
  .sidebar.expanded .ring-sub-label {
    opacity: 1;
    font-size: 7px;
  }

  /* ═══════════════════════════════════════════════════════════════
     SIDEBAR NAV ITEMS
     ═══════════════════════════════════════════════════════════════ */
  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 100%;
    padding: 0 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    position: relative;
    border: 1px solid transparent;
  }
  .nav-item:hover {
    background: var(--bg-hover);
    color: var(--text);
  }
  .nav-item.active {
    background: rgba(108,140,255,.08);
    border-color: rgba(108,140,255,.15);
  }
  .nav-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-icon svg {
    width: 16px;
    height: 16px;
  }
  .nav-label {
    font-size: 12px;
    opacity: 0;
    transition: opacity .28s;
  }
  .sidebar.expanded .nav-label {
    opacity: 1;
  }

  /* Active dot indicator */
  .nav-dot {
    position: absolute;
    right: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    opacity: 0;
    transition: opacity .25s, background .25s;
  }
  .nav-item.active .nav-dot {
    opacity: 1;
  }

  /* Sidebar divider */
  .sidebar-divider {
    width: 28px;
    height: 1px;
    background: var(--border-dim);
    margin: 6px 0;
    flex-shrink: 0;
    transition: width .3s;
  }
  .sidebar.expanded .sidebar-divider {
    width: calc(100% - 32px);
  }

  .sidebar-spacer { flex: 1; }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 0 8px;
    width: 100%;
    flex-shrink: 0;
  }
  .sidebar-footer .nav-item {
    cursor: default;
  }

  /* ═══════════════════════════════════════════════════════════════
     MAIN CONTENT AREA
     ═══════════════════════════════════════════════════════════════ */
  .main-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 24px 30px 40px;
    position: relative;
    z-index: 1;
  }
  .main-content::-webkit-scrollbar {
    width: 6px;
  }
  .main-content::-webkit-scrollbar-track {
    background: transparent;
  }
  .main-content::-webkit-scrollbar-thumb {
    background: #252d3d;
    border-radius: 3px;
  }
  .main-content::-webkit-scrollbar-thumb:hover {
    background: #334060;
  }

  /* ═══════════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════════ */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-left {}
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.3px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    padding: 4px 13px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid transparent;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .badge-run {
    background: rgba(108,140,255,.1);
    color: #8aa4ff;
    border-color: rgba(108,140,255,.2);
  }
  .badge-ok {
    background: rgba(52,211,153,.08);
    color: #34d399;
    border-color: rgba(52,211,153,.18);
  }
  .badge-time {
    background: rgba(251,146,60,.08);
    color: #fb923c;
    border-color: rgba(251,146,60,.18);
  }

  /* ═══════════════════════════════════════════════════════════════
     STATS ROW
     ═══════════════════════════════════════════════════════════════ */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .stat-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
  }
  .stat-sub {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ═══════════════════════════════════════════════════════════════
     MODULE SECTIONS (Level 1)
     ═══════════════════════════════════════════════════════════════ */
  .module-section {
    margin-bottom: 26px;
  }
  .module-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-dim);
  }
  .module-color-bar {
    width: 3px;
    height: 20px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .module-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.2px;
  }
  .module-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-left: 6px;
  }
  .module-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ═══════════════════════════════════════════════════════════════
     STEP CARDS (Level 2)
     ═══════════════════════════════════════════════════════════════ */
  .step-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }
  .step-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
    transition: border-color .25s, box-shadow .25s;
    cursor: default;
    overflow: hidden;
  }
  .step-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    border-radius: 10px 10px 0 0;
    opacity: .7;
  }
  .step-card:hover {
    border-color: rgba(108,140,255,.25);
    box-shadow: 0 0 24px rgba(108,140,255,.04);
  }
  .step-top {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 6px;
  }
  .step-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .step-info {
    flex: 1;
    min-width: 0;
  }
  .step-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .step-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .step-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Timing badge on step cards */
  .step-time {
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 6px;
    background: rgba(255,255,255,.03);
    border-radius: 6px;
    white-space: nowrap;
  }

  /* ═══════════════════════════════════════════════════════════════
     SUBTASKS (Level 3)
     ═══════════════════════════════════════════════════════════════ */
  .subtask-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,.03);
  }
  .subtask {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 11px;
    background: rgba(255,255,255,.012);
    transition: background .2s;
  }
  .subtask:hover {
    background: rgba(255,255,255,.035);
  }
  .subtask-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .subtask-name {
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .subtask-badge {
    padding: 1px 8px;
    border-radius: 9px;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════════════
     DEPENDENCY DOTS
     ═══════════════════════════════════════════════════════════════ */
  .dep-row {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    padding-top: 7px;
    border-top: 1px dashed rgba(255,255,255,.04);
  }
  .dep-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-right: 2px;
  }
  .dep-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1.5px solid;
    position: relative;
    cursor: default;
  }
  .dep-dot.filled::after {
    content: '';
    position: absolute;
    inset: 1.5px;
    border-radius: 50%;
    background: currentColor;
    opacity: .55;
  }

  /* ═══════════════════════════════════════════════════════════════
     SPINNERS
     ═══════════════════════════════════════════════════════════════ */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,.08);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin .75s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ═══════════════════════════════════════════════════════════════
     GLOW PULSE
     ═══════════════════════════════════════════════════════════════ */
  .glow {
    animation: glow-pulse 2.8s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 2px currentColor); }
    50%      { filter: drop-shadow(0 0 10px currentColor); }
  }

  /* ═══════════════════════════════════════════════════════════════
     PARTICLES CANVAS
     ═══════════════════════════════════════════════════════════════ */
  .particles-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: .3;
  }
  .main-content,
  .sidebar {
    position: relative;
    z-index: 1;
  }

  /* ═══════════════════════════════════════════════════════════════
     TOOLTIPS
     ═══════════════════════════════════════════════════════════════ */
  [data-tip] {
    position: relative;
  }
  [data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 7px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 11px;
    background: #1a2030;
    color: var(--text-bright);
    border: 1px solid var(--border);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }
  [data-tip]:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* Right-aligned tooltip variant */
  .tip-right[data-tip]::after {
    left: calc(100% + 8px);
    bottom: auto;
    top: 50%;
    transform: translateY(-50%) translateX(-4px);
  }
  .tip-right[data-tip]:hover::after {
    transform: translateY(-50%) translateX(0);
  }

  /* ═══════════════════════════════════════════════════════════════
     MODULE COLORS — theme tokens per module
     ═══════════════════════════════════════════════════════════════ */
  .clr-seed   { --mc: #f59e0b; }
  .clr-hypo   { --mc: #6c8cff; }
  .clr-invent { --mc: #a78bfa; }
  .clr-paper  { --mc: #34d399; }
  .clr-deploy { --mc: #f472b6; }
  .clr-eval   { --mc: #fb923c; }

  .clr-seed   .module-color-bar { background: #f59e0b; }
  .clr-hypo   .module-color-bar { background: #6c8cff; }
  .clr-invent .module-color-bar { background: #a78bfa; }
  .clr-paper  .module-color-bar { background: #34d399; }
  .clr-deploy .module-color-bar { background: #f472b6; }
  .clr-eval   .module-color-bar { background: #fb923c; }

  .clr-seed   .step-card::before { background: #f59e0b; }
  .clr-hypo   .step-card::before { background: #6c8cff; }
  .clr-invent .step-card::before { background: #a78bfa; }
  .clr-paper  .step-card::before { background: #34d399; }
  .clr-deploy .step-card::before { background: #f472b6; }
  .clr-eval   .step-card::before { background: #fb923c; }

  .clr-seed   .step-icon { background: rgba(245,158,11,.12); color: #f59e0b; }
  .clr-hypo   .step-icon { background: rgba(108,140,255,.12); color: #6c8cff; }
  .clr-invent .step-icon { background: rgba(167,139,250,.12); color: #a78bfa; }
  .clr-paper  .step-icon { background: rgba(52,211,153,.1);   color: #34d399; }
  .clr-deploy .step-icon { background: rgba(244,114,182,.1);  color: #f472b6; }
  .clr-eval   .step-icon { background: rgba(251,146,60,.1);   color: #fb923c; }

  .clr-seed   .module-badge { background: rgba(245,158,11,.1);  color: #f59e0b; }
  .clr-hypo   .module-badge { background: rgba(108,140,255,.1); color: #8aa4ff; }
  .clr-invent .module-badge { background: rgba(167,139,250,.1); color: #a78bfa; }
  .clr-paper  .module-badge { background: rgba(52,211,153,.08); color: #34d399; }
  .clr-deploy .module-badge { background: rgba(244,114,182,.08);color: #f472b6; }
  .clr-eval   .module-badge { background: rgba(251,146,60,.08); color: #fb923c; }

  /* ═══════════════════════════════════════════════════════════════
     LIVE LOG FEED
     ═══════════════════════════════════════════════════════════════ */
  .log-section {
    margin-top: 10px;
    margin-bottom: 28px;
  }
  .log-header {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .log-header .log-live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #34d399;
    animation: glow-pulse 2s ease-in-out infinite;
  }
  .log-feed {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    max-height: 130px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 11px;
    line-height: 1.7;
  }
  .log-feed::-webkit-scrollbar { width: 4px; }
  .log-feed::-webkit-scrollbar-thumb { background: #252d3d; border-radius: 2px; }
  .log-line {
    display: flex;
    gap: 8px;
  }
  .log-ts {
    color: var(--text-muted);
    flex-shrink: 0;

     - stroke color shifts to the module color
     - fill % changes (dashoffset)

     - dashed outline color shifts
     - inner glow color shifts

   ════════════════════════════════════════════════════════════════ */

  const glow      = document.getElementById('ringInnerGlow');
  const pctText   = document.getElementById('ringPct');

  const subLabel  = document.getElementById('ringSubLabel');

  const pct    = mod.fill;
  const offset = CIRC - (CIRC * pct / 100);
  const col    = mod.color;

  // Transition the fill arc
  fill.style.stroke           = col;
  fill.style.strokeDasharray  = String(CIRC);
  fill.style.strokeDashoffset = String(offset);
  fill.style.filter           = `drop-shadow(0 0 6px ${col}70)`;

  // Transition the dashed outline color
  dashed.style.stroke = col;

  // Transition the inner glow
  glow.style.stroke = col;

  // Update center text
  pctText.textContent   = pct + '%';
  labelText.textContent = mod.ringLabel;
  subLabel.textContent  = mod.statusText;
}

/* ════════════════════════════════════════════════════════════════
   SELECT MODULE
   ════════════════════════════════════════════════════════════════ */
function selectModule(idx) {
  activeIdx = idx;
  buildNav();
  updateRing(MODULES[idx]);
  scrollToModule(MODULES[idx].id);
}

function scrollToModule(id) {
  const el = document.getElementById('mod-' + id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

/* ════════════════════════════════════════════════════════════════
   STATUS RENDER HELPERS
   ════════════════════════════════════════════════════════════════ */
function subtaskBadge(st) {
  const map = {
    done:    { bg: 'rgba(52,211,153,.1)',   c: '#34d399', t: 'Done' },
    running: { bg: 'rgba(108,140,255,.1)',  c: '#8aa4ff', t: 'Running' },
    pending: { bg: 'rgba(255,255,255,.04)', c: 'var(--text-dim)', t: 'Pending' },
  };
  const s = map[st] || map.pending;
  return '<span class="subtask-badge" style="background:' + s.bg
       + ';color:' + s.c + '">' + s.t + '</span>';
}

function subtaskDot(st) {
  const colors = { done: '#34d399', running: '#6c8cff', pending: '#3a4259' };
  const c = colors[st] || colors.pending;
  return '<span class="subtask-dot" style="background:' + c + '"></span>';
}

function stepStatusIcon(st) {
  if (st === 'running') {
    return '<span class="spinner" style="color:#8aa4ff"></span>';
  }
  if (st === 'done') {
    return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" '
         + 'stroke="#34d399" stroke-width="2.5" stroke-linecap="round" '
         + 'stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  }
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" '
       + 'stroke="#3a4259" stroke-width="2" stroke-linecap="round" '
       + 'stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>';
}

function moduleStatusHTML(mod) {
  if (mod.status === 'done') {
    return '<span style="color:#34d399">Complete</span>';
  }
  if (mod.status === 'running') {
    return '<span class="glow" style="color:#8aa4ff">In Progress</span>';
  }
  return '<span style="color:var(--text-dim)">Queued</span>';
}

/* ════════════════════════════════════════════════════════════════
   RENDER: STATS ROW
   ════════════════════════════════════════════════════════════════ */
function renderStats() {
  const container = document.getElementById('statsRow');
  let html = '';
  STATS.forEach(s => {
    html += '<div class="stat-card">';
    html += '<div class="stat-label">' + s.label + '</div>';
    html += '<div class="stat-val">' + s.val + '</div>';
    html += '<div class="stat-sub">' + s.sub + '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════
   RENDER: LOG FEED
   ════════════════════════════════════════════════════════════════ */
function renderLog() {
  const feed = document.getElementById('logFeed');
  let html = '';
  LOG_LINES.forEach(l => {
    html += '<div class="log-line">';
    html += '<span class="log-ts">' + l.ts + '</span>';
    html += '<span class="log-level ' + l.level + '">'
          + l.level.toUpperCase() + '</span>';
    html += '<span class="log-msg">' + l.msg + '</span>';
    html += '</div>';
  });
  feed.innerHTML = html;
  feed.scrollTop = feed.scrollHeight;
}

/* ════════════════════════════════════════════════════════════════
   RENDER: MODULE CARDS
   ════════════════════════════════════════════════════════════════ */
function renderModules() {
  const container = document.getElementById('moduleContainer');
  let html = '';

  MODULES.forEach(mod => {
    html += '<div class="module-section ' + mod.cls + '" id="mod-' + mod.id + '">';

    // Module header (Level 1)
    html += '<div class="module-header">';
    html += '<div class="module-color-bar"></div>';
    html += '<span class="module-name">' + mod.name + '</span>';
    html += '<span class="module-badge">'
          + mod.stepsDone + '/' + mod.stepsTotal + '</span>';
    html += '<div class="module-right">';
    if (mod.elapsed !== '--') {
      html += '<span style="font-size:10px;color:var(--text-muted)">'
            + mod.elapsed + '</span>';
    }
    html += moduleStatusHTML(mod);
    html += '</div>';
    html += '</div>';

    // Step grid (Level 2)
    html += '<div class="step-grid">';
    mod.steps.forEach(step => {
      html += '<div class="step-card">';

      // Top row
      html += '<div class="step-top">';
      html += '<div class="step-icon">' + step.icon + '</div>';
      html += '<div class="step-info">';
      html += '<div class="step-name">' + step.name + '</div>';
      html += '<div class="step-desc">' + step.desc + '</div>';
      html += '</div>';
      html += '<div class="step-right">';
      if (step.time && step.time !== '--') {
        html += '<span class="step-time">' + step.time + '</span>';
      }
      html += stepStatusIcon(step.status);
      html += '</div>';
      html += '</div>';

      // Subtasks (Level 3)
      if (step.subs && step.subs.length > 0) {
        html += '<div class="subtask-list">';
        step.subs.forEach(sub => {
          html += '<div class="subtask">';
          html += subtaskDot(sub.status);
          html += '<span class="subtask-name">' + sub.name + '</span>';
          html += subtaskBadge(sub.status);
          html += '</div>';
        });
        html += '</div>';
      }

      // Dependency dots
      if (step.deps && step.deps.length > 0) {
        html += '<div class="dep-row">';
        html += '<span class="dep-label">Deps:</span>';
        step.deps.forEach(d => {
          const c = d.filled ? '#34d399' : '#3a4259';
          html += '<span class="dep-dot ' + (d.filled ? 'filled' : '')
                + '" style="border-color:' + c + ';color:' + c
                + '" data-tip="' + d.label + '"></span>';
        });
        html += '</div>';
      }

      html += '</div>'; // .step-card
    });
    html += '</div>'; // .step-grid
    html += '</div>'; // .module-section
  });

  container.innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════
   SIDEBAR TOGGLE
   ════════════════════════════════════════════════════════════════ */
const sidebar = document.getElementById('sidebar');
const toggle  = document.getElementById('sidebarToggle');

toggle.addEventListener('click', () => {
  sidebar.classList.toggle('expanded');
  const isExp = sidebar.classList.contains('expanded');
  toggle.setAttribute('data-tip', isExp ? 'Collapse sidebar' : 'Expand sidebar');
});

/* ════════════════════════════════════════════════════════════════
   PARTICLE SYSTEM
   ════════════════════════════════════════════════════════════════ */
(function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const COUNT = 55;
  const CONNECT_DIST = 130;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() {
      this.reset(true);
    }

    reset(init) {
      this.x  = init ? Math.random() * W : (Math.random() < 0.5 ? -8 : W + 8);
      this.y  = Math.random() * H;
      this.r  = Math.random() * 1.3 + 0.3;
      this.vx = (Math.random() - 0.5) * 0.18;
      this.vy = (Math.random() - 0.5) * 0.18;
      this.a  = Math.random() * 0.45 + 0.12;
    }

    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < -15 || this.x > W + 15 ||
          this.y < -15 || this.y > H + 15) {
        this.reset(false);
      }
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(108,140,255,' + this.a + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < COUNT; i++) {
    particles.push(new Particle());
  }

  function frame() {
    ctx.clearRect(0, 0, W, H);

    // Draw connecting lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECT_DIST) {
          const alpha = 0.055 * (1 - dist / CONNECT_DIST);
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(108,140,255,' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // Update and draw particles
    for (let i = 0; i < particles.length; i++) {
      particles[i].update();
      particles[i].draw();
    }

    requestAnimationFrame(frame);
  }

  frame();
})();

/* ════════════════════════════════════════════════════════════════
   SIMULATED LIVE LOG UPDATES
   ════════════════════════════════════════════════════════════════ */
const SIMULATED_LOGS = [
  { level: 'info',  msg: 'Novelty check: verifying hypo #4 against 23 related papers' },
  { level: 'debug', msg: 'Scholar fetch batch 7/12 — 198 results parsed' },
  { level: 'info',  msg: 'Embedding similarity: hypo #4 novelty score = 0.847' },
  { level: 'ok',    msg: 'Novelty verification passed for hypo #4' },
  { level: 'info',  msg: 'Novelty check: processing hypo #5 — final candidate' },
  { level: 'warn',  msg: 'Token budget at 87% — switching to concise prompt mode' },
  { level: 'debug', msg: 'Context tracker: 1.04M tokens in, 312K tokens out' },
  { level: 'ok',    msg: 'Novelty verification complete — 4/5 hypotheses novel' },
  { level: 'info',  msg: 'Review loop: starting scope refinement critic...' },
];

let simLogIdx = 0;

function addSimulatedLog() {
  if (simLogIdx >= SIMULATED_LOGS.length) return;

  const entry = SIMULATED_LOGS[simLogIdx++];
  const now   = new Date();
  const ts    = String(now.getHours()).padStart(2, '0') + ':'
              + String(now.getMinutes()).padStart(2, '0') + ':'
              + String(now.getSeconds()).padStart(2, '0');

  const feed = document.getElementById('logFeed');
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML =
    '<span class="log-ts">' + ts + '</span>' +
    '<span class="log-level ' + entry.level + '">' +
    entry.level.toUpperCase() + '</span>' +
    '<span class="log-msg">' + entry.msg + '</span>';

  feed.appendChild(line);
  feed.scrollTop = feed.scrollHeight;

  // Schedule next log entry at a random interval
  if (simLogIdx < SIMULATED_LOGS.length) {
    setTimeout(addSimulatedLog, 3000 + Math.random() * 4000);
  }
}

// Start simulated logs after 5 seconds
setTimeout(addSimulatedLog, 5000);

/* ════════════════════════════════════════════════════════════════
   KEYBOARD NAVIGATION
   ════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
  // Arrow up/down to cycle modules
  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    selectModule(Math.min(activeIdx + 1, MODULES.length - 1));
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    selectModule(Math.max(activeIdx - 1, 0));
  } else if (e.key === 'e') {
    // Toggle sidebar expand
    sidebar.classList.toggle('expanded');
  }
});

/* ════════════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════════════ */
buildNav();
updateRing(MODULES[activeIdx]);
renderStats();
renderLog();
renderModules();
</script>
