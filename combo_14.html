<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Combo 14: Ring + Stacked Dot Rows</title>
<style>
  /* ── Reset & Base ────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0e17;
    --surface:   #111827;
    --border:    #1e293b;
    --text:      #e2e8f0;
    --dim:       #64748b;
    --accent:    #6366f1;
    --accent2:   #a78bfa;
    --cyan:      #22d3ee;
    --green:     #34d399;
    --glow:      rgba(99, 102, 241, 0.5);
    --glow-cyan: rgba(34, 211, 238, 0.45);
    --ring-size: 90px;
    --row-h:     35px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* ── Outer Shell ─────────────────────────────────────────────── */
  .shell {
    width: 720px;
    max-width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  /* ── Top Bar (ring + rows) ───────────────────────────────────── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Progress Ring ───────────────────────────────────────────── */
  .ring-wrap {
    flex-shrink: 0;
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .ring-svg {
    width: var(--ring-size);
    height: var(--ring-size);
    transform: rotate(-90deg);
    filter: drop-shadow(0 0 6px var(--glow));
  }

  .ring-track {
    fill: none;
    stroke: #1e293b;
    stroke-width: 6;
  }

  .ring-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    stroke: url(#ringGrad);
    transition: stroke-dashoffset 0.6s ease;
  }

  /* glow endpoint dot */
  .ring-endpoint {
    fill: var(--cyan);
    filter: drop-shadow(0 0 5px var(--glow-cyan));
    transition: cx 0.6s ease, cy 0.6s ease;
  }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: #fff;
    pointer-events: none;
  }

  /* ── Right Column (stacked rows) ─────────────────────────────── */
  .rows-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }

  /* ── Single Row ──────────────────────────────────────────────── */
  .dot-row {
    display: flex;
    align-items: center;
    height: var(--row-h);
    gap: 0;
  }

  .row-label {
    width: 62px;
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--dim);
    user-select: none;
  }

  .row-items {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: nowrap;
    position: relative;
  }

  /* ── Marker base ─────────────────────────────────────────────── */
  .marker {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s ease, color 0.2s ease, text-shadow 0.2s ease;
    user-select: none;
    outline: none;
    border: none;
    background: none;
    padding: 2px;
    font-family: inherit;
  }

  .marker:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }

  /* ── Diamond markers (Row 1 — Modules) ───────────────────────── */
  .diamond {
    font-size: 16px;
    color: var(--dim);
    line-height: 1;
  }

  .diamond.completed { color: var(--green); }
  .diamond.active    { color: var(--cyan); transform: scale(1.3); text-shadow: 0 0 8px var(--glow-cyan); }
  .diamond.pending   { color: #334155; }

  .dot-sep {
    font-size: 8px;
    color: #283044;
    pointer-events: none;
    user-select: none;
    padding: 0 1px;
  }

  /* ── Circle markers (Rows 2 & 3) ─────────────────────────────── */
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .dot.completed { background: var(--green); }
  .dot.active    { background: var(--cyan); transform: scale(1.35); box-shadow: 0 0 8px var(--glow-cyan); }
  .dot.pending   { background: #283044; }

  /* special "current-in-progress" ring dot */
  .dot.in-progress {
    background: transparent;
    border: 2.5px solid var(--cyan);
    box-shadow: 0 0 6px var(--glow-cyan);
  }

  .dot.in-progress.active {
    transform: scale(1.35);
    border-color: #fff;
    box-shadow: 0 0 10px var(--glow-cyan);
  }

  /* ── Empty / placeholder state ───────────────────────────────── */
  .row-empty {
    font-size: 11px;
    color: #334155;
    letter-spacing: 3px;
    padding-left: 2px;
  }

  /* ── Tooltip on hover ────────────────────────────────────────── */
  .marker { position: relative; }

  .marker .tip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: #1e293b;
    color: #cbd5e1;
    font-size: 10px;
    white-space: nowrap;
    padding: 3px 8px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 10;
  }

  .marker:hover .tip,
  .marker:focus .tip {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  /* ── Content Area ────────────────────────────────────────────── */
  .content {
    padding: 24px;
    min-height: 260px;
  }

  .content-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .content-sub {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 16px;
  }

  .content-body {
    font-size: 13px;
    line-height: 1.7;
    color: #94a3b8;
  }

  .content-body p + p { margin-top: 10px; }

  /* breadcrumb trail */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    font-size: 11px;
    color: var(--dim);
  }

  .breadcrumb span { opacity: 0.7; }
  .breadcrumb .bc-sep { opacity: 0.35; }
  .breadcrumb .bc-active { color: var(--cyan); opacity: 1; font-weight: 600; }

  /* ── Focus row indicator ─────────────────────────────────────── */
  .dot-row.focused .row-label { color: var(--cyan); }

  /* ── Keyboard hint ───────────────────────────────────────────── */
  .kb-hint {
    text-align: center;
    padding: 10px;
    font-size: 10px;
    color: #334155;
    border-top: 1px solid var(--border);
    letter-spacing: 0.3px;
  }

  kbd {
    display: inline-block;
    background: #1a2234;
    border: 1px solid #283044;
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
    color: #64748b;
    margin: 0 1px;
  }

  /* ── Pulse animation for active ring endpoint ────────────────── */
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.5; }
  }
  .ring-endpoint { animation: pulse-glow 2s ease-in-out infinite; }
</style>
</head>
<body>

<div class="shell" id="shell">
  <!-- ═══ Top Bar: Ring + Rows ═══ -->
  <div class="top-bar">

    <!-- Left: Progress Ring -->
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#6366f1"/>
            <stop offset="50%"  stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#22d3ee"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="50" cy="50" r="42"/>
        <circle class="ring-fill"  cx="50" cy="50" r="42"
                id="ringFill"
                stroke-dasharray="263.894"
                stroke-dashoffset="92.363"/>
        <circle class="ring-endpoint" cx="50" cy="50" r="4" id="ringDot"/>
      </svg>
      <div class="ring-label" id="ringLabel">65%</div>
    </div>

    <!-- Right: Stacked Rows -->
    <div class="rows-col" id="rowsCol">
      <!-- Row 1 — Modules (diamonds) -->
      <div class="dot-row" id="row0" data-row="0">
        <div class="row-label">Modules</div>
        <div class="row-items" id="row0Items"></div>
      </div>
      <!-- Row 2 — Steps (dots) -->
      <div class="dot-row" id="row1" data-row="1">
        <div class="row-label">Steps</div>
        <div class="row-items" id="row1Items"></div>
      </div>
      <!-- Row 3 — Items (dots) -->
      <div class="dot-row" id="row2" data-row="2">
        <div class="row-label">Items</div>
        <div class="row-items" id="row2Items"></div>
      </div>
    </div>
  </div>

  <!-- ═══ Content Area ═══ -->
  <div class="content" id="content"></div>

  <!-- ═══ Keyboard Hint ═══ -->
  <div class="kb-hint">
    <kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate within row &nbsp;&middot;&nbsp;
    <kbd>&uarr;</kbd> <kbd>&darr;</kbd> switch row
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════════════════════════════

const MODULES = [
  {
    id: 'seed',  name: 'Seed Hypotheses', status: 'completed',
    steps: [
      { id: 's1', name: 'Load Knowledge Graph', status: 'completed',
        items: [
          { id: 's1a', name: 'Parse ontology',    status: 'completed' },
          { id: 's1b', name: 'Build adjacency',   status: 'completed' },
          { id: 's1c', name: 'Embed nodes',       status: 'completed' },
        ]
      },
      { id: 's2', name: 'Sample Seed Triples', status: 'completed',
        items: [
          { id: 's2a', name: 'Triple extraction', status: 'completed' },
          { id: 's2b', name: 'Dedup & filter',    status: 'completed' },
        ]
      },
      { id: 's3', name: 'Generate Hypotheses', status: 'completed',
        items: [
          { id: 's3a', name: 'LLM generation',    status: 'completed' },
          { id: 's3b', name: 'Format & validate',  status: 'completed' },
          { id: 's3c', name: 'Persist to pool',   status: 'completed' },
        ]
      },
    ]
  },
  {
    id: 'hypo',  name: 'Hypothesis Loop', status: 'completed',
    steps: [
      { id: 'h1', name: 'Expand Hypothesis', status: 'completed',
        items: [
          { id: 'h1a', name: 'Context retrieval',  status: 'completed' },
          { id: 'h1b', name: 'Hypothesis rewrite', status: 'completed' },
        ]
      },
      { id: 'h2', name: 'Review Hypothesis', status: 'completed',
        items: [
          { id: 'h2a', name: 'Novelty check',      status: 'completed' },
          { id: 'h2b', name: 'Feasibility check',   status: 'completed' },
          { id: 'h2c', name: 'Score aggregation',   status: 'completed' },
        ]
      },
      { id: 'h3', name: 'Select Best', status: 'completed',
        items: [
          { id: 'h3a', name: 'Rank candidates',    status: 'completed' },
          { id: 'h3b', name: 'Apply threshold',    status: 'completed' },
        ]
      },
    ]
  },
  {
    id: 'inv',  name: 'Invention Loop', status: 'active',
    steps: [
      { id: 'i1', name: 'Gen Strategy', status: 'completed',
        items: [
          { id: 'i1a', name: 'Literature scan',    status: 'completed' },
          { id: 'i1b', name: 'Strategy draft',     status: 'completed' },
          { id: 'i1c', name: 'Feasibility gate',   status: 'completed' },
        ]
      },
      { id: 'i2', name: 'Gen Plan', status: 'completed',
        items: [
          { id: 'i2a', name: 'Section outline',    status: 'completed' },
          { id: 'i2b', name: 'Figure planning',    status: 'completed' },
        ]
      },
      { id: 'i3', name: 'Gen Paper Text', status: 'in-progress',
        items: [
          { id: 'i3a', name: 'Abstract & intro',   status: 'completed' },
          { id: 'i3b', name: 'Methods',            status: 'completed' },
          { id: 'i3c', name: 'Results',            status: 'completed' },
          { id: 'i3d', name: 'Discussion',         status: 'in-progress' },
          { id: 'i3e', name: 'References',         status: 'pending' },
        ]
      },
      { id: 'i4', name: 'Review Paper', status: 'pending',
        items: [
          { id: 'i4a', name: 'Internal review',    status: 'pending' },
          { id: 'i4b', name: 'Revision pass',      status: 'pending' },
        ]
      },
    ]
  },
  {
    id: 'repo',  name: 'Gen Paper Repo', status: 'pending',
    steps: [
      { id: 'r1', name: 'Gen Artifacts', status: 'pending',
        items: [
          { id: 'r1a', name: 'Code demos',    status: 'pending' },
          { id: 'r1b', name: 'Data tables',   status: 'pending' },
        ]
      },
      { id: 'r2', name: 'Gen Visualisations', status: 'pending',
        items: [
          { id: 'r2a', name: 'Figure render',     status: 'pending' },
          { id: 'r2b', name: 'Layout compose',    status: 'pending' },
        ]
      },
      { id: 'r3', name: 'Gen Full Paper', status: 'pending',
        items: [
          { id: 'r3a', name: 'LaTeX compile',     status: 'pending' },
          { id: 'r3b', name: 'PDF export',        status: 'pending' },
          { id: 'r3c', name: 'Repo packaging',    status: 'pending' },
        ]
      },
    ]
  },
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════

const state = {
  focusedRow: 0,       // 0=modules, 1=steps, 2=items
  moduleIdx:  2,       // currently selected module
  stepIdx:    2,       // currently selected step within module
  itemIdx:    3,       // currently selected item within step
};

// ═══════════════════════════════════════════════════════════════
//  PROGRESS RING
// ═══════════════════════════════════════════════════════════════

const RING_R = 42;
const RING_C = 2 * Math.PI * RING_R;  // ~263.894

function computeOverallProgress() {
  let total = 0;
  let done  = 0;
  for (const m of MODULES) {
    for (const s of m.steps) {
      for (const it of s.items) {
        total++;
        if (it.status === 'completed')    done += 1;
        else if (it.status === 'in-progress') done += 0.5;
      }
    }
  }
  return total === 0 ? 0 : done / total;
}

function updateRing() {
  const pct    = computeOverallProgress();
  const offset = RING_C * (1 - pct);
  const fill   = document.getElementById('ringFill');
  const dot    = document.getElementById('ringDot');
  const label  = document.getElementById('ringLabel');

  fill.setAttribute('stroke-dashoffset', offset.toFixed(2));
  label.textContent = Math.round(pct * 100) + '%';

  // position endpoint dot on the arc
  const angle = 2 * Math.PI * pct - Math.PI / 2;
  const cx    = 50 + RING_R * Math.cos(angle);
  const cy    = 50 + RING_R * Math.sin(angle);
  dot.setAttribute('cx', cx.toFixed(2));
  dot.setAttribute('cy', cy.toFixed(2));
}

// ═══════════════════════════════════════════════════════════════
//  ROW RENDERING
// ═══════════════════════════════════════════════════════════════

function renderRow0() {
  const container = document.getElementById('row0Items');
  container.innerHTML = '';

  MODULES.forEach((m, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'dot-sep';
      sep.textContent = '\u00B7';
      container.appendChild(sep);
    }

    const btn = document.createElement('button');
    btn.className = 'marker diamond';
    btn.dataset.row = '0';
    btn.dataset.idx = i;

    const isFilled = (m.status === 'completed' || m.status === 'active' || m.status === 'in-progress');
    const symbol   = isFilled ? '\u25C6' : '\u25C7';
    btn.textContent = symbol;

    if (m.status === 'completed')                btn.classList.add('completed');
    else if (m.status === 'active' || m.status === 'in-progress') btn.classList.add('active');
    else                                         btn.classList.add('pending');

    if (i === state.moduleIdx) btn.classList.add('active');

    // tooltip
    const tip = document.createElement('span');
    tip.className = 'tip';
    tip.textContent = m.name;
    btn.appendChild(tip);

    btn.addEventListener('click', () => selectModule(i));
    container.appendChild(btn);
  });
}

function renderRow1() {
  const container = document.getElementById('row1Items');
  container.innerHTML = '';

  const mod = MODULES[state.moduleIdx];
  if (!mod || mod.steps.length === 0) {
    const empty = document.createElement('span');
    empty.className = 'row-empty';
    empty.textContent = '\u2014';
    container.appendChild(empty);
    return;
  }

  mod.steps.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'marker dot';
    btn.dataset.row = '1';
    btn.dataset.idx = i;

    if (s.status === 'completed')       btn.classList.add('completed');
    else if (s.status === 'in-progress') btn.classList.add('in-progress');
    else                                 btn.classList.add('pending');

    if (i === state.stepIdx) btn.classList.add('active');

    const tip = document.createElement('span');
    tip.className = 'tip';
    tip.textContent = s.name;
    btn.appendChild(tip);

    btn.addEventListener('click', () => selectStep(i));
    container.appendChild(btn);
  });
}

function renderRow2() {
  const container = document.getElementById('row2Items');
  container.innerHTML = '';

  const mod  = MODULES[state.moduleIdx];
  const step = mod ? mod.steps[state.stepIdx] : null;

  if (!step || step.items.length === 0) {
    const empty = document.createElement('span');
    empty.className = 'row-empty';
    empty.textContent = '\u2014';
    container.appendChild(empty);
    return;
  }

  step.items.forEach((it, i) => {
    const btn = document.createElement('button');
    btn.className = 'marker dot';
    btn.dataset.row = '2';
    btn.dataset.idx = i;

    if (it.status === 'completed')       btn.classList.add('completed');
    else if (it.status === 'in-progress') btn.classList.add('in-progress');
    else                                  btn.classList.add('pending');

    if (i === state.itemIdx) btn.classList.add('active');

    const tip = document.createElement('span');
    tip.className = 'tip';
    tip.textContent = it.name;
    btn.appendChild(tip);

    btn.addEventListener('click', () => selectItem(i));
    container.appendChild(btn);
  });
}

function highlightFocusedRow() {
  document.querySelectorAll('.dot-row').forEach((el, i) => {
    el.classList.toggle('focused', i === state.focusedRow);
  });
}

// ═══════════════════════════════════════════════════════════════
//  CONTENT PANEL
// ═══════════════════════════════════════════════════════════════

const CONTENT_BLURBS = {
  completed:    'This step has finished successfully. All outputs have been persisted.',
  active:       'Currently executing. Intermediate results are being streamed.',
  'in-progress':'Work is in progress. Partial outputs available.',
  pending:      'Queued. This step will begin once its dependencies are satisfied.',
};

function renderContent() {
  const panel = document.getElementById('content');
  const mod   = MODULES[state.moduleIdx];
  const step  = mod  ? mod.steps[state.stepIdx]   : null;
  const item  = step ? step.items[state.itemIdx]   : null;

  // breadcrumb
  let bc = `<div class="breadcrumb">`;
  bc += `<span class="bc-active">${mod ? mod.name : ''}</span>`;
  if (step) {
    bc += `<span class="bc-sep">/</span>`;
    bc += `<span class="${item ? '' : 'bc-active'}">${step.name}</span>`;
  }
  if (item) {
    bc += `<span class="bc-sep">/</span>`;
    bc += `<span class="bc-active">${item.name}</span>`;
  }
  bc += `</div>`;

  // determine the deepest selected entity
  const target     = item || step || mod;
  const targetName = target ? target.name : 'Nothing selected';
  const status     = target ? target.status : 'pending';

  const statusLabel = {
    completed: 'Completed',
    active: 'Active',
    'in-progress': 'In Progress',
    pending: 'Pending',
  }[status] || status;

  const statusColor = {
    completed: 'var(--green)',
    active: 'var(--cyan)',
    'in-progress': 'var(--cyan)',
    pending: 'var(--dim)',
  }[status] || 'var(--dim)';

  let html = bc;
  html += `<div class="content-title">${targetName}</div>`;
  html += `<div class="content-sub" style="color:${statusColor}">${statusLabel}</div>`;
  html += `<div class="content-body">`;
  html += `<p>${CONTENT_BLURBS[status] || ''}</p>`;

  if (step && state.focusedRow >= 1) {
    html += `<p>Step <strong>${step.name}</strong> contains ${step.items.length} item${step.items.length !== 1 ? 's' : ''}.`;
    const completedCount = step.items.filter(x => x.status === 'completed').length;
    html += ` ${completedCount} of ${step.items.length} completed.</p>`;
  }

  if (mod && state.focusedRow === 0) {
    html += `<p>Module <strong>${mod.name}</strong> has ${mod.steps.length} steps. `;
    let totalItems = 0;
    let doneItems  = 0;
    for (const s of mod.steps) {
      for (const it of s.items) {
        totalItems++;
        if (it.status === 'completed') doneItems++;
      }
    }
    html += `Total items: ${totalItems}, done: ${doneItems}.</p>`;
  }

  html += `</div>`;
  panel.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
//  SELECTION ACTIONS
// ═══════════════════════════════════════════════════════════════

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function selectModule(i) {
  state.moduleIdx = clamp(i, 0, MODULES.length - 1);
  // reset child selections to first item
  state.stepIdx = 0;
  state.itemIdx = 0;
  // try to land on the active/in-progress step
  const mod = MODULES[state.moduleIdx];
  const activeStep = mod.steps.findIndex(s => s.status === 'active' || s.status === 'in-progress');
  if (activeStep !== -1) state.stepIdx = activeStep;
  resetItemIdx();
  fullRender();
}

function selectStep(i) {
  const mod = MODULES[state.moduleIdx];
  if (!mod) return;
  state.stepIdx = clamp(i, 0, mod.steps.length - 1);
  state.itemIdx = 0;
  resetItemIdx();
  fullRender();
}

function selectItem(i) {
  const step = currentStep();
  if (!step) return;
  state.itemIdx = clamp(i, 0, step.items.length - 1);
  fullRender();
}

function currentModule() { return MODULES[state.moduleIdx] || null; }
function currentStep()   { const m = currentModule(); return m ? m.steps[state.stepIdx] || null : null; }

function resetItemIdx() {
  const step = currentStep();
  if (!step || step.items.length === 0) {
    state.itemIdx = 0;
    return;
  }
  const activeItem = step.items.findIndex(it => it.status === 'active' || it.status === 'in-progress');
  state.itemIdx = activeItem !== -1 ? activeItem : 0;
}

// ═══════════════════════════════════════════════════════════════
//  FULL RENDER
// ═══════════════════════════════════════════════════════════════

function fullRender() {
  updateRing();
  renderRow0();
  renderRow1();
  renderRow2();
  highlightFocusedRow();
  renderContent();
}

// ═══════════════════════════════════════════════════════════════
//  KEYBOARD NAVIGATION
// ═══════════════════════════════════════════════════════════════

function rowLength(row) {
  if (row === 0) return MODULES.length;
  if (row === 1) {
    const m = currentModule();
    return m ? m.steps.length : 0;
  }
  if (row === 2) {
    const s = currentStep();
    return s ? s.items.length : 0;
  }
  return 0;
}

function currentIdxForRow(row) {
  if (row === 0) return state.moduleIdx;
  if (row === 1) return state.stepIdx;
  if (row === 2) return state.itemIdx;
  return 0;
}

function selectInRow(row, idx) {
  if (row === 0) selectModule(idx);
  else if (row === 1) selectStep(idx);
  else if (row === 2) selectItem(idx);
}

document.addEventListener('keydown', (e) => {
  const key = e.key;

  if (key === 'ArrowUp') {
    e.preventDefault();
    state.focusedRow = clamp(state.focusedRow - 1, 0, 2);
    // skip empty rows
    while (state.focusedRow > 0 && rowLength(state.focusedRow) === 0) {
      state.focusedRow--;
    }
    fullRender();
    return;
  }

  if (key === 'ArrowDown') {
    e.preventDefault();
    state.focusedRow = clamp(state.focusedRow + 1, 0, 2);
    while (state.focusedRow < 2 && rowLength(state.focusedRow) === 0) {
      state.focusedRow++;
    }
    // if we landed on an empty row, go back
    if (rowLength(state.focusedRow) === 0) {
      state.focusedRow = clamp(state.focusedRow - 1, 0, 2);
    }
    fullRender();
    return;
  }

  if (key === 'ArrowLeft') {
    e.preventDefault();
    const row = state.focusedRow;
    const len = rowLength(row);
    if (len === 0) return;
    const cur = currentIdxForRow(row);
    selectInRow(row, clamp(cur - 1, 0, len - 1));
    return;
  }

  if (key === 'ArrowRight') {
    e.preventDefault();
    const row = state.focusedRow;
    const len = rowLength(row);
    if (len === 0) return;
    const cur = currentIdxForRow(row);
    selectInRow(row, clamp(cur + 1, 0, len - 1));
    return;
  }
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════

fullRender();
</script>
</body>
</html>
