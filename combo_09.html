<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Diamond-in-Ring Module Cards</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0c14;--surface:#11131e;--border:#1e2236;
    --text:#d4d8f0;--text-dim:#6b7094;--text-bright:#f0f2ff;
    --accent-1:#6366f1;--accent-2:#22d3ee;--accent-3:#a78bfa;--accent-4:#f472b6;
    --glow-1:rgba(99,102,241,.25);--glow-2:rgba(34,211,238,.25);
    --glow-3:rgba(167,139,250,.25);--glow-4:rgba(244,114,182,.25);
    --ring-track:rgba(255,255,255,.06);
    --row-gap:18px;--card-w:158px;--card-h:62px;--ring-sz:32px;
    --trans-slide:.38s cubic-bezier(.22,1,.36,1);
    --trans-fade:.28s ease;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif}

  /* ---------- layout ---------- */
  #app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  #nav-area{flex:0 0 auto;padding:28px 32px 0;display:flex;flex-direction:column;align-items:center;gap:var(--row-gap)}
  #content-area{flex:1 1 auto;overflow-y:auto;padding:24px 40px 40px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

  /* ---------- row containers ---------- */
  .row{display:flex;align-items:center;justify-content:center;gap:14px;position:relative;min-height:0;overflow:hidden;transition:max-height var(--trans-slide),opacity var(--trans-fade),margin var(--trans-slide)}
  .row.collapsed{max-height:0!important;opacity:0;margin:0!important;pointer-events:none}
  #row-modules{max-height:80px}
  #row-sub{max-height:50px}
  #row-detail{max-height:50px}

  /* ---------- connector lines between module cards ---------- */
  #connectors{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  #connectors line{stroke:var(--border);stroke-width:1.2;stroke-dasharray:5 4}
  @keyframes dashScroll{to{stroke-dashoffset:-18}}
  #connectors line{animation:dashScroll 1.6s linear infinite}

  /* ---------- module card ---------- */
  .mod-card{
    position:relative;width:var(--card-w);height:var(--card-h);
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    display:flex;align-items:center;gap:10px;padding:0 12px;
    cursor:pointer;user-select:none;
    transition:border-color .22s,box-shadow .22s,transform .18s;
    z-index:2;
  }
  .mod-card::before{
    content:'';position:absolute;inset:-6px;border-radius:18px;
    opacity:0;transition:opacity .28s;pointer-events:none;z-index:-1;
  }
  .mod-card:hover{transform:translateY(-2px)}
  .mod-card:hover::before{opacity:1}
  .mod-card.selected{border-color:var(--accent);transform:translateY(-2px)}
  .mod-card.selected::before{opacity:1}
  .mod-card.focused{outline:2px solid var(--accent);outline-offset:2px}

  /* per-card accent overrides */
  .mod-card[data-idx="0"]{--accent:var(--accent-1);--glow:var(--glow-1)}
  .mod-card[data-idx="1"]{--accent:var(--accent-2);--glow:var(--glow-2)}
  .mod-card[data-idx="2"]{--accent:var(--accent-3);--glow:var(--glow-3)}
  .mod-card[data-idx="3"]{--accent:var(--accent-4);--glow:var(--glow-4)}
  .mod-card::before{background:var(--glow)}
  .mod-card.selected{border-color:var(--accent)}

  /* ring gauge */
  .ring-wrap{width:var(--ring-sz);height:var(--ring-sz);flex-shrink:0;position:relative}
  .ring-wrap svg{width:100%;height:100%}
  .ring-track{fill:none;stroke:var(--ring-track);stroke-width:3}
  .ring-fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}

  /* diamond inside ring */
  .diamond{
    position:absolute;top:50%;left:50%;width:8px;height:8px;
    background:var(--accent);transform:translate(-50%,-50%) rotate(45deg);
    border-radius:1.5px;box-shadow:0 0 6px var(--glow);
    transition:transform .25s,box-shadow .25s;
  }
  .mod-card.selected .diamond{transform:translate(-50%,-50%) rotate(45deg) scale(1.25);box-shadow:0 0 12px var(--glow)}

  /* card text */
  .card-text{display:flex;flex-direction:column;gap:1px;overflow:hidden}
  .card-label{font-size:11.5px;font-weight:600;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-metric{font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums}

  /* ---------- dot rows (sub-module / detail) ---------- */
  .dot-row{display:flex;align-items:center;gap:10px;justify-content:center}
  .dot-item{
    display:flex;align-items:center;gap:6px;
    padding:6px 14px;border-radius:20px;
    background:var(--surface);border:1px solid var(--border);
    cursor:pointer;user-select:none;
    transition:border-color .2s,background .2s,transform .16s;
    font-size:11px;color:var(--text);white-space:nowrap;
  }
  .dot-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:box-shadow .2s}
  .dot-item:hover{border-color:var(--accent);transform:translateY(-1px)}
  .dot-item.selected{border-color:var(--accent);background:rgba(255,255,255,.03)}
  .dot-item.selected .dot{box-shadow:0 0 8px var(--glow)}
  .dot-item.focused{outline:2px solid var(--accent);outline-offset:2px}

  /* ---------- breadcrumb trail ---------- */
  #breadcrumb{
    font-size:10.5px;color:var(--text-dim);text-align:center;
    min-height:16px;transition:opacity var(--trans-fade);
  }
  #breadcrumb span{cursor:pointer;transition:color .15s}
  #breadcrumb span:hover{color:var(--text-bright)}
  #breadcrumb .sep{margin:0 5px;opacity:.4}

  /* ---------- content panel ---------- */
  .content-block{
    max-width:720px;margin:0 auto;
    opacity:0;transform:translateY(10px);
    animation:fadeUp .4s .08s forwards;
  }
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  .content-block h2{font-size:17px;font-weight:700;color:var(--text-bright);margin-bottom:8px}
  .content-block h3{font-size:13.5px;font-weight:600;color:var(--accent);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  .content-block p{font-size:13px;line-height:1.65;color:var(--text-dim);margin-bottom:10px}
  .content-block ul{padding-left:18px;margin-bottom:10px}
  .content-block li{font-size:12.5px;line-height:1.6;color:var(--text-dim);margin-bottom:4px}
  .content-block code{font-size:11.5px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:4px;color:var(--accent-2)}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
  .stat-cell{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
  .stat-cell .val{font-size:18px;font-weight:700;color:var(--text-bright)}
  .stat-cell .lbl{font-size:10px;color:var(--text-dim);margin-top:2px}

  /* ---------- key hints ---------- */
  #key-hints{
    position:fixed;bottom:12px;right:16px;
    display:flex;gap:6px;align-items:center;
    font-size:10px;color:var(--text-dim);opacity:.55;
  }
  .key{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:20px;height:18px;padding:0 4px;
    border:1px solid var(--border);border-radius:4px;
    font-size:9px;color:var(--text-dim);background:var(--surface);
  }
</style>
</head>
<body>
<div id="app">

  <div id="nav-area">

  </div>

  <!-- Scrollable content -->

  </div>
</div>

<div id="key-hints">
  <span class="key">&larr;</span><span class="key">&rarr;</span> navigate

  <span style="margin-left:4px" class="key">&uarr;</span> collapse

</div>

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

/* ================================================================
   RENDER — MODULE CARDS (ROW 1)
   ================================================================ */
function renderModuleCards() {
  const row = $("#row-modules");
  // keep SVG, remove old cards
  row.querySelectorAll(".mod-card").forEach(c => c.remove());

  DATA.forEach((mod, i) => {
    const card = document.createElement("div");
    card.className = "mod-card" + (i === state.modIdx ? " selected" : "");
    card.dataset.idx = i;

    const circumference = Math.PI * 2 * 12; // r=12
    const offset = circumference * (1 - mod.pct / 100);

    card.innerHTML = `
      <div class="ring-wrap">
        <svg viewBox="0 0 32 32">
          <circle class="ring-track" cx="16" cy="16" r="12"/>
          <circle class="ring-fill" cx="16" cy="16" r="12"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"
            transform="rotate(-90 16 16)"/>
        </svg>
        <div class="diamond"></div>
      </div>
      <div class="card-text">
        <div class="card-label">${mod.name}</div>
        <div class="card-metric">${mod.metric}</div>
      </div>
    `;
    card.addEventListener("click", () => selectModule(i));
    row.appendChild(card);
  });
  drawConnectors();
}

/* ================================================================
   RENDER — CONNECTOR LINES
   ================================================================ */
function drawConnectors() {
  const svg = $("#connectors");
  svg.innerHTML = "";
  const cards = $$("#row-modules .mod-card");
  if (cards.length < 2) return;

  const rowRect = $("#row-modules").getBoundingClientRect();
  svg.setAttribute("viewBox", `0 0 ${rowRect.width} ${rowRect.height}`);

  for (let i = 0; i < cards.length - 1; i++) {
    const a = cards[i].getBoundingClientRect();
    const b = cards[i + 1].getBoundingClientRect();
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", a.right - rowRect.left);
    line.setAttribute("y1", a.top + a.height / 2 - rowRect.top);
    line.setAttribute("x2", b.left - rowRect.left);
    line.setAttribute("y2", b.top + b.height / 2 - rowRect.top);
    svg.appendChild(line);
  }
}

/* ================================================================
   RENDER — SUB-MODULE DOTS (ROW 2)
   ================================================================ */
function renderSubDots() {
  const container = $("#sub-dots");
  container.innerHTML = "";
  const rowEl = $("#row-sub");

  if (state.modIdx < 0) { rowEl.classList.add("collapsed"); return; }

  const mod = DATA[state.modIdx];
  const accent = getComputedStyle(document.documentElement)
    .getPropertyValue(`--accent-${state.modIdx + 1}`).trim();

  mod.subs.forEach((sub, i) => {
    const el = document.createElement("div");
    el.className = "dot-item" + (i === state.subIdx ? " selected" : "");
    el.style.setProperty("--accent", accent);
    el.style.setProperty("--glow", `${accent}40`);
    el.innerHTML = `<span class="dot" style="background:${accent}"></span>${sub.name}`;
    el.addEventListener("click", () => selectSub(i));
    container.appendChild(el);
  });

  rowEl.classList.remove("collapsed");
}

/* ================================================================
   RENDER — DETAIL DOTS (ROW 3)
   ================================================================ */
function renderDetailDots() {
  const container = $("#detail-dots");
  container.innerHTML = "";
  const rowEl = $("#row-detail");

  if (state.modIdx < 0 || state.subIdx < 0) { rowEl.classList.add("collapsed"); return; }

  const sub = DATA[state.modIdx].subs[state.subIdx];
  if (!sub.details || sub.details.length === 0) { rowEl.classList.add("collapsed"); return; }

  const accent = getComputedStyle(document.documentElement)
    .getPropertyValue(`--accent-${state.modIdx + 1}`).trim();

  sub.details.forEach((det, i) => {
    const el = document.createElement("div");
    el.className = "dot-item" + (i === state.detIdx ? " selected" : "");
    el.style.setProperty("--accent", accent);
    el.style.setProperty("--glow", `${accent}40`);
    el.innerHTML = `<span class="dot" style="background:${accent}"></span>${det.name}`;
    el.addEventListener("click", () => selectDetail(i));
    container.appendChild(el);
  });

  rowEl.classList.remove("collapsed");
}

/* ================================================================
   RENDER — BREADCRUMB
   ================================================================ */
function renderBreadcrumb() {
  const el = $("#breadcrumb");
  const parts = [];
  if (state.modIdx >= 0) {
    parts.push(`<span data-action="mod">${DATA[state.modIdx].name}</span>`);
  }
  if (state.subIdx >= 0 && state.modIdx >= 0) {
    parts.push(`<span data-action="sub">${DATA[state.modIdx].subs[state.subIdx].name}</span>`);
  }
  if (state.detIdx >= 0 && state.subIdx >= 0 && state.modIdx >= 0) {
    const det = DATA[state.modIdx].subs[state.subIdx].details;
    if (det && det[state.detIdx]) {
      parts.push(`<span data-action="det">${det[state.detIdx].name}</span>`);
    }
  }
  el.innerHTML = parts.join('<span class="sep">/</span>');

  // breadcrumb click navigation
  el.querySelectorAll("span[data-action]").forEach(sp => {
    sp.addEventListener("click", () => {
      const action = sp.dataset.action;
      if (action === "mod") { state.subIdx = -1; state.detIdx = -1; state.focusRow = 0; }
      else if (action === "sub") { state.detIdx = -1; state.focusRow = 1; }
      renderAll();
    });
  });
}

/* ================================================================
   RENDER — CONTENT
   ================================================================ */
function renderContent() {
  const el = $("#content");
  let data = null;
  if (state.detIdx >= 0 && state.subIdx >= 0 && state.modIdx >= 0) {
    const dets = DATA[state.modIdx].subs[state.subIdx].details;
    if (dets && dets[state.detIdx]) data = dets[state.detIdx].content;
  } else if (state.subIdx >= 0 && state.modIdx >= 0) {
    data = DATA[state.modIdx].subs[state.subIdx].content;
  } else if (state.modIdx >= 0) {
    data = DATA[state.modIdx].content;
  }

  if (!data) { el.innerHTML = ""; return; }

  // re-trigger animation
  el.style.animation = "none";
  void el.offsetHeight;
  el.style.animation = "";

  el.innerHTML = `<h2>${data.title}</h2>${data.body}`;
}

/* ================================================================
   RENDER — FOCUS RINGS
   ================================================================ */
function renderFocus() {
  $$(".mod-card").forEach(c => c.classList.remove("focused"));
  $$(".dot-item").forEach(d => d.classList.remove("focused"));

  if (state.focusRow === 0) {
    const cards = $$("#row-modules .mod-card");
    if (cards[state.focusCol]) cards[state.focusCol].classList.add("focused");
  } else if (state.focusRow === 1) {
    const dots = $$("#sub-dots .dot-item");
    if (dots[state.focusCol]) dots[state.focusCol].classList.add("focused");
  } else if (state.focusRow === 2) {
    const dots = $$("#detail-dots .dot-item");
    if (dots[state.focusCol]) dots[state.focusCol].classList.add("focused");
  }
}

/* ================================================================
   RENDER ALL
   ================================================================ */
function renderAll() {
  renderModuleCards();
  renderSubDots();
  renderDetailDots();
  renderBreadcrumb();
  renderContent();
  renderFocus();
}

/* ================================================================
   SELECTION LOGIC
   ================================================================ */
function selectModule(i) {
  if (state.modIdx === i) return; // already selected
  state.modIdx = i;
  state.subIdx = -1;
  state.detIdx = -1;
  state.focusRow = 0;
  state.focusCol = i;
  renderAll();
}

function selectSub(i) {
  if (state.subIdx === i) return;
  state.subIdx = i;
  state.detIdx = -1;
  state.focusRow = 1;
  state.focusCol = i;
  renderAll();
}

function selectDetail(i) {
  if (state.detIdx === i) return;
  state.detIdx = i;
  state.focusRow = 2;
  state.focusCol = i;
  renderAll();
}

/* ================================================================
   KEYBOARD NAVIGATION
   ================================================================ */
function getRowLength(row) {
  if (row === 0) return DATA.length;
  if (row === 1 && state.modIdx >= 0) return DATA[state.modIdx].subs.length;
  if (row === 2 && state.modIdx >= 0 && state.subIdx >= 0) {
    const dets = DATA[state.modIdx].subs[state.subIdx].details;
    return dets ? dets.length : 0;
  }
  return 0;
}

function isRowVisible(row) {
  if (row === 0) return true;
  if (row === 1) return state.modIdx >= 0;
  if (row === 2) return state.modIdx >= 0 && state.subIdx >= 0 &&
    DATA[state.modIdx].subs[state.subIdx].details &&
    DATA[state.modIdx].subs[state.subIdx].details.length > 0;
  return false;
}

document.addEventListener("keydown", (e) => {
  const key = e.key;
  if (!["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Enter"," "].includes(key)) return;
  e.preventDefault();

  const len = getRowLength(state.focusRow);

  switch (key) {
    case "ArrowLeft":
      state.focusCol = (state.focusCol - 1 + len) % len;
      renderFocus();
      break;

    case "ArrowRight":
      state.focusCol = (state.focusCol + 1) % len;
      renderFocus();
      break;

    case "ArrowDown": {
      // If at row 0, select the focused module and drop to row 1
      if (state.focusRow === 0) {
        state.modIdx = state.focusCol;
        state.subIdx = -1;
        state.detIdx = -1;
        renderAll();
        // now move focus to row 1 if visible
        if (isRowVisible(1)) {
          state.focusRow = 1;
          state.focusCol = 0;
          renderFocus();
        }
      }
      // If at row 1, select the focused sub and drop to row 2
      else if (state.focusRow === 1) {
        state.subIdx = state.focusCol;
        state.detIdx = -1;
        renderAll();
        if (isRowVisible(2)) {
          state.focusRow = 2;
          state.focusCol = 0;
          renderFocus();
        }
      }
      break;
    }

    case "ArrowUp": {
      // Move focus up one row
      if (state.focusRow === 2) {
        state.detIdx = -1;
        state.focusRow = 1;
        state.focusCol = Math.min(state.focusCol, getRowLength(1) - 1);
        renderAll();
      } else if (state.focusRow === 1) {
        state.subIdx = -1;
        state.detIdx = -1;
        state.focusRow = 0;
        state.focusCol = state.modIdx >= 0 ? state.modIdx : 0;
        renderAll();
      }
      break;
    }

    case "Enter":
    case " ": {
      // Activate the focused item
      if (state.focusRow === 0) {
        selectModule(state.focusCol);
      } else if (state.focusRow === 1) {
        selectSub(state.focusCol);
      } else if (state.focusRow === 2) {
        selectDetail(state.focusCol);
      }
      break;
    }
  }
});

/* ================================================================
   RESIZE HANDLER
   ================================================================ */
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => drawConnectors(), 80);
});

/* ================================================================
   INIT
   ================================================================ */
renderAll();
// auto-select first module
selectModule(0);
</script>
</body>
</html>
