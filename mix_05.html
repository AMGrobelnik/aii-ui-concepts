<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Mix 05: XL Sub-Module Cards</title>
<style>
  /* ================================================================
     RESET & VARIABLES
     ================================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Slate palette */
    --s950: #020617;
    --s900: #0f172a;
    --s875: #111827;
    --s850: #131c31;
    --s800: #1e293b;
    --s750: #253347;
    --s700: #334155;
    --s650: #3d4f6a;
    --s600: #475569;
    --s500: #64748b;
    --s400: #94a3b8;
    --s300: #cbd5e1;
    --s200: #e2e8f0;
    --s100: #f1f5f9;

    /* Module accent colors */
    --c-seed: #34d399;
    --c-seed-dim: rgba(52, 211, 153, 0.10);
    --c-seed-mid: rgba(52, 211, 153, 0.18);
    --c-seed-glow: rgba(52, 211, 153, 0.35);
    --c-hypo: #a78bfa;
    --c-hypo-dim: rgba(167, 139, 250, 0.10);
    --c-hypo-mid: rgba(167, 139, 250, 0.18);
    --c-hypo-glow: rgba(167, 139, 250, 0.35);
    --c-inv: #60a5fa;
    --c-inv-dim: rgba(96, 165, 250, 0.10);
    --c-inv-mid: rgba(96, 165, 250, 0.18);
    --c-inv-glow: rgba(96, 165, 250, 0.35);
    --c-paper: #fbbf24;
    --c-paper-dim: rgba(251, 191, 36, 0.10);
    --c-paper-mid: rgba(251, 191, 36, 0.18);
    --c-paper-glow: rgba(251, 191, 36, 0.35);

    /* Layout */
    --sidebar-w: 340px;
    --header-h: 52px;
    --sub-h: 44px;
    --sub-dot: 14px;
    --sub-font: 14px;

    /* Transitions */
    --t-fast: 0.15s;
    --t-med: 0.25s;
    --t-slow: 0.4s;
  }

  html {
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--s950);
    color: var(--s300);
    height: 100vh;
    overflow: hidden;
  }

  /* ================================================================
     LAYOUT SHELL
     ================================================================ */
  .shell {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* ================================================================
     HEADER
     ================================================================ */
  .hdr {
    grid-column: 1 / -1;
    grid-row: 1;
    background: var(--s900);
    border-bottom: 1px solid var(--s800);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    z-index: 100;
    position: relative;
  }
  .hdr::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      var(--c-seed) 20%,
      var(--c-hypo) 40%,
      var(--c-inv) 60%,
      var(--c-paper) 80%,
      transparent
    );
    opacity: 0.25;
  }
  .hdr-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--s100);
    letter-spacing: 0.5px;
  }
  .hdr-logo-ic {
    width: 26px; height: 26px;
    background: linear-gradient(135deg, var(--c-seed), var(--c-inv));
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--s950);
    font-weight: 800;
  }
  .hdr-sep {
    width: 1px;
    height: 20px;
    background: var(--s700);
    margin: 0 4px;
  }
  .hdr-bc {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--s500);
  }
  .hdr-bc .bc-chevron { color: var(--s700); font-size: 10px; }
  .hdr-bc .bc-active { color: var(--c-inv); }
  .hdr-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hdr-status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: var(--s500);
  }
  .hdr-live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--c-seed);
    animation: hdr-pulse 2s ease-in-out infinite;
  }
  @keyframes hdr-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--c-seed); }
    50% { opacity: 0.5; box-shadow: 0 0 10px var(--c-seed); }
  }
  .hdr-run-id {
    font-size: 10px;
    color: var(--s600);
    background: var(--s850);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--s800);
    letter-spacing: 0.3px;
  }

  /* ================================================================
     SIDEBAR
     ================================================================ */
  .side {
    grid-column: 1;
    grid-row: 2;
    background: var(--s900);
    border-right: 1px solid var(--s800);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .side::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg,
      var(--c-seed) 0%, transparent 25%,
      transparent 75%, var(--c-paper) 100%
    );
    opacity: 0.12;
    pointer-events: none;
  }

  /* ── Sidebar scrollable ────────────────────────────── */
  .side-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px 20px;
  }
  .side-scroll::-webkit-scrollbar { width: 4px; }
  .side-scroll::-webkit-scrollbar-track { background: transparent; }
  .side-scroll::-webkit-scrollbar-thumb { background: var(--s700); border-radius: 2px; }

  /* ── Module group ──────────────────────────────────── */
  .mod-group {
    margin-bottom: 4px;
    position: relative;
  }

  /* ── Module header (collapsible) ───────────────────── */
  .mod-hdr {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 10px;
    cursor: pointer;
    border-radius: 6px;
    transition: background var(--t-fast) ease;
    user-select: none;
    position: relative;
    z-index: 2;
  }
  .mod-hdr:hover { background: var(--s850); }

  .mod-chevron {
    width: 16px; height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--s600);
    transition: transform var(--t-med) ease, color var(--t-med) ease;
    flex-shrink: 0;
  }
  .mod-group.collapsed .mod-chevron { transform: rotate(-90deg); }
  .mod-hdr:hover .mod-chevron { color: var(--s400); }

  .mod-ring {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--s700);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all var(--t-med) ease;
    position: relative;
  }
  .mod-ring-inner {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--s700);
    transition: all var(--t-med) ease;
  }

  .mod-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--s400);
    letter-spacing: 0.4px;
    flex: 1;
    transition: color var(--t-med) ease;
  }
  .mod-count {
    font-size: 10px;
    color: var(--s600);
    background: var(--s850);
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.2px;
    transition: all var(--t-med) ease;
  }

  /* Module states */
  .mod-group[data-state="done"] .mod-ring { border-color: var(--mod-color); }
  .mod-group[data-state="done"] .mod-ring-inner { background: var(--mod-color); }
  .mod-group[data-state="done"] .mod-label { color: var(--s300); }

  .mod-group[data-state="active"] .mod-ring {
    border-color: var(--mod-color);
    box-shadow: 0 0 10px var(--mod-glow);
    animation: ring-glow 2.5s ease-in-out infinite;
  }
  .mod-group[data-state="active"] .mod-ring-inner {
    background: var(--mod-color);
    animation: ring-inner-pulse 2.5s ease-in-out infinite;
  }
  .mod-group[data-state="active"] .mod-label { color: var(--s100); }
  .mod-group[data-state="active"] .mod-count {
    background: var(--mod-dim);
    color: var(--mod-color);
  }
  @keyframes ring-glow {
    0%, 100% { box-shadow: 0 0 8px var(--mod-glow); }
    50% { box-shadow: 0 0 16px var(--mod-glow); }
  }
  @keyframes ring-inner-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .mod-group[data-state="future"] .mod-ring { border-color: var(--s800); }
  .mod-group[data-state="future"] .mod-ring-inner { background: var(--s800); }
  .mod-group[data-state="future"] .mod-label { color: var(--s600); }
  .mod-group[data-state="future"] .mod-count { opacity: 0.4; }

  /* ── Colored tree lines ────────────────────────────── */
  .sub-tree {
    position: relative;
    padding-left: 26px;
    margin-left: 22px;
    overflow: hidden;
    transition: max-height var(--t-slow) ease, opacity var(--t-med) ease;
  }
  .mod-group.collapsed .sub-tree {
    max-height: 0 !important;
    opacity: 0;
    pointer-events: none;
  }
  .sub-tree::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 100%;
    background: var(--tree-color, var(--s800));
    border-radius: 1px;
    opacity: 0.5;
    transition: opacity var(--t-med) ease;
  }
  .mod-group[data-state="active"] .sub-tree::before,
  .mod-group[data-state="done"] .sub-tree::before { opacity: 0.8; }
  .mod-group[data-state="future"] .sub-tree::before { opacity: 0.2; }

  /* ── Sub-module branch line ────────────────────────── */
  .sub-item {
    position: relative;
    margin-bottom: 4px;
  }
  .sub-item::before {
    content: '';
    position: absolute;
    top: calc(var(--sub-h) / 2);
    left: -26px;
    width: 20px;
    height: 2px;
    background: var(--tree-color, var(--s800));
    opacity: 0.4;
    transition: opacity var(--t-med) ease;
  }
  .sub-item::after {
    content: '';
    position: absolute;
    top: calc(var(--sub-h) / 2);
    left: -8px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--tree-color, var(--s700));
    opacity: 0.5;
    transition: opacity var(--t-med) ease;
  }
  .sub-item[data-state="active"]::before,
  .sub-item[data-state="done"]::before { opacity: 0.8; }
  .sub-item[data-state="active"]::after,
  .sub-item[data-state="done"]::after { opacity: 1; }

  /* ── Sub-module card (EXTRA LARGE: 44px, 14px) ─────── */
  .sub-card {
    height: var(--sub-h);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    background: var(--s850);
    border: 1px solid var(--s800);
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--t-fast) ease;
    position: relative;
    overflow: hidden;
  }
  .sub-card:hover {
    background: var(--s800);
    border-color: var(--s700);
    transform: translateX(2px);
  }
  .sub-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity var(--t-fast) ease;
    pointer-events: none;
    border-radius: 5px;
  }

  /* Sub dot */
  .sub-dot {
    width: var(--sub-dot);
    height: var(--sub-dot);
    border-radius: 50%;
    background: var(--s700);
    flex-shrink: 0;
    transition: all var(--t-med) ease;
    position: relative;
    z-index: 1;
  }

  /* Sub label */
  .sub-label {
    font-size: var(--sub-font);
    color: var(--s500);
    letter-spacing: 0.2px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color var(--t-med) ease;
    position: relative;
    z-index: 1;
  }

  /* Sub status badge */
  .sub-badge {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--s800);
    color: var(--s600);
    flex-shrink: 0;
    transition: all var(--t-med) ease;
    position: relative;
    z-index: 1;
  }

  /* ── Sub states: Done ─────────────────────────────── */
  .sub-item[data-state="done"] .sub-card {
    background: var(--s850);
    border-color: var(--s750);
  }
  .sub-item[data-state="done"] .sub-dot {
    background: var(--tree-color, var(--s500));
    opacity: 0.7;
  }
  .sub-item[data-state="done"] .sub-label { color: var(--s400); }
  .sub-item[data-state="done"] .sub-badge {
    background: var(--mod-dim, var(--s800));
    color: var(--tree-color, var(--s500));
  }
  .sub-item[data-state="done"] .sub-card::before {
    background: linear-gradient(90deg, var(--mod-dim, transparent), transparent);
    opacity: 0.3;
  }

  /* ── Sub states: Active (colored bg tint + glow border) */
  .sub-item[data-state="active"] .sub-card {
    background: var(--mod-mid, var(--s800));
    border-color: var(--tree-color, var(--s600));
    box-shadow:
      0 0 12px var(--mod-glow, transparent),
      inset 0 0 20px var(--mod-dim, transparent);
  }
  .sub-item[data-state="active"] .sub-card::before {
    background: linear-gradient(135deg, var(--mod-dim, transparent), transparent 60%);
    opacity: 0.6;
  }
  .sub-item[data-state="active"] .sub-dot {
    background: var(--tree-color, var(--c-seed));
    box-shadow: 0 0 8px var(--mod-glow, transparent);
    animation: sub-dot-pulse 2s ease-in-out infinite;
  }
  .sub-item[data-state="active"] .sub-label {
    color: var(--s100);
    font-weight: 500;
  }
  .sub-item[data-state="active"] .sub-badge {
    background: var(--mod-dim, var(--s800));
    color: var(--tree-color, var(--c-seed));
  }
  @keyframes sub-dot-pulse {
    0%, 100% { box-shadow: 0 0 6px var(--mod-glow, transparent); transform: scale(1); }
    50% { box-shadow: 0 0 14px var(--mod-glow, transparent); transform: scale(1.12); }
  }

  /* ── Sub states: Future ───────────────────────────── */
  .sub-item[data-state="future"] .sub-card {
    background: var(--s875);
    border-color: var(--s850);
    opacity: 0.5;
  }
  .sub-item[data-state="future"] .sub-dot { background: var(--s800); }
  .sub-item[data-state="future"] .sub-label { color: var(--s600); }
  .sub-item[data-state="future"] .sub-badge { opacity: 0.3; }
  .sub-item[data-state="future"] .sub-card:hover { opacity: 0.7; }

  /* ── Sub selected overlay ─────────────────────────── */
  .sub-item.selected .sub-card {
    border-color: var(--tree-color, var(--c-inv)) !important;
    box-shadow: 0 0 16px var(--mod-glow, rgba(96,165,250,0.3)) !important;
  }

  /* ================================================================
     MAIN CONTENT
     ================================================================ */
  .main {
    grid-column: 2;
    grid-row: 2;
    background: var(--s950);
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--s800); border-radius: 3px; }

  /* ── Particle canvas ───────────────────────────────── */
  #particle-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* ── Content panel ─────────────────────────────────── */
  .content-wrap {
    position: relative;
    z-index: 1;
    padding: 32px 40px 60px;
    max-width: 900px;
    margin: 0 auto;
  }

  .content-title {
    font-size: 20px;
    font-weight: 600;
    color: var(--s100);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .content-title-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .content-subtitle {
    font-size: 12px;
    color: var(--s500);
    margin-bottom: 28px;
    letter-spacing: 0.3px;
  }

  /* ── Info cards ─────────────────────────────────────── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .info-card {
    background: var(--s900);
    border: 1px solid var(--s800);
    border-radius: 8px;
    padding: 16px 18px;
    transition: border-color var(--t-fast) ease;
  }
  .info-card:hover { border-color: var(--s700); }
  .info-card-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--s600);
    margin-bottom: 6px;
  }
  .info-card-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--s200);
  }
  .info-card-sub {
    font-size: 11px;
    color: var(--s500);
    margin-top: 4px;
  }

  /* ── Detail section ────────────────────────────────── */
  .detail-section {
    background: var(--s900);
    border: 1px solid var(--s800);
    border-radius: 8px;
    padding: 20px 22px;
    margin-bottom: 16px;
  }
  .detail-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--s500);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .detail-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--s800);
  }

  /* ── Log lines ─────────────────────────────────────── */
  .log-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .log-line {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 5px 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .log-time {
    color: var(--s600);
    font-size: 10px;
    flex-shrink: 0;
    min-width: 52px;
    margin-top: 2px;
  }
  .log-text { color: var(--s400); }
  .log-text .hl { color: var(--s200); font-weight: 500; }

  /* ── Progress bar ──────────────────────────────────── */
  .progress-wrap {
    margin-top: 12px;
  }
  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: var(--s800);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--s600);
  }

  /* ── Iterations list ───────────────────────────────── */
  .iter-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .iter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--s850);
    border: 1px solid var(--s800);
    border-radius: 6px;
    font-size: 12px;
    transition: background var(--t-fast) ease;
  }
  .iter-row:hover { background: var(--s800); }
  .iter-num {
    width: 22px; height: 22px;
    border-radius: 4px;
    background: var(--s800);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--s500);
    flex-shrink: 0;
  }
  .iter-label { flex: 1; color: var(--s400); }
  .iter-verdict {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .iter-verdict.pass {
    background: rgba(52,211,153,0.12);
    color: var(--c-seed);
  }
  .iter-verdict.fail {
    background: rgba(248,113,113,0.12);
    color: #f87171;
  }
  .iter-verdict.running {
    background: rgba(96,165,250,0.12);
    color: var(--c-inv);
    animation: badge-blink 1.8s ease-in-out infinite;
  }
  @keyframes badge-blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── Empty state ───────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--s600);
    font-size: 13px;
  }
  .empty-state-icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  /* ── Sidebar footer ────────────────────────────────── */
  .side-footer {
    flex-shrink: 0;
    padding: 10px 16px;
    border-top: 1px solid var(--s800);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 10px;
    color: var(--s600);
  }
  .side-footer-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 8px;
    background: var(--s850);
    border-radius: 4px;
    border: 1px solid var(--s800);
  }
  .side-footer-pill .pill-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--c-seed);
  }

/* ================================================================
   SIDEBAR RENDERER
   ================================================================ */
let selectedSub = 'inv-2';  // Default selection

function renderSidebar() {
  const container = document.getElementById('side-scroll');
  container.innerHTML = '';

  PIPELINE.forEach((mod, mi) => {
    const group = document.createElement('div');
    group.className = 'mod-group';
    group.dataset.state = mod.state;
    group.style.setProperty('--mod-color', mod.color);
    group.style.setProperty('--mod-dim', mod.colorDim);
    group.style.setProperty('--mod-mid', mod.colorMid);
    group.style.setProperty('--mod-glow', mod.colorGlow);
    group.style.setProperty('--tree-color', mod.color);

    // Module header
    const hdr = document.createElement('div');
    hdr.className = 'mod-hdr';
    hdr.innerHTML = `
      <div class="mod-chevron">&#9662;</div>
      <div class="mod-ring"><div class="mod-ring-inner"></div></div>
      <div class="mod-label">${mod.label}</div>
      <div class="mod-count">${mod.subs.length}</div>
    `;
    hdr.addEventListener('click', () => {
      group.classList.toggle('collapsed');
      updateTreeHeights();
    });
    group.appendChild(hdr);

    // Sub-tree
    const tree = document.createElement('div');
    tree.className = 'sub-tree';

    mod.subs.forEach((sub, si) => {
      const item = document.createElement('div');
      item.className = 'sub-item';
      item.dataset.state = sub.state;
      if (sub.id === selectedSub) item.classList.add('selected');
      item.style.animationDelay = `${si * 40}ms`;

      const stateLabel = sub.state === 'done' ? 'done' :
                         sub.state === 'active' ? 'running' : 'queued';

      item.innerHTML = `
        <div class="sub-card" data-id="${sub.id}">
          <div class="sub-dot"></div>
          <div class="sub-label">${sub.label}</div>
          <div class="sub-badge">${stateLabel}</div>
        </div>
      `;
      item.querySelector('.sub-card').addEventListener('click', () => {
        selectSub(sub.id, mod);
      });
      tree.appendChild(item);
    });

    group.appendChild(tree);
    container.appendChild(group);

    // Auto-collapse future modules
    if (mod.state === 'future') {
      group.classList.add('collapsed');
    }
  });

  updateTreeHeights();
}

function updateTreeHeights() {
  document.querySelectorAll('.sub-tree').forEach(tree => {
    if (!tree.closest('.mod-group').classList.contains('collapsed')) {
      tree.style.maxHeight = tree.scrollHeight + 'px';
    }
  });
}

function selectSub(subId, mod) {
  selectedSub = subId;

  // Update sidebar selection
  document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('selected'));
  const target = document.querySelector(`.sub-card[data-id="${subId}"]`);
  if (target) {
    target.closest('.sub-item').classList.add('selected');
    target.classList.add('flash');
    setTimeout(() => target.classList.remove('flash'), 300);
  }

  // Find module for this sub
  let parentMod = mod;
  if (!parentMod) {
    for (const m of PIPELINE) {
      if (m.subs.some(s => s.id === subId)) { parentMod = m; break; }
    }
  }

  renderContent(subId, parentMod);

  // Update breadcrumb
  const sub = parentMod.subs.find(s => s.id === subId);
  document.getElementById('bc-step').textContent = sub ? sub.label : '';
}

/* ================================================================
   CONTENT RENDERER
   ================================================================ */
function renderContent(subId, mod) {
  const wrap = document.getElementById('content-wrap');
  const data = CONTENT[subId];
  if (!data) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">&#9744;</div>
        <div>No data available for this step.</div>
      </div>
    `;
    return;
  }

  const sub = mod.subs.find(s => s.id === subId);
  const subState = sub ? sub.state : 'future';

  let html = '';

  // Title
  html += `
    <div class="content-title">
      <div class="content-title-dot" style="background: ${mod.colorHex};
        ${subState === 'active' ? 'box-shadow: 0 0 10px ' + mod.colorHex + ';' : ''}"></div>
      ${data.title}
    </div>
    <div class="content-subtitle">${data.subtitle}</div>
  `;

  // Info cards
  if (data.cards && data.cards.length) {
    html += '<div class="info-grid">';
    data.cards.forEach(c => {
      html += `
        <div class="info-card">
          <div class="info-card-label">${c.label}</div>
          <div class="info-card-value">${c.value}</div>
          <div class="info-card-sub">${c.sub}</div>
        </div>
      `;
    });
    html += '</div>';
  }

  // Progress bar for active steps
  if (subState === 'active' && data.iterations) {
    const done = data.iterations.filter(i => i.verdict === 'pass' || i.verdict === 'fail').length;
    const total = data.iterations.length + 16; // 24 total hypotheses
    const pct = Math.round((done / total) * 100);
    html += `
      <div class="detail-section">
        <div class="detail-section-title">Progress</div>
        <div class="progress-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: ${pct}%; background: linear-gradient(90deg, ${mod.colorHex}, ${mod.colorHex}88);"></div>
          </div>
          <div class="progress-label">
            <span>${done} of ${total} hypotheses processed</span>
            <span>${pct}%</span>
          </div>
        </div>
      </div>
    `;
  }

  // Iterations list
  if (data.iterations && data.iterations.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Iterations</div>';
    html += '<div class="iter-list">';
    data.iterations.forEach(it => {
      html += `
        <div class="iter-row">
          <div class="iter-num" style="${it.verdict === 'pass' ? 'background: var(--c-seed-dim); color: var(--c-seed);' :
                                         it.verdict === 'fail' ? 'background: rgba(248,113,113,0.12); color: #f87171;' :
                                         it.verdict === 'running' ? 'background: var(--c-inv-dim); color: var(--c-inv);' :
                                         ''}">#${it.num}</div>
          <div class="iter-label">${it.label}</div>
          <div class="iter-verdict ${it.verdict}">${it.verdict}</div>
        </div>
      `;
    });
    html += '</div></div>';
  }

  // Logs
  if (data.logs && data.logs.length) {
    html += '<div class="detail-section">';
    html += '<div class="detail-section-title">Activity Log</div>';
    html += '<div class="log-list">';
    data.logs.forEach(l => {
      html += `
        <div class="log-line">
          <span class="log-time">${l.time}</span>
          <span class="log-text">${l.text}</span>
        </div>
      `;
    });
    html += '</div></div>';
  }

  // Empty state for future steps
  if (subState === 'future') {
    html += `
      <div class="detail-section" style="text-align: center; padding: 40px 20px;">
        <div style="font-size: 24px; opacity: 0.3; margin-bottom: 8px;">&#9203;</div>
        <div style="font-size: 12px; color: var(--s600);">This step is queued and will begin when preceding steps complete.</div>
      </div>
    `;
  }

  wrap.innerHTML = html;
}

/* ================================================================
   PARTICLE SYSTEM
   ================================================================ */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 60;
const PARTICLE_COLORS = ['#34d399', '#a78bfa', '#60a5fa', '#fbbf24'];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.color = PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)];
    this.alpha = Math.random() * 0.3 + 0.05;
    this.alphaTarget = this.alpha;
    this.alphaSpeed = Math.random() * 0.005 + 0.002;
    this.life = Math.random() * 400 + 200;
    this.maxLife = this.life;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.life--;

    // Fade in/out based on life
    const lifeRatio = this.life / this.maxLife;
    if (lifeRatio > 0.8) {
      this.alpha = this.alphaTarget * ((1 - lifeRatio) / 0.2);
    } else if (lifeRatio < 0.2) {
      this.alpha = this.alphaTarget * (lifeRatio / 0.2);
    }

    // Gentle drift
    this.speedX += (Math.random() - 0.5) * 0.01;
    this.speedY += (Math.random() - 0.5) * 0.01;
    this.speedX *= 0.999;
    this.speedY *= 0.999;

    if (this.life <= 0 || this.x < -20 || this.x > canvas.width + 20 ||
        this.y < -20 || this.y > canvas.height + 20) {
      this.reset();
    }
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function initParticles() {
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }
}

function drawConnections() {
  const maxDist = 120;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * 0.06 * Math.min(particles[i].alpha, particles[j].alpha) * 5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = particles[i].color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  drawConnections();
  requestAnimationFrame(animateParticles);
}

/* ================================================================
   KEYBOARD NAVIGATION
   ================================================================ */
function getAllSubIds() {
  const ids = [];
  PIPELINE.forEach(mod => {
    mod.subs.forEach(sub => ids.push({ id: sub.id, modId: mod.id }));
  });
  return ids;
}

document.addEventListener('keydown', (e) => {
  const allSubs = getAllSubIds();
  const currentIdx = allSubs.findIndex(s => s.id === selectedSub);

  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    const next = allSubs[Math.min(currentIdx + 1, allSubs.length - 1)];
    if (next) {
      // Ensure parent module is expanded
      const mod = PIPELINE.find(m => m.id === next.modId);
      const group = document.querySelector(`.mod-group[data-state="${mod.state}"]`);
      expandModuleForSub(next.id);
      selectSub(next.id);
    }
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    const prev = allSubs[Math.max(currentIdx - 1, 0)];
    if (prev) {
      expandModuleForSub(prev.id);
      selectSub(prev.id);
    }
  } else if (e.key === 'c') {
    // Collapse/expand current module
    const currentMod = PIPELINE.find(m => m.subs.some(s => s.id === selectedSub));
    if (currentMod) {
      const groups = document.querySelectorAll('.mod-group');
      groups.forEach(g => {
        const label = g.querySelector('.mod-label').textContent;
        if (label === currentMod.label) {
          g.classList.toggle('collapsed');
          updateTreeHeights();
        }
      });
    }
  }
});

function expandModuleForSub(subId) {
  const mod = PIPELINE.find(m => m.subs.some(s => s.id === subId));
  if (mod) {
    const groups = document.querySelectorAll('.mod-group');
    groups.forEach(g => {
      const label = g.querySelector('.mod-label').textContent;
      if (label === mod.label && g.classList.contains('collapsed')) {
        g.classList.remove('collapsed');
        updateTreeHeights();
      }
    });
  }
}

/* ================================================================
   SCROLL ACTIVE SUB INTO VIEW
   ================================================================ */
function scrollActiveIntoView() {
  setTimeout(() => {
    const active = document.querySelector('.sub-item.selected .sub-card');
    if (active) {
      active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

/* ================================================================
   INIT
   ================================================================ */
function init() {
  resizeCanvas();
  window.addEventListener('resize', () => {
    resizeCanvas();
  });
  initParticles();
  animateParticles();
  renderSidebar();
  selectSub(selectedSub);
  scrollActiveIntoView();
}

init();
</script>
