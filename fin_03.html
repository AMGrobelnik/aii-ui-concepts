<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline — fin_03 (Strong Glassmorphism)</title>
<style>
/* ── Reset + Variables ───────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --s950: #020617; --s900: #0f172a; --s850: #131c2e;
  --s800: #1e293b; --s750: #253349; --s700: #334155;
  --s600: #475569; --s500: #64748b; --s400: #94a3b8;
  --s300: #cbd5e1; --s200: #e2e8f0; --s100: #f1f5f9;

  --c1: #38bdf8; --c1g: rgba(56,189,248,.18); --c1d: rgba(56,189,248,.55);
  --c2: #a78bfa; --c2g: rgba(167,139,250,.18); --c2d: rgba(167,139,250,.55);
  --c3: #34d399; --c3g: rgba(52,211,153,.18); --c3d: rgba(52,211,153,.55);
  --c4: #fb923c; --c4g: rgba(251,146,60,.18); --c4d: rgba(251,146,60,.55);

  /* strong glass tokens */
  --glass: rgba(15,23,42,.45);
  --glass-border: rgba(148,163,184,.12);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.02) 40%, transparent 60%);
  --glass-blur: 16px;
  --surface: rgba(30,41,59,.55);
  --surface-hi: rgba(51,65,85,.45);
  --radius: 12px; --radius-sm: 8px;
  --sidebar-w: 52px;
  font-size: 14px;
}

html { height: 100%; }
body {
  min-height: 100%; background: var(--s950); color: var(--s300);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow-x: hidden; line-height: 1.5;
}

/* subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(148,163,184,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,.03) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* radial ambience */
body::after {
  content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px; border-radius: 50%; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse, rgba(56,189,248,.04), transparent 70%);
}

#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── Collapsed Sidebar ──────────────────────────────────── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); z-index: 110;
  background: rgba(15,23,42,.55); backdrop-filter: blur(var(--glass-blur));
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0 14px; gap: 2px;
}

.sb-brand {
  width: 34px; height: 34px; border-radius: 8px; margin-bottom: 10px;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: #fff; letter-spacing: -.5px;
  box-shadow: 0 0 18px rgba(56,189,248,.25);
}

.sb-item {
  width: 36px; height: 36px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; position: relative;
  cursor: pointer; transition: all .25s ease; color: var(--s500);
  font-size: 15px; background: transparent;
}
.sb-item:hover { background: rgba(148,163,184,.08); color: var(--s400); }
.sb-item.active { background: rgba(56,189,248,.10); color: var(--c1); }
.sb-item.active::before {
  content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
  width: 3px; border-radius: 0 3px 3px 0; background: var(--c1);
  box-shadow: 0 0 8px var(--c1d);
}

/* sidebar tooltip */
.sb-tip {
  position: absolute; left: calc(var(--sidebar-w) + 8px); top: 50%;
  transform: translateY(-50%); padding: 4px 10px; border-radius: 6px;
  background: rgba(15,23,42,.92); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); font-size: 11.5px; color: var(--s200);
  white-space: nowrap; pointer-events: none; opacity: 0;
  transition: opacity .2s ease, transform .2s ease;
  transform: translateY(-50%) translateX(-4px);
}
.sb-item:hover .sb-tip { opacity: 1; transform: translateY(-50%) translateX(0); }
.sb-spacer { flex: 1; }

/* ── Header ──────────────────────────────────────────────── */
.header {
  position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: 46px; z-index: 100;
  display: flex; align-items: center; gap: 14px; padding: 0 22px;
  background: rgba(15,23,42,.50); backdrop-filter: blur(var(--glass-blur));
  border-bottom: 1px solid var(--glass-border);
}
.breadcrumb { font-size: 12px; color: var(--s500); white-space: nowrap; }
.breadcrumb b { color: var(--s300); font-weight: 600; }
.header-spacer { flex: 1; }

/* mini ring */
.header-ring { width: 36px; height: 36px; position: relative; flex-shrink: 0; }
.header-ring svg { width: 100%; height: 100%; }
.header-ring .ring-track { fill: none; stroke: var(--s700); stroke-width: 3; }
.header-ring .ring-fill {
  fill: none; stroke: var(--c1); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset .8s ease, stroke .5s ease;
  filter: drop-shadow(0 0 4px var(--c1d));
}
.header-ring .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 9px; font-weight: 700; color: var(--s200);
}
.header-ring::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1.5px dashed var(--c1d); opacity: .5;
  animation: ringRotate 12s linear infinite;
}
@keyframes ringRotate { to { transform: rotate(360deg); } }
.header-ring::before {
  content: ''; position: absolute; inset: -2px; border-radius: 50%;
  background: radial-gradient(circle, var(--c1g), transparent 70%);
  animation: ringGlow 2.5s ease-in-out infinite;
}
@keyframes ringGlow { 0%, 100% { opacity: .35; } 50% { opacity: .8; } }

.header-sep { width: 1px; height: 20px; background: var(--glass-border); flex-shrink: 0; }
.header-stat { font-size: 12px; color: var(--s400); white-space: nowrap; }
.header-stat strong { color: var(--s200); font-weight: 600; }
.header-stat .label {
  color: var(--s600); font-size: 10px; margin-right: 3px;
  text-transform: uppercase; letter-spacing: .4px;
}

/* ── Main Layout ─────────────────────────────────────────── */
.main {
  position: relative; z-index: 1;
  padding: 60px 24px 32px calc(var(--sidebar-w) + 20px);
  max-width: calc(1380px + var(--sidebar-w)); margin: 0 auto;
}

/* ── Module Cards Row ────────────────────────────────────── */
.modules-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; position: relative;
}
#particleCanvasH { position: absolute; inset: -10px -24px; z-index: 0; pointer-events: none; }

/* ── STRONG GLASSMORPHISM MODULE CARDS ───────────────────── */
.mod-card {
  position: relative; z-index: 1; cursor: pointer;
  background: var(--glass); backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px; transition: all .35s ease; overflow: hidden;
}

/* glass shine overlay */
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}

/* color glow HALO behind active card */
.mod-card .glow-halo {
  position: absolute; inset: -20px; border-radius: 24px;
  opacity: 0; transition: opacity .5s ease; pointer-events: none; z-index: -1;
  filter: blur(28px);
}
.mod-card[data-color="1"] .glow-halo { background: var(--c1); }
.mod-card[data-color="2"] .glow-halo { background: var(--c2); }
.mod-card[data-color="3"] .glow-halo { background: var(--c3); }
.mod-card[data-color="4"] .glow-halo { background: var(--c4); }
.mod-card.active .glow-halo { opacity: .14; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: .10; } 50% { opacity: .22; } }

/* inner glass card glow */
.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity .4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="1"]::before { box-shadow: 0 0 40px 10px var(--c1g), inset 0 0 20px var(--c1g); }
.mod-card[data-color="2"]::before { box-shadow: 0 0 40px 10px var(--c2g), inset 0 0 20px var(--c2g); }
.mod-card[data-color="3"]::before { box-shadow: 0 0 40px 10px var(--c3g), inset 0 0 20px var(--c3g); }
.mod-card[data-color="4"]::before { box-shadow: 0 0 40px 10px var(--c4g), inset 0 0 20px var(--c4g); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }

/* shimmer sweep */
.mod-card::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2;
}
.mod-card.active::after { animation: shimmerSweep 3s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card.active { border-color: rgba(148,163,184,.22); }
.mod-card:not(.active):hover {
  background: rgba(15,23,42,.55); border-color: rgba(148,163,184,.18);
  transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: .06; }

.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; position: relative; z-index: 3; }
.mc-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  position: relative;
}
/* spinner ring on running dot */
.mod-card[data-status="running"] .mc-dot::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 2px solid transparent; border-top-color: currentColor;
  animation: dotSpin 1s linear infinite;
}
@keyframes dotSpin { to { transform: rotate(360deg); } }

.mod-card[data-color="1"] .mc-dot { background: var(--c1); box-shadow: 0 0 8px var(--c1d); color: var(--c1); }
.mod-card[data-color="2"] .mc-dot { background: var(--c2); box-shadow: 0 0 8px var(--c2d); color: var(--c2); }
.mod-card[data-color="3"] .mc-dot { background: var(--c3); box-shadow: 0 0 8px var(--c3d); color: var(--c3); }
.mod-card[data-color="4"] .mc-dot { background: var(--c4); box-shadow: 0 0 8px var(--c4d); color: var(--c4); }
.mc-label { font-size: 13px; font-weight: 600; color: var(--s200); position: relative; z-index: 3; }
.mc-status { font-size: 11px; color: var(--s500); margin-left: auto; position: relative; z-index: 3; }
.mc-status.st-running { color: var(--c2); }
.mc-meta { display: flex; gap: 12px; margin-bottom: 8px; font-size: 11px; color: var(--s500); position: relative; z-index: 3; }
.mc-bar { height: 3px; border-radius: 2px; background: var(--s800); overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width .6s ease; }
.mod-card[data-color="1"] .mc-bar-fill { background: var(--c1); box-shadow: 0 0 6px var(--c1d); }
.mod-card[data-color="2"] .mc-bar-fill { background: var(--c2); box-shadow: 0 0 6px var(--c2d); }
.mod-card[data-color="3"] .mc-bar-fill { background: var(--c3); box-shadow: 0 0 6px var(--c3d); }
.mod-card[data-color="4"] .mc-bar-fill { background: var(--c4); box-shadow: 0 0 6px var(--c4d); }

/* ── Tree Columns Area ───────────────────────────────────── */
.tree-area {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-top: 14px; min-height: 200px; position: relative;
}
#particleCanvasT { position: absolute; inset: -10px -24px; z-index: 0; pointer-events: none; }
.tree-col { position: relative; z-index: 1; min-height: 60px; }
.tree-list { padding: 2px 0 0; list-style: none; }

.tree-node {
  display: flex; align-items: center; height: 38px; position: relative;
  opacity: 0; transform: translateY(8px);
  transition: opacity .28s ease, transform .28s ease;
}
.tree-col.visible .tree-node,
.tree-col.visible .tree-child-node { opacity: 1; transform: translateY(0); }

/* tree gutter (vertical + horizontal connector lines) */
.tree-gutter {
  display: flex; flex-direction: column; align-items: center;
  width: 24px; flex-shrink: 0; position: relative; align-self: stretch;
}
.tree-gutter::before {
  content: ''; position: absolute; left: 11px; top: 0; bottom: 0;
  width: 2px; border-radius: 1px;
}
.tree-node:last-child > .tree-gutter::before { bottom: 50%; }
.tree-gutter::after {
  content: ''; position: absolute; left: 11px; top: 50%;
  width: 10px; height: 2px; border-radius: 1px;
}

/* colored tree lines */
.tree-col[data-color="1"] .tree-gutter::before,
.tree-col[data-color="1"] .tree-gutter::after { background: rgba(56,189,248,.18); }
.tree-col[data-color="2"] .tree-gutter::before,
.tree-col[data-color="2"] .tree-gutter::after { background: rgba(167,139,250,.18); }
.tree-col[data-color="3"] .tree-gutter::before,
.tree-col[data-color="3"] .tree-gutter::after { background: rgba(52,211,153,.18); }
.tree-col[data-color="4"] .tree-gutter::before,
.tree-col[data-color="4"] .tree-gutter::after { background: rgba(251,146,60,.18); }

/* active branch glow */
.tree-node.active .tree-gutter::before,
.tree-node.active .tree-gutter::after { animation: branchGlow 2.5s ease-in-out infinite; }
.tree-col[data-color="1"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="1"] .tree-node.active .tree-gutter::after {
  background: rgba(56,189,248,.55); box-shadow: 0 0 6px rgba(56,189,248,.3);
}
.tree-col[data-color="2"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="2"] .tree-node.active .tree-gutter::after {
  background: rgba(167,139,250,.55); box-shadow: 0 0 6px rgba(167,139,250,.3);
}
.tree-col[data-color="3"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="3"] .tree-node.active .tree-gutter::after {
  background: rgba(52,211,153,.55); box-shadow: 0 0 6px rgba(52,211,153,.3);
}
.tree-col[data-color="4"] .tree-node.active .tree-gutter::before,
.tree-col[data-color="4"] .tree-node.active .tree-gutter::after {
  background: rgba(251,146,60,.55); box-shadow: 0 0 6px rgba(251,146,60,.3);
}
@keyframes branchGlow { 0%, 100% { opacity: .7; } 50% { opacity: 1; } }

/* ── 3-Level Tree: Level-2 Children ──────────────────────── */
.tree-children { list-style: none; padding: 0; margin: 0; }
.tree-child-node {
  display: flex; align-items: center; height: 34px; position: relative;
  opacity: 0; transform: translateY(6px);
  transition: opacity .28s ease, transform .28s ease;
}
.tree-child-gutter {
  display: flex; flex-direction: column; align-items: center;
  width: 20px; flex-shrink: 0; position: relative; align-self: stretch;
  margin-left: 24px;
}
.tree-child-gutter::before {
  content: ''; position: absolute; left: 9px; top: 0; bottom: 0;
  width: 1.5px; border-radius: 1px;
}
.tree-child-node:last-child > .tree-child-gutter::before { bottom: 50%; }
.tree-child-gutter::after {
  content: ''; position: absolute; left: 9px; top: 50%;
  width: 8px; height: 1.5px; border-radius: 1px;
}

/* child line colors */
.tree-col[data-color="1"] .tree-child-gutter::before,
.tree-col[data-color="1"] .tree-child-gutter::after { background: rgba(56,189,248,.12); }
.tree-col[data-color="2"] .tree-child-gutter::before,
.tree-col[data-color="2"] .tree-child-gutter::after { background: rgba(167,139,250,.12); }
.tree-col[data-color="3"] .tree-child-gutter::before,
.tree-col[data-color="3"] .tree-child-gutter::after { background: rgba(52,211,153,.12); }
.tree-col[data-color="4"] .tree-child-gutter::before,
.tree-col[data-color="4"] .tree-child-gutter::after { background: rgba(251,146,60,.12); }

/* active child line glow */
.tree-child-node.active .tree-child-gutter::before,
.tree-child-node.active .tree-child-gutter::after { animation: branchGlow 2.5s ease-in-out infinite; }
.tree-col[data-color="1"] .tree-child-node.active .tree-child-gutter::before,
.tree-col[data-color="1"] .tree-child-node.active .tree-child-gutter::after {
  background: rgba(56,189,248,.45); box-shadow: 0 0 5px rgba(56,189,248,.25);
}
.tree-col[data-color="2"] .tree-child-node.active .tree-child-gutter::before,
.tree-col[data-color="2"] .tree-child-node.active .tree-child-gutter::after {
  background: rgba(167,139,250,.45); box-shadow: 0 0 5px rgba(167,139,250,.25);
}
.tree-col[data-color="3"] .tree-child-node.active .tree-child-gutter::before,
.tree-col[data-color="3"] .tree-child-node.active .tree-child-gutter::after {
  background: rgba(52,211,153,.45); box-shadow: 0 0 5px rgba(52,211,153,.25);
}
.tree-col[data-color="4"] .tree-child-node.active .tree-child-gutter::before,
.tree-col[data-color="4"] .tree-child-node.active .tree-child-gutter::after {
  background: rgba(251,146,60,.45); box-shadow: 0 0 5px rgba(251,146,60,.25);
}
.tree-node.has-children > .tree-gutter::before { bottom: 0 !important; }

/* ── 3-Level Tree: Level-3 Grandchildren ─────────────────── */
.tree-grandchildren { list-style: none; padding: 0; margin: 0; }
.tree-grand-node {
  display: flex; align-items: center; height: 30px; position: relative;
  opacity: 0; transform: translateY(5px);
  transition: opacity .25s ease, transform .25s ease;
}
.tree-col.visible .tree-grand-node { opacity: 1; transform: translateY(0); }
.tree-grand-gutter {
  display: flex; flex-direction: column; align-items: center;
  width: 18px; flex-shrink: 0; position: relative; align-self: stretch;
  margin-left: 44px;
}
.tree-grand-gutter::before {
  content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
  width: 1px; border-radius: 1px;
}
.tree-grand-node:last-child > .tree-grand-gutter::before { bottom: 50%; }
.tree-grand-gutter::after {
  content: ''; position: absolute; left: 8px; top: 50%;
  width: 7px; height: 1px; border-radius: 1px;
}
.tree-col[data-color="1"] .tree-grand-gutter::before,
.tree-col[data-color="1"] .tree-grand-gutter::after { background: rgba(56,189,248,.08); }
.tree-col[data-color="2"] .tree-grand-gutter::before,
.tree-col[data-color="2"] .tree-grand-gutter::after { background: rgba(167,139,250,.08); }
.tree-col[data-color="3"] .tree-grand-gutter::before,
.tree-col[data-color="3"] .tree-grand-gutter::after { background: rgba(52,211,153,.08); }
.tree-col[data-color="4"] .tree-grand-gutter::before,
.tree-col[data-color="4"] .tree-grand-gutter::after { background: rgba(251,146,60,.08); }
.tree-grand-node.active .tree-grand-gutter::before,
.tree-grand-node.active .tree-grand-gutter::after { animation: branchGlow 2.5s ease-in-out infinite; }
.tree-col[data-color="3"] .tree-grand-node.active .tree-grand-gutter::before,
.tree-col[data-color="3"] .tree-grand-node.active .tree-grand-gutter::after {
  background: rgba(52,211,153,.35); box-shadow: 0 0 4px rgba(52,211,153,.2);
}

/* ── Tree Sub Cards (glass) ──────────────────────────────── */
.tree-sub {
  display: flex; align-items: center; gap: 7px; height: 32px; padding: 0 10px;
  background: var(--surface); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); font-size: 12.5px; color: var(--s400);
  cursor: pointer; transition: all .2s ease;
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-sub:hover { background: var(--surface-hi); color: var(--s300); }
.tree-node.active .tree-sub {
  color: var(--s200); border-color: rgba(148,163,184,.18); background: var(--surface-hi);
}
.tree-node.done .tree-sub { color: var(--s500); }

.tree-child-sub {
  display: flex; align-items: center; gap: 6px; height: 28px; padding: 0 8px;
  background: rgba(30,41,59,.40); backdrop-filter: blur(8px);
  border: 1px solid rgba(148,163,184,.07);
  border-radius: 6px; font-size: 11.5px; color: var(--s500);
  cursor: pointer; transition: all .2s ease;
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-child-sub:hover { background: var(--surface-hi); color: var(--s400); }
.tree-child-node.active .tree-child-sub {
  color: var(--s200); border-color: rgba(148,163,184,.15); background: var(--surface-hi);
}
.tree-child-node.done .tree-child-sub { color: var(--s500); }

.tree-grand-sub {
  display: flex; align-items: center; gap: 5px; height: 24px; padding: 0 7px;
  background: rgba(30,41,59,.30); backdrop-filter: blur(6px);
  border: 1px solid rgba(148,163,184,.05); border-radius: 5px;
  font-size: 10.5px; color: var(--s500); cursor: pointer; transition: all .2s ease;
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tree-grand-sub:hover { background: var(--surface-hi); color: var(--s400); }
.tree-grand-node.active .tree-grand-sub { color: var(--s300); border-color: rgba(148,163,184,.12); }
.tree-grand-node.done .tree-grand-sub { color: var(--s600); }

/* ── Tree Dots (dependency pulse on active) ──────────────── */

/* ── Render: Tree Columns (3-level support) ──────────────── */
function renderTreeColumns() {
  const area = document.getElementById('treeArea');
  area.querySelectorAll('.tree-col').forEach(c => c.remove());

  MODULES.forEach((m, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col';
    col.dataset.color = m.color;
    col.dataset.idx = mi;
    const isActive = mi === activeModule;
    const isDone = m.status === 'done';
    const isQueued = m.status === 'queued';

    if (!isActive && isQueued) {
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#9654;</span>${m.subs.length} sub-modules &middot; queued</div>`;
    } else if (!isActive && isDone) {
      col.innerHTML = `<div class="tree-collapsed" onclick="selectModule(${mi})">
        <span class="tc-icon">&#10003;</span>${m.subs.length} sub-modules &middot; complete</div>`;
    } else {
      let html = '<ul class="tree-list">';
      m.subs.forEach((s, si) => {
        const cls = isActive
          ? (si === activeSubIdx ? ' active' : (s.state === 'done' ? ' done' : ''))
          : (s.state === 'active' ? ' active' : s.state === 'done' ? ' done' : '');
        const hc = (s.children && s.children.length) ? ' has-children' : '';
        const chk = s.state === 'done' ? '<span class="tree-check">&#10003;</span>' : '';
        html += `<li class="tree-node${cls}${hc}" data-sub="${s.id}" data-sidx="${si}"
          onclick="selectSub(${mi},${si})">
          <div class="tree-gutter"></div>
          <div class="tree-sub"><span class="tree-dot"></span><span>${s.label}</span>${chk}</div>
        </li>`;

        /* render 2nd-level children when parent is expanded */
        if (s.children && s.children.length && isActive && si === activeSubIdx) {
          html += '<ul class="tree-children">';
          s.children.forEach((ch, ci) => {
            const cc = ci === activeChildIdx ? ' active' : ch.state === 'done' ? ' done' : '';
            const hgc = (ch.children && ch.children.length) ? ' has-children' : '';
            const ico = ch.state === 'done' ? '&#10003;'
              : ch.state === 'active' ? '&#9654;' : '&#9675;';
            html += `<li class="tree-child-node${cc}${hgc}" data-child="${ch.id}" data-cidx="${ci}"
              onclick="event.stopPropagation();selectChild(${mi},${si},${ci})">
              <div class="tree-child-gutter"></div>
              <div class="tree-child-sub">
                <span class="tree-child-dot"></span><span>${ch.label}</span>
                <span class="tree-child-check">${ico}</span>
              </div>
            </li>`;

            /* render 3rd-level grandchildren */
            if (ch.children && ch.children.length && ci === activeChildIdx) {
              html += '<ul class="tree-grandchildren">';
              ch.children.forEach((gc, gi) => {
                const gcCls = gi === activeGrandIdx ? ' active' : gc.state === 'done' ? ' done' : '';
                const gIco = gc.state === 'done' ? '&#10003;'
                  : gc.state === 'active' ? '&#9654;' : '&#9675;';
                html += `<li class="tree-grand-node${gcCls}" data-gidx="${gi}"
                  onclick="event.stopPropagation();selectGrand(${mi},${si},${ci},${gi})">
                  <div class="tree-grand-gutter"></div>
                  <div class="tree-grand-sub">
                    <span class="tree-grand-dot"></span><span>${gc.label}</span>
                    <span class="tree-grand-check">${gIco}</span>
                  </div>
                </li>`;
              });
              html += '</ul>';
            }
          });
          html += '</ul>';
        }
      });
      html += '</ul>';
      col.innerHTML = html;
    }

    area.appendChild(col);

    /* staggered tree-grow entrance */
    if (isActive || !isQueued) {
      requestAnimationFrame(() => {
        setTimeout(() => {
          col.classList.add('visible');
          let delay = 0;
          col.querySelectorAll('.tree-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 90;
          });
          col.querySelectorAll('.tree-child-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 70;
          });
          col.querySelectorAll('.tree-grand-node').forEach(n => {
            n.style.transitionDelay = delay + 'ms'; delay += 55;
          });
        }, isActive ? 40 : 180);
      });
    }
  });
}

    if (child.children && child.children.length && activeGrandIdx >= 0 && activeGrandIdx < child.children.length) {

}

/* ── Interactions ────────────────────────────────────────── */
function selectModule(idx) {
  if (idx === activeModule) return;
  activeModule = idx;
  expandedItem = null;
  activeChildIdx = -1; activeGrandIdx = -1;
  const m = MODULES[idx];
  const ni = m.subs.findIndex(s => s.state === 'active');
  activeSubIdx = ni >= 0 ? ni : 0;
  const sub = m.subs[activeSubIdx];
  if (sub.children && sub.children.length) {
    const ci = sub.children.findIndex(c => c.state === 'active');
    activeChildIdx = ci >= 0 ? ci : 0;
    const child = sub.children[activeChildIdx];
    if (child && child.children && child.children.length) {
      const gi = child.children.findIndex(g => g.state === 'active');
      activeGrandIdx = gi >= 0 ? gi : 0;
    }
  }
  document.getElementById('breadcrumbActive').textContent = m.label;
  updateRing(); renderModuleCards(); renderTreeColumns(); renderDashboard(true);
  setTimeout(() => initTreeParticles(), 120);
}

function selectSub(mi, si) {
  if (mi !== activeModule) {
    activeModule = mi;
    document.getElementById('breadcrumbActive').textContent = MODULES[mi].label;
    updateRing(); renderModuleCards();
  }
  activeSubIdx = si;
  expandedItem = null;
  const sub = MODULES[activeModule].subs[si];
  if (sub.children && sub.children.length) {
    const ci = sub.children.findIndex(c => c.state === 'active');
    activeChildIdx = ci >= 0 ? ci : 0;
    const child = sub.children[activeChildIdx];
    if (child && child.children && child.children.length) {
      const gi = child.children.findIndex(g => g.state === 'active');
      activeGrandIdx = gi >= 0 ? gi : 0;
    } else { activeGrandIdx = -1; }
  } else { activeChildIdx = -1; activeGrandIdx = -1; }
  renderTreeColumns(); renderDashboard(true);
  setTimeout(() => initTreeParticles(), 120);
}

function selectChild(mi, si, ci) {
  if (mi !== activeModule || si !== activeSubIdx) {
    activeModule = mi; activeSubIdx = si;
    document.getElementById('breadcrumbActive').textContent = MODULES[mi].label;
    updateRing(); renderModuleCards();
  }
  activeChildIdx = ci;
  activeGrandIdx = -1;
  expandedItem = null;
  const child = MODULES[activeModule].subs[activeSubIdx].children[ci];
  if (child && child.children && child.children.length) {
    const gi = child.children.findIndex(g => g.state === 'active');
    activeGrandIdx = gi >= 0 ? gi : 0;
  }
  renderTreeColumns(); renderDashboard(true);
  setTimeout(() => initTreeParticles(), 120);
}

function selectGrand(mi, si, ci, gi) {
  if (mi !== activeModule || si !== activeSubIdx || ci !== activeChildIdx) {
    activeModule = mi; activeSubIdx = si; activeChildIdx = ci;
    document.getElementById('breadcrumbActive').textContent = MODULES[mi].label;
    updateRing(); renderModuleCards();
  }
  activeGrandIdx = gi;
  expandedItem = null;
  const col = document.querySelector(`.tree-col[data-idx="${activeModule}"]`);
  if (col) {
    col.querySelectorAll('.tree-grand-node').forEach(n => {
      const i = parseInt(n.dataset.gidx);
      const ch = MODULES[activeModule].subs[activeSubIdx].children[activeChildIdx].children[i];
      n.classList.remove('active', 'done');
      if (i === gi) n.classList.add('active');
      else if (ch && ch.state === 'done') n.classList.add('done');
    });
  }
  renderDashboard(true);
  setTimeout(() => initTreeParticles(), 120);
}

function toggleDetail(idx) {
  const d = document.querySelector(`.item-detail[data-detail="${idx}"]`);
  const r = document.querySelector(`.item-row[data-item="${idx}"]`);
  if (!d) return;
  if (expandedItem === idx) {
    d.classList.remove('open'); if (r) r.classList.remove('expanded'); expandedItem = null;
  } else {
    document.querySelectorAll('.item-detail.open').forEach(x => x.classList.remove('open'));
    document.querySelectorAll('.item-row.expanded').forEach(x => x.classList.remove('expanded'));
    d.classList.add('open'); if (r) r.classList.add('expanded'); expandedItem = idx;
  }
}

function updateRing() {
  const p = MODULES.reduce((s, m) => s + m.progress, 0) / MODULES.length;
  const circ = 87.96;
  document.getElementById('ringFill').style.strokeDashoffset = circ * (1 - p / 100);
  document.getElementById('ringFill').style.stroke = COLORS[MODULES[activeModule].color - 1];
  document.getElementById('ringLabel').textContent = Math.round(p) + '%';
}

/* keyboard nav */
document.addEventListener('keydown', e => {
  const sub = getActiveSub();
  const hc = sub.children && sub.children.length;
  const child = hc && activeChildIdx >= 0 ? sub.children[activeChildIdx] : null;
  const hgc = child && child.children && child.children.length;

  if (e.key === 'ArrowLeft') { e.preventDefault(); selectModule(Math.max(0, activeModule - 1)); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); selectModule(Math.min(MODULES.length - 1, activeModule + 1)); }
  else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (hgc && activeGrandIdx > 0) selectGrand(activeModule, activeSubIdx, activeChildIdx, activeGrandIdx - 1);
    else if (hgc && activeGrandIdx === 0 && activeChildIdx > 0) selectChild(activeModule, activeSubIdx, activeChildIdx - 1);
    else if (hc && activeChildIdx > 0) selectChild(activeModule, activeSubIdx, activeChildIdx - 1);
    else if ((hc || hgc) && activeChildIdx === 0 && activeSubIdx > 0) selectSub(activeModule, activeSubIdx - 1);
    else selectSub(activeModule, Math.max(0, activeSubIdx - 1));
  }
  else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (hgc && activeGrandIdx < child.children.length - 1) selectGrand(activeModule, activeSubIdx, activeChildIdx, activeGrandIdx + 1);
    else if (hgc && activeGrandIdx >= child.children.length - 1 && hc && activeChildIdx < sub.children.length - 1) selectChild(activeModule, activeSubIdx, activeChildIdx + 1);
    else if (hc && !hgc && activeChildIdx < sub.children.length - 1) selectChild(activeModule, activeSubIdx, activeChildIdx + 1);
    else if (hc && activeChildIdx >= sub.children.length - 1 && activeSubIdx < MODULES[activeModule].subs.length - 1) selectSub(activeModule, activeSubIdx + 1);
    else selectSub(activeModule, Math.min(MODULES[activeModule].subs.length - 1, activeSubIdx + 1));
  }
});

let feedIdx = 0, feedInterval = null;
function startFeed() {
  if (feedInterval) clearInterval(feedInterval);
  feedIdx = 0;
  const win = document.getElementById('feedWindow');
  if (!win) return;
  function show() {
    win.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const e = FEED_ENTRIES[(feedIdx + i) % FEED_ENTRIES.length];
      const fi = document.createElement('div');
      fi.className = 'feed-item';
      fi.style.top = (i * 36) + 'px';
      fi.innerHTML = `<span class="feed-time">${e.time}</span>
        <span class="feed-dot" style="background:${e.color}"></span>
        <span class="feed-msg">${e.msg}</span>`;
      win.appendChild(fi);
      setTimeout(() => fi.classList.add('visible'), 40 + i * 70);
    }
  }
  show();
  feedInterval = setInterval(() => {
    win.querySelectorAll('.feed-item').forEach(it => {
      it.classList.remove('visible'); it.classList.add('exiting');
    });
    setTimeout(() => { feedIdx = (feedIdx + 1) % FEED_ENTRIES.length; show(); }, 420);
  }, 5000);
}

/* ── Background Particles ────────────────────────────────── */
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let bgParticles = [];

function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }

class BgP {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * bgCanvas.width;
    this.y = init ? Math.random() * bgCanvas.height : bgCanvas.height + 10;
    this.sz = 0.5 + Math.random() * 1.5;
    this.vy = -(0.12 + Math.random() * 0.35);
    this.vx = (Math.random() - 0.5) * 0.15;
    this.a = 0.05 + Math.random() * 0.15;
    this.c = COLORS[Math.floor(Math.random() * 4)];
  }
  update() { this.y += this.vy; this.x += this.vx; if (this.y < -10) this.reset(false); }
  draw(ctx) {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.sz, 0, Math.PI * 2);
    ctx.fillStyle = this.c; ctx.globalAlpha = this.a; ctx.fill(); ctx.globalAlpha = 1;
  }
}
function initBg() { resizeBg(); bgParticles = []; for (let i = 0; i < 60; i++) bgParticles.push(new BgP()); }

class HP {
  constructor() { this.reset(); }
  reset() {
    const cards = document.querySelectorAll('.mod-card');
    if (cards.length < 2) return;
    const seg = Math.floor(Math.random() * (cards.length - 1));
    const c1 = cards[seg], c2 = cards[seg + 1];
    const row = document.getElementById('modulesRow');
    const rr = row.getBoundingClientRect();
    const r1 = c1.getBoundingClientRect(), r2 = c2.getBoundingClientRect();
    this.sx = r1.right - rr.left + 10;
    this.sy = r1.top - rr.top + r1.height * 0.5 + (Math.random() - 0.5) * 14;
    this.tx = r2.left - rr.left - 10;
    this.x = this.sx; this.y = this.sy;
    this.spd = 0.35 + Math.random() * 0.55;
    this.sz = 1.2 + Math.random() * 1.6;
    this.c = COLORS[MODULES[seg].color - 1];
    this.a = 0.25 + Math.random() * 0.4;
    this.dr = (Math.random() - 0.5) * 0.15;
    this.life = 1;
  }
  update() {
    this.x += this.spd; this.y += this.dr;
    if (this.x >= this.tx) { this.life -= 0.06; this.a *= 0.9; }
    if (this.life <= 0 || this.a < 0.01) this.reset();
  }
  draw(ctx) {
    ctx.beginPath(); ctx.arc(this.x + 24, this.y + 10, this.sz, 0, Math.PI * 2);
    ctx.fillStyle = this.c; ctx.globalAlpha = this.a; ctx.fill();
    ctx.beginPath(); ctx.arc(this.x + 20, this.y + 10, this.sz * 0.5, 0, Math.PI * 2);
    ctx.globalAlpha = this.a * 0.3; ctx.fill(); ctx.globalAlpha = 1;
  }
}
function initH() {
  resizeH(); hParticles = [];
  for (let i = 0; i < 35; i++) {
    const p = new HP();
    if (p.tx > p.sx) p.x = p.sx + Math.random() * (p.tx - p.sx);
    hParticles.push(p);
  }
}

/* ── Tree-Path Particles (flow to deepest active node) ──── */
const tCanvas = document.getElementById('particleCanvasT');
const tCtx = tCanvas.getContext('2d');
let tParticles = [];

function resizeT() {
  const a = document.getElementById('treeArea');
  tCanvas.width = a.offsetWidth + 48; tCanvas.height = a.offsetHeight + 20;
}

class TP {
  constructor() { this.alive = false; this.flash = 0; this.segs = []; this.si = 0; this.reset(); }

  reset() {
    const col = document.querySelector(`.tree-col[data-idx="${activeModule}"]`);
    if (!col) { this.alive = false; return; }

    /* target: deepest active (grand > child > parent) */
    let tgt = col.querySelector('.tree-grand-node.active')
           || col.querySelector('.tree-child-node.active')
           || col.querySelector('.tree-node.active');
    if (!tgt) { this.alive = false; return; }

    const area = document.getElementById('treeArea');
    const ar = area.getBoundingClientRect(), cr = col.getBoundingClientRect();
    const nr = tgt.getBoundingClientRect();
    const sx = cr.left - ar.left + 12;
    const sy = Math.max(cr.top - ar.top - 4, 0);
    const ty = nr.top - ar.top + nr.height * 0.5;
    const tx = nr.left - ar.left + nr.offsetWidth * 0.45;

    /* L-path: vertical then horizontal */
    this.segs = [
      { sx, sy, tx: sx, ty, dir: 'v' },
      { sx, sy: ty, tx, ty, dir: 'h' },
    ];
    this.si = 0; this.x = sx; this.y = sy;
    this.spd = 0.8 + Math.random() * 1.6;
    this.sz = 1.0 + Math.random() * 1.4;
    this.c = COLORS[MODULES[activeModule].color - 1];
    this.a = 0.4 + Math.random() * 0.35;
    this.alive = true; this.flash = 0;
  }

  update() {
    if (!this.alive && this.flash <= 0) return this.reset();
    if (this.flash > 0) { this.flash -= 0.04; return; }
    const s = this.segs[this.si];
    if (s.dir === 'v') {
      this.y += this.spd;
      if (this.y >= s.ty) { this.y = s.ty; this.si++; if (this.si >= this.segs.length) { this.flash = 1; this.alive = false; } }
    } else {
      this.x += this.spd;
      if (this.x >= s.tx) { this.x = s.tx; this.si++; if (this.si >= this.segs.length) { this.flash = 1; this.alive = false; } }
    }
  }

  draw(ctx) {
    const ox = 24, oy = 10;
    if (!this.alive && this.flash > 0) {
      const ls = this.segs[this.segs.length - 1];
      ctx.beginPath(); ctx.arc(ls.tx + ox, ls.ty + oy, 5 + (1 - this.flash) * 4, 0, Math.PI * 2);
      ctx.fillStyle = this.c; ctx.globalAlpha = this.flash * 0.45; ctx.fill(); ctx.globalAlpha = 1;
      return;
    }
    if (!this.alive) return;
    ctx.beginPath(); ctx.arc(this.x + ox, this.y + oy, this.sz, 0, Math.PI * 2);
    ctx.fillStyle = this.c; ctx.globalAlpha = this.a; ctx.fill();
    const s = this.segs[this.si];
    const tdx = s && s.dir === 'h' ? -3 : 0;
    const tdy = s && s.dir === 'v' ? -3 : 0;
    ctx.beginPath(); ctx.arc(this.x + ox + tdx, this.y + oy + tdy, this.sz * 0.55, 0, Math.PI * 2);
    ctx.globalAlpha = this.a * 0.35; ctx.fill(); ctx.globalAlpha = 1;
  }
}

function initTreeParticles() {
  resizeT(); tParticles = [];
  for (let i = 0; i < 16; i++) {
    const p = new TP();
    if (p.alive && p.segs.length) {
      let td = 0;
      const sd = p.segs.map(s => {
        const d = s.dir === 'v' ? Math.abs(s.ty - s.sy) : Math.abs(s.tx - s.sx);
        td += d; return d;
      });
      const pos = Math.random() * td;
      let acc = 0;
      for (let si = 0; si < p.segs.length; si++) {
        if (acc + sd[si] >= pos) {
          p.si = si;
          const lp = pos - acc, s = p.segs[si];
          if (s.dir === 'v') { p.x = s.sx; p.y = s.sy + lp; }
          else { p.x = s.sx + lp; p.y = s.sy; }
          break;
        }
        acc += sd[si];
      }
    }
    tParticles.push(p);
  }
}

/* ── Animation Loop ──────────────────────────────────────── */
function loop() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  for (const p of bgParticles) { p.update(); p.draw(bgCtx); }

  hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
  for (const p of hParticles) { p.update(); p.draw(hCtx); }

  tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
  for (const p of tParticles) { p.update(); p.draw(tCtx); }

  requestAnimationFrame(loop);
}

/* ── Resize Handler ──────────────────────────────────────── */
let rt;
window.addEventListener('resize', () => {
  clearTimeout(rt);
  rt = setTimeout(() => {
    resizeBg(); resizeH(); resizeT();
    initBg(); initH(); initTreeParticles();
  }, 100);
});

/* ── Clock + Cost Ticker ─────────────────────────────────── */
(function startClock() {
  let s = 1338;
  setInterval(() => {
    s++;
    const m = Math.floor(s / 60), ss = s % 60;
    document.getElementById('hTime').textContent = m + 'm ' + String(ss).padStart(2, '0') + 's';
    document.getElementById('hCost').textContent = (4.71 + (s - 1338) * 0.0028).toFixed(2);
  }, 1000);
})();

/* ── Init ────────────────────────────────────────────────── */
(function init() {
  const m = MODULES[activeModule];
  const ai = m.subs.findIndex(s => s.state === 'active');
  activeSubIdx = ai >= 0 ? ai : 0;
  const sub = m.subs[activeSubIdx];
  if (sub.children && sub.children.length) {
    const ci = sub.children.findIndex(c => c.state === 'active');
    activeChildIdx = ci >= 0 ? ci : 0;
    const child = sub.children[activeChildIdx];
    if (child && child.children && child.children.length) {
      const gi = child.children.findIndex(g => g.state === 'active');
      activeGrandIdx = gi >= 0 ? gi : 0;
    }
  }
  updateRing();
  renderModuleCards();
  renderTreeColumns();
  renderDashboard(false);
  initBg();
  initH();
  initTreeParticles();
  loop();
})();
</script>
</body>
