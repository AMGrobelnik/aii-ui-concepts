<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Horizontal Two-Column Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep:     #0b0d14;
  --bg-surface:  #11141c;
  --bg-card:     #161a26;
  --bg-card-alt: #1a1e2c;
  --bg-hover:    #1f2436;
  --bg-elevated: #242a3c;

  --border:      #232840;
  --border-dim:  #1a1e30;
  --border-lite: #2e3450;

  --text-100:    #e6e8f0;
  --text-200:    #b0b5c8;
  --text-300:    #7b819a;
  --text-400:    #4e5470;

  --accent:      #5b8af5;
  --accent-dim:  #3a5fb8;
  --accent-glow: rgba(91, 138, 245, 0.25);
  --accent-bg:   rgba(91, 138, 245, 0.08);

  --green:       #34d399;
  --green-dim:   rgba(52, 211, 153, 0.15);
  --green-glow:  rgba(52, 211, 153, 0.3);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251, 191, 36, 0.12);
  --red:         #f87171;
  --red-dim:     rgba(248, 113, 113, 0.12);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167, 139, 250, 0.12);
  --blue:        #60a5fa;
  --blue-dim:    rgba(96, 165, 250, 0.12);

  --radius:      8px;
  --radius-lg:   12px;
  --transition:  180ms ease;
  --shadow-card: 0 1px 4px rgba(0,0,0,0.25), 0 0 0 1px var(--border-dim);
}

html { font-size: 14px; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text-200);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before { content: ''; position: fixed; inset: -40%; width: 180%; height: 180%; background: radial-gradient(ellipse 600px 400px at 18% 12%, rgba(91,138,245,0.035) 0%, transparent 70%), radial-gradient(ellipse 500px 350px at 75% 18%, rgba(167,139,250,0.03) 0%, transparent 70%), radial-gradient(ellipse 400px 400px at 50% 85%, rgba(52,211,153,0.02) 0%, transparent 70%); pointer-events: none; z-index: 0; }
#particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

/* ── Header Bar ─────────────────────────────────────────── */
.header { height: 42px; background: linear-gradient(90deg, #0e1018 0%, #12151f 100%); border-bottom: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; position: relative; z-index: 10; }
.header-left { display: flex; align-items: center; gap: 16px; }
.brand { font-weight: 700; font-size: 14px; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 0.5px; }
.run-name { font-size: 11.5px; color: var(--text-300); background: var(--bg-card); padding: 2px 10px; border-radius: 4px; border: 1px solid var(--border); }
.header-right { display: flex; align-items: center; gap: 20px; }
.header-stat { font-size: 12px; color: var(--text-300); font-variant-numeric: tabular-nums; }
.header-stat .val { color: var(--text-200); font-weight: 500; }
.header-stat .label { margin-right: 4px; font-size: 11px; }
.live-indicator { display: flex; align-items: center; gap: 6px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: livePulse 2s ease-in-out infinite; }
@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--green-glow); }
  50% { opacity: 0.7; box-shadow: 0 0 8px 3px var(--green-glow); }
}
.live-label { font-size: 11px; color: var(--green); font-weight: 500; letter-spacing: 0.03em; }

/* ── Navigation Area (Ring + Cards + Sub-modules) ───────── */
.nav-area { flex-shrink: 0; padding: 14px 20px 10px; display: flex; gap: 20px; align-items: flex-start; border-bottom: 1px solid var(--border-dim); background: var(--bg-surface); position: relative; z-index: 5; }
.ring-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.ring-container { width: 80px; height: 80px; position: relative; }
.ring-svg { width: 80px; height: 80px; }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
.ring-progress { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; filter: url(#ringGlow); }
.ring-dashed { fill: none; stroke: var(--text-400); stroke-width: 1; stroke-dasharray: 5 7; opacity: 0.2; animation: ringRotate 12s linear infinite; transform-origin: 50% 50%; }
@keyframes ringRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
.ring-pct { font-size: 17px; font-weight: 700; color: var(--text-100); line-height: 1; }
.ring-label { font-size: 9px; color: var(--text-300); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.ring-phase { font-size: 10px; color: var(--text-300); margin-top: 4px; font-weight: 500; }
.nav-stack { flex: 1; display: flex; flex-direction: column; gap: 0; min-width: 0; }
.card-row { display: flex; align-items: stretch; gap: 0; height: 52px; }

.stage-card { flex: 1; min-width: 0; background: var(--bg-card); border: 1px solid var(--border-dim); display: flex; align-items: center; gap: 10px; padding: 0 14px; cursor: pointer; transition: background var(--transition), border-color var(--transition), box-shadow var(--transition); position: relative; }
.stage-card:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.stage-card:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.stage-card:not(:last-child) { border-right: none; }
.stage-card:hover { background: var(--bg-hover); }
.stage-card.selected { background: var(--bg-elevated); border-color: var(--border-lite); box-shadow: inset 0 -2px 0 0 var(--card-accent, var(--accent)); }
.stage-card .card-diamond { width: 10px; height: 10px; transform: rotate(45deg); border-radius: 2px; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
.stage-card .card-info { display: flex; flex-direction: column; min-width: 0; }
.stage-card .card-name { font-size: 12px; font-weight: 600; color: var(--text-100); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stage-card .card-meta { font-size: 10px; color: var(--text-300); font-variant-numeric: tabular-nums; }
.stage-card .card-badge { margin-left: auto; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
.card-connector { width: 1px; align-self: stretch; position: relative; flex-shrink: 0; }
.card-connector::before { content: ''; position: absolute; top: 50%; left: -3px; width: 7px; height: 7px; border-right: 1.5px solid var(--border-lite); border-bottom: 1.5px solid var(--border-lite); transform: translateY(-50%) rotate(-45deg); opacity: 0.4; }

/* ── Sub-module & Item Rows ─────────────────────────────── */
.sub-row, .item-row { height: 0; overflow: hidden; display: flex; align-items: center; gap: 4px; padding-left: 2px; margin-top: 0; transition: height 0.3s ease, opacity 0.3s ease, margin-top 0.3s ease; opacity: 0; }
.sub-row.visible { height: 28px; opacity: 1; margin-top: 6px; }
.item-row.visible { height: 26px; opacity: 1; margin-top: 4px; }
.sub-chip { display: flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 6px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.item-chip { display: flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 5px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
.sub-chip:hover, .item-chip:hover { background: rgba(255,255,255,0.04); }
.sub-chip.selected, .item-chip.selected { background: rgba(255,255,255,0.06); }
.sub-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
.item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
.sub-dot.active, .item-dot.active { animation: dotPulse 2s ease-in-out infinite; }
.sub-dot.pending, .item-dot.pending { background: #2a2e3e; border: 1px solid #3a3e50; }
.sub-label { font-size: 10.5px; color: var(--text-300); transition: color 0.3s; }
.item-label { font-size: 10px; color: var(--text-300); transition: color 0.3s; }
.sub-chip.selected .sub-label, .item-chip.selected .item-label { color: var(--text-100); }
.sub-icon { font-size: 9px; font-weight: 600; }
.sub-sep { width: 10px; height: 1px; background: var(--border); flex-shrink: 0; }
.item-sep { width: 8px; height: 1px; background: var(--border); flex-shrink: 0; }

/* ── Glow Beams ─────────────────────────────────────────── */
.beam-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
.glow-beam { position: absolute; width: 2px; border-radius: 1px; transition: left 0.3s ease, top 0.3s ease, height 0.3s ease, opacity 0.3s ease; opacity: 0; }
.glow-beam.visible { opacity: 1; }
@keyframes dotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

/* ── Content Dashboard (Two-Column) ─────────────────────── */
.content-area { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px 24px 40px; position: relative; z-index: 2; }
.content-area::-webkit-scrollbar { width: 5px; }
.content-area::-webkit-scrollbar-track { background: transparent; }
.content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content-area::-webkit-scrollbar-thumb:hover { background: var(--border-lite); }
.content-dashboard { display: grid; grid-template-columns: 60% 40%; gap: 20px; max-width: 1100px; margin: 0 auto; animation: fadeSlideIn 0.3s ease; }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.col-left { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
.summary-card { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-card); }
.summary-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.summary-title { font-size: 18px; font-weight: 600; color: var(--text-100); }
.summary-badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 6px; margin-left: auto; }
.summary-narrative { font-size: 13.5px; color: var(--text-200); line-height: 1.7; margin-bottom: 12px; }
.summary-meta { font-size: 12px; color: var(--text-300); font-variant-numeric: tabular-nums; display: flex; gap: 16px; }
.summary-meta span { display: flex; align-items: center; gap: 4px; }

.item-list-section { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); }
.item-list-title { font-size: 12px; font-weight: 600; color: var(--text-300); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.item-list { display: flex; flex-direction: column; gap: 6px; }

.item-entry { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: var(--radius); cursor: pointer; transition: background var(--transition), border-color var(--transition); }
.item-entry:hover { background: var(--bg-hover); border-color: var(--border); }
.item-entry.active-item { border-color: var(--border-lite); background: var(--bg-hover); }
.item-entry-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.item-entry-name { font-size: 13px; font-weight: 500; color: var(--text-100); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-entry-detail { font-size: 11px; color: var(--text-300); font-variant-numeric: tabular-nums; flex-shrink: 0; }
.item-entry-status { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }

.col-right { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
/* Stat Card */
.stat-card { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 14px; }
.stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.stat-info { display: flex; flex-direction: column; min-width: 0; }
.stat-value { font-size: 20px; font-weight: 700; color: var(--text-100); line-height: 1.1; font-variant-numeric: tabular-nums; }
.stat-label { font-size: 11px; color: var(--text-300); margin-top: 2px; }
.stat-trend { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }

/* ── Shared card base for right-column cards ────────────── */
.progress-stat-card, .activity-card, .cost-card {
  background: var(--bg-card);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow-card);
}
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-title { font-size: 12px; font-weight: 600; color: var(--text-200); }
.progress-value { font-size: 13px; font-weight: 700; color: var(--text-100); font-variant-numeric: tabular-nums; }
.progress-bar-bg, .activity-bar-bg { background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-bg { width: 100%; height: 6px; }
.progress-bar-fill, .activity-bar-fill { height: 100%; border-radius: 3px; }
.progress-bar-fill { transition: width 0.6s ease; }
.activity-title, .cost-title { font-size: 12px; font-weight: 600; color: var(--text-300); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.activity-rows, .cost-rows { display: flex; flex-direction: column; }
.activity-rows { gap: 10px; }
.cost-rows { gap: 8px; }
.activity-row, .cost-row { display: flex; align-items: center; gap: 10px; }
.cost-row { justify-content: space-between; }
.activity-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.activity-name { font-size: 12px; color: var(--text-200); flex: 1; min-width: 0; }
.activity-bar-bg { width: 80px; height: 5px; flex-shrink: 0; }
.activity-pct { font-size: 11px; font-weight: 600; color: var(--text-300); width: 30px; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.cost-label { font-size: 12px; color: var(--text-200); display: flex; align-items: center; gap: 6px; }
.cost-color-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cost-value { font-size: 12px; font-weight: 600; color: var(--text-100); font-variant-numeric: tabular-nums; }
.cost-divider { height: 1px; background: var(--border-dim); margin: 4px 0; }
.cost-total-row { display: flex; align-items: center; justify-content: space-between; }
.cost-total-label { font-size: 12px; font-weight: 600; color: var(--text-200); }
.cost-total-value { font-size: 14px; font-weight: 700; color: var(--text-100); font-variant-numeric: tabular-nums; }

.key-hint { position: fixed; bottom: 10px; right: 16px; display: flex; gap: 8px; z-index: 100; }
.key-box { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-400); }
.key-cap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; font-size: 9px; font-weight: 500; color: var(--text-300); }
@media (max-width: 1000px) { .content-dashboard { grid-template-columns: 1fr; } }
.ring-segment { fill: none; stroke-width: 5; stroke-linecap: round; opacity: 0.12; transition: opacity 0.3s ease; }
.ring-segment.active { opacity: 0.55; }
</style>
</head>
<body>

<!-- ── SVG Definitions ──────────────────────────────────── -->
<svg style="position:absolute;width:0;height:0">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="diamondGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>

<!-- ── Particle Canvas ──────────────────────────────────── -->
<canvas id="particleCanvas"></canvas>

<!-- ── Header ───────────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <span class="brand">AI Inventor</span>
    <span class="run-name">ssl-low-resource-v3</span>
  </div>
  <div class="header-right">
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span class="live-label">LIVE</span>
    </div>
    <span class="header-stat"><span class="label">Time</span><span class="val" id="hdrTime">02:34:17</span></span>
    <span class="header-stat"><span class="label">Cost</span><span class="val" id="hdrCost">$12.47</span></span>
    <span class="header-stat"><span class="label">Tokens</span><span class="val" id="hdrTokens">1.84M</span></span>
  </div>
</div>

<!-- ── Navigation Area ──────────────────────────────────── -->
<div class="nav-area" id="navArea">
  <div class="beam-layer" id="beamLayer"></div>

  <!-- Progress Ring -->
  <div class="ring-wrap">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle class="ring-dashed" cx="40" cy="40" r="36"/>
        <circle class="ring-bg" cx="40" cy="40" r="34"/>
        <circle class="ring-segment" id="ringSeg0" cx="40" cy="40" r="34"
          stroke="#22c55e" stroke-dasharray="53.4 160.2" stroke-dashoffset="-53.4"
          transform="rotate(-90 40 40)"/>
        <circle class="ring-segment" id="ringSeg1" cx="40" cy="40" r="34"
          stroke="#a855f7" stroke-dasharray="53.4 160.2" stroke-dashoffset="-106.8"
          transform="rotate(-90 40 40)"/>
        <circle class="ring-segment" id="ringSeg2" cx="40" cy="40" r="34"
          stroke="#3b82f6" stroke-dasharray="53.4 160.2" stroke-dashoffset="-160.2"
          transform="rotate(-90 40 40)"/>
        <circle class="ring-segment" id="ringSeg3" cx="40" cy="40" r="34"
          stroke="#6b7280" stroke-dasharray="53.4 160.2" stroke-dashoffset="-213.6"
          transform="rotate(-90 40 40)"/>
        <circle class="ring-progress" cx="40" cy="40" r="34"
          stroke="url(#ringGrad)"
          stroke-dasharray="213.6" stroke-dashoffset="74.76"
          transform="rotate(-90 40 40)"
          id="ringProgress"/>
      </svg>
      <div class="ring-center">
        <span class="ring-pct" id="ringPct">65%</span>
        <span class="ring-label">Progress</span>
      </div>
    </div>
    <span class="ring-phase" id="ringPhase">Invention Loop</span>
  </div>

  <!-- Nav Stack -->
  <div class="nav-stack">
    <!-- Card Row -->
    <div class="card-row" id="cardRow"></div>
    <!-- Sub-module Row -->
    <div class="sub-row" id="subRow"></div>
    <!-- Item Row -->
    <div class="item-row" id="itemRow"></div>
  </div>
</div>

<!-- ── Content Dashboard ────────────────────────────────── -->
<div class="content-area">
  <div class="content-dashboard" id="contentDashboard"></div>
</div>

<!-- ── Key Hints ────────────────────────────────────────── -->
<div class="key-hint">
  <div class="key-box"><span class="key-cap">&larr;&rarr;</span> navigate</div>
  <div class="key-box"><span class="key-cap">&darr;</span> drill in</div>
  <div class="key-box"><span class="key-cap">&uarr;</span> back up</div>
</div>

<script>
// ───────────────────────────────────────────────────────────
// DATA MODEL
// ───────────────────────────────────────────────────────────
const DATA = {
  modules: [
    {
      name: 'Seed Hypotheses', short: 'Seed', progress: 100, color: '#22c55e',
      badge: '\u2713', badgeBg: '#14532d', badgeColor: '#4ade80',
      status: 'done',
      stats: {
        papers: 847, triples: 2341, gaps: 12, seeds: 4,
        time: '14m 22s', cost: '$2.18', tokens: '312K'
      },
      summary: {
        title: 'Seed Hypotheses',
        narrative: 'I mined 847 papers across 12 NLP venues and built a knowledge graph with 2,341 triples covering low-resource SSL techniques. After identifying 12 research gaps through structural hole analysis, I selected 4 seed hypotheses that scored above the 0.8 combined novelty-feasibility threshold for further exploration.',
        statusLabel: 'Complete',
        statusColor: '#22c55e'
      },
      activity: [
        { name: 'Paper mining', pct: 40, color: '#22c55e' },
        { name: 'KG construction', pct: 25, color: '#34d399' },
        { name: 'Gap analysis', pct: 20, color: '#6ee7b7' },
        { name: 'Seed selection', pct: 15, color: '#a7f3d0' }
      ],
      subs: [
        { name: 'Mine Papers', status: 'done', icon: '\u2713', detail: 'Extracted 847 papers from ACL, EMNLP, NAACL (2022-2025). Parsed abstracts, methods, and results sections.', metric: '847 papers' },
        { name: 'Build KG', status: 'done', icon: '\u2713', detail: 'Constructed knowledge graph: 2,341 triples linking methods, datasets, metrics. Found 89 method clusters.', metric: '2,341 triples' },
        { name: 'Find Gaps', status: 'done', icon: '\u2713', detail: 'Identified 12 research gaps via structural hole analysis. Top gap: contrastive learning + code-switching for low-resource NER.', metric: '12 gaps' },
        { name: 'Select Seeds', status: 'done', icon: '\u2713', detail: 'Ranked gaps by novelty and feasibility. Selected 4 seed hypotheses scoring above 0.8 combined threshold.', metric: '4 seeds' }
      ],
      items: null
    },
    {
      name: 'Hypothesis Refinement', short: 'Hypothesis', progress: 100, color: '#a855f7',
      badge: '8.4', badgeBg: '#581c87', badgeColor: '#c084fc',

// ───────────────────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────────────────
const state = {
  activeRow: 1,     // 0=module, 1=sub, 2=item
  moduleIdx: 2,     // Invention
  subIdx: 2,        // Artifacts
  itemIdx: 3,       // Ablation
};

function currentModule() { return DATA.modules[state.moduleIdx]; }
function currentSubs()   { return currentModule().subs || []; }
function currentItems()  {
  const subs = currentSubs();
  if (state.subIdx >= 0 && state.subIdx < subs.length) {
    return subs[state.subIdx].items || [];
  }
  return [];
}

function statusColor(status, moduleColor) {
  if (status === 'done')   return moduleColor;
  if (status === 'active') return moduleColor;
  return '#2a2e3e';
}

// ───────────────────────────────────────────────────────────
// RENDER: Card Row
// ───────────────────────────────────────────────────────────
function renderCardRow() {
  const row = document.getElementById('cardRow');
  row.innerHTML = '';
  const mods = DATA.modules;

  mods.forEach((mod, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'card-connector';
      row.appendChild(conn);
    }

    const card = document.createElement('div');
    card.className = 'stage-card' + (i === state.moduleIdx ? ' selected' : '');
    card.style.setProperty('--card-accent', mod.color);
    card.onclick = () => selectModule(i);

    const diamondColor = mod.status === 'pending' ? '#2a2e3e' : mod.color;
    const diamondShadow = mod.status === 'active' ? `0 0 10px ${mod.color}80` :
                          mod.status === 'done' ? `0 0 6px ${mod.color}50` : 'none';
    const diamondAnim = mod.status === 'active' ? 'animation: dotPulse 2s ease-in-out infinite;' : '';

    card.innerHTML = `
      <div class="card-diamond" style="background:${diamondColor};box-shadow:${diamondShadow};${diamondAnim}"></div>
      <div class="card-info">
        <span class="card-name">${mod.short}</span>
        <span class="card-meta">${mod.stats.time}</span>
      </div>
      <span class="card-badge" style="background:${mod.badgeBg};color:${mod.badgeColor}">${mod.badge}</span>
    `;

    row.appendChild(card);
  });

  updateRingSegments();
  updateRingPhase();
}

function updateRingSegments() {
  DATA.modules.forEach((_, i) => {
    const seg = document.getElementById('ringSeg' + i);
    if (seg) seg.classList.toggle('active', i === state.moduleIdx);
  });
}

function updateRingPhase() {
  const mod = currentModule();
  document.getElementById('ringPhase').textContent = mod.short;
}

// ───────────────────────────────────────────────────────────
// RENDER: Sub-module Row
// ───────────────────────────────────────────────────────────
function renderSubRow() {
  const row = document.getElementById('subRow');
  const subs = currentSubs();
  row.innerHTML = '';

  if (!subs.length) {
    row.classList.remove('visible');
    return;
  }
  row.classList.add('visible');
  const mod = currentModule();

  subs.forEach((sub, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'sub-sep';
      const leftC = statusColor(subs[i-1].status, mod.color);
      const rightC = statusColor(sub.status, mod.color);
      sep.style.background = `linear-gradient(90deg, ${leftC}, ${rightC})`;
      row.appendChild(sep);
    }

    const chip = document.createElement('div');
    chip.className = 'sub-chip' + (i === state.subIdx && state.activeRow >= 1 ? ' selected' : '');
    chip.onclick = () => selectSub(i);

    const dot = document.createElement('div');
    dot.className = 'sub-dot ' + sub.status;
    const c = statusColor(sub.status, mod.color);
    if (sub.status !== 'pending') {
      dot.style.background = c;
      dot.style.boxShadow = sub.status === 'active' ? `0 0 8px ${c}70` : `0 0 5px ${c}40`;
    }
    chip.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'sub-label';
    label.textContent = sub.name;
    chip.appendChild(label);

    if (sub.icon) {
      const ico = document.createElement('span');
      ico.className = 'sub-icon';
      ico.style.color = c;
      ico.textContent = sub.icon;
      chip.appendChild(ico);
    }

    row.appendChild(chip);
  });
}

// ───────────────────────────────────────────────────────────
// RENDER: Item Row
// ───────────────────────────────────────────────────────────
function renderItemRow() {
  const row = document.getElementById('itemRow');
  const items = currentItems();
  row.innerHTML = '';

  if (!items.length) {
    row.classList.remove('visible');
    return;
  }
  row.classList.add('visible');
  const mod = currentModule();

  items.forEach((item, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'item-sep';
      const leftC = statusColor(items[i-1].status, mod.color);
      const rightC = statusColor(item.status, mod.color);
      sep.style.background = `linear-gradient(90deg, ${leftC}, ${rightC})`;
      row.appendChild(sep);
    }

    const chip = document.createElement('div');
    chip.className = 'item-chip' + (i === state.itemIdx && state.activeRow >= 2 ? ' selected' : '');
    chip.onclick = () => selectItem(i);

    const dot = document.createElement('div');
    dot.className = 'item-dot ' + item.status;
    const c = statusColor(item.status, mod.color);
    if (item.status !== 'pending') {
      dot.style.background = c;
      dot.style.boxShadow = item.status === 'active' ? `0 0 8px ${c}70` : `0 0 4px ${c}40`;
    }
    chip.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'item-label';
    label.textContent = item.name;
    chip.appendChild(label);

    row.appendChild(chip);
  });
}

// ───────────────────────────────────────────────────────────
// RENDER: Glow Beams
// ───────────────────────────────────────────────────────────
function renderBeams() {
  const container = document.getElementById('beamLayer');
  container.innerHTML = '';
  const navArea = document.getElementById('navArea');
  const navRect = navArea.getBoundingClientRect();

  // Beam from selected card down to sub row
  if (state.activeRow >= 1 && currentSubs().length) {
    const cards = document.querySelectorAll('.stage-card');
    const card = cards[state.moduleIdx];
    const subChips = document.querySelectorAll('.sub-chip');
    const subChip = subChips[state.subIdx] || subChips[0];
    if (card && subChip) {
      const cRect = card.getBoundingClientRect();
      const sRect = subChip.getBoundingClientRect();
      const beam = mkBeam(
        cRect.left + cRect.width / 2 - navRect.left,
        cRect.bottom - navRect.top,
        sRect.top - navRect.top - (cRect.bottom - navRect.top),
        currentModule().color
      );
      container.appendChild(beam);
    }
  }

  // Beam from sub to item
  if (state.activeRow >= 2 && currentItems().length) {
    const subChips = document.querySelectorAll('.sub-chip');
    const subChip = subChips[state.subIdx];
    const itemChips = document.querySelectorAll('.item-chip');
    const itemChip = itemChips[state.itemIdx] || itemChips[0];
    if (subChip && itemChip) {
      const sRect = subChip.getBoundingClientRect();
      const iRect = itemChip.getBoundingClientRect();
      const beam = mkBeam(
        sRect.left + sRect.width / 2 - navRect.left,
        sRect.bottom - navRect.top - 2,
        iRect.top - navRect.top - (sRect.bottom - navRect.top) + 2,
        currentModule().color
      );
      container.appendChild(beam);
    }
  }
}

function mkBeam(x, top, height, color) {
  const b = document.createElement('div');
  b.className = 'glow-beam visible';
  b.style.left = x + 'px';
  b.style.top = top + 'px';
  b.style.height = Math.max(0, height) + 'px';
  b.style.background = color;
  b.style.boxShadow = `0 0 12px ${color}60, 0 0 4px ${color}90`;
  return b;
}

// RENDER: Two-Column Content Dashboard
// ───────────────────────────────────────────────────────────
function renderContent() {
  const dash = document.getElementById('contentDashboard');
  const mod = currentModule();

  // Determine what to show in left column
  let leftHtml = '';
  let rightHtml = '';

  // Narrative / summary card
  let title, narrative, statusLabel, statusColor_, listItems, listTitle;

  if (state.activeRow === 2 && currentItems().length) {
    const item = currentItems()[state.itemIdx];
    title = item.name;
    narrative = item.detail;
    statusLabel = item.status === 'done' ? 'Complete' : item.status === 'active' ? (item.iteration || 'Running') : 'Pending';
    statusColor_ = item.status === 'pending' ? '#6b7280' : mod.color;
    listItems = null;
    listTitle = null;
  } else if (state.activeRow === 1 && currentSubs().length) {
    const sub = currentSubs()[state.subIdx];
    title = sub.name;
    narrative = sub.detail || 'Generating artifacts for the current invention iteration.';
    statusLabel = sub.status === 'done' ? 'Complete' : sub.status === 'active' ? 'Running' : 'Pending';
    statusColor_ = sub.status === 'pending' ? '#6b7280' : mod.color;
    if (sub.items && sub.items.length) {
      listItems = sub.items;
      listTitle = 'Artifacts';
    } else {
      listItems = null;
      listTitle = null;
    }
  } else {
    const s = mod.summary;
    title = s.title;
    narrative = s.narrative;
    statusLabel = s.statusLabel;
    statusColor_ = s.statusColor;
    if (mod.subs && mod.subs.length) {
      listItems = mod.subs;
      listTitle = 'Sub-modules';
    } else {
      listItems = null;
      listTitle = null;
    }
  }

  // Left Column
  leftHtml += `
    <div class="summary-card">
      <div class="summary-header">
        <span class="summary-title">${title}</span>
        <span class="summary-badge" style="background:${statusColor_}20;color:${statusColor_}">${statusLabel}</span>
      </div>
      <div class="summary-narrative">${narrative}</div>
      <div class="summary-meta">
        <span><svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align:-1px"><circle cx="8" cy="8" r="7" stroke="${mod.color}" stroke-width="1.5" fill="none" opacity="0.5"/><path d="M8 4v4l3 2" stroke="${mod.color}" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg> ${mod.stats.time}</span>
        <span>${mod.stats.cost}</span>
        <span>${mod.stats.tokens} tokens</span>
      </div>
    </div>
  `;

  if (listItems && listItems.length) {
    let entriesHtml = '';
    listItems.forEach((item, i) => {
      const dotC = statusColor(item.status, mod.color);
      const stLabel = item.status === 'done' ? 'Done' : item.status === 'active' ? 'Running' : 'Pending';
      const stBg = item.status === 'done' ? mod.color + '20' :
                   item.status === 'active' ? mod.color + '25' : '#1f2937';
      const stFg = item.status === 'pending' ? '#6b7280' : mod.color;
      const isActive = (state.activeRow === 1 && listTitle === 'Artifacts' && i === state.itemIdx) ? ' active-item' : '';
      const clickAction = listTitle === 'Sub-modules' ? `selectSub(${i})` : `selectItem(${i}); drillToItems();`;
      entriesHtml += `
        <div class="item-entry${isActive}" onclick="${clickAction}">
          <div class="item-entry-dot" style="background:${dotC};box-shadow:0 0 5px ${dotC}50"></div>
          <span class="item-entry-name">${item.name}</span>
          <span class="item-entry-detail">${item.metric || item.icon || ''}</span>
          <span class="item-entry-status" style="background:${stBg};color:${stFg}">${stLabel}</span>
        </div>
      `;
    });

    leftHtml += `
      <div class="item-list-section">
        <div class="item-list-title">${listTitle}</div>
        <div class="item-list">${entriesHtml}</div>
      </div>
    `;
  }

  // Right Column: Stat cards stacked + activity breakdown
  rightHtml += buildStatCards(mod);
  rightHtml += buildProgressCard(mod);
  rightHtml += buildActivityCard(mod);
  rightHtml += buildCostCard(mod);

  dash.innerHTML = `
    <div class="col-left">${leftHtml}</div>
    <div class="col-right">${rightHtml}</div>
  `;

  dash.style.animation = 'none';
  void dash.offsetHeight;
  dash.style.animation = 'fadeSlideIn 0.3s ease';
}

function buildStatCards(mod) {
  const stats = mod.stats;
  const c = mod.color;
  let html = '';

  // Pick contextual stats based on module
  if (mod.short === 'Seed') {
    html += statCard('\ud83d\udcda', c, stats.papers, 'Papers Mined', null, `${c}15`);
    html += statCard('\ud83d\udd17', c, stats.triples.toLocaleString(), 'KG Triples', null, `${c}15`);
  } else if (mod.short === 'Hypothesis') {
    html += statCard('\ud83c\udfaf', c, stats.endScore + '/10', 'Final Score', `+${((stats.endScore - stats.startScore) / stats.startScore * 100).toFixed(0)}%`, `${c}15`);
    html += statCard('\ud83d\udd04', c, stats.iterations, 'Iterations', null, `${c}15`);
  } else if (mod.short === 'Invention') {
    html += statCard('\u2699\ufe0f', c, `${stats.iterationsDone}/${stats.iterationsTotal}`, 'Steps Complete', null, `${c}15`);
    html += statCard('\ud83d\udcca', c, stats.baseline, 'Baseline F1', null, `${c}15`);
  } else {
    html += statCard('\ud83d\udcc4', c, '-', 'Sections', null, `${c}15`);
    html += statCard('\ud83d\udcc8', c, '-', 'Figures', null, `${c}15`);
  }

  return html;
}

function statCard(icon, color, value, label, trend, iconBg) {
  let trendHtml = '';
  if (trend) {
    const isPos = trend.startsWith('+');
    trendHtml = `<span class="stat-trend" style="background:${isPos ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)'};color:${isPos ? '#34d399' : '#f87171'}">${trend}</span>`;
  }

  return `
    <div class="stat-card">
      <div class="stat-icon" style="background:${iconBg}">${icon}</div>
      <div class="stat-info">
        <span class="stat-value">${value}</span>
        <span class="stat-label">${label}</span>
      </div>
      ${trendHtml}
    </div>
  `;
}

function buildProgressCard(mod) {
  const pct = mod.progress;
  const c = mod.color;
  return `
    <div class="progress-stat-card">
      <div class="progress-header">
        <span class="progress-title">Stage Progress</span>
        <span class="progress-value">${pct}%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%;background:${c};box-shadow:0 0 8px ${c}50"></div>
      </div>
    </div>
  `;
}

function buildActivityCard(mod) {
  let rows = '';
  mod.activity.forEach(a => {
    rows += `
      <div class="activity-row">
        <div class="activity-dot" style="background:${a.color}"></div>
        <span class="activity-name">${a.name}</span>
        <div class="activity-bar-bg">
          <div class="activity-bar-fill" style="width:${a.pct}%;background:${a.color}"></div>
        </div>
        <span class="activity-pct">${a.pct}%</span>
      </div>
    `;
  });

  return `
    <div class="activity-card">
      <div class="activity-title">Activity Breakdown</div>
      <div class="activity-rows">${rows}</div>
    </div>
  `;
}

function buildCostCard(mod) {
  const mods = DATA.modules;
  let rows = '';
  let totalCost = 0;

  mods.forEach(m => {
    const val = m.stats.cost;
    const numVal = parseFloat(val.replace('$', '')) || 0;
    totalCost += numVal;
    const isCurrentMod = m.short === mod.short;
    rows += `
      <div class="cost-row">
        <span class="cost-label">
          <span class="cost-color-dot" style="background:${m.color}"></span>
          ${m.short}
        </span>
        <span class="cost-value" style="${isCurrentMod ? 'color:' + m.color : ''}">${val}</span>
      </div>
    `;
  });

  return `
    <div class="cost-card">
      <div class="cost-title">Cost Breakdown</div>
      <div class="cost-rows">
        ${rows}
        <div class="cost-divider"></div>
        <div class="cost-total-row">
          <span class="cost-total-label">Total</span>
          <span class="cost-total-value">$${totalCost.toFixed(2)}</span>
        </div>
      </div>
    </div>
  `;
}

// ───────────────────────────────────────────────────────────
// NAVIGATION
// ───────────────────────────────────────────────────────────
function selectModule(idx) {
  state.moduleIdx = idx;
  state.subIdx = findDefaultSub();
  state.itemIdx = findDefaultItem();
  state.activeRow = 0;
  fullRender();
}

function selectSub(idx) {
  state.subIdx = idx;
  state.itemIdx = findDefaultItem();
  state.activeRow = 1;
  fullRender();
}

function selectItem(idx) {
  state.itemIdx = idx;
  state.activeRow = 2;
  fullRender();
}

function drillToItems() {
  state.activeRow = 2;
  fullRender();
}

function findDefaultSub() {
  const subs = currentSubs();
  const a = subs.findIndex(s => s.status === 'active');
  return a >= 0 ? a : 0;
}

function findDefaultItem() {
  const items = currentItems();
  const a = items.findIndex(s => s.status === 'active');
  return a >= 0 ? a : 0;
}

function navigateHorizontal(dir) {
  if (state.activeRow === 0) {
    const n = state.moduleIdx + dir;
    if (n >= 0 && n < DATA.modules.length) {
      state.moduleIdx = n;
      state.subIdx = findDefaultSub();
      state.itemIdx = findDefaultItem();
    }
  } else if (state.activeRow === 1) {
    const n = state.subIdx + dir;
    if (n >= 0 && n < currentSubs().length) {
      state.subIdx = n;
      state.itemIdx = findDefaultItem();
    }
  } else if (state.activeRow === 2) {
    const n = state.itemIdx + dir;
    if (n >= 0 && n < currentItems().length) {
      state.itemIdx = n;
    }
  }
  fullRender();
}

function navigateDown() {
  if (state.activeRow === 0 && currentSubs().length) {
    state.activeRow = 1;
  } else if (state.activeRow === 1 && currentItems().length) {
    state.activeRow = 2;
  }
  fullRender();
}

function navigateUp() {
  if (state.activeRow === 2) state.activeRow = 1;
  else if (state.activeRow === 1) state.activeRow = 0;
  fullRender();
}

// ───────────────────────────────────────────────────────────
// FULL RENDER
// ───────────────────────────────────────────────────────────
function fullRender() {
  renderCardRow();
  renderSubRow();
  renderItemRow();
  renderContent();
  requestAnimationFrame(() => renderBeams());
}

// ───────────────────────────────────────────────────────────
// KEYBOARD
// ───────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowLeft':  e.preventDefault(); navigateHorizontal(-1); break;
    case 'ArrowRight': e.preventDefault(); navigateHorizontal(1);  break;
    case 'ArrowDown':  e.preventDefault(); navigateDown();         break;
    case 'ArrowUp':    e.preventDefault(); navigateUp();           break;
  }
});

// ───────────────────────────────────────────────────────────
// PARTICLE FLOW
// ───────────────────────────────────────────────────────────
(function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles;
  const PARTICLE_COUNT = 60;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function createParticle() {
    const colors = [
      'rgba(91,138,245,0.12)',
      'rgba(167,139,250,0.10)',
      'rgba(52,211,153,0.08)',
      'rgba(96,165,250,0.10)',
      'rgba(255,255,255,0.04)'
    ];
    return {
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.15 - 0.1,
      r: Math.random() * 1.8 + 0.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: Math.random() * 400 + 200,
      age: 0,
      maxAge: Math.random() * 400 + 200
    };
  }

  function init() {
    resize();
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = createParticle();
      p.age = Math.random() * p.maxAge;
      particles.push(p);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.age++;

      // Fade in/out
      let alpha = 1;
      const fadeIn = p.maxAge * 0.15;
      const fadeOut = p.maxAge * 0.8;
      if (p.age < fadeIn) alpha = p.age / fadeIn;
      else if (p.age > fadeOut) alpha = 1 - (p.age - fadeOut) / (p.maxAge - fadeOut);

      if (p.age >= p.maxAge || p.x < -10 || p.x > w + 10 || p.y < -10 || p.y > h + 10) {
        particles[i] = createParticle();
        continue;
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace(/[\d.]+\)$/, (alpha * parseFloat(p.color.match(/[\d.]+\)$/)[0])).toFixed(3) + ')');
      ctx.fill();
    }

    // Draw faint connecting lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(91,138,245,${(1 - dist / 120) * 0.04})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init();
  draw();
})();

// ───────────────────────────────────────────────────────────
// CLOCK TICK
// ───────────────────────────────────────────────────────────
let baseTime = 2 * 3600 + 34 * 60 + 17;
let baseCost = 12.47;
let baseTokens = 1840;

setInterval(() => {
  baseTime++;
  const hh = String(Math.floor(baseTime / 3600)).padStart(2, '0');
  const mm = String(Math.floor((baseTime % 3600) / 60)).padStart(2, '0');
  const ss = String(baseTime % 60).padStart(2, '0');
  document.getElementById('hdrTime').textContent = `${hh}:${mm}:${ss}`;

  if (baseTime % 7 === 0) {
    baseCost += 0.01;
    document.getElementById('hdrCost').textContent = '$' + baseCost.toFixed(2);
  }

  if (baseTime % 4 === 0) {
    baseTokens += Math.floor(Math.random() * 3) + 1;
    const display = baseTokens >= 1000 ? (baseTokens / 1000).toFixed(2) + 'M' : baseTokens + 'K';
    document.getElementById('hdrTokens').textContent = display;
  }
}, 1000);

// ───────────────────────────────────────────────────────────
// RESIZE
// ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => requestAnimationFrame(() => renderBeams()));

// ───────────────────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────────────────
fullRender();
</script>
</body>
</html>
