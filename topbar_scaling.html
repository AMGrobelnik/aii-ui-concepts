<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Bar — How tabs scale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root { --blue: #3b82f6; --green: #10b981; --radius: 14px; --ease: cubic-bezier(.4,0,.2,1); }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(124,92,252,.12), transparent),
    radial-gradient(ellipse 500px 500px at 80% 70%, rgba(59,130,246,.1), transparent),
    linear-gradient(135deg, #f8f4ef 0%, #eee8e0 30%, #e8e0f0 60%, #dde8f8 100%);
  padding: 32px; color: #1a1a2e;
}
h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.subtitle { font-size: 12px; color: #7a7a94; margin-bottom: 32px; }
.section { margin-bottom: 40px; }
.variant-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #9e9eb5; margin-bottom: 10px; }
.variant-note { font-size: 11px; color: #7a7a94; margin-top: 10px; max-width: 700px; line-height: 1.6; }

.frame {
  width: 720px; height: 380px; border-radius: var(--radius);
  overflow: hidden; display: flex;
  box-shadow: 0 2px 16px rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.04);
}

/* Sidebar */
.sb {
  width: 200px; min-width: 200px;
  background: rgba(255,253,250,.7); backdrop-filter: blur(16px) saturate(1.2);
  border-right: 1px solid rgba(0,0,0,.04);
  display: flex; flex-direction: column; font-size: 11px;
}
.sb-brand { display: flex; align-items: center; gap: 8px; padding: 12px 12px 10px; border-bottom: 1px solid rgba(0,0,0,.04); }
.sb-brand-logo { width: 22px; height: 22px; border-radius: 6px; }
.sb-brand-text { font-weight: 800; font-size: 12px; letter-spacing: -.2px; }
.sb-nav { padding: 6px 8px 4px; }
.sb-nav-item { display: flex; align-items: center; gap: 7px; padding: 5px 8px; border-radius: 6px; cursor: pointer; color: #6e6e87; font-weight: 500; }
.sb-nav-item:hover { background: rgba(0,0,0,.03); }
.sb-nav-icon svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.sb-divider { height: 1px; margin: 4px 12px; background: rgba(0,0,0,.04); }
.sb-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: #b0a898; padding: 8px 12px 3px; }
.sb-item { padding: 4px 12px; color: #4a4a5e; cursor: pointer; border-radius: 5px; margin: 0 6px; }
.sb-item:hover { background: rgba(0,0,0,.025); }
.sb-item.active { background: rgba(59,130,246,.06); color: #1a1a2e; font-weight: 600; }
.sb-items { flex: 1; overflow: hidden; padding: 2px 0; }

/* Main */
.main { flex: 1; background: rgba(255,255,255,.5); display: flex; flex-direction: column; }
.main-body { flex: 1; padding: 16px; display: flex; align-items: center; justify-content: center; color: #b0a8b8; font-size: 11px; font-style: italic; }

/* Top bar */
.topbar {
  display: flex; align-items: center; padding: 0 14px;
  border-bottom: 1px solid rgba(0,0,0,.06);
  background: rgba(255,255,255,.4);
  min-height: 38px;
}
.tab {
  padding: 9px 12px 7px; font-size: 11px; font-weight: 500;
  color: #8a8a9e; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .12s; margin-bottom: -1px; white-space: nowrap;
}
.tab:hover { color: #4a4a5e; }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tab-spacer { flex: 1; }
.tb-sep { width: 1px; height: 16px; background: rgba(0,0,0,.06); margin: 0 6px; }
.tb-btn {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: transparent; cursor: pointer; font-size: 11px;
  color: #9e9eb5; display: grid; place-items: center;
}
.tb-btn:hover { background: rgba(0,0,0,.04); color: #6e6e87; }
.tb-text { font-size: 10px; color: #9e9eb5; white-space: nowrap; }
.tb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.tb-status { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #9e9eb5; }

/* More button */
.tb-more {
  padding: 9px 10px 7px; font-size: 11px; font-weight: 500;
  color: #9e9eb5; cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; position: relative;
}
.tb-more:hover { color: #6e6e87; }
.tb-more-menu {
  position: absolute; top: 100%; left: 0; margin-top: 4px;
  background: #fff; border: 1px solid rgba(0,0,0,.08);
  border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.08);
  padding: 4px; min-width: 140px; z-index: 10;
}
.tb-more-item {
  padding: 6px 10px; font-size: 11px; color: #4a4a5e;
  border-radius: 5px; cursor: pointer;
}
.tb-more-item:hover { background: rgba(0,0,0,.03); }

/* Icons for sidebar */
.icon-bulb { }
.icon-list { }
.icon-compass { }
</style>
</head>
<body>

<h1>How the top bar scales</h1>
<p class="subtitle">Same D1 pattern with 2, 4, and 6+ tabs — it just works</p>

<script>
function sidebar() {
  return `<div class="sb">
    <div class="sb-brand"><img src="logo_32.png" class="sb-brand-logo"><span class="sb-brand-text">AI Inventor</span></div>
    <div class="sb-nav">
      <div class="sb-nav-item"><span class="sb-nav-icon"><svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a6 6 0 0 1 4 10.47V17a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1v-3.53A6 6 0 0 1 12 3z"/></svg></span>Invent</div>
      <div class="sb-nav-item"><span class="sb-nav-icon"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/><circle cx="19" cy="17" r="2"/></svg></span>Inventions</div>
      <div class="sb-nav-item"><span class="sb-nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36z"/></svg></span>Discover</div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-label">Starred</div>
    <div class="sb-items" style="flex:0"><div class="sb-item">DDM Rankings Study</div></div>
    <div class="sb-label">Recents</div>
    <div class="sb-items">
      <div class="sb-item active">Syntactic Load Smoothing</div>
      <div class="sb-item">Schema Treewidth</div>
      <div class="sb-item">Oblique Tree Sums</div>
    </div>
  </div>`;
}

function right(status) {
  return `<div class="tab-spacer"></div>
    <div class="tb-status"><div class="tb-dot"></div>${status}</div>
    <div class="tb-sep"></div>
    <div class="tb-btn" title="Help">?</div>`;
}

const sections = [
  {
    label: 'Now — 2 tabs (what we need today)',
    note: 'Just Overview and Advanced. Clean, plenty of room. This is the starting point.',
    tabs: `<div class="tab active">Overview</div><div class="tab">Advanced</div>`,
    status: 'Round 3/8',
  },
  {
    label: 'Later — 4 tabs (add Logs + Paper)',
    note: 'Added Logs and Paper tabs. Still clean, no crowding. Tabs just flow naturally.',
    tabs: `<div class="tab active">Overview</div><div class="tab">Advanced</div><div class="tab">Logs</div><div class="tab">Paper</div>`,
    status: 'Round 5/8',
  },
  {
    label: 'Even later — 6 tabs (Artifacts, Cost)',
    note: 'Six tabs and it still works fine. The right side has room for status + help. Only gets tight past ~8 tabs.',
    tabs: `<div class="tab active">Overview</div><div class="tab">Advanced</div><div class="tab">Logs</div><div class="tab">Paper</div><div class="tab">Artifacts</div><div class="tab">Cost</div>`,
    status: 'Completed',
  },
  {
    label: 'Max — overflow menu for 8+ tabs',
    note: 'If you ever need 8+ tabs, last ones go into a "More" dropdown. But honestly you probably never need this many.',
    tabs: `<div class="tab active">Overview</div><div class="tab">Advanced</div><div class="tab">Logs</div><div class="tab">Paper</div><div class="tab">Artifacts</div><div class="tb-more">More ▾
      <div class="tb-more-menu">
        <div class="tb-more-item">Cost</div>
        <div class="tb-more-item">Config</div>
        <div class="tb-more-item">Debug</div>
      </div>
    </div>`,
    status: 'Completed',
  },
];

document.write(sections.map(s => `
  <div class="section">
    <div class="variant-label">${s.label}</div>
    <div class="frame">
      ${sidebar()}
      <div class="main">
        <div class="topbar">${s.tabs}${right(s.status)}</div>
        <div class="main-body">Content area</div>
      </div>
    </div>
    <div class="variant-note">${s.note}</div>
  </div>
`).join(''));
</script>

</body>
</html>
