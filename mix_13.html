<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Mix 13 (Two-Column Dashboard)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ──────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1117;
    --surface:   #181b23;
    --surface2:  #1e222c;
    --surface3:  #252932;
    --border:    #272c38;
    --border2:   #323845;
    --text:      #c9cdd8;
    --muted:     #6b7280;
    --bright:    #e8eaf0;
    --green:     #34d399;
    --purple:    #a78bfa;
    --blue:      #60a5fa;
    --amber:     #fbbf24;
    --rose:      #fb7185;
    --slate:     #475569;
    --green-15:  rgba(52, 211, 153, .12);
    --purple-15: rgba(167, 139, 250, .12);
    --blue-15:   rgba(96, 165, 250, .12);
    --amber-15:  rgba(251, 191, 36, .12);
    --rose-15:   rgba(251, 113, 133, .12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--purple); color: #fff; }

  /* ── Ring Sidebar ──────────────────────────────────────── */
  .ring-sidebar { width: 96px; min-width: 96px; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 18px 0 14px; border-right: 1px solid var(--border); background: var(--surface); position: relative; z-index: 10; overflow-y: auto; }
  .ring-sidebar::-webkit-scrollbar { width: 0; }
  .sidebar-logo { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--green), var(--blue)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; margin-bottom: 22px; box-shadow: 0 0 22px rgba(52, 211, 153, .2); flex-shrink: 0; }
  .ring-card { position: relative; width: 80px; display: flex; flex-direction: column; align-items: center; padding: 10px 4px 8px; margin-bottom: 6px; border-radius: 10px; cursor: pointer; transition: background .2s; flex-shrink: 0; }
  .ring-card:hover { background: var(--surface2); }
  .ring-card.active { background: var(--surface2); }
  .ring-card.active::after { content: ''; position: absolute; right: -8px; top: 50%; transform: translateY(-50%); width: 3px; height: 22px; border-radius: 2px; background: var(--ring-accent, var(--green)); }
  .ring-svg-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .ring-svg-wrap svg { width: 52px; height: 52px; }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-progress { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset .6s ease, stroke .3s; }
  .ring-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--muted); transition: color .3s; }
  .ring-card.active .ring-label { color: var(--bright); }
  .ring-name { font-size: 9px; color: var(--muted); margin-top: 4px; text-align: center; line-height: 1.2; transition: color .3s; }
  .ring-card.active .ring-name { color: var(--text); }

  /* ── Sparkline (canvas) ─────────────────────────────── */
  .sparkline-wrap { width: 60px; height: 16px; margin-top: 5px; border-radius: 3px; overflow: hidden; position: relative; }
  .sparkline-wrap canvas { display: block; width: 60px; height: 16px; }
  .ring-spacer { flex: 1; }
  .sidebar-status { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; writing-mode: vertical-rl; text-orientation: mixed; margin-top: 12px; flex-shrink: 0; }

  /* ── Main Area ─────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* ── Row 1: Module Nodes ───────────────────────────────── */
  .row1 { padding: 18px 28px 12px; display: flex; align-items: center; gap: 0; position: relative; z-index: 5; min-height: 70px; }
  .mod-node { position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; flex-shrink: 0; }
  .mod-circle { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--muted); background: var(--surface); transition: all .3s ease; position: relative; z-index: 2; }
  .mod-node.active .mod-circle { border-color: var(--node-color); color: var(--bright); box-shadow: 0 0 14px color-mix(in srgb, var(--node-color) 35%, transparent); }
  .mod-node.active .mod-circle::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid var(--node-color); opacity: 0; animation: nodeGlow 3s ease-in-out infinite; }
  @keyframes nodeGlow { 0%, 100% { opacity: 0; transform: scale(.9); } 50% { opacity: .35; transform: scale(1.1); } }
  .mod-status { position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--surface); z-index: 3; }
  .mod-status.done    { background: var(--green); }
  .mod-status.running { background: var(--blue); animation: statusPulse 1.5s ease-in-out infinite; }
  .mod-status.pending { background: var(--border); }
  @keyframes statusPulse { 0%,100%{ opacity:1 } 50%{ opacity:.45 } }
  .mod-name { font-size: 9px; color: var(--muted); margin-top: 4px; white-space: nowrap; max-width: 72px; overflow: hidden; text-overflow: ellipsis; text-align: center; transition: color .3s; }
  .mod-node.active .mod-name { color: var(--bright); }

  /* Particle connectors */
  .mod-conn { width: 48px; height: 2px; position: relative; flex-shrink: 0; margin: 0 2px; align-self: flex-start; margin-top: 16px; }
  .mod-conn .track { position: absolute; inset: 0; background: var(--border); border-radius: 1px; }
  .mod-conn .fill  { position: absolute; top: 0; left: 0; height: 100%; border-radius: 1px; transition: width .4s ease; }
  .mod-conn .p-lane { position: absolute; inset: 0; overflow: hidden; border-radius: 1px; }
  .mod-conn .particle { position: absolute; width: 6px; height: 2px; border-radius: 1px; top: 0; opacity: 0; }
  .mod-conn.passed .particle { animation: pFlow 2.4s linear infinite; }
  @keyframes pFlow { 0%{ left:-6px; opacity:0 } 10%{ opacity:.8 } 90%{ opacity:.8 } 100%{ left:100%; opacity:0 } }

  /* ── Row 2: Sub-step Dots ──────────────────────────────── */
  .row2 { padding: 0 28px 12px; display: flex; align-items: center; gap: 8px; min-height: 28px; position: relative; z-index: 5; }
  .sub-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); cursor: pointer; transition: all .3s ease; position: relative; flex-shrink: 0; }
  .sub-dot.completed { background: var(--sub-color); border-color: var(--sub-color); opacity: .65; }
  .sub-dot.active { border-color: var(--sub-color); box-shadow: 0 0 8px color-mix(in srgb, var(--sub-color) 50%, transparent); transform: scale(1.25); }
  .sub-dot.active::before { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 1px solid var(--sub-color); opacity: 0; animation: dotPulse 2s ease-out infinite; }
  @keyframes dotPulse { 0%{ transform:scale(.8); opacity:.6 } 100%{ transform:scale(1.6); opacity:0 } }
  .sub-dot:hover { border-color: var(--sub-color); transform: scale(1.15); }
  .sub-dot::after { content: attr(title); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); padding: 3px 9px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); font-size: 10px; color: var(--text); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 10; }
  .sub-dot:hover::after { opacity: 1; }
  .sub-conn { width: 14px; height: 1px; background: var(--border); flex-shrink: 0; }

  /* ── Glow Beam ─────────────────────────────────────────── */
  .beam-container { position: absolute; top: 0; left: 0; width: 100%; height: 120px; pointer-events: none; z-index: 3; overflow: visible; }
  .beam-line { position: absolute; width: 2px; transition: left .3s cubic-bezier(.4,0,.2,1), height .3s ease, opacity .3s; opacity: 0; }
  .beam-line.visible { opacity: 1; }
  .beam-core { position: absolute; inset: 0; width: 2px; border-radius: 1px; }
  .beam-glow { position: absolute; top: 0; bottom: 0; left: -8px; width: 18px; border-radius: 9px; filter: blur(7px); opacity: .3; }
  .beam-glow-outer { position: absolute; top: 0; bottom: 0; left: -14px; width: 30px; border-radius: 15px; filter: blur(14px); opacity: .12; }
  .beam-spark { position: absolute; width: 2px; height: 14px; border-radius: 1px; left: 0; top: 0; opacity: 0; }
  .beam-line.visible .beam-spark { animation: sparkDrop 1.8s ease-in-out infinite; }
  @keyframes sparkDrop { 0%{ top:0; opacity:0 } 15%{ opacity:1 } 85%{ opacity:1 } 100%{ top:calc(100% - 14px); opacity:0 } }

  /* ── Breadcrumb ────────────────────────────────────────── */
  .breadcrumb { padding: 8px 28px 0; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); position: relative; z-index: 5; }
  .breadcrumb .sep { opacity: .4; }
  .breadcrumb .crumb { cursor: pointer; transition: color .2s; }
  .breadcrumb .crumb:hover { color: var(--bright); }
  .breadcrumb .crumb.current { color: var(--bright); font-weight: 500; }

  /* ── Content Area ──────────────────────────────────────── */
  .content { flex: 1; padding: 0 28px 28px; overflow-y: auto; position: relative; z-index: 4; }
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .content-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .content-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .content-title { font-size: 17px; font-weight: 600; color: var(--bright); letter-spacing: -.02em; }
  .content-subtitle { font-size: 12px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }

  /* ── Two-Column Layout ─────────────────────────────────── */
  .two-col { display: grid; grid-template-columns: 60fr 40fr; gap: 20px; min-height: 0; }
  @media (max-width: 960px) { .two-col { grid-template-columns: 1fr; } }
  .col-left, .col-right { display: flex; flex-direction: column; gap: 12px; min-width: 0; }

  /* ── Colored Line Divider ──────────────────────────────── */
  .color-line { height: 2px; border-radius: 1px; margin: 4px 0 8px; position: relative; overflow: hidden; }
  .color-line::after { content: ''; position: absolute; inset: 0; border-radius: 1px; animation: lineShimmer 3s ease-in-out infinite; }
  @keyframes lineShimmer { 0% { opacity: .5; } 50% { opacity: 1; } 100% { opacity: .5; } }

  /* ── Section Label ─────────────────────────────────────── */
  .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .section-label .line { flex: 1; height: 1px; background: var(--border); }

  /* ── Summary Box ───────────────────────────────────────── */
  .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
  .summary-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 1px 1px 0 0; }
  .summary-box .summary-title { font-size: 13px; font-weight: 600; color: var(--bright); margin-bottom: 6px; }
  .summary-box .summary-text { font-size: 12px; color: var(--text); line-height: 1.7; }

  /* ── Cards ─────────────────────────────────────────────── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 15px 18px; transition: border-color .3s, box-shadow .3s; }
  .card:hover { border-color: color-mix(in srgb, var(--card-accent, var(--green)) 25%, var(--border)); }
  .card-title { font-size: 13px; font-weight: 600; color: var(--bright); margin-bottom: 5px; display: flex; align-items: center; gap: 7px; }
  .card-title .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .card-text { font-size: 12px; color: var(--text); line-height: 1.65; }
  .card-meta { display: flex; gap: 12px; margin-top: 8px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .card-tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; margin-right: 5px; }
  .mini-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .mini-bar .fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; }
  .badge.done    { background: var(--green-15);  color: var(--green); }
  .badge.running { background: var(--blue-15);   color: var(--blue);  }
  .badge.pending { background: rgba(107,114,128,.12); color: var(--muted); }

  /* Card stagger animation */
  .col-left .card,
  .col-left .summary-box,
  .col-right .stat-card,
  .col-right .activity-section { animation: cardIn .35s ease-out both; }
  .col-left > :nth-child(1) { animation-delay: 0s; }
  .col-left > :nth-child(2) { animation-delay: .04s; }
  .col-left > :nth-child(3) { animation-delay: .08s; }
  .col-left > :nth-child(4) { animation-delay: .12s; }
  .col-left > :nth-child(5) { animation-delay: .16s; }
  .col-left > :nth-child(6) { animation-delay: .20s; }
  .col-left > :nth-child(7) { animation-delay: .24s; }
  .col-left > :nth-child(8) { animation-delay: .28s; }
  .col-right > :nth-child(1) { animation-delay: .05s; }
  .col-right > :nth-child(2) { animation-delay: .10s; }
  .col-right > :nth-child(3) { animation-delay: .15s; }
  .col-right > :nth-child(4) { animation-delay: .20s; }
  .col-right > :nth-child(5) { animation-delay: .25s; }
  @keyframes cardIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── Stat Cards (Right Column) ─────────────────────────── */
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; transition: border-color .3s; }
  .stat-card:hover { border-color: var(--border2); }
  .stat-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .stat-info { flex: 1; min-width: 0; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--bright); line-height: 1.2; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  .stat-delta { font-size: 10px; font-weight: 500; margin-top: 3px; display: flex; align-items: center; gap: 3px; }
  .stat-delta.up   { color: var(--green); }
  .stat-delta.down { color: var(--rose); }
  .stat-delta.flat { color: var(--muted); }

  .stat-spark { width: 50px; height: 20px; flex-shrink: 0; align-self: center; }
  .stat-spark canvas { display: block; width: 50px; height: 20px; }

  /* ── Activity Breakdown ────────────────────────────────── */
  .activity-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .activity-title { font-size: 12px; font-weight: 600; color: var(--bright); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .activity-title .indicator { width: 6px; height: 6px; border-radius: 50%; }
  .activity-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .activity-row + .activity-row { border-top: 1px solid var(--border); }
  .activity-label { font-size: 11px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .activity-bar-wrap { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
  .activity-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }
  .activity-val { font-size: 10px; color: var(--muted); width: 30px; text-align: right; flex-shrink: 0; }

  /* ── Collapsible Sections ──────────────────────────────── */
  .collapse-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; transition: background .2s, border-color .2s; user-select: none; }
  .collapse-toggle:hover { background: var(--surface2); border-color: var(--border2); }
  .collapse-chevron { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); transition: transform .25s ease; flex-shrink: 0; }
  .collapse-toggle.open .collapse-chevron { transform: rotate(90deg); }
  .collapse-label { font-size: 12px; font-weight: 600; color: var(--bright); flex: 1; }
  .collapse-count { font-size: 10px; color: var(--muted); padding: 1px 6px; background: var(--surface2); border-radius: 4px; }
  .collapse-body { overflow: hidden; max-height: 0; transition: max-height .35s ease; }
  .collapse-body.expanded { max-height: 2000px; }
  .collapse-body-inner { padding-top: 8px; display: flex; flex-direction: column; gap: 10px; }

  /* ── Particle Canvas (Background) ──────────────────────── */
  #particleCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; opacity: .35; }

  /* ── Keyboard Hint ─────────────────────────────────────── */
  .kb-hint { position: fixed; bottom: 14px; right: 18px; display: flex; gap: 5px; align-items: center; z-index: 20; }
  .kb-hint kbd { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 4px; background: var(--surface); border: 1px solid var(--border); font-size: 10px; font-family: inherit; color: var(--muted); }
  .kb-hint span { font-size: 9px; color: var(--muted); }

  /* ── Donut Chart ───────────────────────────────────────── */
  .donut-wrap { display: flex; align-items: center; gap: 14px; padding: 4px 0; }
  .donut-chart { width: 56px; height: 56px; flex-shrink: 0; position: relative; }
  .donut-chart svg { width: 56px; height: 56px; }
  .donut-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--bright); }
  .donut-legend { display: flex; flex-direction: column; gap: 4px; }
  .donut-legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text); }
  .donut-legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── Timeline Entries ──────────────────────────────────── */
  .timeline-entry { display: flex; gap: 10px; padding: 5px 0; font-size: 11px; }
  .timeline-entry + .timeline-entry { border-top: 1px solid var(--border); }
  .timeline-time { color: var(--muted); width: 40px; flex-shrink: 0; font-size: 10px; }
  .timeline-dot-col { display: flex; flex-direction: column; align-items: center; width: 10px; flex-shrink: 0; }
  .timeline-dot-sm { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .timeline-msg { color: var(--text); line-height: 1.5; flex: 1; min-width: 0; }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<!-- Ring Sidebar -->
<div class="ring-sidebar" id="ringSidebar"></div>

<!-- Main Area -->
<div class="main">
  <div class="beam-container" id="beamContainer">
    <div class="beam-line" id="beamLine">
      <div class="beam-glow-outer"></div>
      <div class="beam-glow"></div>
      <div class="beam-core"></div>
      <div class="beam-spark"></div>
    </div>
  </div>
  <div class="row1" id="row1"></div>
  <div class="row2" id="row2"></div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="content" id="content"></div>
</div>

<div class="kb-hint">
  <kbd>&#8592;</kbd><kbd>&#8594;</kbd><span>module</span>
  <kbd>&#8593;</kbd><kbd>&#8595;</kbd><span>step</span>
</div>

<script>
// =====================================================================
// Pipeline Data
// =====================================================================
const COLORS = {
  green:  '#34d399',
  purple: '#a78bfa',
  blue:   '#60a5fa',
  amber:  '#fbbf24',
  rose:   '#fb7185',
  muted:  '#6b7280',
};

const PIPELINE = [
  {
    id: 'seed', name: 'Seed Hypotheses', short: 'SEED',
    color: 'green', progress: 100,
    sparkline: [.1,.3,.6,.9,1,.95,.8,.7,.85,.9,.75,.6,.5,.4,.3,.2,.15,.1,.05,.02],
    steps: [
      {
        name: 'Knowledge Graph',
        status: 'done',
        content: {
          title: 'Knowledge Graph Extraction',
          subtitle: 'I parsed 38 source papers and extracted a knowledge graph to seed the hypothesis generation process.',
          summary: 'Extracted 847 entities and 1,204 relations from the source corpus. The graph is fully assembled with TransE embeddings indexed in FAISS for sub-millisecond nearest-neighbor retrieval.',
          cards: [
            { title: 'Entity Extraction', dot: 'green', text: 'I identified 847 unique entities across the source corpus. The breakdown: 312 methods, 198 materials, 167 properties, and 170 applications. I resolved 63 duplicate references through entity linking.', tags: [{ label: 'NER', color: 'green' }, { label: 'complete', color: 'green' }], meta: ['847 entities', '12 papers', '23s'] },

function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 40;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - .5) * .15,
      vy: (Math.random() - .5) * .15,
      r: Math.random() * 1.5 + .5,
      alpha: Math.random() * .3 + .05,
    });
  }

  function draw() {
    const dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    const w = window.innerWidth, h = window.innerHeight;
    const modColor = COLORS[PIPELINE[activeModule].color];

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = w;
      if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h;
      if (p.y > h) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = modColor;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
    });

    // Draw connections
    ctx.globalAlpha = 1;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = modColor;
          ctx.globalAlpha = .04 * (1 - dist / 120);
          ctx.lineWidth = .5;
          ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  draw();
}

// =====================================================================
// Sparkline rendering (canvas)
// =====================================================================
function drawSparkline(canvas, data, color, isActive, isPending, w, h) {
  w = w || 60; h = h || 16;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const pts = data.length;
  const step = w / (pts - 1);

  if (isPending) {
    ctx.beginPath();
    ctx.moveTo(0, h - 2);
    ctx.lineTo(w, h - 2);
    ctx.strokeStyle = 'rgba(107,114,128,.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
    return;
  }

  const maxV = Math.max(...data.map(v => typeof v === 'number' ? Math.abs(v) : 0)) || 1;
  const points = data.map((v, i) => ({ x: i * step, y: h - 2 - (v / maxV) * (h - 4) }));

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '05');

  ctx.beginPath();
  ctx.moveTo(points[0].x, h);
  points.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(points[points.length - 1].x, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();

  if (isActive) {
    const last = points[Math.floor(pts * 0.85)];
    if (last) {
      ctx.beginPath();
      ctx.arc(last.x, last.y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(last.x, last.y, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = color + '30';
      ctx.fill();
    }
  }
}

// Animated sparklines
let sparklineAnimFrame = 0;
const activeSparklineCanvases = [];

function animateActiveSparklines() {
  sparklineAnimFrame++;
  activeSparklineCanvases.forEach(({ canvas, data, color, w, h }) => {
    w = w || 60; h = h || 16;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, w * dpr, h * dpr);
    ctx.save();
    ctx.scale(dpr, dpr);

    const pts = data.length;
    const step = w / (pts - 1);
    const extent = 0.7 + 0.2 * (0.5 + 0.5 * Math.sin(sparklineAnimFrame * 0.04));
    const visiblePts = Math.floor(pts * extent);
    const maxV = Math.max(...data) || 1;

    const points = data.slice(0, visiblePts).map((v, i) => ({
      x: i * step,
      y: h - 2 - (v / maxV) * (h - 4)
    }));

    if (points.length < 2) { ctx.restore(); return; }

    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, color + '30');
    grad.addColorStop(1, color + '05');
    ctx.beginPath();
    ctx.moveTo(points[0].x, h);
    points.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(points[points.length - 1].x, h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();

    const last = points[points.length - 1];
    const pulseR = 2.5 + 0.8 * Math.sin(sparklineAnimFrame * 0.08);
    ctx.beginPath();
    ctx.arc(last.x, last.y, pulseR, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(last.x, last.y, pulseR + 3, 0, Math.PI * 2);
    ctx.fillStyle = color + '25';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(last.x, h - 2);
    ctx.lineTo(w, h - 2);
    ctx.strokeStyle = 'rgba(107,114,128,.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.restore();
  });
  requestAnimationFrame(animateActiveSparklines);
}

// =====================================================================
// Render Ring Sidebar
// =====================================================================
function renderRings() {
  const sb = document.getElementById('ringSidebar');
  sb.innerHTML = '';
  activeSparklineCanvases.length = 0;

  const logo = document.createElement('div');
  logo.className = 'sidebar-logo';
  logo.textContent = 'AI';
  sb.appendChild(logo);

  PIPELINE.forEach((mod, i) => {
    const card = document.createElement('div');
    card.className = 'ring-card' + (i === activeModule ? ' active' : '');
    card.style.setProperty('--ring-accent', COLORS[mod.color]);

    const circumference = 2 * Math.PI * 21;
    const offset = circumference - (mod.progress / 100) * circumference;
    const hex = COLORS[mod.color];
    const isActive = mod.progress > 0 && mod.progress < 100;
    const isPending = mod.progress === 0;

    card.innerHTML = `
      <div class="ring-svg-wrap">
        <svg viewBox="0 0 52 52">
          <circle class="ring-track" cx="26" cy="26" r="21"/>
          <circle class="ring-progress" cx="26" cy="26" r="21"
            stroke="${hex}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"
            transform="rotate(-90 26 26)"/>
        </svg>
        <div class="ring-label">${mod.short}</div>
      </div>
      <div class="ring-name">${mod.name}</div>
      <div class="sparkline-wrap"><canvas class="sparkline-canvas"></canvas></div>
    `;

    card.addEventListener('click', () => { activeModule = i; activeStep = 0; render(); });
    sb.appendChild(card);

    requestAnimationFrame(() => {
      const canvas = card.querySelector('.sparkline-canvas');
      if (!canvas) return;
      if (isActive) {
        activeSparklineCanvases.push({ canvas, data: mod.sparkline, color: hex });
      } else {
        drawSparkline(canvas, mod.sparkline, hex, false, isPending);
      }
    });
  });

  const spacer = document.createElement('div');
  spacer.className = 'ring-spacer';
  sb.appendChild(spacer);

  const status = document.createElement('div');
  status.className = 'sidebar-status';
  status.textContent = 'pipeline active';
  sb.appendChild(status);
}

// =====================================================================
// Render Row 1 — Module Nodes with particle connectors
// =====================================================================
function renderRow1() {
  const row = document.getElementById('row1');
  row.innerHTML = '';

  PIPELINE.forEach((mod, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      const prev = PIPELINE[i - 1];
      conn.className = 'mod-conn' + (prev.progress === 100 ? ' passed' : '');
      const c1 = COLORS[prev.color], c2 = COLORS[mod.color];
      conn.innerHTML = `
        <div class="track"></div>
        <div class="fill" style="width:${prev.progress === 100 ? '100' : '0'}%;background:linear-gradient(90deg,${c1},${c2})"></div>
        <div class="p-lane">
          <div class="particle" style="background:${c1};animation-delay:0s"></div>
          <div class="particle" style="background:${c2};animation-delay:1.2s"></div>
        </div>
      `;
      row.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'mod-node' + (i === activeModule ? ' active' : '');
    node.style.setProperty('--node-color', COLORS[mod.color]);
    node.dataset.index = i;

    const icon = mod.progress === 100 ? '\u2713' : (mod.progress > 0 ? '\u25B6' : (i + 1));
    const st = mod.progress === 100 ? 'done' : (mod.progress > 0 ? 'running' : 'pending');
    node.innerHTML = `
      <div class="mod-circle">
        ${icon}
        <div class="mod-status ${st}"></div>
      </div>
      <div class="mod-name">${mod.name}</div>
    `;
    node.addEventListener('click', () => { activeModule = i; activeStep = 0; render(); });
    row.appendChild(node);
  });
}

// =====================================================================
// Render Row 2 — Sub-step dots
// =====================================================================
function renderRow2() {
  const row = document.getElementById('row2');
  row.innerHTML = '';
  const mod = PIPELINE[activeModule];
  const color = COLORS[mod.color];

  mod.steps.forEach((step, i) => {
    if (i > 0) {
      const c = document.createElement('div');
      c.className = 'sub-conn';
      row.appendChild(c);
    }
    const dot = document.createElement('div');
    dot.className = 'sub-dot';
    dot.style.setProperty('--sub-color', color);
    dot.dataset.index = i;
    dot.title = step.name;
    if (i === activeStep) dot.classList.add('active');
    else if (step.status === 'done') dot.classList.add('completed');
    dot.addEventListener('click', () => { activeStep = i; render(); });
    row.appendChild(dot);
  });
}

// =====================================================================
// Render Glow Beam
// =====================================================================
function renderBeam() {
  const beam = document.getElementById('beamLine');
  const container = document.getElementById('beamContainer');
  const moduleNode = document.querySelector(`.mod-node[data-index="${activeModule}"]`);
  const subDot = document.querySelector(`.sub-dot[data-index="${activeStep}"]`);
  if (!moduleNode || !subDot) { beam.classList.remove('visible'); return; }

  const mainEl = document.querySelector('.main');
  const mr = mainEl.getBoundingClientRect();
  const mc = moduleNode.querySelector('.mod-circle').getBoundingClientRect();
  const sd = subDot.getBoundingClientRect();

  const mx = mc.left + mc.width / 2 - mr.left;
  const sx = sd.left + sd.width / 2 - mr.left;
  const top = mc.bottom - mr.top;
  const bot = sd.top - mr.top;
  const h = Math.max(bot - top, 4);
  const color = COLORS[PIPELINE[activeModule].color];

  beam.style.left = mx + 'px';
  beam.style.top = top + 'px';
  beam.style.height = h + 'px';
  beam.querySelector('.beam-core').style.background = color;
  beam.querySelector('.beam-glow').style.background = color;
  beam.querySelector('.beam-glow-outer').style.background = color;
  beam.querySelector('.beam-spark').style.background = `linear-gradient(to bottom, transparent, ${color}, transparent)`;
  container.style.height = (bot + 20) + 'px';
  beam.classList.add('visible');

  if (Math.abs(mx - sx) > 2) {
    const dx = sx - mx;
    const angle = Math.atan2(dx, h) * (180 / Math.PI);
    const len = Math.sqrt(dx * dx + h * h);
    beam.style.height = len + 'px';
    beam.style.transformOrigin = 'top center';
    beam.style.transform = `rotate(${angle}deg)`;
  } else {
    beam.style.transform = 'none';
  }
}

// =====================================================================
// Render Breadcrumb
// =====================================================================
function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  const mod = PIPELINE[activeModule];
  const step = mod.steps[activeStep];
  el.innerHTML = `
    <span class="crumb" onclick="activeModule=0;activeStep=0;render();">Pipeline</span>
    <span class="sep">/</span>
    <span class="crumb" onclick="activeStep=0;render();">${mod.name}</span>
    <span class="sep">/</span>
    <span class="crumb current">${step.name}</span>
  `;
}

// =====================================================================
// Donut chart SVG helper
// =====================================================================
function buildDonutSVG(segments, total) {
  const r = 22, cx = 28, cy = 28;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let arcs = '';
  segments.forEach(seg => {
    const frac = seg.value / total;
    const dash = frac * circ;
    const gap = circ - dash;
    const color = COLORS[seg.color] || seg.color;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round" opacity=".85"/>`;
    offset += dash;
  });
  return `<svg viewBox="0 0 56 56">${arcs}</svg>`;
}

// =====================================================================
// Render Two-Column Content
// =====================================================================
function renderContent() {
  const el = document.getElementById('content');
  const mod = PIPELINE[activeModule];
  const step = mod.steps[activeStep];
  const data = step.content;
  const color = COLORS[mod.color];
  const stateKey = `${activeModule}-${activeStep}`;

  // Initialize collapse state for this view
  if (!(stateKey in collapseState)) {
    collapseState[stateKey] = { items: true, timeline: false };
  }
  const cs = collapseState[stateKey];

  let html = '';

  // Header
  html += `
    <div class="content-header">
      <div class="content-icon" style="background:${color}18;color:${color}">${activeStep + 1}</div>
      <div class="content-title">${data.title}</div>
      <div style="flex:1"></div>
      <div class="badge ${step.status === 'done' ? 'done' : step.status === 'running' ? 'running' : 'pending'}">
        ${step.status === 'done' ? '\u2713 Done' : step.status === 'running' ? '\u25CF Running' : '\u25CB Pending'}
      </div>
    </div>
    <div class="content-subtitle">${data.subtitle}</div>
  `;

  // Color line
  html += `<div class="color-line" style="background:${color}20"><div style="position:absolute;inset:0;border-radius:1px;background:linear-gradient(90deg,${color}60,${color},${color}60);" class="color-line-inner"></div></div>`;

  // Two-column layout
  html += '<div class="two-col">';

  // ── LEFT COLUMN (60%) ─────────────────────────
  html += '<div class="col-left">';

  // Summary box
  html += `
    <div class="summary-box" style="--card-accent:${color}">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,${color},transparent);border-radius:1px 1px 0 0;"></div>
      <div class="summary-title">Summary</div>
      <div class="summary-text">${data.summary}</div>
    </div>
  `;

  // Collapsible items section
  const itemCount = data.cards.length;
  html += `
    <div class="collapse-toggle ${cs.items ? 'open' : ''}" data-key="items" onclick="toggleCollapse('${stateKey}','items',this)">
      <div class="collapse-chevron">\u25B6</div>
      <div class="collapse-label">Components</div>
      <div class="collapse-count">${itemCount}</div>
    </div>
    <div class="collapse-body ${cs.items ? 'expanded' : ''}" id="collapse-items-${stateKey}">
      <div class="collapse-body-inner">
  `;

  data.cards.forEach(card => {
    const dc = COLORS[card.dot] || color;
    html += `<div class="card" style="--card-accent:${dc}">`;
    html += `<div class="card-title"><span class="dot" style="background:${dc}"></span>${card.title}</div>`;
    if (card.tags) {
      html += '<div style="margin-bottom:5px">';
      card.tags.forEach(t => {
        const tc = COLORS[t.color] || t.color;
        html += `<span class="card-tag" style="background:${tc}15;color:${tc}">${t.label}</span>`;
      });
      html += '</div>';
    }
    html += `<div class="card-text">${card.text}</div>`;
    if (card.meta) {
      html += '<div class="card-meta">';
      card.meta.forEach(m => { html += `<span>${m}</span>`; });
      html += '</div>';
    }
    if (step.status === 'running' && (card.dot === 'blue' || card.dot === 'amber')) {
      html += `<div class="mini-bar"><div class="fill" style="width:65%;background:${color}"></div></div>`;
    }
    html += '</div>';
  });

  html += '</div></div>'; // close collapse-body-inner, collapse-body

  // Collapsible timeline section
  if (data.timeline && data.timeline.length > 0) {
    html += `
      <div class="collapse-toggle ${cs.timeline ? 'open' : ''}" data-key="timeline" onclick="toggleCollapse('${stateKey}','timeline',this)">
        <div class="collapse-chevron">\u25B6</div>
        <div class="collapse-label">Activity Log</div>
        <div class="collapse-count">${data.timeline.length}</div>
      </div>
      <div class="collapse-body ${cs.timeline ? 'expanded' : ''}" id="collapse-timeline-${stateKey}">
        <div class="collapse-body-inner">
          <div class="activity-section">
    `;
    data.timeline.forEach(entry => {
      const ec = COLORS[entry.color] || entry.color;
      html += `
        <div class="timeline-entry">
          <div class="timeline-time">${entry.time}</div>
          <div class="timeline-dot-col"><div class="timeline-dot-sm" style="background:${ec}"></div></div>
          <div class="timeline-msg">${entry.msg}</div>
        </div>
      `;
    });
    html += '</div></div></div>'; // close activity-section, collapse-body-inner, collapse-body
  }

  html += '</div>'; // close col-left

  // ── RIGHT COLUMN (40%) ─────────────────────────
  html += '<div class="col-right">';

  // Stat cards
  if (data.stats && data.stats.length > 0) {
    html += '<div class="section-label">Metrics<span class="line"></span></div>';
    data.stats.forEach((stat, si) => {
      const isPending = stat.spark.every(v => v === 0);
      html += `
        <div class="stat-card">
          <div class="stat-icon" style="background:${color}15;color:${color}">${si + 1}</div>
          <div class="stat-info">
            <div class="stat-value">${stat.value}</div>
            <div class="stat-label">${stat.label}</div>
            <div class="stat-delta ${stat.deltaDir}">${stat.deltaDir === 'up' ? '\u2191' : stat.deltaDir === 'down' ? '\u2193' : '\u2022'} ${stat.delta}</div>
          </div>
          <div class="stat-spark"><canvas class="stat-spark-canvas" data-index="${si}"></canvas></div>
        </div>
      `;
    });
  }

  // Activity breakdown
  if (data.activity) {
    html += `
      <div class="section-label" style="margin-top:4px">Breakdown<span class="line"></span></div>
      <div class="activity-section">
        <div class="activity-title">
          <div class="indicator" style="background:${color}"></div>
          ${data.activity.title}
        </div>
    `;
    data.activity.rows.forEach(row => {
      const rc = COLORS[row.color] || row.color;
      html += `
        <div class="activity-row">
          <div class="activity-label">${row.label}</div>
          <div class="activity-bar-wrap">
            <div class="activity-bar-fill" style="width:${row.pct}%;background:${rc}"></div>
          </div>
          <div class="activity-val">${row.pct}%</div>
        </div>
      `;
    });
    html += '</div>';
  }

  // Donut chart
  if (data.donut && data.donut.segments.length > 1) {
    const total = data.donut.segments.reduce((s, seg) => s + seg.value, 0);
    html += `
      <div class="section-label" style="margin-top:4px">Distribution<span class="line"></span></div>
      <div class="activity-section">
        <div class="donut-wrap">
          <div class="donut-chart">
            ${buildDonutSVG(data.donut.segments, total)}
            <div class="donut-center">${total}</div>
          </div>
          <div class="donut-legend">
    `;
    data.donut.segments.forEach(seg => {
      const sc = COLORS[seg.color] || seg.color;
      html += `
        <div class="donut-legend-item">
          <div class="donut-legend-dot" style="background:${sc}"></div>
          ${seg.label} (${seg.value})
        </div>
      `;
    });
    html += '</div></div></div>';
  }

  html += '</div>'; // close col-right
  html += '</div>'; // close two-col

  el.innerHTML = html;
  el.scrollTop = 0;

  // Draw stat sparklines after DOM insertion
  if (data.stats) {
    requestAnimationFrame(() => {
      data.stats.forEach((stat, si) => {
        const canvas = el.querySelector(`.stat-spark-canvas[data-index="${si}"]`);
        if (!canvas) return;
        const isPending = stat.spark.every(v => v === 0);
        drawSparkline(canvas, stat.spark, color, false, isPending, 50, 20);
      });
    });
  }
}

// =====================================================================
// Toggle Collapse
// =====================================================================
function toggleCollapse(stateKey, key, toggleEl) {
  collapseState[stateKey][key] = !collapseState[stateKey][key];
  const isOpen = collapseState[stateKey][key];

  toggleEl.classList.toggle('open', isOpen);
  const bodyId = `collapse-${key}-${stateKey}`;
  const body = document.getElementById(bodyId);
  if (body) {
    body.classList.toggle('expanded', isOpen);
  }
}

// =====================================================================
// Full Render
// =====================================================================
function render() {
  renderRings();
  renderRow1();
  renderRow2();
  renderBreadcrumb();
  renderContent();
  requestAnimationFrame(() => requestAnimationFrame(renderBeam));
}

// =====================================================================
// Keyboard Navigation
// =====================================================================
document.addEventListener('keydown', e => {
  const mod = PIPELINE[activeModule];
  let changed = false;
  switch (e.key) {
    case 'ArrowRight':
      if (activeModule < PIPELINE.length - 1) { activeModule++; activeStep = 0; changed = true; } break;
    case 'ArrowLeft':
      if (activeModule > 0) { activeModule--; activeStep = 0; changed = true; } break;
    case 'ArrowDown':
      if (activeStep < mod.steps.length - 1) { activeStep++; changed = true; } break;
    case 'ArrowUp':
      if (activeStep > 0) { activeStep--; changed = true; } break;
  }
  if (changed) { e.preventDefault(); render(); }
});

window.addEventListener('resize', () => requestAnimationFrame(renderBeam));

// =====================================================================
// Init
// =====================================================================
render();
initParticles();
requestAnimationFrame(animateActiveSparklines);
</script>
