<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — UI Component Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0b10;
  --surface: #12141d;
  --surface-hi: #1a1d2b;
  --surface-active: #222639;
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.15);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --green: #34d399;
  --orange: #fb923c;
  --cyan: #22d3ee;
  --red: #f87171;
  --nav-w: 280px;
  --topbar-h: 46px;
  --radius: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
}

/* ===== TOP BAR ===== */
.topbar {
  height: var(--topbar-h); flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 50;
}
.topbar-logo { width: 22px; height: 22px; border-radius: 5px; }
.topbar-title { font-weight: 800; font-size: 13px; letter-spacing: -.2px; }
.topbar-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.topbar-crumb {
  font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.topbar-crumb .agent-label {
  font-weight: 600; padding: 2px 7px; border-radius: 4px;
  font-size: 10px;
}
.topbar-crumb .file-label { color: var(--text-dim); font-weight: 500; }
.topbar-spacer { flex: 1; }
.topbar-nav {
  display: flex; gap: 4px; align-items: center;
}
.topbar-btn {
  background: var(--surface-hi); border: 1px solid var(--border);
  color: var(--text-muted); border-radius: 5px;
  width: 28px; height: 28px; display: grid; place-items: center;
  cursor: pointer; font-size: 12px; transition: all .12s;
}
.topbar-btn:hover { background: var(--surface-active); color: var(--text); border-color: var(--border-hi); }
.topbar-btn:disabled { opacity: .3; cursor: default; }
.topbar-counter { font-size: 10px; color: var(--text-faint); margin: 0 4px; font-variant-numeric: tabular-nums; }
.topbar-open {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all .12s; font-family: inherit;
  text-transform: uppercase; letter-spacing: .5px;
}
.topbar-open:hover { background: var(--surface-hi); color: var(--text); }

/* ===== LAYOUT ===== */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ===== NAV PANEL ===== */
.nav {
  width: var(--nav-w); min-width: var(--nav-w); flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.nav-scroll {
  flex: 1; overflow-y: auto; padding: 8px;
  scrollbar-width: thin; scrollbar-color: rgba(71,85,105,.3) transparent;
}
.nav-scroll::-webkit-scrollbar { width: 4px; }
.nav-scroll::-webkit-scrollbar-track { background: transparent; }
.nav-scroll::-webkit-scrollbar-thumb { background: rgba(71,85,105,.3); border-radius: 2px; }

/* Agent group */
.nav-group { margin-bottom: 12px; }
.nav-group-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; margin-bottom: 2px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--text-faint);
  cursor: pointer; user-select: none; border-radius: 4px;
}
.nav-group-header:hover { background: rgba(148,163,184,.04); }
.nav-group-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.nav-group-dot.live { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
.nav-group-chev {
  margin-left: auto; font-size: 8px; transition: transform .15s;
  color: var(--text-faint);
}
.nav-group-chev.open { transform: rotate(90deg); }
.nav-group-count {
  font-size: 9px; color: var(--text-faint); font-weight: 600;
  background: rgba(148,163,184,.06); padding: 1px 5px; border-radius: 3px;
}

/* Nav items */
.nav-items { padding-left: 4px; }
.nav-items.collapsed { display: none; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px 5px 12px; border-radius: 5px;
  cursor: pointer; transition: all .1s;
  font-size: 11.5px; color: var(--text-muted);
  position: relative;
  border: 1px solid transparent;
}
.nav-item:hover { background: rgba(148,163,184,.05); color: var(--text-dim); }
.nav-item.active {
  background: var(--surface-active);
  color: var(--text);
  border-color: var(--border-hi);
}
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
  width: 2px; border-radius: 1px;
}
.nav-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-item-tag {
  font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px; flex-shrink: 0;
}
.nav-item-tag.new { background: rgba(52,211,153,.1); color: var(--green); }
.nav-item-tag.wip { background: rgba(96,165,250,.1); color: var(--blue); }
.nav-item-tag.ref { background: rgba(148,163,184,.06); color: var(--text-faint); }

/* Timestamp */
.nav-item-time {
  font-size: 9px; color: var(--text-faint); flex-shrink: 0;
  font-variant-numeric: tabular-nums; white-space: nowrap;
}
.nav-item-time.fresh { color: var(--green); }
.nav-item-time.recent { color: var(--text-muted); }

.topbar-time {
  font-size: 10px; color: var(--text-faint); font-variant-numeric: tabular-nums;
  display: flex; align-items: center; gap: 4px;
}
.topbar-time .dot {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}

/* Archive nav items — more compact */
.nav-item.archive { padding: 3px 8px 3px 12px; font-size: 11px; }

/* ===== VIEWER ===== */
.viewer { flex: 1; position: relative; background: var(--bg); }
.viewer iframe {
  width: 100%; height: 100%; border: none;
  background: #fff;
}

/* ===== EMPTY VIEWER ===== */
.viewer-empty {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-faint); gap: 12px;
}
.viewer-empty-icon { font-size: 48px; opacity: .3; }
.viewer-empty-text { font-size: 13px; }
.viewer-empty-hint { font-size: 11px; color: var(--text-faint); opacity: .6; }
.viewer-empty kbd {
  display: inline-block; background: var(--surface-hi); border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 3px; font-size: 10px; font-family: inherit;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <img src="logo_32.png" class="topbar-logo" alt="">
  <span class="topbar-title">AI Inventor</span>
  <span class="topbar-sep"></span>
  <div class="topbar-crumb" id="crumb">
    <span class="file-label">UI Component Dashboard</span>
  </div>
  <div class="topbar-time" id="topbar-time"></div>
  <div class="topbar-spacer"></div>
  <div class="topbar-nav">
    <button class="topbar-btn" id="btn-prev" title="Previous (Left arrow)" disabled>&#9664;</button>
    <span class="topbar-counter" id="counter">—</span>
    <button class="topbar-btn" id="btn-next" title="Next (Right arrow)" disabled>&#9654;</button>
    <span class="topbar-sep"></span>
    <button class="topbar-open" id="btn-newtab" title="Open in new tab" disabled>Open &#8599;</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- NAV -->
  <div class="nav">
    <div class="nav-scroll" id="nav-scroll"></div>
  </div>

  <!-- VIEWER -->
  <div class="viewer" id="viewer">
    <div class="viewer-empty" id="empty">
      <div class="viewer-empty-icon">&#9672;</div>
      <div class="viewer-empty-text">Select a component to preview</div>
      <div class="viewer-empty-hint">Click in the sidebar, or use <kbd>&larr;</kbd> <kbd>&rarr;</kbd> to navigate</div>
    </div>
  </div>
</div>

<script>
// ===================================================================
// DATA — agents + archive
// ===================================================================
const AGENTS = [
  {
    id: 'agent-1', name: 'Agent 1', role: 'Advanced Layouts',
    color: '#a78bfa', colorVar: 'purple', live: true,
    components: [
      { file: 'adv_layout_f.html', name: 'Layout F — Polished Light', desc: 'Refined light sidebar + right-edge tabs + v22 messages', tag: 'new' },
      { file: 'adv_layout_e.html', name: 'Layout E — Full Light', desc: 'Light glass sidebar + full-width chat', tag: 'wip' },
      { file: 'adv_layout_d.html', name: 'Layout D — v22 Light', desc: 'v22 messages + vertical panels (dark sidebar)', tag: 'wip' },
      { file: 'adv_layout_c.html', name: 'Layout C — 3-Panel', desc: 'Glass sidebar + Messages + Swappable panel', tag: 'wip' },
      { file: 'adv_layout_a.html', name: 'Layout A — Split', desc: 'Messages + Stats side panel', tag: 'ref' },
      { file: 'adv_layout_b.html', name: 'Layout B — Full Feed', desc: 'Full messages + filter tabs', tag: 'ref' },
      { file: 'glass_sidebar.html', name: 'Glass Sidebar', desc: 'Frosted glass with tree + particles', tag: 'ref' },
    ],
  },
  {
    id: 'agent-2', name: 'Agent 2', role: 'Sidebar & Nav',
    color: '#60a5fa', colorVar: 'blue', live: true,
    components: [
      { file: 'topbar_concepts.html', name: 'Top Bar — 6 Concepts', desc: 'Tabs + extras: breadcrumb, run name, help, pills, file-system style', tag: 'new' },
      { file: 'view_switcher.html', name: 'View Switcher — Where?', desc: '6 placement options for Standard/Advanced toggle', tag: 'ref' },
      { file: 'sidebar_chosen.html', name: 'Sidebar — CHOSEN', desc: 'Matte glass, no item icons, nav as buttons not selectable', tag: 'new' },
      { file: 'sidebar_glass.html', name: 'Sidebar — Glass (8)', desc: 'Frosted: classic, warm, icy, ultra-thin, layered, prismatic, matte, smoked', tag: 'ref' },
      { file: 'sidebar_warm.html', name: 'Sidebar — Warm (6)', desc: 'Warm cream, blue accent, solid + glass + pill variants', tag: 'new' },
      { file: 'sidebar_light.html', name: 'Sidebar — Light (8)', desc: 'Light modern variants', tag: 'ref' },
      { file: 'sidebar_variants.html', name: 'Sidebar — Dark (8)', desc: 'Dark glassmorphism variants', tag: 'ref' },
      { file: 'v4_cards.html', name: 'V4 Module Cards (10)', desc: 'Progress rings, sparklines', tag: 'ref' },
      { file: 'best_03.html', name: 'Best 03 — Sidebar Ref', desc: 'Glass sidebar + tree + particles', tag: 'ref' },
    ],
  },
  {
    id: 'agent-3', name: 'Agent 3', role: 'Feeds & Panels',
    color: '#34d399', colorVar: 'green', live: true,
    components: [
      { file: 'feed_activity.html', name: 'Activity Feed (8 variants)', desc: 'Compact, rich, timeline, grouped, terminal, card, ticker, minimal', tag: 'new' },
      { file: 'feed_panels.html', name: 'Detail + Feed Panels (4)', desc: 'Bottom dashboard layout: step detail + live feed side-by-side', tag: 'new' },
    ],
  },
  {
    id: 'agent-4', name: 'Agent 4', role: 'Module Cards',
    color: '#fb923c', colorVar: 'orange', live: true,
    components: [
      { file: 'v4_cards_tweaks.html', name: 'Card Tweaks — Light (30)', desc: '30 one-tweak variants, light modern', tag: 'new' },
      { file: 'v4_cards_light.html', name: 'Module Cards — Light (10)', desc: 'Light professional modern theme', tag: 'new' },
      { file: 'v4_cards.html', name: 'Module Cards — Dark (10)', desc: 'Dark theme variants', tag: 'ref' },
      { file: 'v4.html', name: 'Full Dashboard (base)', desc: 'elite_10 starting point', tag: 'ref' },
      { file: 'elite_10.html', name: 'elite_10 — Ultimate', desc: 'Original reference with all features', tag: 'ref' },
      { file: 'v3.html', name: 'v3 — Modified elite_10', desc: 'Renamed modules + sidebar labels', tag: 'ref' },
    ],
  },
];

const ARCHIVE = {
  'Advanced': ['advanced_01_dashboard','advanced_02_hypothesis','advanced_03_artifact','advanced_04_paper','advanced_05_rewind','adv_layout_a','adv_layout_b','adv_layout_c','adv_viewer'],
  'Simple': ['simple_01_landing','simple_02_run_replay','simple_03_live_run','simple_04_hypothesis','simple_05_paper_output','simple_v01_accordion','simple_v02_subway','simple_v03_zoom','simple_v04_stepper','simple_v05_deck','simple_v06_radial','simple_v07_kanban','simple_v08_tree','simple_v09_river','simple_v10_tiles'],
  'Variants': ['variant_01_timeline','variant_02_cards','variant_03_split','variant_04_tabbed','variant_05_minimal'],
  'Best (20)': Array.from({length:20},(_,i)=>`best_${String(i+1).padStart(2,'0')}`),
  'Chosen (20)': ['chosen',...Array.from({length:19},(_,i)=>`chosen_${String(i+2).padStart(2,'0')}`)],
  'Final (20)': Array.from({length:20},(_,i)=>`final_${String(i+1).padStart(2,'0')}`),
  'Fin (20)': Array.from({length:20},(_,i)=>`fin_${String(i+1).padStart(2,'0')}`),
  'Clean (20)': Array.from({length:20},(_,i)=>`clean_${String(i+1).padStart(2,'0')}`),
  'Combo (20)': Array.from({length:20},(_,i)=>`combo_${String(i+1).padStart(2,'0')}`),
  'Elite (10)': Array.from({length:10},(_,i)=>`elite_${String(i+1).padStart(2,'0')}`),
  'Exact (5)': Array.from({length:5},(_,i)=>`exact_${String(i+1).padStart(2,'0')}`),
  'Horizontal (10)': Array.from({length:10},(_,i)=>`horiz_${String(i+1).padStart(2,'0')}`),
  'Mix (20)': Array.from({length:20},(_,i)=>`mix_${String(i+1).padStart(2,'0')}`),
  'Polish (10)': Array.from({length:10},(_,i)=>`pol_${String(i+1).padStart(2,'0')}`),
  'Reference (20)': ['ref_01','ref_02','ref_03','ref_04','ref_05','ref_06','ref_07','ref_08','ref_08_v2','ref_09','ref_10','ref_11','ref_12','ref_13','ref_14','ref_15','ref_16','ref_17','ref_18','ref_19','ref_20'],
  'Top (10)': Array.from({length:10},(_,i)=>`top_${String(i+1).padStart(2,'0')}`),
  'Tree (20)': Array.from({length:20},(_,i)=>`tree_${String(i+1).padStart(2,'0')}`),
  'Ultra (20)': Array.from({length:20},(_,i)=>`ultra_${String(i+1).padStart(2,'0')}`),
  'Balanced (10)': Array.from({length:10},(_,i)=>`bal_${String(i+1).padStart(2,'0')}_${'stepper,pipeline,journey,split,tiles,tabbed,dashboard,flowchart,rings,gantt'.split(',')[i]}`),
  'Wow (20)': Array.from({length:20},(_,i)=>`wow_${String(i+1).padStart(2,'0')}_${'galaxy,neural,dna,circuit,aurora,orb,cinema,constellation,liquid,neon,tree,mosaic,waveform,origami,orbit,matrix,fireworks,topo,heartbeat,glass'.split(',')[i]}`),
  'V1-V3': ['v1','v2','v3',...Array.from({length:10},(_,i)=>`v2_${String(i+1).padStart(2,'0')}`),...Array.from({length:10},(_,i)=>`v3_${String(i+1).padStart(2,'0')}`)],
};

// ===================================================================
// FLAT LIST for prev/next navigation
// ===================================================================
let allItems = []; // { file, name, agentName, agentColor }
AGENTS.forEach(a => {
  a.components.forEach(c => {
    allItems.push({ file: c.file, name: c.name, agentName: a.name, agentColor: a.color, agentRole: a.role, tag: c.tag });
  });
});
Object.entries(ARCHIVE).forEach(([group, files]) => {
  files.forEach(f => {
    allItems.push({ file: f+'.html', name: f.replace(/_/g,' '), agentName: 'Archive', agentColor: '#475569', agentRole: group, tag: null });
  });
});

let currentIndex = -1;
let currentFile = null;
let timestamps = {};

// Load timestamps
fetch('timestamps.json?' + Date.now())
  .then(r => r.json())
  .then(data => {
    timestamps = data;
    // Update nav items with timestamps
    document.querySelectorAll('.nav-item[data-file]').forEach(el => {
      const ts = timestamps[el.dataset.file];
      if (ts) {
        const timeEl = document.createElement('span');
        timeEl.className = 'nav-item-time ' + freshness(ts);
        timeEl.textContent = relTime(ts);
        timeEl.title = ts;
        el.appendChild(timeEl);
      }
    });
  })
  .catch(() => {});

function parseTS(ts) {
  // "2026-03-27 23:01:16 +0100" -> Date
  return new Date(ts.replace(' ', 'T').replace(/ ([+-]\d{4})/, '$1'));
}
function relTime(ts) {
  const d = parseTS(ts);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}
function freshness(ts) {
  const diff = (Date.now() - parseTS(ts).getTime()) / 1000;
  if (diff < 600) return 'fresh';    // < 10 min = green
  if (diff < 3600) return 'recent';  // < 1 hr = lighter
  return '';
}
function fullTime(ts) {
  const d = parseTS(ts);
  return d.toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

// ===================================================================
// BUILD NAV
// ===================================================================
const navScroll = document.getElementById('nav-scroll');
let navHTML = '';

AGENTS.forEach(agent => {
  const gid = agent.id;
  const hasItems = agent.components.length > 0;
  navHTML += `
    <div class="nav-group">
      <div class="nav-group-header" onclick="toggleGroup('${gid}')">
        <div class="nav-group-dot ${agent.live?'live':''}" style="background:${agent.color};${agent.live?'box-shadow:0 0 6px '+agent.color:''}"></div>
        <span>${agent.name}</span>
        <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-faint)">${agent.role}</span>
        ${hasItems ? `<span class="nav-group-count">${agent.components.length}</span>` : ''}
        <span class="nav-group-chev ${hasItems?'open':''}" id="chev-${gid}">&#9654;</span>
      </div>
      <div class="nav-items ${hasItems?'':'collapsed'}" id="items-${gid}">
        ${hasItems ? agent.components.map(c => `
          <div class="nav-item" data-file="${c.file}" onclick="loadFile('${c.file}')" style="--ac:${agent.color}">
            <span class="nav-item-name">${c.name}</span>
            ${c.tag ? `<span class="nav-item-tag ${c.tag}">${c.tag}</span>` : ''}
          </div>
        `).join('') : `<div style="padding:8px 12px;font-size:10px;color:var(--text-faint);font-style:italic">Waiting for agent...</div>`}
      </div>
    </div>
  `;
});

// Archive
navHTML += `<div class="nav-group"><div class="nav-group-header" onclick="toggleGroup('archive')" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div class="nav-group-dot" style="background:var(--text-faint)"></div><span>Archive</span><span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-faint)">300+ mockups</span><span class="nav-group-chev" id="chev-archive">&#9654;</span></div><div class="nav-items collapsed" id="items-archive">`;

Object.entries(ARCHIVE).forEach(([group, files]) => {
  const gid = 'arch-' + group.replace(/[^a-z]/gi,'').toLowerCase();
  navHTML += `
    <div style="padding:4px 8px 2px 8px">
      <div class="nav-group-header" onclick="toggleGroup('${gid}')" style="padding:3px 4px;margin-bottom:0">
        <span style="font-size:9px">${group}</span>
        <span class="nav-group-chev" id="chev-${gid}">&#9654;</span>
      </div>
      <div class="nav-items collapsed" id="items-${gid}">
        ${files.map(f => `<div class="nav-item archive" data-file="${f}.html" onclick="loadFile('${f}.html')" style="--ac:#475569"><span class="nav-item-name">${f.replace(/_/g,' ')}</span></div>`).join('')}
      </div>
    </div>`;
});
navHTML += '</div></div>';

navScroll.innerHTML = navHTML;

// ===================================================================
// ACTIONS
// ===================================================================
const viewer = document.getElementById('viewer');
const empty = document.getElementById('empty');
const crumb = document.getElementById('crumb');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnOpen = document.getElementById('btn-newtab');

function loadFile(file) {
  currentFile = file;
  currentIndex = allItems.findIndex(x => x.file === file);
  const item = allItems[currentIndex];

  // Update iframe
  let iframe = viewer.querySelector('iframe');
  if (!iframe) {
    iframe = document.createElement('iframe');
    viewer.appendChild(iframe);
  }
  iframe.src = file;
  empty.style.display = 'none';
  iframe.style.display = 'block';

  // Highlight nav item
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.file === file);
    if (el.classList.contains('active')) {
      el.style.setProperty('--active-color', el.style.getPropertyValue('--ac'));
      el.querySelector('.nav-item-name') && el.scrollIntoView({ block: 'nearest' });
    }
  });
  // Active bar color
  document.querySelectorAll('.nav-item.active::before').forEach(el => {});
  document.querySelectorAll('.nav-item.active').forEach(el => {
    el.style.borderLeftColor = item.agentColor;
  });

  // Set active color on the ::before pseudo-element via CSS variable
  document.documentElement.style.setProperty('--active-agent-color', item.agentColor);

  // Update crumb
  crumb.innerHTML = `
    <span class="agent-label" style="background:${item.agentColor}22;color:${item.agentColor}">${item.agentName}</span>
    <span style="color:var(--text-faint)">/</span>
    <span class="file-label">${item.name}</span>
  `;

  // Update timestamp in topbar
  const topTime = document.getElementById('topbar-time');
  const ts = timestamps[file];
  if (ts) {
    const fr = freshness(ts);
    const dotColor = fr === 'fresh' ? 'var(--green)' : fr === 'recent' ? 'var(--blue)' : 'var(--text-faint)';
    topTime.innerHTML = `<span class="dot" style="background:${dotColor}"></span> Updated ${relTime(ts)} &middot; ${fullTime(ts)}`;
  } else {
    topTime.innerHTML = '';
  }

  // Update counter + buttons
  counter.textContent = `${currentIndex + 1} / ${allItems.length}`;
  btnPrev.disabled = currentIndex <= 0;
  btnNext.disabled = currentIndex >= allItems.length - 1;
  btnOpen.disabled = false;
}

function navPrev() {
  if (currentIndex > 0) loadFile(allItems[currentIndex - 1].file);
}
function navNext() {
  if (currentIndex < allItems.length - 1) loadFile(allItems[currentIndex + 1].file);
}

btnPrev.addEventListener('click', navPrev);
btnNext.addEventListener('click', navNext);
btnOpen.addEventListener('click', () => { if (currentFile) window.open(currentFile, '_blank'); });

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); navPrev(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navNext(); }
});

function toggleGroup(id) {
  const items = document.getElementById('items-' + id);
  const chev = document.getElementById('chev-' + id);
  if (items && chev) {
    items.classList.toggle('collapsed');
    chev.classList.toggle('open');
  }
}

// Active bar color via CSS
const style = document.createElement('style');
style.textContent = `.nav-item.active::before { background: var(--active-agent-color, var(--purple)); }`;
document.head.appendChild(style);
</script>

</body>
</html>
