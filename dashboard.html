<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — UI Component Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0b10;
  --surface: #12141d;
  --surface-hi: #1a1d2b;
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.15);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;
  --purple: #a78bfa;
  --blue: #60a5fa;
  --green: #34d399;
  --orange: #fb923c;
  --cyan: #22d3ee;
  --red: #f87171;
  --radius: 10px;
  --ease: cubic-bezier(.4,0,.2,1);
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 28px;
  background: rgba(10,11,16,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.header::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(167,139,250,.12) 30%, rgba(96,165,250,.12) 70%, transparent);
}
.header-logo { width: 28px; height: 28px; border-radius: 7px; }
.header-title { font-weight: 800; font-size: 15px; letter-spacing: -.3px; }
.header-sub { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
.header-spacer { flex: 1; }
.header-stat {
  font-size: 11px; color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
}
.header-stat strong { color: var(--text); font-weight: 700; }

/* ===== MAIN ===== */
.main { padding: 28px; max-width: 1400px; margin: 0 auto; }

/* ===== AGENT SECTION ===== */
.agent-section { margin-bottom: 40px; }
.agent-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.agent-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.agent-dot.live { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.5;} 50%{opacity:1;} }
.agent-name { font-size: 14px; font-weight: 700; }
.agent-role { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
.agent-count {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-faint); background: var(--surface-hi);
  padding: 2px 8px; border-radius: 4px;
}

/* ===== COMPONENT GRID ===== */
.comp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.comp-card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  text-decoration: none;
  color: var(--text-dim);
  transition: all .15s var(--ease);
  position: relative;
  overflow: hidden;
}
.comp-card:hover {
  background: var(--surface-hi);
  border-color: var(--border-hi);
  color: var(--text);
  transform: translateY(-1px);
}
.comp-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: 0; transition: opacity .15s;
}
.comp-card:hover::before { opacity: 1; }
.comp-card[data-color="purple"]::before { background: var(--purple); }
.comp-card[data-color="blue"]::before { background: var(--blue); }
.comp-card[data-color="green"]::before { background: var(--green); }
.comp-card[data-color="orange"]::before { background: var(--orange); }
.comp-card[data-color="cyan"]::before { background: var(--cyan); }
.comp-card[data-color="red"]::before { background: var(--red); }

.comp-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.comp-desc { font-size: 10px; color: var(--text-muted); line-height: 1.4; }
.comp-tag {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 1px 5px; border-radius: 3px; margin-top: 6px;
  text-transform: uppercase; letter-spacing: .4px;
}
.comp-tag.new { background: rgba(52,211,153,.1); color: var(--green); }
.comp-tag.wip { background: rgba(96,165,250,.1); color: var(--blue); }
.comp-tag.ref { background: rgba(148,163,184,.08); color: var(--text-muted); }

/* ===== ARCHIVE SECTION ===== */
.archive-toggle {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 10px 0; font-size: 12px; font-weight: 600;
  color: var(--text-muted); user-select: none;
}
.archive-toggle:hover { color: var(--text-dim); }
.archive-chev { transition: transform .2s; font-size: 10px; }
.archive-chev.open { transform: rotate(90deg); }
.archive-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}
.archive-grid.collapsed { display: none; }
.archive-link {
  display: block; padding: 8px 10px; border-radius: 6px;
  font-size: 11px; color: var(--text-muted);
  text-decoration: none; transition: all .12s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.archive-link:hover { background: var(--surface-hi); color: var(--text-dim); }

/* ===== EMPTY STATE ===== */
.empty-state {
  padding: 32px; text-align: center;
  border: 1px dashed var(--border-hi);
  border-radius: var(--radius);
  color: var(--text-faint); font-size: 12px;
}
.empty-state code {
  display: block; margin-top: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-muted);
  background: var(--surface); padding: 6px 10px;
  border-radius: 4px; display: inline-block;
}
</style>
</head>
<body>

<div class="header">
  <img src="logo_32.png" class="header-logo" alt="AI Inventor">
  <span class="header-title">AI Inventor</span>
  <span class="header-sub">UI Component Dashboard</span>
  <div class="header-spacer"></div>
  <div class="header-stat"><strong id="total-count">0</strong>&nbsp;components</div>
</div>

<div class="main" id="main"></div>

<script>
// ===================================================================
// AGENT SECTIONS — each agent adds their components here
// ===================================================================
const AGENTS = [
  {
    id: 'agent-1',
    name: 'Agent 1',
    role: 'Sidebar & Navigation',
    color: 'var(--purple)',
    live: true,
    components: [
      { file: 'sidebar_variants.html', name: 'Sidebar — Dark Variants', desc: '8 dark glassmorphism sidebar designs', color: 'purple', tag: 'new' },
      { file: 'sidebar_light.html', name: 'Sidebar — Light Variants', desc: '8 light modern sidebar designs (Linear, Notion, Vercel, Apple...)', color: 'purple', tag: 'new' },
      { file: 'glass_sidebar.html', name: 'Glass Sidebar', desc: 'Frosted glass sidebar with tree nav', color: 'purple', tag: 'wip' },
      { file: 'v4.html', name: 'V4 — Full Layout', desc: 'Complete pipeline layout with header, sidebar, cards', color: 'purple', tag: 'ref' },
      { file: 'v4_cards.html', name: 'V4 — Module Cards', desc: '10 card variants with progress rings, sparklines, ghost chevrons', color: 'purple', tag: 'ref' },
      { file: 'best_03.html', name: 'Best 03 — Glass Sidebar Ref', desc: 'Reference: glassmorphism sidebar with tree + particles', color: 'purple', tag: 'ref' },
    ],
  },
  {
    id: 'agent-2',
    name: 'Agent 2',
    role: 'Pipeline Cards & Progress',
    color: 'var(--blue)',
    live: false,
    components: [
      // Agent 2 adds components here
      // { file: 'card_variants.html', name: 'Card Variants', desc: '...', color: 'blue', tag: 'new' },
    ],
  },
  {
    id: 'agent-3',
    name: 'Agent 3',
    role: 'Activity Feed & Detail Panels',
    color: 'var(--green)',
    live: false,
    components: [
      // Agent 3 adds components here
    ],
  },
  {
    id: 'agent-4',
    name: 'Agent 4',
    role: 'Animations & Interactions',
    color: 'var(--orange)',
    live: false,
    components: [
      // Agent 4 adds components here
    ],
  },
];

// ===================================================================
// ARCHIVE — all legacy concept files grouped by prefix
// ===================================================================
const ARCHIVE_GROUPS = {
  'Advanced Views': ['advanced_01_dashboard','advanced_02_hypothesis','advanced_03_artifact','advanced_04_paper','advanced_05_rewind','adv_layout_a','adv_layout_b','adv_layout_c','adv_viewer'],
  'Simple Views': ['simple_01_landing','simple_02_run_replay','simple_03_live_run','simple_04_hypothesis','simple_05_paper_output','simple_v01_accordion','simple_v02_subway','simple_v03_zoom','simple_v04_stepper','simple_v05_deck','simple_v06_radial','simple_v07_kanban','simple_v08_tree','simple_v09_river','simple_v10_tiles'],
  'Variants': ['variant_01_timeline','variant_02_cards','variant_03_split','variant_04_tabbed','variant_05_minimal'],
  'Best': Array.from({length:20},(_,i)=>`best_${String(i+1).padStart(2,'0')}`),
  'Chosen': ['chosen',...Array.from({length:19},(_,i)=>`chosen_${String(i+2).padStart(2,'0')}`)],
  'Final': Array.from({length:20},(_,i)=>`final_${String(i+1).padStart(2,'0')}`),
  'Fin': Array.from({length:20},(_,i)=>`fin_${String(i+1).padStart(2,'0')}`),
  'Clean': Array.from({length:20},(_,i)=>`clean_${String(i+1).padStart(2,'0')}`),
  'Combo': Array.from({length:20},(_,i)=>`combo_${String(i+1).padStart(2,'0')}`),
  'Elite': Array.from({length:10},(_,i)=>`elite_${String(i+1).padStart(2,'0')}`),
  'Exact': Array.from({length:5},(_,i)=>`exact_${String(i+1).padStart(2,'0')}`),
  'Horizontal': Array.from({length:10},(_,i)=>`horiz_${String(i+1).padStart(2,'0')}`),
  'Mix': Array.from({length:20},(_,i)=>`mix_${String(i+1).padStart(2,'0')}`),
  'Polish': Array.from({length:10},(_,i)=>`pol_${String(i+1).padStart(2,'0')}`),
  'Reference': ['ref_01','ref_02','ref_03','ref_04','ref_05','ref_06','ref_07','ref_08','ref_08_v2','ref_09','ref_10','ref_11','ref_12','ref_13','ref_14','ref_15','ref_16','ref_17','ref_18','ref_19','ref_20'],
  'Top': Array.from({length:10},(_,i)=>`top_${String(i+1).padStart(2,'0')}`),
  'Tree': Array.from({length:20},(_,i)=>`tree_${String(i+1).padStart(2,'0')}`),
  'Ultra': Array.from({length:20},(_,i)=>`ultra_${String(i+1).padStart(2,'0')}`),
  'Balanced': Array.from({length:10},(_,i)=>`bal_${String(i+1).padStart(2,'0')}_${'stepper,pipeline,journey,split,tiles,tabbed,dashboard,flowchart,rings,gantt'.split(',')[i]}`),
  'Wow Effects': Array.from({length:20},(_,i)=>`wow_${String(i+1).padStart(2,'0')}_${'galaxy,neural,dna,circuit,aurora,orb,cinema,constellation,liquid,neon,tree,mosaic,waveform,origami,orbit,matrix,fireworks,topo,heartbeat,glass'.split(',')[i]}`),
  'V1-V3': ['v1','v2','v3',...Array.from({length:10},(_,i)=>`v2_${String(i+1).padStart(2,'0')}`),...Array.from({length:10},(_,i)=>`v3_${String(i+1).padStart(2,'0')}`)],
};

// ===================================================================
// RENDER
// ===================================================================
let totalCount = 0;
const main = document.getElementById('main');

// Active agent sections
AGENTS.forEach(agent => {
  const section = document.createElement('div');
  section.className = 'agent-section';
  section.id = agent.id;

  const hasComponents = agent.components.length > 0;
  totalCount += agent.components.length;

  section.innerHTML = `
    <div class="agent-header">
      <div class="agent-dot ${agent.live ? 'live' : ''}" style="background:${agent.color};${agent.live ? 'box-shadow:0 0 8px '+agent.color : ''}"></div>
      <span class="agent-name">${agent.name}</span>
      <span class="agent-role">— ${agent.role}</span>
      <span class="agent-count">${agent.components.length} files</span>
    </div>
    ${hasComponents ? `
      <div class="comp-grid">
        ${agent.components.map(c => `
          <a class="comp-card" href="${c.file}" target="_blank" data-color="${c.color}">
            <div class="comp-name">${c.name}</div>
            <div class="comp-desc">${c.desc}</div>
            ${c.tag ? `<span class="comp-tag ${c.tag}">${c.tag}</span>` : ''}
          </a>
        `).join('')}
      </div>
    ` : `
      <div class="empty-state">
        No components yet — waiting for agent
        <code>${agent.id}/  &larr; drop HTML files here</code>
      </div>
    `}
  `;
  main.appendChild(section);
});

// Archive section
const archiveSection = document.createElement('div');
archiveSection.className = 'agent-section';
let archiveHTML = `
  <div class="agent-header">
    <div class="agent-dot" style="background:var(--text-faint)"></div>
    <span class="agent-name">Archive</span>
    <span class="agent-role">— 300+ legacy concept mockups</span>
  </div>
`;

Object.entries(ARCHIVE_GROUPS).forEach(([groupName, files]) => {
  const id = 'archive-' + groupName.toLowerCase().replace(/[^a-z]/g, '');
  archiveHTML += `
    <div class="archive-toggle" onclick="toggleArchive('${id}', this)">
      <span class="archive-chev" id="chev-${id}">&#9654;</span>
      ${groupName} <span style="color:var(--text-faint);font-weight:400">(${files.length})</span>
    </div>
    <div class="archive-grid collapsed" id="${id}">
      ${files.map(f => `<a class="archive-link" href="${f}.html" target="_blank">${f.replace(/_/g, ' ')}</a>`).join('')}
    </div>
  `;
  totalCount += files.length;
});

archiveSection.innerHTML = archiveHTML;
main.appendChild(archiveSection);

document.getElementById('total-count').textContent = totalCount;

function toggleArchive(id, el) {
  const grid = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  grid.classList.toggle('collapsed');
  chev.classList.toggle('open');
}
</script>

</body>
</html>
