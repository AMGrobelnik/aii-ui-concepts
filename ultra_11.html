<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Ultra 11</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg-surface: #161921;
  --bg-card: #1c1f2b;
  --bg-elevated: #242838;
  --bg-hover: #282c3c;

  --border: #2a2e3d;
  --border-dim: #1f2333;
  --border-lite: #333750;
  --glass: rgba(28, 31, 43, 0.65);
  --glass-border: rgba(100, 116, 155, 0.14);
  --glass-blur: 16px;
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 40%, transparent 60%);

  --text-100: #e8eaf0;
  --text-200: #b0b4c4;
  --text-300: #7a7f94;
  --text-400: #545870;
  --text-500: #3e4555;

  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --purple-glow: rgba(167,139,250,0.25);
  --purple-deep: rgba(167,139,250,0.55);

  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --blue-glow: rgba(59,130,246,0.25);
  --blue-deep: rgba(59,130,246,0.55);

  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.12);
  --orange-glow: rgba(245,158,11,0.25);
  --orange-deep: rgba(245,158,11,0.55);

  --green: #34d399;
  --green-dim: rgba(52,211,153,0.15);
  --green-glow: rgba(52,211,153,0.3);

  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);

  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.12);

  --radius: 10px;
  --radius-sm: 7px;
  --radius-xs: 5px;
  --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  --header-h: 46px;
}

html { font-size: 14px; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg); color: var(--text-200);
  min-height: 100vh; overflow-x: hidden; line-height: 1.5;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* subtle grid background */
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(100,116,155,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,116,155,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ================================================================
   AMBIENT PARTICLE CANVAS
   ================================================================ */
#particlesCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ================================================================
   HEADER (46px glassmorphism)
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
  background: rgba(15, 17, 23, 0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 24px;
  z-index: 1000; gap: 14px;
}
.header-brand {
  font-weight: 800; font-size: 13px; letter-spacing: 0.3px;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.header-sep { color: var(--text-500); font-size: 18px; font-weight: 200; }
.header-run-info {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-300);
}
.header-run-id {
  font-weight: 600; color: var(--text-200);
  font-variant-numeric: tabular-nums;
}

.header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.header-stat {
  font-size: 11px; color: var(--text-400);
  display: flex; align-items: center; gap: 5px;
}
.header-stat .val {
  color: var(--text-100); font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.header-ring-mini {
  width: 28px; height: 28px; position: relative; flex-shrink: 0;
}
.header-ring-mini svg { width: 100%; height: 100%; }
.header-ring-mini .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
.header-ring-mini .ring-fill {
  fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 1s ease;
  filter: drop-shadow(0 0 3px var(--green-glow));
}
.header-ring-mini .ring-label {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7px; font-weight: 700; color: var(--text-100);
}

.live-badge {
  display: flex; align-items: center; gap: 5px; padding: 3px 9px;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.18);
  border-radius: 5px; font-size: 9px; font-weight: 700; color: var(--red);
  letter-spacing: 0.7px; text-transform: uppercase;
}
.live-dot-red {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
  animation: liveDotPulse 1.5s ease-in-out infinite;
}
@keyframes liveDotPulse {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 3px rgba(239,68,68,0.3); }
  50% { opacity: 1; box-shadow: 0 0 8px rgba(239,68,68,0.6); }
}

/* ================================================================
   MAIN CONTENT AREA
   ================================================================ */
.main {
  margin-top: var(--header-h);
  padding: 20px 28px 60px;
  position: relative; z-index: 1;
  max-width: 1440px;
}

/* ================================================================
   3 HORIZONTAL MODULE CARDS
   ================================================================ */
.module-cards {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 8px; position: relative;
}

.mod-card {
  position: relative; cursor: pointer; z-index: 1;
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 14px 16px 12px; transition: all 0.35s ease; overflow: hidden;
}
.mod-card .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none; z-index: 1;
}
.mod-card .glow-halo {
  position: absolute; inset: -24px; border-radius: 28px;
  opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: -1;
  filter: blur(32px);
}
.mod-card[data-color="purple"] .glow-halo { background: var(--purple); }
.mod-card[data-color="blue"] .glow-halo { background: var(--blue); }
.mod-card[data-color="orange"] .glow-halo { background: var(--orange); }
.mod-card.active .glow-halo { opacity: 0.12; animation: haloPulse 3s ease-in-out infinite; }
@keyframes haloPulse { 0%, 100% { opacity: 0.08; } 50% { opacity: 0.18; } }

.mod-card::before {
  content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
  opacity: 0; transition: opacity 0.4s ease; pointer-events: none; z-index: -1;
}
.mod-card[data-color="purple"]::before { box-shadow: 0 0 30px 6px var(--purple-dim), inset 0 0 14px var(--purple-dim); }
.mod-card[data-color="blue"]::before { box-shadow: 0 0 30px 6px var(--blue-dim), inset 0 0 14px var(--blue-dim); }
.mod-card[data-color="orange"]::before { box-shadow: 0 0 30px 6px var(--orange-dim), inset 0 0 14px var(--orange-dim); }
.mod-card.active::before { opacity: 1; animation: cardGlowPulse 2.5s ease-in-out infinite; }
@keyframes cardGlowPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

.mod-card .card-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
  transform: skewX(-20deg); pointer-events: none; z-index: 2; opacity: 0;
}
.mod-card.active .card-shimmer { opacity: 1; animation: shimmerSweep 3.5s ease-in-out infinite; }
@keyframes shimmerSweep { 0% { left: -100%; } 50% { left: 160%; } 100% { left: 160%; } }

.mod-card:not(.active):hover {
  border-color: rgba(100,116,155,0.22); transform: translateY(-2px);
}
.mod-card:not(.active):hover .glow-halo { opacity: 0.05; }
.mod-card.active { border-color: rgba(255,255,255,0.1); }

.mc-top { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; position: relative; z-index: 3; }
.mc-icon { font-size: 14px; flex-shrink: 0; }
.mc-name { font-size: 13px; font-weight: 600; color: var(--text-100); letter-spacing: -0.2px; }
.mc-badge {
  font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 6px;
  margin-left: auto; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
}
.mc-badge.done { background: var(--green-dim); color: var(--green); }
.mc-badge.running { background: var(--blue-dim); color: var(--blue); animation: badgeShimmer 2s ease-in-out infinite; }
.mc-badge.pending { background: rgba(74,81,104,0.15); color: var(--text-400); }
@keyframes badgeShimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; background: rgba(59,130,246,0.2); } }

.mc-metrics { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative; z-index: 3; }
.mc-metric-label { font-size: 10px; color: var(--text-400); text-transform: uppercase; letter-spacing: 0.4px; }
.mc-metric-value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

.mc-ring { width: 28px; height: 28px; flex-shrink: 0; margin-left: auto; position: relative; }
.mc-ring svg { width: 100%; height: 100%; }
.mc-ring .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
.mc-ring .ring-fill { fill: none; stroke-width: 3; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease; }
.mc-ring .ring-text {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 7px; font-weight: 700; color: var(--text-200);
}

.mc-bar { height: 3px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; position: relative; z-index: 3; }
.mc-bar-fill { height: 100%; border-radius: 2px; width: 0; transition: width 1s ease; }
.mod-card[data-color="purple"] .mc-bar-fill { background: var(--purple); box-shadow: 0 0 6px var(--purple-deep); }
.mod-card[data-color="blue"] .mc-bar-fill { background: var(--blue); box-shadow: 0 0 6px var(--blue-deep); }
.mod-card[data-color="orange"] .mc-bar-fill { background: var(--orange); box-shadow: 0 0 6px var(--orange-deep); }

/* ================================================================
   TREE AREA (3 columns)
   ================================================================ */
.tree-area {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; position: relative; min-height: 80px;
}

.tree-col {
  position: relative; z-index: 1;
  animation: treeGrow 0.5s ease-out both;
}
.tree-col:nth-child(2) { animation-delay: 0.1s; }
.tree-col:nth-child(3) { animation-delay: 0.2s; }
@keyframes treeGrow { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.tree-trunk {
  position: relative; padding-left: 22px;
  display: flex; flex-direction: column; gap: 3px;
}
.tree-trunk::before {
  content: ''; position: absolute; left: 9px; top: 0;
  width: 2px; border-radius: 1px;
  height: var(--trunk-h, calc(100% - 18px));
  transition: height 0.4s ease;
}
.tree-trunk[data-color="purple"]::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"]::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"]::before { background: rgba(245,158,11,0.18); }

.tree-trunk.glow-trunk[data-color="purple"]::before {
  background: rgba(167,139,250,0.4); box-shadow: 0 0 6px rgba(167,139,250,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="blue"]::before {
  background: rgba(59,130,246,0.4); box-shadow: 0 0 6px rgba(59,130,246,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
.tree-trunk.glow-trunk[data-color="orange"]::before {
  background: rgba(245,158,11,0.4); box-shadow: 0 0 6px rgba(245,158,11,0.25);
  animation: branchGlow 2.5s ease-in-out infinite;
}
@keyframes branchGlow { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ================================================================
   SUB-MODULE CARDS (42px rows in tree)
   ================================================================ */
.sub-card {
  height: 42px; display: flex; align-items: center; gap: 10px;
  padding: 0 12px; position: relative; border-radius: var(--radius-xs);
  background: var(--bg-surface); border: 1px solid transparent;
  cursor: pointer; overflow: hidden;
  opacity: 0; transform: translateX(-10px);
  transition: opacity 0.35s ease, transform 0.35s ease,
              background 0.25s ease, border-color 0.25s ease,
              box-shadow 0.3s ease;
}
.sub-card.visible { opacity: 1; transform: translateX(0); }

/* horizontal branch connector from trunk */
.sub-card::before {
  content: ''; position: absolute; left: -13px; top: 50%;
  width: 13px; height: 2px; border-radius: 1px;
}
.tree-trunk[data-color="purple"] .sub-card::before { background: rgba(167,139,250,0.18); }
.tree-trunk[data-color="blue"] .sub-card::before { background: rgba(59,130,246,0.18); }
.tree-trunk[data-color="orange"] .sub-card::before { background: rgba(245,158,11,0.18); }

.sub-card.done-sub { background: rgba(255,255,255,0.015); }
.sub-card.active-sub { border-color: rgba(255,255,255,0.06); }
.sub-card.active-sub[data-pcolor="purple"] {
  background: rgba(167,139,250,0.06); border-color: rgba(167,139,250,0.18);
  box-shadow: 0 0 18px rgba(167,139,250,0.08);
}
.sub-card.active-sub[data-pcolor="blue"] {
  background: rgba(59,130,246,0.06); border-color: rgba(59,130,246,0.18);
  box-shadow: 0 0 18px rgba(59,130,246,0.08);
}
.sub-card.active-sub[data-pcolor="orange"] {
  background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.18);
  box-shadow: 0 0 18px rgba(245,158,11,0.08);
}

.sub-card-shimmer {
  position: absolute; inset: 0; border-radius: var(--radius-xs); pointer-events: none; opacity: 0;
  background: linear-gradient(115deg, transparent 30%,
    rgba(255,255,255,0.02) 46%, rgba(255,255,255,0.05) 50%,
    rgba(255,255,255,0.02) 54%, transparent 70%);
  background-size: 250% 100%; animation: subShimmer 3s ease-in-out infinite;
}
.sub-card.active-sub .sub-card-shimmer { opacity: 1; }
@keyframes subShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.sub-card.pending-sub { background: rgba(255,255,255,0.008); opacity: 0.5; }
.sub-card.pending-sub.visible { opacity: 0.5; }

.sub-card::after {
  content: ''; position: absolute; left: 0; top: 7px; bottom: 7px;
  width: 2px; border-radius: 2px; opacity: 0; transition: opacity 0.25s;
}
.sub-card.active-sub::after { opacity: 1; }
.sub-card.done-sub::after { opacity: 0.3; }
.sub-card[data-pcolor="purple"]::after { background: var(--purple); }
.sub-card[data-pcolor="blue"]::after { background: var(--blue); }
.sub-card[data-pcolor="orange"]::after { background: var(--orange); }

.sub-card:not(.pending-sub):hover { transform: translateY(-1px); background: rgba(255,255,255,0.03); }

.sub-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: all 0.3s;
}
.sub-dot.done { background: var(--green); opacity: 0.6; }
.sub-dot.running { animation: subDotPulse 2s ease-in-out infinite; }
.sub-dot.running[data-pcolor="blue"] {
  background: var(--blue); box-shadow: 0 0 8px rgba(59,130,246,0.5);
}
.sub-dot.running[data-pcolor="purple"] {
  background: var(--purple); box-shadow: 0 0 8px rgba(167,139,250,0.5);
}
.sub-dot.pending { background: transparent; border: 1.5px solid var(--text-500); opacity: 0.45; }
@keyframes subDotPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.3); }
}

.sub-spinner {
  width: 14px; height: 14px; flex-shrink: 0;
  border: 2px solid rgba(59,130,246,0.15);
  border-top-color: var(--blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
.sub-spinner.purple-spin {
  border-color: rgba(167,139,250,0.15);
  border-top-color: var(--purple);
}
@keyframes spin { to { transform: rotate(360deg); } }

.sub-label {
  font-size: 11.5px; color: var(--text-300); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.sub-card.active-sub .sub-label { color: var(--text-100); font-weight: 500; }
.sub-card.done-sub .sub-label { color: var(--text-300); }

.sub-meta {
  margin-left: auto; font-size: 10px; font-weight: 600;
  color: var(--text-400); flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.sub-card.active-sub .sub-meta { color: var(--text-200); }

.sub-micro-badge {
  font-size: 8px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-left: 4px;
}
.sub-micro-badge.done { background: var(--green-dim); color: var(--green); }
.sub-micro-badge.running { background: var(--blue-dim); color: var(--blue); }
.sub-micro-badge.pending { background: rgba(74,81,104,0.12); color: var(--text-400); }

/* Level 3 items (checklist under artifacts) */
.level3-wrap {
  padding-left: 24px; position: relative; overflow: hidden;
  max-height: 500px; transition: max-height 0.4s ease;
}
.level3-wrap::before {
  content: ''; position: absolute; left: 10px; top: 0;
  width: 1px; height: calc(100% - 10px);
}
.tree-trunk[data-color="blue"] .level3-wrap::before { background: rgba(59,130,246,0.1); }
.tree-trunk[data-color="purple"] .level3-wrap::before { background: rgba(167,139,250,0.1); }
.tree-trunk[data-color="orange"] .level3-wrap::before { background: rgba(245,158,11,0.1); }

.level3-item {
  height: 28px; display: flex; align-items: center; gap: 7px;
  font-size: 10.5px; color: var(--text-400); position: relative;
  padding-left: 6px; border-radius: 4px;
  opacity: 0; transform: translateX(-6px);
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.15s;
}
.level3-item.visible { opacity: 1; transform: translateX(0); }
.level3-item:hover { background: rgba(255,255,255,0.02); }
.level3-item::before {
  content: ''; position: absolute; left: -10px; top: 50%;
  width: 10px; height: 1px;
}
.tree-trunk[data-color="blue"] .level3-item::before { background: rgba(59,130,246,0.1); }

.l3-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.l3-dot.done { background: var(--green); opacity: 0.5; }
.l3-dot.running { background: var(--blue); animation: l3Pulse 2s ease-in-out infinite; }
.l3-dot.pending { border: 1px solid var(--text-500); opacity: 0.35; }
@keyframes l3Pulse {
  0%, 100% { box-shadow: 0 0 3px rgba(59,130,246,0.4); }
  50% { box-shadow: 0 0 8px rgba(59,130,246,0.7); }
}
.l3-label { flex: 1; }
.l3-meta { font-size: 9px; color: var(--text-500); font-variant-numeric: tabular-nums; }

/* collapsed tree for complete modules */
.tree-col.collapsed .tree-trunk { display: none; }
.tree-collapsed-bar {
  display: none; padding: 8px 14px; font-size: 11px; color: var(--text-400);
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
  cursor: pointer; transition: all 0.2s; align-items: center; gap: 8px;
}
.tree-collapsed-bar:hover { color: var(--text-300); background: var(--bg-surface); }
.tree-col.collapsed .tree-collapsed-bar { display: flex; }
.tree-col .collapse-toggle {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text-400); cursor: pointer;
  padding: 2px 0 6px; transition: color 0.2s;
}
.tree-col .collapse-toggle:hover { color: var(--text-200); }
.tree-col .collapse-toggle svg { width: 12px; height: 12px; transition: transform 0.3s; }
.tree-col.collapsed .collapse-toggle svg { transform: rotate(-90deg); }

/* ================================================================
   BELOW-TREE DASHBOARD: 50/50 SPLIT (details | LIVE FEED)
   ================================================================ */
.dashboard-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 20px;
  min-height: 340px;
  opacity: 0;
  transform: translateY(10px);
  animation: dashSlideIn 0.5s ease-out 0.4s forwards;
}
@keyframes dashSlideIn {
  to { opacity: 1; transform: translateY(0); }
}

/* -- LEFT: Details/stats panel -- */
.dash-details {
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.dash-details .glass-shine {
  position: absolute; inset: 0; border-radius: var(--radius);
  background: var(--glass-shine); pointer-events: none;
}

.dd-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.dd-icon { font-size: 18px; }
.dd-title { font-size: 15px; font-weight: 700; color: var(--text-100); }

<script>
/* ================================================================
   DATA MODEL
   ================================================================ */
const MODULES = [
  {
    id: 'gen_hypo', label: 'Generate Hypothesis', icon: '\u{1F9EA}', color: 'purple', status: 'done',
    summary: 'Refined hypothesis through 3 adversarial review iterations. Score improved 6.2 \u2192 7.8 \u2192 8.4/10. Final review found 0 major issues. Hypothesis proposes a differentiable hardware-aware search space with Gumbel-softmax relaxation for joint topology-quantization optimization.',
    duration: '01:12:34', cost: '$4.21', messages: 847,
    subs: [
      { id: 'gen1', label: 'Gen Hypo Iter 1', status: 'done', meta: '6.2/10', duration: '14m', items: [] },
      { id: 'rev1', label: 'Review Iter 1', status: 'done', meta: '3 issues', duration: '8m', items: [] },
      { id: 'gen2', label: 'Gen Hypo Iter 2', status: 'done', meta: '7.8/10', duration: '16m', items: [] },
      { id: 'rev2', label: 'Review Iter 2', status: 'done', meta: '1 issue', duration: '9m', items: [] },
      { id: 'gen3', label: 'Gen Hypo Iter 3', status: 'done', meta: '8.4/10', duration: '18m', items: [] },
      { id: 'rev3', label: 'Review Iter 3', status: 'done', meta: '0 major', duration: '7m', items: [] }
    ]
  },
  {
    id: 'test_hypo', label: 'Test Hypothesis', icon: '\u{1F52C}', color: 'blue', status: 'running',
    summary: 'Building research artifacts to validate the hypothesis. Baseline evaluation shows +17.5% accuracy improvement over prior work. Currently generating ablation study artifacts and drafting paper sections in parallel.',
    duration: '01:48:42', cost: '$7.83', messages: 1204,
    subs: [
      { id: 'strat', label: 'Strategy', status: 'done', meta: 'Contrastive', duration: '12m', items: [] },
      { id: 'plan', label: 'Plan', status: 'done', meta: '5 artifacts', duration: '8m', items: [] },
      {
        id: 'artifacts', label: 'Artifacts', status: 'running', meta: '3/5', duration: '41m',
        items: [
          { label: 'Baseline Implementation', status: 'done', time: '12m' },
          { label: 'Dataset Preparation', status: 'done', time: '8m' },
          { label: 'Proof of Concept', status: 'done', time: '15m' },
          { label: 'Ablation Study', status: 'running', time: '6m' },
          { label: 'Evaluation Suite', status: 'pending', time: '--' }
        ]
      },
      { id: 'paper', label: 'Paper Draft', status: 'running', meta: 'Writing...', duration: '18m', items: [] },
      { id: 'review', label: 'Review', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'update', label: 'Update Hypo', status: 'pending', meta: '--', duration: '--', items: [] }
    ]
  },
  {
    id: 'disseminate', label: 'Disseminate Results', icon: '\u{1F4E1}', color: 'orange', status: 'pending',
    summary: 'Awaiting completion of Test Hypothesis module. Will generate paper repository, demos, visualizations, and deploy the final paper.',
    duration: '--', cost: '$0.00', messages: 0,
    subs: [
      { id: 'demos', label: 'Gen Demos', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'viz', label: 'Gen Viz', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'full_paper', label: 'Full Paper', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'repo', label: 'Build Repo', status: 'pending', meta: '--', duration: '--', items: [] },
      { id: 'deploy', label: 'Final Check', status: 'pending', meta: '--', duration: '--', items: [] }
    ]
  }
];

/* ================================================================
   RENDER TREE AREA
   ================================================================ */
const treeArea = document.getElementById('treeArea');
const subCardRefs = {}; // { "mi-si": element }

function renderTrees() {
  treeArea.innerHTML = '';

  MODULES.forEach((mod, mi) => {
    const col = document.createElement('div');
    col.className = 'tree-col' + (mod.status === 'done' ? ' collapsed' : '');
    col.dataset.module = mi;

    const toggle = document.createElement('div');
    toggle.className = 'collapse-toggle';
    toggle.innerHTML = `<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4.5l3 3 3-3"/></svg>
      <span>${mod.subs.length} sub-modules</span>`;
    toggle.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(toggle);

    const trunk = document.createElement('div');
    trunk.className = 'tree-trunk' + (mod.status === 'running' ? ' glow-trunk' : '');
    trunk.dataset.color = mod.color;

    mod.subs.forEach((sub, si) => {
      const card = document.createElement('div');
      const stClass = sub.status === 'done' ? 'done-sub' :
                       sub.status === 'running' ? 'active-sub' : 'pending-sub';
      card.className = `sub-card ${stClass}`;
      card.dataset.pcolor = mod.color;
      card.dataset.module = mi;
      card.dataset.sub = si;

      card.innerHTML = '<div class="sub-card-shimmer"></div>';

      if (sub.status === 'done') {
        const check = document.createElement('span');
        check.style.cssText = 'font-size:11px; color:var(--green); flex-shrink:0;';
        check.textContent = '\u2713';
        card.appendChild(check);
      } else if (sub.status === 'running') {
        const spinner = document.createElement('div');
        spinner.className = 'sub-spinner' + (mod.color === 'purple' ? ' purple-spin' : '');
        card.appendChild(spinner);
      } else {
        const dot = document.createElement('div');
        dot.className = 'sub-dot pending';
        card.appendChild(dot);
      }

      const lbl = document.createElement('span');
      lbl.className = 'sub-label';
      lbl.textContent = sub.label;
      card.appendChild(lbl);

      const meta = document.createElement('span');
      meta.className = 'sub-meta';
      meta.textContent = sub.meta;
      card.appendChild(meta);

      const badge = document.createElement('span');
      badge.className = `sub-micro-badge ${sub.status === 'done' ? 'done' : sub.status === 'running' ? 'running' : 'pending'}`;
      badge.textContent = sub.status === 'done' ? 'Done' : sub.status === 'running' ? 'Live' : 'Wait';
      card.appendChild(badge);

      trunk.appendChild(card);
      subCardRefs[`${mi}-${si}`] = card;

      // Level 3 items
      if (sub.items && sub.items.length > 0) {
        const wrap = document.createElement('div');
        wrap.className = 'level3-wrap';
        sub.items.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'level3-item';
          const dotCls = item.status === 'done' ? 'done' : item.status === 'running' ? 'running' : 'pending';
          row.innerHTML = `<div class="l3-dot ${dotCls}"></div>
            <span class="l3-label">${item.label}</span>
            <span class="l3-meta">${item.time}</span>`;
          wrap.appendChild(row);
        });
        trunk.appendChild(wrap);
      }
    });

    col.appendChild(trunk);

    const collBar = document.createElement('div');
    collBar.className = 'tree-collapsed-bar';
    const doneCount = mod.subs.filter(s => s.status === 'done').length;
    collBar.innerHTML = `<span style="font-size:11px; color:var(--green);">\u2713</span>
      <span>${doneCount}/${mod.subs.length} complete</span>
      <span style="margin-left:auto; font-size:10px; color:var(--text-500);">Click to expand</span>`;
    collBar.addEventListener('click', () => col.classList.toggle('collapsed'));
    col.appendChild(collBar);

    treeArea.appendChild(col);
  });

  // Stagger visibility
  requestAnimationFrame(() => {
    let delay = 0;
    document.querySelectorAll('.sub-card, .level3-item').forEach(el => {
      setTimeout(() => el.classList.add('visible'), delay);
      delay += 40;
    });
  });

  // Collapse pending
  setTimeout(() => {
    document.querySelectorAll('.tree-col').forEach(col => {
      const mi = parseInt(col.dataset.module);
      if (MODULES[mi] && MODULES[mi].status === 'pending') {
        col.classList.add('collapsed');
      }
    });
  }, 100);
}

function formatTimestamp() {
  const now = new Date();
  return {
    time: `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`,
    sec: `:${String(now.getSeconds()).padStart(2, '0')}`,
    ms: `.${String(now.getMilliseconds()).padStart(3, '0').slice(0, 2)}`
  };
}

function agoText(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 5) return 'just now';
  if (diff < 60) return `${diff}s ago`;
  return `${Math.floor(diff / 60)}m ago`;
}

/* ================================================================

   ================================================================ */
const pCanvas = document.getElementById('particlesCanvas');
const pCtx = pCanvas.getContext('2d');
let ambientParticles = [];

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class AmbientParticle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.radius = Math.random() * 1.5 + 0.5;
    this.opacity = Math.random() * 0.1 + 0.02;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > pCanvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > pCanvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < 40; i++) ambientParticles.push(new AmbientParticle());

function drawAmbientParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  for (let i = 0; i < ambientParticles.length; i++) {
    for (let j = i + 1; j < ambientParticles.length; j++) {
      const dx = ambientParticles[i].x - ambientParticles[j].x;
      const dy = ambientParticles[i].y - ambientParticles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 140) {
        const alpha = (1 - dist / 140) * 0.035;
        pCtx.beginPath();
        pCtx.moveTo(ambientParticles[i].x, ambientParticles[i].y);
        pCtx.lineTo(ambientParticles[j].x, ambientParticles[j].y);
        pCtx.strokeStyle = `rgba(100, 130, 200, ${alpha})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }
  ambientParticles.forEach(p => {
    p.update();
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    pCtx.fillStyle = `rgba(140, 170, 220, ${p.opacity})`;
    pCtx.fill();
  });
  requestAnimationFrame(drawAmbientParticles);
}
drawAmbientParticles();

/* ================================================================
   L-SHAPED TREE DOT ANIMATION
   Correct L-shape: card bottom-center -> down to tree trunk ->
   along trunk to branch point -> right along branch to running dot
   ================================================================ */
const dotCanvas = document.getElementById('dotCanvas');
const dCtx = dotCanvas.getContext('2d');
let flyingDots = [];
let burstParticles = [];

function resizeDotCanvas() {
  dotCanvas.width = window.innerWidth;
  dotCanvas.height = window.innerHeight;
}
resizeDotCanvas();
window.addEventListener('resize', resizeDotCanvas);

function getRunningTargets() {
  const targets = [];
  MODULES.forEach((mod, mi) => {
    if (mod.status !== 'running' && mod.status !== 'done') return;
    mod.subs.forEach((sub, si) => {
      if (sub.status === 'running') {
        targets.push({ mi, si, color: mod.color });
      }
    });
  });
  return targets;
}

function elRect(el) { return el.getBoundingClientRect(); }

function resolveColor(colorName) {
  const cs = getComputedStyle(document.documentElement);
  return cs.getPropertyValue('--' + colorName).trim();
}

function spawnLShapedDot() {
  const targets = getRunningTargets();
  targets.forEach(({ mi, si, color }) => {
    const cardEl = document.querySelectorAll('.mod-card')[mi];
    const subKey = `${mi}-${si}`;
    const subEl = subCardRefs[subKey];
    if (!cardEl || !subEl) return;

    const cardRect = elRect(cardEl);
    const subRect = elRect(subEl);

    // Find the tree trunk's vertical line position
    const trunk = subEl.closest('.tree-trunk');
    if (!trunk) return;
    const trunkRect = elRect(trunk);
    const trunkX = trunkRect.left + 10; // trunk::before is at left: 9px

    // L-shaped path:
    // 1. Start at bottom-center of module card
    const startX = cardRect.left + cardRect.width / 2;
    const startY = cardRect.bottom + 2;

    // 2. Move down to the trunk line X (diagonal move to align with trunk)
    const alignY = startY + 12;

    // 3. Travel down the trunk to the branch point (subcard center Y)
    const branchY = subRect.top + subRect.height / 2;

    // 4. Travel right along the branch to the sub-card left edge
    const endX = subRect.left + 16;
    const endY = branchY;

    const waypoints = [
      { x: startX, y: startY },
      { x: trunkX, y: alignY },       // move diagonally to align with trunk
      { x: trunkX, y: branchY },      // travel down trunk
      { x: endX, y: endY },           // travel right along branch
    ];

    const resolvedColor = resolveColor(color);

    flyingDots.push({
      waypoints,
      wpIdx: 0,
      x: waypoints[0].x,
      y: waypoints[0].y,
      speed: 90 + Math.random() * 30,
      color: resolvedColor,
      size: 3,
      alpha: 0.9,
      trail: [],
    });
  });
}

function spawnBurst(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 * i) / 8 + Math.random() * 0.3;
    const speed = 25 + Math.random() * 35;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.8 + Math.random() * 0.5,
      color,
      size: 2,
    });
  }
}

/* Connector particles between module cards */
let connectorParticles = [];

function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    const cards = document.querySelectorAll('.mod-card');
    const fromCard = cards[i];
    const toCard = cards[i + 1];
    if (!fromCard || !toCard) continue;

    const fromMod = MODULES[i];
    const toMod = MODULES[i + 1];
    if (fromMod.status === 'pending' || toMod.status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;

    const resolvedColor = resolveColor(fromMod.color);
    const speed = 40 + Math.random() * 20;

    connectorParticles.push({
      x: fromRect.right + 2,
      y: y + (Math.random() - 0.5) * 4,
      targetX: toRect.left - 2,
      speed,
      color: resolvedColor,
      size: 2.5,
      alpha: 0.5,
      trail: [],
    });
  }
}

/* Main animation loop */
let lastTime = 0;
let connectorTimer = 0;
let treeTimer = 0;

function animateDotsLoop(now) {
  requestAnimationFrame(animateDotsLoop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  dCtx.clearRect(0, 0, dotCanvas.width, dotCanvas.height);

  // Spawn timers
  connectorTimer += dt;
  if (connectorTimer > 1.0) {
    connectorTimer = 0;
    spawnConnectorParticle();
  }
  treeTimer += dt;
  if (treeTimer > 0.6) {
    treeTimer = 0;
    spawnLShapedDot();
  }

  // Draw connector lines between cards (static)
  const allCards = document.querySelectorAll('.mod-card');
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = allCards[i];
    const toCard = allCards[i + 1];
    if (!fromCard || !toCard) continue;
    if (MODULES[i].status === 'pending') continue;

    const fromRect = elRect(fromCard);
    const toRect = elRect(toCard);
    const y = fromRect.top + fromRect.height / 2;
    const toPending = MODULES[i + 1].status === 'pending';

    dCtx.beginPath();
    dCtx.moveTo(fromRect.right + 2, y);
    dCtx.lineTo(toRect.left - 2, y);
    dCtx.strokeStyle = '#2a2e3d';
    dCtx.lineWidth = 1;
    dCtx.globalAlpha = toPending ? 0.3 : 0.5;
    dCtx.setLineDash(toPending ? [4, 4] : []);
    dCtx.stroke();
    dCtx.setLineDash([]);
    dCtx.globalAlpha = 1;
  }

  // Draw connector particles
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 10) p.trail.shift();

    if (p.trail.length > 1) {
      dCtx.beginPath();
      dCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        dCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      dCtx.strokeStyle = p.color;
      dCtx.globalAlpha = p.alpha * 0.3;
      dCtx.lineWidth = p.size * 0.5;
      dCtx.stroke();
    }

    dCtx.globalAlpha = p.alpha;
    dCtx.beginPath();
    dCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    dCtx.fillStyle = p.color;
    dCtx.fill();

    dCtx.globalAlpha = p.alpha * 0.3;
    dCtx.beginPath();
    dCtx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
    dCtx.fillStyle = p.color;
    dCtx.fill();
    dCtx.globalAlpha = 1;

    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }

  // Draw L-shaped tree dots
  for (let i = flyingDots.length - 1; i >= 0; i--) {
    const p = flyingDots[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      spawnBurst(p.x, p.y, p.color);
      flyingDots.splice(i, 1);
      continue;
    }

    const dx = wp.x - p.x;
    const dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 2) {
      p.x = wp.x;
      p.y = wp.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();

    // Draw trail with gradient fade
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        dCtx.globalAlpha = ratio * p.alpha * 0.35;
        dCtx.beginPath();
        dCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        dCtx.lineTo(p.trail[t].x, p.trail[t].y);
        dCtx.strokeStyle = p.color;
        dCtx.lineWidth = p.size * 0.5 * ratio;
        dCtx.stroke();
      }
    }

    // Head glow
    dCtx.globalAlpha = p.alpha * 0.25;
    dCtx.beginPath();
    dCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    dCtx.fillStyle = p.color;
    dCtx.fill();

    // Head dot
    dCtx.globalAlpha = p.alpha;
    dCtx.beginPath();
    dCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    dCtx.fillStyle = p.color;
    dCtx.fill();

    dCtx.globalAlpha = 1;
  }

  // Draw burst particles
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;

    dCtx.globalAlpha = p.life * 0.7;
    dCtx.beginPath();
    dCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    dCtx.fillStyle = p.color;
    dCtx.fill();

    dCtx.globalAlpha = p.life * 0.25;
    dCtx.beginPath();
    dCtx.arc(p.x, p.y, p.size * 3 * p.life, 0, Math.PI * 2);
    dCtx.fillStyle = p.color;
    dCtx.fill();

    dCtx.globalAlpha = 1;
  }
}

lastTime = performance.now();
requestAnimationFrame(animateDotsLoop);

/* ================================================================
   LIVE TIMER + COST
   ================================================================ */
let timerSeconds = 3 * 3600 + 12 * 60 + 4;
let costValue = 4.82;
const timerEl = document.getElementById('timerDisplay');
const costEl = document.getElementById('costDisplay');

setInterval(() => {
  timerSeconds++;
  const h = String(Math.floor(timerSeconds / 3600)).padStart(2, '0');
  const m = String(Math.floor((timerSeconds % 3600) / 60)).padStart(2, '0');
  const s = String(timerSeconds % 60).padStart(2, '0');
  timerEl.textContent = `${h}:${m}:${s}`;
}, 1000);

setInterval(() => {
  costValue += 0.01 + Math.random() * 0.02;
  costEl.textContent = `$${costValue.toFixed(2)}`;
}, 8000);

/* ================================================================
   MODULE CARD INTERACTION STATES
   ================================================================ */
// Running card border pulse
const runningCardStyle = document.createElement('style');
runningCardStyle.textContent = `
  .mod-card[data-status="running"] {
    animation: runningBorderPulse 4s ease-in-out infinite;
  }
  @keyframes runningBorderPulse {
    0%, 100% { border-color: rgba(59,130,246,0.14); }
    50% { border-color: rgba(59,130,246,0.28); }
  }
  .mod-card[data-status="pending"] {
    opacity: 0.6;
  }
  .mod-card[data-status="pending"]:hover {
    opacity: 0.8;
  }
  .sub-card.active-sub[data-pcolor="blue"] {
    animation: blueSubPulse 3s ease-in-out infinite;
  }
  @keyframes blueSubPulse {
    0%, 100% { border-color: rgba(59,130,246,0.14); }
    50% { border-color: rgba(59,130,246,0.28); }
  }
`;
document.head.appendChild(runningCardStyle);

/* ================================================================
   AMBIENT GLOW (drifting radial)
   ================================================================ */
const ambientGlow = document.createElement('div');
ambientGlow.style.cssText = `
  position: fixed; width: 600px; height: 400px; border-radius: 50%;
  pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.04;
  transition: all 2s ease; top: 45%; left: 55%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, var(--blue), transparent 70%);
`;
document.body.insertBefore(ambientGlow, document.body.firstChild);

let glowAngle = 0;
function driftGlow() {
  glowAngle += 0.003;
  const ox = Math.sin(glowAngle) * 80;
  const oy = Math.cos(glowAngle * 0.7) * 40;
  ambientGlow.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
  requestAnimationFrame(driftGlow);
}
driftGlow();

/* ================================================================
   KEYBOARD NAVIGATION
   ================================================================ */
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    // Reset filter to all
    document.querySelectorAll('.feed-filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.feed-filter-btn[data-filter="all"]').classList.add('active');
    activeFilter = 'all';
    renderFeedEntries();
  }
});

/* ================================================================
   KEYBOARD HINT
   ================================================================ */
const kbdHint = document.createElement('div');
kbdHint.style.cssText = `
  position: fixed; bottom: 12px; right: 20px; font-size: 10px;
  color: var(--text-500); z-index: 50; opacity: 0.5;
  display: flex; gap: 8px; align-items: center;
`;
kbdHint.innerHTML = `
  <span style="display:inline-block; padding:1px 5px; background:var(--bg-surface);
    border:1px solid var(--glass-border); border-radius:3px; font-size:9px;
    color:var(--text-400);">Esc</span> reset filters
`;
document.body.appendChild(kbdHint);

/* ================================================================
   SMOOTH SCROLL
   ================================================================ */
document.documentElement.style.scrollBehavior = 'smooth';

/* ================================================================
   RESPONSIVE HANDLER
   ================================================================ */
function handleResize() {
  const w = window.innerWidth;
  const cards = document.querySelector('.module-cards');
  const tree = document.getElementById('treeArea');
  const dash = document.getElementById('dashboardSplit');

  if (w < 750) {
    cards.style.gridTemplateColumns = '1fr';
    tree.style.gridTemplateColumns = '1fr';
    dash.style.gridTemplateColumns = '1fr';
  } else if (w < 1100) {
    cards.style.gridTemplateColumns = 'repeat(2, 1fr)';
    tree.style.gridTemplateColumns = 'repeat(2, 1fr)';
    dash.style.gridTemplateColumns = '1fr';
  } else {
    cards.style.gridTemplateColumns = 'repeat(3, 1fr)';
    tree.style.gridTemplateColumns = 'repeat(3, 1fr)';
    dash.style.gridTemplateColumns = '1fr 1fr';
  }
}
window.addEventListener('resize', handleResize);
handleResize();

/* ================================================================
   TREE TRUNK HEIGHT COMPUTATION
   ================================================================ */
function computeTrunkHeights() {
  document.querySelectorAll('.tree-trunk').forEach(trunk => {
    const cards = trunk.querySelectorAll('.sub-card');
    if (cards.length === 0) return;
    const last = cards[cards.length - 1];
    const trunkRect = trunk.getBoundingClientRect();
    const lastRect = last.getBoundingClientRect();
    const h = (lastRect.top + lastRect.height / 2) - trunkRect.top;
    trunk.style.setProperty('--trunk-h', h + 'px');
  });
}
setTimeout(computeTrunkHeights, 500);
window.addEventListener('resize', () => setTimeout(computeTrunkHeights, 100));
</script>
