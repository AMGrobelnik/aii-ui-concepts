<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Combo 20</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header Bar ─── */
  .header {
    height: 40px;
    background: linear-gradient(90deg, #101018 0%, #14141f 100%);
    border-bottom: 1px solid #1e1e2e;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .brand {
    font-weight: 700;
    font-size: 14px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.5px;
  }
  .run-name {
    font-size: 12px;
    color: #6b7280;
    background: #1a1a2a;
    padding: 2px 10px;
    border-radius: 4px;
    border: 1px solid #2a2a3a;
  }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .header-stat {
    font-size: 12px;
    color: #9ca3af;
    font-variant-numeric: tabular-nums;
  }
  .header-stat .val { color: #d1d5db; font-weight: 500; }

  /* ─── Navigation Area ─── */
  .nav-area {
    flex-shrink: 0;
    padding: 16px 20px 12px 20px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
    border-bottom: 1px solid #1a1a2a;
    background: #0c0c14;
    position: relative;
  }

  /* ─── Progress Ring ─── */
  .ring-container {
    width: 80px;
    height: 80px;
    flex-shrink: 0;
    position: relative;
  }
  .ring-svg { width: 80px; height: 80px; }
  .ring-bg {
    fill: none;
    stroke: #1a1a2a;
    stroke-width: 5;
  }
  .ring-progress {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
    filter: url(#ringGlow);
  }
  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #e0e0e8;
  }
  /* Arc highlight segments */
  .ring-segment {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    opacity: 0.15;
    transition: opacity 0.3s ease;
  }
  .ring-segment.active { opacity: 0.6; }

  /* ─── Right Stack ─── */
  .nav-stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    min-width: 0;
  }

  /* ─── Row: Modules (diamond-in-ring) ─── */
  .module-row {
    height: 44px;
    display: flex;
    align-items: center;
    position: relative;
  }
  .module-track {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    width: 100%;
  }
  .module-connector {
    flex: 1;
    height: 2px;
    position: relative;
    min-width: 20px;
  }
  .module-connector-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    border-radius: 1px;
  }
  .module-node {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    z-index: 2;
    transition: transform 0.2s ease;
  }
  .module-node:hover { transform: scale(1.08); }
  .module-node.selected .diamond-ring-wrap { filter: brightness(1.3); }

  .diamond-ring-wrap {
    width: 36px;
    height: 36px;
    position: relative;
    transition: filter 0.3s ease;
  }
  .diamond-ring-svg { width: 36px; height: 36px; }
  .diamond-ring-bg { fill: none; stroke: #2a2a3a; stroke-width: 2.5; }
  .diamond-ring-progress {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease;
  }
  .diamond-center {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .diamond-shape {
    width: 10px;
    height: 10px;
    transform: rotate(45deg);
    border-radius: 1.5px;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .diamond-shape.filled { }
  .diamond-shape.empty {
    background: transparent !important;
    border: 1.5px solid #4a4a5a;
  }

  .module-label {
    font-size: 9px;
    font-weight: 500;
    margin-top: 2px;
    white-space: nowrap;
    color: #9ca3af;
    transition: color 0.3s;
  }
  .module-node.selected .module-label { color: #e0e0e8; }

  .module-badge {
    position: absolute;
    top: -4px;
    right: -8px;
    font-size: 8px;
    font-weight: 600;
    padding: 1px 4px;
    border-radius: 6px;
    line-height: 1.2;
    z-index: 3;
  }

  /* ─── Row: Sub-modules (dots) ─── */
  .sub-row {
    height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 4px;
    transition: height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .sub-row.visible {
    height: 30px;
    opacity: 1;
  }
  .sub-dot-group {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .sub-dot-group:hover { background: #1a1a2e; }
  .sub-dot-group.selected { background: #1a1a2e; }
  .sub-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .sub-dot.done { }
  .sub-dot.active { animation: dotPulse 2s ease-in-out infinite; }
  .sub-dot.pending { background: #2a2a3a; border: 1px solid #3a3a4a; }
  .sub-dot-label {
    font-size: 10px;
    color: #8b8b9b;
    white-space: nowrap;
    transition: color 0.3s;
  }
  .sub-dot-group.selected .sub-dot-label { color: #d1d5db; }
  .sub-dot-icon {
    font-size: 8px;
    margin-left: 1px;
  }

  .sub-connector {
    width: 12px;
    height: 1px;
    background: #2a2a3a;
    flex-shrink: 0;
  }

  /* ─── Row: Items (detail dots) ─── */
  .item-row {
    height: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 4px;
    padding-left: 4px;
    transition: height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .item-row.visible {
    height: 30px;
    opacity: 1;
  }
  .item-dot-group {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .item-dot-group:hover { background: #1a1a2e; }
  .item-dot-group.selected { background: #1a1a2e; }
  .item-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  .item-dot.done { }
  .item-dot.active { animation: dotPulse 2s ease-in-out infinite; }
  .item-dot.pending { background: #2a2a3a; border: 1px solid #3a3a4a; }
  .item-dot-label {
    font-size: 9px;
    color: #8b8b9b;
    white-space: nowrap;
    transition: color 0.3s;
  }
  .item-dot-group.selected .item-dot-label { color: #d1d5db; }

  .item-connector {
    width: 8px;
    height: 1px;
    background: #2a2a3a;
    flex-shrink: 0;
  }

  /* ─── Vertical Glow Beams ─── */
  .beam-container {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 1;
  }
  .glow-beam {
    position: absolute;
    width: 2px;
    border-radius: 1px;
    transition: left 0.3s ease, top 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .glow-beam.visible { opacity: 1; }

  /* ─── Content Area ─── */
  .content-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    padding: 28px 20px;
  }
  .content-inner {
    max-width: 700px;
    width: 100%;
    animation: fadeSlideIn 0.3s ease;
  }
  .content-title {
    font-size: 20px;
    font-weight: 600;
    color: #f0f0f5;
    margin-bottom: 6px;
  }
  .content-status {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .content-desc {
    font-size: 14px;
    color: #9ca3af;
    line-height: 1.65;
    margin-bottom: 16px;
  }
  .content-meta {
    font-size: 13px;
    color: #6b7280;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Summary List ─── */
  .summary-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }
  .summary-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #111119;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .summary-item:hover {
    background: #16161f;
    border-color: #2a2a3e;
  }
  .summary-dot-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .summary-item-name {
    font-size: 13px;
    font-weight: 500;
    color: #d1d5db;
    flex: 1;
  }
  .summary-item-detail {
    font-size: 12px;
    color: #6b7280;
  }
  .summary-item-status {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* ─── Iteration Cards ─── */
  .iter-card {
    padding: 12px 14px;
    background: #111119;
    border: 1px solid #1e1e2e;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .iter-card:hover { background: #16161f; border-color: #2a2a3e; }
  .iter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .iter-title {
    font-size: 13px;
    font-weight: 600;
    color: #d1d5db;
  }
  .iter-score {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .iter-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .iter-body.expanded { max-height: 200px; }
  .iter-body-content {
    padding-top: 8px;
    border-top: 1px solid #1e1e2e;
    font-size: 12px;
    color: #9ca3af;
    line-height: 1.6;
  }

  /* ─── Key Indicator ─── */
  .key-hint {
    position: fixed;
    bottom: 12px;
    right: 20px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  .key-box {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #4a4a5a;
  }
  .key-cap {
    background: #1a1a2a;
    border: 1px solid #2a2a3a;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 500;
    color: #6b7280;
  }

  /* ─── Active Row Indicator ─── */
  .row-indicator {
    position: absolute;
    left: -8px;
    width: 3px;
    height: 20px;
    border-radius: 2px;
    transition: top 0.3s ease, background 0.3s ease;
    opacity: 0;
  }
  .row-indicator.visible { opacity: 1; }

  /* ─── Animations ─── */
  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes ringPulse {
    0%, 100% { filter: url(#ringGlow); }
    50% { filter: url(#ringGlowBright); }
  }

  /* Scrollbar */
  .content-area::-webkit-scrollbar { width: 4px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }
</style>
</head>

            { name: 'Ablation', status: 'active', icon: '\u25b6', detail: 'Isolating the contribution of contrastive loss vs code-switching augmentation. Testing 4 ablation configurations across 8 language families.', meta: '1m 20s \u2022 $1.36', iteration: 'Running \u2014 Iteration 2' },
            { name: 'Eval', status: 'pending', icon: '\u25cb', detail: 'Final evaluation across all 8 language families with best configuration. Pending ablation completion.', metric: 'Pending' }
          ]
        },
        { name: 'Paper', status: 'pending', icon: '\u25cb', detail: 'Generate initial paper text from validated artifacts.',
          items: null },
        { name: 'Review', status: 'pending', icon: '\u25cb', detail: 'Self-review pass checking consistency, novelty claims, and experimental rigor.',
          items: null },
        { name: 'Update', status: 'pending', icon: '\u25cb', detail: 'Incorporate review feedback and finalize iteration output.',
          items: null }
      ],
      items: null
    },
    {
      name: 'Paper', short: 'Paper', progress: 0, color: '#6b7280',
      gradient: 'none', badge: '\u25cb', badgeBg: '#1f1f2f', badgeColor: '#6b7280',
      status: 'pending',
      summary: {
        title: 'Paper Generation',
        status: 'Pending',
        statusColor: '#6b7280',
        desc: 'Final paper assembly, visualization generation, and repository creation. Waiting for invention loop completion.',
        meta: 'Not started'
      },
      subs: [
        { name: 'Outline', status: 'pending', icon: '\u25cb', detail: 'Generate paper outline from invention artifacts.' },
        { name: 'Figures', status: 'pending', icon: '\u25cb', detail: 'Create all figures, tables, and visualizations.' },
        { name: 'Drafting', status: 'pending', icon: '\u25cb', detail: 'Write full paper sections from outline and artifacts.' },
        { name: 'Polish', status: 'pending', icon: '\u25cb', detail: 'Style pass, reference formatting, abstract refinement.' },
        { name: 'Export', status: 'pending', icon: '\u25cb', detail: 'Export to LaTeX, generate repository structure.' }
      ],
      items: null
    }
  ]
};

// ─────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────
const state = {
  activeRow: 1,     // 0 = module, 1 = sub, 2 = item
  moduleIdx: 2,     // Invention
  subIdx: 2,        // Artifacts
  itemIdx: 3,       // Ablation
};

function currentModule() { return DATA.modules[state.moduleIdx]; }
function currentSubs() { return currentModule().subs || []; }
function currentItems() {
  const subs = currentSubs();
  if (state.subIdx >= 0 && state.subIdx < subs.length) {
    return subs[state.subIdx].items || [];
  }
  return [];
}

// ─────────────────────────────────────────────────────────
// RENDER: Module Row
// ─────────────────────────────────────────────────────────
function renderModuleRow() {
  const track = document.getElementById('moduleTrack');
  track.innerHTML = '';
  const mods = DATA.modules;

  mods.forEach((mod, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'module-connector';
      const line = document.createElement('div');
      line.className = 'module-connector-line';
      line.style.background = `linear-gradient(90deg, ${mods[i-1].color}, ${mod.color})`;
      if (mod.status === 'pending' && mods[i-1].status !== 'pending') {
        line.style.background = `linear-gradient(90deg, ${mods[i-1].color}, #2a2a3a)`;
      } else if (mod.status === 'pending') {
        line.style.background = '#1e1e2e';
      }
      line.style.boxShadow = mod.status !== 'pending' ? `0 0 6px ${mods[i-1].color}40` : 'none';
      conn.appendChild(line);
      track.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'module-node' + (i === state.moduleIdx ? ' selected' : '');
    node.dataset.idx = i;
    node.onclick = () => selectModule(i);

    const circ = 2 * Math.PI * 14;
    const offset = circ - (mod.progress / 100) * circ;

    const strokeAttr = mod.status === 'pending' ? 'stroke="#2a2a3a"' : `stroke="${mod.color}"`;
    const filterAttr = mod.status !== 'pending' ? 'filter="url(#diamondGlow)"' : '';

    node.innerHTML = `
      <div class="diamond-ring-wrap">
        <svg class="diamond-ring-svg" viewBox="0 0 36 36">
          <circle class="diamond-ring-bg" cx="18" cy="18" r="14"/>
          <circle class="diamond-ring-progress" cx="18" cy="18" r="14"
            ${strokeAttr} ${filterAttr}
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            transform="rotate(-90 18 18)"/>
        </svg>
        <div class="diamond-center">
          <div class="diamond-shape ${mod.status !== 'pending' ? 'filled' : 'empty'}"
            style="background: ${mod.status !== 'pending' ? mod.color : 'transparent'};
                   box-shadow: ${mod.status === 'active' ? `0 0 10px ${mod.color}80` : mod.status === 'done' ? `0 0 6px ${mod.color}40` : 'none'};">
          </div>
        </div>
      </div>
      <span class="module-label">${mod.short}</span>
      <span class="module-badge" style="background:${mod.badgeBg};color:${mod.badgeColor}">${mod.badge}</span>
    `;

    if (mod.status === 'active') {
      const diamond = node.querySelector('.diamond-shape');
      diamond.style.animation = 'dotPulse 2s ease-in-out infinite';
    }

    track.appendChild(node);
  });

  updateRingSegments();
}

function updateRingSegments() {
  DATA.modules.forEach((_, i) => {
    const seg = document.getElementById('ringSeg' + i);
    if (seg) {
      seg.classList.toggle('active', i === state.moduleIdx);
    }
  });
}

// ─────────────────────────────────────────────────────────
// RENDER: Sub-module Row
// ─────────────────────────────────────────────────────────
function renderSubRow() {
  const row = document.getElementById('subRow');
  const subs = currentSubs();
  row.innerHTML = '';

  if (!subs.length) {
    row.classList.remove('visible');
    return;
  }
  row.classList.add('visible');

  const mod = currentModule();

  subs.forEach((sub, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'sub-connector';
      if (sub.status !== 'pending' || subs[i-1].status !== 'pending') {
        conn.style.background = `linear-gradient(90deg, ${statusColor(subs[i-1].status, mod.color)}, ${statusColor(sub.status, mod.color)})`;
      }
      row.appendChild(conn);
    }

    const grp = document.createElement('div');
    grp.className = 'sub-dot-group' + (i === state.subIdx && state.activeRow >= 1 ? ' selected' : '');
    grp.dataset.idx = i;
    grp.onclick = () => selectSub(i);

    const dot = document.createElement('div');
    dot.className = 'sub-dot ' + sub.status;
    const c = statusColor(sub.status, mod.color);
    if (sub.status === 'done') {
      dot.style.background = c;
      dot.style.boxShadow = `0 0 6px ${c}60`;
    } else if (sub.status === 'active') {
      dot.style.background = c;
      dot.style.boxShadow = `0 0 10px ${c}80`;
    }
    grp.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'sub-dot-label';
    label.textContent = sub.name;
    grp.appendChild(label);

    if (sub.icon) {
      const ico = document.createElement('span');
      ico.className = 'sub-dot-icon';
      ico.style.color = c;
      ico.textContent = sub.icon;
      grp.appendChild(ico);
    }

    row.appendChild(grp);
  });
}

// ─────────────────────────────────────────────────────────
// RENDER: Item Row
// ─────────────────────────────────────────────────────────
function renderItemRow() {
  const row = document.getElementById('itemRow');
  const items = currentItems();
  row.innerHTML = '';

  if (!items.length) {
    row.classList.remove('visible');
    return;
  }
  row.classList.add('visible');

  const mod = currentModule();

  items.forEach((item, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'item-connector';
      if (item.status !== 'pending' || items[i-1].status !== 'pending') {
        conn.style.background = `linear-gradient(90deg, ${statusColor(items[i-1].status, mod.color)}, ${statusColor(item.status, mod.color)})`;
      }
      row.appendChild(conn);
    }

    const grp = document.createElement('div');
    grp.className = 'item-dot-group' + (i === state.itemIdx && state.activeRow >= 2 ? ' selected' : '');
    grp.dataset.idx = i;
    grp.onclick = () => selectItem(i);

    const dot = document.createElement('div');
    dot.className = 'item-dot ' + item.status;
    const c = statusColor(item.status, mod.color);
    if (item.status === 'done') {
      dot.style.background = c;
      dot.style.boxShadow = `0 0 5px ${c}50`;
    } else if (item.status === 'active') {
      dot.style.background = c;
      dot.style.boxShadow = `0 0 8px ${c}70`;
    }
    grp.appendChild(dot);

    const label = document.createElement('span');
    label.className = 'item-dot-label';
    label.textContent = item.name;
    grp.appendChild(label);

    row.appendChild(grp);
  });
}

function statusColor(status, moduleColor) {
  if (status === 'done') return moduleColor;
  if (status === 'active') return moduleColor;
  return '#2a2a3a';
}

// ─────────────────────────────────────────────────────────
// RENDER: Glow Beams
// ─────────────────────────────────────────────────────────
function renderBeams() {
  const container = document.getElementById('beamContainer');
  container.innerHTML = '';

  const navArea = document.getElementById('navArea');
  const navRect = navArea.getBoundingClientRect();

  // Beam from module to sub
  if (state.activeRow >= 1 && currentSubs().length) {
    const moduleNode = document.querySelectorAll('.module-node')[state.moduleIdx];
    const subGroups = document.querySelectorAll('.sub-dot-group');
    const subGroup = subGroups[state.subIdx] || subGroups[0];
    if (moduleNode && subGroup) {
      const mRect = moduleNode.getBoundingClientRect();
      const sRect = subGroup.getBoundingClientRect();
      const beam = createBeam(
        mRect.left + mRect.width/2 - navRect.left,
        mRect.bottom - navRect.top,
        sRect.top - navRect.top - (mRect.bottom - navRect.top),
        currentModule().color
      );
      container.appendChild(beam);
    }
  }

  // Beam from sub to item
  if (state.activeRow >= 2 && currentItems().length) {
    const subGroups = document.querySelectorAll('.sub-dot-group');
    const subGroup = subGroups[state.subIdx];
    const itemGroups = document.querySelectorAll('.item-dot-group');
    const itemGroup = itemGroups[state.itemIdx] || itemGroups[0];
    if (subGroup && itemGroup) {
      const sRect = subGroup.getBoundingClientRect();
      const iRect = itemGroup.getBoundingClientRect();
      const beam = createBeam(
        sRect.left + sRect.width/2 - navRect.left,
        sRect.bottom - navRect.top - 4,
        iRect.top - navRect.top - (sRect.bottom - navRect.top) + 4,
        currentModule().color
      );
      container.appendChild(beam);
    }
  }
}

function createBeam(x, top, height, color) {
  const beam = document.createElement('div');
  beam.className = 'glow-beam visible';
  beam.style.left = x + 'px';
  beam.style.top = top + 'px';
  beam.style.height = Math.max(0, height) + 'px';
  beam.style.background = color;
  beam.style.boxShadow = `0 0 12px ${color}60, 0 0 4px ${color}90`;
  return beam;
}

// ─────────────────────────────────────────────────────────
// RENDER: Content
// ─────────────────────────────────────────────────────────
function renderContent() {
  const inner = document.getElementById('contentInner');
  const mod = currentModule();

  // Deepest level: specific item selected
  if (state.activeRow === 2 && currentItems().length) {
    const item = currentItems()[state.itemIdx];
    if (item) {
      inner.innerHTML = buildItemContent(item, mod);
      inner.style.animation = 'none';
      void inner.offsetHeight;
      inner.style.animation = 'fadeSlideIn 0.3s ease';
      return;
    }
  }

  // Sub-module level: show items list or sub detail
  if (state.activeRow === 1 && currentSubs().length) {
    const sub = currentSubs()[state.subIdx];
    if (sub) {
      if (sub.items && sub.items.length) {
        inner.innerHTML = buildSubWithItems(sub, mod);
      } else {
        inner.innerHTML = buildSubContent(sub, mod);
      }
      inner.style.animation = 'none';
      void inner.offsetHeight;
      inner.style.animation = 'fadeSlideIn 0.3s ease';
      return;
    }
  }

  // Module level: show module summary
  if (mod.name === 'Hypothesis') {
    inner.innerHTML = buildHypoContent(mod);
  } else {
    inner.innerHTML = buildModuleContent(mod);
  }
  inner.style.animation = 'none';
  void inner.offsetHeight;
  inner.style.animation = 'fadeSlideIn 0.3s ease';
}

function buildItemContent(item, mod) {
  const statusLabel = item.status === 'done' ? 'Complete' :
                      item.status === 'active' ? (item.iteration || 'Running') : 'Pending';
  const statusCol = item.status === 'pending' ? '#6b7280' : mod.color;
  return `
    <div class="content-title">${item.name}</div>
    <div class="content-status" style="color:${statusCol}">${statusLabel}</div>
    <div class="content-desc">${item.detail}</div>
    <div class="content-meta">${item.meta || (item.metric ? item.metric : '')}</div>
  `;
}

function buildSubContent(sub, mod) {
  const statusLabel = sub.status === 'done' ? 'Complete' :
                      sub.status === 'active' ? 'Running' : 'Pending';
  const statusCol = sub.status === 'pending' ? '#6b7280' : mod.color;
  return `
    <div class="content-title">${sub.name}</div>
    <div class="content-status" style="color:${statusCol}">${statusLabel}</div>
    <div class="content-desc">${sub.detail}</div>
  `;
}

function buildSubWithItems(sub, mod) {
  const statusLabel = sub.status === 'done' ? 'Complete' :
                      sub.status === 'active' ? 'Running' : 'Pending';
  const statusCol = sub.status === 'pending' ? '#6b7280' : mod.color;

  let itemsHtml = '<div class="summary-list">';
  sub.items.forEach((item, i) => {
    const ic = statusColor(item.status, mod.color);
    const stLabel = item.status === 'done' ? 'Done' : item.status === 'active' ? 'Running' : 'Pending';
    const stBg = item.status === 'done' ? mod.color + '20' :
                 item.status === 'active' ? mod.color + '25' : '#1e1e2e';
    const stFg = item.status === 'pending' ? '#6b7280' : mod.color;
    itemsHtml += `
      <div class="summary-item" onclick="selectItem(${i}); drillToItems();">
        <div class="summary-dot-indicator" style="background:${ic};box-shadow:0 0 6px ${ic}50"></div>
        <span class="summary-item-name">${item.name}</span>
        <span class="summary-item-detail">${item.metric || ''}</span>
        <span class="summary-item-status" style="background:${stBg};color:${stFg}">${stLabel}</span>
      </div>
    `;
  });
  itemsHtml += '</div>';

  return `
    <div class="content-title">${sub.name}</div>
    <div class="content-status" style="color:${statusCol}">${statusLabel}</div>
    <div class="content-desc">${sub.detail || 'Artifacts for the current invention iteration.'}</div>
    ${itemsHtml}
  `;
}

function buildModuleContent(mod) {
  const s = mod.summary;
  let subsHtml = '';
  if (mod.subs && mod.subs.length) {
    subsHtml = '<div class="summary-list">';
    mod.subs.forEach((sub, i) => {
      const ic = statusColor(sub.status, mod.color);
      const stLabel = sub.status === 'done' ? 'Done' : sub.status === 'active' ? 'Running' : 'Pending';
      const stBg = sub.status === 'done' ? mod.color + '20' :
                   sub.status === 'active' ? mod.color + '25' : '#1e1e2e';
      const stFg = sub.status === 'pending' ? '#6b7280' : mod.color;
      subsHtml += `
        <div class="summary-item" onclick="selectSub(${i})">
          <div class="summary-dot-indicator" style="background:${ic};box-shadow:0 0 6px ${ic}50"></div>
          <span class="summary-item-name">${sub.name}</span>
          <span class="summary-item-detail">${sub.icon || ''}</span>
          <span class="summary-item-status" style="background:${stBg};color:${stFg}">${stLabel}</span>
        </div>
      `;
    });
    subsHtml += '</div>';
  }
  return `
    <div class="content-title">${s.title}</div>
    <div class="content-status" style="color:${s.statusColor}">${s.status}</div>
    <div class="content-desc">${s.desc}</div>
    <div class="content-meta">${s.meta}</div>
    ${subsHtml}
  `;
}

function buildHypoContent(mod) {
  const s = mod.summary;
  let itersHtml = '';
  if (mod.subs && mod.subs.length) {
    mod.subs.forEach((sub, i) => {
      const scoreNum = parseFloat(sub.icon);
      const scoreBg = scoreNum >= 8 ? '#166534' : scoreNum >= 7 ? '#713f12' : '#7f1d1d';
      const scoreFg = scoreNum >= 8 ? '#4ade80' : scoreNum >= 7 ? '#fbbf24' : '#f87171';
      itersHtml += `
        <div class="iter-card" onclick="toggleIter(this)">
          <div class="iter-header">
            <span class="iter-title">${sub.name}</span>
            <span class="iter-score" style="background:${scoreBg};color:${scoreFg}">${sub.icon}</span>
          </div>
          <div class="iter-body">
            <div class="iter-body-content">${sub.detail}</div>
          </div>
        </div>
      `;
    });
  }
  return `
    <div class="content-title">${s.title}</div>
    <div class="content-status" style="color:${s.statusColor}">${s.status}</div>
    <div class="content-desc">${s.desc}</div>
    <div class="content-meta">${s.meta}</div>
    <div style="margin-top:16px">${itersHtml}</div>
  `;
}

function toggleIter(card) {
  const body = card.querySelector('.iter-body');
  body.classList.toggle('expanded');
}

// ─────────────────────────────────────────────────────────
// NAVIGATION ACTIONS
// ─────────────────────────────────────────────────────────
function selectModule(idx) {
  state.moduleIdx = idx;
  state.subIdx = findDefaultSub();
  state.itemIdx = findDefaultItem();
  state.activeRow = 0;
  fullRender();
}

function selectSub(idx) {
  state.subIdx = idx;
  state.itemIdx = findDefaultItem();
  state.activeRow = 1;
  fullRender();
}

function selectItem(idx) {
  state.itemIdx = idx;
  state.activeRow = 2;
  fullRender();
}

function drillToItems() {
  state.activeRow = 2;
  fullRender();
}

function findDefaultSub() {
  const subs = currentSubs();
  const active = subs.findIndex(s => s.status === 'active');
  return active >= 0 ? active : 0;
}

function findDefaultItem() {
  const items = currentItems();
  const active = items.findIndex(s => s.status === 'active');
  return active >= 0 ? active : 0;
}

function navigateHorizontal(dir) {
  if (state.activeRow === 0) {
    const newIdx = state.moduleIdx + dir;
    if (newIdx >= 0 && newIdx < DATA.modules.length) {
      state.moduleIdx = newIdx;
      state.subIdx = findDefaultSub();
      state.itemIdx = findDefaultItem();
    }
  } else if (state.activeRow === 1) {
    const subs = currentSubs();
    const newIdx = state.subIdx + dir;
    if (newIdx >= 0 && newIdx < subs.length) {
      state.subIdx = newIdx;
      state.itemIdx = findDefaultItem();
    }
  } else if (state.activeRow === 2) {
    const items = currentItems();
    const newIdx = state.itemIdx + dir;
    if (newIdx >= 0 && newIdx < items.length) {
      state.itemIdx = newIdx;
    }
  }
  fullRender();
}

function navigateDown() {
  if (state.activeRow === 0 && currentSubs().length) {
    state.activeRow = 1;
  } else if (state.activeRow === 1 && currentItems().length) {
    state.activeRow = 2;
  }
  fullRender();
}

function navigateUp() {
  if (state.activeRow === 2) {
    state.activeRow = 1;
  } else if (state.activeRow === 1) {
    state.activeRow = 0;
  }
  fullRender();
}

// ─────────────────────────────────────────────────────────
// FULL RENDER
// ─────────────────────────────────────────────────────────
function fullRender() {
  renderModuleRow();
  renderSubRow();
  renderItemRow();
  renderContent();
  // Beams after a frame so layout is settled
  requestAnimationFrame(() => renderBeams());
}

// ─────────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); navigateHorizontal(-1); break;
    case 'ArrowRight': e.preventDefault(); navigateHorizontal(1);  break;
    case 'ArrowDown':  e.preventDefault(); navigateDown();         break;
    case 'ArrowUp':    e.preventDefault(); navigateUp();           break;
  }
});

// ─────────────────────────────────────────────────────────
// CLOCK TICK
// ─────────────────────────────────────────────────────────
let baseTime = 2*3600 + 34*60 + 17; // 02:34:17
let baseCost = 12.47;
setInterval(() => {
  baseTime++;
  const h = String(Math.floor(baseTime / 3600)).padStart(2, '0');
  const m = String(Math.floor((baseTime % 3600) / 60)).padStart(2, '0');
  const s = String(baseTime % 60).padStart(2, '0');
  document.getElementById('hdrTime').textContent = `${h}:${m}:${s}`;
  if (baseTime % 7 === 0) {
    baseCost += 0.01;
    document.getElementById('hdrCost').textContent = '$' + baseCost.toFixed(2);
  }
}, 1000);

// ─────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => requestAnimationFrame(() => renderBeams()));

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
fullRender();
</script>
</body>
</html>
