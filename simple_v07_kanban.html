<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Kanban Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#08090e;--col-bg:#0c0d14;--sf:#111219;--sf2:#16171f;--sf3:#1c1d28;
    --bd:#1e1f2e;--bd-dim:#161722;--tx:#e2e4f0;--tx-d:#8889a4;--tx-m:#55566e;--tx-f:#3a3b50;
    --grn:#3fb950;--grn-d:rgba(63,185,80,.10);--grn-b:rgba(63,185,80,.35);
    --pur:#a78bfa;--pur-d:rgba(167,139,250,.10);--pur-b:rgba(167,139,250,.35);
    --blu:#58a6ff;--blu-d:rgba(88,166,255,.10);--blu-b:rgba(88,166,255,.35);
    --org:#e5943a;--org-d:rgba(229,148,58,.08);--org-b:rgba(229,148,58,.30);
    --r:8px;
  }
  html,body{height:100%;width:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;height:100vh;width:100vw}

  /* Top bar */
  .top{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;min-height:52px;background:var(--sf);border-bottom:1px solid var(--bd);z-index:100}
  .top-l{display:flex;align-items:center;gap:14px}
  .brand{font-weight:700;font-size:14px;letter-spacing:-.03em;background:linear-gradient(135deg,var(--blu),var(--pur));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sep{width:1px;height:20px;background:var(--bd)}
  .rn{font-weight:600;font-size:13px;letter-spacing:-.01em}
  .top-r{display:flex;align-items:center;gap:16px}
  .pill{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--tx-d)}
  .pill .v{color:var(--tx);font-variant-numeric:tabular-nums}
  .sbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--blu-d);color:var(--blu);text-transform:uppercase;letter-spacing:.04em}
  .pd{width:6px;height:6px;border-radius:50%;background:var(--blu);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
  .mono{font-family:'SF Mono','Fira Code',monospace}

  /* Kanban */
  .kanban{display:flex;gap:16px;flex:1;padding:16px;overflow:hidden;min-height:0}

  /* Column */
  .col{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--col-bg);border-radius:12px;border:1px solid var(--bd-dim);overflow:hidden;transition:opacity .3s,filter .3s}
  .col.dim{opacity:.50;filter:saturate(.3)}.col.dim:hover{opacity:.65;filter:saturate(.5)}
  .ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;height:48px;min-height:48px;border-top:4px solid transparent;position:relative}
  .ch-l{display:flex;align-items:center;gap:10px}
  .ct{font-size:13px;font-weight:700;letter-spacing:-.01em}
  .cb{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em}
  .cc{font-size:11px;font-weight:600;color:var(--tx-m);background:var(--sf2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px}
  .c-grn .ch{border-top-color:var(--grn)}.c-grn .ct{color:var(--grn)}.c-grn .cb{background:var(--grn-d);color:var(--grn)}
  .c-pur .ch{border-top-color:var(--pur)}.c-pur .ct{color:var(--pur)}.c-pur .cb{background:var(--pur-d);color:var(--pur)}
  .c-blu .ch{border-top-color:var(--blu)}.c-blu .ct{color:var(--blu)}.c-blu .cb{background:var(--blu-d);color:var(--blu)}
  .c-org .ch{border-top-color:var(--org)}.c-org .ct{color:var(--org)}.c-org .cb{background:var(--org-d);color:var(--org)}
  .col.act .ch::after{content:'';position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(88,166,255,.06),transparent);pointer-events:none}

  /* Column body */
  .cb-body{flex:1;overflow-y:auto;padding:0 10px 10px;min-height:0}
  .cb-body::-webkit-scrollbar{width:4px}.cb-body::-webkit-scrollbar-track{background:transparent}
  .cb-body::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

  /* Iteration dividers */
  .ig{margin-bottom:6px}
  .idv{display:flex;align-items:center;gap:10px;padding:10px 4px 6px}
  .idv::before,.idv::after{content:'';flex:1;height:1px;background:var(--bd-dim)}
  .il{font-size:10px;font-weight:600;color:var(--tx-m);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
  .ig:first-child .idv{padding-top:6px}

  /* Card */
  .k{display:flex;align-items:center;gap:10px;padding:10px 12px;margin:4px 0;border-radius:var(--r);background:var(--sf);border:1px solid var(--bd-dim);border-left:3px solid transparent;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s,border-color .2s;min-height:52px;position:relative;user-select:none}
  .k:hover{background:var(--sf2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.25)}
  .k:active{transform:translateY(0)}
  .k.d{border-left-color:var(--grn);background:rgba(63,185,80,.03)}.k.d:hover{background:rgba(63,185,80,.06)}
  .k.a{border-left-color:var(--blu);background:rgba(88,166,255,.05);animation:cbp 2.4s ease-in-out infinite}.k.a:hover{background:rgba(88,166,255,.08)}
  @keyframes cbp{0%,100%{border-left-color:var(--blu)}50%{border-left-color:rgba(88,166,255,.3)}}
  .k.p{border-left:3px dotted var(--tx-f);opacity:.45}.k.p:hover{opacity:.6}
  .ki{font-size:14px;width:20px;text-align:center;flex-shrink:0}
  .k.d .ki{color:var(--grn)}.k.a .ki{color:var(--blu)}.k.p .ki{color:var(--tx-f)}
  .kc{flex:1;min-width:0}
  .kn{font-size:12px;font-weight:600;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .k.p .kn{color:var(--tx-m)}
  .km{font-size:10px;color:var(--tx-d);margin-top:2px;font-variant-numeric:tabular-nums}.k.p .km{color:var(--tx-f)}
  .kv{font-size:10px;color:var(--tx-f);transition:transform .3s,color .2s;flex-shrink:0}
  .k:hover .kv{color:var(--tx-d)}.k.exp .kv{transform:rotate(90deg);color:var(--tx-d)}

  /* Card detail */
  .det{overflow:hidden;max-height:0;opacity:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease,padding .3s ease,margin .3s ease;margin:0;padding:0 12px;background:var(--sf2);border-radius:0 0 var(--r) var(--r);border:1px solid transparent;border-top:none;font-size:12px;line-height:1.6}
  .det.open{max-height:600px;opacity:1;padding:14px 14px 16px;margin:-4px 0 4px;border-color:var(--bd-dim)}
  .dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
  .ds{font-size:11px;font-weight:600}.ds.d{color:var(--grn)}.ds.a{color:var(--blu)}.ds.p{color:var(--tx-m)}
  .dm{font-size:11px;color:var(--tx-d);font-variant-numeric:tabular-nums}
  .dbar{height:4px;background:var(--bd);border-radius:2px;margin:6px 0 12px;overflow:hidden}
  .dbf{height:100%;border-radius:2px;transition:width .5s ease}
  .dbf.g{background:var(--grn)}.dbf.b{background:linear-gradient(90deg,var(--grn),var(--blu))}
  .di{list-style:none}
  .dii{display:flex;gap:8px;padding:5px 0;align-items:flex-start}
  .dii+.dii{border-top:1px solid rgba(30,31,46,.6)}
  .dic{flex-shrink:0;width:16px;text-align:center;font-size:12px;margin-top:1px}
  .dic.d{color:var(--grn)}.dic.a{color:var(--blu)}.dic.p{color:var(--tx-f)}
  .dib{flex:1;min-width:0}
  .din{font-weight:600;font-size:11.5px;color:var(--tx)}.dii.p .din{color:var(--tx-m)}
  .dis{font-size:10.5px;color:var(--tx-d);margin-top:1px;line-height:1.5}.dii.p .dis{color:var(--tx-f)}
  .dtx{color:var(--tx-d);font-size:11.5px;line-height:1.65}
  .dtx strong{color:var(--tx);font-weight:600}.dtx .hl{color:var(--grn);font-weight:600}

  /* Bottom bar */
  .bot{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:36px;min-height:36px;background:var(--sf);border-top:1px solid var(--bd);font-size:11px;color:var(--tx-d)}
  .bot-l,.bot-r{display:flex;align-items:center;gap:18px}
  .bs{display:flex;align-items:center;gap:5px;font-variant-numeric:tabular-nums}
  .bs .l{color:var(--tx-m)}.bs .v{color:var(--tx-d);font-weight:500}
</style>
</head>

     detail:'Defined 3-phase implementation strategy: (1) graph construction and alignment pipeline, (2) contrastive training loop, (3) evaluation on downstream tasks. Selected <strong>5 language pairs</strong>.<br><br><strong>Approach:</strong> Bottom-up \u00b7 <strong>Complexity:</strong> Medium'},

     detail:'Updated hypothesis: expanded to <strong>12 languages</strong> (from 5). Strengthened baseline comparison. Confidence: <span class="hl">0.82 \u2192 0.88</span>.'}
  ]},
  {label:'Iteration 2',cards:[

    {id:'i2p',name:'Plan',st:S,metric:'2m 31s \u00b7 $0.76',
     detail:'Updated plan: same 5 artifact types with expanded scope. Contrastive experiment now includes 3 baseline models. Dataset: 2,400 examples, 12 languages.<br><br><strong>Artifacts planned:</strong> 5 \u00b7 <strong>Est. time:</strong> 16m'},

     bar:{pct:66,cls:'b'},items:[
      {st:S,name:'Contrastive Baseline Experiment',sub:'Accuracy: 0.847 (vs 0.721 baseline, +17.5%) \u00b7 4m 32s \u00b7 $2.14'},
      {st:S,name:'Multilingual Pairs Dataset',sub:'2,400 examples across 12 languages \u00b7 3m 15s \u00b7 $1.02'},

{title:'Paper & Repo',color:'org',badge:'Pending',cls:'dim',groups:[

var icons={d:'\u2713',a:'\u25b6',p:'\u25cb'};
var stLabel={d:'\u2713 Complete',a:'\u25b6 Running',p:'\u25cb Pending'};
var stCls={d:'d',a:'a',p:'p'};

function h(tag,cls,html){var e=D.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}

function buildCard(c){
  var wrap=D.createDocumentFragment();
  var card=h('div','k '+stCls[c.st]);
  card.setAttribute('data-card',c.id);
  card.appendChild(h('span','ki',icons[c.st]));
  var cnt=h('div','kc');
  cnt.appendChild(h('div','kn',c.name));
  cnt.appendChild(h('div','km',c.metric));
  card.appendChild(cnt);
  card.appendChild(h('span','kv','\u25b6'));
  wrap.appendChild(card);

  var det=h('div','det');
  det.id='det-'+c.id;
  var dh=h('div','dh');
  dh.appendChild(h('span','ds '+stCls[c.st],stLabel[c.st]));
  dh.appendChild(h('span','dm',c.st===P?'\u2014':c.metric));
  det.appendChild(dh);

  if(c.bar){
    var bar=h('div','dbar');
    var fill=h('div','dbf '+c.bar.cls);
    fill.style.width=c.bar.pct+'%';
    bar.appendChild(fill);
    det.appendChild(bar);
  }
  if(c.items){
    var ul=h('ul','di');
    c.items.forEach(function(it){
      var li=h('li','dii'+(it.st===P?' p':''));
      li.appendChild(h('span','dic '+stCls[it.st],icons[it.st]));
      var bd=h('div','dib');
      bd.appendChild(h('div','din',it.name));
      bd.appendChild(h('div','dis',it.sub));
      li.appendChild(bd);
      ul.appendChild(li);
    });
    det.appendChild(ul);
  }
  if(c.detail){
    det.appendChild(h('div','dtx',c.detail));
  }
  wrap.appendChild(det);
  return wrap;
}

function buildBoard(){
  var board=D.getElementById('board');
  columns.forEach(function(col){
    var el=h('div','col c-'+col.color+(col.cls?' '+col.cls:''));
    var ch=h('div','ch');
    var chl=h('div','ch-l');
    chl.appendChild(h('span','ct',col.title));
    chl.appendChild(h('span','cb',col.badge));
    ch.appendChild(chl);
    var total=0;col.groups.forEach(function(g){total+=g.cards.length});
    ch.appendChild(h('span','cc',''+total));
    el.appendChild(ch);

    var body=h('div','cb-body');
    col.groups.forEach(function(g){
      var ig=h('div','ig');
      if(g.label){
        var dv=h('div','idv');
        dv.appendChild(h('span','il',g.label));
        ig.appendChild(dv);
      }
      g.cards.forEach(function(c){ig.appendChild(buildCard(c))});
      body.appendChild(ig);
    });
    el.appendChild(body);
    board.appendChild(el);
  });
}

buildBoard();

// ── Card expand/collapse ──
D.addEventListener('click',function(e){
  var card=e.target.closest('.k[data-card]');
  if(!card)return;
  var det=D.getElementById('det-'+card.getAttribute('data-card'));
  if(!det)return;
  var open=det.classList.contains('open');
  var col=card.closest('.col');
  col.querySelectorAll('.det.open').forEach(function(d){d.classList.remove('open')});
  col.querySelectorAll('.k.exp').forEach(function(c){c.classList.remove('exp')});
  if(!open){
    det.classList.add('open');
    card.classList.add('exp');
    setTimeout(function(){det.scrollIntoView({behavior:'smooth',block:'nearest'})},100);
  }
});

// ── Escape to close all ──
D.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    D.querySelectorAll('.det.open').forEach(function(d){d.classList.remove('open')});
    D.querySelectorAll('.k.exp').forEach(function(c){c.classList.remove('exp')});
  }
});

// ── Elapsed timer ──
var elEl=D.getElementById('el'),base=1*3600+24*60+38,tick=0;
function fmt(t){var hr=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=t%60;return hr+'h '+(m<10?'0':'')+m+'m '+(s<10?'0':'')+s+'s'}
setInterval(function(){elEl.textContent=fmt(base+ ++tick)},1000);
})();
</script>
</body>
</html>
