<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Feed v2 — 10 Two-Row Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface: rgba(15,23,42,.72);
  --surface-hi: rgba(30,41,59,.65);
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  --ease: cubic-bezier(.4,0,.2,1);
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text-dim);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8);
  backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  padding: 32px 40px;
  max-width: 1400px;
}

.variant {
  background: var(--surface-card);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(52,211,153,.2), transparent);
}

.variant-label {
  padding: 14px 20px 10px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.variant-label .num {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--green-dim); color: var(--green);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.variant-body { padding: 16px 20px 20px; }

/* Shared */
.feed-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.feed-title {
  font-size: 10px; color: var(--text-faint); text-transform: uppercase;
  letter-spacing: .6px; font-weight: 600;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 8px; font-weight: 800; color: var(--red);
  background: var(--red-dim); padding: 2px 8px 2px 6px;
  border-radius: 4px; letter-spacing: .6px; text-transform: uppercase;
}
.live-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--red);
  animation: blink 1.3s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }
.feed-count { margin-left: auto; font-size: 10px; color: var(--text-faint); }
.feed-scroll { max-height: 360px; overflow-y: auto; }
.feed-scroll::-webkit-scrollbar { width: 3px; }
.feed-scroll::-webkit-scrollbar-track { background: transparent; }
.feed-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,.15); border-radius: 2px; }

@keyframes dotPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.4); } }
@keyframes feedIn { to { opacity: 1; transform: translateY(0); } }

/* ============================================================
   V1 — Stacked: Tool name + summary below
   ============================================================ */
.v1-list { display: flex; flex-direction: column; gap: 4px; }
.v1-event {
  padding: 7px 10px; border-radius: 6px;
  transition: background .12s; cursor: default;
}
.v1-event:hover { background: rgba(255,255,255,.02); }
.v1-row1 {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 3px;
}
.v1-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.v1-tool { font-size: 10px; font-weight: 700; color: var(--text-muted); }
.v1-time {
  margin-left: auto; font-size: 9px; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
}
.v1-row2 {
  font-size: 11.5px; color: var(--text-dim); padding-left: 12px;
  line-height: 1.4;
}
.v1-event.is-new .v1-row2 { color: var(--text); }

/* ============================================================
   V2 — Time + Category row, summary below
   ============================================================ */
.v2-list { display: flex; flex-direction: column; gap: 4px; }
.v2-event {
  padding: 7px 10px; border-radius: 6px;
  transition: background .12s;
}
.v2-event:hover { background: rgba(255,255,255,.02); }
.v2-row1 {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 3px;
}
.v2-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
}
.v2-cat {
  font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .3px;
}
.v2-sep { flex: 1; height: 1px; background: var(--border); margin: 0 4px; }
.v2-ago { font-size: 9px; color: var(--text-faint); }
.v2-row2 { font-size: 11.5px; color: var(--text-dim); padding-left: 0; line-height: 1.4; }

/* ============================================================
   V3 — Icon + Badge top, summary indented
   ============================================================ */
.v3-list { display: flex; flex-direction: column; gap: 4px; }
.v3-event {
  padding: 7px 10px; border-radius: 6px;
  background: rgba(255,255,255,.012);
  border: 1px solid transparent;
  transition: all .12s;
}
.v3-event:hover { border-color: var(--border); }
.v3-event.is-new { border-color: rgba(96,165,250,.1); background: rgba(96,165,250,.02); }
.v3-row1 {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 4px;
}
.v3-icon {
  width: 18px; height: 18px; border-radius: 5px;
  display: grid; place-items: center; font-size: 9px; flex-shrink: 0;
}
.v3-tool { font-size: 11px; font-weight: 600; color: var(--text); }
.v3-badge {
  font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase; margin-left: auto;
}
.v3-row2 {
  font-size: 11px; color: var(--text-dim); padding-left: 26px; line-height: 1.4;
}

/* ============================================================
   V4 — Split header: tool left, time right; summary below
   ============================================================ */
.v4-list { display: flex; flex-direction: column; gap: 2px; }
.v4-event {
  padding: 6px 10px; border-radius: 6px;
  transition: background .12s;
}
.v4-event:hover { background: rgba(255,255,255,.02); }
.v4-row1 {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2px;
}
.v4-left { display: flex; align-items: center; gap: 6px; }
.v4-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.v4-tool { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .3px; }
.v4-time { font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
.v4-row2 { font-size: 11.5px; color: var(--text-dim); padding-left: 11px; }

/* ============================================================
   V5 — Category pill top, summary below
   ============================================================ */
.v5-list { display: flex; flex-direction: column; gap: 5px; }
.v5-event {
  padding: 7px 10px; border-radius: 6px;
  transition: background .12s;
}
.v5-event:hover { background: rgba(255,255,255,.02); }
.v5-row1 {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 4px;
}
.v5-pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: .3px;
}
.v5-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
}
.v5-module {
  font-size: 9px; color: var(--text-faint); margin-left: auto;
}
.v5-row2 { font-size: 11.5px; color: var(--text-dim); line-height: 1.4; }

/* ============================================================
   V6 — Dotted timeline: dot + tool top, indented summary
   ============================================================ */
.v6-timeline { position: relative; padding-left: 20px; }
.v6-timeline::before {
  content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px;
  width: 1.5px; border-radius: 1px;
  background: linear-gradient(180deg, var(--green), rgba(52,211,153,.08));
}
.v6-event { position: relative; padding: 5px 0; }
.v6-event::before {
  content: ''; position: absolute; left: -16px; top: 11px;
  width: 7px; height: 7px; border-radius: 50%; border: 2px solid var(--bg);
}
.v6-event.done::before { background: var(--green); }
.v6-event.running::before { background: var(--blue); animation: dotPulse 2s ease-in-out infinite; }
.v6-event.warn::before { background: var(--orange); }
.v6-event.info::before { background: var(--cyan); }
.v6-event.thinking::before { background: var(--purple); }
.v6-row1 {
  display: flex; align-items: center; gap: 6px; margin-bottom: 2px;
}
.v6-tool { font-size: 10px; font-weight: 700; color: var(--text-muted); }
.v6-time { margin-left: auto; font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
.v6-row2 { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

/* ============================================================
   V7 — Compact cards with accent border
   ============================================================ */
.v7-list { display: flex; flex-direction: column; gap: 5px; }
.v7-card {
  padding: 8px 10px 8px 12px; border-radius: 6px;
  background: rgba(255,255,255,.015);
  border-left: 2px solid transparent;
  transition: all .12s;
}
.v7-card:hover { background: rgba(255,255,255,.03); }
.v7-row1 {
  display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
}
.v7-tool { font-size: 10px; font-weight: 700; }
.v7-time { margin-left: auto; font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
.v7-row2 { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

/* ============================================================
   V8 — Tags row + summary
   ============================================================ */
.v8-list { display: flex; flex-direction: column; gap: 4px; }
.v8-event {
  padding: 7px 10px; border-radius: 6px;
  transition: background .12s;
}
.v8-event:hover { background: rgba(255,255,255,.02); }
.v8-row1 {
  display: flex; align-items: center; gap: 4px; margin-bottom: 4px; flex-wrap: wrap;
}
.v8-tag {
  font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: .2px;
}
.v8-time {
  margin-left: auto; font-size: 9px; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
}
.v8-row2 { font-size: 11.5px; color: var(--text-dim); line-height: 1.4; }

/* ============================================================
   V9 — Alternating rows with subtle stripe
   ============================================================ */
.v9-list { display: flex; flex-direction: column; }
.v9-event {
  padding: 7px 10px; transition: background .12s;
}
.v9-event:nth-child(odd) { background: rgba(255,255,255,.012); }
.v9-event:hover { background: rgba(255,255,255,.03); }
.v9-row1 {
  display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
}
.v9-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.v9-tool { font-size: 10px; font-weight: 600; color: var(--text); }
.v9-meta {
  margin-left: auto; font-size: 9px; color: var(--text-faint);
  font-family: 'JetBrains Mono', monospace;
  display: flex; gap: 8px;
}
.v9-row2 { font-size: 11px; color: var(--text-dim); padding-left: 14px; line-height: 1.4; }

/* ============================================================
   V10 — Minimal two-line with hover reveal
   ============================================================ */
.v10-list { display: flex; flex-direction: column; gap: 1px; }
.v10-event {
  padding: 6px 10px; border-radius: 5px;
  transition: background .12s;
}
.v10-event:hover { background: rgba(255,255,255,.02); }
.v10-row1 {
  display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px;
}
.v10-time {
  font-size: 9px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0; opacity: .5;
}
.v10-event:hover .v10-time { opacity: 1; }
.v10-summary { font-size: 12px; color: var(--text-dim); font-weight: 500; }
.v10-event.is-new .v10-summary { color: var(--text); }
.v10-row2 {
  font-size: 10px; color: var(--text-faint); padding-left: 44px;
  display: flex; gap: 8px; align-items: center;
}
.v10-tool-name { font-weight: 600; }
.v10-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Activity Feed v2 — Two-Row Items</div>
  <div class="page-sub">Agent 3 — Feeds & Panels | 10 two-row variants, 30-50 char summaries</div>
</div>

<div class="grid" id="grid"></div>

<script>
const EVENTS = [
  { time: '12:04', tool: 'Simulate', text: 'Checkpoint saved, H7 thermal at 62%', cat: 'tool', icon: '\u26a1', status: 'running', module: 'GEN_ART', isNew: true },
  { time: '12:02', tool: 'Ablation', text: 'H4 attention contributes 18.3% done', cat: 'result', icon: '\u2705', status: 'done', module: 'GEN_ART', isNew: true },
  { time: '11:58', tool: 'Simulate', text: 'Started H7 nano-thermal transport', cat: 'progress', icon: '\ud83e\uddea', status: 'running', module: 'GEN_ART', isNew: false },
  { time: '11:55', tool: 'Evaluate', text: 'H6 confirmed: p<0.001, d=1.42', cat: 'result', icon: '\ud83d\udcca', status: 'done', module: 'GEN_ART', isNew: false },
  { time: '11:51', tool: 'Ablation', text: 'H5 attention only 3.1%, flagged', cat: 'warning', icon: '\u26a0\ufe0f', status: 'warn', module: 'GEN_ART', isNew: false },
  { time: '11:47', tool: 'Simulate', text: 'H6 done: +27.4% over ResNet-KG', cat: 'result', icon: '\u2705', status: 'done', module: 'GEN_ART', isNew: false },
  { time: '11:42', tool: 'Evaluate', text: 'Baseline table H1-6, mean +19.8%', cat: 'metric', icon: '\ud83d\udcca', status: 'done', module: 'GEN_ART', isNew: false },
  { time: '11:38', tool: 'Optimize', text: 'GPU mem 14.2\u219211.8GB, grad ckpt', cat: 'tool', icon: '\u26a1', status: 'info', module: 'GEN_ART', isNew: false },
];

const CAT_STYLE = {
  tool:     { bg: 'var(--blue-dim)', color: 'var(--blue)', label: 'Tool' },
  progress: { bg: 'var(--green-dim)', color: 'var(--green)', label: 'Progress' },
  result:   { bg: 'var(--purple-dim)', color: 'var(--purple)', label: 'Result' },
  metric:   { bg: 'var(--cyan-dim)', color: 'var(--cyan)', label: 'Metric' },
  warning:  { bg: 'var(--orange-dim)', color: 'var(--orange)', label: 'Warning' },
  thinking: { bg: 'rgba(148,163,184,.08)', color: 'var(--text-muted)', label: 'Think' },
};

const STATUS_COLOR = {
  done: 'var(--green)', running: 'var(--blue)', warn: 'var(--orange)',
  info: 'var(--cyan)', thinking: 'var(--purple)',
};

function header() {
  return `<div class="feed-header">
    <span class="feed-title">Activity Feed</span>
    <span class="live-badge"><span class="live-dot"></span> LIVE</span>
    <span class="feed-count">${EVENTS.length}</span>
  </div>`;
}

/* V1 — Stacked */
function v1() {
  return header() + `<div class="feed-scroll"><div class="v1-list">
    ${EVENTS.map(e => `<div class="v1-event ${e.isNew ? 'is-new' : ''}">
      <div class="v1-row1">
        <div class="v1-dot" style="background:${STATUS_COLOR[e.status]}"></div>
        <span class="v1-tool">${e.tool}</span>
        <span class="v1-time">${e.time}</span>
      </div>
      <div class="v1-row2">${e.text}</div>
    </div>`).join('')}
  </div></div>`;
}

/* V2 — Time + Category */
function v2() {
  return header() + `<div class="feed-scroll"><div class="v2-list">
    ${EVENTS.map(e => {
      const c = CAT_STYLE[e.cat];
      return `<div class="v2-event">
        <div class="v2-row1">
          <span class="v2-time">${e.time}</span>
          <span class="v2-cat" style="background:${c.bg};color:${c.color}">${c.label}</span>
          <span class="v2-sep"></span>
          <span class="v2-ago">${e.tool}</span>
        </div>
        <div class="v2-row2">${e.text}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

/* V3 — Icon + Badge */
function v3() {
  return header() + `<div class="feed-scroll"><div class="v3-list">
    ${EVENTS.map(e => {
      const c = CAT_STYLE[e.cat];
      return `<div class="v3-event ${e.isNew ? 'is-new' : ''}">
        <div class="v3-row1">
          <div class="v3-icon" style="background:${c.bg};color:${c.color}">${e.icon}</div>
          <span class="v3-tool">${e.tool}</span>
          <span class="v3-badge" style="background:${c.bg};color:${c.color}">${c.label}</span>
        </div>
        <div class="v3-row2">${e.text}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

/* V4 — Split header */
function v4() {
  return header() + `<div class="feed-scroll"><div class="v4-list">
    ${EVENTS.map(e => `<div class="v4-event">
      <div class="v4-row1">
        <div class="v4-left">
          <div class="v4-dot" style="background:${STATUS_COLOR[e.status]}"></div>
          <span class="v4-tool">${e.tool}</span>
        </div>
        <span class="v4-time">${e.time}</span>
      </div>
      <div class="v4-row2">${e.text}</div>
    </div>`).join('')}
  </div></div>`;
}

/* V5 — Category pill */
function v5() {
  return header() + `<div class="feed-scroll"><div class="v5-list">
    ${EVENTS.map(e => {
      const c = CAT_STYLE[e.cat];
      return `<div class="v5-event">
        <div class="v5-row1">
          <span class="v5-pill" style="background:${c.bg};color:${c.color}">${c.label}</span>
          <span class="v5-time">${e.time}</span>
          <span class="v5-module">${e.module}</span>
        </div>
        <div class="v5-row2">${e.text}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

/* V6 — Dotted timeline */
function v6() {
  return header() + `<div class="feed-scroll"><div class="v6-timeline">
    ${EVENTS.map(e => `<div class="v6-event ${e.status}">
      <div class="v6-row1">
        <span class="v6-tool">${e.tool}</span>
        <span class="v6-time">${e.time}</span>
      </div>
      <div class="v6-row2">${e.text}</div>
    </div>`).join('')}
  </div></div>`;
}

/* V7 — Accent border cards */
function v7() {
  return header() + `<div class="feed-scroll"><div class="v7-list">
    ${EVENTS.map(e => {
      const c = CAT_STYLE[e.cat];
      return `<div class="v7-card" style="border-left-color:${c.color}">
        <div class="v7-row1">
          <span class="v7-tool" style="color:${c.color}">${e.tool}</span>
          <span class="v7-time">${e.time}</span>
        </div>
        <div class="v7-row2">${e.text}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

/* V8 — Tags row */
function v8() {
  return header() + `<div class="feed-scroll"><div class="v8-list">
    ${EVENTS.map(e => {
      const c = CAT_STYLE[e.cat];
      return `<div class="v8-event">
        <div class="v8-row1">
          <span class="v8-tag" style="background:${c.bg};color:${c.color}">${c.label}</span>
          <span class="v8-tag" style="background:rgba(148,163,184,.06);color:var(--text-faint)">${e.module}</span>
          <span class="v8-tag" style="background:rgba(148,163,184,.06);color:var(--text-faint)">${e.tool}</span>
          <span class="v8-time">${e.time}</span>
        </div>
        <div class="v8-row2">${e.text}</div>
      </div>`;
    }).join('')}
  </div></div>`;
}

/* V9 — Striped rows */
function v9() {
  return header() + `<div class="feed-scroll"><div class="v9-list">
    ${EVENTS.map(e => `<div class="v9-event">
      <div class="v9-row1">
        <div class="v9-dot" style="background:${STATUS_COLOR[e.status]}"></div>
        <span class="v9-tool">${e.tool}</span>
        <div class="v9-meta">
          <span>${e.module}</span>
          <span>${e.time}</span>
        </div>
      </div>
      <div class="v9-row2">${e.text}</div>
    </div>`).join('')}
  </div></div>`;
}

/* V10 — Minimal hover-reveal */
function v10() {
  return header() + `<div class="feed-scroll"><div class="v10-list">
    ${EVENTS.map(e => {
      const c = CAT_STYLE[e.cat];
      return `<div class="v10-event ${e.isNew ? 'is-new' : ''}">
        <div class="v10-row1">
          <span class="v10-time">${e.time}</span>
          <span class="v10-summary">${e.text}</span>
        </div>
        <div class="v10-row2">
          <span class="v10-tool-name" style="color:${c.color}">${e.tool}</span>
          <span class="v10-dot"></span>
          <span>${c.label}</span>
          <span class="v10-dot"></span>
          <span>${e.module}</span>
        </div>
      </div>`;
    }).join('')}
  </div></div>`;
}

const VARIANTS = [
  { num: 1, name: 'Stacked — Dot + tool top, summary below', render: v1 },
  { num: 2, name: 'Time + Category — Time + pill top, summary below', render: v2 },
  { num: 3, name: 'Icon + Badge — Icon + tool + badge, indented summary', render: v3 },
  { num: 4, name: 'Split Header — Tool left / time right, summary below', render: v4 },
  { num: 5, name: 'Category Pill — Pill + time + module, summary below', render: v5 },
  { num: 6, name: 'Dotted Timeline — Vertical line + branches, two rows', render: v6 },
  { num: 7, name: 'Accent Cards — Colored left border, tool + summary', render: v7 },
  { num: 8, name: 'Tags Row — Category + module + tool tags, summary below', render: v8 },
  { num: 9, name: 'Striped — Alternating bg, dot + tool + meta, summary', render: v9 },
  { num: 10, name: 'Minimal — Summary first, metadata below on hover', render: v10 },
];

const grid = document.getElementById('grid');
VARIANTS.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `
    <div class="variant-label"><span class="num">${v.num}</span> ${v.name}</div>
    <div class="variant-body">${v.render()}</div>
  `;
  grid.appendChild(el);
});
</script>
</body>
</html>
