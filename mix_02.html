<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Wide Card Pipeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Slate palette */
    --bg:          #0f1117;
    --bg-raised:   #161922;
    --surface:     #1c2030;
    --surface-alt: #212638;
    --border:      #2a3048;
    --border-dim:  #232840;

    --text:        #e2e8f0;
    --text-dim:    #94a3b8;
    --text-muted:  #64748b;
    --text-faint:  #475569;

    --green:   #34d399;
    --green-d: rgba(52,211,153,0.12);
    --purple:  #a78bfa;
    --purple-d:rgba(167,139,250,0.12);
    --blue:    #60a5fa;
    --blue-d:  rgba(96,165,250,0.12);
    --amber:   #fbbf24;
    --amber-d: rgba(251,191,36,0.12);

    --radius:  14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ================================================================
     HEADER BAR
     ================================================================ */
  .header {
    height: 54px;
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 18px;
    border-bottom: 1px solid var(--border-dim);
    background: linear-gradient(180deg, var(--bg-raised) 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-brand {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(52,211,153,0.5);
    animation: brandPulse 2.5s ease-in-out infinite;
  }
  @keyframes brandPulse {
    0%,100% { box-shadow: 0 0 6px rgba(52,211,153,0.3); }
    50%     { box-shadow: 0 0 14px rgba(52,211,153,0.6); }
  }

  .header-run {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    padding: 3px 10px;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border-dim);
  }

  /* progress ring in header */
  .header-ring-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-ring {
    width: 36px; height: 36px;
    position: relative;
    flex-shrink: 0;
  }
  .header-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg   { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-fill { fill: none; stroke: var(--green); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 100.53; stroke-dashoffset: 35.2; transition: stroke-dashoffset 1s ease; }
  .ring-text { fill: var(--text); font-size: 9px; font-weight: 700;
    text-anchor: middle; dominant-baseline: central; font-family: 'Inter',sans-serif; }
  .ring-glow-orbit {
    position: absolute; inset: -3px;
    border-radius: 50%;
    border: 1px dashed var(--green);
    opacity: 0.3;
    animation: orbitSpin 10s linear infinite;
  }
  @keyframes orbitSpin { to { transform: rotate(360deg); } }

  .header-stats {
    display: flex; gap: 18px;
    font-size: 11px; color: var(--text-dim); font-weight: 400;
  }
  .header-stats span { display: flex; align-items: center; gap: 5px; }
  .stat-pip {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ================================================================
     PARTICLE CANVAS (overlays everything)
     ================================================================ */
  #particleCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 40;
  }

  /* ================================================================
     MAIN CONTENT
     ================================================================ */
  .content {
    padding: 28px 32px 40px;
    position: relative;
    z-index: 1;
  }

  /* ── Module Row: 4 wide cards across ── */
  .modules-row {
    display: flex;
    gap: 20px;
    position: relative;
    align-items: flex-start;
  }

  /* ── Individual module column (card + tree) ── */
  .module-col {
    flex: 1;
    min-width: 0;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ================================================================
     WIDE MODULE CARD
     ================================================================ */
  .module-card {
    width: 100%;
    background: linear-gradient(145deg, var(--surface) 0%, var(--bg-raised) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px 16px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.35s, transform 0.2s, box-shadow 0.35s;
    user-select: none;
  }
  .module-card:hover { transform: translateY(-2px); }

  /* Left accent stripe */
  .module-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: var(--radius) 0 0 var(--radius);
  }
  .module-card[data-color="green"]::before  { background: var(--green); }
  .module-card[data-color="purple"]::before { background: var(--purple); }
  .module-card[data-color="blue"]::before   { background: var(--blue); }
  .module-card[data-color="amber"]::before  { background: var(--amber); }

  /* Active states */
  .module-card.active { border-color: rgba(255,255,255,0.1); }
  .module-card.active[data-color="green"]  { box-shadow: 0 0 30px rgba(52,211,153,0.1),  inset 0 1px 0 rgba(52,211,153,0.08); }
  .module-card.active[data-color="purple"] { box-shadow: 0 0 30px rgba(167,139,250,0.1), inset 0 1px 0 rgba(167,139,250,0.08); }
  .module-card.active[data-color="blue"]   { box-shadow: 0 0 30px rgba(96,165,250,0.1),  inset 0 1px 0 rgba(96,165,250,0.08); }
  .module-card.active[data-color="amber"]  { box-shadow: 0 0 30px rgba(251,191,36,0.1),  inset 0 1px 0 rgba(251,191,36,0.08); }

  /* Active glow pulse overlay */
  .module-card.active::after {
    content: '';
    position: absolute; inset: -1px;
    border-radius: var(--radius);
    animation: cardGlowPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  .module-card.active[data-color="green"]::after  { box-shadow: inset 0 0 30px rgba(52,211,153,0.04); }
  .module-card.active[data-color="purple"]::after { box-shadow: inset 0 0 30px rgba(167,139,250,0.04); }
  .module-card.active[data-color="blue"]::after   { box-shadow: inset 0 0 30px rgba(96,165,250,0.04); }
  .module-card.active[data-color="amber"]::after  { box-shadow: inset 0 0 30px rgba(251,191,36,0.04); }
  @keyframes cardGlowPulse {
    0%,100% { opacity: 0.4; }
    50%     { opacity: 1; }
  }

  /* Shimmer sweep */
  .card-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(110deg,
      transparent 30%,
      rgba(255,255,255,0.02) 47%,
      rgba(255,255,255,0.05) 50%,
      rgba(255,255,255,0.02) 53%,
      transparent 70%
    );
    background-size: 250% 100%;
    animation: shimmerSweep 3.5s ease-in-out infinite;
    pointer-events: none;
    opacity: 0;
    border-radius: var(--radius);
  }
  .module-card.active .card-shimmer { opacity: 1; }
  @keyframes shimmerSweep {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Card header row */
  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .card-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .card-icon[data-color="green"]  { background: var(--green-d); }
  .card-icon[data-color="purple"] { background: var(--purple-d); }
  .card-icon[data-color="blue"]   { background: var(--blue-d); }
  .card-icon[data-color="amber"]  { background: var(--amber-d); }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card-badge.done    { background: var(--green-d);  color: var(--green); }
  .card-badge.running { background: var(--blue-d);   color: var(--blue);
    animation: badgeFlicker 2.2s ease-in-out infinite; }
  .card-badge.pending { background: rgba(100,116,139,0.1); color: var(--text-muted); }
  @keyframes badgeFlicker {
    0%,100% { opacity: 0.8; }
    50%     { opacity: 1; background: rgba(96,165,250,0.2); }
  }

  /* Metric row */
  .card-metric {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 4px;
  }
  .metric-val {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .metric-val[data-color="green"]  { color: var(--green); }
  .metric-val[data-color="purple"] { color: var(--purple); }
  .metric-val[data-color="blue"]   { color: var(--blue); }
  .metric-val[data-color="amber"]  { color: var(--amber); }
  .metric-unit {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* Description line */
  .card-desc {
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Progress bar */
  .card-progress-track {
    height: 4px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .card-progress-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .card-progress-fill[data-color="green"]  { background: var(--green); }
  .card-progress-fill[data-color="purple"] { background: var(--purple); }
  .card-progress-fill[data-color="blue"]   { background: var(--blue); }
  .card-progress-fill[data-color="amber"]  { background: var(--amber); }

  /* progress fill glow for active */
  .module-card.active .card-progress-fill::after {
    content: '';
    position: absolute;
    right: -1px; top: -4px; bottom: -4px; width: 16px;
    border-radius: 50%;
    animation: fillTip 1.5s ease-in-out infinite;
  }
  .module-card.active .card-progress-fill[data-color="green"]::after  { background: radial-gradient(circle, rgba(52,211,153,0.5) 0%, transparent 70%); }
  .module-card.active .card-progress-fill[data-color="purple"]::after { background: radial-gradient(circle, rgba(167,139,250,0.5) 0%, transparent 70%); }
  .module-card.active .card-progress-fill[data-color="blue"]::after   { background: radial-gradient(circle, rgba(96,165,250,0.5) 0%, transparent 70%); }
  .module-card.active .card-progress-fill[data-color="amber"]::after  { background: radial-gradient(circle, rgba(251,191,36,0.5) 0%, transparent 70%); }
  @keyframes fillTip {
    0%,100% { opacity: 0.4; }
    50%     { opacity: 1; }
  }

  .card-progress-label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
    display: flex;
    justify-content: space-between;
  }

  /* Collapse chevron */
  .card-collapse-toggle {
    position: absolute;
    bottom: 6px;
    right: 12px;
    width: 20px; height: 14px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-faint);
    transition: transform 0.35s, color 0.2s;
    font-size: 10px;
  }
  .card-collapse-toggle:hover { color: var(--text-dim); }
  .module-col.collapsed .card-collapse-toggle { transform: rotate(180deg); }

  /* ================================================================
     CONNECTOR LINES between cards (drawn on canvas)
     ================================================================ */

  /* ================================================================
     SUB-MODULE TREE (drops below each card)
     ================================================================ */
  .submods-wrap {
    overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1),
                opacity 0.35s ease;
    max-height: 600px;
    opacity: 1;
  }
  .module-col.collapsed .submods-wrap {
    max-height: 0;
    opacity: 0;
  }

  .submods {
    padding: 10px 0 0;
    position: relative;
  }

  .tree-container {
    position: relative;
    padding-left: 22px;
  }
  /* Vertical tree trunk */
  .tree-container::before {
    content: '';
    position: absolute;
    left: 9px;
    top: 0;
    width: 1.5px;
    height: var(--tree-h, calc(100% - 18px));
    border-radius: 1px;
    transition: background 0.4s;
  }
  .tree-container[data-color="green"]::before  { background: rgba(52,211,153,0.25); }
  .tree-container[data-color="purple"]::before { background: rgba(167,139,250,0.25); }
  .tree-container[data-color="blue"]::before   { background: rgba(96,165,250,0.25); }
  .tree-container[data-color="amber"]::before  { background: rgba(251,191,36,0.25); }

  /* Sub-module row */
  .sub-row {
    height: 38px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    font-size: 12px;
    padding: 0 10px 0 0;
    border-radius: var(--radius-sm);
    cursor: pointer;
    opacity: 0;
    transform: translateX(-14px);
    transition: opacity 0.35s ease, transform 0.35s ease, background 0.2s;
  }
  .sub-row.visible {
    opacity: 1;
    transform: translateX(0);
  }
  .sub-row:hover { background: rgba(255,255,255,0.02); }

  /* Horizontal branch from trunk */
  .sub-row::before {
    content: '';
    position: absolute;
    left: -13px;
    top: 50%;
    width: 13px;
    height: 1.5px;
    border-radius: 1px;
  }
  .tree-container[data-color="green"]  .sub-row::before { background: rgba(52,211,153,0.25); }
  .tree-container[data-color="purple"] .sub-row::before { background: rgba(167,139,250,0.25); }
  .tree-container[data-color="blue"]   .sub-row::before { background: rgba(96,165,250,0.25); }
  .tree-container[data-color="amber"]  .sub-row::before { background: rgba(251,191,36,0.25); }

  /* Status dot */
  .sub-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.35s;
  }
  .sub-dot.done { opacity: 0.8; }
  .sub-dot.done[data-color="green"]  { background: var(--green); }
  .sub-dot.done[data-color="purple"] { background: var(--purple); }
  .sub-dot.done[data-color="blue"]   { background: var(--blue); }
  .sub-dot.done[data-color="amber"]  { background: var(--amber); }

  .sub-dot.running {
    animation: subDotPulse 2s ease-in-out infinite;
  }
  .sub-dot.running[data-color="green"]  { background: var(--green);  box-shadow: 0 0 10px rgba(52,211,153,0.5); }
  .sub-dot.running[data-color="purple"] { background: var(--purple); box-shadow: 0 0 10px rgba(167,139,250,0.5); }
  .sub-dot.running[data-color="blue"]   { background: var(--blue);   box-shadow: 0 0 10px rgba(96,165,250,0.5); }
  .sub-dot.running[data-color="amber"]  { background: var(--amber);  box-shadow: 0 0 10px rgba(251,191,36,0.5); }
  @keyframes subDotPulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.3); }
  }

  .sub-dot.pending {
    background: transparent;
    border: 1.5px solid var(--text-faint);
    opacity: 0.45;
  }

  .sub-label {
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
    letter-spacing: -0.1px;
  }
  .sub-row.active-sub .sub-label { color: var(--text); font-weight: 500; }
  .sub-row.done-sub   .sub-label { color: var(--text-dim); }

  .sub-time {
    margin-left: auto;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-faint);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ================================================================
     DASHBOARD DETAIL PANEL (below cards)
     ================================================================ */
  .dashboard {
    margin-top: 28px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .dash-card {
    background: var(--surface);
    border: 1px solid var(--border-dim);
    border-radius: var(--radius);
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .dash-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
  }
  .dash-card[data-color="green"]::before  { background: linear-gradient(90deg, var(--green), transparent 60%); opacity: 0.3; }
  .dash-card[data-color="purple"]::before { background: linear-gradient(90deg, var(--purple), transparent 60%); opacity: 0.3; }
  .dash-card[data-color="blue"]::before   { background: linear-gradient(90deg, var(--blue), transparent 60%); opacity: 0.3; }
  .dash-card[data-color="amber"]::before  { background: linear-gradient(90deg, var(--amber), transparent 60%); opacity: 0.3; }

  .dash-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }
  .dash-body {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .dash-body .val {
    font-weight: 600;
    color: var(--text);
  }

  .dash-mini-bar {
    margin-top: 12px;
    display: flex;
    gap: 3px;
    height: 20px;
    align-items: flex-end;
  }
  .dash-mini-bar .bar-seg {
    flex: 1;
    border-radius: 2px 2px 0 0;
    min-height: 3px;
    transition: height 0.6s ease;
  }

  /* ================================================================
     AMBIENT BACKGROUND (subtle gradient blobs)
     ================================================================ */
  .ambient-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }
  .ambient-blob.b1 {
    width: 600px; height: 600px;
    background: var(--green);
    top: -200px; left: -100px;
    animation: blobDrift1 20s ease-in-out infinite alternate;
  }
  .ambient-blob.b2 {
    width: 500px; height: 500px;
    background: var(--purple);
    bottom: -150px; right: -100px;
    animation: blobDrift2 18s ease-in-out infinite alternate;
  }
  .ambient-blob.b3 {
    width: 400px; height: 400px;
    background: var(--blue);
    top: 30%; left: 40%;
    animation: blobDrift3 22s ease-in-out infinite alternate;
  }
  @keyframes blobDrift1 { 0% { transform: translate(0,0); } 100% { transform: translate(80px,60px); } }
  @keyframes blobDrift2 { 0% { transform: translate(0,0); } 100% { transform: translate(-60px,-40px); } }
  @keyframes blobDrift3 { 0% { transform: translate(0,0); } 100% { transform: translate(-40px,50px); } }

  /* ================================================================
     SCROLLBAR
     ================================================================ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>

<!-- Ambient background blobs -->
<div class="ambient-blob b1"></div>
<div class="ambient-blob b2"></div>
<div class="ambient-blob b3"></div>

<!-- Particle canvas -->
<canvas id="particleCanvas"></canvas>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-brand">
    <div class="brand-dot"></div>
    AI Inventor
  </div>
  <div class="header-run">run_2026_03_26_thermoelec</div>

  <div class="header-ring-wrap">
    <div class="header-ring">
      <div class="ring-glow-orbit"></div>
      <svg viewBox="0 0 36 36">
        <circle class="ring-bg" cx="18" cy="18" r="16"/>
        <circle class="ring-fill" cx="18" cy="18" r="16"/>
        <text class="ring-text" x="18" y="19" transform="rotate(90 18 18)">65%</text>
      </svg>
    </div>
    <div class="header-stats">
      <span><span class="stat-pip" style="background:var(--green)"></span> 12 done</span>
      <span><span class="stat-pip" style="background:var(--blue)"></span> 3 active</span>
      <span><span class="stat-pip" style="background:var(--text-faint)"></span> 7 queued</span>
      <span style="color:var(--text-faint)">$4.28</span>
      <span style="color:var(--text-faint)">18m 42s</span>
    </div>
  </div>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="content" id="content">
  <!-- Module row (built by JS) -->
  <div class="modules-row" id="modulesRow"></div>

  <!-- Dashboard (built by JS) -->
  <div class="dashboard" id="dashboard"></div>
</div>

<script>
// ================================================================
//  MODULE DATA
// ================================================================
const MODULES = [
  {
    id: 'seed',
    name: 'Seed Hypotheses',
    icon: '\u{1F331}',
    color: 'green',
    status: 'done',
    progress: 100,
    metric: '24',
    metricUnit: 'hypotheses',
    desc: 'Knowledge-graph seeded candidates from literature survey',
    subs: [
      { label: 'Load Knowledge Graph',     status: 'done', time: '1m 12s' },

// ================================================================
//  DOM REFERENCES
// ================================================================
const modulesRow = document.getElementById('modulesRow');
const dashboardEl = document.getElementById('dashboard');
const cardEls = [];
const subRowEls = [];   // subRowEls[moduleIdx][subIdx]
const colEls = [];

// ================================================================
//  BUILD MODULE CARDS + TREES
// ================================================================
function buildModules() {
  MODULES.forEach((mod, mi) => {
    // Column wrapper
    const col = document.createElement('div');
    col.className = 'module-col';
    col.dataset.idx = mi;

    // ── Card ──
    const card = document.createElement('div');
    card.className = 'module-card' + (mod.status !== 'pending' ? ' active' : '');
    card.dataset.color = mod.color;

    card.innerHTML = `
      <div class="card-shimmer"></div>
      <div class="card-top">
        <div class="card-icon" data-color="${mod.color}">${mod.icon}</div>
        <div class="card-name">${mod.name}</div>
        <div class="card-badge ${mod.status}">${statusLabel(mod.status)}</div>
      </div>
      <div class="card-metric">
        <span class="metric-val" data-color="${mod.color}">${mod.metric}</span>
        <span class="metric-unit">${mod.metricUnit}</span>
      </div>
      <div class="card-desc">${mod.desc}</div>
      <div class="card-progress-track">
        <div class="card-progress-fill" data-color="${mod.color}" style="width:${mod.progress}%"></div>
      </div>
      <div class="card-progress-label">
        <span>${mod.subs.filter(s=>s.status==='done').length}/${mod.subs.length} steps</span>
        <span>${mod.progress}%</span>
      </div>
      <div class="card-collapse-toggle" title="Toggle sub-modules">\u25BC</div>
    `;

    card.querySelector('.card-collapse-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      col.classList.toggle('collapsed');
    });

    col.appendChild(card);
    cardEls.push(card);

    // ── Sub-module tree ──
    const wrap = document.createElement('div');
    wrap.className = 'submods-wrap';

    const submods = document.createElement('div');
    submods.className = 'submods';

    const tree = document.createElement('div');
    tree.className = 'tree-container';
    tree.dataset.color = mod.color;

    const rowEls = [];
    mod.subs.forEach((sub, si) => {
      const row = document.createElement('div');
      row.className = 'sub-row';
      if (sub.status === 'running') row.classList.add('active-sub');
      if (sub.status === 'done')    row.classList.add('done-sub');

      row.innerHTML = `
        <div class="sub-dot ${sub.status}" data-color="${mod.color}"></div>
        <span class="sub-label">${sub.label}</span>
        <span class="sub-time">${sub.time}</span>
      `;
      tree.appendChild(row);
      rowEls.push(row);
    });

    submods.appendChild(tree);
    wrap.appendChild(submods);
    col.appendChild(wrap);
    modulesRow.appendChild(col);

    subRowEls.push(rowEls);
    colEls.push(col);
  });

  // Stagger sub-row reveal
  requestAnimationFrame(() => {
    subRowEls.forEach((rows, mi) => {
      rows.forEach((row, si) => {
        setTimeout(() => row.classList.add('visible'), 120 + mi * 100 + si * 60);
      });
    });
  });

  // Compute tree line heights
  requestAnimationFrame(() => {
    document.querySelectorAll('.tree-container').forEach(tc => {
      const rows = tc.querySelectorAll('.sub-row');
      if (rows.length < 2) return;
      const lastRow = rows[rows.length - 1];
      const tcRect = tc.getBoundingClientRect();
      const lastRect = lastRow.getBoundingClientRect();
      const h = (lastRect.top + lastRect.height / 2) - tcRect.top;
      tc.style.setProperty('--tree-h', h + 'px');
    });
  });
}

function statusLabel(s) {
  if (s === 'done')    return 'Done';
  if (s === 'running') return 'Running';
  return 'Queued';
}

function buildDashboard() {
  MODULES.forEach((mod, mi) => {
    const dc = document.createElement('div');
    dc.className = 'dash-card';
    dc.dataset.color = mod.color;

    const linesHtml = mod.dashLines.map(l => `<div>${l}</div>`).join('');

    let barsHtml = '';
    if (mod.dashBars && mod.dashBars.length) {
      barsHtml = '<div class="dash-mini-bar">';
      const cMap = { green: 'var(--green)', purple: 'var(--purple)', blue: 'var(--blue)', amber: 'var(--amber)' };
      mod.dashBars.forEach(v => {
        const h = Math.max(3, v * 18);
        const o = Math.max(0.15, v);
        barsHtml += `<div class="bar-seg" style="height:${h}px;background:${cMap[mod.color]};opacity:${o}"></div>`;
      });
      barsHtml += '</div>';
    }

    dc.innerHTML = `
      <div class="dash-title">${mod.dashTitle}</div>
      <div class="dash-body">${linesHtml}</div>
      ${barsHtml}
    `;

    dashboardEl.appendChild(dc);
  });
}

// ================================================================
//  PARTICLE SYSTEM
// ================================================================
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let PW, PH;
const DPR = window.devicePixelRatio || 1;

function resizeCanvas() {
  PW = window.innerWidth;
  PH = window.innerHeight;
  pCanvas.width = PW * DPR;
  pCanvas.height = PH * DPR;
  pCanvas.style.width = PW + 'px';
  pCanvas.style.height = PH + 'px';
  pCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function elRect(el) {
  return el.getBoundingClientRect();
}

const COLOR_MAP = {
  green:  '#34d399',
  purple: '#a78bfa',
  blue:   '#60a5fa',
  amber:  '#fbbf24',
};

// ── Connector particles (horizontal between cards) ──
const connectorParticles = [];

function spawnConnectorParticle() {
  for (let i = 0; i < MODULES.length - 1; i++) {
    if (MODULES[i].status === 'pending') continue;
    if (MODULES[i + 1].status === 'pending') continue;

    const fromCard = cardEls[i];
    const toCard   = cardEls[i + 1];
    if (!fromCard || !toCard) continue;

    const fr = elRect(fromCard);
    const tr = elRect(toCard);
    const y = fr.top + fr.height / 2 + (Math.random() - 0.5) * 10;

    connectorParticles.push({
      x: fr.right + 2,
      y,
      targetX: tr.left - 2,
      speed: 60 + Math.random() * 40,
      color: COLOR_MAP[MODULES[i].color],
      size: 2 + Math.random(),
      alpha: 0.6 + Math.random() * 0.3,
      trail: [],
    });
  }
}

// ── Tree particles (along colored tree lines) ──
const treeParticles = [];

function findRunningSubIdx(mi) {
  for (let i = 0; i < MODULES[mi].subs.length; i++) {
    if (MODULES[mi].subs[i].status === 'running') return i;
  }
  // fallback: find last done
  for (let i = MODULES[mi].subs.length - 1; i >= 0; i--) {
    if (MODULES[mi].subs[i].status === 'done') return i;
  }
  return -1;
}

function spawnTreeParticle() {
  // spawn for each non-pending module
  MODULES.forEach((mod, mi) => {
    if (mod.status === 'pending') return;
    const si = findRunningSubIdx(mi);
    if (si < 0) return;

    const card = cardEls[mi];
    const subRow = subRowEls[mi][si];
    if (!card || !subRow) return;

    const subDot = subRow.querySelector('.sub-dot');
    if (!subDot) return;

    const treeContainer = subRow.closest('.tree-container');
    if (!treeContainer) return;

    // Check if collapsed
    if (colEls[mi].classList.contains('collapsed')) return;

    const cardRect = elRect(card);
    const dotRect  = elRect(subDot);
    const treeRect = elRect(treeContainer);

    // Start: bottom-center of card
    const startX = cardRect.left + cardRect.width * 0.3 + Math.random() * cardRect.width * 0.4;
    const startY = cardRect.bottom;

    // Vertical trunk X
    const vertX = treeRect.left + 9;

    // Target row center Y
    const branchY = dotRect.top + dotRect.height / 2;

    // End: center of dot
    const endX = dotRect.left + dotRect.width / 2;
    const endY = branchY;

    const waypoints = [
      { x: startX,  y: startY },
      { x: vertX,   y: startY + 8 },
      { x: vertX,   y: branchY },
      { x: endX,    y: endY },
    ];

    treeParticles.push({
      waypoints,
      wpIdx: 0,
      x: waypoints[0].x,
      y: waypoints[0].y,
      speed: 70 + Math.random() * 30,
      color: COLOR_MAP[mod.color],
      size: 2.5 + Math.random(),
      alpha: 0.7 + Math.random() * 0.2,
      trail: [],
    });
  });
}

// ── Burst (on particle arrival) ──
const burstParticles = [];

function spawnBurst(x, y, color) {
  const count = 5 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
    const speed = 25 + Math.random() * 35;
    burstParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 1.2 + Math.random() * 0.6,
      color,
      size: 1.5 + Math.random(),
    });
  }
}

// ── Ambient floating motes ──
const ambientMotes = [];
function initAmbientMotes() {
  const colors = ['#34d399', '#a78bfa', '#60a5fa', '#fbbf24'];
  for (let i = 0; i < 35; i++) {
    ambientMotes.push({
      x: Math.random() * PW,
      y: Math.random() * PH,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      size: 1 + Math.random() * 1.5,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 0.1 + Math.random() * 0.15,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initAmbientMotes();

// ================================================================
//  ANIMATION LOOP
// ================================================================
let lastTime = 0;
let connectorTimer = 0;
let treeTimer = 0;

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  pCtx.clearRect(0, 0, PW, PH);

  // ── Spawn timers ──
  connectorTimer += dt;
  if (connectorTimer > 0.9) {
    connectorTimer = 0;
    spawnConnectorParticle();
  }
  treeTimer += dt;
  if (treeTimer > 0.6) {
    treeTimer = 0;
    spawnTreeParticle();
  }

  // ── Draw static connector lines between cards ──
  for (let i = 0; i < MODULES.length - 1; i++) {
    const fromCard = cardEls[i];
    const toCard   = cardEls[i + 1];
    if (!fromCard || !toCard) continue;

    const fr = elRect(fromCard);
    const tr = elRect(toCard);
    const y = fr.top + fr.height / 2;

    const isPending = MODULES[i + 1].status === 'pending';
    pCtx.beginPath();
    pCtx.moveTo(fr.right + 3, y);
    pCtx.lineTo(tr.left - 3, y);
    pCtx.strokeStyle = isPending ? '#1e2236' : '#2a3048';
    pCtx.lineWidth = 1.5;
    pCtx.globalAlpha = isPending ? 0.35 : 0.6;
    pCtx.setLineDash(isPending ? [5, 5] : []);
    pCtx.stroke();
    pCtx.setLineDash([]);
    pCtx.globalAlpha = 1;

    // small arrow dot at midpoint if not pending
    if (!isPending) {
      const mx = (fr.right + tr.left) / 2;
      pCtx.globalAlpha = 0.35;
      pCtx.beginPath();
      pCtx.arc(mx, y, 2, 0, Math.PI * 2);
      pCtx.fillStyle = COLOR_MAP[MODULES[i].color];
      pCtx.fill();
      pCtx.globalAlpha = 1;
    }
  }

  // ── Draw connector particles ──
  for (let i = connectorParticles.length - 1; i >= 0; i--) {
    const p = connectorParticles[i];
    p.x += p.speed * dt;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 14) p.trail.shift();

    // Trail
    if (p.trail.length > 1) {
      pCtx.beginPath();
      pCtx.moveTo(p.trail[0].x, p.trail[0].y);
      for (let t = 1; t < p.trail.length; t++) {
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
      }
      pCtx.strokeStyle = p.color;
      pCtx.globalAlpha = p.alpha * 0.25;
      pCtx.lineWidth = p.size * 0.5;
      pCtx.stroke();
    }

    // Head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Head glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    pCtx.globalAlpha = 1;

    if (p.x >= p.targetX) {
      connectorParticles.splice(i, 1);
    }
  }

  // ── Draw tree particles ──
  for (let i = treeParticles.length - 1; i >= 0; i--) {
    const p = treeParticles[i];
    const wp = p.waypoints[p.wpIdx + 1];
    if (!wp) {
      spawnBurst(p.x, p.y, p.color);
      treeParticles.splice(i, 1);
      continue;
    }

    const dx = wp.x - p.x;
    const dy = wp.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 2) {
      p.x = wp.x;
      p.y = wp.y;
      p.wpIdx++;
    } else {
      const step = p.speed * dt;
      p.x += (dx / dist) * step;
      p.y += (dy / dist) * step;
    }

    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 18) p.trail.shift();

    // Trail segments
    if (p.trail.length > 1) {
      for (let t = 1; t < p.trail.length; t++) {
        const ratio = t / p.trail.length;
        pCtx.globalAlpha = ratio * p.alpha * 0.35;
        pCtx.beginPath();
        pCtx.moveTo(p.trail[t - 1].x, p.trail[t - 1].y);
        pCtx.lineTo(p.trail[t].x, p.trail[t].y);
        pCtx.strokeStyle = p.color;
        pCtx.lineWidth = p.size * 0.4 * ratio;
        pCtx.stroke();
      }
    }

    // Head glow
    pCtx.globalAlpha = p.alpha * 0.2;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Head
    pCtx.globalAlpha = p.alpha;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }

  // ── Draw burst particles ──
  for (let i = burstParticles.length - 1; i >= 0; i--) {
    const p = burstParticles[i];
    p.life -= p.decay * dt;
    if (p.life <= 0) {
      burstParticles.splice(i, 1);
      continue;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.94;
    p.vy *= 0.94;

    pCtx.globalAlpha = p.life * 0.7;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();

    // Glow
    pCtx.globalAlpha = p.life * 0.25;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.size * 3.5 * p.life, 0, Math.PI * 2);
    pCtx.fillStyle = p.color;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }

  // ── Ambient floating motes ──
  const time = now * 0.001;
  for (const m of ambientMotes) {
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    // Wrap around
    if (m.x < -20) m.x = PW + 20;
    if (m.x > PW + 20) m.x = -20;
    if (m.y < -20) m.y = PH + 20;
    if (m.y > PH + 20) m.y = -20;

    const flicker = 0.6 + 0.4 * Math.sin(time * 1.5 + m.phase);

    pCtx.globalAlpha = m.alpha * flicker;
    pCtx.beginPath();
    pCtx.arc(m.x, m.y, m.size, 0, Math.PI * 2);
    pCtx.fillStyle = m.color;
    pCtx.fill();

    pCtx.globalAlpha = m.alpha * flicker * 0.3;
    pCtx.beginPath();
    pCtx.arc(m.x, m.y, m.size * 4, 0, Math.PI * 2);
    pCtx.fillStyle = m.color;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }
}

// ================================================================
//  SIMULATED PROGRESS ANIMATION
// ================================================================
let simTime = 0;
const SIM_INTERVAL = 2500; // ms between simulation ticks

function simulateProgress() {
  simTime++;
  const mod = MODULES[2]; // Invention Loop is the running one

  // Slowly advance progress
  if (mod.progress < 95) {
    mod.progress = Math.min(95, mod.progress + 2);
    const fill = cardEls[2].querySelector('.card-progress-fill');
    if (fill) fill.style.width = mod.progress + '%';
    const labels = cardEls[2].querySelectorAll('.card-progress-label span');
    if (labels[1]) labels[1].textContent = mod.progress + '%';
  }

  // Advance metric display
  const metricEl = cardEls[2].querySelector('.metric-val');
  if (metricEl && simTime % 4 === 0 && mod.progress > 70) {
    const currentVal = metricEl.textContent;
    if (currentVal === '3/6') {
      metricEl.textContent = '4/6';
      mod.metric = '4/6';
    } else if (currentVal === '4/6' && mod.progress > 85) {
      metricEl.textContent = '5/6';
      mod.metric = '5/6';
    }
  }

  // Advance sub-steps
  const runIdx = mod.subs.findIndex(s => s.status === 'running');
  if (runIdx >= 0 && simTime % 5 === 0 && runIdx < mod.subs.length - 1) {
    // Complete current
    mod.subs[runIdx].status = 'done';
    mod.subs[runIdx].time = formatRandomTime();
    const row = subRowEls[2][runIdx];
    row.classList.remove('active-sub');
    row.classList.add('done-sub');
    const dot = row.querySelector('.sub-dot');
    dot.className = 'sub-dot done';
    dot.dataset.color = 'blue';
    row.querySelector('.sub-time').textContent = mod.subs[runIdx].time;

    // Start next
    const nextIdx = runIdx + 1;
    if (nextIdx < mod.subs.length) {
      mod.subs[nextIdx].status = 'running';
      const nextRow = subRowEls[2][nextIdx];
      nextRow.classList.add('active-sub');
      const nextDot = nextRow.querySelector('.sub-dot');
      nextDot.className = 'sub-dot running';
      nextDot.dataset.color = 'blue';
    }

    // Update step count
    const doneCount = mod.subs.filter(s => s.status === 'done').length;
    const labels = cardEls[2].querySelectorAll('.card-progress-label span');
    if (labels[0]) labels[0].textContent = doneCount + '/' + mod.subs.length + ' steps';
  }

  // Update header stats
  updateHeaderStats();
}

function formatRandomTime() {
  const m = Math.floor(Math.random() * 4) + 1;
  const s = Math.floor(Math.random() * 60).toString().padStart(2, '0');
  return m + 'm ' + s + 's';
}

function updateHeaderStats() {
  let done = 0, active = 0, queued = 0;
  MODULES.forEach(m => {
    m.subs.forEach(s => {
      if (s.status === 'done') done++;
      else if (s.status === 'running') active++;
      else queued++;
    });
  });
  const statSpans = document.querySelectorAll('.header-stats span');
  if (statSpans[0]) statSpans[0].innerHTML = `<span class="stat-pip" style="background:var(--green)"></span> ${done} done`;
  if (statSpans[1]) statSpans[1].innerHTML = `<span class="stat-pip" style="background:var(--blue)"></span> ${active} active`;
  if (statSpans[2]) statSpans[2].innerHTML = `<span class="stat-pip" style="background:var(--text-faint)"></span> ${queued} queued`;

  // Update ring
  const total = done + active + queued;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const ringFill = document.querySelector('.ring-fill');
  const ringText = document.querySelector('.ring-text');
  if (ringFill) {
    const circumference = 2 * Math.PI * 16; // r=16
    ringFill.style.strokeDashoffset = circumference * (1 - pct / 100);
  }
  if (ringText) ringText.textContent = pct + '%';
}

// ================================================================
//  ELAPSED TIME COUNTER
// ================================================================
let elapsedSeconds = 18 * 60 + 42;
function tickElapsed() {
  elapsedSeconds++;
  const m = Math.floor(elapsedSeconds / 60);
  const s = (elapsedSeconds % 60).toString().padStart(2, '0');
  const statSpans = document.querySelectorAll('.header-stats span');
  if (statSpans[4]) statSpans[4].textContent = m + 'm ' + s + 's';
}

// ================================================================
//  INIT
// ================================================================
function init() {
  buildModules();
  buildDashboard();

  // Start animations
  lastTime = performance.now();
  requestAnimationFrame(animate);

  // Simulation ticks
  setInterval(simulateProgress, SIM_INTERVAL);
  setInterval(tickElapsed, 1000);

  // Recompute tree heights on resize
  window.addEventListener('resize', () => {
    resizeCanvas();
    requestAnimationFrame(() => {
      document.querySelectorAll('.tree-container').forEach(tc => {
        const rows = tc.querySelectorAll('.sub-row');
        if (rows.length < 2) return;
        const lastRow = rows[rows.length - 1];
        const tcRect = tc.getBoundingClientRect();
        const lastRect = lastRow.getBoundingClientRect();
        const h = (lastRect.top + lastRect.height / 2) - tcRect.top;
        tc.style.setProperty('--tree-h', h + 'px');
      });
    });
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
