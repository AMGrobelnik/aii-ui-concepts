<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary Box v3 — Combined Best</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--blue-dim); color: var(--blue);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

/* ===== SHARED BASE ===== */

/* Progress bar — thick 4px, with shimmer */
.pbar {
  height: 4px; background: rgba(148,163,184,.06);
  border-radius: 3px; overflow: hidden; margin-bottom: 14px;
  position: relative;
}
.pfill {
  height: 100%; border-radius: 3px;
  position: relative; overflow: hidden;
  transition: width .6s;
}
/* Shimmer sweep */
.pfill::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), rgba(255,255,255,.4), rgba(255,255,255,.25), transparent);
  animation: sweep 2.5s ease-in-out infinite;
}
@keyframes sweep { 0%{left:-100%} 60%{left:180%} 100%{left:180%} }

/* Pulsing edge dot */
.pfill::before {
  content: ''; position: absolute; right: -2px; top: 50%; transform: translateY(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  animation: edgePulse 1.5s ease-in-out infinite;
}
@keyframes edgePulse { 0%,100%{opacity:.4;transform:translateY(-50%) scale(.8)} 50%{opacity:1;transform:translateY(-50%) scale(1.2)} }

/* Summary */
.stxt {
  font-size: 13px; color: var(--text-dim); line-height: 1.65;
  font-style: italic; margin-bottom: 14px;
}

/* Todos with dots */
.todos { display: flex; flex-direction: column; gap: 2px; }
.todo { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
.td { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.td.done { background: var(--green); opacity: .7; }
.td.run  { background: var(--blue); animation: dotPulse 2s ease-in-out infinite; }
.td.up   { background: transparent; border: 1.5px solid var(--text-faint); opacity: .4; }
@keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
.tt { flex: 1; }
.tt.done { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(148,163,184,.25); }
.tt.run  { color: var(--text); }
.tt.up   { color: var(--text-muted); }

/* Dot progress bottom */
.dots { display: flex; gap: 3px; margin-top: 12px; }
.dp { width: 10px; height: 10px; border-radius: 50%; transition: all .3s; }

/* ===== VARIANT TWEAKS ===== */

/* V1 — Base combo */

/* V2 — Wider shimmer, slower */
.v2 .pfill::after { width: 70%; animation: sweep2 3.5s ease-in-out infinite; }
@keyframes sweep2 { 0%{left:-100%} 50%{left:170%} 100%{left:170%} }

/* V3 — Double shimmer (two waves) */
.v3 .pfill::after { animation: sweep3a 2s ease-in-out infinite; }
.v3 .pfill { box-shadow: inset 0 0 8px rgba(255,255,255,.05); }
@keyframes sweep3a { 0%{left:-80%;opacity:1} 45%{left:160%;opacity:1} 46%{left:-80%;opacity:0} 55%{opacity:1} 100%{left:160%} }

/* V4 — Bar glow underneath */
.v4 .pbar { box-shadow: 0 2px 12px var(--bar-glow); }

/* V5 — Gradient fades, shimmer is brighter */
.v5 .pfill::after {
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), rgba(255,255,255,.6), rgba(255,255,255,.35), transparent);
  width: 40%;
}

/* V6 — Thicker bar (5px), rounder */
.v6 .pbar { height: 5px; border-radius: 4px; }
.v6 .pfill { border-radius: 4px; }

/* V7 — Edge dot bigger, bar has top highlight */
.v7 .pfill::before { width: 10px; height: 10px; }
.v7 .pfill { box-shadow: inset 0 1px 0 rgba(255,255,255,.15); }

/* V8 — Subtle shimmer (low opacity), edge dot softer */
.v8 .pfill::after {
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), rgba(255,255,255,.2), rgba(255,255,255,.12), transparent);
  animation: sweep 3s ease-in-out infinite;
}
.v8 .pfill::before { opacity: .5; }

/* V9 — Rainbow shimmer (picks up bar color) */
.v9 .pfill::after {
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.15), rgba(255,255,255,.3), var(--bar-shimmer), rgba(255,255,255,.15), transparent);
  width: 60%;
  animation: sweep 2s ease-in-out infinite;
}

/* V10 — No edge dot, bar pulses opacity instead */
.v10 .pfill::before { display: none; }
.v10 .pfill { animation: barPulse 2.5s ease-in-out infinite; }
@keyframes barPulse { 0%,100%{opacity:.75} 50%{opacity:1} }
.v10 .pfill::after { width: 45%; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Summary Box v3 — Combined Best</div>
  <div class="page-sub">Agent 3 — Thick bar + shimmer + edge pulse + gradient fade + big dots. 10 shimmer/glow tweaks.</div>
</div>

<div class="grid" id="grid"></div>

<script>
const SUMMARY = "I'm running ablation studies on hypotheses 4-6 while main experiments continue for hypothesis 7's nano-scale thermal transport model with gradient checkpointing.";

const TODOS = [
  { s: 'done', t: 'Build knowledge graph (14.3k triples)' },
  { s: 'done', t: 'Identify research gaps (23 found)' },
  { s: 'done', t: 'Generate and rank seed hypotheses' },
  { s: 'run',  t: 'Run simulations for hypotheses 4-7' },
  { s: 'run',  t: 'Ablation studies on completed sims' },
  { s: 'up',   t: 'Analyze results and effect sizes' },
  { s: 'up',   t: 'Draft paper text with citations' },
];

const DONE = TODOS.filter(t => t.s === 'done').length;
const RUN = TODOS.filter(t => t.s === 'run').length;
const PCT = Math.round((DONE + RUN * 0.5) / TODOS.length * 100);
const BAR_COLOR = '#60a5fa';
const BAR_FADE = 'rgba(96,165,250,.4)';
const BAR_GLOW = 'rgba(96,165,250,.15)';
const BAR_SHIMMER = 'rgba(96,165,250,.25)';

function todosHTML() {
  return TODOS.map(t =>
    `<div class="todo"><div class="td ${t.s}"></div><span class="tt ${t.s}">${t.t}</span></div>`
  ).join('');
}

function dotsHTML() {
  return `<div class="dots">${TODOS.map(t => {
    const c = t.s === 'done' ? 'var(--green)' : t.s === 'run' ? 'var(--blue)' : 'rgba(148,163,184,.1)';
    return `<span class="dp" style="background:${c}"></span>`;
  }).join('')}</div>`;
}

function render(cls) {
  return `<div class="pbar"><div class="pfill" style="width:${PCT}%;background:linear-gradient(90deg,${BAR_COLOR},${BAR_FADE})"></div></div>` +
    `<div class="stxt">${SUMMARY}</div>` +
    `<div class="todos">${todosHTML()}</div>` +
    dotsHTML();
}

const V = [
  { n:1,  name:'Base — shimmer + edge pulse + gradient fade' },
  { n:2,  name:'Wider shimmer, slower sweep (3.5s)' },
  { n:3,  name:'Double-wave shimmer, inner glow' },
  { n:4,  name:'Bar casts glow shadow below' },
  { n:5,  name:'Brighter shimmer highlight (60% opacity)' },
  { n:6,  name:'Thicker bar (5px), rounder corners' },
  { n:7,  name:'Bigger edge dot (10px), top highlight' },
  { n:8,  name:'Subtle shimmer, softer edge pulse' },
  { n:9,  name:'Colored shimmer (picks up bar color)' },
  { n:10, name:'No edge dot, whole bar pulses opacity' },
];

const g = document.getElementById('grid');
V.forEach((v, i) => {
  const cls = 'v' + (i + 1);
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div>` +
    `<div class="vbody ${cls}" style="--bar-glow:${BAR_GLOW};--bar-shimmer:${BAR_SHIMMER}">${render(cls)}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
