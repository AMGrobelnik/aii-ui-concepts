<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1219;
    --bg-deep: #0a0d13;
    --surface: #151a24;
    --surface-2: #1b2030;
    --surface-3: #212737;
    --border: #1e2536;
    --border-light: #2a3248;
    --text: #b8bfcd;
    --text-dim: #5f6b7a;
    --text-bright: #e8ecf2;
    --text-muted: #3d4555;
    --green: #34d399;
    --green-dim: rgba(52,211,153,.10);
    --green-glow: rgba(52,211,153,.30);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,.10);
    --purple-glow: rgba(167,139,250,.30);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,.10);
    --blue-glow: rgba(96,165,250,.35);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.10);
    --amber-glow: rgba(251,191,36,.30);
    --gray: #6b7280;
    --gray-dim: rgba(107,114,128,.10);
    --sidebar-w: 260px;
    --ring-color: var(--blue);
    --ring-glow-color: var(--blue-glow);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; }

  /* ================================================================
     SIDEBAR
     ================================================================ */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    height: 100vh;
    background: var(--bg-deep);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 16px;
    gap: 14px;
    position: relative;
    z-index: 10;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-bottom: 2px;
  }

  /* ================================================================
     MAIN RING — reactive to module selection
     ================================================================ */
  .ring-wrapper {
    position: relative;
    width: 160px;
    height: 160px;
    flex-shrink: 0;
    margin: 4px 0;
  }

  .ring-glow {
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    filter: blur(20px);
    transition: opacity .6s ease, background .6s ease;
  }

  .ring-glow.visible { opacity: .22; }

  .ring-svg {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
  }

  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 5;
  }

  .ring-fill-arc {
    fill: none;
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset .6s cubic-bezier(.33,1,.68,1),
                stroke .6s ease,
                filter .6s ease;
  }

  /* Rotating dashed outline ring */
  .ring-dashed-outline {
    fill: none;
    stroke-width: 1.5;
    stroke-dasharray: 6 4;
    opacity: .35;
    transition: stroke .6s ease;
    animation: dashRotate 20s linear infinite;
  }

  @keyframes dashRotate {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -340; }
  }

  /* Inner decorative ring */
  .ring-inner-deco {
    fill: none;
    stroke-width: 1;
    stroke-dasharray: 2 8;
    opacity: .15;
    transition: stroke .6s ease;
    animation: dashRotateSlow 35s linear infinite reverse;
  }

  @keyframes dashRotateSlow {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: -250; }
  }

  .ring-center-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: none;
  }

  .ring-pct {
    font-size: 30px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1.5px;
    transition: color .6s ease;
  }

  .ring-pct-unit {
    font-size: 15px;
    font-weight: 600;
    opacity: .5;
    transition: color .6s ease;
  }

  .ring-label {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: .9px;
    margin-top: 3px;
    transition: color .6s ease;
    color: var(--text-dim);
  }

  .ring-module-name {
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 6px;
    padding: 2px 8px;
    border-radius: 3px;
    transition: background .6s ease, color .6s ease;
  }

  /* ================================================================
     COLORED CONNECTOR LINES between ring and module list
     ================================================================ */
  .connector-lines {
    width: 100%;
    height: 16px;
    position: relative;
    overflow: visible;
  }

  .connector-lines svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .connector-line {
    fill: none;
    stroke-width: 1.2;
    opacity: .3;
    transition: opacity .4s ease, stroke .4s ease;
  }

  .connector-line.active {
    opacity: .7;
    stroke-width: 1.8;
  }

  /* ================================================================
     MODULE CARDS
     ================================================================ */
  .module-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .mod-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all .25s ease;
    position: relative;
    overflow: hidden;
  }

  .mod-card:hover { background: var(--surface-2); border-color: var(--border-light); }

  .mod-card.selected {
    border-color: var(--border-light);
    background: var(--surface-2);
  }

  .mod-card .mc-row {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .mod-card .mc-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow .4s ease;
  }

  .mod-card.selected .mc-dot { box-shadow: 0 0 8px 2px currentColor; }

  .mod-card .mc-name {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-dim);
    flex: 1;
    transition: color .25s;
  }

  .mod-card.selected .mc-name,
  .mod-card:hover .mc-name { color: var(--text-bright); }

  .mod-card .mc-pct {
    font-size: 10px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    transition: color .25s;
  }

  .mod-card .mc-status {
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 4px;
  }

  .mod-card .mc-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    border-radius: 0 0 0 9px;
    transition: width .6s ease;
  }

  .mod-card .mc-glow {
    position: absolute;
    inset: -1px;
    border-radius: 9px;
    opacity: 0;
    transition: opacity .35s;
    pointer-events: none;
  }

  .mod-card.selected .mc-glow { opacity: 1; }

  .mod-card.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -80%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.025), transparent);
    animation: cardShimmer 3.5s ease-in-out infinite;
  }

  @keyframes cardShimmer {
    0% { left: -80%; }
    100% { left: 150%; }
  }

  /* ================================================================
     COLLAPSIBLE SUB-MODULES
     ================================================================ */
  .sub-modules-wrapper {
    width: 100%;
    overflow: hidden;
    transition: max-height .5s cubic-bezier(.33,1,.68,1), opacity .4s ease;
    max-height: 0;
    opacity: 0;
  }

  .sub-modules-wrapper.expanded {
    max-height: 400px;
    opacity: 1;
  }

  .sub-modules {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 6px 0 2px;
  }

  .collapse-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: .6px;
    text-transform: uppercase;
    transition: color .25s;
    user-select: none;
  }

  .collapse-toggle:hover { color: var(--text-dim); }

  .collapse-toggle .chevron {
    display: inline-block;
    transition: transform .35s ease;
    font-size: 8px;
  }

  .collapse-toggle.open .chevron { transform: rotate(180deg); }

  .sub-module {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: all .2s;
    font-size: 10.5px;
    color: var(--text-dim);
  }

  .sub-module:hover { background: var(--surface); color: var(--text); }
  .sub-module.selected { background: var(--surface-2); color: var(--text-bright); font-weight: 600; }

  .sub-module .sm-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all .25s;
  }

  .sub-module.selected .sm-dot {
    box-shadow: 0 0 6px 1px currentColor;
    width: 7px;
    height: 7px;
  }

  .sub-module.active .sm-dot { animation: subPulse 2s ease-in-out infinite; }

  @keyframes subPulse {
    0%, 100% { box-shadow: 0 0 4px 1px currentColor; }
    50% { box-shadow: 0 0 10px 3px currentColor; }
  }

  .sub-module .sm-label { flex: 1; }

  .sub-module .sm-status {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: .4px;
    text-transform: uppercase;
    opacity: .7;
  }

  /* Particle canvas */
  #sidebarParticles {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--sidebar-w);
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ================================================================
     MAIN CONTENT
     ================================================================ */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .topbar {
    display: flex;
    align-items: center;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 14px;
  }

  .topbar-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-bright);
    flex: 1;
  }

  .topbar-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    transition: all .4s ease;
  }

  .topbar-time {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--surface);
    font-family: 'Inter', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  /* Two-column layout */
  .two-col {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .col-left {
    width: 58%;
    overflow-y: auto;
    padding: 22px 24px 32px 28px;
    border-right: 1px solid var(--border);
  }

  .col-right {
    width: 42%;
    overflow-y: auto;
    padding: 22px 24px 32px 20px;
  }

  .col-left::-webkit-scrollbar,
  .col-right::-webkit-scrollbar { width: 4px; }
  .col-left::-webkit-scrollbar-track,
  .col-right::-webkit-scrollbar-track { background: transparent; }
  .col-left::-webkit-scrollbar-thumb,
  .col-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .panel {
    display: none;
    animation: panelIn .35s ease;
  }

  .panel.visible { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- Summary block ---- */
  .summary-block { margin-bottom: 22px; }

  .summary-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .summary-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    transition: background .4s, color .4s;
  }

  .summary-heading h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .summary-text {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    position: relative;
  }

  .summary-text .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    border-radius: 10px 0 0 10px;
    transition: background .4s ease;
  }

  .summary-text p { margin-bottom: 8px; }
  .summary-text p:last-child { margin-bottom: 0; }

  /* ---- Item list ---- */
  .item-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-list-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 6px;
  }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: all .2s;
    cursor: default;
  }

  .item-card:hover { border-color: var(--border-light); background: var(--surface-2); }

  .item-card.active-item {
    border-left: 3px solid var(--blue);
    box-shadow: -2px 0 12px -4px var(--blue-glow);
  }

  .item-card h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 4px;
  }

  .item-card p {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.55;
  }

  .item-card .item-tags {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .item-card .item-tag {
    font-size: 9.5px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-dim);
    letter-spacing: .3px;
  }

  .item-card .item-progress {
    margin-top: 8px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .item-card .item-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }

  /* ---- Right column: stats + activity ---- */
  .stat-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all .2s;
  }

  .stat-card:hover { border-color: var(--border-light); }

  .stat-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .stat-info { flex: 1; }

  .stat-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-top: 1px;
  }

  /* ---- Activity table ---- */
  .activity-section { margin-top: 0; }

  .activity-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 10px;
  }

  .activity-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .activity-table th {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 9px 12px;
    text-align: left;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .activity-table th:last-child,
  .activity-table td:last-child { text-align: right; }

  .activity-table td {
    font-size: 12px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .activity-table tr:last-child td { border-bottom: none; }
  .activity-table tr:hover td { background: rgba(255,255,255,.012); }

  .activity-table .at-step {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
  }

  .activity-table .at-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .activity-table .at-dim { color: var(--text-dim); font-size: 11px; }

  /* Running pulse */
  @keyframes runPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }

  .pulse-live { animation: runPulse 1.8s ease-in-out infinite; }

  /* Empty state */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 10px;
    margin-top: 12px;
  }

  .empty-state .es-icon {
    font-size: 28px;
    opacity: .25;
    margin-bottom: 10px;
  }

  .empty-state p {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* ---- Mini sparkline in stat card ---- */
  .mini-spark {
    width: 60px;
    height: 28px;
    flex-shrink: 0;
  }

  .mini-spark polyline {
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ---- Divider ---- */
  .sidebar-divider {
    width: 80%;
    height: 1px;
    background: var(--border);
    margin: 2px 0;
    flex-shrink: 0;
  }

  /* ---- Pipeline mini-step bar under topbar ---- */
  .pipeline-steps-bar {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 28px;
    height: 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-deep);
    flex-shrink: 0;
  }

  .ps-step {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: .4px;
    color: var(--text-muted);
    height: 100%;
    position: relative;
    transition: color .3s;
  }

  .ps-step.done { color: var(--text-dim); }
  .ps-step.active { color: var(--text-bright); }

  .ps-step .ps-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ps-step.active .ps-dot { animation: subPulse 2s ease-in-out infinite; }

  .ps-step::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    width: 80%;
    height: 2px;
    border-radius: 2px 2px 0 0;
    transition: background .3s;
  }

  .ps-step.active::after { background: var(--blue); }
  .ps-step.done::after { background: var(--green); opacity: .3; }
</style>
</head>
<body>

<!-- ================================================================
     SIDEBAR
     ================================================================ -->
<aside class="sidebar" id="sidebar">
  <canvas id="sidebarParticles"></canvas>

  <div class="sidebar-title">AI Inventor</div>

  <!-- Big Reactive Ring -->
  <div class="ring-wrapper" id="ringWrapper">
    <div class="ring-glow visible" id="ringGlow"
      style="background:radial-gradient(circle,var(--blue) 0%,transparent 70%)"></div>
    <svg class="ring-svg" viewBox="0 0 160 160">
      <!-- Outer dashed outline (rotates) -->
      <circle class="ring-dashed-outline" id="ringDashed"
        cx="80" cy="80" r="74"
        stroke="var(--blue)"/>
      <!-- Track -->
      <circle class="ring-track" cx="80" cy="80" r="62"/>
      <!-- Fill arc — dynamic -->
      <circle class="ring-fill-arc" id="ringFillArc"
        cx="80" cy="80" r="62"
        stroke="var(--blue)"
        stroke-dasharray="389.56"
        stroke-dashoffset="226"
        transform="rotate(-90 80 80)"
        style="filter:drop-shadow(0 0 4px var(--blue-glow))"/>
      <!-- Inner decorative ring -->
      <circle class="ring-inner-deco" id="ringInnerDeco"
        cx="80" cy="80" r="50"
        stroke="var(--blue)"/>
    </svg>
    <div class="ring-center-text">
      <div class="ring-pct" id="ringPct" style="color:var(--blue)">
        42<span class="ring-pct-unit" style="color:var(--blue)">%</span>
      </div>
      <div class="ring-label" id="ringLabel">Progress</div>
      <div class="ring-module-name" id="ringModuleName"

  /* ============================

     ============================ */
  function updateRing(modIdx) {
    const mod = MODULES[modIdx];
    const pct = mod.progress;
    const filledLen = (pct / 100) * CIRC;
    const offset = CIRC - filledLen;

    // Arc fill
    ringFillArc.style.strokeDashoffset = offset;
    ringFillArc.setAttribute('stroke', mod.color.main);
    ringFillArc.style.filter = `drop-shadow(0 0 4px ${mod.color.glow})`;

    // Dashed outline
    ringDashed.setAttribute('stroke', mod.color.main);

    // Inner deco ring
    ringInnerDeco.setAttribute('stroke', mod.color.main);

    // Glow
    ringGlow.style.background = `radial-gradient(circle, ${mod.color.main} 0%, transparent 70%)`;

    // Center text
    ringPct.innerHTML = `${pct}<span class="ring-pct-unit" style="color:${mod.color.main}">%</span>`;
    ringPct.style.color = mod.color.main;

    ringLabel.textContent = pct === 100 ? 'Complete' : pct === 0 ? 'Waiting' : 'Progress';

    ringModuleName.textContent = mod.label.split(' ')[0];
    ringModuleName.style.background = mod.color.dim;
    ringModuleName.style.color = mod.color.main;

    // Connector lines
    connectors.forEach((c, i) => {
      c.classList.toggle('active', i === modIdx);

    pipelineBar.innerHTML = html;

        ${generateSparkSVG(si.fg, mod.id)}
      </div>`;
    });
    html += `</div>`;

    html += `<div class="activity-section">
      <div class="activity-title">Activity Breakdown</div>
      <table class="activity-table">
        <thead><tr>
          <th>Step</th><th>Time</th><th>Cost</th><th>Msgs</th><th>Tokens</th>
        </tr></thead><tbody>`;
    mod.activity.forEach(a => {
      const dimClass = a.pending ? ' at-dim' : '';
      const rowStyle = a.active ? `background:rgba(96,165,250,.04)` : '';
      html += `<tr style="${rowStyle}">
        <td><div class="at-step${dimClass}">
          <span class="at-dot" style="background:${a.color}${a.active ? ';box-shadow:0 0 6px ' + a.color : ''}"></span>
          ${a.step}${a.active ? ' <span class="pulse-live" style="color:var(--blue);font-size:9px;font-weight:600">LIVE</span>' : ''}
        </div></td>
        <td class="${dimClass}">${a.time}</td>
        <td class="${dimClass}">${a.cost}</td>
        <td class="${dimClass}">${a.msgs}</td>
        <td class="${dimClass}">${a.tokens}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;

    colRight.innerHTML = html;
  }

  /* Mini sparkline generator */
  function generateSparkSVG(color, modId) {
    const seeds = {
      seed:       [[0,18],[10,14],[20,16],[30,8],[40,10],[50,4],[60,2]],
      hypothesis: [[0,20],[10,16],[20,18],[30,12],[40,8],[50,6],[60,3]],
      invention:  [[0,22],[10,20],[20,16],[30,18],[40,12],[50,8],[60,10]],
      paper:      [[0,14],[10,14],[20,14],[30,14],[40,14],[50,14],[60,14]]
    };
    const pts = (seeds[modId] || seeds.seed).map(p => p.join(',')).join(' ');
    return `<svg class="mini-spark" viewBox="0 0 60 28">
      <polyline points="${pts}" stroke="${color}" opacity=".5"/>
    </svg>`;
  }

  /* ============================
     RENDER: Topbar
     ============================ */
  function renderTopbar() {
    const mod = MODULES[selMod];
    topbarTitle.textContent = mod.label;
    const colorMap = {
      green:  { bg: 'var(--green-dim)',  fg: 'var(--green)' },
      purple: { bg: 'var(--purple-dim)', fg: 'var(--purple)' },
      blue:   { bg: 'var(--blue-dim)',   fg: 'var(--blue)' },
      gray:   { bg: 'var(--gray-dim)',   fg: 'var(--gray)' }
    };
    const c = colorMap[mod.statusColor];
    topbarBadge.style.background = c.bg;
    topbarBadge.style.color = c.fg;
    topbarBadge.textContent = mod.status;
    if (mod.status === 'Running') {
      topbarBadge.classList.add('pulse-live');
    } else {
      topbarBadge.classList.remove('pulse-live');
    }
  }

  /* ============================
     MODULE SELECTION
     ============================ */
  window.selectModule = function(idx) {
    if (idx < 0 || idx >= MODULES.length) return;
    selMod = idx;
    selStep = -1;
    moduleCards.forEach((c, i) => c.classList.toggle('selected', i === idx));

    // Animate the ring to new module
    updateRing(idx);

    renderAll();
    colLeft.scrollTop = 0;
    colRight.scrollTop = 0;
  };

  window.selectStep = function(idx) {
    selStep = (selStep === idx) ? -1 : idx;
    renderSubModules();
  };

  window.toggleSubModules = function() {
    subExpanded = !subExpanded;
    subWrapper.classList.toggle('expanded', subExpanded);
    collapseToggle.classList.toggle('open', subExpanded);
    collapseLabel.textContent = subExpanded ? 'Hide Steps' : 'Show Steps';
  };

  function renderAll() {
    renderTopbar();
    renderPipelineBar();
    renderSubModules();
    renderLeft();
    renderRight();
  }

  /* ============================
     KEYBOARD NAVIGATION
     ============================ */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      e.preventDefault();
      selectModule(Math.min(selMod + 1, MODULES.length - 1));
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      e.preventDefault();
      selectModule(Math.max(selMod - 1, 0));
    } else if (e.key === 'Tab') {
      e.preventDefault();
      toggleSubModules();
    }
  });

  /* ============================
     PARTICLE SYSTEM
     ============================ */
  const pCanvas = document.getElementById('sidebarParticles');
  const pCtx = pCanvas.getContext('2d');
  let particles = [];

  function resizeParticleCanvas() {
    const sb = document.getElementById('sidebar');
    pCanvas.width = sb.offsetWidth;
    pCanvas.height = sb.offsetHeight;
  }

  function spawnParticle() {
    const mod = MODULES[selMod];
    const palette = [mod.color.main, mod.color.glow, '#ffffff'];
    const color = palette[Math.floor(Math.random() * palette.length)];
    const side = Math.random();
    let x, y, vx, vy;
    if (side < 0.5) {
      // Spawn from ring area
      x = pCanvas.width * 0.5 + (Math.random() - 0.5) * 80;
      y = 60 + Math.random() * 100;
      vx = (Math.random() - 0.5) * 0.4;
      vy = -(0.2 + Math.random() * 0.5);
    } else {
      // Spawn from bottom
      x = 10 + Math.random() * (pCanvas.width - 20);
      y = pCanvas.height - 10;
      vx = (Math.random() - 0.5) * 0.3;
      vy = -(0.4 + Math.random() * 0.6);
    }
    particles.push({
      x: x, y: y,
      vx: vx, vy: vy,
      r: 0.8 + Math.random() * 1.5,
      life: 1,
      decay: 0.004 + Math.random() * 0.008,
      color: color
    });
  }

  function animateParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.998;
      p.life -= p.decay;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      pCtx.fillStyle = p.color;
      pCtx.globalAlpha = p.life * 0.45;
      pCtx.fill();
      pCtx.globalAlpha = 1;
    });
    requestAnimationFrame(animateParticles);
  }

  resizeParticleCanvas();
  window.addEventListener('resize', resizeParticleCanvas);
  setInterval(spawnParticle, 200);
  animateParticles();

  /* ============================
     RING ENTRANCE ANIMATION
     ============================ */
  function animateRingEntrance() {
    const target = ringFillArc.style.strokeDashoffset;
    ringFillArc.style.transition = 'none';
    ringFillArc.style.strokeDashoffset = CIRC;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        ringFillArc.style.transition = 'stroke-dashoffset 1.2s cubic-bezier(.33,1,.68,1), stroke .6s ease, filter .6s ease';
        ringFillArc.style.strokeDashoffset = target;
      });
    });
  }

  /* ============================
     ELAPSED TIME TICKER
     ============================ */
  let elapsed = 56 * 60 + 50;
  function tickClock() {
    elapsed++;
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    const str = `${m}m ${s < 10 ? '0' : ''}${s}s`;
    document.getElementById('topbarClock').textContent = str + ' elapsed';
    document.getElementById('footerClock').textContent = str;
  }
  setInterval(tickClock, 1000);

  /* ============================
     INIT
     ============================ */
  updateRing(selMod);
  renderAll();

  // Delay entrance animation slightly for visual effect
  setTimeout(animateRingEntrance, 100);

})();
</script>
</body>
</html>
