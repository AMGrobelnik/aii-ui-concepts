<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor Pipeline</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #14161b;
    --surface: #1c1f26;
    --surface-h: #232730;
    --border: #272b34;
    --text: #e2e4e9;
    --muted: #7a8090;
    --green: #22c55e;
    --purple: #a78bfa;
    --blue: #3b82f6;
    --orange: #f59e0b;
    --sidebar: #181b21;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
      'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 160px;
    min-width: 160px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px;
    gap: 24px;
    z-index: 10;
  }

  .ring-wrap {
    position: relative;
    width: 110px;
    height: 110px;
  }

  .ring-wrap canvas {
    width: 110px;
    height: 110px;
  }

  .ring-pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    pointer-events: none;
  }

  .ring-sub {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: -4px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 11.5px;
    color: var(--muted);
    user-select: none;
  }

  .legend-item:hover {
    background: var(--surface-h);
    color: var(--text);
  }

  .legend-item.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 600;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow 0.2s ease;
  }

  .legend-item.active .legend-dot {
    box-shadow: 0 0 6px 1px currentColor;
  }

  .legend-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .legend-pct {
    font-size: 10px;
    opacity: 0.6;
    font-weight: 400;
  }

  .sidebar-stats {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .sidebar-stat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10.5px;
  }

  .sidebar-stat-label {
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .sidebar-stat-val {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* ── Main Area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Row 1: module cards + particle canvas */
  .row1-wrap {
    position: relative;
    padding: 20px 28px 8px;
  }

  .row1 {
    display: flex;
    gap: 16px;
    position: relative;
    z-index: 2;
  }

  #particleCanvas {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .mod-card {
    width: 130px;
    height: 55px;
    background: rgba(28, 31, 38, 0.82);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    cursor: pointer;
    position: relative;
    transition: all 0.25s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-shrink: 0;
    overflow: hidden;
  }

  .mod-card:hover {
    background: var(--surface-h);
    transform: scale(1.02);
  }

  .mod-card.selected {
    transform: scale(1.02);
  }

  .mod-card .mc-name {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .mod-card .mc-metric {
    font-size: 17px;
    font-weight: 700;
    margin-top: 1px;
  }

  .mod-card .mc-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    border-radius: 0 0 0 8px;
    transition: width 0.4s ease;
  }

  .mod-card .mc-glow {
    position: absolute;
    inset: -1px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  .mod-card.active .mc-glow,
  .mod-card.selected .mc-glow {
    opacity: 1;
  }

  /* Shimmer animation on active cards */
  .mod-card.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -60%;
    width: 40%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.04),
      transparent
    );
    animation: shimmer 2.8s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { left: -60%; }
    100% { left: 120%; }
  }

  /* Beam connector canvas */
  #beamCanvas {
    height: 28px;
    position: relative;
    z-index: 2;
    margin: 0 28px;
    flex-shrink: 0;
  }

  /* Row 2: sub-module dots */
  .row2-wrap {
    padding: 0 28px 14px;
    overflow: hidden;
  }

  .row2 {
    display: flex;
    gap: 22px;
    transition: transform 0.3s ease;
    padding: 4px 0;
  }

  .sub-dot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 42px;
  }

  .sub-dot-wrap:hover {
    transform: translateY(-1px);
  }

  .sub-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transition: all 0.25s ease;
    position: relative;
  }

  .sub-dot.glow {
    animation: dotPulse 2s ease-in-out infinite;
  }

  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px 1px currentColor; }
    50% { box-shadow: 0 0 12px 3px currentColor; }
  }

  .sub-dot.sel {
    box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px #fff;
  }

  .sub-dot.sel.glow {
    animation: dotPulseSel 2s ease-in-out infinite;
  }

  @keyframes dotPulseSel {
    0%, 100% { box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px #fff, 0 0 8px 2px currentColor; }
    50% { box-shadow: 0 0 0 2.5px var(--bg), 0 0 0 4.5px #fff, 0 0 14px 4px currentColor; }
  }

  .sub-dot-label {
    font-size: 9.5px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    transition: color 0.2s ease;
  }

  .sub-dot-wrap:hover .sub-dot-label {
    color: var(--text);
  }

  /* ── Content area ── */
  .content-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 28px 28px;
  }

  .content-scroll::-webkit-scrollbar {
    width: 5px;
  }

  .content-scroll::-webkit-scrollbar-track {
    background: transparent;
  }

  .content-scroll::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .content {
    max-width: 700px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tag-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .content h2 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .step-status-line {
    font-size: 11px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step-status-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 1px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .content .summary {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 18px;
  }

  /* Metric highlight row */
  .metric-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .metric-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 80px;
  }

  .metric-pill-label {
    font-size: 9.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .metric-pill-val {
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* Detail cards */
  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: all 0.25s ease;
  }

  .detail-card:hover {
    border-color: #313640;
  }

  .detail-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    cursor: pointer;
    gap: 10px;
    user-select: none;
  }

  .detail-status {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }

  .detail-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
  }

  .detail-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 14px;
    font-variant-numeric: tabular-nums;
  }

  .detail-meta-tag {
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 9.5px;
    font-weight: 600;
  }

  .detail-chevron {
    color: var(--muted);
    font-size: 13px;
    transition: transform 0.2s ease;
    width: 16px;
    text-align: center;
  }

  .detail-chevron.open {
    transform: rotate(90deg);
  }

  .detail-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }

  .detail-body-inner {
    padding: 0 14px 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.65;
    border-top: 1px solid var(--border);
    margin: 0 14px;
    padding: 10px 0 12px;
  }

  .detail-card.active-item {
    border-left: 2px solid var(--blue);
    box-shadow: -2px 0 12px -4px rgba(59, 130, 246, 0.25);
  }

  .detail-card.active-item .detail-name {
    color: var(--blue);
  }

  /* Mini progress bar inside active detail */
  .detail-mini-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 6px;
    overflow: hidden;
  }

  .detail-mini-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.4s ease;
    position: relative;
  }

  .detail-mini-bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -1px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: inherit;
    box-shadow: 0 0 6px 1px currentColor;
  }

  /* Content footer */
  .content-footer {
    display: flex;
    gap: 20px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--muted);
  }

  .content-footer span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .content-footer .ft-val {
    color: var(--text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* Keyboard hints */
  .kbd-hint {
    position: fixed;
    bottom: 12px;
    right: 18px;
    font-size: 10px;
    color: #4a4f5a;
    display: flex;
    gap: 10px;
    z-index: 100;
  }

  .kbd {
    padding: 1px 6px;
    border: 1px solid #313640;
    border-radius: 3px;
    background: var(--surface);
    font-family: monospace;
    font-size: 10px;
  }

  /* Running timer flash */
  @keyframes timerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .timer-live {
    animation: timerPulse 1.5s ease-in-out infinite;
    color: var(--blue);
  }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<div class="sidebar">
  <div class="ring-wrap">
    <canvas id="ringCanvas" width="220" height="220"></canvas>
    <div class="ring-pct" id="ringPct">65%</div>
  </div>
  <div class="ring-sub">pipeline progress</div>
  <div class="legend" id="legend"></div>
  <div class="sidebar-stats" id="sidebarStats"></div>
</div>

<!-- ── Main ── -->
<div class="main">
  <div class="row1-wrap">
    <canvas id="particleCanvas"></canvas>
    <div class="row1" id="row1"></div>
  </div>
  <canvas id="beamCanvas"></canvas>
  <div class="row2-wrap">
    <div class="row2" id="row2"></div>
  </div>
  <div class="content-scroll">
    <div class="content" id="content"></div>
  </div>
</div>

<div class="kbd-hint">
  <span><span class="kbd">&uarr;&darr;</span> modules</span>
  <span><span class="kbd">&larr;&rarr;</span> steps</span>
</div>

<script>
// ─────────────────────────────────────
// Data Model
// ─────────────────────────────────────
const COLORS = {
  seed: '#22c55e',
  hypothesis: '#a78bfa',
  invention: '#3b82f6',
  paper: '#f59e0b'
};

const MODULES = [
  {
    id: 'seed',
    label: 'Seed',
    color: COLORS.seed,
    metric: '12 gaps',
    progress: 1.0,
    steps: [
      {
        name: 'Fetch Papers',
        status: 'done',
        metric: '847 papers',
        time: '4m 12s',
        cost: '$0.00',
        detail: 'Fetched 847 papers from Semantic Scholar API across 3 research domains: geometric deep learning, attention mechanisms, and cross-modal transfer. Applied filters for citation count (>10), recency (<3 years), and venue quality (top-tier). Reduced to 312 highly relevant candidates after deduplication and relevance scoring.',
        metrics: { papers: '847', filtered: '312', domains: '3' }
      },
      {
        name: 'Extract Claims',
        status: 'done',
        metric: '2,841 claims',
        time: '6m 38s',
        cost: '$1.24',
        detail: 'Extracted key claims using structured output parsing with claim type classification (empirical, theoretical, methodological). Average 9.1 claims per paper with confidence scoring. Cross-referenced claims against citation graph to identify consensus vs. contested findings.',
        metrics: { claims: '2,841', avgPer: '9.1', confidence: '0.87' }
      },
      {
        name: 'Build KG',
        status: 'done',
        metric: '1,204 nodes',
        time: '3m 05s',
        cost: '$0.87',
        detail: 'Constructed knowledge graph with 1,204 concept nodes and 3,847 directed edges representing causal, compositional, and contradictory relationships. Identified 48 disconnected clusters and 12 bridge concepts connecting major research threads.',
        metrics: { nodes: '1,204', edges: '3,847', clusters: '48' }
      },
      {
        name: 'Find Gaps',
        status: 'done',
        metric: '12 gaps',
        time: '2m 51s',
        cost: '$0.92',
        detail: 'Gap analysis found 12 research gaps ranked by composite novelty score incorporating structural holes, citation trajectory, and feasibility. Top gap: "cross-modal transfer without aligned pretraining" (score 0.94). Each gap includes supporting evidence chain and estimated difficulty rating.',
        metrics: { gaps: '12', topScore: '0.94', feasible: '8' }
      }
    ],
    summary: '847 papers analyzed across 3 domains. 2,841 claims extracted and cross-referenced. Knowledge graph built with 1,204 nodes and 3,847 edges. 12 research gaps identified and ranked by novelty, with top-scoring gap at 0.94.',
    totalTime: '16m 46s',
    totalCost: '$3.03'
  },
  {
    id: 'hypothesis',
    label: 'Hypothesis',
    color: COLORS.hypothesis,
    metric: 'Score 8.4',
    progress: 1.0,
    steps: [
      {
        name: 'Gen Initial',
        status: 'done',
        metric: '24 hypos',
        time: '3m 22s',
        cost: '$1.58',
        detail: 'Generated 24 initial hypotheses from top 6 research gaps (4 hypotheses per gap). Each hypothesis includes proposed mechanism, testable prediction, falsifiability criteria, and estimated resource requirements. Diversity ensured via temperature sampling across formulation styles.',
        metrics: { generated: '24', perGap: '4', gaps: '6' }
      },
      {
        name: 'Review Round 1',
        status: 'done',
        metric: 'Score 6.2',
        time: '5m 14s',
        cost: '$2.31',
        detail: 'First review pass scored hypotheses on novelty (0-10), feasibility (0-10), and potential impact (0-10). Mean composite score 6.2/10. Eight hypotheses eliminated below threshold of 5.0. Key weaknesses identified: insufficient grounding (4 hypos), unclear mechanism (3 hypos), trivial predictions (1 hypo).',
        metrics: { mean: '6.2', eliminated: '8', remaining: '16' }
      },
      {
        name: 'Refine',
        status: 'done',
        metric: '16 revised',
        time: '4m 08s',
        cost: '$1.89',
        detail: 'Refined remaining 16 hypotheses based on structured reviewer feedback. Strengthened experimental designs with concrete baselines, clarified theoretical grounding with formal notation, and added related work connections. Average revision touched 3.2 sections per hypothesis.',
        metrics: { revised: '16', avgEdits: '3.2', improved: '14' }
      },
      {
        name: 'Review Round 2',
        status: 'done',
        metric: 'Score 7.8',
        time: '4m 52s',
        cost: '$2.14',
        detail: 'Second review pass with stricter criteria. Mean score improved to 7.8/10. Top 6 hypotheses advanced with detailed mechanistic justifications. Scoring weighted towards novelty (40%), feasibility (35%), impact (25%). All advancing hypotheses scored above 7.0 on each dimension.',
        metrics: { mean: '7.8', advanced: '6', minScore: '7.0' }
      },
      {
        name: 'Final Select',
        status: 'done',
        metric: 'Top 3',
        time: '2m 30s',
        cost: '$1.05',
        detail: 'Selected top 3 hypotheses by composite score with diversity penalty to avoid clustering. Winner: "Geometric Attention Bridges" (8.4). Runner-up: "Spectral Transfer Kernels" (8.1). Third: "Adaptive Modality Fusion" (7.9). Selection verified via pairwise comparison tournament.',
        metrics: { selected: '3', topScore: '8.4', method: 'Tournament' }
      },
      {
        name: 'Polish',
        status: 'done',
        metric: 'Score 8.4',
        time: '1m 48s',
        cost: '$0.76',
        detail: 'Final polish pass on winning hypothesis "Geometric Attention Bridges". Refined abstract to 150 words, added 12 related work connections with inline citations, verified all references resolve correctly. Final expert review confirmed score of 8.4/10.',
        metrics: { finalScore: '8.4', citations: '12', abstract: '150w' }
      }
    ],
    summary: '24 initial hypotheses generated from 6 research gaps. Two review rounds improved mean scores from 6.2 to 7.8. Final selection via tournament produced top hypothesis: "Geometric Attention Bridges" at 8.4/10.',
    totalTime: '21m 54s',
    totalCost: '$9.73'
  },
  {
    id: 'invention',
    label: 'Invention',
    color: COLORS.invention,
    metric: 'Iter 2',
    progress: 0.42,
    steps: [
      {
        name: 'Strategy',
        status: 'done',
        metric: '3 paths',
        time: '2m 44s',
        cost: '$1.12',
        detail: 'Evaluated 3 invention strategies: compositional (build from existing modules), ablative (simplify complex approach), and hybrid (compositional core with ablative refinement). Selected hybrid approach based on estimated novelty-to-effort ratio of 0.82.',
        metrics: { strategies: '3', selected: 'Hybrid', ratio: '0.82' }
      },
      {
        name: 'Plan',
        status: 'done',
        metric: '14 tasks',
        time: '3m 18s',
        cost: '$1.45',
        detail: 'Decomposed invention into 14 sub-tasks across three tracks: theory (4 tasks), implementation (6 tasks), and evaluation (4 tasks). Critical path: 8 sequential tasks. Parallelizable: 6 tasks across 3 workers. Estimated total: 45 minutes compute.',
        metrics: { tasks: '14', critical: '8', parallel: '6' }
      },
      {
        name: 'Artifacts',
        status: 'active',
        metric: '3 / 5',
        time: '12m 08s',
        cost: '$4.23',
        detail: 'Generating 5 key artifacts supporting the invention. 3 complete (baseline, dataset, proof), 1 actively running (ablation study), 1 pending (evaluation suite). Current bottleneck: ablation study exploring 6 hyperparameter dimensions.',
        metrics: { done: '3', running: '1', pending: '1' },
        items: [
          {
            name: 'Baseline Model',
            status: 'done',
            metric: '0.847 F1',
            time: '3m 22s',
            cost: '$1.05',
            detail: 'Baseline transformer model trained on standard benchmark with geometric attention disabled. Achieved 0.847 F1 on validation set (95% CI: 0.839-0.855), establishing performance floor for ablation comparisons. Architecture: 6 layers, 8 heads, 512 hidden dim.'
          },
          {
            name: 'Dataset Pipeline',
            status: 'done',
            metric: '2,400 samples',
            time: '2m 56s',
            cost: '$0.89',
            detail: 'Synthetic dataset pipeline generating 2,400 paired samples with controlled difficulty levels (easy: 800, medium: 800, hard: 800). Each sample includes source modality, target modality, ground truth alignment, and difficulty metadata. Validated with 3 human annotators (Cohen kappa = 0.91).'
          },
          {
            name: 'Proof Module',
            status: 'done',
            metric: 'Verified',
            time: '2m 18s',
            cost: '$0.94',
            detail: 'Formal verification of core geometric attention theorem. All 3 lemmas verified: (1) equivariance under rotation group, (2) bounded attention entropy, (3) convergence guarantee. Proof structure follows Lean4-style checking with explicit type annotations.'
          },
          {

// ─────────────────────────────────────
// Utility: hex color interpolation
// ─────────────────────────────────────
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [
    parseInt(h.substring(0, 2), 16),
    parseInt(h.substring(2, 4), 16),
    parseInt(h.substring(4, 6), 16)
  ];
}

function lerpColor(a, b, t) {
  const ra = hexToRgb(a), rb = hexToRgb(b);
  const r = Math.round(ra[0] + (rb[0] - ra[0]) * t);
  const g = Math.round(ra[1] + (rb[1] - ra[1]) * t);
  const bl = Math.round(ra[2] + (rb[2] - ra[2]) * t);
  return `rgb(${r},${g},${bl})`;
}

// ─────────────────────────────────────
// Progress Ring
// ─────────────────────────────────────
function drawRing() {
  const c = document.getElementById('ringCanvas');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = 220 * dpr;
  c.height = 220 * dpr;
  ctx.scale(dpr, dpr);

  const cx = 110, cy = 110, r = 46, lw = 7;

  // Background track
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#272b34';
  ctx.lineWidth = lw;
  ctx.stroke();

  // Per-module arcs
  const total = MODULES.reduce((s, m) => s + m.steps.length, 0);
  const gap = 0.04;
  let angle = -Math.PI / 2;

  MODULES.forEach((mod, mi) => {
    const sweep = (mod.steps.length / total) * (Math.PI * 2 - gap * MODULES.length);
    const startA = angle + gap / 2;
    const endA = startA + sweep * mod.progress;
    const fullEnd = startA + sweep;

    // Dim background arc
    ctx.beginPath();
    ctx.arc(cx, cy, r, startA, fullEnd);
    ctx.strokeStyle = mod.color + '22';
    ctx.lineWidth = lw;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Filled progress arc with gradient
    if (mod.progress > 0) {
      const grad = ctx.createLinearGradient(
        cx + r * Math.cos(startA), cy + r * Math.sin(startA),
        cx + r * Math.cos(endA), cy + r * Math.sin(endA)
      );
      grad.addColorStop(0, mod.color + 'aa');
      grad.addColorStop(1, mod.color);
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, endA);
      ctx.strokeStyle = grad;
      ctx.lineWidth = lw;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Glow endpoint for in-progress modules
      if (mod.progress < 1 && mod.progress > 0) {
        const ex = cx + r * Math.cos(endA);
        const ey = cy + r * Math.sin(endA);
        const glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 10);
        glow.addColorStop(0, mod.color + 'dd');
        glow.addColorStop(0.5, mod.color + '44');
        glow.addColorStop(1, mod.color + '00');
        ctx.beginPath();
        ctx.arc(ex, ey, 10, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();
        // Solid core
        ctx.beginPath();
        ctx.arc(ex, ey, 3, 0, Math.PI * 2);
        ctx.fillStyle = mod.color;
        ctx.fill();
      }
    }

    // Highlight halo on selected module's arc
    if (mi === selMod) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, startA + sweep);
      ctx.strokeStyle = mod.color + '30';
      ctx.lineWidth = lw + 5;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    angle += sweep + gap;
  });
}

// ─────────────────────────────────────
// Particle System (Canvas)
// ─────────────────────────────────────
function initParticles() {
  particles = [];
  const cards = document.querySelectorAll('.mod-card');
  if (cards.length < 2) return;

  const wrap = document.querySelector('.row1-wrap').getBoundingClientRect();

  for (let i = 0; i < cards.length - 1; i++) {
    const ra = cards[i].getBoundingClientRect();
    const rb = cards[i + 1].getBoundingClientRect();
    const ax = ra.right - wrap.left;
    const ay = ra.top + ra.height / 2 - wrap.top;
    const bx = rb.left - wrap.left;
    const by = rb.top + rb.height / 2 - wrap.top;
    const modA = MODULES[i], modB = MODULES[i + 1];
    const bothDone = modA.progress >= 1 && modB.progress >= 1;
    const anyActive = modA.steps.some(s => s.status === 'active') ||
                      modB.steps.some(s => s.status === 'active');
    const count = bothDone ? 2 : anyActive ? 4 : 0;
    const speed = bothDone ? 0.0018 : 0.0045;
    const isPending = !bothDone && !anyActive;

    for (let p = 0; p < count; p++) {
      particles.push({
        ax, ay, bx, by,
        t: p / count,
        speed: speed + (Math.random() * 0.001 - 0.0005),
        colorA: modA.color,
        colorB: modB.color,
        idx: i,
        size: 2 + Math.random() * 1
      });
    }

    if (isPending) {
      particles.push({
        ax, ay, bx, by,
        dashed: true,
        colorA: modA.color,
        colorB: modB.color,
        idx: i
      });
    }
  }
}

function animateParticles() {
  const canvas = document.getElementById('particleCanvas');
  const wrap = document.querySelector('.row1-wrap');
  if (!wrap) return;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = wrap.offsetWidth * dpr;
  canvas.height = wrap.offsetHeight * dpr;
  canvas.style.width = wrap.offsetWidth + 'px';
  canvas.style.height = wrap.offsetHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, wrap.offsetWidth, wrap.offsetHeight);

  // Draw bezier connection paths
  const drawn = new Set();
  particles.forEach(p => {
    if (drawn.has(p.idx)) return;
    drawn.add(p.idx);
    const mx = (p.ax + p.bx) / 2;
    const my = Math.min(p.ay, p.by) - 10;
    ctx.beginPath();
    ctx.moveTo(p.ax, p.ay);
    ctx.quadraticCurveTo(mx, my, p.bx, p.by);
    if (p.dashed) {
      ctx.setLineDash([4, 7]);
      ctx.strokeStyle = '#272b34';
    } else {
      ctx.setLineDash([]);
      ctx.strokeStyle = '#272b3480';
    }
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Animate and draw particles with glow trails
  particles.forEach(p => {
    if (p.dashed) return;
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;

    const t = p.t;
    const mx = (p.ax + p.bx) / 2;
    const my = Math.min(p.ay, p.by) - 10;
    // Quadratic bezier position
    const x = (1 - t) * (1 - t) * p.ax + 2 * (1 - t) * t * mx + t * t * p.bx;
    const y = (1 - t) * (1 - t) * p.ay + 2 * (1 - t) * t * my + t * t * p.by;

    // Smooth color interpolation
    const c = lerpColor(p.colorA, p.colorB, t);

    // Outer glow
    const glow = ctx.createRadialGradient(x, y, 0, x, y, 12);
    glow.addColorStop(0, c.replace('rgb', 'rgba').replace(')', ',0.4)'));
    glow.addColorStop(1, c.replace('rgb', 'rgba').replace(')', ',0)'));
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Core particle
    ctx.beginPath();
    ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = c;
    ctx.fill();
  });

  animFrameId = requestAnimationFrame(animateParticles);
}

// ─────────────────────────────────────
// Beam Canvas (vertical glow connector)
// ─────────────────────────────────────
function drawBeam() {
  const canvas = document.getElementById('beamCanvas');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.offsetWidth - 56;
  canvas.width = w * dpr;
  canvas.height = 28 * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = '28px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, 28);

  const cards = document.querySelectorAll('.mod-card');
  const dots = document.querySelectorAll('.sub-dot-wrap');
  if (!cards[selMod] || !dots[selStep]) return;

  const wrapRect = canvas.getBoundingClientRect();
  const cardRect = cards[selMod].getBoundingClientRect();
  const dotRect = dots[selStep].getBoundingClientRect();

  const x1 = cardRect.left + cardRect.width / 2 - wrapRect.left;
  const x2 = dotRect.left + dotRect.width / 2 - wrapRect.left;
  const mod = MODULES[selMod];

  // Main beam stroke
  const grad = ctx.createLinearGradient(x1, 0, x2, 28);
  grad.addColorStop(0, mod.color + 'cc');
  grad.addColorStop(0.5, mod.color + '55');
  grad.addColorStop(1, mod.color + 'cc');

  ctx.beginPath();
  ctx.moveTo(x1, 0);
  ctx.quadraticCurveTo((x1 + x2) / 2, 14, x2, 28);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Outer glow layer
  ctx.save();
  ctx.shadowColor = mod.color;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(x1, 0);
  ctx.quadraticCurveTo((x1 + x2) / 2, 14, x2, 28);
  ctx.strokeStyle = mod.color + '28';
  ctx.lineWidth = 8;
  ctx.stroke();
  ctx.restore();
}

  const bg = status === 'done' ? '#22c55e' :
             status === 'active' ? '#3b82f6' : '#555';

                status === 'active' ? 'Running' : 'Pending';
  return `<span class="step-status-chip" style="background:${bg}22;color:${bg}">${label}</span>`;
}

function buildContent() {
  const el = document.getElementById('content');
  const mod = MODULES[selMod];
  const step = mod.steps[selStep];
  if (!step) return;

  let html = '';

  // Tag + title + status
  html += `<div class="tag-badge" style="background:${mod.color}22;color:${mod.color}">

  html += `<div class="step-status-line">
    ${statusChip(step.status, mod.color)}

  html += `<p class="summary">${mod.summary}</p>`;

  // Metric pills for steps that have them
  if (step.metrics) {
    html += '<div class="metric-row">';
    const entries = Object.entries(step.metrics);
    entries.forEach(([key, val]) => {
      html += `<div class="metric-pill">

        <span class="metric-pill-val" style="color:${mod.color}">${val}</span>

  // Item list (artifact sub-items) or single detail card
  if (step.items) {
    step.items.forEach((item, idx) => {
      const isActive = item.status === 'active';
      const isDone = item.status === 'done';
      const statusBg = isDone ? '#22c55e22' : isActive ? '#3b82f622' : '#272b34';
      const statusColor = isDone ? '#22c55e' : isActive ? '#3b82f6' : '#7a8090';
      const statusIcon = isDone ? '&#10003;' : isActive ? '&#9654;' : '&#9679;';
      const metaTag = isDone
        ? `<span class="detail-meta-tag" style="background:#22c55e18;color:#22c55e">Done</span>`
        : isActive
        ? `<span class="detail-meta-tag" style="background:#3b82f618;color:#3b82f6">Live</span>`
        : `<span class="detail-meta-tag" style="background:#272b34;color:#7a8090">Queue</span>`;

      html += `<div class="detail-card${isActive ? ' active-item' : ''}" data-idx="${idx}">

          <div class="detail-status" style="background:${statusBg};color:${statusColor}">
            ${statusIcon}

          <div class="detail-name">${item.name}</div>
          <div class="detail-meta">
            ${metaTag}
            <span>${item.metric}</span>
            <span>${item.time}</span>
            <span>${item.cost}</span>
          </div>
          <div class="detail-chevron">&#9656;</div>

      }

      html += `<div class="detail-body">
          <div class="detail-body-inner">${item.detail}</div>
        </div>
      </div>`;
    });
  } else {
    // Single card for non-artifact steps
    const isDone = step.status === 'done';
    const isActive = step.status === 'active';
    const statusBg = isDone ? '#22c55e22' : isActive ? '#3b82f622' : '#272b34';
    const statusColor = isDone ? '#22c55e' : isActive ? '#3b82f6' : '#7a8090';
    const statusIcon = isDone ? '&#10003;' : isActive ? '&#9654;' : '&#9679;';

    html += `<div class="detail-card${isActive ? ' active-item' : ''}">
      <div class="detail-header" onclick="toggleDetail(this)">
        <div class="detail-status" style="background:${statusBg};color:${statusColor}">
          ${statusIcon}

        <div class="detail-name">${step.name}</div>

          <span>${step.time}</span>

      </div>
      <div class="detail-body">
        <div class="detail-body-inner">${step.detail}</div>

  const timeClass = isLive ? 'ft-val timer-live' : 'ft-val';

  el.innerHTML = html;

function toggleDetail(header) {
  const card = header.parentElement;
  const body = card.querySelector('.detail-body');
  const chev = card.querySelector('.detail-chevron');
  const inner = body.querySelector('.detail-body-inner');

  if (body.style.maxHeight && body.style.maxHeight !== '0px') {
    body.style.maxHeight = '0px';
    chev.classList.remove('open');
  } else {
    body.style.maxHeight = inner.scrollHeight + 16 + 'px';
    chev.classList.add('open');
  }
}

// ─────────────────────────────────────
// Master Render
// ─────────────────────────────────────
function render() {
  const mod = MODULES[selMod];
  if (selStep >= mod.steps.length) selStep = mod.steps.length - 1;
  if (selStep < 0) selStep = 0;

  drawRing();
  buildLegend();
  buildSidebarStats();
  buildRow1();
  buildRow2();
  buildContent();

  // Defer layout-dependent canvas drawing
  requestAnimationFrame(() => {
    initParticles();
    drawBeam();
  });
}

// ─────────────────────────────────────
// Keyboard Navigation
// ─────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    selMod = (selMod - 1 + MODULES.length) % MODULES.length;
    selStep = 0;
    render();
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    selMod = (selMod + 1) % MODULES.length;
    selStep = 0;
    render();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selStep = Math.max(0, selStep - 1);
    render();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    selStep = Math.min(MODULES[selMod].steps.length - 1, selStep + 1);
    render();
  }
});

// ─────────────────────────────────────
// Resize Handler
// ─────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(), 50);
});

// ─────────────────────────────────────
// Init
// ─────────────────────────────────────
render();
animateParticles();
</script>
</body>
</html>
