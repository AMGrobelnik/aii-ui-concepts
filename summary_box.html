<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summary Box — 10 Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06090f;
  --surface-card: rgba(12,18,32,.85);
  --border: rgba(148,163,184,.08);
  --border-hi: rgba(148,163,184,.16);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --text-muted: #64748b;
  --text-faint: #475569;

  --purple: #a78bfa; --purple-dim: rgba(167,139,250,.12);
  --blue: #60a5fa;   --blue-dim: rgba(96,165,250,.12);
  --orange: #fb923c; --orange-dim: rgba(251,146,60,.12);
  --green: #34d399;  --green-dim: rgba(52,211,153,.12);
  --red: #f87171;    --red-dim: rgba(248,113,113,.12);
  --cyan: #22d3ee;   --cyan-dim: rgba(34,211,238,.12);

  --radius: 12px;
  --radius-sm: 8px;
  font-size: 14px;
}

html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text-dim);
  font-family: 'Inter', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased; overflow-y: auto;
}

.page-header {
  padding: 32px 40px 24px; border-bottom: 1px solid var(--border);
  background: rgba(6,9,15,.8); backdrop-filter: blur(16px);
  position: sticky; top: 0; z-index: 50;
}
.page-title { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; margin-bottom: 4px; }
.page-sub { font-size: 12px; color: var(--text-muted); }

.grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 24px; padding: 32px 40px; max-width: 1400px;
}

.variant {
  background: var(--surface-card); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; position: relative; transition: border-color .2s;
}
.variant:hover { border-color: var(--border-hi); }
.variant::before {
  content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,.2), transparent);
}
.vlabel {
  padding: 14px 20px 10px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px; color: var(--text-faint);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.vlabel .n {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--blue-dim); color: var(--blue);
  display: grid; place-items: center; font-size: 9px; font-weight: 800;
}
.vbody { padding: 16px 20px 20px; }

/* ===== SHARED SUMMARY + TODO DATA ===== */

/* Summary text block */
.sum-text {
  font-size: 13px; color: var(--text-dim); line-height: 1.65;
  font-style: italic;
}

/* Todo item */
.todo { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; }
.todo-icon {
  width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; flex-shrink: 0;
}
.todo-icon.done { background: var(--green-dim); color: var(--green); }
.todo-icon.run  { background: var(--blue-dim); color: var(--blue); }
.todo-icon.up   { background: rgba(148,163,184,.06); color: var(--text-faint); }
.todo-text { flex: 1; }
.todo-text.done { color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(148,163,184,.3); }
.todo-text.run  { color: var(--text); }
.todo-text.up   { color: var(--text-muted); }

/* ============================================================
   V1 — Summary paragraph + checklist below
   ============================================================ */
.v1-summary { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.v1-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-faint); margin-bottom: 8px; }
.v1-todos { display: flex; flex-direction: column; gap: 2px; }

/* ============================================================
   V2 — Blue accent top bar + summary + todos
   ============================================================ */
.v2-bar { height: 2px; background: linear-gradient(90deg, var(--blue), rgba(96,165,250,.2)); border-radius: 1px; margin-bottom: 14px; }
.v2-summary { margin-bottom: 14px; }
.v2-todos { display: flex; flex-direction: column; gap: 2px; }

/* ============================================================
   V3 — Card-in-card: summary card + todos card
   ============================================================ */
.v3-card {
  background: rgba(255,255,255,.02); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 10px;
}
.v3-card:last-child { margin-bottom: 0; }
.v3-card-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--text-faint); margin-bottom: 8px; }
.v3-todos { display: flex; flex-direction: column; gap: 2px; }

/* ============================================================
   V4 — Inline status pill + summary + progress bar + todos
   ============================================================ */
.v4-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.v4-pill {
  font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: var(--blue-dim); color: var(--blue); text-transform: uppercase;
}
.v4-progress { height: 3px; background: rgba(148,163,184,.06); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.v4-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), rgba(96,165,250,.5)); border-radius: 2px; transition: width .6s; }
.v4-summary { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.v4-todos { display: flex; flex-direction: column; gap: 2px; }

/* ============================================================
   V5 — Large quote-style summary + compact todo list
   ============================================================ */
.v5-summary {
  font-size: 14px; line-height: 1.7; color: var(--text-dim);
  border-left: 3px solid var(--blue); padding-left: 14px;
  margin-bottom: 16px; font-style: italic;
}
.v5-todos { display: flex; flex-direction: column; gap: 1px; }
.v5-todos .todo { padding: 4px 0; font-size: 11.5px; }
.v5-todos .todo-icon { width: 14px; height: 14px; font-size: 8px; }

/* ============================================================
   V6 — Summary + todos with numbered steps
   ============================================================ */
.v6-summary { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.v6-todos { display: flex; flex-direction: column; gap: 3px; counter-reset: step; }
.v6-todo {
  display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px;
}
.v6-num {
  width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.v6-num.done { background: var(--green-dim); color: var(--green); }
.v6-num.run  { background: var(--blue-dim); color: var(--blue); }
.v6-num.up   { background: rgba(148,163,184,.06); color: var(--text-faint); }

/* ============================================================
   V7 — Horizontal summary bar + vertical todo list
   ============================================================ */
.v7-summary-bar {
  background: rgba(96,165,250,.04); border: 1px solid rgba(96,165,250,.1);
  border-radius: var(--radius-sm); padding: 10px 14px;
  margin-bottom: 14px; font-size: 12px; color: var(--text-dim); line-height: 1.6;
  display: flex; align-items: flex-start; gap: 8px;
}
.v7-summary-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.v7-todos { display: flex; flex-direction: column; gap: 2px; }

/* ============================================================
   V8 — Summary + inline horizontal todo pills
   ============================================================ */
.v8-summary { margin-bottom: 14px; }
.v8-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.v8-pill {
  font-size: 10px; padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border); display: flex; align-items: center; gap: 5px;
}
.v8-pill.done { background: var(--green-dim); border-color: rgba(52,211,153,.15); color: var(--text-muted); text-decoration: line-through; text-decoration-color: rgba(148,163,184,.3); }
.v8-pill.run  { background: var(--blue-dim); border-color: rgba(96,165,250,.15); color: var(--text); }
.v8-pill.up   { color: var(--text-muted); }
.v8-pill .d { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* ============================================================
   V9 — Compact: summary + todos in one flow, no divider
   ============================================================ */
.v9-summary { margin-bottom: 10px; font-size: 12px; }
.v9-todos { display: flex; flex-direction: column; gap: 1px; }
.v9-todos .todo { padding: 4px 0; font-size: 11.5px; }

/* ============================================================
   V10 — Stats row + summary + todos with progress dots
   ============================================================ */
.v10-stats {
  display: flex; gap: 12px; margin-bottom: 12px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.v10-stat {
  display: flex; flex-direction: column; gap: 2px;
}
.v10-stat-val { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
.v10-stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-faint); font-weight: 600; }
.v10-summary { margin-bottom: 12px; }
.v10-todos { display: flex; flex-direction: column; gap: 2px; }
.v10-progress-dots { display: flex; gap: 3px; margin-top: 8px; }
.v10-progress-dots .pd { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Summary Box — 10 Variants</div>
  <div class="page-sub">Agent 3 — Module status summary + TODO checklist. Goes left of the activity feed.</div>
</div>

<div class="grid" id="grid"></div>

<script>
const SUMMARY = "I'm running ablation studies on hypotheses 4-6 while main experiments continue for hypothesis 7's nano-scale thermal transport model with gradient checkpointing.";

const TODOS = [
  { status: 'done', text: 'Build knowledge graph (14.3k triples)' },
  { status: 'done', text: 'Identify research gaps (23 found)' },
  { status: 'done', text: 'Generate and rank seed hypotheses' },
  { status: 'run',  text: 'Run simulations for hypotheses 4-7' },
  { status: 'run',  text: 'Ablation studies on completed sims' },
  { status: 'up',   text: 'Analyze results and effect sizes' },
  { status: 'up',   text: 'Draft paper text with citations' },
];

function todoHTML(todos, cls) {
  return todos.map(t =>
    `<div class="todo">
      <div class="todo-icon ${t.status}">${t.status === 'done' ? '\u2713' : t.status === 'run' ? '\u25B6' : '\u25CB'}</div>
      <span class="todo-text ${t.status}">${t.text}</span>
    </div>`
  ).join('');
}

function v1() {
  return `
    <div class="v1-summary"><div class="sum-text">${SUMMARY}</div></div>
    <div class="v1-label">Progress</div>
    <div class="v1-todos">${todoHTML(TODOS)}</div>`;
}

function v2() {
  return `
    <div class="v2-bar"></div>
    <div class="v2-summary"><div class="sum-text">${SUMMARY}</div></div>
    <div class="v2-todos">${todoHTML(TODOS)}</div>`;
}

function v3() {
  return `
    <div class="v3-card">
      <div class="v3-card-label">Status</div>
      <div class="sum-text">${SUMMARY}</div>
    </div>
    <div class="v3-card">
      <div class="v3-card-label">Checklist</div>
      <div class="v3-todos">${todoHTML(TODOS)}</div>
    </div>`;
}

function v4() {
  const done = TODOS.filter(t => t.status === 'done').length;
  const pct = Math.round(done / TODOS.length * 100);
  return `
    <div class="v4-header">
      <span class="v4-pill">Running</span>
      <span style="font-size:11px;color:var(--text-faint)">${done}/${TODOS.length} steps</span>
    </div>
    <div class="v4-progress"><div class="v4-progress-fill" style="width:${pct}%"></div></div>
    <div class="v4-summary"><div class="sum-text">${SUMMARY}</div></div>
    <div class="v4-todos">${todoHTML(TODOS)}</div>`;
}

function v5() {
  return `
    <div class="v5-summary">${SUMMARY}</div>
    <div class="v5-todos">${todoHTML(TODOS)}</div>`;
}

function v6() {
  const items = TODOS.map((t, i) =>
    `<div class="v6-todo">
      <div class="v6-num ${t.status}">${i + 1}</div>
      <span class="todo-text ${t.status}">${t.text}</span>
    </div>`
  ).join('');
  return `
    <div class="v6-summary"><div class="sum-text">${SUMMARY}</div></div>
    ${items}`;
}

function v7() {
  return `
    <div class="v7-summary-bar">
      <span class="v7-summary-icon">\ud83d\udd2c</span>
      <span>${SUMMARY}</span>
    </div>
    <div class="v7-todos">${todoHTML(TODOS)}</div>`;
}

function v8() {
  const pills = TODOS.map(t => {
    const dotColor = t.status === 'done' ? 'var(--green)' : t.status === 'run' ? 'var(--blue)' : 'var(--text-faint)';
    return `<span class="v8-pill ${t.status}"><span class="d" style="background:${dotColor}"></span>${t.text}</span>`;
  }).join('');
  return `
    <div class="v8-summary"><div class="sum-text">${SUMMARY}</div></div>
    <div class="v8-pills">${pills}</div>`;
}

function v9() {
  return `
    <div class="v9-summary"><div class="sum-text">${SUMMARY}</div></div>
    <div class="v9-todos">${todoHTML(TODOS)}</div>`;
}

function v10() {
  const done = TODOS.filter(t => t.status === 'done').length;
  const running = TODOS.filter(t => t.status === 'run').length;
  const dots = TODOS.map(t => {
    const c = t.status === 'done' ? 'var(--green)' : t.status === 'run' ? 'var(--blue)' : 'rgba(148,163,184,.15)';
    return `<span class="pd" style="background:${c}"></span>`;
  }).join('');
  return `
    <div class="v10-stats">
      <div class="v10-stat"><span class="v10-stat-val" style="color:var(--green)">${done}</span><span class="v10-stat-label">Done</span></div>
      <div class="v10-stat"><span class="v10-stat-val" style="color:var(--blue)">${running}</span><span class="v10-stat-label">Running</span></div>
      <div class="v10-stat"><span class="v10-stat-val">${TODOS.length}</span><span class="v10-stat-label">Total</span></div>
    </div>
    <div class="v10-summary"><div class="sum-text">${SUMMARY}</div></div>
    <div class="v10-todos">${todoHTML(TODOS)}</div>
    <div class="v10-progress-dots">${dots}</div>`;
}

const V = [
  { n:1,  name:'Summary paragraph + checklist', r:v1 },
  { n:2,  name:'Blue accent bar + summary + todos', r:v2 },
  { n:3,  name:'Card-in-card: status + checklist', r:v3 },
  { n:4,  name:'Status pill + progress bar + todos', r:v4 },
  { n:5,  name:'Quote-style summary + compact todos', r:v5 },
  { n:6,  name:'Summary + numbered step circles', r:v6 },
  { n:7,  name:'Icon summary bar + checklist', r:v7 },
  { n:8,  name:'Summary + horizontal todo pills', r:v8 },
  { n:9,  name:'Compact: summary + todos, no divider', r:v9 },
  { n:10, name:'Stats counters + summary + dot progress', r:v10 },
];

const g = document.getElementById('grid');
V.forEach(v => {
  const el = document.createElement('div');
  el.className = 'variant';
  el.innerHTML = `<div class="vlabel"><span class="n">${v.n}</span> ${v.name}</div><div class="vbody">${v.r()}</div>`;
  g.appendChild(el);
});
</script>
</body>
</html>
