<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Pipeline (Modal Detail)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   RESET & CSS VARIABLES
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --slate-950: #020617;
  --slate-900: #0f172a;
  --slate-850: #131c31;
  --slate-800: #1e293b;
  --slate-750: #253349;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748b;
  --slate-400: #94a3b8;
  --slate-300: #cbd5e1;
  --slate-200: #e2e8f0;
  --slate-100: #f1f5f9;

  --green:      #22c55e;
  --green-dim:  rgba(34, 197, 94, 0.12);
  --green-glow: rgba(34, 197, 94, 0.35);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167, 139, 250, 0.10);
  --purple-glow: rgba(167, 139, 250, 0.35);
  --blue:      #60a5fa;
  --blue-dim:  rgba(96, 165, 250, 0.10);
  --blue-glow: rgba(96, 165, 250, 0.35);
  --orange:      #fb923c;
  --orange-dim:  rgba(251, 146, 60, 0.08);
  --orange-glow: rgba(251, 146, 60, 0.30);
  --red: #ef4444;

  --glass-blur: 18px;
  --glass-border: rgba(255, 255, 255, 0.07);
  --glass-border-hi: rgba(255, 255, 255, 0.12);
  --glass-surface: rgba(15, 23, 42, 0.72);
  --glass-shine: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 50%);

  --header-h: 48px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

html {
  font-size: 14px;
  background: var(--slate-950);
  color: var(--slate-200);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ================================================================
   AMBIENT BACKGROUND
   ================================================================ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 800px 500px at 20% 15%, rgba(96, 165, 250, 0.04) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 80% 20%, rgba(167, 139, 250, 0.035) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 50% 85%, rgba(34, 197, 94, 0.025) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(148, 163, 184, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148, 163, 184, 0.02) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none; z-index: 0;
}

/* ================================================================
   HEADER BAR
   ================================================================ */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: rgba(2, 6, 23, 0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
}

.header-left {
  display: flex; align-items: center; gap: 14px;
}

.header-logo {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
}

.header-title {
  font-size: 15px; font-weight: 600;
  color: var(--slate-100);
  letter-spacing: -0.3px;
}

.header-sep {
  color: var(--slate-700);
  font-size: 13px;
}

.header-run {
  font-size: 13px;
  color: var(--slate-400);
  font-weight: 500;
}

.header-right {
  display: flex; align-items: center; gap: 18px;
  font-size: 12px; color: var(--slate-500);
}

.header-stat {
  display: flex; align-items: center; gap: 5px;
}

.header-stat .dot-live {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  animation: dotPulse 2s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--blue); }
  50%      { opacity: 0.4; box-shadow: 0 0 8px var(--blue); }
}

/* ================================================================
   MAIN LAYOUT
   ================================================================ */
.app {
  position: relative; z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: calc(var(--header-h) + 40px) 28px 80px;
}

/* ================================================================
   MODULE CARD (top-level pipeline stage)
   ================================================================ */
.module {
  margin-bottom: 10px;
  position: relative;
}

.module-card {
  position: relative;
  background: var(--glass-surface);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
  transition:
    border-color 260ms var(--ease),
    box-shadow 300ms var(--ease),
    transform 200ms var(--ease);
  overflow: hidden;
}

/* Glass shine */
.module-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--glass-shine);
  border-radius: 14px;
  pointer-events: none;
  z-index: 1;
}

/* Left accent bar */
.module-card::after {
  content: '';
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  z-index: 2;
  transition: opacity 200ms;
}

.module[data-tint="green"]  .module-card::after { background: var(--green); }
.module[data-tint="purple"] .module-card::after { background: var(--purple); }
.module[data-tint="blue"]   .module-card::after { background: var(--blue); }
.module[data-tint="orange"] .module-card::after { background: var(--orange); }

.module-card:hover {
  border-color: var(--glass-border-hi);
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
}

.module-card.expanded {
  border-color: var(--glass-border-hi);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

/* Module card inner layout */
.mc-row {
  display: flex; align-items: center; gap: 14px;
  position: relative; z-index: 2;
}

.mc-ring-wrap {
  width: 36px; height: 36px;
  flex-shrink: 0;
  position: relative;
}

.mc-ring-wrap svg { width: 36px; height: 36px; display: block; }
.mc-ring-track { fill: none; stroke: var(--slate-700); stroke-width: 3; }
.mc-ring-fill {
  fill: none; stroke-width: 3; stroke-linecap: round;
  transition: stroke-dashoffset 0.8s var(--ease);
}
.mc-ring-text {
  font-size: 8.5px; font-weight: 700;
  text-anchor: middle; dominant-baseline: central;
  font-family: 'Inter', sans-serif; fill: var(--slate-300);
}

.mc-body { flex: 1; min-width: 0; }

.mc-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 2px;
}

.mc-icon { font-size: 14px; line-height: 1; }
.mc-name {
  font-size: 15px; font-weight: 600;
  color: var(--slate-100);
  letter-spacing: -0.2px;
}

.mc-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600;
  padding: 2px 9px; border-radius: 20px;
  margin-left: auto;
}
.mc-badge.done    { background: rgba(34,197,94,0.12);  color: #4ade80; }
.mc-badge.active  { background: rgba(96,165,250,0.12); color: var(--blue); }
.mc-badge.pending { background: var(--slate-800);       color: var(--slate-500); }

.mc-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--slate-500);
}

.mc-meta-val { font-weight: 500; color: var(--slate-400); }

.mc-chevron {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  color: var(--slate-500);
  flex-shrink: 0;
  transition: transform 350ms var(--ease);
}

.module-card.expanded .mc-chevron { transform: rotate(180deg); }
.mc-chevron svg { width: 16px; height: 16px; }

/* Progress bar under module card */
.mc-bar {
  height: 3px;
  background: rgba(255,255,255,0.04);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
  position: relative;
  z-index: 2;
}

.mc-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s var(--ease);
}

/* ================================================================
   SUB-MODULE TREE (expandable below each module card)
   ================================================================ */
.sub-tree {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 380ms var(--ease), opacity 200ms ease;
  position: relative;
  padding-left: 36px;
  margin-top: 0;
}

.sub-tree.open {
  opacity: 1;
  margin-top: 6px;
  transition: max-height 420ms var(--ease), opacity 280ms ease 60ms;
}

/* Vertical trunk line */
.sub-tree::before {
  content: '';
  position: absolute;
  left: 53px;
  top: 0;
  bottom: 12px;
  width: 2px;
  background: var(--slate-700);
  border-radius: 1px;
}

/* Colored trunk overlay */
.trunk-colored {
  position: absolute;
  left: 53px;
  top: 0;
  width: 2px;
  height: 0;
  border-radius: 1px;
  z-index: 1;
  transition: height 600ms var(--ease);
}

.module[data-tint="green"]  .trunk-colored { background: var(--green); }
.module[data-tint="purple"] .trunk-colored { background: var(--purple); }
.module[data-tint="blue"]   .trunk-colored { background: var(--blue); }
.module[data-tint="orange"] .trunk-colored { background: var(--orange); }

/* ================================================================
   SUB-NODE ROW (XL size -- ~52px tall)
   ================================================================ */
.sub-node {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
  position: relative;
  padding: 4px 0;
}

/* Horizontal branch */
.sub-branch {
  width: 20px;
  height: 2px;
  background: var(--slate-700);
  flex-shrink: 0;
  position: relative;
}

.sub-branch-fill {
  position: absolute;
  top: 0; left: 0;
  height: 100%; width: 0;
  border-radius: 1px;
  transition: width 300ms var(--ease);
}

.module[data-tint="green"]  .sub-branch-fill { background: var(--green); }
.module[data-tint="purple"] .sub-branch-fill { background: var(--purple); }
.module[data-tint="blue"]   .sub-branch-fill { background: var(--blue); }
.module[data-tint="orange"] .sub-branch-fill { background: var(--orange); }

/* Multi-target dot at branch end */
.sub-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 10px;
  transition: background 0.2s, box-shadow 0.3s, transform 0.2s;
  position: relative;
  z-index: 2;
}

.sub-node.done .sub-dot    { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.4); }
.sub-node.active .sub-dot  {
  background: var(--blue);
  box-shadow: 0 0 6px var(--blue), 0 0 14px rgba(96,165,250,0.35);
  animation: subDotPulse 2s ease-in-out infinite;
}
.sub-node.pending .sub-dot { background: var(--slate-600); opacity: 0.4; }

@keyframes subDotPulse {
  0%, 100% { box-shadow: 0 0 5px var(--blue), 0 0 10px rgba(96,165,250,0.3); }
  50%      { box-shadow: 0 0 8px var(--blue), 0 0 18px rgba(96,165,250,0.5); }
}

/* Sub-node bubble (XL) */
.sub-bubble {
  flex: 1; min-width: 0;
  display: flex; align-items: center; gap: 10px;
  height: 52px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--slate-700);
  background: var(--slate-850);
  cursor: pointer;
  transition:
    border-color 200ms var(--ease),
    background 200ms var(--ease),
    transform 150ms var(--ease),
    box-shadow 200ms var(--ease);
  position: relative;
  overflow: hidden;
}

.sub-bubble::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--glass-shine);
  pointer-events: none;
  border-radius: 10px;
}

.sub-bubble:hover {
  border-color: var(--slate-600);
  background: var(--slate-800);
  transform: translateX(3px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

.sub-node.done .sub-bubble    { border-color: color-mix(in srgb, var(--green) 20%, var(--slate-700)); }
.sub-node.active .sub-bubble  { border-color: color-mix(in srgb, var(--blue) 35%, var(--slate-600)); }
.sub-node.pending .sub-bubble { border-color: var(--slate-750); opacity: 0.65; }

/* Active shimmer sweep */
.sub-node.active .sub-bubble::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(96,165,250,0.03) 48%,
    rgba(96,165,250,0.06) 50%, rgba(96,165,250,0.03) 52%, transparent 70%);
  background-size: 250% 100%;
  animation: shimmerSweep 3.5s ease-in-out infinite;
  pointer-events: none;
  border-radius: 10px;
}

@keyframes shimmerSweep {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.sub-icon {
  font-size: 14px; line-height: 1;
  flex-shrink: 0; width: 18px;
  text-align: center;
}

.sub-body { flex: 1; min-width: 0; }

.sub-name {
  font-size: 13.5px; font-weight: 600;
  color: var(--slate-200);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sub-node.pending .sub-name { color: var(--slate-500); }

.sub-desc {
  font-size: 11px;
  color: var(--slate-500);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}

.sub-metric {
  font-size: 12px; font-weight: 500;
  color: var(--slate-400);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.sub-node.pending .sub-metric { color: var(--slate-600); }

.sub-time {
  font-size: 11px;
  color: var(--slate-600);
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ================================================================
   WELCOME / EMPTY STATE (shown before any click)
   ================================================================ */
.welcome {
  text-align: center;
  padding: 80px 0 40px;
  color: var(--slate-500);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.02em;
  opacity: 0.7;
}

.welcome-icon {
  font-size: 32px;
  margin-bottom: 12px;
  opacity: 0.5;
}

/* ================================================================
   MODAL OVERLAY
   ================================================================ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(2, 6, 23, 0.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 250ms var(--ease);
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

/* ================================================================
   MODAL PANEL (glassmorphism, 600px wide, centered)
   ================================================================ */
.modal-panel {
  width: 600px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  background: rgba(15, 23, 42, 0.88);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid var(--glass-border-hi);
  border-radius: 18px;
  padding: 0;
  position: relative;
  transform: translateY(16px) scale(0.97);
  transition: transform 300ms var(--ease-out), opacity 200ms ease;
  opacity: 0;
  box-shadow:
    0 24px 80px rgba(0,0,0,0.55),
    0 8px 32px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.05);
  scrollbar-width: thin;
  scrollbar-color: rgba(71,85,105,0.4) transparent;
}

.modal-panel::-webkit-scrollbar { width: 5px; }
.modal-panel::-webkit-scrollbar-track { background: transparent; }
.modal-panel::-webkit-scrollbar-thumb { background: rgba(71,85,105,0.4); border-radius: 3px; }

.modal-overlay.open .modal-panel {
  transform: translateY(0) scale(1);
  opacity: 1;
}

/* Glass shine on modal */
.modal-panel::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%);
  border-radius: 18px;
  pointer-events: none;
  z-index: 0;
}

/* ================================================================
   MODAL HEADER
   ================================================================ */
.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 24px 28px 0;
  position: relative;
  z-index: 1;
}

.modal-header-left { flex: 1; min-width: 0; }

.modal-breadcrumb {
  font-size: 11px; font-weight: 500;
  color: var(--slate-500);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}

.modal-breadcrumb .bc-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.modal-title {
  font-size: 20px; font-weight: 700;
  color: var(--slate-100);
  letter-spacing: -0.4px;
  margin-bottom: 4px;
}

.modal-status-row {
  display: flex; align-items: center; gap: 10px;
  margin-top: 4px;
}

.modal-status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  padding: 3px 10px; border-radius: 20px;
}

.modal-status-pill.done    { background: rgba(34,197,94,0.12);  color: #4ade80; }
.modal-status-pill.active  { background: rgba(96,165,250,0.12); color: var(--blue); }
.modal-status-pill.pending { background: var(--slate-800);       color: var(--slate-500); }

/* Shimmer text for active status */
.modal-status-pill.active .shimmer-text {
  background: linear-gradient(90deg, var(--blue) 0%, #93c5fd 50%, var(--blue) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmerText 2.5s linear infinite;
}

@keyframes shimmerText {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.modal-close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.03);
  color: var(--slate-400);
  cursor: pointer;
  font-size: 16px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  flex-shrink: 0;
  margin-left: 16px;
}

.modal-close:hover {
  background: rgba(255,255,255,0.06);
  color: var(--slate-200);
  border-color: var(--glass-border-hi);
}

/* ================================================================
   MODAL BODY
   ================================================================ */
.modal-body {
  padding: 20px 28px 28px;
  position: relative;
  z-index: 1;
}

/* Section label */
.section-label {
  font-size: 10.5px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--slate-500);
  margin-bottom: 8px;
}

/* Summary text */
.modal-summary {
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--slate-300);
  margin-bottom: 24px;
  max-width: 560px;
}

/* Stat cards row */
.stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.stat-card {
  background: rgba(30, 41, 59, 0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--glass-shine);
  pointer-events: none;
  border-radius: 10px;
}

.stat-label {
  font-size: 10.5px;
  color: var(--slate-500);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 4px;
}

.stat-value {
  font-size: 20px; font-weight: 700;
  color: var(--slate-100);
  margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
}

.stat-bar-track {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}

.stat-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--slate-600);
  margin-top: 4px;
}

/* Stacked bar for message breakdown */
.stacked-bar {
  display: flex;
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
  gap: 1px;
}

.stacked-bar > div { height: 100%; }

.stacked-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 5px;
}

.stacked-legend span {
  display: flex; align-items: center; gap: 3px;
  font-size: 9.5px;
  color: var(--slate-500);
}

.stacked-legend span::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 2px;
  flex-shrink: 0;
  background: var(--dot-color);
}

.item-list { margin-bottom: 20px; }

.item-card {
  background: rgba(30, 41, 59, 0.45);

  overflow: hidden;
  transition: border-color 0.2s;
  position: relative;

.item-card::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--glass-shine);
  pointer-events: none;
  border-radius: 9px;
}

.item-card:hover { border-color: rgba(100,116,139,0.5); }

.item-header {
  display: flex; align-items: center;
  padding: 10px 14px;
  cursor: pointer;
  gap: 8px;
}

.item-icon {
  font-size: 12px;
  flex-shrink: 0;
  width: 18px;
  text-align: center;
}

.item-icon.done { color: var(--green); }
.item-icon.run  { color: var(--blue); }
.item-icon.pend { color: var(--slate-600); }

.item-title {
  font-size: 13px; font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--slate-200);
}

.item-meta {
  font-size: 11px;
  color: var(--slate-500);
  display: flex; gap: 10px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.item-chevron {
  color: var(--slate-600);
  font-size: 10px;
  transition: transform 0.25s;
  flex-shrink: 0;
}

.item-card.expanded .item-chevron { transform: rotate(90deg); }

.item-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
}

.item-card.expanded .item-detail {
  max-height: 200px;
  padding: 0 14px 12px 40px;
}

.item-detail p {
  font-size: 12px;
  line-height: 1.65;
  color: var(--slate-400);
}

/* ================================================================

   ================================================================ */
.feed-section { margin-top: 4px; }

.feed-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.feed-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  padding: 5px 8px;
  border-radius: 6px;

  border: 1px solid transparent;

.feed-row:hover {
  background: rgba(255,255,255,0.03);
  border-color: var(--glass-border);
}

.feed-time {
  font-size: 10.5px;
  color: var(--slate-600);
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  min-width: 52px;
}

.feed-icon {
  font-size: 11px;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

.feed-msg {
  flex: 1; min-width: 0;
  color: var(--slate-400);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.feed-msg strong { color: var(--slate-300); font-weight: 600; }

/* ================================================================

   ================================================================ */
.modal-divider {
  height: 1px;
  background: var(--glass-border);
  margin: 20px 0;

/* ================================================================

        <text class="mc-ring-text" x="18" y="18">${mod.progress}%</text>

    mod.subs.forEach((sub, si) => {
      const statusCls = sub.status;
      const branchFilled = sub.status === 'done' || sub.status === 'active';

      html += `<div class="sub-node ${statusCls}" data-mi="${mi}" data-si="${si}">`;
      html += `<div class="sub-branch">
        <div class="sub-branch-fill" style="width:${branchFilled ? '100%' : '0'}"></div>
      </div>`;
      html += `<div class="sub-dot"></div>`;
      html += `<div class="sub-bubble" data-mi="${mi}" data-si="${si}">
        <span class="sub-icon">${sub.icon || ''}</span>
        <div class="sub-body">
          <div class="sub-name">${sub.name}</div>
          <div class="sub-desc">${sub.status === 'done' ? 'Complete' : sub.status === 'active' ? 'In progress...' : 'Waiting'}</div>
        </div>
        <span class="sub-metric">${sub.metric}</span>
        <span class="sub-time">${sub.time || ''}</span>
      </div>`;
      html += `</div>`; // sub-node
    });

    html += `</div>`; // sub-tree
    html += `</div>`; // module
  });

  app.innerHTML = html;
  bindEvents();
}

function computeTrunkHeight(mod) {
  let count = 0;
  for (const sub of mod.subs) {
    if (sub.status === 'done' || sub.status === 'active') count++;
    else break;
  }
  // Each sub-node ~60px, partial for active
  const activeIdx = mod.subs.findIndex(s => s.status === 'active');
  if (activeIdx >= 0) {
    return (activeIdx * 60) + 35;
  }
  return count * 60;
}

// ==================================================================
//  EVENT BINDINGS
// ==================================================================
function bindEvents() {
  // Module card toggle
  document.querySelectorAll('.module-card').forEach(card => {
    card.addEventListener('click', () => {
      const mi = parseInt(card.dataset.mi);
      const mod = DATA[mi];
      if (expandedModules.has(mod.id)) {
        expandedModules.delete(mod.id);
      } else {
        expandedModules.add(mod.id);
      }
      buildPipeline();
    });
  });

  // Sub-bubble click -> open modal
  document.querySelectorAll('.sub-bubble').forEach(bubble => {
    bubble.addEventListener('click', (e) => {
      e.stopPropagation();
      const mi = parseInt(bubble.dataset.mi);
      const si = parseInt(bubble.dataset.si);
      openModal(mi, si);
    });
  });
}

// ==================================================================
//  MODAL LOGIC
// ==================================================================
const overlay = document.getElementById('modalOverlay');
const panel = document.getElementById('modalPanel');

function openModal(mi, si) {
  const mod = DATA[mi];
  const sub = mod.subs[si];

  panel.innerHTML = buildModalContent(mod, sub);
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  // Bind item expand/collapse inside modal
  panel.querySelectorAll('.item-header').forEach(header => {
    header.addEventListener('click', () => {
      header.closest('.item-card').classList.toggle('expanded');
    });
  });
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Overlay click
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});

// Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ==================================================================
//  BUILD MODAL CONTENT
// ==================================================================
function buildModalContent(mod, sub) {
  const tint = TINT_COLORS[mod.tint];
  const statusCls = sub.status === 'done' ? 'done' : sub.status === 'active' ? 'active' : 'pending';
  const statusLabel = sub.status === 'done' ? '\u2713 Complete' : sub.status === 'active' ? '\u25B6 Running' : '\u25CB Pending';
  const statusInner = sub.status === 'active'
    ? `<span class="shimmer-text">${statusLabel}</span>`
    : statusLabel;

  let html = '';

  // Header
  html += `<div class="modal-header">
    <div class="modal-header-left">
      <div class="modal-breadcrumb">
        <span class="bc-dot" style="background:${tint}"></span>
        <span>${mod.name}</span>
        <span style="color:var(--slate-700)">/</span>
        <span style="color:var(--slate-300)">${sub.name}</span>
      </div>
      <div class="modal-title">${sub.icon || ''} ${sub.name}</div>
      <div class="modal-status-row">
        <span class="modal-status-pill ${statusCls}">${statusInner}</span>
        <span style="font-size:12px;color:var(--slate-500)">${sub.metric}</span>
      </div>
    </div>
    <button class="modal-close" onclick="closeModal()" title="Close (Esc)">\u2715</button>
  </div>`;

  // Body
  html += `<div class="modal-body">`;

  if (!sub.detail) {
    // No detail -- pending step
    html += `<div class="section-label">Status</div>
      <div class="modal-summary" style="color:var(--slate-500)">
        This step has not started yet. It will begin once the preceding steps are complete.
      </div>`;
  } else {
    const d = sub.detail;
    const totalDur = '42m 10s';
    const totalCost = '$12.47';
    const bd = d.msgBreakdown || [45,30,15,2,8];
    const bdColors = ['var(--blue)','var(--purple)','var(--green)','var(--red)','#475569'];
    const bdLabels = ['Agent','Tools','Status','Errors','Other'];

    // Summary
    html += `<div class="section-label">Summary</div>
      <div class="modal-summary">${d.summary}</div>`;

    // Stats
    html += `<div class="section-label">Statistics</div>
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-label">Duration</div>
          <div class="stat-value">${d.duration}</div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill" style="width:${d.durPct}%;background:${tint}"></div>
          </div>
          <div class="stat-bar-label"><span>of ${totalDur}</span><span>${d.durPct}%</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cost</div>
          <div class="stat-value">${d.cost}</div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill" style="width:${d.costPct}%;background:${tint}"></div>
          </div>
          <div class="stat-bar-label"><span>of ${totalCost}</span><span>${d.costPct}%</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Messages</div>
          <div class="stat-value">${d.messages}</div>
          <div class="stacked-bar">
            ${bd.map((v,i) => `<div style="width:${v}%;background:${bdColors[i]}"></div>`).join('')}
          </div>
          <div class="stacked-legend">
            ${bd.map((v,i) => `<span style="--dot-color:${bdColors[i]}">${bdLabels[i]} ${v}%</span>`).join('')}
          </div>
        </div>
      </div>`;

    // Items / Artifacts
    if (d.items && d.items.length > 0) {
      html += `<div class="section-label">Artifacts</div>
        <div class="item-list">`;

      d.items.forEach((it, idx) => {
        const ic = it.status === 'done' ? 'done' : it.status === 'active' ? 'run' : 'pend';
        const icon = it.status === 'done' ? '\u2713' : it.status === 'active' ? '\u25B6' : '\u25CB';

        html += `<div class="item-card" data-item="${idx}">
          <div class="item-header">
            <span class="item-icon ${ic}">${icon}</span>
            <span class="item-title">${it.title}</span>
            <span class="item-meta">
              <span>${it.metricText}</span>
              <span>${it.time}</span>
              <span>${it.cost}</span>
            </span>
            <span class="item-chevron">\u25B8</span>
          </div>
          <div class="item-detail"><p>${it.detail}</p></div>
        </div>`;
      });

      html += `</div>`;
    }

    // Feed
    if (d.feed && d.feed.length > 0) {
      html += `<div class="modal-divider"></div>`;
      html += `<div class="feed-section">
        <div class="section-label">Event Log</div>
        <div class="feed-list">`;

      d.feed.forEach(ev => {
        html += `<div class="feed-row">
          <span class="feed-time">${ev.time}</span>
          <span class="feed-icon">${ev.icon}</span>
          <span class="feed-msg">${ev.msg}</span>
        </div>`;
      });

      html += `</div></div>`;
    }
  }

  html += `</div>`; // modal-body
  return html;
}

// ==================================================================
//  INIT
// ==================================================================
buildPipeline();
</script>
</body>
</html>
