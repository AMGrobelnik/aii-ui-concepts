<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --text: #e4e4e7;
    --text-dim: #52525b;
    --text-muted: #71717a;
    --accent: #3b82f6;
    --accent-dim: rgba(59, 130, 246, 0.15);
    --success: #4ade80;
    --running: #facc15;
    --pending: #3f3f46;
    --transition: 300ms ease;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ── Zone 1: Stage Indicator ── */
  .stage-bar {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }

  .stage-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 6px;
    transition: background var(--transition), color var(--transition);
    user-select: none;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.01em;
  }

  .stage-item:hover { background: rgba(255,255,255,0.03); }
  .stage-item.active { color: var(--text); font-weight: 600; }
  .stage-item.completed { color: var(--text-muted); }
  .stage-item .check { color: var(--success); font-size: 13px; }

  .stage-arrow {
    color: var(--text-dim);
    font-size: 12px;
    opacity: 0.3;
    margin: 0 2px;
  }

  /* Breadcrumb nav */
  .breadcrumb {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity var(--transition);
    pointer-events: none;
  }

  .breadcrumb.visible { opacity: 1; pointer-events: auto; }

  .breadcrumb span {
    cursor: pointer;
    transition: color var(--transition);
  }

  .breadcrumb span:hover { color: var(--text-muted); }
  .breadcrumb .sep { cursor: default; opacity: 0.3; }
  .breadcrumb .current { color: var(--text-muted); cursor: default; }

  /* ── Zone 2: Hero ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 48px 24px;
    position: relative;
    overflow: hidden;
  }

  .hero-content {
    text-align: center;
    max-width: 640px;
    width: 100%;
    transition: opacity var(--transition), transform var(--transition);
  }

  .hero-content.fade-out {
    opacity: 0;
    transform: translateY(8px);
  }

  .hero-title {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    color: var(--text);
  }

  .hero-subtitle {
    font-size: 20px;
    font-weight: 400;
    color: var(--text-muted);
    margin-bottom: 40px;
  }

  .hero-metric {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .hero-metric-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  /* Progress ring */
  .progress-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 36px;
  }

  .progress-ring {
    width: 64px;
    height: 64px;
    transform: rotate(-90deg);
  }

  .progress-ring .track {
    fill: none;
    stroke: var(--accent-dim);
    stroke-width: 3;
  }

  .progress-ring .fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dashoffset 600ms ease;
  }

  .progress-pct {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
  }

  .hero-summary {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-muted);
    max-width: 560px;
    margin: 0 auto;
  }

  /* Sub-stage strip */
  .substage-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 36px;
    flex-wrap: wrap;
  }

  .substage-item {
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    user-select: none;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .substage-item:hover { background: rgba(255,255,255,0.04); }
  .substage-item.completed { color: var(--text-muted); }
  .substage-item.active { color: var(--accent); background: var(--accent-dim); }
  .substage-item.pending { color: var(--pending); }

  .substage-icon {
    font-size: 11px;
    flex-shrink: 0;
  }

  .substage-sep {
    color: var(--text-dim);
    opacity: 0.15;
    font-size: 11px;
  }

  /* Artifact list */
  .artifact-list {
    text-align: left;
    margin: 28px auto 0;
    max-width: 420px;
    width: 100%;
  }

  .artifact-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 0;
    font-size: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }

  .artifact-row:last-child { border-bottom: none; }

  .artifact-icon {
    flex-shrink: 0;
    font-size: 13px;
    width: 18px;
    text-align: center;
  }

  .artifact-icon.done { color: var(--success); }
  .artifact-icon.running { color: var(--running); }
  .artifact-icon.pending { color: var(--pending); }

  .artifact-name {
    color: var(--text);
    font-weight: 500;
  }

  .artifact-detail {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 13px;
    white-space: nowrap;
  }

  /* Score badge */
  .score-badge {
    display: inline-block;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 24px;
  }

  /* ── Zone 3: Footer ── */
  .footer {
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    font-size: 13px;
    color: var(--text-dim);
    flex-shrink: 0;
    letter-spacing: 0.01em;
  }

  .footer .sep {
    opacity: 0.2;
  }
</style>
</head>
<body>

<!-- Zone 1 -->
<nav class="stage-bar" id="stageBar">
  <div class="breadcrumb" id="breadcrumb"></div>
</nav>

<!-- Zone 2 -->
<main class="hero">
  <div class="hero-content" id="heroContent"></div>
</main>

<!-- Zone 3 -->
<footer class="footer">
  <span id="footerTime">Time: 02:34:17</span>
  <span class="sep">|</span>
  <span>Cost: $12.47</span>
  <span class="sep">|</span>
  <span>Score: 8.4 / 10</span>
</footer>

<script>
// ─── Data ───────────────────────────────────────────────────────────

const stages = [
  {
    id: 'seed',
    label: 'Seed',
    status: 'completed',
    title: 'Seed Hypotheses',
    subtitle: '12 Seeds Generated',
    summary: 'Extracted 12 candidate research directions from a corpus of 340 papers on cross-lingual representation learning. Top seeds scored between 6.0 and 7.8 on novelty and feasibility.',
    progress: 1.0,
    metric: null,
    metricSub: null,
    subStages: null
  },
  {
    id: 'hypothesis',
    label: 'Hypothesis',
    status: 'completed',
    title: 'Hypothesis Loop',
    subtitle: '3 Iterations Complete',
    summary: 'Iteratively refined a hypothesis about cross-lingual contrastive pre-training. Started at 6.2/10, improved through adversarial review to 8.4/10 with high confidence.',
    progress: 1.0,
    metric: 'Final Score: 8.4 / 10',
    metricSub: null,
    subStages: null
  },
  {
    id: 'invention',
    label: 'Invention',
    status: 'active',
    title: 'Invention Loop',
    subtitle: 'Iteration 2 of 3',
    summary: 'Building research artifacts to support the hypothesis. Completed a baseline experiment (acc 0.847), multilingual dataset (2,400 examples), and convergence proof. Currently running an ablation study.',
    progress: 0.6,
    metric: 'Generating Artifacts',
    metricSub: '3 of 5 complete',
    subStages: [
      {
        id: 'strategy',
        label: 'Strategy',
        status: 'completed',
        title: 'Generate Strategy',
        iteration: 'Iteration 2',
        subtitle: 'Complete',
        summary: 'Refined approach to include ablation experiments. Focus on contrastive alignment with code-switching augmentation across 8 language families.',
        progress: 1.0,
        artifacts: null
      },
      {
        id: 'plan',
        label: 'Plan',
        status: 'completed',
        title: 'Generate Plan',
        iteration: 'Iteration 2',
        subtitle: 'Complete',
        summary: 'Defined 5 artifacts: contrastive baseline, multilingual pair dataset, convergence proof, ablation study, and cross-lingual evaluation. Estimated 18 minutes total compute.',
        progress: 1.0,
        artifacts: null
      },
      {
        id: 'artifacts',
        label: 'Artifacts',
        status: 'active',
        title: 'Generate Artifacts',
        iteration: 'Iteration 2',
        subtitle: '3 of 5 complete',
        summary: null,
        progress: 0.6,
        artifacts: [
          { name: 'Contrastive Baseline', detail: 'acc: 0.847', status: 'done' },
          { name: 'Multilingual Pairs', detail: '2,400 examples', status: 'done' },
          { name: 'Convergence Proof', detail: 'verified', status: 'done' },
          { name: 'Ablation Study', detail: 'running\u2026', status: 'running' },
          { name: 'Cross-lingual Eval', detail: 'pending', status: 'pending' }
        ]
      },
      {
        id: 'paper',
        label: 'Paper',
        status: 'pending',
        title: 'Generate Paper Text',
        iteration: 'Iteration 2',
        subtitle: 'Pending',
        summary: 'Waiting for artifact generation to complete before drafting paper sections.',
        progress: 0,
        artifacts: null
      },
      {
        id: 'review',
        label: 'Review',
        status: 'pending',
        title: 'Review Paper',
        iteration: 'Iteration 2',
        subtitle: 'Pending',
        summary: 'Adversarial review will evaluate completeness, rigor, and novelty of the drafted paper.',
        progress: 0,
        artifacts: null
      },
      {
        id: 'update',
        label: 'Update',
        status: 'pending',
        title: 'Update Hypothesis',
        iteration: 'Iteration 2',
        subtitle: 'Pending',
        summary: 'Will incorporate review feedback to refine the hypothesis for the next iteration.',
        progress: 0,
        artifacts: null
      }
    ]
  },
  {
    id: 'paper_repo',
    label: 'Paper',
    status: 'pending',
    title: 'Paper Repository',
    subtitle: 'Pending',
    summary: 'Final paper compilation, visualization generation, and repository packaging will begin after the invention loop completes.',
    progress: 0,
    metric: null,
    metricSub: null,
    subStages: null
  }
];

// ─── State ──────────────────────────────────────────────────────────

let currentView = { level: 'stage', stageId: 'invention', subId: null };

// ─── Rendering helpers ──────────────────────────────────────────────

function statusIcon(status) {
  if (status === 'completed') return '<span class="check">\u2713</span>';
  if (status === 'active') return '';
  return '';
}

function subStatusIcon(status) {
  if (status === 'completed') return '\u2713';
  if (status === 'active') return '\u25b6';
  return '\u25cb';
}

function subStatusClass(status) {
  if (status === 'completed') return 'completed';
  if (status === 'active') return 'active';
  return 'pending';
}

function artifactIcon(status) {
  if (status === 'done') return '<span class="artifact-icon done">\u2713</span>';
  if (status === 'running') return '<span class="artifact-icon running">\u25b6</span>';
  return '<span class="artifact-icon pending">\u25cb</span>';
}

function makeProgressRing(pct) {
  const r = 27;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  return `
    <div class="progress-wrap">
      <div>
        <svg class="progress-ring" viewBox="0 0 64 64">
          <circle class="track" cx="32" cy="32" r="${r}"/>
          <circle class="fill" cx="32" cy="32" r="${r}"
            stroke-dasharray="${c}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="progress-pct">${Math.round(pct * 100)}%</div>
      </div>
    </div>`;
}

// ─── Stage bar ──────────────────────────────────────────────────────

function renderStageBar() {
  const bar = document.getElementById('stageBar');
  // Keep breadcrumb element, clear the rest
  const bc = document.getElementById('breadcrumb');
  bar.innerHTML = '';
  bar.appendChild(bc);

  stages.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'stage-item' + (s.status === 'active' ? ' active' : '') + (s.status === 'completed' ? ' completed' : '');
    el.innerHTML = `${s.label} ${statusIcon(s.status)}`;
    el.addEventListener('click', () => onStageClick(s.id));
    bar.appendChild(el);

    if (i < stages.length - 1) {
      const arrow = document.createElement('span');
      arrow.className = 'stage-arrow';
      arrow.textContent = '\u2192';
      bar.appendChild(arrow);
    }
  });

  renderBreadcrumb();
}

// ─── Breadcrumb ─────────────────────────────────────────────────────

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';

  if (currentView.level === 'stage' && !currentView.subId) {
    bc.classList.remove('visible');
    return;
  }

  bc.classList.add('visible');
  const parts = [];

  parts.push({ label: 'Pipeline', action: () => navigateTo('stage', getActiveStageId(), null) });

  if (currentView.level === 'substages' || currentView.level === 'substage-detail') {
    const stage = stages.find(s => s.id === currentView.stageId);
    parts.push({ label: stage ? stage.label : '', action: () => navigateTo('substages', currentView.stageId, null) });
  }

  if (currentView.level === 'substage-detail' && currentView.subId) {
    const stage = stages.find(s => s.id === currentView.stageId);
    const sub = stage && stage.subStages ? stage.subStages.find(ss => ss.id === currentView.subId) : null;
    parts.push({ label: sub ? sub.label : '', action: null });
  }

  parts.forEach((p, i) => {
    const span = document.createElement('span');
    span.textContent = p.label;
    if (p.action && i < parts.length - 1) {
      span.addEventListener('click', p.action);
    } else {
      span.className = 'current';
    }
    bc.appendChild(span);

    if (i < parts.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = ' / ';
      bc.appendChild(sep);
    }
  });
}

// ─── Hero content ───────────────────────────────────────────────────

function renderHero() {
  const container = document.getElementById('heroContent');

  if (currentView.level === 'stage') {
    renderStageHero(container);
  } else if (currentView.level === 'substages') {
    renderStageWithSubstages(container);
  } else if (currentView.level === 'substage-detail') {
    renderSubstageDetail(container);
  }
}

function renderStageHero(container) {
  const stage = stages.find(s => s.id === currentView.stageId);
  if (!stage) return;

  let html = `<div class="hero-title">${stage.title}</div>`;
  html += `<div class="hero-subtitle">${stage.subtitle}</div>`;

  if (stage.metric) {
    html += `<div class="hero-metric">${stage.metric}</div>`;
  }
  if (stage.metricSub) {
    html += `<div class="hero-metric-sub">${stage.metricSub}</div>`;
  }

  if (stage.status !== 'pending' && stage.status !== 'completed') {
    html += makeProgressRing(stage.progress);
  } else if (stage.status === 'completed' && stage.id === 'hypothesis') {
    html += `<div class="score-badge">8.4 / 10</div>`;
  }

  html += `<div class="hero-summary">${stage.summary}</div>`;

  container.innerHTML = html;
}

function renderStageWithSubstages(container) {
  const stage = stages.find(s => s.id === currentView.stageId);
  if (!stage) return;

  let html = `<div class="hero-title">${stage.title}</div>`;
  html += `<div class="hero-subtitle">${stage.subtitle}</div>`;

  if (stage.metric) {
    html += `<div class="hero-metric">${stage.metric}</div>`;
  }
  if (stage.metricSub) {
    html += `<div class="hero-metric-sub">${stage.metricSub}</div>`;
  }

  html += makeProgressRing(stage.progress);
  html += `<div class="hero-summary">${stage.summary}</div>`;

  if (stage.subStages) {
    html += '<div class="substage-strip">';
    stage.subStages.forEach((ss, i) => {
      html += `<div class="substage-item ${subStatusClass(ss.status)}" data-subid="${ss.id}">`;
      html += `<span class="substage-icon">${subStatusIcon(ss.status)}</span>`;
      html += ss.label;
      html += '</div>';
      if (i < stage.subStages.length - 1) {
        html += '<span class="substage-sep">|</span>';
      }
    });
    html += '</div>';
  }

  container.innerHTML = html;

  container.querySelectorAll('.substage-item').forEach(el => {
    el.addEventListener('click', () => {
      navigateTo('substage-detail', currentView.stageId, el.dataset.subid);
    });
  });
}

function renderSubstageDetail(container) {
  const stage = stages.find(s => s.id === currentView.stageId);
  if (!stage || !stage.subStages) return;
  const sub = stage.subStages.find(ss => ss.id === currentView.subId);
  if (!sub) return;

  let html = `<div class="hero-title">${sub.title}</div>`;
  html += `<div class="hero-subtitle">${sub.iteration}</div>`;
  html += `<div class="hero-metric">${sub.subtitle}</div>`;

  if (sub.progress > 0 && sub.progress < 1) {
    html += makeProgressRing(sub.progress);
  } else if (sub.progress >= 1) {
    html += '<div style="margin-bottom: 28px"></div>';
  } else {
    html += '<div style="margin-bottom: 28px"></div>';
  }

  if (sub.artifacts) {
    html += '<div class="artifact-list">';
    sub.artifacts.forEach(a => {
      html += `<div class="artifact-row">
        ${artifactIcon(a.status)}
        <span class="artifact-name">${a.name}</span>
        <span class="artifact-detail">${a.detail}</span>
      </div>`;
    });
    html += '</div>';
  } else if (sub.summary) {
    html += `<div class="hero-summary">${sub.summary}</div>`;
  }

  // Sub-stage strip at bottom for context
  html += '<div class="substage-strip">';
  stage.subStages.forEach((ss, i) => {
    const isCurrent = ss.id === currentView.subId;
    let cls = subStatusClass(ss.status);
    if (isCurrent) cls = 'active';
    html += `<div class="substage-item ${cls}" data-subid="${ss.id}">`;
    html += `<span class="substage-icon">${subStatusIcon(ss.status)}</span>`;
    html += ss.label;
    html += '</div>';
    if (i < stage.subStages.length - 1) {
      html += '<span class="substage-sep">|</span>';
    }
  });
  html += '</div>';

  container.innerHTML = html;

  container.querySelectorAll('.substage-item').forEach(el => {
    el.addEventListener('click', () => {
      navigateTo('substage-detail', currentView.stageId, el.dataset.subid);
    });
  });
}

// ─── Navigation ─────────────────────────────────────────────────────

function getActiveStageId() {
  const active = stages.find(s => s.status === 'active');
  return active ? active.id : stages[0].id;
}

function navigateTo(level, stageId, subId) {
  const container = document.getElementById('heroContent');
  container.classList.add('fade-out');

  setTimeout(() => {
    currentView = { level, stageId, subId };
    renderHero();
    renderBreadcrumb();
    container.classList.remove('fade-out');
  }, 200);
}

function onStageClick(stageId) {
  const stage = stages.find(s => s.id === stageId);
  if (!stage) return;

  // If clicking the already-viewed active stage, toggle substages
  if (stageId === currentView.stageId && currentView.level === 'stage' && stage.subStages) {
    navigateTo('substages', stageId, null);
    return;
  }

  // If clicking the stage that is already showing substages, collapse back
  if (stageId === currentView.stageId && currentView.level === 'substages') {
    navigateTo('stage', stageId, null);
    return;
  }

  // Otherwise show stage hero
  navigateTo('stage', stageId, null);
}

// ─── Timer ──────────────────────────────────────────────────────────

let elapsed = 2 * 3600 + 34 * 60 + 17;

function tickTimer() {
  elapsed++;
  const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
  const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('footerTime').textContent = `Time: ${h}:${m}:${s}`;
}

setInterval(tickTimer, 1000);

// ─── Init ───────────────────────────────────────────────────────────

renderStageBar();
navigateTo('stage', 'invention', null);
</script>
</body>
</html>
