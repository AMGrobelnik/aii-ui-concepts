<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Inventor — Diamond Steps</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #09090e;
    --bg-surface: #111118;
    --bg-raised: #18181f;
    --bg-hover: #1e1e28;
    --border: #27272f;
    --border-subtle: #1c1c24;
    --text: #e8e8ed;
    --text-secondary: #a1a1aa;
    --text-dim: #52525b;
    --text-muted: #71717a;

    --green: #4ade80;
    --green-dim: rgba(74, 222, 128, 0.12);
    --green-glow: rgba(74, 222, 128, 0.25);
    --purple: #a78bfa;
    --purple-dim: rgba(167, 139, 250, 0.12);
    --purple-glow: rgba(167, 139, 250, 0.25);
    --blue: #60a5fa;
    --blue-dim: rgba(96, 165, 250, 0.12);
    --blue-glow: rgba(96, 165, 250, 0.35);
    --gray: #52525b;
    --gray-dim: rgba(82, 82, 91, 0.15);

    --transition: 280ms ease;
    --diamond-size: 36px;
    --diamond-active: 42px;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* ═══════════════════════════════════════════
     ZONE 1 — Diamond Step Indicator (~90px)
     ═══════════════════════════════════════════ */
  .diamond-bar {
    height: 94px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
    background: linear-gradient(180deg, var(--bg-surface) 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border-subtle);
  }

  .diamond-track {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }

  /* ── Connecting Lines ── */
  .connector {
    width: 80px;
    height: 2px;
    position: relative;
    overflow: hidden;
    background: var(--border);
    border-radius: 1px;
  }

  .connector.completed {
    background: rgba(74, 222, 128, 0.3);
  }

  .connector.active {
    background: var(--border);
  }

  /* Dot flow animation on connectors */
  .connector::after {
    content: '';
    position: absolute;
    top: -1px;
    left: -8px;
    width: 8px;
    height: 4px;
    border-radius: 2px;
    opacity: 0;
  }

  .connector.completed::after {
    background: var(--green);
    opacity: 0.6;
    animation: dotFlow 2.4s ease-in-out infinite;
  }

  .connector.active::after {
    background: var(--blue);
    opacity: 0.5;
    animation: dotFlow 2s ease-in-out infinite;
  }

  @keyframes dotFlow {
    0%   { left: -8px; opacity: 0; }
    15%  { opacity: 0.7; }
    85%  { opacity: 0.7; }
    100% { left: calc(100% + 8px); opacity: 0; }
  }

  /* ── Diamond Node ── */
  .diamond-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    position: relative;
    user-select: none;
  }

  .diamond-wrap {
    position: relative;
    width: var(--diamond-size);
    height: var(--diamond-size);
  }

  .diamond-node.active .diamond-wrap {
    width: var(--diamond-active);
    height: var(--diamond-active);
  }

  .diamond-shape {
    width: 100%;
    height: 100%;
    transform: rotate(45deg);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all var(--transition);
    border: 2px solid transparent;
  }

  .diamond-inner {
    transform: rotate(-45deg);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1;
    white-space: nowrap;
  }

  /* -- State: Completed -- */
  .diamond-node.completed .diamond-shape {
    background: linear-gradient(135deg, rgba(74, 222, 128, 0.2) 0%, rgba(74, 222, 128, 0.08) 100%);
    border-color: rgba(74, 222, 128, 0.4);
    box-shadow: 0 0 12px var(--green-dim), inset 0 0 8px var(--green-dim);
  }
  .diamond-node.completed .diamond-inner {
    color: var(--green);
  }

  /* -- State: Running (scored) -- */
  .diamond-node.scored .diamond-shape {
    background: linear-gradient(135deg, rgba(167, 139, 250, 0.2) 0%, rgba(167, 139, 250, 0.08) 100%);
    border-color: rgba(167, 139, 250, 0.4);
    box-shadow: 0 0 12px var(--purple-dim), inset 0 0 8px var(--purple-dim);
  }
  .diamond-node.scored .diamond-inner {
    color: var(--purple);
  }

  /* -- State: Active -- */
  .diamond-node.active .diamond-shape {
    background: linear-gradient(135deg, rgba(96, 165, 250, 0.25) 0%, rgba(96, 165, 250, 0.1) 100%);
    border-color: rgba(96, 165, 250, 0.5);
    box-shadow:
      0 0 20px var(--blue-glow),
      0 0 40px rgba(96, 165, 250, 0.1),
      inset 0 0 12px var(--blue-dim);
    animation: diamondPulse 2.5s ease-in-out infinite;
  }
  .diamond-node.active .diamond-inner {
    color: var(--blue);
    font-size: 12px;
  }

  @keyframes diamondPulse {
    0%, 100% { box-shadow: 0 0 20px var(--blue-glow), 0 0 40px rgba(96,165,250,0.1), inset 0 0 12px var(--blue-dim); }
    50%      { box-shadow: 0 0 28px var(--blue-glow), 0 0 56px rgba(96,165,250,0.15), inset 0 0 16px var(--blue-dim); }
  }

  /* Rotating border spinner for active diamond */
  .diamond-node.active .diamond-wrap::before {
    content: '';
    position: absolute;
    inset: -4px;
    transform: rotate(45deg);
    border-radius: 6px;
    border: 2px solid transparent;
    border-top-color: var(--blue);
    border-right-color: rgba(96, 165, 250, 0.3);
    animation: diamondSpin 2s linear infinite;
  }

  @keyframes diamondSpin {
    0%   { transform: rotate(45deg); }
    100% { transform: rotate(405deg); }
  }

  /* -- State: Pending -- */
  .diamond-node.pending .diamond-shape {
    background: var(--gray-dim);
    border-color: var(--gray);
    border-style: dashed;
  }
  .diamond-node.pending .diamond-inner {
    color: var(--text-dim);
  }

  /* Module label below diamond */
  .diamond-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    transition: color var(--transition);
  }
  .diamond-node.active .diamond-label { color: var(--blue); }
  .diamond-node.completed .diamond-label { color: var(--text-muted); }
  .diamond-node.scored .diamond-label { color: var(--purple); }

  /* Selection highlight */
  .diamond-node.selected .diamond-label {
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ═══════════════════════════════════════════
     ZONE 2 — Content Area
     ═══════════════════════════════════════════ */
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 40px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .content-area::-webkit-scrollbar { width: 6px; }
  .content-area::-webkit-scrollbar-track { background: transparent; }
  .content-area::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  /* Module header */
  .module-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 6px;
  }

  .module-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .module-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .module-badge.done {
    background: var(--green-dim);
    color: var(--green);
  }
  .module-badge.running {
    background: var(--blue-dim);
    color: var(--blue);
  }
  .module-badge.pending {
    background: var(--gray-dim);
    color: var(--text-dim);
  }
  .module-badge.scored {
    background: var(--purple-dim);
    color: var(--purple);
  }

  .module-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.5;
    max-width: 640px;
  }

  /* ── Sub-stage cards ── */
  .sub-stages {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 700px;
  }

  .sub-stage {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color var(--transition), background var(--transition);
  }

  .sub-stage:hover {
    border-color: var(--border);
    background: var(--bg-raised);
  }

  .sub-stage-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .sub-stage-indicator {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    transform: rotate(45deg);
    flex-shrink: 0;
    transition: all var(--transition);
  }

  .sub-stage-indicator.done { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
  .sub-stage-indicator.running { background: var(--blue); box-shadow: 0 0 6px var(--blue-dim); animation: indicatorPulse 1.8s ease-in-out infinite; }
  .sub-stage-indicator.pending { background: var(--gray); opacity: 0.5; }
  .sub-stage-indicator.scored { background: var(--purple); box-shadow: 0 0 6px var(--purple-dim); }

  @keyframes indicatorPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .sub-stage-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .sub-stage.is-active .sub-stage-name {
    color: var(--text);
    font-weight: 600;
  }

  .sub-stage-meta {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .sub-stage-chevron {
    width: 16px;
    height: 16px;
    color: var(--text-dim);
    transition: transform var(--transition);
    flex-shrink: 0;
  }

  .sub-stage.expanded .sub-stage-chevron {
    transform: rotate(90deg);
  }

  /* Expandable body */
  .sub-stage-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 350ms ease, padding 250ms ease;
    padding: 0 18px;
  }

  .sub-stage.expanded .sub-stage-body {
    max-height: 600px;
    padding: 0 18px 16px;
  }

  .sub-stage-content {
    font-size: 12px;
    line-height: 1.65;
    color: var(--text-muted);
    border-top: 1px solid var(--border-subtle);
    padding-top: 12px;
  }

  .sub-stage-content p { margin-bottom: 8px; }
  .sub-stage-content p:last-child { margin-bottom: 0; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid rgba(39, 39, 47, 0.4);
  }
  .detail-row:last-child { border-bottom: none; }

  .detail-key {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  .detail-val {
    font-size: 12px;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }

  .detail-val.highlight-green { color: var(--green); }
  .detail-val.highlight-blue { color: var(--blue); }
  .detail-val.highlight-purple { color: var(--purple); }

  /* Score bar mini visualization */
  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-bar {
    width: 60px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 600ms ease;
  }

  /* ── Keyboard hint ── */
  .kbd-hint {
    position: fixed;
    bottom: 16px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.5;
    z-index: 100;
    pointer-events: none;
  }

  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 20px;
    padding: 0 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg-surface);
  }

  /* ── Fade-in on module switch ── */
  .content-area.switching .sub-stages {
    animation: fadeSlideIn 300ms ease forwards;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Stage transition ── */
  .diamond-node {
    transition: transform 200ms ease;
  }
  .diamond-node:hover {
    transform: translateY(-1px);
  }

  /* Progress tag inside sub-stage */
  .progress-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.03em;
  }
  .progress-tag.done { background: var(--green-dim); color: var(--green); }
  .progress-tag.running { background: var(--blue-dim); color: var(--blue); }
  .progress-tag.pending { background: var(--gray-dim); color: var(--text-dim); }

  /* Iteration counter */
  .iter-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    padding: 2px 8px;
    background: var(--bg-raised);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    margin-left: 8px;
  }
  .iter-badge .num { color: var(--text-secondary); }
</style>
</head>
<body>

<!-- ════════ Zone 1: Diamond Step Indicator ════════ -->
<div class="diamond-bar">
  <div class="diamond-track">
    <!-- Seed -->
    <div class="diamond-node completed selected" data-index="0" onclick="selectModule(0)">

      </div>

    <!-- Hypothesis -->
    <div class="diamond-node scored" data-index="1" onclick="selectModule(1)">
      <div class="diamond-wrap">
        <div class="diamond-shape">
          <span class="diamond-inner">8.4</span>

      </div>
      <span class="diamond-label">Hypothesis</span>

    <div class="connector active"></div>

    <!-- Invention -->

      <div class="diamond-wrap">

          <span class="diamond-inner">3/5</span>

      </div>

    <div class="connector"></div>

    <!-- Paper -->
    <div class="diamond-node pending" data-index="3" onclick="selectModule(3)">
      <div class="diamond-wrap">
        <div class="diamond-shape">
          <span class="diamond-inner">&mdash;</span>
        </div>
      </div>
      <span class="diamond-label">Paper</span>
    </div>
  </div>
</div>

<!-- ════════ Zone 2: Content Area ════════ -->
<div class="content-area" id="contentArea"></div>

<!-- Keyboard hint -->
<div class="kbd-hint">
  <span class="kbd">&larr;</span>
  <span class="kbd">&rarr;</span>
  navigate
</div>

<script>
// ──────────────────────────────────────────
// Data model
// ──────────────────────────────────────────

let currentModule = 2; // Start on invention (the active one)

// ──────────────────────────────────────────
// Rendering
// ──────────────────────────────────────────
function renderContent(moduleIdx) {
  const m = MODULES[moduleIdx];
  const area = document.getElementById('contentArea');

  // Badge class mapping
  const badgeCls = { done: 'done', running: 'running', pending: 'pending', scored: 'scored' };
  const badgeText = {
    done: 'Complete',
    running: 'Running',
    pending: 'Pending',
    scored: 'Score ' + (m.statusLabel || '')
  };

  let html = `
    <div class="module-header">
      <span class="module-title">${m.name}</span>
      <span class="module-badge ${badgeCls[m.status]}">${badgeText[m.status]}</span>
      ${m.status === 'running' ? '<span class="iter-badge">Iteration <span class="num">3 / 5</span></span>' : ''}
    </div>
    <p class="module-desc">${m.desc}</p>
    <div class="sub-stages">
  `;

  m.subStages.forEach((ss, i) => {
    const isActive = ss.status === 'running';
    const expanded = isActive; // Auto-expand running sub-stages
    html += `
      <div class="sub-stage ${expanded ? 'expanded' : ''} ${isActive ? 'is-active' : ''}" data-ss="${i}">
        <div class="sub-stage-header" onclick="toggleSubStage(this)">
          <div class="sub-stage-indicator ${ss.status}"></div>
          <span class="sub-stage-name">${ss.name}</span>
          <span class="sub-stage-meta">${ss.meta}</span>
          <svg class="sub-stage-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M6 4l4 4-4 4"/>
          </svg>
        </div>
        <div class="sub-stage-body">
          <div class="sub-stage-content">
            ${renderDetails(ss.details)}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  area.innerHTML = html;

  // Trigger fade-in
  area.classList.add('switching');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => area.classList.remove('switching'));
  });
}

function renderDetails(details) {
  if (!details || !details.length) return '<p>No details available.</p>';
  let html = '';
  details.forEach(d => {
    const valClass = d.cls ? ` ${d.cls}` : '';

    // Render score bars for numeric /10 values
    let extra = '';
    if (d.val.includes('/ 10')) {
      const num = parseFloat(d.val);
      const pct = (num / 10) * 100;
      const color = num >= 8 ? 'var(--green)' : num >= 6 ? 'var(--purple)' : 'var(--blue)';
      extra = `
        <div class="score-bar-wrap">
          <div class="score-bar">
            <div class="score-bar-fill" style="width:${pct}%; background:${color};"></div>
          </div>
        </div>
      `;
    }

    html += `
      <div class="detail-row">
        <span class="detail-key">${d.key}</span>
        <span class="detail-val${valClass}">${d.val}</span>
        ${extra}
      </div>
    `;
  });
  return html;
}

// ──────────────────────────────────────────
// Diamond selection
// ──────────────────────────────────────────
function selectModule(idx) {
  if (idx < 0 || idx >= MODULES.length) return;
  currentModule = idx;

  // Update diamond selection state
  document.querySelectorAll('.diamond-node').forEach((node, i) => {
    node.classList.toggle('selected', i === idx);
  });

  renderContent(idx);
}

// ──────────────────────────────────────────
// Sub-stage expand/collapse
// ──────────────────────────────────────────
function toggleSubStage(headerEl) {
  const card = headerEl.parentElement;
  card.classList.toggle('expanded');
}

// ──────────────────────────────────────────
// Keyboard navigation
// ──────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    selectModule(currentModule - 1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    selectModule(currentModule + 1);
  }
});

// ──────────────────────────────────────────
// Initial render
// ──────────────────────────────────────────
selectModule(currentModule);
</script>
</body>
</html>
